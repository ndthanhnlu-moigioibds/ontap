    <script>
        const allData = [{"level": "1", "content": "Các vấn đề chính trong quản trị nhân sự", "options": {"A": "Xác định năng lực chuyên môn của nhân viên; Động cơ của nhân viên; Hình thức đào tạo của nhân viên trước kia", "B": "Lập kế hoạch nhân sự; Tuyển nhân viên; Đánh giá mức độ hoàn thành công việc của nhân viên", "C": "Đào tạo nghiệp vụ; Đưa ra mức lương, thưởng hợp lý", "D": "(b) và (c)"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Quản trị nhân sự trong một tổ chức (bao gồm sàn giao dịch BĐS) bao trùm toàn bộ các hoạt động từ khâu thu hút, tuyển dụng (lập kế hoạch, tuyển nhân viên) đến duy trì và phát triển nguồn nhân lực (đào tạo nghiệp vụ, đánh giá hiệu suất, và chính sách đãi ngộ, lương thưởng hợp lý)."}, {"level": "1", "content": "Hợp đồng kinh doanh bất động sản phải được thành lập thành văn bản và công chứng là nhận định?", "options": {"A": "Sai vì Hợp đồng kinh doanh BĐS không cần lập thành văn bản", "B": "Sai vì Hợp đồng kinh doanh BĐS không cần phải công chứng", "C": "Sai vì Hợp đồng kinh doanh BĐS phải lập thành văn bản nhưng không bắt buộc phải công chứng trong một số trường hợp", "D": "Sai vì Hợp đồng kinh doanh BĐS không bắt buộc phải lập thành văn bản nhưng bắt buộc phải công chứng"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo quy định của pháp luật về Kinh doanh Bất động sản, hợp đồng kinh doanh bất động sản bắt buộc phải được lập thành văn bản. Việc công chứng, chứng thực hợp đồng do các bên thỏa thuận, trừ các hợp đồng mua bán, thuê mua nhà ở, công trình xây dựng mà một bên tham gia là doanh nghiệp kinh doanh BĐS thì không bắt buộc phải công chứng."}, {"level": "1", "content": "Bạn là nhân viên tư vấn và môi giới của sàn giao dịch bđs, bạn nên làm gì khi khách hàng lỡ hẹn nhiều lần.", "options": {"A": "Tìm khách mới", "B": "Kiên trì tới khi hẹn được khách và xác định rõ nhu cầu thực sự của khách khi gặp trực tiếp.", "C": "Gọi điện trực tiếp bày tỏ sự khó chịu.", "D": "Chỉ gửi lại thông tin qua zalo"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trong kỹ năng môi giới chuyên nghiệp và chăm sóc khách hàng, sự kiên nhẫn và lấy khách hàng làm trọng tâm là yếu tố cốt lõi. Khách hàng lỡ hẹn có thể do nhiều nguyên nhân khách quan hoặc do họ đang trong giai đoạn phòng vệ. Việc kiên trì giúp môi giới thể hiện sự chuyên nghiệp, xây dựng lòng tin và cuối cùng là khai thác được nhu cầu thực sự của họ khi có cơ hội gặp mặt trực tiếp."}, {"level": "1", "content": "Người môi giới trên sàn giao dịch bất động sản được trả phí môi giới do:", "options": {"A": "Cung cấp một dịch vụ cho người bán hoặc người mua", "B": "Tạo ra nhiều mối quan hệ cho người mua hoặc người bán", "C": "Họ được giáo dục một cách chuyên nghiệp", "D": "Đạt kết quả giao dịch"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Bản chất cốt lõi của hoạt động môi giới bất động sản là việc cung cấp dịch vụ trung gian kết nối giữa bên bán và bên mua, bên cho thuê và bên thuê. Phí môi giới được chi trả như một sự đền bù cho công sức và giá trị dịch vụ mà người môi giới đã cung cấp để hỗ trợ khách hàng trên thị trường."}, {"level": "1", "content": "Là nhân viên kinh doanh của sàn giao dịch bđs, khi được hỏi về vấn đề mà bạn đã biết, bạn cần", "options": {"A": "xác định phạm vi vấn đề cần trả lời", "B": "cân nhắc kĩ vấn đề trước khi trả lời", "C": "không nên trả lời quá dễ dàng, đơn giản", "D": "không nên trả lời quá chi tiết câu hỏi của họ"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Trong nghệ thuật giao tiếp và đàm phán kinh doanh BĐS, chất lượng của câu trả lời thường được khách hàng đánh giá tỷ lệ thuận với thời gian cân nhắc. Trả lời quá nhanh hoặc quá dễ dàng có thể khiến khách hàng đánh giá thấp giá trị của thông tin tư vấn, hoặc tạo cảm giác người môi giới chưa suy nghĩ thấu đáo cho quyền lợi của họ."}, {"level": "1", "content": "Một chính sách thanh toán tốt và hấp dẫn là chính sách đảm bảo", "options": {"A": "Chỉ cần một phương thức thanh toán chuẩn và (c)", "B": "Có chiết khấu cao và (c)", "C": "Phù hợp với khả năng thanh khoản cho nhiều đối tượng khách hàng", "D": "Có nhiều phương thức thanh toán để lựa chọn và (c)"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Một chính sách thanh toán tối ưu trong bán hàng BĐS phải đa dạng hóa các phương thức (ví dụ: thanh toán chuẩn theo tiến độ, thanh toán nhanh nhận chiết khấu, hỗ trợ vay ngân hàng...) để phù hợp với dòng tiền, khả năng tài chính và tính thanh khoản của nhiều nhóm đối tượng khách hàng mục tiêu khác nhau."}, {"level": "1", "content": "Phong cách đàm phán các bên cùng quan tâm đến lợi ích của nhau với tinh thần hợp tác và đều thu được lợi ích là phong cách đàm phán", "options": {"A": "Thua-thua", "B": "Thắng-thua", "C": "Thua-thắng", "D": "Thắng-thắng"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Phong cách đàm phán Thắng - Thắng (Win - Win) là phương pháp đàm phán nguyên tắc, trong đó các bên không coi nhau là đối thủ mà là đối tác. Các bên cùng nhau hợp tác giải quyết vấn đề, dung hòa lập trường để đạt được một thỏa thuận chung mà tất cả đều thu được lợi ích và cảm thấy hài lòng."}, {"level": "1", "content": "Trường hợp bên mua nhà, công trình xây dựng yêu cầu bên bán hoàn thành các thủ tục mua bán nhà, công trình xây dựng trước thời hạn đã thỏa thuận trong hợp đồng là đúng hay sai?", "options": {"A": "Đúng", "B": "Sai"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo nguyên tắc tự nguyện và ràng buộc thực hiện hợp đồng dân sự cũng như Luật Kinh doanh Bất động sản, các bên phải tuân thủ đúng các cam kết (bao gồm cả tiến độ và thời hạn bàn giao) đã thỏa thuận. Bên mua không có quyền đơn phương ép buộc bên bán phải hoàn thành thủ tục và giao nhà trước thời hạn đã ký kết nếu không có sự đồng thuận sửa đổi hợp đồng từ phía bên bán."}, {"level": "1", "content": "Mục nào sau đây không phải là một chiến lược đàm phán hay?", "options": {"A": "Bày tỏ thiện ý sớm để chứng tỏ rằng bạn đang thương thảo với mục đích tích cực", "B": "Xác định tâm ý và những điều kiện mà khách hàng có thể chấp nhận được", "C": "Đưa ra những điều kiện ưu đãi như thanh toán nhanh hoặc mong muốn đạt được sự giao dịch sớm", "D": "Áp dụng kỹ năng đàm phán win-win trong đó mỗi bên đầu cảm thấy thõa mãn."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Việc vội vàng đưa ra ngay các nhượng bộ, ưu đãi (như giảm giá, thanh toán nhanh) hoặc để lộ sự nôn nóng muốn chốt giao dịch sớm sẽ làm giảm vị thế đàm phán của môi giới. Điều này khiến đối tác nắm bắt được điểm yếu, dẫn đến việc họ có xu hướng ép giá hoặc đòi hỏi thêm các nhượng bộ bất lợi khác cho phía chủ nhà/sàn giao dịch."}, {"level": "1", "content": "Trong quá trình đổi mới và phát triển kinh tế trong hơn 20 năm qua, nhu cầu về bđs tại Việt Nam đã tăng lên rất cao, theo anh chị nguyên nhân là do:", "options": {"A": "Quy mô dân số tăng nhanh đã thúc đẩy nhu cầu về nhà ở tăng theo", "B": "Việc bùng nổ quá trình đô thị hóa ở Việt Nam", "C": "Việc phát triển kinh thế theo hướng công nghiệp hóa – hiện đại hóa", "D": "Cả A, B, C đều đúng"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Nhu cầu bất động sản tại Việt Nam tăng mạnh do sự cộng hưởng của các yếu tố vĩ mô: Tăng trưởng dân số cơ học và tự nhiên tạo áp lực trực tiếp lên nhu cầu nhà ở; quá trình đô thị hóa nhanh chóng làm tăng nhu cầu hạ tầng và không gian sống đô thị; cùng với sự phát triển kinh tế theo hướng công nghiệp hóa giúp nâng cao thu nhập người dân và kích thích nhu cầu đầu tư tích sản."}, {"level": "1", "content": "Tương sinh đúng trong Ngũ hành theo quan niệm phong thủy", "options": {"A": "Thủy sinh mộc, mộc sinh hỏa, hỏa sinh thổ, thổ sinh kim, kim sinh thủy", "B": "Thủy sinh kim, kim sinh thổ, thổ sinh mộc, mộc sinh thủy, thủy sinh hỏa", "C": "Thổ sinh hỏa, hỏa sinh kim, kim sinh thủy, thủy sinh mộc, mộc sinh thổ", "D": "Cả 3 câu trên đều đúng"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Trong quan niệm phong thủy Phương Đông (thường được khách hàng BĐS quan tâm), chu trình Tương Sinh của Ngũ Hành vận hành theo quy luật tự nhiên nuôi dưỡng lẫn nhau: Nước (Thủy) nuôi dưỡng cây (Mộc), Cây cháy sinh ra lửa (Hỏa), Lửa cháy thành tro bụi tạo ra đất (Thổ), Đất sinh ra các quặng kim loại (Kim), Kim loại nóng chảy hóa lỏng thành thể nước (Thủy)."}, {"level": "1", "content": "Thế nào là kiểu nghe giả vờ?", "options": {"A": "Nghe vô thức và không thể hiện biểu cảm, cảm xúc; nội dung không lưu vào tâm trí nhiều", "B": "Nghe vô thức nhưng có thể hiện biểu cảm, cảm xúc; nội dung không lưu vào tâm trí nhiều", "C": "Nghe vô thức và không thể hiện biểu cảm, cảm xúc; nội dung được lưu vào tâm trí nhiều", "D": "Nghe vô thức nhưng có thể hiện biểu cảm, cảm xúc; nội dung được lưu vào tâm trí nhiều."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> \"Nghe giả vờ\" trong kỹ năng giao tiếp là trạng thái người nghe có những phản ứng vật lý bên ngoài (như gật đầu, mỉm cười, đệm lời \"dạ vâng\") để tạo vỏ bọc đang chú ý lắng nghe, nhưng thực chất tâm trí đang bị phân tâm. Quá trình tiếp nhận thông tin diễn ra trong vô thức và họ không ghi nhớ được nội dung cốt lõi của câu chuyện."}, {"level": "1", "content": "Hệ thống marketing có những loại nhiệm vụ nào? (chọn 2 đáp án đúng)", "options": {"A": "Xác định mức giá hợp lí", "B": "Truyền tải thông tin, hình ảnh tốt của doanh nghiệp đến người tiêu dùng", "C": "Xây dựng và duy trì tốt các mối quan hệ với khách hàng", "D": "Gửi thư trực tiếp tới khách hàng tiềm năng"}, "answer": "B,C", "explanation": "<b>Giải thích học thuật:</b> Trong hoạt động kinh doanh (đặc biệt là dịch vụ BĐS), hệ thống marketing đảm nhận hai nhiệm vụ bao quát và cốt lõi: (1) Truyền thông, quảng bá hình ảnh thương hiệu và sản phẩm tích cực đến tệp khách hàng tiềm năng; (2) Thiết lập, chăm sóc và duy trì các mối quan hệ bền vững với khách hàng (Customer Relationship Management) nhằm tạo ra giá trị lâu dài và khách hàng trung thành. Việc gửi thư hay định giá chỉ là các hành động/công cụ cụ thể bên trong."}, {"level": "1", "content": "Mục đích của việc khám phá nhu cầu khách hàng trong mua bán bđs là", "options": {"A": "Xác định nhu cầu mua bán", "B": "Khả năng thanh toán", "C": "Động lực của khách hàng", "D": "Tất cả đều đúng"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Khám phá nhu cầu của khách hàng là bước nền tảng để người môi giới vẽ được \"chân dung\" khách hàng một cách toàn diện. Quá trình này giúp môi giới nắm bắt được sản phẩm họ muốn (nhu cầu), nguồn lực tài chính hiện có (khả năng thanh toán), và lý do cốt lõi thúc đẩy họ đưa ra quyết định (động lực: mua để ở, đầu tư lướt sóng, giữ tiền hay mua cho con cái)."}, {"level": "1", "content": "Phương pháp đánh giá bất động sản dựa trên dữ liệu thị trường có thể yêu cầu một vài điều chỉnh dựa trên việc so sánh những khoản sau, ngoại trừ:", "options": {"A": "Ngày, thời điểm mua bán", "B": "Diện tích kích thước nền nhà và vị trí khu vực", "C": "Phương thức thanh toán tài chính của người mua", "D": "Chi phí thay thế sửa chữa kiến trúc"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Phương pháp đánh giá dựa trên dữ liệu thị trường (Phương pháp so sánh trực tiếp) tiến hành điều chỉnh giá trị dựa trên các giao dịch thực tế tương đồng về đặc điểm vật lý (diện tích, vị trí), thời điểm giao dịch và phương thức thanh toán. Việc tính toán \"chi phí thay thế sửa chữa kiến trúc\" thuộc về đặc thù của Phương pháp Chi phí (Cost Approach), không thuộc bản chất của Phương pháp So sánh."}, {"level": "1", "content": "Quá trình chia một thị trường toàn phần hoặc một khu vực thị trường thành những thị trường nhỏ, những nhóm khách hàng vì mục đích marketing, gọi là:", "options": {"A": "Thâm nhập thị trường.", "B": "Phân khúc thị trường.", "C": "Chọn thị trường mục tiêu.", "D": "Phát triển thị trường."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trong lý thuyết Marketing, \"Phân khúc thị trường\" (Market Segmentation) được định nghĩa là quá trình nhận diện và chia nhỏ một thị trường tổng thể rộng lớn, đa dạng thành các tệp (nhóm) khách hàng nhỏ hơn có chung một hoặc nhiều đặc điểm, nhu cầu hoặc hành vi để dễ dàng thiết kế sản phẩm và chiến dịch tiếp thị phù hợp."}, {"level": "1", "content": "Nội dung then chốt trong quản lý kênh phân phối bán hàng", "options": {"A": "Xác định mục tiêu bán hàng, phân bố nguồn lực, kiểm soát, đánh giá", "B": "Tạo dựng các sàn, đại lý phân phối bán hàng", "C": "Tạo dựng mạng lưới phân phối bán hàng và tuyển dụng, huấn luyện nhân viên", "D": "Tuyển dụng, huấn luyện, đánh giá nhân viên và thực hiện chế độ lương thưởng xứng đáng"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Quản trị kênh phân phối (Channel Management) đòi hỏi tư duy hệ thống và chiến lược bao quát, bao gồm chu trình khép kín: Hoạch định (xác định mục tiêu bán hàng), Tổ chức triển khai (phân bổ nguồn lực hợp lý cho các trung gian, đại lý/sàn), và Giám sát (kiểm soát, đánh giá hiệu quả hoạt động của các thành viên trong kênh để có phương án điều chỉnh)."}, {"level": "1", "content": "Nguyên tắc quan trọng nhất cần nắm để viết thư bán hàng bđs", "options": {"A": "Làm nổi bật vai trò của khách hàng", "B": "Nhấn mạnh một đặc điểm của sản phẩm", "C": "Sử dụng ngôn ngữ chuyên môn", "D": "Sử dụng các danh từ cụ thể và các động từ chủ động"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trong kỹ năng viết thư chào hàng (Sales Letter) hay bản tin bất động sản hiệu quả, để tránh làm khách hàng quá tải thông tin và mất sự tập trung, lá thư nên xoáy sâu và nhấn mạnh vào một đặc điểm nổi bật, mang tính cạnh tranh nhất (Unique Selling Proposition - USP). Điểm nhấn này phải có khả năng đánh trúng tâm lý và giải quyết đúng vấn đề của đối tượng nhận thư."}, {"level": "1", "content": "Điều nào thể hiện lập trường của đàm phán kiểu mềm?", "options": {"A": "Ôn hòa, trao đổi, lắng nghe các đề xuất, dung hòa lập trường của các bên.", "B": "Cứng rắn, không nhượng bộ, cố gắng bảo vệ lập trường đến cùng.", "C": "Không cứng rắn, không nhượng bộ, dung hòa lập trường các bên", "D": "Lắng nghe các đề xuất nhưng không nhượng bộ, cố gắng bảo vệ lập trường của mình"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Lập trường của đàm phán kiểu mềm (Soft Negotiation) luôn xem đối tác đàm phán như bạn bè. Mục tiêu cao nhất của phong cách này là đạt được sự đồng thuận và duy trì mối quan hệ tốt đẹp. Do đó, người đàm phán thường cư xử ôn hòa, tránh gây ra xung đột, sẵn sàng lắng nghe và dễ dàng nhượng bộ để dung hòa các quan điểm khác biệt."}, {"level": "1", "content": "Một người thường quan tâm đến cảm xúc của mình và của người khác khi đưa ra quyết định; Nhạy cảm với cử chỉ, lời nói hay các phản ứng của người khác; Khó xử khi có xung đột. Khi nổi giận thường có hành động tiêu cực; Tham khảo ý kiến nhiều người và tìm kiếm sự ủng hộ của số đông. ... thuộc xu thế gi` trong nhóm tính cách MBTI?", "options": {"A": "Lý trí - Thinking (T)", "B": "Tình cảm - Feeling (F)", "C": "Nguyên tắc - Judging (J)", "D": "Linh hoạt - Perceiving (P)"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trong công cụ trắc nghiệm và phân tích tính cách MBTI, nhóm Tình cảm (Feeling - F) đặc trưng bởi việc đưa ra quyết định dựa trên hệ giá trị cá nhân, sự đồng cảm và tác động của quyết định đó đến cảm xúc của những người xung quanh. Họ cực kỳ nhạy cảm với các yếu tố con người, thường né tránh xung đột, đề cao sự hòa hợp và luôn tìm kiếm sự đồng thuận từ số đông."}, {"level": "1", "content": "Khách hàng (nữ) đặt cọc mua căn hộ tại thời điểm 20/10/2022 có nhận được quà tặng khuyến mãi hay không?", "options": {"A": "Môi giới liên hệ lại với chủ đầu tư để hỏi về việc có được tặng quà khuyến mãi hay không", "B": "Tùy vào thời điểm ký hợp đồng mua bán căn hộ đó có nằm trong thời gian của chương trình khuyến mãi hay không", "C": "Môi giới khẳng định là có, vì đây là điều khoản nằm trong chương trình marketing của công ty", "D": "Tôn vinh phụ nữ, quà là trên hết, bắt buộc phải có quà cho phụ nữ nhân ngày 20/10"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các chương trình khuyến mãi (chiết khấu, quà tặng) trong kinh doanh bất động sản do Chủ đầu tư ban hành đều có văn bản quy định chặt chẽ về \"Thời gian áp dụng\" và \"Điều kiện áp dụng\" (ví dụ: áp dụng cho khách hàng ký Thỏa thuận đặt cọc hoặc Hợp đồng mua bán trong một khung thời gian nhất định). Việc nhận quà tặng phụ thuộc hoàn toàn vào các quy định cụ thể của chính sách bán hàng tại thời điểm phát sinh giao dịch pháp lý, không phụ thuộc vào yếu tố cảm tính hay ngày lễ."}, {"level": "1", "content": "Quy trình môi giới sản phẩm BĐS bao gồm các bước sau, ngoại trừ:", "options": {"A": "Đánh giá tiềm năng của sản phẩm và nhu cầu của khách hàng;", "B": "Thu thập và cập nhật thông tin về thị trường, sản phẩm và pháp lý", "C": "Tìm kiếm khách hàng và chuẩn bị tư vấn cho khách hàng, lập hồ sơ thương vụ môi giới; thương lượng, đàm phán và thuyết phục khách hàng, soạn thảo hợp đồng, chăm sóc khách hàng;", "D": "Thu thập thông tin thực hiện thủ tục thẩm định giá cho khách hàng"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Theo quy định pháp luật và lý thuyết hoạt động của sàn giao dịch bất động sản, định giá là một dịch vụ chuyên biệt, đòi hỏi quy trình khắt khe và bắt buộc người thực hiện phải có Chứng chỉ/Thẻ Thẩm định viên về giá. Quy trình môi giới thông thường giới hạn ở các bước thu thập thông tin thị trường/pháp lý, đánh giá nhu cầu, tìm kiếm và tư vấn khách hàng, đàm phán và hỗ trợ hợp đồng."}, {"level": "1", "content": "Điều kiện cần và đủ quan trọng nhất cần được xem xét để chuyển cuộc thương lượng sang giai đoạn kết thúc đàm phán, chuyển sang ký kết hợp đồng mua bán nhà đất/căn hộ?", "options": {"A": "Cuộc thương lượng đã đạt được mục tiêu cần thiết", "B": "Các câu hỏi đặt ra trong quá trình đàm phán đã được giải đáp thoả đáng", "C": "Ta đã giải đáp thoả đáng lời phản đối và phê phán của đối tác", "D": "Hai bên đã giải quyết được các mâu thuẫn và tạo được bầu không khí thuận lợi cho việc kết thúc đàm phán"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Trong nghệ thuật đàm phán bất động sản, việc giải quyết triệt để các mâu thuẫn cốt lõi (về giá, phương thức thanh toán, thời hạn bàn giao) và tạo lập được sự đồng thuận, tin tưởng (bầu không khí thuận lợi) là tín hiệu (buying signal) rõ ràng nhất. Đây là điều kiện tiên quyết để người môi giới có thể tự tin thúc đẩy tiến trình chốt sale (closing) và chuyển sang ký kết hợp đồng chính thức."}, {"level": "1", "content": "Nhà môi giới BĐS có được phép nhận đặt cọc để mua căn hộ từ khách hàng không? (chọn 2 đáp án đúng)", "options": {"A": "Được phép", "B": "Được phép khi có văn bản ủy quyền của chủ đầu tư và/hoặc chủ bđs", "C": "Không được phép thực hiện theo đúng nội dung ủy quyền", "D": "Hoàn toàn không được phép"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Về bản chất pháp lý, nhà môi giới bất động sản chỉ là bên trung gian cung cấp dịch vụ kết nối. Môi giới không có quyền sở hữu đối với tài sản được giao dịch nên không được tự ý nhận tiền cọc của khách mua, trừ trường hợp có hợp đồng/văn bản ủy quyền hợp pháp từ bên bán (chủ đầu tư hoặc chủ sở hữu bất động sản) cho phép môi giới được thu hộ hoặc nhận cọc thay."}, {"level": "1", "content": "Chọn 2 lựa chọn phù hợp với tính chất công việc của quá tri`nh Đàm phán? (chọn 2 đáp án đúng)", "options": {"A": "Có thể kết thúc với thỏa thuận, không có thỏa thuận hoặc thất bại hoàn toàn", "B": "Kết thúc với việc đạt được một thỏa thuận mà cả hai bên đều chấp nhận được", "C": "Đòi hỏi khả năng đối thoại trong kỹ năng đàm phán và thương lượng", "D": "Đòi hỏi khả năng lắng nghe và đồng cảm để tìm đến một thỏa thuận chấp nhận được"}, "answer": "A,C", "explanation": "<b>Giải thích học thuật:</b> Quá trình đàm phán là một chuỗi các hoạt động tương tác, đối thoại liên tục giữa các bên nhằm dung hòa lợi ích. Tính chất của đàm phán phản ánh sự bất định: nó phụ thuộc vào khả năng đối thoại và nhượng bộ của mỗi bên, do đó nó có thể dẫn đến một thỏa thuận thành công, cũng có thể không đạt được kết quả hoặc thất bại hoàn toàn."}, {"level": "1", "content": "Các công ty BĐS thực hiện chiến lược tạo ra lợi thế cạnh tranh với chi phí thấp (chọn 2 đáp án đúng):", "options": {"A": "Giảm giá hàng bán để tăng lợi thế cạnh tranh", "B": "Tìm mua các nguồn lực đầu vào, quản trị hoạt động với chi phí thấp", "C": "Đem lại cho khách hàng chi phí thấp trong mua và tiêu dùng BĐS", "D": "Đầu tư trang thiết bị nâng cao hiệu suất sản xuất"}, "answer": "B,C", "explanation": "<b>Giải thích học thuật:</b> Theo lý thuyết chiến lược cạnh tranh của Michael Porter ứng dụng trong kinh doanh bất động sản, chiến lược chi phí thấp (Cost Leadership) tập trung vào việc tối ưu hóa toàn bộ chuỗi giá trị: từ việc tìm mua nguồn lực đầu vào giá tốt, vận hành quản trị với chi phí thấp (B); từ đó tạo ra lợi thế nền tảng để đem lại cho khách hàng các sản phẩm/dịch vụ với mức chi phí tối ưu nhất so với đối thủ cạnh tranh trên thị trường (C)."}, {"level": "1", "content": "Khách hàng có nhu cầu đặt cọc thì bạn cần liên hệ với phòng ban nào để được hỗ trợ?", "options": {"A": "Phòng chăm sóc khách hàng", "B": "Phòng/bộ phận thủ tục", "C": "Phòng Kế toán", "D": "Chủ đầu tư"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trong cơ cấu tổ chức và quy trình vận hành chuẩn của một sàn giao dịch hoặc công ty dịch vụ bất động sản, Phòng/bộ phận thủ tục (hoặc Khối Pháp lý - Hành chính) là phòng ban chuyên trách việc kiểm soát tính hợp lệ của hồ sơ, cung cấp biểu mẫu, soạn thảo văn bản và hỗ trợ môi giới hoàn tất các thủ tục pháp lý liên quan đến việc đặt chỗ, đặt cọc của khách hàng."}, {"level": "1", "content": "Các công ty BĐS thực hiện chiến lược tạo ra lợi thế cạnh tranh về chọn lọc tập trung:", "options": {"A": "Tập trung tạo ra lợi thế cho các sản phẩm của bản thân", "B": "Tập trung đẩy mạnh truyền thông để tạo ra lợi thế cạnh tranh trên các phương tiện khác nhau", "C": "Chọn một sản phẩm tốt nhất và tập trung quảng cáo khuyến mãi để cạnh tranh với đối thủ", "D": "Loại bỏ các sản phẩm không phù hợp, tập trung vào lợi thế tạo ra sản phẩm khác biệt so với đối thủ"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Chiến lược trọng tâm hóa (Focus Strategy) hay chọn lọc tập trung yêu cầu doanh nghiệp phải dồn toàn bộ nguồn lực vào một ngách thị trường hoặc một nhóm sản phẩm đặc thù. Điều này đòi hỏi họ phải kiên quyết loại bỏ các phân khúc dàn trải, không phù hợp để tập trung phát triển sự khác biệt vượt trội, phục vụ mục tiêu kinh doanh chuyên biệt so với đối thủ."}, {"level": "1", "content": "Điều nào không phải là đặc điểm của phương pháp đàm phán nguyên tắc?", "options": {"A": "Ôn hòa với người, cứng rắn với công việc", "B": "Sự tín nhiệm không liên quan đến đàm phán", "C": "Tìm ra phương án đối tác có thể chấp thuận", "D": "Cả 2 bên cùng có lợi"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đàm phán nguyên tắc (Principled Negotiation) xoay quanh các yếu tố: Tách con người ra khỏi vấn đề (ôn hòa với người, cứng rắn với công việc), tập trung vào lợi ích (đôi bên cùng có lợi), và sử dụng tiêu chuẩn khách quan. Việc chỉ \"tìm ra phương án đối tác có thể chấp thuận\" phản ánh bản chất của đàm phán kiểu Mềm (Soft Negotiation) - nơi người đàm phán dễ dàng nhượng bộ lập trường chỉ để duy trì mối quan hệ và đạt được thỏa thuận."}, {"level": "1", "content": "Giai đoạn chuẩn bị cho cuộc đàm phán gồm", "options": {"A": "Tìm hiểu đối tác; Tổ chức đội ngũ đàm phán thương lượng; Lập mục tiêu-sách lược- kế hoạch đàm phán thương lượng", "B": "Tìm hiểu bản thân; Tổ chức đội ngũ đàm phán thương lượng; Lập mục tiêu-sách lược-kế hoạch đàm phán thương lượng", "C": "Đàm phán-thương lượng thử", "D": "Tìm hiểu bản thân; Tổ chức đội ngũ đàm phán thương lượng"}, "answer": "C,D", "explanation": "<b>Giải thích học thuật:</b> Trong thực tiễn thương lượng kinh doanh bất động sản, sự chuẩn bị chu đáo mang tính quyết định. Giai đoạn này bao gồm việc nhìn nhận thấu đáo năng lực, giới hạn của bản thân (BATNA) cùng việc tổ chức đội ngũ chuyên môn (D); đồng thời, tiến hành các buổi đàm phán thử (C) giúp lường trước các phản kháng của đối tác và hoàn thiện kế hoạch tác chiến."}, {"level": "1", "content": "Một đàm phán được coi là thành công phải đảm bảo nguyên tắc?", "options": {"A": "Một trong hai bên đạt được mục đích", "B": "Hòa bình, hữu nghị", "C": "Đôi bên cùng có lợi", "D": "Không xảy ra xung đột"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Trong tư duy kinh doanh và giao dịch bất động sản hiện đại, mục tiêu tối thượng của đàm phán là đạt được thỏa thuận Win - Win (Thắng - Thắng). Một kết quả đàm phán chỉ được coi là thành công bền vững khi nó dung hòa được lợi ích của các bên, mang lại giá trị thực sự cho cả bên bán và bên mua."}, {"level": "1", "content": "Khi kinh doanh dịch vụ tư vấn đầu tư kinh doanh Bất động sản, cần lưu ý vấn đề nào:", "options": {"A": "Tỉ suất lợi nhuận trên vốn đầu tư", "B": "Tính thanh khoản của vốn đầu tư", "C": "Lợi ích trên chi phí", "D": "Tất cả đều đúng"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Mặc dù tính thanh khoản và chi phí là những yếu tố quan trọng, nhưng trong lĩnh vực \"tư vấn đầu tư\", mục tiêu cao nhất của nhà đầu tư luôn là khả năng sinh lời của đồng vốn. Do đó, \"Tỉ suất lợi nhuận trên vốn đầu tư\" (ROI) là chỉ số cốt lõi và bắt buộc phải được đặt lên hàng đầu để đánh giá tính khả thi và sức hấp dẫn của dự án bất động sản."}, {"level": "1", "content": "Bên cho thuê nhà, công trình xây dựng có được bảo lưu quyền sở hữu nhà, công trình xây dựng khi bên thuê mua chưa thanh toán đủ tiền thuê mua không?", "options": {"A": "Được", "B": "Không được"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Dưới góc độ pháp lý về Hợp đồng thuê mua bất động sản, bản chất của giao dịch này là sự chuyển giao quyền sở hữu có điều kiện. Quyền sở hữu tài sản chỉ chính thức được chuyển sang bên thuê mua khi bên này đã hoàn tất đầy đủ nghĩa vụ thanh toán theo hợp đồng. Trong suốt thời gian thanh toán chưa đủ, bên cho thuê hoàn toàn có quyền bảo lưu quyền sở hữu của mình đối với tài sản."}, {"level": "1", "content": "Người môi giới cần", "options": {"A": "Trao đổi tìm hiểu tâm lý và nhu cầu của khách hàng", "B": "Phân tích ưu nhược điểm của từng dự án và sản phẩm của dự án để sẵn sàng tư vấn cho khách hàng", "C": "Đề xuất chọn căn hộ/sản phẩm dự án phù hợp nhất với nhu cầu khách hàng", "D": "Tất cả đều đúng"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Một quy trình môi giới bất động sản chuyên nghiệp yêu cầu nhân viên phải thực hiện chuỗi hành động toàn diện: Lắng nghe để thấu hiểu tâm lý và tài chính của khách (A); sử dụng kiến thức chuyên môn để phân tích đa chiều về dự án (B); và từ đó đóng vai trò như một cố vấn, đưa ra các giải pháp/sản phẩm phù hợp nhất để giải quyết bài toán của khách hàng (C)."}, {"level": "1", "content": "Nhận xét nào sau đây là sai?", "options": {"A": "Sàn giao dịch bất động sản được phép thực hiện các hoạt động tư vấn bđs", "B": "Sàn giao dịch bất động sản không được phép thực hiện cung cấp các dịch vụ bảo đảm duy trì hoạt động bình thường của bất động sản", "C": "Sàn giao dịch bất động sản được phép thực hiện hoạt động quảng cáo bất động sản", "D": "Sàn giao dịch bất động sản được phép cung cấp các dịch vụ bảo trì, sửa chữa bất động sản"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 56 Luật Kinh doanh Bất động sản 2023, hoạt động của sàn giao dịch tập trung vào các dịch vụ trung gian như: môi giới, tư vấn, định giá, quảng cáo, hỗ trợ hợp đồng và thanh toán. Việc bảo trì, sửa chữa bất động sản thuộc về chức năng của các nhà thầu thi công xây dựng hoặc các đơn vị quản lý vận hành kỹ thuật tòa nhà, không nằm trong nội dung hoạt động của sàn giao dịch."}, {"level": "1", "content": "Giai đoạn tiếp xúc trong cuộc đàm phán gồm (chọn 2 đáp án đúng)", "options": {"A": "Tạo không khí tiếp xúc", "B": "Tìm hiểu đối tác; Tổ chức đội ngũ đàm phán thương lượng; Lập mục tiêu-sách lược- kế hoạch đàm phán thương lượng", "C": "Thăm dò đối tác; Sửa đổi-điều chỉnh kế hoạch đàm phán", "D": "(a) và Đưa ra yêu cầu chính xác; Điều chỉnh yêu cầu; Phát huy tối đa quyền lực của ta"}, "answer": "A,C", "explanation": "<b>Giải thích học thuật:</b> Giai đoạn tiếp xúc (khởi đầu cuộc đàm phán) đóng vai trò thiết lập nền tảng tâm lý. Các bên sẽ tập trung vào việc tạo lập một không khí cởi mở, thân thiện để phá vỡ sự phòng thủ (A). Đồng thời, thông qua giao tiếp ban đầu, các bên thăm dò thái độ, quan điểm của đối tác để kịp thời sửa đổi và điều chỉnh kế hoạch đàm phán thực tế (C) thay vì bám cứng vào lý thuyết chuẩn bị."}, {"level": "1", "content": "Bên thuê nhà yêu cầu bên cho thuê phải cải tạo, nâng cấp nhà cho thuê bất cứ khi nào bên thuê nhà yêu cầu là...", "options": {"A": "Đúng", "B": "Sai"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo quy định của pháp luật dân sự và Luật Nhà ở, bên cho thuê có nghĩa vụ bảo đảm tài sản cho thuê luôn trong tình trạng an toàn, hoạt động bình thường, và phải sửa chữa những hư hỏng do hao mòn tự nhiên. Tuy nhiên, việc \"cải tạo, nâng cấp\" làm thay đổi hiện trạng tài sản không phải là nghĩa vụ bắt buộc, mà phải dựa trên sự đồng thuận của chủ nhà, và thường do bên thuê tự chịu chi phí nếu muốn thực hiện."}, {"level": "1", "content": "Các hoạt động quảng bá nên được sử dụng như thế nào cho hiệu quả trong kinh doanh bất động sản:", "options": {"A": "Chi phí càng thấp càng tốt", "B": "Cung cấp càng nhiều thông tin để hấp dẫn càng nhiều khách hàng càng tốt", "C": "Xác định rõ mục tiêu và thông điệp cần truyền tải", "D": "Đa kênh, đa phương tiện, đa lĩnh vực"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Trong môi trường kinh doanh bất động sản với sự nhiễu loạn thông tin cao, việc quảng bá dàn trải (đa kênh vô định) hoặc tham lam nhồi nhét quá nhiều thông tin sẽ làm mất đi trọng tâm và lãng phí ngân sách. Hiệu quả thực sự chỉ đạt được khi doanh nghiệp xác định chính xác mục tiêu (Marketing Objective) và đóng gói được một thông điệp (Key Message) đánh đúng tâm lý, giải quyết đúng nhu cầu của khách hàng mục tiêu."}, {"level": "1", "content": "Bản chất của hoạt động môi giới là (chọn 2 đáp án đúng)", "options": {"A": "Trên cơ sở nguồn thông tin được chọn lọc và có chất lượng về sản phẩm BĐS nhằm cung ứng dịch vụ kết nối giữa người bán và người mua", "B": "Tư vấn đưa ra giải pháp tối ưu cho khách hàng để giải quyết và đáp ứng nhu cầu của khách hàng về sản phẩm BĐS", "C": "Tư vấn thuyết phục khách hàng sử dụng giải pháp hay dịch vụ của người môi giới hoặc chủ đầu tư đưa ra", "D": "Thu lợi dựa trên gia tăng doanh số hoạt động bán hàng BĐS"}, "answer": "A,B", "explanation": "<b>Giải thích học thuật:</b> Nghề môi giới bất động sản chuyên nghiệp có bản chất là sự dịch vụ hóa sự kết nối thị trường. Người môi giới phải dựa trên các thông tin sản phẩm và pháp lý đã được chọn lọc, kiểm chứng để làm cầu nối minh bạch giữa các bên (A). Sâu xa hơn, môi giới hoạt động như một nhà cố vấn, đưa ra các phương án/sản phẩm tối ưu nhất nhằm giải quyết đúng đắn nhu cầu đầu tư hoặc an cư của khách hàng (B)."}, {"level": "1", "content": "Một người môi giới chuyên nghiệp trên sàn giao dịch bđs cần có các đức tính:", "options": {"A": "Tính kiên nhẫn, chân thành với khách hàng, biết lắng nghe kể cả những việc không liên quan trực tiếp đến giao dịch và (c)", "B": "Luôn có niềm tin rằng khách hàng  biết tự bảo vệ mình và pháp luật bảo vệ họ và (c)", "C": "Tinh thần trách nhiệm, có khả năng soạn thảo hợp đồng", "D": "Biết cách gây niềm hứng khởi cho khách hàng và (c)"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Nghề môi giới đòi hỏi sự tổng hòa giữa thái độ phục vụ và năng lực chuyên môn (mô hình ASK). Người môi giới phải có các kỹ năng mềm xuất sắc như tính kiên nhẫn, sự chân thành, biết lắng nghe để xây dựng lòng tin tuyệt đối với khách hàng (A); đồng thời phải sở hữu nền tảng chuyên môn vững vàng, tinh thần trách nhiệm cao và khả năng soạn thảo/kiểm soát hợp đồng pháp lý chặt chẽ để bảo vệ quyền lợi cho các bên (C)."}, {"level": "1", "content": "Hợp đồng nào sau đây không phải là hợp đồng kinh doanh BĐS?", "options": {"A": "Hợp đồng mua bán nhà, công trình xây dựng", "B": "Hợp đồng thuê mua nhà, công trình xây dựng", "C": "Hợp đồng quản lý BĐS", "D": "Hợp đồng chuyển nhượng, cho thuê, cho thuê lại quyền sử dụng đất"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo quy định của Luật Kinh doanh Bất động sản, kinh doanh bất động sản là việc đầu tư vốn để thực hiện hoạt động xây dựng, mua, nhận chuyển nhượng để bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản. \"Quản lý bất động sản\" là một loại hình kinh doanh *dịch vụ* bất động sản, không phải là hợp đồng kinh doanh bất động sản (vốn mang bản chất chuyển giao quyền sở hữu/sử dụng tài sản)."}, {"level": "1", "content": "Trong giai đoạn chuẩn bị đàm phán xúc tiến ký kết hợp đồng, cần xác định nhu cầu, mong muốn của khách hàng và sơ bộ định dạng đối tác. Theo đó, có thể tạm chia khách hàng \"sẵn sàng đánh đổi chi phí để lấy chất lượng mà họ đã biết rõ, họ ngại rủi ro có thể xảy ra nếu với những đối tác mới\" vào loại:", "options": {"A": "Khách hàng trọng giá cả", "B": "Khách hàng trọng giá trị", "C": "Khách hàng trung thành", "D": "Khách hàng trọng tiện lợi"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Việc khách hàng sẵn sàng đánh đổi chi phí (chấp nhận mức giá cao hơn) để đổi lấy chất lượng quen thuộc và tâm lý né tránh rủi ro với các nhà cung cấp/đối tác mới là đặc trưng cốt lõi của \"Khách hàng trung thành\" (Loyal Customers). Họ ưu tiên sự an toàn, sự tin cậy và giá trị vô hình từ thương hiệu mà họ đã có trải nghiệm tích cực trước đó."}, {"level": "1", "content": "Khi đàm phán về giá, chủ bán khư khư không giảm giá bán, dù chỉ 1 xu, môi giới nên áp dụng chiến lược đàm phán nào?", "options": {"A": "Thua-thua", "B": "Thắng-thua", "C": "Thua-thắng", "D": "Thắng-thắng"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khi một bên (chủ bán) giữ lập trường cực kỳ cứng rắn, không chấp nhận bất kỳ sự nhượng bộ nào, hệ tư tưởng đàm phán đang chuyển sang trạng thái ép buộc. Để đối phó hoặc phân loại tình huống này, chiến lược được xác định mang tính \"Thắng - Thua\" (Win - Lose) theo kiểu \"cứng\", trong đó một bên cố gắng giành toàn bộ lợi ích cốt lõi và buộc bên kia (hoặc người mua) phải chấp nhận điều kiện bất lợi nếu muốn chốt giao dịch."}, {"level": "1", "content": "Bước đầu tiên trong quy trình mua nhà đất mà nhân viên kinh doanh bđs cần xác định với khách hàng là gì?", "options": {"A": "hỏi về tài chính của họ", "B": "hỏi về sở thích của họ", "C": "hỏi về kinh nghiệm sở hữu bđs trước đây của họ", "D": "hỏi về gia đình họ"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Trong quy trình tư vấn và sàng lọc nhu cầu bất động sản, việc xác định năng lực tài chính là bước mang tính nền tảng. Nguồn lực tài chính quyết định trực tiếp đến phân khúc, diện tích, vị trí và các phương án hỗ trợ tín dụng, giúp người môi giới tiết kiệm thời gian, loại bỏ các lựa chọn ảo tưởng và giới thiệu đúng sản phẩm khả thi nhất cho khách hàng."}, {"level": "1", "content": "Nguyên tắc quan trọng trong tư vấn cho khách hàng là:", "options": {"A": "Khách hàng không nghe là do họ không lịch sự", "B": "Người môi giới “nói” chứ không “đọc”", "C": "Quan tâm phản ứng của khách hàng khi đang tư vấn và (b)", "D": "Cứ nói hết nội dung đã chuẩn bị và (b)"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Tư vấn bán hàng là quá trình tương tác tâm lý hai chiều. Người môi giới phải trình bày một cách tự nhiên như một cuộc đối thoại (\"nói\" chứ không \"đọc\" kịch bản máy móc) và phải liên tục quan sát phản ứng (thái độ, ngôn ngữ cơ thể) của khách hàng để đánh giá mức độ tiếp nhận, từ đó linh hoạt điều chỉnh nội dung nhằm gia tăng tính thuyết phục."}, {"level": "1", "content": "Marketing bất động sản mang nội dung nào", "options": {"A": "Phương thức tiếp thị, trưng bày bất động sản", "B": "Các chiến lược quảng cáo bất động sản", "C": "Xúc tiến bán hàng", "D": "Các nội dung trên"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Marketing bất động sản là một hệ thống phối hợp toàn diện (Marketing - mix). Nó bao trùm mọi điểm chạm từ khâu trưng bày thực tế (nhà mẫu, văn phòng bán hàng), các chiến lược quảng cáo truyền thông (thay đổi nhận thức), cho đến các hoạt động xúc tiến bán hàng trực tiếp (khuyến mãi, sự kiện) nhằm thúc đẩy tiêu thụ sản phẩm."}, {"level": "1", "content": "Các vấn đề cần xem xét khi lập kế hoạch hoạt động cho văn phòng môi giới", "options": {"A": "Vạch ra mục tiêu và kế hoạch kinh doanh; Tổ chức thực hiện công việc; Đánh giá và động viên nhân viên văn phòng", "B": "Cần làm gì để đạt được mức bán theo yêu cầu; Kế hoạch ngân sách hoạt động cho văn phòng; Số lượng thương vụ bao nhiêu để đạt được mức doanh lợi; Xem chương trình quảng cáo như thế nào", "C": "Quản trị tài chính và (a)", "D": "Quản trị tài chính và (b)"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lập kế hoạch hoạt động (Operational Planning) ở cấp độ văn phòng môi giới đòi hỏi sự chi tiết hóa các chiến lược thành các hành động đo lường được. Quản lý văn phòng cần vạch rõ hành động cụ thể để đạt chỉ tiêu doanh số, lập ngân sách thu chi, xác định KPI thương vụ hòa vốn/sinh lời, và lên kế hoạch thực thi các chương trình quảng cáo hỗ trợ đội ngũ sales."}, {"level": "1", "content": "Bản chất của môi giới bất động sản là gì?", "options": {"A": "Mua bán nhà đất và thu hoa hồng", "B": "Cung cấp cho khách hàng những sản phẩm và giải pháp mà mình đang có", "C": "Cung cấp cho khách hàng giải pháp tối ưu nhằm thỏa mãn nhu cầu của khách hàng trên cơ sở thông tin chọn lọc và dịch vụ khách hàng tốt nhất", "D": "Cung cấp cho khách hàng sản phẩm bđs mà chủ đầu tư yêu cầu"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Môi giới bất động sản chuyên nghiệp không chỉ là hành vi \"mua đi bán lại\" đơn thuần. Bản chất của nó là một ngành dịch vụ chuyên sâu, trong đó người môi giới đóng vai trò như một chuyên gia cố vấn, dựa trên các thông tin đã được chọn lọc và kiểm chứng để cung cấp những giải pháp tối ưu nhất nhằm giải quyết đúng đắn nhu cầu và lợi ích của khách hàng."}, {"level": "1", "content": "Thông thường trong đàm phán kinh doanh bđs, chất lượng của câu trả lời thường tỷ lệ thuận với thời gian cân nhắc vấn đề trả lời. Do vậy, bạn cần", "options": {"A": "xác định phạm vi vấn đề cần trả lời", "B": "không nên trả lời quá chi tiết câu hỏi của đối tác", "C": "không nên trả lời quá dễ dàng", "D": "cân nhắc kĩ vấn đề trước khi trả lời"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Trong nghệ thuật đàm phán và giao tiếp thương mại, việc tạm dừng để cân nhắc kỹ vấn đề (Pause & Think) trước khi trả lời mang lại hai lợi ích lớn: thứ nhất, giúp bộ não tổng hợp thông tin, số liệu để đưa ra câu trả lời sắc bén, chính xác về mặt pháp lý; thứ hai, thể hiện phong thái cẩn trọng, chuyên nghiệp, qua đó nâng cao giá trị và sức nặng của lời nói."}, {"level": "1", "content": "Khi khai thác khách hàng bằng phương pháp gọi điện thoại, môi giới viên cần phải (chọn 2 đáp án đúng)", "options": {"A": "Nhanh chóng xác lập thương vụ", "B": "Tạo ấn tượng đặc biệt nhằm đi đối thương lượng, chốt hàng", "C": "Gây chú ý, tạo ấn tượng tốt", "D": "Chuẩn bị tâm lý thoải mái"}, "answer": "C,D", "explanation": "<b>Giải thích học thuật:</b> Phương pháp Telesales (gọi điện thoại lạnh) thường vấp phải rào cản tâm lý phòng vệ rất lớn từ đầu dây bên kia. Do đó, không thể vội vàng xác lập thương vụ ngay, mà môi giới cần ưu tiên sự chuẩn bị tâm lý tự tin, thoải mái (D), đồng thời sử dụng kịch bản khéo léo trong 10 giây đầu tiên để gây chú ý và tạo ra một ấn tượng ban đầu tốt đẹp (C) nhằm duy trì cuộc gọi."}, {"level": "1", "content": "Chủ sở hữu chung cư thường có quyền gì đối với đất đai dùng để tạo lập nên tòa nhà chung cư đó?", "options": {"A": "Quyền sở hữu đất", "B": "Quyền sử dụng riêng", "C": "Quyền sử dụng chung", "D": "Không có quyền gì"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo quy định của Luật Đất đai và Luật Nhà ở hiện hành, đối với loại hình nhà chung cư, phần diện tích đất xây dựng khối đế và diện tích khuôn viên dự án thuộc quyền sử dụng chung của tất cả các chủ sở hữu căn hộ. Pháp luật không công nhận quyền sở hữu đất đai riêng biệt (vốn thuộc sở hữu toàn dân) hay quyền sử dụng riêng rẽ cho từng cá nhân đối với phần diện tích này."}, {"level": "1", "content": "Khi gọi khai thác khách hàng bán qua điện thoại, khi mới bắt đầu câu chuyện với khách hàng, người môi giới nên: (chọn 2 đáp án đúng)", "options": {"A": "Hỏi chi tiết về thông tin bất động sản", "B": "Hỏi mục đích bán của khách hàng", "C": "Không giới thiệu ngay với khách hàng mình bên công ty BĐS", "D": "Hỏi giá bán và tiến hành trả giá"}, "answer": "A,C", "explanation": "<b>Giải thích học thuật:</b> Khi gọi điện cho chủ nhà đang đăng bán bất động sản, việc xưng danh môi giới ngay từ đầu thường khiến họ cúp máy vì tâm lý e ngại mất phí hoa hồng hoặc sợ bị làm phiền. Chiến thuật tiếp cận khôn ngoan là ban đầu không giới thiệu mình từ công ty dịch vụ (C), mà đóng vai trò như một bên đang quan tâm để hỏi chi tiết về thông tin tài sản (A), nhằm thiết lập cuộc hội thoại và khai thác dữ liệu trước khi đề xuất hợp tác."}, {"level": "1", "content": "Giá trị của BĐS bao gồm:", "options": {"A": "Giá trị vô hình và hữu hình", "B": "Giá trị thực và giá trị ảo", "C": "Giá trị bằng tiền và hiện vật", "D": "Giá trị thương hiệu và giá trị niềm tin"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Trong lý thuyết định giá và đầu tư, bất động sản là một tài sản phức hợp mang cấu trúc giá trị kép. Nó bao gồm phần Giá trị hữu hình (diện tích đất, vật liệu xây dựng, hạ tầng, kiến trúc) và phần Giá trị vô hình (quyền sử dụng, giá trị vị trí, tiềm năng thương mại, phong thủy, hay uy tín của chủ đầu tư)."}, {"level": "1", "content": "Trường hợp chủ đầu tư đã thế chấp nhà ở hình thành trong tương lai tại ngân hàng, trước khi ký hợp đồng mua bán, thuê mua nhà ở đó với khách hàng, phải đáp ứng điều kiện nào sau đây?", "options": {"A": "Phải giải chấp nhà ở trước khi ký hợp đồng huy động vốn, trừ trường hợp bên mua và ngân hàng đồng ý", "B": "Có văn bản thông báo nhà ở đủ điều kiện được bán của Sở Xây Dựng", "C": "Miễn là khách hàng đồng ý mua, không cần sự đồng ý của ngân hàng", "D": "Cả A và B."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Để đưa nhà ở hình thành trong tương lai đang bị thế chấp vào kinh doanh hợp pháp, chủ đầu tư bắt buộc phải thực hiện giải chấp để đảm bảo an toàn cho người mua (trừ phi có sự đồng thuận 3 bên: CĐT, ngân hàng, người mua) (A). Đồng thời, mọi dự án mở bán đều phải có văn bản thông báo đủ điều kiện bán/huy động vốn từ cơ quan quản lý nhà nước cấp tỉnh (Sở Xây dựng) (B)."}, {"level": "1", "content": "Bên cho thuê nhà, công trình xây dựng phải đảm bảo cho bên thuê sử dụng ổn định nhà, công trình xây dựng theo thời hạn thuê trong hợp đồng là đúng hay sai?", "options": {"A": "Đúng", "B": "Sai"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Căn cứ theo Luật Kinh doanh Bất động sản và Bộ luật Dân sự, nghĩa vụ cốt lõi của bên cho thuê tài sản là phải giao tài sản đúng tình trạng cam kết và có trách nhiệm bảo đảm quyền sử dụng tài sản một cách ổn định, không bị tranh chấp hoặc can thiệp trái phép cho bên thuê trong suốt thời hạn hợp đồng đã ký kết."}, {"level": "1", "content": "Các thông tin cần nắm khi học dự án mới trước khi triển khai bán cho chủ đầu tư là gì?", "options": {"A": "Thông tin về chủ đầu tư.", "B": "Thông tin về pháp lý dự án.", "C": "Thông tin về chính sách bảo hành, nội thất và tiến độ thi công.", "D": "Tất cả các điều trên"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Trong nghiệp vụ \"Project Training\" (Đào tạo dự án) trước khi ra quân phân phối, người môi giới bắt buộc phải thẩm thấu bức tranh toàn cảnh để có đủ cơ sở tư vấn. Quá trình này bao gồm việc nắm rõ năng lực và uy tín của Chủ đầu tư; tính minh bạch của hồ sơ pháp lý; và toàn bộ các yếu tố kỹ thuật, thương mại như tiến độ, danh mục bàn giao, chính sách bán hàng."}, {"level": "1", "content": "Chăm sóc khách hàng trong hoạt động của sàn bđs là gì?", "options": {"A": "Kế hoạch công việc nhằm thỏa mãn khách hàng tốt nhất", "B": "Bám sát khách hàng, tối đa các lần giao dịch với khách hàng", "C": "Quan tâm đến đời sống cá nhân, tình cảm của khách hàng", "D": "Giàu cùng với khách hàng, khách hàng \"ăn cơm\" thì ta “ăn cháo”"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Hoạt động chăm sóc khách hàng (Customer Care) tại sàn giao dịch không phải là hành động tự phát, mà là một chuỗi các kế hoạch công việc, quy trình dịch vụ có hệ thống. Các kế hoạch này được thiết lập nhằm cung cấp sự hỗ trợ chuyên nghiệp, qua đó đáp ứng và thỏa mãn tốt nhất kỳ vọng của khách hàng trong suốt vòng đời giao dịch."}, {"level": "1", "content": "Nếu một ngôi nhà đã mất giá 30% kể từ khi chủ nhà mua nó và hiện tại nó có giá trị 4.000.000 VND, vậy chủ nhà mua nó với giá bao nhiêu?", "options": {"A": "5.714.285 VND", "B": "4.800.000 VND", "C": "4.680.000 VND", "D": "4.300.000 VND"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Bài toán tính giá trị gốc thông qua tỷ lệ khấu hao. Gọi giá mua ban đầu là $X$. Do ngôi nhà mất giá 30%, giá trị hiện tại tương đương 70% giá trị ban đầu. Ta có phương trình: $X \\times 70\\% = 4.000.000 \\text{ VND}$. Suy ra $X = \\frac{4.000.000}{0,7} \\approx 5.714.285 \\text{ VND}$."}, {"level": "1", "content": "Đặc điểm nào không thuộc lập trường đàm phán theo kiểu “cứng”", "options": {"A": "Tránh xung đột", "B": "Coi đối tác như bạn bè", "C": "Dễ dàng nhượng bộ", "D": "Ép đối phương phải nhượng bộ"}, "answer": "A", "explanation": " *(Lưu ý: Mặc dù các đáp án B và C cũng không thuộc đàm phán kiểu cứng, nhưng trong hệ thống câu trắc nghiệm này, A được xác định là đáp án trọng tâm loại trừ).*<br><br><b>Giải thích học thuật:</b> Đàm phán kiểu cứng (Hard Negotiation) là phong cách mang tính cạnh tranh, coi đối tác như đối thủ, bám chặt lập trường và sẵn sàng duy trì căng thẳng để ép đối phương phải nhượng bộ (D). Do vậy, đặc điểm \"Tránh xung đột\" đi ngược lại với tư duy này và là đặc trưng nổi bật của phong cách đàm phán kiểu mềm (Soft Negotiation)."}, {"level": "1", "content": "Hoạt động quản lý sàn giao dịch bđs được thực hiện thông qua 4 chức năng", "options": {"A": "Hoạch định, tổ chức, điều khiển, kiểm tra", "B": "Hoạch định, nhân sự, chỉ huy, phối hợp", "C": "Hoạch định, tổ chức, phối hợp, báo cáo", "D": "Kế hoạch, chỉ đạo, tổ chức, kiểm tra"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Trong lý thuyết Quản trị học (Management) ứng dụng vào việc vận hành và quản lý sàn giao dịch, một chu trình quản trị tiêu chuẩn luôn được vận hành qua 4 chức năng căn bản: Hoạch định (thiết lập mục tiêu, chiến lược), Tổ chức (phân bổ nguồn lực, nhân sự), Điều khiển (lãnh đạo, tạo động lực) và Kiểm tra (đo lường, giám sát và điều chỉnh rủi ro)."}, {"level": "1", "content": "Điều quan trọng đối với một môi giới BĐS khi chuẩn bị môi giới dự án căn hộ (chọn 2 đáp án đúng):", "options": {"A": "Tìm hiểu về thị trường BĐS khu vực và hiểu về khu vực địa lý nơi dự án toạ lạc", "B": "Am hiểu về dự án chuẩn bị môi giới và đối thủ cạnh tranh", "C": "Quan tâm tới phản ứng khách hàng", "D": "Lắng nghe khách hàng nói"}, "answer": "A,B", "explanation": "<b>Giải thích học thuật:</b> Giai đoạn chuẩn bị (hay còn gọi là Project Training) đòi hỏi người môi giới phải trang bị kiến thức toàn diện trước khi tiếp xúc khách hàng. Môi giới cần am hiểu yếu tố vĩ mô như quy hoạch, hạ tầng, thị trường khu vực (A) để đánh giá tiềm năng vị trí; đồng thời phải nắm vững yếu tố vi mô về sản phẩm của mình và phân tích được điểm mạnh/yếu so với các đối thủ cạnh tranh trực tiếp (B) nhằm xây dựng luận điểm tư vấn thuyết phục."}, {"level": "1", "content": "Trong sàn giao dịch bđs, mối quan hệ giữa các cấp bậc quản trị và các kỹ năng của nhà quản trị là.", "options": {"A": "Ở bậc quản trị càng cao kỹ năng kỹ thuật càng có tầm quan trọng", "B": "Ở bậc quản trị càng cao kỹ năng nhân sự càng có tầm quan trọng", "C": "Kỹ năng nhân sự có tầm quan trọng như nhau đối với các cấp bậc quản trị", "D": "Tất cả các phương án trên điều sai"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo lý thuyết quản trị học (Management Theory), nhà quản trị cần 3 kỹ năng cốt lõi: Kỹ năng tư duy, Kỹ năng nhân sự và Kỹ năng kỹ thuật. Trong khi kỹ năng kỹ thuật quan trọng nhất ở cấp cơ sở và kỹ năng tư duy quan trọng nhất ở cấp cao, thì Kỹ năng nhân sự (Human Skills) – khả năng thấu hiểu, động viên, giao tiếp và làm việc với con người – lại có tầm quan trọng tương đương nhau ở tất cả các cấp bậc quản trị."}, {"level": "1", "content": "Bên đơn phương chấm dứt thực hiện hợp đồng thuê nhà, công trình xây dựng thì phải báo cho bên kia biết trước bao lâu nếu không có sự thỏa thuận?", "options": {"A": "1 tháng", "B": "2 tháng", "C": "15 ngày", "D": "90 ngày"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Theo quy định của Bộ luật Dân sự và pháp luật Kinh doanh Bất động sản về hợp đồng thuê tài sản, để bảo đảm quyền lợi và thời gian xoay sở cho bên bị chấm dứt hợp đồng, trong trường hợp các bên không có thỏa thuận cụ thể về thời gian báo trước, bên muốn đơn phương chấm dứt hợp đồng phải thông báo cho bên kia biết trước ít nhất 01 tháng (30 ngày)."}, {"level": "1", "content": "Chức năng môi giới bất động sản bao gồm:", "options": {"A": "Cung cấp thông tin và tư vấn cho khách hàng về diễn biến tổng thể của thị trường bđs", "B": "Cung cấp thông tin các sản phẩm bđs giúp khách hàng thực hiện giao dịch", "C": "Cung cấp các dịch vụ tư vấn pháp lý, tài chính, giá bđs", "D": "Tất cả các mục trên"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Nghề môi giới bất động sản hiện đại bao hàm chức năng của một chuyên gia cố vấn toàn diện. Chức năng này trải rộng từ việc cung cấp bức tranh vĩ mô của thị trường (A), kết nối thông tin vi mô của sản phẩm để chốt giao dịch (B), cho đến việc tư vấn chuyên sâu các giải pháp tháo gỡ vướng mắc về pháp lý, phương án tài chính tín dụng và định giá sơ bộ tài sản (C)."}, {"level": "1", "content": "Một bất động sản có chi phí cao hơn thu nhập được mô tả là có", "options": {"A": "dòng tiền dương.", "B": "dòng tiền âm.", "C": "khấu hao âm.", "D": "khấu hao quá mức."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trong phân tích tài chính đầu tư bất động sản, \"dòng tiền\" (cash flow) là phần lợi nhuận thu về định kỳ sau khi lấy tổng doanh thu khai thác (ví dụ: tiền cho thuê) trừ đi tổng chi phí vận hành, bảo trì, thuế và lãi vay ngân hàng. Khi tổng chi phí vượt quá thu nhập được tạo ra, bất động sản đó được xác định là đang vận hành với \"dòng tiền âm\" (negative cash flow)."}, {"level": "1", "content": "Để môi giới thành công, môi giới viên cần khắc phục 3 bất đồng, đó là các yếu tố sau, ngoại trừ:", "options": {"A": "Bất đồng về sự tin tưởng (trust) - thiếu am hiểu về những động cơ thúc đẩy người mua/bán", "B": "Bất đồng về sự đối kháng (resistance) - không tỏ ý muốn nhượng bộ", "C": "Bất đồng trong giao tiếp (communication) - hiểu sai những thông điệp ẩn ý bên trong lời nói", "D": "Bất đồng trong mục tiêu của công việc (target) - hiểu sai mục đích mua bán bđs của nhau"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Kỹ năng xử lý từ chối và thuyết phục trong môi giới xác định 3 rào cản tâm lý cốt lõi cần phá vỡ: Bất đồng về sự tin tưởng, Bất đồng về sự đối kháng (sức ỳ tâm lý không muốn thay đổi) và Bất đồng trong giao tiếp (hiểu sai ý định). \"Bất đồng trong mục tiêu công việc\" không được xếp vào bộ ba rào cản tâm lý tiêu chuẩn này."}, {"level": "1", "content": "Để tránh sự phản ứng, chống đối của khách hàng khi người môi giới tiếp xúc với khách hàng, với tư cách hành nghề môi giới chuyên nghiệp, môi giới viên cần tiếp cận khách hàng với mục tiêu:", "options": {"A": "Vì tiền", "B": "Vì thách thức", "C": "Vì thích nghề môi giới bất động sản/vì phấn khích", "D": "Giúp khách hàng đạt mục tiêu tài chính của mình, thông qua đó đạt được các mục tiêu cá nhân"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Rào cản phòng vệ của khách hàng thường xuất phát từ suy nghĩ người môi giới chỉ tiếp cận vì mục đích \"hoa hồng\". Để hóa giải sự chống đối này, tư duy nghề nghiệp chuẩn mực yêu cầu môi giới phải đặt lợi ích của khách hàng lên trên hết: hoạt động với tư cách một người giải quyết vấn đề, giúp khách hàng tối ưu hóa mục tiêu tài chính và an cư. Phần thưởng tài chính cá nhân sẽ tự động đến như một hệ quả tất yếu sau khi giá trị được trao đi."}, {"level": "1", "content": "Căn hộ thuộc dự án A chưa có khách hàng đăng ký mua, khách hàng yêu cầu không thực hiện các bước đặt chỗ, đặt cọc, ký kết với các biên bản đặt chỗ, đặt cọc và thực hiện ký kết hợp đồng mua bán với chủ đầu tư:", "options": {"A": "Môi giới khẳng định với khách hàng là buộc phải làm theo các bước này", "B": "Môi giới hứa sẽ giải quyết theo yêu cầu của khách", "C": "Người môi giới hướng dẫn khách hàng thực hiện việc ký kết hợp đồng mua bán", "D": "Tất cả những ý trên"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Các quy trình nội bộ như \"đặt chỗ\", \"đặt cọc\" là thủ thuật kinh doanh giữ rổ hàng và cam kết, không mang tính bắt buộc tuyệt đối về mặt pháp lý nếu sản phẩm đang trống và dự án đã hoàn toàn đủ điều kiện ký Hợp đồng mua bán (HĐMB). Khi khách hàng có sẵn tài chính và muốn bỏ qua bước trung gian, môi giới cần linh hoạt xử lý, hướng dẫn khách tiến thẳng vào thủ tục ký HĐMB nhằm chốt giao dịch nhanh gọn và an toàn nhất."}, {"level": "1", "content": "Mục nào sau đây không thuộc phạm vi của Thương lượng?", "options": {"A": "Quá trình tìm kiếm và thỏa thuận về các điều khoản, điều kiện, hoặc giá cả của một giao dịch", "B": "Tìm kiếm giải pháp chung và thỏa thuận mà cả hai bên đều hài lòng", "C": "Tập trung vào tìm giải pháp chung và tạo điều kiện để đạt được sự hài lòng từ cả hai bên", "D": "Có thể coi đối tác là đối thủ trong quá trình"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Bản chất của thương lượng/đàm phán (Negotiation) hiện đại trong bất động sản là quá trình đối thoại mang tính hợp tác để tìm kiếm giải pháp chung (A, B, C). Việc \"coi đối tác là đối thủ\" phản ánh tư duy đàm phán kiểu cứng (Thắng - Thua) theo lối mòn tiêu cực, đi ngược lại triết lý đàm phán nguyên tắc hướng tới kết quả Win-Win."}, {"level": "1", "content": "Thị trường BĐS mang tính vùng, tính khu vực vì:", "options": {"A": "Thị trường  bds là thị trường đa phân khúc và (b)", "B": "Thị trường bđs không tập trung, trải rộng ở mọi vùng trên đất nước. Mỗi thị trường mang tính chất địa phương với quy mô và trình độ khác nhau do có sự phát triển không đồng đều giữa các vùng miền.", "C": "BĐS là một hàng hóa cố định và không thể di dời về mặt ví trí và chịu ảnh hưởng của yếu tố tập quán, thị hiếu, tâm lí  của từng vùng từng khu vực và (b)", "D": "Thị trường bds  nhạy cảm với biến động kinh tế chính trị và (b)"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đặc tính vật lý cốt lõi và khác biệt nhất của hàng hóa bất động sản là \"tính cố định, không thể di dời\". Chính vì sự trói buộc vào một không gian địa lý nhất định, giá trị, khả năng thanh khoản và xu hướng giao dịch của bất động sản bị ảnh hưởng trực tiếp bởi hệ thống cơ sở hạ tầng, văn hóa, tập quán và tâm lý tiêu dùng riêng biệt của địa phương đó, tạo nên tính chất phân mảnh vùng miền sâu sắc."}, {"level": "1", "content": "Marketing – mix là sự phối hợp 4P chủ yếu:", "options": {"A": "Sản phẩm, Phân phối, lợi nhuận, bao gói (Product, Place, Profit, Package)", "B": "Sản phẩm, giá cả, lợi nhuận, chương trình (Product, Place, Profit, Program)", "C": "Giá cả, sản phẩm, chiêu thị, Phân phối (Price, Product, Promotion, Place)", "D": "Con người, sản phẩm, giá cả, uy tín (People, Product, Price, Prestige)"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo lý thuyết Marketing kinh điển, Marketing - mix (Phối thức tiếp thị) truyền thống đối với thị trường hàng hóa được cấu thành bởi 4 trụ cột cơ bản: Product (Sản phẩm), Price (Giá cả), Place (Kênh phân phối), và Promotion (Chiêu thị/Xúc tiến thương mại)."}, {"level": "1", "content": "Hành vi nào sau đây không bị cấm trong hoạt động kinh doanh BĐS?", "options": {"A": "Huy động vốn của người mua BĐS khi hội đủ điều kiện", "B": "Không thực hiện đúng nghĩa vụ tài chính đối với Nhà nước", "C": "Không đăng ký kinh doanh theo quy định pháp luật", "D": "Cả A, B, C đều sai"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Luật Kinh doanh Bất động sản nghiêm cấm các hành vi gian lận như không đăng ký kinh doanh, trốn tránh nghĩa vụ tài chính/thuế đối với Nhà nước. Tuy nhiên, việc chủ đầu tư huy động vốn hợp pháp từ khách hàng thông qua phương thức ứng tiền trước (theo hợp đồng mua bán, thuê mua) khi dự án đã đáp ứng đầy đủ điều kiện pháp lý quy định là quyền lợi được Nhà nước cho phép và bảo vệ."}, {"level": "1", "content": "Mục tiêu cao nhất trong đàm phán", "options": {"A": "Là kiếm được lợi nhuận", "B": "Là đạt được trong điều kiện lý tưởng và (c)", "C": "Do khó khăn trong đàm phán nên khi cần có thể bỏ qua", "D": "Có thể đạt được trong điều kiện lý tưởng và (c)"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Mục tiêu cao nhất trong một phiên đàm phán là việc thiết lập được một thỏa thuận đạt mức tối đa hóa lợi ích trong \"điều kiện lý tưởng\" (kịch bản tốt nhất). Tuy nhiên, đàm phán mang tính thực tiễn và linh hoạt; nếu gặp phải các khó khăn vi phạm nguyên tắc cốt lõi hoặc xâm phạm lợi ích tối thiểu (ngưỡng hòa vốn), nhà đàm phán có quyền kích hoạt BATNA (phương án thay thế tốt nhất) và \"bỏ qua\" hoặc tạm dừng thương lượng."}, {"level": "1", "content": "Các chỉ tiêu nào cần đạt được trong quản lý kênh phân phối bán hàng?", "options": {"A": "Thỏa mãn nhu cầu của khách hàng", "B": "Doanh thu", "C": "Lợi nhuận", "D": "Cả a,b, c đều đúng"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Quản trị kênh phân phối bất động sản yêu cầu một bộ tiêu chí đo lường (KPI) toàn diện. Nó không chỉ tập trung vào các chỉ số sức khỏe tài chính định lượng như Doanh thu và Lợi nhuận gộp mang lại cho chủ đầu tư/sàn; mà còn bắt buộc đo lường tính định tính thông qua mức độ Thỏa mãn nhu cầu của khách hàng (chất lượng tư vấn, tốc độ xử lý khiếu nại) để đánh giá năng lực bền vững của kênh."}, {"level": "1", "content": "Theo anh/chị, nội dung nào không phải hoạt động của sàn giao dịch BĐS?", "options": {"A": "Giao dịch mua bán, chuyển nhượng, thuê, thuê mua Bất động sản.", "B": "Kiểm tra giấy tờ về bất động sản bảo đảm đủ điều kiện được giao dịch", "C": "Môi giới bất động sản", "D": "Đầu tư BĐS"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ theo Điều 56 Luật Kinh doanh Bất động sản 2023, sàn giao dịch là tổ chức cung cấp \"Dịch vụ\" trung gian như: môi giới, hỗ trợ giao dịch, tư vấn, kiểm tra pháp lý, niêm yết thông tin. \"Đầu tư BĐS\" là hành vi bỏ vốn phát triển và tạo lập tài sản thuộc chức năng của Chủ đầu tư (Developer), không phải là nội dung hoạt động của doanh nghiệp quản lý sàn giao dịch."}, {"level": "1", "content": "Chiến lược “kéo” áp dụng trong kinh doanh BĐS được hiểu như thế nào:", "options": {"A": "Tạo ra sự đồng thuận về cảm nhận sản phẩm", "B": "Tạo ra sự nhận biết về thương hiệu và sự hấp dẫn khách hàng bằng các sản phẩm khác biệt", "C": "Truyền tải thông tin do chủ đầu tư thực hiện nhằm gây ảnh hưởng tới thái độ, hành vi và nhận thức của người mua", "D": "Tìm cách đẩy sản phẩm đến các nhà phân phối và khách hàng bằng các chương trình khuyến mãi, tặng quà, chiết khấu hoa hồng"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trong chiến lược Marketing, Chiến lược \"Kéo\" (Pull Strategy) tập trung mạnh vào các nỗ lực quảng cáo, truyền thông đại chúng nhắm trực tiếp vào người tiêu dùng cuối. Mục đích là xây dựng nhận thức thương hiệu mạnh mẽ, tạo ra sức hấp dẫn từ sự khác biệt của dự án, từ đó kích thích nhu cầu để khách hàng tự động tìm kiếm, \"kéo\" nhu cầu mua hàng về phía hệ thống phân phối."}, {"level": "1", "content": "Người môi giới cần nắm rõ quy hoạch đầu tư xây dựng của một vùng thị trường để có phương án môi giới cụ thể. Quy hoạch đầu tư xây dựng được thể hiện thông qua:", "options": {"A": "Việc tổ chức không gian đô thị và điểm dân cư, hệ thống công trình hạ tầng kỹ thuật, hạ tầng xã hội", "B": "Đồ án quy hoạch xây dựng (sơ đồ, bản vẽ, mô hình, thuyết minh)", "C": "Các cơ sở để các hoạt động lập dự án đầu tư, xin giao đất, thuê đất...", "D": "Tổ chức sắp xếp không gian lãnh thổ trên cơ sở khai thác và sử dụng tài nguyên thiên nhiên"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Về mặt pháp lý và hồ sơ tài liệu chuyên ngành, mọi định hướng về tổ chức không gian, quy hoạch sử dụng đất và hạ tầng đều được vật chất hóa, cụ thể hóa thông qua \"Đồ án quy hoạch xây dựng\". Đồ án này là bộ tài liệu chính thức bao gồm các bản vẽ tỷ lệ (1/2000, 1/500), sơ đồ, mô hình không gian và hệ thống văn bản thuyết minh đi kèm."}, {"level": "1", "content": "Phân tích lợi nhuận trên tổng doanh thu là nhằm", "options": {"A": "Xem xét mức độ lợi nhuận so với khách hàng từng giai đoạn để từ đó đưa ra những biện pháp phù hợp", "B": "Đo lường quy mô của các giao dịch cho thấy hiệu quả của việc tìm kiếm các giao dịch có giá trị lớn", "C": "Đánh giá được năng suất lao động của các nhân viên giữa các thời kỳ khác nhau trong một năm hay cùng kỳ năm trước", "D": "Tất cả sai"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Tỷ suất lợi nhuận trên doanh thu (Profit Margin) là công cụ phân tích tài chính giúp nhà quản lý sàn giao dịch đánh giá hiệu quả sinh lời thực tế so với dòng tiền thu vào qua từng chiến dịch, từng phân khúc khách hàng hay giai đoạn thời gian. Sự sụt giảm của tỷ suất này phản ánh chi phí vận hành/marketing đang quá cao, đòi hỏi nhà quản trị phải thiết lập các biện pháp tinh gọn và điều chỉnh chiến lược phù hợp."}, {"level": "1", "content": "Khi đàm phán về giá, khách mua và chủ bán nhất quyết không tăng hay giảm giá mua-bán, dù chênh lệch giá mua bán chỉ khoảng 20tr đồng. Vụ giao dịch này có nguy cơ thất bại. Là môi giới trong trường hợp này, bạn nên áp dụng chiến thuật đàm phán nào?", "options": {"A": "Thua-thua. Xem xét \"cắt máu\" giảm bớt tiền hoa hồng.", "B": "Thắng-thua", "C": "Thua-thắng", "D": "Thắng-thắng"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Trong thực tiễn giao dịch khốc liệt, khi điểm thắt nút (chênh lệch rất nhỏ) gây bế tắc hoàn toàn, nếu để giao dịch đổ vỡ thì cả môi giới, người mua và người bán đều không đạt được mục tiêu (Thất bại toàn diện). Việc môi giới chấp nhận chịu thiệt một chút về mặt tài chính (\"cắt máu\" một phần hoa hồng 20 triệu) để lấp khoản chênh lệch là một hình thức chấp nhận \"Thua\" trong ngắn hạn (Lose) nhằm giải cứu giao dịch, thuộc chiến thuật chia sẻ tổn thất."}, {"level": "1", "content": "Một chính sách thanh toán tốt và hấp dẫn là chính sách đảm bảo (chọn 2 đáp án đúng):", "options": {"A": "Có nhiều phương thức thanh toán để lựa chọn", "B": "Phù hợp với khả năng thanh khoản cho nhiều đối tượng khách hàng", "C": "Được chia thành nhiều đợt theo đúng tiến độ xây dựng", "D": "Có sự hỗ trợ tốt của Ngân hàng bảo lãnh về hạn mức vay, thời hạn vay, lãi vay…"}, "answer": "A,B", "explanation": "<b>Giải thích học thuật:</b> Sức mạnh cạnh tranh của một chính sách thanh toán không chỉ nằm ở các yếu tố đơn lẻ (như chia đợt hay có ngân hàng), mà cốt lõi phải mang tính \"may đo\" linh hoạt. Chính sách đó phải cung cấp sự đa dạng (ví dụ: tiến độ chuẩn, thanh toán nhanh, vay ưu đãi lãi suất) (A) nhằm tương thích tối đa với cấu trúc dòng tiền, khẩu vị rủi ro và khả năng thanh khoản của nhiều tệp khách hàng mục tiêu khác nhau (B)."}, {"level": "1", "content": "Phong cách đàm phán cạnh tranh được áp dụng trong trường hợp nào?", "options": {"A": "Khi phát sinh tình huống đột xuất, không nằm trong dự kiến đàm phán của các bên.", "B": "Khi các bên hướng đến mục tiêu chung, lợi ích chung.", "C": "Khi chủ thể đàm phán không đạt được mục tiêu, lợi ích riêng d) Khi không có quyền hạn quyết định, thiếu thông tin về các nội dung đàm phán"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Trong lý thuyết đàm phán thương mại, phong cách cạnh tranh (cứng/áp đặt) mang tính đối kháng và bảo vệ lập trường quyết liệt. Phong cách này thường được kích hoạt trong các tình huống khẩn cấp, đột xuất cần phải ra quyết định dứt khoát nhanh chóng, hoặc khi các bên không có đủ thời gian để thỏa hiệp và không đặt nặng việc duy trì mối quan hệ lâu dài."}, {"level": "1", "content": "Giá trị BĐS buộc phải bán (bán trong điều kiện không bình thường) không phản ánh giá trị thị trường vì (2 lựa chọn):", "options": {"A": "Thời gian tiếp thị BĐS không phù hợp cho việc mua bán BĐS đó", "B": "Người bán phải bán BĐS một cách gượng ép", "C": "Người bán người mua tự quyết định giá bán", "D": "Giá tính theo giá thanh l? hoặc đền bù giải tỏa"}, "answer": "A,B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ theo Tiêu chuẩn Thẩm định giá Việt Nam, khái niệm \"Giá trị thị trường\" yêu cầu một giao dịch khách quan, tự nguyện và có thời gian tiếp thị hợp lý trên thị trường mở. Bất động sản buộc phải bán (ví dụ: phát mại, thanh lý nợ) vi phạm hai nguyên tắc cốt lõi này do người bán chịu áp lực tài chính phải bán gấp (gượng ép) và thời gian chào bán quá ngắn, dẫn đến mức giá thanh khoản thường bị ép xuống thấp hơn nhiều so với giá trị thực."}, {"level": "1", "content": "Trong môi giới nhà riêng lẻ, trước khi dẫn khách hàng đi xem nhà,người môi giới nên:", "options": {"A": "Nói ít ưu điểm hơn những gì mà căn nhà đó có và (c)", "B": "Ca ngợi thật nhiều về căn nhà đó để họ thích và (c)", "C": "Chỉ ra những hạn chế của căn nhà để khách hàng cân nhắc", "D": "Nêu ưu điểm một cách thực tế và (c)"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Đạo đức hành nghề môi giới và nghệ thuật quản trị kỳ vọng khách hàng đòi hỏi sự trung thực, khách quan. Việc trình bày các ưu điểm một cách thực tế, song song với việc thẳng thắn phân tích những hạn chế cố hữu của tài sản (kèm theo giải pháp khắc phục) giúp thiết lập lòng tin tuyệt đối. Phương pháp này ngăn chặn cảm giác bị lừa dối khi khách hàng khảo sát thực địa, đồng thời giảm thiểu rủi ro khiếu nại pháp lý về sau."}, {"level": "1", "content": "Chứng chỉ môi giới bất động sản đã được cấp trước ngày 01/011/2023:", "options": {"A": "Có giá trị pháp lý trong thời hạn 05 năm kể từ ngày 01/11/2023", "B": "Có giá trị pháp lý đến ngày ngày 01/1/2028", "C": "Không có giá trị pháp lý do đã có luật mới, người môi giới phải học lại và thi sát hạch", "D": "Cả a, b, c đều sai"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Nhằm bảo đảm tính liên tục của thị trường và bảo vệ quyền lợi hợp pháp của người hành nghề, các quy định chuyển tiếp của pháp luật luôn thiết lập một \"độ trễ\" nhất định. Các chứng chỉ môi giới đã được cấp trước thời điểm quy định mới có hiệu lực vẫn tiếp tục được Nhà nước công nhận giá trị pháp lý trong một chu kỳ thời hạn 05 năm (kể từ mốc chuyển tiếp), sau thời gian này người môi giới mới bắt buộc phải thi sát hạch để cấp đổi."}, {"level": "1", "content": "Marketing-mix là sự phối hợp 4 P chủ yếu:", "options": {"A": "Sản phẩm, Phân phối, Lợi nhuận, Bao gói (Product, Place, Profit, Packaging).", "B": "Sản phẩm, Giá cả, Lợi nhuận, Chương trình (Product, Place, Profit, Program).", "C": "Giá cả, Sản phẩm, Chiêu thị, Phân phối (Price, Product, Promotion, Place).", "D": "Con người, Sản phẩm, Giá cả, Uy tín (People, Product, Price, Prestige)."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Mô hình Marketing - Mix (Phối thức tiếp thị) cổ điển được thiết lập dựa trên sự đồng bộ của 4 biến số cốt lõi mà doanh nghiệp sử dụng để tác động đến thị trường mục tiêu. Cấu trúc này bao gồm: Product (Cấu trúc Sản phẩm), Price (Chiến lược Giá cả), Place (Kênh Phân phối) và Promotion (Hoạt động Chiêu thị/Truyền thông xúc tiến)."}, {"level": "1", "content": "Đặc điểm nào sau đây không thuộc lập trường đàm phán theo kiểu cứng", "options": {"A": "Ép đối phương phải nhượng bộ", "B": "Bám chặt lấy lập trường", "C": "Xem đối tác như bạn bè", "D": "A, b, c đều sai"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Bản chất của đàm phán kiểu cứng (Hard Negotiation) là sự đối kháng, coi đối tác như một \"đối thủ\" cần phải triệt tiêu lợi ích để giành phần thắng, từ đó sử dụng sức ép để ép buộc nhượng bộ. Đặc tính \"Xem đối tác như bạn bè\" hoàn toàn đi ngược lại tư duy này, bởi đây là triết lý đặc trưng của phong cách đàm phán kiểu mềm (Soft Negotiation), nơi ưu tiên duy trì sự hòa hợp."}, {"level": "1", "content": "Trường hợp bên mua nhà yêu cầu bên bán bồi thường thiệt hại do việc giao nhà không đúng thời hạn, chất lượng và các cam kết khác trong hợp đồng là đúng hay sai?", "options": {"A": "Đúng", "B": "Sai"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Căn cứ theo chế định về trách nhiệm dân sự do vi phạm nghĩa vụ hợp đồng (Bộ luật Dân sự và Luật Kinh doanh Bất động sản), bên bán có nghĩa vụ pháp lý phải bàn giao tài sản đúng đối tượng, đúng thời hạn và đạt chuẩn chất lượng như đã cam kết. Mọi hành vi vi phạm các cấu phần này đều phát sinh trách nhiệm bồi thường thiệt hại và chịu chế tài phạt vi phạm theo đúng quy định của hợp đồng."}, {"level": "1", "content": "Sàn giao dịch bất động sản phải có:", "options": {"A": "Vốn pháp định", "B": "Quy chế hoạt động của sàn giao dịch", "C": "Cả A, B đều đúng", "D": "Cả A, B đều sai"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Hệ thống pháp luật Kinh doanh Bất động sản hiện hành đã bãi bỏ rào cản về \"Vốn pháp định\" (trước đây là 20 tỷ đồng) đối với việc thành lập doanh nghiệp kinh doanh dịch vụ sàn giao dịch nhằm tạo sự thông thoáng. Tuy nhiên, điều kiện bắt buộc và tiên quyết để sàn được phép vận hành hợp pháp là doanh nghiệp phải ban hành bộ \"Quy chế hoạt động của sàn giao dịch\" để kiểm soát quy trình và trách nhiệm pháp lý."}, {"level": "1", "content": "Giá trị nhà được tính theo quy định của Bộ Xây Dựng dựa trên:", "options": {"A": "Phân loại nhà", "B": "Định mức xây dựng", "C": "Giá trị thực tế còn lại của căn nhà", "D": "Tất cả đúng"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Trong nghiệp vụ quản lý nhà nước về xây dựng và định giá tài sản (áp dụng trong tính lệ phí trước bạ, bồi thường giải phóng mặt bằng), cấu trúc tính toán giá trị một căn nhà được Bộ Xây dựng quy định dựa trên sự tổng hòa của 3 yếu tố: Phân loại/cấp công trình kiến trúc; suất vốn đầu tư/định mức đơn giá xây dựng mới do cơ quan thẩm quyền ban hành; và tỷ lệ chất lượng còn lại (khấu hao vật lý) của tài sản tại thời điểm đánh giá."}, {"level": "1", "content": "Trong quá trình marketing sản phẩm BĐS, Công ty kinh doanh BĐS có một số chương trình khuyến mãi. Mục tiêu chủ yếu của khuyến mãi là gì? (2 đáp án)", "options": {"A": "Tạo thiện cảm cho khách hàng", "B": "Thay đổi nhận thức của khách hàng", "C": "Tăng danh tiếng công ty", "D": "Đẩy mạnh tiêu thụ hàng hóa"}, "answer": "C,D", "explanation": "<b>Giải thích học thuật:</b> Khuyến mãi (Sales Promotion) là công cụ kích thích ngắn hạn trong chiến lược xúc tiến thương mại. Bằng việc cung cấp các lợi ích tài chính tức thì, mục tiêu cốt lõi của nó là phá vỡ sự chần chừ, thúc đẩy hành động chốt giao dịch nhanh chóng (Đẩy mạnh tiêu thụ). Đồng thời, thông qua các chiến dịch truyền thông rầm rộ đi kèm, doanh nghiệp tận dụng hiệu ứng đám đông để gia tăng nhận diện và uy tín thương hiệu trên thị trường."}, {"level": "1", "content": "Truyền thông marketing là gì?", "options": {"A": "Là một quá trình truyền tải thông tin do người mua thực hiền nhằm gây ảnh hưởng tới thái độ, hành vi và nhận thức của người bán", "B": "Là một quá trình truyền tải thông tin do nhà sản xuất thực hiện nhằm gây ảnh hưởng tới thái độ, hành vi và nhận thức của người mua", "C": "Là một quá trình truyền tải thông tin do người bán thực hiện nhằm gây ảnh hưởng tới thái độ, hành vi và nhận thức của người mua", "D": "Câu b,c đúng"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Dưới góc độ quản trị tiếp thị, truyền thông marketing (Marketing Communications) là một quá trình tương tác có chủ đích, trong đó doanh nghiệp (bao gồm cả nhà sản xuất/chủ đầu tư và người bán/đơn vị phân phối) mã hóa và truyền tải các thông điệp thông tin đến thị trường. Mục đích tối hậu là gây ảnh hưởng, định hình lại nhận thức, thái độ và kích thích hành vi mua sắm của tệp khách hàng mục tiêu."}, {"level": "1", "content": "Người quản lý, điều hành sàn giao dịch bất động sản phải có các điều kiện nào:", "options": {"A": "Có giấy chứng nhận đã hoàn thành khóa đào tạo, bồi dưỡng kiến thức về quản lý, điều hành sàn giao dịch bất động sản", "B": "Có chứng chỉ hành nghề môi giới bất động sản. Có năng lực hành vi dân sự đầy đủ, không đang trong tình trạng bị truy cứu trách nhiệm hình sự hoặc chấp hành án phạt tù. Không bị cấm hành nghề theo quyết định của cơ quan có thẩm quyền", "C": "Cần A và B", "D": "Chưa có văn bản luật hướng dẫn điều này"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Năng lực điều hành sàn giao dịch đòi hỏi sự kiểm soát nghiêm ngặt về tư cách pháp lý và chuyên môn. Theo Điều 55 Luật Kinh doanh Bất động sản 2023, nhân sự cấp cao này bắt buộc phải hội tụ đủ điều kiện: sở hữu chứng chỉ hành nghề môi giới hợp lệ, đảm bảo năng lực hành vi dân sự minh bạch, và phải vượt qua chương trình đào tạo nghiệp vụ chuẩn hóa về quản lý, điều hành sàn giao dịch."}, {"level": "1", "content": "Hạn chế của đàm phán kiểu cứng là:", "options": {"A": "Lợi ích các bên giảm xuống, không đạt được những mục tiêu riêng của các bên.", "B": "Hy sinh nhiều lợi ích, tốn kém chi phí và thời gian cho việc thực hiện cam kết sau đàm phán", "C": "Gây tình trạng căng thẳng, đàm phán dễ tan vỡ hoặc khó thực hiện sau này.", "D": "Mất lòng tin từ các đối tác dẫn đến mất quan hệ hợp tác quốc tế."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đàm phán kiểu cứng dựa trên sự thao túng và áp đặt quyền lực để giành phần thắng đơn phương. Phương pháp này bào mòn lòng tin, đẩy cảm xúc của các bên vào trạng thái thù địch. Hệ quả nhãn tiền là tỷ lệ đổ vỡ trên bàn đàm phán rất cao; hoặc ngay cả khi đạt được thỏa thuận, bên bị ép buộc sẽ mang tâm lý bất mãn, dẫn đến rủi ro chây ì và bất hợp tác trong giai đoạn thực thi hợp đồng."}, {"level": "1", "content": "Vì sao doanh nghiệp kinh doanh BĐS phải chọn thị trường mục tiêu:", "options": {"A": "Vì phải theo phân khúc thị trường có lợi hơn", "B": "Vi để tạo lợi thế cạnh tranh", "C": "Để phục vụ khách hàng tốt nhất", "D": "Là yếu tố khách hàng cần và mua, tạo hấp dẫn và lôi cuốn khách hàng"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Sự khan hiếm về nguồn lực tài chính, nhân sự và thời gian buộc các doanh nghiệp bất động sản không thể phục vụ toàn bộ thị trường đại chúng. Việc phân tích và lựa chọn thị trường mục tiêu (Targeting) là hành động chiến lược nhằm tìm ra các phân khúc ngách có sức mua phù hợp, ít cạnh tranh và mang lại tỷ suất sinh lời tối ưu nhất để dồn toàn lực khai thác."}, {"level": "1", "content": "Kỹ năng nào dưới đây thuộc về nhóm kỹ năng nhân sự (2 đáp án)", "options": {"A": "Hiểu rõ mô hình kinh doanh của doanh nghiệp", "B": "Kỹ năng huấn luyện, động viên và cố vấn", "C": "Nhà quản trị phải hiểu rõ công việc của cấp dưới", "D": "Khả năng nhận dạng cơ hội để đổi mới"}, "answer": "B,D", "explanation": "<b>Giải thích học thuật:</b> Trong tư duy quản trị hiện đại, kỹ năng nhân sự không đơn thuần giới hạn ở giao tiếp hay chỉ đạo, mà còn bao hàm năng lực quản trị vốn nhân lực (Human Capital). Một nhà quản trị xuất sắc sử dụng kỹ năng nhân sự để thấu hiểu động lực, khai phóng tiềm năng sáng tạo của tập thể, từ đó cùng đội ngũ \"nhận dạng cơ hội để đổi mới\" quy trình và sản phẩm trước những biến động liên tục của thị trường bất động sản."}, {"level": "1", "content": "Chức năng quảng cáo trong kinh doanh BĐS gồm (chọn 2 đáp án đúng):", "options": {"A": "Chức năng gợi nhớ, chức năng thông tin", "B": "Chức năng dẫn dắt", "C": "Chức năng thúc đẩy nhu cầu", "D": "Chức năng thuyết phục"}, "answer": "A,D", "explanation": "<b>Giải thích học thuật:</b> Dựa trên mô hình phản ứng của người tiêu dùng trong truyền thông, quảng cáo thực hiện ba chức năng kinh điển: Cung cấp thông tin (Inform) để thị trường nắm bắt được sự tồn tại và USP của dự án; Thuyết phục (Persuade) để thay đổi thái độ và thúc đẩy quyết định mua; và Gợi nhớ (Remind) nhằm ghim chặt hình ảnh thương hiệu trong tâm trí, ngăn khách hàng chuyển hướng sang các dự án đối thủ."}, {"level": "1", "content": "Điều gi` sau đây sai trong trường hợp 2 người đứng tên sổ đỏ không phải là vợ chồng? (2 đáp án)", "options": {"A": "Hai người phải chứng minh nhân thân", "B": "Phải có giấy tờ chứng minh giao dịch", "C": "Phải chứng minh quan hệ hôn nhân giữa hai người", "D": "Sổ đỏ/sổ hồng được cấp là sổ riêng cho hai người"}, "answer": "C,D", "explanation": "<b>Giải thích học thuật:</b> Pháp luật Đất đai và Dân sự công nhận chế định \"sở hữu chung\" đối với tài sản của nhiều cá nhân mà không bắt buộc họ phải có quan hệ hôn nhân hay huyết thống (việc yêu cầu chứng minh quan hệ hôn nhân là mệnh đề sai). Bên cạnh đó, khi cấp Giấy chứng nhận cho tài sản đồng sở hữu, cơ quan nhà nước có thể cấp một sổ chung ghi tên tất cả, hoặc cấp cho mỗi người một sổ (nhưng trên sổ ghi rõ là hình thức \"sử dụng chung\"), chứ không phải là \"sổ riêng độc lập\" chia cắt quyền sở hữu."}, {"level": "1", "content": "Một phương thức thanh toán tốt và hấp dẫn là phương thức đảm bảo: (chọn 2 đáp án đúng)", "options": {"A": "Được chia thành nhiều đợt theo đúng tiến độ xây dựng", "B": "Được chia thành 7 đợt phù hợp với khả năng trả nợ của khách hàng", "C": "Phù hợp với khả năng thanh toán của khách hàng mục tiêu", "D": "Có sự hỗ trợ tốt của ngân hàng bảo lanh về hạn mức vay, thời hạn vay, lai vay..."}, "answer": "A,D", "explanation": "<b>Giải thích học thuật:</b> Sức mạnh cạnh tranh của một chính sách tài chính nằm

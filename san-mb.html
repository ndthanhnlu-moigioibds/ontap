n, điện nước) là 600 triệu VNĐ/tháng. Hoa hồng trung bình thu về từ mỗi giao dịch thành công là 50 triệu VNĐ, trong đó công ty phải chi trả 40% lương hiệu quả (hoa hồng) cho nhân viên Sale. Theo nguyên lý điểm hòa vốn, công ty cần thực hiện thành công bao nhiêu giao dịch mỗi tháng để không bị lỗ?", "options": {"A": "12 giao dịch.", "B": "15 giao dịch.", "C": "20 giao dịch.", "D": "30 giao dịch."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Phân tích điểm hòa vốn: Lợi nhuận gộp mà công ty giữ lại trên mỗi giao dịch = 50 triệu - (40% x 50 triệu) = 30 triệu VNĐ. Để bù đắp mức định phí 600 triệu VNĐ/tháng, công ty cần số giao dịch tối thiểu = 600 triệu / 30 triệu = 20 giao dịch/tháng."}, {"level": "1", "content": "Trong buổi tư vấn dẫn khách đi xem nhà, khách hàng nam tỏ ra rất tập trung vào các thông số diện tích thông thủy, giấy phép xây dựng, phân tích chi phí cơ hội và không bộc lộ cảm xúc khi xem các khu vực tiện ích cảnh quan. Nhân viên tư vấn lại liên tục dùng các từ ngữ bay bổng như \"tổ ấm mơ ước\", \"cảm xúc thăng hoa\", \"cộng đồng tinh hoa\" và bỏ qua các câu hỏi về số liệu của khách. Kết quả là khách hàng bỏ về. Theo lý thuyết tính cách MBTI và tâm lý học hành vi, sai lầm của môi giới là gì?", "options": {"A": "Môi giới đã nói quá ít về mức chiết khấu giảm giá.", "B": "Khách hàng thuộc nhóm tính cách Lý trí (Thinking - T) cần dữ liệu minh bạch, số liệu logic (Mũ trắng), nhưng môi giới lại tiếp cận theo hướng Cảm xúc (Feeling - F/Mũ đỏ), dẫn đến sự \"bất đồng trong giao tiếp\" và không đáp ứng đúng \"insight\" của khách hàng.", "C": "Khách hàng thuộc nhóm Linh hoạt (Perceiving) nên thay đổi ý định đột ngột.", "D": "Khách hàng cố tình làm khó để ép giá."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nam giới/Khách hàng có thiên hướng \"Thinking\" (Lý trí) hoặc \"Mũ trắng\" thường đòi hỏi dữ liệu, sự minh bạch và logic. Việc tư vấn thuần về cảm tính (Feeling/Mũ đỏ) tạo ra rào cản giao tiếp khiến khách hàng cảm thấy người môi giới thiếu năng lực chuyên môn và không thấu hiểu nhu cầu thực tế của họ."}, {"level": "1", "content": "Chủ đầu tư dự án khu dân cư Z ban hành chính sách thanh toán cho sản phẩm hình thành trong tương lai như sau: Đợt 1 ký HĐMB đóng 30%, 10 đợt tiếp theo mỗi đợt đóng 5%, Đợt bàn giao nhà đóng 15%, Đợt nhận sổ hồng đóng 5%. Đứng ở góc độ chuyên gia pháp lý bất động sản, chính sách thanh toán này đúng hay sai luật?", "options": {"A": "Đúng luật vì đã chia nhỏ thành nhiều đợt thanh toán linh hoạt cho khách hàng.", "B": "Sai luật vì khách hàng đóng tổng cộng 80% (30% + 50%) trước thời điểm bàn giao nhà, vi phạm quy định \"không được thu quá 70% giá trị hợp đồng khi chưa bàn giao nhà\".", "C": "Đúng luật vì khách hàng vẫn giữ lại được 5% khi nhận sổ hồng.", "D": "Sai luật vì Đợt 1 ký HĐMB không được thu quá 10%."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật quy định nghiêm ngặt đối với bất động sản hình thành trong tương lai: không được thu quá 70% giá trị hợp đồng khi chưa bàn giao nhà, công trình xây dựng. Chính sách thu đến 80% trước khi bàn giao là vi phạm pháp luật."}, {"level": "1", "content": "Trong một phiên đàm phán phí phân phối dự án, Chủ đầu tư ép Sàn giao dịch: \"Hoa hồng tối đa là 1.5%, nếu anh không đồng ý ký ngay bây giờ, tôi có sẵn 5 sàn khác ngoài kia sẵn sàng nhận với giá 1%\". Giám đốc Sàn nhận thấy chi phí hòa vốn của sàn là 2% và việc nhận dự án này chắc chắn sẽ lỗ vốn. Phản ứng tối ưu nhất thể hiện kỹ năng đàm phán chuyên nghiệp là gì?", "options": {"A": "Chấp nhận ngay mức 1.5% theo phong cách \"Thua - Thắng\" để giữ mối quan hệ với Chủ đầu tư hy vọng tương lai.", "B": "Nổi giận và lật ngược bàn đàm phán, tung tin đồn xấu về CĐT trên mạng xã hội.", "C": "Nhận diện đây là chiến thuật ép buộc (kiểu Cứng). Sàn nên dựa vào BATNA (phương án thay thế tốt nhất) của mình; kiên định với lập trường chi phí tối thiểu (Nguyên tắc) và từ chối khéo léo dự án để bảo vệ lợi ích sống còn của doanh nghiệp thay vì chấp nhận hợp đồng cầm chắc phần lỗ.", "D": "Đồng ý 1.5% nhưng sau đó lén lút thu thêm phí trực tiếp từ người mua để bù lỗ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khi đối phương dùng chiến thuật đàm phán cứng (ép buộc), bên đàm phán cần giữ vững nguyên tắc (đàm phán nguyên tắc: cứng rắn với công việc). Nếu thỏa thuận xâm phạm ngưỡng hòa vốn và gây thiệt hại (Thua), nhà quản trị cần biết từ chối dựa trên các lựa chọn thay thế (BATNA) thay vì nhượng bộ mù quáng."}, {"level": "1", "content": "Một căn biệt thự cũ bị mất giá 20% so với thời điểm chủ nhà mua vào cách đây 3 năm. Hiện tại, kết quả định giá thị trường của căn biệt thự này là 12.000.000.000 VNĐ. Hỏi chi phí vốn ban đầu mà chủ nhà đã bỏ ra để mua là bao nhiêu?", "options": {"A": "14.400.000.000 VNĐ.", "B": "15.000.000.000 VNĐ.", "C": "14.000.000.000 VNĐ.", "D": "9.600.000.000 VNĐ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Gọi X là giá mua ban đầu. Ta có phương trình: X * (1 - 20%) = 12.000.000.000 => X * 0,8 = 12.000.000.000 => X = 12.000.000.000 / 0,8 = 15.000.000.000 VNĐ."}, {"level": "1", "content": "Tại Sàn giao dịch E, Giám đốc nhận thấy tình trạng các nhân viên môi giới thường xuyên cạnh tranh không lành mạnh, giấu giếm thông tin khách hàng và không chịu hỗ trợ nhau chốt sales. Để giải quyết triệt để vấn đề này từ góc độ quản trị nhân sự, biện pháp nào sau đây là chiến lược hiệu quả nhất?", "options": {"A": "Cắt bỏ hoàn toàn lương cơ bản, tăng mức hoa hồng cá nhân lên 50% để thúc đẩy tính cạnh tranh khốc liệt hơn nữa.", "B": "Tái cấu trúc quy chế lương thưởng: Giảm bớt tỷ trọng hoa hồng cá nhân, thiết lập thêm quỹ \"Thưởng doanh thu nhóm/phòng\" (ví dụ 3% - 5%) chia đều cho các thành viên, kết hợp xây dựng văn hóa làm việc tổ nhóm (Teamwork).", "C": "Đuổi việc tất cả nhân viên cũ và tuyển dụng đội ngũ mới hoàn toàn.", "D": "Trả lương cứng mức cao bằng nhau cho mọi nhân sự, xóa bỏ hoàn toàn chế độ hoa hồng môi giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Để giải quyết xung đột nội bộ và thúc đẩy sự hợp tác (Xu hướng làm việc tổ nhóm thay vì đơn độc), nhà quản trị cần can thiệp vào động lực tài chính bằng cách gắn lợi ích cá nhân vào lợi ích tập thể (Thưởng doanh thu nhóm/phòng), qua đó triệt tiêu văn hóa \"giành giật\" và xây dựng tinh thần đồng đội."}, {"level": "1", "content": "Cơ quan Thống kê địa phương gửi công văn yêu cầu Sàn giao dịch bất động sản V cung cấp báo cáo định kỳ về dữ liệu giá trị giao dịch, phân khúc sản phẩm bán chạy và hồ sơ khách hàng. Sàn V từ chối với lý do \"Đó là bí mật kinh doanh nội bộ của công ty\". Theo Luật Kinh doanh Bất động sản, lập luận của Sàn V đúng hay sai?", "options": {"A": "Đúng, doanh nghiệp tư nhân không có nghĩa vụ chia sẻ dữ liệu kinh doanh với cơ quan thống kê.", "B": "Sai, vì sàn giao dịch bất động sản có nghĩa vụ bắt buộc phải thực hiện chế độ báo cáo, cung cấp thông tin giao dịch cho cơ quan quản lý nhà nước để phục vụ công tác quản lý, giám sát và minh bạch thị trường.", "C": "Đúng, việc cung cấp dữ liệu vi phạm luật bảo vệ bí mật đời tư của khách hàng.", "D": "Sai, nhưng sàn chỉ phải cung cấp thông tin nếu được cơ quan nhà nước trả phí mua dữ liệu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 56 và Điều 58 Luật KDBĐS quy định rất rõ nghĩa vụ của sàn giao dịch là phải thực hiện chế độ báo cáo, xác nhận giao dịch và cung cấp thông tin định kỳ cho cơ quan quản lý nhà nước. Đây là công cụ để Nhà nước điều tiết và nắm bắt sát sao động thái thị trường."}, {"level": "1", "content": "Nhằm chuẩn hóa hệ thống quản lý chất lượng theo tiêu chuẩn ISO, sàn giao dịch tiến hành biên soạn đồng bộ các quy trình nghiệp vụ (SOP) và yêu cầu nhân viên phải \"Viết những gì mình làm, làm những gì mình viết\". Hành động này nhằm giải quyết cốt lõi rủi ro nào trong khâu quản lý hoạt động sàn?", "options": {"A": "Rủi ro thiếu hụt dòng tiền thanh toán cho hệ thống tiếp thị.", "B": "Rủi ro phụ thuộc cá nhân và sự thiếu nhất quán trong chất lượng dịch vụ khi nhân sự cũ nghỉ việc hoặc có biến động.", "C": "Rủi ro bị đối thủ cạnh tranh đánh cắp danh sách khách hàng.", "D": "Rủi ro lạm phát vĩ mô làm giảm sức mua của thị trường."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Hệ thống quản lý chất lượng (như ISO) với quy trình \"Viết những gì mình làm, làm những gì mình viết\" giúp thiết lập cơ sở dữ liệu tập trung, chuẩn hóa nghiệp vụ. Điều này đảm bảo tính nhất quán của chất lượng dịch vụ, giảm thiểu lãng phí và đặc biệt ngăn chặn rủi ro đứt gãy hệ thống khi có sự biến động nhân sự."}, {"level": "1", "content": "Sàn giao dịch Proptech Z vận hành hoàn toàn dựa trên nền tảng kỹ thuật số với hàng chục ngàn dữ liệu (Big Data) khách hàng và tài sản. Một ngày, hệ thống bị tấn công mạng (Cyber-attack) dẫn đến lộ lọt hợp đồng và thông tin cá nhân của hàng loạt nhà đầu tư. Căn cứ vào thách thức của kỷ nguyên 4.0 và nghĩa vụ của sàn, lỗ hổng nghiêm trọng nhất ở đây thuộc về vấn đề gì?", "options": {"A": "Lỗ hổng trong quy trình đàm phán hợp đồng mua bán với khách hàng.", "B": "Lỗ hổng trong hệ thống Quản lý và bảo mật thông tin (An ninh mạng) theo yêu cầu về cơ sở vật chất, công nghệ của sàn giao dịch.", "C": "Lỗ hổng trong chính sách giá cả của bất động sản.", "D": "Lỗ hổng trong việc thiết kế Virtual Tour (Xem nhà ảo) bị lỗi hình ảnh."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc ứng dụng công nghệ số hóa mở ra cơ hội nhưng đi kèm thách thức khổng lồ về An ninh mạng. Lộ lọt dữ liệu vi phạm trực tiếp nghĩa vụ quản lý: an toàn, bí mật thông tin (Security) của khách hàng, cho thấy hệ thống bảo mật công nghệ IT của sàn không đảm bảo được điều kiện cơ sở vật chất kỹ thuật an toàn."}];
        let quizData = [];
        let currentIndex = 0;

        window.onload = function() {
            try {
                if(!allData || allData.length === 0) {
                    document.getElementById("quiz-container").innerHTML = "<h3 style='color:red; text-align:center;'>Lỗi: Không có dữ liệu câu hỏi!</h3>";
                    return;
                }
                quizData = getSampledQuestions(100);
                renderQuestion();
            } catch(e) {
                alert("Lỗi khởi tạo hệ thống: " + e.message);
            }
        };

        function getSampledQuestions(count) {
            const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
            const filterLvl = (l) => allData.filter(q => String(q.level) === String(l));
            
            let p1 = shuffle(filterLvl("1")); let p2 = shuffle(filterLvl("2"));
            let p3 = shuffle(filterLvl("3")); let p4 = shuffle(filterLvl("4")); let p5 = shuffle(filterLvl("5"));

            let n1 = Math.round(count * 0.25); let n2 = Math.round(count * 0.25);
            let n3 = Math.round(count * 0.20); let n4 = Math.round(count * 0.20);
            let n5 = count - (n1 + n2 + n3 + n4);

            let selected = [ ...p1.splice(0, n1), ...p2.splice(0, n2), ...p3.splice(0, n3), ...p4.splice(0, n4), ...p5.splice(0, n5) ];

            if(selected.length < count) {
                let remain = shuffle([...p1, ...p2, ...p3, ...p4, ...p5]);
                selected = [...selected, ...remain.splice(0, count - selected.length)];
            }
            return shuffle(selected).slice(0, count);
        }

        function renderQuestion() {
            try {
                if (!quizData[currentIndex]) return;
                const q = quizData[currentIndex];
                
                // Nhận diện CHỌN NHIỀU ĐÁP ÁN cực kỳ an toàn
                let qContentLower = q.content ? q.content.toLowerCase() : "";
                const isMulti = (q.answer && q.answer.includes(",")) || qContentLower.includes("(chọn 2");
                const multiHint = isMulti ? "<span class='q-hint'>* Câu hỏi này yêu cầu chọn nhiều đáp án</span>" : "";
                
                document.getElementById("progress-text").innerText = `Câu ${currentIndex + 1} / ${quizData.length}`;
                
                let optHtml = "";
                let hasOptions = false;
                
                ['A','B','C','D'].forEach(lbl => {
                    if(q.options && q.options[lbl]) {
                        hasOptions = true;
                        optHtml += `
                            <label class="option-item" id="label-${lbl}">
                                <input type="${isMulti ? 'checkbox' : 'radio'}" name="q_opt" value="${lbl}" onchange="updateSelection()">
                                <b>${lbl}.</b> ${q.options[lbl]}
                            </label>`;
                    }
                });

                if(!hasOptions) {
                    optHtml = "<div style='color:red; background:#ffebee; padding:10px; border-radius:5px;'><i>⚠️ Lỗi: Không trích xuất được đáp án. (Kiểm tra lại tính năng đánh số tự động trong Word).</i></div>";
                }

                // Chống gãy chuỗi vì ký tự ngắt dòng
                let safeContent = q.content || "";
                safeContent = safeContent.split('\n').join('<br>');

                document.getElementById("quiz-container").innerHTML = `
                    <div class="card">
                        <div class="q-meta">MỨC ĐỘ THỬ THÁCH: ${q.level || '1'}</div>
                        <div class="q-text">${safeContent}</div>
                        ${multiHint}
                        <div class="options">${optHtml}</div>
                        
                        <button id="btn-check" class="btn-check-inline" onclick="checkAnswer()">Kiểm tra đáp án</button>
                        
                        <div id="exp-box" class="exp-box"></div>
                    </div>`;
                window.scrollTo(0,0);
            } catch(e) {
                alert("Lỗi hiển thị câu hỏi: " + e.message);
            }
        }

        function updateSelection() {
            document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
            document.querySelectorAll('input:checked').forEach(el => el.parentElement.classList.add('selected'));
        }

        function checkAnswer() {
            try {
                const q = quizData[currentIndex];
                const box = document.getElementById("exp-box");
                const btn = document.getElementById("btn-check");
                
                const checkedInputs = document.querySelectorAll('input[name="q_opt"]:checked');
                const selectedVals = Array.from(checkedInputs).map(i => i.value).sort().join(",");
                
                if (!selectedVals) {
                    alert("⚠️ Vui lòng chọn phương án trước khi kiểm tra!");
                    return;
                }

                btn.style.display = "none";
                box.style.display = "block";

                let resultTitle = "";
                if (selectedVals === q.answer) {
                    resultTitle = `<div class="result-title" style="color: var(--success);">✔ CHÍNH XÁC!</div>`;
                    box.style.borderLeftColor = "var(--success)";
                } else {
                    resultTitle = `<div class="result-title" style="color: var(--error);">✘ SAI RỒI! (Bạn chọn: ${selectedVals})</div>`;
                    box.style.borderLeftColor = "var(--error)";
                }

                ['A','B','C','D'].forEach(lbl => {
                    const el = document.getElementById(`label-${lbl}`);
                    if(!el) return;
                    
                    if(q.answer && q.answer.includes(lbl)) {
                        el.classList.add('correct-ans');
                    } else if(selectedVals.includes(lbl)) {
                        el.classList.add('wrong-ans');
                    }
                    
                    const input = el.querySelector('input');
                    if(input) input.disabled = true;
                });

                box.innerHTML = `
                    ${resultTitle}
                    <div style="margin-bottom:12px; font-size:1.05em;"><b>Đáp án đúng:</b> <span style="color:var(--success); font-weight:bold">${q.answer || "Không rõ"}</span></div>
                    <div>${q.explanation || "<i>Hệ thống chưa cập nhật giải thích cho câu này.</i>"}</div>
                `;

                box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } catch(e) {
                alert("Lỗi xử lý đáp án: " + e.message);
            }
        }

        function nextQ() { if(currentIndex < quizData.length-1) { currentIndex++; renderQuestion(); } }
        function prevQ() { if(currentIndex > 0) { currentIndex--; renderQuestion(); } }
    </script>

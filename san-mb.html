 ở sự an toàn pháp lý và đòn bẩy vốn. Phương thức thanh toán hấp dẫn trước hết phải tuân thủ Luật Kinh doanh Bất động sản bằng việc chia đợt bám sát \"tiến độ xây dựng\" thực tế để giảm rủi ro chiếm dụng vốn của người mua. Thứ hai, dự án phải có sự đồng hành của \"Ngân hàng bảo lãnh\" cung cấp các giải pháp tín dụng ưu việt (hạn mức cao, ân hạn nợ gốc) nhằm khơi thông tính thanh khoản."}, {"level": "1", "content": "Nguyên tắc quan trọng trong tư vấn cho khách hàng là: (2 đáp án)", "options": {"A": "Khách hàng không nghe là do họ không lịch sự", "B": "Người môi giới “nói” chứ không “đọc”", "C": "Quan tâm phản ứng của khách hàng khi đang tư vấn", "D": "Cứ nói hết nội dung đã chuẩn bị"}, "answer": "B,C", "explanation": "<b>Giải thích học thuật:</b> Kỹ năng thuyết trình và tư vấn (Personal Selling) đòi hỏi sự kết nối cảm xúc sâu sắc. Người môi giới phải truyền đạt nội dung một cách tự nhiên, truyền cảm hứng và mang tính đối thoại (\"nói\" bằng sự thấu hiểu thay vì \"đọc\" kịch bản rập khuôn). Quan trọng hơn, phải liên tục rà soát ngôn ngữ cơ thể, ánh mắt (phản ứng) của khách hàng để đo lường mức độ tiếp nhận và chủ động hiệu chỉnh hướng tiếp cận kịp thời."}, {"level": "1", "content": "Bên môi giới không được đồng thời là?", "options": {"A": "Bên bán trong cùng giao dịch môi giới", "B": "Bên mua trong cùng giao dịch môi giới", "C": "Cả a và b đều sai", "D": "Cả a và b đều đúng"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Nhằm triệt tiêu rủi ro thao túng thị trường và bảo vệ nguyên tắc minh bạch, trung lập của nghề dịch vụ, pháp luật Kinh doanh Bất động sản nghiêm cấm hành vi xung đột lợi ích. Người làm nghề môi giới tuyệt đối không được phép sử dụng lợi thế thông tin để tự đứng tên làm \"Bên mua\" trong chính giao dịch mà mình đang nhận ủy thác, nhằm ngăn chặn tình trạng môi giới cố tình ép giá chủ nhà để tự ôm hàng trục lợi cá nhân."}, {"level": "1", "content": "Thù lao môi giới bất động sản khác hoa hồng môi giới bất động sản ở điểm nào?", "options": {"A": "Không phụ thuộc vào kết quả giao dịch mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản giữa khách hàng và người thứ ba.", "B": "Khi khách hàng ký hợp đồng mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản", "C": "Hưởng thù lao, hoa hồng môi giới theo thỏa thuận trong hợp đồng đã ký với khách hàng", "D": "Tất cả đều đúng"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Ranh giới học thuật và pháp lý giữa hai khái niệm này được xác định bởi \"điều kiện kích hoạt thanh toán\". Thù lao môi giới là khoản chi phí bù đắp cho công sức, thời gian và dịch vụ thực hiện (chạy quảng cáo, dẫn khách, tư vấn pháp lý) mà người môi giới đã cống hiến, khoản này bắt buộc phải thanh toán theo hợp đồng và hoàn toàn độc lập, không phụ thuộc vào kết quả cuối cùng là giao dịch có thành công hay không. Trái lại, hoa hồng chỉ được giải ngân khi hợp đồng dân sự giữa các bên được ký kết thành công."}, {"level": "1", "content": "Theo Điều 54 Luật Kinh doanh Bất động sản 2023, tổ chức, cá nhân kinh doanh dịch vụ sàn giao dịch bất động sản bắt buộc phải đáp ứng điều kiện tiên quyết nào về tư cách pháp lý?", "options": {"A": "Thành lập hợp tác xã hoặc hộ kinh doanh cá thể.", "B": "Thành lập doanh nghiệp theo quy định của pháp luật.", "C": "Có văn bản bảo lãnh tài chính từ một tổ chức tín dụng.", "D": "Có vốn điều lệ tối thiểu 20 tỷ đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 54 Luật Kinh doanh Bất động sản 2023 quy định rõ ràng rằng tổ chức, cá nhân tham gia mảng kinh doanh dịch vụ bất động sản phải thành lập doanh nghiệp kinh doanh dịch vụ bất động sản."}, {"level": "1", "content": "Định hướng chuẩn hóa theo quy định mới yêu cầu tính bắt buộc nào đối với việc giao dịch bất động sản dự án?", "options": {"A": "Chỉ bất động sản hình thành trong tương lai mới bắt buộc giao dịch qua sàn.", "B": "Chủ đầu tư được phép tự do bán trực tiếp không qua sàn nếu đã có bảo lãnh tiến độ từ ngân hàng.", "C": "Bắt buộc tất cả giao dịch bất động sản hình thành trong tương lai và bất động sản sẵn có của dự án phải thực hiện thông qua sàn giao dịch được cấp phép.", "D": "Chỉ áp dụng bắt buộc qua sàn đối với các dự án nhà ở xã hội có trợ giá."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Chuẩn hóa quy định mới bắt buộc tất cả giao dịch bất động sản hình thành trong tương lai và bất động sản sẵn có của dự án phải được thực hiện thông qua sàn giao dịch được cấp phép, đồng thời không cho phép thực hiện giao dịch trực tiếp không qua sàn."}, {"level": "1", "content": "Người quản lý, điều hành sàn giao dịch bất động sản cần đáp ứng chuyên môn pháp lý nào sau đây?", "options": {"A": "Phải có thẻ thẩm định viên về giá do Bộ Tài chính cấp.", "B": "Phải có Chứng chỉ hành nghề môi giới bất động sản và Giấy chứng nhận hoàn thành khóa đào tạo quản lý, điều hành sàn.", "C": "Chỉ cần Giấy chứng nhận hoàn thành khóa đào tạo quản lý, điều hành sàn giao dịch bất động sản.", "D": "Chỉ cần bằng Cử nhân trở lên thuộc nhóm ngành Kinh tế hoặc Luật."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 55 Luật Kinh doanh Bất động sản 2023, người quản lý, điều hành phải có quyền quản lý doanh nghiệp, đã hoàn thành khóa đào tạo và có giấy chứng nhận quản lý, điều hành sàn, đồng thời phải sở hữu chứng chỉ hành nghề môi giới bất động sản."}, {"level": "1", "content": "Cơ quan quản lý nhà nước nào trực tiếp nắm thẩm quyền cấp, cấp lại và thu hồi Giấy phép hoạt động cho sàn giao dịch bất động sản theo Điều 17 Nghị định 96/2024/NĐ-CP?", "options": {"A": "Bộ Xây dựng.", "B": "Cục Quản lý nhà và thị trường bất động sản.", "C": "Cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh (thường là Sở Xây dựng).", "D": "Ủy ban nhân dân cấp Quận/Huyện nơi doanh nghiệp đăng ký trụ sở chính."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh chịu trách nhiệm quản lý, giám sát, cấp, cấp lại và thu hồi Giấy phép hoạt động của sàn trên địa bàn."}, {"level": "1", "content": "Về mặt quy chuẩn danh xưng, doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản phải tuân thủ nguyên tắc nào khi đặt tên?", "options": {"A": "Phải có cụm từ \"sàn giao dịch bất động sản\" và không được trùng hoặc gây nhầm lẫn.", "B": "Bắt buộc chứa cụm từ viết tắt \"REB\" (Real Estate Broker) trong tên giao dịch quốc tế.", "C": "Tên doanh nghiệp do chủ sở hữu tự do lựa chọn và không có ràng buộc về tiền tố cố định.", "D": "Phải có tiền tố \"Trung tâm môi giới\" đứng trước tên riêng."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Luật Kinh doanh Bất động sản 2023 (Điều 54) quy định tên doanh nghiệp phải có cụm từ “sàn giao dịch bất động sản”, đảm bảo tính định danh rõ ràng, không trùng hoặc gây nhầm lẫn."}, {"level": "1", "content": "Khi hoạt động, Sàn giao dịch bất động sản được pháp luật trao cho đặc quyền nào dưới đây đối với sản phẩm từ khách hàng/chủ đầu tư (Điều 57 Luật KDBĐS 2023)?", "options": {"A": "Bắt buộc phải nhận niêm yết mọi bất động sản mà khách hàng ký gửi để bảo đảm chống độc quyền.", "B": "Được phép tự ý điều chỉnh giá bán của bất động sản ký gửi dựa trên biến động thị trường.", "C": "Được quyền từ chối đưa lên sàn các bất động sản không đủ điều kiện kinh doanh.", "D": "Được phép tạm giữ bản gốc Giấy chứng nhận quyền sử dụng đất của bên bán đến khi hoàn tất giao dịch."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Quyền của sàn giao dịch bao gồm việc từ chối đưa lên sàn các bất động sản không đủ điều kiện kinh doanh nhằm đảm bảo an toàn pháp lý cho thị trường."}, {"level": "1", "content": "Một cá nhân hành nghề môi giới bất động sản độc lập, tự do không trực thuộc sàn giao dịch hay tổ chức nào sẽ đối mặt với hệ quả gì từ ngày 01/08/2024?", "options": {"A": "Phải nộp thuế thu nhập cá nhân ở mức cao nhất theo biểu thuế lũy tiến.", "B": "Được tiếp tục hoạt động miễn là đăng ký dưới hình thức Hộ kinh doanh cá thể.", "C": "Hành vi này không được phép, người môi giới bắt buộc phải làm việc trong một doanh nghiệp kinh doanh dịch vụ bất động sản.", "D": "Phải nộp một khoản tiền ký quỹ pháp định là 500 triệu đồng tại ngân hàng thương mại."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Quy định mới về hành nghề môi giới từ ngày 01/08/2024 không cho phép cá nhân hành nghề môi giới độc lập, tự do; bắt buộc môi giới phải làm việc trong một doanh nghiệp kinh doanh dịch vụ bất động sản (chuyển đổi mô hình bắt buộc)."}, {"level": "1", "content": "Điểm khác biệt học thuật và pháp lý giữa \"Thù lao môi giới\" và \"Hoa hồng môi giới\" là gì?", "options": {"A": "Thù lao do bên mua chi trả, trong khi hoa hồng do bên bán hoặc chủ đầu tư chi trả.", "B": "Thù lao không phụ thuộc vào kết quả giao dịch thành công, trong khi hoa hồng là khoản chi trả khi hoàn thành nhiệm vụ và giao dịch thành công.", "C": "Thù lao tính theo tỷ lệ phần trăm (%) giá trị hợp đồng, hoa hồng tính bằng số tiền cố định.", "D": "Hoa hồng chỉ phát sinh đối với các dự án mở bán sơ cấp, thù lao phát sinh trong giao dịch thứ cấp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thù lao là khoản tiền trả cho nỗ lực của bên môi giới tùy theo thỏa thuận và không phụ thuộc vào kết quả giao dịch, ngược lại, hoa hồng được trả khi người môi giới hoàn thành nhiệm vụ và giao dịch thành công."}, {"level": "1", "content": "Khi cơ quan quản lý nhà nước ban hành quyết định thu hồi Giấy phép hoạt động, Sàn giao dịch bất động sản có tối đa bao nhiêu ngày để hoàn tất nghĩa vụ nợ, thuế và giải quyết hợp đồng lao động?", "options": {"A": "15 ngày.", "B": "30 ngày.", "C": "45 ngày.", "D": "60 ngày."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Trong thời hạn 60 ngày kể từ ngày bị thu hồi Giấy phép, sàn giao dịch phải hoàn thành các nghĩa vụ về nộp đủ số thuế còn nợ, thanh toán khoản nợ khác, thủ tục chấm dứt hợp đồng lao động và thỏa thuận với khách hàng."}, {"level": "1", "content": "Mã ngành kinh tế cấp 4 nào dưới đây được sử dụng để đăng ký doanh nghiệp với hoạt động chính là \"Dịch vụ trung gian cho hoạt động bất động sản\" (bao gồm quản lý sàn và môi giới)?", "options": {"A": "6810.", "B": "6821.", "C": "6829.", "D": "6910."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mã ngành 6821 được quy định dành cho dịch vụ trung gian cho hoạt động bất động sản, bao gồm các hoạt động đại lý, môi giới bất động sản độc lập và dịch vụ quản lý sàn giao dịch."}, {"level": "1", "content": "Nếu Sàn giao dịch bất động sản có ý định tự chấm dứt hoạt động vĩnh viễn, thời hạn gửi thông báo bằng văn bản đến cơ quan quản lý nhà nước cấp tỉnh tối thiểu là bao lâu trước thời điểm chính thức chấm dứt?", "options": {"A": "Ít nhất 07 ngày làm việc.", "B": "Ít nhất 10 ngày làm việc.", "C": "Ít nhất 30 ngày.", "D": "Ít nhất 60 ngày."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo quy trình tự chấm dứt hoạt động, sàn giao dịch bất động sản phải thông báo bằng văn bản về việc dự kiến chấm dứt hoạt động trước ít nhất 30 ngày cho cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh."}, {"level": "1", "content": "Sàn giao dịch bất động sản ứng dụng mô hình phi tập trung (Decentralized Platforms) tận dụng nền tảng công nghệ nào để thực hiện mã hóa (Tokenization) và giao dịch xuyên biên giới?", "options": {"A": "Trí tuệ nhân tạo (AI) kết hợp Học máy (Machine Learning).", "B": "Thực tế ảo (VR) và Thực tế tăng cường (AR).", "C": "Dữ liệu lớn (Big Data).", "D": "Chuỗi khối (Blockchain) và Hợp đồng thông minh (Smart Contracts)."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Sàn giao dịch phi tập trung ứng dụng công nghệ Blockchain tạo ra nền tảng minh bạch, an toàn, sử dụng hợp đồng thông minh (Smart Contracts) và tiến hành mã thông báo/token hóa (Tokenization) bất động sản."}, {"level": "1", "content": "Trường hợp doanh nghiệp xin cấp lại Giấy phép hoạt động do thay đổi thông tin hoặc giấy phép cũ bị hỏng, cơ quan quản lý nhà nước sẽ kiểm tra và cấp lại Giấy phép trong thời hạn bao nhiêu ngày làm việc đối với hồ sơ hợp lệ?", "options": {"A": "03 ngày làm việc.", "B": "05 ngày làm việc.", "C": "07 ngày làm việc.", "D": "15 ngày làm việc."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quy trình cấp lại Giấy phép hoạt động (khoản 3 Điều 14 NĐ 96/2024/NĐ-CP) xác định thời hạn giải quyết là 05 ngày làm việc để cơ quan quản lý kiểm tra và cấp lại giấy phép."}, {"level": "1", "content": "Sàn giao dịch bất động sản có được phép cung cấp dịch vụ định giá bất động sản không, và nếu có thì kèm theo điều kiện khắt khe nào?", "options": {"A": "Được phép và do Giám đốc sàn tự quyết định ký duyệt chứng thư.", "B": "Không được phép vì đây là chức năng độc quyền của Ngân hàng Nhà nước.", "C": "Được phép, nhưng yêu cầu bắt buộc là nhân sự thực hiện phải có Thẻ thẩm định viên về giá và đăng ký hành nghề theo quy định của pháp luật.", "D": "Được phép, với điều kiện duy nhất là sử dụng công nghệ AI để định giá khách quan."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Sàn giao dịch cung cấp đa dạng dịch vụ bao gồm định giá bất động sản, tuy nhiên yêu cầu bắt buộc về chuyên môn là nhân sự định giá phải có Thẻ thẩm định viên về giá và đăng ký hành nghề theo quy định pháp luật."}, {"level": "1", "content": "Trong lý thuyết quản trị chu trình PDCA áp dụng cho hoạt động điều hành sàn, khâu \"Act\" (Hành động/Cải tiến) được hiểu là:", "options": {"A": "Thiết lập hệ thống đánh giá hiệu suất (KPI) và đo lường kết quả.", "B": "Tổ chức triển khai kế hoạch tiếp thị và bán hàng.", "C": "Phân tích kết quả đạt được so với ngân sách dự kiến ban đầu.", "D": "Thực hiện các biện pháp khắc phục sai lệch và đưa ra chuẩn hóa cải tiến quy trình liên tục."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Trong mô hình quản lý PDCA, bước \"Act\" (Hành động/Cải tiến) đề cập đến việc thực hiện các biện pháp khắc phục, cải tiến và chuẩn hóa quy trình dựa trên việc đánh giá kết quả."}, {"level": "1", "content": "Động lực làm việc của nhân sự (broker) trên sàn giao dịch bất động sản được chia thành 4 nhóm chính. Sự \"Công bằng trong hệ thống đánh giá và khen thưởng\" (Fair Reward System) thuộc về nhóm động lực nào?", "options": {"A": "Bản thân (Self).", "B": "Công việc (Job/Work).", "C": "Môi trường (Environment).", "D": "Lãnh đạo (Leadership)."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Phân tích động lực làm việc chỉ ra rằng tầm nhìn rõ ràng, sự hỗ trợ, tính công bằng trong đánh giá và khen thưởng, cùng với việc tạo cơ hội thăng tiến thuộc về nhóm động lực từ Lãnh đạo (Leadership)."}, {"level": "1", "content": "Các hoạt động sau đây đều thuộc phạm vi nội dung kinh doanh hợp pháp của sàn giao dịch bất động sản (Điều 56), NGOẠI TRỪ:", "options": {"A": "Lưu trữ hồ sơ, cung cấp thông tin cho cơ quan quản lý nhà nước.", "B": "Cung cấp dịch vụ hỗ trợ thương thảo, đàm phán hợp đồng giao dịch bất động sản.", "C": "Trực tiếp thực hiện thi công xây dựng và hoàn thiện dự án hạ tầng để bán.", "D": "Xác nhận tính pháp lý và điều kiện kinh doanh của bất động sản trước khi niêm yết."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 56, nội dung hoạt động của sàn là dịch vụ trung gian (kiểm tra, niêm yết, tìm kiếm, môi giới, hỗ trợ thanh toán, lưu trữ hồ sơ, xác nhận báo cáo). Sàn không có chức năng thi công xây dựng dự án (thuộc phạm vi của nhà thầu và chủ đầu tư)."}, {"level": "1", "content": "Thuế Thu nhập Doanh nghiệp (TNDN) và Thuế Giá trị Gia tăng (VAT) phổ biến mà các sàn giao dịch quy mô nhỏ (Sàn/VPMG) phải chịu đối với khoản doanh thu dịch vụ môi giới thường áp dụng theo biểu suất nào?", "options": {"A": "TNDN 20% và VAT 10%.", "B": "TNDN 10% và VAT 5%.", "C": "Thuế khoán 2% trên tổng giá trị giao dịch của bất động sản.", "D": "Thuế thu nhập cá nhân 10% đại diện nộp thay cho người mua."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Nghĩa vụ thuế đối với doanh nghiệp (Sàn/VPMG) quy mô nhỏ đối với phần doanh thu dịch vụ là chịu Thuế Thu nhập doanh nghiệp ở mức phổ biến 20% và Thuế Giá trị gia tăng (VAT) 10%."}, {"level": "1", "content": "Yếu tố \"Giá trị của thương hiệu và Uy tín\" trong mô hình kinh tế của sàn giao dịch bất động sản được phân loại vào nhóm nào?", "options": {"A": "Cơ cấu chi phí hoạt động (Cost Structure).", "B": "Lợi nhuận và giá trị gia tăng (Profit & Value Addition).", "C": "Nguồn thu chính (Major Revenue Streams).", "D": "Nguồn vốn đối ứng rủi ro (Risk Capital)."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mô hình kinh tế quản lý sàn phân loại giá trị thương hiệu & uy tín, tăng trưởng bền vững, lợi nhuận sau thuế và tái đầu tư vào nhóm Lợi nhuận & Giá trị gia tăng (Profit & Value Addition) có được sau khi trừ đi chi phí."}, {"level": "1", "content": "Nếu cơ quan quản lý nhà nước phát hiện sàn giao dịch không đủ điều kiện duy trì hoạt động theo quy định pháp luật và ra quyết định đình chỉ, thời hạn đình chỉ (tạm ngừng) tối đa được áp dụng là bao lâu?", "options": {"A": "Không quá 06 tháng.", "B": "Không quá 12 tháng.", "C": "Không quá 02 năm.", "D": "Đình chỉ vĩnh viễn ngay lập tức."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Trong trường hợp sàn giao dịch bất động sản bị cơ quan nhà nước quyết định tạm ngừng hoạt động do không đủ điều kiện, thời gian tạm ngừng hoạt động được quy định là không quá 02 năm."}, {"level": "1", "content": "Dựa trên pháp luật hiện hành và nghiệp vụ kinh doanh, điểm khác biệt căn bản nhất giữa \"Thù lao môi giới\" và \"Hoa hồng môi giới\" bất động sản là gì?", "options": {"A": "Thù lao do bên mua chi trả, trong khi hoa hồng do bên bán hoặc chủ đầu tư chi trả cho sàn giao dịch.", "B": "Thù lao được thanh toán không phụ thuộc vào kết quả giao dịch thành công, trong khi hoa hồng chỉ được trả khi giao dịch hoàn tất.", "C": "Thù lao tính theo tỷ lệ phần trăm trên tổng giá trị tài sản, còn hoa hồng được tính bằng một khoản tiền cố định.", "D": "Hoa hồng chỉ phát sinh trong giao dịch sơ cấp của chủ đầu tư, thù lao phát sinh trong giao dịch thứ cấp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thù lao môi giới là khoản tiền khách hàng trả cho nỗ lực thực hiện công việc của người môi giới dựa trên thỏa thuận, không phụ thuộc vào việc giao dịch có thành công hay không. Ngược lại, hoa hồng môi giới chỉ được chi trả khi người môi giới hoàn thành nhiệm vụ kết nối và giao dịch mua bán, cho thuê được ký kết thành công."}, {"level": "1", "content": "Theo Luật Kinh doanh Bất động sản 2023, quy định về điều kiện thành lập sàn giao dịch yêu cầu tối thiểu về nhân sự chuyên môn như thế nào?", "options": {"A": "Phải có ít nhất 05 người có bằng Cử nhân chuyên ngành Quản lý đất đai hoặc Luật.", "B": "Toàn bộ nhân viên làm việc tại sàn phải có chứng chỉ hành nghề môi giới bất động sản.", "C": "Phải có ít nhất 01 người có chứng chỉ hành nghề môi giới bất động sản và người quản lý điều hành sàn cũng phải có chứng chỉ này.", "D": "Sàn giao dịch chỉ cần có giấy phép kinh doanh mã ngành 6821 mà không bắt buộc số lượng nhân sự có chứng chỉ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 69 Luật Kinh doanh Bất động sản 2023 quy định rõ doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản phải có ít nhất 01 người có chứng chỉ hành nghề môi giới, đồng thời người quản lý, điều hành sàn cũng bắt buộc phải sở hữu chứng chỉ này."}, {"level": "1", "content": "Trong mô hình quản lý PDCA áp dụng cho việc vận hành sàn giao dịch bất động sản, bước \"Check\" (Kiểm tra) tương ứng với hoạt động nào sau đây?", "options": {"A": "Thiết lập chiến lược phát triển và đặt ra hệ thống chỉ số KPI.", "B": "Triển khai các chiến dịch tiếp thị và phân công công việc cho nhân sự.", "C": "Đánh giá kết quả đạt được, so sánh với mục tiêu ban đầu để xác định các sai lệch.", "D": "Thực hiện các biện pháp khắc phục sự cố và chuẩn hóa quy trình làm việc."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Trong chu trình PDCA (Plan - Do - Check - Act), bước \"Check\" đóng vai trò đánh giá kết quả thực thi, đối chiếu với các mục tiêu đã hoạch định để nhận diện điểm sai lệch trước khi tiến hành hành động cải tiến (Act)."}, {"level": "1", "content": "Nền tảng Rever.vn được xem là một ví dụ điển hình về mô hình môi giới Proptech hiện đại nhờ áp dụng công nghệ lõi tiên phong nào ở giai đoạn đầu?", "options": {"A": "Trí tuệ nhân tạo (AI) để định giá bất động sản tự động.", "B": "Công nghệ Scan 3D sử dụng máy quét laser để tạo ra bản sao kỹ thuật số (Digital Twin) của bất động sản.", "C": "Công nghệ chuỗi khối (Blockchain) để mã hóa giao dịch.", "D": "Phân tích dữ liệu lớn (Big Data) để dự báo biến động giá đất nền."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự ra đời của Rever bắt nguồn từ công nghệ lõi là Scan 3D, sử dụng máy quét chuyên dụng để tạo ra mô hình 3D sống động (Digital Twin), giải quyết bài toán xem nhà thực tế ảo từ xa cho khách hàng."}, {"level": "1", "content": "Theo Nghị định 96/2024/NĐ-CP, nếu doanh nghiệp quản lý sàn giao dịch bất động sản tự quyết định tạm ngừng hoạt động, họ phải báo cáo bằng văn bản cho cơ quan quản lý chậm nhất là bao lâu?", "options": {"A": "03 ngày làm việc trước ngày dự kiến tạm ngừng.", "B": "07 ngày làm việc trước ngày dự kiến tạm ngừng.", "C": "10 ngày làm việc trước ngày dự kiến tạm ngừng hoặc tiếp tục hoạt động trở lại.", "D": "30 ngày trước ngày dự kiến tạm ngừng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Quy trình tự tạm ngừng hoạt động yêu cầu sàn giao dịch phải báo cáo bằng văn bản cho cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh chậm nhất 10 ngày làm việc trước ngày tạm ngừng hoặc tiếp tục hoạt động trở lại."}, {"level": "1", "content": "Trong cơ cấu đánh giá hiệu suất làm việc của nhân viên môi giới theo mô hình ASK, yếu tố \"A\" (Attitudes - Thái độ) bao hàm những đặc điểm nào?", "options": {"A": "Hiểu biết chuyên môn, nắm vững quy trình pháp lý.", "B": "Tư duy tích cực, động lực nội tại, tinh thần hợp tác và sự cam kết với công việc.", "C": "Khả năng giao tiếp, giải quyết vấn đề và quản lý thời gian.", "D": "Kỹ năng thiết kế quảng cáo và ứng dụng e-marketing."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trong mô hình ASK, Thái độ (Attitudes) được định nghĩa là tư duy tích cực, động lực nội tại, tinh thần hợp tác, trách nhiệm và mức độ cam kết của nhân sự đối với công việc."}, {"level": "1", "content": "Trong hệ sinh thái các doanh nghiệp dịch vụ bất động sản nội địa nổi bật, đơn vị nào được định vị là môi giới công nghệ (Proptech) thuộc hệ sinh thái của Vingroup & Techcombank, chuyên cung cấp giải pháp tài chính và công nghệ tích hợp?", "options": {"A": "Cen Land.", "B": "Đất Xanh Services.", "C": "One Mount (OneHousing).", "D": "Khải Hoàn Land."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> One Mount (OneHousing) là hệ sinh thái bất động sản công nghệ tiên phong trực thuộc sự hợp tác của Vin & Techcombank, chuyên cung cấp các giải pháp tài chính và công nghệ tích hợp."}, {"level": "1", "content": "Khi tiến hành nghiệp vụ \"Niêm yết bất động sản\", một trong những yêu cầu bắt buộc nhằm đảm bảo tính minh bạch và công khai đối với tình trạng pháp lý là gì?", "options": {"A": "Chủ sở hữu phải nộp bản gốc sổ đỏ cho sàn giao dịch lưu giữ.", "B": "Bất động sản phải có hồ sơ pháp lý đầy đủ, không bị tranh chấp, khiếu kiện và đủ điều kiện giao dịch.", "C": "Bất động sản phải hoàn thành 100% tiến độ xây dựng phần thô.", "D": "Bất động sản phải được định giá bởi ngân hàng nhà nước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thông tin niêm yết bất động sản để đảm bảo minh bạch yêu cầu tình trạng pháp lý phải đầy đủ, rõ ràng, không có tranh chấp, khiếu kiện và đáp ứng đủ các điều kiện giao dịch theo quy định pháp luật."}, {"level": "1", "content": "Nếu đánh giá thị trường bất động sản Việt Nam theo chu kỳ sóng từ năm 2018 đến 2025, giai đoạn 2022-2023 được đặc tả bởi những tính chất vĩ mô nào?", "options": {"A": "Phục hồi và tăng trưởng trở lại nhờ đầu tư công.", "B": "Tăng trưởng nóng ở phân khúc đất nền và condotel.", "C": "Chạm đáy, khó khăn, thanh khoản cực thấp, nhiều dự án đắp chiếu và doanh nghiệp buộc phải tái cấu trúc nợ.", "D": "Bùng nổ nguồn cung mới với lãi suất cho vay ở mức thấp kỷ lục."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Giai đoạn 2022-2023 được phân tích là \"Chạm đáy - Khó khăn - Tái cấu trúc\" do lạm phát cao, siết chặt tín dụng, khủng hoảng trái phiếu dẫn đến thanh khoản thấp và nhiều dự án bị đình trệ."}, {"level": "1", "content": "Quá trình đăng ký doanh nghiệp để mở văn phòng môi giới bất động sản tại Sở Kế hoạch và Đầu tư (hoặc Sở Tài chính theo cơ cấu địa phương) quy định thời hạn xử lý hồ sơ hợp lệ và trả kết quả là bao lâu?", "options": {"A": "03 ngày làm việc.", "B": "05 ngày làm việc.", "C": "15 ngày làm việc.", "D": "30 ngày."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Theo quy trình mở văn phòng môi giới, sau khi nộp hồ sơ tại cơ quan đăng ký kinh doanh, thời gian xử lý và cấp giấy chứng nhận cho một hồ sơ hợp lệ là 03 ngày làm việc."}, {"level": "1", "content": "Vai trò của sàn giao dịch bất động sản đối với các cơ quan quản lý Nhà nước được thể hiện rõ nét nhất qua chức năng nào?", "options": {"A": "Thay mặt nhà nước thu Thuế thu nhập cá nhân của người bán.", "B": "Cấp giấy chứng nhận quyền sử dụng đất cho người mua.", "C": "Phê duyệt quy hoạch 1/500 cho các dự án phát triển mới.", "D": "Báo cáo định kỳ và đột xuất về tình hình hoạt động, dữ liệu giao dịch để hỗ trợ công tác quản lý, giám sát thị trường."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Một trong những vai trò trọng tâm của sàn giao dịch là cung cấp thông tin, báo cáo định kỳ và đột xuất về dữ liệu giao dịch cho cơ quan quản lý nhà nước để điều tiết và giám sát thị trường."}, {"level": "1", "content": "Theo nguyên tắc hoạt động tài chính, đối với một văn phòng môi giới quy mô doanh nghiệp nhỏ, biểu thuế Thu nhập doanh nghiệp (TNDN) cơ bản phải đóng trên phần lợi nhuận chịu thuế là bao nhiêu?", "options": {"A": "10%.", "B": "15%.", "C": "20%.", "D": "25%."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nghĩa vụ thuế đối với doanh nghiệp (Sàn/VPMG) quy định mức thuế Thu nhập doanh nghiệp phổ biến được áp dụng là 20%."}, {"level": "1", "content": "Trong cấu trúc chi phí vận hành của một sàn giao dịch bất động sản, khoản mục nào thuộc về \"Cơ cấu chi phí Marketing & Bán hàng\"?", "options": {"A": "Chi trả tiền lương, thưởng và chi phí đào tạo.", "B": "Tiền thuê văn phòng và tiện ích điện nước.", "C": "Chi phí chạy quảng cáo trực tuyến và tổ chức sự kiện mở bán.", "D": "Phí duy trì máy chủ, phần mềm CRM và hạ tầng IT."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Trong mô hình kinh tế của sàn, cơ cấu chi phí Marketing & Bán hàng bao gồm các khoản chi cho quảng cáo (Advertising) và tổ chức sự kiện."}, {"level": "1", "content": "Sự khác biệt cốt lõi nhất về phương thức vận hành giữa Sàn giao dịch bất động sản truyền thống và Sàn giao dịch phi tập trung (Decentralized Platforms) là gì?", "options": {"A": "Sàn truyền thống cung cấp dịch vụ định giá, sàn phi tập trung không được phép định giá.", "B": "Sàn truyền thống vận hành tại các trung tâm vật lý thông qua môi giới, sàn phi tập trung sử dụng công nghệ Blockchain và Hợp đồng thông minh để loại bỏ trung gian.", "C": "Sàn truyền thống chỉ bán nhà ở xã hội, sàn phi tập trung bán bất động sản nghỉ dưỡng.", "D": "Sàn truyền thống thu hoa hồng 5%, sàn phi tập trung không thu phí."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sàn giao dịch phi tập trung ứng dụng nền tảng Blockchain, Hợp đồng thông minh (Smart Contracts) để giao dịch trực tiếp minh bạch và loại bỏ khâu trung gian, khác với mô hình văn phòng vật lý tư vấn trực tiếp của sàn truyền thống."}, {"level": "1", "content": "Khi tư vấn phương án tài chính mua căn hộ cho khách hàng có nhu cầu vay vốn ngân hàng, chuyên gia môi giới khuyến nghị tỷ lệ nợ trên thu nhập (DTI - Debt to Income) an toàn tối đa nên ở mức nào?", "options": {"A": "Khoảng 33% (tối đa không quá 40%).", "B": "Xấp xỉ 50%.", "C": "Khoảng 60% đến 70%.", "D": "Lớn hơn 75%."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Theo phân tích tình huống tư vấn tài chính thực tế, tỷ lệ nợ trên thu nhập (DTI) ở mức khoảng 33% là \"tỷ lệ vàng\" an toàn trong quản lý tài chính cá nhân, khuyến nghị không vượt quá 40% để tránh áp lực trả nợ rủi ro."}, {"level": "1", "content": "Để thực hiện nghiệp vụ Đấu giá bất động sản trên sàn giao dịch nhằm đạt được giá tốt nhất, nhân sự đảm nhiệm bắt buộc phải đáp ứng yêu cầu pháp lý nào?", "options": {"A": "Phải là Giám đốc sàn giao dịch.", "B": "Phải có bằng Cử nhân Tài chính - Ngân hàng.", "C": "Phải có Chứng chỉ hành nghề Đấu giá theo Luật Đấu giá tài sản.", "D": "Phải có Chứng thư bảo lãnh từ Ngân hàng thương mại."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Để triển khai nghiệp vụ đấu giá chuyên nghiệp, công khai và hợp pháp trên sàn, nhân sự hoặc đơn vị thực hiện bắt buộc phải có chứng chỉ hành nghề đấu giá theo quy định của Luật Đấu giá tài sản."}, {"level": "1", "content": "Người quản lý, điều hành sàn giao dịch bất động sản KHÔNG có quyền nào sau đây?", "options": {"A": "Yêu cầu khách hàng cung cấp thông tin, tài liệu pháp lý của bất động sản.", "B": "Tự ý ký quyết định phê duyệt quy hoạch tỷ lệ 1/500 thay cho chính quyền địa phương đối với dự án phân phối độc quyền.", "C": "Yêu cầu cơ quan nhà nước cung cấp thông tin quy hoạch liên quan đến bất động sản.", "D": "Thu các loại phí dịch vụ từ khách hàng theo hợp đồng thỏa thuận."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc phê duyệt quy hoạch 1/500 thuộc thẩm quyền riêng biệt của cơ quan quản lý nhà nước. Người quản lý sàn chỉ có các quyền hạn nội bộ như điều hành, thu phí, yêu cầu thông tin và bồi thường thiệt hại."}, {"level": "1", "content": "Nội dung nào sau đây KHÔNG phải là một trong năm xu hướng chiến lược ưu tiên của các doanh nghiệp bất động sản trong giai đoạn tái cấu trúc (2024 - 2026)?", "options": {"A": "Tăng cường công tác quản trị tài chính và quản trị rủi ro.", "B": "Cắt giảm chi phí vận hành.", "C": "Loại bỏ hoàn toàn đội ngũ môi giới con người để thay thế bằng Trí tuệ nhân tạo (AI).", "D": "Đẩy mạnh đầu tư và phát triển ứng dụng công nghệ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Dựa trên Top 5 giải pháp ưu tiên, doanh nghiệp tập trung vào việc quản trị tài chính, cắt giảm chi phí, ứng dụng công nghệ, đào tạo nhân sự và tinh gọn bộ máy. Việc \"loại bỏ hoàn toàn\" con người không phải là một xu hướng được nêu ra, thay vào đó là đào tạo nhân sự thích ứng với kỷ nguyên số."}, {"level": "1", "content": "Yêu cầu tiên quyết về mặt giấy tờ pháp lý đối với loại hình \"Nhà chung cư, tòa nhà ở hình thành trong tương lai\" để đủ điều kiện kinh doanh huy động vốn qua sàn là gì?", "options": {"A": "Biên bản nghiệm thu đã hoàn thành xong phần móng và có văn bản thông báo đủ điều kiện bán của Sở Xây dựng.", "B": "Đã cất nóc dự án và hoàn thiện mặt ngoài.", "C": "Bản vẽ thiết kế ý tưởng kiến trúc sơ bộ.", "D": "Đã có giấy chứng nhận quyền sở hữu nhà ở (Sổ hồng) cấp cho từng căn hộ."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Đối với nhà ở hình thành trong tương lai, pháp luật yêu cầu khắt khe về việc phải có biên bản nghiệm thu đã hoàn thành phần móng, văn bản thông báo đủ điều kiện được bán của Sở Xây dựng và được ngân hàng thương mại cấp bảo lãnh tiến độ."}, {"level": "1", "content": "Cơ cấu tính lương hiệu quả công việc cho nhân viên kinh doanh trên sàn giao dịch bất động sản phổ biến thường được căn cứ trên chỉ số nào?", "options": {"A": "Trên tổng vốn đầu tư của dự án.", "B": "Trên tổng lợi nhuận ròng của toàn bộ công ty.", "C": "Dựa trên tỷ lệ phần trăm (%) lũy tiến trên Doanh thu môi giới mà nhân viên đó mang lại.", "D": "Trả lương cố định, không phụ thuộc vào doanh thu bán hàng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo quy chế lương thưởng hiệu quả, nhân viên kinh doanh thường được hưởng từ 10% đến 40% dựa trên căn cứ tính là \"Doanh thu môi giới\" theo hình thức tỷ lệ lũy tiến."}, {"level": "1", "content": "Khái niệm nào sau đây mô tả chính xác nhất về Sàn giao dịch bất động sản theo bài giảng?", "options": {"A": "Là nơi chỉ thực hiện việc ký kết hợp đồng mua bán bất động sản giữa chủ đầu tư và khách hàng.", "B": "Là nơi diễn ra các giao dịch bất động sản và cung cấp các dịch vụ cho kinh doanh bất động sản.", "C": "Là tổ chức tài chính chuyên cung cấp vốn cho các dự án bất động sản hình thành trong tương lai.", "D": "Là cơ quan quản lý nhà nước chịu trách nhiệm giám sát hoạt động môi giới nhà đất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sàn giao dịch bất động sản (Sàn) được định nghĩa là nơi diễn ra các giao dịch bất động sản và cung cấp các dịch vụ cho kinh doanh bất động sản."}, {"level": "1", "content": "Nền tảng nào sau đây là ví dụ điển hình của mô hình \"Sàn giao dịch bất động sản phi tập trung\" (Decentralized Platforms) ứng dụng công nghệ Blockchain?", "options": {"A": "Batdongsan.com.vn, Chotot.com.", "B": "Vinhomes Sales Gallery, Novaland Gallery.", "C": "RealT, Propy, RedSwan.", "D": "Airbnb, Luxstay, Booking.com."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Các nền tảng như \"RealT\", \"Propy\", \"RedSwan\" là ví dụ điển hình của Sàn giao dịch bất động sản phi tập trung sử dụng công nghệ Blockchain để mã hóa tài sản và giao dịch minh bạch."}, {"level": "1", "content": "Theo Điều 59 Luật Kinh doanh Bất động sản 2023, cá nhân tham gia giao dịch tại sàn có quyền nào sau đây đối với sàn giao dịch?", "options": {"A": "Yêu cầu sàn giao dịch bồi thường thiệt hại do lỗi của sàn gây ra.", "B": "Từ chối trả phí dịch vụ nếu giao dịch không mang lại tỷ suất lợi nhuận như kỳ vọng.", "C": "Yêu cầu cơ quan quản lý nhà nước thu hồi giấy phép của sàn bất cứ lúc nào.", "D": "Đơn phương thay đổi nội quy của sàn giao dịch để phù hợp với nhu cầu cá nhân."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 59 Luật Kinh doanh Bất động sản 2023, tổ chức, cá nhân tham gia sàn giao dịch có quyền yêu cầu sàn bồi thường thiệt hại do lỗi của sàn gây ra."}, {"level": "1", "content": "Sàn giao dịch bất động sản có nghĩa vụ niêm yết thông tin bất động sản như thế nào theo Luật Kinh doanh Bất động sản 2023?", "options": {"A": "Chỉ niêm yết các thông tin mang tính quảng cáo bề nổi để thu hút khách hàng.", "B": "Niêm yết, cung cấp đầy đủ, trung thực hồ sơ, thông tin về bất động sản và chịu trách nhiệm về thông tin đó.", "C": "Niêm yết thông tin sau khi đã giấu đi các yếu tố bất lợi liên quan đến quy hoạch.", "D": "Tự do niêm yết thông tin theo thỏa thuận bằng miệng với môi giới mà không cần xác thực."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 58 quy định sàn giao dịch có nghĩa vụ niêm yết, cung cấp đầy đủ, trung thực hồ sơ, thông tin về bất động sản và chịu trách nhiệm về tính xác thực của các thông tin này."}, {"level": "1", "content": "Sau khi Sở Xây dựng cấp Giấy phép hoạt động cho sàn giao dịch, thông tin của sàn sẽ được công bố công khai trên trang thông tin điện tử của cơ quan nào để đảm bảo tính minh bạch?", "options": {"A": "Bộ Tài nguyên và Môi trường.", "B": "Bộ Kế hoạch và Đầu tư.", "C": "Cục Quản lý nhà và thị trường bất động sản (Bộ Xây dựng).", "D": "Cổng thông tin Quốc gia về đăng ký doanh nghiệp."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo quy trình cấp phép, Sở Xây dựng sẽ báo cáo lên Cục Quản lý nhà và thị trường bất động sản (Bộ Xây dựng), sau đó Cục sẽ đưa thông tin của sàn lên Trang thông tin điện tử của Cục để công bố công khai."}, {"level": "1", "content": "Theo nguyên tắc quản lý rủi ro và pháp lý hiện hành, quy định nào sau đây là ĐÚNG khi thu tiền thanh toán mua nhà ở hình thành trong tương lai trước khi bàn giao nhà?", "options": {"A": "Được phép thu tối đa 95% giá trị hợp đồng ngay sau khi ký hợp đồng mua bán.", "B": "Không được thu quá 5% khi ký hợp đồng đặt cọc và tổng số tiền thu không quá 70% giá trị hợp đồng khi chưa bàn giao nhà.", "C": "Chủ đầu tư được tự do thỏa thuận tỷ lệ thu tiền với khách hàng mà không bị giới hạn trần pháp lý.", "D": "Khách hàng bắt buộc phải thanh toán 100% bằng tiền mặt để được nhận bàn giao nhà."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật quy định không được thu quá 5% khi ký hợp đồng cọc, khi ký Hợp đồng mua bán thu 30% (đã bao gồm cọc) và thu không quá 70% giá trị hợp đồng trước khi bàn giao nhà cho khách hàng."}, {"level": "1", "content": "Để thành lập văn phòng môi giới hoặc sàn giao dịch bất động sản hợp pháp, tổ chức/cá nhân cần đăng ký mã ngành kinh tế cấp 4 nào cho hoạt động \"Dịch vụ trung gian cho hoạt động bất động sản\"?", "options": {"A": "Mã ngành 6810.", "B": "Mã ngành 6910.", "C": "Mã ngành 6829.", "D": "Mã ngành 6821."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Mã ngành 6821 là mã quy định đối với \"Dịch vụ trung gian cho hoạt động bất động sản\", bao gồm đại lý bất động sản và môi giới bất động sản."}, {"level": "1", "content": "Việc sàn giao dịch bất động sản thực hiện báo cáo định kỳ dữ liệu giao dịch cho Sở Xây dựng thể hiện vai trò gì đối với thị trường?", "options": {"A": "Vai trò cung cấp thông tin cho các cơ quan quản lý Nhà nước để hỗ trợ giám sát.", "B": "Vai trò tạo ra \"bộ mặt\" chuyên nghiệp cho các chủ đầu tư.", "C": "Vai trò phân phối độc quyền sản phẩm nhằm thao túng giá cả.", "D": "Vai trò mở rộng quan hệ đối ngoại với các quỹ đầu tư quốc tế."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Việc báo cáo định kỳ và đột xuất về tình hình hoạt động, dữ liệu giao dịch nhằm hỗ trợ công tác quản lý và giám sát là chức năng \"Cung cấp thông tin cho các cơ quan quản lý nhà nước\" của sàn giao dịch."}, {"level": "1", "content": "Trong hoạt động môi giới và thương lượng, phong cách đàm phán \"Thắng - Thắng\" (Win - Win) được hiểu như thế nào?", "options": {"A": "Một bên đạt được toàn bộ lợi ích cốt lõi và bên kia phải chấp nhận thiệt thòi hoàn toàn.", "B": "Cả hai bên đều quan tâm đến lợi ích của nhau, hợp tác và cùng thu được lợi ích từ giao dịch.", "C": "Môi giới dùng quyền lực ép buộc được khách hàng mua sản phẩm với giá cao nhất có thể.", "D": "Cả hai bên đều từ bỏ hoàn toàn mục tiêu ban đầu để chọn một giải pháp thứ ba không liên quan."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phong cách đàm phán mà các bên cùng quan tâm đến lợi ích của nhau với tinh thần hợp tác và đều thu được lợi ích chính là bản chất của phong cách đàm phán \"Thắng - Thắng\"."}, {"level": "1", "content": "Trong mô hình ASK được sử dụng để đánh giá năng lực và tối ưu hóa hiệu suất làm việc của nhân sự, yếu tố \"K\" (Knowledge) đại diện cho điều gì?", "options": {"A": "Tư duy tích cực, động lực nội tại và tinh thần hợp tác nhóm.", "B": "Khả năng giải quyết vấn đề thực tiễn và kỹ năng giao tiếp.", "C": "Hiểu biết chuyên môn, nắm vững quy trình, kiến thức thị trường và khả năng học hỏi.", "D": "Trạng thái tâm lý an toàn và sự hài lòng với môi trường làm việc."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Trong mô hình ASK, K (Knowledge - Kiến thức) bao gồm sự hiểu biết chuyên môn, nắm vững quy trình, kiến thức thị trường và khả năng học hỏi liên tục."}, {"level": "1", "content": "Loại giấy tờ nào sau đây thuộc nhóm \"Hồ sơ pháp lý cơ bản\" liên quan trực tiếp đến dự án mà người môi giới bắt buộc phải kiểm tra kỹ lưỡng trước khi phân phối?", "options": {"A": "Hộ khẩu thường trú của người lao động tại dự án.", "B": "Bản quy hoạch chi tiết 1/500 và Quyết định giao đất của dự án.", "C": "Giấy đăng ký kết hôn của khách hàng mua nhà.", "D": "Sổ bảo hiểm xã hội của nhân viên môi giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Hồ sơ dự án quan trọng cần kiểm tra bao gồm các giấy tờ nền tảng như Quy hoạch 1/500 và Quyết định giao đất."}, {"level": "1", "content": "Để đủ điều kiện pháp lý đưa \"Nhà chung cư, tòa nhà ở hình thành trong tương lai\" vào kinh doanh ký hợp đồng mua bán, chủ đầu tư bắt buộc phải hoàn thành hạng mục thi công nào?", "options": {"A": "Đã cất nóc và hoàn thiện xong toàn bộ mặt ngoài của tòa nhà.", "B": "Đã hoàn thành xong phần móng (có Biên bản nghiệm thu móng).", "C": "Đã bàn giao chìa khóa cho ít nhất 50% số lượng khách hàng đặt cọc.", "D": "Đã thi công xong hệ thống tiện ích nội khu (hồ bơi, phòng gym)."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đối với nhà chung cư hình thành trong tương lai, quy định pháp luật bắt buộc phải có \"Biên bản nghiệm thu móng\" (chứng minh đã hoàn thành xong phần móng) mới đủ một trong các điều kiện mở bán."}, {"level": "1", "content": "Nghiệp vụ nào tại sàn giao dịch bất động sản có chức năng chuyên biệt là \"xác định giá trị thị trường của bất động sản dựa trên các phương pháp và tiêu chuẩn chuyên nghiệp\"?", "options": {"A": "Môi giới bất động sản.", "B": "Quản lý bất động sản.", "C": "Định giá bất động sản.", "D": "Đấu giá bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Dịch vụ \"Định giá bất động sản\" tại sàn có chức năng xác định giá trị thị trường của bất động sản dựa trên các phương pháp và tiêu chuẩn chuyên nghiệp, yêu cầu phải có Thẻ thẩm định viên về giá."}, {"level": "1", "content": "Việc công ty tạo ra \"sự cân bằng giữa công việc và cuộc sống\" (Work-Life Balance) cho đội ngũ nhân viên môi giới thuộc về nhóm động lực làm việc nào sau đây?", "options": {"A": "Bản thân (Self).", "B": "Lãnh đạo (Leadership).", "C": "Môi trường công việc (Environment).", "D": "Bản chất công việc (Job/Work)."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo sơ đồ động lực làm việc, yếu tố \"cân bằng công việc - cuộc sống\", \"an toàn tâm lý\", \"văn hóa cởi mở\" được xếp vào nhóm động lực từ Môi trường (Environment)."}, {"level": "1", "content": "Để đảm bảo tính minh bạch, thông tin về \"Giá cả & Giao dịch\" của bất động sản khi niêm yết trên sàn cần bao gồm những hạng mục cốt lõi nào?", "options": {"A": "Chỉ cần niêm yết giá bán tổng cộng, không cần liệt kê chi tiết các khoản phí phát sinh.", "B": "Giá bán, chuyển nhượng, thuê; phương thức thanh toán, tiến độ và các khoản phí, lệ phí liên quan.", "C": "Chỉ cần nêu mức chiết khấu phần trăm tối đa mà không cần công bố giá bán khởi điểm.", "D": "Giá bán ước tính và có quyền tự do thay đổi tùy ý sau khi khách hàng đã đặt cọc giữ chỗ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Tiêu chuẩn hóa thông tin bất động sản về \"Giá cả & Giao dịch\" yêu cầu phải minh bạch giá bán/thuê, phương thức thanh toán, tiến độ, cũng như các khoản phí và lệ phí liên quan."}, {"level": "1", "content": "Bắt đầu từ ngày 01/08/2024, cá nhân hành nghề môi giới bất động sản bắt buộc phải tuân thủ quy định nào sau đây để được coi là hoạt động hợp pháp?", "options": {"A": "Được phép hoạt động môi giới tự do nhưng phải đăng ký cấp mã số thuế cá nhân độc lập.", "B": "Phải làm việc trong một doanh nghiệp kinh doanh dịch vụ bất động sản (như sàn giao dịch, công ty môi giới).", "C": "Chỉ cần thi đỗ chứng chỉ hành nghề là được tự do mở văn phòng cá nhân mà không cần thành lập doanh nghiệp.", "D": "Phải nộp một khoản phí duy trì chứng chỉ hành nghề hàng năm cho Bộ Xây dựng để được miễn lập doanh nghiệp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quy định mới về hành nghề môi giới từ 01/08/2024 nghiêm cấm cá nhân hành nghề độc lập, tự do; yêu cầu bắt buộc phải chuyển đổi mô hình, làm việc trong một doanh nghiệp kinh doanh dịch vụ bất động sản."}, {"level": "1", "content": "Trong hoạt động marketing bất động sản, quá trình phân chia một thị trường tổng thể đa dạng thành các nhóm khách hàng nhỏ hơn có chung đặc điểm hoặc nhu cầu được gọi là gì?", "options": {"A": "Thâm nhập thị trường (Market Penetration).", "B": "Phát triển thị trường (Market Development).", "C": "Phân khúc thị trường (Market Segmentation).", "D": "Mở rộng thị phần (Market Share Expansion)."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Quá trình chia một thị trường toàn phần hoặc một khu vực thị trường thành những thị trường nhỏ, những nhóm khách hàng vì mục đích marketing được định nghĩa là \"Phân khúc thị trường\"."}, {"level": "1", "content": "Trong chiến lược phân phối và kinh doanh bất động sản, \"Marketing - mix\" (Phối thức tiếp thị) truyền thống bao gồm sự kết hợp của 4 yếu tố (4P) chủ yếu nào sau đây?", "options": {"A": "Sản phẩm (Product), Giá cả (Price), Phân phối (Place), Chiêu thị (Promotion).", "B": "Sản phẩm (Product), Giá cả (Price), Lợi nhuận (Profit), Con người (People).", "C": "Sản phẩm (Product), Quy trình (Process), Lợi nhuận (Profit), Chiêu thị (Promotion).", "D": "Con người (People), Sản phẩm (Product), Giá cả (Price), Bao bì (Packaging)."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Marketing - mix là sự phối hợp của 4P chủ yếu bao gồm: Sản phẩm, Giá cả, Phân phối, Chiêu thị (Product, Price, Place, Promotion)."}, {"level": "1", "content": "Theo chiến lược cạnh tranh, một doanh nghiệp bất động sản áp dụng chiến lược \"tạo ra lợi thế cạnh tranh với chi phí thấp\" sẽ tập trung vào hành động cốt lõi nào?", "options": {"A": "Tăng cường chi phí quảng bá trên truyền hình để tạo ra hình ảnh thương hiệu xa xỉ.", "B": "Tìm mua các nguồn lực đầu vào với giá tốt, quản trị vận hành với chi phí thấp để đem lại cho khách hàng chi phí thấp khi giao dịch.", "C": "Loại bỏ các sản phẩm đại chúng và chỉ tập trung bán bất động sản siêu sang có biên độ lợi nhuận cực lớn.", "D": "Tăng liên tục chiết khấu hoa hồng cho môi giới lên mức tối đa để chiếm lĩnh thị trường."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Chiến lược lợi thế cạnh tranh với chi phí thấp tập trung vào việc tìm mua các nguồn lực đầu vào, quản trị hoạt động với chi phí thấp nhằm đem lại cho khách hàng chi phí thấp trong mua và tiêu dùng bất động sản."}, {"level": "1", "content": "Theo quy định tại Điều 57 Luật Kinh doanh Bất động sản 2023, sàn giao dịch bất động sản có quyền hợp pháp để thực hiện hành động nào đối với khách hàng sử dụng dịch vụ?", "options": {"A": "Đóng thay tiền phạt vi phạm hành chính cho khách hàng.", "B": "Thu phí dịch vụ của khách hàng theo thỏa thuận đã ký kết trong hợp đồng.", "C": "Thuế thu nhập cá nhân tính trên giá trị giao dịch để nộp thẳng vào ngân sách nhà nước.", "D": "Lệ phí trước bạ thay cho cơ quan thuế địa phương mà không cần ủy quyền."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 57 quy định rõ quyền của sàn giao dịch bao gồm việc được quyền thu phí dịch vụ của khách hàng theo thỏa thuận (hợp đồng)."}, {"level": "1", "content": "Ông A là một cá nhân hành nghề môi giới tự do lâu năm tại khu vực TP.HCM. Tháng 10/2026, ông A muốn mở một văn phòng môi giới độc lập do cá nhân ông tự đứng tên hợp đồng dịch vụ và trực tiếp thu hoa hồng mà không thành lập công ty. Căn cứ theo Luật Kinh doanh Bất động sản 2023, hành vi của ông A sẽ bị xử lý như thế nào?", "options": {"A": "Hoàn toàn hợp pháp vì ông A chỉ quy mô nhỏ, không cần thành lập doanh nghiệp.", "B": "Bị xử phạt vi phạm hành chính và buộc phải thành lập doanh nghiệp kinh doanh dịch vụ bất động sản mới được tiếp tục hoạt động.", "C": "Chỉ cần đăng ký mã số thuế cá nhân và đóng thuế khoán 2% là đủ điều kiện hoạt động.", "D": "Ông A được quyền mở văn phòng miễn là nộp tiền ký quỹ 1 tỷ đồng tại Sở Xây dựng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo quy định mới áp dụng từ 01/08/2024, cá nhân hành nghề môi giới độc lập, tự do là không được phép. Môi giới bắt buộc phải thành lập hoặc làm việc trong một doanh nghiệp kinh doanh dịch vụ bất động sản; vi phạm sẽ bị xử phạt nặng và buộc thành lập doanh nghiệp."}, {"level": "1", "content": "Nhân viên môi giới B nhận ký gửi một căn nhà phố. B đã triển khai marketing, chạy quảng cáo và dẫn 5 khách hàng tiềm năng đến xem. Tuy nhiên, sau đó chủ nhà đổi ý và quyết định không bán nữa. B yêu cầu chủ nhà thanh toán khoản \"Thù lao môi giới\" theo hợp đồng dịch vụ đã ký, nhưng chủ nhà từ chối với lý do \"chưa chốt được giao dịch thì không trả tiền\". Dựa trên quy định pháp luật về dịch vụ bất động sản, nhận định nào sau đây là chính xác?", "options": {"A": "Chủ nhà đúng, vì luật quy định môi giới chỉ được nhận tiền khi giao dịch thành công.", "B": "Nhân viên B đúng, vì thù lao môi giới là khoản chi trả cho nỗ lực công việc theo thỏa thuận, hoàn toàn không phụ thuộc vào kết quả giao dịch có thành công hay không.", "C": "Chủ nhà chỉ phải trả 50% thù lao theo nguyên tắc chia sẻ rủi ro kinh doanh.", "D": "Nhân viên B chỉ được nhận \"Hoa hồng\", không được nhận \"Thù lao\" vì đây là giao dịch thứ cấp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thù lao môi giới bất động sản khác với hoa hồng ở chỗ thù lao không phụ thuộc vào kết quả giao dịch mua bán có thành công hay không, mà dựa trên thỏa thuận về công sức người môi giới đã bỏ ra trong hợp đồng."}, {"level": "1", "content": "Một khách hàng (gia đình 4 người) có tổng thu nhập cố định là 35 triệu đồng/tháng và chi phí sinh hoạt cứng là 20 triệu đồng. Khách hàng dự định vay mua căn hộ và gói vay yêu cầu trả góp (gốc + lãi) 14 triệu đồng/tháng. Đứng ở góc độ chuyên gia tư vấn tài chính bất động sản, bạn sẽ phân tích và đưa ra lời khuyên gì?", "options": {"A": "Hoàn toàn nên mua vì dòng tiền thu nhập (35 triệu) vẫn lớn hơn số tiền trả góp (14 triệu).", "B": "Không nên mua vì tỷ lệ Nợ/Thu nhập (DTI) lên tới 40%, đồng thời vùng đệm tài chính sau khi trừ chi phí sinh hoạt và trả nợ chỉ còn 1 triệu đồng/tháng, rủi ro vỡ nợ rất cao.", "C": "Nên mua vì chắc chắn giá nhà sẽ tăng 50% trong năm sau, bù đắp được rủi ro tài chính.", "D": "Bắt buộc phải vay thêm tín chấp bên ngoài để trang trải sinh hoạt phí hàng tháng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trong tư vấn tài chính mua nhà, việc phân tích dòng tiền là bắt buộc. Tỷ lệ Nợ/Thu nhập an toàn nên dưới 40%, nhưng quan trọng hơn là vùng đệm tài chính (Số dư = Tổng thu - Chi phí sinh hoạt - Trả nợ) phải đủ để dự phòng. Với 35 - 20 - 14 = 1 triệu/tháng, vùng đệm quá mỏng đối với gia đình 4 người, tiềm ẩn rủi ro lớn."}, {"level": "1", "content": "Trong quá trình thương lượng giá một căn nhà, khách mua và chủ bán chênh lệch nhau đúng 20 triệu đồng và nhất quyết không bên nào chịu nhượng bộ, giao dịch đứng trước nguy cơ đổ vỡ. Là một nhà môi giới chuyên nghiệp mong muốn áp dụng chiến thuật \"Thắng - Thắng\" (Win - Win), bạn nên xử lý tình huống này như thế nào?", "options": {"A": "Hủy giao dịch và tìm một khách hàng mới để tránh làm mất thời gian của đôi bên.", "B": "Ép khách mua phải chịu khoản chênh lệch vì nhà khu vực này đang hiếm.", "C": "Phân tích lợi ích tổng thể của thương vụ cho hai bên, thuyết phục mỗi bên nhượng bộ một phần, hoặc môi giới có thể cân nhắc hỗ trợ một phần nhỏ từ hoa hồng để dung hòa lợi ích và chốt giao dịch.", "D": "Trực tiếp mắng khách hàng vì sự cứng nhắc và yêu cầu họ phải hành xử linh hoạt hơn."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Chiến thuật đàm phán Thắng - Thắng (Win - Win) tập trung vào việc tạo ra giải pháp đôi bên cùng có lợi, dung hòa lập trường. Việc môi giới hỗ trợ hoặc phân tích để hai bên nhượng bộ là giải pháp thực tế để cứu vãn giao dịch cận đích."}, {"level": "1", "content": "Sàn giao dịch XYZ bị cơ quan quản lý nhà nước ra quyết định thu hồi Giấy phép hoạt động do vi phạm nghiêm trọng. Ngay sau khi nhận quyết định, Giám đốc sàn tuyên bố với khách hàng rằng \"Sàn đã bị đóng cửa nên mọi hợp đồng dịch vụ tư vấn đang dang dở đương nhiên bị vô hiệu và sàn không chịu trách nhiệm\". Tuyên bố của Giám đốc sàn là đúng hay sai về mặt pháp lý?", "options": {"A": "Đúng, khi giấy phép bị thu hồi thì mọi tư cách pháp nhân tự động chấm dứt ngay lập tức.", "B": "Sai, trong vòng 60 ngày kể từ ngày bị thu hồi, sàn vẫn phải hoàn thành nghĩa vụ thuế, thanh toán nợ và thỏa thuận xử lý dứt điểm các hợp đồng dịch vụ chưa thực hiện xong với khách hàng.", "C": "Đúng, nhưng sàn phải hoàn lại toàn bộ 100% tiền phí dịch vụ trong vòng 24 giờ.", "D": "Sai, sàn vẫn được tiếp tục ký hợp đồng mới trong thời gian chờ giải thể."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo quy định, khi bị thu hồi giấy phép, trong thời hạn 60 ngày, sàn giao dịch có nghĩa vụ phải nộp đủ thuế, thanh toán khoản nợ, hoàn tất chấm dứt hợp đồng lao động và thỏa thuận với khách hàng về việc xử lý các hợp đồng dịch vụ chưa thực hiện xong."}, {"level": "1", "content": "Chủ đầu tư dự án căn hộ cao cấp H đang gặp khó khăn về dòng tiền và muốn bán nhanh sản phẩm. Họ triển khai chiến dịch chi tiền rầm rộ trên truyền hình, mạng xã hội để quảng bá uy tín thương hiệu và chất lượng sống vượt trội nhằm thay đổi nhận thức và lôi kéo trực tiếp người mua nhà. Động thái này của chủ đầu tư phản ánh chiến lược Marketing nào?", "options": {"A": "Chiến lược Đẩy (Push Strategy).", "B": "Chiến lược Kéo (Pull Strategy).", "C": "Chiến lược Khác biệt hóa sản phẩm.", "D": "Chiến lược Thâm nhập thị trường."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Chiến lược \"Kéo\" trong kinh doanh bất động sản được hiểu là truyền tải thông tin do chủ đầu tư thực hiện nhằm gây ảnh hưởng tới thái độ, hành vi và nhận thức của trực tiếp người mua (kéo khách hàng về phía sản phẩm)."}, {"level": "1", "content": "Một khách hàng kinh doanh phá sản, cần tiền gấp nên chấp nhận bán tháo căn biệt thự với giá 15 tỷ đồng (trong khi giá giao dịch phổ biến của các căn tương đương trong khu vực là 22 tỷ đồng). Khi bộ phận Thẩm định giá của sàn giao dịch thu thập dữ liệu thị trường, họ có nên sử dụng mức giá 15 tỷ này làm chuẩn so sánh để định giá các bất động sản khác không?", "options": {"A": "Có, vì đây là giao dịch thực tế đã diễn ra trên thị trường nên hoàn toàn hợp lệ.", "B": "Có, vì giá trị bất động sản luôn biến động theo thời gian thực.", "C": "Không, vì đây là \"bất động sản buộc phải bán\" (bán trong điều kiện không bình thường, gượng ép), do đó không phản ánh đúng giá trị thị trường khách quan.", "D": "Không, vì bất động sản này chưa được cấp chứng thư bảo lãnh từ ngân hàng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Giá trị bất động sản buộc phải bán (người bán phải bán một cách gượng ép, trong điều kiện không bình thường) không được xem là tiêu chuẩn để phản ánh giá trị thị trường khách quan."}, {"level": "1", "content": "Công ty Cổ phần Alpha ký hợp đồng thuê mặt bằng 120m2 làm trụ sở và đăng ký mã ngành 6821. Công ty tuyển dụng 5 nhân viên kinh doanh rất xuất sắc nhưng chưa ai thi lấy chứng chỉ hành nghề môi giới. Giám đốc công ty là người có chứng chỉ quản lý sàn nhưng cũng không có chứng chỉ hành nghề môi giới. Theo Luật KDBĐS 2023, cơ cấu nhân sự này có đủ điều kiện xin cấp phép hoạt động sàn giao dịch không?", "options": {"A": "Đủ điều kiện, vì đã có Giám đốc có chứng chỉ quản lý sàn và mặt bằng kinh doanh hợp pháp.", "B": "Đủ điều kiện, vì chỉ cần đóng thuế đầy đủ là được cấp phép.", "C": "Không đủ điều kiện, vì luật bắt buộc người quản lý, điều hành sàn phải có chứng chỉ hành nghề môi giới bất động sản và doanh nghiệp phải có ít nhất 01 cá nhân có chứng chỉ này.", "D": "Không đủ điều kiện, vì luật yêu cầu toàn bộ 100% nhân viên kinh doanh phải có chứng chỉ hành nghề môi giới ngay khi thành lập."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 69 Luật KDBĐS 2023 yêu cầu bắt buộc doanh nghiệp quản lý sàn phải có ít nhất 01 người có chứng chỉ hành nghề môi giới, đồng thời người quản lý điều hành sàn cũng phải sở hữu chứng chỉ hành nghề môi giới bất động sản."}, {"level": "1", "content": "Do tình hình vĩ mô biến động, Sàn giao dịch Beta quyết định tự tạm ngừng hoạt động 6 tháng để tối ưu hóa chi phí. Ban Giám đốc chỉ đạo bộ phận hành chính gửi báo cáo bằng văn bản cho Sở Xây dựng trước 3 ngày trước khi chính thức đóng cửa văn phòng. Quy trình này có tuân thủ đúng pháp luật về kinh doanh dịch vụ bất động sản không?", "options": {"A": "Tuân thủ đúng, pháp luật chỉ yêu cầu thông báo trước 24 giờ.", "B": "Vi phạm, sàn giao dịch không được phép tự ý tạm ngừng hoạt động trong bất kỳ hoàn cảnh nào.", "C": "Vi phạm, quy định bắt buộc sàn phải báo cáo bằng văn bản về việc tự tạm ngừng hoạt động chậm nhất 10 ngày làm việc trước ngày tạm ngừng.", "D": "Vi phạm, sàn phải xin ý kiến trực tiếp của Bộ Xây dựng và chờ phê duyệt mới được tạm ngừng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Quy trình thủ tục tự tạm ngừng hoạt động yêu cầu sàn giao dịch phải báo cáo bằng văn bản cho cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh chậm nhất 10 ngày làm việc trước ngày tạm ngừng."}, {"level": "1", "content": "Dự án khu phức hợp K đang trong giai đoạn đào đất và ép cọc nhồi, chưa có Biên bản nghiệm thu phần móng. Mặc dù vậy, Chủ đầu tư vẫn yêu cầu Sàn giao dịch độc quyền mở bán và cho khách hàng ký \"Hợp đồng mua bán nhà ở hình thành trong tương lai\" thu 30% giá trị. Với tư cách là Giám đốc Sàn giao dịch, hành động chuẩn mực về mặt pháp lý bạn cần thực hiện là gì?", "options": {"A": "Lập tức triển khai mở bán để thu dòng tiền nhanh cho chủ đầu tư.", "B": "Đổi tên \"Hợp đồng mua bán\" thành \"Hợp đồng đặt cọc\" và vẫn thu 30%.", "C": "Từ chối đưa dự án lên sàn để ký Hợp đồng mua bán, vì bất động sản này chưa đủ điều kiện kinh doanh (chưa hoàn thành nghiệm thu móng và chưa có thông báo của cơ quan nhà nước).", "D": "Cho phép mở bán nhưng giấu thông tin tiến độ móng đối với khách hàng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đối với nhà chung cư hình thành trong tương lai, quy định pháp lý yêu cầu bắt buộc phải có biên bản nghiệm thu đã hoàn thành xong phần móng và thông báo đủ điều kiện bán của cơ quan nhà nước. Sàn có nghĩa vụ từ chối các sản phẩm không đủ điều kiện kinh doanh."}, {"level": "1", "content": "Khi ký gửi nhà phố tại Sàn giao dịch, khách hàng A (chủ nhà) kiên quyết không cung cấp bản sao Sổ hồng và Giấy tờ tùy thân vì lý do \"sợ lộ thông tin cá nhân và sợ bị lừa đảo\". Nhân viên lấy lý do khách hàng khó tính để yêu cầu Giám đốc sàn cho phép đăng tin niêm yết mà không cần giấy tờ. Theo quy chế và nghĩa vụ quản lý sàn, Giám đốc phải xử lý ra sao?", "options": {"A": "Đồng ý niêm yết ngay để không mất lòng khách hàng.", "B": "Tự tạo ra một bộ hồ sơ giả để hợp thức hóa việc niêm yết trên hệ thống.", "C": "Từ chối niêm yết bất động sản này; giải thích rõ cho khách hàng quy định pháp luật yêu cầu sàn phải kiểm tra tính pháp lý và có hồ sơ đầy đủ, trung thực mới được đưa lên giao dịch.", "D": "Báo cáo cơ quan công an bắt giữ khách hàng vì nghi ngờ gian lận."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Sàn giao dịch có quyền yêu cầu khách hàng cung cấp hồ sơ, thông tin về bất động sản và có nghĩa vụ bảo đảm bất động sản đưa lên sàn phải đủ điều kiện, hồ sơ pháp lý rõ ràng. Sàn có quyền từ chối niêm yết nếu không đáp ứng điều kiện này."}, {"level": "1", "content": "Theo Hợp đồng mua bán đã ký, thời điểm dự kiến bàn giao căn hộ là tháng 12/2026. Tuy nhiên, vào tháng 08/2026, khách hàng đi ngang qua dự án thấy mặt ngoài tòa nhà đã sơn xong nên quyết liệt gửi đơn yêu cầu Chủ đầu tư phải bàn giao nhà ngay lập tức để làm nội thất. Yêu cầu của khách hàng có phù hợp với quy định pháp luật không?", "options": {"A": "Hoàn toàn phù hợp, khách hàng có quyền nhận nhà bất cứ khi nào thấy dự án đã cất nóc.", "B": "Phù hợp, vì người mua luôn là \"thượng đế\" và chủ đầu tư phải chiều theo.", "C": "Không phù hợp. Bên mua không có quyền ép buộc bên bán hoàn thành các thủ tục giao nhà trước thời hạn đã được hai bên thỏa thuận trong hợp đồng.", "D": "Không phù hợp, trừ khi khách hàng đóng thêm 20% phí phạt giao nhà sớm."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Trường hợp bên mua yêu cầu bên bán hoàn thành các thủ tục giao nhà trước thời hạn đã thỏa thuận trong hợp đồng (khi không có sự đồng thuận sửa đổi hợp đồng của bên bán) là sai nguyên tắc thực hiện hợp đồng."}, {"level": "1", "content": "Sàn giao dịch M (thuộc diện doanh nghiệp nhỏ) nhận phân phối độc quyền một dự án biệt thự. Cuối năm, sàn ghi nhận tổng doanh thu từ hoa hồng dịch vụ môi giới là 2 tỷ đồng. Bỏ qua các chi phí được trừ, quy định về tỷ suất Thuế Thu nhập doanh nghiệp (TNDN) cơ bản mà sàn M phải tuân thủ để tính thuế là bao nhiêu?", "options": {"A": "2% trên tổng doanh thu.", "B": "10% trên tổng doanh thu.", "C": "20% trên thu nhập chịu thuế.", "D": "35% trên thu nhập chịu thuế."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đối với doanh nghiệp quản lý sàn giao dịch (quy mô nhỏ), biểu thuế Thu nhập doanh nghiệp (TNDN) áp dụng là 20%, cùng với Thuế Giá trị gia tăng (VAT) 10% trên doanh thu dịch vụ."}, {"level": "1", "content": "Trong một thương vụ, chuyên viên môi giới K tìm được một lô đất ngộp bán giá cực rẻ. K quyết định tự mình đứng tên làm hợp đồng mua luôn lô đất đó, đồng thời K cũng chính là người đại diện sàn làm môi giới cho lô đất này để nhận luôn phần hoa hồng chủ nhà hứa trả. Theo quy định pháp luật về hành nghề, hành vi của K bị đánh giá thế nào?", "options": {"A": "Rất thông minh và nhạy bén trong kinh doanh, hoàn toàn hợp pháp.", "B": "Hợp pháp miễn là K chia lại một nửa hoa hồng cho chủ nhà.", "C": "Vi phạm pháp luật, vì bên môi giới không được phép đồng thời là bên mua hoặc bên bán trong cùng một giao dịch môi giới do chính mình thực hiện.", "D": "Chỉ vi phạm đạo đức nghề nghiệp chứ không vi phạm quy định pháp luật."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật nghiêm cấm hành vi xung đột lợi ích: Bên môi giới không được đồng thời là bên bán hoặc bên mua trong cùng một giao dịch môi giới."}, {"level": "1", "content": "Trưởng phòng Marketing của Sàn giao dịch L tung chiến dịch chạy quảng cáo dự án căn hộ với tiêu đề: \"Chỉ cần 0 đồng sở hữu nhà sang, Cam kết mua lại sinh lời 100% sau 1 tháng\", trong khi thực tế chính sách của CĐT yêu cầu thanh toán trước 30% và hoàn toàn không có điều khoản cam kết mua lại. Xét trên nguyên tắc thông tin bất động sản, hành động này vi phạm tiêu chuẩn nào?", "options": {"A": "Vi phạm tính chính xác, trung thực của thông tin hàng hóa, vi phạm Luật Quảng cáo vì gây nhầm lẫn nghiêm trọng cho khách hàng.", "B": "Không vi phạm gì vì đây chỉ là thủ thuật \"nói quá\" trong marketing để thu hút data khách hàng.", "C": "Chỉ vi phạm nội quy nội bộ của sàn chứ không vi phạm pháp luật.", "D": "Hợp pháp nếu dòng chữ đính chính được in siêu nhỏ ở cuối trang web."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Thông tin về bất động sản và quảng cáo bất động sản phải đảm bảo tính chính xác, trung thực, cập nhật, không được gây nhầm lẫn và phải tuân thủ nghiêm ngặt Luật Quảng cáo."}, {"level": "1", "content": "Theo quy chế chi trả thu nhập của Sàn G, nhân viên kinh doanh được hưởng lương cơ bản 6 triệu/tháng và mức hoa hồng lũy tiến là 15% trên doanh thu môi giới mang về. Trong tháng 9, nhân viên N môi giới thành công 2 căn hộ, mang về cho sàn 200 triệu đồng doanh thu môi giới. Tổng thu nhập trước thuế của N trong tháng 9 được tính như thế nào?", "options": {"A": "6 triệu + (15% x 200 triệu) = 36 triệu đồng.", "B": "6 triệu + 200 triệu = 206 triệu đồng.", "C": "Chỉ nhận 15% x 200 triệu = 30 triệu đồng (không có lương cơ bản vì đã có hoa hồng).", "D": "(6 triệu + 200 triệu) x 15% = 30.9 triệu đồng."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Dựa trên cơ cấu tính lương hiệu quả công việc, tổng thu nhập = Lương cơ bản + Lương hiệu quả (Tỷ lệ % hoa hồng x Doanh thu môi giới). Vậy thu nhập của N = 6 + (15% x 200) = 36 triệu đồng."}, {"level": "1", "content": "Nhận phân phối một dự án \"Nhà ở xã hội\", Giám đốc sàn giao dịch chỉ đạo phòng Marketing tập trung ngân sách thiết lập tệp khách hàng quảng cáo (Targeting) hẹp vào nhóm công nhân các khu công nghiệp, người lao động tự do có thu nhập thấp thay vì chạy quảng cáo đại trà. Quyết định chiến lược này thể hiện bước nào trong Marketing bất động sản?", "options": {"A": "Xây dựng thương hiệu định vị cao cấp.", "B": "Thâm nhập thị trường quốc tế.", "C": "Phân khúc thị trường và lựa chọn thị trường mục tiêu phù hợp với đặc thù sản phẩm.", "D": "Định giá sản phẩm hớt váng (Skimming)."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Việc chia nhỏ thị trường và chỉ tập trung nguồn lực vào một nhóm khách hàng cụ thể có nhu cầu và khả năng tài chính phù hợp (công nhân, người thu nhập thấp mua nhà ở xã hội) chính là quá trình \"Phân khúc thị trường và chọn thị trường mục tiêu\"."}, {"level": "1", "content": "Một khách hàng nóng giận xông vào văn phòng sàn giao dịch, to tiếng phàn nàn vì cho rằng nhân viên tư vấn đã giấu giếm thông tin về đường điện cao thế gần dự án. Dựa trên kỹ năng chăm sóc và xử lý khiếu nại khách hàng, hành động ĐẦU TIÊN mà quản lý sàn cần thực hiện là gì?", "options": {"A": "Lập tức tranh cãi và đưa ra bằng chứng hợp đồng để bảo vệ nhân viên của mình.", "B": "Lắng nghe chăm chú, đầy vẻ thông cảm, tuyệt đối không ngắt lời để khách hàng giải tỏa cảm xúc.", "C": "Gọi bảo vệ đuổi khách hàng ra ngoài vì gây mất trật tự.", "D": "Bồi thường ngay bằng tiền mặt để khách hàng im lặng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nguyên tắc đầu tiên và quan trọng nhất trong việc xử lý phàn nàn/khiếu nại của khách hàng là: \"Lắng nghe chăm chú, đầy vẻ thông cảm, không ngắt lời\" để thấu hiểu sự việc và giúp khách hàng hạ nhiệt cảm xúc trước khi đi vào giải quyết."}, {"level": "1", "content": "Trong quá trình đàm phán chốt giao dịch, bạn nhận thấy khách hàng của mình là người rất để tâm đến cảm xúc của những người xung quanh, tỏ ra khó xử, ái ngại khi xảy ra bất đồng quan điểm về giá cả với chủ nhà và liên tục gọi điện tham khảo ý kiến gia đình trước khi quyết định. Phân tích theo trắc nghiệm tính cách MBTI, vị khách này nghiêng về nhóm xu thế nào và bạn nên ứng xử ra sao?", "options": {"A": "Lý trí (Thinking) - Cần đưa ra các bảng biểu số liệu thống kê khô khan để ép khách chốt.", "B": "Tình cảm (Feeling) - Cần tiếp cận bằng sự đồng cảm, ôn hòa, giúp họ gỡ rối cảm xúc và tránh ép buộc tạo ra xung đột.", "C": "Nguyên tắc (Judging) - Đưa ra các ranh giới thời hạn cứng nhắc để đe dọa khách.", "D": "Linh hoạt (Perceiving) - Bỏ mặc khách tự quyết định."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Người quan tâm đến cảm xúc, nhạy cảm, khó xử khi có xung đột và hay tham khảo số đông thuộc xu thế \"Tình cảm (Feeling - F)\" trong MBTI. Cách tiếp cận tốt nhất là đồng cảm và tạo bầu không khí hài hòa, tránh đàm phán kiểu \"cứng\" gây áp lực tâm lý."}, {"level": "1", "content": "Ông M mang Sổ hồng đến Sàn giao dịch để ký gửi bán lô đất. Tuy nhiên, trên Sổ hồng ghi tên cả hai vợ chồng ông M và bà N. Ông M khẳng định mình có toàn quyền định đoạt vì bà N hiện đang đi công tác xa không về được. Để việc nhận ký gửi và giao dịch sau này hợp pháp, tránh rủi ro pháp lý cho sàn, bạn phải yêu cầu ông M cung cấp thêm giấy tờ gì?", "options": {"A": "Giấy chứng nhận tình trạng hôn nhân độc thân của ông M.", "B": "Không cần giấy tờ gì thêm, Sổ hồng do ai giữ thì người đó có quyền bán.", "C": "Hợp đồng ủy quyền hợp pháp (có công chứng/chứng thực) của bà N đồng ý cho ông M định đoạt/bán tài sản chung.", "D": "Bản cam kết viết tay của ông M tự chịu trách nhiệm trước pháp luật."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Tài sản chung đứng tên cả hai người thì khi giao dịch bắt buộc phải có sự đồng thuận của cả hai. Nếu một người vắng mặt, người còn lại chỉ có quyền giao dịch khi có Văn bản ủy quyền hợp pháp được công chứng/chứng thực từ người kia."}, {"level": "1", "content": "Một khách hàng (thu nhập ròng 30 triệu VNĐ/tháng) muốn mua một căn hộ trị giá 3 tỷ VNĐ. Ngân hàng hỗ trợ vay tối đa 70% giá trị với lãi suất 10%/năm, thời hạn 15 năm (trả góp đều gốc và lãi hàng tháng). Khách hàng đã có sẵn 1 tỷ VNĐ vốn tự có. Đứng ở góc độ chuyên gia tư vấn tài chính bất động sản, bạn đánh giá phương án này như thế nào?", "options": {"A": "Hoàn toàn khả thi vì khách hàng đã có sẵn 30% vốn tự có để đóng đối ứng ban đầu.", "B": "Không khả thi và rủi ro cực cao, vì số tiền trả góp hàng tháng (gốc + lãi) lên tới khoảng 29,1 triệu VNĐ, khiến tỷ lệ Nợ/Thu nhập (DTI) vượt quá 90%, phá vỡ mức an toàn tài chính.", "C": "Khả thi nếu khách hàng rút ngắn thời gian vay xuống còn 5 năm để giảm bớt gánh nặng lãi suất ngân hàng.", "D": "Không khả thi vì luật quy định người mua nhà lần đầu phải có tối thiểu 50% vốn tự có."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phân tích dòng tiền: Vốn vay 70% của 3 tỷ = 2,1 tỷ VNĐ. Tiền gốc hàng tháng = 2,1 tỷ / 180 tháng ~ 11,6 triệu. Lãi tháng đầu = 2,1 tỷ * 10% / 12 ~ 17,5 triệu. Tổng trả tháng đầu ~ 29,1 triệu VNĐ. Với thu nhập 30 triệu, DTI = 97%, vượt xa mức an toàn (tỷ lệ vàng là ~ 33% - 40%), khách hàng gần như không còn vùng đệm tài chính để sinh hoạt."}, {"level": "1", "content": "Sàn giao dịch X nhận thẩm định giá một tòa nhà thương mại cho một khách hàng đang đứng trước nguy cơ phá sản và cần bán gấp trong 3 ngày để trả nợ. Mặc dù dữ liệu thị trường cho thấy tài sản tương đương đang giao dịch ở mức 50 tỷ đồng, thẩm định viên của sàn lại cấp chứng thư định giá tài sản này ở mức 35 tỷ đồng và ghi chú đây là \"Giá trị thị trường\". Hành vi định giá này đúng hay sai về mặt học thuật và pháp lý?", "options": {"A": "Đúng, vì thẩm định viên có quyền chiết khấu 30% cho các tài sản thương mại có diện tích lớn.", "B": "Sai, vì giá trị của bất động sản buộc phải bán (bán gượng ép, không bình thường) không phản ánh đúng \"Giá trị thị trường\" khách quan.", "C": "Đúng, vì giao dịch cần thực hiện nhanh trong 3 ngày nên giá trị thị trường tự động giảm xuống.", "D": "Sai, vì sàn giao dịch bất động sản không có thẩm quyền định giá tài sản trên 10 tỷ đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Giá trị bất động sản trong điều kiện buộc phải bán (người bán bị ép buộc tài chính, thời gian tiếp thị quá ngắn) không phản ánh đúng giá trị thị trường khách quan vốn đòi hỏi điều kiện giao dịch bình thường, người bán và người mua tự nguyện."}, {"level": "1", "content": "Giám đốc Sàn giao dịch Beta nhận thấy đội ngũ kinh doanh không đạt chỉ tiêu 3 tháng liên tiếp. Ông tiến hành thiết kế một chương trình đào tạo kỹ năng mới, điều chỉnh lại cơ cấu hoa hồng, áp dụng vào thực tế và sau đó theo dõi sát sao bảng báo cáo kết quả kinh doanh hàng tuần để xem xét mức độ cải thiện. Việc \"theo dõi sát sao bảng báo cáo để xem xét mức độ cải thiện\" đang phản ánh bước nào trong chu trình quản lý PDCA?", "options": {"A": "Plan (Kế hoạch).", "B": "Do (Thực hiện).", "C": "Check (Kiểm tra).", "D": "Act (Hành động/Cải tiến)."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Trong mô hình PDCA, bước \"Check\" (Kiểm tra) là việc đánh giá kết quả, so sánh với mục tiêu ban đầu và xác định các sai lệch sau khi đã triển khai (Do) các giải pháp mới."}, {"level": "1", "content": "Chủ đầu tư dự án khu đô thị sinh thái cao cấp quyết định không chạy quảng cáo truyền hình đại trà. Thay vào đó, họ yêu cầu Sàn phân phối tổ chức các buổi tiệc kín (private events) kết hợp đánh golf, chỉ gửi giấy mời đích danh đến các CEO, chủ doanh nghiệp lớn và truyền tải thông điệp về một \"đẳng cấp sống khác biệt\". Chiến lược tiếp thị này đang ứng dụng mô hình nào?", "options": {"A": "Chiến lược Marketing đại trà kết hợp chiến lược Đẩy (Push).", "B": "Chiến lược phân khúc thị trường và tập trung vào nhóm khách hàng trọng giá trị, áp dụng chiến lược Kéo (Pull) bằng các dịch vụ cá nhân hóa.", "C": "Chiến lược Marketing du kích với chi phí thấp nhất có thể.", "D": "Chiến lược Thâm nhập thị trường bằng cách giảm giá bán."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Hành động chia nhỏ thị trường, lọc ra tệp khách hàng CEO/chủ doanh nghiệp (có khả năng tài chính cao, trọng giá trị và tiện lợi) và tiếp cận bằng các thông điệp, sự kiện đẳng cấp chính là chiến lược phân khúc và chọn thị trường mục tiêu, đồng thời dùng chiến lược \"Kéo\" để tác động trực tiếp đến nhận thức của giới tinh hoa."}, {"level": "1", "content": "Trong một cuộc đàm phán mua lại quỹ đất dự án, đại diện bên mua đưa ra một mức giá cực kỳ thấp và tuyên bố với thái độ gay gắt: \"Nếu không đồng ý giá này, chúng tôi sẽ hủy đàm phán ngay lập tức\". Thay vì đáp trả gay gắt hay vội vàng nhượng bộ, người đại diện của Sàn (bên bán) bình tĩnh yêu cầu bên mua giải thích rõ các cơ sở dữ liệu và phép tính nào khiến họ đưa ra mức giá đó. Người đại diện Sàn đang áp dụng phương pháp đàm phán nào?", "options": {"A": "Đàm phán kiểu cứng (Thắng - Thua).", "B": "Đàm phán kiểu mềm (Thua - Thắng).", "C": "Đàm phán nguyên tắc (Ôn hòa với người, cứng rắn với công việc).", "D": "Trốn tránh xung đột."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Phương pháp đàm phán nguyên tắc tập trung vào tiêu chuẩn khách quan (yêu cầu đối tác đưa ra cơ sở dữ liệu, phép tính) thay vì bị cuốn vào áp lực cảm xúc hay lập trường cá nhân. Phương pháp này \"ôn hòa với người\" nhưng \"cứng rắn với công việc\"."}, {"level": "1", "content": "Sàn giao dịch Alpha ký hợp đồng phân phối độc quyền 100 căn hộ cho Chủ đầu tư. Lợi dụng sức nóng của dự án, Giám đốc sàn chỉ đạo nhân viên thu thêm 50 triệu đồng/căn tiền \"phí dịch vụ tư vấn chọn căn đẹp\" bằng tiền mặt trực tiếp từ khách hàng, không ghi vào hợp đồng mua bán và không xuất hóa đơn VAT. Xét theo luật định và nguyên tắc quản lý, hành vi này vi phạm yếu tố cốt lõi nào?", "options": {"A": "Không vi phạm vì đây là quan hệ dân sự tự nguyện giữa khách hàng và nhân viên môi giới.", "B": "Vi phạm nguyên tắc công khai, minh bạch thông tin giá cả, có dấu hiệu \"kê giá\" ăn chênh lệch và trốn tránh nghĩa vụ thuế đối với Nhà nước.", "C": "Chỉ vi phạm nội quy của Chủ đầu tư nếu CĐT cấm bán chênh giá.", "D": "Vi phạm vì số tiền 50 triệu này bắt buộc phải nộp 100% cho Sở Xây dựng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật quy định sàn giao dịch phải bảo đảm công khai, minh bạch về giá cả, không được phép có tình trạng \"kê giá\" ăn chênh lệch không rõ ràng, đồng thời phải thực hiện đầy đủ nghĩa vụ nộp thuế cho Nhà nước đối với mọi khoản thu."}, {"level": "1", "content": "Một nhà đầu tư tham khảo ý kiến của bạn về việc mua một căn hộ trị giá 4 tỷ VNĐ để cho thuê. Giá thuê dự kiến thu về là 18 triệu VNĐ/tháng, phí quản lý và bảo trì tốn khoảng 2 triệu VNĐ/tháng. Biết rằng lãi suất tiền gửi ngân hàng hiện tại là 6%/năm. Xét ĐƠN THUẦN về bài toán dòng tiền (không tính lãi vốn tăng giá bất động sản), bạn sẽ tư vấn cho khách hàng như thế nào?", "options": {"A": "Tỷ suất lợi nhuận dòng tiền (ROI) là 4,8%/năm, thấp hơn lãi suất ngân hàng (6%), do đó xét thuần về dòng tiền hiện tại đây không phải là phương án sinh lời tối ưu.", "B": "Tỷ suất lợi nhuận dòng tiền (ROI) là 5,4%/năm, xấp xỉ ngân hàng nên đây là khoản đầu tư rất tốt.", "C": "Tỷ suất lợi nhuận dòng tiền là 7,2%/năm, cao hơn ngân hàng nên chắc chắn phải đầu tư ngay.", "D": "Bất động sản luôn luôn tạo ra dòng tiền dương vô hạn nên không cần so sánh với lãi suất ngân hàng."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Dòng tiền thuần hàng tháng = 18 triệu - 2 triệu = 16 triệu VNĐ. Thu nhập dòng tiền hàng năm = 16 * 12 = 192 triệu VNĐ. Tỷ suất lợi nhuận (ROI) = 192 triệu / 4 tỷ = 4,8%/năm. Mức này thấp hơn lãi suất gửi tiết kiệm (6%/năm), do đó xét riêng về tiêu chí \"lợi ích trên chi phí dòng tiền\", phương án này kém hấp dẫn hơn ngân hàng."}, {"level": "1", "content": "Sàn giao dịch B có một người duy nhất sở hữu chứng chỉ hành nghề môi giới đồng thời làm Giám đốc điều hành. Do sơ suất, chứng chỉ của vị Giám đốc này đã hết hạn hiệu lực quá 6 tháng nhưng sàn vẫn tiếp tục hoạt động. Khi thanh tra Sở Xây dựng phát hiện, hậu quả pháp lý trực tiếp áp dụng cho Sàn B là gì?", "options": {"A": "Giám đốc bị cảnh cáo và cho phép gia hạn chứng chỉ trong vòng 30 ngày, sàn vẫn hoạt động bình thường.", "B": "Bị xử phạt vi phạm hành chính và cơ quan nhà nước sẽ ra Quyết định thu hồi Giấy phép hoạt động do sàn không còn duy trì đủ điều kiện hoạt động theo quy định (Điều 8 Luật KDBĐS).", "C": "Toàn bộ các hợp đồng giao dịch trước đó của sàn bị tuyên vô hiệu.", "D": "Phải nộp thuế phạt gấp đôi đối với doanh thu phát sinh trong 6 tháng đó."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo quy định, sàn phải có tối thiểu 01 cá nhân và người quản lý có chứng chỉ hành nghề môi giới BĐS hợp lệ. Khi chứng chỉ hết hạn, sàn vi phạm điều kiện hoạt động bắt buộc, dẫn đến hệ quả bị cơ quan quản lý nhà nước ra quyết định thu hồi Giấy phép hoạt động."}, {"level": "1", "content": "Một nhân viên môi giới tự ý thu thập tệp danh sách 10.000 email khách hàng và gửi thư rác quảng cáo cho một dự án ảo (không có thật) kèm cam kết \"Lợi nhuận 200%/năm, an toàn pháp lý 100%\". Hành vi này vi phạm giới hạn pháp lý và đạo đức cốt lõi nào của người hành nghề?", "options": {"A": "Vi phạm lỗi kỹ thuật vì không sử dụng phần mềm CRM được duyệt của công ty.", "B": "Vi phạm tính minh bạch, cung cấp thông tin không trung thực, vi phạm Luật Quảng cáo và có dấu hiệu lừa đảo chiếm đoạt tài sản.", "C": "Không vi phạm pháp luật kinh doanh bất động sản vì giao dịch chưa xảy ra.", "D": "Chỉ vi phạm nghệ thuật giao tiếp vì sử dụng ngôn từ quá phóng đại."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc quảng cáo dự án ảo và cam kết siêu lợi nhuận vi phạm trực tiếp nghĩa vụ cung cấp thông tin trung thực, chính xác, vi phạm nghiêm trọng Luật Quảng cáo và các nguyên tắc đạo đức hành nghề, gây rủi ro pháp lý lớn."}, {"level": "1", "content": "Một nhóm khách hàng vô cùng bức xúc kéo đến trụ sở Sàn giao dịch đòi bồi thường vì Chủ đầu tư chậm bàn giao nhà 6 tháng so với hợp đồng. Nhóm này la hét và yêu cầu Sàn phải trả lại tiền. Với tư cách là người quản lý, trình tự xử lý khủng hoảng (Customer Service) nào sau đây là chuẩn mực và chuyên nghiệp nhất?", "options": {"A": "Gọi ngay lực lượng bảo vệ trấn áp, lập biên bản và dọa báo công an nếu khách hàng không giữ trật tự.", "B": "Tranh cãi trực tiếp, đưa ngay hợp đồng ra chứng minh sàn chỉ là đơn vị trung gian, lỗi hoàn toàn do Chủ đầu tư nên sàn từ chối tiếp khách.", "C": "Lắng nghe chăm chú, đầy vẻ thông cảm, không ngắt lời; mời khách vào phòng riêng, thu thập và xem xét các sự kiện, khẳng định Sàn sẽ làm việc công bằng; sau đó làm cầu nối liên hệ ngay với Chủ đầu tư để tìm giải pháp xử lý sớm nhất.", "D": "Lập tức trích quỹ dự phòng của sàn để hoàn tiền cọc nhằm xoa dịu đám đông bảo vệ uy tín."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Các bước chuẩn mực trong xử lý phàn nàn: 1. Lắng nghe chăm chú, thông cảm; 2. Bày tỏ sự thấu hiểu; 3. Xác nhận tính công bằng; 4. Thu thập sự kiện; 5. Cố gắng đạt thỏa thuận và hành động sớm. Việc đẩy đuổi hay tranh cãi sẽ làm leo thang khủng hoảng."}, {"level": "1", "content": "Hai anh em ruột A và B cùng đứng tên đồng sở hữu trên Sổ hồng một căn nhà. A muốn bán nhưng B không đồng ý. A đã lén giả mạo chữ ký của B để lập Giấy ủy quyền (có công chứng giả) và mang đến Sàn giao dịch yêu cầu môi giới bán gấp. Nhân viên môi giới nhận thấy chữ ký có điểm khả nghi nhưng vì mức hoa hồng lên tới 5% nên quyết định nhắm mắt bỏ qua và vẫn đưa lên sàn niêm yết. Hậu quả pháp lý của hành vi này là gì?", "options": {"A": "Giao dịch vẫn hợp pháp vì A cũng là chủ sở hữu và hợp đồng có dấu đỏ công chứng.", "B": "Nhân viên môi giới và Sàn giao dịch vi phạm nghiêm trọng nghĩa vụ kiểm tra tính pháp lý của hồ sơ, có thể bị liên đới chịu trách nhiệm bồi thường thiệt hại và truy cứu pháp luật do tiếp tay cho giao dịch lừa đảo.", "C": "Chỉ có A chịu trách nhiệm trước pháp luật, môi giới được miễn trừ hoàn toàn.", "D": "Khách hàng mua nhà sẽ bị phạt vì không tự kiểm tra kỹ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sàn giao dịch và người môi giới có nghĩa vụ pháp lý bắt buộc phải kiểm tra giấy tờ, bảo đảm bất động sản đủ điều kiện kinh doanh, tình trạng pháp lý rõ ràng, không có tranh chấp. Việc cố tình phớt lờ hồ sơ giả mạo vi phạm nguyên tắc hành nghề và phải chịu trách nhiệm liên đới."}, {"level": "1", "content": "Một công ty môi giới bất động sản có định phí (chi phí cố định bao gồm mặt bằng, lương cơ bả

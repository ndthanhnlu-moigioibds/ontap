    <script>
        const allData = [{"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, doanh nghiệp kinh doanh bất động sản phải thực hiện việc công khai thông tin về dự án và bất động sản đưa vào kinh doanh theo hình thức và thời điểm nào sau đây để đảm bảo đúng quy định?", "options": {"A": "09 loại hợp đồng kinh doanh (tập trung vào nhà ở và đất nền) và 03 loại hợp đồng dịch vụ (môi giới, tư vấn, quản lý).", "B": "11 loại mẫu hợp đồng kinh doanh bất động sản và 05 loại mẫu hợp đồng kinh doanh dịch vụ bất động sản (bao gồm cả mẫu hợp đồng đặt cọc và hợp đồng đấu giá).", "C": "11 loại mẫu hợp đồng kinh doanh bất động sản và 04 loại mẫu hợp đồng kinh doanh dịch vụ bất động sản.", "D": "12 loại mẫu hợp đồng kinh doanh bất động sản (tính riêng biệt nhà ở có sẵn và tương lai) và 04 loại mẫu hợp đồng kinh doanh dịch vụ bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 1, điều 6, Luật Kinh doanh bất động sản 2023 quy định: Thông tin phải được công khai đầy đủ, trung thực và kịp thời trước khi đưa vào kinh doanh. Việc không công khai hoặc công khai không đầy đủ có thể dẫn đến bị xử phạt hành chính theo Nghị định về xử phạt vi phạm hành chính trong lĩnh vực xây dựng. 15.\tĐiều kiện hành nghề của cá nhân môi giới bất động sản theo Luật Kinh doanh bất động sản 2023 có thay đổi quan trọng nào so với Luật Kinh doanh Bất động sản 2014?<br><br><b>Giải thích học thuật:</b> Điểm thay đổi then chốt là cá nhân môi giới bắt buộc phải có chứng chỉ hành nghề và phải hành nghề trong một doanh nghiệp dịch vụ bất động sản (sàn hoặc công ty môi giới), không được hoạt động độc lập.   Điểm mấu chốt của Luật 2023 là xóa bỏ môi giới tự do (independent broker). Đáp án C tập trung vào việc cá nhân phải thuộc về một \"thực thể pháp lý\" (doanh nghiệp). Cụm từ \"doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản hoặc doanh nghiệp môi giới bất động sản\" được trích dẫn sát với văn bản luật. Các đáp án khác gây nhiễu đảm bảo cho đề thi có độ khó nhất định. 16.\tDoanh nghiệp kinh doanh dịch vụ môi giới bất động sản theo Luật Kinh doanh bất động sản 2023 cần tối thiểu bao nhiêu người có chứng chỉ hành nghề môi giới bất động sản?<br><br><b>Giải thích học thuật:</b> Điểm c, khoản 1, điều 61, Luật Kinh doanh bất động sản 2023 yêu cầu có tối thiểu 01 người có chứng chỉ hành nghề môi giới bất động sản. 17.\tTheo quy định của Luật Kinh doanh bất động sản 2023, điều kiện về thủ tục hành chính bắt buộc để một doanh nghiệp chính thức được phép hoạt động dịch vụ sàn giao dịch bất động sản là gì?<br><br><b>Giải thích học thuật:</b> Khoản 3, điều 55 Luật kinh doanh bất động sản quy định: Sàn giao dịch bất động sản trước khi hoạt động phải gửi hồ sơ đến cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh nơi có trụ sở chính của sàn giao dịch bất động sản để được cấp giấy phép hoạt động. Ngoài ra, trình tự, thủ tục cấp giấy phép này còn được quy định chi tiết tại Nghị định 96/2024/NĐ-CP. Đây là điểm mới so với luật cũ, sàn giao dịch bất động sản phải được Sở Xây dựng cấp Giấy phép hoạt động trước khi kinh doanh, nhằm siết chặt quản lý để loại bỏ các sàn giao dịch \"ma\" hoặc không đủ điều kiện cơ sở vật chất, nhân sự. 18.\tTheo Luật Kinh doanh bất động sản 2023, quy định về việc thực hiện giao dịch bất động sản thông qua sàn giao dịch được thể hiện như thế nào để phù hợp với quyền tự do kinh doanh của các bên?<br><br><b>Giải thích học thuật:</b> Điều 54 Luật Kinh doanh bất động sản 2023 ghi rõ: \"Nhà nước khuyến khích tổ chức, cá nhân thực hiện giao dịch mua bán, thuê mua, cho thuê nhà ở, công trình xây dựng và quyền sử dụng đất đã có hạ tầng kỹ thuật trong dự án bất động sản thông qua sàn giao dịch bất động sản.\" 19.\tTheo Luật Kinh doanh bất động sản 2023 và hướng dẫn tại Nghị định 96/2024/NĐ-CP, cá nhân kinh doanh bất động sản quy mô nhỏ được miễn yêu cầu thành lập doanh nghiệp khi đáp ứng các định mức cụ thể nào sau đây?<br><br><b>Giải thích học thuật:</b> Đáp án B phản ánh đúng tinh thần của Khoản 2, Điều 7 Nghị định 96/2024/NĐ-CP. Đây là điều kiện \"song hành\": Để được coi là quy mô nhỏ, cá nhân phải nằm trong cả hai giới hạn này. Nếu giao dịch lần thứ 11 trong năm, hoặc chỉ giao dịch 1 lần nhưng giá trị hợp đồng vượt 300 tỷ đồng, thì đều bắt buộc phải thành lập doanh nghiệp kinh doanh bất động sản theo quy định tại Điều 9 của Luật. Cá nhân kinh doanh bất động sản quy mô nhỏ được miễn trừ yêu cầu thành lập doanh nghiệp nhưng vẫn phải kê khai và nộp thuế. 20.\tTrong năm 2026, ông A (cá nhân) thực hiện các giao dịch bán nhà ở hình thành trong tương lai. Dựa trên quy định về định mức \"quy mô nhỏ\" tại Nghị định 96/2024/NĐ-CP, trường hợp nào sau đây khiến ông A bắt đầu bắt buộc phải thành lập doanh nghiệp kinh doanh bất động sản?<br><br><b>Giải thích học thuật:</b> Căn cứ theo Khoản 1, Điều 7 Nghị định 96/2024/NĐ-CP, cá nhân kinh doanh bất động sản quy mô nhỏ là người không quá 10 giao dịch/năm và giá trị mỗi hợp đồng không quá 300 tỷ đồng.  Phương án A là \"bẫy\" về ngoại lệ. Theo Khoản 1, Điều 7 Nghị định 96, nếu chỉ giao dịch 01 lần/năm thì không tính giá trị. Do đó, dù là 500 tỷ nhưng nếu chỉ có 1 giao dịch, ông A vẫn là \"quy mô nhỏ\". 31.\tTheo Luật Kinh doanh bất động sản 2023, trường hợp nào sau đây HỢP ĐỒNG bắt buộc phải công chứng hoặc chứng thực?<br><br><b>Giải thích học thuật:</b> Luật quy định hợp đồng mua bán, thuê mua nhà ở, công trình mà các bên đều là cá nhân thì bắt buộc phải công chứng hoặc chứng thực. 32.\tCơ quan nào có thẩm quyền cấp chứng chỉ hành nghề môi giới bất động sản theo quy định pháp luật hiện hành?<br><br><b>Giải thích học thuật:</b> Kỳ thi sát hạch và việc cấp chứng chỉ hành nghề môi giới được giao cho Sở Xây dựng cấp tỉnh tổ chức và thực hiện (phân quyền theo cơ chế hành chính hai cấp). 33.\tTheo Điều 6 Luật Kinh doanh bất động sản 2023 và các văn bản hướng dẫn, khi đưa nhà ở hình thành trong tương lai vào kinh doanh, chủ đầu tư không bắt buộc phải công khai thông tin nào sau đây trên hệ thống thông tin về nhà ở và thị trường bất động sản?<br><br><b>Giải thích học thuật:</b> Mặc dù dự án phải được thẩm định thiết kế và dự toán để cấp phép, nhưng Điều 6 của Luật Kinh doanh BĐS 2023 chỉ yêu cầu công khai Quyết định phê duyệt dự án, Quy hoạch chi tiết 1/500 và Giấy phép xây dựng, chứ không yêu cầu công khai toàn bộ Hồ sơ thiết kế kỹ thuật chi tiết và dự toán chi phí. Đây là bí mật kinh doanh và hồ sơ lưu trữ nội bộ của chủ đầu tư/cơ quan quản lý. 34.\tTheo quy định tại Điều 51 Luật Kinh doanh bất động sản 2023, trong quá trình thực hiện thủ tục chuyển nhượng hợp đồng mua bán nhà ở hình thành trong tương lai, hành vi nào sau đây của chủ đầu tư dự án được coi là đúng quy định pháp luật?<br><br><b>Giải thích học thuật:</b> Khoản 4, Điều 51 Luật Kinh doanh bất động sản 2023 quy định: “\"Chủ đầu tư không được thu bất kỳ khoản chi phí nào liên quan đến việc chuyển nhượng hợp đồng.\" Luật bảo vệ tối đa quyền chuyển nhượng của khách hàng. Chủ đầu tư chỉ có vai trò xác nhận tính hợp pháp của việc chuyển nhượng (để phục vụ quản lý và bàn giao sau này) mà không được biến đây thành một nguồn thu dịch vụ. 35.\tTheo Luật Kinh doanh bất động sản 2023, trong trường hợp các bên không có thỏa thuận khác, thời điểm xác lập quyền sở hữu nhà ở, công trình xây dựng đối với bên mua, bên thuê mua được quy định là khi nào?<br><br><b>Giải thích học thuật:</b> Theo khoản 5, điều 13, Luật Kinh doanh bất động sản 2023, quy định Thời điểm xác lập quyền sở hữu nhà ở, công trình xây dựng, phần diện tích sàn xây dựng trong công trình xây dựng đối với bên mua, thuê mua là kể từ thời điểm bên mua, thuê mua đã thanh toán đủ tiền mua, tiền thuê mua và đã nhận bàn giao nhà ở, công trình xây dựng, phần diện tích sàn xây dựng trong công trình xây dựng, trừ trường hợp các bên có thỏa thuận khác. 36.\tTheo quy định của Luật Kinh doanh bất động sản 2023, sau khi đã thực hiện chuyển nhượng quyền sử dụng đất đã có hạ tầng kỹ thuật trong dự án cho cá nhân tự xây dựng nhà ở, chủ đầu tư dự án phải thực hiện trách nhiệm pháp lý nào sau đây?<br><br><b>Giải thích học thuật:</b> Khoản 6, Điều 32 Luật Kinh doanh bất động sản 2023: Quy định rõ chủ đầu tư có trách nhiệm kiểm tra, giám sát việc xây dựng nhà ở của cá nhân để đảm bảo đúng quy hoạch chi tiết và thiết kế đô thị. Đây là trách nhiệm bắt buộc. Chủ đầu tư không chỉ bán đất mà còn đóng vai trò là \"người gác cổng\" cho quy hoạch 1/500 của dự án đó. Nếu để cá nhân xây dựng sai quy hoạch, chủ đầu tư cũng sẽ bị xử phạt theo pháp luật về xây dựng. Quy định này nhằm ngăn chặn tình trạng người dân mua đất dự án rồi xây dựng tự phát, không đúng kiến trúc mặt tiền hoặc mật độ xây dựng đã được phê duyệt. 37.\tCăn cứ vào Điều 8 Luật Kinh doanh bất động sản 2023, hành vi nào sau đây được xác định là hành vi bị nghiêm cấm liên quan đến chứng chỉ hành nghề môi giới bất động sản?<br><br><b>Giải thích học thuật:</b> Đây là sự trích dẫn chuẩn xác từ Khoản 9, Điều 8 Luật Kinh doanh bất động sản 2023. Hành vi \"Cấp\" (về phía cơ quan quản lý) hoặc \"Sử dụng\" (về phía cá nhân/doanh nghiệp) không đúng quy định (bao gồm mượn, thuê, làm giả...) là hành vi bị nghiêm cấm tuyệt đối, có thể dẫn đến truy cứu trách nhiệm hình sự hoặc thu hồi chứng chỉ vĩnh viễn. 38.\tTheo Luật Kinh doanh bất động sản 2023, khi thực hiện chuyển nhượng toàn bộ hoặc một phần dự án bất động sản mà không thay đổi nội dung dự án đã được phê duyệt, nghĩa vụ của bên nhận chuyển nhượng đối với hồ sơ pháp lý được quy định như thế nào?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 2, Điều 42 Luật Kinh doanh bất động sản 2023. \"Bên nhận chuyển nhượng toàn bộ hoặc một phần dự án không phải thực hiện lại hồ sơ dự án, quy hoạch xây dựng và Giấy phép xây dựng của dự án nếu không có sự thay đổi về nội dung của dự án...\" 39.\tTheo Luật Kinh doanh bất động sản 2023, tổ chức, cá nhân kinh doanh bất động sản được phép kinh doanh bất động sản ở đâu?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 2, Điều 4 Luật Kinh doanh bất động sản 2023: \"Tổ chức, cá nhân được kinh doanh bất động sản ngoài phạm vi khu vực bảo vệ theo quy định của pháp luật về quốc phòng, an ninh.\". Khoản 3, Điều 4 Luật Kinh doanh bất động sản 2023: \"Hoạt động kinh doanh bất động sản phải phù hợp với quy hoạch, kế hoạch sử dụng đất...\" Đáp án C kết hợp cả hai yếu tố quan trọng tại Điều 4: (1) An ninh quốc gia (ngoài khu vực bảo vệ quốc phòng) và (2) Quy hoạch (phù hợp kế hoạch sử dụng đất). Đây là \"bộ lọc\" kép mà mọi dự án BĐS đều phải đi qua. 40.\tTheo quy định tại Khoản 5 Điều 23 Luật Kinh doanh bất động sản 2023, hành vi nào sau đây của chủ đầu tư dự án đối với việc thu tiền đặt cọc nhà ở hình thành trong tương lai bị coi là vi phạm pháp luật?<br><br><b>Giải thích học thuật:</b> Khoản 5, Điều 23 Luật Kinh doanh bất động sản 2023: \"Chủ đầu tư dự án bất động sản chỉ được thu tiền đặt cọc từ khách hàng khi nhà ở, công trình xây dựng đã có đủ điều kiện đưa vào kinh doanh... Số tiền đặt cọc không quá 5% giá bán, giá cho thuê mua...\".   Trước đây, nhiều chủ đầu tư lách luật bằng các tên gọi khác nhau để thu tiền sớm. Hiện nay, Điều 23 quy định rõ: Chỉ được thu đặt cọc khi đã đủ điều kiện đưa vào kinh doanh và không quá 5%. 41.\tTheo tinh thần của Luật Kinh doanh bất động sản 2023, việc bắt buộc công khai thông tin dự án trên Hệ thống thông tin về nhà ở và thị trường bất động sản nhằm hướng tới mục tiêu cốt lõi nào sau đây trong quản lý nhà nước?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 6 Luật Kinh doanh bất động sản 2023 và Nghị định 94/2024/NĐ-CP quy định chi tiết về việc xây dựng và quản lý hệ thống thông tin về nhà ở và thị trường bất động sản. Đáp án B thể hiện mục tiêu \"thượng tầng\" của Luật Kinh doanh bất động sản 2023. Cụm từ \"bất cân xứng thông tin\" (Information Asymmetry) là thuật ngữ học thuật để chỉ trạng thái một bên (chủ đầu tư) nắm giữ nhiều thông tin hơn bên kia (khách hàng), dẫn đến thị trường kém hiệu quả. Việc công khai trên hệ thống thông tin quốc gia là công cụ để giải quyết vấn đề này. 42.\tViệc Luật Kinh doanh bất động sản 2023 và Luật Đất đai 2024 quy định chủ đầu tư dự án phải hoàn thành toàn bộ nghĩa vụ tài chính về đất đai trước khi đưa bất động sản vào kinh doanh nhằm giải quyết triệt để vấn đề cốt lõi nào sau đây?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý:Khoản 4, Điều 24 Luật Kinh doanh bất động sản 2023 và Điều 126 Luật Đất đai 2024 (về căn cứ giao đất, cho thuê đất). Đáp án B là câu trả lời mang tính bản chất nhất. Thực trạng hàng chục nghìn căn hộ không được cấp Sổ hồng trong giai đoạn trước 2024 phần lớn là do chủ đầu tư chưa nộp đủ tiền sử dụng đất. Luật mới yêu cầu hoàn thành nghĩa vụ tài chính trước khi bán để ngắt kết nối rủi ro giữa nợ của chủ đầu tư và quyền lợi của người mua. Khi khách hàng mua, họ yên tâm rằng mảnh đất đó đã \"sạch\" về mặt nghĩa vụ tài chính với Nhà nước. 43.\tViệc Luật Kinh doanh bất động sản 2023 mở rộng phạm vi không được chuyển nhượng quyền sử dụng đất cho cá nhân tự xây dựng nhà ở (phân lô, bán nền) đối với các đô thị loại Đặc biệt, I, II và III nhằm mục tiêu chiến lược nào sau đây?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý:Khoản 6, Điều 31 Luật Kinh doanh bất động sản 2023: Quy định rõ việc không được chuyển nhượng quyền sử dụng đất cho cá nhân tự xây dựng nhà ở tại các phường, quận, thành phố của đô thị loại Đặc biệt, loại I, loại II và loại III. Luật Quy hoạch đô thị: Hướng tới sự phát triển bền vững và tính thẩm mỹ của bộ mặt kiến trúc quốc gia. Mục tiêu chính là hạn chế phát triển đô thị tự phát, dàn trải, thiếu quy hoạch tại các đô thị có mật độ dân cư cao, hướng tới sự phát triển đồng bộ, bền vững hơn. 44.\tTheo quy định của Luật Kinh doanh bất động sản 2023 và Nghị định 94/2024/NĐ-CP, Hệ thống thông tin về nhà ở và thị trường bất động sản được xây dựng tập trung, thống nhất trên toàn quốc nhằm thực hiện vai trò chủ đạo nào sau đây?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 72, Điều 73 Luật Kinh doanh bất động sản 2023. Nghị định 94/2024/NĐ-CP quy định chi tiết về các nhóm dữ liệu phải công khai và trách nhiệm của các bên trong việc cập nhật thông tin. Hệ thống này là công cụ quan trọng để thực hiện yêu cầu công khai thông tin, giúp thị trường minh bạch hơn. Khi một dự án được đẩy lên đây, thông tin đó được coi là thông tin pháp lý đã qua kiểm duyệt, giúp loại bỏ các dự án \"ma\" và giúp thị trường tự thanh lọc. 45.\tTheo Luật Kinh doanh bất động sản 2023, việc bãi bỏ hình thức hành nghề độc lập và yêu cầu cá nhân môi giới phải hoạt động trong doanh nghiệp môi giới hoặc sàn giao dịch nhằm mục tiêu trọng tâm nào sau đây?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý:  Khoản 2, Điều 61 Luật Kinh doanh bất động sản 2023: \"Cá nhân hành nghề môi giới bất động sản phải hành nghề trong một doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản hoặc doanh nghiệp kinh doanh dịch vụ môi giới bất động sản.\"  Quy tắc đạo đức nghề nghiệp: Việc quản lý theo tổ chức giúp việc áp dụng các quy tắc đạo đức và chế tài xử phạt trở nên thực tế và khả thi hơn. Đáp án B Phản ánh đúng tinh thần của Điều 61: Khi môi giới nằm trong doanh nghiệp, họ không còn là những cá nhân \"vô hình\". Nếu tư vấn sai, gây thiệt hại, doanh nghiệp phải chịu trách nhiệm liên đới. Điều này giúp Nhà nước quản lý môi giới thông qua \"đầu mối\" là doanh nghiệp. 46.\tLoại hình công trình xây dựng nào được Luật Kinh doanh bất động sản 2023 bổ sung, làm rõ là đối tượng được phép kinh doanh?<br><br><b>Giải thích học thuật:</b> Điều 5 Luật Kinh doanh bất động sản 2023 liệt kê và làm rõ nhiều loại hình công trình xây dựng có công năng khác nhau được đưa vào kinh doanh, bao gồm cả các loại hình mới như condotel, officetel.  Đáp án B trích dẫn các thuật ngữ của Luật 2023, đặc biệt là cụm từ \"công trình xây dựng có công năng hỗn hợp\". Đây là điểm mới nhất để định danh cho các loại hình như Officetel, Condotel. 47.\tTheo quy định về điều kiện chuyển nhượng toàn bộ hoặc một phần dự án bất động sản tại Điều 40 Luật Kinh doanh bất động sản 2023, đối với dự án đang được thế chấp để bảo đảm thực hiện nghĩa vụ tài chính, chủ đầu tư phải thực hiện điều kiện bắt buộc nào sau đây trước khi làm thủ tục chuyển nhượng?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý: Điểm g, Khoản 1, Điều 40 Luật Kinh doanh bất động sản 2023. Điều 10 Nghị định 96/2024/NĐ-CP (về hồ sơ, trình tự chuyển nhượng dự án). \"Trường hợp dự án đang thế chấp để bảo đảm cho việc thực hiện nghĩa vụ theo quy định của pháp luật thì phải thực hiện giải chấp\". Luật 2023 không dùng cụm từ \"hoặc được ngân hàng đồng ý\" trong điều khoản này đối với chuyển nhượng dự án (M&A). Điều này nhằm đảm bảo dự án khi sang tay chủ mới phải là dự án \"sạch\" về mặt pháp lý thế chấp. Người môi giới chuyên phân khúc dự án (M&A) cần nắm rõ: Giải chấp không nhất thiết là phải trả hết nợ bằng tiền túi, mà có thể là quy trình kỹ thuật nộp tiền từ bên mua vào tài khoản phong tỏa để ngân hàng ra văn bản giải chấp trước khi các bên ký hợp đồng công chứng. Việc hiểu sai sang \"chỉ cần ngân hàng đồng ý\" có thể dẫn đến rủi ro hồ sơ bị cơ quan chức năng trả về khi làm thủ tục chấp thuận chuyển nhượng dự án tại UBND cấp tỉnh. 48.\tSự khác biệt về yêu cầu công chứng, chứng thực hợp đồng mua bán nhà ở giữa giao dịch có doanh nghiệp kinh doanh bất động sản tham gia và giao dịch chỉ giữa các cá nhân là gì theo Luật Kinh doanh bất động sản 2023?<br><br><b>Giải thích học thuật:</b> Đáp án C phản ánh chính xác Khoản 5 và Khoản 6, Điều 44 Luật Kinh doanh bất động sản 2023. Đây là quy định nhằm giảm bớt thủ tục hành chính và chi phí cho doanh nghiệp (doanh nghiệp tự chịu trách nhiệm về tính xác thực của giao dịch thông qua hệ thống kế toán và hóa đơn), đồng thời duy trì sự bảo vệ của Nhà nước (thông qua Công chứng viên) cho các giao dịch giữa cá nhân với cá nhân. 49.\tTheo tinh thần của Luật Đất đai 2024 và Luật Kinh doanh bất động sản 2023, việc bắt buộc ghi đúng giá giao dịch thực tế trong hợp đồng và thực hiện thanh toán qua ngân hàng (đối với doanh nghiệp) hướng tới mục tiêu chiến lược nào sau đây?<br><br><b>Giải thích học thuật:</b> Đáp án A phản ánh đúng \"cuộc cách mạng\" của Luật Đất đai 2024. Khi bỏ Khung giá đất, Nhà nước cần một Bảng giá đất linh hoạt cập nhật hàng năm. Để Bảng giá đất này sát với thị trường, Nhà nước cần dữ liệu đầu vào \"sạch\" và \"thực\". Do đó, việc ghi đúng giá giao dịch chính là \"nguồn sống\" của hệ thống định giá đất mới.  Căn cứ pháp lý: Điều 159 Luật Đất đai 2024: Quy định về Bảng giá đất và việc cập nhật hàng năm theo nguyên tắc thị trường. Điều 47 Luật Kinh doanh bất động sản 2023: Quy định về việc thanh toán trong giao dịch bất động sản phải thông qua tổ chức tín dụng (đối với doanh nghiệp). 50.\tTheo Điều 44 Luật Kinh doanh bất động sản 2023, trường hợp hợp đồng kinh doanh bất động sản thuộc diện phải công chứng hoặc chứng thực theo quy định của pháp luật, thời điểm có hiệu lực của hợp đồng được xác định là:<br><br><b>Giải thích học thuật:</b> Đáp án B phản ánh đúng nguyên tắc tại Khoản 2, Điều 44 Luật Kinh doanh bất động sản 2023. Theo đó, luật chia làm 2 trường hợp: (1) Không công chứng thì hiệu lực là khi bên cuối cùng ký; (2) Có công chứng thì hiệu lực tính theo luật Công chứng/Chứng thực.  Căn cứ pháp lý: Khoản 2, Điều 44 Luật Kinh doanh bất động sản 2023. Và điều 5 Luật Công chứng 2014: Văn bản công chứng có hiệu lực kể từ ngày được công chứng viên ký và đóng dấu của tổ chức hành nghề công chứng. 51.\tTheo quy định của Luật Kinh doanh bất động sản 2023, doanh nghiệp kinh doanh dịch vụ bất động sản (bao gồm: môi giới, tư vấn, quản lý bất động sản và sàn giao dịch) có nghĩa vụ chung nào sau đây đối với cơ quan quản lý nhà nước cấp tỉnh trước khi chính thức hoạt động?<br><br><b>Giải thích học thuật:</b> Điều 62 (Môi giới), Điều 64 (Tư vấn), Điều 65 (Quản lý BĐS): Đều có chung một khoản quy định: \"Trước khi hoạt động kinh doanh dịch vụ... doanh nghiệp gửi thông tin đến cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh... để được đăng tải trên hệ thống thông tin về nhà ở và thị trường bất động sản\". Riêng Sàn giao dịch (theo Điều 55): Sàn ngoài việc gửi thông tin còn phải được cấp Giấy phép hoạt động. Tuy nhiên, câu hỏi hỏi về \"nghĩa vụ chung\" của tất cả các loại hình này, nên đáp án B là chuẩn xác nhất.. 52.\tTheo Luật Kinh doanh bất động sản 2023, người Việt Nam định cư ở nước ngoài mà không phải là công dân Việt Nam được kinh doanh bất động sản tại Việt Nam dưới những hình thức nào sau đây?<br><br><b>Giải thích học thuật:</b> Nội dung này được quy định cụ thể tại Khoản 3 và Khoản 4 Điều 10 Luật Kinh doanh bất động sản 2023: Khoản 3 Điều 10 quy định: \"Người Việt Nam định cư ở nước ngoài không phải là công dân Việt Nam theo quy định của pháp luật về quốc tịch thực hiện hình thức kinh doanh bất động sản quy định tại Khoản 4 Điều này.\" Khoản 4 Điều 10 (áp dụng chung cho cả Tổ chức kinh tế có vốn đầu tư nước ngoài) liệt kê các hình thức: (a) Đầu tư xây dựng nhà ở, công trình xây dựng để bán, cho thuê, cho thuê mua. (b) Đầu tư xây dựng hạ tầng kỹ thuật trong dự án bất động sản để chuyển nhượng, cho thuê, cho thuê lại quyền sử dụng đất đã có hạ tầng kỹ thuật. (c) Thuê nhà ở, công trình xây dựng để cho thuê lại. (d) Nhận chuyển nhượng toàn bộ hoặc một phần dự án bất động sản để tiếp tục đầu tư, xây dựng và kinh doanh. 53.\tĐối với nhà chung cư, tòa nhà hỗn hợp có nhà ở hình thành trong tương lai, giấy tờ nghiệm thu nào là điều kiện bắt buộc phải có trước khi đưa vào kinh doanh?<br><br><b>Giải thích học thuật:</b> Điểm b, Khoản 1, Điều 24 Luật Kinh doanh bất động sản 2023. Lưu ý rằng đối với chung cư, \"phần móng\" là điều kiện tối thiểu, nhưng đối với nhà ở thấp tầng (liền kề, biệt thự), luật chỉ yêu cầu hoàn thành hạ tầng kỹ thuật tương ứng theo tiến độ. Quy định này đảm bảo rằng khi chủ đầu tư bắt đầu thu tiền của khách hàng, dự án đã thực sự \"thành hình\" dưới mặt đất, tránh tình trạng dự án \"trên giấy\" hoàn toàn. 54.\tCá nhân hành nghề môi giới bất động sản được nhận thù lao/hoa hồng từ đâu theo Luật Kinh doanh bất động sản 2023?<br><br><b>Giải thích học thuật:</b> Theo khoản 1, điều 63 Luật Kinh doanh bất động sản 2023 quy định Cá nhân hành nghề môi giới bất động sản được hưởng tiền thù lao, hoa hồng từ doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản hoặc doanh nghiệp kinh doanh dịch vụ môi giới bất động sản/ không nhận trực tiếp từ khách hàng. Quy định này giúp Nhà nước quản lý được thu nhập thực tế của môi giới thông qua hệ thống kế toán của doanh nghiệp, đồng thời bảo vệ khách hàng khỏi các khoản \"phí ngoài\" không minh bạch. 55.\tTheo Luật Kinh doanh bất động sản 2023 và Nghị định 96/2024/NĐ-CP, trường hợp một cá nhân thực hiện bán duy nhất 01 căn nhà thuộc sở hữu hợp pháp của mình trong năm với giá trị giao dịch là 10 tỷ đồng thì nghĩa vụ về hình thức tổ chức được quy định như thế nào?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 2, Điều 9 Luật Kinh doanh bất động sản 2023: Cá nhân bán nhà ở không nhằm mục đích kinh doanh thì không phải thành lập doanh nghiệp. Điều 7 Nghị định 96/2024/NĐ-CP: Quy định về các ngưỡng để xác định quy mô nhỏ. Tuy nhiên, nếu đã xác định là \"không nhằm mục đích kinh doanh\" thì không cần xét đến các ngưỡng này.. 56.\tTheo quy định tại Điều 58 Luật Kinh doanh bất động sản 2023, trong quá trình thực hiện dịch vụ, sàn giao dịch bất động sản có trách nhiệm pháp lý nào sau đây đối với hồ sơ của bất động sản được đưa vào kinh doanh tại sàn?<br><br><b>Giải thích học thuật:</b> Điều 58, Luật Kinh doanh bất động sản 2023 quy định “sàn giao dịch bất động sản phải Bảo đảm bất động sản được đưa lên sàn giao dịch bất động sản phải có đủ điều kiện đưa vào kinh doanh sàn giao dịch, có trách nhiệm kiểm tra hồ sơ pháp lý của bất động sản trước khi đưa vào kinh doanh tại sàn.  Quy định này giúp môi giới và quản lý sàn hiểu rằng: Họ là người chịu trách nhiệm đầu tiên về tính pháp lý của sản phẩm khi giới thiệu ra thị trường, không thể đổ lỗi hoàn toàn cho chủ đầu tư khi xảy ra sai phạm. 57.\tTheo quy định tại Điều 63 Luật Kinh doanh bất động sản 2023, mức thù lao và hoa hồng môi giới bất động sản được xác lập dựa trên nguyên tắc nào sau đây?<br><br><b>Giải thích học thuật:</b> Đáp án A Phản ánh chính xác sự tách biệt giữa Thù lao (Khoản 2, Điều 63) và Hoa hồng (Khoản 3, Điều 63). Thù lao: Trả cho công sức thực hiện dịch vụ, không phụ thuộc vào kết quả giao dịch. Hoa hồng: Trả khi giao dịch thành công. Cả hai khoản này đều dựa trên sự tự thỏa thuận của các bên trong hợp đồng, thể hiện sự tôn trọng nguyên tắc tự do hợp đồng của pháp luật dân sự và thương mại.. 58.\tNgoài Luật Kinh doanh bất động sản 2023, việc chuyển nhượng quyền sử dụng đất đã có hạ tầng kỹ thuật trong dự án bất động sản còn phải tuân thủ nghiêm ngặt các quy định của luật nào sau đây?<br><br><b>Giải thích học thuật:</b> Theo Khoản 1 Điều 31 Luật KDBĐS 2023, đất đưa vào kinh doanh dưới hình thức chuyển nhượng quyền sử dụng đất cho cá nhân tự xây dựng nhà ở phải đáp ứng các điều kiện về quyền sử dụng đất theo quy định của Luật Đất đai. Cụ thể, các vấn đề về: Hình thức sử dụng đất: (Giao đất có thu tiền, cho thuê đất trả tiền một lần hay hàng năm). Mục đích sử dụng đất: (Đất ở, đất thương mại dịch vụ...). Thời hạn sử dụng đất: (Lâu dài hay có thời hạn). Đăng ký đất đai: (Thủ tục sang tên, cấp sổ cho người nhận chuyển nhượng). Tất cả các nội dung \"gốc\" về đất này đều do Luật Đất đai điều chỉnh, Luật Kinh doanh BĐS chỉ quy định về hành vi \"giao dịch\" trên thị trường.. 59.\tTheo quy định hiện hành, các tổ chức kinh tế có vốn đầu tư nước ngoài khi thực hiện hoạt động kinh doanh bất động sản tại Việt Nam phải tuân thủ hệ thống pháp luật nào?<br><br><b>Giải thích học thuật:</b> Nội dung này được thể hiện xuyên suốt qua các điều khoản về đối tượng và phạm vi áp dụng của Luật Kinh doanh bất động sản 2023, phối hợp với các đạo luật chuyên ngành: Điều 10 Luật Kinh doanh bất động sản 2023: Quy định về hình thức kinh doanh của tổ chức kinh tế có vốn đầu tư nước ngoài (phải phù hợp với Luật này). Luật Đầu tư 2020 (sửa đổi, bổ sung): Quy định về thủ tục cấp Giấy chứng nhận đăng ký đầu tư, điều kiện tiếp cận thị trường (vì kinh doanh BĐS là ngành nghề kinh doanh có điều kiện). Luật Đất đai 2024: Quy định về hình thức giao đất, thuê đất và quyền sử dụng đất của tổ chức có vốn đầu tư nước ngoài (Đây là điều kiện tiên quyết để thực hiện dự án). Luật Các tổ chức tín dụng: Liên quan đến việc bảo lãnh trong bán nhà ở hình thành trong tương lai và thanh toán qua ngân hàng (Điều 48). Điều ước quốc tế (như CPTPP, EVFTA, WTO): Quy định về lộ trình mở cửa thị trường bất động sản cho nhà đầu tư nước ngoài. 60.\tCăn cứ Điều 1 Luật Kinh doanh bất động sản 2023, hoạt động nào sau đây không thuộc phạm vi điều chỉnh của Luật này và được thực hiện theo các quy định pháp luật chuyên ngành khác?<br><br><b>Giải thích học thuật:</b> Đáp án D phản ánh chính xác Điểm a, Khoản 2, Điều 1. Việc bán tài sản công (như trụ sở cũ, nhà công vụ...) không mang tính chất kinh doanh tìm kiếm lợi nhuận mà là hoạt động quản lý hành chính nhà nước, do đó tuân theo Luật Quản lý, sử dụng tài sản công. Ngoài tài sản công, Luật 2023 còn loại trừ: Giao dịch của các tổ chức tín dụng xử lý tài sản bảo đảm (theo Luật các tổ chức tín dụng). Chuyển nhượng quyền sử dụng đất do giải quyết tranh chấp theo quyết định của Tòa án/Trọng tài. Các giao dịch thừa kế, tặng cho không mang tính chất kinh doanh. 61.\tTheo quy định về công khai thông tin và nội dung hợp đồng tại Luật Kinh doanh bất động sản 2023, việc xác định phần diện tích sở hữu riêng và sở hữu chung trong dự án nhà chung cư, tòa nhà hỗn hợp phải được thực hiện như thế nào?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 2, Điều 6 Luật Kinh doanh bất động sản 2023: Yêu cầu công khai thông tin về phần sở hữu chung, sở hữu riêng. Điểm d, Khoản 1, Điều 48 Luật Kinh doanh bất động sản 2023: Quy định phần sở hữu chung, sở hữu riêng là nội dung bắt buộc của hợp đồng. 62.\tTheo Điều 11 Luật Kinh doanh bất động sản 2023, việc xác định trình tự, thủ tục đầu tư xây dựng dự án bất động sản để đưa vào kinh doanh phải đảm bảo tuân thủ sự thống nhất của hệ thống pháp luật nào sau đây?<br><br><b>Giải thích học thuật:</b> Đáp án C là sự trích dẫn chuẩn xác và đầy đủ nhất theo Điều 11 Luật Kinh doanh bất động sản 2023. Điều khoản này nhấn mạnh rằng dự án bất động sản là đối tượng điều chỉnh đa ngành, không một đạo luật nào có thể đứng độc lập.Việc đầu tư dự án bất động sản là một quá trình phức tạp, chịu sự điều chỉnh của nhiều luật chuyên ngành khác nhau. Có thể hình dung sơ đồ chu trình dự án như sau: (1) Giai đoạn chuẩn bị: Luật Đầu tư, Luật Quy hoạch. (2) Giai đoạn xác lập quyền sử dụng đất: Luật Đất đai. (3) Giai đoạn thiết kế, thi công: Luật Xây dựng, Luật Nhà ở. (4) Giai đoạn đưa sản phẩm vào thị trường: Luật Kinh doanh bất động sản. 63.\tNếu bên mua, thuê mua nhà ở, công trình xây dựng tự thực hiện việc xin cấp Giấy chứng nhận thì tổng số tiền thanh toán trước khi được cấp giấy không vượt quá bao nhiêu % giá trị hợp đồng?<br><br><b>Giải thích học thuật:</b> Điều 25 Luật Kinh doanh bất động sản 2023: \"Trường hợp bên mua, bên thuê mua tự thực hiện thủ tục cấp Giấy chứng nhận... thì bên bán, bên cho thuê mua không được thu quá 95% giá trị hợp đồng.\" Luật cho phép thanh toán đến 95% giá trị hợp đồng trước khi có giấy chứng nhận nếu bên mua tự làm thủ tục cấp giấy chứng nhận. 64.\tDưới góc nhìn kinh tế học, việc thực hiện đồng bộ quy định \"Chủ đầu tư phải hoàn thành 100% nghĩa vụ tài chính về đất đai trước khi bán\" (Luật Kinh doanh Bất động sản 2023) và \"Áp dụng Bảng giá đất sát giá thị trường\" (Luật Đất đai 2024) đã tạo ra hiện tượng nào sau đây đối với cấu trúc thị trường bất động sản trong giai đoạn hiện nay?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý kết hợp: Khoản 4 Điều 24 Luật Kinh doanh BĐS 2023: Điều kiện về hoàn thành nghĩa vụ tài chính. Điều 159 Luật Đất đai 2024: Bỏ khung giá đất, áp dụng bảng giá đất hàng năm. Về Bản chất kinh tế, việc phải nộp 100% tiền đất (theo giá thị trường - vốn đã rất cao) ngay từ đầu, cộng với việc phải xây xong móng mới được bán, đã kéo dài Chu kỳ chiếm dụng vốn. Khi Chi phí vốn (Cost of Capital) tăng lên, theo nguyên tắc biên lợi nhuận kỳ vọng của doanh nghiệp, họ buộc phải cộng dồn các chi phí tài chính phát sinh này vào giá bán. Điều này tạo ra một Price Floor (Sàn giá) mà ở đó, dù cầu có yếu, giá cũng khó có thể giảm xuống dưới mức chi phí cấu thành này. 65.\tViệc Luật Kinh doanh bất động sản 2023 quy định chủ đầu tư dự án phải hoàn thành việc đầu tư xây dựng \"hạ tầng kỹ thuật thiết yếu\" trước khi thực hiện chuyển nhượng quyền sử dụng đất cho cá nhân tự xây dựng nhà ở nhằm giải quyết mục tiêu quản lý nhà nước nào sau đây?<br><br><b>Giải thích học thuật:</b> Đáp án B phản ánh đúng tinh thần của Khoản 1 Điều 31 Luật Kinh doanh bất động sản 2023. Cụm từ \"hạ tầng kỹ thuật thiết yếu\" (đường giao thông, điện chiếu sáng, cấp thoát nước, xử lý nước thải...) là điều kiện tiên quyết để biến một khu đất thành một \"đơn vị ở\" thực thụ. Việc yêu cầu hoàn thành trước khi bán sẽ buộc chủ đầu tư phải bỏ vốn thật, làm thật, từ đó tự động sàng lọc các dự án ảo, dự án treo.. 66.\tQuy định \"Ghi đúng giá giao dịch thực tế vào hợp đồng\" tại Luật Kinh doanh bất động sản 2023, khi kết hợp với quy định \"Thanh toán qua ngân hàng\" và \"Bãi bỏ khung giá đất\" của Luật Đất đai 2024, tạo ra mối liên hệ tương hỗ chặt chẽ nhất nhằm thực hiện mục tiêu chiến lược nào sau đây?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 47 Luật Kinh doanh bất động sản 2023 (về thanh toán và ghi giá). Điều 158, 159 Luật Đất đai 2024 (về nguyên tắc định giá đất và Bảng giá đất). Nghị định 104/2024/NĐ-CP về hệ thống thông tin đất đai. Mối quan hệ: Luật Kinh doanh BĐS buộc ghi giá giao dịch thực tế (đầu vào), Luật Quản lý thuế giám sát dòng tiền (kiểm soát), và Luật Đất đai 2024 dùng chính dữ liệu thật đó để xây dựng Bảng giá đất (đầu ra). Nếu không ghi đúng giá thực tế, \"nguyên tắc thị trường\" trong Luật Đất đai sẽ trở thành lý thuyết suông. 67.\tViệc Luật Kinh doanh bất động sản 2023 quy định sàn giao dịch phải ban hành \"Quy chế hoạt động\" và thực hiện các \"Biện pháp phòng, chống rửa tiền\" nhằm xác lập vai trò nào sau đây của sàn trong hệ thống quản lý nhà nước?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 58 Luật Kinh doanh bất động sản 2023 (Trách nhiệm của sàn giao dịch). Điều 4 Luật Phòng, chống rửa tiền 2022 (Danh mục đối tượng báo cáo). Nghị định 96/2024/NĐ-CP (Quy định về quy chế và quy trình nội bộ của sàn). Đáp án B Phản ánh chính xác mối liên hệ giữa Luật Kinh doanh bất động sản 2023 và Luật Phòng, chống rửa tiền 2022. Sàn giao dịch không chỉ là nơi môi giới, mà là một \"trạm gác\" tài chính. Theo quy định, nếu sàn không báo cáo các giao dịch có giá trị lớn (400 triệu đồng tiền mặt/ngày) hoặc nguồn gốc tiền không rõ ràng, sàn sẽ bị xử phạt rất nặng hoặc thu hồi giấy phép. 68.\tViệc Luật Kinh doanh bất động sản 2023 giảm yêu cầu số lượng cá nhân có chứng chỉ môi giới tối thiểu trong một doanh nghiệp từ 02 xuống còn 01 được giải thích dựa trên tư duy quản lý nào sau đây?<br><br><b>Giải thích học thuật:</b> Việc giảm số lượng tối thiểu giúp các doanh nghiệp nhỏ dễ dàng đáp ứng điều kiện thành lập hơn, trong khi vẫn duy trì yêu cầu phải có ít nhất một người có chứng chỉ để đảm bảo chuyên môn. 69.\tĐiều kiện nào sau đây KHÔNG phải là điều kiện để cá nhân được dự thi sát hạch cấp chứng chỉ hành nghề môi giới bất động sản theo Luật Kinh doanh bất động sản 2023?<br><br><b>Giải thích học thuật:</b> Luật (Điều 70 được diễn giải) và các văn bản hướng dẫn không yêu cầu bắt buộc phải có trình độ cao đẳng trở lên, mà tập trung vào việc hoàn thành khóa đào tạo, đã tốt nghiệp trung học phổ thông, và các điều kiện về năng lực hành vi, tình trạng pháp lý 70.\tTại sao Luật Kinh doanh bất động sản 2023 lại nhấn mạnh việc \"Tổ chức, cá nhân được kinh doanh bất động sản ngoài phạm vi khu vực bảo vệ theo quy định của pháp luật về quốc phòng, an ninh\"?<br><br><b>Giải thích học thuật:</b> Nguyên tắc này (Khoản 2 Điều 4 (Nguyên tắc kinh doanh bất động sản)) nhằm đảm bảo hoạt động kinh doanh bất động sản không xâm phạm vào các khu vực trọng yếu về quốc phòng, an ninh, thể hiện sự cân bằng giữa phát triển kinh tế và bảo vệ an ninh quốc gia. 71.\tTheo quy định tại Điều 42 Luật Kinh doanh bất động sản 2023, trong giao dịch chuyển nhượng toàn bộ hoặc một phần dự án bất động sản, nghĩa vụ nào sau đây KHÔNG thuộc về bên nhận chuyển nhượng dự án?<br><br><b>Giải thích học thuật:</b> (Căn cứ pháp lý: Điều 42 Luật KD BĐS 2023). Bên nhận chuyển nhượng kế thừa quyền và nghĩa vụ liên quan đến việc tiếp tục dự án, nhưng không đương nhiên chịu trách nhiệm về các vi phạm pháp luật đã xảy ra của chủ đầu tư cũ trước khi chuyển nhượng (trừ khi có thỏa thuận khác hoặc pháp luật quy định). 72.\tViệc Luật Kinh doanh bất động sản 2023 không bắt buộc công chứng, chứng thực đối với hợp đồng giữa chủ đầu tư và khách hàng, nhưng lại bắt buộc đối với giao dịch giữa các cá nhân, thể hiện triết lý quản lý nào sau đây?<br><br><b>Giải thích học thuật:</b> Việc không bắt buộc công chứng (trừ giao dịch giữa cá nhân với nhau) có thể nhằm giảm bớt một bước thủ tục hành chính cho các giao dịch mang tính thương mại, chuyên nghiệp giữa doanh nghiệp kinh doanh bất động sản và khách hàng, dù các bên vẫn có quyền thỏa thuận công chứng.  CĐT còn bị ràng buộc bởi các quy định khắt khe hơn về Hợp đồng mẫu (CĐT bắt buộc phải sử dụng hợp đồng theo mẫu quy định của Chính phủ (Nghị định 96/2024/NĐ-CP, phải đăng ký với cơ quan bảo vệ quyền lợi người tiêu dùng) và Bảo lãnh ngân hàng. Việc không công chứng là để giảm thủ tục, không phải giảm trách nhiệm. 73.\tQuyền sử dụng đất đã có hạ tầng kỹ thuật trong dự án bất động sản chỉ được đưa vào kinh doanh khi:<br><br><b>Giải thích học thuật:</b> Cơ sở pháp lý: Điều 31 Luật Kinh doanh bđs 2023. Điều kiện cốt lõi là hạ tầng phải hoàn thành và được nghiệm thu, cùng với các điều kiện pháp lý khác về đất đai, quy hoạch. 74.\tTheo Luật Kinh doanh bất động sản 2023, trường hợp một cá nhân đã được cấp Chứng chỉ hành nghề môi giới nhưng thực hiện hoạt động môi giới dưới danh nghĩa một doanh nghiệp không đăng ký ngành nghề kinh doanh dịch vụ môi giới bất động sản thì hành vi này được xác định như thế nào?<br><br><b>Giải thích học thuật:</b> Hành vi này vi phạm đồng thời hai tầng kiểm soát: Đối với cá nhân: Vi phạm nghĩa vụ phải hành nghề \"trong\" một doanh nghiệp dịch vụ chuyên biệt (Khoản 2, Điều 61). Đối với tổ chức: Vi phạm điều kiện kinh doanh dịch vụ bất động sản khi chưa đáp ứng các yêu cầu về thành lập và đăng ký ngành nghề chuyên doanh (Điều 9). Việc quy định này nhằm đảm bảo mọi giao dịch môi giới đều được kiểm soát bởi một pháp nhân có trách nhiệm giải trình và có đầy đủ điều kiện hoạt động theo quy định của Bộ Xây dựng. 75.\tTheo Luật Kinh doanh bất động sản 2023, việc xây dựng và cập nhật các \"Số liệu điều tra, thống kê về nhà ở\" và \"Số liệu cấp giấy chứng nhận\" vào Hệ thống thông tin về nhà ở và thị trường bất động sản quốc gia nhằm mục đích chính nào sau đây?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 72 và 75 Luật Kinh doanh bđs 2023. Các số liệu thống kê tổng hợp giúp Nhà nước nắm bắt thực trạng thị trường, hiệu quả quản lý và đưa ra các chính sách vĩ mô phù hợp.   Trong kinh tế học bất động sản, thị trường thường xuyên rơi vào tình trạng \"Thông tin bất đối xứng\" (Asymmetric Information). Hệ thống thông tin này được thiết lập nhằm mục đích: Xóa bỏ vùng tối thị trường: Số liệu về cấp Giấy chứng nhận và số liệu điều tra nhà ở giúp Nhà nước đo lường được Tỷ lệ hấp thụ (Absorption Rate) và Nguồn cung tồn kho (Inventory) thực tế. Công cụ điều tiết vĩ mô: Dựa trên các con số này, Chính phủ có thể quyết định nới lỏng hoặc thắt chặt tín dụng vào bất động sản, hoặc điều chỉnh Bảng giá đất hàng năm sát với diễn biến thực của thị trường (theo nguyên tắc của Luật Đất đai 2024). Hoạch định chính sách: Không thể có một chiến lược phát triển nhà ở xã hội hay nhà ở giá rẻ hiệu quả nếu không biết chính xác tổng quỹ nhà hiện hữu và nhu cầu thực tế của từng địa phương. 76.\tThời hạn tối thiểu mà sàn giao dịch bất động sản phải đảm bảo về địa điểm hoạt động (ví dụ: hợp đồng thuê địa điểm) theo Nghị định 96/2024/NĐ-CP là bao lâu?<br><br><b>Giải thích học thuật:</b> Nghị định 96/2024/NĐ-CP yêu cầu sàn phải có địa điểm hoạt động ổn định với thời hạn thuê hoặc quyền sử dụng địa điểm tối thiểu 01 năm. 77.\tLuật Kinh doanh bất động sản 2023 quy định các hành vi bị cấm liên quan đến việc thu và sử dụng tiền của khách hàng mua bất động sản hình thành trong tương lai nhằm giải quyết vấn đề gì tồn tại trước đây?<br><br><b>Giải thích học thuật:</b> Các quy định cấm thu tiền không đúng quy định hoặc sử dụng tiền sai mục đích (Điều 8) nhằm ngăn chặn việc chủ đầu tư lạm dụng vốn của khách hàng, đảm bảo nguồn tiền được dùng đúng cho dự án. 78.\tViệc Luật Kinh doanh bất động sản 2023 cho phép kinh doanh bất động sản là \"phần diện tích sàn xây dựng trong công trình xây dựng có công năng phục vụ mục đích du lịch, lưu trú\" có tác động như thế nào đến thị trường condotel, officetel?<br><br><b>Giải thích học thuật:</b> Việc luật hóa loại hình này giúp giải quyết các vướng mắc pháp lý tồn tại trước đây, tạo hành lang pháp lý cho thị trường condotel, officetel phát triển. Việc quy định \"phần diện tích sàn xây dựng\" là đối tượng kinh doanh (Điều 5) đã tạo cơ sở để cơ quan tài nguyên môi trường cấp Giấy chứng nhận quyền sở hữu cho từng đơn vị riêng lẻ trong công trình hỗn hợp.   Luật khẳng định đây là công trình có công năng \"du lịch, lưu trú\", không phải là \"nhà ở\". Điều này có nghĩa là quyền sở hữu gắn liền với thời hạn dự án (thường là 50-70 năm) và người mua không thể đăng ký thường trú. Việc hiểu đúng điều này giúp ngăn chặn các quảng cáo sai sự thật về việc \"Condotel có sổ đỏ vĩnh viễn\". Khi đã được luật hóa, các hợp đồng mua bán loại hình này phải tuân thủ mẫu hợp đồng quy định tại Nghị định 96/2024/NĐ-CP, bảo vệ người mua khỏi các điều khoản bất lợi trong các hợp đồng góp vốn lách luật trước đây (Chuẩn hóa quy trình giao dịch). 79.\tNếu Luật Đất đai, Luật Nhà ở có quy định khác với Luật kinh doanh bất động sản về cùng một vấn đề liên quan đến kinh doanh bất động sản, nguyên tắc áp dụng pháp luật là gì?<br><br><b>Giải thích học thuật:</b> Mặc dù Luật kinh doanh bất động sản là luật khung, nhưng các vấn đề chuyên sâu về đất đai, nhà ở sẽ ưu tiên áp dụng quy định của Luật Đất đai, Luật Nhà ở nếu có quy định khác và trực tiếp hơn.Mặc dù Luật Kinh doanh bất động sản (KDBĐS) quy định về hành vi kinh doanh, nhưng \"vật chất\" của giao dịch đó (đất đai, nhà ở) lại chịu sự quản lý của các luật chuyên ngành khác. Ví dụ: Luật KDBĐS quy định về điều kiện bán nhà ở hình thành trong tương lai, nhưng việc thế nào là một ngôi nhà và quản lý vận hành sau khi bán lại thuộc phạm vi của Luật Nhà ở. Tại Điều 1: Luật KDBĐS 2023 đã tự giới hạn phạm vi của mình để tránh xung đột: Nếu là trình tự, thủ tục đầu tư dự án: Phải theo Luật Đầu tư. Nếu là vấn đề quyền sử dụng đất: Phải theo Luật Đất đai. Nếu là vấn đề quản lý, sử dụng nhà ở: Phải theo Luật Nhà ở. 80.\tViệc Luật Kinh doanh bất động sản 2023 quy định hợp đồng mẫu và yêu cầu công khai hợp đồng mẫu trước khi áp dụng mang lại lợi ích gì cho người mua bất động sản?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 6. Công khai thông tin về bất động sản đưa vào kinh doanh. Hợp đồng mẫu và việc công khai giúp người mua nắm rõ nội dung trước khi ký, đảm bảo các điều khoản tuân thủ luật pháp và bảo vệ quyền lợi của họ.   Trong các giao dịch bất động sản sơ cấp, hợp đồng thường là Hợp đồng gia nhập (Adhesion Contract) — loại hợp đồng do một bên soạn thảo và bên kia chỉ có quyền chấp nhận hoặc từ chối, rất ít cơ hội đàm phán lại. Quy định của Luật 2023 nhằm: (1) Chống \"cài cắm\" điều khoản bất lợi: Trước đây, chủ đầu tư thường cài các điều khoản về miễn trừ trách nhiệm khi chậm bàn giao hoặc áp đặt mức phạt vi phạm không tương xứng giữa hai bên. Hợp đồng mẫu theo Nghị định 96/2024/NĐ-CP đã chuẩn hóa các nội dung về: mức phạt vi phạm, điều kiện chấm dứt hợp đồng, và trách nhiệm bảo hành. (2) Xóa bỏ sự bất đối xứng thông tin: Việc công khai mẫu hợp đồng tại trụ sở và trên website dự án (theo Điều 6) giúp khách hàng có thời gian nghiên cứu, tham vấn luật sư trước khi đặt bút ký, tránh tình trạng bị \"ép\" ký tại các buổi lễ mở bán dưới áp lực tâm lý. (3) Tăng hiệu lực quản lý nhà nước: Hợp đồng mẫu là căn cứ để các cơ quan quản lý (như Cục Cạnh tranh và Bảo vệ người tiêu dùng) thực hiện hậu kiểm. Nếu chủ đầu tư tự ý thay đổi các nội dung bắt buộc làm phương hại đến khách hàng, hợp đồng đó có thể bị tuyên vô hiệu một phần hoặc toàn bộ. 81.\tTheo sự phân định thẩm quyền tại Điều 41 Luật Kinh doanh bất động sản 2023, trình tự, thủ tục chuyển nhượng toàn bộ hoặc một phần dự án bất động sản được thực hiện theo quy định của pháp luật về Đầu tư trong trường hợp nào sau đây?<br><br><b>Giải thích học thuật:</b> Điều 41 Luật Kinh doanh bất động sản 2023 phân định rõ, nếu dự án thuộc phạm vi điều chỉnh của Luật Đầu tư (được chấp thuận nhà đầu tư/cấp GCNĐKĐT) thì thẩm quyền, thủ tục chuyển nhượng thực hiện theo Luật Đầu tư. Luật Kinh doanh bất động sản 2023 đã thực hiện một cuộc \"phân vai\" rõ rệt để tránh tình trạng chồng chéo thủ tục hành chính giữa ngành Xây dựng và ngành Kế hoạch & Đầu tư: Nguyên tắc \"Luật Đầu tư dẫn dắt\": Nếu một dự án được hình thành và xác lập tư cách chủ đầu tư thông qua cơ chế của Luật Đầu tư (được Nhà nước chấp thuận nhà đầu tư cụ thể hoặc cấp Giấy chứng nhận đăng ký đầu tư), thì mọi thay đổi về chủ thể thực hiện dự án (chuyển nhượng) phải được xử lý như một hoạt động \"Điều chỉnh dự án đầu tư\". Khi đó, hồ sơ và thẩm quyền giải quyết sẽ thuộc về cơ quan Kế hoạch và Đầu tư (Khoản 1 Điều 41). Nguyên tắc \"Luật Kinh doanh BĐS bổ trợ\": Đối với các dự án khác không thuộc diện nêu trên (ví dụ: dự án được giao đất, cho thuê đất thông qua đấu giá, đấu thầu mà không phải thực hiện thủ tục cấp GCNĐKĐT theo Luật Đầu tư), thủ tục chuyển nhượng sẽ thực hiện theo quy định riêng của Luật Kinh doanh bất động sản (Khoản 2 Điều 41). Mục tiêu quản lý: Quy định này giúp đơn giản hóa thủ tục \"một cửa\". Nhà đầu tư không phải thực hiện song song hai thủ tục chuyển nhượng dự án ở hai cơ quan khác nhau cho cùng một giao dịch. 82.\tTheo quy định tại Điều 73 Luật Kinh doanh bất động sản 2023 và Nghị định 94/2024/NĐ-CP, thành phần nội dung của cơ sở dữ liệu về thị trường bất động sản địa phương KHÔNG bao gồm nhóm thông tin nào sau đây?<br><br><b>Giải thích học thuật:</b> Cơ sở dữ liệu tập trung vào thông tin thị trường, dự án, chủ thể kinh doanh, không thu thập thông tin thu nhập cá nhân chi tiết của từng môi giới. Thu nhập cá nhân và chi tiết nộp thuế là những thông tin thuộc phạm vi bảo mật của Luật Quản lý thuế và Luật Bảo vệ dữ liệu cá nhân. Cơ sở dữ liệu bất động sản chỉ thu thập các thông tin liên quan đến tính pháp lý và tính thương mại của sản phẩm/dịch vụ, không lấn sân sang quản lý tài chính chi tiết của từng cá nhân hành nghề. Việc thu thập này (nếu có) sẽ thuộc về hệ thống dữ liệu riêng biệt của ngành Thuế. 83.\tTheo quy định tại Điều 10 Luật Kinh doanh bất động sản 2023, một người Việt Nam định cư ở nước ngoài nhưng vẫn giữ quốc tịch Việt Nam (Công dân Việt Nam) có được phép mua nhà ở có sẵn từ cá nhân trong nước để thực hiện hoạt động bán lại nhằm mục đích sinh lợi hay không?<br><br><b>Giải thích học thuật:</b> Điều 10, Khoản 2 Luật Kinh doanh bất động sản 2023 cho phép người Việt Nam định cư ở nước ngoài là công dân Việt Nam được kinh doanh bất động sản theo các hình thức như tổ chức, cá nhân trong nước, bao gồm cả việc mua bất động sản để bán lại. Sự thay đổi này được gọi là nguyên tắc \"Đãi ngộ quốc gia\" (National Treatment) hoàn toàn đối với công dân mang hộ chiếu Việt Nam, bất kể nơi cư trú:Sự bình đẳng về chủ thể: Trước đây, Việt kiều thường bị hạn chế trong việc \"kinh doanh\" (mua đi bán lại) mà chủ yếu chỉ được sở hữu để ở. Luật 2023 đã xóa bỏ rào cản này bằng cách khẳng định: Nếu anh là Công dân Việt Nam (còn quốc tịch), anh có đầy đủ quyền kinh doanh BĐS như một người đang sống tại TP.HCM hay Hà Nội. Mở rộng phạm vi giao dịch: Đáp án C đúng vì nó bao hàm quyền được thực hiện mọi hình thức kinh doanh quy định tại Khoản 1 Điều 10, bao gồm cả việc mua nhà ở có sẵn để bán, cho thuê, hoặc cho thuê mua. Cần lưu ý sự khác biệt giữa \"Công dân Việt Nam\" và \"Người gốc Việt Nam\" (không còn quốc tịch). Đối với người gốc Việt, quyền kinh doanh vẫn có những giới hạn nhất định so với công dân Việt Nam. 84.\tTheo quy định tại Điều 30 Luật Kinh doanh bất động sản 2023, trong giao dịch chuyển nhượng quyền sử dụng đất đã có hạ tầng kỹ thuật trong dự án bất động sản, nội dung nào sau đây KHÔNG thuộc nghĩa vụ pháp lý của bên nhận chuyển nhượng?<br><br><b>Giải thích học thuật:</b> Trong thực tế, nhiều người thường nhầm lẫn với quy định tại Luật Đất đai về việc nếu đất được Nhà nước giao/cho thuê để thực hiện dự án mà không được sử dụng trong 12 tháng hoặc chậm tiến độ 24 tháng thì bị thu hồi. Tuy nhiên, tại Điều 30 Luật Kinh doanh bất động sản 2023, luật chỉ tập trung vào các nghĩa vụ phát sinh từ mối quan hệ hợp đồng. Thời hạn xây dựng nhà cụ thể thường do các bên thỏa thuận trong hợp đồng hoặc tuân theo tiến độ cụ thể của dự án được phê duyệt, chứ không phải là một con số \"cứng\" 24 tháng áp dụng chung cho mọi đối tượng nhận chuyển nhượng tại Điều này. 85.\tTheo quy định tại Điều 24 Luật Kinh doanh bất động sản 2023, mục đích cốt lõi của việc yêu cầu chủ đầu tư phải có văn bản thông báo và nhận được văn bản trả lời của cơ quan chuyên môn về xây dựng cấp tỉnh về việc nhà ở đủ điều kiện đưa vào kinh doanh trước khi ký hợp đồng là gì?<br><br><b>Giải thích học thuật:</b> Đây là một bước kiểm soát quan trọng của cơ quan quản lý, xác nhận tính hợp pháp và đủ điều kiện của sản phẩm trước khi đến tay người tiêu dùng, tăng cường bảo vệ người mua. Sở Xây dựng không chỉ kiểm tra hồ sơ giấy tờ mà còn kiểm tra thực tế tiến độ thi công (ví dụ: đã xong móng đối với chung cư, xong hạ tầng đối với nhà ở thấp tầng). Văn bản trả lời của Sở là bằng chứng thép cho thấy dự án đã \"hiện hữu\" về mặt pháp lý và kỹ thuật. 86.\tViệc Luật Kinh doanh bất động sản 2023 không còn quy định về vốn pháp định tối thiểu (như Luật kinh doanh bất động sản 2014 từng có) mà thay bằng tỷ lệ vốn chủ sở hữu/tổng mức đầu tư có ý nghĩa gì?<br><br><b>Giải thích học thuật:</b> Cách tiếp cận theo tỷ lệ giúp yêu cầu vốn sát với thực tế hơn: dự án lớn cần vốn lớn, dự án nhỏ cần vốn ít hơn, thay vì một mức sàn cố định. Trước đây, một doanh nghiệp chỉ cần có 20 tỷ đồng (vốn pháp định) là có thể được duyệt làm chủ đầu tư dự án hàng nghìn tỷ đồng, dẫn đến rủi ro đình trệ khi không vay được vốn ngân hàng. Quy định mới buộc vốn chủ sở hữu phải \"đi đôi\" với quy mô dự án. Luật phân định rõ hai ngưỡng an toàn: 20% tổng mức đầu tư đối với dự án có quy mô dưới 20 ha. 15% tổng mức đầu tư đối với dự án có quy mô từ 20 ha trở lên. Điều này giúp Nhà nước kiểm soát được mức độ \"đòn bẩy tài chính\" của chủ đầu tư một cách khoa học hơn. 87.\tNghĩa vụ chứng minh nhà ở, công trình xây dựng hình thành trong tương lai đủ điều kiện được bán, cho thuê mua thuộc về ai?<br><br><b>Giải thích học thuật:</b> Chủ đầu tư có nghĩa vụ hoàn thiện các điều kiện, chuẩn bị hồ sơ và thông báo cho Sở Xây dựng để được xác nhận đủ điều kiện bán. 88.\tCơ quan nào có trách nhiệm chính trong việc xây dựng, quản lý, vận hành Hệ thống thông tin, cơ sở dữ liệu về nhà ở và thị trường bất động sản ở cấp Trung ương?<br><br><b>Giải thích học thuật:</b> Luật kinh doanh bất động sản và Nghị định 94/2024 giao Bộ Xây dựng là cơ quan chủ trì ở cấp Trung ương. 89.\tTheo quy định tại Điều 9 Luật Kinh doanh bất động sản 2023, cá nhân thực hiện hoạt động bán, cho thuê mua bất động sản thuộc diện \"quy mô nhỏ\" theo quy định của Chính phủ có nghĩa vụ gì về mặt tài chính đối với Nhà nước?<br><br><b>Giải thích học thuật:</b> Khoản 3 Điều 9 Luật Kinh doanh bất động sản 2023 nêu rõ cá nhân kinh doanh bất động sản quy mô nhỏ không phải lập DN nhưng phải kê khai nộp thuế. 90.\tTheo quy định của Luật Kinh doanh bất động sản 2023, hệ quả pháp lý quan trọng nhất đối với một cá nhân thực hiện hoạt động môi giới bất động sản khi không có chứng chỉ hành nghề hoặc không hành nghề trong một doanh nghiệp kinh doanh dịch vụ bất động sản là gì?<br><br><b>Giải thích học thuật:</b> Căn cứ: Điều 8 và Điều 61 Luật Kinh doanh bđs 2023. Hoạt động môi giới không đủ điều kiện là vi phạm pháp luật, có thể dẫn đến xử phạt vi phạm hành chính và ảnh hưởng đến hiệu lực của các thỏa thuận liên quan. Theo Bộ luật Dân sự, giao dịch dân sự có mục đích, nội dung vi phạm điều cấm của luật thì bị vô hiệu (Điều 123 Bộ luật Dân sự 2015). Do đó, nếu môi giới không có chứng chỉ hoặc hành nghề tự do trái luật, khách hàng hoặc chủ đầu tư có quyền từ chối trả hoa hồng. Nếu đã trả, họ có quyền kiện đòi lại vì thỏa thuận môi giới này không có giá trị pháp lý từ thời điểm giao kết. 91. Theo quy định tại Luật Nhà ở 2023 và các văn bản hướng dẫn thi hành, diện tích sử dụng căn hộ chung cư (diện tích thông thủy) được ghi trong hợp đồng mua bán và Giấy chứng nhận phải được tính toán dựa trên nguyên tắc nào sau đây?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 2, Điều 101 Luật Nhà ở 2023: Quy định rõ cách tính diện tích sử dụng căn hộ. Thông tư của Bộ Xây dựng: Hướng dẫn chi tiết cách đo đạc và mẫu hợp đồng mua bán căn hộ chung cư. Đáp án B phản ánh chính xác cách tính diện tích thông thủy (Carpet Area). Điểm quan trọng nhất là phải trừ đi diện tích cột, hộp kỹ thuật và tường bao. Đối với ban công/lô gia, phải tính toàn bộ diện tích sàn; trường hợp ban công có phần diện tích chung thì tính từ mép trong của tường chung. 92. Sau khi hoàn tất việc chuyển nhượng quyền sử dụng đất đã có hạ tầng kỹ thuật cho cá nhân, trách nhiệm quản lý, vận hành và bảo trì các công trình hạ tầng kỹ thuật (đường giao thông, hệ thống cấp thoát nước, chiếu sáng...) trong dự án được quy định như thế nào theo Luật Kinh doanh bất động sản 2023?<br><br><b>Giải thích học thuật:</b> Một sai lầm phổ biến là cho rằng cứ \"xong việc bán\" hoặc \"xong việc nghiệm thu\" là chủ đầu tư hết trách nhiệm. Thực tế, hạ tầng kỹ thuật là mạch máu của dự án. Theo Điều 19 và Điều 31 Luật Kinh doanh bđs 2023, chủ đầu tư phải đảm bảo hạ tầng hoạt động đúng công năng. Cho đến khi các thủ tục bàn giao chính thức cho Nhà nước (Sở Xây dựng, Sở Giao thông, Công ty Cấp thoát nước...) hoàn tất, chủ đầu tư vẫn là thực thể duy nhất chịu trách nhiệm pháp lý nếu hạ tầng xuống cấp hoặc hư hỏng. Khác với nhà chung cư (có phần sở hữu chung rõ ràng), hạ tầng kỹ thuật (điện, nước, đường) trong các dự án đất nền hoặc nhà phố thường hướng tới việc bàn giao cho Nhà nước quản lý để trở thành hạ tầng công cộng. Khách hàng không \"sở hữu\" con đường hay cống thoát nước theo hình thức sở hữu chung của nhà chung cư 93. Dựa trên quy định về tỷ lệ vốn chủ sở hữu tối thiểu tại Điều 9 Luật Kinh doanh bất động sản 2023, hệ số huy động vốn tối đa (được xác định bằng tỷ lệ giữa Tổng vốn huy động từ các nguồn khác trên Vốn chủ sở hữu) mà chủ đầu tư được phép thực hiện đối với dự án dưới 20 ha và dự án từ 20 ha trở lên lần lượt là bao nhiêu? Căn cứ pháp lý: Điều 9. Điều kiện đối với tổ chức, cá nhân khi kinh doanh bất động sản (Luật Kinh doanh bất động sản 2023) Khoản 2, Điểm c: Có vốn chủ sở hữu không thấp hơn 20% tổng vốn đầu tư đối với dự án có quy mô sử dụng đất dưới 20 ha, không thấp hơn 15% tổng vốn đầu tư đối với dự án có quy mô sử dụng đất từ 20 ha trở lên. Nghị định 96/2024/NĐ-CP (Điều 3): Quy định chi tiết về cách xác định vốn chủ sở hữu để thực hiện dự án bất động sản dựa trên báo cáo tài chính kiểm toán, cụ thể như sau: Để tìm ra con số hệ số đòn bẩy, chúng ta thực hiện phép toán dựa trên tổng mức đầu tư (TMĐT) là 100%: Đối với dự án quy mô dưới 20 ha: o\tLuật quy định Vốn chủ sở hữu (VCSH) >= 20% TMĐT.=>Vốn huy động tối đa = 100% - 20% = 80% TMĐT. o\tHệ số đòn bẩy tối đa = Vốn huy động/VCSH = 80%/20% = 4,0 lần. Đối với dự án quy mô từ 20 ha trở lên: o\tLuật quy định VCSH >= 15% TMĐT. =>Vốn huy động tối đa = 100% - 15% = 85% TMĐT. o\tHệ số đòn bẩy tối đa = Vốn huy động / VCSH = 85%/15%= 5,67 lần. 94. Theo quy định tại Điều 48 Luật Kinh doanh bất động sản 2023, phương thức thanh toán trong giao dịch bất động sản được quy định như thế nào đối với các nhóm đối tượng khác nhau?<br><br><b>Giải thích học thuật:</b> Luật quy định các \"Tổ chức, cá nhân kinh doanh bất động sản\" (tức là các Chủ đầu tư, các công ty môi giới, hoặc cá nhân có đăng ký kinh doanh) bắt buộc phải nhận tiền qua ngân hàng. Điều này giúp Nhà nước kiểm soát được doanh thu thực, tránh việc \"hai giá\" để trốn thuế thu nhập doanh nghiệp và thuế VAT. Đối với các giao dịch giữa các cá nhân không phải là kinh doanh bất động sản chuyên nghiệp (ví dụ: anh Thành bán nhà cho người quen), pháp luật hiện hành vẫn tôn trọng quyền tự thỏa thuận. Các bên có thể chọn chuyển khoản hoặc tiền mặt. 95. Trong cơ chế bảo lãnh nhà ở hình thành trong tương lai theo Luật Kinh doanh bất động sản 2023, trách nhiệm chính của ngân hàng bảo lãnh được quy định như thế nào?<br><br><b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 26. Luật Kinh doanh bđs 2023.  Ngân hàng không bảo lãnh \"chung chung\" cho cả dự án mà phải phát hành chứng thư bảo lãnh cá biệt cho từng khách hàng sau khi hợp đồng được ký kết. Nếu chủ đầu tư không bàn giao nhà đúng hạn hoặc vi phạm cam kết, ngân hàng có nghĩa vụ trả lại tiền (bao gồm tiền gốc và các khoản khác theo thỏa thuận) cho người mua. 96. Theo quy định tại Điều 8 Luật Kinh doanh bất động sản 2023, hành vi nào sau đây KHÔNG thuộc danh mục các hành vi bị nghiêm cấm trong hoạt động kinh doanh bất động sản?<br><br><b>Giải thích học thuật:</b> Luật Kinh doanh bất động sản và Bộ luật Dân sự đều tôn trọng nguyên tắc \"Tự do thỏa thuận\". Việc định giá bán là quyền của chủ đầu tư và sự chấp thuận của khách hàng dựa trên quy luật cung - cầu (trừ trường hợp nhà ở xã hội có quy định riêng về khung giá). Đây là quyền kinh doanh cốt lõi, không phải hành vi bị cấm. 97. Theo Luật Kinh doanh bất động sản 2023 và Luật Đất đai 2024, nguyên tắc nào sau đây được áp dụng để xác định giá trị giao dịch nhằm thực hiện nghĩa vụ tài chính với Nhà nước trong bối cảnh \"Bảng giá đất theo nguyên tắc thị trường\" từ năm 2026?<br><br><b>Giải thích học thuật:</b> Đây là quy định nhằm chống thất thu ngân sách. Theo Điều 159 Luật Đất đai 2024, Bảng giá đất được xây dựng hàng năm và sát với giá thị trường. Do đó, nếu các bên kê khai giá trên hợp đồng thấp hơn Bảng giá đất để trốn thuế, cơ quan Thuế sẽ tự động áp mức giá theo Bảng giá đất để tính thuế. 98. Theo quy định tại Điều 46 Luật Kinh doanh bất động sản 2023, bên thuê có quyền đơn phương chấm dứt thực hiện hợp đồng thuê nhà ở, công trình xây dựng trong trường hợp nào sau đây?<br><br><b>Giải thích học thuật:</b> Quyền đơn phương chấm dứt hợp đồng là một \"vũ khí pháp lý\" mạnh mẽ nhưng chỉ được kích hoạt khi có những căn cứ cụ thể để bảo vệ quyền lợi chính đáng của bên thuê: Vi phạm nghĩa vụ của bên cho thuê (Đáp án B): Theo quy định liên thông giữa Luật Kinh doanh bất động sản và Luật Nhà ở, bên cho thuê có nghĩa vụ đảm bảo tình trạng kỹ thuật và chất lượng tài sản như đã cam kết. Nếu tài sản xuống cấp hoặc hư hỏng mà bên cho thuê từ chối sửa chữa (sau khi đã thông báo), quyền đơn phương chấm dứt của bên thuê được xác lập nhằm bảo vệ mục đích sử dụng tài sản. 99. Theo quy định tại Điều 27 Luật Kinh doanh bất động sản 2023, hành vi nào sau đây là áp dụng SAI nguyên tắc bàn giao công trình xây dựng hoặc phần diện tích sàn xây dựng?<br><br><b>Giải thích học thuật:</b> Điều 27 Luật Kinh doanh bất động sản 2023. Lỗi tại phương án B vi phạm trực tiếp Điểm b Khoản 1 Điều 27. Đây là \"lỗ hổng\" mà nhiều chủ đầu tư thường lách để sớm thu nốt 25-30% tiền còn lại của khách hàng khi dự án vẫn còn là một công trường ngổn ngang hạ tầng. 100. Căn cứ Điều 44 Luật Kinh doanh bất động sản 2023 và Điều 12 Nghị định 96/2024/NĐ-CP, khi thực hiện các giao dịch trên thị trường, các bên phải tuân thủ hệ thống mẫu hợp đồng gồm bao nhiêu loại hợp đồng kinh doanh và hợp đồng kinh doanh dịch vụ bất động sản?<br><br><b>Giải thích học thuật:</b> Nhóm 11 loại hợp đồng kinh doanh bất động sản (Phụ lục II Nghị định 96/2024/NĐ-CP): Đây là sự kết hợp giữa các đối tượng (Nhà ở, Công trình xây dựng, Quyền sử dụng đất, Dự án) và các hình thức giao dịch: Về Nhà ở (03 loại): Mua bán; Thuê mua; Thuê.; Về Công trình xây dựng/Phần diện tích sàn (03 loại): Mua bán; Thuê mua; Thuê.; Về Quyền sử dụng đất (03 loại): Chuyển nhượng; Cho thuê; Cho thuê lại (kèm hạ tầng); Về Dự án (02 loại): Chuyển nhượng toàn bộ; Chuyển nhượng một phần. Nhóm 04 loại hợp đồng kinh doanh dịch vụ (Phụ lục III Nghị định 96/2024/NĐ-CP): Hợp đồng dịch vụ sàn giao dịch bất động sản, Hợp đồng dịch vụ môi giới bất động sản., Hợp đồng dịch vụ tư vấn bất động sản, Hợp đồng dịch vụ quản lý bất động sản."}];
        let quizData = [];
        let currentIndex = 0;

        window.onload = function() {
            if(!allData || allData.length === 0) {
                document.getElementById("quiz-container").innerHTML = "<h3 style='color:red; text-align:center;'>Lỗi: Không có dữ liệu câu hỏi!</h3>";
                return;
            }
            quizData = getSampledQuestions(100);
            renderQuestion();
        };

        // Thuật toán lấy mẫu 100 câu theo Thang đo Bloom
        function getSampledQuestions(count) {
            const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
            const filterLvl = (l) => allData.filter(q => String(q.level) === String(l));
            
            let p1 = shuffle(filterLvl("1")); let p2 = shuffle(filterLvl("2"));
            let p3 = shuffle(filterLvl("3")); let p4 = shuffle(filterLvl("4")); let p5 = shuffle(filterLvl("5"));

            let n1 = Math.round(count * 0.25); let n2 = Math.round(count * 0.25);
            let n3 = Math.round(count * 0.20); let n4 = Math.round(count * 0.20);
            let n5 = count - (n1 + n2 + n3 + n4);

            let selected = [ ...p1.splice(0, n1), ...p2.splice(0, n2), ...p3.splice(0, n3), ...p4.splice(0, n4), ...p5.splice(0, n5) ];

            if(selected.length < count) {
                let remain = shuffle([...p1, ...p2, ...p3, ...p4, ...p5]);
                selected = [...selected, ...remain.splice(0, count - selected.length)];
            }
            return shuffle(selected);
        }

        // Render câu hỏi lên màn hình
        function renderQuestion() {
            const q = quizData[currentIndex];
            const isMulti = q.content.includes("[*]");
            document.getElementById("progress-text").innerText = `Câu ${currentIndex + 1} / ${quizData.length}`;
            
            let optHtml = "";
            let hasOptions = false;
            
            ['A','B','C','D'].forEach(lbl => {
                if(q.options && q.options[lbl]) {
                    hasOptions = true;
                    optHtml += `
                        <label class="option-item" id="label-${lbl}">
                            <input type="${isMulti ? 'checkbox' : 'radio'}" name="q_opt" value="${lbl}" onchange="updateSelection()">
                            <b>${lbl}.</b> ${q.options[lbl]}
                        </label>`;
                }
            });

            if(!hasOptions) {
                optHtml = "<div style='color:red; background:#ffebee; padding:10px; border-radius:5px;'><i>⚠️ Lỗi: Không trích xuất được đáp án. Trong Word, anh hãy tự gõ A., B., C., D. (tắt tính năng đánh số tự động).</i></div>";
            }

            document.getElementById("quiz-container").innerHTML = `
                <div class="card">
                    <div class="q-meta">MỨC ĐỘ THỬ THÁCH: ${q.level || '1'}</div>
                    <div class="q-text">${q.content.replace(/\[\*\]/g, "").replace(/\n/g, '<br>')}</div>
                    <div class="options">${optHtml}</div>
                    
                    <button id="btn-check" class="btn-check-inline" onclick="checkAnswer()">Kiểm tra đáp án</button>
                    
                    <div id="exp-box" class="exp-box"></div>
                </div>`;
            window.scrollTo(0,0);
        }

        // Cập nhật viền xanh khi chạm chọn đáp án
        function updateSelection() {
            document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
            document.querySelectorAll('input:checked').forEach(el => el.parentElement.classList.add('selected'));
        }

        // Xử lý logic Nút Kiểm Tra
        function checkAnswer() {
            const q = quizData[currentIndex];
            const box = document.getElementById("exp-box");
            const btn = document.getElementById("btn-check");
            
            // Gom các đáp án đã chọn
            const checkedInputs = document.querySelectorAll('input[name="q_opt"]:checked');
            const selectedVals = Array.from(checkedInputs).map(i => i.value).sort().join(",");
            
            if (!selectedVals) {
                alert("⚠️ Vui lòng chọn một phương án trước khi kiểm tra!");
                return;
            }

            // Ẩn nút kiểm tra, hiện Box giải thích
            btn.style.display = "none";
            box.style.display = "block";

            let resultTitle = "";
            // Kiểm tra đúng sai
            if (selectedVals === q.answer) {
                resultTitle = `<div class="result-title" style="color: var(--success);">✔ CHÍNH XÁC!</div>`;
                box.style.borderLeftColor = "var(--success)";
            } else {
                resultTitle = `<div class="result-title" style="color: var(--error);">✘ SAI RỒI! (Bạn chọn: ${selectedVals})</div>`;
                box.style.borderLeftColor = "var(--error)";
            }

            // Tô màu các lựa chọn A, B, C, D
            ['A','B','C','D'].forEach(lbl => {
                const el = document.getElementById(`label-${lbl}`);
                if(!el) return;
                
                // Tô xanh đáp án đúng của hệ thống
                if(q.answer.includes(lbl)) {
                    el.classList.add('correct-ans');
                } 
                // Tô đỏ đáp án sai mà người dùng chọn
                else if(selectedVals.includes(lbl)) {
                    el.classList.add('wrong-ans');
                }
                
                // Vô hiệu hóa input để không cho click đổi nữa
                const input = el.querySelector('input');
                if(input) input.disabled = true;
            });

            // Gắn nội dung vào Box
            box.innerHTML = `
                ${resultTitle}
                <div style="margin-bottom:12px; font-size:1.05em;"><b>Đáp án đúng:</b> <span style="color:var(--success); font-weight:bold">${q.answer}</span></div>
                <div>${q.explanation || "<i>Hệ thống chưa cập nhật giải thích cho câu này.</i>"}</div>
            `;

            // Tự động cuộn mượt mà xuống phần giải thích
            box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Điều hướng câu hỏi
        function nextQ() { if(currentIndex < quizData.length-1) { currentIndex++; renderQuestion(); } }
        function prevQ() { if(currentIndex > 0) { currentIndex--; renderQuestion(); } }
    </script>

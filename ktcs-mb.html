 ra giá trị khi nó thỏa mãn được một nhu cầu thực tế kèm theo năng lực tài chính của thị trường.", "D": "Do bất động sản này có tính dị biệt quá lớn, làm triệt tiêu tính thanh khoản và khiến các phương pháp định giá thông thường không áp dụng được."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Mặc dù bđs có tính hữu ích cao, nhưng không phù hợp tại khu vực đó do thiếu bên có thể chi muua hay thuê, dẫn đến bđs này không bán được hoặc giá trị cho thuê, khai thác rất thấp."}, {"level": "1", "content": "Một bất động sản có sổ đỏ, không tranh chấp, nằm tại vị trí đắc địa. Tuy nhiên, do chủ sở hữu chưa hoàn thành nghĩa vụ tài chính bổ sung sau khi Nhà nước điều chỉnh Bảng giá đất hàng năm (theo Luật Đất đai 2024), cơ quan chức năng từ chối xác nhận giao dịch. Trong trường hợp này, giá trị thị trường của bất động sản bị ảnh hưởng như thế nào theo khung DUST (DEMAND nhu cầu - UTILITY độ hữu ích - SCARCITY tính khan hiếm – TRANSFERABILITY tính có thể chuyển giao)?", "options": {"A": "Tính hữu ích (Utility) bị triệt tiêu hoàn toàn do không thể đưa vào sản xuất kinh doanh.", "B": "Tính khan hiếm (Scarcity) tăng lên vì loại đất này trở nên hiếm có trên thị trường giao dịch.", "C": "Giá trị thị trường bị sụt giảm nghiêm trọng do tính có thể chuyển giao (Transferability) bị đóng băng, làm gián đoạn khả năng hiện thực hóa lợi nhuận của chủ sở hữu.", "D": "Cầu (Demand) sẽ tăng lên do tâm lý nhà đầu tư muốn mua gom những bất động sản đang gặp vướng mắc pháp lý tạm thời với giá rẻ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Trường hợp này liên quan đến việc hạn chế/tạm ngưng giao dịch do chưa hoàn thành nghĩa vụ thuế, là ví dụ điển hình của việc không có tính có thể chuyển giao."}, {"level": "1", "content": "Xu hướng \"Digital Nomad\" (làm việc từ xa) đang ngày càng trở nên phổ biến, kết hợp với việc triển khai hệ thống Cơ sở dữ liệu đất đai quốc gia cho phép tra cứu quy hoạch thời gian thực qua Smartphone. Sự kết hợp giữa nhân tố Xã hội và Công nghệ này sẽ dẫn đến hệ quả gì trên thị trường bất động sản vùng ven?", "options": {"A": "Làm giảm tính khan hiếm của bất động sản trung tâm, từ đó làm giảm giá đất tại các thành phố lớn một cách bền vững.", "B": "Làm giảm nhu cầu về tính hữu ích của không gian sống do mọi giao tiếp đều chuyển sang môi trường số.", "C": "Thúc đẩy sự dịch chuyển của đường Cầu sang các khu vực vùng ven có cảnh quan tốt, đồng thời giảm thiểu rủi ro pháp lý nhờ tính minh bạch thông tin, làm tăng tính thanh khoản cho thị trường này.", "D": "Triệt tiêu hoàn toàn vai trò của các chủ thể trung gian (môi giới) do người mua và người bán đã có đầy đủ thông tin kỹ thuật."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Trường hợp này liên quan đến việc sự thay đổi của Vị trí tương đối. Nhờ Công nghệ, khoảng cách địa lý không còn là rào cản tuyệt đối, làm thay đổi tư duy về Tính hữu ích của bất động sản vùng ven.."}, {"level": "1", "content": "Trong mô hình chu kỳ bất động sản, giai đoạn Phục hồi thường xuất hiện sau một thời kỳ suy thoái kéo dài. Nhận định nào sau đây KHÔNG phản ánh đúng các chỉ báo đặc trưng của giai đoạn này?<br>A Tỷ lệ lấp đầy (Occupancy Rate) bắt đầu ổn định và tăng nhẹ trở lại do nhu cầu thực tế bắt đầu hấp thụ lượng hàng tồn kho từ chu kỳ trước.", "options": {"B": "Các hoạt động xây dựng mới vẫn ở mức thấp do các nhà đầu tư vẫn còn thận trọng và các tổ chức tín dụng chưa nới lỏng hoàn toàn các điều kiện cho vay.", "C": "Giá cả thị trường bắt đầu bùng nổ và tăng trưởng nóng trên diện rộng ở tất cả các phân khúc, bất chấp các chỉ số vĩ mô về thu nhập dân cư.", "D": "Mức độ giao dịch bắt đầu cải thiện, tập trung chủ yếu ở các sản phẩm đáp ứng nhu cầu ở thực và các bất động sản có pháp lý minh bạch, an toàn."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Giai đoạn Tăng trưởng được coi là \"thời điểm vàng\" của các nhà phát triển dự án. Đặc điểm nào sau đây SAI khi mô tả về sự vận hành của thị trường bất động sản trong giai đoạn này?", "options": {"A": "Nguồn cầu (Demand) vượt xa nguồn cung hiện hữu, dẫn đến việc đường Cầu dịch chuyển liên tục sang phải và đẩy giá bất động sản tăng cao.", "B": "Chính sách tín dụng trở nên linh hoạt, lãi suất cho vay có xu hướng hấp dẫn và các ngân hàng gia tăng hạn mức cho vay dựa trên giá trị tài sản thế chấp đang tăng.", "C": "Tỷ lệ xây dựng (Construction Rate) tăng mạnh khi các chủ đầu tư ồ ạt khởi công dự án mới để đón đầu làn sóng tăng giá của thị trường.", "D": "Tỷ lệ lấp đầy đạt mức tối đa và bắt đầu có dấu hiệu sụt giảm mạnh do người tiêu dùng chuyển hướng sang các kênh đầu tư thay thế như vàng hoặc tiền số."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nhận diện điểm đảo chiều tại giai đoạn Bão hòa trong thị trường bất động sản là bài toán khó nhất đối với các nhà quản trị rủi ro. Nhận định nào sau đây KHÔNG phải là chỉ báo cho thấy thị trường đã chạm đỉnh và chuẩn bị bước vào giai đoạn suy thoái??", "options": {"A": "Nguồn cung mới (New Supply) từ các dự án khởi công ở giai đoạn trước bắt đầu đổ bộ hàng loạt vào thị trường, vượt quá khả năng hấp thụ của nguồn cầu thực tế.", "B": "Tỷ lệ lấp đầy bắt đầu giảm dần một cách âm thầm, đặc biệt là ở phân khúc văn phòng cho thuê và căn hộ cao cấp, dù giá rao bán vẫn được giữ ở mức cao.", "C": "Tốc độ tăng của giá bất động sản luôn thấp hơn tốc độ tăng trưởng của GDP và thu nhập bình quân đầu người, đảm bảo tính bền vững cho thị trường.", "D": "Các chính sách điều tiết vĩ mô bắt đầu thắt chặt (như tăng lãi suất, kiểm soát tín dụng bất động sản) nhằm hạ nhiệt thị trường và ngăn ngừa bong bóng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khái niệm nào sau đây thể hiện tốt nhất mức giá ước tính mà tài sản có thể được mua bán vào ngày thẩm định giá, giữa các bên sẵn lòng, hành động có hiểu biết, thận trọng và không bị ép buộc?", "options": {"A": "Giá trị sử dụng", "B": "Giá trị đầu tư", "C": "Giá trị thị trường", "D": "Giá cả giao dịch"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 15 Điều 4 Luật Giá 2023 (có hiệu lực từ 01/07/2024) và Tiêu chuẩn thẩm định giá Việt Nam về Cơ sở giá trị. Theo đó, giá trị thị trường (Market Value) là một con số ức tính (hypothetical). Nó không phải là giá thực tế đã chốt giao dịch, mà là mức giá nên có trong một môi trường lý tưởng: không ép buộc, thông tin minh bạch, các bên thận trọng. Điểm mấu chốt để phân biệt với các phương án còn lại là tính \"Khách quan thị trường\". Giá trị thị trường là mức giá ước tính phản ánh các điều kiện giao dịch khách quan, công khai giữa các bên sẵn lòng mua và bán, hành động có hiểu biết và không bị ép buộc, theo định nghĩa của Ủy ban Tiêu chuẩn Định giá Quốc tế (IVSC)."}, {"level": "1", "content": "Giá trị của bất động sản có xu hướng được giới hạn bởi chi phí để có được một bất động sản thay thế tương đương là thể hiện của nguyên tắc nào?", "options": {"A": "Nguyên tắc Cung - Cầu", "B": "Nguyên tắc Thay thế", "C": "Nguyên tắc Đóng góp", "D": "Nguyên tắc Sử dụng cao nhất và hiệu quả nhất"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nguyên tắc thay thế cho rằng người mua thận trọng sẽ không trả giá cao hơn chi phí để có được một tài sản tương đương có thể thay thế."}, {"level": "1", "content": "Phương pháp định giá đất nào dựa trên việc xác định giá trị quyền sử dụng đất bằng cách lấy tổng doanh thu phát triển ước tính trừ đi tổng chi phí phát triển ước tính?", "options": {"A": "Phương pháp so sánh", "B": "Phương pháp thu nhập", "C": "Phương pháp thặng dư", "D": "Phương pháp hệ số điều chỉnh giá đất"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Khoản 5 Điều 158 Luật Đất đai 2024 và Điều 6 Nghị định 71/2024/NĐ-CP, phương pháp thặng dư xác định giá đất dựa trên phần còn lại (thặng dư) sau khi lấy tổng doanh thu phát triển trừ đi tổng chi phí phát triển."}, {"level": "1", "content": "Theo Luật Đất đai 2024, cơ quan nào có thẩm quyền ban hành Bảng giá đất?", "options": {"A": "Chính phủ", "B": "Bộ Nông nghiệp và Môi trường", "C": "Hội đồng nhân dân cấp tỉnh", "D": "Ủy ban nhân dân cấp tỉnh"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 159 Luật Đất đai 2024 quy định Ủy ban nhân dân cấp tỉnh xây dựng và trình Hội đồng nhân dân cùng cấp thông qua Bảng giá đất trước khi ban hành."}, {"level": "1", "content": "Luật Giá 2023 có hiệu lực thi hành từ ngày nào?", "options": {"A": "01/01/2024", "B": "01/07/2024", "C": "01/08/2024", "D": "01/01/2025"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 74 Luật Giá 2023 (Luật số 16/2023/QH15) quy định Luật này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2024, trừ một số quy định cụ thể."}, {"level": "1", "content": "Đâu KHÔNG phải là một trong các nguyên tắc định giá đất theo Điều 158 Luật Đất đai 2024?", "options": {"A": "Theo nguyên tắc thị trường", "B": "Theo nguyên tắc lợi nhuận tối đa", "C": "Tuân thủ phương pháp, trình tự, thủ tục", "D": "Bảo đảm tính độc lập giữa các chủ thể"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 158 Luật Đất đai 2024 quy định 5 nguyên tắc định giá đất, bao gồm nguyên tắc thị trường, tuân thủ phương pháp, trung thực khách quan, độc lập và hài hòa lợi ích, không có nguyên tắc lợi nhuận tối đa."}, {"level": "1", "content": "Giá đất cụ thể được áp dụng trong trường hợp nào sau đây theo Luật Đất đai 2024?", "options": {"A": "Tính thuế sử dụng đất phi nông nghiệp đối với hộ gia đình", "B": "Tính tiền thuê đất trả tiền hàng năm", "C": "Tính tiền bồi thường khi Nhà nước thu hồi đất", "D": "Tính phí trước bạ khi chuyển nhượng quyền sử dụng đất"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 160 Luật Đất đai 2024 quy định giá đất cụ thể được sử dụng để tính tiền bồi thường khi Nhà nước thu hồi đất. Các trường hợp còn lại thường áp dụng Bảng giá đất hoặc hệ số điều chỉnh."}, {"level": "1", "content": "Hoạt động thẩm định giá tài sản (bao gồm bất động sản trừ định giá đất) chủ yếu chịu sự điều chỉnh của luật nào?", "options": {"A": "Luật Đất đai 2024", "B": "Luật Kinh doanh bất động sản 2023", "C": "Luật Giá 2023", "D": "Luật Xây dựng"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Giá 2023 là văn bản pháp lý cao nhất quy định về hoạt động thẩm định giá đối với tất cả các loại tài sản (trừ định giá đất theo Luật Đất đai), bao gồm tiêu chuẩn thẩm định viên, doanh nghiệp thẩm định giá và chuẩn mực nghề nghiệp."}, {"level": "1", "content": "Cá nhân muốn hành nghề thẩm định viên về giá cần đáp ứng điều kiện nào về kinh nghiệm công tác thực tế theo Luật Giá 2023 (trường hợp không có bằng ĐH chuyên ngành giá/TĐG)?", "options": {"A": "Từ đủ 12 tháng", "B": "Từ đủ 24 tháng", "C": "Từ đủ 36 tháng", "D": "Từ đủ 48 tháng"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điểm c Khoản 1 Điều 45 Luật Giá 2023 yêu cầu người đăng ký hành nghề thẩm định giá phải có tổng thời gian thực tế làm việc tại các doanh nghiệp thẩm định giá, cơ quan quản lý nhà nước về giá và thẩm định giá với trình độ đại học trở lên từ đủ 36 tháng."}, {"level": "1", "content": "Nguyên tắc đạo đức nghề nghiệp nào yêu cầu thẩm định viên về giá phải trung thực, thẳng thắn trong công việc và các mối quan hệ nghề nghiệp?", "options": {"A": "Tính độc lập, khách quan", "B": "Tính chính trực", "C": "Năng lực chuyên môn và tính thận trọng", "D": "Tính bảo mật"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Chuẩn mực thẩm định giá Việt Nam về Quy tắc đạo đức nghề nghiệp (ban hành kèm Thông tư 30/2024/TT-BTC), nguyên tắc chính trực đòi hỏi sự trung thực, thẳng thắn."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, dịch vụ tư vấn giá bất động sản phải do đối tượng nào cung cấp?", "options": {"A": "Cá nhân có kinh nghiệm về giá", "B": "Chuyên gia kinh tế độc lập", "C": "Doanh nghiệp kinh doanh dịch vụ bất động sản", "D": "Doanh nghiệp thẩm định giá"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 5 Điều 9 và Điều 61 Luật Kinh doanh bất động sản 2023 yêu cầu tổ chức, cá nhân kinh doanh dịch vụ tư vấn bất động sản phải thành lập doanh nghiệp kinh doanh dịch vụ bất động sản."}, {"level": "1", "content": "Theo quy định tại Điều 159 Luật Đất đai 2024, kể từ sau lần công bố đầu tiên vào ngày 01/01/2026, chu kỳ điều chỉnh, sửa đổi và bổ sung Bảng giá đất được thực hiện theo nguyên tắc nào để đảm bảo sát giá thị trường?", "options": {"A": "Định kỳ 05 năm một lần và điều chỉnh khi giá thị trường biến động từ 20%.", "B": "Điều chỉnh hằng năm và công bố áp dụng từ ngày 01 tháng 01 của năm tiếp theo.", "C": "Điều chỉnh hằng quý dựa trên chỉ số giá tiêu dùng (CPI) của địa phương.", "D": "Điều chỉnh khi Nhà nước thực hiện quy hoạch lại hoặc thu hồi đất diện rộng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật Đất đai 2024 (Khoản 1 Điều 159): Đã hoàn toàn bãi bỏ Khung giá đất. UBND cấp tỉnh có trách nhiệm trình HĐND cấp tỉnh quyết định điều chỉnh, sửa đổi, bổ sung BGĐ để công bố và áp dụng từ ngày 01/01 của năm tiếp theo. Bên cạnh chu kỳ hằng năm, Luật còn cho phép trường hợp cần thiết thì UBND cấp tỉnh có thể quyết định điều chỉnh, sửa đổi, bổ sung BGĐ ngay trong năm để phù hợp với tình hình thực tế (Ví dụ: sau khi có biến động hạ tầng lớn). Điều này giúp BGĐ trở thành công cụ điều tiết linh hoạt hơn rất nhiều."}, {"level": "1", "content": "Theo quy định tại Nghị định 71/2024/NĐ-CP, phương pháp định giá đất nào được thực hiện bằng cách lấy giá đất trong Bảng giá đất nhân với tỷ lệ biến động giữa giá đất phổ biến trên thị trường?", "options": {"A": "Phương pháp so sánh", "B": "Phương pháp thu nhập", "C": "Phương pháp thặng dư", "D": "Phương pháp hệ số điều chỉnh giá đất"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Theo Khoản 5 Điều 158 Luật Đất đai 2024 và Điều 7 Nghị định 71/2024/NĐ-CP, phương pháp hệ số điều chỉnh xác định giá đất bằng cách nhân giá trong Bảng giá đất với hệ số K."}, {"level": "1", "content": "Theo quy định tại Điều 158 Luật Đất đai 2024 và Nghị định 71/2024/NĐ-CP, nguồn thông tin đầu vào nào sau đây được coi là căn cứ hợp lệ để thực hiện định giá đất?", "options": {"A": "Giá đất ghi trong hợp đồng chuyển nhượng quyền sử dụng đất đã công chứng, chứng thực hình thành trong vòng 36 tháng.", "B": "Giá đất rao bán trên các cổng thông tin bất động sản trực tuyến tại thời điểm định giá.", "C": "Giá đất trúng đấu giá quyền sử dụng đất (đã hoàn thành nghĩa vụ tài chính) hình thành trong vòng 24 tháng.", "D": "Giá đất dựa trên Khung giá đất do Chính phủ ban hành định kỳ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Khoản 3 Điều 158 Luật Đất đai 2024 và chi tiết tại Điều 4 Nghị định 71/2024/NĐ-CP: (1) Thông tin đầu vào phải là giá đất đã xuất hiện trong giao dịch thực tế. (2) Giá đất trúng đấu giá quyền sử dụng đất chỉ được coi là thông tin đầu vào sau khi người trúng đấu giá đã hoàn thành nghĩa vụ tài chính. (3) Mốc thời gian: Phải hình thành trong vòng 24 tháng tính đến thời điểm định giá. Đây là con số định giới để đảm bảo dữ liệu không quá lạc hậu so với biến động thị trường.."}, {"level": "1", "content": "Khi áp dụng phương pháp so sánh để định giá đất, cần lựa chọn tối thiểu bao nhiêu thửa đất so sánh?", "options": {"A": "1 thửa", "B": "2 thửa", "C": "3 thửa", "D": "5 thửa"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điểm c Khoản 3 Điều 4 Nghị định 71/2024/NĐ-CP quy định phải lựa chọn ít nhất 03 thửa đất so sánh đáp ứng các tiêu chí ưu tiên."}, {"level": "1", "content": "Căn cứ Khoản 2 Điều 45 Luật Giá 2023, cá nhân nào sau đây KHÔNG được phép đăng ký hành nghề thẩm định giá tại các doanh nghiệp thẩm định giá?", "options": {"A": "Người đã có Thẻ thẩm định viên về giá nhưng chưa tham gia chương trình cập nhật kiến thức chuyên môn trong năm liền trước.", "B": "Người đang bị khởi tố, truy tố hoặc xét xử theo pháp luật tố tụng hình sự.", "C": "Người có Thẻ thẩm định viên về giá nhưng hiện không cư trú tại Việt Nam trong thời gian đăng ký hành nghề.", "D": "Người đã nghỉ hưu và đang hưởng chế độ bảo hiểm xã hội theo quy định của pháp luật lao động."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 45 Luật Giá 2023 liệt kê các đối tượng không được hành nghề thẩm định giá, bao gồm người đang trong thời gian bị khởi tố, truy tố, xét xử. Mục đích để đảm bảo tính liêm chính và tin cậy của kết quả thẩm định giá — vốn là căn cứ cho các quyết định kinh tế và pháp lý quan trọng. Khi một người đang chịu sự điều tra của pháp luật, năng lực khách quan và uy tín của họ bị đặt dấu hỏi lớn. Điểm a Khoản 2 Điều 45 cung quy định cán bộ, công chức cũng là đối tượng bị cấm đăng ký hành nghề tại doanh nghiệp thẩm định giá."}, {"level": "1", "content": "Nguyên tắc định giá nào cho rằng giá trị của một bộ phận bất động sản được đo bằng mức độ đóng góp vào tổng giá trị của toàn bộ bất động sản?", "options": {"A": "Nguyên tắc Thay thế", "B": "Nguyên tắc Đóng góp", "C": "Nguyên tắc Cân bằng", "D": "Nguyên tắc Phù hợp"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nguyên tắc đóng góp xem xét giá trị của từng bộ phận cấu thành dựa trên sự đóng góp của nó vào giá trị tổng thể."}, {"level": "1", "content": "Theo Hệ thống Tiêu chuẩn thẩm định giá Việt Nam, khi mục đích thẩm định là phục vụ giao dịch chuyển nhượng, thế chấp vay vốn hoặc bồi thường giải phóng mặt bằng, thẩm định viên bắt buộc phải sử dụng cơ sở giá trị nào để làm thước đo khách quan?", "options": {"A": "Cơ sở Giá trị phi thị trường, phản ánh điều kiện giao dịch đặc thù của các bên.", "B": "Cơ sở Giá trị thị trường, phản ánh mức giá ước tính trong điều kiện giao dịch giả định lý tưởng.", "C": "Cơ sở Giá trị thanh lý, phản ánh mức giá có thể thu hồi được trong khoảng thời gian bị giới hạn.", "D": "Cơ sở Giá trị sổ sách, phản ánh nguyên giá tài sản sau khi trừ đi khấu hao lũy kế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Giá trị thị trường là cơ sở giá trị quan trọng nhất và thường được sử dụng trong hầu hết các cuộc thẩm định giá bất động sản phục vụ giao dịch thông thường.  Mục đích của việc chuyển nhượng, vay vốn ngân hàng, hay đền bù Nhà nước đều yêu cầu sự công bằng và minh bạch. Sự công bằng này chỉ đạt được khi sử dụng Cơ sở Giá trị thị trường (Market Value).Nó là một con số ước lượng khách quan, không bị bóp méo bởi việc người bán đang cần tiền gấp hay người mua đang khao khát tài sản đó."}, {"level": "1", "content": "Bước nào sau đây thường KHÔNG nằm trong quy trình thẩm định giá bất động sản chuyên nghiệp?", "options": {"A": "Xác định nhiệm vụ định giá và cơ sở giá trị.", "B": "Khảo sát hiện trường và thu thập thông tin.", "C": "Quyết định giá bán cuối cùng cho khách hàng.", "D": "Lựa chọn phương pháp và ước tính giá trị bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nhiệm vụ của thẩm định viên là ước tính giá trị (thường là giá trị thị trường), không phải là quyết định giá bán. Việc quyết định giá bán thuộc về người bán. Quy trình thẩm định giá bao gồm các bước từ xác định nhiệm vụ đến lập báo cáo."}, {"level": "1", "content": "Theo Hệ thống Tiêu chuẩn thẩm định giá Việt Nam, phương pháp Chi phí thường được ưu tiên áp dụng đối với nhóm bất động sản nào sau đây để đảm bảo độ tin cậy của kết quả thẩm định?", "options": {"A": "Bất động sản thương mại có khả năng dự báo chính xác dòng thu nhập trong tương lai.", "B": "Đất trống tại các khu vực đô thị có thị trường giao dịch chuyển nhượng sôi động.", "C": "Bất động sản chuyên dùng hoặc các công trình đặc thù, rất ít khi xuất hiện giao dịch phổ biến trên thị trường.", "D": "Căn hộ chung cư cao cấp thuộc các dự án đang được chào bán rộng rãi."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Phương pháp chi phí thường phù hợp với các bất động sản ít có giao dịch tương tự trên thị trường, các bất động sản chuyên dùng hoặc công cộng như trường học, bệnh viện, thư viện. Phương pháp Chi phí được vận hành dựa trên công thức: Giá trị tài sản = Chi phí tái tạo/thay thế mới - Hao mòn lũy kế + Giá trị quyền sử dụng đất. Đối với các tài sản như: Bệnh viện, trường học, bảo tàng, nhà thờ, hoặc trụ sở cơ quan, chúng ta gần như không thể tìm thấy các tài sản tương đương vừa mới giao dịch để áp dụng phương pháp So sánh. Đồng thời, các tài sản này thường không hoạt động vì mục tiêu lợi nhuận thuần túy nên khó áp dụng phương pháp Thu nhập. Do đó, phương pháp Chi phí là thước đo đo lường giá trị vật chất thực tế còn lại của tài sản."}, {"level": "1", "content": "Khi áp dụng phương pháp Chi phí để xác định giá trị công trình xây dựng, tổng mức giảm giá (Giảm giá tích lũy) phải được tính toán dựa trên sự kết hợp của các nhóm yếu tố nào sau đây?", "options": {"A": "Hao mòn vật lý do quá trình sử dụng tự nhiên và các hư hỏng kết cấu công trình.", "B": "Sự kết hợp giữa lỗi thời chức năng (do thiết kế lạc hậu) và lỗi thời kinh tế (do tác động ngoại biên).", "C": "Hao mòn vật lý, lỗi thời chức năng và lỗi thời kinh tế (lỗi thời bên ngoài).", "D": "Sự sụt giảm giá trị sổ sách của tài sản dựa trên phương pháp khấu hao đường thẳng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Giảm giá tích lũy bao gồm sự mất mát giá trị do hao mòn vật lý (do sử dụng, xuống cấp tự nhiên), lỗi thời chức năng (do thiết kế, công nghệ lạc hậu) và lỗi thời kinh tế/bên ngoài (do tác động từ môi trường xung quanh). Theo Tiêu chuẩn thẩm định giá Việt Nam về Cách tiếp cận từ chi phí, một tài sản bị mất giá bởi 3 yếu tố khác nhau: (1) Hao mòn vật lý (Physical Deterioration): Những hư hỏng có thể thấy bằng mắt thường (nứt tường, thấm dột, xuống cấp vật liệu). (2) Lỗi thời chức năng (Functional Obsolescence): Công trình vẫn mới nhưng thiết kế không còn phù hợp (ví dụ: căn hộ cao cấp nhưng không có chỗ để xe, trần nhà quá thấp, hoặc bố trí không gian lãng phí). (3) Lỗi thời kinh tế/bên ngoài (External/Economic Obsolescence): Đây là yếu tố khó tính toán nhất. Tài sản hoàn hảo nhưng giá trị giảm do các yếu tố ngoài ranh giới đất (ví dụ: bãi rác mới quy hoạch gần nhà, tiếng ồn sân bay, hoặc sự suy thoái kinh tế của cả khu vực)."}, {"level": "1", "content": "Theo Luật Đất đai 2024, thông tin về giá đất ghi trong hợp đồng chuyển nhượng được sử dụng làm căn cứ định giá đất phải được hình thành trong thời gian tối đa bao lâu tính đến thời điểm định giá?", "options": {"A": "6 tháng", "B": "12 tháng", "C": "24 tháng", "D": "36 tháng"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 4 Điều 158 Luật Đất đai 2024 quy định thông tin giá đất trong hợp đồng chuyển nhượng hoặc giá trúng đấu giá được sử dụng làm thông tin đầu vào phải được hình thành trong thời gian không quá 24 tháng tính đến thời điểm định giá."}, {"level": "1", "content": "Để được cấp Giấy chứng nhận đủ điều kiện kinh doanh dịch vụ thẩm định giá, doanh nghiệp phải có tối thiểu bao nhiêu thẩm định viên về giá đăng ký hành nghề tại trụ sở chính?", "options": {"A": "1 người", "B": "3 người", "C": "5 người", "D": "7 người"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điểm a Khoản 1 Điều 49 Luật Giá 2023 quy định doanh nghiệp phải có ít nhất 05 người có thẻ thẩm định viên về giá đủ điều kiện đăng ký hành nghề thẩm định giá tại doanh nghiệp. (Chi nhánh yêu cầu 3 TĐV)"}, {"level": "1", "content": "Trong cơ chế quản lý tài chính đất đai hiện hành, mục đích chủ yếu của việc xác định Giá đất cụ thể thay vì áp dụng Bảng giá đất là gì?", "options": {"A": "Thiết lập cơ sở dữ liệu để tính thuế sử dụng đất phi nông nghiệp và các loại lệ phí quản lý Nhà nước hằng năm.", "B": "Đảm bảo tính sát thực với giá thị trường tại thời điểm quyết định cho các trường hợp bồi thường, giao đất/thuê đất không qua đấu giá và xác định giá khởi điểm dự án.", "C": "Cung cấp một khung giá tham chiếu cố định cho các giao dịch chuyển nhượng quyền sử dụng đất giữa các cá nhân trên thị trường dân sự.", "D": "Làm căn cứ duy nhất để tính giá trị quyền sử dụng đất khi thực hiện cổ phần hóa doanh nghiệp Nhà nước ở mọi quy mô."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Khoản 1 Điều 160 Luật Đất đai 2024, giá đất cụ thể được xác định cho từng trường hợp nhằm phản ánh đúng giá trị thị trường tại thời điểm, phục vụ các mục đích quan trọng như tính tiền sử dụng đất/thuê đất trả 1 lần cho tổ chức, bồi thường, giá khởi điểm đấu giá... Giá đất cụ thể được xác định bằng các phương pháp định giá đất (So sánh, Thặng dư, Thu nhập) nhằm tìm ra giá trị thực tế nhất tại thời điểm đó. Bồi thường khi thu hồi đất: Để đảm bảo quyền lợi cho người dân không bị thiệt thòi bởi sự lạc hậu của bảng giá. Giao đất/Cho thuê đất dự án: Ngăn chặn thất thoát ngân sách Nhà nước khi giao đất cho tổ chức mà không qua đấu giá. Giá khởi điểm đấu giá dự án: Làm \"điểm tựa\" để thị trường tự quyết định giá cuối cùng"}, {"level": "1", "content": "Khi áp dụng phương pháp thặng dư, \"lợi nhuận của nhà đầu tư\" được tính vào đâu?", "options": {"A": "Tổng doanh thu phát triển (DT)", "B": "Tổng chi phí phát triển (CP)", "C": "Giá trị còn lại của đất (V)", "D": "Chi phí tài chính"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lợi nhuận của nhà đầu tư là một cấu phần của Tổng chi phí phát triển (CP) và được trừ khỏi Tổng doanh thu phát triển (DT) để xác định giá trị còn lại của đất. Theo điểm e Khoản 2 Điều 6 Nghị định 71/2024/NĐ-CP (hướng dẫn Luật Đất đai 2024) và điểm e Khoản 2 Điều 9 Chuẩn mực Thẩm định giá Bất động sản (TT42/2024)."}, {"level": "1", "content": "Bước đầu tiên trong quy trình định giá đất bằng phương pháp so sánh theo Nghị định 71/2024/NĐ-CP là gì?", "options": {"A": "Phân tích, lựa chọn ít nhất 03 thửa đất so sánh có các đặc điểm tương đồng nhất.", "B": "Điều chỉnh mức giá của các thửa đất so sánh dựa trên các yếu tố khác biệt với thửa đất cần định giá.", "C": "Khảo sát, thu thập thông tin về thửa đất cần định giá và các thửa đất dự kiến so sánh.", "D": "Ước tính giá đất của thửa đất cần định giá bằng cách tính trung bình cộng các mức giá đã điều chỉnh."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 Điều 4 Nghị định 71/2024/NĐ-CP quy định bước 1 là khảo sát, thu thập thông tin về đặc điểm pháp lý, kinh tế - kỹ thuật của thửa đất cần định giá và các thửa đất dự kiến dùng để so sánh."}, {"level": "1", "content": "Cá nhân có Thẻ thẩm định viên về giá thì có cần Giấy chứng nhận hoàn thành khóa đào tạo nghiệp vụ về giá đất để hành nghề tư vấn xác định giá đất không?", "options": {"A": "Có, bắt buộc phải có cả hai.", "B": "Không, chỉ cần Thẻ thẩm định viên về giá là đủ.", "C": "Chỉ cần khi tư vấn cho dự án lớn.", "D": "Tùy thuộc vào yêu cầu của từng tỉnh."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 4 Thông tư 61/2022/TT-BTC (quy định về tư vấn xác định giá đất) nêu rõ trường hợp cá nhân đã được cấp Thẻ thẩm định viên về giá thì không cần đáp ứng điều kiện về Giấy chứng nhận đào tạo nghiệp vụ về giá đất. Điều này cũng được kế thừa trong mô tả về điều kiện hành nghề tư vấn xác định giá đất. Lưu ý: Văn bản gốc đề cập đến điều kiện hành nghề tư vấn xác định giá đất nói chung, có thể tham chiếu đến quy định cũ hơn, nhưng logic miễn trừ cho người có thẻ TĐV là phổ biến."}, {"level": "1", "content": "Trong các cách tiếp cận thẩm định giá bất động sản theo Chuẩn mực Việt Nam, cách tiếp cận nào KHÔNG được liệt kê?", "options": {"A": "Cách tiếp cận từ thị trường", "B": "Cách tiếp cận từ chi phí", "C": "Cách tiếp cận từ thu nhập", "D": "Cách tiếp cận từ lợi nhuận kỳ vọng"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Chuẩn mực thẩm định giá Việt Nam (ví dụ Thông tư 32/2024/TT-BTC) quy định 3 cách tiếp cận chính là từ thị trường, từ chi phí và từ thu nhập."}, {"level": "1", "content": "Việc lập \"Báo cáo kết quả thẩm định giá\" và phát hành \"Chứng thư thẩm định giá\" là bước nào trong quy trình thẩm định giá?", "options": {"A": "Bước đầu tiên", "B": "Bước khảo sát hiện trường", "C": "Bước phân tích thông tin", "D": "Bước cuối cùng"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Lập báo cáo và chứng thư thẩm định giá là bước cuối cùng, tổng kết toàn bộ quá trình và kết quả thẩm định giá để trình bày cho khách hàng."}, {"level": "1", "content": "Theo Hệ thống Tiêu chuẩn thẩm định giá Việt Nam, nguyên tắc nào khẳng định rằng giá trị của bất động sản không chỉ được xác định bởi các yếu tố trong quá khứ hay hiện tại, mà chủ yếu được hình thành từ sự kỳ vọng của nhà đầu tư về các lợi ích kinh tế hoặc sự gia tăng giá trị tài sản trong tương lai?", "options": {"A": "Nguyên tắc Thay đổi", "B": "Nguyên tắc Phù hợp", "C": "Nguyên tắc Dự báo", "D": "Nguyên tắc Cạnh tranh"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nguyên tắc dự báo (Anticipation) cho rằng giá trị hiện tại của bất động sản phản ánh lợi ích dự kiến mà nó sẽ mang lại trong tương lai. nguyên tắc Dự báo (Anticipation) là cơ sở lý luận cho công thức tổng quát của các phương pháp thuộc Cách tiếp cận từ thu nhập (Vốn hóa trực tiếp và Chiết khấu dòng tiền - DCF):  Trong đó: V là giá trị tài sản, CF_t là lợi nhuận kỳ vọng tại năm t, r là tỷ suất chiết khấu. Người mua sẵn lòng trả một mức giá hiện tại vì họ dự báo được tài sản sẽ tạo ra dòng tiền hoặc khả năng tăng giá trong những năm tiếp theo."}, {"level": "1", "content": "Theo quy định tại Điều 5 Nghị định 71/2024/NĐ-CP, phương pháp định giá đất nào được ưu tiên áp dụng đối với các thửa đất nông nghiệp đã xác định được thu nhập ròng ổn định hằng năm nhưng không thu thập được đủ thông tin về giá đất giao dịch trên thị trường để áp dụng phương pháp So sánh?", "options": {"A": "Phương pháp so sánh", "B": "Phương pháp thu nhập", "C": "Phương pháp thặng dư", "D": "Phương pháp hệ số điều chỉnh"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phương pháp thu nhập xác định giá trị dựa trên khả năng tạo thu nhập ròng ổn định, phù hợp với các loại đất có thể tạo ra dòng tiền đều đặn như đất nông nghiệp hoặc đất cho thuê thương mại.   Theo logic của nhà làm luật tại Điều 5 Nghị định 71/2024/NĐ-CP, phương pháp Thu nhập được xác định bằng công thức vốn hóa dòng tiền: Đối với đất nông nghiệp: Thu nhập ròng được tính bằng doanh thu từ sản phẩm nông nghiệp trừ đi các chi phí sản xuất (giống, phân bón, lao động, thuế...). Đất nông nghiệp (trồng cây hằng năm, cây lâu năm, nuôi trồng thủy sản) thường có chu kỳ thu hoạch và sản lượng tương đối ổn định, làm cho mẫu số \"Thu nhập ròng\" trở nên đáng tin cậy."}, {"level": "1", "content": "Căn cứ theo Khoản 3 Điều 159 Luật Đất đai 2024, điều kiện bắt buộc về hạ tầng thông tin để một khu vực có thể triển khai xây dựng Bảng giá đất chi tiết đến từng thửa đất trên cơ sở vùng giá trị và thửa đất chuẩn là gì?", "options": {"A": "Phải có hệ thống mạng lưới viễn thông băng thông rộng và phủ sóng định vị vệ tinh (GNSS) toàn diện.", "B": "Phải có hệ thống camera giám sát biến động thị trường bất động sản trực tuyến tại địa phương.", "C": "Phải có bản đồ địa chính số và hệ thống cơ sở dữ liệu quốc gia về giá đất đã được cập nhật.", "D": "Phải có phần mềm tự động định giá đất (AVM) được Bộ Tài nguyên và Môi trường cấp phép."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 Điều 159 Luật Đất đai 2024 nêu rõ việc xây dựng Bảng giá đất đến từng thửa đất được thực hiện đối với khu vực đã có bản đồ địa chính số và cơ sở dữ liệu giá đất. 3 yếu tố chính để làm được điều này là: (1) Bản đồ địa chính số: Cung cấp tọa độ, hình thể, diện tích và vị trí không gian chính xác của từng thửa đất. Không có bản đồ số, không thể định danh và áp giá riêng biệt cho từng thửa. (2) Cơ sở dữ liệu giá đất: Đây là \"kho nguyên liệu\" chứa các thông tin giao dịch lịch sử, giá trúng đấu giá, và giá từ các hợp đồng công chứng (như chúng ta đã thảo luận ở các câu trước). (3) Sự kết hợp giữa Dữ liệu không gian (Spatial) và Dữ liệu thuộc tính (Attribute) là điều kiện cần và đủ để xây dựng bảng giá theo vùng giá trị."}, {"level": "1", "content": "Hành vi nào sau đây bị nghiêm cấm trong lĩnh vực thẩm định giá theo Luật Giá 2023?", "options": {"A": "Thu thập thông tin thị trường để thẩm định giá.", "B": "Áp dụng nhiều phương pháp thẩm định giá.", "C": "Cạnh tranh không lành mạnh về giá dịch vụ thẩm định giá.", "D": "Báo cáo kết quả thẩm định giá cho khách hàng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 7 Luật Giá 2023 liệt kê các hành vi bị nghiêm cấm, trong đó có hành vi cạnh tranh không lành mạnh (như thông đồng, ép buộc, bán phá giá dịch vụ...). Lưu ý: Tài liệu chỉ đề cập chung là Luật quy định hành vi bị cấm, cần suy luận dựa trên các quy định chung về cạnh tranh."}, {"level": "1", "content": "Khi định giá đất bằng phương pháp so sánh, việc điều chỉnh giá của thửa đất so sánh được thực hiện như thế nào nếu thửa đất so sánh tốt hơn thửa đất cần định giá về một yếu tố nào đó?", "options": {"A": "Cộng thêm một khoản tiền vào giá thửa đất so sánh.", "B": "Trừ đi một khoản tiền khỏi giá thửa đất so sánh.", "C": "Giữ nguyên giá thửa đất so sánh.", "D": "Nhân giá thửa đất so sánh với một hệ số lớn hơn 1."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quy tắc điều chỉnh chung là lấy bất động sản cần định giá làm chuẩn. Nếu bất động sản so sánh tốt hơn (ví dụ: vị trí đẹp hơn), thì giá của nó phải được điều chỉnh giảm xuống để tương đương với bất động sản cần định giá."}, {"level": "1", "content": "Tổ chức nào chịu trách nhiệm chính trong việc ban hành hệ thống Chuẩn mực thẩm định giá Việt Nam?", "options": {"A": "Chính phủ", "B": "Bộ Nông nghiệp và Môi trường", "C": "Bộ Xây dựng", "D": "Bộ Tài chính"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Bộ Tài chính là cơ quan nhà nước chịu trách nhiệm ban hành các Chuẩn mực thẩm định giá Việt Nam theo quy định của Luật Giá."}, {"level": "1", "content": "Căn cứ theo Khoản 2 Điều 61 Luật Kinh doanh bất động sản 2023, cá nhân thực hiện dịch vụ tư vấn bất động sản bắt buộc phải đáp ứng điều kiện nào sau đây về năng lực chuyên môn?", "options": {"A": "Phải có Thẻ thẩm định viên về giá do Bộ Tài chính cấp để tư vấn về giá trị tài sản.", "B": "Phải có Chứng chỉ hành nghề môi giới bất động sản và đăng ký hành nghề tại một sàn giao dịch.", "C": "Phải có bằng cấp, chứng chỉ về đào tạo chuyên môn phù hợp với nội dung lĩnh vực mà cá nhân đó trực tiếp thực hiện tư vấn.", "D": "Cần chứng minh được thâm niên công tác thực tế trên 05 năm trong lĩnh vực bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 61 Luật Kinh doanh bất động sản 2023 quy định nội dung tư vấn phải phù hợp với nội dung kinh doanh và người thực hiện phải có bằng cấp, chứng chỉ về lĩnh vực trực tiếp tư vấn. Theo Điều 61, phạm vi tư vấn bất động sản rất rộng, bao gồm: tư vấn pháp lý, tư vấn đầu tư, tư vấn tài chính, tư vấn giá, tư vấn phong thủy... Luật quy định: \"Nội dung tư vấn phải phù hợp với nội dung kinh doanh\" và người thực hiện phải có bằng cấp, chứng chỉ về lĩnh vực đó”. Ví dụ: Tư vấn về pháp lý bất động sản thì phải có bằng cấp về Luật; tư vấn về tài chính dự án thì phải có bằng cấp/chứng chỉ về tài chính/ngân hàng."}, {"level": "1", "content": "Trong quy trình thẩm định giá bất động sản, việc phân tích \"Sử dụng cao nhất và tốt nhất\" nhằm xác định phương án sử dụng đất và tài sản gắn liền với đất phải đáp ứng đồng thời 04 tiêu chí nào sau đây để mang lại giá trị chiết khấu hiện tại là lớn nhất?", "options": {"A": "Có chi phí đầu tư thấp nhất, thời gian thi công ngắn nhất, phù hợp với sở thích của chủ đầu tư và khả năng quản lý hiện tại.", "B": "Hợp pháp về pháp lý, khả thi về kỹ thuật (vật chất), khả thi về tài chính và mang lại hiệu quả (giá trị) cao nhất.", "C": "Có diện tích sàn xây dựng lớn nhất, mật độ xây dựng cao nhất, phù hợp với quy hoạch chi tiết 1/500 và khả năng huy động vốn của thị trường.", "D": "Theo hiện trạng sử dụng đất, phù hợp với các công trình lân cận và đảm bảo không gây tác động tiêu cực đến môi trường xung quanh."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phân tích sử dụng cao nhất và hiệu quả nhất nhằm xác định phương án sử dụng hợp pháp, khả thi về kỹ thuật, tài chính và mang lại giá trị lớn nhất cho bất động sản, làm cơ sở cho việc ước tính giá trị thị trường."}, {"level": "1", "content": "Theo quy định tại Luật Đất đai 2024, phương thức xây dựng Bảng giá đất chi tiết đến từng thửa đất (dự kiến áp dụng từ 01/01/2026) sẽ dựa trên việc xác định các yếu tố nào?", "options": {"A": "Giá giao dịch thành công gần nhất của chính thửa đất đó.", "B": "Giá đất trung bình của toàn tỉnh/thành phố.", "C": "Vùng giá trị và các thửa đất chuẩn đại diện trong vùng.", "D": "Đơn giá bồi thường do Nhà nước quy định."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 Điều 159 Luật Đất đai 2024 quy định đối với khu vực có bản đồ địa chính số và cơ sở dữ liệu giá đất, Bảng giá đất đến từng thửa đất được xây dựng trên cơ sở vùng giá trị và thửa đất chuẩn."}, {"level": "1", "content": "Theo quy định tại Khoản 2 Điều 158 Luật Đất đai 2024, nội dung nào sau đây KHÔNG được liệt kê là một trong những căn cứ trực tiếp để cơ quan nhà nước thực hiện việc định giá đất?", "options": {"A": "Mục đích sử dụng đất được Nhà nước giao, cho thuê hoặc công nhận quyền sử dụng đất.", "B": "Thời hạn sử dụng đất; đối với đất nông nghiệp đã giao cho hộ gia đình, cá nhân thì không căn cứ vào thời hạn này.", "C": "Giá đất quy định tại Bảng giá đất hiện hành do Ủy ban nhân dân cấp tỉnh ban hành.", "D": "Các yếu tố khác ảnh hưởng đến giá đất và thông tin đầu vào từ cơ sở dữ liệu đất đai quốc gia."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 158 Luật Đất đai 2024 quy định các căn cứ định giá đất bao gồm mục đích sử dụng, thời hạn sử dụng, thông tin đầu vào (giá CSDL, giá hợp đồng, giá đấu giá, giá khảo sát, thông tin thu nhập/chi phí) và các yếu tố khác ảnh hưởng. Bảng giá đất là một cơ chế xác định giá đất riêng (theo Điều 159) là một sản phẩm của công tác định giá hàng loạt, được dùng để áp dụng cho các mục đích hành chính đại trà, không phải là căn cứ trực tiếp để xác định giá đất cụ thể theo Điều 158 (trừ trường hợp dùng Bảng giá đất để áp dụng phương pháp hệ số điều chỉnh)."}, {"level": "1", "content": "Theo Chuẩn mực thẩm định giá Việt Nam về Quy tắc đạo đức nghề nghiệp, nội dung nào sau đây phản ánh đầy đủ yêu cầu của nguyên tắc \"Năng lực chuyên môn và Tính thận trọng\" đối với thẩm định viên về giá?", "options": {"A": "Luôn ưu tiên đưa ra mức giá trị có lợi nhất cho khách hàng để đảm bảo tính cạnh tranh của doanh nghiệp.", "B": "Tuyệt đối không được tiết lộ thông tin về hồ sơ thẩm định giá cho bên thứ ba khi chưa có sự đồng ý của khách hàng.", "C": "Duy trì kiến thức, kỹ năng chuyên môn cần thiết và hành động một cách cẩn trọng theo các chuẩn mực kỹ thuật và nghề nghiệp.", "D": "Luôn giữ thái độ thẳng thắn, trung thực và không bị chi phối bởi lợi ích cá nhân trong quá trình thẩm định."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Chuẩn mực thẩm định giá Việt Nam về Quy tắc đạo đức nghề nghiệp (Thông tư 30/2024/TT-BTC), nguyên tắc này yêu cầu thẩm định viên phải duy trì năng lực chuyên môn thông qua học hỏi liên tục và thực hiện công việc một cách cẩn trọng, kỹ lưỡng, tuân thủ các chuẩn mực kỹ thuật và nghề nghiệp liên quan."}, {"level": "1", "content": "Theo Luật Giá 2023, danh sách thẩm định viên về giá đủ điều kiện hành nghề được cơ quan nào thông báo công khai?", "options": {"A": "Doanh nghiệp thẩm định giá nơi thẩm định viên làm việc.", "B": "Sở Tài chính cấp tỉnh.", "C": "Bộ Tài chính.", "D": "Hội Thẩm định giá Việt Nam."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 46 Luật Giá 2023 quy định Bộ Tài chính là cơ quan thông báo công khai danh sách thẩm định viên về giá đủ điều kiện hành nghề (hàng năm và điều chỉnh hàng tháng nếu có)."}, {"level": "1", "content": "Khi áp dụng phương pháp so sánh trong định giá, tại sao các giao dịch giữa người thân trong gia đình hoặc bán tài sản trong tình trạng khẩn cấp thường không được coi là bằng chứng thị trường đáng tin cậy để xác định giá trị thị trường?", "options": {"A": "Vì các giao dịch này không được phép công chứng và đăng ký biến động đất đai theo quy định của pháp luật.", "B": "Vì giá trị ghi trên hợp đồng của các giao dịch này thường không được cơ quan thuế chấp thuận làm căn cứ tính thuế.", "C": "Vì các bên tham gia thiếu tính độc lập, không hành động một cách thận trọng, tự nguyện hoặc không có đủ thời gian tiếp thị tài sản ra thị trường.", "D": "Vì đây là các giao dịch không phát sinh dòng tiền thực tế mà chỉ mang tính chất tặng cho hoặc chuyển dịch tài sản nội bộ.."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Chuẩn mực thẩm định giá Việt Nam về Cơ sở giá trị, Giá trị thị trường đòi hỏi giao dịch diễn ra giữa các bên tự nguyện, không bị ép buộc, có đủ thông tin và thời gian tiếp thị. Giao dịch gia đình hoặc bán gấp thường thiếu các yếu tố này (có thể có nhượng bộ về giá, thiếu tự nguyện, thiếu thời gian tiếp thị), do đó giá cả hình thành có thể không phản ánh đúng giá trị thị trường khách quan."}, {"level": "1", "content": "Căn cứ vào quy định tại Khoản 1 Điều 160 Luật Đất đai 2024, cơ quan nhà nước có thẩm quyền bắt buộc phải thực hiện định giá để xác định Giá đất cụ thể trong trường hợp nào sau đây?", "options": {"A": "Tính tiền bồi thường cho Nhà nước khi người sử dụng đất gây thiệt hại trong quá trình quản lý, sử dụng đất đai.", "B": "Tính tiền thuê đất trả tiền thuê hằng năm khi Nhà nước cho cá nhân thuê đất không thông qua đấu giá.", "C": "Tính tiền sử dụng đất, tiền thuê đất khi Nhà nước giao đất, cho thuê đất đối với tổ chức kinh tế không thông qua đấu giá quyền sử dụng đất.", "D": "Tính thuế thu nhập cá nhân từ hoạt động chuyển nhượng quyền sử dụng đất trên thị trường."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 160 Luật Đất đai 2024 quy định các trường hợp áp dụng Giá đất cụ thể, bao gồm tính tiền sử dụng đất khi Nhà nước giao đất, cho phép chuyển mục đích, công nhận quyền sử dụng đất đối với tổ chức. Theo Điều 160, khi Nhà nước giao đất có thu tiền hoặc cho thuê đất trả tiền một lần (hoặc trả hàng năm) đối với tổ chức kinh tế để thực hiện dự án đầu tư (không qua đấu giá), việc sử dụng Bảng giá đất thường dẫn đến chênh lệch lớn so với giá trị thực tế, gây thất thoát ngân sách. Vì vậy, pháp luật buộc cơ quan chuyên môn phải tiến hành khảo sát và lập phương án tính Giá đất cụ thể (thường áp dụng phương pháp Thặng dư hoặc So sánh).."}, {"level": "1", "content": "Khái niệm \"Giá cả\" (Price) khác với \"Giá trị thị trường\" (Market Value) ở điểm cơ bản nào?", "options": {"A": "Giá cả là một khái niệm trừu tượng phản ánh lợi ích tương lai, còn giá trị thị trường là số tiền thực tế đã thanh toán.", "B": "Giá cả là số tiền thực tế được chi trả trong một giao dịch cụ thể; còn giá trị thị trường là một mức giá ước tính dựa trên các giả định tiêu chuẩn.", "C": "Giá cả là mức giá do cơ quan quản lý Nhà nước áp đặt, còn giá trị thị trường là giá tự do cạnh tranh giữa các bên.", "D": "Giá cả chỉ bao gồm chi phí sản xuất, còn giá trị thị trường bao gồm cả chi phí sản xuất và lợi nhuận kỳ vọng của người bán."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Giá cả là số tiền thực tế được trả trong một giao dịch cụ thể, có thể bị ảnh hưởng bởi các yếu tố đặc biệt của giao dịch đó. Giá trị thị trường là một khái niệm lý thuyết, là mức giá ước tính sẽ hình thành nếu giao dịch diễn ra trong các điều kiện thị trường lý tưởng (các bên sẵn lòng, hiểu biết, không ép buộc...). Giá cả chỉ phản ánh giá trị thị trường khi các điều kiện lý tưởng đó được đáp ứng. Theo Tiêu chuẩn thẩm định giá Việt Nam, giá cả là một \"Sự thật lịch sử\" (Historical Fact).Nó phản ánh số tiền mà một người mua cụ thể đã trả cho một người bán cụ thể để sở hữu tài sản. Giá cả có thể bị bóp méo bởi các yếu tố phi thị trường như: quan hệ thân quen, sự thiếu hiểu biết, áp lực nợ nần, hoặc cảm xúc cá nhân. Do đó, giá cả có thể bằng, cao hơn hoặc thấp hơn giá trị thị trường."}, {"level": "1", "content": "Theo quy định tại Điều 53 và Điều 54 Luật Giá 2023, doanh nghiệp thẩm định giá có hành vi vi phạm nghiêm trọng Chuẩn mực thẩm định giá Việt Nam hoặc Quy tắc đạo đức nghề nghiệp sẽ phải đối mặt với hậu quả pháp lý nào sau đây?", "options": {"A": "Bị phạt tiền vi phạm hành chính và công khai xin lỗi trên các phương tiện thông tin đại chúng.", "B": "Bị đình chỉ hoạt động kinh doanh dịch vụ thẩm định giá trong thời hạn tối đa là 06 tháng.", "C": "Bị đình chỉ kinh doanh dịch vụ thẩm định giá hoặc bị thu hồi Giấy chứng nhận đủ điều kiện kinh doanh dịch vụ thẩm định giá.", "D": "Cấm người đại diện theo pháp luật của doanh nghiệp tham gia quản lý bất kỳ doanh nghiệp nào khác trong lĩnh vực tài chính."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 54 Luật Giá 2023 và Điều 7, 8 Nghị định 78/2024/NĐ-CP quy định các trường hợp bị đình chỉ, thu hồi Giấy chứng nhận, bao gồm cả việc vi phạm nghiêm trọng quy định của pháp luật về giá, thẩm định giá hoặc Chuẩn mực thẩm định giá Việt Nam. Đình chỉ kinh doanh (Điều 53): Áp dụng khi doanh nghiệp không duy trì đủ điều kiện (ví dụ: thiếu số lượng thẩm định viên) hoặc vi phạm chuyên môn ở mức độ có thể khắc phục. Thu hồi Giấy chứng nhận (Điều 54): Áp dụng cho các sai phạm đặc biệt nghiêm trọng như: giả mạo hồ sơ, thông đồng làm sai lệch kết quả thẩm định giá gây hậu quả nghiêm trọng, hoặc tiếp tục vi phạm sau khi đã bị đình chỉ. Ý nghĩa: Việc thu hồi Giấy chứng nhận đồng nghĩa với việc doanh nghiệp đó bị xóa tên khỏi danh sách các đơn vị đủ điều kiện hành nghề trên toàn quốc."}, {"level": "1", "content": "Căn cứ vào các quy định về quản lý nhà nước trong Luật Đất đai 2024, cơ quan nào có trách nhiệm chính trong việc kiểm tra, theo dõi việc chấp hành pháp luật về tư vấn xác định giá đất của các tổ chức, cá nhân trên địa bàn tỉnh?", "options": {"A": "Thanh tra Bộ Tài chính phối hợp với Ủy ban nhân dân cấp tỉnh.", "B": "Sở Tài chính (Cơ quan thường trực Hội đồng thẩm định giá đất cụ thể).", "C": "Cơ quan có chức năng quản lý đất đai cấp tỉnh (Sở Nông nghiệp và Môi trường).", "D": "Công an tỉnh và Chi cục Thuế khu vực."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo thông lệ quản lý và các quy định liên quan (như được đề cập gián tiếp trong tài liệu về điều kiện hành nghề tư vấn xác định giá đất), cơ quan quản lý nhà nước về đất đai tại địa phương (Sở TNMT, nay là Sở Nông nghiệp & Môi trường) có trách nhiệm quản lý, kiểm tra, theo dõi hoạt động của các tổ chức, cá nhân tư vấn xác định giá đất trên địa bàn.."}, {"level": "1", "content": "Khi áp dụng phương pháp So sánh, rủi ro học thuật và pháp lý lớn nhất đối với thẩm định viên khi quá phụ thuộc vào các bằng chứng giao dịch trong quá khứ mà bỏ qua bước \"điều chỉnh biến động thị trường\" là gì?", "options": {"A": "Đánh giá sai tỷ lệ hao mòn lũy kế và các yếu tố lỗi thời của tài sản gắn liền với đất.", "B": "Vi phạm nguyên tắc \"Thời điểm thẩm định giá\", khiến kết quả không phản ánh đúng sự thay đổi về cung cầu, chính sách hoặc tâm lý thị trường hiện hành.", "C": "Bỏ qua giá trị thặng dư và khả năng sinh lời tối đa của bất động sản trong tương lai.", "D": "Làm sai lệch việc ước tính các chi phí thay thế hoặc chi phí tái tạo công trình."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phương pháp so sánh dựa vào dữ liệu quá khứ. Nếu thị trường thay đổi (về cung cầu, lãi suất, chính sách, tâm lý...) giữa thời điểm giao dịch quá khứ và thời điểm thẩm định giá, việc chỉ dựa vào các giao dịch cũ mà không phân tích và điều chỉnh cho những thay đổi này có thể dẫn đến kết quả không còn phù hợp với giá trị thị trường hiện tại. Giá trị của bất động sản không phải là một hằng số. Nó là một biến số thay đổi liên tục từng ngày dưới tác động của các yếu tố vĩ mô (lãi suất ngân hàng, chính sách tín dụng, quy hoạch mới) và vi mô (tâm lý người mua/bán). Một giao dịch diễn ra cách thời điểm thẩm định 6 tháng có thể đã hoàn toàn lạc hậu. Nếu thẩm định viên lấy \"mức giá lịch sử\" đó áp đặt cho hiện tại mà không có tỷ lệ chiết khấu hoặc cộng thêm (điều chỉnh theo thời gian), kết quả sẽ làm sai lệch nghiêm trọng Giá trị thị trường."}, {"level": "1", "content": "Căn cứ theo nội dung tại Chuẩn mực thẩm định giá Việt Nam về Thẩm định giá Bất động sản (ban hành kèm theo Thông tư 42/2024/TT-BTC), chuẩn mực này có được áp dụng đối với hoạt động định giá đất theo trình tự, thủ tục và các phương pháp quy định tại pháp luật về Đất đai không?", "options": {"A": "Có, vì đây là chuẩn mực chung áp dụng cho mọi loại hình bất động sản và quyền sử dụng đất.", "B": "Áp dụng đối với đất ở tại đô thị, còn đất nông nghiệp và các loại đất khác áp dụng Luật Đất đai.", "C": "Không, chuẩn mực này quy định rõ không áp dụng đối với việc định giá đất theo trình tự, thủ tục và phương pháp quy định tại pháp luật về đất đai.", "D": "Áp dụng khi các bên có thỏa thuận bằng văn bản về việc sử dụng Chuẩn mực thẩm định giá Việt Nam."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Hệ thống Thẩm định giá (Bộ Tài chính): Các chuẩn mực ban hành kèm theo Thông tư 42/2024/TT-BTC (và các Thông tư khác của Bộ Tài chính) được dùng cho mục đích Dịch vụ thẩm định giá (thế chấp, mua bán dân sự, cổ phần hóa...). Hệ thống Định giá đất (Bộ Tài nguyên & Môi trường): Việc định giá đất phục vụ mục đích quản lý nhà nước (bồi thường, tính tiền sử dụng đất, đấu giá...) phải tuân thủ nghiêm ngặt Luật Đất đai 2024 và Nghị định 71/2024/NĐ-CP. Ngay tại Điều 1 của Chuẩn mực kèm theo Thông tư 42/2024/TT-BTC đã có dòng loại trừ trực tiếp: \"Chuẩn mực này không áp dụng đối với việc định giá đất theo trình tự, thủ tục và phương pháp quy định tại pháp luật về đất đai\".."}, {"level": "1", "content": "Nếu phương pháp so sánh và phương pháp thu nhập cho cùng một bất động sản đưa ra hai kết quả giá trị khác nhau đáng kể, thẩm định viên nên làm gì trong bước hòa hợp kết quả?", "options": {"A": "Áp dụng công thức trung bình cộng đơn giản giữa các kết quả để đảm bảo tính trung lập và công bằng.", "B": "Ưu tiên lựa chọn kết quả cao nhất để bảo vệ quyền lợi của khách hàng hoặc kết quả thấp nhất để đảm bảo tính thận trọng.", "C": "Thực hiện lấy số dư của phương pháp có sai số thấp nhất sau khi đã kiểm tra lại các phép tính toán học.", "D": "Rà soát lại độ tin cậy của dữ liệu đầu vào, tính phù hợp của các giả định và các bước điều chỉnh; từ đó phân tích trọng số hoặc lựa chọn chỉ dẫn giá trị đáng tin cậy nhất có kèm theo giải trình logic."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Sự khác biệt lớn giữa các kết quả đòi hỏi thẩm định viên phải rà soát lại kỹ lưỡng quá trình thực hiện từng phương pháp, kiểm tra tính chính xác của dữ liệu, sự hợp lý của các điều chỉnh/giả định. Bước hòa hợp là cơ hội để phân tích nguyên nhân khác biệt và đưa ra kết luận cuối cùng dựa trên đánh giá về độ tin cậy và phù hợp nhất của các chỉ dẫn giá trị, chứ không phải là một phép tính cơ học. Theo Chuẩn mực thẩm định giá Việt Nam về Quy trình thẩm định giá, khi có sự khác biệt giữa các phương pháp, thẩm định viên phải thực hiện \"phân tích định tính và định lượng\": (1) Đánh giá độ tin cậy của dữ liệu: Ví dụ, nếu phương pháp So sánh có dữ liệu từ các giao dịch thực tế rất gần thời điểm định giá, nó sẽ có trọng số cao hơn. Ngược lại, nếu dữ liệu thu nhập/chi phí chỉ mang tính dự báo xa vời, phương pháp Thu nhập sẽ có độ tin cậy thấp hơn. (2) Tính phù hợp của phương pháp: Đối với một tòa nhà văn phòng đang cho thuê ổn định, phương pháp Thu nhập thường phản ánh đúng tâm lý nhà đầu tư hơn là phương pháp So sánh các tòa nhà có diện tích khác biệt lớn. (3) Giải trình (Justification): Đây là yêu cầu bắt buộc của Luật Giá 2023. Thẩm định viên phải giải thích rõ tại sao mình chọn con số đó hoặc tại sao mình áp dụng trọng số (ví dụ: 70% cho So sánh, 30% cho Thu nhập)."}, {"level": "1", "content": "Kể từ ngày 01/01/2026, Luật Đất đai 2024 quy định Bảng giá đất được công bố và áp dụng hằng năm (thay vì chu kỳ 05 năm như trước đây). Mục đích cốt lõi của sự thay đổi này là gì?", "options": {"A": "Giảm thiểu áp lực công việc và chi phí tổ chức thực hiện cho các cơ quan quản lý đất đai tại địa phương.", "B": "Thiết lập một hệ thống giá đất cố định để đảm bảo sự ổn định tuyệt đối, không biến động của thị trường bất động sản.", "C": "Đảm bảo Bảng giá đất phản ánh kịp thời sự biến động của thị trường, thu hẹp khoảng cách giữa giá hành chính và giá thực tế.", "D": "Tối ưu hóa nguồn thu thuế từ đất đai thông qua việc tự động điều chỉnh tăng giá đất ở mọi khu vực hằng năm."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Chu kỳ 5 năm của Bảng giá đất theo Luật Đất đai 2013 thường bị coi là quá dài, khiến giá trong Bảng giá đất trở nên lạc hậu so với thị trường. Việc rút ngắn chu kỳ cập nhật xuống hàng năm theo Luật Đất đai 2024 nhằm mục đích giúp Bảng giá đất bám sát hơn, phản ánh tốt hơn những biến động thực tế của thị trường bất động sản."}];

        // Thuật toán lấy mẫu 100 câu theo Thang đo Bloom
        function getSampledQuestions(count) {
            const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
            const filterLvl = (l) => allData.filter(q => String(q.level) === String(l));
            
            let p1 = shuffle(filterLvl("1")); let p2 = shuffle(filterLvl("2"));
            let p3 = shuffle(filterLvl("3")); let p4 = shuffle(filterLvl("4")); let p5 = shuffle(filterLvl("5"));

            let n1 = Math.round(count * 0.25); let n2 = Math.round(count * 0.25);
            let n3 = Math.round(count * 0.20); let n4 = Math.round(count * 0.20);
            let n5 = count - (n1 + n2 + n3 + n4);

            let selected = [ ...p1.splice(0, n1), ...p2.splice(0, n2), ...p3.splice(0, n3), ...p4.splice(0, n4), ...p5.splice(0, n5) ];

            if(selected.length < count) {
                let remain = shuffle([...p1, ...p2, ...p3, ...p4, ...p5]);
                selected = [...selected, ...remain.splice(0, count - selected.length)];
            }
            // Trả về số câu ngẫu nhiên (hoặc toàn bộ nếu kho ít hơn 100)
            return shuffle(selected).slice(0, count);
        }

        // Render câu hỏi lên màn hình
        function renderQuestion() {
            if (!quizData[currentIndex]) return;
            const q = quizData[currentIndex];
            const isMulti = q.content.includes("[*]");
            document.getElementById("progress-text").innerText = `Câu ${currentIndex + 1} / ${quizData.length}`;
            
            let optHtml = "";
            let hasOptions = false;
            
            ['A','B','C','D'].forEach(lbl => {
                if(q.options && q.options[lbl]) {
                    hasOptions = true;
                    optHtml += `
                        <label class="option-item" id="label-${lbl}">
                            <input type="${isMulti ? 'checkbox' : 'radio'}" name="q_opt" value="${lbl}" onchange="updateSelection()">
                            <b>${lbl}.</b> ${q.options[lbl]}
                        </label>`;
                }
            });

            if(!hasOptions) {
                optHtml = "<div style='color:red; background:#ffebee; padding:10px; border-radius:5px;'><i>⚠️ Lỗi: Không trích xuất được đáp án. Trong Word, anh hãy tự gõ A., B., C., D. (tắt tính năng đánh số tự động).</i></div>";
            }

            document.getElementById("quiz-container").innerHTML = `
                <div class="card">
                    <div class="q-meta">MỨC ĐỘ THỬ THÁCH: ${q.level || '1'}</div>
                    <div class="q-text">${q.content.replace(/\[\*\]/g, "").replace(/\n/g, '<br>')}</div>
                    <div class="options">${optHtml}</div>
                    
                    <button id="btn-check" class="btn-check-inline" onclick="checkAnswer()">Kiểm tra đáp án</button>
                    
                    <div id="exp-box" class="exp-box"></div>
                </div>`;
            window.scrollTo(0,0);
        }

        // Cập nhật viền xanh khi chạm chọn đáp án
        function updateSelection() {
            document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
            document.querySelectorAll('input:checked').forEach(el => el.parentElement.classList.add('selected'));
        }

        // Xử lý logic Nút Kiểm Tra
        function checkAnswer() {
            const q = quizData[currentIndex];
            const box = document.getElementById("exp-box");
            const btn = document.getElementById("btn-check");
            
            // Gom các đáp án đã chọn
            const checkedInputs = document.querySelectorAll('input[name="q_opt"]:checked');
            const selectedVals = Array.from(checkedInputs).map(i => i.value).sort().join(",");
            
            if (!selectedVals) {
                alert("⚠️ Vui lòng chọn một phương án trước khi kiểm tra!");
                return;
            }

            // Ẩn nút kiểm tra, hiện Box giải thích
            btn.style.display = "none";
            box.style.display = "block";

            let resultTitle = "";
            // Kiểm tra đúng sai
            if (selectedVals === q.answer) {
                resultTitle = `<div class="result-title" style="color: var(--success);">✔ CHÍNH XÁC!</div>`;
                box.style.borderLeftColor = "var(--success)";
            } else {
                resultTitle = `<div class="result-title" style="color: var(--error);">✘ SAI RỒI! (Bạn chọn: ${selectedVals})</div>`;
                box.style.borderLeftColor = "var(--error)";
            }

            // Tô màu các lựa chọn A, B, C, D
            ['A','B','C','D'].forEach(lbl => {
                const el = document.getElementById(`label-${lbl}`);
                if(!el) return;
                
                // Tô xanh đáp án đúng của hệ thống
                if(q.answer.includes(lbl)) {
                    el.classList.add('correct-ans');
                } 
                // Tô đỏ đáp án sai mà người dùng chọn
                else if(selectedVals.includes(lbl)) {
                    el.classList.add('wrong-ans');
                }
                
                // Vô hiệu hóa input để không cho click đổi nữa
                const input = el.querySelector('input');
                if(input) input.disabled = true;
            });

            // Gắn nội dung vào Box
            box.innerHTML = `
                ${resultTitle}
                <div style="margin-bottom:12px; font-size:1.05em;"><b>Đáp án đúng:</b> <span style="color:var(--success); font-weight:bold">${q.answer}</span></div>
                <div>${q.explanation || "<i>Hệ thống chưa cập nhật giải thích cho câu này.</i>"}</div>
            `;

            // Tự động cuộn mượt mà xuống phần giải thích
            box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Điều hướng câu hỏi
        function nextQ() { if(currentIndex < quizData.length-1) { currentIndex++; renderQuestion(); } }
        function prevQ() { if(currentIndex > 0) { currentIndex--; renderQuestion(); } }
    </script>

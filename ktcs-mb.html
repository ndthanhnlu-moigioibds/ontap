 hiện và không có lý do chính đáng, CĐT sẽ đối mặt với rủi ro gì?", "options": {"A": "03 ngày làm việc; CĐT bị cơ quan Thuế phong tỏa hóa đơn của dự án.", "B": "07 ngày làm việc; CĐT phải bồi thường thiệt hại bằng 1% giá trị hợp đồng cho khách hàng.", "C": "05 ngày làm việc; CĐT bị xử phạt vi phạm hành chính theo quy định về kinh doanh bất động sản và phải bồi thường thiệt hại (nếu có).", "D": "10 ngày làm việc; Văn bản chuyển nhượng tự động có hiệu lực mà không cần dấu xác nhận của CĐT."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 49 Luật Kinh doanh bất động sản 2023 và Nghị định 96/2024/NĐ-CP quy định rất rõ thời hạn là 05 ngày làm việc. Đây là quy định nhằm bảo vệ quyền lợi của nhà đầu tư, tránh việc CĐT ngâm hồ sơ để gây khó khăn hoặc trục lợi phí \"bôi trơn\". Việc không thực hiện đúng thời hạn là hành vi vi phạm pháp luật về kinh doanh bất động sản và có thể bị xử phạt hành chính theo Nghị định về xử phạt vi phạm hành chính trong lĩnh vực xây dựng, kinh doanh BĐS."}, {"level": "1", "content": "Sau khi văn bản chuyển nhượng HĐMB được công chứng (giả định vào ngày 01/06/2026), trong thời hạn bao nhiêu ngày các bên phải thực hiện nghĩa vụ kê khai thuế Thu nhập cá nhân (TNCN)? Nếu nộp hồ sơ khai thuế vào ngày 25/06/2026, số tiền chậm nộp sẽ được tính như thế nào?", "options": {"A": "30 ngày; Không phát sinh tiền chậm nộp vì chưa quá hạn.", "B": "10 ngày; Phát sinh tiền chậm nộp cho khoảng 14 ngày vượt quá (mức 0,03%/ngày trên số thuế phải nộp).", "C": "15 ngày; Phát sinh tiền chậm nộp tính từ ngày thứ 16 theo mức 0,05%/ngày.", "D": "Không giới hạn thời hạn kê khai nhưng phải nộp trước khi nộp hồ sơ cho CĐT xác nhận."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Luật Quản lý thuế 2025 (và kế thừa từ Luật cũ), đối với chuyển nhượng bất động sản, thời hạn nộp hồ sơ khai thuế chậm nhất là ngày thứ 10 kể từ thời điểm hợp đồng chuyển nhượng có hiệu lực (ngày công chứng).   Tiền chậm nộp = Số thuế TNCN times 14 ngày x 0,03 %."}, {"level": "1", "content": "Khi tính Lệ phí trước bạ (LPTB) cho nhà đất, người nộp thuế phải theo cách tính nào trong Nghị định 10/2022/NĐ-CP và quy định quản lý thuế hiện hành thì mới chính xác, và hệ quả có thể xảy ra là gì?", "options": {"A": "LPTB chỉ tính trên giá đất; diện tích nhà không làm thay đổi số thuế phải nộp.", "B": "LPTB = (Diện tích đất x giá đất trên bảng giá + Diện tích sàn xây dựng x Đơn giá xây dựng x % chất lượng còn lại của nhà) x 0,5%. Kê khai sai đối tượng dẫn đến truy thu và phạt chậm nộp.", "C": "LPTB = (Diện tích đất x giá đất trên bảng giá + Diện tích sàn xây dựng x Đơn giá xây dựng) x 0,5%. Cơ quan Thuế Tỉnh/Thành phố trực thuộc trung ương tự động hiệu chỉnh số liệu qua mã định danh đất đai nên không phát sinh rủi ro truy thu.", "D": "LPTB nhà và đất có thuế suất khác nhau (1% và 0,5%) dẫn đến sai lệch lớn về số tiền kê khai."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Cơ sở pháp lý: Điều 7, Điều 8 Nghị định số 10/2022/NĐ-CP về Lệ phí trước bạ. Thông tư số 13/2022/TT-BTC hướng dẫn Nghị định 10/2022/NĐ-CP. Luật Đất đai 2024 (về nguyên tắc xác định giá đất và quản lý dữ liệu). Tổng số LPTB phải nộp (L_{tổng}) được xác định như sau: Trong đó:S_{đ}: Diện tích đất (theo Sổ hồng/Bản đồ địa chính). G_{đ}: Giá đất tại Bảng giá đất hàng năm của UBND Thành phố ban hành. S_{xd} : Diện tích sàn xây dựng (diện tích thông thủy hoặc diện tích sàn theo giấy phép). G_{xd} : Giá xây dựng mới  1m^2  sàn nhà do UBND Thành phố quy định. tỷ\\_lệ\\_CL : Tỷ lệ chất lượng còn lại của nhà (khấu hao theo thời gian sử dụng). Căn cứ Luật Quản lý thuế 2019 (cập nhật 2026), việc kê khai sai dẫn đến thiếu số tiền thuế phải nộp sẽ bị truy thu đủ số tiền thuế, đồng thời bị tính tiền chậm nộp mức 0,03%/ngày trên số tiền nộp thiếu. Trường hợp bị xác định là cố ý khai sai để trốn thuế, mức phạt có thể từ 1 đến 3 lần số thuế trốn."}, {"level": "1", "content": "Trong thủ tục cấp Giấy chứng nhận (GCN) lần đầu, nếu người nộp thuế không hoàn thành nghĩa vụ tài chính theo Thông báo của cơ quan Thuế trong thời hạn quy định (quá 90 ngày kể từ ngày ban hành thông báo), hệ quả pháp lý và mức tài chính phát sinh được xác định như thế nào?", "options": {"A": "Quy trình cấp GCN vẫn tiếp tục; người nộp thuế bị phạt chậm nộp với mức lãi suất cố định là 0,05%/ngày trên số tiền nộp thiếu.", "B": "Dừng quy trình cấp GCN; người nộp thuế phải nộp tiền chậm nộp bằng 0,03%/ngày tính trên số tiền thuế chậm nộp kể từ ngày hết hạn nộp theo quy định.", "C": "Cơ quan đăng ký đất đai tự động hủy bỏ kết quả thẩm định hồ sơ; người nộp thuế phải nộp phạt vi phạm hành chính mức 10% tổng giá trị quyền sử dụng đất.", "D": "Người nộp thuế được mặc định ghi nợ tiền sử dụng đất trên GCN và phải nộp thêm lệ phí quản lý nợ bằng 1%/tháng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 155 Luật Đất đai 2024, việc hoàn thành nghĩa vụ tài chính là điều kiện bắt buộc để xác lập quyền sử dụng đất. Nếu quá thời hạn ghi trên Thông báo (thường là 30 ngày cho 50% đầu tiên và 90 ngày cho 50% còn lại), cơ quan Đăng ký đất đai sẽ tạm dừng việc trao trả kết quả GCN cho đến khi nhận được xác nhận nộp đủ tiền từ Kho bạc Nhà nước. Ngoại lệ: Chỉ những trường hợp thuộc đối tượng quy định tại Nghị định 103/2024/NĐ-CP (như hộ nghèo, người có công) và có đơn đề nghị được ghi nợ tiền sử dụng đất thì mới được cấp sổ kèm ghi chú nợ."}, {"level": "1", "content": "Năm 2026, Ông A làm thủ tục xin cấp Sổ hồng lần đầu cho một thửa đất có diện tích thực tế là 150m². Nguồn gốc đất: Gia đình tự khai hoang và sử dụng ổn định để ở từ năm 2006 (không vi phạm pháp luật đất đai, không có tranh chấp), không có bất kỳ giấy tờ nào theo quy định tại Điều 137 Luật Đất đai 2024. Biết rằng: Hạn mức công nhận đất ở tại địa phương là 100m²; Giá đất ở tại vị trí này theo Bảng giá đất hàng năm của UBND tỉnh/Thành phố trực thuộc trung ương là 20.000.000 VNĐ/m². Chưa tính lệ phí trước bạ, tổng số tiền sử dụng đất ông A phải nộp là bao nhiêu và tính theo nguyên tắc nào?", "options": {"A": "3.000.000.000 VNĐ (Toàn bộ 150m² nộp 100% theo Bảng giá đất).", "B": "2.000.000.000 VNĐ (Trong hạn mức nộp 50%, vượt hạn mức nộp 100% theo Bảng giá đất).", "C": "1.500.000.000 VNĐ (Toàn bộ 150m² nộp 50% theo Bảng giá đất).", "D": "Phải thuê tổ chức định giá độc lập xác định giá trị đất cụ thể cho 50m² vượt hạn mức nên chưa thể tính toán."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ theo Điều 138 Luật Đất đai 2024 và Điều 10 Nghị định 103/2024/NĐ-CP về thu tiền sử dụng đất: Khi tính tiền sử dụng đất để cấp Giấy chứng nhận lần đầu cho hộ gia đình cá nhân, cơ quan Thuế áp dụng Bảng giá đất hàng năm cho cả phần diện tích trong hạn mức và phần diện tích vượt hạn mức. Việc áp dụng Hệ số K hoặc thuê định giá độc lập cho phần vượt hạn mức của Luật Đất đai 2013 đã bị bãi bỏ hoàn toàn. Do ông A sử dụng đất từ năm 2006 và không có giấy tờ, pháp luật quy định mức thu chia làm 2 mức độ dựa trên hạn mức: Phần diện tích trong hạn mức (100m²): Chỉ phải nộp 50% tiền sử dụng đất tính theo Bảng giá đất: Tiền nộp 1 = 100m² x 20.000.000 x 50% = 1.000.000.000 VNĐ Phần diện tích vượt hạn mức (50m²): Phải nộp 100% tiền sử dụng đất tính theo Bảng giá đất => Tiền nộp 2 = 50m² x 20.000.000 x 100% = 1.000.000.000  VNĐ. Vậy Tổng kết Nghĩa vụ tài chính ông A phải nộp trong trường hợp này là:"}, {"level": "1", "content": "000.000.000 + 1.000.000.000 = 2.000.000.000 VNĐ (chưa bao gồm lệ phí trước bạ, phí đo đạc, lệ phí cấp sổ)", "options": {}, "answer": "", "explanation": ""}, {"level": "1", "content": "Năm 2026, trong quá trình thực hiện thủ tục đăng ký biến động đất đai (sang tên Sổ hồng) tại cơ quan chức năng tỉnh/thành phố trực thuộc trung ương, bên mua bị phát hiện sử dụng chứng minh nhân dân (CMND) 9 số đã hết giá trị sử dụng hoặc thông tin định danh không khớp với Cơ sở dữ liệu quốc gia về dân cư. Hệ quả pháp lý đối với hành vi sử dụng giấy tờ tùy thân không còn giá trị trong giao dịch này được quy định như thế nào?", "options": {"A": "Hồ sơ bị từ chối giải quyết; người vi phạm bị phạt tiền từ 1.000.000 đồng đến 2.000.000 đồng về hành vi sử dụng Chứng minh nhân dân/Thẻ căn cước đã hết hạn sử dụng.", "B": "Cơ quan đăng ký tạm thời tiếp nhận và yêu cầu bổ sung Căn cước điện tử trong 07 ngày làm việc; không phát sinh xử phạt hành chính nếu là lỗi nhầm lẫn.", "C": "Hợp đồng công chứng bị tuyên vô hiệu tuyệt đối ngay lập tức; bên mua bị xử phạt mức cố định 5.000.000 đồng do vi phạm quy định về cư trú.", "D": "Hệ thống hành chính 2 cấp tự động cập nhật thông tin mới nhất từ VNeID mức độ 2 và tiếp tục quy trình đăng bộ mà không cần yêu cầu người dân điều chỉnh."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Theo Luật Căn cước 2023 và Thông tư 04/2025/TT-BCA. Kể từ ngày 01/01/2025, Chứng minh nhân dân (CMND) 9 số và 12 số chính thức hết giá trị sử dụng. Đến năm 2026, mọi giao dịch dân sự, đặc biệt là bất động sản, bắt buộc phải sử dụng Thẻ Căn cước hoặc Căn cước điện tử (VNeID mức độ 2). Việc sử dụng giấy tờ cũ được coi là sử dụng giấy tờ không có giá trị pháp lý. Mức xử phạt hành chính cụ thể:Trích dẫn: Điểm b Khoản 1 Điều 10 Nghị định 144/2021/NĐ-CP. Hành vi \"Không thực hiện đúng quy định của pháp luật về cấp, đổi, cấp lại thẻ Căn cước công dân\" hoặc \"Sử dụng chứng minh nhân dân, thẻ Căn cước công dân... đã hết hạn sử dụng\" sẽ bị phạt tiền từ 1.000.000 VNĐ đến 2.000.000 VNĐ. Hệ quả đối với hồ sơ đất đai:Theo quy trình quản lý hành chính 2 cấp hiện nay, khi hồ sơ được nộp tại Trung tâm Phục vụ hành chính công, bộ phận tiếp nhận sẽ đối soát mã QR trên thẻ Căn cước hoặc mã định danh trên cổng dịch vụ công. Nếu thông tin không khớp hoặc giấy tờ hết hạn, hệ thống sẽ tự động phát lệnh \"Trả hồ sơ\". Việc này gây rủi ro cực lớn cho bên mua vì Hợp đồng công chứng có thể bị yêu cầu hủy bỏ hoặc ký phụ lục điều chỉnh, dẫn đến chậm trễ thời gian đăng bộ và phát sinh các rủi ro về chiếm dụng vốn hoặc thay đổi ý định từ phía bên bán."}, {"level": "1", "content": "Theo quy định của Luật Thuế thu nhập cá nhân hiện hành, thuế suất áp dụng đối với cá nhân có thu nhập từ hoạt động chuyển nhượng bất động sản được xác định ở mức nào sau đây?", "options": {"A": "5% tính trên thu nhập chịu thuế (chênh lệch giữa giá chuyển nhượng và giá vốn).", "B": "10% tính trên toàn bộ giá trị chuyển nhượng ghi trong hợp đồng.", "C": "2% tính trên giá chuyển nhượng ghi trong hợp đồng hoặc giá đất theo Bảng giá đất do UBND cấp tỉnh ban hành.", "D": "Áp dụng theo Biểu thuế lũy tiến từng phần, dao động từ 5% đến 35% tùy theo tổng thu nhập trong năm."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo quy định hiện hành, thuế suất thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng bất động sản là 2% trên giá trị chuyển nhượng. Việc xác định giá chuyển nhượng được thực hiện theo quy định của pháp luật về thuế thu nhập cá nhân. Giá tính thuế là giá ghi trên hợp đồng chuyển nhượng tại thời điểm giao dịch. Nếu giá trên hợp đồng thấp hơn Bảng giá đất hàng năm do UBND Thành phố ban hành, hoặc trường hợp hợp đồng không ghi giá, thì cơ quan Thuế sẽ ấn định giá tính thuế theo Bảng giá đất tại thời điểm đó."}, {"level": "1", "content": "Đâu là những loại thuế chính mà các doanh nghiệp kinh doanh bất động sản phải nộp?", "options": {"A": "Thuế Thu nhập cá nhân (TNCN)", "B": "Thuế thu nhập doanh nghiệp", "C": "Lệ phí Địa chính", "D": "Cả B và C đều đúng"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các doanh nghiệp kinh doanh bất động sản phải nộp nhiều loại thuế, trong đó có Thuế Thu nhập doanh nghiệp, Thuế Giá trị gia tăng và lệ phí địa chính. Ngoài ra, doanh nghiệp cũng có nghĩa vụ nộp Thuế sử dụng đất phi nông nghiệp đối với phần đất được giao."}, {"level": "1", "content": "Đối với doanh nghiệp kinh doanh bất động sản, thuế suất Thuế Thu nhập doanh nghiệp (TNDN) chung là bao nhiêu?", "options": {"A": "25%", "B": "20%", "C": "15%", "D": "Tùy thuộc vào quy mô doanh thu"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thuế suất thuế thu nhập doanh nghiệp phổ thông được áp dụng cho các doanh nghiệp là 20% trên thu nhập chịu thuế, theo quy định của Luật Thuế TNDN."}, {"level": "1", "content": "Tình huống: Vào ngày 15/07/2026, Ông Minh (Bên bán) và Bà Hoa (Bên mua) ký kết hợp đồng chuyển nhượng một biệt thự tại Thành phố Hồ Chí Minh (đã được công chứng hợp lệ). Giá trị giao dịch là 30 tỷ đồng. Do Bà Hoa đang gặp khó khăn về dòng tiền, hai bên thỏa thuận phương thức thanh toán trả dần như sau: Đợt 1 (15/07/2026): Thanh toán 10% (3 tỷ đồng) ngay sau khi ký hợp đồng. Đợt 2 đến Đợt 10: Thanh toán 10%/mỗi quý trong vòng 2 năm tiếp theo. Thời điểm đăng ký biến động (sang tên GCN): Được thực hiện sau khi Bà Hoa thanh toán đủ 50% giá trị hợp đồng (dự kiến cuối năm 2027). Căn cứ theo Luật Thuế thu nhập cá nhân hiện hành, thời hạn cuối cùng để Ông Minh thực hiện nộp hồ sơ khai thuế và nghĩa vụ thuế 2% là khi nào?", "options": {"A": "Chậm nhất là ngày thứ 10 kể từ ngày Bà Hoa thanh toán đủ 50% giá trị hợp đồng và bắt đầu làm thủ tục sang tên.", "B": "Thuế được chia nhỏ và nộp theo từng đợt thanh toán thực tế (10 ngày sau mỗi lần nhận tiền).", "C": "Chậm nhất là ngày thứ 10 kể từ ngày hợp đồng chuyển nhượng có hiệu lực pháp luật (ngày 15/07/2026).", "D": "Chậm nhất là 90 ngày kể từ ngày ký hợp đồng, tương ứng với thời hạn thông báo thuế của cơ quan thuế Thành phố."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Luật Thuế TNCN 2025 và Thông tư hướng dẫn năm 2026, thời điểm xác định thu nhập tính thuế đối với chuyển nhượng bất động sản là thời điểm hợp đồng chuyển nhượng có hiệu lực. Tại Việt Nam, hợp đồng chuyển nhượng bất động sản có hiệu lực từ thời điểm công chứng, chứng thực. Việc các bên thỏa thuận trả chậm 2 năm hay 10 năm chỉ là thỏa thuận dân sự về thanh toán, không làm thay đổi thời điểm phát sinh nghĩa vụ thuế với Nhà nước. Theo quy định về quản lý thuế năm 2026: Trường hợp hợp đồng chuyển nhượng không có thỏa thuận bên mua nộp thuế thay bên bán, thì bên bán phải nộp hồ sơ khai thuế chậm nhất là ngày thứ 10 kể từ thời điểm hợp đồng có hiệu lực. Hệ quả: Ông Minh phải khai và nộp đủ 2% của 30 tỷ đồng (tương đương 600 triệu VNĐ) ngay trong tháng 07/2026, dù thực tế lúc đó ông mới chỉ nhận được 3 tỷ đồng tiền mặt.."}, {"level": "1", "content": "Cá nhân môi giới bất động sản có thu nhập từ hoa hồng trên 2 triệu đồng/lần và không có hợp đồng lao động hoặc hợp đồng lao động dưới 3 tháng thì phải bị khấu trừ thuế thu nhập cá nhân với mức bao nhiêu?", "options": {"A": "Khấu trừ 10% trên tổng số tiền hoa hồng chi trả.", "B": "Khấu trừ 2% trên tổng giá trị bất động sản được giao dịch thành công.", "C": "Không khấu trừ tại nguồn nếu cá nhân làm Bản cam kết thu nhập chưa đến mức phải nộp thuế (Cam kết 08/CK-TNCN).", "D": "Khấu trừ theo Biểu thuế lũy tiến từng phần áp dụng cho thu nhập từ tiền lương, tiền công."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Căn cứ: Khoản 1 Điều 25 Thông tư 111/2013/TT-BTC. Đối với cá nhân cư trú không ký hợp đồng lao động hoặc ký hợp đồng lao động dưới 03 tháng, khi nhận các khoản thu nhập từ tiền lương, tiền công (bao gồm cả tiền thù lao, tiền hoa hồng môi giới) có tổng mức chi trả từ 2.000.000 VNĐ/lần trở lên, tổ chức chi trả (Công ty môi giới, Sàn giao dịch BĐS) bắt buộc phải khấu trừ thuế TNCN theo tỷ lệ 10% trên thu nhập trước khi trả cho cá nhân. Trong thực tế, người lao động tự do có thể làm Cam kết 08/CK-TNCN (cam kết tổng thu nhập trong năm chưa đến mức phải nộp thuế) để tổ chức chi trả tạm thời không khấu trừ 10%.Tuy nhiên, điều kiện bắt buộc để lập cam kết này là cá nhân phải chỉ có duy nhất thu nhập tại một nơi và đã đăng ký mã số thuế. Đối với môi giới bất động sản thường nhận hoa hồng từ nhiều dự án, nhiều chủ đầu tư khác nhau, việc làm cam kết này là sai quy định. Nếu bị cơ quan thuế phát hiện qua hệ thống đối soát dữ liệu thu nhập quốc gia, cả Công ty/Sàn giao dịch và môi giới đều bị truy thu và phạt nặng hành vi trốn thuế. Do đó, phương án C không thể là đáp án mặc định đúng trong trường hợp tổng quát."}, {"level": "1", "content": "Tình huống: Vào ngày 15/07/2026, Ông Minh (Bên bán) và Bà Hoa (Bên mua) ký kết hợp đồng chuyển nhượng một biệt thự tại Thành phố Hồ Chí Minh (đã được công chứng hợp lệ). Giá trị giao dịch là 30 tỷ đồng. Do Bà Hoa đang gặp khó khăn về dòng tiền, hai bên thỏa thuận phương thức thanh toán trả dần như sau: Đợt 1 (15/07/2026): Thanh toán 10% (3 tỷ đồng) ngay sau khi ký hợp đồng. Đợt 2 đến Đợt 10: Thanh toán 10%/mỗi quý trong vòng 2 năm tiếp theo. Thời điểm đăng ký biến động (sang tên GCN): Được thực hiện sau khi Bà Hoa thanh toán đủ 50% giá trị hợp đồng (dự kiến cuối năm 2027). Ông Minh đã hoàn tất việc nộp thuế TNCN theo quy định. Tuy nhiên, đến tháng 12/2026, do Bà Hoa vi phạm nghĩa vụ thanh toán đợt 3, hai bên đã lập Văn bản hủy bỏ hợp đồng chuyển nhượng có công chứng. Tại thời điểm này, hồ sơ chuyển nhượng chưa thực hiện đăng ký biến động (sang tên) tại Văn phòng Đăng ký đất đai. Ông Minh gửi hồ sơ đề nghị hoàn trả khoản thuế TNCN đã nộp. Khẳng định nào sau đây là đúng nhất về quyền lợi và quy trình của Ông Minh theo quy định pháp luật hiện hành về thuế và quản lý thuế?", "options": {"A": "Ông Minh được hoàn trả 100% số thuế đã nộp vì giao dịch chuyển nhượng chưa hoàn tất việc đăng ký quyền sở hữu/sử dụng.", "B": "Cơ quan Thuế không hoàn trả vì nghĩa vụ thuế phát sinh từ thời điểm hợp đồng có hiệu lực; việc hủy hợp đồng là quan hệ dân sự phát sinh sau đó.", "C": "Ông Minh được hoàn trả số thuế đã nộp nhưng bị khấu trừ 10% chi phí quản lý hành chính và tiền phạt do làm thay đổi kế hoạch thu ngân sách.", "D": "Khoản thuế này không được hoàn lại bằng tiền mặt mà được bảo lưu (cấn trừ) cho giao dịch chuyển nhượng bất động sản tiếp theo của Ông Minh trong vòng 24 tháng."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 60 Luật Quản lý thuế 2019 và hướng dẫn tại Thông tư 80/2021/TT-BTC (đã được cập nhật cho hệ thống thuế 2026): Người nộp thuế có số tiền thuế nộp thừa trong trường hợp số tiền thuế đã nộp lớn hơn số tiền thuế phải nộp. Trong giao dịch bất động sản, nếu hợp đồng chuyển nhượng bị hủy bỏ và các bên chưa thực hiện đăng ký quyền sở hữu, quyền sử dụng tại cơ quan nhà nước có thẩm quyền, thì căn cứ tính thuế không còn tồn tại. Do đó, khoản thuế đã nộp được xác định là \"nộp thừa\". Tuy nhiên, điều kiện \"Tiên quyết\" để được hoàn thuế phải gồm: (1) Văn bản hủy hợp đồng: Phải được công chứng/chứng thực theo đúng trình tự như khi ký hợp đồng gốc. (2) Xác nhận của cơ quan đăng ký đất đai: Văn phòng Đăng ký đất đai Thành phố phải xác nhận bằng văn bản (hoặc qua dữ liệu liên thông) rằng thửa đất/căn nhà này chưa được chỉnh lý biến động sang tên cho Bên mua trên Sổ hồng và Sổ địa chính. Cần lưu ý nếu Sổ hồng đã được ký sang tên cho Bà Hoa, thì việc hủy hợp đồng sẽ bị coi là một giao dịch chuyển nhượng ngược lại (Bà Hoa bán lại cho Ông Minh), lúc này sẽ phát sinh thêm một lần thuế 2% mới chứ không được hoàn thuế cũ."}, {"level": "1", "content": "Năm 2026, cơ quan Thuế thực hiện hậu kiểm hồ sơ chuyển nhượng bất động sản của một cá nhân và phát hiện hành vi khai sai căn cứ tính thuế, dẫn đến thiếu số tiền thuế phải nộp (nhưng người nộp thuế đã ghi chép kịp thời, đầy đủ các nghiệp vụ vào hồ sơ kế toán, chứng từ). Mức xử phạt hành chính và các khoản bổ sung được ấn định như thế nào?", "options": {"A": "Phạt tiền 10% số tiền thuế thiếu + Truy thu đủ số thuế thiếu + Tiền chậm nộp mức 0,05%/ngày.", "B": "Phạt tiền 20% số tiền thuế thiếu + Truy thu đủ số thuế thiếu + Tiền chậm nộp mức 0,03%/ngày.", "C": "Phạt tiền từ 01 đến 03 lần số tiền thuế thiếu (phạt trốn thuế) + Truy thu đủ số thuế thiếu.", "D": "Phạt tiền tối đa 25.000.000 VNĐ (mức trần hành chính) + Truy thu đủ số thuế thiếu + Tiền chậm nộp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ: Điều 16 Nghị định 125/2020/NĐ-CP. Đối với hành vi khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn, mức phạt được ấn định cố định là 20% tính trên số tiền thuế thiếu hoặc số tiền thuế đã được miễn, giảm, hoàn cao hơn quy định. Khoản 2 Điều 59 Luật Quản lý thuế 2019 quy định mức tính tiền chậm nộp hiện nay là 0,03%/ngày tính trên số tiền thuế chậm nộp (Mức 0,05% tại phương án A là quy định cũ đã hết hiệu lực). Khi bị cơ quan thuế truy thu, số tiền người nộp thuế phải thanh toán được tính như sau:"}, {"level": "1", "content": "Mức phạt tiền chậm nộp thuế được tính như thế nào?", "options": {"A": "0,03% mỗi ngày trên số tiền thuế chậm nộp", "B": "0,05% mỗi ngày trên số tiền thuế chậm nộp", "C": "0,07% mỗi ngày trên số tiền thuế chậm nộp", "D": "0,01% mỗi ngày trên số tiền thuế chậm nộp"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Theo quy định tại Khoản 2 Điều 59 Luật Quản lý thuế 2019 người nộp thuế chậm nộp tiền thuế so với thời hạn quy định thì phải nộp tiền chậm nộp theo mức 0,03%/ngày tính trên số tiền thuế chậm nộp."}, {"level": "1", "content": "Năm 2026, một cá nhân ký hợp đồng cho thuê mặt bằng kinh doanh với tổng doanh thu ghi nhận trong năm là 1,2 tỷ đồng. Căn cứ theo Nghị định 141/2026/NĐ-CP và các quy định pháp luật thuế hiện hành, nghĩa vụ Thuế Giá trị gia tăng (GTGT) và Thuế Thu nhập cá nhân (TNCN) của người này được xác định theo nguyên tắc nào sau đây?", "options": {"A": "Phải nộp thuế GTGT 5% và thuế TNCN 5% tính trên toàn bộ doanh thu 1,2 tỷ đồng.", "B": "Phải nộp thuế GTGT 5% và thuế TNCN 5% tính chung trên phần doanh thu vượt ngưỡng miễn thuế (tức là tính trên 200 triệu đồng).", "C": "Được miễn thuế hoàn toàn nếu cá nhân làm cam kết đây là tài sản duy nhất tạo ra thu nhập để sinh sống.", "D": "Phải nộp thuế GTGT 5% tính trên toàn bộ doanh thu 1,2 tỷ đồng; nhưng thuế TNCN 5% chỉ tính trên phần doanh thu vượt mức 1 tỷ đồng (tức là tính trên 200 triệu đồng)."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Theo chính sách thuế mới nhất áp dụng từ năm 2026 (Nghị quyết của Quốc hội và Nghị định 141/2026/NĐ-CP sửa đổi, bổ sung các quy định về thuế đối với cá nhân kinh doanh), ngưỡng doanh thu không phải chịu thuế đã được nâng từ mức cũ (500 triệu đồng) lên mức 1 tỷ đồng/năm. Tuy nhiên, khi doanh thu vượt qua ngưỡng 1 tỷ đồng, pháp luật quy định cách xử lý hoàn toàn khác nhau đối với hai sắc thuế này: Theo Khoản 2 Điều 3 Nghị định 68/2026/NĐ-CP (sửa đổi bởi Nghị định 141/2026/NĐ-CP), cá nhân cho thuê tài sản có doanh thu trên 1 tỷ đồng thuộc đối tượng chịu thuế GTGT. Tuy nhiên, thuế GTGT đánh vào sự gia tăng giá trị của dịch vụ cung cấp trên thị trường, do đó phải tính 5% trên toàn bộ doanh thu. Theo Điều 7 Luật Thuế thu nhập cá nhân (sửa đổi áp dụng từ 2026), nhằm đảm bảo an sinh xã hội và giảm gánh nặng cho người dân, thuế TNCN từ hoạt động cho thuê bất động sản (trừ lưu trú) chỉ được xác định bằng phần doanh thu vượt trên mức 1 tỷ đồng nhân (x) với thuế suất 5%. => Thuế TNCN = (Tổng doanh thu - 1.000.000.000) x 5% => (1.200.000.000 - 1.000.000.000) x 5% = 200.000.000 x 5% = 10.000.000 VNĐ."}, {"level": "1", "content": "Căn cứ vào Luật Phí và Lệ phí 2015 và hệ thống phân loại ngân sách nhà nước năm 2026, khẳng định nào sau đây phản ánh chính xác nhất bản chất pháp lý của Lệ phí trước bạ trong giao dịch bất động sản?", "options": {"A": "Là một loại thuế gián thu đánh vào giá trị tài sản nhằm mục đích điều tiết thu nhập của người sở hữu.", "B": "Là một loại lệ phí hành chính mà cá nhân, tổ chức phải nộp khi được cơ quan nhà nước cung cấp dịch vụ công hoặc thực hiện các công việc quản lý nhà nước về đăng ký quyền sở hữu, quyền sử dụng.", "C": "Là một loại thuế trực thu có tính hoàn trả trực tiếp thông qua việc xác lập quyền sở hữu tài sản cho người nộp.", "D": "Là khoản phí dịch vụ công được tính dựa trên chi phí thực tế phát sinh để vận hành hệ thống Cơ sở dữ liệu Đất đai quốc gia."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lệ phí trước bạ là một loại lệ phí hành chính, không phải là thuế. Đây là khoản tiền nộp vào ngân sách nhà nước gắn với việc cung cấp dịch vụ công hoặc hoạt động quản lý nhà nước. Cần phân biệt rõ ranh giới giữa Thuế và Lệ phí theo lý thuyết tài chính công và pháp luật hiện hành: Thuế có tính cưỡng bách, không mang tính đối giá và không hoàn trả trực tiếp. Người nộp thuế nộp tiền vào ngân sách để Nhà nước chi dùng cho các mục tiêu chung (quốc phòng, giáo dục...). Lệ phí (bao gồm Lệ phí trước bạ) Gắn liền với tính đối giá. Cá nhân nộp lệ phí trước bạ là để \"đổi lấy\" một dịch vụ hành chính công cụ thể từ Nhà nước, đó là việc ghi tên vào sổ địa chính và cấp Giấy chứng nhận (Sổ hồng). Nếu không nộp lệ phí, Nhà nước có quyền từ chối cung cấp dịch vụ xác lập quyền sở hữu này. Khoản 2 Điều 3 Luật Phí và Lệ phí 2015 quy định Lệ phí là khoản tiền được ấn định mà tổ chức, cá nhân phải nộp khi được cơ quan nhà nước thực hiện công việc quản lý nhà nước. Lệ phí trước bạ được quy định cụ thể tại Nghị định 10/2022/NĐ-CP. Việc gọi đây là một loại thuế (như ở phương án A và C) là sai lệch hoàn toàn về mặt thuật ngữ pháp lý và bản chất quản lý ngân sách. Phí (Fee) thường được tính để bù đắp chi phí cung cấp dịch vụ (như Phí thẩm định hồ sơ). Lệ phí trước bạ mang tính chất hành chính cao hơn và mức thu được ấn định theo tỷ lệ phần trăm (0,5%) trên giá trị tài sản, không phụ thuộc vào chi phí vận hành hệ thống dữ liệu."}, {"level": "1", "content": "Theo quy định tại Luật Thuế TNDN số 67/2025/QH15, trong kỳ tính thuế năm 2026, nếu doanh nghiệp có phát sinh lãi từ hoạt động chuyển nhượng bất động sản nhưng bị lỗ từ hoạt động sản xuất kinh doanh chính (hoặc ngược lại), việc xác định thu nhập tính thuế được thực hiện theo nguyên tắc nào?", "options": {"A": "Hoạt động chuyển nhượng bất động sản phải kê khai, nộp thuế riêng; không được bù trừ lỗ từ hoạt động sản xuất kinh doanh chính vào số lãi này.", "B": "Doanh nghiệp được bù trừ hai chiều giữa lỗ từ hoạt động sản xuất kinh doanh với thu nhập (lãi) từ chuyển nhượng bất động sản và ngược lại.", "C": "Chỉ cho phép bù trừ một chiều: Lấy lỗ từ bất động sản bù vào lãi kinh doanh; không được lấy lỗ kinh doanh bù vào lãi bất động sản.", "D": "Doanh nghiệp phải nộp thuế cho phần lãi bất động sản trước, số lỗ kinh doanh được chuyển sang kỳ tính thuế tiếp theo để trừ vào thu nhập kinh doanh năm sau."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Cơ sở pháp lý: Theo Điều 7 và Điều 9 Luật Thuế TNDN số 67/2025/QH15, Quốc hội đã chính thức cho phép doanh nghiệp được bù trừ số lỗ từ hoạt động sản xuất, kinh doanh với thu nhập từ hoạt động chuyển nhượng bất động sản. Bước ngoặt so với Luật cũ (Luật 2008 sửa đổi 2013, 2014), vốn chỉ cho phép bù trừ \"một chiều\" (Lỗ BĐS bù vào Lãi kinh doanh), thì Luật năm 2025 đã cho phép bù trừ linh hoạt hai chiều. Điều này giúp phản ánh chính xác năng lực tài chính tổng thể của pháp nhân. Với Luật mới, công thức xác định  thu nhập trước thuế của doanh nghiệp trở nên đơn giản và hợp lý hơn:  Thu nhập tính thuế = (LNKD + LNBĐS + LNkhác) – LỗKết chuyển . Trong đó: LNKD : Lợi nhuận từ hoạt động kinh doanh thông thường. LNBĐS : Lơi nhuận từ chuyển nhượng bất động sản . Nếu tổng (LNKD + LNBĐS + LNkhác < 0, doanh nghiệp được xác định là lỗ trong kỳ và không phải nộp thuế TNDN, đồng thời được chuyển toàn bộ số lỗ tổng hợp này sang các năm tiếp theo (không quá 5 năm)."}, {"level": "1", "content": "Phí thẩm định hồ sơ cấp giấy chứng nhận quyền sử dụng đất có mức thu cố định trên toàn quốc không?", "options": {"A": "Có, được quy định bởi Bộ Tài chính", "B": "Có, được quy định bởi Bộ Tài nguyên và Môi trường", "C": "Không, mức thu tùy thuộc vào từng địa phương", "D": "Không, được quy định bởi từng cơ quan cấp giấy chứng nhận"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Danh mục Phí, Lệ phí ban hành kèm theo Luật Phí và Lệ phí 2015, Phí thẩm định hồ sơ cấp Giấy chứng nhận quyền sử dụng đất thuộc thẩm quyền quyết định của Hội đồng nhân dân (HĐND) cấp tỉnh. Điều này cho phép mỗi địa phương (như TP.HCM, Hà Nội, Bình Dương...) tự xây dựng mức thu phù hợp với giá trị đất đai và chi phí hành chính đặc thù của mình."}, {"level": "1", "content": "Theo quy định tại Điều 200 Bộ luật Hình sự 2015 (sửa đổi năm 2017), cá nhân thực hiện hành vi trốn thuế (như kê khai giá chuyển nhượng bất động sản thấp hơn thực tế) bị truy cứu trách nhiệm hình sự trong trường hợp nào sau đây?", "options": {"A": "Số tiền trốn thuế từ 50.000.000 VNĐ trở lên và đây không phải là vi phạm lần đầu.", "B": "Số tiền trốn thuế từ 100.000.000 VNĐ trở lên; hoặc dưới 100.000.000 VNĐ nhưng đã bị xử phạt vi phạm hành chính về hành vi trốn thuế mà còn vi phạm.", "C": "Số tiền trốn thuế đạt ngưỡng 300.000.000 VNĐ trở lên (mức độ nghiêm trọng).", "D": "Mọi hành vi kê khai sai dẫn đến thiếu thuế trên 100.000.000 VNĐ đều bị khép vào tội trốn thuế."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Khoản 1 Điều 200 Bộ luật Hình sự, ngưỡng để chuyển từ xử phạt hành chính sang truy cứu trách nhiệm hình sự được xác lập tại hai cột mốc: Trường hợp 1: Số tiền trốn thuế từ 100.000.000 VNĐ đến dưới 300.000.000 VNĐ. Trường hợp 2: Số tiền trốn thuế dưới 100.000.000 VNĐ nhưng thuộc một trong các điều kiện: Đã bị xử phạt vi phạm hành chính về hành vi trốn thuế. Đã bị kết án về tội này hoặc một số tội kinh tế khác (như buôn lậu, sản xuất hàng giả...) chưa được xóa án tích mà còn vi phạm. Cần chú ý không phải mọi hành vi thiếu thuế đều là trốn thuế. Cần phân biệt nếu là \"Khai sai\" do nhầm lẫn, hiểu sai luật nhưng hồ sơ vẫn minh bạch, người nộp thuế chỉ bị phạt hành chính 20% và tiền chậm nộp. Tội \"Trốn thuế\" đòi hỏi yếu tố lỗi cố ý (như sử dụng hóa đơn bất hợp pháp, hai hệ thống sổ sách, không kê khai khi có phát sinh thu nhập...). Ví dụ, nếu số tiền thuế TNCN (2%) và Lệ phí trước bạ (0,5%) chênh lệch vượt mức 100.000.000 VNĐ, hồ sơ sẽ tự động được chuyển sang trạng thái \"Nghi vấn tội phạm\" để cơ quan Công an kinh tế vào cuộc thẩm định."}, {"level": "1", "content": "Trong các trường hợp thực hiện thủ tục hành chính về đất đai, trường hợp nào sau đây được miễn nộp phí thẩm định hồ sơ cấp Giấy chứng nhận quyền sử dụng đất theo quy định chung của pháp luật và các Nghị quyết của HĐND?", "options": {"A": "Cá nhân thực hiện thủ tục cấp lại Giấy chứng nhận do bị mất hoặc hư hỏng trong quá trình sử dụng.", "B": "Đăng ký biến động đất đai do thay đổi thông tin về số Căn cước công dân hoặc địa chỉ thường trú trên VNeID.", "C": "Cấp đổi Giấy chứng nhận do cơ quan nhà nước phát hiện có sai sót trong quá trình đo đạc, lập bản đồ địa chính hoặc ghi chép hồ sơ trước đây.", "D": "Doanh nghiệp thực hiện đăng ký thế chấp quyền sử dụng đất để vay vốn tại các tổ chức tín dụng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ: Thông tư 85/2019/TT-BTC và Thông tư 106/2021/TT-BTC hướng dẫn phí và lệ phí quy định về miễn, giảm phí và lệ phí thuộc thẩm quyền của HĐND cấp tỉnh và các văn bản chuyên ngành. Khi việc cấp đổi Giấy chứng nhận phát sinh do sai sót của cơ quan đăng ký đất đai, cơ quan đo đạc hoặc cơ quan nhà nước có thẩm quyền trong quá trình tác nghiệp, người dân không phải chịu bất kỳ khoản phí thẩm định nào. Đây là nguyên tắc bảo vệ quyền lợi hợp pháp của người nộp thuế trước các sai sót hành chính. Mặc dù khung phí do Bộ Tài chính hướng dẫn, nhưng danh mục miễn giảm chi tiết được phân cấp cho HĐND cấp tỉnh quyết định dựa trên chính sách an sinh xã hội. Các đối tượng thường được miễn bao gồm: Hộ nghèo, người cao tuổi, người khuyết tật, người có công với cách mạng. Đồng bào dân tộc thiểu số ở các vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn.."}, {"level": "1", "content": "Lệ phí cấp giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản gắn liền với đất là khoản phí mà tổ chức, cá nhân phải nộp khi được cơ quan nhà nước giải quyết các công việc về:", "options": {"A": "Thẩm định hồ sơ", "B": "Cấp giấy chứng nhận quyền sử dụng đất", "C": "Địa chính", "D": "Cả A, B và C đều đúng"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Lệ phí cấp giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất là khoản thu vào tổ chức, hộ gia đình, cá nhân khi được cơ quan nhà nước có thẩm quyền hoặc tổ chức được ủy quyền giải quyết các công việc về địa chính (bao gồm cấp mới, cấp đổi, cấp lại Giấy chứng nhận; trích lục bản đồ địa chính, văn bản, số liệu hồ sơ địa chính…)."}, {"level": "1", "content": "Theo quy định tại Luật Thuế thu nhập cá nhân 2025 và Luật Nuôi con nuôi 2010, thu nhập từ việc nhận thừa kế hoặc quà tặng là bất động sản giữa cha mẹ nuôi và con nuôi được xử lý như thế nào về nghĩa vụ thuế??", "options": {"A": "Được miễn thuế TNCN không điều kiện, tương tự như mối quan hệ huyết thống giữa cha mẹ đẻ và con đẻ.", "B": "Được miễn thuế TNCN với điều kiện mối quan hệ nuôi con nuôi đã được đăng ký và xác lập hợp pháp theo quy định của pháp luật tại thời điểm nhận tài sản.", "C": "Phải nộp thuế TNCN với thuế suất ưu đãi 5% (giảm 50% so với mức phổ thông) do không có quan hệ huyết thống.", "D": "Chỉ được miễn thuế nếu giá trị bất động sản nhận thừa kế/quà tặng dưới ngưỡng 1 tỷ đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Khoản 4 Điều 4 Luật Thuế thu nhập cá nhân: Thu nhập từ nhận thừa kế, quà tặng là bất động sản giữa: vợ với chồng; cha đẻ, mẹ đẻ với con đẻ; cha nuôi, mẹ nuôi với con nuôi; cha chồng, mẹ chồng với con dâu; cha vợ, mẹ vợ với con rể; ông nội, bà nội với cháu nội; ông ngoại, bà ngoại với cháu ngoại; anh, chị, em ruột với nhau đều thuộc diện miễn thuế. Về mặt pháp lý, khi một cá nhân được nhận làm con nuôi hợp pháp, họ có đầy đủ quyền và nghĩa vụ như con đẻ đối với cha mẹ nuôi. Khác với quan hệ huyết thống (vốn có thể chứng minh qua Giấy khai sinh gốc), quan hệ con nuôi chỉ được thừa nhận miễn thuế khi: Đã hoàn tất thủ tục đăng ký nuôi con nuôi tại UBND cấp xã và được cấp Giấy chứng nhận nuôi con nuôi. Ngoài việc miễn thuế TNCN, trường hợp này cũng được miễn Lệ phí trước bạ theo quy định tại Nghị định 10/2022/NĐ-CP (và các văn bản cập nhật 2026). Lưu ý: Nếu không chứng minh được quan hệ hợp pháp (ví dụ: nuôi dưỡng thực tế nhưng không đăng ký với chính quyền), cơ quan thuế sẽ áp mức thuế suất 10% cho phần giá trị bất động sản vượt quá 10 triệu đồng."}, {"level": "1", "content": "Thuế suất Thuế GTGT 10% trong kinh doanh bất động sản được tính trên cơ sở nào?", "options": {"A": "Toàn bộ giá trị hợp đồng chuyển nhượng đã bao gồm thuế GTGT.", "B": "Giá trị hợp đồng chuyển nhượng (chưa có thuế GTGT) trừ (-) đi giá đất được trừ theo quy định pháp luật.", "C": "Giá trị hợp đồng chuyển nhượng trừ (-) đi tổng chi phí xây dựng công trình và hạ tầng kỹ thuật.", "D": "Tính trên phần chênh lệch (lợi nhuận) giữa giá bán bất động sản và giá vốn hình thành bất động sản đó."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thuế giá trị gia tăng là thuế tính trên giá trị gia tăng của hàng hóa, dịch vụ phát sinh trong quá trình sản xuất, kinh doanh. Trong kinh doanh bất động sản, thuế giá trị gia tăng được tính trên giá trị gia tăng của bất động sản Theo Khoản 10 Điều 7 Thông tư 219/2013/TT-BTC (và các văn bản hợp nhất, sửa đổi cập nhật đến năm 2026), đối với hoạt động chuyển nhượng bất động sản, giá tính thuế giá trị gia tăng là giá chuyển nhượng bất động sản trừ (-) giá đất được trừ để tính thuế GTGT."}, {"level": "1", "content": "Tình huống:Tháng 08/2026, Ông An thực hiện thủ tục tặng cho một căn nhà tại Thành phố Hồ Chí Minh cho anh Bình. Căn nhà được cơ quan thuế xác định giá trị theo Bảng giá đất hàng năm là 10 tỷ đồng. Mặc dù trên thực tế anh Bình là con nuôi của Ông An từ nhỏ, nhưng do sơ suất, hai bên chưa từng thực hiện đăng ký nuôi con nuôi tại cơ quan có thẩm quyền.Khi thực hiện nghĩa vụ tài chính để sang tên Sổ hồng, anh Bình phải nộp số tiền thuế Thu nhập cá nhân (TNCN) là bao nhiêu theo quy định của Luật Thuế TNCN 2025?", "options": {"A": "0 VNĐ - Được miễn thuế hoàn toàn vì là quan hệ cha con trên thực tế).", "B": "990.000.000 VNĐ (Lấy 10% giá trị tài sản rồi trừ đi 10 triệu đồng tiền thuế được giảm).", "C": "999.000.000 VNĐ (Tính thuế 10% trên phần giá trị bất động sản vượt quá 10 triệu đồng).", "D": "1.000.000.000 VNĐ (Tính thuế 10% trên toàn bộ giá trị 10 tỷ đồng)."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 16 Luật Thuế thu nhập cá nhân: \"Thu nhập tính thuế từ nhận thừa kế, quà tặng là phần giá trị tài sản nhận thừa kế, quà tặng vượt trên 10 triệu đồng mỗi lần nhận.\" Ttncn = (10.000.000.000 - 10.000.000) x 10% = 9.990.000.000 x 10% = 999.000.000 VNĐ"}, {"level": "1", "content": "Theo Nghị định 10/2022/NĐ-CP, mức lệ phí trước bạ khi mua bán bất động sản là bao nhiêu?", "options": {"A": "0.5% trên giá tính lệ phí trước bạ", "B": "1% trên giá tính lệ phí trước bạ", "C": "2% trên giá chuyển nhượng", "D": "Tùy thuộc vào giá trị bất động sản"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Mức thu lệ phí trước bạ đối với nhà, đất là 0,5% trên giá tính lệ phí trước bạ, được quy định cụ thể tại Nghị định của Chính phủ."}, {"level": "1", "content": "Cơ quan nào có thẩm quyền ban hành Bảng giá đất để làm căn cứ tính thuế?", "options": {"A": "Quốc hội", "B": "Bộ Nông nghiệp và Môi trường", "C": "Chính phủ", "D": "Ủy ban nhân dân cấp tỉnh"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Bảng giá đất được xây dựng và ban hành bởi Ủy ban nhân dân cấp tỉnh, thành phố trực thuộc trung ương để làm căn cứ tính các loại thuế, phí liên quan đến đất đai."}, {"level": "1", "content": "Hành vi khai sai giá trị chuyển nhượng bất động sản để trốn thuế được coi là vi phạm hành chính hay hình sự?", "options": {"A": "Vi phạm hành chính", "B": "Vi phạm hình sự", "C": "Cả A và B, tùy thuộc vào mức độ vi phạm và số tiền trốn thuế", "D": "Chỉ là vi phạm dân sự"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Hành vi khai sai giá trị chuyển nhượng là vi phạm hành chính về thuế. Tuy nhiên, nếu hành vi này dẫn đến trốn thuế với số tiền lớn hoặc tái phạm, người vi phạm có thể bị truy cứu trách nhiệm hình sự về tội trốn thuế."}, {"level": "1", "content": "Đối với doanh nghiệp kinh doanh dịch vụ bất động sản (sàn giao dịch), loại thuế chính phải nộp là gì?", "options": {"A": "Thuế Thu nhập doanh nghiệp và Thuế Giá trị gia tăng", "B": "Thuế Thu nhập cá nhân và Thuế Môn bài", "C": "Thuế Thu nhập doanh nghiệp và Thuế thu nhập cá nhân", "D": "Thuế Giá trị gia tăng và Thuế Môn bài"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Doanh nghiệp kinh doanh dịch vụ bất động sản (sàn giao dịch) hoạt động như một doanh nghiệp thông thường, vì vậy phải nộp Thuế Thu nhập doanh nghiệp và Thuế Giá trị gia tăng trên thu nhập và doanh thu từ dịch vụ của mình."}, {"level": "1", "content": "Trong một giao dịch bất động sản thành công, nghĩa vụ Thuế TNCN của người chuyển nhượng (người bán) và người hành nghề môi giới (cá nhân) có điểm gì khác biệt về bản chất pháp lý và mức thuế suất áp dụng?", "options": {"A": "Cả hai đều nộp thuế theo thuế suất cố định 2% tính trên giá trị giao dịch ghi trên hợp đồng.", "B": "Người chuyển nhượng nộp 2% trên giá chuyển nhượng; người môi giới nộp 10% trên tổng giá trị bất động sản được giao dịch.", "C": "Người chuyển nhượng nộp thuế suất 2% thu nhập từ chuyển nhượng BĐS; người môi giới nộp theo biểu thuế lũy tiến từng phần hoặc khấu trừ 10% thu nhập từ tiền lương, tiền công.", "D": "Nghĩa vụ thuế là giống nhau vì cả hai đều phát sinh thu nhập từ cùng một tài sản bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Sự khác biệt này xuất phát từ việc phân loại nguồn hình thành thu nhập theo quy định của Luật Thuế TNCN: Cá nhân chuyển nhượng bất động sản nộp thuế suất 2% trên giá chuyển nhượng. Cá nhân môi giới nộp thuế thu nhập cá nhân theo biểu thuế lũy tiến từng phần hoặc 10% trên hoa hồng, tùy thuộc vào hình thức hợp đồng lao động."}, {"level": "1", "content": "Khi thực hiện công chứng hợp đồng chuyển nhượng (hoặc tặng cho) bất động sản, mức Phí công chứng được xác định dựa trên nguyên tắc nào sau đây để phân biệt giữa giao dịch trong gia đình (cha mẹ - con cái) và giao dịch giữa các bên không có quan hệ nhân thân?", "options": {"A": "Được giảm 50% mức phí nếu chứng minh được quan hệ huyết thống qua Cơ sở dữ liệu quốc gia về dân cư.", "B": "Được miễn hoàn toàn phí công chứng, chỉ phải nộp thù lao soạn thảo văn bản và phí dịch vụ ngoài trụ sở.", "C": "Mức phí được tính lũy tiến trên giá trị tài sản hoặc giá trị hợp đồng, không có sự phân biệt về mối quan hệ nhân thân giữa các bên giao dịch.", "D": "Mức phí do Văn phòng công chứng tự quyết định căn cứ vào mức độ rủi ro pháp lý của từng loại mối quan hệ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Mức lệ phí công chứng được tính dựa trên giá trị tài sản hoặc giá trị hợp đồng, không phụ thuộc vào mối quan hệ giữa các bên tham gia giao dịch. Bản chất của Phí công chứng là khoản thu để bù đắp chi phí cho dịch vụ xác thực tính hợp pháp của giao dịch. Dù là người trong nhà hay người ngoài, Công chứng viên đều phải thực hiện các bước nghiệp vụ giống nhau: kiểm tra tính xác thực của sổ đỏ, năng lực hành vi dân sự, và ngăn chặn giao dịch ảo. Do đó, mức phí phải đồng nhất để đảm bảo vận hành bộ máy công chứng."}, {"level": "1", "content": "Năm 2026, ông A sở hữu một căn nhà tại khu vực Dĩ An (nay thuộc Thành phố Hồ Chí Minh). Ông dự định để lại tài sản này cho con trai. Căn nhà hiện có giá trị theo bảng giá đất là 5 tỷ đồng. Ông đang cân nhắc giữa hai phương án: (1) Ký hợp đồng Tặng cho ngay trong năm 2026. (2) Lập Di chúc để con trai thừa kế sau này. Xét về khía cạnh Phí công chứng và thời điểm phát sinh nghĩa vụ tài chính, nhận định nào sau đây là đúng nhất?", "options": {"A": "Cả hai phương án đều phát sinh phí công chứng tính theo tỷ lệ phần trăm (0,1%) trên giá trị căn nhà (5 tỷ đồng) ngay tại thời điểm ông A ký văn bản tại Văn phòng công chứng.", "B": "Phương án Tặng cho phát sinh phí công chứng theo giá trị tài sản (5 tỷ đồng) ngay lập tức; phương án Di chúc chỉ mất phí công chứng cố định (thấp) ở hiện tại, nhưng khi ông A qua đời, con trai ông phải nộp phí công chứng tính theo giá trị tài sản tại thời điểm đó để làm thủ tục khai nhận di sản.", "C": "Phương án Di chúc giúp tiết kiệm toàn bộ chi phí công chứng cho con trai ông A kể cả sau khi ông qua đời vì đây là đối tượng được miễn phí dịch vụ công.", "D": "Phương án Tặng cho có tổng chi phí thấp hơn vì giá đất năm 2026 chắc chắn thấp hơn giá đất trong tương lai khi ông A qua đời."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Dưới góc độ Luật Công chứng 2024, nếu gia đình hòa thuận và muốn chốt chi phí ở mức rẻ nhất (theo giá đất 2026), thì Tặng cho là lựa chọn khôn ngoan. Nếu muốn an toàn cho người già và không quan tâm đến việc con cái phải nộp phí cao sau này, thì Di chúc là giải pháp tối ưu. Ở giai đoạn lập Di chúc, luật coi đây là việc xác nhận ý chí đơn phương. Vì chưa có sự dịch chuyển tài sản, phí công chứng được tính theo mức cố định (rất thấp). Theo Điều 64 Luật Công chứng 2024, việc công chứng văn bản thỏa thuận phân chia di sản hoặc khai nhận di sản phải tính phí dựa trên giá trị di sản. Nếu sau này ông A mất, giá trị tài sản tăng cao, như vậy phí công chứng sẽ rất cao."}, {"level": "1", "content": "Theo Luật Đất đai 2024, tiền sử dụng đất khi đối với tổ chức khi Nhà nước giao đất có thu tiền sử dụng đất không đấu giá quyền sử dụng đất được tính như thế nào?", "options": {"A": "Thu theo giá đất do UBND cấp tỉnh ban hành.", "B": "Thu theo giá thị trường của thửa đất.", "C": "Thu theo giá đất cụ thể do cơ quan nhà nước có thẩm quyền quyết định.", "D": "Thu theo khung giá đất của Chính phủ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Đất đai 2024 (có hiệu lực từ năm 2025) quy định tiền sử dụng đất khi chuyển mục đích sử dụng sẽ được tính theo giá đất cụ thể do cơ quan nhà nước có thẩm quyền quyết định, tiệm cận với giá thị trường, thay vì chỉ dựa trên bảng giá đất."}, {"level": "1", "content": "Ông A chuyển nhượng quyền sử dụng đất ở và tài sản gắn liền với đất tại Đà Nẵng. Ông đã sở hữu tài sản này được 24 tháng và cam kết đây là bất động sản (BĐS) duy nhất của ông trên toàn lãnh thổ Việt Nam. Để được miễn thuế Thu nhập cá nhân (TNCN) theo quy định của Luật Thuế TNCN và các văn bản hướng dẫn áp dụng cho năm 2026, ông A phải đáp ứng đầy đủ các điều kiện nào sau đây?", "options": {"A": "Chỉ cần cam kết là nhà ở duy nhất tại thời điểm ký hợp đồng chuyển nhượng tại Văn phòng công chứng.", "B": "Phải sở hữu tài sản tối thiểu 183 ngày, là BĐS duy nhất tại Việt Nam và phải chịu trách nhiệm trước pháp luật về tính xác thực của cam kết.", "C": "Phải sở hữu tài sản tối thiểu 365 ngày và có giấy xác nhận của UBND phường/xã về việc không có chỗ ở nào khác.", "D": "Phải sở hữu tài sản tối thiểu 183 ngày và giá trị giao dịch không được vượt quá 10 tỷ đồng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ theo Thông tư 111/2013/TT-BTC: Thời điểm xác định quyền sở hữu nhà ở, quyền sử dụng đất ở tính đến thời điểm chuyển nhượng phải tối thiểu là 183 ngày (tương đương 6 tháng). Mục đích của quy định này là ngăn chặn việc đầu cơ lướt sóng (mua xong bán ngay) nhưng lại lợi dụng chính sách miễn thuế dành cho người có nhu cầu ở thực.."}, {"level": "1", "content": "Trường hợp nào sau đây được miễn Thuế sử dụng đất phi nông nghiệp?", "options": {"A": "Đất làm nhà ở xã hội.", "B": "Đất của cơ sở thực hiện xã hội hóa trong lĩnh vực y tế, văn hóa.", "C": "Đất xây dựng chung cư cao tầng.", "D": "Cả A và B đều đúng."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Theo quy định của pháp luật về Thuế sử dụng đất phi nông nghiệp, các trường hợp được miễn thuế bao gồm đất của cơ sở thực hiện xã hội hóa trong lĩnh vực giáo dục, y tế, văn hóa, thể thao, khoa học và công nghệ, môi trường; đất xây dựng nhà ở xã hội và một số trường hợp khác."}, {"level": "1", "content": "Cá nhân nhận thừa kế một bất động sản có giá trị tính thuế là 20 tỷ đồng, phải nộp thuế thu nhập cá nhân bao nhiêu? (Giả sử không có các trường hợp miễn giảm)", "options": {"A": "1,99 tỷ đồng.", "B": "1 tỷ đồng.", "C": "200 triệu đồng.", "D": "500 triệu đồng."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 16 Luật Thuế TNCN 2025, thu nhập từ nhận thừa kế, quà tặng là bất động sản phải chịu thuế suất 10% trên giá trị tài sản vượt trên 10 triệu đồng. Thuế thu nhập cá nhân phải nộp = 10% x (20 tỷ - 10 triệu) = 1.999.000.000)."}, {"level": "1", "content": "Tình huống: Tại khu vực đô thị sáp nhập TP.HCM, phát sinh hai giao dịch bất động sản có giá trị lớn như sau: Giao dịch 1: Ông Nam (cá nhân) mua một căn siêu biệt thự để ở với giá trị theo hợp đồng (và bảng giá đất) là 200 tỷ đồng. Giao dịch 2: Công ty Bất động sản X mua một tòa nhà văn phòng thương mại (không có chức năng ở) với giá trị là 200 tỷ đồng. Biết rằng thuế suất lệ phí trước bạ nhà, đất là 0,5%và mức khống chế tối đa (mức trần) cho một tài sản là 500 triệu đồng theo Nghị định 10/2022/NĐ-CP. Hỏi số tiền lệ phí trước bạ mà Ông Nam và Công ty X thực nộp là bao nhiêu?", "options": {"A": "Cả Ông Nam và Công ty X đều nộp 500 triệu đồng (do cả hai giao dịch đều tính ra 1 tỷ đồng, vượt mức trần 500 triệu).", "B": "Ông Nam nộp 1 tỷ đồng; Công ty X nộp 500 triệu đồng.", "C": "Ông Nam nộp 500 triệu đồng; Công ty X nộp 1 tỷ đồng.", "D": "Cả hai đều nộp 1 tỷ đồng (do năm 2026 đã bãi bỏ mức trần để tăng thu ngân sách)."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 8, Khoản 1 của Nghị định 10/2022/NĐ-CP. - \"Mức khống chế tối đa lệ phí trước bạ đối với tài sản quy định tại khoản này (trừ nhà ở của cá nhân, hộ gia đình) là 500 triệu đồng/1 tài sản/1 lần trước bạ.\" Nếu đối tượnglà Nhà ở của cá nhân thì quy định loại trừ khỏi mức trần 500 triệu. Tức là nhà ở của dân thì không có mức trần, cứ 0,5% mà nhân lên với giá trị hợp đồng 200 tỷ đồng = 1 tỷ, còn Tòa nhà văn phòng (không phải nhà ở của cá nhân) thuộc đối tượng bị khống chế bởi mức trần 500 triệu đồng.  Thực tế, mức trần 500 triệu được thiết kế để hỗ trợ các dự án đầu tư lớn, sản xuất kinh doanh, giúp giảm chi phí vốn cho doanh nghiệp khi đăng ký tài sản quy mô lớn (nhà xưởng, kho bãi, cao ốc). Nếu là cao ốc hỗn hợp có chức năng ở, thì sẽ tiến hành bóc tách công năng tính riêng 2 đối tượng."}, {"level": "1", "content": "Chi phí nào sau đây được trừ khi tính thu nhập chịu thuế thu nhập doanh nghiệp từ hoạt động chuyển nhượng bất động sản?", "options": {"A": "Chi phí bồi thường, giải phóng mặt bằng.", "B": "Chi phí đầu tư cơ sở hạ tầng.", "C": "Chi phí quảng cáo, tiếp thị.", "D": "Tất cả các chi phí trên nếu có đủ hóa đơn, chứng từ hợp lệ."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Theo quy định của Luật Thuế thu nhập doanh nghiệp, các chi phí hợp lý, hợp lệ phát sinh liên quan đến hoạt động chuyển nhượng bất động sản, như chi phí bồi thường, đầu tư, xây dựng, quảng cáo... đều được tính vào chi phí được trừ khi xác định thu nhập chịu thuế."}, {"level": "1", "content": "Một cá nhân bán một căn hộ đã sở hữu được 5 năm nhưng đó là căn hộ thứ hai của họ. Thuế Thu nhập cá nhân phải nộp là bao nhiêu?", "options": {"A": "Miễn thuế.", "B": "2% trên giá chuyển nhượng.", "C": "5% trên giá chuyển nhượng.", "D": "10% trên thu nhập tính thuế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trường hợp này không thuộc diện được miễn thuế thu nhập cá nhân vì không phải là nhà ở duy nhất. Vì vậy, cá nhân phải nộp thuế suất 2% trên giá chuyển nhượng bất động sản theo quy định."}, {"level": "1", "content": "Chi phí bồi thường, giải phóng mặt bằng được tính vào giá vốn khi chuyển nhượng bất động sản có bao gồm cả các khoản chi phí liên quan đến việc hỗ trợ người bị thu hồi đất không?", "options": {"A": "Có, nếu có đầy đủ chứng từ hợp lệ.", "B": "Không, các chi phí này là chi phí riêng.", "C": "Tùy thuộc vào loại bất động sản.", "D": "Chỉ bao gồm chi phí trực tiếp bồi thường đất."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Các chi phí bồi thường, giải phóng mặt bằng được tính vào giá vốn của bất động sản, bao gồm cả các khoản chi phí hỗ trợ tái định cư, ổn định đời sống, sản xuất cho người bị thu hồi đất nếu có đầy đủ chứng từ hợp lệ theo quy định của Luật Đất đai."}, {"level": "1", "content": "Mức phạt chậm nộp thuế được tính trên cơ sở nào?", "options": {"A": "Số ngày chậm nộp và số tiền thuế chậm nộp.", "B": "Số tiền thuế chậm nộp và mức lãi suất ngân hàng.", "C": "Số tiền thuế chậm nộp và mức phạt cố định.", "D": "Tùy thuộc vào cơ quan thuế."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Mức phạt chậm nộp thuế được tính bằng 0,03% mỗi ngày trên số tiền thuế chậm nộp. Công thức này không phụ thuộc vào lãi suất ngân hàng hay mức phạt cố định."}, {"level": "1", "content": "Lệ phí cấp giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản gắn liền với đất có thể được miễn hoặc giảm trong một số trường hợp không?", "options": {"A": "Không, lệ phí này là bắt buộc.", "B": "Có, tùy thuộc vào chính sách của từng địa phương.", "C": "Chỉ miễn giảm cho hộ nghèo.", "D": "Chỉ miễn giảm cho các dự án của nhà nước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo quy định của pháp luật, Hội đồng nhân dân cấp tỉnh có thẩm quyền quy định các trường hợp cụ thể được miễn, giảm lệ phí cấp giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản gắn liền với đất, bao gồm cả các trường hợp cho người nghèo, người có công với cách mạng..."}, {"level": "1", "content": "Tiền sử dụng đất được coi là một khoản thuế hay một khoản thu ngân sách nhà nước?", "options": {"A": "Một loại thuế trực thu.", "B": "Một loại lệ phí.", "C": "Một khoản thu ngân sách nhà nước.", "D": "Cả A và B đều đúng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Tiền sử dụng đất là một khoản thu của ngân sách nhà nước, không phải là thuế. Khoản thu này phát sinh khi Nhà nước giao đất có thu tiền hoặc cho phép chuyển mục đích sử dụng đất. Trong kinh tế học pháp lý, Tiền sử dụng đất là hình thức vốn hóa giá trị đất đai. Nhà nước, với vai trò đại diện chủ sở hữu toàn dân, thực hiện việc khai thác lợi ích kinh tế từ đất đai thông qua các hình thức: (1) Giao đất có thu tiền. (2) Cho phép chuyển mục đích sử dụng (từ đất nông nghiệp sang đất ở). (3) Công nhận quyền sử dụng đất (thu tiền sử dụng đất cho diện tích vượt hạn mức). Cần phân biệt tránh bị nhầm lẫn giữa Thuế - Phí - Lệ phí và Tiền sử dụng đất."}, {"level": "1", "content": "Cá nhân có thể tự kê khai và nộp thuế Thu nhập cá nhân từ chuyển nhượng bất động sản ở đâu?", "options": {"A": "Tại cơ quan công chứng.", "B": "Tại cơ quan thuế.", "C": "Tại kho bạc nhà nước.", "D": "Cả A và B đều đúng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Luật Quản lý thuế số 38/2019/QH14, nơi nộp thuế: (1) Tại cơ quan thuế quản lý trực tiếp. Địa điểm nộp hồ sơ khai thuế là tại cơ quan thuế nơi có bất động sản chuyển nhượng. Thông thường là cơ quan quản lý thuế (đội thuế xã/liên xã) nơi tọa lạc bất động sản. (2) Cơ chế một cửa liên thông: Trong nhiều trường hợp, để tạo thuận lợi cho người dân, việc nộp hồ sơ kê khai thuế được thực hiện tại bộ phận \"một cửa liên thông\". Tại đây, hồ sơ chuyển nhượng bất động sản (bao gồm cả hồ sơ khai thuế) được tiếp nhận và sau đó được chuyển đến các cơ quan có thẩm quyền, trong đó có cơ quan thuế để giải quyết. (3) Trực tuyến qua Cổng Dịch vụ công Quốc gia: Hiện nay, một số thủ tục kê khai thuế đã được triển khai trực tuyến trên Cổng Dịch vụ công Quốc gia, cho phép cá nhân nộp hồ sơ qua mạng."}, {"level": "1", "content": "Các khoản tiền phạt vi phạm hành chính về thuế có được tính vào chi phí được trừ khi tính thuế Thu nhập doanh nghiệp không?", "options": {"A": "Có.", "B": "Không.", "C": "Tùy thuộc vào mức phạt.", "D": "Tùy thuộc vào loại vi phạm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo quy định của Luật Thuế TNDN, các khoản tiền phạt về vi phạm hành chính, bao gồm cả tiền phạt vi phạm hành chính về thuế, không được tính vào chi phí được trừ khi xác định thu nhập chịu thuế."}, {"level": "1", "content": "Đâu là một trong những loại phí, lệ phí bắt buộc khi thực hiện công chứng hợp đồng mua bán bất động sản?", "options": {"A": "Phí công chứng.", "B": "Lệ phí địa chính.", "C": "Phí thẩm định hồ sơ.", "D": "Lệ phí trước bạ."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Phí công chứng là chi phí chi trả cho dịch vụ xác thực tính hợp pháp của giao dịch và năng lực hành vi dân sự của các bên. Theo Luật Công chứng 2024, khoản phí này được thu ngay khi Công chứng viên đóng dấu, ký tên phát hành văn bản. Hợp đồng chỉ có hiệu lực pháp luật khi đã hoàn thành việc nộp khoản phí này. Các khoản phí, lệ phí còn lại là các nghĩa vụ tài chính với cơ quan nhà nước khác."}, {"level": "1", "content": "Các chi phí nào sau đây không được tính vào chi phí được trừ khi tính thuế Thu nhập doanh nghiệp từ chuyển nhượng bất động sản của doanh nghiệp?", "options": {"A": "Chi phí lãi vay.", "B": "Chi phí quảng cáo, tiếp thị.", "C": "Chi phí khấu hao tài sản cố định.", "D": "Chi phí không có hóa đơn, chứng từ hợp lệ."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Theo nguyên tắc của Luật Thuế TNDN, các chi phí không có hóa đơn, chứng từ hợp pháp theo quy định của pháp luật sẽ không được tính vào chi phí được trừ khi xác định thu nhập chịu thuế."}, {"level": "1", "content": "Tình huống:Tháng 09/2026, Ông A muốn tặng cho một căn nhà tại TP.HCM (trị giá 10 tỷ đồng) cho em gái ruột là Bà B. Tuy nhiên, để thuận tiện cho việc vay vốn kinh doanh sau này, Ông A muốn đứng tên cả hai vợ chồng em gái (Bà B và chồng là Ông C) trên Hợp đồng tặng cho và Giấy chứng nhận.Biết rằng đây là tài sản riêng của Ông A và các bên có đầy đủ giấy tờ chứng minh quan hệ nhân thân. Xét về nghĩa vụ Thuế Thu nhập cá nhân (TNCN) và Lệ phí trước bạ (LPTB), nhận định nào sau đây là đúng?", "options": {"A": "Miễn toàn bộ Thuế TNCN và LPTB cho cả Bà B và Ông C vì đây là giao dịch tặng cho trong gia đình.", "B": "Bà B được miễn thuế/phí; Ông C phải nộp thuế TNCN (10%) và LPTB (0,5%) tính trên 100% giá trị căn nhà.", "C": "Bà B được miễn thuế/phí; Ông C phải nộp thuế TNCN (10%) và LPTB (0,5%) tính trên 50% giá trị phần tài sản nhận được.", "D": "Ông A phải nộp thuế chuyển nhượng (2%) vì có yếu tố người ngoài (Ông C) tham gia vào hợp đồng tặng cho."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đối với phần tài sản của Bà B (Em gái ruột): Quan hệ ở đây là Anh trai => Em gái ruột. Khoản 4 Điều 4 Luật Thuế TNCN và Khoản 10 Điều 10 Nghị định 10/2022/NĐ-CP quy định miễn 100% Thuế TNCN và Lệ phí trước bạ đối với phần giá trị tài sản tương ứng (50% căn nhà).  Đối với phần tài sản của Ông C (Em rể): Quan hệ ở đây là Anh vợ => Em rể. Pháp luật hiện hành KHÔNG đưa quan hệ \"Anh rể - Em vợ\" hoặc \"Anh vợ - Em rể\" vào danh mục được miễn thuế/phí khi tặng cho (chỉ miễn cho thừa kế nếu có di chúc hoặc theo pháp luật, nhưng tặng cho thì không) Kết luận: Ông C phải nộp thuế như người xa lạ đối với phần giá trị mình nhận được (50% giá trị căn nhà)."}, {"level": "1", "content": "Văn bản pháp luật nào hiện đang là văn bản pháp luật có hiệu lực cao nhất quy định về phòng chống rửa tiền tại Việt Nam?", "options": {"A": "Nghị định 19/2023/NĐ-CP quy định chi tiết một số điều của Luật Phòng, chống rửa tiền.", "B": "Luật Phòng, chống rửa tiền số 14/2022/QH15 do Quốc hội ban hành.", "C": "Thông tư 27/2025/TT-NHNN hướng dẫn thực hiện các biện pháp phòng, chống rửa tiền.", "D": "Bộ luật Hình sự 2015 (sửa đổi, bổ sung 2017) quy định về tội phạm rửa tiền"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Luật Ban hành văn bản quy phạm pháp luật, Luật là văn bản do Quốc hội ban hành, có hiệu lực pháp lý cao hơn các Nghị định (do Chính phủ ban hành) và Thông tư (do Bộ/Ngành ban hành). Luật Phòng, chống rửa tiền 2022 Đây là \"văn bản gốc\" định hình toàn bộ khung pháp lý về phòng ngừa. Nó xác định ai là đối tượng báo cáo (bao gồm môi giới BĐS), các biện pháp nhận biết khách hàng (KYC), và cơ chế phối hợp quốc tế.."}, {"level": "1", "content": "Căn cứ theo quy định tại Điều 3 Luật Phòng, chống rửa tiền 2022, hành vi \"Rửa tiền\" được định nghĩa chính xác là gì?", "options": {"A": "Hành vi của tổ chức, cá nhân nhằm che giấu nguồn gốc của các tài sản hợp pháp để tránh thực hiện nghĩa vụ thuế đối với Nhà nước.", "B": "Hành vi cung cấp, thu thập tài sản dưới bất kỳ hình thức nào nhằm mục đích thực hiện các hoạt động khủng bố hoặc tài trợ khủng bố.", "C": "Hành vi của tổ chức, cá nhân nhằm hợp pháp hóa nguồn gốc của tài sản do phạm tội mà có.", "D": "Hành vi của đối tượng báo cáo không thực hiện việc báo cáo các giao dịch có giá trị lớn hoặc giao dịch đáng ngờ cho cơ quan quản lý."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 3 Luật phòng chống rửa tiền 2022 định nghĩa rõ ràng rửa tiền là hành vi nhằm hợp pháp hóa nguồn gốc tài sản do phạm tội mà có. Rửa tiền là quá trình biến đổi \"tiền bẩn\" (tài sản có nguồn gốc từ tội phạm như tham nhũng, buôn lậu, lừa đảo...) thành \"tiền sạch\" thông qua các giao dịch phức tạp để đánh lừa cơ quan chức năng về nguồn gốc thực sự của nó. Mối liên hệ với tội phạm nguồn: Để cấu thành hành vi rửa tiền, bắt buộc phải có một tội phạm nguồn (Predicate Offense) đã xảy ra trước đó để tạo ra tài sản. Nếu tài sản là hợp pháp nhưng bị che giấu để trốn thuế thì đó là tội \"Trốn thuế\", không phải tội \"Rửa tiền\". Phân biệt với Tài trợ khủng bố (B): Tài trợ khủng bố tập trung vào mục đích sử dụng của tiền (dùng cho hành động khủng bố), không quan trọng nguồn gốc tiền là sạch hay bẩn. Trong khi đó, Rửa tiền tập trung vào việc che giấu nguồn gốc bẩn."}, {"level": "1", "content": "Theo quy định của Luật Phòng, chống rửa tiền 2022, cơ quan nào chịu trách nhiệm trước Chính phủ thực hiện quản lý nhà nước về phòng, chống rửa tiền và cơ quan nào thực hiện quản lý nhà nước đối với hoạt động kinh doanh bất động sản trong công tác này?", "options": {"A": "Bộ Công an chủ trì thực hiện quản lý nhà nước; Bộ Tài chính và Bộ Xây dựng phối hợp thanh tra, giám sát.", "B": "Chính phủ chủ trì thực hiện quản lý nhà nước; Ngân hàng Nhà nước và Bộ Tư pháp phối hợp thực hiện.", "C": "Bộ Xây dựng chủ trì thực hiện quản lý nhà nước; Ngân hàng Nhà nước và các tổ chức tín dụng phối hợp thực hiện.", "D": "Ngân hàng Nhà nước chủ trì thực hiện quản lý nhà nước; Bộ Xây dựng thực hiện quản lý trong lĩnh vực bất động sản."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Ngân hàng Nhà nước Việt Nam (NHNN): Theo Điều 39 Luật PCRT 2022, NHNN là cơ quan đầu mối, chịu trách nhiệm trước Chính phủ thực hiện quản lý nhà nước về PCRT trên toàn lãnh thổ. NHNN (trực tiếp là Cục PCRT) là nơi tiếp nhận tất cả các báo cáo giao dịch lớn (400 triệu trở lên) và giao dịch đáng ngờ từ các sàn giao dịch BĐS. Bộ Xây dựng: Theo Điều 41 Luật PCRT 2022, Bộ Xây dựng có trách nhiệm thực hiện quản lý nhà nước về PCRT đối với hoạt động kinh doanh bất động sản, kinh doanh dịch vụ bất động sản. Bộ Xây dựng ban hành các thông tư hướng dẫn cụ thể cho ngành và phối hợp với NHNN để thanh tra các doanh nghiệp BĐS. Theo cơ chế 2 cấp, Sở Xây dựng (cấp Tỉnh) đóng vai trò là \"cánh tay nối dài\". Các doanh nghiệp, sàn giao dịch tại địa phương phải gửi báo cáo tình hình hoạt động (bao gồm cả dữ liệu PCRT) định kỳ hàng tháng về Sở Xây dựng để theo dõi biến động thị trường và kịp thời phát hiện các dấu hiệu bất thường tại địa bàn.."}, {"level": "1", "content": "Mức giao dịch có giá trị lớn phải báo cáo hiện hành theo Quyết định 11/2023/QĐ-TTg là bao nhiêu?", "options": {"A": "Từ 300 triệu đồng trở lên.", "B": "Từ 400 triệu đồng trở lên.", "C": "Từ 500 triệu đồng trở lên.", "D": "Không quy định mức cụ thể, tùy thuộc vào đánh giá rủi ro."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quyết định số 11/2023/QĐ-TTg quy định mức giao dịch có giá trị lớn phải báo cáo là từ 400 triệu đồng trở lên, có hiệu lực từ 01/12/2023. Giá trị giao dịch được tính theo tổng số tiền phát sinh trong một ngày. Ví dụ: Nếu một khách hàng nộp 02 đợt tiền mặt cho cùng một căn hộ, mỗi đợt 250 triệu đồng trong cùng một ngày, thì tổng là 500 triệu đồng (vượt ngưỡng 400 triệu) và sàn giao dịch bắt buộc phải làm báo cáo. Theo Thông tư 27/2025/TT-NHNN, báo cáo phải được gửi về Cục Phòng, chống rửa tiền (Ngân hàng Nhà nước) dưới dạng dữ liệu điện tử. Nếu chậm trễ hoặc không báo cáo, doanh nghiệp sẽ đối mặt với mức xử phạt hành chính rất cao theo Nghị định xử phạt trong lĩnh vực tiền tệ và ngân hàng."}, {"level": "1", "content": "Hoạt động nào sau đây trong lĩnh vực bất động sản KHÔNG thuộc đối tượng phải báo cáo phòng, chống rửa tiền theo Luật phòng, chống rửa tiền 2022?", "options": {"A": "Kinh doanh dịch vụ môi giới bất động sản.", "B": "Đầu tư, phát triển dự án bất động sản.", "C": "Dịch vụ tư vấn bất động sản.", "D": "Hoạt động của sàn giao dịch bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 4 Luật phòng chống rửa tiền 2022 loại trừ rõ ràng \"dịch vụ tư vấn bất động sản\" và \"hoạt động cho thuê, cho thuê lại bất động sản\" khỏi phạm vi đối tượng báo cáo."}, {"level": "1", "content": "Theo quy định tại Luật Phòng, chống rửa tiền 2022 và Quyết định 11/2023/QĐ-TTg, doanh nghiệp kinh doanh dịch vụ bất động sản có nghĩa vụ báo cáo giao dịch có giá trị lớn cho Ngân hàng Nhà nước khi phát sinh tình huống nào sau đây?", "options": {"A": "Thực hiện bất kỳ giao dịch chuyển nhượng bất động sản nào có giá trị hợp đồng trên 1.000.000.000 VNĐ (một tỷ đồng).", "B": "Phát sinh giao dịch bằng tiền mặt hoặc ngoại tệ tiền mặt có tổng giá trị từ 400.000.000 VNĐ (bốn trăm triệu đồng) trở lên trong một ngày.", "C": "Phát sinh giao dịch có dấu hiệu bất thường về nguồn gốc tài sản của khách hàng, bất kể giá trị giao dịch là bao nhiêu.", "D": "Khi thực hiện giao dịch bất động sản với các tổ chức, cá nhân có tên trong danh sách đen hoặc danh sách cảnh báo của Bộ Công an."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 25 Luật Phòng, chống rửa tiền 2022 và Điều 1 Quyết định 11/2023/QĐ-TTg.Phân biệt loại hình báo cáo: (1) Báo cáo giao dịch giá trị lớn (CTR): Chỉ áp dụng khi có sự xuất hiện của tiền mặt (VNĐ, ngoại tệ) hoặc vàng. Ngưỡng cứng là từ 400.000.000 VNĐ trở lên trong một ngày. Nếu khách hàng thanh toán 10 tỷ đồng qua chuyển khoản ngân hàng, doanh nghiệp BĐS không phải nộp báo cáo CTR (vì phía ngân hàng đã thực hiện kiểm soát dòng tiền này), nhưng vẫn phải lưu trữ hồ sơ KYC. (2) Báo cáo giao dịch đáng ngờ (STR): Áp dụng khi giao dịch có các dấu hiệu bất thường quy định tại Điều 28 (ví dụ: khách hàng không quan tâm đến giá, nguồn tiền không rõ ràng, chia nhỏ số tiền để tránh ngưỡng 400 triệu...). Báo cáo này không phụ thuộc vào giá trị giao dịch lớn hay nhỏ.Thời hạn báo cáo: Theo Thông tư 27/2025/TT-NHNN, báo cáo CTR phải được gửi điện tử trong vòng 01 ngày làm việc kể từ thời điểm phát sinh giao dịch tiền mặt."}, {"level": "1", "content": "Dấu hiệu nào sau đây là dấu hiệu đáng ngờ đặc thù trong lĩnh vực bất động sản theo Điều 33 Luật phòng, chống rửa tiền 2022?", "options": {"A": "Khách hàng thực hiện việc thanh toán tiền mua bất động sản thông qua hình thức chuyển khoản ngân hàng hoặc séc.", "B": "Khách hàng chủ động yêu cầu chủ đầu tư hoặc môi giới áp dụng các chương trình chiết khấu và ưu đãi về giá bán.", "C": "Giao dịch bất động sản được thực hiện thông qua ủy quyền nhưng không có cơ sở pháp lý rõ ràng hoặc có dấu hiệu che giấu chủ sở hữu thực sự.", "D": "Khách hàng là doanh nghiệp mới thành lập hoặc các tổ chức phi lợi nhuận tham gia mua bất động sản làm trụ sở làm việc."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 33 Luật Phòng, chống rửa tiền 2022 (Luật số 14/2022/QH15). Bản chất của dấu hiệu C: Việc sử dụng \"người rơm\" (đứng tên hộ) hoặc ủy quyền lòng vòng là một trong những kỹ thuật kinh điển của tội phạm rửa tiền nhằm xóa dấu vết chủ sở hữu thực sự (Beneficial Owner). Luật 2022 yêu cầu đối tượng báo cáo phải đặc biệt cảnh giác khi các văn bản ủy quyền có nội dung chung chung, không rõ mục đích kinh tế hoặc người được ủy quyền không có mối quan hệ nhân thân/công việc hợp lý với người ủy quyền. Các dấu hiệu đặc thù khác theo Điều 33: (1) Khách hàng không quan tâm đến giá cả bất động sản, phí giao dịch hoặc các đặc điểm thực tế của tài sản. (2) Giá giao dịch giữa các bên chênh lệch quá lớn (cao hơn hoặc thấp hơn nhiều) so với giá thị trường mà không có lý do chính đáng. (3) Khách hàng không thể cung cấp thông tin liên quan đến bất động sản hoặc tỏ thái độ né tránh khi được yêu cầu cung cấp thêm thông tin cá nhân.."}, {"level": "1", "content": "Theo quy định tại Luật Phòng, chống rửa tiền 2022 và hướng dẫn tại Thông tư 27/2025/TT-NHNN, thời hạn để đối tượng báo cáo thực hiện gửi báo cáo giao dịch đáng ngờ (STR) cho Ngân hàng Nhà nước được quy định như thế nào?", "options": {"A": "Trong vòng 24 giờ kể từ thời điểm phát sinh giao dịch bất thường của khách hàng.", "B": "Trong vòng 01 ngày làm việc kể từ ngày phát hiện ra dấu hiệu đáng ngờ của giao dịch.", "C": "Trong vòng 03 ngày làm việc kể từ ngày phát sinh giao dịch hoặc ngày phát hiện dấu hiệu đáng ngờ.", "D": "Trong vòng 05 ngày làm việc kể từ khi hoàn thành việc xác minh thông tin khách hàng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 37 Luật Phòng, chống rửa tiền 2022 và Thông tư 27/2025/TT-NHNN (Văn bản cập nhật mới nhất tính đến năm 2026). Quy trình thời gian: Báo cáo thông thường (STR): Đối tượng báo cáo có 03 ngày làm việc để phân tích, đánh giá và gửi báo cáo kể từ khi giao dịch phát sinh hoặc kể từ ngày phát hiện ra dấu hiệu đáng ngờ (trường hợp dấu hiệu đó được phát hiện sau khi giao dịch đã thực hiện). Trường hợp khẩn cấp: Nếu dấu hiệu đáng ngờ có liên quan đến hoạt động tội phạm, đối tượng báo cáo phải thông báo ngay cho cơ quan công an hoặc cơ quan có thẩm quyền trong vòng 24 giờ kể từ thời điểm phát hiện."}, {"level": "1", "content": "Nếu giao dịch đáng ngờ có dấu hiệu liên quan đến tội phạm, thời hạn báo cáo cho cơ quan nhà nước có thẩm quyền và NHNN là bao lâu?", "options": {"A": "Trong vòng 24 giờ kể từ thời điểm phát hiện.", "B": "Trong vòng 01 ngày làm việc kể từ thời điểm phát hiện.", "C": "Trong vòng 03 ngày làm việc kể từ thời điểm phát hiện.", "D": "Khi có yêu cầu bằng văn bản từ cơ quan chức năng."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Trường hợp giao dịch đáng ngờ có dấu hiệu tội phạm, thời hạn báo cáo được rút ngắn xuống còn 24 giờ kể từ thời điểm phát hiện để đảm bảo xử lý kịp thời."}, {"level": "1", "content": "Theo quy định tại Nghị định 340/2025/NĐ-CP (thay thế Nghị định 88/2019/NĐ-CP), hành vi không thực hiện báo cáo giao dịch có giá trị lớn (CTR) hoặc giao dịch đáng ngờ (STR) trong kinh doanh bất động sản sẽ bị xử lý như thế nào?", "options": {"A": "Phạt tiền từ 20.000.000 VNĐ đến 40.000.000 VNĐ đối với cá nhân và buộc nộp lại báo cáo trong vòng 24 giờ.", "B": "Phạt tiền từ 40.000.000 VNĐ đến 80.000.000 VNĐ đối với cá nhân; mức phạt đối với tổ chức gấp 02 lần và có thể bị đình chỉ hoạt động.", "C": "Phạt tiền từ 100.000.000 VNĐ đến 200.000.000 VNĐ đối với tổ chức và bị thu hồi vĩnh viễn chứng chỉ hành nghề của người đại diện.", "D": "Chỉ thực hiện hình thức phạt cảnh cáo đối với vi phạm lần đầu và phạt tiền từ mức 10.000.000 VNĐ đối với các lần vi phạm tiếp theo.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Nghị định 340/2025/NĐ-CP về xử phạt vi phạm hành chính trong lĩnh vực tiền tệ và ngân hàng. Sự thay đổi về mức phạt: So với Nghị định 88/2019 cũ, Nghị định 340/2025 đã nâng cao khung hình phạt để đáp ứng các tiêu chuẩn khắt khe từ Lực lượng Đặc nhiệm Tài chính (FATF): Đối với cá nhân: Khung hình phạt phổ biến hiện nay đã tăng lên mức 40 - 80 triệu đồng cho hành vi không báo cáo. Đối với tổ chức: Theo nguyên tắc, mức phạt tiền gấp 02 lần mức phạt đối với cá nhân, tức là từ 80 - 160 triệu đồng. Các hình thức xử phạt bổ sung và khắc phục hậu quả: (1) Đình chỉ hoạt động: Có thể bị đình chỉ hoạt động kinh doanh dịch vụ bất động sản từ 03 đến 09 tháng. (2) Công khai danh tính: Thông tin vi phạm được cập nhật trực tiếp trên Hệ thống dữ liệu PCRT quốc gia, ảnh hưởng đến xếp hạng tín nhiệm của doanh nghiệp khi vay vốn ngân hàng. (3) Buộc khắc phục: Phải rà soát và nộp bổ sung toàn bộ các báo cáo còn thiếu trong thời hạn quy định.."}, {"level": "1", "content": "Căn cứ theo quy định tại Điều 24 Luật Phòng, chống rửa tiền 2022, các doanh nghiệp kinh doanh dịch vụ bất động sản (ngoại trừ doanh nghiệp siêu nhỏ theo quy định pháp luật) có bắt buộc phải xây dựng và ban hành quy định nội bộ về phòng, chống rửa tiền không?", "options": {"A": "Không bắt buộc, Nhà nước chỉ khuyến khích các doanh nghiệp tự nguyện xây dựng để tăng cường tính minh bạch.", "B": "Có, đây là nghĩa vụ pháp lý bắt buộc phải thực hiện, ban hành và gửi thông báo cho cơ quan quản lý nhà nước.", "C": "Chỉ bắt buộc đối với các doanh nghiệp bất động sản có vốn đầu tư nước ngoài (FDI) hoặc có giao dịch quốc tế.", "D": "Chỉ bắt buộc đối với các Sàn giao dịch bất động sản có quy mô từ 10 nhân sự môi giới có chứng chỉ hành nghề trở lên."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 24 Luật Phòng, chống rửa tiền 2022 và Thông tư 27/2025/TT-NHNN. Đối tượng phải thực hiện: Tất cả các tổ chức, cá nhân kinh doanh dịch vụ bất động sản (môi giới, sàn giao dịch, quản lý BĐS) đều phải có quy định nội bộ. Trường hợp miễn trừ: Chỉ có cá nhân hành nghề độc lập và doanh nghiệp siêu nhỏ (theo tiêu chí về số lao động đóng BHXH và doanh thu/nguồn vốn tại Luật Hỗ trợ doanh nghiệp nhỏ và vừa) mới được miễn nghĩa vụ xây dựng quy định nội bộ bằng văn bản. Nội dung bắt buộc của quy định nội bộ: Một văn bản quy định nội bộ chuẩn năm 2026 phải bao gồm: (1) Quy trình nhận biết và cập nhật thông tin khách hàng (KYC). (2) Quy trình phân loại rủi ro khách hàng. (3) Quy trình báo cáo giao dịch giá trị lớn (CTR) và giao dịch đáng ngờ (STR). (4) Quy định về lưu trữ thông tin, hồ sơ và bảo mật. (5) Quy định về đào tạo, bồi dưỡng nghiệp vụ PCRT định kỳ cho nhân viên.."}, {"level": "1", "content": "Trong thực tế hành nghề tại Việt Nam, yếu tố nào sau đây được coi là thách thức tâm lý và kinh tế lớn nhất đối với một nhà môi giới bất động sản khi thực hiện nghĩa vụ phòng, chống rửa tiền?", "options": {"A": "Sự thiếu hụt các công cụ công nghệ và phần mềm hỗ trợ tra cứu danh sách đen (Blacklist) của Ngân hàng Nhà nước.", "B": "Hệ thống văn bản quy phạm pháp luật về phòng, chống rửa tiền còn quá mới và chưa có hướng dẫn chi tiết cho ngành.", "C": "Xung đột lợi ích giữa trách nhiệm báo cáo giao dịch đáng ngờ với mục tiêu đạt được hoa hồng từ việc hoàn tất giao dịch.", "D": "Những khó khăn khách quan trong việc xác định chính xác giá trị thực tế của bất động sản so với giá kê khai trên hợp đồng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Bản chất của xung đột lợi ích: Đây là thách thức kinh điển đã được đề cập trong các báo cáo đánh giá rủi ro quốc gia của Ngân hàng Nhà nước và các tổ chức quốc tế (FATF). Nghĩa vụ PCRT yêu cầu môi giới phải thực hiện KYC (Nhận biết khách hàng) kỹ lưỡng và báo cáo STR (Giao dịch đáng ngờ) nếu thấy bất thường. Tuy nhiên, việc thực hiện đúng quy trình này có thể làm chậm tiến độ giao dịch, khiến khách hàng khó chịu hoặc thậm chí dẫn đến việc hủy giao dịch (nếu khách hàng có ý đồ rửa tiền). Đối với môi giới, việc mất giao dịch đồng nghĩa với việc mất hoa hồng. Đây là một áp lực tài chính cực lớn, dễ khiến họ \"nhắm mắt làm ngơ\" trước các dấu hiệu sai phạm. Quy định về bảo mật: Luật Phòng, chống rửa tiền 2022 quy định đối tượng báo cáo không được tiết lộ cho khách hàng biết về việc họ bị báo cáo giao dịch đáng ngờ. Điều này càng tạo thêm áp lực cho môi giới khi phải vừa duy trì mối quan hệ với khách hàng, vừa âm thầm thực hiện trách nhiệm với Nhà nước. Với sự ra đời của Nghị định 340/2025/NĐ-CP, mức phạt tiền đối với hành vi \"bao che\" hoặc \"không báo cáo\" hiện nay đã cao gấp nhiều lần so với số hoa hồng mà một giao dịch thông thường mang lại. Do đó, việc đặt lợi ích ngắn hạn (hoa hồng) lên trên nghĩa vụ pháp lý là một sự mạo hiểm về sự nghiệp và tự do cá nhân.."}, {"level": "1", "content": "Theo quy định tại Luật Phòng, chống rửa tiền 2022, chủ thể nào sau đây chịu trách nhiệm chính và toàn diện trong việc thiết lập, triển khai các biện pháp phòng, chống rửa tiền tại một đơn vị kinh doanh dịch vụ bất động sản?", "options": {"A": "Các cá nhân là nhân viên môi giới trực tiếp thực hiện các giao dịch với khách hàng.", "B": "Khách hàng tham gia giao dịch bất động sản thông qua việc kê khai nguồn gốc tài sản.", "C": "Doanh nghiệp kinh doanh dịch vụ bất động sản (với tư cách là Đối tượng báo cáo).", "D": "Ngân hàng Nhà nước Việt Nam trong vai trò cơ quan quản lý và giám sát trực tiếp."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 4 và Điều 37 Luật Phòng, chống rửa tiền 2022; Thông tư 27/2025/TT-NHNN. Pháp nhân là đối tượng báo cáo: Theo Luật, các doanh nghiệp kinh doanh dịch vụ môi giới, sàn giao dịch và quản lý bất động sản được định danh là \"Đối tượng báo cáo\". Điều này đồng nghĩa với việc doanh nghiệp (pháp nhân) là chủ thể chịu trách nhiệm trước pháp luật về việc: (1) Ban hành và thực hiện quy định nội bộ về PCRT. (2) Bổ nhiệm đầu mối nhân sự phụ trách công tác báo cáo. (3) Lưu trữ hồ sơ giao dịch và thông tin khách hàng trong ít nhất 05 năm. Trách nhiệm của cá nhân vs. Tổ chức: Nhân viên môi giới (phương án A) là người thực thi các bước cụ thể (như thu thập CCCD, nhận diện dấu hiệu đáng ngờ), nhưng nếu để xảy ra sai sót hệ thống hoặc không báo cáo, chính Doanh nghiệp mới là chủ thể bị xử phạt hành chính theo Nghị định 340/2025/NĐ-CP và bị xem xét trách nhiệm pháp lý. Vai trò của Nhà nước (D): Ngân hàng Nhà nước và Bộ Xây dựng là các cơ quan quản lý, kiểm tra và cưỡng chế thực thi, họ không làm thay trách nhiệm triển khai tại nội bộ doanh nghiệp.."}, {"level": "1", "content": "Theo quy định tại Luật Phòng, chống rửa tiền 2022, khách hàng tham gia giao dịch bất động sản có trách nhiệm gì trong quy trình thực hiện nhận biết khách hàng (KYC) do các đối tượng báo cáo triển khai?", "options": {"A": "Chủ động thực hiện đánh giá rủi ro rửa tiền của bản thân và thông báo kết quả cho sàn giao dịch.", "B": "Cung cấp đầy đủ, chính xác và kịp thời các thông tin, tài liệu theo yêu cầu của đối tượng báo cáo.", "C": "Có nghĩa vụ tự lập báo cáo giao dịch đáng ngờ (STR) nếu nguồn tiền sử dụng có dấu hiệu bất thường.", "D": "Chịu trách nhiệm lưu trữ hồ sơ giao dịch bất động sản tại cơ quan quản lý nhà nước trong thời hạn 05 năm.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 36 Luật Phòng, chống rửa tiền 2022 (Luật số 14/2022/QH15). Nghĩa vụ cốt lõi: Khách hàng không có nghĩa vụ phải hiểu sâu về nghiệp vụ PCRT, nhưng họ bắt buộc phải hợp tác. Điều này bao gồm việc cung cấp thông tin định danh (CCCD/Hộ chiếu), thông tin về chủ sở hữu hưởng lợi và nguồn gốc tài sản khi được yêu cầu. Quyền từ chối giao dịch: Tại Điều 34 của Luật này, nếu khách hàng từ chối cung cấp thông tin hoặc cung cấp thông tin không đầy đủ/không chính xác, doanh nghiệp bất động sản (đối tượng báo cáo) có quyền và nghĩa vụ: (1) Từ chối thiết lập mối quan hệ kinh doanh (không ký hợp đồng). (2) Chấm dứt giao dịch đang thực hiện. (3) Phải xem xét báo cáo giao dịch đáng ngờ (STR) cho Ngân hàng Nhà nước.."}, {"level": "1", "content": "Theo quy định tại Điều 15 Luật Phòng, chống rửa tiền 2022 và Điều 3 Nghị định 19/2023/NĐ-CP, kết quả đánh giá rủi ro về rửa tiền tại các doanh nghiệp kinh doanh bất động sản (đối tượng báo cáo) phải được cập nhật với tần suất như thế nào?", "options": {"A": "Định kỳ 05 năm một lần để đồng bộ với kết quả đánh giá rủi ro quốc gia của Chính phủ.", "B": "Thực hiện cập nhật ngay lập tức sau mỗi lần hoàn thành việc bàn giao bất động sản cho khách hàng.", "C": "Thực hiện đánh giá và cập nhật kết quả định kỳ hàng năm hoặc khi có sự thay đổi lớn về mức độ rủi ro.", "D": "Chỉ thực hiện đánh giá một lần duy nhất khi thành lập doanh nghiệp hoặc khi xin cấp phép Sàn giao dịch.."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Chú ý sự khác nhau về các mức độ đánh giá: Đánh giá rủi ro Quốc gia (Điều 7 Luật PCRT 2022): Do Ngân hàng Nhà nước chủ trì, phối hợp với các Bộ, ngành thực hiện và cập nhật định kỳ 05 năm một lần (như phương án A). Đánh giá rủi ro tại đối tượng báo cáo (Điều 15 Luật PCRT 2022): Đây là trách nhiệm tự thân của doanh nghiệp bất động sản. Doanh nghiệp phải ban hành bộ tiêu chí đánh giá rủi ro nội bộ và phải cập nhật kết quả đánh giá này định kỳ hàng năm. Cập nhật bất thường: Ngoài kỳ hạn hàng năm, nếu trong năm đó doanh nghiệp có sự thay đổi lớn (ví dụ: mở rộng ra thị trường quốc tế, áp dụng công nghệ thanh toán mới qua tài sản số, hoặc thay đổi mô hình kinh doanh từ môi giới sang chủ đầu tư), doanh nghiệp phải thực hiện cập nhật đánh giá rủi ro ngay lập tức để phản ánh thực tế. Nghĩa vụ báo cáo: Kết quả đánh giá này sau khi được người đại diện theo pháp luật phê duyệt phải được gửi về Ngân hàng Nhà nước và Bộ Xây dựng (thông qua Sở Xây dựng cấp Tỉnh trong cơ chế hành chính 2 cấp của năm 2026) để phục vụ công tác giám sát.."}, {"level": "1", "content": "Căn cứ quy định tại Điều 324 Bộ luật Hình sự 2015 (sửa đổi, bổ sung 2017) và các văn bản hướng dẫn thi hành, chủ thể nào sau đây có thể bị truy cứu trách nhiệm hình sự về tội rửa tiền?", "options": {"A": "Chỉ bao gồm cá nhân là người có năng lực trách nhiệm hình sự và đạt độ tuổi từ đủ 18 tuổi trở lên.", "B": "Chỉ bao gồm các pháp nhân thương mại thực hiện hành vi hợp pháp hóa nguồn gốc tài sản do phạm tội mà có.", "C": "Cá nhân từ đủ 16 tuổi trở lên có năng lực trách nhiệm hình sự và các pháp nhân thương mại.", "D": "Chỉ bao gồm những người giữ chức vụ, quyền hạn trong các tổ chức tín dụng hoặc cơ quan quản lý nhà nước."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> BLHS 2015 (sửa đổi 2017) mở rộng chủ thể chịu trách nhiệm hình sự bao gồm cả cá nhân (từ đủ 16 tuổi, hoặc 14-16 tuổi cho hành vi chuẩn bị phạm tội) và pháp nhân thương mại."}, {"level": "1", "content": "Trong quá trình xác định yếu tố lỗi của Tội rửa tiền (Điều 324 Bộ luật Hình sự), tiêu chuẩn \"Biết hoặc có cơ sở để biết\" tài sản là do phạm tội mà có thường

ờng hoặc đòi hỏi cơ chế, chính sách đặc thù. (2) Thủ tướng Chính phủ: Đối với các dự án quy mô lớn (ví dụ: dự án nhà ở, khu đô thị có quy mô sử dụng đất từ 300 ha trở lên hoặc quy mô dân số từ 50.000 người trở lên). (3) Ủy ban nhân dân cấp tỉnh: Đối với các dự án thuộc thẩm quyền địa phương, trên cơ sở báo cáo thẩm định của Sở Tài chính. Đây không đơn thuần là thủ tục hành chính mà là giai đoạn thẩm định đa chiều. Cơ quan chức năng sẽ xem xét: (i) Sự phù hợp với quy hoạch cấp quốc gia, quy hoạch vùng và quy hoạch đô thị; (ii) Đánh giá sơ bộ hiệu quả kinh tế - xã hội; (iii) Đánh giá năng lực nhà đầu tư và nhu cầu sử dụng đất."}, {"level": "1", "content": "Nguồn vốn nào được coi là nền tảng, thể hiện năng lực tài chính thực sự của chủ đầu tư dự án bất động sản?", "options": {"A": "Vốn vay ngân hàng.", "B": "Vốn huy động từ khách hàng.", "C": "Vốn chủ sở hữu.", "D": "Vốn phát hành trái phiếu."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Khoản 2 Điều 9 Luật Kinh doanh bất động sản 2023, vốn chủ sở hữu là điều kiện tiên quyết và bắt buộc phải duy trì ở tỷ lệ tối thiểu (15% hoặc 20% tùy quy mô dự án). Khác với vốn vay hay vốn chiếm dụng, vốn chủ sở hữu không tạo ra áp lực trả gốc và lãi ngay lập tức, giúp doanh nghiệp duy trì tính thanh khoản trong các giai đoạn thị trường biến động.."}, {"level": "1", "content": "Công ty cổ phần có thể lựa chọn những mô hình tổ chức quản lý nào theo Luật Doanh nghiệp 2025?", "options": {"A": "Mô hình bắt buộc có Ban kiểm soát độc lập trực thuộc Đại hội đồng cổ đông.", "B": "Mô hình quản trị tự nguyện do Hội đồng quản trị quyết định căn cứ theo quy mô vốn.", "C": "Mô hình có Ban kiểm soát hoặc mô hình có Ủy ban kiểm toán và thành viên độc lập.", "D": "Mô hình chỉ gồm Đại hội đồng cổ đông và Hội đồng quản trị đối với doanh nghiệp nhỏ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo quy định tại Điều 137 Luật Doanh nghiệp 2020 (được kế thừa và làm rõ quy trình vận hành tại bản sửa đổi 2025), Công ty Cổ phần có quyền lựa chọn tổ chức quản lý và hoạt động theo một trong hai mô hình: Mô hình 1: Đại hội đồng cổ đông, Hội đồng quản trị, Ban kiểm soát và Giám đốc hoặc Tổng giám đốc. Đây là mô hình truyền thống, trong đó Ban kiểm soát đóng vai trò giám sát độc lập các hoạt động của Hội đồng quản trị và Ban điều hành. Mô hình 2: Đại hội đồng cổ đông, Hội đồng quản trị và Giám đốc hoặc Tổng giám đốc. Mô hình này không có Ban kiểm soát riêng biệt, nhưng bắt buộc phải có ít nhất 20% số thành viên Hội đồng quản trị là thành viên độc lập và phải thành lập Ủy ban kiểm toán trực thuộc Hội đồng quản trị. Trong mô hình 2, chức năng kiểm soát được thực hiện bởi các thành viên độc lập thông qua Ủy ban kiểm toán. Điều này giúp tăng cường sự gắn kết giữa chức năng quản trị và chức năng giám sát ngay tại tầng cao nhất của doanh nghiệp, thay vì tách rời như mô hình Ban kiểm soát truyền thống."}, {"level": "1", "content": "Theo quy định tại Điều 6 Luật Kinh doanh bất động sản 2023, doanh nghiệp có nghĩa vụ phải công khai thông tin về dự án và bất động sản đưa vào kinh doanh tại các địa điểm/kênh thông tin nào sau đây?", "options": {"A": "Trên trang thông tin điện tử của doanh nghiệp và các phương tiện thông tin đại chúng.", "B": "Tại trụ sở Ban quản lý dự án và Văn phòng đăng ký đất đai thuộc Sở Tài nguyên Môi trường.", "C": "Trên Hệ thống thông tin về nhà ở, thị trường bất động sản và website của doanh nghiệp.", "D": "Tại sàn giao dịch bất động sản và Cổng thông tin điện tử của tỉnh nơi có dự án."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Khoản 2 Điều 6 Luật Kinh doanh bất động sản 2023, thông tin phải được công khai đầy đủ, trung thực và chính xác theo các hình thức sau: (1) Hệ thống thông tin quốc gia: Đăng tải trên Hệ thống thông tin về nhà ở và thị trường bất động sản theo quy định của Chính phủ (do Bộ Xây dựng quản lý vận hành). (2) Kênh truyền thông của doanh nghiệp: Đăng tải trên trang thông tin điện tử (website) chính thức của doanh nghiệp kinh doanh bất động sản. (3) Địa điểm thực tế: Niêm yết tại trụ sở Ban quản lý dự án hoặc tại sàn giao dịch bất động sản (trong trường hợp thực hiện giao dịch thông qua sàn). Doanh nghiệp phải thực hiện việc công khai thông tin trước khi đưa bất động sản vào kinh doanh. Nội dung bao gồm đầy đủ các văn bản pháp lý về dự án (Quyết định chấp thuận chủ trương đầu tư, Giấy phép xây dựng, thông báo đủ điều kiện bán nhà ở hình thành trong tương lai...), các thông tin về quy hoạch, thiết kế, cũng như tình trạng thế chấp quyền sử dụng đất hoặc tài sản gắn liền với đất."}, {"level": "1", "content": "Căn cứ quy định tại Luật Kinh doanh bất động sản 2023, nhà ở hoặc công trình xây dựng có sẵn (không thuộc dự án đầu tư bất động sản) khi đưa vào kinh doanh bắt buộc phải thỏa mãn điều kiện tiên quyết nào sau đây?", "options": {"A": "Công trình phải được hoàn thành việc xây dựng mới trong vòng 12 tháng.", "B": "Có Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất.", "C": "Được miễn trừ các điều kiện về an toàn phòng cháy và chữa cháy theo luật định.", "D": "Cho phép giao dịch đối với các bất động sản đang có khiếu nại hoặc tranh chấp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo quy định tại Khoản 1 Điều 12 Luật Kinh doanh bất động sản 2023, nhà ở, công trình xây dựng có sẵn đưa vào kinh doanh phải có Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất theo quy định của pháp luật về đất đai. Đây là văn bản pháp lý cao nhất xác nhận quyền sở hữu và quyền định đoạt hợp pháp của chủ thể đối với tài sản. Khác với bất động sản trong dự án đầu tư (có thể giao dịch dựa trên hồ sơ dự án và thông báo đủ điều kiện), các bất động sản lẻ ngoài dự án bắt buộc phải có \"Sổ đỏ\" hoặc \"Sổ hồng\" để đối chiếu thông tin về diện tích, vị trí và thời hạn sử dụng đất. Mọi công trình xây dựng khi đưa vào kinh doanh đều phải đảm bảo các tiêu chuẩn về an toàn, vệ sinh môi trường, và đặc biệt là an toàn phòng cháy, chữa cháy theo quy định của pháp luật. Căn cứ Khoản 2 Điều 12, bất động sản đưa vào kinh doanh phải không có tranh chấp về quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất đang được cơ quan có thẩm quyền thụ lý, giải quyết."}, {"level": "1", "content": "Lý do chính đằng sau việc Luật kinh doanh bất động sản 2023 bắt buộc thành lập doanh nghiệp/hợp tác xã khi kinh doanh bất động sản (trừ quy mô nhỏ) là gì?", "options": {"A": "Gia tăng tối đa nguồn thu ngân sách thông qua các loại thuế và phí cấp phép kinh doanh.", "B": "Chuyên nghiệp hóa thị trường, xác lập trách nhiệm chủ thể và bảo vệ quyền lợi khách hàng.", "C": "Hạn chế quyền tiếp cận thị trường của các nhà đầu tư cá nhân có nguồn vốn lưu động thấp.", "D": "Ưu tiên quyền kiểm soát và điều tiết thị trường cho các tập đoàn bất động sản quy mô lớn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự thay đổi về điều kiện gia nhập thị trường tại Điều 9 Luật Kinh doanh bất động sản 2023 không đơn thuần là thủ tục hành chính mà mang tính chiến lược trong việc tái cấu trúc thị trường bất động sản Việt Nam:. Mục đích chính là chuyên nghiệp hóa thị trường, nâng cao năng lực và trách nhiệm của chủ thể kinh doanh, tăng cường hiệu quả quản lý nhà nước và bảo vệ quyền lợi khách hàng, đối tác. Việc yêu cầu thành lập pháp nhân (doanh nghiệp hoặc hợp tác xã) buộc các chủ thể phải thiết lập hệ thống quản trị nội bộ, quy trình kinh doanh và chế độ kế toán minh bạch. Điều này loại bỏ tình trạng kinh doanh tự phát, thiếu kiểm soát, vốn là nguyên nhân gây ra các cơn \"sốt đất\" ảo và mất ổn định thị trường trong giai đoạn trước."}, {"level": "1", "content": "Ưu điểm chính của loại hình Công ty trách nhiệm hữu hạn so với công ty cổ phần khi thực hiện dự án bất động sản quy mô vừa và nhỏ là gì?", "options": {"A": "Khả năng linh hoạt trong việc huy động nguồn vốn từ thị trường đại chúng.", "B": "Chế độ trách nhiệm vô hạn đối với các khoản nợ và nghĩa vụ của pháp nhân.", "C": "Cấu trúc quản trị nội bộ tinh gọn và cơ chế kiểm soát thành viên chặt chẽ.", "D": "Được áp dụng các chính sách ưu đãi về thuế suất thu nhập doanh nghiệp đặc thù."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Công ty trách nhiệm hữu hạn thường có cơ cấu tổ chức quản lý đơn giản hơn Công ty côt phần, phù hợp với các dự án quy mô vừa và nhỏ, số lượng nhà đầu tư không quá lớn. Theo quy định tại Chương III Luật Doanh nghiệp 2020, cấu trúc quản lý của Công ty TNHH (đặc biệt là TNHH hai thành viên trở lên) bao gồm Hội đồng thành viên, Chủ tịch Hội đồng thành viên và Giám đốc/Tổng giám đốc. So với Công ty Cổ phần (với các quy định phức tạp về Đại hội đồng cổ đông, Hội đồng quản trị, Ban kiểm soát/Ủy ban kiểm toán), mô hình TNHH cho phép quy trình ra quyết định nhanh chóng hơn, phù hợp với sự biến động tức thời của thị trường bất động sản phân khúc nhỏ. Căn cứ Điều 51, 52 Luật Doanh nghiệp 2020, việc chuyển nhượng phần vốn góp trong Công ty TNHH bị hạn chế và phải ưu tiên chào bán cho các thành viên hiện hữu. Đặc tính này giúp chủ đầu tư dự án bất động sản quy mô vừa và nhỏ duy trì được sự ổn định trong cơ cấu nhân sự quản lý, ngăn chặn sự can thiệp từ các đối thủ cạnh tranh hoặc các nhà đầu tư lạ, vốn là rủi ro thường trực ở mô hình Công ty Cổ phần (với tính chất tự do chuyển nhượng cổ phần). Doanh nghiệp TNHH không phải chịu áp lực khắt khe về công bố thông tin định kỳ và các thủ tục hành chính liên quan đến chứng khoán như Công ty Cổ phần. Điều này giúp tối ưu hóa chi phí quản lý cho các dự án có biên lợi nhuận không quá lớn hoặc các dự án gia đình, nhóm đầu tư kín. Mặc dù không được phát hành cổ phiếu, nhưng theo Luật số 76/2025/QH15, Công ty TNHH vẫn có quyền phát hành trái phiếu để huy động vốn cho dự án. Đây là công cụ tài chính hiệu quả giúp doanh nghiệp huy động vốn mà không làm loãng quyền kiểm soát của các thành viên sáng lập."}, {"level": "1", "content": "Nhược điểm lớn nhất của loại hình Doanh nghiệp Tư nhân và Công ty Hợp danh (đối với thành viên hợp danh) khi kinh doanh bất động sản là gì?", "options": {"A": "Quy trình và thủ tục thiết lập bộ máy quản trị hành chính tại Sở Tài chính quá phức tạp.", "B": "Chế độ trách nhiệm vô hạn bằng toàn bộ tài sản cá nhân đối với các nghĩa vụ nợ.", "C": "Sự ràng buộc khắt khe về mức vốn pháp định tối thiểu khi thực hiện đăng ký ngành nghề.", "D": "Quy định cấm các loại hình này tham gia vào phân khúc phát triển dự án nhà ở thương mại."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Chế độ trách nhiệm vô hạn bằng toàn bộ tài sản là rủi ro cực kỳ cao trong lĩnh vực bất động sản có giá trị lớn và nhiều biến động, khiến hai loại hình này ít phù hợp. Đối với Doanh nghiệp tư nhân: Căn cứ Điều 188 Luật Doanh nghiệp 2020, chủ doanh nghiệp tự chịu trách nhiệm bằng toàn bộ tài sản của mình. Tài sản dân sự và tài sản kinh doanh không có sự tách biệt về mặt pháp lý. Đối với Thành viên hợp danh: Căn cứ Điều 177, thành viên hợp danh phải chịu trách nhiệm bằng toàn bộ tài sản của mình về các nghĩa vụ của công ty. Đây là trách nhiệm liên đới và vô hạn. Bất động sản thường đòi hỏi đòn bẩy tài chính lớn. Trong trường hợp dự án bị đình trệ, nợ xấu hoặc phát sinh bồi thường thiệt hại do vi phạm hợp đồng (ví dụ: chậm bàn giao, sai phạm quy hoạch), chủ doanh nghiệp tư nhân hoặc thành viên hợp danh phải dùng tài sản cá nhân (nhà ở, tiền tiết kiệm, các tài sản khác không đưa vào kinh doanh) để chi trả. Trái ngược với Công ty TNHH hay Công ty Cổ phần (chỉ chịu trách nhiệm trong phạm vi vốn góp), hai loại hình này không cung cấp \"tấm lá chắn\" pháp lý để bảo vệ tài sản riêng của nhà đầu tư."}, {"level": "1", "content": "Căn cứ quy định tại Nghị định 96/2024/NĐ-CP quy định chi tiết một số điều của Luật Kinh doanh bất động sản, cơ quan quản lý nhà nước xác định năng lực tài chính (vốn chủ sở hữu) của chủ đầu tư dự án bất động sản dựa trên cơ sở pháp lý và tài chính nào sau đây?", "options": {"A": "Mức vốn điều lệ được ghi nhận danh nghĩa trên Giấy chứng nhận đăng ký doanh nghiệp.", "B": "Báo cáo tài chính năm gần nhất đã được kiểm toán hoặc vốn điều lệ thực góp (đối với doanh nghiệp mới thành lập).", "C": "Giá trị tổng tài sản của doanh nghiệp theo số liệu tự kê khai tại thời điểm lập dự án.", "D": "Biên độ lợi nhuận sau thuế của doanh nghiệp được duy trì trong ba năm tài chính liên tiếp."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc thay đổi từ yêu cầu vốn pháp định sang các tỷ lệ tài chính động (vốn chủ sở hữu/Tổng VĐT, Dư nợ/vốn chủ sở hữu) nhằm mục đích chính là gì?", "options": {"A": "Giảm thiểu rào cản về vốn ban đầu nhằm khuyến khích các doanh nghiệp mới gia nhập thị trường.", "B": "Kiểm soát năng lực tài chính thực chất gắn với quy mô dự án và hạn chế rủi ro hệ thống.", "C": "Thúc đẩy việc sử dụng đòn bẩy tài chính tối đa để gia tăng tốc độ triển khai các dự án khu đô thị.", "D": "Đơn giản hóa quy trình hậu kiểm của cơ quan quản lý nhà nước đối với các doanh nghiệp đã cấp phép."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mục tiêu là giám sát năng lực tài chính động của doanh nghiệp trong quá trình thực hiện dự án, hạn chế tình trạng chủ đầu tư yếu kém, huy động vốn quá khả năng, đầu tư dàn trải. Trước đây, mức vốn pháp định (ví dụ: 20 tỷ VNĐ) là một con số cố định, không phản ánh được sự khác biệt về rủi ro giữa một doanh nghiệp thực hiện dự án 100 tỷ VNĐ và dự án 10.000 tỷ VNĐ. Quy định về tỷ lệ vốn chủ sở hữu (Equity/CAPEX) tại Điều 9 Luật Kinh doanh bất động sản 2023 buộc doanh nghiệp phải có nguồn lực tự thân tương ứng với giá trị dự án mà họ đăng ký triển khai. Điều này triệt tiêu tình trạng các doanh nghiệp có vốn mỏng nhưng cố tình thực hiện các dự án vượt quá khả năng tài chính. Việc kiểm soát tỷ lệ Dư nợ tín dụng, nợ trái phiếu trên vốn chủ sở hữu là một cơ chế phòng vệ được làm rõ trong các nghị định năm 2024 và Luật Doanh nghiệp sửa đổi 2025. Mục tiêu là ngăn chặn tình trạng chủ đầu tư sử dụng đòn bẩy quá mức, phụ thuộc hoàn toàn vào vốn vay ngân hàng hoặc dòng tiền ứng trước từ khách hàng. Khi thị trường biến động, những doanh nghiệp có tỷ lệ nợ quá cao sẽ là những thực thể dễ sụp đổ nhất, gây ra rủi ro dây chuyền cho hệ thống ngân hàng và người mua nhà."}, {"level": "1", "content": "Theo Hệ thống ngành kinh tế Việt Nam hiện hành, một doanh nghiệp muốn đăng ký hoạt động chuyên về môi giới bất động sản và sàn giao dịch bất động sản thì phải đăng ký mã ngành cấp 4 nào?", "options": {"A": "6810", "B": "6821", "C": "6829", "D": "7020"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Phụ lục I, Quyết định số 36/2025/QĐ-TTg của Thủ tướng Chính phủ: • Mã 6821 (Dịch vụ trung gian cho hoạt động bất động sản): Bao gồm hoạt động môi giới, sàn giao dịch và kết nối giao dịch bất động sản. • Mã 6829 (Hoạt động bất động sản khác trên cơ sở phí hoặc hợp đồng): Dùng cho các dịch vụ tư vấn, quản lý bất động sản, đấu giá hoặc đại lý ký quỹ (escrow agent). • Việc tách bạch này giúp cơ quan quản lý phân định rõ điều kiện kinh doanh của môi giới (cần chứng chỉ hành nghề) và các hoạt động tư vấn/quản lý thông thường.."}, {"level": "1", "content": "Theo Luật Doanh nghiệp 2020, việc thông báo mẫu dấu với cơ quan đăng ký kinh doanh trước khi sử dụng có còn bắt buộc không?", "options": {"A": "Doanh nghiệp bắt buộc phải thực hiện thủ tục thông báo mẫu dấu cho cơ quan đăng ký kinh doanh để được công khai trên cổng thông tin quốc gia.", "B": "Thủ tục thông báo mẫu dấu chỉ bắt buộc đối với các Công ty cổ phần thực hiện dự án bất động sản có sự tham gia của vốn nhà nước.", "C": "Quy định về thông báo mẫu dấu đã được bãi bỏ; doanh nghiệp có quyền tự quyết định về hình thức, số lượng và nội dung con dấu.", "D": "Doanh nghiệp phải thực hiện thông báo mẫu dấu cho cơ quan thuế và cơ quan công an địa phương thay vì cơ quan đăng ký kinh doanh."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ quy định tại Điều 43 Luật Doanh nghiệp 2020, doanh nghiệp tự quyết định loại con dấu, số lượng, hình thức và nội dung của con dấu. Doanh nghiệp không còn bị giới hạn bởi các quy chuẩn cứng nhắc về kích thước hay màu mực như các thời kỳ pháp luật trước đây. Doanh nghiệp không có nghĩa vụ phải gửi mẫu dấu cho cơ quan đăng ký kinh doanh để đăng tải công khai trước khi sử dụng. Điều này cũng đồng nghĩa với việc cơ quan nhà nước không còn chịu trách nhiệm xác nhận tính hợp pháp của mẫu dấu thay cho doanh nghiệp. Căn cứ Khoản 1 Điều 43, con dấu của doanh nghiệp có thể được thể hiện dưới hình thức dấu được làm tại cơ sở khắc dấu hoặc dấu dưới hình thức chữ ký số theo quy định của pháp luật về giao dịch điện tử. Việc quản lý và lưu giữ con dấu hiện nay được thực hiện theo quy định của Điều lệ công ty hoặc quy chế do doanh nghiệp tự ban hành. Doanh nghiệp phải tự chịu trách nhiệm về tính thống nhất và việc sử dụng con dấu trong các giao dịch với bên thứ ba.."}, {"level": "1", "content": "Khi đăng ký thành lập công ty trách nhiệm hữu hạn 2 thành viên trở lên, ngoài Giấy đề nghị và Điều lệ, cần nộp thêm danh sách nào?", "options": {"A": "Danh sách cổ đông sáng lập.", "B": "Danh sách thành viên công ty.", "C": "Danh sách Ban kiểm soát.", "D": "Danh sách khách hàng tiềm năng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo quy định tại Điều 46 Luật Doanh nghiệp 2020, Công ty TNHH hai thành viên trở lên là doanh nghiệp có số lượng thành viên không vượt quá 50. Các chủ sở hữu vốn được gọi là \"Thành viên\", do đó văn bản định danh các chủ thể này được gọi là Danh sách thành viên. Danh sách cổ đông sáng lập chỉ áp dụng cho mô hình Công ty Cổ phần. Việc nhầm lẫn giữa \"Thành viên\" và \"Cổ đông\" trong hồ sơ hành chính sẽ dẫn đến việc hồ sơ bị từ chối do không tương thích với loại hình doanh nghiệp đăng ký. Căn cứ Khoản 3 Điều 21, đi kèm với Danh sách thành viên phải có bản sao hợp lệ các giấy tờ pháp lý của cá nhân (đối với thành viên là cá nhân) hoặc giấy tờ pháp lý của tổ chức kèm theo văn bản cử người đại diện theo ủy quyền (đối với thành viên là tổ chức). Danh sách thành viên là cơ sở để cơ quan đăng ký kinh doanh ghi nhận tỷ lệ vốn góp, giá trị vốn góp và loại tài sản góp vốn của từng người. Trong kinh doanh bất động sản, danh sách này giúp các đối tác và ngân hàng xác định được nhóm người kiểm soát thực tế (Ultimate Beneficial Owners - UBO) để đánh giá rủi ro tín dụng và rủi ro hợp tác."}, {"level": "1", "content": "Sự phức tạp và chồng chéo thường gặp trong thực tiễn đầu tư dự án bất động sản là giữa các thủ tục của hai luật nào?", "options": {"A": "Luật Doanh nghiệp và Luật kinh doanh bất động sản.", "B": "Luật Đầu tư và Luật Đất đai.", "C": "Luật Nhà ở và Luật Xây dựng.", "D": "Luật Thuế và Luật Chứng khoán."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự song hành, đôi khi phức tạp và chồng chéo giữa các thủ tục theo Luật Đầu tư (chấp thuận chủ trương, chấp thuận nhà đầu tư) và thủ tục theo Luật Đất đai (giao đất, cho thuê đất) là một rủi ro pháp lý lớn. Theo Luật Đầu tư (2020 và sửa đổi 2025): Quy định về trình tự chấp thuận chủ trương đầu tư và hình thức lựa chọn nhà đầu tư thông qua đấu giá quyền sử dụng đất hoặc đấu thầu lựa chọn nhà đầu tư thực hiện dự án có sử dụng đất. Theo Luật Đất đai (2024), quy định các điều kiện để đất được đưa ra đấu giá (Điều 125) hoặc đấu thầu (Điều 126), sự chồng chéo thường xảy ra khi dự án thuộc diện phải đấu thầu theo Luật Đầu tư nhưng lại chưa đủ điều kiện về quy hoạch chi tiết 1/500 hoặc chưa hoàn thành giải phóng mặt bằng để đáp ứng tiêu chuẩn \"đất sạch\" theo Luật Đất đai. Việc xác định dự án có thuộc trường hợp Nhà nước thu hồi đất (Điều 79 Luật Đất đai 2024) hay phải tự thỏa thuận nhận chuyển nhượng quyền sử dụng đất thường tạo ra những cách hiểu khác nhau giữa cơ quan quản lý đầu tư và cơ quan quản lý tài nguyên môi trường. Điều này dẫn đến tình trạng dự án đã được chấp thuận chủ trương đầu tư nhưng không thể hoàn thành thủ tục giao đất, cho thuê đất. Trong nhiều trường hợp, để được giao đất, nhà đầu tư phải có tư cách nhà đầu tư dự án (theo Luật Đầu tư). Ngược lại, để được công nhận là nhà đầu tư dự án cho một quỹ đất cụ thể, nhà đầu tư phải chứng minh được quyền sử dụng đất hoặc khả năng tiếp cận đất đai (theo Luật Đất đai). Sự \"vênh\" về thời điểm thực hiện hai nhóm thủ tục này là rủi ro pháp lý lớn nhất khiến dự án bị đình trệ."}, {"level": "1", "content": "Trong mô hình quản trị công ty cổ phần không có Ban Kiểm soát riêng, Ủy ban kiểm toán trực thuộc cơ quan nào?", "options": {"A": "Đại hội đồng cổ đông.", "B": "Giám đốc/Tổng giám đốc.", "C": "Hội đồng quản trị.", "D": "Cơ quan thanh tra chuyên ngành."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Theo quy định tại Điểm b Khoản 1 Điều 137 và Điều 161 Luật Doanh nghiệp 2020 (được giữ nguyên tại bản sửa đổi 2025), trong mô hình không có Ban kiểm soát, HĐQT phải thành lập Ủy ban kiểm toán trực thuộc. Đây là sự chuyển dịch từ mô hình giám sát song song (HĐQT và Ban kiểm soát độc lập) sang mô hình giám sát hội nhập (giám sát ngay trong lòng HĐQT). Ủy ban kiểm toán bao gồm các thành viên HĐQT, trong đó chủ tịch Ủy ban kiểm toán bắt buộc phải là thành viên HĐQT độc lập. Các thành viên còn lại cũng phải là những thành viên HĐQT không điều hành để đảm bảo tính khách quan khi kiểm soát các hoạt động tài chính và quản trị của Ban điều hành (Giám đốc/Tổng giám đốc)."}, {"level": "1", "content": "Quyền quyết định các vấn đề chiến lược, cơ cấu vốn, bầu/bãi nhiệm thành viên Hội đồng quản trị/ Ban kiểm soát trong Công ty cổ phần thuộc về cơ quan nào?", "options": {"A": "Hội đồng quản trị.", "B": "Ban kiểm soát/Ủy ban kiểm toán.", "C": "Giám đốc/Tổng giám đốc.", "D": "Đại hội đồng cổ đông."}, "answer": "D", "explanation": " Theo Điều 138 Luật Doanh nghiệp 2020, Đại hội đồng cổ đông là cơ quan quyết định cao nhất của công ty cổ phần, quyết định các vấn đề định hướng phát triển công ty, cơ cấu vốn, bầu, bãi nhiệm thành viên Hội đồng quản trị, Ban kiểm soát của công ty."}, {"level": "1", "content": "Trong hoạt động kinh doanh bất động sản, nghĩa vụ và thời hạn bảo hành đối với nhà chung cư đã bán hoặc cho thuê mua được xác lập dựa trên căn cứ pháp lý và thời gian tối thiểu nào sau đây?", "options": {"A": "Theo Luật Kinh doanh bất động sản 2023 với thời hạn tối thiểu là 36 tháng.", "B": "Theo quy chuẩn của Bộ Xây dựng với thời hạn bảo hành cố định là 24 tháng.", "C": "Theo pháp luật về xây dựng và nhà ở với thời hạn tối thiểu là 60 tháng.", "D": "Theo thỏa thuận trong hợp đồng nhưng không được thấp hơn 12 tháng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Mặc dù chủ thể thực hiện hành vi bán nhà là doanh nghiệp kinh doanh bất động sản, nhưng theo Điều 18 và Điều 19 Luật Kinh doanh bất động sản 2023, nghĩa vụ bảo hành không được quy định chi tiết tại luật này mà được dẫn chiếu: \"Bên bán, bên cho thuê mua có nghĩa vụ bảo hành nhà ở, công trình xây dựng theo quy định của pháp luật về xây dựng và pháp luật về nhà ở\". Căn cứ Điều 155 Luật Nhà ở 2023 (hiệu lực từ năm 2024 và áp dụng xuyên suốt đến 2026), nhà ở được bảo hành kể từ khi hoàn thành việc xây dựng và nghiệm thu đưa vào sử dụng. Đối với nhà chung cư, thời hạn bảo hành tối thiểu là 60 tháng (5 năm). Đối với nhà ở riêng lẻ, thời hạn bảo hành tối thiểu là 24 tháng."}, {"level": "1", "content": "Theo quy định tại Điều 6 Luật Kinh doanh bất động sản 2023, việc bắt buộc một Doanh nghiệp kinh doanh bất động sản phải cập nhật công khai, trung thực số lượng sản phẩm đã giao dịch và số lượng sản phẩm còn lại của dự án trên Hệ thống thông tin quốc gia nhằm mục đích trọng tâm nào?", "options": {"A": "Hỗ trợ các Công ty đại chúng thu hút nhà đầu tư thông qua việc tăng giá trị cổ phiếu.", "B": "Minh bạch hóa thực trạng thị trường và ngăn chặn hành vi tạo ra sự khan hiếm giả.", "C": "Miễn trừ nghĩa vụ quyết toán thuế hàng năm cho các Công ty trách nhiệm hữu hạn dự án.", "D": "Kiểm soát độc quyền thị trường của các tập đoàn bất động sản có quy mô vốn đặc biệt lớn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Công khai tình trạng giao dịch giúp thị trường và người mua nắm được thông tin thực tế về mức độ hấp thụ của dự án, tăng tính minh bạch.  Trong thực tiễn, nhiều doanh nghiệp thường áp dụng chiến thuật \"găm hàng\" hoặc tạo ra các giao dịch ảo để tạo tâm lý khan hiếm, từ đó đẩy giá bất động sản lên cao bất hợp lý. Quy định tại Điều 6 Luật Kinh doanh bất động sản 2023 buộc mọi doanh nghiệp (không phân biệt là Công ty TNHH hay Công ty Cổ phần) phải công khai dữ liệu thực. Điều này giúp người mua xác định được tỷ lệ hấp thụ thực tế của dự án, tránh rơi vào các \"bẫy\" tâm lý của đơn vị phân phối."}, {"level": "1", "content": "Căn cứ quy định tại Luật Kinh doanh bất động sản 2023 và Nghị định 96/2024/NĐ-CP, yêu cầu về năng lực tài chính tự có và giới hạn huy động vốn từ khách hàng đối với chủ đầu tư dự án được xác lập theo các thông số kỹ thuật nào sau đây?", "options": {"A": "Duy trì mức vốn pháp định 20 tỷ đồng; vốn chủ sở hữu phải đạt tỷ lệ tối thiểu 25% tổng mức đầu tư và huy động vốn không quá 50%.", "B": "Bãi bỏ vốn pháp định; vốn chủ sở hữu phải đạt tỷ lệ tối thiểu 10% tổng mức đầu tư và được huy động vốn từ khách hàng tối đa là 95%.", "C": "Quy định mức vốn pháp định 50 tỷ đồng; vốn chủ sở hữu đạt 20% tổng mức đầu tư và chỉ được huy động vốn sau khi hoàn thành phần thân công trình xây dựng.", "D": "Không quy định vốn pháp định; vốn chủ sở hữu ≥ 20% (dự án < 20 ha) hoặc ≥ 15% (dự án ≥ 20 ha) và huy động vốn ứng trước tối đa 70%."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 9 Luật Kinh doanh bất động sản 2023, Nhà nước đã chính thức bãi bỏ yêu cầu vốn pháp định cố định (trước đây là 20 tỷ đồng). Thay vào đó, năng lực của doanh nghiệp được đánh giá trực tiếp dựa trên khả năng đối ứng vốn cho từng dự án cụ thể. Chủ đầu tư phải duy trì tỷ lệ vốn chủ sở hữu không thấp hơn20% tổng vốn đầu tư đối với dự án có quy mô sử dụng đất dưới 20 ha, không thấp hơn 15% tổng vốn đầu tư đối với dự án có quy mô sử dụng đất từ 20 ha trở lên. Nếu chủ đầu tư thực hiện đồng thời nhiều dự án, vốn chủ sở hữu phải đủ để đảm bảo tỷ lệ cho tổng mức đầu tư của tất cả các dự án đang triển khai. Giới hạn huy động vốn ứng trước là 70%, là \"điểm dừng kỹ thuật\" để bảo vệ khách hàng. Theo Điều 26, việc thu tiền thanh toán trong kinh doanh nhà ở hình thành trong tương lai được thực hiện nhiều lần nhưng: Lần đầu không quá 30% giá trị hợp đồng (bao gồm cả tiền đặt cọc).Tổng số tiền thu của khách hàng không quá 70% giá trị hợp đồng khi chưa bàn giao nhà ở, công trình xây dựng cho người mua.Trường hợp bên bán là doanh nghiệp có vốn đầu tư nước ngoài, tổng số tiền thu tối đa chỉ là 50% trước khi bàn giao.."}, {"level": "1", "content": "Để được phép hoạt động kinh doanh bất động sản và kinh doanh dịch vụ bất động sản theo hệ thống mã ngành mới nhất, doanh nghiệp phải tuân thủ nguyên tắc đăng ký mã ngành kinh tế nào sau đây?", "options": {"A": "Đăng ký mã ngành 6810 cho mọi hoạt động, duy trì vốn pháp định 20 tỷ đồng đối với cả chủ đầu tư dự án và sàn giao dịch.", "B": "Đăng ký mã ngành 6821 hoặc 6829 nếu làm chủ đầu tư dự án và đăng ký mã ngành 6810 nếu chỉ làm dịch vụ môi giới.", "C": "Đăng ký mã 6810 để phát triển dự án và mã 6821, 6829 cho dịch vụ; phải đăng ký tất cả các mã này nếu hoạt động hỗn hợp.", "D": "Chỉ đăng ký mã kinh doanh thương mại chung, kèm theo quyết định chấp thuận chủ trương đầu tư và chứng chỉ hành nghề."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Hệ thống ngành kinh tế Việt Nam (VSIC) ban hành kèm Quyết định 36/2025/QĐ-TTg, có sự phân định rõ ràng giữa hai khái niệm \"Kinh doanh BĐS\" và \"Kinh doanh Dịch vụ BĐS\". Mã ngành 6810 (Kinh doanh bất động sản, quyền sử dụng đất thuộc chủ sở hữu, chủ sử dụng hoặc đi thuê): Đây là mã bắt buộc duy nhất định danh tư cách Chủ đầu tư. Doanh nghiệp dùng vốn của mình để phát triển dự án, xây nhà bán/cho thuê phải có mã này. Mã ngành 6821 (Tư vấn, môi giới bất động sản) và 6829 (Hoạt động dịch vụ bất động sản khác - bao gồm Sàn giao dịch, Quản lý BĐS): Đây là các mã định danh tư cách Làm dịch vụ (hưởng hoa hồng/phí dịch vụ). Doanh nghiệp môi giới hoặc mở sàn giao dịch bắt buộc phải đăng ký nhóm mã này."}, {"level": "1", "content": "Căn cứ quy định tại Luật Doanh nghiệp 2020 (bản sửa đổi 2025) và Luật Kinh doanh bất động sản 2023, nhận định nào sau đây là chính xác nhất về quyền năng tham gia thị trường bất động sản của Doanh nghiệp tư nhân (DNTN) so với Công ty hợp danh (CTHD)?", "options": {"A": "Chỉ Công ty hợp danh mới được phép làm chủ đầu tư dự án bất động sản do loại hình này có tư cách pháp nhân độc lập.", "B": "Cả hai đều được kinh doanh bất động sản nếu đăng ký đúng mã ngành, dù DNTN không có tư cách pháp nhân còn CTHD thì có.", "C": "Doanh nghiệp tư nhân chỉ được thực hiện dịch vụ môi giới, còn Công ty hợp danh được phép đầu tư xây dựng hạ tầng kỹ thuật.", "D": "Cả hai loại hình này đều không được phép kinh doanh bất động sản do chủ sở hữu phải chịu trách nhiệm vô hạn bằng tài sản cá nhân."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 9 Luật Kinh doanh bất động sản 2023, điều kiện để tổ chức, cá nhân kinh doanh bất động sản là phải \"thành lập doanh nghiệp hoặc hợp tác xã\". Căn cứ Luật Doanh nghiệp 2020, cả Doanh nghiệp tư nhân (Điều 188) và Công ty hợp danh (Điều 177) đều được công nhận là các loại hình \"doanh nghiệp\" hợp pháp tại Việt Nam. Do đó, về mặt nguyên tắc chủ thể, cả hai đều có quyền năng kinh doanh bất động sản như nhau nếu thỏa mãn các điều kiện về vốn chủ sở hữu và đăng ký mã ngành (6810 cho đầu tư dự án hoặc 6821, 6829 cho dịch vụ). Công ty hợp danh có tư cách pháp nhân kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp (Khoản 2 Điều 177). Doanh nghiệp tư nhân không có tư cách pháp nhân do tài sản của chủ doanh nghiệp không tách biệt hoàn toàn với tài sản của doanh nghiệp (Khoản 1 Điều 188). Nhiều người thường cho rằng không có tư cách pháp nhân thì không được thực hiện các dự án lớn. Tuy nhiên, pháp luật kinh doanh bất động sản chỉ yêu cầu chủ thể là \"doanh nghiệp\", không bắt buộc doanh nghiệp đó phải có \"tư cách pháp nhân\"."}, {"level": "1", "content": "Trong hoạt động kinh doanh bất động sản đòi hỏi sự tách biệt rủi ro tài chính cá nhân, chế độ trách nhiệm đối với các khoản nợ và nghĩa vụ tài sản của Thành viên công ty TNHH, Cổ đông công ty cổ phần và Thành viên góp vốn của Công ty hợp danh có điểm chung cốt lõi nào sau đây?", "options": {"A": "Chịu trách nhiệm liên đới bằng toàn bộ tài sản cá nhân đối với các sai phạm trong quá trình huy động vốn dự án.", "B": "Chịu trách nhiệm vô hạn trong trường hợp doanh nghiệp không đủ khả năng thanh toán các khoản bảo lãnh ngân hàng.", "C": "Chỉ chịu trách nhiệm về các khoản nợ của doanh nghiệp trong phạm vi số vốn đã góp hoặc cam kết góp.", "D": "Được miễn trừ hoàn toàn trách nhiệm tài chính nếu không trực tiếp tham gia điều hành, quản lý dự án bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Thành viên Công ty TNHH: Theo Điều 46 (TNHH 2 TV trở lên) và Điều 74 (TNHH 1 TV) Luật Doanh nghiệp 2020, thành viên chịu trách nhiệm về các khoản nợ trong phạm vi số vốn đã góp. Cổ đông Công ty cổ phần: Theo Điểm c Khoản 1 Điều 111, cổ đông chỉ chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của doanh nghiệp trong phạm vi số vốn đã góp vào doanh nghiệp. Thành viên góp vốn (Công ty hợp danh): Đây là điểm dễ gây nhầm lẫn nhất. Theo Điểm c Khoản 2 Điều 187, khác với Thành viên hợp danh, Thành viên góp vốn chỉ chịu trách nhiệm về các khoản nợ của công ty trong phạm vi số vốn đã cam kết góp.."}, {"level": "1", "content": "Khi một Công ty Trách nhiệm hữu hạn (TNHH) đang thực hiện các dự án bất động sản quy mô lớn muốn mở rộng hệ sinh thái thông qua các hoạt động M&A (Sáp nhập & Mua lại) và tiếp cận nguồn vốn đại chúng một cách linh hoạt, phương án tái cấu trúc mô hình nào sau đây là tối ưu nhất?", "options": {"A": "Duy trì mô hình TNHH và thực hiện M&A dưới hình thức chuyển nhượng một phần dự án bất động sản (Asset Deal).", "B": "Giữ nguyên loại hình doanh nghiệp và ký kết các hợp đồng hợp tác kinh doanh (BCC) theo hình thức hợp doanh (Partnership).", "C": "Chuyển đổi sang Công ty cổ phần để thực hiện niêm yết (IPO) và hoán đổi cổ phần trong các giao dịch M&A.", "D": "Thành lập liên kết mô hình Tập đoàn (Holding) để điều tiết dòng vốn nội bộ mà không cần thay đổi tư cách pháp lý."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Câu hỏi này yêu cầu người thi phải phân tích sâu về mối tương quan giữa loại hình doanh nghiệp và công cụ tài chính trong bối cảnh thị trường bất động sản hiện đại. Công ty TNHH có cấu trúc \"vốn đóng\", việc huy động vốn bị giới hạn trong phạm vi các thành viên hiện hữu hoặc vay tín dụng. Ngược lại, theo Điều 111 Luật Doanh nghiệp 2020, Công ty cổ phần (CP) có quyền phát hành cổ phiếu ra công chúng. Đây là \"chìa khóa\" để thực hiện IPO, cho phép doanh nghiệp bất động sản tiếp cận nguồn vốn khổng lồ từ thị trường chứng khoán mà không bị áp lực về lãi suất vay ngân hàng. Trong M&A bất động sản, việc chuyển nhượng dự án (Asset Deal) thường chịu sự kiểm soát khắt khe về điều kiện (phải hoàn thành giải phóng mặt bằng, có giấy chứng nhận quyền sử dụng đất...) theo Luật Kinh doanh bất động sản 2023. Trong khi đó, Công ty CP có thể thực hiện M&A thông qua hoán đổi cổ phần (Share Swap). Việc phát hành thêm cổ phần để thâu tóm công ty mục tiêu giúp chủ đầu tư mở rộng quỹ đất nhanh chóng mà không cần chi trả bằng tiền mặt quá lớn, đồng thời tận dụng được lợi thế quy mô của một doanh nghiệp niêm yết."}, {"level": "1", "content": "Theo Luật Doanh nghiệp 2020, cá nhân nào dưới đây có quyền thành lập doanh nghiệp Kinh doanh bất động sản?", "options": {"A": "Cá nhân đang là chủ sở hữu của một Doanh nghiệp tư nhân và muốn đăng ký thành lập thêm một Doanh nghiệp tư nhân khác để phân tách rủi ro.", "B": "Người đang bị cấm hành nghề theo bản án có hiệu lực", "C": "Cán bộ, công chức, viên chức", "D": "Người đủ 18 tuổi trở lên, có đầy đủ năng lực hành vi dân sự, không bị cấm bởi pháp luật"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Điều 17 Luật Doanh nghiệp 2020 quy định: Cá nhân đủ 18 tuổi, có đầy đủ năng lực hành vi dân sự và không thuộc trường hợp bị cấm thì được quyền thành lập doanh nghiệp, bao gồm doanh nghiệp kinh doanh bất động sản. Theo Luật Cán bộ, công chức và Luật Viên chức hiện hành, nhóm đối tượng này bị cấm \"thành lập, tham gia thành lập hoặc tham gia quản lý, điều hành doanh nghiệp tư nhân, công ty trách nhiệm hữu hạn, công ty cổ phần...\". Căn cứ Khoản 3 Điều 188 Luật Doanh nghiệp 2020, \"Mỗi cá nhân chỉ được quyền thành lập một doanh nghiệp tư nhân\" Theo Điểm e Khoản 2 Điều 17, người đang bị Tòa án cấm đảm nhiệm chức vụ, cấm hành nghề hoặc làm công việc nhất định thì không được thành lập và quản lý doanh nghiệp trong phạm vi bị cấm. Nếu bản án trực tiếp nhắc đến lĩnh vực bất động sản, cá nhân này đương nhiên mất quyền năng thiết lập doanh nghiệp trong ngành này."}, {"level": "1", "content": "Tổ chức, cá nhân có thể góp vốn bằng hình thức nào để thành lập doanh nghiệp Kinh doanh bất động sản?", "options": {"A": "Chỉ được góp vốn bằng tiền Đồng Việt Nam, ngoại tệ tự do chuyển đổi hoặc vàng để đảm bảo tính thanh khoản trực tiếp cho các dự án.", "B": "Quyền sử dụng đất, tài sản gắn liền với đất và các loại tài sản số (tiền mã hóa) đã được các tổ chức định giá chuyên nghiệp xác nhận giá trị.", "C": "VND, ngoại tệ, vàng, quyền sử dụng đất, quyền sở hữu trí tuệ, công nghệ và các tài sản khác có thể định giá được bằng VND.", "D": "Mọi loại tài sản hữu hình và vô hình có giá trị kinh tế trên thị trường mà không cần thông qua thủ tục định giá hay chuyển quyền sở hữu."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Khoản 1 Điều 34 Luật Doanh nghiệp 2020, tài sản góp vốn có thể là Đồng Việt Nam, ngoại tệ tự do chuyển đổi, vàng, quyền sử dụng đất, quyền sở hữu trí tuệ, công nghệ, bí quyết kỹ thuật, tài sản khác có thể định giá được bằng Đồng Việt Nam. Điều quan trọng là phải được định giá và chuyển quyền hợp pháp cho doanh nghiệp. Theo Điều 34, danh mục tài sản rất rộng mở, bao gồm cả tài sản hữu hình (tiền, vàng, đất đai) và tài sản vô hình (quyền sở hữu trí tuệ, bí quyết kỹ thuật, công nghệ). Trong kinh doanh bất động sản, việc góp vốn bằng quyền sử dụng đất là phổ biến nhất. Tuy nhiên, doanh nghiệp hoàn toàn có thể góp vốn bằng phần mềm quản lý tòa nhà (PropTech) hoặc thương hiệu (quyền sở hữu trí tuệ) nếu các tài sản này định giá được bằng tiền Đồng Việt Nam."}, {"level": "1", "content": "Theo quy định tại Luật Doanh nghiệp 2020 (và bản sửa đổi 2025), các thành viên/cổ đông của một doanh nghiệp kinh doanh bất động sản mới thành lập phải thực hiện góp đủ số vốn đã cam kết trong thời hạn tối đa bao nhiêu ngày và được áp dụng cơ chế loại trừ thời gian nào sau đây?", "options": {"A": "30 ngày kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp; không được áp dụng bất kỳ cơ chế loại trừ thời gian nào.", "B": "90 ngày kể từ ngày ký điều lệ công ty; không bao gồm thời gian thực hiện các giao dịch chuyển tiền qua hệ thống ngân hàng quốc tế.", "C": "90 ngày kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp; không kể thời gian vận chuyển, nhập khẩu tài sản và thực hiện thủ tục hành chính chuyển quyền sở hữu.", "D": "180 ngày kể từ ngày dự án được chấp thuận chủ trương đầu tư; bao gồm cả thời gian thẩm định giá tài sản của các tổ chức độc lập."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nghĩa vụ góp vốn là nghĩa vụ tài chính tiên quyết để xác lập tư cách thành viên và quyền sở hữu dự án. Quy định tại Điều 47 (Công ty TNHH) và Điều 113 (Công ty Cổ phần) xác lập một khung thời gian nghiêm ngặt nhưng có tính đến thực tiễn:90 ngày là thời hạn pháp lý để doanh nghiệp chuyển từ trạng thái \"vốn đăng ký\" sang \"vốn thực có\". Con số này được tính từ ngày cơ quan đăng ký kinh doanh cấp Giấy chứng nhận (không phải ngày ký điều lệ hay ngày nộp hồ sơ). Pháp luật cho phép loại trừ (không tính vào 90 ngày) đối với 03 nhóm hoạt động tốn nhiều thời gian: (1) Vận chuyển, nhập khẩu tài sản: Áp dụng khi góp vốn bằng máy móc, thiết bị công nghệ phục vụ dự án từ nước ngoài. (2) Thủ tục hành chính chuyển quyền sở hữu: Đây là quy định sống còn đối với các dự án bất động sản. Khi thành viên góp vốn bằng Quyền sử dụng đất, thời gian làm thủ tục sang tên tại Văn phòng đăng ký đất đai sẽ được trừ ra khỏi thời hạn 90 ngày. Điều này bảo vệ thành viên khỏi việc bị coi là \"vi phạm nghĩa vụ góp vốn\" do sự chậm trễ từ phía cơ quan hành chính."}, {"level": "1", "content": "Khi một doanh nghiệp thực hiện dự án bất động sản quy mô dưới 20 ha và dự kiến phát hành trái phiếu để huy động vốn, cấu trúc tài chính của doanh nghiệp phải đồng thời thỏa mãn các \"ngưỡng chặn\" nào sau đây theo quy định của Luật Doanh nghiệp sửa đổi 2025 và Luật Kinh doanh bất động sản 2023?", "options": {"A": "Vốn chủ sở hữu tối thiểu đạt 15% tổng mức đầu tư dự án và tổng nợ phải trả không được vượt quá 10 lần vốn chủ sở hữu.", "B": "Vốn chủ sở hữu đạt ≥ 20% tổng mức đầu tư dự án và hệ số Tổng nợ/Vốn chủ sở hữu (D/E) của doanh nghiệp không quá 5 lần.", "C": "Tổng dư nợ vay ngân hàng và trái phiếu không được vượt quá 80% giá trị dự án, không khống chế hệ số nợ trên quy mô doanh nghiệp.", "D": "Vốn điều lệ phải lớn hơn vốn vay và chỉ được huy động vốn từ khách hàng tối đa 50% giá trị hợp đồng trước khi cất nóc."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 9 và Nghị định 96/2024/NĐ-CP, để đảm bảo dự án không bị đình trệ do thiếu vốn tự có, chủ đầu tư dự án quy mô nhỏ (dưới 20 ha) phải có vốn chủ sở hữu không thấp hơn 20% tổng vốn đầu tư.Đây là điều kiện \"cần\" để được giao đất và triển khai dự án.Nguồn vốn còn lại (80%) có thể huy động từ vốn vay ngân hàng, trái phiếu hoặc vốn ứng trước từ khách hàng. Căn cứ quy định Luật Doanh nghiệp 2025 (Điều 128, 46) về an toàn tài chính trong phát hành trái phiếu, hệ số Tổng nợ phải trả/Vốn chủ sở hữu (D/E) phải được duy trì ≤ 5.Đây là điều kiện \"đủ\" để doanh nghiệp có quyền tiếp cận thị trường vốn nợ (trái phiếu).Nếu doanh nghiệp có vốn chủ sở hữu tại dự án đạt 20%, nhưng tổng nợ toàn công ty (bao gồm nợ dự án này, dự án khác và nợ vận hành) vượt quá 5 lần vốn chủ sở hữu tổng thể, doanh nghiệp đó sẽ không được phép phát hành thêm trái phiếu."}, {"level": "1", "content": "Trường hợp nào sau đây là đúng theo trình tự thành lập doanh nghiệp Kinh doanh bất động sản?", "options": {"A": "Ký hợp đồng mua bán nhà → thành lập doanh nghiệp", "B": "Nộp hồ sơ đăng ký doanh nghiệp → được cấp Giấy đăng ký doanh nghiệp → công bố nội dung đăng ký", "C": "Nộp thuế trước → thành lập doanh nghiệp sau", "D": "Ký hợp đồng thuê trụ sở → hoạt động kinh doanh ngay"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trình tự đúng theo Luật Doanh nghiệp gồm: nộp hồ sơ đăng ký → nhận Giấy đăng ký → công bố thông tin → khắc dấu và đăng ký thuế → hoạt động kinh doanh."}, {"level": "1", "content": "Trong thời hạn bao lâu kể từ ngày nhận hồ sơ hợp lệ, Phòng Đăng ký kinh doanh phải cấp Giấy chứng nhận đăng ký doanh nghiệp?", "options": {"A": "01 ngày làm việc", "B": "03 ngày làm việc", "C": "05 ngày làm việc", "D": "07 ngày làm việc"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 27 Luật Doanh nghiệp 2020, trong thời hạn 03 ngày làm việc kể từ ngày nhận đủ hồ sơ hợp lệ, Phòng Đăng ký kinh doanh phải cấp Giấy chứng nhận đăng ký doanh nghiệp hoặc trả lời bằng văn bản nếu từ chối."}, {"level": "1", "content": "Tình huống: Một Tập đoàn bất động sản tại TP. Hồ Chí Minh dự kiến triển khai một dự án khu đô thị mới với quy mô 50 ha (tổng mức đầu tư 10.000 tỷ đồng) và kế hoạch huy động vốn thông qua phát hành trái phiếu doanh nghiệp. Theo quy định tại Nghị định 96/2024/NĐ-CP và Điều 128 Luật Doanh nghiệp 2025, cấu trúc tài chính của doanh nghiệp này phải được điều chỉnh như thế nào để đảm bảo tính hợp pháp trên cả hai phương diện: năng lực dự án và an toàn pháp nhân?", "options": {"A": "Cần đảm bảo vốn chủ sở hữu đạt 1.500 tỷ đồng (15%) để đáp ứng hệ số nợ dự án là 5,67; việc phát hành trái phiếu không bị khống chế bởi hệ số nợ tổng thể của pháp nhân.", "B": "Phải duy trì vốn chủ sở hữu 2.000 tỷ đồng (20%) để đưa hệ số nợ dự án về mức 4, qua đó mặc định thỏa mãn điều kiện phát hành trái phiếu của Luật Doanh nghiệp.", "C": "Vốn chủ sở hữu tại dự án phải đạt tối thiểu 1.500 tỷ đồng, nhưng tổng dư nợ trái phiếu và các khoản nợ khác của pháp nhân phải được khống chế để hệ số tổng nợ phải trả trên vốn chủ sở hữu D/E tổng thể không vượt quá 5.", "D": "Do dự án có quy mô trên 20 ha, doanh nghiệp được ưu tiên áp dụng hệ số nợ 5,67 cho toàn bộ hoạt động phát hành trái phiếu mà không cần xét đến giới hạn tại Luật Doanh nghiệp."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Nghị định 96/2024/NĐ-CP):Với quy mô 50 ha (≥ 20 ha), căn cứ Điều 9 Luật Kinh doanh bất động sản 2023, vốn chủ sở hữu tối thiểu là 15% tổng vốn đầu tư.Hệ số đòn bẩy tối đa cho phép tại riêng dự án này là: Dự nợ huy động /Vốn tự có = 85%/15% = 5,67 lần. Nếu chỉ nhìn vào luật chuyên ngành BĐS, chủ đầu tư có thể vay nợ tới 5,67 lần vốn tự có. Tuy nhiên, theo Điều 128 Luật Doanh nghiệp 2025),để đủ điều kiện phát hành trái phiếu, pháp nhân phải thỏa mãn \"chốt chặn\" an toàn: Tổng nợ phải trả /Vốn chủ sở hữu ≤5. Đây là ngưỡng chặn Macro toàn doanh nghiệp. Doanh nghiệp có thể áp dụng hệ số 5,67 cho dự án lớn (theo Nghị định 96), nhưng nếu họ dùng kênh Trái phiếu để huy động phần nợ đó, họ sẽ đụng phải \"trần\" 5 của Luật Doanh nghiệp. Để thực hiện dự án này bằng vốn trái phiếu, chủ đầu tư phải chọn một trong hai cách:(1) Tăng thêm vốn chủ sở hữu lên trên mức 15% để kéo hệ số D/E xuống ≤ 5.(2) Duy trì nợ dự án ở mức 5,67 nhưng các mảng kinh doanh khác trong tập đoàn phải có nợ rất thấp để \"bù trừ\" sao cho bình quân gia quyền toàn pháp nhân không quá 5."}, {"level": "1", "content": "Chủ doanh nghiệp tư nhân có thể đồng thời là chủ của doanh nghiệp tư nhân khác hoặc làm chủ hộ kinh doanh hay không?", "options": {"A": "Được phép, nếu các doanh nghiệp này đăng ký mã ngành kinh tế khác nhau (ví dụ: mã 6810 - Kinh doanh BĐS và mã 6821 - Môi giới BĐS).", "B": "Được phép, nếu các doanh nghiệp này hoạt động tại các địa phương khác nhau để phân tách rủi ro thị trường.", "C": "Không được phép; mỗi cá nhân chỉ được quyền thành lập duy nhất một doanh nghiệp tư nhân.", "D": "Được phép, miễn là cá nhân đó thực hiện thuê Giám đốc điều hành độc lập và có sự tách biệt về hạch toán kế toán."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 Điều 188 Luật Doanh nghiệp 2020 quy định mỗi cá nhân chỉ được quyền thành lập một doanh nghiệp tư nhân. Không phân biệt ngành nghề, địa bàn hay ủy quyền. Khác với Công ty TNHH hay Công ty Cổ phần, Doanh nghiệp tư nhân không có tư cách pháp nhân. Tài sản của chủ doanh nghiệp và tài sản của doanh nghiệp là một khối thống nhất. Chủ DNTN chịu trách nhiệm bằng toàn bộ tài sản của mình về mọi hoạt động kinh doanh, không giới hạn trong phạm vi vốn đầu tư đăng ký. Nếu pháp luật cho phép một cá nhân thành lập nhiều DNTN, sẽ dẫn đến sự rối loạn trong việc xác định nghĩa vụ trả nợ. Khi phát sinh nợ tại DNTN A, chủ sở hữu phải dùng toàn bộ tài sản (bao gồm cả vốn tại DNTN B) để chi trả. Việc cho phép tồn tại nhiều DNTN của cùng một chủ sẽ tạo ra \"ảo giác\" về sự phân tách rủi ro cho các chủ nợ, trong khi thực tế tất cả đều dẫn về một túi tiền duy nhất của cá nhân đó. Căn cứ Khoản 4 Điều 188, chủ DNTN cũng không được đồng thời là chủ hộ kinh doanh hoặc thành viên hợp danh của công ty hợp danh (trừ trường hợp được các thành viên hợp danh còn lại đồng ý). Điều này nhằm tập trung mọi nghĩa vụ trách nhiệm vô hạn về một đầu mối duy nhất để dễ dàng kiểm soát khi xảy ra tranh chấp, thi hành án hoặc phá sản."}, {"level": "1", "content": "Công ty trách nhiệm hữu hạn 2 thành viên có tư cách pháp nhân kể từ khi nào?", "options": {"A": "Ngày nộp hồ sơ đăng ký", "B": "Ngày nộp thuế môn bài", "C": "Ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp", "D": "Ngày bắt đầu hoạt động thực tế"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 74 Luật Doanh nghiệp 2020, công ty trách nhiệm hữu hạn có tư cách pháp nhân kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp."}, {"level": "1", "content": "Khi thành lập công ty trách nhiệm hữu hạn 2 thành viên trở lên để Kinh doanh bất động sản, phải có ít nhất bao nhiêu thành viên góp vốn?", "options": {"A": "1", "B": "2", "C": "3", "D": "Không giới hạn"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 46 Luật Doanh nghiệp 2020, công ty TNHH 2 thành viên phải có từ 2 đến 50 thành viên góp vốn. Đây là yêu cầu tối thiểu của loại hình công ty này."}, {"level": "1", "content": "Cổ đông công ty cổ phần chịu trách nhiệm đối với các khoản nợ và nghĩa vụ tài sản của công ty như thế nào?", "options": {"A": "Bằng toàn bộ tài sản cá nhân", "B": "Theo tỷ lệ chia cổ tức", "C": "Trong phạm vi số cổ phần đã góp", "D": "Theo thỏa thuận trong điều lệ"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Cổ đông chỉ chịu trách nhiệm hữu hạn, tức là trong phạm vi số vốn đã góp vào công ty (khoản 1 Điều 111 Luật Doanh nghiệp 2020)."}, {"level": "1", "content": "Công ty cổ phần có thể huy động vốn bằng cách nào sau đây?", "options": {"A": "Vay từ ngân hàng", "B": "Phát hành cổ phiếu", "C": "Góp vốn liên doanh", "D": "Tất cả các hình thức trên"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Công ty cổ phần có cơ chế linh hoạt nhất để huy động vốn, bao gồm: phát hành cổ phiếu, trái phiếu, góp vốn, vay vốn, và các phương thức tài chính khác (Điều 112 Luật Doanh nghiệp 2020)."}, {"level": "1", "content": "Trong giao dịch mua bán nhà đất giữa vợ và chồng (quan hệ hôn nhân), loại thuế nào được miễn theo quy định?", "options": {"A": "Thuế thu nhập cá nhân", "B": "Thuế giá trị gia tăng", "C": "Thuế sử dụng đất phi nông nghiệp", "D": "Lệ phí trước bạ"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 4 Luật Thuế thu nhập cá nhân (Văn bản hợp nhất số 05/VBHN-VPQH), thu nhập từ chuyển nhượng bất động sản giữa vợ với chồng; cha đẻ, mẹ đẻ với con đẻ; cha nuôi, mẹ nuôi với con nuôi; cha chồng, mẹ chồng với con dâu; cha vợ, mẹ vợ với con rể; ông nội, bà nội với cháu nội; ông ngoại, bà ngoại với cháu ngoại; anh, chị, em ruột với nhau là thu nhập được miễn thuế. Lệ phí trước bạ cũng được miễn trong trường hợp này, nhưng nó không phải là loại thuế."}, {"level": "1", "content": "Một hợp đồng chuyển nhượng bất động sản được ghi nhận sai giá (không phản ánh đúng giá giao dịch thực tế). Hậu quả của việc kê khai sai giá này là:", "options": {"A": "Cơ quan đăng ký đất đai mặc định chấp nhận giá kê khai nếu mức giá đó không thấp hơn bảng giá đất của UBND cấp tỉnh.", "B": "Bị truy thu số thuế thiếu, xử phạt vi phạm hành chính từ 1 đến 3 lần số thuế trốn hoặc truy cứu trách nhiệm hình sự.", "C": "Bị coi là lỗi hành chính về hình thức hợp đồng và được phép điều chỉnh bổ sung mà không làm phát sinh tiền chậm nộp.", "D": "Hợp đồng chuyển nhượng tự động bị vô hiệu hóa toàn bộ và các bên phải thực hiện lại quy trình công chứng từ thời điểm đầu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Ghi nhận sai giá trên hợp đồng dẫn đến tính toán sai số thuế (ví dụ: thu nhập cá nhân, lệ phí trước bạ), gây rủi ro bị xử phạt vi phạm hành chính và thậm chí truy cứu trách nhiệm nếu vi phạm nghiêm trọng. Nghị định 68/2026/NĐ-CP nhấn mạnh việc xóa bỏ hoàn toàn kẽ hở \"hai giá\". Nếu giá trên hợp đồng thấp hơn dữ liệu thị trường mà cơ quan thuế nắm giữ, người nộp thuế không những phải nộp đủ số thuế bị thiếu mà còn phải chịu phạt số tiền chậm nộp (Tính theo tỷ lệ 0,03%/ngày trên số tiền thuế chậm nộp) và xử phạt trốn thuế (Theo Điều 143 Luật Quản lý thuế, mức phạt từ 1 đến 3 lần số thuế trốn tùy theo tính chất và mức độ vi phạm)."}, {"level": "1", "content": "Đối với hoạt động kinh doanh bất động sản, thuế giá trị gia tăng thường áp dụng mức thuế suất nào?", "options": {"A": "5%", "B": "10%", "C": "15%", "D": "20%"}, "answer": "", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Luật Thuế giá trị gia tăng và hướng dẫn tại Nghị định 181/2025/NĐ-CP (có hiệu lực từ 01/07/2025), mức thuế suất đối với hoạt động kinh doanh bất động sản thương mại, xây dựng hạ tầng là 10%. Đây là mức thuế áp dụng cho phần giá trị gia tăng của nhà ở và công trình xây dựng. Căn cứ Điều 4 Nghị định 181/2025/NĐ-CP, giá tính thuế GTGT đối với hoạt động kinh doanh bất động sản là giá chuyển nhượng bất động sản trừ (-) giá đất được trừ để tính thuế GTGT. Lý do: Chuyển quyền sử dụng đất thuộc đối tượng không chịu thuế GTGT. Vì vậy, thuế GTGT 10% chỉ đánh trên giá trị nhà và hạ tầng kiến trúc trên đất. Thuế suất 5% được áp dụng đối với bán, cho thuê, cho thuê mua nhà ở xã hội theo quy định của Luật Nhà ở. Đây là chính sách khuyến khích của Chính phủ nhằm hỗ trợ người có thu nhập thấp tiếp cận nhà ở..."}, {"level": "1", "content": "Thuế sử dụng đất phi nông nghiệp đối với đất ở theo quy định hiện hành được tính theo mức nào sau đây?", "options": {"A": "Từ 0,01% đến 0,03%", "B": "Từ 0,03% đến 0,15%", "C": "Từ 0,2% đến 0,5%", "D": "Từ 1% đến 2%"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 7 Văn bản hợp nhất số 05/VBHN-VPQH  của Văn phòng Quốc hội ngày 16/9/2024 về Luật thuế sử dụng đất phi nông nghiệp thi Thuế suất sử dụng đất phi nông nghiệp đối với đất ở bao gốm cả trường hợp sử dụng để kinh doanh dao động từ 0,03% đến 0,15%."}, {"level": "1", "content": "Một doanh nghiệp bất động sản phải nộp Thuế Giá Trị Gia Tăng (VAT) với mức thuế suất 10%. Cách tính VAT trong hoạt động Kinh doanh bất động sản là:", "options": {"A": "Thuế GTGT tính trên tổng giá trị hợp đồng chuyển nhượng bao gồm cả quyền sử dụng đất và tài sản gắn liền với đất.", "B": "Thuế GTGT tính trên giá chuyển nhượng bất động sản trừ (-) giá đất được trừ tại thời điểm chuyển nhượng theo quy định.", "C": "Thuế GTGT tính trên phần lợi nhuận chênh lệch giữa giá bán thực tế và tổng chi phí đầu tư xây dựng hạ tầng dự án.", "D": "Thuế GTGT tính trên giá trị bảng giá đất do UBND cấp tỉnh ban hành cộng với chi phí xây dựng thực tế trên hóa đơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Khoản 10 Điều 7 Luật Thuế giá trị gia tăng và được hướng dẫn chi tiết tại Điều 4 Nghị định 181/2025/NĐ-CP, đối với hoạt động kinh doanh bất động sản, giá tính thuế GTGT là giá chuyển nhượng bất động sản trừ (-) giá đất được trừ để tính thuế GTGT.Công thức xác định giá tính thuế:Giá tính thuế GTGT = Giá chuyển nhượng - Giá đất được trừ, Giá đất được trừ bao gồm các khoản mục như: tiền sử dụng đất nộp ngân sách, tiền thuê đất, chi phí bồi thường giải phóng mặt bằng theo phương án đã phê duyệt.."}, {"level": "1", "content": "Theo quy định tại Luật Thuế sử dụng đất phi nông nghiệp và các nguyên tắc định giá đất mới tại Luật Đất đai 2024, số thuế phải nộp đối với đất ở (bao gồm cả trường hợp sử dụng đất vào mục đích kinh doanh) được xác định dựa trên các căn cứ nào sau đây?", "options": {"A": "Giá trị giao dịch thực tế của bất động sản trên thị trường tại thời điểm tính thuế và mục đích sử dụng.", "B": "Diện tích đất thực tế sử dụng và giá một mét vuông đất theo Bảng giá đất do cấp tỉnh ban hành.", "C": "Tổng giá trị tài sản hiện hữu bao gồm quyền sử dụng đất và các công trình xây dựng gắn liền với đất.", "D": "Doanh thu hàng năm từ việc khai thác tài sản trên đất hoặc giá thuê đất thực tế trên thị trường."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Công thức tính thuế (Điều 5, 6, 7 Luật Thuế sử dụng đất phi nông nghiệp):Số thuế phải nộp được xác định bằng công thức: Số thuế phải nộp = Diện tích đất tính thuế x Giá của 1m^2 đất x Thuế suất. Giá của 1m^2 đất là giá đất theo Bảng giá đất do UBND cấp tỉnh ban hành tương ứng với mục đích sử dụng đất và được ổn định theo chu kỳ 05 năm. Theo Luật Đất đai 2024, Bảng giá đất được xây dựng theo nguyên tắc thị trường và cập nhật hàng năm. Tuy nhiên, giá đất để tính thuế sử dụng đất phi nông nghiệp vẫn được giữ ổn định trong chu kỳ 05 năm kể từ ngày 01/01/2026 để tránh gây áp lực tài chính đột ngột cho người dân và doanh nghiệp. Thuế suất đối với đất ở được áp dụng theo biểu thuế lũy tiến từng phần:Diện tích trong hạn mức: 0,03%. Diện tích vượt không quá 3 lần hạn mức: 0,07%. Diện tích vượt trên 3 lần hạn mức: 0,15%. Riêng đất sử dụng không đúng mục đích hoặc đất lấn, chiếm: Thuế suất là 0,15%.."}, {"level": "1", "content": "Trong giao dịch chuyển nhượng bất động sản (trừ trường hợp chuyển nhượng QSDĐ của hộ gia đình, cá nhân), bên bán phải đóng Thuế Thu nhập cá nhân là 2% trên giá chuyển nhượng ghi trên hợp đồng. Tuy nhiên, trường hợp nào bên bán có thể được miễn thuế thu nhập cá nhân?", "options": {"A": "Cá nhân chuyển nhượng bất động sản là tài sản hình thành trong tương lai và đã thanh toán đủ 100% giá trị hợp đồng.", "B": "Cá nhân chuyển nhượng bất động sản là quà tặng hoặc thừa kế từ người không có quan hệ huyết thống nhưng có di chúc hợp pháp.", "C": "Cá nhân chuyển nhượng nhà ở, đất ở duy nhất và có thời gian sở hữu tính đến thời điểm chuyển nhượng tối thiểu 183 ngày.", "D": "Cá nhân thực hiện giao dịch chuyển nhượng có giá trị dưới 1 tỷ đồng và bên mua cam kết tự nguyện nộp thay các khoản thuế."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo quy định tại khoản 1 Điều 3 của thông tư 111/2013/TT-BTC, bên bán có duy nhất một bất động sản và đã sở hữu trên 183 ngày được miễn nộp thu nhập cá nhân khi chuyển nhượng. Việc miễn thuế đối với \"Nhà ở duy nhất\" là một chính sách nhân văn nhưng kèm theo các điều kiện xác minh rất ngặt nghèo, đặc biệt là khi hệ thống dữ liệu quốc gia về dân cư và đất đai đã liên thông:Ba điều kiện bắt buộc để được miễn thuế (Điều 3 Thông tư 111/2013/TT-BTC): (1) Chỉ có duy nhất quyền sở hữu một nhà ở hoặc quyền sử dụng một thửa đất ở (bao gồm cả trường hợp có nhà ở trên thửa đất đó) tại thời điểm chuyển nhượng. (2) Có quyền sở hữu nhà ở, quyền sử dụng đất ở tính đến thời điểm chuyển nhượng tối thiểu là 183 ngày (tương đương 6 tháng). (3) Chuyển nhượng toàn bộ nhà ở, đất ở. Trường hợp cá nhân có chung quyền sở hữu nhà ở, đất ở nhưng chỉ chuyển nhượng phần quyền của mình thì không được miễn thuế (trừ khi phần quyền đó là tài sản duy nhất). Quà tặng/thừa kế chỉ được miễn thuế nếu diễn ra giữa những người có quan hệ hôn nhân, huyết thống hoặc nuôi dưỡng (theo Khoản 4 Điều 4 Luật Thuế TNCN). Giữa người lạ (dù có di chúc) vẫn phải nộp thuế 10%."}, {"level": "1", "content": "Khi giao dịch mua bán nhà đất, bên mua phải đóng lệ phí trước bạ với mức 0,5% trên giá đất theo bảng giá đất, lỗi thường gặp khi tính lệ phí trước bạ là:", "options": {"A": "Tính lệ phí dựa trên tổng diện tích sàn xây dựng thực tế thay vì diện tích đất ghi trên Giấy chứng nhận.", "B": "Trường hợp nào cũng tính theo giá thị trường thay vì theo bảng giá đất do UBND quy định.", "C": "Nhầm lẫn giữa mức thu 0,5% của bất động sản với mức thu đối với các loại tài sản là phương tiện vận tải.", "D": "Kê khai theo Bảng giá đất của UBND cấp tỉnh trong khi giá trên hợp đồng chuyển nhượng cao hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lỗi thường gặp là tính lệ phí trước bạ dựa trên giá thị trường thay vì sử dụng bảng giá đất do UBND cấp tỉnh ban hành, dẫn đến sai lệch trong số thuế phải nộp. Điều 7 Nghị định 10/2022/NĐ-CP quy định giá tính lệ phí trước bạ đối với đất là giá tại Bảng giá đất do UBND tỉnh, thành phố trực thuộc trung ương ban hành tại thời điểm kê khai. Tuy nhiên: Trường hợp giá đất tại hợp đồng chuyển nhượng cao hơn giá do UBND cấp tỉnh ban hành thì giá tính lệ phí trước bạ là giá tại hợp đồng chuyển nhượng. Trường hợp giá đất tại hợp đồng chuyển nhượng thấp hơn giá do UBND cấp tỉnh ban hành thì giá tính lệ phí trước bạ là giá do UBND cấp tỉnh ban hành. Tóm lại: Cơ quan thuế luôn chọn giá cao nhất giữa Hợp đồng và Bảng giá đất để thu phí. Lựa chọn D sai nhưng đó là hành vi kê khai, không phải tính lệ phí."}, {"level": "1", "content": "Trong thực tế giao dịch bất động sản chưa đủ điều kiện pháp lý (như đất phân lô trái phép, nhà chưa có sổ hồng...), các bên thường sử dụng hình thức lập Vi bằng tại Văn phòng Thừa phát lại để ghi nhận việc giao nhận tiền và ký kết giấy tay. Theo quy định tại Nghị định 08/2020/NĐ-CP và tinh thần Luật Đất đai 2024, hệ quả pháp lý của hành vi này là gì?", "options": {"A": "Vi bằng có giá trị thay thế văn bản công chứng, chứng thực trong việc thực hiện thủ tục đăng ký biến động đất đai tại cơ quan nhà nước.", "B": "Vi bằng chỉ có giá trị là chứng cứ chứng minh có việc giao nhận tiền, không có giá trị xác lập quyền sử dụng đất và không phải là căn cứ để sang tên Sổ hồng.", "C": "Vi bằng là một hình thức \"Công chứng rút gọn\" dành riêng cho các bất động sản có giá trị thấp hoặc nằm trong khu vực chưa có quy hoạch chi tiết.", "D": "Người mua được quyền yêu cầu tòa án công nhận quyền sở hữu tài sản ngay sau khi Vi bằng được đăng ký tại Sở Tư pháp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Khoản 3 Điều 2 Nghị định 08/2020/NĐ-CP, Vi bằng là văn bản ghi nhận sự kiện, hành vi có thật do Thừa phát lại trực tiếp chứng kiến. Ví dụ: Thừa phát lại chứng kiến \"Ông A đưa cho ông B 1 tỷ đồng\". Vi bằng này có giá trị làm chứng cứ tại Tòa án nếu sau này ông B chối rằng mình chưa nhận tiền. Nó không xác nhận việc \"Quyền sử dụng đất đã chuyển từ A sang B\". Theo Luật Công chứng, việc công chứng hợp đồng là sự xác nhận tính hợp pháp của nội dung giao dịch. Đây là điều kiện bắt buộc (theo Điều 164 Luật Đất đai 2024) để giao dịch bất động sản có hiệu lực và được cơ quan Đăng ký đất đai chấp nhận làm thủ tục \"sang tên\". Căn cứ Điều 37 Nghị định 08/2020/NĐ-CP, Thừa phát lại không được lập vi bằng để xác lập giao dịch chuyển nhượng quyền sử dụng đất, tài sản gắn liền với đất mà theo quy định phải công chứng, chứng thực. Nếu cố tình lập vi bằng để \"lách luật\" chuyển nhượng nhà đất, vi bằng đó có thể bị tuyên vô hiệu và Thừa phát lại sẽ bị xử lý vi phạm. ."}, {"level": "1", "content": "Đối tượng nào sau đây có nghĩa vụ nộp Phí thẩm định hồ sơ khi thực hiện thủ tục liên quan đến Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất?", "options": {"A": "Tất cả các hộ gia đình, cá nhân đang sử dụng đất ổn định và đã có tên trong bản đồ địa chính của địa phương.", "B": "Cá nhân, tổ chức nộp hồ sơ đề nghị cấp lần đầu, cấp đổi, cấp lại hoặc đăng ký biến động đất đai mà cơ quan nhà nước phải thực hiện công tác thẩm định điều kiện theo quy định.", "C": "Người thực hiện quyền thừa kế bất động sản từ cha mẹ sang con cái (đối tượng thuộc diện miễn thuế và lệ phí).", "D": "Chủ đầu tư các dự án nhà ở xã hội khi thực hiện bàn giao căn hộ cho khách hàng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khác với Lệ phí cấp giấy (là khoản tiền cố định và thấp để trả cho phôi bằng), Phí thẩm định là khoản thu nhằm bù đắp chi phí cho công việc của cơ quan nhà nước khi tiến hành kiểm tra, đối soát hồ sơ, đo đạc, xác minh thực địa và các điều kiện pháp lý để cấp sổ. Mức phí này không thống nhất trên toàn quốc mà do Hội đồng nhân dân cấp tỉnh quy định căn cứ vào: Quy mô diện tích của thửa đất, Tính chất phức tạp của hồ sơ (cấp lần đầu thường cao hơn cấp đổi), Mục đích sử dụng đất (đất kinh doanh thường có mức phí cao hơn đất ở).."}, {"level": "1", "content": "Tình huống: Ông A chuyển nhượng cho ông B một căn nhà chưa có sổ hồng tại Bình Dương (nay thuộc TP.HCM) thông qua hình thức lập Vi bằng ghi nhận việc giao nhận tiền và bàn giao nhà. Ông B đã thanh toán 100% giá trị giao dịch và dọn vào ở. Sau 1 năm, giá đất tăng phi mã, ông A khởi kiện yêu cầu Tòa án tuyên bố giao dịch vô hiệu do vi phạm hình thức (không công chứng) để đòi lại nhà. Ông B phản tố, yêu cầu Tòa án công nhận giao dịch theo Điều 129 Bộ luật Dân sự 2015 vì đã thực hiện xong nghĩa vụ tài chính. Tòa án sẽ giải quyết theo hướng nào sau đây?", "options": {"A": "Công nhận quyền sở hữu cho ông B vì Vi bằng là chứng cứ pháp lý xác thực và ông B đã thực hiện xong 100% nghĩa vụ thanh toán, việc áp dụng Điều 129 để công nhận giao dịch là khả thi vì bên mua đã thanh toán hơn 2/3 nghĩa vụ tài chính.", "B": "Tuyên giao dịch vô hiệu do vi phạm điều cấm của Luật Đất đai và Luật Kinh doanh BĐS; buộc các bên hoàn trả cho nhau những gì đã nhận mà không xem xét đến thiệt hại.", "C": "Tuyên giao dịch vô hiệu về hình thức; Vi bằng chỉ được dùng để xác định số tiền gốc và lãi (nếu có) mà ông A phải trả lại cho ông B; việc áp dụng Điều 129 để công nhận giao dịch là rất khó khả thi nếu bất động sản đó chưa đủ điều kiện cấp sổ.", "D": "Yêu cầu hai bên đi công chứng bổ sung trong thời hạn 30 ngày; nếu không thực hiện được thì mới tuyên vô hiệu."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 129 Bộ luật Dân sự 2015: Nhiều người kỳ vọng vào Khoản 2 Điều 129: \"Giao dịch dân sự đã được xác lập bằng văn bản nhưng vi phạm quy định bắt buộc về công chứng, chứng thực mà một bên hoặc các bên đã thực hiện ít nhất hai phần ba nghĩa vụ trong giao dịch thì theo yêu cầu của một bên... Tòa án ra quyết định công nhận hiệu lực của giao dịch đó.\" Tuy nhiên: Tòa án tối cao thường định hướng rằng Điều 129 chỉ áp dụng để \"cứu\" các giao dịch mà đối tượng tài sản đã đủ điều kiện giao dịch nhưng các bên sơ suất về hình thức. Thực tế, các giao dịch qua Vi bằng thường là bất động sản \"yếu\" pháp lý (đất chưa có sổ, đất nông nghiệp phân lô trái phép). Nếu tài sản đó ngay từ đầu đã không đủ điều kiện để cấp Sổ hồng theo Luật Đất đai, thì Tòa án không thể áp dụng Điều 129 để công nhận một giao dịch trái luật về nội dung."}, {"level": "1", "content": "Một giao dịch chuyển nhượng HĐMB nhà ở hình thành trong tương lai được các bên tự ký vào ngày 31/12/2026 nhưng đến ngày 02/01/2027 mới nộp hồ sơ cho Chủ đầu tư xác nhận. Tại thời điểm này, quy định về bãi bỏ công chứng bắt buộc đối với HĐMB nhà ở hình thành trong tương lai theo Luật Công chứng sửa đổi 2026 đã có hiệu lực. Hồ sơ này sẽ được xử lý như thế nào?", "options": {"A": "Chủ đầu tư từ chối xác nhận vì tại thời điểm ký kết (2026), luật vẫn yêu cầu phải công chứng, nên văn bản này bị lỗi hình thức không thể hồi tố.", "B": "Chủ đầu tư xác nhận bình thường vì tại thời điểm tiếp nhận hồ sơ (2027), luật đã cho phép không cần công chứng.", "C": "Việc xác định tính hợp lệ về hình thức phải căn cứ vào thời điểm xác lập giao dịch (31/12/2026); do đó hồ sơ này vẫn cần có dấu công chứng hoặc các bên phải lập lại văn bản mới vào năm 2027.", "D": "Giao dịch tự động có hiệu lực mà không cần xét đến ngày ký hay ngày xác nhận, do Luật Công chứng 2026 có tính chất ưu tiên áp dụng cho mọi hồ sơ đang xử lý."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là câu hỏi về hiệu lực thời gian. Nguyên tắc chung của pháp luật là giao dịch dân sự được xác lập tại thời điểm nào thì phải tuân thủ quy định về hình thức của thời điểm đó. Ngày 31/12/2026, quy định bắt buộc công chứng vẫn đang có hiệu lực. Để đảm bảo an toàn pháp lý và tránh bị cơ quan thuế bác hồ sơ do lỗi hình thức tại thời điểm ký, các bên nên lập lại văn bản mới vào ngày 01/01/2027 để tận dụng quy định mới của Luật Công chứng 2026."}, {"level": "1", "content": "Theo quy định của Luật Thuế thu nhập cá nhân hiện hành, khi cá nhân thực hiện giao dịch chuyển nhượng nhà ở, quyền sử dụng đất, mức thuế thu nhập cá nhân phải nộp được xác định theo phương pháp nào sau đây?", "options": {"A": "10% tính trên thu nhập chịu thuế (chênh lệch giữa giá bán và giá mua).", "B": "2% tính trên giá trị chuyển nhượng ghi trên hợp đồng hoặc giá đất theo Bảng giá đất (nếu giá hợp đồng thấp hơn).", "C": "0,5% tính trên giá trị chuyển nhượng (đây là mức thu của Lệ phí trước bạ).", "D": "25% tính trên lợi nhuận sau khi đã trừ đi các chi phí môi giới và cải tạo bất động sản."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Số thuế TNCN mà cá nhân chuyển nhượng (bên bán) phải nộp được xác định theo công thức: Thuế TNCN phải nộp = Giá chuyển nhượng x 2%. Xác định \"Giá chuyển nhượng\" (Điểm trọng yếu năm 2026):Căn cứ vào Luật Đất đai 2024 và Luật Quản lý thuế 2025, cơ quan thuế áp dụng nguyên tắc xác định giá tính thuế như sau: Là giá ghi trên hợp đồng chuyển nhượng tại thời điểm chuyển nhượng. Trường hợp \"Hai giá\": Nếu giá trên hợp đồng thấp hơn Bảng giá đất do UBND cấp tỉnh ban hành tại thời điểm đó, cơ quan thuế sẽ tính 2% dựa trên Bảng giá đất. Từ năm 2026, Bảng giá đất được xây dựng theo nguyên tắc thị trường, do đó việc kê khai giá thấp để giảm thuế sẽ dễ dàng bị hệ thống quản lý rủi ro của cơ quan thuế phát hiện và ấn định thuế."}, {"level": "1", "content": "Một doanh nghiệp kinh doanh bất động sản thực hiện nộp hồ sơ khai thuế quá thời hạn quy định từ 91 ngày trở lên nhưng không phát sinh số thuế phải nộp. Căn cứ Nghị định 125/2020/NĐ-CP, hành vi này sẽ bị xử lý như thế nào?", "options": {"A": "Chỉ bị nhắc nhở và cảnh cáo bằng văn bản do không gây thất thoát ngân sách nhà nước.", "B": "Bị xử phạt tiền từ 15.000.000 đồng đến 25.000.000 đồng về hành vi chậm nộp hồ sơ khai thuế.", "C": "Được miễn xử phạt hành chính nếu doanh nghiệp chứng minh được do lỗi hệ thống hạ tầng thông tin.", "D": "Bị cơ quan thuế phong tỏa hóa đơn điện tử ngay lập tức cho đến khi nộp đủ hồ sơ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phân bậc xử phạt theo thời gian (Điều 13 Nghị định 125/2020/NĐ-CP):Mức phạt tiền đối với hành vi chậm nộp hồ sơ khai thuế được chia làm 5 cấp độ:Từ 01 - 05 ngày: Phạt cảnh cáo (nếu có tình tiết giảm nhẹ).Từ 01 - 30 ngày: Phạt tiền từ 2.000.000 đến 5.000.000 đồng.Từ 31 - 60 ngày: Phạt tiền từ 5.000.000 đến 8.000.000 đồng.Từ 61 - 90 ngày: Phạt tiền từ 8.000.000 đến 15.000.000 đồng.Trên 90 ngày (hoặc không nộp): Phạt tiền từ 15.000.000 đến 25.000.000 đồng. Cần chú ý sự tách biệt giữa \"Hồ sơ\" và \"Tiền thuế\":Nộp chậm Hồ sơ: Phạt hành chính theo các mức trên.Nộp chậm Tiền thuế: Tính tiền chậm nộp theo mức 0,03%/ngày trên số tiền thuế chậm nộp. Kể cả khi doanh nghiệp không phát sinh doanh thu (thuế bằng 0), việc nộp chậm \"tờ khai trắng\" vẫn bị phạt tiền theo khung trên."}, {"level": "1", "content": "Căn cứ quy định tại Nghị định 10/2022/NĐ-CP về lệ phí trước bạ, mức thu lệ phí trước bạ đối với tài sản là nhà, đất khi thực hiện đăng ký quyền sở hữu, quyền sử dụng là bao nhiêu và có khống chế mức thu tối đa hay không?", "options": {"A": "1% trên giá trị tài sản và không khống chế mức thu tối đa.", "B": "0,5% trên giá trị tài sản, mức thu tối đa là 500 triệu đồng", "C": "2% trên giá trị tài sản và khống chế mức thu tối đa là 1 tỷ đồng/tài sản/lần trước bạ.", "D": "5% trên giá trị tài sản và không khống chế mức thu tối đa."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Khoản 1 Điều 8 Nghị định 10/2022/NĐ-CP, mức thu lệ phí trước bạ đối với nhà, đất là 0,5%. Đây là mức thu ổn định và thống nhất trên toàn quốc. Theo Khoản 2 Điều 8 của Nghị định này, mức thu lệ phí trước bạ đối với các loại tài sản quy định tại Điều này (bao gồm nhà, đất, súng săn, tàu thuyền, ô tô, xe máy...) được khống chế tối đa là 500 triệu đồng cho một tài sản cho một lần trước bạ.Ngoại trừ: Nhà, đất của trụ sở cơ quan đại diện ngoại giao, cơ quan lãnh sự... được miễn hoặc có quy định riêng.."}, {"level": "1", "content": "Khi hộ gia đình, cá nhân thực hiện chuyển mục đích sử dụng từ đất nông nghiệp (được giao không thu tiền) sang đất ở trong hạn mức, quy trình thực hiện và cách xác định nghĩa vụ tài chính theo Luật Đất đai 2024 được quy định như thế nào?", "options": {"A": "Nộp hồ sơ tại UBND cấp xã; Tiền sử dụng đất nộp bằng 100% giá trị quyền sử dụng đất ở theo giá thị trường tại thời điểm nộp hồ sơ.", "B": "Nộp hồ sơ tại UBND cấp xã; Tiền sử dụng đất được tính bằng chênh lệch giữa tiền sử dụng đất tính theo loại đất mới và tiền sử dụng đất tính theo loại đất cũ tại thời điểm có quyết định cho phép chuyển mục đích.", "C": "Nộp hồ sơ tại Văn phòng đăng ký đất đai; Tiền sử dụng đất tính theo Bảng giá đất của năm 2024 nhân với hệ số điều chỉnh giá đất (Hệ số K) của năm 2026.", "D": "Tự kê khai và nộp thuế tại Chi cục Thuế; Tiền sử dụng đất được miễn giảm 50% nếu diện tích chuyển đổi dưới 100m^2."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quy trình chuyển đổi mục đích sử dụng đất gồm: chuẩn bị và nộp hồ sơ, thẩm tra – xác minh hồ sơ, hướng dẫn đóng thuế và nghĩa vụ tài chính, sau đó nhận kết quả chuyển đổi. Việc nộp hồ sơ tại bộ phận 1 cửa tại UBND cấp xã. Đây là các bước cơ bản theo quy định hiện hành. Tiền sử dụng đất khi chuyển mục đích được xác định theo Bảng giá đất hàng năm. Công thức tính cho phần diện tích trong hạn mức như sau:T_sd = (G_đất_ở - G_đất_nn) x Diện tích"}, {"level": "1", "content": "Mức thu phí đối với việc công chứng hợp đồng giao dịch bất động sản trị giá từ 100 triệu đến 1 tỷ đồng là bao nhiêu %", "options": {"A": "0,1% giá trị tài sản", "B": "0,2% giá trị tài sản", "C": "0,5% giá trị tài sản", "D": "1% giá trị tài sản"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 4 Thông tư số  257/TT-BTC ngày 11/10/2016 thì mức thu phí mức thu phí đối với việc công chứng hợp đồng, giao dịch bất động sản (BĐS) có giá trị từ 100 triệu đồng đến 1 tỷ đồng là 0,1% giá trị tài sản hoặc giá trị hợp đồng, giao dịch. Cách tính phí là: Phí công chứng = 100.000 đồng + 0,1% của phần giá trị tài sản vượt 100 triệu đồng"}, {"level": "1", "content": "Mức thu phí đối với việc công chứng hợp đồng giao dịch tài sản trị giá từ 50 triệu đến dưới 100 triệu đồng là bao nhiêu", "options": {"A": "50.000 đ", "B": "100.000 đ", "C": "0,1% giá trị tài sản", "D": "0,2% giá trị tài sản"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 4 Thông tư số  257/TT-BTC ngày 11/10/2016, mức thu phí mức thu phí đối với việc công chứng hợp đồng, giao dịch bất động sản (BĐS) có giá trị từ 50 triệu đến dưới 100 triệu đồng là 100.000 đ. Đây là mức phí cố định, không tính theo tỷ lệ phần trăm đối với các giao dịch nằm trong khung giá trị này."}, {"level": "1", "content": "Những ai được miễn thuế thu nhập cá nhân khi chuyển nhượng nhà đất?", "options": {"A": "Cá nhân sở hữu duy nhất một nhà ở tại Việt Nam trong thời hạn đúng 180 ngày.", "B": "Chuyển nhượng bất động sản giữa anh rể, chị dâu với em vợ, em chồng.", "C": "Người có quan hệ hôn nhân, huyết thống, nuôi dưỡng", "D": "Cá nhân chuyển nhượng một phần diện tích của nhà ở duy nhất tại Việt Nam."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 3 Thông tư 111/2013/TT-BTC (sửa đổi bởi khoản 1 Điều 12 Thông tư 92/2015/TT-BTC) trường hợp được miễn gồm: Giao dịch giữa người có quan hệ hôn nhân, huyết thống, nuôi dưỡng; Người chỉ có duy nhất một nhà, một thửa đất (thời gian nắm quyền sở hữu/sử dụng >183 ngày)"}, {"level": "1", "content": "Trong giao dịch chuyển nhượng bất động sản, bên bán phải nộp Thuế Thu nhập cá nhân theo mức 2% trên giá chuyển nhượng ghi trên hợp đồng. Trường hợp nào bên bán có thể được miễn nộp thuế này?", "options": {"A": "Cá nhân chuyển nhượng nhà ở duy nhất đã sở hữu và sử dụng ổn định trong thời hạn 180 ngày.", "B": "Cá nhân chuyển nhượng nhà ở duy nhất nhưng đang đứng tên quyền sử dụng 01 thửa đất nông nghiệp khác tại Việt Nam.", "C": "Cá nhân chuyển nhượng toàn bộ nhà ở duy nhất đã nắm giữ quyền sở hữu tối thiểu 183 ngày.", "D": "Cá nhân chuyển nhượng một phần diện tích của thửa đất ở duy nhất đã sở hữu trên 01 năm."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ quy định tại Khoản 2 Điều 4 Luật Thuế thu nhập cá nhân 2007 (sửa đổi, bổ sung 2014) và Điểm b Khoản 1 Điều 3 Thông tư 111/2013/TT-BTC, để được miễn thuế đối với bất động sản duy nhất, cá nhân phải thỏa mãn đồng thời 03 điều kiện nghiêm ngặt: (1) Cá nhân chỉ có quyền sở hữu, quyền sử dụng duy nhất một nhà ở hoặc một thửa đất ở (bao gồm cả trường hợp có nhà trên đất) tại Việt Nam. (2) Cá nhân phải sở hữu nhà ở, quyền sử dụng đất ở tính đến thời điểm chuyển nhượng tối thiểu là 183 ngày. (3) Việc chuyển nhượng phải được thực hiện đối với toàn bộ nhà ở, đất ở duy nhất đó."}, {"level": "1", "content": "Trong trường hợp anh H thực hiện thủ tục chuyển nhượng quyền sử dụng đất và tài sản gắn liền với đất cho vợ là chị L, nghĩa vụ tài chính đối với Nhà nước được xác định như thế nào?", "options": {"A": "Miễn Thuế TNCN và miễn Lệ phí trước bạ.", "B": "Miễn Thuế TNCN nhưng phải nộp Lệ phí trước bạ mức 0,5%.", "C": "Nộp Thuế TNCN mức 2% nhưng được miễn Lệ phí trước bạ.", "D": "Chỉ miễn Thuế TNCN nếu bất động sản là tài sản chung hình thành trong thời kỳ hôn nhân."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 4 Luật Thuế thu nhập cá nhân 2007 (sửa đổi, bổ sung 2014) quy định rõ: Thu nhập từ chuyển nhượng, quà tặng, thừa kế bất động sản giữa vợ với chồng là thu nhập được miễn thuế. Quy định này áp dụng cho cả tài sản riêng (hình thành trước hôn nhân hoặc được tặng cho riêng) và tài sản chung. Theo khoản 10 Điều 10 Nghị định 10/2022/NĐ-CP về Lệ phí trước bạ thì nhà đất nhận thừa kế hoặc là quà tặng giữa vợ với chồng được miễn lệ phí trước bạ khi đăng ký quyền sở hữu, quyền sử dụng.Nếu lập Hợp đồng mua bán, về mặt lý thuyết, cơ quan Thuế có quyền truy thu lệ phí trước bạ mức 0,5% vì giao dịch \"mua bán\" không nằm trong danh mục được miễn của Nghị định 10/2022/NĐ-CP."}, {"level": "1", "content": "Ông A ký HĐMB căn hộ với Chủ đầu tư (CĐT) X. Sau đó, ông A chuyển nhượng cho bà B. Bà B tiếp tục chuyển nhượng cho anh C. Khi anh C nộp hồ sơ đề nghị CĐT X xác nhận, CĐT phát hiện Văn bản chuyển nhượng giữa ông A và bà B bị thiếu Biên lai nộp thuế TNCN của giai đoạn đó. Tuy nhiên, Văn bản chuyển nhượng giữa bà B và anh C đã được công chứng đầy đủ và có biên lai thuế đầy đủ. CĐT X nên xử lý thế nào?", "options": {"A": "Chấp nhận xác nhận cho anh C vì giao dịch giữa bà B và anh C là hợp pháp, độc lập và đã hoàn thành nghĩa vụ thuế hiện tại.", "B": "Yêu cầu anh C nộp bổ sung biên lai thuế của ông A, nếu không có thì anh C phải nộp thay số thuế đó để được xác nhận.", "C": "Từ chối xác nhận và yêu cầu các bên hoàn thiện chuỗi chứng từ thuế liên tục; vì thiếu chứng từ thuế của công đoạn trước, chuỗi chuyển nhượng bị đứt gãy về mặt pháp lý hành chính.", "D": "Xác nhận cho anh C nhưng ghi chú vào Văn bản chuyển nhượng rằng \"Chưa đối soát thuế giai đoạn A-B\" để đẩy trách nhiệm cho cơ quan cấp sổ sau này."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 49 Luật Kinh doanh bất động sản 2023 và hướng dẫn tại Nghị định 96/2024/NĐ-CP, việc chuyển nhượng hợp đồng phải đảm bảo tính liên tục. Cơ quan thuế và CĐT chỉ chấp nhận giao dịch tiếp theo khi giao dịch trước đó đã hoàn tất nghĩa vụ tài chính với Nhà nước. Việc thiếu biên lai thuế của giai đoạn A-B khiến giao dịch B-C không có căn cứ xác lập quyền thụ hưởng hợp pháp để chuyển tiếp."}, {"level": "1", "content": "Ngày 10/05/2026, Bên bán và Bên mua ký văn bản chuyển nhượng HĐMB tại VPCC. Tuy nhiên, trước đó 02 ngày (08/05/2026), CĐT đã nộp danh sách và hồ sơ của Bên bán lên Sở Nông nghiệp và Môi trường để đề nghị cấp Giấy chứng nhận (Sổ hồng). Tại thời điểm các bên nộp hồ sơ lên CĐT đề nghị xác nhận (15/05/2026), sổ hồng vẫn chưa được cấp. Khẳng định nào sau đây là đúng nhất?", "options": {"A": "CĐT vẫn phải xác nhận vì tại thời điểm 15/05/2026, bên bán vẫn chưa nhận được sổ hồng trên tay.", "B": "CĐT có quyền và nghĩa vụ từ chối xác nhận vì quy trình chuyển nhượng HĐMB đã chấm dứt hiệu lực kể từ thời điểm CĐT nộp hồ sơ cấp sổ lên cơ quan có thẩm quyền.", "C": "Các bên phải lập biên bản hủy công chứng, sau đó CĐT thu hồi hồ sơ cấp sổ để thực hiện lại quy trình chuyển nhượng HĐMB theo yêu cầu của khách hàng.", "D": "Văn bản chuyển nhượng vẫn có hiệu lực nhưng các bên phải chờ có sổ hồng rồi mới thực hiện thủ tục đăng ký biến động tại Văn phòng đăng ký đất đai."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Khoản 2 Điều 49 Luật Kinh doanh bất động sản 2023, việc chuyển nhượng hợp đồng kinh doanh bất động sản chỉ được thực hiện khi hồ sơ đề nghị cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất chưa được nộp cho cơ quan nhà nước có thẩm quyền. Một khi CĐT đã nộp hồ sơ, quyền lợi của khách hàng đã chuyển sang giai đoạn \"chờ cấp chủ quyền\". Việc xác nhận chuyển nhượng lúc này sẽ gây chồng chéo và sai lệch dữ liệu quản lý đất đai. Các bên buộc phải chờ sổ hồng phát hành rồi mới thực hiện giao dịch chuyển nhượng tài sản có sẵn."}, {"level": "1", "content": "Một căn hộ có giá gốc trên HĐMB với CĐT là 4 tỷ VNĐ. Sau 2 năm, do thị trường sụt giảm, bên bán chuyển nhượng cho bên mua với giá thực tế là 3,5 tỷ VNĐ (lỗ 500 triệu). Các bên kê khai thuế TNCN với giá 3,5 tỷ VNĐ. Tuy nhiên, hệ thống dữ liệu giá của cơ quan thuế năm 2026 ghi nhận các căn tương tự cùng tầng đang giao dịch mức 4,2 tỷ VNĐ. Hệ quả pháp lý là gì?", "options": {"A": "Cơ quan thuế mặc định chấp nhận giá 3,5 tỷ VNĐ vì người nộp thuế có quyền bán lỗ theo quy luật thị trường.", "B": "Cơ quan thuế yêu cầu CĐT xác nhận giá 3,5 tỷ VNĐ là hợp lý thì mới tính thuế 2% trên con số này.", "C": "Cơ quan thuế có quyền tạm dừng hồ sơ để thẩm tra và ấn định giá tính thuế theo giá thị trường (ví dụ 4,2 tỷ) nếu người nộp thuế không chứng minh được tính xác thực của việc giảm giá.", "D": "Người nộp thuế được miễn thuế TNCN vì giao dịch này không phát sinh lợi nhuận (bán lỗ)."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đây là điểm cực kỳ quan trọng trong Luật Quản lý thuế 2025. Thuế TNCN trong chuyển nhượng BĐS tại Việt Nam hiện nay tính 2% trên Giá chuyển nhượng, không quan tâm đến việc lãi hay lỗ (trừ trường hợp quyết toán thuế theo thuế suất 25% trên lợi nhuận nếu có đủ hóa đơn chứng từ nhưng rất hiếm áp dụng). Theo cơ chế quản lý rủi ro năm 2026, nếu giá kê khai thấp hơn cơ sở dữ liệu quốc gia về giá BĐS, cơ quan thuế có quyền ấn định thuế theo giá thị trường trừ khi các bên chứng minh được các yếu tố đặc thù làm giảm giá trị tài sản (như lỗi phong thủy, nhà hư hỏng nặng...). Việc bán lỗ không đồng nghĩa với việc được kê khai giá thấp hơn khung giá quản lý để giảm thuế."}, {"level": "1", "content": "Theo quy định tại Nghị định 96/2024/NĐ-CP, kể từ ngày nhận đủ hồ sơ hợp lệ từ bên nhận chuyển nhượng, Chủ đầu tư (CĐT) có trách nhiệm xác nhận vào văn bản chuyển nhượng hợp đồng trong thời hạn bao lâu? Nếu quá thời hạn mà không thực

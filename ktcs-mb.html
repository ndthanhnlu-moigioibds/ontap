trợ, tái định cư và việc bố trí tái định cư phải được hoàn thành trước khi có quyết định thu hồi đất.\" Điều 102: Quy định về việc bố trí tái định cư cho người có đất ở bị thu hồi. Theo đó, nếu người dân bị thu hồi đất ở mà không còn chỗ ở nào khác thì phải được bố trí vào khu tái định cư đã hoàn thiện hạ tầng kỹ thuật và hạ tầng xã hội (đường, điện, nước, trạm y tế, trường học...)."}, {"level": "1", "content": "Trường hợp nào sau đây KHÔNG được cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất theo Điều 151 Luật đất đai 2024?", "options": {"A": "Đất nông nghiệp sử dụng vào mục đích công ích của xã, phường, thị trấn (Quỹ đất 5%).", "B": "Đất được Nhà nước giao cho tổ chức để sử dụng vào mục đích xây dựng trụ sở cơ quan hoặc công trình sự nghiệp.", "C": "Đất ở của cá nhân, hộ gia đình đã sử dụng ổn định mua bằng “giấy tay” từ trước ngày 01/07/2014 và không có tranh chấp.", "D": "Nhà ở được xây dựng trên đất ở hợp pháp và đã hoàn thành thủ tục nghiệm thu, hoàn công theo quy định."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Điều 151 liệt kê các trường hợp không Giấy chứng nhận quyền sử dụng đất (LURC), bao gồm đất nông nghiệp thuộc quỹ công ích.   Đất công ích (quỹ đất 5%) là tài sản công thuộc quản lý của UBND cấp xã nhằm phục vụ các nhu cầu công cộng của địa phương. Người dân chỉ được thuê để sản xuất nông nghiệp, nuôi trồng thủy sản theo hình thức đấu giá thuê đất, hoàn toàn không được công nhận quyền sở hữu lâu dài. Khi một người dân chào bán đất nông nghiệp nhưng không có sổ, chỉ có hợp đồng thuê với xã hoặc phiếu thu sản vật hằng năm, môi giới phải kiểm tra ngay bản đồ địa chính. Nếu đó là đất công ích, tuyệt đối không nhận ký gửi vì loại đất này không thể ra sổ và không thể chuyển nhượng."}, {"level": "1", "content": "Theo các chuyên gia và cơ quan quản lý, thách thức lớn nhất đối với Ủy ban nhân dân cấp tỉnh khi xây dựng và ban hành Bảng giá đất hằng năm (áp dụng từ 01/01/2026) theo Luật Đất đai 2024 là gì?", "options": {"A": "Khó khăn trong việc huy động kinh phí để in ấn, niêm yết bảng giá mới tại các xã, phường.", "B": "Yêu cầu cấp bách về nguồn lực chuyên môn, hệ thống cơ sở dữ liệu giá đất thị trường đầy đủ, cập nhật và năng lực phân tích, định giá theo thời gian thực.", "C": "Sự phản ứng của người dân khi phải thường xuyên tra cứu và cập nhật các con số mới hằng năm.", "D": "Việc phối hợp giữa các cơ quan ban ngành trong việc thẩm định hồ sơ đất đai bị chậm lại do áp lực thời gian.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc cập nhật hàng năm đòi hỏi năng lực thu thập, phân tích thông tin thị trường và định giá phải được nâng cao đáng kể. Để có một bảng giá đất sát thị trường hằng năm, các địa phương phải đối mặt với 3 bài toán lớn: (1) Bài toán Dữ liệu (Big Data): Trước đây, chúng ta định giá dựa trên khung có sẵn. Nay, khi bỏ khung, Nhà nước phải thu thập hàng triệu giao dịch thực thực tế từ Văn phòng Đăng ký đất đai, Văn phòng Công chứng và các sàn giao dịch. Việc xây dựng một \"Bản đồ giá đất\" (Price Map) sống động, chính xác đến từng vị trí là một khối lượng công việc khổng lồ. (2) Bài toán Nhân lực: Định giá đất hằng năm đòi hỏi đội ngũ cán bộ địa chính và các đơn vị tư vấn phải có trình độ thẩm định giá chuyên nghiệp, am hiểu thị trường, thay vì chỉ làm công tác hành chính thuần túy. (3) Bài toán Công nghệ: Năm 2026, nếu không có hệ thống GIS (Geographic Information System) và trí tuệ nhân tạo (AI) hỗ trợ xử lý dữ liệu, việc ban hành bảng giá mới trước ngày 01/01 hằng năm cho hàng triệu thửa đất là điều bất khả thi."}, {"level": "1", "content": "Theo quy định tại Điều 161 Luật Đất đai 2024, Hội đồng thẩm định giá đất cụ thể (do UBND cấp tỉnh thành lập) có vai trò chính là gì trong quy trình định giá đất?", "options": {"A": "Trực tiếp thực hiện việc điều tra, khảo sát thông tin thị trường và tính toán để đưa ra con số giá đất cụ thể cho từng thửa đất.", "B": "Có thẩm quyền ký quyết định cuối cùng về việc phê duyệt giá đất cụ thể để áp dụng chính thức vào các giao dịch hành chính.", "C": "Thẩm định tính hợp lý, tính pháp lý của phương án giá đất do cơ quan tài nguyên và môi trường lập hoặc do tổ chức tư vấn định giá thực hiện trước khi trình UBND quyết định.", "D": "Đại diện cho người dân trong vùng dự án để đàm phán giá đền bù với chủ đầu tư và cơ quan nhà nước.."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Hội đồng có vai trò thẩm định, đánh giá tính hợp lý, pháp lý của phương án giá đất, đảm bảo tính khách quan trước khi trình cấp có thẩm quyền quyết định. Hội đồng thẩm định giá đất cụ thể đóng vai trò là \"màng lọc\" chuyên môn quan trọng nhất: Tính độc lập và khách quan: Hội đồng không làm thay việc của đơn vị tư vấn (đi khảo sát) hay việc của UBND (phê duyệt). Hội đồng có trách nhiệm kiểm tra xem phương án giá đất có tuân thủ đúng 04 phương pháp định giá theo luật định hay không và dữ liệu đầu vào có đủ độ tin cậy hay không. Thành phần chuyên gia: Theo Luật 2024, Hội đồng phải có sự tham gia của các tổ chức tư vấn định giá đất và các chuyên gia định giá độc lập. Điều này giúp loại bỏ yếu tố chủ quan của cơ quan hành chính, đảm bảo giá đất cụ thể sát với thực tế thị trường nhất."}, {"level": "1", "content": "Thời hiệu xử phạt vi phạm hành chính trong lĩnh vực đất đai là bao lâu?", "options": {"A": "6 tháng.", "B": "1 năm.", "C": "2 năm.", "D": "5 năm."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 4 Nghị định 123/2024 (hướng dẫn Điều 244 Luật 2024) quy định thời hiệu xử phạt là 02 năm."}, {"level": "1", "content": "Đối với cá nhân sử dụng đất, việc nắm vững quy trình và quyền lợi liên quan đến thu hồi đất theo Luật Đất đai 2024 có ý nghĩa quan trọng nhất như thế nào?", "options": {"A": "Giúp người sử dụng đất có cơ sở để đòi hỏi mức bồi thường vượt quá khung giá thị trường nhằm trục lợi từ dự án công cộng.", "B": "Để chủ động bảo vệ quyền lợi hợp pháp về bồi thường, hỗ trợ, tái định cư; đồng thời thực hiện đúng các thủ tục, trình tự khiếu nại nếu phát hiện sai sót trong quá trình thực thi.", "C": "Nhằm giúp người dân có kỹ năng trì hoãn việc bàn giao mặt bằng, gây khó khăn cho chủ đầu tư để thương lượng thêm các điều kiện ngoài luật.", "D": "Để người dân có thể tự mình đứng ra thỏa thuận giá bồi thường trực tiếp với các đơn vị thi công dự án hạ tầng cấp quốc gia.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Hiểu biết pháp luật giúp người dân bảo vệ quyền lợi chính đáng của mình trong quá trình thu hồi đất. Luật 2024 tạo ra một hành lang pháp lý minh bạch để cá nhân thực hiện quyền tự bảo vệ: (1) Quyền được thông tin (Điều 87): Trước khi thu hồi, Nhà nước phải thông báo ít nhất 90 ngày (đất nông nghiệp) và 180 ngày (đất phi nông nghiệp). Nếu không nắm rõ, người dân dễ bị bất ngờ và không kịp chuẩn bị phương án di dời. (2) Quyền được tham gia (Điều 91): Người dân được quyền tham gia họp, đóng góp ý kiến vào Phương án bồi thường, hỗ trợ, tái định cư. (3) Quyền khiếu nại (Điều 236): Nếu thấy việc kiểm đếm sai diện tích, loại đất hoặc giá bồi thường chưa sát thực tế, người dân có quyền khiếu nại theo đúng trình tự pháp luật thay vì có các hành động tiêu cực."}, {"level": "1", "content": "Dựa trên quy định tại Điều 4 Luật Kinh doanh bất động sản 2023 và các nguyên tắc bảo đảm đầu tư tại Luật Đầu tư 2025, nội dung nào sau đây KHÔNG phải là nguyên tắc cơ bản của hoạt động kinh doanh bất động sản?", "options": {"A": "Công khai, minh bạch thông tin về bất động sản và dự án bất động sản đưa vào kinh doanh.", "B": "Tự do thỏa thuận trên cơ sở tôn trọng quyền và lợi ích hợp pháp của các bên thông qua hợp đồng, không vi phạm điều cấm của luật.", "C": "Ưu tiên tối đa hóa lợi nhuận cho chủ đầu tư và nhà thầu nhằm thúc đẩy tăng trưởng kinh tế nhanh.", "D": "Tổ chức, cá nhân kinh doanh bất động sản phải tuân thủ đầy đủ các điều kiện về năng lực tài chính và điều kiện đối với loại bất động sản đưa vào kinh doanh."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật pháp được xây dựng để cân bằng lợi ích giữa Nhà nước - Nhà đầu tư - Người dân. Việc \"tối đa hóa lợi nhuận\" là mục tiêu kinh doanh riêng của doanh nghiệp, không bao giờ được coi là nguyên tắc pháp lý. Nếu ưu tiên lợi nhuận tối đa, các chủ đầu tư có thể cắt xén quy trình, vi phạm quy hoạch hoặc xâm phạm quyền lợi khách hàng. Luật Kinh doanh BĐS 2023 (Điều 4): Nhấn mạnh vào tính Trung thực, Công khai và Minh bạch. Đặc biệt, Luật 2023 yêu cầu mọi thông tin dự án phải được công khai trên hệ thống thông tin nhà ở và thị trường BĐS trước khi mở bán. Luật Đầu tư 2025: Nhấn mạnh vào Đầu tư bền vững và Trách nhiệm xã hội. Các dự án năm 2026 được xét duyệt dựa trên sự hài hòa giữa lợi ích kinh tế và bảo vệ môi trường, xã hội chứ không chỉ là con số lợi nhuận."}, {"level": "1", "content": "Theo quy định tại Điều 9 Luật Kinh doanh bất động sản 2023, tổ chức, cá nhân khi thực hiện hoạt động kinh doanh bất động sản (trừ trường hợp cá nhân kinh doanh quy mô nhỏ, không thường xuyên) bắt buộc phải đáp ứng điều kiện nào về hình thức tổ chức chủ thể?", "options": {"A": "Chỉ cần thực hiện đăng ký Hộ kinh doanh cá thể tại UBND cấp xã nơi có bất động sản.", "B": "Phải thành lập doanh nghiệp theo pháp luật về doanh nghiệp hoặc thành lập hợp tác xã, liên hiệp hợp tác xã theo pháp luật về hợp tác xã.", "C": "Có thể hoạt động dưới danh nghĩa cá nhân nếu chứng minh được năng lực tài chính bằng số dư tài khoản ngân hàng.", "D": "Bắt buộc phải thành lập Công ty cổ phần để đảm bảo khả năng huy động vốn trên thị trường chứng khoán."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật Kinh doanh BĐS 2023 (Điều 9): Quy định rõ tổ chức, cá nhân phải thành lập doanh nghiệp hoặc hợp tác xã. Điều này nhằm mục đích quản lý thuế, nghĩa vụ tài chính và trách nhiệm bảo hành nhà ở chuyên nghiệp hơn. Luật Đầu tư 2025 yêu cầu các dự án đầu tư bất động sản phải có chủ thể là pháp nhân đủ năng lực để thực hiện các cam kết về ký quỹ và bảo lãnh ngân hàng. Một hộ kinh doanh cá thể sẽ không đủ tư cách để làm chủ đầu tư dự án theo quy chuẩn mới.."}, {"level": "1", "content": "Chủ đầu tư dự án bất động sản có quy mô sử dụng đất dưới 20 ha phải đảm bảo vốn chủ sở hữu tối thiểu là bao nhiêu phần trăm tổng vốn đầu tư theo Luật Kinh doanh bất động sản 2023?", "options": {"A": "10%", "B": "15%", "C": "20%", "D": "25%"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Kinh doanh bất động sản 2023 (Khoản 2 Điều 9)quy định chủ đầu tư dự án bất động sản phải có vốn chủ sở hữu không thấp hơn 20% tổng vốn đầu tư đối với dự án có quy mô sử dụng đất dưới 20 ha. Dự án >= 20 ha: Vốn chủ sở hữu >= 15% tổng vốn đầu tư."}, {"level": "1", "content": "Chủ đầu tư dự án bất động sản có quy mô sử dụng đất từ 20 ha trở lên phải đảm bảo vốn chủ sở hữu tối thiểu là bao nhiêu phần trăm tổng vốn đầu tư theo Luật Kinh doanh bất động sản 2023?", "options": {"A": "10%", "B": "15%", "C": "20%", "D": "25%"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật Kinh doanh bất động sản 2023(Khoản 2 Điều 9) quy định chủ đầu tư dự án bất động sản phải có vốn chủ sở hữu không thấp hơn 15% tổng vốn đầu tư đối với dự án có quy mô sử dụng đất từ 20 ha trở lên."}, {"level": "1", "content": "Theo quy định của Luật Đầu tư 2025 và cơ cấu hành chính mới từ 1.7.2025, đối với các dự án bất động sản thuộc thẩm quyền chấp thuận chủ trương đầu tư của cấp Tỉnh, nhà đầu tư phải nộp hồ sơ dự án tại cơ quan nào và quy trình tham vấn cấp dưới được thực hiện như thế nào?", "options": {"A": "Nộp tại Văn phòng UBND cấp Tỉnh; Văn phòng sẽ gửi hồ sơ về các Phòng chuyên môn cấp Xã để thẩm định trực tiếp.", "B": "Nộp tại Sở Tài chính (cơ quan hợp nhất); Sở Tài chính sẽ chủ trì thẩm định và lấy ý kiến tham vấn của UBND cấp Xã nơi có đất về thực trạng hiện trường và tác động cộng đồng.", "C": "Nộp trực tiếp tại UBND cấp Xã nơi có dự án để sơ tuyển; sau đó Xã trình lên Sở Tài chính để phê duyệt cấp Giấy chứng nhận đăng ký đầu tư.", "D": "Nộp tại Sở Xây dựng; Sở Xây dựng phối hợp với các Hội đồng nhân dân cấp Tỉnh để bỏ phiếu thông qua chủ trương đầu tư.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Về cơ quan đầu mối: Tại các tỉnh/thành phố trực thuộc Trung ương từ 1.7.202, Sở Tài chính là cơ quan tiếp nhận hồ sơ \"một cửa liên thông\" cho các dự án đầu tư (thay thế vai trò của Sở KH&ĐT cũ). Việc gộp này giúp việc đánh giá năng lực tài chính của nhà đầu tư và khả năng cân đối nguồn lực của địa phương được thực hiện đồng thời, rút ngắn 30-40% thời gian thẩm định.Về cơ chế 2 cấp: Do không còn cấp Huyện, quy trình tham vấn được thực hiện trực tiếp: Tỉnh (Sở Tài chính) => Xã (UBND cấp Xã). UBND cấp Xã đóng vai trò cực kỳ quan trọng trong việc xác nhận \"hơi thở\" của dự án tại địa bàn: từ tranh chấp đất đai cục bộ đến nguyện vọng của cộng đồng dân cư.."}, {"level": "1", "content": "Theo quy định tại Luật Đầu tư 2025 (có hiệu lực từ 01/03/2026), nhà đầu tư phải thực hiện biện pháp nào sau đây để bảo đảm thực hiện dự án sau khi được UBND cấp Tỉnh chấp thuận chủ trương đầu tư đồng thời với chấp thuận nhà đầu tư?", "options": {"A": "Chỉ được phép nộp tiền mặt vào tài khoản tạm giữ của UBND cấp Xã nơi có đất thực hiện dự án.", "B": "Phải ký quỹ hoặc có bảo lãnh của tổ chức tín dụng về nghĩa vụ ký quỹ để bảo đảm thực hiện dự án đầu tư.", "C": "Nộp bản sao Giấy chứng nhận quyền sử dụng đất của các dự án khác mà nhà đầu tư đang sở hữu để làm tài sản thế chấp.", "D": "Ký cam kết bằng văn bản với Sở Tài chính về việc sẽ triển khai dự án đúng tiến độ mà không cần biện pháp tài chính đi kèm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật Đầu tư 2025: Tiếp tục kế thừa và minh bạch hóa cơ chế bảo đảm thực hiện dự án. Nhà đầu tư có 02 lựa chọn: (1) Ký quỹ: Nộp một khoản tiền cụ thể vào tài khoản của cơ quan nhà nước (Sở Tài chính chủ trì). (2) Bảo lãnh ngân hàng: Tổ chức tín dụng cam kết nộp thay nếu nhà đầu tư vi phạm. Mức bảo đảm: Thường dao động từ 1% đến 3% vốn đầu tư của dự án (tùy quy mô và lĩnh vực ưu đãi). Sau đó, theo cơ chế 2 cấp: Việc thực hiện ký quỹ được xác nhận tại Sở Tài chính (Tỉnh). Sau khi có xác nhận này, hồ sơ mới được chuyển về UBND cấp Xã để thực hiện các thủ tục bàn giao mặt bằng và giám sát thi công thực tế.."}, {"level": "1", "content": "Theo Luật Đầu tư 2025, nhà đầu tư KHÔNG phải thực hiện biện pháp ký quỹ hoặc bảo lãnh ngân hàng để bảo đảm thực hiện dự án trong trường hợp nào sau đây?", "options": {"A": "Dự án đầu tư xây dựng nhà ở thương mại quy mô lớn tại các đô thị loại đặc biệt.", "B": "Dự án trúng đấu giá quyền sử dụng đất hoặc trúng đấu thầu lựa chọn nhà đầu tư thực hiện dự án có sử dụng đất.", "C": "Dự án có tổng vốn đầu tư trên 10.000 tỷ đồng nhưng chưa hoàn thiện thủ tục bồi thường, giải phóng mặt bằng.", "D": "Dự án do doanh nghiệp có vốn đầu tư nước ngoài (FDI) lần đầu thực hiện tại địa phương."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 của Điều 43 Luật Đầu tư 2025: Quy định các trường hợp miễn ký quỹ để tránh tình trạng \"phí chồng phí\", cụ thể: Trúng đấu giá/đấu thầu: Vì nhà đầu tư đã phải nộp tiền đặt trước, tiền trúng đấu giá hoặc có bảo đảm dự thầu rất lớn rồi. Nhà nước giao đất, cho thuê đất trên cơ sở nhận chuyển nhượng quyền sử dụng đất: (Hình thức mua lại đất của dân). Dự án đầu tư công: Sử dụng 100% vốn ngân sách.."}, {"level": "1", "content": "Căn cứ theo quy định tại Chương II Luật Đầu tư 2025 (Số 143/2025/QH15), hình thức nào sau đây KHÔNG thuộc các hình thức đầu tư hợp pháp mà nhà đầu tư nước ngoài được phép lựa chọn tại Việt Nam?", "options": {"A": "Đầu tư thành lập tổ chức kinh tế (100% vốn nước ngoài hoặc liên doanh).", "B": "Đầu tư góp vốn, mua cổ phần, mua phần vốn góp của tổ chức kinh tế Việt Nam.", "C": "Nhận chuyển nhượng quyền sử dụng đất nông nghiệp từ hộ gia đình, cá nhân để tự do chuyển đổi mục đích sang đất ở hoặc đất công nghiệp.", "D": "Đầu tư theo hình thức hợp đồng hợp tác kinh doanh (BCC) để phân chia lợi nhuận, phân chia sản phẩm."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Đầu tư 2025 (Điều 21): Quy định các hình thức đầu tư chính thống bao gồm: Thành lập tổ chức kinh tế; Góp vốn/mua cổ phần; Thực hiện dự án đầu tư; Hợp đồng BCC và các hình thức mới về đầu tư mạo hiểm (nếu có). Luật này có sự giao thoa với Luật Đất đai 2024: Nhà đầu tư nước ngoài (tổ chức kinh tế có vốn đầu tư nước ngoài) chỉ được tiếp cận đất đai thông qua việc Nhà nước giao đất, cho thuê đất hoặc nhận chuyển nhượng dự án từ chủ đầu tư khác. Việc cá nhân nước ngoài hoặc tổ chức FDI trực tiếp mua đất nông nghiệp của dân để \"tự do chuyển đổi\" là vi phạm nghiêm trọng quy định về đối tượng sử dụng đất tại Điều 4 Luật Đất đai 2024."}, {"level": "1", "content": "Theo quy định tại Luật Đầu tư 2025 và Danh mục ngành nghề hạn chế tiếp cận thị trường đối với nhà đầu tư nước ngoài, tỷ lệ sở hữu vốn điều lệ tối đa của nhà đầu tư nước ngoài trong một doanh nghiệp Kinh doanh bất động sản tại Việt Nam được quy định như thế nào?", "options": {"A": "Bị giới hạn tối đa không quá 49% vốn điều lệ để đảm bảo quyền kiểm soát cho đối tác Việt Nam.", "B": "Bị giới hạn tối đa 70% vốn điều lệ đối với các doanh nghiệp sở hữu quỹ đất tại các tỉnh duyên hải miền Trung.", "C": "Không quy định giới hạn chung về tỷ lệ sở hữu vốn; nhà đầu tư nước ngoài có thể sở hữu tới 100% vốn điều lệ (trừ các trường hợp đặc biệt như cổ phần hóa doanh nghiệp nhà nước hoặc theo điều ước quốc tế riêng biệt).", "D": "Nhà đầu tư nước ngoài bắt buộc phải liên doanh với ít nhất một pháp nhân Việt Nam và không được sở hữu quá 51% vốn điều lệ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Hiện tại, pháp luật Việt Nam (bao gồm Luật Đầu tư và các văn bản liên quan) không quy định giới hạn chung về tỷ lệ sở hữu vốn của nhà đầu tư nước ngoài trong doanh nghiệp Kinh doanh bất động sản, cho phép sở hữu tới 100% vốn, trừ các trường hợp có quy định riêng (cổ phần hóa DNNN, điều ước quốc tế).  Theo nguyên tắc \"Chọn bỏ\" (Negative List), cái gì luật không cấm hoặc không hạn chế tỷ lệ thì nhà đầu tư được làm tới 100%. Kinh doanh bất động sản không nằm trong danh mục bị khống chế tỷ lệ sở hữu (vốn điều lệ). Trong quy trình M&A (Góp vốn, mua cổ phần), nhà đầu tư nước ngoài chỉ cần thực hiện thủ tục \"Thông báo đáp ứng điều kiện góp vốn, mua cổ phần, mua phần vốn góp\" tại Sở Tài chính. Nếu doanh nghiệp không thuộc diện ảnh hưởng đến an ninh, quốc phòng, Sở sẽ chấp thuận cho sở hữu 100% vốn chỉ trong vòng 10-15 ngày làm việc."}, {"level": "1", "content": "Theo quy định tại Điều 10 Luật Kinh doanh bất động sản 2023, phạm vi hoạt động kinh doanh bất động sản của tổ chức kinh tế có vốn đầu tư nước ngoài so với tổ chức kinh tế trong nước được quy định như thế nào?", "options": {"A": "Rộng hơn tổ chức trong nước do được áp dụng các quy định ưu đãi về đầu tư theo Luật Đầu tư 2025.", "B": "Tương đương với tổ chức trong nước nhằm đảm bảo tính bình đẳng trong thu hút vốn đầu tư quốc tế.", "C": "Hẹp hơn tổ chức trong nước; chủ yếu tập trung vào việc đầu tư xây dựng dự án để bán, cho thuê, thuê mua hoặc thuê nhà ở, công trình xây dựng để cho thuê lại.", "D": "Chỉ được phép kinh doanh các dịch vụ bất động sản (môi giới, quản lý) mà không được phép trực tiếp đầu tư tạo lập bất động sản.."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Kinh doanh bất động sản 2023 quy định phạm vi Kinh doanh bất động sản của người Việt Nam định cư ở nước ngoài không phải công dân Việt Nam và tổ chức, cá nhân nước ngoài hẹp hơn so với nhà đầu tư trong nước. Điều 10 liệt kê rất cụ thể các hình thức mà tổ chức ngoại được làm. Họ KHÔNG ĐƯỢC thực hiện các hoạt động mà tổ chức trong nước làm rất dễ dàng như: Mua nhà ở, công trình xây dựng từ cá nhân để bán, cho thuê, thuê mua; Mua quyền sử dụng đất từ cá nhân để phân lô, bán nền (trừ khi thực hiện dự án xây dựng hạ tầng khu công nghiệp/nghĩa trang để chuyển nhượng/cho thuê)."}, {"level": "1", "content": "Theo quy định tại Điều 125 và Điều 126 Luật Đất đai 2024, khi Nhà nước thực hiện giao đất có thu tiền sử dụng đất để thực hiện dự án đầu tư xây dựng nhà ở thương mại trên quỹ đất đã được giải phóng mặt bằng (\"đất sạch\"), hình thức nào sau đây là hình thức phổ biến và bắt buộc phải áp dụng?", "options": {"A": "Giao đất trực tiếp không qua đấu giá, đấu thầu.", "B": "Đấu giá quyền sử dụng đất.", "C": "Đấu thầu lựa chọn nhà đầu tư.", "D": "Cho thuê đất trả tiền hàng năm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật Đất đai 2024 (Điều 125): Quy định rất rõ về việc đấu giá quyền sử dụng đất. Đây là hình thức áp dụng cho quỹ đất \"sạch\" (đã thu hồi và bồi thường xong). Đây là cách để Nhà nước thu hồi giá trị thặng dư từ đất đai một cách tối đa và công bằng nhất. Sự khác biệt với Đấu thầu (Điều 126) là: Đấu giá (phương án B) - Dùng cho đất đã bồi thường xong. Ai trả giá cao nhất thì thắng. Đấu thầu - Dùng cho đất chưa bồi thường xong hoặc các dự án đô thị lớn cần lựa chọn nhà đầu tư có năng lực quy hoạch, vận hành tốt nhất (không chỉ dựa trên giá)."}, {"level": "1", "content": "Giấy tờ nào sau đây KHÔNG bắt buộc phải có trong hồ sơ đề nghị cấp Giấy phép xây dựng cho dự án theo Luật Xây dựng và Nghị định hướng dẫn Luật Xây dựng mới nhất?", "options": {"A": "Đơn đề nghị cấp giấy phép xây dựng.", "B": "Giấy tờ chứng minh quyền sử dụng đất.", "C": "Hợp đồng mua bán nhà ở hình thành trong tương lai.", "D": "Giấy chứng nhận thẩm duyệt thiết kế về phòng cháy chữa cháy (nếu có yêu cầu)."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Hồ sơ xin cấp giấy phép xây dựng yêu cầu các giấy tờ pháp lý về đất đai, phê duyệt dự án, thiết kế, thẩm định/thẩm duyệt phòng cháy chữa cháy, môi trường.... Hợp đồng mua bán nhà ở hình thành trong tương lai là giao dịch diễn ra sau khi có giấy phép xây dựng và đủ điều kiện bán hàng. Để ký được Hợp đồng mua bán nhà ở hình thành trong tương lai (SPA), dự án phải có GPXD và đã hoàn thành phần móng (đối với chung cư) hoặc hạ tầng (đối với nhà ở thấp tầng). Do đó, sẽ là mâu thuẫn logic khi phải có Hợp đồng mua bán (C) để nộp vào hồ sơ xin cấp GPXD, vì theo luật, nếu chủ đầu tư chưa có GPXD thì chưa được phép ký hợp đồng đó. Việc đưa (C) vào hồ sơ là hoàn toàn vô lý về mặt trình tự thời gian."}, {"level": "1", "content": "Cơ quan nào thực hiện thẩm duyệt thiết kế về Phòng cháy chữa cháy (phòng cháy chữa cháy) cho các dự án, công trình?", "options": {"A": "Sở Xây dựng (Cấp Tỉnh).", "B": "Cục Cảnh sát PCCC & CNCH (Bộ Công an) hoặc Phòng Cảnh sát PCCC & CNCH (Công an cấp Tỉnh) theo phân cấp.", "C": "UBND cấp Xã nơi có dự án thực hiện thẩm duyệt để đảm bảo tính sát thực tại địa phương.", "D": "Đơn vị tư vấn thiết kế có chứng chỉ năng lực phù hợp được quyền tự thẩm duyệt và chịu trách nhiệm trước pháp luật."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thẩm quyền thẩm duyệt thiết kế phòng cháy chữa cháy thuộc về cơ quan Cảnh sát phòng cháy chữa cháy & cứu nạn cứu hộ thuộc Bộ Công an hoặc Công an cấp tỉnh, tùy theo phân cấp dự án, công trình quy định tại Nghị định 136/2020/NĐ-CP (hướng dẫn Luật Phòng cháy và chữa cháy), đã được sửa đổi, bổ sung quan trọng bởi Nghị định 50/2024/NĐ-CP (có hiệu lực từ ngày 15/05/2024) và các văn bản hợp nhất tính đến năm 2026.  Hồ sơ thiết kế cơ sở của dự án được nộp lên Cổng dịch vụ công cấp Tỉnh. Hệ thống sẽ tự động chuyển dữ liệu thiết kế PCCC sang Phòng Cảnh sát PCCC & CNCH (PC07) - Công an cấp Tỉnh để thẩm duyệt. Kết quả sẽ được phản hồi đồng thời về Sở Xây dựng để làm căn cứ cấp Giấy phép xây dựng."}, {"level": "1", "content": "Theo quy định về quản lý chất lượng và bảo trì công trình xây dựng hiện hành (tính đến năm 2026), đối với các công trình có quy mô lớn, kỹ thuật phức tạp hoặc ảnh hưởng đến an toàn cộng đồng, chủ đầu tư có được phép đưa công trình vào khai thác, sử dụng ngay sau khi tự tổ chức nghiệm thu hoàn thành không?", "options": {"A": "Được phép hoàn toàn, vì chủ đầu tư là người chịu trách nhiệm cuối cùng về chất lượng và an toàn của công trình trước pháp luật.", "B": "Chỉ được phép đối với các dự án nhà ở riêng lẻ của cá nhân hoặc các công trình thuộc dự án đầu tư công đã được giải ngân 100% vốn.", "C": "Không được phép; chủ đầu tư chỉ được đưa công trình vào sử dụng sau khi có văn bản chấp thuận kết quả nghiệm thu của cơ quan chuyên môn về xây dựng cấp Tỉnh hoặc Bộ quản lý công trình xây dựng chuyên ngành.", "D": "Được phép đưa vào sử dụng ngay sau khi có biên bản nghiệm thu ký kết giữa chủ đầu tư, nhà thầu thi công và đơn vị tư vấn giám sát mà không cần thông qua cơ quan nhà nước."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 23 và Điều 24 Nghị định 06/2021/NĐ-CP (đã được sửa đổi bởi Nghị định 35/2023/NĐ-CP), đối với các công trình thuộc diện kiểm tra công tác nghiệm thu (quan trọng, quy mô lớn, kỹ thuật phức tạp, ảnh hưởng cộng đồng...), chủ đầu tư chỉ được đưa công trình vào khai thác sau khi được cơ quan chuyên môn về xây dựng kiểm tra và ra văn bản chấp thuận kết quả nghiệm thu. Các công trình thuộc Phụ lục I của Nghị định này (công trình ảnh hưởng lớn đến an toàn cộng đồng, môi trường) bắt buộc phải được cơ quan chuyên môn kiểm tra công tác nghiệm thu."}, {"level": "1", "content": "Theo quy định tại Điều 24 Luật Kinh doanh bất động sản 2023, đối với nhà chung cư hoặc tòa nhà hỗn hợp có mục đích để ở hình thành trong tương lai, điều kiện bắt buộc về tiến độ xây dựng để chủ đầu tư được phép ký hợp đồng bán hoặc cho thuê mua là gì?", "options": {"A": "Chủ đầu tư đã hoàn thành xây dựng phần thô đến tầng cao nhất (cất nóc) của tòa nhà.", "B": "Đã hoàn thành việc sơn và trang trí mặt ngoài, lắp đặt hệ thống thang máy cơ bản.", "C": "Đã có biên bản nghiệm thu hoàn thành việc xây dựng xong phần móng theo quy định của pháp luật về xây dựng.", "D": "Dự án đã được cấp Giấy chứng nhận quyền sở hữu tài sản gắn liền với đất (Sổ hồng) cho từng căn hộ riêng biệt."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Kinh doanh BĐS 2023 (Khoản 1 Điều 24): Quy định rõ ranh giới kỹ thuật: \"Đối với nhà chung cư, tòa nhà hỗn hợp có mục đích để ở hình thành trong tương lai thì phải có biên bản nghiệm thu đã hoàn thành xong phần móng theo quy định của pháp luật về xây dựng.\" Xong móng chỉ là điều kiện cần. Để được bán thực tế trong năm 2026, chủ đầu tư còn phải có văn bản thông báo của cơ quan chuyên môn cấp Tỉnh (thường là Sở Xây dựng hoặc cơ quan được ủy quyền) xác nhận nhà ở đủ điều kiện đưa vào kinh doanh.."}, {"level": "1", "content": "Đâu là một trong những thách thức tiềm ẩn khi triển khai các luật mới về bất động sản có hiệu lực từ 01/8/2024?", "options": {"A": "Sự sụt giảm nhu cầu đột ngột của nhà đầu tư do giá bất động sản được điều chỉnh giảm sâu theo bảng giá đất mới.", "B": "Độ trễ trong việc ban hành các văn bản hướng dẫn chi tiết (Thông tư, Nghị định đặc thù địa phương); sự thiếu đồng bộ về dữ liệu giữa các cấp và áp lực xử lý hồ sơ tồn đọng khi thay đổi cơ cấu hành chính 2 cấp.", "C": "Việc các doanh nghiệp FDI đồng loạt rút vốn khỏi thị trường do các quy định mới về điều kiện kinh doanh quá khắt khe.", "D": "Sự đóng băng hoàn toàn của các giao dịch chuyển nhượng bất động sản của cá nhân do không còn cấp Huyện để thực hiện công chứng, chứng thực."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc triển khai đồng thời các luật lớn với nhiều quy định mới có thể dẫn đến những thách thức trong giai đoạn đầu áp dụng như sự chưa rõ ràng, cách hiểu khác nhau và áp lực về thời gian xử lý thủ tục hành chính. Trong mô hình hành chính 2 cấp, UBND cấp Xã phải gánh vác khối lượng công việc khổng lồ từ việc xác nhận hiện trạng, tham vấn cộng đồng đến giám sát thi công mà trước đây có sự hỗ trợ của cấp Huyện. Nếu hệ thống công nghệ thông tin không theo kịp, thời gian xử lý thủ tục tại Xã sẽ trở thành \"nút thắt cổ chai\"."}, {"level": "1", "content": "Theo quy định tại Luật Đầu tư 2025 (Số 143/2025/QH15) và các quy định về bảo đảm an ninh, quốc phòng, đối với các dự án đầu tư có sử dụng đất tại khu vực biên giới, ven biển, hải đảo hoặc các khu vực khác có ảnh hưởng đến quốc phòng, an ninh, cơ quan nào có vai trò quyết định trong việc chấp thuận về mặt an ninh trước khi dự án được cấp phép?", "options": {"A": "Chỉ cần UBND cấp Tỉnh tự xem xét và quyết định dựa trên báo cáo của UBND cấp Xã.", "B": "Bộ Nông nghiệp và Phát triển nông thôn phối hợp với Bộ Tài nguyên và Môi trường thẩm định về tác động sinh thái.", "C": "Bộ Quốc phòng và Bộ Công an (thông qua ý kiến bằng văn bản về việc đáp ứng điều kiện bảo đảm quốc phòng, an ninh).", "D": "Quốc hội nước Cộng hòa xã hội chủ nghĩa Việt Nam xem xét thông qua trong kỳ họp gần nhất."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Cơ sở pháp lý: Khoản 3 Điều 29 Luật Đầu tư 2025 (kế thừa và phát triển từ Luật 2020) quy định: Đối với dự án đầu tư tại khu vực nhạy cảm, cơ quan đăng ký đầu tư phải lấy ý kiến bằng văn bản của Bộ Quốc phòng và Bộ Công an."}, {"level": "1", "content": "Việc quản lý vận hành nhà ở nhiều tầng nhiều căn hộ của cá nhân (chung cư mini) phải tuân theo quy chế nào?", "options": {"A": "Do chủ sở hữu nhà ở tự xây dựng và ban hành quy chế riêng để áp dụng nội bộ trong tòa nhà.", "B": "Thực hiện theo thỏa thuận dân sự bằng văn bản giữa chủ nhà và tập thể các hộ dân đang sinh sống.", "C": "Phải tuân thủ theo Quy chế quản lý, sử dụng nhà chung cư do Bộ trưởng Bộ Xây dựng ban hành.", "D": "Tuân theo các quy định riêng biệt và đặc thù do UBND cấp Xã ban hành căn cứ vào điều kiện an ninh trật tự của từng địa phương."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Nhà ở 2023 (Điều 57) quy định nhà ở nhiều tầng nhiều căn hộ của cá nhân (cả trường hợp để bán/cho thuê mua và trường hợp chỉ để cho thuê) phải được quản lý vận hành theo Quy chế quản lý, sử dụng nhà chung cư do Bộ Xây dựng ban hành. Điều này đồng nghĩa với việc các tòa nhà này cũng phải có Ban quản trị, Đơn vị quản lý vận hành chuyên nghiệp (nếu quy mô trên 20 căn hộ) và trích lập Quỹ bảo trì 2%."}, {"level": "1", "content": "Trường hợp cá nhân bán, cho thuê mua nhà ở, công trình xây dựng không nhằm mục đích kinh doanh hoặc dưới mức quy mô nhỏ, yêu cầu nào là bắt buộc về mặt hình thức hợp đồng theo Điều 44, Luật Kinh doanh bất động sản 2023?", "options": {"A": "Hợp đồng chỉ cần lập thành văn bản có chữ ký của hai bên và được niêm yết công khai tại UBND cấp Xã nơi có bất động sản.", "B": "Hợp đồng phải được lập thành văn bản và bắt buộc phải thực hiện công chứng hoặc chứng thực theo quy định của pháp luật.", "C": "Hợp đồng phải thực hiện theo mẫu chuẩn của Sở Tài chính tỉnh và phải có xác nhận của đơn vị môi giới có chứng chỉ hành nghề.", "D": "Các bên được tự do lựa chọn hình thức hợp đồng (văn bản hoặc lời nói) dựa trên nguyên tắc tự nguyện, không bắt buộc công chứng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật Kinh doanh BĐS 2023 (Khoản 5 Điều 44) quy định rõ đối với các tổ chức kinh doanh BĐS, việc công chứng hợp đồng là tự nguyện (do các bên thỏa thuận). Tuy nhiên, đối với cá nhân bán, cho thuê mua quy mô nhỏ thì việc công chứng hoặc chứng thực là bắt buộc."}, {"level": "1", "content": "Theo quy định tại Luật Đầu tư 2025, trường hợp nhà đầu tư trong nước có dự án không thuộc diện cấp Giấy chứng nhận đăng ký đầu tư (IRC) nhưng tự nguyện yêu cầu cấp, quy trình thực hiện so với nhà đầu tư nước ngoài được quy định như thế nào?", "options": {"A": "Thực hiện theo trình tự thẩm định khắt khe hơn nhằm xác minh nguồn vốn nội thuần túy và năng lực tài chính.", "B": "Thực hiện theo trình tự, thủ tục chung nhưng không phải xét duyệt các điều kiện tiếp cận thị trường đối với nhà đầu tư ngoại.", "C": "Chỉ thực hiện thủ tục đăng ký trực tuyến và nhận kết quả tự động mà không cần thông qua bước thẩm định của Sở Tài chính.", "D": "Được áp dụng quy chế ưu tiên về thời gian xử lý hồ sơ, rút ngắn chỉ bằng 1/2 thời gian so với quy trình của nhà đầu tư ngoại."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 38 Luật Đầu tư 2025 (Kế thừa và làm rõ Điều 37 Luật Đầu tư 2020). Về đối tượng: Nhà đầu tư trong nước thực hiện dự án thường chỉ cần Quyết định chấp thuận chủ trương đầu tư (nếu thuộc diện) mà không bắt buộc có IRC. Tuy nhiên, họ có quyền tự nguyện nộp hồ sơ xin cấp. Về quy trình: Khi đã tự nguyện xin cấp, cơ quan nhà nước (Sở Tài chính cấp Tỉnh) vẫn thực hiện đầy đủ các bước thẩm định về mục tiêu, quy mô, địa điểm, tiến độ và năng lực nhà đầu tư theo trình tự chung để đảm bảo tính thống nhất của hồ sơ dự án. Về sự khác biệt: Điểm cốt lõi là cơ quan chức năng sẽ không xem xét các rào cản như: Tỷ lệ sở hữu vốn điều lệ của nhà đầu tư nước ngoài, hình thức đầu tư, và danh mục ngành nghề hạn chế tiếp cận thị trường dành riêng cho khối ngoại (theo cam kết WTO, CPTPP, EVFTA...).."}, {"level": "1", "content": "Theo Luật Đất đai 2024, Nhà nước sẽ từ chối giao đất, cho thuê đất hoặc cho phép chuyển mục đích sử dụng đất đối với nhà đầu tư đang gặp phải tình trạng nào sau đây tại các dự án trước đó?", "options": {"A": "Đang nợ các khoản thuế phát sinh từ hoạt động sản xuất kinh doanh khác của doanh nghiệp.", "B": "Đang vi phạm các quy định về bảo vệ môi trường hoặc cam kết an sinh xã hội tại địa phương.", "C": "Đang sử dụng các công nghệ sản xuất lạc hậu, gây nguy cơ ô nhiễm môi trường cho dự án.", "D": "Đang vi phạm pháp luật đất đai tại dự án khác mà chưa chấp hành xong quyết định xử lý."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 3 Điều 122 Luật Đất đai 2024 (Luật số 31/2024/QH15). Điều kiện về tính chấp hành: Nhà nước không chỉ xét duyệt năng lực tài chính (ký quỹ, vốn chủ sở hữu) mà còn xét duyệt lịch sử tuân thủ pháp luật. Nếu nhà đầu tư đang sử dụng đất tại các dự án khác do Nhà nước giao/cho thuê mà có hành vi vi phạm pháp luật đất đai và chưa chấp hành xong các quyết định xử lý của cơ quan có thẩm quyền, họ sẽ bị từ chối tiếp cận quỹ đất mới. Cơ sở xác định vi phạm: Việc xác định này dựa trên kết quả thanh tra, kiểm tra của các cơ quan quản lý đất đai. Thông tin vi phạm được công khai trên cổng thông tin điện tử của Bộ Tài nguyên và Môi trường hoặc Tổng cục Quản lý Đất đai để các địa phương (Sở Tài chính, Sở Tài nguyên và Môi trường) đối soát khi thẩm định hồ sơ dự án. Trường hợp loại trừ: Nếu doanh nghiệp đã vi phạm nhưng đã thực hiện đầy đủ các nghĩa vụ theo quyết định xử phạt (nộp phạt, khắc phục hậu quả...) thì vẫn được coi là đáp ứng điều kiện này."}, {"level": "1", "content": "Theo quy định tại Luật Đất đai 2024, đối với trường hợp nhà đầu tư trúng đấu giá quyền sử dụng đất để thực hiện dự án nhà ở thương mại, văn bản nào sau đây là căn cứ pháp lý trực tiếp để cơ quan nhà nước có thẩm quyền ban hành quyết định giao đất?", "options": {"A": "Quyết định chấp thuận chủ trương đầu tư dự án đồng thời với chấp thuận nhà đầu tư của UBND cấp Tỉnh.", "B": "Giấy chứng nhận đăng ký đầu tư đã được cơ quan quản lý đầu tư cấp cho nhà đầu tư sau khi trúng đấu giá.", "C": "Văn bản phê duyệt hoặc quyết định công nhận kết quả trúng đấu giá của cơ quan nhà nước có thẩm quyền.", "D": "Biên bản nghiệm thu hoàn thành hạ tầng kỹ thuật khu đất đấu giá đã được các bên liên quan ký xác nhận."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 125 Luật Đất đai 2024 (Luật số 31/2024/QH15). Trình tự xác lập: Đối với quỹ đất sạch đã được giải phóng mặt bằng, Nhà nước thực hiện đấu giá quyền sử dụng đất công khai. Sau khi cuộc đấu giá kết thúc, cơ quan chức năng sẽ trình UBND cấp có thẩm quyền (thông thường là cấp Tỉnh đối với dự án nhà ở thương mại) ban hành Quyết định công nhận kết quả trúng đấu giá. Giá trị pháp lý: Quyết định này là văn bản quan trọng nhất, xác lập tư cách sử dụng đất của nhà đầu tư. Căn cứ vào quyết định này và việc hoàn thành nghĩa vụ tài chính (nộp tiền trúng đấu giá), cơ quan quản lý đất đai sẽ ban hành quyết định giao đất và thực hiện bàn giao đất trên thực địa. Các văn bản như Quyết định chấp thuận chủ trương đầu tư (A) thường là bước tiền đề để đưa quỹ đất ra đấu giá, không phải là căn cứ trực tiếp để ra quyết định giao đất sau đấu giá.."}, {"level": "1", "content": "Việc thẩm duyệt thiết kế Phòng cháy chữa cháy theo Nghị định 50/2024/NĐ-CP được thực hiện ở những giai đoạn thiết kế nào của dự án?", "options": {"A": "Chỉ thực hiện thẩm duyệt ở giai đoạn thiết kế cơ sở để làm căn cứ phê duyệt chủ trương đầu tư.", "B": "Chỉ thực hiện thẩm duyệt ở giai đoạn thiết kế bản vẽ thi công để làm căn cứ cấp Giấy phép xây dựng.", "C": "Thực hiện ở giai đoạn thiết kế cơ sở và giai đoạn thiết kế kỹ thuật hoặc thiết kế bản vẽ thi công.", "D": "Thực hiện sau khi dự án đã hoàn thành thi công và chuẩn bị các thủ tục nghiệm thu đưa vào sử dụng.."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 5 Điều 1 Nghị định 50/2024/NĐ-CP (sửa đổi Điều 13 Nghị định 136/2020/NĐ-CP). Quy trình 2 bước: Đối với các dự án có yêu cầu thiết kế nhiều bước (như chung cư, trung tâm thương mại lớn), việc thẩm duyệt PCCC diễn ra như sau: (1) Giai đoạn Thiết kế cơ sở: Cơ quan Cảnh sát PCCC sẽ xem xét và có văn bản góp ý về giải pháp PCCC. Đây là điều kiện để cơ quan chuyên môn về xây dựng (Sở Xây dựng) thẩm định thiết kế cơ sở. (2) Giai đoạn Thiết kế kỹ thuật/Bản vẽ thi công: Sau khi thiết kế cơ sở được duyệt, chủ đầu tư nộp hồ sơ thiết kế chi tiết. Cơ quan Công an sẽ cấp Giấy chứng nhận thẩm duyệt thiết kế về PCCC. Đây là \"giấy thông hành\" bắt buộc để xin Giấy phép xây dựng. Việc thẩm duyệt này hiện được thực hiện thông qua cơ chế liên thông trên Cổng dịch vụ công của Tỉnh, giúp rút ngắn thời gian phản hồi giữa các ngành Công an và Xây dựng."}, {"level": "1", "content": "Ngoài các điều kiện về giấy tờ pháp lý và nghiệm thu móng/hạ tầng, chủ đầu tư phải thực hiện thủ tục gì với cơ quan nhà nước trước khi bán/cho thuê mua nhà ở hình thành trong tương lai theo Luật Kinh doanh bất động sản 2023?", "options": {"A": "Đăng ký danh mục sản phẩm và xin giấy phép bán hàng tại Bộ Công Thương.", "B": "Thực hiện thủ tục kê khai và đăng ký giá bán tối thiểu tại Sở Tài chính Tỉnh.", "C": "Thông báo cho cơ quan quản lý nhà ở cấp Tỉnh về nhà ở đủ điều kiện bán hàng.", "D": "Gửi văn bản cam kết bảo trì và bảo hành công trình lên UBND cấp Tỉnh quản lý."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 24 Luật Kinh doanh bất động sản 2023 yêu cầu \"Trước khi bán, cho thuê mua nhà ở hình thành trong tương lai, chủ đầu tư dự án bất động sản phải có văn bản thông báo cho cơ quan quản lý nhà nước về nhà ở cấp tỉnh...\". Trong thời hạn 15 ngày kể từ ngày nhận đủ hồ sơ, cơ quan quản lý cấp Tỉnh có trách nhiệm kiểm tra và trả lời bằng văn bản về việc nhà ở có đủ điều kiện được bán hay không. Trường hợp không đủ điều kiện, cơ quan này phải nêu rõ lý do. Văn bản trả lời xác nhận \"Đủ điều kiện bán hàng\" là căn cứ pháp lý cao nhất để chủ đầu tư thực hiện ký kết hợp đồng mua bán hợp pháp và cũng là điều kiện để ngân hàng giải ngân vốn vay cho khách hàng."}, {"level": "1", "content": "Theo Luật Đầu tư 2025, một doanh nghiệp được thành lập tại Việt Nam với 100% vốn nước ngoài khi thực hiện các dự án đầu tư tiếp theo hoặc nhận chuyển nhượng dự án bất động sản sẽ được áp dụng các quy định về điều kiện và thủ tục như thế nào?", "options": {"A": "Áp dụng hoàn toàn các quy định như nhà đầu tư trong nước do đã có tư cách pháp nhân Việt Nam và mã số thuế nội địa.", "B": "Phải tuân thủ các điều kiện và thủ tục như nhà đầu tư nước ngoài nếu thuộc đối tượng quy định tại Điều 23 của Luật này.", "C": "Được hưởng đầy đủ quyền năng về tiếp cận đất đai và hình thức sử dụng đất như tổ chức kinh tế 100% vốn trong nước.", "D": "Chỉ thực hiện thủ tục đăng ký biến động đất đai mà không cần thẩm định lại điều kiện tiếp cận thị trường của khối ngoại."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 23 Luật Đầu tư 2025 (Số 143/2025/QH15) và Điều 4 Luật Đất đai 2024. Mặc dù doanh nghiệp 100% vốn nước ngoài là pháp nhân Việt Nam (có mã số doanh nghiệp, con dấu Việt Nam), nhưng về mặt thủ tục đầu tư, nếu doanh nghiệp có vốn nước ngoài nắm giữ trên 50% vốn điều lệ (hoặc theo các cấu trúc kiểm soát quy định tại Điều 23) thì khi đầu tư thành lập tổ chức kinh tế khác hoặc đầu tư góp vốn, mua cổ phần, họ vẫn phải tuân thủ điều kiện và thực hiện thủ tục như nhà đầu tư nước ngoài. Theo Luật Đất đai 2024, tổ chức kinh tế có vốn đầu tư nước ngoài (bao gồm cả doanh nghiệp 100% vốn ngoại) có phạm vi tiếp cận đất đai hẹp hơn. Ví dụ: Họ không được nhận chuyển nhượng quyền sử dụng đất trực tiếp từ hộ gia đình, cá nhân (trừ trường hợp trong khu công nghiệp, cụm công nghiệp). Điều này hoàn toàn khác biệt so với tổ chức kinh tế 100% vốn trong nước.."}, {"level": "1", "content": "Căn cứ quy định tại Điều 1 Luật Kinh doanh bất động sản 2023, hoạt động nào sau đây thuộc phạm vi loại trừ và KHÔNG chịu sự điều chỉnh của Luật này?", "options": {"A": "Chuyển nhượng nhà ở, công trình xây dựng gắn liền với đất đã có sẵn hoặc đang hình thành trong tương lai.", "B": "Chuyển nhượng quyền sử dụng đất đã có hạ tầng kỹ thuật trong dự án bất động sản cho cá nhân tự xây dựng.", "C": "Bán, chuyển nhượng bất động sản do thực hiện quyết định của Tòa án khi giải quyết thủ tục phá sản doanh nghiệp.", "D": "Cho thuê, cho thuê mua công trình xây dựng có sẵn hoặc đang hình thành trong tương lai cho tổ chức, cá nhân.."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 1 Luật Kinh doanh bất động sản 2023 quy định phạm vi điều chỉnh và loại trừ một số trường hợp đặc thù không áp dụng Luật này, bao gồm \"Việc bán, chuyển nhượng, cho thuê, cho thuê mua tài sản công...\", \"Việc bán, chuyển nhượng, cho thuê, cho thuê mua bất động sản do thực hiện thủ tục phá sản, giải thể, chia, tách...\" hoặc theo bản án, quyết định của tòa án. Các giao dịch tại phương án C mang tính chất thanh lý tài sản để thực hiện nghĩa vụ tài chính theo phán quyết tư pháp, được điều chỉnh bởi Luật Phá sản và pháp luật về thi hành án dân sự, thay vì các quy tắc kinh doanh thương mại thông thường"}, {"level": "1", "content": "Theo quy định tại Luật Đầu tư 2025, cơ quan nào có thẩm quyền chấp thuận chủ trương đầu tư đối với dự án xây dựng nhà ở, khu đô thị tại khu vực nội đô lịch sử hoặc hạn chế phát triển của đô thị loại đặc biệt?", "options": {"A": "Thủ tướng Chính phủ xem xét dựa trên đề nghị thẩm định của các Bộ quản lý chuyên ngành.", "B": "Quốc hội quyết định chủ trương đầu tư đối với các khu vực có ý nghĩa di sản quốc gia.", "C": "Ủy ban nhân dân cấp Tỉnh chấp thuận chủ trương đầu tư theo quy hoạch đô thị đã duyệt.", "D": "Bộ Xây dựng trực tiếp phê duyệt nhằm đảm bảo tính thống nhất trong quản lý kiến trúc."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 32 Luật Đầu tư 2025 (Số 143/2025/QH15). Đối với các dự án xây dựng nhà ở, khu đô thị thực hiện tại khu vực hạn chế phát triển hoặc nội đô lịch sử (được xác định theo đồ án quy hoạch đô thị) của đô thị loại đặc biệt (như Hà Nội, TP.HCM), thẩm quyền chấp thuận chủ trương đầu tư thuộc về Ủy ban nhân dân cấp Tỉnh. Việc phân cấp này nhằm mục đích để địa phương chủ động trong việc kiểm soát mật độ dân cư và bảo tồn kiến trúc theo đúng đặc thù quy hoạch của từng đô thị mà không cần trình lên cấp Trung ương, trừ trường hợp dự án thuộc quy mô đặc biệt lớn phải trình Thủ tướng theo quy định tại Điều 31.."}, {"level": "1", "content": "Theo quy định tại Luật Đầu tư 2025, trường hợp nào sau đây nhà đầu tư KHÔNG phải thực hiện ký quỹ hoặc có bảo lãnh ngân hàng về nghĩa vụ ký quỹ khi được Nhà nước giao đất, cho thuê đất?", "options": {"A": "Dự án đầu tư xây dựng nhà ở xã hội hoặc nhà ở cho công nhân trong khu công nghiệp.", "B": "Dự án đầu tư tại địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn theo quy định.", "C": "Nhà đầu tư được Nhà nước giao đất trên cơ sở nhận chuyển nhượng quyền sử dụng đất từ người khác.", "D": "Dự án đầu tư thuộc lĩnh vực công nghệ cao hoặc các dự án sử dụng 100% vốn đầu tư công."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điểm c Khoản 1 Điều 43 Luật Đầu tư 2025. Ký quỹ là hình thức để Nhà nước đảm bảo nhà đầu tư có năng lực tài chính và cam kết triển khai dự án đúng tiến độ. Tuy nhiên, khi nhà đầu tư nhận chuyển nhượng quyền sử dụng đất và tài sản gắn liền với đất từ một người sử dụng đất khác, họ đã phải bỏ ra một nguồn lực tài chính thực tế để sở hữu quỹ đất đó. Trong trường hợp này, \"vốn\" của nhà đầu tư đã nằm trực tiếp trong giá trị quyền sử dụng đất mà họ mua lại. Do đó, việc bắt buộc ký quỹ thêm sẽ gây chồng chéo nghĩa vụ tài chính và lãng phí nguồn vốn của doanh nghiệp. Sau khi nhận chuyển nhượng, nhà đầu tư chỉ thực hiện thủ tục để Nhà nước giao đất, cho thuê đất nhằm hợp thức hóa dự án đầu tư theo mục tiêu mới.."}, {"level": "1", "content": "Theo quy định đồng bộ của Luật Đầu tư 2025, Luật Đất đai 2024 và Luật Kinh doanh bất động sản 2023, trình tự cơ bản để triển khai một dự án đầu tư kinh doanh bất động sản được thực hiện theo các bước nào sau đây?", "options": {"A": "Chấp thuận chủ trương đầu tư → Phê duyệt quy hoạch chi tiết 1/500 → Giao đất, cho thuê đất → Cấp phép xây dựng → Triển khai xây dựng.", "B": "Giao đất, cho thuê đất → Chấp thuận chủ trương đầu tư → Phê duyệt quy hoạch chi tiết 1/500 → Cấp phép xây dựng → Triển khai xây dựng.", "C": "Chấp thuận chủ trương đầu tư → Giao đất, cho thuê đất → Cấp phép xây dựng → Phê duyệt quy hoạch chi tiết 1/500 → Triển khai xây dựng.", "D": "Phê duyệt quy hoạch chi tiết 1/500 → Chấp thuận chủ trương đầu tư → Giao đất, cho thuê đất → Cấp phép xây dựng → Triển khai xây dựng."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 32 Luật Đầu tư 2025, Điều 124-126 Luật Đất đai 2024 và các quy định về xây dựng. Bước 1 - Chấp thuận chủ trương đầu tư: Đây là \"giấy khai sinh\" pháp lý của dự án, xác định mục tiêu, quy mô và nhà đầu tư (hoặc hình thức lựa chọn nhà đầu tư). Bước 2 - Phê duyệt quy hoạch chi tiết 1/500: Sau khi có chủ trương, dự án phải được cụ thể hóa về mặt kiến trúc và hạ tầng kỹ thuật. Bản quy hoạch 1/500 là căn cứ để xác định nghĩa vụ tài chính và lập thiết kế cơ sở. Bước 3 - Giao đất, cho thuê đất: Nhà nước ra quyết định giao đất/cho thuê đất dựa trên quy hoạch 1/500 và kết quả thực hiện nghĩa vụ tài chính của nhà đầu tư. Bước 4 - Cấp phép xây dựng: Khi đã có đất sạch và hồ sơ thiết kế kỹ thuật được thẩm duyệt (bao gồm cả PCCC), cơ quan chuyên môn (Sở Xây dựng) mới cấp giấy phép để khởi công. Bước 5 - Triển khai xây dựng: Thực hiện thi công và chuẩn bị các điều kiện để đưa sản phẩm vào kinh doanh (nghiệm thu móng đối với chung cư hoặc hạ tầng đối với đất nền).."}, {"level": "1", "content": "Theo quy định tại Luật Đầu tư 2025 và Luật Đất đai 2024, khi lập hồ sơ đề nghị dự án đầu tư bất động sản, trường hợp nhà đầu tư chưa có quyền sử dụng đất hợp pháp thì phải đáp ứng điều kiện nào sau đây để được xem xét?", "options": {"A": "Có văn bản thỏa thuận nguyên tắc về địa điểm đầu tư với cơ quan nhà nước cấp Tỉnh.", "B": "Có văn bản bảo lãnh nghĩa vụ tài chính của tổ chức tín dụng đang hoạt động hợp pháp.", "C": "Được cơ quan nhà nước có thẩm quyền chấp thuận chủ trương đầu tư, giao hoặc thuê đất.", "D": "Có văn bản xác nhận đủ năng lực triển khai dự án đầu tư do Sở Tài chính cấp Tỉnh cấp."}, "answer": "", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 33 Luật Đầu tư 2025 và Điều 124 Luật Đất đai 2024. Một dự án bất động sản chỉ có thể hình thành dựa trên hai cơ sở đất đai: hoặc nhà đầu tư đã có sẵn quyền sử dụng đất hợp pháp (đất tự có), hoặc được Nhà nước \"trao\" quyền sử dụng đất thông qua các hình thức: đấu giá, đấu thầu hoặc giao/cho thuê đất trực tiếp (đối với các dự án đặc thù). Mối liên hệ giữa Đầu tư và Đất đai: văn bản Chấp thuận chủ trương đầu tư của UBND cấp Tỉnh đóng vai trò là \"lời cam kết\" pháp lý. Khi dự án được chấp thuận chủ trương, nó đồng thời xác lập căn cứ để Nhà nước thực hiện các bước tiếp theo như thu hồi đất, bồi thường và cuối cùng là ban hành quyết định giao đất hoặc cho thuê đất cho nhà đầu tư. Nếu không có sự cam kết giao/thuê đất từ Nhà nước (thể hiện qua văn bản chấp thuận chủ trương), dự án sẽ không có căn cứ để xác lập địa điểm và quy mô sử dụng đất, dẫn đến hồ sơ đầu tư không đủ điều kiện thẩm định.."}, {"level": "1", "content": "Trong quá trình lựa chọn nhà đầu tư theo hình thức đấu thầu dự án có sử dụng đất, tiêu chí nào sau đây đóng vai trò quyết định để đánh giá và xếp hạng các nhà đầu tư tham gia?", "options": {"A": "Tổng mức đầu tư của dự án đạt quy mô lớn nhất so với các đối thủ cạnh tranh.", "B": "Có phương án đầu tư khả thi, hiệu quả và đáp ứng năng lực kinh nghiệm, tài chính.", "C": "Đưa ra cam kết về tiến độ thực hiện dự án ngắn nhất để sớm đưa vào khai thác.", "D": "Đưa ra mức giá bán hoặc cho thuê sản phẩm thấp nhất nhằm cạnh tranh thị trường."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Luật Đấu thầu 2023 (hiệu lực 2024), Luật Đầu tư 2025 và Nghị định 23/2024/NĐ-CP. Khi Nhà nước tổ chức đấu thầu lựa chọn nhà đầu tư cho dự án bất động sản (thường là các dự án lớn, khu đô thị), cơ quan có thẩm quyền không chỉ nhìn vào \"túi tiền\" (tổng vốn) hay \"tốc độ\" (tiến độ) mà đánh giá dựa trên Hệ thống thang điểm tổng hợp, bao gồm: (1) Năng lực tài chính và kinh nghiệm: Vốn chủ sở hữu tối thiểu theo quy định và lịch sử thực hiện các dự án tương đương thành công. (2) Phương án đầu tư (Kỹ thuật): Sự phù hợp với quy hoạch chi tiết, giải pháp kiến trúc, hạ tầng kỹ thuật, bảo vệ môi trường và đóng góp cho an sinh xã hội địa phương. (3) Hiệu quả kinh tế - xã hội: Đây là điểm mấu chốt tại các dự án bất động sản năm 2026. Một phương án \"hiệu quả\" phải đảm bảo sự cân bằng giữa lợi nhuận doanh nghiệp và lợi ích công cộng (ví dụ: tỷ lệ đất giao thông, công viên, trường học). (4) Loại trừ rủi ro: Nếu chỉ chọn theo tiêu chí giá rẻ hoặc vốn lớn mà phương án không khả thi, dự án dễ dẫn đến tình trạng \"đắp chiếu\" hoặc vi phạm quy hoạch sau khi được giao đất.."}, {"level": "1", "content": "Tổng số vốn chủ sở hữu, dư nợ vay tại tổ chức tín dụng và dư nợ trái phiếu doanh nghiệp để thực hiện một dự án bất động sản đã được chấp thuận làm chủ đầu tư không được vượt quá bao nhiêu phần trăm tổng vốn đầu tư của dự án đó?", "options": {"A": "80%", "B": "90%", "C": "100%", "D": "120%"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo điểm b khoản 1 Điều 5 Nghị định 96/2024/NĐ-CP, trong trường hợp doanh nghiệp Kinh doanh bất động sản vay tại tổ chức tín dụng và phát hành trái phiếu doanh nghiệp để thực hiện dự án bất động sản đã được cơ quan nhà nước có thẩm quyền chấp thuận làm chủ đầu tư, thì tổng dư nợ vay tại tổ chức tín dụng, dư nợ trái phiếu doanh nghiệp và vốn chủ sở hữu phải có theo quy định đối với mỗi dự án không vượt quá 100% tổng vốn đầu tư của dự án đó."}, {"level": "1", "content": "Vốn chủ sở hữu của doanh nghiệp  đầu tư dự án Kinh doanh bất động sản được xác định dựa trên tài liệu nào sau đây?", "options": {"A": "Báo cáo tài chính đã được kiểm toán", "B": "Cam kết góp vốn của cổ đông", "C": "Hợp đồng vay vốn với ngân hàng", "D": "Giấy chứng nhận đăng ký doanh nghiệp"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Theo khoản 1 Điều 6 Nghị định 96/2024/NĐ-CP, vốn chủ sở hữu của doanh nghiệp Kinh doanh bất động sản được xác định căn cứ vào kết quả báo cáo tài chính hoặc kết quả báo cáo đối với khoản mục vốn chủ sở hữu đã được kiểm toán thực hiện trong năm; trường hợp không có kết quả báo cáo tài chính hoặc kết quả báo cáo đối với khoản mục vốn chủ sở hữu đã được kiểm toán thực hiện trong năm thì dùng kết quả báo cáo tài chính hoặc kết quả báo cáo đối với khoản mục vốn chủ sở hữu đã được kiểm toán của năm liền trước."}, {"level": "1", "content": "Chủ đầu tư dự án Kinh doanh bất động sản được cấp Giấy chứng nhận quyền sử dụng đất khi nào?", "options": {"A": "Sau khi được chấp thuận chủ trương đầu tư", "B": "Sau khi khởi công công trình chính của dự án", "C": "Sau khi hoàn thành nghĩa vụ tài chính về đất đai", "D": "Sau khi bán hết sản phẩm bất động sản"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Khoản 3 Điều 155 Luật Đất đai 2024 và Luật Kinh doanh bất động sản 2023, chủ đầu tư chỉ được cấp Giấy chứng nhận quyền sử dụng đất đối với diện tích được giao/thuê đất khi đã hoàn thành đầy đủ nghĩa vụ tài chính như tiền sử dụng đất, tiền thuê đất, các khoản phí, lệ phí liên quan."}, {"level": "1", "content": "Theo quy định tại Luật Kinh doanh bất động sản 2023, ngoài việc không thuộc khu vực bị cấm phân lô, chủ đầu tư dự án phải đáp ứng điều kiện cốt lõi nào sau đây về mặt thực địa và tài chính trước khi chuyển nhượng quyền sử dụng đất cho cá nhân tự xây dựng nhà ở?", "options": {"A": "Đã hoàn thành công tác bồi thường giải phóng mặt bằng và có quyết định giao đất chính thức của Tỉnh.", "B": "Đã đầu tư xong hạ tầng kỹ thuật theo quy hoạch 1/500 và hoàn thành đầy đủ nghĩa vụ tài chính về đất.", "C": "Đã có văn bản chấp thuận đủ điều kiện bán hàng của Sở Xây dựng và có bảo lãnh thanh toán của ngân hàng.", "D": "Đã thực hiện xong việc cắm mốc giới ngoài thực địa và có thông báo cho cơ quan quản lý đất đai cấp Xã."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 31 Luật Kinh doanh bất động sản 2023 và Điều 126 Luật Đất đai 2024. Điều kiện hạ tầng: Chủ đầu tư phải hoàn thành việc đầu tư xây dựng các công trình hạ tầng kỹ thuật theo quy hoạch chi tiết 1/500 đã được phê duyệt (bao gồm: giao thông, điện chiếu sáng, cấp thoát nước, xử lý rác thải, viễn thông...). Việc này phải được cơ quan chuyên môn cấp Tỉnh kiểm tra và xác nhận bằng văn bản. Nghĩa vụ tài chính: Khác với các quy định cũ, Luật 2023 nhấn mạnh chủ đầu tư phải hoàn thành toàn bộ nghĩa vụ tài chính liên quan đến đất đai của dự án (tiền sử dụng đất, tiền thuê đất, các loại thuế phí) mới được phép phân lô bán nền. Khu vực cấm phân lô: Một điểm cực kỳ quan trọng là Luật 2023 đã siết chặt khu vực được phép phân lô. Theo đó, không được phép phân lô bán nền tại các phường, quận, thành phố thuộc đô thị loại đặc biệt, loại I, loại II và loại III. Các khu vực còn lại do UBND cấp Tỉnh quyết định dựa trên điều kiện thực tế."}, {"level": "1", "content": "Theo quy định tại Luật Đất đai 2024, thời điểm bắt buộc chủ đầu tư phải hoàn thành nghĩa vụ tài chính (nộp tiền sử dụng đất, tiền thuê đất) để được bàn giao đất trên thực địa và triển khai xây dựng là khi nào?", "options": {"A": "Sau khi công trình đã hoàn thành nghiệm thu và đưa vào vận hành khai thác.", "B": "Trước khi được bàn giao đất thực địa và cấp Giấy phép xây dựng công trình.", "C": "Ngay sau khi đồ án quy hoạch chi tiết tỷ lệ 1/500 của dự án được phê duyệt.", "D": "Sau khi hoàn thành xong toàn bộ công tác bồi thường, hỗ trợ và tái định cư."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 155 và Điều 156 Luật Đất đai 2024. Sau khi có Quyết định giao đất/cho thuê đất, cơ quan thuế sẽ ban hành Thông báo nộp tiền dựa trên giá đất cụ thể do Sở Tài chính (cấp Tỉnh) thẩm định. Chủ đầu tư phải nộp đủ số tiền này vào ngân sách Nhà nước. Việc hoàn thành nghĩa vụ tài chính là điều kiện tiên quyết để Nhà nước bàn giao đất trên thực địa và là thành phần hồ sơ bắt buộc để Sở Xây dựng cấp Giấy phép xây dựng. Nếu chưa nộp tiền đất, dự án không được coi là có quyền sử dụng đất hợp pháp để khởi công xây dựng.."}, {"level": "1", "content": "Theo quy định tại Luật Đất đai 2024, điều kiện tiên quyết và quan trọng nhất phải hoàn thành trước khi cơ quan nhà nước có thẩm quyền ban hành quyết định thu hồi đất là gì?", "options": {"A": "Chủ đầu tư dự án phải hoàn thành việc ký quỹ bảo đảm thực hiện dự án tại Sở Tài chính.", "B": "Phải hoàn thành việc phê duyệt phương án bồi thường, hỗ trợ, tái định cư theo quy định.", "C": "Phải có văn bản cam kết về tiến độ bàn giao mặt bằng của toàn bộ hộ dân trong khu vực.", "D": "Chủ đầu tư phải chứng minh đã chuẩn bị đủ 100% nguồn vốn bồi thường giải phóng mặt bằng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 80 và Điều 87 Luật Đất đai 2024. Luật 2024 siết chặt quy trình thu hồi đất nhằm bảo vệ người dân. Theo đó, việc thu hồi đất chỉ được thực hiện sau khi phương án bồi thường, hỗ trợ, tái định cư đã được UBND cấp Tỉnh phê duyệt. Đối với trường hợp thu hồi đất ở mà người dân phải di dời, việc phê duyệt phương án bồi thường và bố trí tái định cư phải được hoàn thành trước khi ban hành quyết định thu hồi đất. Người dân phải có nơi ở mới bằng hoặc tốt hơn nơi ở cũ thì Nhà nước mới được quyền thu hồi đất thực địa. UBND cấp Xã đóng vai trò chủ trì trong việc điều tra, khảo sát, đo đạc và xác định nguồn gốc đất để làm cơ sở cho Tỉnh phê duyệt phương án bồi thường chính xác và công bằng."}, {"level": "1", "content": "Theo quy định tại Luật Đất đai 2024, đối với trường hợp thu hồi đất ở mà người dân có đủ điều kiện được tái định cư, việc bố trí tái định cư phải được hoàn thành vào thời điểm nào?", "options": {"A": "Sau khi dự án đã hoàn thành thi công và đi vào vận hành khai thác chính thức.", "B": "Trong thời hạn 30 ngày kể từ ngày ban hành quyết định thu hồi đất thực địa.", "C": "Trước khi cơ quan nhà nước có thẩm quyền ban hành quyết định thu hồi đất.", "D": "Sau khi người dân đã thực hiện xong việc bàn giao mặt bằng cho chủ đầu tư."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 6 Điều 91 Luật Đất đai 2024 quy định: Để bảo đảm quyền lợi hợp pháp và ổn định đời sống cho người dân, Nhà nước quy định việc phê duyệt phương án bồi thường và bố trí tái định cư phải được hoàn thành trước khi ban hành quyết định thu hồi đất. Người dân phải được bàn giao đất tái định cư hoặc nhà ở tái định cư, kèm theo các điều kiện hạ tầng kỹ thuật (đường, điện, nước) và hạ tầng xã hội cơ bản đạt chuẩn thì mới đủ căn cứ để ban hành quyết định thu hồi đất cũ. UBND cấp Tỉnh là đơn vị phê duyệt quỹ đất tái định cư, trong khi UBND cấp Xã có trách nhiệm rà soát, xác nhận đối tượng đủ điều kiện tái định cư tại địa bàn để đảm bảo tính minh bạch, tránh khiếu kiện."}, {"level": "1", "content": "Theo quy định tại Luật Kinh doanh bất động sản 2023 và các văn bản hướng dẫn thi hành, thủ tục nào sau đây được coi là bước cuối cùng để hoàn tất toàn bộ quy trình của một dự án đầu tư kinh doanh bất động sản?", "options": {"A": "Thực hiện nghiệm thu hoàn thành công trình và bàn giao hồ sơ nhà ở cho người mua.", "B": "Quyết toán vốn đầu tư dự án và báo cáo kết quả kinh doanh với cơ quan Thuế.", "C": "Bàn giao hạ tầng kỹ thuật và hạ tầng xã hội cho cơ quan quản lý nhà nước.", "D": "Thực hiện thủ tục cấp Giấy chứng nhận quyền sở hữu tài sản cho khách hàng."}, "answer": "", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 17 và Điều 18 Luật Kinh doanh bất động sản 2023; Điều 135 Luật Đất đai 2024. Trình tự bàn giao: Sau khi công trình được cơ quan chuyên môn về xây dựng chấp thuận kết quả nghiệm thu, chủ đầu tư thực hiện bàn giao nhà/công trình cho khách hàng (A). Tuy nhiên, đây mới chỉ là bàn giao về mặt sử dụng. Thời điểm kết thúc pháp lý: Luật 2023 quy định trong thời hạn 50 ngày kể từ ngày bàn giao nhà ở hoặc từ ngày bên mua thanh toán đủ tiền, chủ đầu tư phải làm thủ tục để cơ quan nhà nước có thẩm quyền cấp Giấy chứng nhận (Sổ hồng) cho bên mua. Chỉ khi khách hàng nhận được Giấy chứng nhận, quyền sở hữu tài sản của họ mới được Nhà nước xác lập và bảo hộ hoàn toàn. Đây chính là cột mốc đánh dấu việc chủ đầu tư đã hoàn thành mọi nghĩa vụ đối với khách hàng và Nhà nước trong phạm vi dự án đó."}, {"level": "1", "content": "Trách nhiệm của chủ đầu tư trong giai đoạn thực hiện dự án không bao gồm nội dung nào sau đây?", "options": {"A": "Bảo đảm tiến độ thi công và chất lượng công trình xây dựng theo hồ sơ thiết kế kỹ thuật đã được thẩm duyệt.", "B": "Cung cấp thông tin dự án đầy đủ và trung thực trên hệ thống thông tin về nhà ở và thị trường bất động sản.", "C": "Điều chỉnh thường xuyên các chỉ tiêu về quy hoạch kiến trúc tại đồ án quy hoạch chi tiết 1/500 đã được phê duyệt.", "D": "Thực hiện việc ký kết hợp đồng mua bán, cho thuê mua nhà ở theo đúng các biểu mẫu do Chính phủ quy định."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 17, 18 Luật Kinh doanh bất động sản 2023 và Luật Quy hoạch đô thị. Bản quy hoạch chi tiết 1/500 là cơ sở pháp lý cao nhất để xác định các chỉ tiêu về mật độ xây dựng, hệ số sử dụng đất, tầng cao và công năng. Đây là văn bản do cơ quan nhà nước (thường là UBND cấp Tỉnh) phê duyệt dựa trên quy hoạch phân khu. Nếu muốn điều chỉnh, chủ đầu tư không có quyền \"tự quyết\". Mọi thay đổi dù nhỏ nhất liên quan đến chỉ tiêu kiến trúc đều phải thực hiện quy trình xin điều chỉnh quy hoạch, lập hồ sơ trình cơ quan có thẩm quyền thẩm định và phê duyệt lại. Nếu chủ đầu tư tự ý thay đổi (ví dụ: xây thêm tầng, chuyển đổi đất cây xanh thành đất ở), công trình sẽ bị coi là sai phép, không được nghiệm thu và không thể thực hiện thủ tục cấp Sổ hồng cho khách hàng. Do đó, Quy hoạch chi tiết 1/500 không thể thay đổi thường xuyên."}, {"level": "1", "content": "Theo quy định tại Luật Kinh doanh bất động sản 2023 và pháp luật về xử lý vi phạm hành chính, chủ đầu tư đưa bất động sản vào kinh doanh khi chưa đáp ứng đầy đủ các điều kiện theo quy định sẽ phải chịu hậu quả pháp lý nào sau đây?", "options": {"A": "Bị đình chỉ hoạt động kinh doanh dự án trong thời hạn tối đa 24 tháng để hoàn thiện các thủ tục pháp lý.", "B": "Bị xử phạt hành chính, buộc khắc phục hậu quả và có thể bị truy cứu trách nhiệm hình sự nếu gây thiệt hại.", "C": "Bị thu hồi toàn bộ vốn đầu tư đã giải ngân và hủy bỏ tư cách chủ đầu tư đối với dự án đang triển khai.", "D": "Chỉ bị xử phạt tiền theo biểu thuế lũy tiến dựa trên tổng giá trị các hợp đồng đã ký kết với khách hàng."}, "answer": "", "explanation": "<b>Giải thích học thuật:</b> Điều 8 Luật Kinh doanh bất động sản 2023; Nghị định xử phạt vi phạm hành chính trong lĩnh vực xây dựng, kinh doanh BĐS. Chủ đầu tư có thể bị phạt tiền lên đến 1 tỷ đồng (đối với tổ chức). Ngoài ra, hình thức xử phạt bổ sung thường là đình chỉ hoạt động kinh doanh bất động sản từ 3 đến 6 tháng đối với dự án vi phạm. Biện pháp khắc phục hậu quả: Đây là phần \"nặng\" nhất. Chủ đầu tư bị buộc phải hoàn trả vốn đã huy động trái phép cộng với tiền lãi cho khách hàng; buộc phải hoàn thiện các điều kiện theo quy định trước khi tiếp tục kinh doanh. Trách nhiệm hình sự: Trong trường hợp chủ đầu tư cố tình lừa dối khách hàng, giả mạo hồ sơ để bán dự án \"ma\" hoặc dự án hoàn toàn chưa có pháp lý gây thiệt hại nghiêm trọng về tài sản, có thể bị truy cứu trách nhiệm hình sự về tội \"Lừa dối khách hàng\" hoặc \"Lừa đảo chiếm đoạt tài sản\" theo Bộ luật Hình sự."}, {"level": "1", "content": "Chủ thể nào có trách nhiệm công khai thông tin dự án bất động sản đưa vào kinh doanh?", "options": {"A": "Người mua bất động sản", "B": "Cơ quan quản lý nhà nước về xây dựng", "C": "Chủ đầu tư dự án bất động sản", "D": "Sàn giao dịch bất động sản trung gian"}, "answer": "", "explanation": "<b>Giải thích học thuật:</b> "}, {"level": "1", "content": "Chủ đầu tư phải công khai thông tin dự án bất động sản từ thời điểm nào sau đây?", "options": {"A": "Ngay sau khi đã hoàn thành việc nghiệm thu phần móng hoặc cơ sở hạ tầng kỹ thuật của dự án.", "B": "Sau khi đã thực hiện xong việc ký kết hợp đồng mua bán hoặc cho thuê mua với khách hàng đầu tiên.", "C": "Trước khi bắt đầu thực hiện việc chào bán, cho thuê, cho thuê mua hoặc huy động vốn cho dự án.", "D": "Sau khi công trình đã được cơ quan nhà nước có thẩm quyền nghiệm thu đưa vào vận hành, sử dụng."}, "answer": "", "explanation": "<b>Giải thích học thuật:</b> Điều 6 Luật Kinh doanh bất động sản 2023 (Luật số 29/2023/QH15). Luật quy định rất rõ, việc công khai thông tin phải được thực hiện trước khi dự án bước vào giai đoạn kinh doanh. Điều này bao gồm tất cả các hình thức tiếp cận dòng tiền từ khách hàng như: chào bán, cho thuê, cho thuê mua hoặc các hình thức huy động vốn khác (như hợp đồng góp vốn, đặt cọc giữ chỗ). Mục đích cốt lõi: Bảo vệ quyền tiếp cận thông tin của người tiêu dùng. Nhà đầu tư và người mua phải có quyền xem xét hồ sơ pháp lý (giấy phép xây dựng, quy hoạch 1/500, tình trạng thế chấp ngân hàng...) trước khi đặt bút ký bất kỳ văn bản thỏa thuận tài chính nào. Hệ thống lưu trữ: Thông tin này không chỉ dán tại văn phòng dự án mà phải được đăng tải chính thức trên Hệ thống thông tin về nhà ở và thị trường bất động sản (do Bộ Xây dựng quản lý) và website của doanh nghiệp."}, {"level": "1", "content": "Người mua nhà ở thương mại hình thành trong tương lai có quyền nào sau đây?", "options": {"A": "Yêu cầu chủ đầu tư phải cam kết một mức lợi nhuận cố định hàng năm từ việc khai thác cho thuê lại.", "B": "Được quyền tự ý thay đổi cấu trúc chịu lực và kiến trúc mặt ngoài căn hộ trong quá trình thi công.", "C": "Yêu cầu bàn giao nhà đúng tiến độ, chất lượng và thực hiện nghĩa vụ bảo hành theo quy định.", "D": "Được quyền đơn phương đình chỉ thanh toán mọi khoản tiền nếu dự án chậm tiến độ dưới 15 ngày."}, "answer": "", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 25 Luật Kinh doanh bất động sản 2023 quy định Quyền được nhận đúng giá trị: Bên mua có quyền yêu cầu chủ đầu tư cung cấp thông tin định kỳ về tiến độ dự án và yêu cầu thực hiện đúng các cam kết trong hợp đồng về: thời hạn bàn giao, diện tích, chất lượng xây dựng và trang thiết bị đi kèm. Quyền về bảo hành: Theo quy định, nhà ở sau khi bàn giao phải được bảo hành theo pháp luật về xây dựng (thường là tối thiểu 60 tháng đối với kết cấu chính của nhà ở chung cư). Quyền về pháp lý: Bên mua có quyền yêu cầu chủ đầu tư thực hiện các thủ tục với cơ quan nhà nước để được cấp Giấy chứng nhận quyền sở hữu tài sản (Sổ hồng) đúng thời hạn (trong vòng 50 ngày kể từ khi bàn giao hoặc nộp đủ tiền)."}, {"level": "1", "content": "Chủ đầu tư không được phép chuyển nhượng quyền sở hữu nhà ở thương mại trong trường hợp nào?", "options": {"A": "Nhà ở đã hoàn thành việc bàn giao thực tế nhưng hiện chưa được cơ quan thẩm quyền cấp Giấy chứng nhận.", "B": "Nhà ở đang là tài sản thế chấp tại ngân hàng mà chưa được giải chấp hoặc có sự đồng ý của bên nhận thế chấp.", "C": "Nhà ở đã được nghiệm thu hoàn thành công trình xây dựng nhưng chưa thực hiện xong thủ tục hoàn công.", "D": "Nhà ở đã ký hợp đồng đặt cọc với khách hàng và đang chờ thông báo đủ điều kiện bán hàng của Sở Xây dựng."}, "answer": "", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 14 và Điều 24 Luật Kinh doanh bất động sản 2023. Điều kiện về quyền sở hữu: Một trong những điều kiện bắt buộc để đưa nhà ở vào kinh doanh là tài sản đó không bị kê biên để thi hành án và không đang trong tình trạng thế chấp (trừ trường hợp được bên nhận thế chấp đồng ý cho bán). Quy trình giải chấp: Thông thường, các chủ đầu tư sẽ thế chấp dự án (hoặc quyền sử dụng đất) để vay vốn xây dựng. Trước khi ký hợp đồng mua bán với khách hàng, chủ đầu tư bắt buộc phải thực hiện thủ tục giải chấp cho từng căn hộ/mảnh đất cụ thể hoặc phải có văn bản của ngân hàng xác nhận đồng ý cho chủ đầu tư bán tài sản đó. Hệ quả pháp lý: Việc ký hợp đồng khi tài sản vẫn đang bị thế chấp mà không có sự đồng ý của ngân hàng sẽ khiến hợp đồng đó bị vô hiệu. Người mua sẽ đối mặt với rủi ro cực lớn nếu chủ đầu tư mất khả năng thanh toán và ngân hàng tiến hành phát mại tài sản dự án.."}, {"level": "1", "content": "Nội dung nào dưới đây không bắt buộc phải công khai theo quy định pháp luật khi đưa dự án vào kinh doanh?", "options": {"A": "Hồ sơ pháp lý về quyền sử dụng đất và văn bản chấp thuận chủ trương đầu tư dự án.", "B": "Thông tin về quy hoạch chi tiết 1/500 hoặc bản vẽ tổng mặt bằng đã được phê duyệt.", "C": "Kế hoạch truyền thông, chiến lược tiếp thị sản phẩm và cơ cấu chiết khấu bán hàng.", "D": "Tiến độ triển khai dự án thực tế và tình trạng thế chấp dự án tại các tổ chức tín dụng."}, "answer": "", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 2 Điều 6 Luật Kinh doanh bất động sản 2023. Danh mục bắt buộc phải công khai: Để đảm bảo tính minh bạch, Luật yêu cầu chủ đầu tư phải công khai 05 nhóm thông tin chính trên trang thông tin điện tử của mình và hệ thống quản lý của Bộ Xây dựng: (1) Thông tin về doanh nghiệp (Tên, địa chỉ, số điện thoại...). (2) Thông tin về dự án (Quyết định chủ trương, quy hoạch 1/500, Giấy phép xây dựng). (3) Thông tin về tình trạng pháp lý của sản phẩm (Đã đủ điều kiện bán hay chưa, có đang bị thế chấp hay không). (4) Thông tin về việc hạn chế quyền sở hữu (nếu có). (5) Thông tin về số lượng, loại hình, giá bán và phương thức thanh toán. Về Bí mật kinh doanh: Các nội dung về chiến lược Marketing, kế hoạch truyền thông, phân bổ ngân sách quảng cáo hoặc chính sách hoa hồng nội bộ cho đại lý là bí mật thương mại của doanh nghiệp. Những thông tin này không ảnh hưởng đến quyền lợi pháp lý trực tiếp của người mua về quyền sở hữu tài sản, do đó không thuộc phạm vi điều chỉnh của nghĩa vụ công khai thông tin."}, {"level": "1", "content": "Theo quy định hiện hành, dự án đầu tư Kinh doanh bất động sản bao gồm những loại hình nào?", "options": {"A": "Dự án đầu tư xây dựng nhà ở, khu đô thị và các khu dân cư nông thôn nhằm mục đích phục vụ tái định cư.", "B": "Dự án xây dựng nhà ở, công trình xây dựng để kinh doanh và dự án xây dựng hạ tầng kỹ thuật khu công nghiệp.", "C": "Dự án xây dựng các công trình phúc lợi công cộng, hạ tầng giao thông và các công trình an ninh quốc gia.", "D": "Dự án đầu tư xây dựng các công trình công cộng không nhằm mục tiêu lợi nhuận do ngân sách Nhà nước cấp."}, "answer": "", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 3 Điều 3 Luật Kinh doanh bất động sản 2023 Phạm vi bao quát khái niệm \"Dự án bất động sản\" hiện nay không chỉ bó hẹp trong nhà ở mà mở rộng ra rất nhiều phân khúc: (1) Nhà ở và Đô thị: Dự án xây dựng nhà ở, khu đô thị, khu dân cư nông thôn. (2) Công trình đa năng: Dự án xây dựng công trình có công năng phục vụ giáo dục, y tế, thể thao, văn hóa, văn phòng, thương mại, dịch vụ, du lịch, lưu trú (condotel, officetel), công nghiệp và các công trình có công năng hỗn hợp. (3) Hạ tầng kỹ thuật: Dự án xây dựng kết cấu hạ tầng khu công nghiệp, cụm công nghiệp, khu công nghệ cao và các công trình hạ tầng kỹ thuật khác để kinh doanh quyền sử dụng đất. Điểm cốt lõi: Một dự án được xếp vào loại này phải có mục tiêu \"để kinh doanh\" (bán, cho thuê, cho thuê mua) và phải được cơ quan nhà nước có thẩm quyền chấp thuận chủ trương đầu tư.."}, {"level": "1", "content": "Theo quy định tại Điều 80 Luật Nhà ở 2023, Tổng Liên đoàn Lao động Việt Nam được giao vai trò là cơ quan chủ quản dự án đầu tư xây dựng nhà ở xã hội bằng nguồn vốn nào và phục vụ cho đối tượng nào sau đây?", "options": {"A": "Sử dụng nguồn vốn ngân sách nhà nước cấp hàng năm để xây dựng nhà ở cho mọi đối tượng thuộc diện chính sách xã hội thuê và mua.", "B": "Sử dụng nguồn tài chính công đoàn để xây dựng nhà ở xã hội cho công nhân, người lao động đủ điều kiện hưởng chính sách thuê nhà.", "C": "Sử dụng nguồn vốn vay ưu đãi từ các ngân hàng thương mại để xây dựng nhà ở công vụ cho cán bộ chuyên trách công đoàn các cấp.", "D": "Sử dụng nguồn vốn huy động xã hội hóa để xây dựng các khu dân cư hỗn hợp cho đoàn viên công đoàn có thu nhập trung bình trở lên.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 80 Luật Nhà ở 2023 (Luật số 27/2023/QH15). Điểm mới đột phá: Đây là lần đầu tiên khung pháp lý chính thức công nhận Tổng Liên đoàn Lao động Việt Nam là chủ quản đầu tư dự án nhà ở xã hội. Điều này giúp huy động nguồn lực cực lớn từ nguồn tài chính công đoàn để giải quyết bài toán an cư cho người lao động. Hình thức khai thác: Khác với các doanh nghiệp kinh doanh bất động sản, dự án do Tổng Liên đoàn đầu tư chỉ tập trung vào hình thức cho thuê. Điều này nhằm bảo toàn nguồn tài chính công đoàn và đảm bảo tính bền vững của quỹ nhà ở cho các thế hệ công nhân tiếp theo. Đối tượng thụ hưởng: Phải là công nhân, người lao động thuộc đối tượng được hưởng chính sách nhà ở xã hội theo quy định của Luật Nhà ở."}, {"level": "1", "content": "Theo quy định tại Điều 89 Luật Nhà ở 2023, trường hợp bên mua nhà ở xã hội đã thanh toán đủ tiền và được cấp Giấy chứng nhận, sau thời hạn ít nhất là 05 năm, họ được thực hiện việc bán lại nhà ở này theo phương thức nào sau đây??", "options": {"A": "Được bán cho mọi đối tượng có nhu cầu theo cơ chế thị trường nhưng phải nộp tiền sử dụng đất và các khoản thuế theo quy định.", "B": "Chỉ được phép bán lại cho các đối tượng thuộc diện được hưởng chính sách nhà ở xã hội theo danh sách của cơ quan quản lý.", "C": "Bắt buộc phải bán lại cho Chủ đầu tư dự án hoặc cơ quan quản lý nhà nước để tái nhập vào quỹ nhà ở xã hội của địa phương.", "D": "Chỉ được bán cho những người đã có đăng ký thường trú tại tỉnh, thành phố nơi có dự án nhà ở xã hội đó tọa lạc.."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 5 Điều 89 Luật Nhà ở 2023 (Luật số 27/2023/QH15): Sau thời hạn 05 năm (tính từ thời điểm thanh toán đủ tiền mua nhà), người mua nhà ở xã hội được quyền bán lại theo cơ chế thị trường cho các đối tượng có nhu cầu (không phân biệt đối tượng). Nghĩa vụ tài chính: Khi bán cho đối tượng không thuộc diện ưu đãi (người mua thông thường), người bán phải nộp tiền sử dụng đất theo quy định của Chính phủ và nộp thuế thu nhập cá nhân. Đây là quy định nhằm hoàn trả lại phần giá trị ưu đãi mà Nhà nước đã hỗ trợ ban đầu. Lưu ý sự khác biệt: Nếu bán trong thời hạn 05 năm, thì mới áp dụng quy tắc \"Chỉ được bán cho đối tượng đủ điều kiện mua nhà ở xã hội hoặc bán lại cho chủ đầu tư\" (như phương án B và C).."}, {"level": "1", "content": "Theo Văn bản hợp nhất 03/VBHN-BXD (2026) (hợp nhất từ Nghị định 06/2021 và 35/2023), thẩm quyền kiểm tra công tác nghiệm thu đối với công trình xây dựng thuộc dự án đầu tư kinh doanh bất động sản cấp I (trừ công trình do Thủ tướng Chính phủ giao) được quy định như thế nào?", "options": {"A": "Toàn bộ các công trình cấp I bắt buộc phải do cơ quan chuyên môn thuộc Bộ Xây dựng thực hiện kiểm tra công tác nghiệm thu.", "B": "Cơ quan chuyên môn về xây dựng thuộc UBND cấp Tỉnh thực hiện kiểm tra (trừ công trình quan trọng quốc gia hoặc theo phân cấp).", "C": "Chủ đầu tư được quyền tự quyết định lựa chọn đơn vị kiểm tra là Sở Xây dựng địa phương hoặc Cục Công tác phía Nam (Bộ Xây dựng).", "D": "Việc kiểm tra công tác nghiệm thu được chuyển giao hoàn toàn cho các đơn vị tư vấn độc lập có chứng chỉ năng lực hạng I thực hiện."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 24 Nghị định 06/2021/NĐ-CP quy định rõ các loại công trình thuộc đối tượng phải được cơ quan chuyên môn về xây dựng kiểm tra công tác nghiệm thu trước khi đưa vào sử dụng. Không phải mọi công trình đều cần Nhà nước vào kiểm tra nghiệm thu. Việc kiểm tra chỉ tập trung vào các nhóm có rủi ro cao hoặc sử dụng tiền thuế của dân: (1) Công trình quan trọng quốc gia; công trình quy mô lớn, kỹ thuật phức tạp (được quy định chi tiết tại Phụ lục VIII của Nghị định). (2) Công trình sử dụng vốn đầu tư công hoặc vốn nhà nước ngoài đầu tư công. (3) Công trình có ảnh hưởng lớn đến an toàn, lợi ích cộng đồng (như chung cư cao tầng, trung tâm thương mại, trường học, bệnh viện... quy định tại Phụ lục X). Vai trò của cơ quan chức năng: Cơ quan chuyên môn (Sở Xây dựng hoặc Cục Công tác phía Nam – Bộ Xây dựng) sẽ kiểm tra việc chủ đầu tư và các nhà thầu thực hiện nghiệm thu có đúng quy trình, hồ sơ có đầy đủ và thực tế thi công có đảm bảo an toàn hay không trước khi ra văn bản Chấp thuận kết quả nghiệm thu.  Điều 24 Nghị định 06/2021/NĐ-CP đã được sửa đổi bởi Khoản 6 Điều 12 Nghị định 35/2023/NĐ-CP và hợp nhất tại VBHN 03/VBHN-BXD (2026). Điểm mới về phân cấp: Điểm cốt lõi của sự thay đổi này là việc \"giảm tải\" cho Trung ương. Theo quy định mới, các cơ quan chuyên môn về xây dựng thuộc UBND cấp Tỉnh (thường là Sở Xây dựng, Sở Giao thông vận tải, Sở Công thương...) có thẩm quyền kiểm tra hầu hết các công trình trên địa bàn, bao gồm cả công trình cấp I."}, {"level": "1", "content": "Căn cứ theo Điều 107 Bộ luật Dân sự 2015, danh mục tài sản nào sau đây phản ánh đầy đủ và chính xác nhất phạm vi của bất động sản trong hệ thống pháp luật Việt Nam?", "options": {"A": "Đất đai, nhà ở và các công trình xây dựng gắn liền với đất đã được cơ quan nhà nước cấp giấy chứng nhận quyền sở hữu.", "B": "Đất đai; nhà, công trình xây dựng gắn liền với đất đai; tài sản khác gắn liền với đất đai, nhà, công trình xây dựng; tài sản khác do pháp luật quy định.", "C": "Toàn bộ các vật hữu hình không thể di dời, dịch chuyển về mặt cơ học và các quyền tài sản phát sinh từ đất đai.", "D": "Quyền sử dụng đất, quyền sở hữu nhà ở và các tài sản khác gắn liền với đất đai đã được đăng ký theo quy định của pháp luật."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đáp án B được trích dẫn nguyên văn từ Khoản 1 Điều 107 BLDS 2015. Điểm quan trọng nhất ở đây là cấu trúc \"mở\" của luật: Luật không chỉ định nghĩa bất động sản dựa trên đặc tính vật lý (không thể di dời) mà còn dựa trên đặc tính pháp lý (tài sản khác do pháp luật quy định)."}, {"level": "1", "content": "Theo quy định tại Điều 158 Bộ luật Dân sự 2015, quyền sở hữu đối với tài sản (bao gồm cả bất động sản là nhà ở, công trình xây dựng) bao gồm những quyền năng cơ bản nào sau đây?", "options": {"A": "Quyền chiếm hữu, quyền khai thác công dụng và quyền hưởng hoa lợi, lợi tức.", "B": "Quyền chiếm hữu, quyền sử dụng và quyền định đoạt.", "C": "Quyền quản lý, quyền sử dụng và quyền chuyển nhượng cho bên thứ ba.", "D": "Quyền sở hữu, quyền chiếm giữ thực tế và quyền định đoạt về mặt pháp lý.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Bộ luật Dân sự 2015 quy định quyền sở hữu bao gồm 3 quyền năng cơ bản là quyền chiếm hữu, quyền sử dụng và quyền định đoạt đối với tài sản. Đây là định nghĩa mang tính nguyên tắc tại Chương XI của BLDS 2015: (1) Quyền chiếm hữu (Điều 186): Là quyền nắm giữ, chi phối tài sản một cách trực tiếp hoặc gián tiếp như chủ thể có quyền đối với tài sản. (2) Quyền sử dụng (Điều 189): Là quyền khai thác công dụng, hưởng hoa lợi, lợi tức từ tài sản. (3) Quyền định đoạt (Điều 192): Là quyền chuyển giao quyền sở hữu tài sản, từ bỏ quyền sở hữu, tiêu dùng hoặc tiêu hủy tài sản."}, {"level": "1", "content": "Theo quy định tại Điều 108 Bộ luật Dân sự 2015, tài sản hình thành trong tương lai được công nhận là đối tượng của giao dịch dân sự bao gồm những nhóm nào sau đây?", "options": {"A": "Tài sản chưa hình thành về mặt vật lý tại thời điểm giao dịch và không bao gồm quyền sử dụng đất.", "B": "Tài sản chưa hình thành và tài sản đã hình thành nhưng chủ thể xác lập quyền sở hữu sau thời điểm xác lập giao dịch.", "C": "Toàn bộ các loại động sản đang trong quá trình sản xuất và chưa được nghiệm thu bàn giao thực tế.", "D": "Các công trình xây dựng đã hoàn thiện nhưng chưa được cơ quan nhà nước cấp giấy chứng nhận quyền sở hữu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Bộ luật dân sự 2015 công nhận \"tài sản hình thành trong tương lai\" là đối tượng của quyền sở hữu và giao dịch dân sự, làm cơ sở pháp lý cho giao dịch mua bán nhà ở, công trình xây dựng hình thành trong tương lai. Đáp án B phản ánh đầy đủ hai trạng thái của tài sản tương lai theo Khoản 2 Điều 108 BLDS 2015: Trạng thái 1 (Chưa hình thành): Tài sản đang trong quá trình đầu tư, xây dựng, chế tạo (Ví dụ: Căn hộ chung cư đang xây móng). Trạng thái 2 (Đã hình thành nhưng chưa xác lập quyền sở hữu): Tài sản đã tồn tại thực tế, nhưng tại thời điểm ký hợp đồng, người bán/người tặng cho chưa có quyền sở hữu đối với nó (Ví dụ: Người con ký hợp đồng thế chấp ngôi nhà mà mình sắp được nhận thừa kế theo di chúc nhưng chưa hoàn tất thủ tục khai nhận)."}, {"level": "1", "content": "Căn cứ theo quy định tại Điều 119 và Điều 502 Bộ luật Dân sự 2015, hình thức của hợp đồng về quyền sử dụng đất và tài sản gắn liền với đất được quy định như thế nào để đảm bảo hiệu lực pháp lý?", "options": {"A": "Có thể thực hiện bằng lời nói hoặc hành vi cụ thể nếu có người làm chứng.", "B": "Phải được lập thành văn bản, có công chứng hoặc chứng thực (trừ trường hợp luật khác có quy định khác).", "C": "Bắt buộc phải lập thành văn bản và phải được đăng ký tại cơ quan quản lý đất đai.", "D": "Phải được lập thành văn bản có chữ ký của các bên và sự xác nhận của Ủy ban nhân dân cấp xã."}, "answer": "B", "explanati

on": "<b>Giải thích học thuật:</b> Bộ luật dân sự 2015 và các luật chuyên ngành thường yêu cầu hợp đồng mua bán bất động sản phải lập thành văn bản và có công chứng hoặc chứng thực để đảm bảo tính pháp lý.  Điều 119 BLDS 2015 (Hình thức giao dịch dân sự): Khẳng định nếu luật quy định giao dịch phải bằng văn bản, có công chứng, chứng thực thì phải tuân theo. Điều 502 BLDS 2015 (Hình thức, thủ tục thực hiện hợp đồng về quyền sử dụng đất): Quy định rõ hợp đồng về quyền sử dụng đất phải lập thành văn bản và phù hợp với quy định của pháp luật về đất đai. Sự kết nối với Luật chuyên ngành: Khoản 3 Điều 27 Luật Đất đai 2024 (tương ứng Điều 167 Luật 2013) quy định hợp đồng chuyển nhượng, tặng cho, thế chấp, góp vốn bằng quyền sử dụng đất phải được công chứng hoặc chứng thực."}, {"level": "1", "content": "Theo quy định tại Điều 161 Bộ luật Dân sự 2015, đối với tài sản mà pháp luật quy định phải đăng ký quyền sở hữu, thời điểm xác lập quyền sở hữu có hiệu lực kể từ thời điểm nào sau đây (trường hợp luật khác không có quy định khác)?", "options": {"A": "Kể từ thời điểm hợp đồng mua bán được công chứng hoặc chứng thực theo quy định.", "B": "Kể từ thời điểm bên mua hoàn thành nghĩa vụ thanh toán và nhận bàn giao tài sản trên thực địa.", "C": "Kể từ thời điểm hoàn thành thủ tục đăng ký quyền sở hữu tại cơ quan nhà nước có thẩm quyền.", "D": "Kể từ thời điểm các bên ký kết văn bản thỏa thuận về việc chuyển giao quyền sở hữu tài sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Khoản 2 Điều 161 BLDS 2015: \"Trường hợp tài sản phải đăng ký quyền sở hữu thì quyền sở hữu được xác lập kể từ thời điểm hoàn thành thủ tục đăng ký.\"Đây là căn cứ quan trọng nhất để xác định tính đối kháng với bên thứ ba và trách nhiệm chịu rủi ro đối với tài sản trong các giao dịch dân sự thông thường. Đối với Nhà ở: Căn cứ Điều 12 Luật Nhà ở 2023 (có hiệu lực từ 01/08/2024), thời điểm chuyển quyền sở hữu có những ngoại lệ quan trọng: Nếu mua của Chủ đầu tư: Thời điểm bên mua nhận bàn giao nhà hoặc thanh toán đủ tiền (theo thỏa thuận). Nếu mua bán giữa cá nhân: Thời điểm bên mua đã thanh toán đủ tiền và nhận bàn giao nhà (trừ khi có thỏa thuận khác). Đối với Quyền sử dụng đất: Căn cứ Điều 27 Luật Đất đai 2024, việc chuyển đổi, chuyển nhượng... có hiệu lực kể từ thời điểm đăng ký vào sổ địa chính."}, {"level": "1", "content": "Căn cứ theo Điều 257 Bộ luật Dân sự 2015, chủ thể nắm giữ \"Quyền hưởng dụng\" đối với bất động sản có những quyền năng nào sau đây trong thời hạn quyền này đang có hiệu lực?", "options": {"A": "Được chiếm hữu và sử dụng bất động sản để đáp ứng nhu cầu ở hoặc sinh hoạt cá nhân.", "B": "Được khai thác công dụng và hưởng hoa lợi, lợi tức từ bất động sản thuộc quyền sở hữu của người khác.", "C": "Được quyền thay đổi công năng, cải tạo cấu trúc hoặc dùng bất động sản để bảo đảm nghĩa vụ dân sự.", "D": "Được toàn quyền định đoạt đối với bất động sản thông qua các hình thức chuyển nhượng, tặng cho."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 257 và Điều 261 BLDS 2015: (1) Khai thác công dụng: Sử dụng bất động sản vào các mục đích kinh tế hoặc sinh hoạt. (2) Hưởng hoa lợi, lợi tức: Người hưởng dụng có quyền sở hữu đối với các hoa lợi, lợi tức phát sinh từ tài sản (ví dụ: tiền cho thuê nhà, sản vật nông nghiệp từ đất) trong thời hạn hưởng dụng. (3) Tính thời hạn: Quyền hưởng dụng luôn có thời hạn (theo thỏa thuận hoặc theo đời người của người hưởng dụng).  \"Quyền hưởng dụng\" (Usufruct) là một trong những vật quyền mới được quy định chi tiết từ BLDS 2015, mang tính ứng dụng cao trong việc tách biệt quyền sở hữu và quyền khai thác giá trị kinh tế của bất động sản. Đây là một khái niệm thường gây lúng túng cho người học bất động sản khi phân biệt với \"Quyền sở hữu\" hoặc \"Quyền thuê tài sản\". Có thể hiểu, Quyền hưởng dụng là quyền khai thác công dụng và hưởng hoa lợi, lợi tức từ tài sản của người khác, nhưng không bao gồm quyền định đoạt tài sản gốc. Đây là nội dung cốt lõi của Vật quyền trên tài sản của người khác."}, {"level": "1", "content": "Căn cứ theo quy định tại Điều 475 Bộ luật Dân sự 2015, bên thuê bất động sản có quyền cho thuê lại tài sản đã thuê trong trường hợp nào sau đây?", "options": {"A": "Được phép tự do thực hiện nếu mục đích sử dụng tài sản không thay đổi.", "B": "Được phép thực hiện nếu có sự đồng ý của bên cho thuê.", "C": "Chỉ được thực hiện khi thời hạn thuê còn lại từ 06 tháng trở lên.", "D": "Không được phép thực hiện nhằm đảm bảo quyền định đoạt của chủ sở hữu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đáp án B được trích dẫn trực tiếp từ Điều 475 BLDS 2015: \"Bên thuê có quyền cho thuê lại tài sản mà mình đã thuê, nếu được bên cho thuê đồng ý.\" Đây là quy định nhằm bảo vệ quyền lợi của chủ sở hữu (bên cho thuê), vì việc cho thuê lại làm phát hiện thêm một chủ thể mới tham gia vào việc chiếm hữu và sử dụng tài sản, có thể làm tăng rủi ro hư hỏng hoặc thay đổi công năng tài sản mà chủ sở hữu không mong muốn. Điều này có sự giao thoa với Luật Kinh doanh bất động sản 2023: Trong kinh doanh bất động sản, việc \"cho thuê lại\" là một hình thức kinh doanh chính thống (Khoản 1 Điều 3). Tuy nhiên, ngay cả trong luật chuyên ngành, quyền này vẫn phải dựa trên hợp đồng thuê gốc. Nếu hợp đồng gốc cấm cho thuê lại, thì hành vi này sẽ dẫn đến việc chấm dứt hợp đồng và bồi thường thiệt hại.."}, {"level": "1", "content": "Căn cứ quy định tại Điều 612 Bộ luật Dân sự 2015, di sản thừa kế bao gồm những thành phần nào sau đây?", "options": {"A": "Các quyền nhân thân gắn liền với tài sản và toàn bộ nghĩa vụ tài sản của người chết.", "B": "Phần tài sản của người chết trong khối tài sản chung hợp nhất với vợ hoặc chồng.", "C": "Tài sản riêng của người chết và phần tài sản của người chết trong tài sản chung với người khác.", "D": "Toàn bộ bất động sản và động sản thuộc quyền sử dụng, quyền sở hữu của người chết."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 612 Bộ luật dân sự 2015 định nghĩa di sản bao gồm tài sản riêng của người chết và phần tài sản của người đó trong khối tài sản chung với người khác. Tài sản riêng: Những tài sản mà người chết đứng tên hoặc có quyền sở hữu độc lập (ví dụ: bất động sản được tặng cho riêng, thừa kế riêng). Phần trong tài sản chung: Đây là điểm phức tạp nhất trong thực tế. Nếu tài sản chưa được phân chia (như quyền sử dụng đất của hộ gia đình), di sản được xác định là phần giá trị tương ứng với suất của người chết trong khối tài sản chung đó."}, {"level": "1", "content": "Theo quy định của Bộ luật Dân sự 2015, mặc dù pháp luật công nhận nhiều hình thức di chúc khác nhau, nhưng hình thức nào sau đây được khuyến nghị nhằm tối ưu hóa tính pháp lý và giảm thiểu rủi ro tranh chấp đối với di sản là bất động sản?", "options": {"A": "Di chúc miệng được lập trước mặt ít nhất hai người làm chứng trong tình trạng tính mạng bị đe dọa.", "B": "Di chúc bằng văn bản tự viết và ký tên, không có người làm chứng hoặc xác nhận của cơ quan chức năng.", "C": "Di chúc bằng văn bản được lập tại tổ chức hành nghề công chứng hoặc Ủy ban nhân dân cấp xã.", "D": "Di chúc bằng văn bản có ít nhất hai người làm chứng ký xác nhận nhưng không qua thủ tục công chứng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 630 BLDS 2015, di chúc hợp pháp phải đáp ứng các điều kiện về năng lực chủ thể và nội dung. Khi có công chứng/chứng thực, Công chứng viên hoặc viên chức nhà nước sẽ xác nhận trực tiếp về năng lực hành vi dân sự, sự tự nguyện của người lập di chúc và tính hợp pháp của nội dung di chúc. Trình tự, thủ tục: Các Điều 635, 636 và 637 quy định quy trình chặt chẽ về việc lập di chúc tại cơ quan công chứng. Việc này giúp loại bỏ các khiếu nại về việc di chúc bị giả mạo chữ ký, bị ép buộc hoặc người lập di chúc không minh mẫn. Lưu trữ: Di chúc công chứng thường được lưu trữ tại tổ chức hành nghề công chứng, giúp tránh thất lạc hoặc bị tiêu hủy bởi những người có quyền lợi đối lập. Phương án A (Di chúc miệng): Theo Điều 629, chỉ có hiệu lực trong 03 tháng nếu người lập di chúc còn sống và minh mẫn. Đây là hình thức cực kỳ lỏng lẻo về chứng cứ. Phương án B (Di chúc không người làm chứng): Dễ bị tranh chấp về tính xác thực của chữ ký và trạng thái tinh thần của người lập (theo Điều 633). Phương án D (Di chúc có người làm chứng): Dù hợp pháp theo Điều 634, nhưng vẫn có rủi ro về việc người làm chứng thay đổi lời khai hoặc không đủ năng lực làm chứng theo quy định tại Điều 632.."}, {"level": "1", "content": "Căn cứ theo Điều 644 Bộ luật Dân sự 2015, những người thuộc đối tượng thừa kế không phụ thuộc vào nội dung di chúc (con chưa thành niên, cha, mẹ, vợ, chồng...) được hưởng phần di sản bằng bao nhiêu so với một suất thừa kế theo pháp luật?", "options": {"A": "Bằng một phần hai (1/2) suất của một người thừa kế theo pháp luật.", "B": "Bằng hai phần ba (2/3) suất của một người thừa kế theo pháp luật.", "C": "Bằng toàn bộ (01) suất của một người thừa kế theo pháp luật.", "D": "Tỷ lệ do Tòa án quyết định dựa trên mức độ đóng góp vào khối di sản."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quy định này có giá trị phủ quyết một phần nội dung di chúc. Ngay cả khi người lập di chúc tuyên bố \"không cho con trai đã thành niên nhưng mất khả năng lao động hưởng bất kỳ tài sản nào\", thì pháp luật vẫn can thiệp để đảm bảo người con đó nhận đủ 2/3 suất theo luật định. Chế định \"Người thừa kế không phụ thuộc vào nội dung di chúc\" (hay còn gọi là suất thừa kế bắt buộc) là một trong những quy định mang tính nhân văn và bảo vệ nhóm đối tượng yếu thế trong luật dân sự. Đây là \"khung xương\" để giải quyết các vụ án tranh chấp di sản khi người lập di chúc gạt tên người thân ra khỏi danh sách thụ hưởng. Điều 644 Bộ luật dân sự 2015 quy định rõ phần di sản những người này được hưởng bằng 2/3 suất của một người thừa kế theo pháp luật.  Đây là con số định lượng cố định tại Khoản 1 Điều 644 BLDS 2015. Cách tính này được áp dụng trong trường hợp di sản được chia theo pháp luật, nếu người chết không để lại di chúc hoặc di chúc không cho những người này hưởng di sản (hoặc cho hưởng ít hơn 2/3 suất). Cách tính suất này cần lưu ý 2 điểm mấu chốt: (1) Xác định \"suất thừa kế theo pháp luật\": Là số di sản chia đều cho tất cả những người thừa kế ở hàng thứ nhất (theo Điều 651). (2) Giá trị suất bắt buộc: Bằng 2/3 x (Tổng di sản / Số người ở hàng thừa kế thứ nhất)."}, {"level": "1", "content": "Ai thuộc hàng thừa kế thứ nhất theo pháp luật (Điều 651 Bộ luật Dân sự 2015)?", "options": {"A": "Ông bà nội, ông bà ngoại, anh chị em ruột.", "B": "Vợ, chồng, cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, con đẻ, con nuôi.", "C": "Cụ nội, cụ ngoại, bác chú cậu cô dì ruột.", "D": "Cháu ruột, chắt ruột."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 651 Bộ luật dân sự 2015 xác định rõ những người thuộc hàng thừa kế thứ nhất."}, {"level": "1", "content": "Căn cứ theo Điều 33 Luật Hôn nhân và Gia đình 2014, quyền sử dụng đất mà vợ chồng có được sau khi kết hôn được pháp luật xác định theo chế độ sở hữu nào sau đây?", "options": {"A": "Mặc định là tài sản riêng của người đứng tên trên Giấy chứng nhận quyền sử dụng đất theo nguyên tắc đăng ký tài sản.", "B": "Là tài sản chung của vợ chồng, trừ trường hợp được thừa kế riêng, tặng cho riêng hoặc có được thông qua giao dịch bằng tài sản riêng.", "C": "Luôn luôn là tài sản chung hợp nhất và không thể phân chia trong suốt thời kỳ hôn nhân.", "D": "Là tài sản thuộc sở hữu của người có thu nhập chính trong gia đình tại thời điểm xác lập quyền sử dụng đất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 33 Luật hôn nhân và gia đình 2014 quy định rõ quyền sử dụng đất có được sau khi kết hôn là tài sản chung, trừ 3 trường hợp ngoại lệ cụ thể. Pháp luật Việt Nam áp dụng nguyên tắc \"Suy đoán tài sản chung\": Mọi tài sản hình thành trong thời kỳ hôn nhân, bao gồm cả quyền sử dụng đất, đều được coi là tài sản chung nếu các bên không có căn cứ chứng minh đó là tài sản riêng. Ba ngoại lệ cốt lõi: (1) Thừa kế riêng: Ví dụ, người vợ được cha mẹ để lại di chúc thừa kế riêng một mảnh đất sau khi lấy chồng. (2) Tặng cho riêng: Ví dụ, người chồng được tặng cho riêng quyền sử dụng đất thông qua hợp đồng tặng cho có ghi rõ đối tượng thụ hưởng. (3) Giao dịch bằng tài sản riêng: Ví dụ, người vợ dùng số tiền tiết kiệm có từ trước khi kết hôn để mua đất (với điều kiện phải chứng minh được nguồn gốc dòng tiền)."}, {"level": "1", "content": "Việc định đoạt bất động sản là tài sản chung của vợ chồng yêu cầu điều kiện gì theo Điều 35 Luật Hôn nhân và Gia đình 2014?", "options": {"A": "Cần sự đồng ý bằng lời nói của vợ hoặc chồng trước mặt người làm chứng.", "B": "Phải có sự thỏa thuận bằng văn bản của cả vợ và chồng.", "C": "Người đứng tên trên Giấy chứng nhận quyền sử dụng đất có toàn quyền quyết định mà không cần hỏi ý kiến bên còn lại.", "D": "Cần sự đồng ý của vợ hoặc chồng nếu tài sản đó đang được dùng để kinh doanh."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 35 Luật hôn nhân và gia đình 2014 yêu cầu phải có sự thỏa thuận bằng văn bản của vợ chồng khi định đoạt tài sản chung là bất động sản."}, {"level": "1", "content": "Trong trường hợp một bên vợ hoặc chồng tự ý xác lập, thực hiện giao dịch liên quan đến bất động sản là tài sản chung mà không có sự thỏa thuận bằng văn bản của bên còn lại, hậu quả pháp lý được xác định như thế nào?", "options": {"A": "Giao dịch vẫn có hiệu lực nhưng bên còn lại được bồi thường.", "B": "Giao dịch bị tạm dừng để bổ sung chữ ký.", "C": "Bên còn lại có quyền yêu cầu Tòa án tuyên bố giao dịch đó vô hiệu.", "D": "Giao dịch chỉ vô hiệu một phần tương ứng với phần tài sản của bên không đồng ý."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 13 Nghị định 126/2014/NĐ-CP (hướng dẫn Luật HN&GĐ) quy định rõ: Việc chiếm hữu, sử dụng, định đoạt tài sản chung do vợ chồng thỏa thuận. Trường hợp vợ hoặc chồng xác lập, thực hiện giao dịch liên quan đến tài sản chung mà không có sự đồng ý của bên kia thì bên kia có quyền yêu cầu Tòa án tuyên bố giao dịch vô hiệu. Hệ quả của vô hiệu theo Điều 131 BLDS 2015, các bên hoàn trả cho nhau những gì đã nhận. Điều này gây rủi ro cực lớn cho bên mua (bên thứ ba) vì có thể mất cơ hội đầu tư hoặc gặp khó khăn trong việc thu hồi tiền đã thanh toán."}, {"level": "1", "content": "Theo quy định tại Khoản 2 Điều 59 Luật Hôn nhân và Gia đình 2014, khi phân chia tài sản chung của vợ chồng (bao gồm cả bất động sản), Tòa án KHÔNG căn cứ vào yếu tố nào sau đây để điều chỉnh tỷ lệ phân chia?", "options": {"A": "Hoàn cảnh của gia đình và của vợ, chồng sau khi ly hôn.", "B": "Công sức đóng góp của vợ, chồng vào việc xác lập, duy trì và phát triển khối tài sản chung.", "C": "Lỗi của mỗi bên trong việc vi phạm quyền, nghĩa vụ vợ chồng dẫn đến ly hôn.", "D": "Giới tính của vợ hoặc chồng để ưu tiên bên yếu thế hơn về mặt sinh học."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Điều 59 Luật hôn nhân và gia đình 2014 liệt kê các yếu tố Tòa án xem xét khi chia tài sản chung, bao gồm hoàn cảnh, công sức đóng góp, bảo vệ lợi ích chính đáng và lỗi của các bên, không có yếu tố giới tính. Hiến pháp và pháp luật Việt Nam triệt để tuân thủ nguyên tắc Bình đẳng giới. Việc phân chia tài sản dựa trên quyền và nghĩa vụ, không dựa trên đặc điểm sinh học. Dù là nam hay nữ, nếu có công sức đóng góp ngang nhau và hoàn cảnh tương đồng thì tỷ lệ hưởng di sản/tài sản là như nhau."}, {"level": "1", "content": "Khi thực hiện các giao dịch về bất động sản, sự khác biệt căn bản nhất về giá trị pháp lý giữa hành vi \"Công chứng\" (theo Luật Công chứng) và \"Chứng thực\" (theo Nghị định 23/2015/NĐ-CP) là gì?", "options": {"A": "Thẩm quyền thực hiện: Công chứng chỉ do cơ quan hành chính nhà nước (UBND) thực hiện, chứng thực do các tổ chức tư nhân (Văn phòng công chứng) thực hiện.", "B": "Phạm vi bảo đảm: Công chứng bảo đảm tính xác thực, hợp pháp của nội dung hợp đồng; Chứng thực chỉ chứng nhận chữ ký, thời gian, địa điểm và năng lực hành vi của người ký.", "C": "Hiệu lực thực thi: Chỉ có văn bản công chứng mới có giá trị chứng cứ trước Tòa án, văn bản chứng thực chỉ có giá trị tham khảo.", "D": "Đối tượng áp dụng: Công chứng bắt buộc đối với mọi giao dịch bất động sản, chứng thực chỉ áp dụng đối với các giao dịch có giá trị dưới 50 triệu đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Công chứng đi sâu vào tính hợp pháp của nội dung và ý chí tự nguyện, trong khi chứng thực hợp đồng, giao dịch tập trung hơn vào các yếu tố hình thức bên ngoài như chữ ký, thời gian, địa điểm."}, {"level": "1", "content": "Căn cứ theo quy định tại Khoản 1 Điều 164 Luật Nhà ở 2023, nhóm giao dịch nào sau đây về nhà ở BẮT BUỘC phải thực hiện công chứng hoặc chứng thực hợp đồng (trừ trường hợp các bên có nhu cầu tự nguyện)?", "options": {"A": "Cho thuê, cho mượn, cho ở nhờ hoặc ủy quyền quản lý nhà ở.", "B": "Mua bán, thuê mua, tặng cho, đổi, góp vốn, thế chấp nhà ở và chuyển nhượng hợp đồng mua bán nhà ở thương mại.", "C": "Tặng cho nhà tình nghĩa, nhà đại đoàn kết hoặc mua bán nhà ở xã hội mà một bên là tổ chức.", "D": "Mua bán, thuê mua nhà ở thuộc tài sản công hoặc nhà ở phục vụ tái định cư."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 164 Luật Nhà ở 2023 quy định các giao dịch như mua bán, thuê mua, tặng cho, đổi, góp vốn, thế chấp nhà ở phải được công chứng hoặc chứng thực (trừ các trường hợp được miễn tại Khoản 2). Đây là nhóm giao dịch làm thay đổi chủ sở hữu hoặc xác lập quyền ưu tiên đối với tài sản (thế chấp). Căn cứ Khoản 1 Điều 164: Các giao dịch này có tính chất quan trọng, ảnh hưởng trực tiếp đến quyền sở hữu và trật tự quản lý hành chính về nhà ở, do đó Nhà nước yêu cầu sự kiểm soát của Công chứng viên hoặc UBND cấp xã để đảm bảo tính xác thực. Thời điểm có hiệu lực của hợp đồng trong các trường hợp này là thời điểm công chứng, chứng thực."}, {"level": "1", "content": "Các bên trong hợp đồng đặt cọc mua bán nhà đất có được phép thỏa thuận vừa áp dụng \"phạt cọc\" (theo Điều 328 BLDS) vừa áp dụng \"phạt vi phạm\" (theo Điều 418 BLDS) đối với cùng một hành vi vi phạm không?", "options": {"A": "Được phép thỏa thuận đồng thời cả hai loại chế tài này nếu không vi phạm điều cấm của luật.", "B": "Không được phép, vì đây là hành vi \"phạt chồng phạt\" đối với một vi phạm dân sự.", "C": "Chỉ được áp dụng phạt vi phạm nếu khoản tiền phạt thấp hơn giá trị tài sản đặt cọc.", "D": "Chỉ được áp dụng phạt cọc, vì đặt cọc là biện pháp bảo đảm có tính ưu tiên hơn."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Căn cứ: Điều 418 BLDS 2015 và tinh thần của Nghị định 21/2021/NĐ-CP. Pháp luật dân sự tôn trọng sự thỏa thuận của các bên. Bản chất của \"phạt cọc\" là hệ quả của biện pháp bảo đảm, còn \"phạt vi phạm\" là một loại chế tài do các bên thỏa thuận trong hợp đồng. Do đó, nếu các bên tự nguyện thỏa thuận áp dụng cả hai khi có vi phạm thì thỏa thuận này có hiệu lực, trừ khi luật chuyên ngành (như Luật Thương mại, Luật Xử lý Vi phạm Hành chính) có quy định giới hạn khác về mức phạt."}, {"level": "1", "content": "Trong giao dịch bất động sản, nếu các bên có thỏa thuận về việc giao nhận một khoản tiền nhưng không xác định rõ là tiền đặt cọc hay tiền trả trước, thì khoản tiền này được xác định là loại nào theo quy định pháp luật hiện hành?", "options": {"A": "Mặc định là tiền đặt cọc để bảo đảm giao kết hợp đồng.", "B": "Được xác định là tiền trả trước.", "C": "Được xác định là tài sản ký quỹ tại ngân hàng.", "D": "Tùy thuộc vào phán quyết của Tòa án dựa trên chứng cứ thực tế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ: Điều 37 Nghị định 21/2021/NĐ-CP về bảo đảm thực hiện nghĩa vụ. Đây là quy định nhằm bảo vệ quyền lợi của bên giao tiền. Nếu không ghi rõ là \"đặt cọc\" thì khoản tiền đó được coi là \"trả trước\" (thanh toán trước một phần nghĩa vụ). Hệ quả pháp lý là: nếu giao dịch không thành, tiền trả trước chỉ cần hoàn trả lại mà không phát sinh chế tài \"phạt cọc\" (gấp đôi hoặc mất trắng) như đối với đặt cọc.."}, {"level": "1", "content": "Theo quy định tại Điều 328 Bộ luật Dân sự 2015, trường hợp hợp đồng đặt cọc không thể thực hiện được do lỗi của cả bên đặt cọc và bên nhận đặt cọc thì xử lý tài sản đặt cọc như thế nào (nếu không có thỏa thuận khác)?", "options": {"A": "Bên nhận đặt cọc phải trả lại tài sản đặt cọc và phạt cọc một khoản tiền tương đương giá trị tài sản đó.", "B": "Tài sản đặt cọc thuộc về bên nhận đặt cọc để bù đắp các chi phí chuẩn bị giao dịch.", "C": "Bên nhận đặt cọc trả lại tài sản đặt cọc cho bên đặt cọc và không bên nào bị phạt cọc.", "D": "Tòa án sẽ chia đôi giá trị tài sản đặt cọc cho mỗi bên hưởng một nửa."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ: Khoản 2 Điều 328 BLDS 2015 và thực tiễn xét xử. Luật quy định nếu bên đặt cọc từ chối giao kết/thực hiện thì mất cọc; nếu bên nhận đặt cọc từ chối thì phải trả lại cọc và phạt cọc. Tuy nhiên, trong trường hợp \"hỗn hợp lỗi\" (cả hai bên cùng có lỗi dẫn đến hợp đồng không thực hiện được), nguyên tắc công bằng được áp dụng: các bên trở về trạng thái ban đầu, bên nhận trả lại tài sản đặt cọc và không phát sinh nghĩa vụ phạt cọc.."}, {"level": "1", "content": "Chế định thừa kế thế vị theo quy định tại BLDS 2015 được áp dụng trong phạm vi nào sau đây?", "options": {"A": "Áp dụng cho cả thừa kế theo di chúc và thừa kế theo pháp luật nhằm bảo vệ quyền lợi của hậu duệ.", "B": "Chỉ áp dụng đối với thừa kế theo pháp luật, không áp dụng đối với thừa kế theo di chúc.", "C": "Áp dụng đối với thừa kế theo di chúc nếu người lập di chúc có ghi rõ điều khoản \"thế vị\" trong văn bản.", "D": "Chỉ áp dụng đối với di sản là bất động sản, không áp dụng đối với động sản và các quyền tài sản khác."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ: Điều 652 thuộc Chương XXIII: Thừa kế theo pháp luật.. Thừa kế thế vị là một sự \"suy đoán ý chí\" của nhà làm luật khi không có di chúc: cho rằng người để lại di sản luôn muốn dành phần tài sản đó cho dòng dõi trực hệ nếu con họ chẳng may qua đời sớm. Đối với Thừa kế theo di chúc, nếu người được chỉ định trong di chúc chết trước hoặc chết cùng thời điểm với người lập di chúc, thì phần di chúc liên quan đến người đó sẽ vô hiệu (theo Điểm a Khoản 2 Điều 643). Khi đó, phần di sản này sẽ được chia theo pháp luật (theo Điểm c Khoản 2 Điều 650), và lúc này thừa kế thế vị mới có thể được xét đến nếu thỏa mãn Điều 652. Bản thân việc \"thế vị\" không tồn tại trong nội hàm thực thi di chúc."}, {"level": "1", "content": "Trong trường hợp con của người để lại di sản (người cha) đã chết trước người để lại di sản (người ông), những chủ thể nào sau đây KHÔNG được quyền thừa kế thế vị đối với phần di sản của người ông theo quy định của BLDS 2015?", "options": {"A": "Con đẻ của người cha đã chết (cháu nội của người để lại di sản).", "B": "Con nuôi hợp pháp của người cha đã chết (cháu nội nuôi của người để lại di sản).", "C": "Vợ của người cha đã chết (con dâu của người để lại di sản).", "D": "Con đẻ của người cha nhưng được sinh ra sau khi người cha đã chết (đáp ứng điều kiện tại Khoản 1 Điều 613)."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ: Điều 652 BLDS 2015 và giải đáp nghiệp vụ của Tòa án nhân dân tối cao. Thừa kế thế vị là quan hệ \"trực hệ\". Luật quy định \"cháu được hưởng phần di sản mà cha hoặc mẹ mình đáng lẽ được hưởng\". Người vợ (con dâu) dù có quan hệ hôn nhân với người đã chết nhưng không thuộc hàng thừa kế thế vị theo trực hệ. Lưu ý: Con nuôi hợp pháp vẫn được thừa kế thế vị vì theo Điều 653, con nuôi và cha nuôi, mẹ nuôi được thừa kế di sản của nhau như con đẻ, cha đẻ, mẹ đẻ, từ đó xác lập quyền thế vị tương đương con đẻ."}, {"level": "1", "content": "Căn cứ theo quy định tại Điều 267 Bộ luật Dân sự 2015, quyền bề mặt cho phép chủ thể không phải là chủ sở hữu quyền sử dụng đất được khai thác các lớp không gian nào sau đây để xây dựng công trình hoặc trồng cây?", "options": {"A": "Chỉ được quyền khai thác trên bề mặt diện tích đất theo ranh giới đã được xác định.", "B": "Quyền khai thác lớp đất mặt để canh tác nông nghiệp và không gian phía trên để lắp đặt thiết bị.", "C": "Quyền khai thác mặt đất, lòng đất và khoảng không gian trên mặt đất gắn với việc sở hữu công trình xây dựng, cây cối, rừng trồng trên đất đó.", "D": "Quyền chiếm hữu toàn bộ các tài nguyên, khoáng sản có trong lòng đất và các vật thể bay trong khoảng không gian phía trên đất."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Bộ luật dân sự 2015 định nghĩa quyền bề mặt bao gồm cả ba yếu tố: mặt đất, lòng đất và không gian trên mặt đất liên quan đến công trình xây dựng. Đáp án C phản ánh đầy đủ cấu trúc \"3 tầng\" của quyền bề mặt theo Điều 267: (1) Mặt đất: Sử dụng bề mặt để xây dựng, canh tác. (2) Lòng đất: Quyền này cho phép chủ thể xây dựng các tầng hầm, công trình ngầm gắn liền với công trình trên mặt đất (Ví dụ: bãi đỗ xe ngầm, móng nhà). (3) Khoảng không gian trên mặt đất: Cho phép xây dựng các tầng cao, cầu vượt hoặc các công trình kiến trúc khác trong phạm vi ranh giới cho phép."}, {"level": "1", "content": "Hậu quả pháp lý trực tiếp của việc một giao dịch dân sự về bất động sản có mục đích hoặc nội dung vi phạm điều cấm của luật hoặc trái đạo đức xã hội là gì?", "options": {"A": "Giao dịch chỉ bị hạn chế hiệu lực.", "B": "Giao dịch bị coi là vô hiệu.", "C": "Các bên phải thỏa thuận lại nội dung.", "D": "Chỉ bên vi phạm phải chịu trách nhiệm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 117 và Điều 123 Bộ luật dân sự 2015, vi phạm điều cấm của luật hoặc trái đạo đức xã hội là một trong những căn cứ làm cho giao dịch dân sự vô hiệu."}, {"level": "1", "content": "Căn cứ theo Khoản 2 Điều 129 Bộ luật Dân sự 2015, trường hợp nào sau đây Tòa án ra quyết định công nhận hiệu lực của giao dịch mà các bên KHÔNG phải thực hiện việc công chứng, chứng thực lại?", "options": {"A": "Giao dịch được xác lập bằng lời nói nhưng một bên đã thực hiện toàn bộ nghĩa vụ thanh toán tiền.", "B": "Giao dịch được xác lập bằng văn bản nhưng vi phạm quy định bắt buộc về công chứng, chứng thực và một bên hoặc các bên đã thực hiện ít nhất hai phần ba (2/3) nghĩa vụ trong giao dịch.", "C": "Giao dịch vi phạm về thẩm quyền của người ký kết nhưng các bên đã nhận tài sản và sử dụng ổn định trên 05 năm.", "D": "Giao dịch được xác lập qua các phương tiện điện tử nhưng chưa đáp ứng đủ điều kiện về chữ ký số theo quy định."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ: Khoản 2 Điều 129 Bộ luật dân sự 2015. Điều 129 chỉ rõ các trường hợp ngoại lệ áp dụng cho giao dịch bằng văn bản vi phạm quy định công chứng, chứng thực mà đã thực hiện phần lớn nghĩa vụ (2/3), khi đó các bên không phải công chứng, chứng thực lại. Đây là một cơ chế đặc biệt để \"cứu\" các hợp đồng vốn dĩ bị coi là vô hiệu về hình thức. Điều kiện cần: Giao dịch đã được xác lập bằng văn bản (viết tay hoặc đánh máy nhưng chưa công chứng). Điều kiện đủ: Đã thực hiện ít nhất 2/3 nghĩa vụ. Ví dụ: Trong hợp đồng mua bán nhà đất, bên mua đã thanh toán 70% giá trị hợp đồng hoặc bên bán đã bàn giao nhà và bên mua đã trả một phần tiền lớn. Hệ quả pháp lý: Khi Tòa án đã ra quyết định công nhận hiệu lực, quyết định này có giá trị thay thế cho văn bản công chứng, chứng thực. Các bên có thể dùng quyết định của Tòa án để thực hiện thủ tục đăng ký biến động đất đai tại cơ quan tài nguyên môi trường."}, {"level": "1", "content": "Căn cứ theo Điều 126 Bộ luật Dân sự 2015, một giao dịch dân sự về bất động sản được xác lập do có sự nhầm lẫn sẽ bị Tòa án tuyên bố vô hiệu khi thỏa mãn điều kiện nào sau đây?", "options": {"A": "Bất kỳ sự nhầm lẫn nào về thông tin của bất động sản khiến một bên cảm thấy không hài lòng sau khi ký hợp đồng.", "B": "Sự nhầm lẫn làm cho một bên không đạt được mục đích của việc xác lập giao dịch, trừ trường hợp mục đích giao dịch đã đạt được hoặc các bên có thể khắc phục ngay sự nhầm lẫn.", "C": "Sự nhầm lẫn chỉ liên quan đến giá cả của bất động sản do biến động của thị trường tại thời điểm giao dịch.", "D": "Một bên nhầm lẫn về đối tượng giao dịch nhưng bên kia không hề hay biết và đã nhận đủ tiền thanh toán."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 126 Bộ luật dân sự 2015 quy định điều kiện để giao dịch vô hiệu do nhầm lẫn, nhấn mạnh yếu tố mục đích không đạt được và việc bên kia biết hoặc phải biết về sự nhầm lẫn. Luật Dân sự 2015 đã có sự điều chỉnh quan trọng so với trước đây để bảo vệ sự ổn định của giao dịch: Yếu tố \"Mục đích\": Không phải mọi sai sót đều dẫn đến vô hiệu. Sự nhầm lẫn phải nghiêm trọng đến mức nếu không có nó, bên kia đã không xác lập giao dịch (ví dụ: nhầm đất thổ cư với đất trồng cây lâu năm). Cơ chế \"Khắc phục ngay\": Nếu sự nhầm lẫn có thể sửa chữa được ngay lập tức hoặc dù nhầm lẫn nhưng bên kia vẫn đạt được mục đích cuối cùng, Tòa án sẽ ưu tiên duy trì hiệu lực của giao dịch để bảo vệ lợi ích các bên."}, {"level": "1", "content": "Căn cứ theo quy định tại Điều 444 và Điều 445 Bộ luật Dân sự 2015, trách nhiệm của bên bán đối với khuyết tật của tài sản trong hợp đồng mua bán bất động sản được xác định như thế nào?", "options": {"A": "Bên bán hoàn toàn không chịu trách nhiệm vì bên mua có nghĩa vụ phải tự kiểm tra hiện trạng trước khi ký biên bản bàn giao.", "B": "Bên bán phải chịu trách nhiệm vô điều kiện đối với mọi khuyết tật của bất động sản phát sinh trong vòng 05 năm kể từ ngày chuyển nhượng.", "C": "Bên bán phải chịu trách nhiệm về khuyết tật của tài sản, trừ trường hợp các bên có thỏa thuận khác hoặc bên mua đã biết/phải biết về khuyết tật đó tại thời điểm mua.", "D": "Bên bán chỉ chịu trách nhiệm đối với các khuyết tật về mặt pháp lý (tranh chấp), không chịu trách nhiệm về khuyết tật kỹ thuật của công trình."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Bộ luật dân sự 2015 quy định nghĩa vụ của bên bán về chất lượng tài sản, bao gồm trách nhiệm về khuyết tật, nhưng cho phép các bên thỏa thuận khác hoặc loại trừ trách nhiệm nếu bên mua đã biết. Đáp án C phản ánh đúng sự cân bằng lợi ích giữa các bên theo nguyên tắc tự nguyện và trung thực. Cụ thể: Điều 444 (Bảo đảm chất lượng vật mua bán): Bên bán phải bảo đảm rằng vật mua bán đúng chất lượng và công dụng như đã thỏa thuận hoặc như quy định của pháp luật. Điều 445 (Trách nhiệm đối với khuyết tật): Bên bán có nghĩa vụ thông báo về các khuyết tật của vật. Nếu bên bán biết mà không thông báo, họ phải chịu trách nhiệm ngay cả khi có thỏa thuận miễn trách nhiệm. Ngoại trừ: Trách nhiệm này loại trừ nếu bên mua đã biết (khuyết tật hiện rõ) hoặc phải biết (biết thông qua kiểm tra thông thường) về khuyết tật đó mà vẫn chấp nhận mua."}, {"level": "1", "content": "Theo quy định tại Điều 629 và Điều 630 Bộ luật Dân sự 2015, một bản di chúc miệng chỉ được coi là hợp pháp nếu đáp ứng đầy đủ các điều kiện nào sau đây?", "options": {"A": "Người lập di chúc đang trong tình trạng sức khỏe yếu, có sự chứng kiến và xác nhận bằng văn bản của ít nhất một người thân thích.", "B": "Tính mạng bị cái chết đe dọa, không thể lập di chúc bằng văn bản; người để lại di chúc thể hiện ý chí cuối cùng trước mặt ít nhất hai người làm chứng; người làm chứng ghi chép lại, cùng ký tên hoặc điểm chỉ.", "C": "Di chúc được ghi âm, ghi hình lại một cách khách quan và có sự xác nhận của đại diện tổ chức hành nghề công chứng trong vòng 10 ngày.", "D": "Người lập di chúc miệng phải trên 18 tuổi, minh mẫn và nội dung di chúc được người làm chứng kể lại trước cơ quan có thẩm quyền."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 629, 630 Bộ luật dân sự 2015 quy định rất chặt chẽ về điều kiện lập di chúc miệng: tính mạng bị đe dọa, không thể lập di chúc viết, phải có 2 người làm chứng và ghi chép lại ngay. Di chúc miệng là giải pháp \"tình thế\" nên luật quy định rất ngặt nghèo để tránh giả mạo ý chí: Hoàn cảnh bắt buộc (Điều 629): Chỉ được lập khi tính mạng bị cái chết đe dọa và không thể lập di chúc bằng văn bản. Nếu sau 03 tháng kể từ thời điểm lập di chúc miệng mà người lập di chúc còn sống, minh mẫn thì di chúc miệng mặc nhiên bị hủy bỏ. Hình thức xác lập (Khoản 5 Điều 630): Phải có ít nhất 02 người làm chứng. Người làm chứng phải ghi chép lại ngay ý chí đó. Cùng ký tên hoặc điểm chỉ vào văn bản ghi chép. Sau khi người làm chứng ghi chép và ký tên, trong thời hạn 05 ngày làm việc, di chúc đó phải được công chứng viên hoặc Ủy ban nhân dân cấp xã chứng thực chữ ký hoặc điểm chỉ của người làm chứng. Nếu quá 05 ngày mà không thực hiện bước này, di chúc miệng sẽ không có giá trị pháp lý."}, {"level": "1", "content": "Di chúc miệng sẽ mặc nhiên bị hủy bỏ sau bao lâu kể từ ngày lập nếu người lập di chúc còn sống và minh mẫn, sáng suốt?", "options": {"A": "1 tháng.", "B": "3 tháng.", "C": "6 tháng.", "D": "1 năm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 629 Bộ luật dân sự 2015 quy định thời hạn 3 tháng để di chúc miệng mặc nhiên bị hủy bỏ nếu người lập di chúc còn sống, minh mẫn. Luật quy định di chúc miệng là hình thức đặc biệt chỉ dành cho tình huống tính mạng bị đe dọa. Do đó, tính hiệu lực của nó bị giới hạn bởi thời gian thực tế của tình trạng nguy hiểm: Thời hạn 03 tháng: Đây được coi là khoảng thời gian đủ để một người hồi phục sức khỏe hoặc thoát khỏi tình trạng nguy hiểm để có thể lập lại di chúc bằng văn bản (có công chứng hoặc có người làm chứng) nhằm đảm bảo tính bảo mật và chính xác của ý chí. Cơ chế \"Mặc nhiên hủy bỏ\": Nghĩa là sau mốc 03 tháng này, nếu người đó còn sống và minh mẫn, bản di chúc miệng trước đó hoàn toàn không còn giá trị pháp lý mà không cần bất kỳ thủ tục tuyên bố hủy bỏ nào."}, {"level": "1", "content": "Căn cứ theo Điều 9 Luật Công chứng 2024 và Điều 637 Bộ luật Dân sự 2015, Công chứng viên hoặc người có thẩm quyền chứng thực tại UBND cấp xã có được thực hiện việc công chứng, chứng thực di chúc nếu con của họ là người được hưởng di sản không?", "options": {"A": "Được phép nếu có sự chứng kiến và ký xác nhận của ít nhất 02 công chứng viên khác trong cùng tổ chức.", "B": "Được phép nếu di sản là bất động sản đã được niêm yết công khai tại trụ sở tổ chức hành nghề công chứng.", "C": "Tuyệt đối không được phép thực hiện nhằm đảm bảo tính khách quan và tuân thủ quy định về các hành vi bị nghiêm cấm.", "D": "Chỉ không được phép nếu Công chứng viên/người chứng thực cũng đồng thời là người có nghĩa vụ tài sản liên quan đến di chúc."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 637 Bộ luật Dân sự 2015: Quy định người có thẩm quyền công chứng, chứng thực không được công chứng, chứng thực di chúc nếu họ thuộc diện người thừa kế theo di chúc/pháp luật, hoặc có cha, mẹ, vợ, chồng, con là người thừa kế.  Điểm d Khoản 1 Điều 9 Luật Công chứng 2024, cơ chế kiểm soát xung đột lợi ích được duy trì rất nghiêm ngặt. Luật quy định nghiêm cấm công chứng viên thực hiện việc công chứng trong trường hợp: Bản thân công chứng viên hoặc người thân thích (bao gồm: vợ, chồng; cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi; cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi của vợ hoặc chồng; con đẻ, con nuôi, con dâu, con rể; anh, chị, em ruột...) có quyền lợi liên quan đến hợp đồng, giao dịch. Việc con của công chứng viên hưởng di sản chính là \"quyền lợi liên quan trực tiếp\", do đó đây là hành vi bị luật cấm hoàn toàn."}, {"level": "1", "content": "Căn cứ theo Khoản 3 Điều 651 Bộ luật Dân sự 2015, những người ở hàng thừa kế thứ hai chỉ được hưởng thừa kế trong trường hợp nào sau đây?", "options": {"A": "Khi người để lại di sản không lập di chúc hoặc di chúc bị tuyên vô hiệu một phần.", "B": "Khi những người ở hàng thừa kế thứ nhất đồng ý chia sẻ một phần di sản cho người ở hàng thừa kế thứ hai.", "C": "Khi không còn ai ở hàng thừa kế thứ nhất do đã chết, không có quyền hưởng di sản, bị truất quyền hưởng di sản hoặc từ chối nhận di sản.", "D": "Khi giá trị di sản là bất động sản quá lớn và hàng thừa kế thứ nhất không đủ năng lực tài chính để quản lý."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Nguyên tắc chia thừa kế theo pháp luật là chia theo thứ tự hàng thừa kế, hàng sau chỉ được hưởng khi không còn ai ở hàng trước đủ điều kiện hưởng. Pháp luật Việt Nam quy định việc thừa kế theo pháp luật được thực hiện theo thứ tự lũy tiến. Đáp án C liệt kê đầy đủ 04 kịch bản khiến hàng thừa kế thứ nhất bị \"triệt tiêu\" quyền năng: (1) Đã chết: Chết trước hoặc cùng thời điểm với người để lại di sản. (2) Không có quyền hưởng di sản: Theo quy định tại Điều 621 (Ví dụ: có hành vi xâm phạm tính mạng người để lại di sản). (3) Bị truất quyền: Do người để lại di chúc tuyên bố không cho hưởng (ngay cả khi di chúc vô hiệu về phần tài sản, thì ý chí truất quyền vẫn có thể được xem xét). (4) Từ chối nhận di sản: Theo quy định tại Điều 620.  Điểm b Khoản 1 Điều 651 xác định người thuộc hàng thừa kế thứ 2 bao gồm:  Ông nội, bà nội, ông ngoại, bà ngoại, anh ruột, chị ruột, em ruột của người chết, cháu ruột của người chết mà người chết là ông nội, bà nội, ông ngoại, bà ngoại. Cần chú ý trường hợp thuộc Thừa kế thế vị (Điều 652): Nếu con của người để lại di sản chết trước hoặc cùng thời điểm với người để lại di sản thì cháu (hàng thừa kế thứ hai) được hưởng phần di sản đó. Lúc này cháu hưởng với tư cách thế vị (thay thế vị trí của bố/mẹ ở hàng thứ nhất), chứ không phải hưởng với tư cách là thành viên của hàng thừa kế thứ hai. Việc phân biệt này rất quan trọng vì nếu hưởng theo hàng thừa kế thứ hai thì tất cả anh chị em ruột, ông bà nội ngoại cùng được chia đều. Còn hưởng thế vị thì chỉ nhóm cháu đó được nhận chung một suất của bố/mẹ chúng."}, {"level": "1", "content": "Thời hiệu yêu cầu Tòa án xác nhận quyền thừa kế của mình hoặc bác bỏ quyền thừa kế của người khác đối với di sản là bất động sản là bao nhiêu năm?", "options": {"A": "3 năm kể từ thời điểm mở thừa kế.", "B": "10 năm kể từ thời điểm mở thừa kế.", "C": "30 năm kể từ thời điểm mở thừa kế.", "D": "Không giới hạn thời hiệu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 623 Bộ luật dân sự 2015 quy định thời hiệu yêu cầu xác nhận/bác bỏ quyền thừa kế là 10 năm, khác với thời hiệu yêu cầu chia di sản là 30 năm đối với bất động sản. Thời hiệu yêu cầu Tòa án xác nhận quyền thừa kế của mình (tôi là người có quyền được hưởng) hoặc bác bỏ quyền thừa kế của người khác (người kia không có quyền được hưởng) được ấn định cứng là 10 năm, tính từ thời điểm mở thừa kế. Quy định này áp dụng chung cho mọi loại di sản, bất kể đó là động sản (tiền, vàng, xe) hay bất động sản (nhà, đất). Con số 30 năm chỉ áp dụng cho yêu cầu \"Chia di sản thừa kế\" đối với bất động sản (Khoản 1 Điều 623). Đây là sự khác biệt giữa quyền \"định danh\" (ai được nhận) và quyền \"phân chia\" (nhận bao nhiêu, tài sản cụ thể nào)."}, {"level": "1", "content": "Hoa lợi, lợi tức phát sinh từ tài sản riêng của vợ hoặc chồng trong thời kỳ hôn nhân được xác định là tài sản gì, trừ khi có thỏa thuận khác?", "options": {"A": "Luôn là tài sản riêng của người sở hữu tài sản gốc, vì tài sản gốc là tài sản riêng.", "B": "Là tài sản chung của vợ chồng.", "C": "Là tài sản chung theo phần, phân chia dựa trên công sức đóng góp của mỗi bên.", "D": "Thuộc sở hữu riêng của người trực tiếp quản lý, khai thác tài sản đó."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 33 Luật hôn nhân và gia đình 2014 quy định hoa lợi, lợi tức phát sinh từ tài sản riêng trong thời kỳ hôn nhân là tài sản chung, trừ khi có thỏa thuận khác. Người chồng có một căn nhà được thừa kế riêng từ bố mẹ (tài sản riêng). Người chồng đem căn nhà đó cho thuê lấy tiền hàng tháng. Tiền thuê nhà (lợi tức) thu được trong thời kỳ hôn nhân mặc nhiên là tài sản chung của hai vợ chồng, để phục vụ nhu cầu thiết yếu của gia đình."}, {"level": "1", "content": "Căn cứ theo quy định tại Khoản 4 Điều 44 Luật Hôn nhân và Gia đình 2014, việc định đoạt tài sản riêng của một bên vợ hoặc chồng phải có sự đồng ý bằng văn bản của người kia trong trường hợp đặc biệt nào sau đây?", "options": {"A": "Khi tài sản riêng đó là bất động sản có giá trị lớn hơn khối tài sản chung hiện có của hai vợ chồng.", "B": "Khi tài sản riêng được dùng vào việc kinh doanh chung của gia đình trong thời gian từ 05 năm trở lên.", "C": "Khi tài sản riêng đó là nguồn sống duy nhất của gia đình.", "D": "Khi người có tài sản riêng bị hạn chế năng lực hành vi dân sự hoặc mất khả năng lao động."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 44 Luật hôn nhân và gia đình 2014 quy định một ngoại lệ quan trọng, nếu hoa lợi, lợi tức từ tài sản riêng là nguồn sống duy nhất của gia đình thì việc định đoạt tài sản gốc phải có sự đồng ý của người kia."}, {"level": "1", "content": "Căn cứ theo quy định tại Khoản 1 Điều 59 Luật Hôn nhân và Gia đình 2014 và hướng dẫn tại Thông tư liên tịch 01/2016/TTLT-TANDTC-VKSNDTC-BTP, khi giải quyết chia tài sản chung của vợ chồng khi ly hôn, lao động trong gia đình được xem xét như thế nào?", "options": {"A": "Chỉ được coi là nghĩa vụ đạo đức, không được quy đổi thành giá trị kinh tế khi phân chia tài sản.", "B": "Được coi là lao động có thu nhập và có giá trị tương đương với lao động tạo ra thu nhập trực tiếp của bên kia.", "C": "Được tính là công sức đóng góp nhưng tỷ lệ hưởng không được vượt quá 20% giá trị khối tài sản chung.", "D": "Chỉ được xem xét nếu bên làm nội trợ không có bất kỳ nguồn thu nhập nào khác trong suốt thời kỳ hôn nhân."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Khoản 1 Điều 59, khi chia tài sản chung, Tòa án phải xem xét đến \"Công sức đóng góp của vợ, chồng vào việc tạo lập, duy trì và phát triển khối tài sản chung\". Luật quy định rõ: Lao động của vợ, chồng trong gia đình được coi là lao động có thu nhập. Điều này có nghĩa là: Một người ở nhà làm nội trợ, chăm sóc con cái, cơm nước được luật pháp bảo vệ và đánh giá có giá trị kinh tế tương đương với người đi làm kiếm tiền bên ngoài. Không có sự phân biệt đối xử về giá trị giữa \"tiền mặt\" và \"công sức duy trì hậu phương\".."}, {"level": "1", "content": "Trong thực tiễn xét xử ly hôn hiện nay, khi xác định tỷ lệ % công sức đóng góp để phân chia khối tài sản chung là bất động sản, Tòa án thường áp dụng cơ chế định lượng nào sau đây để điều chỉnh nguyên tắc \"chia đôi\"?", "options": {"A": "Luôn chia đúng tỷ lệ 50/50 nếu cả hai vợ chồng đều không chứng minh được mình có thu nhập cao hơn người kia.", "B": "Ưu tiên chia tỷ lệ cao hơn (từ 70% trở lên) cho bên đứng tên trên Giấy chứng nhận quyền sử dụng đất để đảm bảo tính ổn định của giao dịch.", "C": "Lấy tỷ lệ 50/50 làm căn cứ (basline); sau đó điều chỉnh tăng thêm từ 10% đến 20% cho bên chứng minh được nguồn gốc tài sản từ vốn riêng hoặc có công sức bảo trì, tôn tạo tài sản lớn hơn.", "D": "Chia theo tỷ lệ tương ứng với mức thu nhập bình quân hằng tháng của mỗi bên được xác nhận bởi cơ quan thuế hoặc người sử dụng lao động."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 59 Luật Hôn nhân và Gia đình 2014 và hướng dẫn chi tiết tại Thông tư liên tịch 01/2016/TTLT-TANDTC-VKSNDTC-BTP. Về nguyên tắc, tài sản chung được chia đôi. Tuy nhiên, Tòa án sẽ điều chỉnh tỷ lệ (ví dụ: 60/40, 70/30 hoặc 80/20) dựa trên 4 yếu tố then chốt, trong đó \"Công sức đóng góp\" là biến số quan trọng nhất. Trong thực tiễn xét xử, Tòa án thường phân tích công sức đóng góp qua 3 lớp dữ liệu sau: A. Đóng góp về tài chính (Vốn góp ban đầu và quá trình tạo lập). B. Đóng góp về lao động nội trợ (Ghi nhận theo Điều 59.1) C. Công sức duy trì và phát triển khối tài sản Yếu tố này đặc biệt quan trọng với bất động sản."}, {"level": "1", "content": "Hợp đồng thế chấp nhà ở hình thành trong tương lai cho tổ chức tín dụng có bắt buộc phải công chứng, chứng thực theo Luật Nhà ở 2023 không?", "options": {"A": "Bắt buộc phải công chứng.", "B": "Bắt buộc phải chứng thực.", "C": "Không bắt buộc công chứng, chứng thực.", "D": "Chỉ bắt buộc nếu giá trị vay lớn hơn giá trị nhà."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đây là một trong những ngoại lệ không bắt buộc công chứng/chứng thực theo Khoản 2 Điều 164 Luật Nhà ở 2023."}, {"level": "1", "content": "Căn cứ theo quy định tại Điều 41 Luật Công chứng 2024, việc công chứng văn bản ủy quyền liên quan đến việc thực hiện các quyền đối với bất động sản được thực hiện tại tổ chức hành nghề công chứng nào?", "options": {"A": "Được công chứng tại tổ chức hành nghề công chứng trong phạm vi tỉnh, thành phố trực thuộc trung ương nơi có bất động sản.", "B": "Được công chứng tại bất kỳ tổ chức hành nghề công chứng nào trên phạm vi toàn quốc, không phụ thuộc vào nơi có bất động sản.", "C": "Phải được công chứng tại nơi người ủy quyền cư trú hoặc nơi người được ủy quyền có trụ sở/hộ khẩu thường trú.", "D": "Phải được thực hiện đồng thời tại hai tổ chức hành nghề công chứng: nơi người ủy quyền cư trú và nơi có bất động sản."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là một ngoại lệ về địa hạt công chứng được quy định trong Luật Công chứng 2024, cho phép linh hoạt hơn đối với văn bản ủy quyền liên quan đến BĐS.Đây là bước tiến lớn về kỹ thuật lập pháp để phân biệt giữa Hợp đồng giao dịch trực tiếp và Văn bản ủy quyền:Nguyên tắc chung (Điều 41.1): Công chứng viên chỉ được công chứng hợp đồng, giao dịch về bất động sản trong phạm vi tỉnh, thành phố nơi tổ chức hành nghề công chứng đặt trụ sở.Ngoại lệ đặc biệt (Điều. 41.2): Khoản này quy định rõ việc công chứng Văn bản ủy quyền, di chúc, văn bản từ chối nhận di sản không bị hạn chế bởi địa hạt công chứng.Ý nghĩa: Một khách hàng tại TP.HCM muốn ủy quyền cho người thân bán một căn nhà tại Hà Nội thì hoàn toàn có thể đến bất kỳ văn phòng công chứng nào tại TP.HCM (hoặc bất kỳ tỉnh nào khác) để thực hiện, mà không cần phải ra Hà Nội hay tìm đúng địa hạt có bất động sản đó."}, {"level": "1", "content": "Căn cứ theo quy định tại Khoản 5 Điều 23 Luật Kinh doanh bất động sản 2023, khi ký kết thỏa thuận đặt cọc để mua, thuê mua nhà ở hình thành trong tương lai, nội dung về giá phải được thể hiện như thế nào để đảm bảo tính hợp pháp?", "options": {"A": "Chỉ cần ghi rõ số tiền đặt cọc, giá bán chính thức sẽ được thỏa thuận tại thời điểm ký hợp đồng mua bán.", "B": "Phải ghi rõ giá bán, giá cho thuê mua nhà ở, công trình xây dựng trong thỏa thuận đặt cọc.", "C": "Được phép ghi một khoảng giá dự kiến để chủ đầu tư điều chỉnh theo biến động thị trường khi bàn giao.", "D": "Không bắt buộc ghi giá bán nếu dự án đang trong giai đoạn hoàn thiện thủ tục pháp lý về giá đất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 23 Luật kinh doanh bất động sản 2023 yêu cầu thỏa thuận đặt cọc phải ghi rõ giá bán/cho thuê mua, nhằm đảm bảo tính minh bạch và ràng buộc về giá ngay từ giai đoạn đặt cọc. Đây là \"chốt chặn\" pháp lý mới để bảo vệ bên yếu thế (người mua). Theo Khoản 5 Điều 23, thỏa thuận đặt cọc phải đáp ứng các điều kiện sau: Về nội dung: Phải ghi rõ giá bán, giá cho thuê mua. Luật không dùng từ \"dự kiến\" hay \"khoảng giá\", mà yêu cầu một con số cụ thể. Điều này giúp ngăn chặn việc chủ đầu tư tự ý nâng giá sau khi đã nhận cọc của khách hàng. Về điều kiện thu cọc: Chủ đầu tư chỉ được thu tiền cọc khi nhà ở đã có đủ các điều kiện đưa vào kinh doanh (như đã có giấy phép xây dựng, thông báo đủ điều kiện bán hàng của Sở Xây dựng...). Số tiền đặt cọc không quá 5% giá bán, giá cho thuê mua. Trước đây, nhiều chủ đầu tư đã thu đến 20-30% dưới hình thức \"văn bản thỏa thuận\" hoặc \"hợp đồng vay\", gây rủi ro mất vốn cho người mua. Luật 2023 đã siết chặt con số 5% này."}, {"level": "1", "content": "Căn cứ theo quy định tại Khoản 2 Điều 48 Luật Kinh doanh bất động sản 2023, việc bắt buộc thực hiện thanh toán qua tài khoản mở tại tổ chức tín dụng trong nước KHÔNG áp dụng đối với trường hợp nào sau đây?", "options": {"A": "Chủ đầu tư dự án bất động sản nhận tiền thanh toán từ khách hàng theo tiến độ hợp đồng.", "B": "Doanh nghiệp kinh doanh dịch vụ môi giới, sàn giao dịch bất động sản nhận tiền phí dịch vụ từ khách hàng.", "C": "Cá nhân kinh doanh bất động sản quy mô nhỏ hoặc cá nhân bán, cho thuê nhà ở, quyền sử dụng đất không nhằm mục đích kinh doanh.", "D": "Doanh nghiệp kinh doanh bất động sản thực hiện việc chuyển nhượng toàn bộ hoặc một phần dự án."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 48 Luật kinh doanh bất động sản 2023 có giới hạn phạm vi áp dụng, không bắt buộc đối với các giao dịch của cá nhân kinh doanh nhỏ lẻ hoặc không nhằm mục đích kinh doanh. Luật phân tách rất rõ giữa \"Chủ thể kinh doanh chuyên nghiệp\" và \"Chủ thể kinh doanh không chuyên nghiệp/nhỏ lẻ\": Đối tượng bắt buộc: Theo Khoản 2 Điều 48, các chủ đầu tư dự án, doanh nghiệp kinh doanh bất động sản và doanh nghiệp kinh doanh dịch vụ bất động sản (môi giới, tư vấn, quản lý...) phải nhận tiền thanh toán thông qua tài khoản ngân hàng. Đối tượng ngoại lệ: Các cá nhân kinh doanh bất động sản quy mô nhỏ hoặc các giao dịch dân sự thông thường (bán nhà đang ở, thừa kế...) không thuộc phạm vi điều chỉnh bắt buộc của Điều 48. Họ vẫn có thể lựa chọn thanh toán bằng tiền mặt (tuy nhiên việc thanh toán qua ngân hàng vẫn luôn được khuyến khích để đảm bảo an toàn)."}, {"level": "1", "content": "Theo quy định tại Điều 74 Bộ luật Dân sự 2015, một tổ chức được công nhận là pháp nhân khi có đủ các điều kiện nào sau đây?", "options": {"A": "Được thành lập theo quy định của pháp luật; có cơ cấu tổ chức chặt chẽ; có trụ sở ổn định tại Việt Nam.", "B": "Có tài sản độc lập với cá nhân, pháp nhân khác và tự chịu trách nhiệm bằng tài sản của mình; có con dấu riêng và tài khoản ngân hàng.", "C": "Được thành lập hợp pháp; có cơ cấu tổ chức theo quy định; có tài sản độc lập với cá nhân, pháp nhân khác và tự chịu trách nhiệm bằng tài sản đó; nhân danh mình tham gia quan hệ pháp luật một cách độc lập.", "D": "Được cơ quan nhà nước có thẩm quyền cấp giấy phép hoạt động kinh doanh và có ít nhất từ hai thành viên trở lên."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là 4 điều kiện \"cần và đủ\" để một tổ chức có tư cách pháp nhân. Điểm quan trọng nhất là tính độc lập về tài sản và độc lập về trách nhiệm, giúp phân biệt pháp nhân với các loại hình tổ chức khác như văn phòng luật sư hoặc hộ kinh doanh (vốn không có tư cách pháp nhân)."}, {"level": "1", "content": "Việc Luật Đất đai 2024 không còn quy định \"Hộ gia đình\" là đối tượng sử dụng đất mới (không giao đất, cho thuê đất, công nhận quyền sử dụng đất cho hộ gia đình) mang lại ý nghĩa pháp lý cốt lõi nào sau đây?", "options": {"A": "Chấm dứt hiệu lực Giấy chứng nhận đã cấp cho hộ gia đình trước đây và yêu cầu Nhà nước thu hồi để cấp lại cho từng cá nhân.", "B": "Đồng bộ hóa chủ thể pháp luật với Bộ luật Dân sự 2015; các quyền tài sản của hộ gia đình đã được xác lập trước đó vẫn được bảo lưu và xử lý theo quy định chuyển tiếp.", "C": "Bắt buộc tất cả các thành viên trong gia đình phải thực hiện thủ tục tách thửa đất để được cấp Giấy chứng nhận độc lập.", "D": "Cấm các thành viên trong cùng một gia đình có chung quyền sử dụng đất dưới hình thức sở hữu chung."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đồng bộ với Bộ luật Dân sự 2015: Bộ luật Dân sự hiện hành chỉ công nhận 02 chủ thể có năng lực pháp luật là Cá nhân và Pháp nhân. Hộ gia đình không phải là pháp nhân, do đó việc Luật Đất đai 2013 trước đây coi hộ gia đình là một chủ thể sử dụng đất độc lập đã gây ra rất nhiều rắc rối trong việc xác định tư cách tham gia giao dịch. Luật Đất đai 2024 (Điều 4): Đã chính thức gạch tên \"Hộ gia đình\" khỏi danh sách người sử dụng đất. Thay vào đó, nếu nhiều thành viên có chung quyền, luật sẽ ứng xử dưới góc độ \"Nhóm người sử dụng đất\". Điều khoản chuyển tiếp (Điều 259): Các Giấy chứng nhận đã cấp cho hộ gia đình trước ngày 01/08/2024 vẫn có giá trị pháp lý. Khi thực hiện giao dịch, người sử dụng đất có thể yêu cầu cấp đổi sang Giấy chứng nhận mới ghi tên cụ thể các thành viên có chung quyền."}, {"level": "1", "content": "Căn cứ theo quy định tại Điều 4 và Điều 44 Luật Đất đai 2024, đối tượng là \"Người gốc Việt Nam định cư ở nước ngoài\" (không còn quốc tịch Việt Nam) có quyền sử dụng đất như thế nào trong việc đầu tư dự án bất động sản?", "options": {"A": "Được phép mua nhà ở để phục vụ mục đích cư trú cho bản thân và gia đình.", "B": "Được phép đầu tư xây dựng nhà ở, công trình xây dựng để bán, cho thuê, cho thuê mua; đầu tư hạ tầng kỹ thuật dự án để chuyển nhượng, cho thuê, cho thuê lại quyền sử dụng đất.", "C": "Được phép đầu tư nếu liên doanh với doanh nghiệp trong nước và tỷ lệ vốn góp không quá 49%.", "D": "Không được phép đứng tên trên Giấy chứng nhận quyền sử dụng đất mà phải thông qua hình thức ủy thác đầu tư."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật Đất đai 2024 mở rộng quyền cho người gốc Việt Nam định cư ở nước ngoài, cho phép họ tham gia đầu tư Kinh doanh bất động sản tại Việt Nam. Luật Đất đai 2024 (Điều 4): Đã xếp \"Người gốc Việt Nam định cư ở nước ngoài\" vào nhóm Người sử dụng đất có các quyền năng gần như tương đương với cá nhân trong nước. Khoản 3 Điều 44: Quy định rõ quyền đầu tư dự án xây dựng nhà ở, công trình xây dựng và hạ tầng kỹ thuật. Điều này cho phép kiều bào không còn quốc tịch vẫn có thể tham gia trực tiếp vào thị trường bất động sản sơ cấp với tư cách là Chủ đầu tư dự án hoặc kinh doanh bđs gần bằng quyền của công dân trong nước. Điều này giúp họ thoát khỏi cảnh phải nhờ người thân đứng tên hộ — một nguồn cơn của hàng ngàn vụ tranh chấp kéo dài tại Tòa án trong nhiều thập kỷ qua. Để hưởng quyền lợi này, đối tượng \"Người gốc Việt Nam\" cần có giấy tờ xác nhận gốc Việt Nam do cơ quan có thẩm quyền cấp (thường là Ủy ban Nhà nước về người Việt Nam ở nước ngoài hoặc cơ quan đại diện ngoại giao)."}, {"level": "1", "content": "Trong giao dịch chuyển nhượng quyền sử dụng đất, năng lực hành vi dân sự của Thể nhân (Cá nhân) được xác lập như thế nào đối với người từ đủ 15 tuổi đến chưa đủ 18 tuổi?", "options": {"A": "Người từ đủ 15 tuổi đến chưa đủ 18 tuổi không được phép tham gia giao dịch bất động sản vì chưa có năng lực hành vi dân sự đầy đủ.", "B": "Mọi giao dịch liên quan đến bất động sản của đối tượng này đều phải do người đại diện theo pháp luật xác lập và thực hiện.", "C": "Có thể tự mình xác lập, thực hiện giao dịch nếu có tài sản riêng bảo đảm thực hiện nghĩa vụ; trừ trường hợp luật quy định phải được người đại diện theo pháp luật đồng ý.", "D": "Chỉ được phép thực hiện các giao dịch nhằm phục vụ nhu cầu sinh hoạt hằng ngày phù hợp với lứa tuổi."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Khoản 2 Điều 21 BLDS 2015. Tuy nhiên, theo Luật Đất đai và Luật Nhà ở, giao dịch bất động sản là loại giao dịch phải đăng ký và có tính chất đặc thù, nên thực tế vẫn cần sự đồng ý của người đại diện. Việc nhấn mạnh vào \"tài sản riêng\" là điểm để sinh viên phân biệt năng lực hành vi theo độ tuổi."}, {"level": "1", "content": "Một cá nhân mua căn hộ chung cư trong thời kỳ hôn nhân, không sử dụng tài sản riêng, không được tặng cho hay thừa kế riêng. Khi thực hiện giao dịch thế chấp căn hộ này tại ngân hàng, yêu cầu về chủ thể ký kết được quy định như thế nào theo Luật Hôn nhân và Gia đình 2014?", "options": {"A": "Chỉ cần người đứng tên trên Hợp đồng mua bán hoặc Giấy chứng nhận quyền sở hữu ký tên, vì đó là người đại diện cho hộ gia đình.", "B": "Người đứng tên trên Giấy chứng nhận có toàn quyền thế chấp, người vợ/chồng còn lại chỉ đóng vai trò người làm chứng.", "C": "Phải có sự thỏa thuận bằng văn bản của cả hai vợ chồng, bất kể ai là người đứng tên trên Giấy chứng nhận.", "D": "Chỉ cần sự đồng ý của người vợ/chồng còn lại thông qua thông báo bằng miệng hoặc văn bản xác nhận không có tranh chấp."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ vào nguyên tắc xác lập tài sản chung và quyền định đoạt tại Luật Hôn nhân và Gia đình 2014: Xác lập tài sản chung (Điều 33) - Tài sản do vợ chồng tạo ra, thu nhập do lao động, hoạt động sản xuất, kinh doanh... trong thời kỳ hôn nhân là tài sản chung của vợ chồng. Việc căn hộ không có nguồn gốc từ tài sản riêng hay thừa kế riêng mặc nhiên đưa nó vào khối tài sản chung hợp nhất. Chiếm hữu, sử dụng, định đoạt (Điều 35) - Việc chiếm hữu, sử dụng, định đoạt tài sản chung do vợ chồng thỏa thuận. Đặc biệt, tại Khoản 2 Điều 35 quy định rõ: Việc định đoạt tài sản chung là bất động sản phải có sự thỏa thuận bằng văn bản của vợ chồng."}, {"level": "1", "content": "Theo quy định tại Khoản 2 Điều 164 Luật Nhà ở 2023, hợp đồng cho thuê nhà ở với thời hạn 06 tháng có bắt buộc phải thực hiện công chứng hoặc chứng thực không?", "options": {"A": "Bắt buộc phải công chứng tại tổ chức hành nghề công chứng để đảm bảo giá trị pháp lý.", "B": "Bắt buộc phải chứng thực tại Ủy ban nhân dân cấp xã nơi có nhà ở cho thuê.", "C": "Không bắt buộc phải công chứng, chứng thực; việc công chứng, chứng thực thực hiện theo nhu cầu của các bên.", "D": "Chỉ bắt buộc công chứng hoặc chứng thực nếu một trong các bên giao dịch là tổ chức kinh doanh bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Nhà ở 2023 (Điều 164 Khoản 2) quy định việc thuê nhà ở không bắt buộc công chứng, chứng thực, trừ khi các bên có nhu cầu. Quy định về thời hạn 6 tháng trong Bộ luật dân sự 2015 không còn được áp dụng trực tiếp khi Luật Nhà ở mới đã có quy định cụ thể. Đối với các giao dịch về nhà ở như cho thuê, cho mượn, cho ở nhờ, ủy quyền quản lý nhà ở thì không bắt buộc phải công chứng, chứng thực hợp đồng. Hình thức của các loại hợp đồng này chỉ cần lập thành văn bản và có chữ ký của các bên. Việc công chứng hay chứng thực hoàn toàn dựa trên sự tự nguyện và thỏa thuận của các chủ thể tham gia giao dịch. Bộ luật Dân sự 2015 (Điều 492) trước đây có quy định hợp đồng thuê nhà ở từ 06 tháng trở lên phải công chứng. Tuy nhiên, theo nguyên tắc áp dụng pháp luật tại Luật Ban hành văn bản quy phạm pháp luật, khi có sự khác nhau giữa luật chung (Dân sự) và luật chuyên ngành (Nhà ở) về cùng một vấn đề thì luật chuyên ngành sẽ được ưu tiên áp dụng. Kể từ khi Luật Nhà ở 2014 và nay là Luật Nhà ở 2023 có hiệu lực, quy định về mốc thời gian 6 tháng để bắt buộc công chứng đã bị bãi bỏ đối với đối tượng là nhà ở."}, {"level": "1", "content": "Căn cứ theo quy định tại Điều 651 Bộ luật Dân sự 2015, trường hợp phân chia di sản là bất động sản theo pháp luật, nếu những người ở hàng thừa kế thứ nhất (vợ, chồng, cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, con đẻ, con nuôi của người chết) còn đầy đủ và đủ điều kiện hưởng di sản thì hàng thừa kế thứ hai được xác định quyền lợi như thế nào?", "options": {"A": "Được hưởng một phần di sản tương ứng với 1/2 suất của một người ở hàng thừa kế thứ nhất.", "B": "Được hưởng di sản nếu có sự đồng ý bằng văn bản của tất cả những người ở hàng thừa kế thứ nhất.", "C": "Không được hưởng di sản, vì những người ở hàng sau chỉ được hưởng nếu không còn ai ở hàng thừa kế trước.", "D": "Chỉ được hưởng di sản nếu chứng minh được có công sức đóng góp vào việc duy trì, bảo quản khối bất động sản đó."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Pháp luật về thừa kế Việt Nam áp dụng nguyên tắc ưu tiên tuyệt đối cho hàng thừa kế trước. Theo Khoản 3 Điều 651: \"Những người ở hàng thừa kế sau chỉ được hưởng thừa kế, nếu không còn ai ở hàng thừa kế trước do đã chết, không có quyền hưởng di sản, bị truất quyền hưởng di sản hoặc từ chối nhận di sản.\" Như vậy, chỉ cần còn duy nhất một người ở hàng thừa kế thứ nhất đủ điều kiện và không từ chối nhận di sản, thì toàn bộ hàng thừa kế thứ hai (anh, chị, em ruột; ông bà nội, ngoại; cháu ruột) sẽ không có quyền can thiệp vào khối di sản này."}, {"level": "1", "content": "Một người lập di chúc hợp pháp về mặt hình thức nhưng có nội dung truất quyền hưởng di sản của người con chưa thành niên. Xét dưới góc độ Điều 644 Bộ luật Dân sự 2015, nội dung truất quyền này có hiệu lực pháp lý như thế nào?", "options": {"A": "Có hiệu lực tuyệt đối, vì pháp luật tôn trọng quyền tự do định đoạt tài sản của người để lại di sản.", "B": "Không có hiệu lực đối với phần di sản mà người con đó được hưởng theo quy định về người thừa kế không phụ thuộc vào nội dung di chúc.", "C": "Có hiệu lực nếu người con chưa thành niên đó có hành vi vi phạm đạo đức nghiêm trọng với người lập di chúc.", "D": "Có hiệu lực nếu người lập di chúc đã chứng minh được người con này đã được chu cấp đầy đủ tài sản trước khi ông/bà qua đời."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quyền truất hưởng di sản của người lập di chúc bị giới hạn bởi quy định về người thừa kế không phụ thuộc nội dung di chúc tại Điều 644 Bộ luật dân sự 2015. Việc truất quyền đối với con chưa thành niên là không có hiệu lực hoàn toàn. Tại Điều 644 BLDS 2015, pháp luật xác định một nhóm chủ thể đặc biệt luôn được hưởng di sản bất kể ý chí của người lập di chúc có muốn hay không. Nhóm này bao gồm: Con chưa thành niên, Con đã thành niên mà không có khả năng lao động, cha, mẹ, vợ, chồng. Những đối tượng trên được hưởng phần di sản bằng 2/3 suất của một người thừa kế theo pháp luật nếu di sản được chia theo pháp luật. Cần phân biệt giữa \"Truất quyền\" và \"Quyền hưởng di sản\": Truất quyền (Disinheriting): Là ý chí chủ quan của người lập di chúc (tôi không muốn cho anh hưởng). Ý chí này bị khuất phục bởi Điều 644. Không có quyền hưởng di sản (Disqualified): Căn cứ theo Điều 621, nếu người con chưa thành niên có hành vi cực đoan (ngược đãi nghiêm trọng, xâm phạm tính mạng người để lại di sản...) và bị kết án, hoặc đã bị người lập di chúc biết hành vi đó nhưng vẫn không cho hưởng, hoặc bị tước quyền theo luật, thì lúc này người con đó mới thực sự không được nhận gì."}, {"level": "1", "content": "Một hợp đồng thế chấp quyền sử dụng đất đã được công chứng hợp pháp nhưng các bên chưa thực hiện thủ tục đăng ký biện pháp bảo đảm tại Văn phòng đăng ký đất đai. Căn cứ vào Bộ luật Dân sự 2015 và Nghị định 99/2022/NĐ-CP, hiệu lực pháp lý của hợp đồng này được xác định như thế nào?", "options": {"A": "Hợp đồng vô hiệu hoàn toàn vì việc đăng ký là điều kiện bắt buộc để hợp đồng thế chấp bất động sản có hiệu lực.", "B": "Hợp đồng có hiệu lực đối với các bên giao dịch kể từ thời điểm công chứng, nhưng chưa có hiệu lực đối kháng với người thứ ba.", "C": "Hợp đồng chỉ phát sinh hiệu lực kể từ thời điểm cơ quan đăng ký đất đai ghi nội dung thế chấp vào sổ địa chính.", "D": "Hợp đồng bị vô hiệu một phần đối với các thỏa thuận về xử lý tài sản bảo đảm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 401 Bộ luật Dân sự 2015, hợp đồng được giao kết hợp pháp có hiệu lực từ thời điểm giao kết. Đối với hợp đồng thế chấp bất động sản, thời điểm công chứng chính là thời điểm xác lập quyền và nghĩa vụ giữa bên thế chấp và bên nhận thế chấp. Hệ quả: Nếu bên thế chấp vi phạm nghĩa vụ, bên nhận thế chấp vẫn có quyền khởi kiện dựa trên hợp đồng đã công chứng để yêu cầu bồi thường hoặc thực hiện nghĩa vụ. Tại Điều 297 BLDS 2015 và Điều 5 Nghị định 99/2022/NĐ-CP, việc đăng ký biện pháp bảo đảm không phải là điều kiện có hiệu lực của hợp đồng, mà là điều kiện để \"đối kháng\": Khi chưa đăng ký: Bên nhận thế chấp không có quyền ưu tiên thanh toán so với các chủ nợ khác, và không có quyền truy đòi tài sản nếu bên thế chấp đã chuyển nhượng tài sản đó cho một người thứ ba ngay tình. Khi đã đăng ký: Kể từ thời điểm đăng ký, bên nhận thế chấp có quyền ưu tiên thanh toán và quyền truy đòi tài sản đối với bất kỳ ai đang chiếm giữ tài sản đó."}, {"level": "1", "content": "Công ty A ký hợp đồng đặt cọc mua bất động sản của ông B (cá nhân). Trong thời gian đặt cọc, ông B lại ký hợp đồng chuyển nhượng và hoàn tất thủ tục sang tên bất động sản đó cho bà C. Khẳng định nào sau đây là đúng nhất về quyền lợi của Công ty A theo Bộ luật Dân sự 2015?", "options": {"A": "Công ty A có quyền kiện bà C để đòi lại bất động sản vì hợp đồng đặt cọc đã được xác lập trước.", "B": "Công ty A có quyền kiện ông B để yêu cầu trả lại số tiền cọc và thanh toán một khoản tiền phạt cọc (trừ trường hợp có thỏa thuận khác).", "C": "Hợp đồng đặt cọc mặc nhiên trở thành hợp đồng chuyển nhượng bất động sản và Công ty A được ưu tiên đứng tên trên Giấy chứng nhận.", "D": "Công ty A không có quyền kiện vì đặt cọc chỉ là biện pháp bảo đảm, không phải là giao dịch chuyển dịch quyền sở hữu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 328 Bộ luật dân sự, nếu bên nhận cọc từ chối giao kết hoặc thực hiện hợp đồng, thì phải trả lại cọc và bồi thường gấp đôi số tiền đặt cọc, trừ khi có thỏa thuận khác. Hợp đồng đặt cọc (Deposit) chỉ xác lập nghĩa vụ \"giao kết hoặc thực hiện hợp đồng\". Nó không làm phát sinh quyền sở hữu trực tiếp của bên mua đối với tài sản. Tính ngay tình của bên thứ ba: Nếu bà C đã hoàn tất thủ tục sang tên và không biết về việc đặt cọc trước đó (bên thứ ba ngay tình), thì quyền sở hữu của bà C được pháp luật bảo vệ. Công ty A không thể đòi lại tài sản (quyền đối vật) mà chỉ có thể đòi tiền (quyền đối nhân) từ ông B. Theo Khoản 2 Điều 328 BLDS 2015: Nếu bên nhận đặt cọc từ chối giao kết/thực hiện hợp đồng: Phải trả lại tài sản đặt cọc cho bên đặt cọc và trả thêm một khoản tiền tương đương giá trị tài sản đặt cọc (thường gọi là phạt cọc gấp đôi). Lưu ý: Các bên có thể thỏa thuận mức phạt cọc cao hơn (gấp 3, gấp 5...) hoặc thấp hơn, luật tôn trọng sự thỏa thuận này."}, {"level": "1", "content": "Anh Nam là người thừa kế duy nhất của ông M. Ông M để lại một căn hộ chung cư đang thế chấp tại Ngân hàng. Anh Nam muốn làm thủ tục sang tên (đăng ký biến động) trên Giấy chứng nhận quyền sử dụng đất từ tên ông M sang tên mình. Tuy nhiên, Ngân hàng đang giữ bản gốc Giấy chứng nhận và không đồng ý giao ra nếu nợ chưa được trả hết. Anh Nam phải làm gì để hoàn tất thủ tục này theo quy định tại Nghị định 99/2022/NĐ-CP về đăng ký biện pháp bảo đảm?", "options": {"A": "Khởi kiện Ngân hàng ra Tòa án yêu cầu trả lại Giấy chứng nhận vì anh đã là chủ sở hữu hợp pháp qua thừa kế.", "B": "Yêu cầu cơ quan tài nguyên môi trường cấp Giấy chứng nhận mới với lý do bản cũ bị Ngân hàng \"chiếm giữ\" trái pháp luật.", "C": "Phải có sự đồng ý của Ngân hàng bằng văn bản hoặc thực hiện nghĩa vụ trả nợ để giải chấp; sau đó mới thực hiện được thủ tục đăng ký biến động sang tên người thừa kế.", "D": "Văn phòng đăng ký đất đai có trách nhiệm tự ý đăng ký sang tên cho anh Nam mà không cần sự đồng ý của Ngân hàng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đây là một tình huống rất thực tế. Dù anh Nam có quyền thừa kế, nhưng căn hộ đang bị ràng buộc bởi một giao dịch bảo đảm có hiệu lực pháp luật. Căn cứ Điều 18 Nghị định 99/2022/NĐ-CP và pháp luật đất đai, việc thay đổi người sử dụng đất (đăng ký biến động) đối với tài sản đang thế chấp chỉ được thực hiện khi có sự đồng ý của bên nhận thế chấp hoặc sau khi đã xóa đăng ký thế chấp. Ngân hàng có quyền giữ Giấy chứng nhận để đảm bảo quyền ưu tiên thanh toán của mình."}, {"level": "1", "content": "Một mảnh đất đang bị Cơ quan Thi hành án dân sự ra quyết định kê biên để đảm bảo thi hành một bản án dân sự mà người chủ đất (ông B) phải trả nợ cho người khác. Trong quá trình kê biên, ông B qua đời. Di sản này sẽ được xử lý như thế nào?", "options": {"A": "Việc kê biên bị hủy bỏ và mảnh đất được chia đều cho các con của ông B theo pháp luật về thừa kế.", "B": "Mảnh đất bị Nhà nước thu hồi và người thừa kế không được hưởng bất kỳ quyền lợi nào.", "C": "Những người thừa kế vẫn được hưởng di sản, nhưng phải tiếp tục thực hiện nghĩa vụ thi hành án của ông B trong phạm vi giá trị mảnh đất đó.", "D": "Mảnh đất mặc nhiên thuộc quyền sở hữu của người được thi hành án mà không cần qua thủ tục đấu giá."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Kê biên là biện pháp cưỡng chế nhằm hạn chế quyền định đoạt (bán, tặng cho) của chủ sở hữu nhưng không làm mất đi quyền thừa kế. Theo Luật Thi hành án dân sự và BLDS 2015, nghĩa vụ trả nợ của người chết vẫn tồn tại và chuyển giao sang những người thừa kế. Di sản này vẫn bị kê biên và xử lý để trả nợ; phần giá trị còn dư (nếu có) sau khi bán tài sản và thanh toán các chi phí thi hành án sẽ được chia cho các đồng thừa kế."}, {"level": "1", "content": "Theo Luật Công chứng 2024, tổ chức hành nghề công chứng bao gồm những loại hình nào?", "options": {"A": "Phòng Công chứng và Văn phòng công chứng.", "B": "Văn phòng công chứng và Công ty luật có chức năng công chứng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Công chứng 2024 quy định rõ hai loại hình tổ chức hành nghề công chứng là Phòng Công chứng (đơn vị sự nghiệp công lập) và Văn phòng công chứng (do tư nhân thành lập, hoạt động theo loại hình công ty hợp danh theo Luật Công chứng 2024)."}, {"level": "1", "content": "So với Luật Công chứng 2014, Luật Công chứng 2024 (có hiệu lực từ ngày 01/07/2025) đã có sự thay đổi như thế nào về loại hình tổ chức của Văn phòng công chứng??", "options": {"A": "Cho phép thành lập theo loại hình Công ty hợp danh nhằm đảm bảo trách nhiệm liên đới của các Công chứng viên.", "B": "Cho phép thành lập theo loại hình Doanh nghiệp tư nhân để đơn giản hóa bộ máy quản lý.", "C": "Cho phép hoạt động theo loại hình Công ty hợp danh hoặc loại hình Doanh nghiệp tư nhân (tại các địa bàn có điều kiện cụ thể).", "D": "Bắt buộc tất cả Văn phòng công chứng phải chuyển đổi sang mô hình Công ty cổ phần để huy động vốn."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ theo Điều 20 Luật Công chứng 2024, loại hình tổ chức của Văn phòng công chứng đã được mở rộng: Mô hình Công ty hợp danh: Vẫn là mô hình phổ biến, yêu cầu ít nhất 02 Công chứng viên hợp danh. Mô hình Doanh nghiệp tư nhân (Điểm mới): Cho phép thành lập Văn phòng công chứng do một Công chứng viên làm chủ. Việc cho phép mô hình Doanh nghiệp tư nhân không áp dụng tràn lan mà chỉ dành cho các trường hợp quy định tại Khoản 2 Điều 20: Tại các đơn vị hành chính cấp huyện có mật độ dân số thấp; Tại các địa bàn có điều kiện kinh tế - xã hội khó khăn hoặc đặc biệt khó khăn.."}, {"level": "1", "content": "Nguyên tắc cơ bản nào KHÔNG phải là nguyên tắc hành nghề công chứng theo Luật Công chứng 2024?", "options": {"A": "Tuân thủ Hiến pháp và pháp luật trong quá trình thực hiện nhiệm vụ.", "B": "Khách quan, trung thực và tuân theo Quy tắc đạo đức hành nghề công chứng.", "C": "Ưu tiên lợi ích của bên yêu cầu công chứng có tiềm lực tài chính mạnh hơn.", "D": "Chịu trách nhiệm trước pháp luật và người yêu cầu công chứng về văn bản công chứng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nguyên tắc hành nghề công chứng đòi hỏi sự khách quan, trung thực và bảo vệ quyền lợi hợp pháp của tất cả các bên tham gia giao dịch, không phân biệt tiềm lực tài chính. Công chứng viên không được đứng về phía bên nào (dù là bên mua, bên bán hay ngân hàng). Việc ưu tiên bên có \"tiềm lực tài chính\" là vi phạm nghiêm trọng bản chất của nghề nghiệp, dẫn đến nguy cơ tiếp tay cho các hành vi lừa đảo hoặc ép buộc trong giao dịch bất động sản. Công chứng viên có trách nhiệm giải thích quyền và nghĩa vụ cho cả hai bên, đặc biệt là bảo vệ bên yếu thế hơn nếu họ chưa hiểu rõ các điều khoản trong hợp đồng."}, {"level": "1", "content": "Căn cứ theo Điều 5 Luật Công chứng 2024, văn bản công chứng có giá trị pháp lý như thế nào kể từ ngày có hiệu lực?", "options": {"A": "Có giá trị chứng minh về mặt hình thức và thời điểm ký kết hợp đồng, không có giá trị thi hành.", "B": "Có hiệu lực thi hành đối với các bên và có giá trị chứng cứ cao.", "C": "Văn bản công chứng chỉ có giá trị pháp lý cao nhất khi được cơ quan quản lý nhà nước về công chứng xác nhận lại một lần nữa.", "D": "Có giá trị tương đương với văn bản chứng thực chữ ký và chứng thực bản sao từ bản chính của Ủy ban nhân dân cấp xã."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Văn bản công chứng có hiệu lực thi hành đối với các bên liên quan và những tình tiết, sự kiện trong đó không phải chứng minh lại trước Tòa án (trừ khi bị tuyên vô hiệu), thể hiện giá trị chứng cứ cao. Trong trường hợp bên có nghĩa vụ không thực hiện nghĩa vụ của mình theo hợp đồng đã được công chứng, bên kia có quyền yêu cầu Tòa án hoặc cơ quan nhà nước có thẩm quyền khác giải quyết. Đặc biệt, đối với các hợp đồng có nội dung thanh toán tiền, văn bản công chứng là căn cứ để cơ quan thi hành án dân sự thực hiện cưỡng chế nếu các bên có thỏa thuận về việc tự nguyện thi hành án. Tại Tòa án, các tình tiết và sự kiện trong văn bản công chứng được coi là Sự thật khách quan không phải chứng minh: Thẩm phán sẽ mặc nhiên công nhận những gì đã ghi trong văn bản công chứng (ví dụ: việc giao nhận tiền, việc các bên hoàn toàn minh mẫn khi ký...). Trừ trường hợp vô hiệu: Giá trị này chỉ mất đi khi có một bản án của Tòa án tuyên bố văn bản đó vô hiệu do vi phạm điều cấm hoặc bị giả mạo."}, {"level": "1", "content": "Điểm khác biệt cơ bản nhất về trách nhiệm giữa công chứng viên khi công chứng hợp đồng và người thực hiện chứng thực khi chứng thực hợp đồng là gì?", "options": {"A": "Công chứng viên chỉ chịu trách nhiệm về tính xác thực của chữ ký; người thực hiện chứng thực chịu trách nhiệm về toàn bộ nội dung hợp đồng.", "B": "Cả hai đều có trách nhiệm ngang nhau trong việc thẩm định tính pháp lý và tính đúng đắn của các điều khoản trong hợp đồng.", "C": "Công chứng viên chịu trách nhiệm về tính hợp pháp và tính thật của nội dung giao dịch; người thực hiện chứng thực chỉ chịu trách nhiệm về thời gian, địa điểm, năng lực hành vi và chữ ký của các bên.", "D": "Người thực hiện chứng thực có quyền bác bỏ nội dung hợp đồng nếu thấy bất lợi cho một bên, còn Công chứng viên thì không."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Công chứng viên phải đảm bảo tính hợp pháp của cả nội dung hợp đồng, trong khi người thực hiện chứng thực chỉ xác nhận các yếu tố hình thức như thời gian, địa điểm, chữ ký, năng lực hành vi dân sự tại thời điểm ký kết và không chịu trách nhiệm về nội dung. Công chứng viên có nghĩa vụ giải thích cho các bên về quyền, nghĩa vụ và hậu quả pháp lý của giao dịch. Nếu CCV thấy có dấu hiệu nghi ngờ về tính xác thực của tài sản hoặc năng lực nhận thức của khách hàng, họ có quyền dừng thủ tục để xác minh. Người thực hiện chứng thực (thường là lãnh đạo UBND cấp xã/tư pháp) về nguyên tắc không có chức năng \"thẩm định nội dung\". Họ chỉ cần đối chiếu người đứng trước mặt với CCCD, nếu khớp và họ tự nguyện ký thì sẽ đóng dấu chứng thực."}, {"level": "1", "content": "Theo Điều 27 Luật Đất đai 2024, hợp đồng, văn bản nào sau đây bắt buộc phải được công chứng hoặc chứng thực?", "options": {"A": "Hợp đồng cho thuê, cho thuê lại quyền sử dụng đất.", "B": "Hợp đồng chuyển đổi quyền sử dụng đất nông nghiệp.", "C": "Văn bản về thừa kế quyền sử dụng đất, tài sản gắn liền với đất.", "D": "Hợp đồng chuyển nhượng mà một bên là tổ chức kinh doanh bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Đất đai 2024 quy định văn bản về thừa kế, tặng cho quyền sử dụng đất phải được công chứng/chứng thực. Các trường hợp cho thuê, chuyển đổi đất nông nghiệp hoặc giao dịch với doanh nghiệp BĐS chuyên nghiệp được phép lựa chọn (không bắt buộc).."}, {"level": "1", "content": "Việc pháp luật không bắt buộc công chứng hợp đồng khi một bên là doanh nghiệp kinh doanh bất động sản tiềm ẩn rủi ro chính yếu nào cho khách hàng?", "options": {"A": "Người mua dễ bị áp đặt các điều khoản bất lợi trong hợp đồng soạn sẵn.", "B": "Làm phát sinh thêm các chi phí trung gian không chính thức cho cá nhân.", "C": "Khiến cơ quan đăng ký đất đai từ chối tiếp nhận hồ sơ sang tên hợp pháp.", "D": "Làm giảm tính linh hoạt và tốc độ thanh khoản của các sản phẩm dự án."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khi không có sự kiểm soát về nội dung từ công chứng viên, bên yếu thế hơn có thể bị áp đặt các điều khoản bất lợi, không công bằng hoặc trái luật trong các hợp đồng thường do bên doanh nghiệp soạn sẵn.  Trong các giao dịch truyền thống, Công chứng viên có trách nhiệm kiểm tra tính công bằng, giải thích các điều khoản mập mờ và ngăn chặn các thỏa thuận vi phạm điều cấm. Các doanh nghiệp BĐS thường sử dụng hợp đồng soạn sẵn (Adhesion Contracts). Nếu không qua khâu kiểm soát nội dung của Công chứng viên, khách hàng (bên yếu thế) thường không có cơ hội thương lượng các điều khoản về: (1) Trách nhiệm bồi thường khi chậm bàn giao. (2) Các loại chi phí vận hành chưa rõ ràng. (3) Điều khoản đơn phương chấm dứt hợp đồng của chủ đầu tư."}, {"level": "1", "content": "Theo quy định của Luật Công chứng 2024, doanh nghiệp kinh doanh bất động sản được lựa chọn công chứng hợp đồng, giao dịch tại tổ chức hành nghề công chứng nào?", "options": {"A": "Tổ chức hành nghề công chứng trong phạm vi tỉnh, thành phố nơi có bất động sản.", "B": "Bất kỳ tổ chức hành nghề công chứng nào trên toàn quốc để thuận tiện cho giao dịch.", "C": "Chỉ các Phòng công chứng (đơn vị công lập) tại địa phương nơi doanh nghiệp đặt trụ sở.", "D": "Các Văn phòng công chứng trong phạm vi quận, huyện nơi doanh nghiệp đăng ký dự án."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 42 Luật Công chứng 2024, công chứng viên chỉ được công chứng hợp đồng, giao dịch về bất động sản trong phạm vi tỉnh, thành phố trực thuộc trung ương nơi tổ chức hành nghề công chứng đặt trụ sở. Đây là quy định bắt buộc đối với các hợp đồng, giao dịch về quyền sử dụng đất và tài sản gắn liền với đất. Lý do duy trì quy tắc này là nhằm đảm bảo sự kiểm soát chặt chẽ của chính quyền địa phương đối với biến động đất đai, ngăn chặn tình trạng thông tin không được cập nhật kịp thời giữa các tỉnh, dẫn đến rủi ro pháp lý cho hệ thống quản lý đất đai quốc gia. Doanh nghiệp có quyền lựa chọn giữa Phòng công chứng (nhà nước) và Văn phòng công chứng (tư nhân) miễn là tổ chức đó nằm trong phạm vi tỉnh nơi có đất. Sự phân biệt giữa \"Công lập\" và \"Tư nhân\" không làm thay đổi thẩm quyền địa hạt này."}, {"level": "1", "content": "Theo quy định của Luật Công chứng 2024, Công chứng viên được phép công chứng giao dịch nào sau đây dù bất động sản nằm ngoài phạm vi tỉnh, thành phố nơi tổ chức hành nghề đặt trụ sở?", "options": {"A": "Hợp đồng mua bán, tặng cho nhà ở.", "B": "Hợp đồng thế chấp quyền sử dụng đất.", "C": "Hợp đồng góp vốn bằng bất động sản.", "D": "Văn bản ủy quyền liên quan đến bất động sản."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Quy tắc địa hạt không áp dụng đối với công chứng di chúc, văn bản từ chối nhận di sản là bất động sản và văn bản ủy quyền liên quan đến bất động sản. Căn cứ Điều 42, có 03 trường hợp liên quan đến bất động sản nhưng không bị giới hạn bởi phạm vi địa giới hành chính cấp tỉnh, bao gồm: (1) Công chứng di chúc (có tài sản là bất động sản). (2) Văn bản từ chối nhận di sản (là bất động sản). (3) Văn bản ủy quyền (liên quan đến việc thực hiện quyền, nghĩa vụ đối với bất động sản)."}, {"level": "1", "content": "Thời hạn công chứng hợp đồng, giao dịch thông thường không quá bao nhiêu ngày kể từ ngày nhận đủ hồ sơ hợp lệ?", "options": {"A": "Không quá 01 ngày làm việc.", "B": "Không quá 02 ngày làm việc.", "C": "Không quá 05 ngày làm việc.", "D": "Không quá 10 ngày làm việc."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 45 Luật Công chứng 2024 quy định thời hạn công chứng không quá 02 ngày làm việc; đối với giao dịch có nội dung phức tạp thì thời hạn công chứng có thể kéo dài hơn nhưng không quá 10 ngày làm việc. Trong trường hợp có sự kiện bất khả kháng hoặc trở ngại khách quan hoặc do nguyên nhân từ phía người yêu cầu công chứng dẫn đến không bảo đảm thời hạn theo quy định tại khoản này thì người yêu cầu công chứng có quyền thỏa thuận bằng văn bản với tổ chức hành nghề công chứng về thời hạn công chứng."}, {"level": "1", "content": "Khi thực hiện công chứng hợp đồng bất động sản, người ký thay mặt doanh nghiệp không phải là người đại diện theo pháp luật thì bắt buộc phải xuất trình văn bản nào sau đây?", "options": {"A": "Thẻ nhân viên hoặc Hợp đồng lao động của doanh nghiệp đó.", "B": "Giấy giới thiệu có đóng dấu của doanh nghiệp về việc đi ký kết.", "C": "Giấy xác nhận tư cách cổ đông hoặc thành viên góp vốn.", "D": "Văn bản ủy quyền hợp lệ của người đại diện theo pháp luật."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 138 Bộ luật Dân sự 2015: Cá nhân, pháp nhân có thể ủy quyền cho cá nhân, pháp nhân khác xác lập, thực hiện giao dịch dân sự. Trong bối cảnh doanh nghiệp, người đại diện theo pháp

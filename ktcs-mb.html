    <script>
        const allData = [{"level": "1", "content": "Luật Kinh doanh bất động sản 2023 có hiệu lực thi hành từ ngày nào?", "options": {"A": "01/01/2025", "B": "01/08/2024", "C": "28/11/2023", "D": "01/01/2015"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo thiết kế ban đầu tại Điều 82 Luật Kinh doanh bất động sản 2023, ngày có hiệu lực dự kiến là 01/01/2025. Tuy nhiên, ngày 29/06/2024, Quốc hội khóa XV đã thông qua Luật số 43/2024/QH15 (Luật sửa đổi, bổ sung một số điều của Luật Đất đai, Luật Nhà ở, Luật Kinh doanh bất động sản và Luật Các tổ chức tín dụng). Theo Luật số 43/2024/QH15, hiệu lực thi hành của Luật Kinh doanh bất động sản 2023 đã được điều chỉnh sớm hơn, từ ngày 01/08/2024. Tại Khoản 2 Điều 3 Luật số 43/2024/QH15, Quốc hội quy định: \"Thay thế cụm từ 'ngày 01 tháng 01 năm 2025' bằng cụm từ 'ngày 01 tháng 08 năm 2024' tại Điều 82 của Luật Kinh doanh bất động sản số 29/2023/QH15.\""}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, \"Kinh doanh bất động sản\" được hiểu là gì?", "options": {"A": "Là việc đầu tư nguồn vốn để xây dựng nhà ở, công trình xây dựng và phát triển hạ tầng kỹ thuật nhằm mục đích chuyển nhượng hoặc cho thuê quyền sử dụng đất để thu lợi nhuận.", "B": "Là việc tổ chức, cá nhân thực hiện các hoạt động môi giới, tư vấn, quản lý bất động sản và quảng cáo bất động sản nhằm mục đích tìm kiếm lợi nhuận trên thị trường.", "C": "Việc bỏ vốn đầu tư tạo lập, mua, nhận chuyển nhượng, thuê, thuê mua bất động sản để bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua nhằm mục đích lợi nhuận.", "D": "Là việc mua bán, chuyển nhượng bất động sản và quyền sử dụng đất giữa các chủ thể trên thị trường nhằm mục đích đầu cơ hoặc khai thác giá trị tăng thêm của tài sản theo quy định pháp luật."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 3 Luật Kinh doanh bất động sản 2023 định nghĩa rõ hoạt động kinh doanh bất động sản bao gồm các hoạt động đầu tư vốn liên quan đến bất động sản nhằm mục đích lợi nhuận. Hình thức tác động: Không chỉ là \"mua bán\" mà còn bao gồm \"tạo lập\" (đầu tư xây dựng), \"thuê mua\", và đặc biệt là \"cho thuê lại\"."}, {"level": "1", "content": "Theo quy định tại Khoản 2 Điều 1 Luật Kinh doanh bất động sản 2023, trường hợp nào sau đây KHÔNG thuộc phạm vi điều chỉnh của Luật này?", "options": {"A": "Kinh doanh dịch vụ môi giới bất động sản.", "B": "Bán nhà ở hình thành trong tương lai của chủ đầu tư dự án.", "C": "Việc bán nhà ở của cơ quan nhà nước do phá sản, giải thể.", "D": "Cho thuê văn phòng của doanh nghiệp kinh doanh bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> \"Các trường hợp loại trừ\" được quy định tại Điểm b Khoản 2 Điều 1 Luật Kinh doanh bất động sản 2023, bao gồm việc bán nhà ở, công trình xây dựng của cơ quan, tổ chức do phá sản, giải thể. Bản chất của các giao dịch này là xử lý tài sản phát sinh từ các sự kiện pháp lý đặc biệt (giải thể, phá sản, thi hành án...), không phải là hoạt động bỏ vốn đầu tư để tìm kiếm lợi nhuận thông thường. Các hoạt động này sẽ được điều chỉnh bởi pháp luật về phá sản, giải thể hoặc pháp luật về quản lý tài sản công, thay vì các quy định khắt khe về điều kiện kinh doanh bất động sản."}, {"level": "1", "content": "Hành vi nào sau đây bị nghiêm cấm theo Luật Kinh doanh bất động sản 2023?", "options": {"A": "Kinh doanh bất động sản đủ điều kiện theo quy định.", "B": "Công khai đầy đủ thông tin về dự án bất động sản", "C": "Thu tiền đặt cọc mua nhà hình thành trong tương lai không quá 5% giá bán.", "D": "Giả mạo tài liệu, cố ý làm sai lệch thông tin về bất động sản."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Điều 8 Luật Kinh doanh bất động sản 2023 liệt kê các hành vi bị cấm, bao gồm việc giả mạo tài liệu và làm sai lệch thông tin."}, {"level": "1", "content": "Điều kiện về vốn chủ sở hữu đối với doanh nghiệp kinh doanh bất động sản làm chủ đầu tư dự án có quy mô sử dụng đất dưới 20 ha theo Luật Kinh doanh bất động sản 2023 là gì?", "options": {"A": "Tối thiểu 20 tỷ đồng.", "B": "Không thấp hơn 15% tổng vốn đầu tư", "C": "Không thấp hơn 20% tổng vốn đầu tư.", "D": "Không quy định cụ thể."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo điều 9, Luật Kinh doanh bất động sản 2023 Doanh nghiệp kinh doanh bất động sản thông qua dự án bất động sản phải có vốn chủ sở hữu không thấp hơn 20% tổng vốn đầu tư đối với dự án có quy mô sử dụng đất dưới 20 ha, không thấp hơn 15% tổng vốn đầu tư đối với dự án có quy mô sử dụng đất từ 20 ha trở lên và phải bảo đảm khả năng huy động vốn để thực hiện dự án đầu tư; trường hợp doanh nghiệp kinh doanh bất động sản đồng thời thực hiện nhiều dự án thì phải có vốn chủ sở hữu đủ phân bổ để bảo đảm tỷ lệ nêu trên của từng dự án để thực hiện toàn bộ các dự án."}, {"level": "1", "content": "Căn cứ theo Khoản 1 Điều 12 Luật Kinh doanh bất động sản 2023, điều kiện nào sau đây KHÔNG thuộc nhóm các điều kiện bắt buộc phải đáp ứng đối với nhà ở, công trình xây dựng có sẵn khi đưa vào kinh doanh?", "options": {"A": "Có Giấy chứng nhận quyền sở hữu tài sản gắn liền với đất theo quy định của pháp luật về đất đai.", "B": "Tài sản không có tranh chấp về quyền sở hữu gắn liền với đất, quyền sử dụng đất đang có thông báo của cơ quan có thẩm quyền.", "C": "Phải thuộc danh mục dự án bất động sản đã được cơ quan nhà nước có thẩm quyền phê duyệt quy hoạch chi tiết 1/500.", "D": "Không bị kê biên để bảo đảm thi hành án hoặc không bị cấm giao dịch theo quyết định của cơ quan nhà nước, bản án của Tòa án.."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều kiện nằm trong dự án bất động sản áp dụng chủ yếu cho bất động sản hình thành trong tương lai hoặc đất nền dự án, không bắt buộc với mọi nhà ở, công trình có sẵn riêng lẻ. Đây là điểm phân biệt rất rõ giữa Bất động sản có sẵn và Bất động sản hình thành trong tương lai: Theo Điều 12, điều kiện đối với bất động sản có sẵn tập trung vào tính \"hiện hữu pháp lý\" (Sổ đỏ/Sổ hồng, không tranh chấp, không kê biên, công khai thông tin). Việc \"phải nằm trong dự án được phê duyệt 1/500\" là điều kiện tiên quyết đối với Bất động sản hình thành trong tương lai (Điều 24) hoặc Đất nền dự án. Một doanh nghiệp kinh doanh bất động sản hoàn toàn có thể mua một tòa nhà văn phòng hiện hữu (đã có sổ) từ một tổ chức khác để cho thuê hoặc bán lại mà tòa nhà đó không nhất thiết phải là một phần của một \"dự án bất động sản\" mới đang triển khai."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, điều kiện nào sau đây là bắt buộc để chủ đầu tư đủ điều kiện đưa nhà ở hình thành trong tương lai vào kinh doanh?", "options": {"A": "Đã khởi công xây dựng công trình theo quy định của pháp luật về xây dựng và hoàn thành việc xây dựng phần móng đối với loại hình nhà chung cư.", "B": "Có văn bản của cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh về việc nhà ở đủ điều kiện được bán, cho thuê mua theo quy định.", "C": "Đã hoàn thành toàn bộ nghĩa vụ tài chính về đất đai đối với Nhà nước theo quy định của pháp luật đối với đất gắn với nhà ở đưa vào kinh doanh.", "D": "Có văn bản cam kết bảo lãnh của ngân hàng thương mại trong nước hoặc chi nhánh ngân hàng nước ngoài đang hoạt động hợp pháp tại Việt Nam."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Khoản 4, Điều 24 Luật Kinh doanh bất động sản 2023. Đây là quy định nhằm bảo vệ quyền lợi người mua, tránh tình trạng dự án đã bán nhưng chưa nộp tiền sử dụng đất dẫn đến không ra được sổ hồng."}, {"level": "1", "content": "Điểm mới căn bản của Luật Kinh doanh bất động sản 2023 so với Luật năm 2014 về điều kiện quyền sử dụng đất đối với dự án, phần dự án bất động sản được chuyển nhượng là gì?", "options": {"A": "Chủ đầu tư chuyển nhượng bắt buộc phải có Giấy chứng nhận quyền sử dụng đất đối với toàn bộ diện tích dự án.", "B": "Chủ đầu tư chỉ cần có quyết định giao đất, cho thuê đất và đã hoàn thành nghĩa vụ tài chính về đất đối với Nhà nước.", "C": "Dự án phải hoàn thành việc xây dựng toàn bộ các công trình hạ tầng kỹ thuật theo quy hoạch chi tiết 1/500.", "D": "Bên nhận chuyển nhượng phải có vốn điều lệ tối thiểu bằng 30% tổng mức đầu tư của dự án nhận chuyển nhượng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Bước đột phá nằm tại Điểm b Khoản 2 Điều 40 Luật Kinh doanh bất động sản 2023: Luật cũ (2014): Yêu cầu dự án phải có Giấy chứng nhận quyền sử dụng đất (Sổ đỏ/Sổ hồng). Thực tế, việc cấp Sổ cho cả dự án thường mất rất nhiều thời gian sau khi hoàn thành nghĩa vụ tài chính, gây đứt gãy dòng vốn của chủ đầu tư. Luật mới (2023): Chỉ yêu cầu: (1) Có quyết định giao đất, cho thuê đất, cho phép chuyển mục đích sử dụng đất; và (2) Đã hoàn thành nghĩa vụ tài chính về đất (tiền sử dụng đất, tiền thuê đất, các loại thuế, phí liên quan). Luật quy định rõ: \"không bắt buộc phải có Giấy chứng nhận quyền sử dụng đất đối với toàn bộ hoặc phần dự án chuyển nhượng\"."}, {"level": "1", "content": "Mức đặt cọc tối đa mà chủ đầu tư được thu khi bán nhà ở hình thành trong tương lai theo Luật Kinh doanh bất động sản 2023 là bao nhiêu?", "options": {"A": "5% giá bán", "B": "10% giá bán", "C": "30% giá bán", "D": "95% giá bán"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khoản 5 Điều 23 Luật Kinh doanh bất động sản 2023 quy định rõ mức đặt cọc tối đa là 5% giá bán, cho thuê mua."}, {"level": "1", "content": "Mức thanh toán lần đầu sau khi ký hợp đồng mua nhà ở hình thành trong tương lai theo Luật Kinh doanh bất động sản 2023 tối đa là bao nhiêu (bao gồm cả tiền đặt cọc)?", "options": {"A": "50% giá trị hợp đồng", "B": "70% giá trị hợp đồng", "C": "30% giá trị hợp đồng", "D": "95% giá trị hợp đồng"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo điều 25, Luật Kinh doanh bất động sản 2023 quy định mức thanh toán lần đầu không quá 30% giá trị hợp đồng, bao gồm cả tiền đặt cọc."}, {"level": "1", "content": "Đối với hợp đồng thuê mua nhà ở hình thành trong tương lai, tổng số tiền thanh toán trước khi bàn giao nhà theo Luật Kinh doanh bất động sản 2023 không được vượt quá bao nhiêu % giá trị hợp đồng?", "options": {"A": "30%", "B": "50%", "C": "70%", "D": "95%"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mức trần thanh toán trước bàn giao đối với hợp đồng thuê mua đã giảm từ 70% (Luật kinh doanh bất động sản 2014) xuống còn 50% (Theo khoản 2, điều 25, Luật Kinh doanh bất động sản 2023)."}, {"level": "1", "content": "Luật Kinh doanh bất động sản 2023 yêu cầu các bên phải ghi thông tin nào vào hợp đồng kinh doanh bất động sản một cách chính xác?", "options": {"A": "Chỉ cần ghi giá tham khảo trên thị trường.", "B": "Giá giao dịch thực tế.", "C": "Giá tính thuế theo bảng giá đất của Nhà nước.", "D": "Giá thỏa thuận nhưng không cần công khai."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2, điều 47, Luật Kinh doanh bất động sản 2023, Tổ chức, cá nhân kinh doanh bất động sản ghi đúng giá giao dịch thực tế trong hợp đồng; chịu trách nhiệm trong việc ghi giá giao dịch trong hợp đồng không đúng với giá giao dịch thực tế."}, {"level": "1", "content": "Phương thức thanh toán bắt buộc đối với giao dịch giữa chủ đầu tư, doanh nghiệp kinh doanh bất động sản với khách hàng theo Luật Kinh doanh bất động sản 2023 là gì (trừ trường hợp quy mô nhỏ)?", "options": {"A": "Tiền mặt", "B": "Chuyển khoản qua ngân hàng", "C": "Vàng hoặc ngoại tệ", "D": "Phương thức do các bên thỏa thuận và ghi rõ trong hợp đồng"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật Kinh doanh bất động sản 2023 bắt buộc thanh toán qua tài khoản ngân hàng đối với các giao dịch chính thức giữa doanh nghiệp và khách hàng."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, doanh nghiệp kinh doanh bất động sản phải thực hiện việc công khai thông tin về dự án và bất động sản đưa vào kinh doanh theo hình thức và thời điểm nào sau đây để đảm bảo đúng quy định?", "options": {"A": "Niêm yết tại trụ sở Ban Quản lý dự án và công bố trên các phương tiện thông tin đại chúng trong thời hạn 15 ngày kể từ ngày khởi công công trình.", "B": "Công khai đầy đủ trên hệ thống thông tin về nhà ở và thị trường bất động sản và trên trang thông tin điện tử của doanh nghiệp trước khi đưa vào kinh doanh.", "C": "Gửi văn bản thông báo cho Sở Xây dựng và thực hiện đăng tải trên cổng thông tin điện tử của Ủy ban nhân dân cấp tỉnh ngay sau khi có giấy phép xây dựng.", "D": "Cung cấp bộ hồ sơ pháp lý đầy đủ cho khách hàng tại sàn giao dịch và thực hiện công khai trên trang nhà của chủ đầu tư trong vòng 30 ngày trước khi ký hợp đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1, điều 6, Luật Kinh doanh bất động sản 2023 quy định: Thông tin phải được công khai đầy đủ, trung thực và kịp thời trước khi đưa vào kinh doanh. Việc không công khai hoặc công khai không đầy đủ có thể dẫn đến bị xử phạt hành chính theo Nghị định về xử phạt vi phạm hành chính trong lĩnh vực xây dựng."}, {"level": "1", "content": "Điều kiện hành nghề của cá nhân môi giới bất động sản theo Luật Kinh doanh bất động sản 2023 có thay đổi quan trọng nào so với Luật Kinh doanh Bất động sản 2014?", "options": {"A": "Cá nhân được phép hành nghề độc lập dưới hình thức hộ kinh doanh cá thể sau khi đã có chứng chỉ hành nghề và hoàn thành nghĩa vụ đăng ký thuế với cơ quan nhà nước.", "B": "Cá nhân bắt buộc phải có bằng tốt nghiệp đại học thuộc các khối ngành Kinh tế, Luật hoặc Xây dựng và phải có chứng chỉ đào tạo về quy tắc đạo đức nghề nghiệp môi giới.", "C": "Cá nhân phải có chứng chỉ hành nghề và phải hành nghề trong một doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản hoặc doanh nghiệp môi giới bất động sản.", "D": "Cá nhân chỉ cần có chứng chỉ hành nghề môi giới và được quyền ký kết hợp đồng môi giới trực tiếp với khách hàng mà không cần thông qua các tổ chức kinh doanh dịch vụ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điểm thay đổi then chốt là cá nhân môi giới bắt buộc phải có chứng chỉ hành nghề và phải hành nghề trong một doanh nghiệp dịch vụ bất động sản (sàn hoặc công ty môi giới), không được hoạt động độc lập.   Điểm mấu chốt của Luật 2023 là xóa bỏ môi giới tự do (independent broker). Đáp án C tập trung vào việc cá nhân phải thuộc về một \"thực thể pháp lý\" (doanh nghiệp). Cụm từ \"doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản hoặc doanh nghiệp môi giới bất động sản\" được trích dẫn sát với văn bản luật. Các đáp án khác gây nhiễu đảm bảo cho đề thi có độ khó nhất định."}, {"level": "1", "content": "Doanh nghiệp kinh doanh dịch vụ môi giới bất động sản theo Luật Kinh doanh bất động sản 2023 cần tối thiểu bao nhiêu người có chứng chỉ hành nghề môi giới bất động sản?", "options": {"A": "01 người", "B": "02 người", "C": "03 người", "D": "Không quy định"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Điểm c, khoản 1, điều 61, Luật Kinh doanh bất động sản 2023 yêu cầu có tối thiểu 01 người có chứng chỉ hành nghề môi giới bất động sản."}, {"level": "1", "content": "Theo quy định của Luật Kinh doanh bất động sản 2023, điều kiện về thủ tục hành chính bắt buộc để một doanh nghiệp chính thức được phép hoạt động dịch vụ sàn giao dịch bất động sản là gì?", "options": {"A": "Doanh nghiệp thực hiện đăng ký ngành nghề kinh doanh dịch vụ bất động sản và gửi thông báo bằng văn bản cho Sở Xây dựng trước khi bắt đầu hoạt động 15 ngày.", "B": "Doanh nghiệp gửi hồ sơ đến cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh nơi có trụ sở chính để được cấp Giấy phép hoạt động sàn giao dịch bất động sản.", "C": "Doanh nghiệp được phép hoạt động ngay sau khi có Giấy chứng nhận đăng ký doanh nghiệp và đáp ứng đủ điều kiện về số lượng nhân sự có chứng chỉ hành nghề môi giới.", "D": "Doanh nghiệp phải được Bộ Xây dựng thẩm định hồ sơ năng lực và cấp Giấy xác nhận đủ điều kiện vận hành sàn giao dịch bất động sản trên hệ thống thông tin quốc gia."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 3, điều 55 Luật kinh doanh bất động sản quy định: Sàn giao dịch bất động sản trước khi hoạt động phải gửi hồ sơ đến cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh nơi có trụ sở chính của sàn giao dịch bất động sản để được cấp giấy phép hoạt động. Ngoài ra, trình tự, thủ tục cấp giấy phép này còn được quy định chi tiết tại Nghị định 96/2024/NĐ-CP. Đây là điểm mới so với luật cũ, sàn giao dịch bất động sản phải được Sở Xây dựng cấp Giấy phép hoạt động trước khi kinh doanh, nhằm siết chặt quản lý để loại bỏ các sàn giao dịch \"ma\" hoặc không đủ điều kiện cơ sở vật chất, nhân sự."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, quy định về việc thực hiện giao dịch bất động sản thông qua sàn giao dịch được thể hiện như thế nào để phù hợp với quyền tự do kinh doanh của các bên?", "options": {"A": "Bắt buộc đối với các giao dịch bán, cho thuê mua nhà ở hình thành trong tương lai của chủ đầu tư dự án nhằm kiểm soát dòng tiền và bảo vệ khách hàng.", "B": "Chỉ bắt buộc đối với các giao dịch mà bên bán hoặc bên cho thuê mua là doanh nghiệp kinh doanh bất động sản có vốn đầu tư nước ngoài (FDI).", "C": "Nhà nước khuyến khích tổ chức, cá nhân thực hiện giao dịch qua sàn giao dịch bất động sản; việc lựa chọn giao dịch qua sàn là quyền của các bên.", "D": "Giao dịch qua sàn là thủ tục bắt buộc để các bên đủ điều kiện thực hiện việc đăng ký biến động đất đai và cấp Giấy chứng nhận tại cơ quan thẩm quyền."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 54 Luật Kinh doanh bất động sản 2023 ghi rõ: \"Nhà nước khuyến khích tổ chức, cá nhân thực hiện giao dịch mua bán, thuê mua, cho thuê nhà ở, công trình xây dựng và quyền sử dụng đất đã có hạ tầng kỹ thuật trong dự án bất động sản thông qua sàn giao dịch bất động sản.\""}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023 và hướng dẫn tại Nghị định 96/2024/NĐ-CP, cá nhân kinh doanh bất động sản quy mô nhỏ được miễn yêu cầu thành lập doanh nghiệp khi đáp ứng các định mức cụ thể nào sau đây?", "options": {"A": "Bán, cho thuê mua nhà ở, công trình xây dựng không quá 05 lần trong một năm và giá trị của mỗi giao dịch (mỗi hợp đồng) không vượt quá 100 tỷ đồng.", "B": "Bán, cho thuê mua nhà ở, công trình xây dựng không quá 10 lần trong một năm và giá trị của mỗi giao dịch (mỗi hợp đồng) không vượt quá 300 tỷ đồng.", "C": "Tổng doanh thu từ hoạt động bán, cho thuê mua bất động sản trong một năm không quá 500 tỷ đồng, không giới hạn số lần thực hiện giao dịch.", "D": "Chỉ thực hiện giao dịch đối với bất động sản đã có Giấy chứng nhận và tổng giá trị giao dịch trong năm tài chính không vượt quá 200 tỷ đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đáp án B phản ánh đúng tinh thần của Khoản 2, Điều 7 Nghị định 96/2024/NĐ-CP. Đây là điều kiện \"song hành\": Để được coi là quy mô nhỏ, cá nhân phải nằm trong cả hai giới hạn này. Nếu giao dịch lần thứ 11 trong năm, hoặc chỉ giao dịch 1 lần nhưng giá trị hợp đồng vượt 300 tỷ đồng, thì đều bắt buộc phải thành lập doanh nghiệp kinh doanh bất động sản theo quy định tại Điều 9 của Luật. Cá nhân kinh doanh bất động sản quy mô nhỏ được miễn trừ yêu cầu thành lập doanh nghiệp nhưng vẫn phải kê khai và nộp thuế."}, {"level": "1", "content": "Trong năm 2026, ông A (cá nhân) thực hiện các giao dịch bán nhà ở hình thành trong tương lai. Dựa trên quy định về định mức \"quy mô nhỏ\" tại Nghị định 96/2024/NĐ-CP, trường hợp nào sau đây khiến ông A bắt đầu bắt buộc phải thành lập doanh nghiệp kinh doanh bất động sản?", "options": {"A": "Ông A thực hiện 01 giao dịch duy nhất trong năm với giá trị hợp đồng là 500 tỷ đồng.", "B": "Ông A đã thực hiện 10 giao dịch (mỗi giao dịch 5 tỷ) và đang chuẩn bị ký kết hợp đồng thứ 11 với giá trị 1 tỷ đồng.", "C": "Ông A thực hiện 02 giao dịch trong năm, trong đó có 01 hợp đồng trị giá 305 tỷ đồng và 01 hợp đồng trị giá 5 tỷ đồng.", "D": "Cả phương án B và C đều đúng."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ theo Khoản 1, Điều 7 Nghị định 96/2024/NĐ-CP, cá nhân kinh doanh bất động sản quy mô nhỏ là người không quá 10 giao dịch/năm và giá trị mỗi hợp đồng không quá 300 tỷ đồng.  Phương án A là \"bẫy\" về ngoại lệ. Theo Khoản 1, Điều 7 Nghị định 96, nếu chỉ giao dịch 01 lần/năm thì không tính giá trị. Do đó, dù là 500 tỷ nhưng nếu chỉ có 1 giao dịch, ông A vẫn là \"quy mô nhỏ\"."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, trường hợp nào sau đây HỢP ĐỒNG bắt buộc phải công chứng hoặc chứng thực?", "options": {"A": "Hợp đồng mua bán căn hộ giữa chủ đầu tư và khách hàng cá nhân.", "B": "Hợp đồng thuê văn phòng giữa hai doanh nghiệp.", "C": "Hợp đồng mua bán nhà ở giữa hai cá nhân với nhau.", "D": "Hợp đồng môi giới bất động sản giữa doanh nghiệp môi giới và khách hàng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật quy định hợp đồng mua bán, thuê mua nhà ở, công trình mà các bên đều là cá nhân thì bắt buộc phải công chứng hoặc chứng thực."}, {"level": "1", "content": "Cơ quan nào có thẩm quyền cấp chứng chỉ hành nghề môi giới bất động sản theo quy định pháp luật hiện hành?", "options": {"A": "Bộ Xây dựng", "B": "Hiệp hội Bất động sản Việt Nam", "C": "Sở Xây dựng cấp tỉnh", "D": "Doanh nghiệp kinh doanh dịch vụ bất động sản"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Kỳ thi sát hạch và việc cấp chứng chỉ hành nghề môi giới được giao cho Sở Xây dựng cấp tỉnh tổ chức và thực hiện (phân quyền theo cơ chế hành chính hai cấp)."}, {"level": "1", "content": "Theo Điều 6 Luật Kinh doanh bất động sản 2023 và các văn bản hướng dẫn, khi đưa nhà ở hình thành trong tương lai vào kinh doanh, chủ đầu tư không bắt buộc phải công khai thông tin nào sau đây trên hệ thống thông tin về nhà ở và thị trường bất động sản?", "options": {"A": "Thông tin về việc thế chấp nhà ở, công trình xây dựng, quyền sử dụng đất thuộc dự án đưa vào kinh doanh (nếu có).", "B": "Văn bản của cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh về việc nhà ở đủ điều kiện được bán, cho thuê mua.", "C": "Hồ sơ thiết kế kỹ thuật chi tiết và dự toán kinh phí xây dựng đã được cơ quan chuyên môn về xây dựng thẩm định.", "D": "Văn bản cam kết bảo lãnh của ngân hàng thương mại đối với nghĩa vụ tài chính của chủ đầu tư khi không bàn giao nhà đúng tiến độ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Mặc dù dự án phải được thẩm định thiết kế và dự toán để cấp phép, nhưng Điều 6 của Luật Kinh doanh BĐS 2023 chỉ yêu cầu công khai Quyết định phê duyệt dự án, Quy hoạch chi tiết 1/500 và Giấy phép xây dựng, chứ không yêu cầu công khai toàn bộ Hồ sơ thiết kế kỹ thuật chi tiết và dự toán chi phí. Đây là bí mật kinh doanh và hồ sơ lưu trữ nội bộ của chủ đầu tư/cơ quan quản lý."}, {"level": "1", "content": "Theo quy định tại Điều 51 Luật Kinh doanh bất động sản 2023, trong quá trình thực hiện thủ tục chuyển nhượng hợp đồng mua bán nhà ở hình thành trong tương lai, hành vi nào sau đây của chủ đầu tư dự án được coi là đúng quy định pháp luật?", "options": {"A": "Được phép thu một khoản phí quản lý hành chính và phí thẩm định hồ sơ nếu nội dung này đã được các bên thỏa thuận rõ trong hợp đồng mua bán ban đầu.", "B": "Có trách nhiệm xác nhận vào văn bản chuyển nhượng hợp đồng cho các bên và không được thu bất kỳ khoản chi phí nào liên quan đến việc chuyển nhượng hợp đồng.", "C": "Được thu phí dịch vụ hỗ trợ thủ tục chuyển nhượng và phí thay đổi thông tin khách hàng trên hệ thống quản lý dự án nhưng không vượt quá 01% giá trị hợp đồng.", "D": "Được quyền từ chối xác nhận chuyển nhượng nếu bên chuyển nhượng chưa hoàn thành việc nộp phí tư vấn và phí môi giới cho đơn vị phân phối của chủ đầu tư."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 4, Điều 51 Luật Kinh doanh bất động sản 2023 quy định: “\"Chủ đầu tư không được thu bất kỳ khoản chi phí nào liên quan đến việc chuyển nhượng hợp đồng.\" Luật bảo vệ tối đa quyền chuyển nhượng của khách hàng. Chủ đầu tư chỉ có vai trò xác nhận tính hợp pháp của việc chuyển nhượng (để phục vụ quản lý và bàn giao sau này) mà không được biến đây thành một nguồn thu dịch vụ."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, trong trường hợp các bên không có thỏa thuận khác, thời điểm xác lập quyền sở hữu nhà ở, công trình xây dựng đối với bên mua, bên thuê mua được quy định là khi nào?", "options": {"A": "Kể từ thời điểm hợp đồng mua bán, thuê mua được các bên ký kết hợp lệ hoặc được công chứng, chứng thực theo quy định của pháp luật về dân sự và kinh doanh bất động sản.", "B": "Kể từ thời điểm bên mua, bên thuê mua đã thanh toán đủ 95% giá trị hợp đồng và bên bán đã hoàn tất việc nộp hồ sơ đề nghị cấp Giấy chứng nhận cho cơ quan nhà nước.", "C": "Kể từ thời điểm bên mua, bên thuê mua đã thanh toán đủ tiền cho bên bán, bên cho thuê mua và đã nhận bàn giao thực tế nhà ở, công trình xây dựng đó.", "D": "Kể từ thời điểm bên mua, bên thuê mua được cơ quan nhà nước có thẩm quyền cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo khoản 5, điều 13, Luật Kinh doanh bất động sản 2023, quy định Thời điểm xác lập quyền sở hữu nhà ở, công trình xây dựng, phần diện tích sàn xây dựng trong công trình xây dựng đối với bên mua, thuê mua là kể từ thời điểm bên mua, thuê mua đã thanh toán đủ tiền mua, tiền thuê mua và đã nhận bàn giao nhà ở, công trình xây dựng, phần diện tích sàn xây dựng trong công trình xây dựng, trừ trường hợp các bên có thỏa thuận khác."}, {"level": "1", "content": "Theo quy định của Luật Kinh doanh bất động sản 2023, sau khi đã thực hiện chuyển nhượng quyền sử dụng đất đã có hạ tầng kỹ thuật trong dự án cho cá nhân tự xây dựng nhà ở, chủ đầu tư dự án phải thực hiện trách nhiệm pháp lý nào sau đây?", "options": {"A": "Thực hiện thủ tục xin cấp giấy phép xây dựng và trực tiếp chịu trách nhiệm về chất lượng xây dựng phần thô của ngôi nhà thay cho cá nhân.", "B": "Kiểm tra, giám sát việc xây dựng nhà ở của cá nhân để đảm bảo tuân thủ đúng quy hoạch chi tiết và thiết kế đô thị đã được cấp có thẩm quyền phê duyệt.", "C": "Bàn giao toàn bộ quyền quản lý hạ tầng kỹ thuật và hồ sơ pháp lý lô đất cho cá nhân để họ tự thực hiện các thủ tục hoàn công với cơ quan nhà nước.", "D": "Trực tiếp ký hợp đồng thuê đơn vị tư vấn giám sát độc lập để kiểm tra định kỳ và thu phí quản lý xây dựng đối với cá nhân cho đến khi hoàn thành công trình."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 6, Điều 32 Luật Kinh doanh bất động sản 2023: Quy định rõ chủ đầu tư có trách nhiệm kiểm tra, giám sát việc xây dựng nhà ở của cá nhân để đảm bảo đúng quy hoạch chi tiết và thiết kế đô thị. Đây là trách nhiệm bắt buộc. Chủ đầu tư không chỉ bán đất mà còn đóng vai trò là \"người gác cổng\" cho quy hoạch 1/500 của dự án đó. Nếu để cá nhân xây dựng sai quy hoạch, chủ đầu tư cũng sẽ bị xử phạt theo pháp luật về xây dựng. Quy định này nhằm ngăn chặn tình trạng người dân mua đất dự án rồi xây dựng tự phát, không đúng kiến trúc mặt tiền hoặc mật độ xây dựng đã được phê duyệt."}, {"level": "1", "content": "Căn cứ vào Điều 8 Luật Kinh doanh bất động sản 2023, hành vi nào sau đây được xác định là hành vi bị nghiêm cấm liên quan đến chứng chỉ hành nghề môi giới bất động sản?", "options": {"A": "Cá nhân thực hiện hoạt động môi giới bất động sản khi chứng chỉ hành nghề đã hết thời hạn sử dụng theo quy định.", "B": "Tổ chức, cá nhân thực hiện việc cấp hoặc sử dụng chứng chỉ hành nghề môi giới bất động sản không đúng quy định.", "C": "Cá nhân có chứng chỉ hành nghề môi giới bất động sản nhưng thực hiện hành nghề độc lập, không thuộc doanh nghiệp.", "D": "Doanh nghiệp môi giới sử dụng nhân sự chưa được cấp chứng chỉ hành nghề để thực hiện các công việc tư vấn kỹ thuật."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là sự trích dẫn chuẩn xác từ Khoản 9, Điều 8 Luật Kinh doanh bất động sản 2023. Hành vi \"Cấp\" (về phía cơ quan quản lý) hoặc \"Sử dụng\" (về phía cá nhân/doanh nghiệp) không đúng quy định (bao gồm mượn, thuê, làm giả...) là hành vi bị nghiêm cấm tuyệt đối, có thể dẫn đến truy cứu trách nhiệm hình sự hoặc thu hồi chứng chỉ vĩnh viễn."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, khi thực hiện chuyển nhượng toàn bộ hoặc một phần dự án bất động sản mà không thay đổi nội dung dự án đã được phê duyệt, nghĩa vụ của bên nhận chuyển nhượng đối với hồ sơ pháp lý được quy định như thế nào?", "options": {"A": "Phải thực hiện lại thủ tục thẩm định thiết kế cơ sở và xin cấp mới Giấy phép xây dựng để cập nhật thông tin về chủ thể pháp nhân mới của dự án.", "B": "Không phải thực hiện lại hồ sơ dự án, quy hoạch xây dựng và Giấy phép xây dựng của dự án nếu không có sự thay đổi về nội dung của dự án.", "C": "Chỉ được kế thừa quy hoạch chi tiết 1/500 nhưng bắt buộc phải lập lại Báo cáo đánh giá tác động môi trường (DTM) theo tên của bên nhận chuyển nhượng.", "D": "Phải thực hiện lại từ đầu quy trình phê duyệt chủ trương đầu tư để cơ quan nhà nước thẩm định lại năng lực tài chính của chủ đầu tư mới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 2, Điều 42 Luật Kinh doanh bất động sản 2023. \"Bên nhận chuyển nhượng toàn bộ hoặc một phần dự án không phải thực hiện lại hồ sơ dự án, quy hoạch xây dựng và Giấy phép xây dựng của dự án nếu không có sự thay đổi về nội dung của dự án...\""}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, tổ chức, cá nhân kinh doanh bất động sản được phép kinh doanh bất động sản ở đâu?", "options": {"A": "Chỉ thực hiện tại các địa phương mà doanh nghiệp đã thực hiện đăng ký kinh doanh hoặc có văn phòng đại diện được Sở Kế hoạch và Đầu tư cấp phép.", "B": "Trong phạm vi toàn lãnh thổ Việt Nam, trừ các khu vực thuộc danh mục hạn chế đầu tư nước ngoài theo quy định của pháp luật về đầu tư.", "C": "Ngoài phạm vi khu vực bảo vệ theo quy định của pháp luật về quốc phòng, an ninh; đảm bảo phù hợp với quy hoạch, kế hoạch sử dụng đất các cấp.", "D": "Chỉ tại các dự án bất động sản đã được cấp Giấy chứng nhận quyền sử dụng đất và nằm trong ranh giới các khu vực đô thị từ loại III trở lên."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 2, Điều 4 Luật Kinh doanh bất động sản 2023: \"Tổ chức, cá nhân được kinh doanh bất động sản ngoài phạm vi khu vực bảo vệ theo quy định của pháp luật về quốc phòng, an ninh.\". Khoản 3, Điều 4 Luật Kinh doanh bất động sản 2023: \"Hoạt động kinh doanh bất động sản phải phù hợp với quy hoạch, kế hoạch sử dụng đất...\" Đáp án C kết hợp cả hai yếu tố quan trọng tại Điều 4: (1) An ninh quốc gia (ngoài khu vực bảo vệ quốc phòng) và (2) Quy hoạch (phù hợp kế hoạch sử dụng đất). Đây là \"bộ lọc\" kép mà mọi dự án BĐS đều phải đi qua."}, {"level": "1", "content": "Theo quy định tại Khoản 5 Điều 23 Luật Kinh doanh bất động sản 2023, hành vi nào sau đây của chủ đầu tư dự án đối với việc thu tiền đặt cọc nhà ở hình thành trong tương lai bị coi là vi phạm pháp luật?", "options": {"A": "Thu tiền đặt cọc khi nhà ở đã đủ điều kiện đưa vào kinh doanh với số tiền bằng 5% giá bán ghi trong thỏa thuận đặt cọc.", "B": "Thu tiền đặt cọc nhằm mục đích giữ chỗ trong khi chờ dự án đủ điều kiện đưa vào kinh doanh với mức thu không quá 5% giá bán dự kiến.", "C": "Thực hiện thỏa thuận đặt cọc bằng văn bản trong đó ghi rõ giá bán, cho thuê mua và mô tả chi tiết đặc điểm của bất động sản.", "D": "Chỉ thực hiện thu tiền đặt cọc sau khi dự án đã được công khai đầy đủ thông tin trên hệ thống thông tin về nhà ở và thị trường bất động sản."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 5, Điều 23 Luật Kinh doanh bất động sản 2023: \"Chủ đầu tư dự án bất động sản chỉ được thu tiền đặt cọc từ khách hàng khi nhà ở, công trình xây dựng đã có đủ điều kiện đưa vào kinh doanh... Số tiền đặt cọc không quá 5% giá bán, giá cho thuê mua...\".   Trước đây, nhiều chủ đầu tư lách luật bằng các tên gọi khác nhau để thu tiền sớm. Hiện nay, Điều 23 quy định rõ: Chỉ được thu đặt cọc khi đã đủ điều kiện đưa vào kinh doanh và không quá 5%."}, {"level": "1", "content": "Theo tinh thần của Luật Kinh doanh bất động sản 2023, việc bắt buộc công khai thông tin dự án trên Hệ thống thông tin về nhà ở và thị trường bất động sản nhằm hướng tới mục tiêu cốt lõi nào sau đây trong quản lý nhà nước?", "options": {"A": "Tối ưu hóa quy trình hậu kiểm và giảm thiểu thời gian thực hiện các thủ tục thanh tra hành chính định kỳ đối với các doanh nghiệp kinh doanh bất động sản.", "B": "Thiết lập nền tảng dữ liệu tập trung nhằm triệt tiêu sự bất cân xứng thông tin, đảm bảo tính minh bạch và bảo vệ quyền lợi hợp pháp của các chủ thể tham gia thị trường.", "C": "Thống kê chi tiết chỉ số hàng tồn kho và lưu lượng giao dịch thực tế để làm căn cứ trực tiếp cho việc điều tiết chính sách thuế và phí sử dụng đất dự án.", "D": "Cung cấp cơ sở dữ liệu pháp lý đồng nhất giúp các tổ chức tín dụng tự động hóa quy trình thẩm định tài sản thế chấp và quản lý rủi ro tín dụng bất động sản."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 6 Luật Kinh doanh bất động sản 2023 và Nghị định 94/2024/NĐ-CP quy định chi tiết về việc xây dựng và quản lý hệ thống thông tin về nhà ở và thị trường bất động sản. Đáp án B thể hiện mục tiêu \"thượng tầng\" của Luật Kinh doanh bất động sản 2023. Cụm từ \"bất cân xứng thông tin\" (Information Asymmetry) là thuật ngữ học thuật để chỉ trạng thái một bên (chủ đầu tư) nắm giữ nhiều thông tin hơn bên kia (khách hàng), dẫn đến thị trường kém hiệu quả. Việc công khai trên hệ thống thông tin quốc gia là công cụ để giải quyết vấn đề này."}, {"level": "1", "content": "Việc Luật Kinh doanh bất động sản 2023 và Luật Đất đai 2024 quy định chủ đầu tư dự án phải hoàn thành toàn bộ nghĩa vụ tài chính về đất đai trước khi đưa bất động sản vào kinh doanh nhằm giải quyết triệt để vấn đề cốt lõi nào sau đây?", "options": {"A": "Đảm bảo ngân sách nhà nước được thu đúng, thu đủ và kịp thời các khoản thuế, phí trước khi chủ đầu tư thực hiện việc huy động vốn từ khách hàng.", "B": "Thiết lập cơ sở pháp lý \"sạch\" cho tài sản, đảm bảo quyền sở hữu của người mua không bị ngăn chặn bởi các nghĩa vụ nợ của chủ đầu tư đối với Nhà nước.", "C": "Tạo ra một rào cản kỹ thuật để sàng lọc và loại bỏ các chủ đầu tư thiếu năng lực tài chính, chỉ dựa vào việc \"tay không bắt giặc\" thông qua vay vốn ngân hàng.", "D": "Đồng bộ hóa quy trình định giá đất theo nguyên tắc thị trường, tránh thất thoát tài sản công khi chủ đầu tư thực hiện chuyển nhượng dự án cho bên thứ ba."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý:Khoản 4, Điều 24 Luật Kinh doanh bất động sản 2023 và Điều 126 Luật Đất đai 2024 (về căn cứ giao đất, cho thuê đất). Đáp án B là câu trả lời mang tính bản chất nhất. Thực trạng hàng chục nghìn căn hộ không được cấp Sổ hồng trong giai đoạn trước 2024 phần lớn là do chủ đầu tư chưa nộp đủ tiền sử dụng đất. Luật mới yêu cầu hoàn thành nghĩa vụ tài chính trước khi bán để ngắt kết nối rủi ro giữa nợ của chủ đầu tư và quyền lợi của người mua. Khi khách hàng mua, họ yên tâm rằng mảnh đất đó đã \"sạch\" về mặt nghĩa vụ tài chính với Nhà nước."}, {"level": "1", "content": "Việc Luật Kinh doanh bất động sản 2023 mở rộng phạm vi không được chuyển nhượng quyền sử dụng đất cho cá nhân tự xây dựng nhà ở (phân lô, bán nền) đối với các đô thị loại Đặc biệt, I, II và III nhằm mục tiêu chiến lược nào sau đây?", "options": {"A": "Tập trung nguồn vốn xã hội vào các loại hình bất động sản nhà ở cao tầng nhằm tối ưu hóa quỹ đất và giải quyết bài toán mật độ dân cư tại các đô thị lớn.", "B": "Ngăn chặn tình trạng đầu cơ, lãng phí tài nguyên đất và đảm bảo việc phát triển nhà ở phải gắn liền với sự đồng bộ về hạ tầng kỹ thuật và hạ tầng xã hội.", "C": "Nâng cao rào cản gia nhập thị trường nhằm sàng lọc và giữ lại các chủ đầu tư có năng lực tài chính mạnh để thực hiện các dự án khu đô thị quy mô lớn.", "D": "Tạo cơ sở để Nhà nước thực hiện việc định giá đất theo phương pháp thặng dư một cách chính xác, tránh thất thoát ngân sách khi giao đất cho các dự án."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý:Khoản 6, Điều 31 Luật Kinh doanh bất động sản 2023: Quy định rõ việc không được chuyển nhượng quyền sử dụng đất cho cá nhân tự xây dựng nhà ở tại các phường, quận, thành phố của đô thị loại Đặc biệt, loại I, loại II và loại III. Luật Quy hoạch đô thị: Hướng tới sự phát triển bền vững và tính thẩm mỹ của bộ mặt kiến trúc quốc gia. Mục tiêu chính là hạn chế phát triển đô thị tự phát, dàn trải, thiếu quy hoạch tại các đô thị có mật độ dân cư cao, hướng tới sự phát triển đồng bộ, bền vững hơn."}, {"level": "1", "content": "Theo quy định của Luật Kinh doanh bất động sản 2023 và Nghị định 94/2024/NĐ-CP, Hệ thống thông tin về nhà ở và thị trường bất động sản được xây dựng tập trung, thống nhất trên toàn quốc nhằm thực hiện vai trò chủ đạo nào sau đây?", "options": {"A": "Đóng vai trò là cơ sở dữ liệu nội bộ dành riêng cho công tác thanh tra, kiểm tra và phê duyệt các chỉ tiêu quy hoạch kiến trúc của cơ quan quản lý nhà nước.", "B": "Thiết lập nền tảng công khai thông tin chính thống về pháp lý dự án và doanh nghiệp kinh doanh bất động sản, tạo cơ sở cho việc tra cứu và giám sát của xã hội.", "C": "Cung cấp các chỉ số thống kê về giá cả và lượng giao dịch thực tế nhằm làm căn cứ duy nhất để tính thuế thu nhập cá nhân và lệ phí trước bạ trong giao dịch dân sự.", "D": "Thay thế hoàn toàn các sàn giao dịch bất động sản trong việc thực hiện thủ tục ký kết hợp đồng điện tử và xác thực tính pháp lý của các bên tham gia giao dịch."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 72, Điều 73 Luật Kinh doanh bất động sản 2023. Nghị định 94/2024/NĐ-CP quy định chi tiết về các nhóm dữ liệu phải công khai và trách nhiệm của các bên trong việc cập nhật thông tin. Hệ thống này là công cụ quan trọng để thực hiện yêu cầu công khai thông tin, giúp thị trường minh bạch hơn. Khi một dự án được đẩy lên đây, thông tin đó được coi là thông tin pháp lý đã qua kiểm duyệt, giúp loại bỏ các dự án \"ma\" và giúp thị trường tự thanh lọc."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, việc bãi bỏ hình thức hành nghề độc lập và yêu cầu cá nhân môi giới phải hoạt động trong doanh nghiệp môi giới hoặc sàn giao dịch nhằm mục tiêu trọng tâm nào sau đây?", "options": {"A": "Thiết lập cơ chế quản lý tập trung để tinh gọn số lượng nhân sự tham gia thị trường, ưu tiên cho các cá nhân có trình độ chuyên môn cao.", "B": "Xác lập chuỗi trách nhiệm pháp lý rõ ràng, nâng cao chuẩn mực hành nghề và tạo kênh giám sát hiệu quả đối với các hành vi tư vấn của môi giới.", "C": "Hỗ trợ các doanh nghiệp bất động sản trong việc kiểm soát dòng tiền hoa hồng và tối ưu hóa các khoản thuế thu nhập cá nhân phát sinh từ giao dịch.", "D": "Chuẩn hóa quy trình làm việc theo mô hình đại lý quốc tế nhằm chuẩn bị cho lộ trình bắt buộc mọi giao dịch nhà đất phải thực hiện qua sàn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý:  Khoản 2, Điều 61 Luật Kinh doanh bất động sản 2023: \"Cá nhân hành nghề môi giới bất động sản phải hành nghề trong một doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản hoặc doanh nghiệp kinh doanh dịch vụ môi giới bất động sản.\"  Quy tắc đạo đức nghề nghiệp: Việc quản lý theo tổ chức giúp việc áp dụng các quy tắc đạo đức và chế tài xử phạt trở nên thực tế và khả thi hơn. Đáp án B Phản ánh đúng tinh thần của Điều 61: Khi môi giới nằm trong doanh nghiệp, họ không còn là những cá nhân \"vô hình\". Nếu tư vấn sai, gây thiệt hại, doanh nghiệp phải chịu trách nhiệm liên đới. Điều này giúp Nhà nước quản lý môi giới thông qua \"đầu mối\" là doanh nghiệp."}, {"level": "1", "content": "Loại hình công trình xây dựng nào được Luật Kinh doanh bất động sản 2023 bổ sung, làm rõ là đối tượng được phép kinh doanh?", "options": {"A": "Các loại nhà ở chung cư, nhà ở riêng lẻ và các công trình hạ tầng kỹ thuật đô thị được đầu tư xây dựng nhằm mục đích phục vụ nhu cầu sinh hoạt và lưu trú dài hạn của cư dân.", "B": "Bao gồm các công trình có công năng phục vụ du lịch, lưu trú (như condotel, officetel), giáo dục, y tế, thể thao, văn hóa, thương mại, dịch vụ, công nghiệp, hỗn hợp.", "C": "Các công trình xây dựng dân dụng, công nghiệp và hạ tầng xã hội đã được cơ quan nhà nước nghiệm thu đưa vào sử dụng và có đầy đủ giấy chứng nhận quyền sở hữu theo quy định.", "D": "Các dự án bất động sản nghỉ dưỡng, khu du lịch sinh thái và hệ thống hạ tầng kỹ thuật trong các khu công nghiệp được đầu tư bằng nguồn vốn ngoài ngân sách nhà nước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 5 Luật Kinh doanh bất động sản 2023 liệt kê và làm rõ nhiều loại hình công trình xây dựng có công năng khác nhau được đưa vào kinh doanh, bao gồm cả các loại hình mới như condotel, officetel.  Đáp án B trích dẫn các thuật ngữ của Luật 2023, đặc biệt là cụm từ \"công trình xây dựng có công năng hỗn hợp\". Đây là điểm mới nhất để định danh cho các loại hình như Officetel, Condotel."}, {"level": "1", "content": "Theo quy định về điều kiện chuyển nhượng toàn bộ hoặc một phần dự án bất động sản tại Điều 40 Luật Kinh doanh bất động sản 2023, đối với dự án đang được thế chấp để bảo đảm thực hiện nghĩa vụ tài chính, chủ đầu tư phải thực hiện điều kiện bắt buộc nào sau đây trước khi làm thủ tục chuyển nhượng?", "options": {"A": "Có văn bản chấp thuận chủ trương cho phép chuyển nhượng của ngân hàng nhận thế chấp và cam kết của bên nhận chuyển nhượng về việc kế thừa nghĩa vụ nợ.", "B": "Phải thực hiện giải chấp dự án hoặc phần dự án chuyển nhượng trước khi ký kết hợp đồng chuyển nhượng toàn bộ hoặc một phần dự án đó.", "C": "Thực hiện ký kết thỏa thuận ba bên giữa bên chuyển nhượng, bên nhận chuyển nhượng và ngân hàng để phong tỏa tài khoản thanh toán tiền dự án.", "D": "Có chứng thư bảo lãnh của một ngân hàng khác về việc cam kết hoàn trả đầy đủ dư nợ thế chấp của dự án cho ngân hàng nhận thế chấp hiện tại."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điểm g, Khoản 1, Điều 40 Luật Kinh doanh bất động sản 2023. Điều 10 Nghị định 96/2024/NĐ-CP (về hồ sơ, trình tự chuyển nhượng dự án). \"Trường hợp dự án đang thế chấp để bảo đảm cho việc thực hiện nghĩa vụ theo quy định của pháp luật thì phải thực hiện giải chấp\". Luật 2023 không dùng cụm từ \"hoặc được ngân hàng đồng ý\" trong điều khoản này đối với chuyển nhượng dự án (M&A). Điều này nhằm đảm bảo dự án khi sang tay chủ mới phải là dự án \"sạch\" về mặt pháp lý thế chấp. Người môi giới chuyên phân khúc dự án (M&A) cần nắm rõ: Giải chấp không nhất thiết là phải trả hết nợ bằng tiền túi, mà có thể là quy trình kỹ thuật nộp tiền từ bên mua vào tài khoản phong tỏa để ngân hàng ra văn bản giải chấp trước khi các bên ký hợp đồng công chứng. Việc hiểu sai sang \"chỉ cần ngân hàng đồng ý\" có thể dẫn đến rủi ro hồ sơ bị cơ quan chức năng trả về khi làm thủ tục chấp thuận chuyển nhượng dự án tại UBND cấp tỉnh."}, {"level": "1", "content": "Sự khác biệt về yêu cầu công chứng, chứng thực hợp đồng mua bán nhà ở giữa giao dịch có doanh nghiệp kinh doanh bất động sản tham gia và giao dịch chỉ giữa các cá nhân là gì theo Luật Kinh doanh bất động sản 2023?", "options": {"A": "Bắt buộc công chứng hoặc chứng thực đối với tất cả các loại hợp đồng kinh doanh bất động sản nhằm đảm bảo tính an toàn pháp lý tuyệt đối cho các bên tham gia.", "B": "Bắt buộc đối với hợp đồng mà ít nhất một bên tham gia là doanh nghiệp kinh doanh bất động sản; trường hợp giao dịch giữa các cá nhân thì thực hiện theo thỏa thuận.", "C": "Bắt buộc đối với hợp đồng mua bán, thuê mua nhà ở, công trình xây dựng mà các bên tham gia là cá nhân; trường hợp có ít nhất một bên là doanh nghiệp kinh doanh bất động sản thì theo thỏa thuận.", "D": "Chỉ bắt buộc công chứng đối với các giao dịch chuyển nhượng quyền sử dụng đất; đối với nhà ở và công trình xây dựng, việc công chứng là hoàn toàn tự nguyện cho mọi chủ thể."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đáp án C phản ánh chính xác Khoản 5 và Khoản 6, Điều 44 Luật Kinh doanh bất động sản 2023. Đây là quy định nhằm giảm bớt thủ tục hành chính và chi phí cho doanh nghiệp (doanh nghiệp tự chịu trách nhiệm về tính xác thực của giao dịch thông qua hệ thống kế toán và hóa đơn), đồng thời duy trì sự bảo vệ của Nhà nước (thông qua Công chứng viên) cho các giao dịch giữa cá nhân với cá nhân."}, {"level": "1", "content": "Theo tinh thần của Luật Đất đai 2024 và Luật Kinh doanh bất động sản 2023, việc bắt buộc ghi đúng giá giao dịch thực tế trong hợp đồng và thực hiện thanh toán qua ngân hàng (đối với doanh nghiệp) hướng tới mục tiêu chiến lược nào sau đây?", "options": {"A": "Thiết lập cơ sở dữ liệu quốc gia về giá đầu vào để xây dựng Bảng giá đất hàng năm sát với giá thị trường, thay thế hoàn toàn hệ thống Khung giá đất cũ.", "B": "Cung cấp căn cứ pháp lý duy nhất để các tổ chức tín dụng xác định giá trị tài sản thế chấp mà không cần thông qua các đơn vị thẩm định giá độc lập.", "C": "Triệt tiêu hoàn toàn quyền tự thỏa thuận về giá của các chủ thể tham gia giao dịch nhằm bình ổn giá bất động sản tại các khu vực đang có dấu hiệu sốt đất.", "D": "Làm căn cứ để cơ quan thuế thực hiện việc truy thu các khoản lợi nhuận chênh lệch từ hoạt động đầu cơ của các cá nhân kinh doanh bất động sản quy mô nhỏ."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Đáp án A phản ánh đúng \"cuộc cách mạng\" của Luật Đất đai 2024. Khi bỏ Khung giá đất, Nhà nước cần một Bảng giá đất linh hoạt cập nhật hàng năm. Để Bảng giá đất này sát với thị trường, Nhà nước cần dữ liệu đầu vào \"sạch\" và \"thực\". Do đó, việc ghi đúng giá giao dịch chính là \"nguồn sống\" của hệ thống định giá đất mới.  Căn cứ pháp lý: Điều 159 Luật Đất đai 2024: Quy định về Bảng giá đất và việc cập nhật hàng năm theo nguyên tắc thị trường. Điều 47 Luật Kinh doanh bất động sản 2023: Quy định về việc thanh toán trong giao dịch bất động sản phải thông qua tổ chức tín dụng (đối với doanh nghiệp)."}, {"level": "1", "content": "Theo Điều 44 Luật Kinh doanh bất động sản 2023, trường hợp hợp đồng kinh doanh bất động sản thuộc diện phải công chứng hoặc chứng thực theo quy định của pháp luật, thời điểm có hiệu lực của hợp đồng được xác định là:", "options": {"A": "Thời điểm các bên tham gia giao dịch thực hiện việc ký tên, điểm chỉ vào văn bản hợp đồng trước sự chứng kiến của Công chứng viên.", "B": "Thời điểm văn bản công chứng, văn bản chứng thực có hiệu lực theo quy định của pháp luật về công chứng, chứng thực.", "C": "Thời điểm cơ quan đăng ký đất đai thực hiện việc chỉnh lý biến động và cấp Giấy chứng nhận cho bên nhận chuyển nhượng.", "D": "Thời điểm các bên hoàn thành việc bàn giao bất động sản và thanh toán đủ tối thiểu 95% giá trị hợp đồng theo thỏa thuận."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đáp án B phản ánh đúng nguyên tắc tại Khoản 2, Điều 44 Luật Kinh doanh bất động sản 2023. Theo đó, luật chia làm 2 trường hợp: (1) Không công chứng thì hiệu lực là khi bên cuối cùng ký; (2) Có công chứng thì hiệu lực tính theo luật Công chứng/Chứng thực.  Căn cứ pháp lý: Khoản 2, Điều 44 Luật Kinh doanh bất động sản 2023. Và điều 5 Luật Công chứng 2014: Văn bản công chứng có hiệu lực kể từ ngày được công chứng viên ký và đóng dấu của tổ chức hành nghề công chứng."}, {"level": "1", "content": "Theo quy định của Luật Kinh doanh bất động sản 2023, doanh nghiệp kinh doanh dịch vụ bất động sản (bao gồm: môi giới, tư vấn, quản lý bất động sản và sàn giao dịch) có nghĩa vụ chung nào sau đây đối với cơ quan quản lý nhà nước cấp tỉnh trước khi chính thức hoạt động?", "options": {"A": "Thực hiện đăng ký ngành nghề kinh doanh tại Sở Kế hoạch và Đầu tư và niêm yết công khai danh sách nhân sự có chứng chỉ hành nghề tại trụ sở doanh nghiệp.", "B": "Gửi thông tin về doanh nghiệp đến cơ quan quản lý để được đăng tải trên Hệ thống thông tin về nhà ở và thị trường bất động sản theo quy định của Luật.", "C": "Ký quỹ một khoản tiền bắt buộc tại ngân hàng thương mại địa phương nhằm đảm bảo nghĩa vụ bồi thường thiệt hại cho khách hàng trong quá trình cung cấp dịch vụ.", "D": "Xin cấp Giấy xác nhận đủ điều kiện kinh doanh dịch vụ bổ trợ bất động sản và thực hiện báo cáo lưu lượng giao dịch định kỳ hàng tháng cho Sở Xây dựng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 62 (Môi giới), Điều 64 (Tư vấn), Điều 65 (Quản lý BĐS): Đều có chung một khoản quy định: \"Trước khi hoạt động kinh doanh dịch vụ... doanh nghiệp gửi thông tin đến cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh... để được đăng tải trên hệ thống thông tin về nhà ở và thị trường bất động sản\". Riêng Sàn giao dịch (theo Điều 55): Sàn ngoài việc gửi thông tin còn phải được cấp Giấy phép hoạt động. Tuy nhiên, câu hỏi hỏi về \"nghĩa vụ chung\" của tất cả các loại hình này, nên đáp án B là chuẩn xác nhất.."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, người Việt Nam định cư ở nước ngoài mà không phải là công dân Việt Nam được kinh doanh bất động sản tại Việt Nam dưới những hình thức nào sau đây?", "options": {"A": "Được thực hiện đầy đủ các hình thức kinh doanh bất động sản và quyền tự do chuyển nhượng quyền sử dụng đất tương tự như cá nhân trong nước theo quy định của pháp luật đất đai.", "B": "Chỉ được phép sở hữu nhà ở thông qua hình thức mua, thuê mua để phục vụ nhu cầu sinh sống của bản thân và gia đình, không được thực hiện các hoạt động đầu tư sinh lợi trực tiếp.", "C": "Đầu tư xây dựng nhà ở, công trình xây dựng để bán, cho thuê, cho thuê mua; đầu tư xây dựng hạ tầng kỹ thuật trong dự án để chuyển nhượng, cho thuê; thuê nhà ở, công trình xây dựng để cho thuê lại; nhận chuyển nhượng dự án.", "D": "Chỉ được phép kinh doanh các loại hình dịch vụ bất động sản bao gồm môi giới, tư vấn, quản lý và điều hành sàn giao dịch bất động sản sau khi đã hoàn tất đăng ký kinh doanh theo quy định."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nội dung này được quy định cụ thể tại Khoản 3 và Khoản 4 Điều 10 Luật Kinh doanh bất động sản 2023: Khoản 3 Điều 10 quy định: \"Người Việt Nam định cư ở nước ngoài không phải là công dân Việt Nam theo quy định của pháp luật về quốc tịch thực hiện hình thức kinh doanh bất động sản quy định tại Khoản 4 Điều này.\" Khoản 4 Điều 10 (áp dụng chung cho cả Tổ chức kinh tế có vốn đầu tư nước ngoài) liệt kê các hình thức: (a) Đầu tư xây dựng nhà ở, công trình xây dựng để bán, cho thuê, cho thuê mua. (b) Đầu tư xây dựng hạ tầng kỹ thuật trong dự án bất động sản để chuyển nhượng, cho thuê, cho thuê lại quyền sử dụng đất đã có hạ tầng kỹ thuật. (c) Thuê nhà ở, công trình xây dựng để cho thuê lại. (d) Nhận chuyển nhượng toàn bộ hoặc một phần dự án bất động sản để tiếp tục đầu tư, xây dựng và kinh doanh."}, {"level": "1", "content": "Đối với nhà chung cư, tòa nhà hỗn hợp có nhà ở hình thành trong tương lai, giấy tờ nghiệm thu nào là điều kiện bắt buộc phải có trước khi đưa vào kinh doanh?", "options": {"A": "Nghiệm thu hoàn thành toàn bộ công trình.", "B": "Nghiệm thu hoàn thành phần thân.", "C": "Nghiệm thu hoàn thành phần móng.", "D": "Nghiệm thu hệ thống phòng cháy chữa cháy."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điểm b, Khoản 1, Điều 24 Luật Kinh doanh bất động sản 2023. Lưu ý rằng đối với chung cư, \"phần móng\" là điều kiện tối thiểu, nhưng đối với nhà ở thấp tầng (liền kề, biệt thự), luật chỉ yêu cầu hoàn thành hạ tầng kỹ thuật tương ứng theo tiến độ. Quy định này đảm bảo rằng khi chủ đầu tư bắt đầu thu tiền của khách hàng, dự án đã thực sự \"thành hình\" dưới mặt đất, tránh tình trạng dự án \"trên giấy\" hoàn toàn."}, {"level": "1", "content": "Cá nhân hành nghề môi giới bất động sản được nhận thù lao/hoa hồng từ đâu theo Luật Kinh doanh bất động sản 2023?", "options": {"A": "Cá nhân được quyền trực tiếp thỏa thuận và nhận các khoản thù lao, hoa hồng từ phía khách hàng sau khi giao dịch bất động sản được xác lập thành công.", "B": "Cá nhân chỉ được hưởng tiền thù lao và hoa hồng môi giới từ doanh nghiệp kinh doanh dịch vụ sàn giao dịch hoặc doanh nghiệp môi giới bất động sản nơi mình làm việc.", "C": "Cá nhân nhận thù lao cố định từ doanh nghiệp môi giới, riêng phần hoa hồng phần trăm doanh số được nhận trực tiếp từ chủ đầu tư dự án để đảm bảo tính kịp thời.", "D": "Cá nhân được nhận phí môi giới trực tiếp từ khách hàng nhưng phải thực hiện kê khai và nộp thuế thu nhập cá nhân tại cơ quan thuế trước khi doanh nghiệp xác nhận."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo khoản 1, điều 63 Luật Kinh doanh bất động sản 2023 quy định Cá nhân hành nghề môi giới bất động sản được hưởng tiền thù lao, hoa hồng từ doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản hoặc doanh nghiệp kinh doanh dịch vụ môi giới bất động sản/ không nhận trực tiếp từ khách hàng. Quy định này giúp Nhà nước quản lý được thu nhập thực tế của môi giới thông qua hệ thống kế toán của doanh nghiệp, đồng thời bảo vệ khách hàng khỏi các khoản \"phí ngoài\" không minh bạch."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023 và Nghị định 96/2024/NĐ-CP, trường hợp một cá nhân thực hiện bán duy nhất 01 căn nhà thuộc sở hữu hợp pháp của mình trong năm với giá trị giao dịch là 10 tỷ đồng thì nghĩa vụ về hình thức tổ chức được quy định như thế nào?", "options": {"A": "Bắt buộc phải thành lập doanh nghiệp kinh doanh bất động sản vì giá trị giao dịch vượt quá định mức 300 triệu đồng đối với tài sản cá nhân.", "B": "Phải thực hiện đăng ký thành lập hộ kinh doanh cá thể để thực hiện nghĩa vụ kê khai thuế thu nhập cá nhân theo biểu thuế lũy tiến từng phần.", "C": "Không bắt buộc phải thành lập doanh nghiệp kinh doanh bất động sản do thuộc trường hợp bán bất động sản không nhằm mục đích kinh doanh.", "D": "Không bắt buộc thành lập doanh nghiệp nhưng phải thực hiện giao dịch thông qua sàn giao dịch để được xác nhận tính hợp pháp của nguồn gốc tài sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 2, Điều 9 Luật Kinh doanh bất động sản 2023: Cá nhân bán nhà ở không nhằm mục đích kinh doanh thì không phải thành lập doanh nghiệp. Điều 7 Nghị định 96/2024/NĐ-CP: Quy định về các ngưỡng để xác định quy mô nhỏ. Tuy nhiên, nếu đã xác định là \"không nhằm mục đích kinh doanh\" thì không cần xét đến các ngưỡng này.."}, {"level": "1", "content": "Theo quy định tại Điều 58 Luật Kinh doanh bất động sản 2023, trong quá trình thực hiện dịch vụ, sàn giao dịch bất động sản có trách nhiệm pháp lý nào sau đây đối với hồ sơ của bất động sản được đưa vào kinh doanh tại sàn?", "options": {"A": "Lưu trữ và niêm yết nguyên trạng bộ hồ sơ do chủ đầu tư cung cấp; sàn chỉ chịu trách nhiệm về tính trung thực của các thông tin quảng cáo do sàn tự biên soạn.", "B": "Kiểm tra hồ sơ pháp lý của bất động sản và bảo đảm bất động sản đưa lên sàn giao dịch phải có đủ điều kiện đưa vào kinh doanh theo quy định của pháp luật.", "C": "Thực hiện thẩm định độc lập về quy hoạch và tính pháp lý của dự án, sau đó cấp chứng thư xác nhận an toàn pháp lý cho khách hàng trước khi ký kết hợp đồng đặt cọc.", "D": "Gửi hồ sơ bất động sản đến Sở Xây dựng để yêu cầu thẩm định lại tính pháp lý của từng sản phẩm trước khi thực hiện việc niêm yết và giới thiệu trên hệ thống thông tin của sàn.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 58, Luật Kinh doanh bất động sản 2023 quy định “sàn giao dịch bất động sản phải Bảo đảm bất động sản được đưa lên sàn giao dịch bất động sản phải có đủ điều kiện đưa vào kinh doanh sàn giao dịch, có trách nhiệm kiểm tra hồ sơ pháp lý của bất động sản trước khi đưa vào kinh doanh tại sàn.  Quy định này giúp môi giới và quản lý sàn hiểu rằng: Họ là người chịu trách nhiệm đầu tiên về tính pháp lý của sản phẩm khi giới thiệu ra thị trường, không thể đổ lỗi hoàn toàn cho chủ đầu tư khi xảy ra sai phạm."}, {"level": "1", "content": "Theo quy định tại Điều 63 Luật Kinh doanh bất động sản 2023, mức thù lao và hoa hồng môi giới bất động sản được xác lập dựa trên nguyên tắc nào sau đây?", "options": {"A": "Do các bên tự thỏa thuận và ghi rõ trong hợp đồng, không phụ thuộc vào giá trị của giao dịch bất động sản đối với khoản thù lao môi giới.", "B": "Tuân thủ theo khung mức phí dịch vụ tối đa do Bộ Xây dựng ban hành nhằm kiểm soát tình trạng đẩy giá và đảm bảo quyền lợi cho khách hàng.", "C": "Được tính theo tỷ lệ phần trăm (%) cố định trên giá trị hợp đồng giao dịch bất động sản theo quy định chung của Hiệp hội Bất động sản Việt Nam.", "D": "Áp dụng theo biểu phí lũy tiến dựa trên quy mô và phân khúc của bất động sản (nhà ở xã hội, nhà ở thương mại, bất động sản nghỉ dưỡng)."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Đáp án A Phản ánh chính xác sự tách biệt giữa Thù lao (Khoản 2, Điều 63) và Hoa hồng (Khoản 3, Điều 63). Thù lao: Trả cho công sức thực hiện dịch vụ, không phụ thuộc vào kết quả giao dịch. Hoa hồng: Trả khi giao dịch thành công. Cả hai khoản này đều dựa trên sự tự thỏa thuận của các bên trong hợp đồng, thể hiện sự tôn trọng nguyên tắc tự do hợp đồng của pháp luật dân sự và thương mại.."}, {"level": "1", "content": "Ngoài Luật Kinh doanh bất động sản 2023, việc chuyển nhượng quyền sử dụng đất đã có hạ tầng kỹ thuật trong dự án bất động sản còn phải tuân thủ nghiêm ngặt các quy định của luật nào sau đây?", "options": {"A": "Luật Xây dựng và các quy chuẩn kỹ thuật quốc gia về việc hoàn thành xây dựng các công trình hạ tầng tương ứng theo tiến độ và quy hoạch chi tiết 1/500 của dự án.", "B": "Luật Đầu tư về các thủ tục điều chỉnh chủ trương đầu tư, tiến độ thực hiện dự án và các điều kiện về ký quỹ bảo đảm thực hiện dự án đối với chủ đầu tư.", "C": "Luật Đất đai về hình thức, mục đích, thời hạn sử dụng đất và các quy định về đăng ký đất đai, cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất.", "D": "Luật Nhà ở về việc xác định quỹ đất phát triển nhà ở xã hội và các điều kiện kết nối hạ tầng kỹ thuật, hạ tầng xã hội trong khu vực dự án theo phê duyệt của cơ quan có thẩm quyền."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Khoản 1 Điều 31 Luật KDBĐS 2023, đất đưa vào kinh doanh dưới hình thức chuyển nhượng quyền sử dụng đất cho cá nhân tự xây dựng nhà ở phải đáp ứng các điều kiện về quyền sử dụng đất theo quy định của Luật Đất đai. Cụ thể, các vấn đề về: Hình thức sử dụng đất: (Giao đất có thu tiền, cho thuê đất trả tiền một lần hay hàng năm). Mục đích sử dụng đất: (Đất ở, đất thương mại dịch vụ...). Thời hạn sử dụng đất: (Lâu dài hay có thời hạn). Đăng ký đất đai: (Thủ tục sang tên, cấp sổ cho người nhận chuyển nhượng). Tất cả các nội dung \"gốc\" về đất này đều do Luật Đất đai điều chỉnh, Luật Kinh doanh BĐS chỉ quy định về hành vi \"giao dịch\" trên thị trường.."}, {"level": "1", "content": "Theo quy định hiện hành, các tổ chức kinh tế có vốn đầu tư nước ngoài khi thực hiện hoạt động kinh doanh bất động sản tại Việt Nam phải tuân thủ hệ thống pháp luật nào?", "options": {"A": "Tuân thủ quy định của Luật Kinh doanh bất động sản và Luật Nhà ở về đối tượng, điều kiện, hình thức kinh doanh và các tiêu chuẩn kỹ thuật đối với sản phẩm bất động sản đưa vào giao dịch.", "B": "Tuân thủ Luật Đầu tư và Luật Doanh nghiệp về thủ tục thành lập tổ chức kinh tế, tỷ lệ sở hữu vốn của nhà đầu tư nước ngoài và các điều kiện tiếp cận thị trường đối với ngành nghề kinh doanh có điều kiện.", "C": "Tuân thủ Luật Kinh doanh bất động sản, Luật Đầu tư, Luật Đất đai, Luật Các tổ chức tín dụng và các quy định khác của pháp luật Việt Nam cũng như Điều ước quốc tế mà Việt Nam là thành viên.", "D": "Tuân thủ các Điều ước quốc tế về đầu tư, thương mại đa phương và song phương mà Việt Nam đã ký kết hoặc gia nhập, cùng với các quy định về quản lý ngoại hối của Ngân hàng Nhà nước."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nội dung này được thể hiện xuyên suốt qua các điều khoản về đối tượng và phạm vi áp dụng của Luật Kinh doanh bất động sản 2023, phối hợp với các đạo luật chuyên ngành: Điều 10 Luật Kinh doanh bất động sản 2023: Quy định về hình thức kinh doanh của tổ chức kinh tế có vốn đầu tư nước ngoài (phải phù hợp với Luật này). Luật Đầu tư 2020 (sửa đổi, bổ sung): Quy định về thủ tục cấp Giấy chứng nhận đăng ký đầu tư, điều kiện tiếp cận thị trường (vì kinh doanh BĐS là ngành nghề kinh doanh có điều kiện). Luật Đất đai 2024: Quy định về hình thức giao đất, thuê đất và quyền sử dụng đất của tổ chức có vốn đầu tư nước ngoài (Đây là điều kiện tiên quyết để thực hiện dự án). Luật Các tổ chức tín dụng: Liên quan đến việc bảo lãnh trong bán nhà ở hình thành trong tương lai và thanh toán qua ngân hàng (Điều 48). Điều ước quốc tế (như CPTPP, EVFTA, WTO): Quy định về lộ trình mở cửa thị trường bất động sản cho nhà đầu tư nước ngoài."}, {"level": "1", "content": "Căn cứ Điều 1 Luật Kinh doanh bất động sản 2023, hoạt động nào sau đây không thuộc phạm vi điều chỉnh của Luật này và được thực hiện theo các quy định pháp luật chuyên ngành khác?", "options": {"A": "Doanh nghiệp có vốn đầu tư nước ngoài thực hiện đầu tư xây dựng hạ tầng kỹ thuật khu công nghiệp để cho thuê lại quyền sử dụng đất.", "B": "Tổ chức, cá nhân thực hiện kinh doanh dịch vụ môi giới, tư vấn và quản lý bất động sản cho các dự án khu đô thị và nhà ở thương mại.", "C": "Chủ đầu tư dự án bất động sản thực hiện việc bán nhà ở hình thành trong tương lai và thu tiền đặt cọc của khách hàng theo thỏa thuận.", "D": "Cơ quan, tổ chức thực hiện bán nhà ở, công trình xây dựng, chuyển nhượng quyền sử dụng đất là tài sản công theo quy định về quản lý, sử dụng tài sản công."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Đáp án D phản ánh chính xác Điểm a, Khoản 2, Điều 1. Việc bán tài sản công (như trụ sở cũ, nhà công vụ...) không mang tính chất kinh doanh tìm kiếm lợi nhuận mà là hoạt động quản lý hành chính nhà nước, do đó tuân theo Luật Quản lý, sử dụng tài sản công. Ngoài tài sản công, Luật 2023 còn loại trừ: Giao dịch của các tổ chức tín dụng xử lý tài sản bảo đảm (theo Luật các tổ chức tín dụng). Chuyển nhượng quyền sử dụng đất do giải quyết tranh chấp theo quyết định của Tòa án/Trọng tài. Các giao dịch thừa kế, tặng cho không mang tính chất kinh doanh."}, {"level": "1", "content": "Theo quy định về công khai thông tin và nội dung hợp đồng tại Luật Kinh doanh bất động sản 2023, việc xác định phần diện tích sở hữu riêng và sở hữu chung trong dự án nhà chung cư, tòa nhà hỗn hợp phải được thực hiện như thế nào?", "options": {"A": "Chỉ cần thể hiện chi tiết trong hồ sơ thiết kế kỹ thuật được cơ quan nhà nước thẩm định; trong hợp đồng mua bán chỉ cần ghi nhận tổng diện tích sàn xây dựng căn hộ.", "B": "Việc phân định diện tích chung - riêng được thực hiện dựa trên thỏa thuận tại thời điểm bàn giao thực tế và được ghi nhận trong Biên bản bàn giao thay vì hợp đồng mua bán.", "C": "Chỉ bắt buộc công khai đối với các phần diện tích có phát sinh nguồn thu từ kinh doanh dịch vụ; các diện tích hạ tầng kỹ thuật mặc định thuộc sở hữu chung mà không cần ghi vào hợp đồng.", "D": "Phải được phân định rõ ràng, công khai thông tin trước khi đưa vào kinh doanh và phải được quy định cụ thể trong hợp đồng mua bán, thuê mua theo đúng mẫu quy định."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 2, Điều 6 Luật Kinh doanh bất động sản 2023: Yêu cầu công khai thông tin về phần sở hữu chung, sở hữu riêng. Điểm d, Khoản 1, Điều 48 Luật Kinh doanh bất động sản 2023: Quy định phần sở hữu chung, sở hữu riêng là nội dung bắt buộc của hợp đồng."}, {"level": "1", "content": "Theo Điều 11 Luật Kinh doanh bất động sản 2023, việc xác định trình tự, thủ tục đầu tư xây dựng dự án bất động sản để đưa vào kinh doanh phải đảm bảo tuân thủ sự thống nhất của hệ thống pháp luật nào sau đây?", "options": {"A": "Nhóm luật về chuẩn bị đầu tư bao gồm Luật Đầu tư, Luật Đất đai và các quy định về bồi thường, giải phóng mặt bằng để xác lập quỹ đất dự án.", "B": "Nhóm luật về thực thi kỹ thuật bao gồm Luật Xây dựng, Luật Quy hoạch đô thị và các quy chuẩn kỹ thuật quốc gia về thiết kế, thi công công trình.", "C": "Luật Kinh doanh bất động sản, Luật Quy hoạch, Luật Đầu tư, Luật Đất đai, Luật Xây dựng, Luật Nhà ở và các quy định khác của pháp luật có liên quan.", "D": "Nhóm luật về vận hành thương mại bao gồm Luật Nhà ở, Luật Kinh doanh bất động sản và các quy định về quản lý, sử dụng nhà chung cư và khu đô thị."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đáp án C là sự trích dẫn chuẩn xác và đầy đủ nhất theo Điều 11 Luật Kinh doanh bất động sản 2023. Điều khoản này nhấn mạnh rằng dự án bất động sản là đối tượng điều chỉnh đa ngành, không một đạo luật nào có thể đứng độc lập.Việc đầu tư dự án bất động sản là một quá trình phức tạp, chịu sự điều chỉnh của nhiều luật chuyên ngành khác nhau. Có thể hình dung sơ đồ chu trình dự án như sau: (1) Giai đoạn chuẩn bị: Luật Đầu tư, Luật Quy hoạch. (2) Giai đoạn xác lập quyền sử dụng đất: Luật Đất đai. (3) Giai đoạn thiết kế, thi công: Luật Xây dựng, Luật Nhà ở. (4) Giai đoạn đưa sản phẩm vào thị trường: Luật Kinh doanh bất động sản."}, {"level": "1", "content": "Nếu bên mua, thuê mua nhà ở, công trình xây dựng tự thực hiện việc xin cấp Giấy chứng nhận thì tổng số tiền thanh toán trước khi được cấp giấy không vượt quá bao nhiêu % giá trị hợp đồng?", "options": {"A": "70%", "B": "80%", "C": "90%", "D": "95%"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Điều 25 Luật Kinh doanh bất động sản 2023: \"Trường hợp bên mua, bên thuê mua tự thực hiện thủ tục cấp Giấy chứng nhận... thì bên bán, bên cho thuê mua không được thu quá 95% giá trị hợp đồng.\" Luật cho phép thanh toán đến 95% giá trị hợp đồng trước khi có giấy chứng nhận nếu bên mua tự làm thủ tục cấp giấy chứng nhận."}, {"level": "1", "content": "Dưới góc nhìn kinh tế học, việc thực hiện đồng bộ quy định \"Chủ đầu tư phải hoàn thành 100% nghĩa vụ tài chính về đất đai trước khi bán\" (Luật Kinh doanh Bất động sản 2023) và \"Áp dụng Bảng giá đất sát giá thị trường\" (Luật Đất đai 2024) đã tạo ra hiện tượng nào sau đây đối với cấu trúc thị trường bất động sản trong giai đoạn hiện nay?", "options": {"A": "Hiệu ứng Thặng dư Cung: Việc minh bạch hóa giúp cắt giảm chi phí không chính thức, từ đó làm dịch chuyển đường cung (S) sang phải, giúp hạ thấp mức giá cân bằng (P_e) trên thị trường nhà ở sơ cấp.", "B": "Bẫy Chi phí cơ hội: Chủ đầu tư phải đọng vốn lớn để nộp tiền sử dụng đất một lần ngay từ đầu, làm tăng đáng kể Chi phí vốn (WACC), trực tiếp thiết lập một \"Sàn giá\" (Price Floor) mới cao hơn cho các sản phẩm đầu ra.", "C": "Phân phối lại Địa tô: Toàn bộ phần chênh lệch địa tô được chuyển dịch từ túi tiền của các nhà đầu tư cá nhân sang ngân sách nhà nước, giúp giảm áp lực lạm phát cục bộ tại các khu vực đang đô thị hóa.", "D": "Cạnh tranh Hoàn hảo: Việc loại bỏ các chủ đầu tư yếu năng lực giúp thị trường tiến dần đến trạng thái cạnh tranh hoàn hảo, nơi giá bán được quyết định hoàn toàn bởi chi phí biên (MC) của doanh nghiệp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý kết hợp: Khoản 4 Điều 24 Luật Kinh doanh BĐS 2023: Điều kiện về hoàn thành nghĩa vụ tài chính. Điều 159 Luật Đất đai 2024: Bỏ khung giá đất, áp dụng bảng giá đất hàng năm. Về Bản chất kinh tế, việc phải nộp 100% tiền đất (theo giá thị trường - vốn đã rất cao) ngay từ đầu, cộng với việc phải xây xong móng mới được bán, đã kéo dài Chu kỳ chiếm dụng vốn. Khi Chi phí vốn (Cost of Capital) tăng lên, theo nguyên tắc biên lợi nhuận kỳ vọng của doanh nghiệp, họ buộc phải cộng dồn các chi phí tài chính phát sinh này vào giá bán. Điều này tạo ra một Price Floor (Sàn giá) mà ở đó, dù cầu có yếu, giá cũng khó có thể giảm xuống dưới mức chi phí cấu thành này."}, {"level": "1", "content": "Việc Luật Kinh doanh bất động sản 2023 quy định chủ đầu tư dự án phải hoàn thành việc đầu tư xây dựng \"hạ tầng kỹ thuật thiết yếu\" trước khi thực hiện chuyển nhượng quyền sử dụng đất cho cá nhân tự xây dựng nhà ở nhằm giải quyết mục tiêu quản lý nhà nước nào sau đây?", "options": {"A": "Chuyển dịch rủi ro tài chính từ chủ đầu tư sang người mua nhà, đảm bảo dự án có tính thanh khoản cao nhờ các tiện ích hạ tầng đã hiện hữu.", "B": "Kiểm soát tình trạng đầu cơ đất đai dàn trải và ngăn chặn việc hình thành các khu dân cư thiếu kết nối, đảm bảo sự đồng bộ giữa hạ tầng dự án với hệ thống hạ tầng kỹ thuật chung của khu vực.", "C": "Tối ưu hóa việc thu tiền sử dụng đất dựa trên giá trị thặng dư của hạ tầng, làm căn cứ để Nhà nước phê duyệt quyết toán vốn đầu tư công cho các công trình hạ tầng xã hội lân cận.", "D": "Đáp ứng các tiêu chuẩn về Quản lý vận hành thông minh (Smart Operation) và đảm bảo mọi lô đất đều được tích hợp mã định danh tọa độ trên Hệ thống thông tin đất đai quốc gia."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đáp án B phản ánh đúng tinh thần của Khoản 1 Điều 31 Luật Kinh doanh bất động sản 2023. Cụm từ \"hạ tầng kỹ thuật thiết yếu\" (đường giao thông, điện chiếu sáng, cấp thoát nước, xử lý nước thải...) là điều kiện tiên quyết để biến một khu đất thành một \"đơn vị ở\" thực thụ. Việc yêu cầu hoàn thành trước khi bán sẽ buộc chủ đầu tư phải bỏ vốn thật, làm thật, từ đó tự động sàng lọc các dự án ảo, dự án treo.."}, {"level": "1", "content": "Quy định \"Ghi đúng giá giao dịch thực tế vào hợp đồng\" tại Luật Kinh doanh bất động sản 2023, khi kết hợp với quy định \"Thanh toán qua ngân hàng\" và \"Bãi bỏ khung giá đất\" của Luật Đất đai 2024, tạo ra mối liên hệ tương hỗ chặt chẽ nhất nhằm thực hiện mục tiêu chiến lược nào sau đây?", "options": {"A": "Thiết lập cơ sở dữ liệu đầu vào cho Hệ thống thông tin đất đai quốc gia, làm căn cứ thực chứng để xây dựng Bảng giá đất hàng năm theo nguyên tắc thị trường.", "B": "Tăng quyền năng cho các tổ chức công chứng trong việc thẩm định giá trị tài sản, nhằm đảm bảo hợp đồng không bị vô hiệu do vi phạm điều cấm về giá.", "C": "Loại bỏ hoàn toàn vai trò của các đơn vị thẩm định giá độc lập trong các giao dịch dân sự, chuyển sang sử dụng giá tham chiếu trực tiếp từ cơ quan thuế.", "D": "Cơ cấu lại danh mục đầu tư của các tổ chức tín dụng thông qua việc áp dụng tỷ lệ cho vay trên giá trị (LTV) dựa trên giá trị hợp đồng được công chứng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 47 Luật Kinh doanh bất động sản 2023 (về thanh toán và ghi giá). Điều 158, 159 Luật Đất đai 2024 (về nguyên tắc định giá đất và Bảng giá đất). Nghị định 104/2024/NĐ-CP về hệ thống thông tin đất đai. Mối quan hệ: Luật Kinh doanh BĐS buộc ghi giá giao dịch thực tế (đầu vào), Luật Quản lý thuế giám sát dòng tiền (kiểm soát), và Luật Đất đai 2024 dùng chính dữ liệu thật đó để xây dựng Bảng giá đất (đầu ra). Nếu không ghi đúng giá thực tế, \"nguyên tắc thị trường\" trong Luật Đất đai sẽ trở thành lý thuyết suông."}, {"level": "1", "content": "Việc Luật Kinh doanh bất động sản 2023 quy định sàn giao dịch phải ban hành \"Quy chế hoạt động\" và thực hiện các \"Biện pháp phòng, chống rửa tiền\" nhằm xác lập vai trò nào sau đây của sàn trong hệ thống quản lý nhà nước?", "options": {"A": "Trở thành tổ chức trung gian thực hiện chức năng kiểm soát dòng vốn đầu tư nước ngoài (FDI) đổ vào thị trường bất động sản theo chỉ tiêu tăng trưởng hàng năm.", "B": "Xác lập vị thế là \"Đối tượng báo cáo\" trong hệ thống phòng chống tội phạm tài chính, chịu trách nhiệm thẩm định nguồn gốc dòng tiền và báo cáo các giao dịch đáng ngờ.", "C": "Đóng vai trò là đơn vị thay mặt cơ quan thuế để thu hồi và quyết toán các khoản nghĩa vụ tài chính phát sinh từ hoạt động chuyển nhượng của các cá nhân.", "D": "Thiết lập cơ chế tự quản nhằm tối ưu hóa chi phí vận hành doanh nghiệp và giảm thiểu sự can thiệp trực tiếp của các cơ quan thanh tra chuyên ngành xây dựng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 58 Luật Kinh doanh bất động sản 2023 (Trách nhiệm của sàn giao dịch). Điều 4 Luật Phòng, chống rửa tiền 2022 (Danh mục đối tượng báo cáo). Nghị định 96/2024/NĐ-CP (Quy định về quy chế và quy trình nội bộ của sàn). Đáp án B Phản ánh chính xác mối liên hệ giữa Luật Kinh doanh bất động sản 2023 và Luật Phòng, chống rửa tiền 2022. Sàn giao dịch không chỉ là nơi môi giới, mà là một \"trạm gác\" tài chính. Theo quy định, nếu sàn không báo cáo các giao dịch có giá trị lớn (400 triệu đồng tiền mặt/ngày) hoặc nguồn gốc tiền không rõ ràng, sàn sẽ bị xử phạt rất nặng hoặc thu hồi giấy phép."}, {"level": "1", "content": "Việc Luật Kinh doanh bất động sản 2023 giảm yêu cầu số lượng cá nhân có chứng chỉ môi giới tối thiểu trong một doanh nghiệp từ 02 xuống còn 01 được giải thích dựa trên tư duy quản lý nào sau đây?", "options": {"A": "Chuyển dịch trọng tâm quản lý từ \"Kiểm soát số lượng chứng chỉ\" sang \"Kiểm soát trách nhiệm pháp nhân\", trong đó doanh nghiệp được toàn quyền tự chủ về chất lượng tư vấn mà không cần người chịu trách nhiệm chuyên môn trực tiếp cho từng giao dịch.", "B": "Tạo điều kiện thuận lợi hơn cho việc thành lập và hoạt động của các doanh nghiệp môi giới (đặc biệt là quy mô nhỏ), nhưng vẫn đảm bảo có ít nhất một người chịu trách nhiệm chuyên môn để ký xác nhận các tài liệu môi giới.", "C": "Một chiến lược \"nới lỏng điều kiện\" nhằm hỗ trợ lộ trình bãi bỏ hoàn toàn yêu cầu về chứng chỉ hành nghề cá nhân, chuyển sang mô hình quản lý dựa trên bảo hiểm trách nhiệm nghề nghiệp của doanh nghiệp trong tương lai.", "D": "Phản ánh sự ưu tiên của Nhà nước trong việc thúc đẩy mô hình \"Doanh nghiệp môi giới một thành viên\", nơi công nghệ và dữ liệu lớn được kỳ vọng sẽ thay thế hoàn toàn vai trò giám sát của con người trong quy trình kiểm soát nội bộ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc giảm số lượng tối thiểu giúp các doanh nghiệp nhỏ dễ dàng đáp ứng điều kiện thành lập hơn, trong khi vẫn duy trì yêu cầu phải có ít nhất một người có chứng chỉ để đảm bảo chuyên môn."}, {"level": "1", "content": "Điều kiện nào sau đây KHÔNG phải là điều kiện để cá nhân được dự thi sát hạch cấp chứng chỉ hành nghề môi giới bất động sản theo Luật Kinh doanh bất động sản 2023?", "options": {"A": "Có năng lực hành vi dân sự đầy đủ.", "B": "Có trình độ tốt nghiệp từ cao đẳng trở lên.", "C": "Có giấy chứng nhận hoàn thành khóa học đào tạo kiến thức hành nghề môi giới bất động sản.", "D": "Không đang trong tình trạng bị truy cứu trách nhiệm hình sự hoặc chấp hành án hình sự."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật (Điều 70 được diễn giải) và các văn bản hướng dẫn không yêu cầu bắt buộc phải có trình độ cao đẳng trở lên, mà tập trung vào việc hoàn thành khóa đào tạo, đã tốt nghiệp trung học phổ thông, và các điều kiện về năng lực hành vi, tình trạng pháp lý"}, {"level": "1", "content": "Tại sao Luật Kinh doanh bất động sản 2023 lại nhấn mạnh việc \"Tổ chức, cá nhân được kinh doanh bất động sản ngoài phạm vi khu vực bảo vệ theo quy định của pháp luật về quốc phòng, an ninh\"?", "options": {"A": "Mở rộng hành lang pháp lý cho các dự án phát triển du lịch sinh thái và kinh tế biển tại các khu vực biên giới, hải đảo theo chiến lược kinh tế biển quốc gia đến năm 2030.", "B": "Thiết lập cơ chế giám sát đặc biệt và quy trình thẩm định riêng biệt đối với các giao dịch bất động sản có yếu tố nước ngoài tại các địa bàn trọng điểm về phát triển kinh tế.", "C": "Để phân định rõ ràng phạm vi được phép kinh doanh bất động sản, gắn hoạt động kinh tế với yêu cầu đảm bảo quốc phòng, an ninh quốc gia.", "D": "Cụ thể hóa lộ trình chuyển đổi mục đích sử dụng đất từ đất quốc phòng sang đất phát triển kinh tế dân sinh nhằm tối ưu hóa nguồn lực đất đai tại các đô thị loại đặc biệt."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nguyên tắc này (Khoản 2 Điều 4 (Nguyên tắc kinh doanh bất động sản)) nhằm đảm bảo hoạt động kinh doanh bất động sản không xâm phạm vào các khu vực trọng yếu về quốc phòng, an ninh, thể hiện sự cân bằng giữa phát triển kinh tế và bảo vệ an ninh quốc gia."}, {"level": "1", "content": "Theo quy định tại Điều 42 Luật Kinh doanh bất động sản 2023, trong giao dịch chuyển nhượng toàn bộ hoặc một phần dự án bất động sản, nghĩa vụ nào sau đây KHÔNG thuộc về bên nhận chuyển nhượng dự án?", "options": {"A": "Kế thừa và thực hiện toàn bộ quyền, nghĩa vụ của chủ đầu tư chuyển nhượng đã chuyển giao để tiếp tục triển khai dự án đối với khách hàng và các bên liên quan.", "B": "Tiếp tục triển khai đầu tư xây dựng và kinh doanh dự án theo đúng mục tiêu, nội dung dự án đã được cơ quan nhà nước có thẩm quyền quyết định, chấp thuận chủ trương đầu tư.", "C": "Chịu trách nhiệm liên đới đối với các hành vi vi phạm pháp luật về xây dựng hoặc kinh doanh bất động sản của chủ đầu tư chuyển nhượng đã xảy ra trước thời điểm hoàn tất thủ tục chuyển nhượng dự án.", "D": "Thực hiện đầy đủ các nghĩa vụ tài chính đối với Nhà nước (bao gồm thuế, phí, lệ phí liên quan đến dự án nhận chuyển nhượng) theo quy định của pháp luật."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> (Căn cứ pháp lý: Điều 42 Luật KD BĐS 2023). Bên nhận chuyển nhượng kế thừa quyền và nghĩa vụ liên quan đến việc tiếp tục dự án, nhưng không đương nhiên chịu trách nhiệm về các vi phạm pháp luật đã xảy ra của chủ đầu tư cũ trước khi chuyển nhượng (trừ khi có thỏa thuận khác hoặc pháp luật quy định)."}, {"level": "1", "content": "Việc Luật Kinh doanh bất động sản 2023 không bắt buộc công chứng, chứng thực đối với hợp đồng giữa chủ đầu tư và khách hàng, nhưng lại bắt buộc đối với giao dịch giữa các cá nhân, thể hiện triết lý quản lý nào sau đây?", "options": {"A": "Xác lập cơ chế \"miễn trừ trách nhiệm\" cho các tổ chức chuyên nghiệp, nhằm đẩy nhanh tốc độ giải ngân vốn đầu tư và giảm áp lực thẩm định cho các tổ chức hành nghề công chứng.", "B": "Một bước đệm trong lộ trình xóa bỏ hoàn toàn vai trò của Công chứng viên trong lĩnh vực bất động sản, tiến tới sử dụng hệ thống định danh điện tử để xác thực mọi loại hình hợp đồng.", "C": "Ưu tiên quyền tự quyết của doanh nghiệp trong việc thiết lập các điều khoản hợp đồng riêng biệt, thoát khỏi sự kiểm soát của hệ thống hợp đồng mẫu bắt buộc do Nhà nước ban hành.", "D": "Thừa nhận năng lực tự chịu trách nhiệm của các tổ chức có tư cách pháp nhân và chuyên môn kinh doanh, đồng thời giảm chi phí tuân thủ và thời gian thực hiện các gia

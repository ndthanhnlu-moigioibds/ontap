ồi thường, hỗ trợ, tái định cư theo quy định của pháp luật.", "D": "Miễn trừ nghĩa vụ bồi thường do ưu tiên mục đích an ninh quốc gia."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nghĩa vụ này được xác lập dựa trên nguyên tắc bảo hộ quyền sở hữu tại Khoản 2 Điều 18 Luật Nhà ở 2023. Đồng thời, đây cũng là quyền của chủ sở hữu được quy định tại Điểm d Khoản 1 Điều 7 của Luật này. Việc bồi thường không chỉ dừng lại ở giá trị tài sản mà còn bao gồm các chính sách hỗ trợ và bố trí tái định cư để đảm bảo an sinh xã hội cho người có nhà bị thu hồi/trưng mua. Cụm từ \"theo quy định của pháp luật\" ở đây ngầm định sự dẫn chiếu sang Luật Đất đai 2024 và Luật Trưng mua, trưng dụng tài sản 2008 để xác định giá trị và quy trình cụ thể."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, ngoài điều kiện về đăng ký kinh doanh, doanh nghiệp kinh doanh bất động sản phải đáp ứng điều kiện nào về năng lực tài chính?", "options": {"A": "Phải có vốn điều lệ tối thiểu không thấp hơn 100 tỷ đồng tại thời điểm đăng ký.", "B": "Phải có vốn chủ sở hữu không thấp hơn 20% tổng vốn đầu tư dự án dưới 20 ha.", "C": "Phải có tổng giá trị tài sản ròng lớn hơn tổng dư nợ trái phiếu và tín dụng.", "D": "Phải có lợi nhuận sau thuế tối thiểu 10% trên doanh thu của năm tài chính gần nhất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 9 Luật Kinh doanh bất động sản 2023 quy định các điều kiện về vốn chủ sở hữu như sau: \"Phải có vốn chủ sở hữu không thấp hơn 20% tổng vốn đầu tư đối với dự án có quy mô sử dụng đất dưới 20 ha, không thấp hơn 15% tổng vốn đầu tư đối với dự án có quy mô sử dụng đất từ 20 ha trở lên và phải bảo đảm khả năng huy động vốn để thực hiện dự án đầu tư; trường hợp doanh nghiệp kinh doanh bất động sản đồng thời thực hiện nhiều dự án thì phải có vốn chủ sở hữu đủ để bảo đảm tỷ lệ của từng dự án để thực hiện tất cả các dự án đang thực hiện.\""}, {"level": "1", "content": "Yêu cầu về bảo lãnh ngân hàng khi bán, cho thuê mua nhà ở hình thành trong tương lai theo Luật Kinh doanh bất động sản 2023 có thể ảnh hưởng tiêu cực đến chủ đầu tư như thế nào?", "options": {"A": "Làm suy giảm uy tín và vị thế của chủ đầu tư trên thị trường.", "B": "Gia tăng gánh nặng chi phí phí và áp lực thủ tục hành chính.", "C": "Hạn chế khả năng tiếp cận các nguồn vốn vay ưu đãi từ ngân hàng.", "D": "Kéo dài thời gian thực hiện các thủ tục nghiệm thu và bàn giao nhà."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 26: \"Chủ đầu tư dự án bất động sản trước khi bán, cho thuê mua nhà ở hình thành trong tương lai phải được ngân hàng thương mại trong nước... cam kết bảo lãnh cho nghĩa vụ tài chính của chủ đầu tư đối với khách hàng khi chủ đầu tư không bàn giao nhà ở theo đúng tiến độ đã cam kết...\".  \"ảnh hưởng tiêu cực\" về mặt kinh tế đối với doanh nghiệp có thể phân tích ở 3 khía cạnh: Chi phí vốn (Fee): Phí bảo lãnh ngân hàng thường dao động từ 1% - 2% giá trị hợp đồng. Khoản phí này thường được chủ đầu tư tính vào giá bán, làm tăng giá thành sản phẩm, gây khó khăn cho việc cạnh tranh hoặc làm giảm tỷ suất lợi nhuận. Hạn mức tín dụng (Credit Limit): Khi ngân hàng cấp bảo lãnh, số tiền bảo lãnh thường bị tính vào tổng hạn mức tín dụng mà ngân hàng dành cho doanh nghiệp đó. Điều này có thể làm giảm khả năng vay thêm vốn lưu động để triển khai các hạng mục khác. Điểm mới cần lưu ý (Khoản 3 Điều 26): Khác với luật cũ, Luật 2023 cho phép khách hàng được lựa chọn có hoặc không có bảo lãnh cho thỏa thuận của mình. Nếu khách hàng từ chối, chủ đầu tư không phải đóng phí bảo lãnh."}, {"level": "1", "content": "Theo Điều 6 Luật Kinh doanh bất động sản 2023, doanh nghiệp kinh doanh bất động sản có trách nhiệm công khai thông tin về dự án và bất động sản thông qua các kênh nào sau đây?", "options": {"A": "Các phương tiện thông tin đại chúng và báo chí trung ương.", "B": "Văn bản thông báo gửi trực tiếp cho từng khách hàng tiềm năng.", "C": "Niêm yết tại trụ sở Ủy ban nhân dân cấp tỉnh nơi có dự án.", "D": "Hệ thống thông tin thị trường, website doanh nghiệp và tại dự án."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Điều 6 yêu cầu công khai thông tin đầy đủ, trung thực qua nhiều kênh để đảm bảo tính minh bạch.   Khoản 5 Điều 6 Luật Kinh doanh bất động sản 2023: \"Việc công khai thông tin... được thực hiện như sau: a) Trên trang thông tin điện tử của doanh nghiệp kinh doanh bất động sản; b) Trên hệ thống thông tin về nhà ở và thị trường bất động sản theo quy định của Luật này; c) Tại dự án... theo hình thức niêm yết công khai tại Ban Quản lý dự án hoặc tại sàn giao dịch bất động sản...\" Thông tin phải được công khai trước khi đưa bất động sản vào kinh doanh (Khoản 1 Điều 6). Khi thông tin đã công khai có sự thay đổi, doanh nghiệp phải cập nhật nội dung thay đổi đó trên các kênh này trong thời hạn quy định (thường là 05 ngày làm việc). Việc không công khai hoặc công khai thông tin sai sự thật là hành vi bị nghiêm cấm (Điều 7) và có thể dẫn đến việc hợp đồng giao dịch bị tuyên vô hiệu."}, {"level": "1", "content": "Hợp đồng mua bán, thuê mua nhà ở hình thành trong tương lai có bắt buộc phải tuân thủ hợp đồng mẫu không?", "options": {"A": "Phải sử dụng hợp đồng mẫu theo quy định của Chính phủ để đảm bảo tính chuẩn hóa và minh bạch.", "B": "Các bên được tự do thỏa thuận hình thức hợp đồng, không nhất thiết phải tuân theo mẫu có sẵn.", "C": "Chỉ bắt buộc sử dụng hợp đồng mẫu đối với các dự án có vốn đầu tư công hoặc nhà ở xã hội.", "D": "Việc áp dụng hợp đồng mẫu là hình thức khuyến khích, không có tính cưỡng chế đối với doanh nghiệp."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 46 Luật Kinh doanh bất động sản 2023: \"2. Tổ chức, cá nhân kinh doanh bất động sản thực hiện việc bán, cho thuê, cho thuê mua nhà ở, công trình xây dựng... quy định tại Điều 44 của Luật này phải sử dụng hợp đồng mẫu theo quy định của Chính phủ; thực hiện việc đăng ký hợp đồng mẫu theo quy định của pháp luật về bảo vệ quyền lợi người tiêu dùng.\" Các mẫu hợp đồng cụ thể được ban hành kèm theo Phụ lục của Nghị định 96/2024/NĐ-CP.  Khác với các giao dịch dân sự thông thường (nơi ưu tiên sự tự do thỏa thuận), giao dịch bất động sản hình thành trong tương lai mang tính chất kinh doanh chuyên nghiệp. Do đó, Luật yêu cầu sử dụng mẫu chung để tránh việc chủ đầu tư đưa vào các điều khoản cài cắm gây bất lợi cho người mua. Các hợp đồng mẫu này không chỉ tuân theo Luật Kinh doanh bất động sản mà còn phải được đăng ký tại cơ quan quản lý về bảo vệ quyền lợi người tiêu dùng (thường là Cục Cạnh tranh và Bảo vệ người tiêu dùng) trước khi áp dụng. Mặc dù phải tuân thủ hợp đồng mẫu, nhưng các bên vẫn có thể thỏa thuận thêm các nội dung khác miễn là không làm thay đổi các nội dung chính của mẫu và không trái với quy định của pháp luật."}, {"level": "1", "content": "Việc xác định tình trạng \"chưa có nhà ở thuộc sở hữu của mình\" để xét duyệt mua nhà ở xã hội theo Nghị định 100/2024/NĐ-CP dựa trên căn cứ nào?", "options": {"A": "Kết quả kiểm tra dữ liệu về thuế thu nhập cá nhân và quá trình đóng bảo hiểm xã hội của người đứng đơn.", "B": "Người đứng đơn và vợ hoặc chồng không có tên trong Giấy chứng nhận quyền sở hữu tại tỉnh, thành phố nơi có dự án.", "C": "Văn bản xác nhận về tình trạng bất động sản do Văn phòng Đăng ký đất đai cấp quốc gia cung cấp cho cá nhân.", "D": "Bản tự khai về tình trạng nhà ở của người nộp đơn có chứng thực của cơ quan công chứng hoặc UBND cấp xã."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 29 quy định cụ thể về điều kiện nhà ở: \"Chưa có nhà ở thuộc sở hữu của mình tại tỉnh, thành phố trực thuộc Trung ương nơi có dự án đầu tư xây dựng nhà ở xã hội đó được xác định khi người đứng đơn... và vợ hoặc chồng của người đó (nếu có) không có tên trong Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất tại tỉnh, thành phố trực thuộc Trung ương nơi có dự án... tại thời điểm nộp hồ sơ...\"   Luật chỉ xét việc \"có nhà\" hay chưa tại tỉnh/thành phố nơi có dự án. Điều này có nghĩa là nếu một người có nhà ở Hà Nội nhưng muốn mua NOXH tại TP.HCM thì họ vẫn đáp ứng được điều kiện về nhà ở tại TP.HCM (với điều kiện họ không có tên trên sổ đỏ/sổ hồng tại TP.HCM). Việc xác định này áp dụng đồng thời cho cả người đứng đơn và vợ/chồng. Điều này nhằm ngăn chặn tình trạng \"lách luật\" bằng cách để một người đứng tên nhà và người còn lại đi đăng ký mua NOXH. Nhiều trường hợp có nhà nhưng diện tích bình quân thấp hơn 15 m2 sàn/người, cá nhân đó vẫn được coi là đủ điều kiện về nhà ở để mua NOXH. Con số 15 m2 này đã tăng lên đáng kể so với quy định cũ (trước đây là 10 m2), giúp mở rộng cửa cho nhiều người lao động hơn."}, {"level": "1", "content": "Đơn vị quản lý vận hành (ĐVQLVH) nhà chung cư phải đáp ứng điều kiện năng lực nào theo quy định?", "options": {"A": "Phải có vốn điều lệ tối thiểu từ 20 tỷ đồng và đã có kinh nghiệm quản lý trên 05 tòa nhà hạng 1.", "B": "Là đơn vị sự nghiệp công lập hoặc doanh nghiệp có tỷ lệ vốn góp của Nhà nước chiếm trên 51%.", "C": "Có bộ máy các phòng chuyên môn, có nhân sự đủ điều kiện về chuyên môn và được đăng tải thông tin trên cổng thông tin của Bộ Xây dựng.", "D": "Là doanh nghiệp có Giấy chứng nhận đăng ký kinh doanh với ngành nghề quản lý bất động sản và dịch vụ vệ sinh.."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 và Khoản 2 Điều 150 Luật Nhà ở 2023 quy định điều kiện hành nghề quản lý vận hành nhà chung cư: (1) Tư cách pháp nhân: Phải là doanh nghiệp hoặc hợp tác xã có chức năng quản lý vận hành nhà chung cư. (2) Bộ máy nhân sự (Điểm b Khoản 1): Phải có các bộ phận chuyên môn nghiệp vụ về kỹ thuật, dịch vụ, bảo vệ, vệ sinh, môi trường và các bộ phận khác liên quan. (3) Chứng chỉ hành nghề (Khoản 2): Thành viên Ban giám đốc và các cán bộ phòng, bộ phận chuyên môn phải có giấy chứng nhận đã được bồi dưỡng kiến thức, chuyên môn nghiệp vụ về quản lý vận hành nhà chung cư. (4) Đăng tải thông tin (Khoản 2): Đơn vị phải có văn bản thông báo đủ điều kiện gửi về Bộ Xây dựng để được đăng tải công khai trên cổng thông tin điện tử của Bộ. Nếu không có tên trên hệ thống này, đơn vị đó không đủ điều kiện pháp lý để ký hợp đồng quản lý vận hành."}, {"level": "1", "content": "Theo quy định tại Điều 151 Luật Nhà ở 2023, sau khi Ban quản trị nhà chung cư được thành lập, giá dịch vụ quản lý vận hành nhà chung cư được quyết định bởi chủ thể nào?", "options": {"A": "Do Ủy ban nhân dân cấp tỉnh ấn định mức giá cụ thể áp dụng chung cho tất cả nhà chung cư trên địa bàn.", "B": "Do Đơn vị quản lý vận hành tự định giá dựa trên chi phí thực tế và thông báo cho cư dân thực hiện nộp hàng tháng.", "C": "Do Ban quản trị nhà chung cư tự quyết định và áp dụng sau khi ký hợp đồng với đơn vị quản lý vận hành.", "D": "Do Hội nghị nhà chung cư quyết định trên cơ sở thỏa thuận với đơn vị quản lý vận hành nhà chung cư."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 Điều 151: \"Trường hợp đã thành lập Ban quản trị nhà chung cư thì giá dịch vụ quản lý vận hành nhà chung cư do Hội nghị nhà chung cư quyết định trên cơ sở thỏa thuận với đơn vị quản lý vận hành nhà chung cư.\".   Mặc dù các bên được thỏa thuận, nhưng giá dịch vụ không được vượt quá mức giá trần do UBND cấp tỉnh quy định, trừ trường hợp có thỏa thuận khác giữa các chủ sở hữu (Khoản 5 Điều 151). Giá dịch vụ phải đảm bảo tính công khai, minh bạch và dựa trên các nội dung công việc cần quản lý vận hành cũng như chất lượng dịch vụ theo hợp đồng. Ban quản trị đóng vai trò là bên đại diện thương thảo, nhưng quyền quyết định cuối cùng về mức đóng góp tài chính thuộc về Hội nghị nhà chung cư (cơ quan quyền lực cao nhất của tòa nhà)."}, {"level": "1", "content": "Theo quy định tại Điều 57 Luật Nhà ở 2023, cá nhân xây dựng nhà ở từ 02 tầng trở lên mà tại mỗi tầng có thiết kế, xây dựng căn hộ để bán hoặc cho thuê mua thì phải đáp ứng điều kiện nào sau đây?", "options": {"A": "Phải có diện tích sàn mỗi căn hộ tối thiểu từ 45 m2 trở lên và xây dựng tại khu vực nông thôn.", "B": "Chỉ cần tuân thủ các quy chuẩn về kỹ thuật xây dựng và phòng cháy, chữa cháy đối với nhà ở riêng lẻ.", "C": "Phải đáp ứng điều kiện làm chủ đầu tư dự án đầu tư xây dựng nhà ở và tuân thủ các quy định pháp luật liên quan.", "D": "Phải thực hiện ký quỹ bảo đảm thực hiện dự án tại các tổ chức tín dụng đang hoạt động tại Việt Nam."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 57 Luật Nhà ở 2023 quy định cụ thể như sau: \"Cá nhân có quyền sử dụng đất ở... xây dựng nhà ở có từ 02 tầng trở lên mà tại mỗi tầng có thiết kế, xây dựng căn hộ để bán, cho thuê mua, cho thuê hoặc có từ 02 tầng trở lên và có quy mô từ 20 căn hộ trở lên để cho thuê thì phải đáp ứng điều kiện làm chủ đầu tư dự án đầu tư xây dựng nhà ở; việc đầu tư xây dựng thực hiện theo quy định của pháp luật về xây dựng và quy định khác của pháp luật có liên quan đối với dự án đầu tư xây dựng nhà ở.\"  Quy định này nhằm siết chặt quản lý loại hình thường gọi là \"chung cư mini\". Khi cá nhân có ý định kinh doanh (bán, cho thuê mua), họ không còn được xem là xây dựng nhà ở riêng lẻ thông thường mà phải chịu sự điều chỉnh như một chủ đầu tư dự án chuyên nghiệp. Việc phải đáp ứng điều kiện làm chủ đầu tư đồng nghĩa với việc dự án phải tuân thủ các tiêu chuẩn về quy hoạch, thiết kế, nghiệm thu và đặc biệt là các quy chuẩn nghiêm ngặt về phòng cháy, chữa cháy đối với nhà chung cư (thay vì nhà ở riêng lẻ). Theo Khoản 2 Điều 57, các căn hộ này nếu đủ điều kiện sẽ được cấp Giấy chứng nhận (Sổ hồng) riêng cho từng căn hộ, tạo cơ sở pháp lý cho việc giao dịch trên thị trường."}, {"level": "1", "content": "Theo Điều 57 Luật Nhà ở 2023, cá nhân xây dựng nhà ở có từ 02 tầng trở lên mà tại mỗi tầng có thiết kế căn hộ để cho thuê (quy mô dưới 20 căn hộ) phải đáp ứng những yêu cầu tối thiểu nào về phòng cháy, chữa cháy (PCCC) và hạ tầng?", "options": {"A": "Phải tuân thủ các tiêu chuẩn kỹ thuật về nhà ở riêng lẻ (TCVN 9411) và các quy chuẩn xây dựng hiện hành đối với công trình dân dụng thấp tầng tại địa phương nơi thực hiện việc xây dựng.", "B": "Phải đáp ứng yêu cầu về PCCC theo quy định đối với nhà ở nhiều tầng nhiều căn hộ của cá nhân và đáp ứng điều kiện về đường giao thông để xe chữa cháy thực hiện nhiệm vụ chữa cháy.", "C": "Phải có Giấy phép xây dựng và cam kết tự chịu trách nhiệm về an toàn phòng chống cháy nổ, đồng thời trang bị hệ thống phương tiện chữa cháy xách tay phù hợp với diện tích sàn xây dựng.", "D": "Phải thực hiện thiết kế hệ thống thoát nạn khẩn cấp tách biệt với lối vào chính và được cơ quan Công an có thẩm quyền phê duyệt phương án PCCC định kỳ hàng năm cho công trình."}, "answer": "B", "explanation": " • Giải thích: Điều 57 quy định các yêu cầu tối thiểu về phòng cháy chữa cháy và giao thông tiếp cận cho loại hình này: Cá nhân muốn xây dựng loại hình này (dưới 20 căn hộ) không bắt buộc phải lập dự án đầu tư (thành lập doanh nghiệp) nhưng phải: o (1) Đáp ứng yêu cầu xây dựng nhà ở nhiều tầng nhiều căn hộ theo quy định của Bộ trưởng Bộ Xây dựng. o (2) Đáp ứng yêu cầu về phòng cháy, chữa cháy theo quy định của pháp luật về PCCC đối với nhà ở nhiều tầng nhiều căn hộ của cá nhân. o (3) Đáp ứng điều kiện về đường giao thông để xe chữa cháy thực hiện nhiệm vụ chữa cháy theo quy định của Ủy ban nhân dân cấp tỉnh."}, {"level": "1", "content": "Việc quản lý vận hành nhà ở nhiều tầng nhiều căn hộ của cá nhân (\"chung cư mini\") phải tuân thủ theo quy định nào?", "options": {"A": "Theo các quy định về quản lý nhà trọ và dịch vụ lưu trú của Ủy ban nhân dân cấp xã.", "B": "Theo Quy chế quản lý, sử dụng nhà chung cư do Bộ trưởng Bộ Xây dựng ban hành.", "C": "Theo các nội quy quản lý nội bộ do cá nhân chủ sở hữu tự thiết lập và ký kết.", "D": "Theo thỏa thuận dân sự giữa chủ sở hữu và người thuê trong hợp đồng thuê nhà.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 57 Luật Nhà ở 2023 yêu cầu áp dụng Quy chế quản lý, sử dụng nhà chung cư cho cả loại hình này, và Theo Quy chế quản lý, sử dụng nhà chung cư do Bộ Xây dựng ban hành (hiện hành là Thông tư 05/2024/TT-BXD). Trước đây, chung cư mini thường được quản lý lỏng lẻo như nhà trọ. Luật Nhà ở 2023 buộc loại hình này phải áp dụng chung một \"luật chơi\" như với nhà chung cư thương mại. Điều này có nghĩa là phải có quy trình bảo trì, diễn tập PCCC, và quản lý các diện tích dùng chung một cách bài bản. Đối với những nhà ở nhiều tầng nhiều căn hộ có quy mô lớn (từ 20 căn hộ trở lên), việc quản lý vận hành có thể phải thuê đơn vị có năng lực chuyên môn theo quy định tại Điều 150, thay vì chủ nhà tự thực hiện."}, {"level": "1", "content": "Xu hướng chính của khung pháp lý mới về nhà ở và Kinh doanh bất động sản (Luật Nhà ở 2023, Luật Kinh doanh bất động sản 2023) là gì?", "options": {"A": "Tăng cường sự quản lý của nhà nước, nâng cao tính minh bạch và bảo vệ tối đa quyền lợi người mua nhà.", "B": "Nới lỏng các điều kiện kinh doanh và tiêu chuẩn kỹ thuật để thúc đẩy thị trường phát triển nhanh.", "C": "Tập trung ưu tiên các nguồn lực và cơ chế đặc thù cho phân khúc bất động sản thương mại cao cấp.", "D": "Cắt giảm các quy định về trách nhiệm của chủ đầu tư nhằm giảm giá thành sản phẩm trên thị trường.."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Tổng quan các luật mới cho thấy xu hướng siết chặt quản lý, tăng minh bạch và bảo vệ người tiêu dùng. Sự chuyển dịch của khung pháp lý mới không chỉ là thay đổi câu chữ mà là thay đổi về triết lý quản lý, tập trung vào 3 trụ cột sau: (1) Tính Minh bạch (Transparency): Luật buộc chủ đầu tư phải công khai thông tin toàn diện trên hệ thống thông tin của Nhà nước (Điều 6 Luật KDBĐS). Mọi giao dịch của doanh nghiệp phải thực hiện qua ngân hàng để kiểm soát dòng tiền và chống thất thu thuế. (2) Bảo vệ người tiêu dùng (Consumer Protection): Các quy định về giới hạn đặt cọc 5% (Điều 23 Luật KDBĐS), bảo lãnh ngân hàng (Điều 26 Luật KDBĐS) và hợp đồng mẫu (Điều 46 Luật KDBĐS) đều nhằm bảo vệ bên yếu thế trong giao dịch. (3) Chuyên nghiệp hóa thị trường: Siết chặt điều kiện đối với chủ đầu tư (vốn chủ sở hữu), yêu cầu môi giới phải có chứng chỉ và hành nghề trong doanh nghiệp (không được hoạt động độc lập), và chuẩn hóa loại hình \"chung cư mini\"."}, {"level": "1", "content": "Trong thực thi chính sách cải tạo, xây dựng lại nhà chung cư cũ (bao gồm cả cơ chế \"quy gom\" dự án), thách thức lớn nhất mang tính quyết định đến sự thành công của dự án là gì?", "options": {"A": "Việc thiếu hụt các chỉ tiêu quy hoạch về chiều cao và mật độ xây dựng tại các khu vực nội đô lịch sử.", "B": "Quy trình thủ tục hành chính trong việc phê duyệt quy hoạch chi tiết 1/500 và cấp giấy phép xây dựng.", "C": "Năng lực tài chính của các tổ chức tín dụng trong việc cấp vốn vay ưu đãi cho chủ đầu tư dự án.", "D": "Đạt được sự đồng thuận của các chủ sở hữu về phương án bồi thường, tái định cư và lựa chọn nhà đầu tư."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Việc đạt được đồng thuận và lựa chọn nhà đầu tư phù hợp là những rào cản thực tế lớn nhất trong các dự án cải tạo chung cư cũ. Cơ chế bồi thường và lựa chọn nhà đầu tư được quy định chi tiết tại Chương V Luật Nhà ở 2023 và Nghị định 98/2024/NĐ-CP. Đặc biệt: Điều 72 Luật Nhà ở 2023: Quy định về việc lựa chọn chủ đầu tư dự án cải tạo, xây dựng lại nhà chung cư. Điều 73 Luật Nhà ở 2023: Quy định về tỷ lệ đồng thuận. Điểm mới quan trọng nhất là Luật đã bãi bỏ yêu cầu đồng thuận 100% (vốn gây bế tắc trước đây). Hiện nay, chỉ cần tối thiểu 70% tổng số chủ sở hữu tham gia và đạt tỷ lệ đồng thuận theo quy định là có thể triển khai (tùy trường hợp chung cư nguy hiểm hoặc chung cư hư hỏng)."}, {"level": "1", "content": "Theo quy định tại Điều 13 Luật Đất đai 2024 và Hiến pháp 2013, chế độ sở hữu đất đai tại Việt Nam được xác lập dựa trên nguyên tắc cốt lõi nào?", "options": {"A": "Đất đai thuộc sở hữu tư nhân đối với đất ở và sở hữu nhà nước đối với các loại đất khác.", "B": "Đất đai thuộc sở hữu của các tổ chức kinh tế và cộng đồng dân cư tại địa phương.", "C": "Đất đai thuộc sở hữu toàn dân do Nhà nước đại diện chủ sở hữu và thống nhất quản lý.", "D": "Đất đai thuộc sở hữu tập thể của các hộ gia đình được Nhà nước giao đất không thu tiền."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 13 Luật Đất đai 2024: > \"Đất đai thuộc sở hữu toàn dân do Nhà nước đại diện chủ sở hữu và thống nhất quản lý.\" Điều 53 Hiến pháp 2013: > Khẳng định đất đai là tài sản công thuộc sở hữu toàn dân.."}, {"level": "1", "content": "Luật Đất đai 2024 (Luật số 31/2024/QH15) chính thức có hiệu lực thi hành từ ngày nào?", "options": {"A": "18/01/2024", "B": "01/01/2025", "C": "01/08/2024", "D": "15/10/1993"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Ngày hiệu lực của Luật Đất đai 2024 được ghi rõ là 1/1/2025, tuy nhiên theo Luật điều chỉnh (Luật sửa đổi, bổ sung một số điều của Luật Đất đai, Luật Nhà ở, Luật Kinh doanh bất động sản và Luật Các tổ chức tín dụng số 32/2024/QH15, được Quốc hội thông qua ngày 29/6/2024) của Quốc hội trong kỳ họp tháng 6/2024, thì các luật này có hiệu lực sớm hơn dự kiến, áp dụng chính thức từ ngày 1/8/2024."}, {"level": "1", "content": "Theo quy định của Luật Đất đai 2024 và pháp luật có liên quan, quyền sử dụng đất tại Việt Nam có đặc điểm pháp lý nào sau đây?", "options": {"A": "Là quyền sở hữu tư nhân tuyệt đối, cho phép người sử dụng toàn quyền định đoạt đất đai mà không chịu sự quản lý của Nhà nước.", "B": "Là quyền khai thác, sử dụng đất theo mục đích và thời hạn do pháp luật quy định, được công nhận là một loại tài sản đặc biệt.", "C": "Là một loại giấy phép hành chính tạm thời, không được coi là tài sản và không có giá trị trao đổi, thế chấp trên thị trường.", "D": "Là quyền lợi chỉ được Nhà nước giao cho cá nhân là công dân Việt Nam đang cư trú tại địa phương nơi có đất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 27: Quy định về \"Quyền chung của người sử dụng đất\", bao gồm quyền chuyển đổi, chuyển nhượng, cho thuê, cho thuê lại, thừa kế, tặng cho, thế chấp, góp vốn bằng quyền sử dụng đất. Điều 5: Mở rộng đối tượng sử dụng đất bao gồm cả người Việt Nam định cư ở nước ngoài là công dân Việt Nam và người gốc Việt Nam định cư ở nước ngoài (được hưởng quyền gần như tương đương cá nhân trong nước). Ngoài ra theo Bộ luật Dân sự 2015 (Điều 115): Quyền sử dụng đất được xác định là quyền tài sản, và quyền tài sản là một loại tài sản. QSDĐ là quyền được phái sinh từ quyền sở hữu toàn dân. Nhà nước (chủ sở hữu) chuyển giao một phần quyền định đoạt cho người dân thông qua hình thức giao đất hoặc cho thuê đất. Khác với sở hữu tư nhân tuyệt đối ở một số quốc gia, QSDĐ ở Việt Nam luôn gắn liền với: Mục đích sử dụng: Phải dùng đúng loại đất (đất ở, đất nông nghiệp...). Muốn thay đổi phải xin phép (Điều 121). Thời hạn sử dụng: Có thể là ổn định lâu dài (đất ở) hoặc có thời hạn như 50 năm, 70 năm (đất sản xuất kinh doanh). Dù không sở hữu đất về mặt vật chất, nhưng QSDĐ có đầy đủ thuộc tính của hàng hóa: có giá trị (giá đất), có giá trị sử dụng và có thể lưu thông trên thị trường bất động sản."}, {"level": "1", "content": "Theo quy định tại Điều 3 Luật Đất đai 2024, \"Chuyển mục đích sử dụng đất\" được hiểu như thế nào là đúng nhất?", "options": {"A": "Là việc người sử dụng đất chuyển giao quyền sử dụng đất của mình cho người khác thông qua các hình thức giao dịch dân sự.", "B": "Là việc Nhà nước quyết định thu hồi lại quyền sử dụng đất của người dân để phục vụ mục đích quốc phòng, an ninh hoặc phát triển kinh tế.", "C": "Là việc đăng ký quyền sử dụng đất lần đầu đối với thửa đất chưa từng được cấp Giấy chứng nhận quyền sử dụng đất.", "D": "Là việc thay đổi mục đích sử dụng đất từ loại đất này sang loại đất khác bằng quyết định hành chính hoặc đăng ký biến động đất đai."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ vào phần Giải thích từ ngữ tại Khoản 8 Điều 3 Luật Đất đai 2024, định nghĩa này đã được chuẩn hóa rất chặt chẽ: \"8. Chuyển mục đích sử dụng đất là việc thay đổi mục đích sử dụng đất từ loại đất này sang loại đất khác bằng quyết định hành chính trong trường hợp phải xin phép hoặc đăng ký biến động đất đai trong trường hợp không phải xin phép theo quy định của Luật này.\"."}, {"level": "1", "content": "Theo quy định tại Điều 4 Luật Đất đai 2024, đối tượng nào sau đây không còn được quy định là người sử dụng đất để Nhà nước giao đất, cho thuê đất, công nhận quyền sử dụng đất (áp dụng cho các xác lập mới từ ngày Luật có hiệu lực)?", "options": {"A": "Tổ chức kinh tế có vốn đầu tư nước ngoài và người gốc Việt Nam định cư ở nước ngoài.", "B": "Hộ gia đình sử dụng đất (bao gồm những người có quan hệ hôn nhân, huyết thống, nuôi dưỡng).", "C": "Cá nhân trong nước và người Việt Nam định cư ở nước ngoài là công dân Việt Nam.", "D": "Cộng đồng dân cư sử dụng đất gắn liền với đình, đền, miếu, am, từ đường, nhà thờ họ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nội dung này được quy định tại Điều 4 Luật Đất đai 2024 (về Người sử dụng đất). Trong danh mục các đối tượng tại Điều này, thuật ngữ \"Hộ gia đình\" đã hoàn toàn được đưa ra khỏi danh sách người sử dụng đất.  Lý do loại bỏ: Trong thực tiễn thi hành Luật Đất đai 2013, việc xác định \"thành viên hộ gia đình\" tại thời điểm giao đất thường gây tranh chấp kéo dài khi thực hiện các quyền chuyển nhượng hoặc thế chấp (phải có sự đồng ý của tất cả thành viên). Luật 2024 chuyển hướng quản lý sang Cá nhân để minh bạch hóa quyền tài sản và thuận tiện cho các giao dịch dân sự."}, {"level": "1", "content": "Luật Đất đai 2024 phân loại đất thành mấy nhóm chính?", "options": {"A": "3 nhóm (Đất nông nghiệp, Đất công nghiệp và Đất phi nông nghiệp)", "B": "3 nhóm (Đất nông nghiệp, Đất phi nông nghiệp, Đất chưa sử dụng)", "C": "4 nhóm (Đất ở, Đất sản xuất kinh doanh, Đất nông nghiệp, Đất công cộng)", "D": "5 nhóm (Đất đô thị, Đất nông thôn, Đất lâm nghiệp, Đất mặt nước, Đất khác)"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> 3 nhóm phân loại đất chính theo Điều 9 Luật Đất đai 2024. Nhóm đất nông nghiệp (11 loại đất thành phần): Bao gồm đất trồng lúa, đất trồng cây hàng năm khác, đất rừng sản xuất, đất rừng phòng hộ, đất rừng đặc dụng... Điểm mới của Luật 2024 là cơ chế cho phép sử dụng đa mục đích trên đất nông nghiệp để nâng cao giá trị kinh tế đất. Nhóm đất phi nông nghiệp (10 loại đất thành phần): Gồm đất ở (nông thôn và đô thị), đất xây dựng trụ sở cơ quan, đất quốc phòng, an ninh, đất sản xuất, kinh doanh phi nông nghiệp... Đây là nhóm đất tạo ra giá trị gia tăng cao nhất và là trọng tâm của thị trường bất động sản. Nhóm đất chưa sử dụng: Bao gồm các loại đất chưa xác định mục đích sử dụng (đất bằng chưa sử dụng, đất đồi núi chưa sử dụng, núi đá không có rừng cây). Mục tiêu của quản lý nhà nước là đưa nhóm đất này vào sử dụng thông qua các kế hoạch khai hoang, phục hóa hoặc chuyển mục đích sử dụng đất."}, {"level": "1", "content": "Đất xây dựng khu công nghiệp, cụm công nghiệp thuộc nhóm đất nào?", "options": {"A": "Đất nông nghiệp", "B": "Đất phi nông nghiệp", "C": "Đất chưa sử dụng", "D": "Đất ở"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phân loại đất (Điều 9) xếp đất khu công nghiệp, cụm công nghiệp vào nhóm Đất phi nông nghiệp."}, {"level": "1", "content": "Theo quy định tại Điều 114 Luật Đất đai 2024, Quỹ phát triển đất được định nghĩa và tổ chức như thế nào?", "options": {"A": "Là quỹ tài chính nhà nước ngoài ngân sách do Ủy ban nhân dân cấp tỉnh thành lập để ứng vốn thực hiện các nhiệm vụ về quản lý, khai thác quỹ đất.", "B": "Là một bộ phận thuộc ngân sách địa phương do Sở Tài chính quản lý nhằm chi trả lương cho cán bộ công chức ngành quản lý đất đai.", "C": "Là tổ chức tín dụng nội bộ của ngành tài nguyên môi trường chuyên cho vay thế chấp bằng quyền sử dụng đất với lãi suất ưu đãi.", "D": "Là quỹ đầu tư hợp tác giữa Nhà nước và tư nhân (PPP) để trực tiếp xây dựng các dự án bất động sản thương mại và nhà ở xã hội."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 114 Luật Đất đai 2024: \"Quỹ phát triển đất là quỹ tài chính nhà nước ngoài ngân sách do Ủy ban nhân dân cấp tỉnh thành lập để ứng vốn phục vụ các nội dung quy định tại khoản 2 Điều này.\". 3 nhiệm vụ chính của Quỹ (theo Khoản 2 Điều 114): (1) Ứng vốn bồi thường, hỗ trợ, tái định cư: Đây là vai trò quan trọng nhất. Quỹ giúp chính quyền địa phương có tiền chi trả ngay cho dân để giải phóng mặt bằng, tạo \"quỹ đất sạch\" nhanh chóng. (2) Tạo quỹ đất và phát triển quỹ đất: Ứng vốn để đầu tư hạ tầng kỹ thuật trên khu đất đã thu hồi, từ đó nâng cao giá trị đất trước khi Nhà nước tổ chức đấu giá quyền sử dụng đất. (3) Đầu tư dự án theo quy hoạch: Ứng vốn thực hiện các dự án đầu tư công, dự án nhà ở xã hội hoặc các nhiệm vụ đột xuất khác về đất đai theo quyết định của UBND cấp tỉnh. Quy định chi tiết về bộ máy tổ chức, nguồn vốn và hoạt động của Quỹ này được nêu tại Nghị định 102/2024/NĐ-CP.."}, {"level": "1", "content": "Theo quy định tại Điều 27 Luật Đất đai 2024, hành vi nào sau đây KHÔNG thuộc nhóm các quyền chung của người sử dụng đất?", "options": {"A": "Tự ý chuyển đổi mục đích sử dụng đất theo nhu cầu cá nhân mà không cần làm thủ tục.", "B": "Được cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất khi có đủ điều kiện.", "C": "Hưởng thành quả lao động, kết quả đầu tư trên đất hợp pháp theo quy định.", "D": "Được bồi thường, hỗ trợ, tái định cư khi Nhà nước thu hồi đất theo quy định của Luật này."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Việc chuyển mục đích sử dụng đất phải tuân theo quy định của pháp luật (Điều 121, 122), không phải là quyền tự ý. Luật Đất đai 2024 liệt kê rõ các quyền cơ bản của người sử dụng đất tại Điều 27, theo đó các quyền tại phương án B, C, và D đều được quy định cụ thể tại điều này nhằm bảo đảm quyền tài sản cho người dân."}, {"level": "1", "content": "Nghĩa vụ nào sau đây là nghĩa vụ chung của mọi người sử dụng đất theo Điều 31 Luật Đất đai 2024?", "options": {"A": "Sử dụng đất đúng mục đích, ranh giới.", "B": "Kê khai đăng ký đất đai.", "C": "Thực hiện nghĩa vụ tài chính về đất đai.", "D": "Cả A, B, C đều đúng."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Cả ba nghĩa vụ trên đều được liệt kê trong số các nghĩa vụ chung tại Điều 31: Mục đích và Ranh giới (Khoản 1): Khác với luật cũ, Luật 2024 nhấn mạnh thêm việc sử dụng độ cao dưới lòng đất và trên không. Điều này đặc biệt quan trọng trong phát triển đô thị hiện đại (công trình ngầm, metro, nhà cao tầng) tại TP.HCM. Nghĩa vụ đăng ký (Khoản 2): Luật Đất đai 2024 coi đăng ký đất đai là bắt buộc đối với tất cả người sử dụng đất và người được giao đất để quản lý. Việc không đăng ký biến động khi có thay đổi sẽ dẫn đến xử phạt vi phạm hành chính nghiêm khắc. Nghĩa vụ tài chính (Khoản 3): Trong bối cảnh bỏ Khung giá đất, việc thực hiện nghĩa vụ tài chính (thuế, tiền sử dụng đất) sẽ căn cứ vào Bảng giá đất sát giá thị trường. Đây là nghĩa vụ quan trọng nhất để đảm bảo nguồn thu ngân sách và công bằng xã hội."}, {"level": "1", "content": "Tổ chức kinh tế trong nước được Nhà nước cho thuê đất trả tiền hằng năm có được chuyển nhượng quyền sử dụng đất không?", "options": {"A": "Được chuyển nhượng quyền sử dụng đất tương tự như trường hợp đất được Nhà nước giao có thu tiền sử dụng đất.", "B": "Chỉ được bán tài sản gắn liền với đất, không được phép chuyển nhượng các quyền liên quan đến hợp đồng thuê đất.", "C": "Được bán tài sản thuộc sở hữu của mình gắn liền với đất và quyền thuê trong hợp đồng thuê đất khi đủ điều kiện.", "D": "Chỉ được thực hiện việc chuyển nhượng sau khi đã hoàn tất việc chuyển đổi sang hình thức thuê đất trả tiền một lần."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điểm a Khoản 1 Điều 34 Luật Đất đai 2024: \"Bán tài sản thuộc sở hữu của mình gắn liền với đất và quyền thuê trong hợp đồng thuê đất khi có đủ điều kiện quy định tại Điều 46 của Luật này.\".   Cần hiểu rõ sự khác biệt giữa \"Chuyển nhượng QSDĐ\" và \"Chuyển nhượng quyền thuê\". Đây không phải là chuyển nhượng quyền sở hữu/sử dụng đất mà là chuyển giao vị thế chủ thể trong hợp đồng thuê đất với Nhà nước. Bên nhận chuyển nhượng sẽ kế thừa các quyền và nghĩa vụ của bên chuyển nhượng đối với cơ quan nhà nước. Quy định này giúp doanh nghiệp có thể \"thoái vốn\" hoặc tái cấu trúc dự án dễ dàng hơn mà không bị bó hẹp trong hình thức thuê đất trả tiền một lần (vốn đòi hỏi chi phí đầu tư ban đầu rất lớn). Điều kiện thực hiện (Điều 46): Việc bán tài sản và quyền thuê này không được thực hiện tùy tiện mà phải đáp ứng: (1) Tài sản gắn liền với đất đã được đăng ký quyền sở hữu. (2) Đã hoàn thành việc xây dựng theo đúng quy hoạch, thiết kế (nếu là dự án đầu tư). (3) Đã ứng trước tiền bồi thường, hỗ trợ, tái định cư (nếu có) mà chưa khấu trừ hết vào tiền thuê đất phải nộp."}, {"level": "1", "content": "Theo quy định tại Điều 37 Luật Đất đai 2024, cá nhân trong nước được Nhà nước giao đất có thu tiền sử dụng đất có quyền thế chấp quyền sử dụng đất tại các tổ chức nào?", "options": {"A": "Chỉ được thế chấp tại các Ngân hàng thương mại hoặc Ngân hàng do Nhà nước nắm giữ trên 50% vốn điều lệ.", "B": "Được thế chấp tại các tổ chức tín dụng được phép hoạt động tại Việt Nam, tại tổ chức kinh tế khác hoặc cá nhân theo quy định.", "C": "Không được phép thế chấp quyền sử dụng đất cho đến khi hoàn thành xong việc xây dựng nhà ở trên đất.", "D": "Chỉ được thế chấp tại các quỹ tín dụng nhân dân hoặc các tổ chức tài chính vi mô tại địa phương nơi có đất.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điểm g Khoản 1 Điều 37 Luật đất đai 2024: \"Thế chấp quyền sử dụng đất, tài sản thuộc sở hữu của mình gắn liền với đất tại tổ chức tín dụng được phép hoạt động tại Việt Nam, tại tổ chức kinh tế khác hoặc cá nhân theo quy định của pháp luật;\". So với các luật cũ, Luật Đất đai 2024 (kế thừa từ Luật 2013 và các nghị định hướng dẫn) khẳng định rõ quyền thế chấp không chỉ tại Ngân hàng (tổ chức tín dụng) mà còn tại tổ chức kinh tế khác hoặc cá nhân. Tuy nhiên, việc thế chấp cho cá nhân/tổ chức kinh tế không phải ngân hàng phải tuân thủ nghiêm ngặt các quy định của Bộ luật Dân sự về giao dịch bảo đảm. Người sử dụng đất được thế chấp đồng thời cả Quyền sử dụng đất và Tài sản gắn liền với đất (nhà ở, công trình xây dựng). Điều này giúp gia tăng giá trị tài sản bảo đảm khi định giá để vay vốn. Dù có quyền thế chấp, nhưng cá nhân phải đảm bảo thửa đất đã được cấp Giấy chứng nhận, đất không có tranh chấp, không bị kê biên và còn trong thời hạn sử dụng đất."}, {"level": "1", "content": "Theo quy định từ Điều 124 đến Điều 126 Luật Đất đai 2024, phương thức nào sau đây KHÔNG phải là hình thức Nhà nước thực hiện giao đất, cho thuê đất đối với các dự án đầu tư??", "options": {"A": "Giao đất, cho thuê đất thông qua thỏa thuận về nhận quyền sử dụng đất giữa chủ đầu tư và người đang sử dụng đất.", "B": "Giao đất, cho thuê đất không thông qua đấu giá quyền sử dụng đất và không thông qua đấu thầu lựa chọn nhà đầu tư.", "C": "Giao đất có thu tiền sử dụng đất, cho thuê đất thông qua đấu giá quyền sử dụng đất.", "D": "Giao đất, cho thuê đất thông qua đấu thầu lựa chọn nhà đầu tư thực hiện dự án đầu tư có sử dụng đất."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Căn cứ vào cấu trúc của Luật Đất đai 2024, Nhà nước thực hiện quyền đại diện chủ sở hữu để giao/cho thuê đất qua 03 \"cửa\" chính: Điều 124: Giao đất, cho thuê đất không thông qua đấu giá, đấu thầu (Áp dụng cho các đối tượng ưu tiên, chính sách xã hội hoặc trường hợp đặc thù). Điều 125: Giao đất, cho thuê đất thông qua đấu giá quyền sử dụng đất. Điều 126: Giao đất, cho thuê đất thông qua đấu thầu lựa chọn nhà đầu tư thực hiện dự án đầu tư có sử dụng đất.. Việc \"thỏa thuận về nhận quyền sử dụng đất\" (câu A, theo Điều 127, thường gọi là mua bán đất dân) là một cơ chế tự nguyện giữa các chủ thể trên thị trường. Đây là hình thức chuyển quyền sử dụng đất giữa các bên, không phải là hành vi Nhà nước giao hay cho thuê đất. Sau khi chủ đầu tư thỏa thuận nhận quyền sử dụng đất từ người dân xong, họ vẫn phải thực hiện thủ tục để được Nhà nước cho phép chuyển mục đích sử dụng đất để thực hiện dự án. Tuy nhiên, hành vi gốc ở đây là thỏa thuận dân sự/kinh tế, không nằm trong các hình thức giao/thuê trực tiếp từ quỹ đất công của Nhà nước."}, {"level": "1", "content": "Theo quy định tại Điều 121 Luật Đất đai 2024, trường hợp nào sau đây người sử dụng đất bắt buộc phải được cơ quan nhà nước có thẩm quyền cho phép khi chuyển mục đích sử dụng đất?", "options": {"A": "Chuyển đất thương mại, dịch vụ sang đất cơ sở sản xuất phi nông nghiệp.", "B": "Chuyển đất trồng cây hàng năm khác sang đất nuôi trồng thủy sản hoặc đất trồng cây lâu năm.", "C": "Chuyển đất ở tại khu vực nông thôn sang đất ở tại khu vực đô thị do thay đổi địa giới hành chính.", "D": "Chuyển mục đích sử dụng đất từ nhóm đất nông nghiệp sang nhóm đất phi nông nghiệp."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Theo luật, có 7 trường hợp phải xin phép, trong đó có chuyển đất nông nghiệp sang đất phi nông nghiệp.   Khoản 1 Điều 121: \"Các trường hợp chuyển mục đích sử dụng đất phải được cơ quan nhà nước có thẩm quyền cho phép bao gồm: ... b) Chuyển đất nông nghiệp sang đất phi nông nghiệp; ... e) Chuyển đất sản xuất, kinh doanh phi nông nghiệp không phải là đất thương mại, dịch vụ sang đất thương mại, dịch vụ.\" Khi chuyển từ đất nông nghiệp sang phi nông nghiệp (ví dụ: sang đất ở hoặc đất sản xuất), giá trị của đất tăng lên đột biến và làm thay đổi quy hoạch sử dụng đất của địa phương. Do đó, Nhà nước phải kiểm soát chặt chẽ thông qua việc cho phép và thu tiền sử dụng đất/tiền thuê đất chênh lệch. Với trường hợp B, cả hai loại đất đều thuộc nhóm đất nông nghiệp (trừ đất lúa, đất rừng đã có quy định riêng tại Điểm a Khoản 1 Điều 121). Việc chuyển đổi này chỉ làm thay đổi loại hình sản xuất nông nghiệp, không làm thay đổi bản chất mục đích sử dụng đất lớn, nên chỉ cần đăng ký biến động (theo Điều 122). Với trường hợp A, chuyển từ đất thương mại (giá trị cao) sang đất sản xuất (giá trị thấp hơn hoặc tương đương) không làm phát sinh nghĩa vụ tài chính tăng thêm cho Nhà nước nên thường chỉ cần thủ tục đăng ký. Luật chỉ bắt buộc xin phép theo chiều ngược lại (từ sản xuất phi nông nghiệp sang thương mại, dịch vụ)."}, {"level": "1", "content": "Theo quy định tại Luật Đất đai 2024, khi được cơ quan nhà nước có thẩm quyền cho phép chuyển mục đích sử dụng đất, người sử dụng đất phải thực hiện nghĩa vụ trọng tâm nào sau đây?", "options": {"A": "Thực hiện nghĩa vụ tài chính theo quy định của pháp luật (nộp tiền sử dụng đất hoặc tiền thuê đất chênh lệch).", "B": "Phải trả lại toàn bộ diện tích đất cũ cho Nhà nước để thực hiện thủ tục đấu giá lại mục đích sử dụng mới.", "C": "Chỉ cần thực hiện việc đăng ký biến động trên Giấy chứng nhận và không phải nộp thêm bất kỳ khoản phí nào.", "D": "Phải nộp một khoản tiền phạt vi phạm hành chính tương ứng với giá trị chênh lệch giữa hai loại đất."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 121: \"Khi chuyển mục đích sử dụng đất theo quy định tại khoản 1 Điều này thì người sử dụng đất phải thực hiện nghĩa vụ tài chính theo quy định của pháp luật...\" Điều 153: Quy định về các khoản thu ngân sách nhà nước từ đất đai, trong đó tiền sử dụng đất và tiền thuê đất khi chuyển mục đích là nguồn thu quan trọng. Thay vì áp dụng Khung giá đất thấp như trước đây, từ năm 2026, giá đất được xác định căn cứ vào Bảng giá đất hằng năm hoặc Giá đất cụ thể (nếu thuộc trường hợp định giá theo phương pháp thặng dư, so sánh...). Điều này làm tăng chi phí chuyển mục đích đáng kể nhưng đảm bảo tính minh bạch. Số tiền phải nộp được xác định bằng: [Giá đất của mục đích mới] - [Giá đất của mục đích cũ]. Giá đất để tính nghĩa vụ tài chính được xác định tại thời điểm cơ quan nhà nước có thẩm quyền ban hành quyết định cho phép chuyển mục đích sử dụng đất (Khoản 3 Điều 155)."}, {"level": "1", "content": "Trường hợp nào sau đây là căn cứ thu hồi đất để phát triển kinh tế - xã hội vì lợi ích quốc gia, công cộng theo Điều 79 Luật Đất đai 2024?", "options": {"A": "Sử dụng đất sai mục đích đã được giao, cho thuê.", "B": "Người sử dụng đất tự nguyện trả lại đất.", "C": "Thực hiện dự án xây dựng khu công nghiệp, cụm công nghiệp.", "D": "Đất không được sử dụng liên tục trong thời hạn quy định."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật liệt kê các trường hợp thu hồi đất theo Điều 79, bao gồm dự án KCN, CCN. Các phương án khác thuộc căn cứ thu hồi do vi phạm (Điều 81) hoặc chấm dứt sử dụng (Điều 82).   Luật Đất đai 2024 liệt kê cụ thể 32 trường hợp thu hồi đất. Trong đó, Khoản 4 Điều 79 xác định việc xây dựng các khu kinh tế tập trung như khu công nghiệp, cụm công nghiệp là căn cứ thu hồi. Điểm mới của Luật 2024 là liệt kê chi tiết từng loại dự án thay vì quy định mang tính khái quát, nhằm đảm bảo tính minh bạch và tránh lạm dụng thu hồi đất."}, {"level": "1", "content": "Theo quy định tại Điều 91 Luật Đất đai 2024, một trong những nguyên tắc quan trọng nhất trong trình tự, thủ tục thu hồi đất so với các quy định trước đây là gì?", "options": {"A": "Rút ngắn thời gian thông báo thu hồi đất xuống còn 30 ngày đối với mọi loại đất để đảm bảo tiến độ bàn giao mặt bằng.", "B": "Người dân không có quyền tham gia ý kiến vào dự thảo phương án bồi thường nhằm tránh việc khiếu kiện gây kéo dài dự án.", "C": "Cơ quan nhà nước có thẩm quyền được phép ban hành quyết định cưỡng chế thu hồi đất ngay sau khi gửi thông báo thu hồi.", "D": "Việc phê duyệt phương án bồi thường, hỗ trợ, tái định cư và việc bố trí tái định cư phải được hoàn thành trước khi ban hành quyết định thu hồi đất."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Luật nhấn mạnh yêu cầu hoàn thành phương án BTHTTĐC và bố trí tái định cư trước khi ra quyết định thu hồi là điểm mới quan trọng. Khoản 6 Điều 91 Luật Đất đai 2024: \"6. Việc phê duyệt phương án bồi thường, hỗ trợ, tái định cư và việc bố trí tái định cư phải được hoàn thành trước khi ban hành quyết định thu hồi đất.\"  Đồng thời, Khoản 6 Điều 87 cũng quy định sự phối hợp về mặt thời gian: \"Ủy ban nhân dân cấp có thẩm quyền quyết định thu hồi đất, quyết định phê duyệt phương án bồi thường, hỗ trợ, tái định cư trong cùng một ngày.\" Quy định này buộc các địa phương phải chuẩn bị quỹ đất và hạ tầng khu tái định cư xong xuôi trước khi \"đụng\" đến đất của dân. Điều này hiện thực hóa tinh thần: \"Chỉ được thu hồi đất sau khi đã có chỗ ở mới cho dân\". Việc ban hành quyết định thu hồi và phê duyệt phương án bồi thường trong cùng một ngày giúp người dân xác định rõ ngay lập tức: Mình mất bao nhiêu đất và mình sẽ nhận được bao nhiêu tiền/đất ở đâu. Điều này làm giảm đáng kể tâm lý lo âu và khiếu kiện."}, {"level": "1", "content": "Theo quy định tại Điều 91 Luật Đất đai 2024, việc bồi thường về đất khi Nhà nước thu hồi đất vì lợi ích quốc gia, công cộng được thực hiện theo nguyên tắc ưu tiên nào sau đây?", "options": {"A": "Luôn thực hiện bồi thường bằng tiền mặt dựa trên mức giá trung bình của các giao dịch bất động sản thành công trong 06 tháng gần nhất.", "B": "Bồi thường bằng việc giao đất có cùng mục đích sử dụng với loại đất thu hồi; nếu không có đất thì bồi thường bằng tiền theo giá đất cụ thể hoặc bằng đất khác mục đích/nhà ở.", "C": "Chỉ thực hiện bồi thường đối với diện tích đất đã được cấp Giấy chứng nhận quyền sử dụng đất, các loại đất khác không được xem xét bồi thường.", "D": "Áp dụng giá đất trong Bảng giá đất hằng năm nhân với hệ số điều chỉnh (K) tại thời điểm ban hành thông báo thu hồi đất để tính tiền bồi thường."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 91 Luật Đất đai 2024: \"Việc bồi thường về đất được thực hiện bằng việc giao đất có cùng mục đích sử dụng với loại đất thu hồi; trường hợp không có đất để bồi thường thì được bồi thường bằng tiền theo giá đất cụ thể của loại đất thu hồi tại thời điểm phê duyệt phương án bồi thường, hỗ trợ, tái định cư. Trường hợp người có đất thu hồi có nhu cầu bồi thường bằng đất khác mục đích sử dụng với loại đất thu hồi hoặc bằng nhà ở mà địa phương có điều kiện về quỹ đất, quỹ nhà ở thì được xem xét bồi thường bằng đất khác mục đích sử dụng hoặc bằng nhà ở.\""}, {"level": "1", "content": "Theo quy định tại Điều 108 Luật Đất đai 2024 và Nghị định 88/2024/NĐ-CP, loại hình nào sau đây KHÔNG thuộc các chính sách hỗ trợ chính yếu khi Nhà nước thu hồi đất?", "options": {"A": "Hỗ trợ ổn định đời sống; hỗ trợ ổn định sản xuất, kinh doanh.", "B": "Hỗ trợ kinh phí mua sắm phương tiện giao thông cá nhân (xe máy, ô tô) để thay đổi phương thức đi lại.", "C": "Hỗ trợ đào tạo, chuyển đổi nghề và tìm kiếm việc làm cho người trực tiếp sản xuất nông nghiệp hoặc hộ kinh doanh.", "D": "Hỗ trợ tái định cư đối với trường hợp hộ gia đình, cá nhân, người gốc Việt Nam định cư ở nước ngoài tự lo chỗ ở."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 108 Luật Đất đai 2024: \"1. Các khoản hỗ trợ khi Nhà nước thu hồi đất bao gồm: a) Hỗ trợ ổn định đời sống; b) Hỗ trợ ổn định sản xuất, kinh doanh; c) Hỗ trợ đào tạo, chuyển đổi nghề và tìm kiếm việc làm... d) Hỗ trợ tái định cư đối với trường hợp quy định tại khoản 8 Điều 111 của Luật này; đ) Hỗ trợ tháo dỡ, di chuyển phần mộ...\".   Khác với bồi thường về đất (tính theo m2), hỗ trợ tập trung vào con người. Ví dụ: Hỗ trợ ổn định đời sống thường tính theo nhân khẩu và số tháng (tương đương giá gạo tại địa phương) để đảm bảo dân không bị đói trong giai đoạn đầu chuyển đến nơi ở mới. Ngoài các khoản cứng của Trung ương, Luật cho phép UBND cấp tỉnh căn cứ vào tình hình thực tế để quyết định các loại hỗ trợ khác. Tuy nhiên, các hỗ trợ này phải nhằm mục đích đảm bảo chỗ ở, ổn định đời sống, sản xuất cho người có đất thu hồi, chứ không bao gồm việc hỗ trợ mua sắm tài sản cá nhân như phương án B."}, {"level": "1", "content": "Theo quy định tại Điều 131 Luật Đất đai 2024, việc đăng ký đất đai được quy định như thế nào?", "options": {"A": "Là bắt buộc đối với người sử dụng đất và người được giao đất để quản lý.", "B": "Là tự nguyện, chỉ thực hiện khi người sử dụng đất có nhu cầu cấp Giấy chứng nhận.", "C": "Chỉ bắt buộc đối với các tổ chức kinh tế, không bắt buộc đối với cá nhân, hộ gia đình.", "D": "Chỉ bắt buộc thực hiện đối với các loại đất phi nông nghiệp tại khu vực đô thị."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 và Khoản 2 Điều 131 Luật Đất đai 2024: \"1. Đăng ký đất đai là bắt buộc đối với người sử dụng đất và người được giao đất để quản lý.\" \"2. Đăng ký tài sản gắn liền với đất thực hiện theo yêu cầu của chủ sở hữu...\" Đăng ký đất đai (Bắt buộc) là công cụ để Nhà nước nắm chắc quỹ đất, biến động đất đai và thực hiện quyền đại diện chủ sở hữu. Ngay cả khi đất chưa đủ điều kiện cấp Giấy chứng nhận (Sổ đỏ), người dân vẫn phải đăng ký để Nhà nước đưa vào diện quản lý. Việc không đăng ký biến động khi có thay đổi (chuyển nhượng, tặng cho, thừa kế...) là vi phạm pháp luật. Đăng ký tài sản gắn liền với đất (theo yêu cầu): Khác với đất đai, các tài sản như nhà ở, công trình xây dựng, cây lâu năm... thuộc sở hữu tư nhân hoàn toàn. Việc đăng ký (để ghi nhận vào Sổ đỏ) là quyền lợi của chủ sở hữu nhằm bảo vệ tài sản và thuận tiện cho giao dịch, nhưng Nhà nước không bắt buộc."}, {"level": "1", "content": "Theo quy định tại Điều 133 Luật Đất đai 2024, hành vi nào sau đây người sử dụng đất KHÔNG phải thực hiện thủ tục đăng ký biến động tại cơ quan đăng ký đất đai?", "options": {"A": "Thay đổi thông tin về số định danh cá nhân hoặc địa chỉ của người sử dụng đất trên Giấy chứng nhận đã cấp.", "B": "Xây dựng các công trình tạm (hàng rào, chòi bảo vệ tạm thời) không làm thay đổi mục đích sử dụng đất và cấu trúc thửa đất.", "C": "Chuyển từ hình thức Nhà nước cho thuê đất thu tiền hàng năm sang thuê đất thu tiền một lần cho cả thời gian thuê.", "D": "Thay đổi quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất do chia tách, hợp nhất tổ chức hoặc chia tách, hợp nhất thửa đất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc đăng ký biến động được thực hiện đối với các trường hợp tại Khoản 1 Điều 133, bao gồm: Thay đổi tên, số định danh, địa chỉ (Điểm b). Thay đổi hình thức thanh toán tiền thuê đất (Điểm g). Chia tách, hợp nhất thửa đất (Điểm i). Riêng việc xây dựng hàng rào tạm hoặc các công trình phụ trợ không làm biến đổi thông tin trên hồ sơ địa chính thì không thuộc danh mục đăng ký biến động. Tuy nhiên, việc xây hàng rào (B) tuy không phải đăng ký biến động, nhưng môi giới cần kiểm tra xem hàng rào đó có đúng ranh giới trên sổ không. Một sai lệch nhỏ về ranh rào cũng có thể dẫn đến tranh chấp kéo dài sau khi bàn giao.   Ngoài ra, theo Nghị định 123/2024/NĐ-CP (về xử phạt vi phạm hành chính đất đai), việc chậm đăng ký biến động quá 30 ngày kể từ khi có thay đổi (như ký hợp đồng chuyển nhượng) có thể bị phạt tiền từ vài triệu đến hàng chục triệu đồng. Môi giới nên dùng thông tin này để nhắc nhở khách hàng chốt thủ tục nhanh chóng."}, {"level": "1", "content": "Theo quy định tại Khoản 21 Điều 3 và Điều 134 Luật Đất đai 2024, tên gọi thống nhất của loại giấy tờ chứng nhận quyền sử dụng đất và quyền sở hữu tài sản là gì?", "options": {"A": "Giấy chứng nhận quyền sử dụng đất và quyền sở hữu nhà ở.", "B": "Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất.", "C": "Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà và tài sản gắn liền với đất.", "D": "Sổ hồng quyền sử dụng đất và các tài sản đi kèm theo quy hoạch."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 21 Điều 3: \"Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất là chứng thư pháp lý để Nhà nước xác nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất hợp pháp của người có quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất.\".   Tên gọi mới bao hàm cả \"tài sản gắn liền với đất\" (nhà ở, công trình xây dựng, rừng sản xuất, cây lâu năm). Môi giới phải kiểm tra xem trên sổ (hoặc thông tin điện tử về sổ) đã ghi nhận tài sản chưa. Nếu khách mua muốn vay ngân hàng, việc tài sản đã được \"hoàn công\" (ghi nhận trên GCN) là điều kiện nên chú ý. Cần biết rằng mẫu sổ mới chỉ có 02 trang (thay vì 04 trang như trước đây) và tích hợp mã QR ở góc trên bên phải trang 1. Môi giới phải biết dùng điện thoại quét mã QR này để truy xuất nhanh thông tin về số thửa, tờ bản đồ và tình trạng ngăn chặn giao dịch ngay tại chỗ. Các mẫu sổ cũ vẫn còn giá trị sử dụng theo quy định chuyển tiếp (dù đã ngưng không cấp sổ theo các mẫu này)."}, {"level": "1", "content": "Theo quy định tại Điều 138 Luật Đất đai 2024, hộ gia đình, cá nhân đang sử dụng đất ổn định trước ngày 01/7/2014 mà không có các giấy tờ về quyền sử dụng đất, không có tranh chấp và được UBND cấp xã xác nhận thì có được cấp Giấy chứng nhận không?", "options": {"A": "Không được cấp dưới bất kỳ hình thức nào vì không có căn cứ chứng minh nguồn gốc đất.", "B": "Được xem xét cấp Giấy chứng nhận nếu đáp ứng các điều kiện về thời điểm sử dụng đất, quy hoạch và nghĩa vụ tài chính theo quy định tại Điều 138.", "C": "Chỉ được cấp nếu người sử dụng đất chứng minh được đã sử dụng đất từ trước ngày 15/10/1993.", "D": "Bắt buộc phải nộp tiền sử dụng đất bằng 100% giá thị trường tại thời điểm năm 2026 mới được xem xét.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật mô tả trường hợp Giấy chứng nhận quyền sử dụng đất (LURC) khi không có giấy tờ theo Điều 138. Điều 138 phân chia các mốc thời gian để xử lý \"đất không giấy\" như sau: Mốc 1: Sử dụng đất trước 15/10/1993. Mốc 2: Từ 15/10/1993 đến trước 01/7/2004. Mốc 3: Từ 01/7/2004 đến trước 01/7/2014. Chỉ cần đất không có tranh chấp, phù hợp quy hoạch và được xã xác nhận sử dụng ổn định, người dân sẽ được \"mở cửa\" để cấp sổ hồng."}, {"level": "1", "content": "Khoản thu nào sau đây KHÔNG phải là nguồn thu ngân sách nhà nước từ đất đai theo Điều 153 Luật Đất đai 2024?", "options": {"A": "Tiền sử dụng đất khi Nhà nước giao đất có thu tiền hoặc cho phép chuyển mục đích sử dụng đất.", "B": "Thuế thu nhập từ chuyển quyền sử dụng đất (thường gọi là thuế thu nhập cá nhân khi bán đất).", "C": "Lợi nhuận sau thuế từ hoạt động kinh doanh, môi giới bất động sản của các doanh nghiệp.", "D": "Tiền thuê đất khi Nhà nước cho thuê đất thu tiền hàng năm hoặc thu tiền một lần."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Hệ thống thu ngân sách từ đất đai bao gồm: (1) Tiền sử dụng đất, tiền thuê đất. (2) Thuế sử dụng đất (nông nghiệp & phi nông nghiệp). (3) Thuế thu nhập từ chuyển quyền sử dụng đất. (4) Tiền phạt vi phạm pháp luật về đất đai. (5) Phí và lệ phí trong quản lý, sử dụng đất đai. Riêng Lợi nhuận của doanh nghiệp (C) là đối tượng điều chỉnh của Luật Thuế thu nhập doanh nghiệp, không phải là khoản thu trực tiếp từ quyền quản lý đất đai của Nhà nước. Lợi nhuận kinh doanh của doanh nghiệp là thu nhập của doanh nghiệp và chịu thuế thu nhập doanh nghiệp, không phải là khoản thu trực tiếp vào ngân sách từ đất đai theo liệt kê tại Điều 153 Luật Đất đai 2024."}, {"level": "1", "content": "Theo quy định tại Điều 158 Luật Đất đai 2024, việc định giá đất của Nhà nước phải tuân thủ nguyên tắc cốt lõi nào sau đây để đảm bảo tính khách quan và minh bạch?", "options": {"A": "Định giá dựa trên khung giá tối đa và tối thiểu do Chính phủ ban hành định kỳ 05 năm.", "B": "Định giá theo nguyên tắc thị trường, đảm bảo tính độc lập và tuân thủ đúng phương pháp định giá.", "C": "Định giá dựa trên sự thỏa thuận trực tiếp giữa cơ quan thuế và người nộp thuế đất.", "D": "Định giá theo tổng chi phí đầu tư hạ tầng cộng với lợi nhuận định mức của chủ đầu tư."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 158: \"Việc định giá đất phải bảo đảm các nguyên tắc sau đây: a) Theo nguyên tắc thị trường; b) Tuân thủ đúng phương pháp, trình tự, thủ tục định giá đất; c) Bảo đảm trung thực, khách quan, công khai, minh bạch; d) Bảo đảm tính độc lập giữa tổ chức tư vấn định giá đất, Hội đồng thẩm định bảng giá đất, Hội đồng thẩm định giá đất cụ thể và cơ quan có thẩm quyền quyết định giá đất...\""}, {"level": "1", "content": "Theo quy định tại Điều 4 Nghị định 71/2024/NĐ-CP, phương pháp định giá đất nào được thực hiện bằng cách chia thu nhập ròng bình quân năm trên một diện tích đất cho lãi suất tiền gửi tiết kiệm bình quân năm?", "options": {"A": "Phương pháp so sánh.", "B": "Phương pháp thu nhập.", "C": "Phương pháp thặng dư.", "D": "Phương pháp hệ số điều chỉnh giá đất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 4: \"Phương pháp thu nhập được thực hiện bằng cách lấy thu nhập ròng bình quân năm trên một diện tích đất chia cho lãi suất tiền gửi tiết kiệm bình quân năm kỳ hạn 12 tháng tại các ngân hàng thương mại do Nhà nước nắm giữ trên 50% vốn điều lệ...\"."}, {"level": "1", "content": "So với Luật Đất đai 2013, điểm thay đổi mang tính đột phá nhất về cơ chế quản lý giá đất trong Luật Đất đai 2024 là việc bãi bỏ quy định nào sau đây?", "options": {"A": "Bảng giá đất do Ủy ban nhân dân cấp tỉnh ban hành hằng năm.", "B": "Các phương pháp định giá đất (So sánh, Thặng dư, Thu nhập).", "C": "Khung giá đất của Chính phủ (áp dụng định kỳ 05 năm một lần).", "D": "Việc xác định giá đất cụ thể cho các dự án thu hồi đất lớn."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật 2013: Chính phủ ban hành Khung giá đất 05 năm/lần. Địa phương không được ban hành giá đất ngoài khung này (thường dẫn đến giá Nhà nước thấp hơn thị trường rất nhiều). Luật 2024 (Điều 159): Bỏ khung giá đất. UBND cấp tỉnh căn cứ vào nguyên tắc thị trường để xây dựng Bảng giá đất, được điều chỉnh, sửa đổi, bổ sung hằng năm (áp dụng từ 01/01/2026).."}, {"level": "1", "content": "Theo quy định tại Khoản 3 Điều 159 Luật Đất đai 2024, kể từ ngày 01/01/2026, Bảng giá đất do Ủy ban nhân dân cấp tỉnh xây dựng và trình Hội đồng nhân dân cùng cấp quyết định được ban hành với tần suất như thế nào?", "options": {"A": "Định kỳ 05 năm một lần và điều chỉnh khi có biến động giá từ 20% trở lên.", "B": "Định kỳ 03 năm một lần để phù hợp với quy hoạch sử dụng đất cấp huyện.", "C": "Được ban hành hằng năm và công bố công khai để áp dụng từ ngày 01 tháng 01 của năm đó.", "D": "Chỉ ban hành một lần duy nhất và chỉ sửa đổi khi Nhà nước thay đổi mục đích sử dụng đất toàn vùng.."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 Điều 159: \"Ủy ban nhân dân cấp tỉnh xây dựng, trình Hội đồng nhân dân cùng cấp quyết định Bảng giá đất lần đầu để công bố và áp dụng từ ngày 01 tháng 01 năm 2026. Hằng năm, Ủy ban nhân dân cấp tỉnh có trách nhiệm trình Hội đồng nhân dân cùng cấp quyết định điều chỉnh, sửa đổi, bổ sung bảng giá đất để công bố và áp dụng từ ngày 01 tháng 01 của năm tiếp theo.\"."}, {"level": "1", "content": "Theo quy định tại Điều 160 Luật Đất đai 2024, trường hợp nào sau đây cơ quan nhà nước có thẩm quyền bắt buộc phải xác định Giá đất cụ thể (thông qua hội đồng thẩm định và phương pháp định giá chuyên sâu)?", "options": {"A": "Tính thuế thu nhập cá nhân khi chuyển nhượng bất động sản.", "B": "Tính tiền bồi thường về đất khi Nhà nước thu hồi đất vì lợi ích quốc gia, công cộng.", "C": "Tính lệ phí trước bạ khi người dân đi đăng ký biến động nhà đất.", "D": "Tính thuế sử dụng đất phi nông nghiệp hằng năm cho hộ gia đình."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 160 Luật Đất đai 2024, giá đất cụ thể được áp dụng cho các trường hợp mang tính \"biến động lớn\" hoặc \"quy mô dự án\", bao gồm: (1) Tính tiền bồi thường khi thu hồi đất (Khoản 1). (2) Tính tiền sử dụng đất khi giao đất, cho phép chuyển mục đích đối với các dự án lớn (vượt ngưỡng Bảng giá đất). (3) Tính tiền thuê đất trả tiền một lần cho cả thời gian thuê. (4) Giá khởi điểm để đấu giá quyền sử dụng đất (khi thửa đất đã được giải phóng mặt bằng). Các trường hợp còn lại (Thuế, Lệ phí trước bạ, Tiền thuê đất hằng năm) hiện nay chủ yếu căn cứ vào Bảng giá đất hằng năm để đảm bảo tính nhanh chóng, đại trà."}, {"level": "1", "content": "Theo quy định tại Điều 159 Luật Đất đai 2024, giá đất để tính thuế sử dụng đất phi nông nghiệp được xác định căn cứ vào đâu?", "options": {"A": "Giá đất cụ thể do cơ quan thuế phối hợp với đơn vị tư vấn định giá xác định tại thời điểm nộp thuế.", "B": "Bảng giá đất hằng năm do Ủy ban nhân dân cấp tỉnh ban hành và công bố.", "C": "Giá trị giao dịch thực tế ghi trên hợp đồng chuyển nhượng tại văn phòng công chứng.", "D": "Khung giá đất của Chính phủ ban hành định kỳ 05 năm một lần để đảm bảo tính ổn định."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật nêu rõ sự thay đổi căn cứ tính thuế sử dụng đất phi nông nghiệp theo Bảng giá đất hàng năm. Điểm a Khoản 1 Điều 159: \"Bảng giá đất được áp dụng cho các trường hợp sau đây: a) Tính thuế sử dụng đất phi nông nghiệp...\" Riêng đối với đất nông nghiệp, theo Nghị quyết được Quốc hội thông qua (có hiệu lực từ 01/01/2026), chính sách miễn thuế sử dụng đất nông nghiệp đã chính thức được kéo dài thêm 05 năm với đối tượng miễn thuế là hộ gia đình, cá nhân trực tiếp sản xuất nông nghiệp, hộ nghèo và các tổ chức kinh tế sử dụng đất nông nghiệp cho mục đích sản xuất. Thời hạn: Miễn thuế đất nông nghiệp đến hết ngày 31/12/2030."}, {"level": "1", "content": "Theo quy định tại Điều 163 Luật Đất đai 2024, Hệ thống thông tin quốc gia về đất đai được xây dựng tập trung, thống nhất từ trung ương đến địa phương bao gồm những thành phần cơ bản nào?", "options": {"A": "Bao gồm các bản đồ địa chính bằng giấy và hồ sơ lưu trữ tại Văn phòng đăng ký đất đai.", "B": "Hạ tầng kỹ thuật công nghệ thông tin; Phần mềm hệ thống, phần mềm ứng dụng và phần mềm dùng chung; Cơ sở dữ liệu quốc gia về đất đai.", "C": "Bao gồm Cổng dịch vụ công trực tuyến và các phần mềm quản lý văn bản hành chính của Bộ Tài nguyên và Môi trường.", "D": "Hệ thống các thiết bị đo đạc thực địa và các trạm quan trắc biến động đất đai trên toàn quốc.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 163: \"Thành phần của Hệ thống thông tin quốc gia về đất đai bao gồm: a) Hạ tầng kỹ thuật công nghệ thông tin; b) Phần mềm hệ thống, phần mềm ứng dụng và phần mềm dùng chung; c) Cơ sở dữ liệu quốc gia về đất đai.\""}, {"level": "1", "content": "Theo quy định tại Điều 233 Luật Đất đai 2024 và pháp luật về thanh tra, hoạt động thanh tra chuyên ngành đất đai được thực hiện dưới các hình thức nào?", "options": {"A": "Được tiến hành theo kế hoạch định kỳ hàng năm đã được phê duyệt và công bố từ đầu năm.", "B": "Tiến hành theo kế hoạch định kỳ hoặc thanh tra đột xuất khi có dấu hiệu vi phạm hoặc theo yêu cầu của cơ quan cấp trên.", "C": "Được tiến hành khi có đơn thư khiếu nại, tố cáo chính thức của công dân đã được xác minh.", "D": "Do Bộ Tài nguyên và Môi trường thực hiện định kỳ 05 năm một lần để phù hợp với quy hoạch sử dụng đất.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 233 Luật Đất đai 2024, hoạt động thanh tra được thực hiện theo quy định chung của pháp luật về thanh tra (Luật Thanh tra 2022): (1) Thanh tra theo kế hoạch: Được tiến hành theo kế hoạch đã được cơ quan nhà nước có thẩm quyền phê duyệt nhằm phòng ngừa vi phạm. (2) Thanh tra đột xuất: Được tiến hành khi phát hiện cơ quan, tổ chức, cá nhân có dấu hiệu vi phạm pháp luật; theo yêu cầu của việc giải quyết khiếu nại, tố cáo hoặc do Thủ trưởng cơ quan quản lý nhà nước giao.."}, {"level": "1", "content": "Theo quy định tại Nghị định 123/2024/NĐ-CP, ngoài việc bị phạt tiền, người có hành vi lấn, chiếm đất còn phải chịu biện pháp khắc phục hậu quả chủ yếu nào sau đây?", "options": {"A": "Buộc phải chuyển mục đích sử dụng đất sang loại đất đang lấn chiếm và nộp tiền sử dụng đất bổ sung.", "B": "Buộc khôi phục lại tình trạng ban đầu của đất trước khi vi phạm và trả lại đất đã lấn, chiếm.", "C": "Tịch thu vĩnh viễn toàn bộ diện tích đất đang sử dụng hợp pháp của người vi phạm để sung công quỹ.", "D": "Buộc phải bán lại diện tích đất lấn chiếm cho người sử dụng đất liền kề theo giá của Bảng giá đất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ vào quy định xử lý vi phạm pháp luật về đất đai tại Điều 239 Luật Đất đai 2024 và chi tiết tại Nghị định 123/2024/NĐ-CP: Hành vi lấn, chiếm đất là việc sử dụng đất mà không được cơ quan nhà nước có thẩm quyền cho phép hoặc việc sử dụng đất vượt ranh giới đã được cấp phép. Biện pháp bắt buộc: Ngoài phạt tiền (có thể lên tới 1 tỷ đồng đối với tổ chức), biện pháp \"khắc phục hậu quả\" là không thể thương lượng. Người vi phạm buộc phải tháo dỡ công trình, di dời tài sản để trả lại hiện trạng đất trống như ban đầu cho Nhà nước hoặc cho người sử dụng đất hợp pháp bị lấn chiếm. Nghĩa vụ tài chính: Ngoài ra, người vi phạm còn bị buộc nộp lại số lợi bất hợp pháp có được do hành vi vi phạm trong suốt thời gian lấn chiếm.."}, {"level": "1", "content": "Theo quy định tại Điều 235 Luật Đất đai 2024, đối với tranh chấp đất đai mà các bên không tự hòa giải được, thủ tục nào sau đây là bắt buộc phải thực hiện tại Ủy ban nhân dân cấp xã nơi có đất trước khi yêu cầu cơ quan có thẩm quyền giải quyết?", "options": {"A": "Nộp đơn khởi kiện trực tiếp lên Tòa án nhân dân cấp có thẩm quyền để thụ lý vụ án.", "B": "Thực hiện thủ tục thanh tra toàn diện nguồn gốc đất và nghĩa vụ tài chính của các bên.", "C": "Hòa giải tại Ủy ban nhân dân cấp xã nơi có đất để lập biên bản hòa giải thành hoặc hòa giải không thành.", "D": "Xin cấp mới Giấy chứng nhận quyền sử dụng đất để xác định ranh giới pháp lý cuối cùng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Quy trình hòa giải được quy định tại điều 235 như sau: Tính bắt buộc (Khoản 2 & 3): Tranh chấp đất đai mà các bên tranh chấp không tự hòa giải được thì gửi đơn đến Ủy ban nhân dân cấp xã nơi có đất để hòa giải. Đây là thủ tục tiền tố bắt buộc đối với tranh chấp về việc \"Ai là người có quyền sử dụng đất\". Thời hạn thực hiện: Việc hòa giải tại UBND cấp xã phải được thực hiện trong thời hạn không quá 30 ngày kể từ ngày nhận được đơn (Khoản 4). Kết quả: Phải lập biên bản hòa giải (thành hoặc không thành) có chữ ký của các bên và xác nhận của UBND cấp xã. Đây là \"giấy thông hành\" để các bên có thể tiếp tục đưa vụ việc ra Tòa án hoặc UBND cấp trên.. Theo Khoản 1 Điều 235 Luật Đất đai 2024, Nhà nước không bắt buộc mà cực kỳ khuyến khích các bên tranh chấp thực hiện hòa giải ở 2 cấp độ \"mềm\" sau: (1) Tự hòa giải: Các bên tự thương lượng với nhau. (2) Hòa giải ở cơ sở: Thực hiện tại thôn, làng, ấp, bản, buôn, phum, sóc, tổ dân phố... thông qua các hòa giải viên cơ sở (những người có uy tín trong cộng đồng). Lý do khuyến khích ở cấp độ này là giúp giải quyết mâu thuẫn một cách tình cảm, nhanh chóng, không tốn kém chi phí và đặc biệt là không làm đóng băng bất động sản trên hệ thống quản lý của Nhà nước, giúp giao dịch vẫn có thể tiếp tục nếu các bên đạt được thỏa thuận."}, {"level": "1", "content": "Việc Luật Đất đai 2024 không còn quy định \"Hộ gia đình\" là đối tượng được Nhà nước giao đất, cho thuê đất, công nhận quyền sử dụng đất mới (trừ một số trường hợp đặc thù) có ý nghĩa như thế nào đối với các Giấy chứng nhận đã cấp cho hộ gia đình trước ngày 01/08/2024?", "options": {"A": "Các Giấy chứng nhận cấp cho \"Hộ gia đình\" sẽ mặc nhiên hết hiệu lực và phải thực hiện thủ tục đổi sang tên cá nhân chủ hộ trước khi giao dịch.", "B": "Các Giấy chứng nhận này vẫn có giá trị pháp lý và người sử dụng đất tiếp tục được thực hiện các quyền theo quy định; khi có nhu cầu thì được cấp đổi sang mẫu mới.", "C": "Mọi quyền quyết định đối với tài sản này sẽ thuộc về người đứng tên chủ hộ trên sổ hộ khẩu tại thời điểm thực hiện giao dịch năm 2026.", "D": "Nhà nước sẽ tự động cập nhật tên tất cả các thành viên trong hộ vào cơ sở dữ liệu quốc gia và xóa bỏ hoàn toàn khái niệm \"Hộ gia đình\" trên sổ gốc."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật quy định rõ các Giấy chứng nhận đã cấp cho hộ gia đình vẫn có giá trị, việc xác định theo thành viên cá nhân áp dụng cho giao dịch hoặc công nhận quyền sử dụng đất mới sau ngày luật có hiệu lực. Cụ thể: Khoản 1 Điều 259: \"Hộ gia đình sử dụng đất được xác lập quyền sử dụng đất trước ngày Luật này có hiệu lực thi hành thì được tiếp tục sử dụng đất, thực hiện các quyền và nghĩa vụ theo quy định của Luật này.\" Khoản 2 Điều 259: \"Khi thực hiện các giao dịch về quyền sử dụng đất thì xác định các thành viên có quyền sử dụng đất của hộ gia đình tại thời điểm được Nhà nước giao đất, cho thuê đất, công nhận quyền sử dụng đất...\""}, {"level": "1", "content": "Theo quy định tại Điều 9 Luật Đất đai 2024 và hướng dẫn tại Nghị định 102/2024/NĐ-CP, loại hình \"Đất chăn nuôi tập trung\" được xác định dựa trên yếu tố cốt lõi nào sau đây?", "options": {"A": "Là đất nằm cách xa khu dân cư tối thiểu 500m để đảm bảo vệ sinh môi trường.", "B": "Là đất được sử dụng để xây dựng trang trại chăn nuôi quy mô lớn theo quy định của pháp luật về chăn nuôi.", "C": "Là đất nông nghiệp có diện tích từ 01 héc-ta trở lên và có nguồn nước ổn định.", "D": "Là đất được Nhà nước giao cho các hộ gia đình để chăn nuôi gia súc, gia cầm phục vụ nhu cầu tại chỗ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 9 Luật Đất đai 2024: Đưa đất chăn nuôi tập trung thành một loại đất độc lập trong nhóm đất nông nghiệp (trước đây thường gộp chung vào đất nông nghiệp khác). Điểm đ Khoản 1 Điều 4 Nghị định 102/2024/NĐ-CP: Xác định cụ thể: \"Đất chăn nuôi tập trung là đất xây dựng trang trại chăn nuôi tại địa điểm tập trung theo quy định của pháp luật về chăn nuôi để chăn nuôi quy mô lớn...\".   Sự chuyển dịch này giúp việc quản lý đất đai không còn chồng chéo với quản lý chuyên ngành. Môi giới viên cần nắm vững định nghĩa này để phân biệt giữa một \"lô đất vườn\" thông thường và một \"bất động sản công nghiệp nông nghiệp\". Khi chào bán một khu đất để làm trang trại, môi giới phải kiểm tra Quy hoạch sử dụng đất. Nếu khu đất đó không được quy hoạch là \"Đất chăn nuôi tập trung\" (DCH), khách hàng sẽ rất khó xin được giấy phép xây dựng trang trại quy mô lớn, dù diện tích có rộng hàng chục héc-ta."}, {"level": "1", "content": "Theo quy định tại Điều 60 Luật Đất đai 2024, nguyên tắc nào sau đây được nhấn mạnh nhằm đảm bảo quyền lợi của người dân và tính khả thi của quy hoạch, kế hoạch sử dụng đất?", "options": {"A": "Ưu tiên cho việc chuyển đổi đất nông nghiệp sang đất công nghiệp để thu hút vốn FDI.", "B": "Thực hiện lấy ý kiến đối của người dân đối với các dự án quy mô từ 1.000 tỷ đồng trở lên.", "C": "Đảm bảo tính thống nhất, đồng bộ; tăng cường công khai, minh bạch và sự tham gia của tổ chức, cộng đồng, cá nhân.", "D": "Giữ nguyên trạng ranh giới các thửa đất trong chu kỳ quy hoạch 10 năm để tránh xáo trộn thị trường."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nguyên tắc này được quy định cụ thể tại Khoản 10 Điều 60: \"Bảo đảm sự tham gia của tổ chức, cộng đồng, cá nhân; bảo đảm tính công khai, minh bạch trong quá trình lập quy hoạch, kế hoạch sử dụng đất; bảo đảm quyền tham gia giám sát của Mặt trận Tổ quốc Việt Nam...\" Ngoài ra, Điều 75 còn quy định rất khắt khe về việc phải công bố quy hoạch trên cổng thông tin điện tử của cơ quan nhà nước và tại trụ sở UBND cấp xã chậm nhất là 15 ngày kể từ khi được phê duyệt."}, {"level": "1", "content": "Theo quy định tại Điều 27 Luật Đất đai 2024, trường hợp nhóm người sử dụng đất có chung quyền sử dụng đất (như đồng thừa kế, chung vốn mua đất) mà không phân chia được theo phần, khi thực hiện quyền chuyển nhượng thì phải đảm bảo điều kiện gì?", "options": {"A": "Cần có người đứng tên đại diện trên Giấy chứng nhận đồng ý và ký tên vào hợp đồng chuyển nhượng.", "B": "Phải được sự đồng ý bằng văn bản của tất cả các thành viên trong nhóm hoặc tất cả các thành viên phải cùng ký tên vào hợp đồng; trường hợp ủy quyền thì phải có văn bản ủy quyền hợp lệ.", "C": "Cần đa số thành viên (trên 50%) đồng ý bằng văn bản là đủ điều kiện thực hiện chuyển nhượng.", "D": "Bắt buộc phải thực hiện thủ tục tách thửa, phân chia diện tích cụ thể cho từng người trước khi chuyển nhượng cho bên thứ ba.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> quy định về nhóm người sử dụng đất được nêu rất rõ tại Khoản 2 Điều 27: \"Trường hợp nhóm người sử dụng đất gồm cá nhân, hộ gia đình mà quyền sử dụng đất của các thành viên trong nhóm không phân chia được theo phần thì thực hiện quyền và nghĩa vụ thông qua người đại diện theo ủy quyền hoặc theo thỏa thuận của các thành viên trong nhóm.\" Đồng thời, khi công chứng hợp đồng, công chứng viên sẽ căn cứ vào Bộ luật Dân sự 2015 về sở hữu chung hợp nhất để yêu cầu sự có mặt của tất cả các bên. Với loại hình đất này, môi giới viên phải đóng vai trò là \"người kiểm soát rủi ro\" ngay từ bước nhận ký gửi: Kiểm tra danh sách chủ sở hữu ngay khi cầm cuốn sổ có ghi dòng chữ \"Cùng sử dụng đất với ông/bà...\" hoặc sổ cấp cho một người nhưng nguồn gốc là thừa kế chưa chia, môi giới phải hỏi ngay: \"Có tổng cộng bao nhiêu người chung quyền? Tất cả có đồng thuận bán với mức giá này không?\"."}, {"level": "1", "content": "Theo quy định tại Điều 27 Luật Đất đai 2024, loại hợp đồng nào sau đây KHÔNG bắt buộc phải công chứng hoặc chứng thực, trừ khi các bên tham gia giao dịch có yêu cầu?", "options": {"A": "Hợp đồng chuyển nhượng, tặng cho, thế chấp, góp vốn bằng quyền sử dụng đất giữa cá nhân với cá nhân.", "B": "Hợp đồng chuyển quyền sử dụng đất của hộ gia đình cho cá nhân.", "C": "Hợp đồng cho thuê, cho thuê lại quyền sử dụng đất, quyền sử dụng đất và tài sản gắn liền với đất.", "D": "Văn bản về thừa kế quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất theo quy định pháp luật dân sự."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 27 Luật Đất đai 2024, hình thức hợp đồng thực hiện quyền của người sử dụng đất được quy định như sau: Bắt buộc công chứng/chứng thực (Khoản 3 Điểm a): Áp dụng cho các hợp đồng mang tính chất xác lập hoặc chuyển giao quyền sở hữu/sử dụng lâu dài như: Chuyển nhượng, tặng cho, thế chấp, góp vốn. Tự nguyện công chứng/chứng thực (Khoản 3 Điểm b): \"Hợp đồng cho thuê, cho thuê lại quyền sử dụng đất, quyền sử dụng đất và tài sản gắn liền với đất... được công chứng hoặc chứng thực theo yêu cầu của các bên.\" Trường hợp đặc biệt: Nếu một bên là tổ chức kinh doanh bất động sản, thì việc chuyển nhượng, góp vốn cũng có thể không cần công chứng nếu các bên không yêu cầu (vì tổ chức này đã chịu sự quản lý chuyên ngành khác).."}, {"level": "1", "content": "Theo quy định tại Điều 31 và Điều 190 Luật Đất đai 2024, nghĩa vụ \"Sử dụng đất đúng quy định về sử dụng không gian dưới lòng đất và trên không\" đặc biệt quan trọng và mang tính quyết định đối với loại hình bất động sản nào sau đây?", "options": {"A": "Đất nông nghiệp thuộc khu vực quy hoạch trồng lúa nước.", "B": "Các dự án xây dựng công trình ngầm (bãi đỗ xe ngầm, trung tâm thương mại ngầm), nhà cao tầng và các tuyến đường sắt đô thị trên cao.", "C": "Đất rừng đặc dụng và đất rừng phòng hộ tại khu vực biên giới, hải đảo.", "D": "Đất sản xuất muối và đất nuôi trồng thủy sản ven biển."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nghĩa vụ này liên quan trực tiếp đến việc quản lý và khai thác không gian đa chiều, đặc biệt quan trọng trong phát triển đô thị hiện đại. Luật 2024 đã tách bạch quyền sử dụng đất trên bề mặt và quyền sử dụng không gian: Điều 190: Quy định về hoạt động lấn biển, nhưng cũng đặt nền móng cho việc quản lý không gian. Điều 216: Quy định về việc cấp Giấy chứng nhận cho công trình xây dựng ngầm. Điểm mới là Nhà nước có thể giao đất hoặc cho thuê đất để xây dựng công trình ngầm mà không nhất thiết phải trùng với người sử dụng đất trên bề mặt. Nghị định 102/2024/NĐ-CP: Chi tiết hóa việc xác định tọa độ, độ sâu và độ cao của khối không gian được cấp quyền sử dụng."}, {"level": "1", "content": "Theo quy định của pháp luật về đất đai, việc Nhà nước yêu cầu người được giao đất, cho thuê đất để thực hiện dự án đầu tư phải có năng lực tài chính nhằm mục đích chính là gì?", "options": {"A": "Để đảm bảo người sử dụng đất nộp đầy đủ các loại thuế, phí và tiền sử dụng đất ngay tại thời điểm giao đất.", "B": "Để đảm bảo chủ đầu tư có đủ nguồn vốn thực hiện dự án đúng tiến độ, tránh tình trạng dự án \"treo\", lãng phí nguồn lực đất đai.", "C": "Để cơ quan nhà nước tính toán các mức miễn, giảm tiền sử dụng đất cho doanh nghiệp trong giai đoạn ưu đãi đầu tư.", "D": "Để làm căn cứ xác định thời hạn giao đất ngắn hay dài dựa trên quy mô vốn của chủ đầu tư."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 122 Luật Đất đai 2024: Điều kiện giao đất, cho thuê đất, cho phép chuyển mục đích sử dụng đất để thực hiện dự án đầu tư bao gồm: (1) Vốn chủ sở hữu: Phải có vốn chủ sở hữu để thực hiện dự án (thường không thấp hơn 20% tổng mức đầu tư đối với dự án dưới 20 ha và không thấp hơn 15% đối với dự án từ 20 ha trở lên theo quy định của Luật Kinh doanh bđs). (2) Khả năng huy động vốn: Phải có khả năng huy động vốn để thực hiện dự án từ các tổ chức tín dụng, chi nhánh ngân hàng nước ngoài. (3) Ký quỹ: Thực hiện ký quỹ hoặc các hình thức bảo đảm khác theo quy định của pháp luật về đầu tư."}, {"level": "1", "content": "Theo quy định tại Điều 118 Luật Đất đai 2024, trường hợp nào sau đây được Nhà nước giao đất KHÔNG thu tiền sử dụng đất?", "options": {"A": "Tổ chức kinh tế được giao đất để thực hiện dự án đầu tư xây dựng nhà ở thương mại để bán hoặc để bán kết hợp cho thuê.", "B": "Cá nhân được Nhà nước giao đất ở thông qua việc đấu giá quyền sử dụng đất hoặc giao đất tái định cư.", "C": "Đất xây dựng trụ sở cơ quan nhà nước, trụ sở của Mặt trận Tổ quốc Việt Nam, tổ chức chính trị - xã hội và đất quốc phòng, an ninh.", "D": "Doanh nghiệp có vốn đầu tư nước ngoài thuê đất để xây dựng hạ tầng khu công nghiệp, cụm công nghiệp."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 118 liệt kê các trường hợp giao đất không thu tiền, bao gồm đất trụ sở cơ quan. Cụ thể nhà nước giao đất không thu tiền sử dụng đất cho các đối tượng phục vụ mục đích công cộng, an sinh hoặc an ninh quốc gia, bao gồm: (1) Cá nhân trực tiếp sản xuất nông nghiệp: Được giao đất nông nghiệp trong hạn mức. (2) Xây dựng trụ sở: Cơ quan nhà nước, đơn vị vũ trang nhân dân (quốc phòng, an ninh). (3) Đất công cộng không nhằm mục đích kinh doanh: Đất giao thông, thủy lợi, công viên, khu vui chơi... (4) Đất tín ngưỡng, đất tôn giáo: Trừ trường hợp sử dụng vào mục đích kinh doanh, dịch vụ. (5) Đất nghĩa trang, nhà tang lễ, cơ sở hỏa táng: Không nhằm mục đích kinh doanh."}, {"level": "1", "content": "Theo quy định tại Điều 125 Luật Đất đai 2024, trường hợp đất được đưa ra đấu giá quyền sử dụng đất để thực hiện dự án nhà ở cho cá nhân, hộ gia đình thì phải đáp ứng điều kiện nào về hạ tầng kỹ thuật?", "options": {"A": "Không bắt buộc phải có hạ tầng, người trúng đấu giá sẽ tự liên hệ các cơ quan chức năng để đấu nối điện, nước sau khi xây dựng.", "B": "Phải hoàn thành việc đầu tư xây dựng hạ tầng kỹ thuật theo quy hoạch chi tiết (đường giao thông, hệ thống cấp thoát nước, điện lưới, thông tin liên lạc).", "C": "Chỉ cần có đường mòn vào khu đất và đã thực hiện xong việc cắm mốc ranh giới giữa các thửa đất trên thực địa.", "D": "Phải hoàn thiện toàn bộ hạ tầng xã hội bao gồm trường học, trạm y tế và công viên cây xanh trong bán kính 500m."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đất đưa ra đấu giá phải đáp ứng các điều kiện khắt khe tại Khoản 2 Điều 125: (1) Đất đã được thu hồi và hoàn thành giải phóng mặt bằng. (2) Có quy hoạch chi tiết 1/500 được phê duyệt (đối với dự án nhà ở). Đặc biệt: \"Đã hoàn thành việc đầu tư xây dựng hạ tầng kỹ thuật theo quy hoạch chi tiết được phê duyệt đối với trường hợp đấu giá quyền sử dụng đất để thực hiện dự án đầu tư xây dựng nhà ở.\"."}, {"level": "1", "content": "Theo quy định tại Điều 91 Luật Đất đai 2024, khi Nhà nước thu hồi đất, việc bồi thường bằng việc giao đất có cùng mục đích sử dụng với loại đất thu hồi được ưu tiên áp dụng nhằm mục đích chính là gì?", "options": {"A": "Để giảm áp lực chi ngân sách tiền mặt của địa phương trong bối cảnh bảng giá đất tăng cao.", "B": "Để đảm bảo người bị thu hồi đất có điều kiện tiếp tục sản xuất, ổn định cuộc sống và duy trì sinh kế tương tự như trước khi bị thu hồi.", "C": "Để khuyến khích người dân tự nguyện bàn giao mặt bằng sớm nhằm nhận được các vị trí đất có giá trị thương mại cao hơn.", "D": "Để Nhà nước dễ dàng quản lý quỹ đất công ích thông qua việc hoán đổi các vị trí đất nhỏ lẻ lấy các khu vực đất tập trung."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là nguyên tắc thể hiện sự quan tâm đến việc duy trì sinh kế cho người bị thu hồi đất. Thứ tự ưu tiên bồi thường được quy định tại Khoản 2 Điều 91: Ưu tiên 1: Bồi thường bằng đất có cùng mục đích sử dụng với loại đất thu hồi. Ưu tiên 2: Nếu không có đất cùng mục đích sử dụng thì bồi thường bằng đất khác mục đích sử dụng hoặc bằng nhà ở (nếu người dân có nhu cầu và địa phương có quỹ đất/nhà). Ưu tiên 3: Nếu không thể bồi thường bằng đất/nhà thì mới bồi thường bằng tiền theo giá đất cụ thể."}, {"level": "1", "content": "Tại sao quy định \"Việc phê duyệt phương án bồi thường, hỗ trợ, tái định cư và việc bố trí tái định cư phải được hoàn thành trước khi có quyết định thu hồi đất\" (theo Điều 91 Luật Đất đai 2024) lại được coi là một điểm tiến bộ quan trọng trong công tác giải phóng mặt bằng?", "options": {"A": "Nhằm tối ưu hóa nguồn lực tài chính của Nhà nước bằng cách giảm số tiền bồi thường phải trả cho người dân.", "B": "Để rút ngắn tối đa các thủ tục hành chính, giúp các dự án hạ tầng có thể khởi công ngay mà không cần lấy ý kiến cộng đồng.", "C": "Đảm bảo người dân có chỗ ở mới ổn định và phương án hỗ trợ sinh kế rõ ràng trước khi phải bàn giao đất, giúp giảm thiểu xung đột xã hội và đảm bảo an sinh bền vững.", "D": "Để Nhà nước có căn cứ áp dụng giá đất cũ từ thời điểm lập phương án, tránh việc phải cập nhật bảng giá đất mới hàng năm."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đây là thay đổi nhằm bảo vệ tốt hơn quyền lợi người bị thu hồi, đảm bảo họ có phương án ổn định cuộc sống trước khi bàn giao đất.  Quy định này thiết lập một trình tự chặt chẽ để thực hiện nguyên tắc \"Tái định cư đi trước một bước\": Khoản 3 Điều 91: \"Việc phê duyệt phương án bồi thường, hỗ

o dịch thương mại quy mô lớn."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Việc không bắt buộc công chứng (trừ giao dịch giữa cá nhân với nhau) có thể nhằm giảm bớt một bước thủ tục hành chính cho các giao dịch mang tính thương mại, chuyên nghiệp giữa doanh nghiệp kinh doanh bất động sản và khách hàng, dù các bên vẫn có quyền thỏa thuận công chứng.  CĐT còn bị ràng buộc bởi các quy định khắt khe hơn về Hợp đồng mẫu (CĐT bắt buộc phải sử dụng hợp đồng theo mẫu quy định của Chính phủ (Nghị định 96/2024/NĐ-CP, phải đăng ký với cơ quan bảo vệ quyền lợi người tiêu dùng) và Bảo lãnh ngân hàng. Việc không công chứng là để giảm thủ tục, không phải giảm trách nhiệm."}, {"level": "1", "content": "Quyền sử dụng đất đã có hạ tầng kỹ thuật trong dự án bất động sản chỉ được đưa vào kinh doanh khi:", "options": {"A": "Chủ đầu tư đã hoàn tất việc xây dựng phần thô của toàn bộ các công trình nhà ở trên các lô đất tiếp giáp trục đường chính và có biên bản bàn giao hạ tầng xã hội cho địa phương.", "B": "Các công trình hạ tầng kỹ thuật thiết yếu đã được nghiệm thu theo pháp luật xây dựng và chủ đầu tư đã nhận được văn bản của cơ quan chuyên môn về xây dựng cấp tỉnh thông báo đủ điều kiện đưa vào kinh doanh.", "C": "Dự án đã được cấp Giấy chứng nhận quyền sử dụng đất cho từng lô đất riêng biệt và chủ đầu tư đã thực hiện ký quỹ bảo lãnh nghĩa vụ bàn giao tại một tổ chức tín dụng hoạt động tại Việt Nam.", "D": "Toàn bộ hệ thống hạ tầng kỹ thuật và hạ tầng xã hội của dự án đã hoàn thành công tác hoàn công, đồng thời chủ đầu tư đã nộp đủ 100% tiền sử dụng đất theo bảng giá đất sát giá thị trường."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Cơ sở pháp lý: Điều 31 Luật Kinh doanh bđs 2023. Điều kiện cốt lõi là hạ tầng phải hoàn thành và được nghiệm thu, cùng với các điều kiện pháp lý khác về đất đai, quy hoạch."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, trường hợp một cá nhân đã được cấp Chứng chỉ hành nghề môi giới nhưng thực hiện hoạt động môi giới dưới danh nghĩa một doanh nghiệp không đăng ký ngành nghề kinh doanh dịch vụ môi giới bất động sản thì hành vi này được xác định như thế nào?", "options": {"A": "Được coi là hoạt động hợp pháp dựa trên nguyên tắc ưu tiên năng lực chuyên môn của cá nhân đã được Nhà nước cấp chứng chỉ, doanh nghiệp chỉ đóng vai trò hỗ trợ cơ sở vật chất.", "B": "Được xác lập là quan hệ ủy quyền dân sự thuần túy, trong đó trách nhiệm pháp lý về tính trung thực của thông tin bất động sản thuộc về cá nhân và không yêu cầu điều kiện đăng ký kinh doanh của tổ chức.", "C": "Được coi là hành vi vi phạm quy định về điều kiện hành nghề môi giới bất động sản, do cá nhân bắt buộc phải hành nghề trong doanh nghiệp kinh doanh dịch vụ bất động sản hợp pháp.", "D": "Chỉ xác lập lỗi vi phạm đối với doanh nghiệp về việc kinh doanh không đúng ngành nghề đăng ký; riêng cá nhân không bị coi là vi phạm do đã đáp ứng tiêu chuẩn về chứng chỉ hành nghề theo luật định."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Hành vi này vi phạm đồng thời hai tầng kiểm soát: Đối với cá nhân: Vi phạm nghĩa vụ phải hành nghề \"trong\" một doanh nghiệp dịch vụ chuyên biệt (Khoản 2, Điều 61). Đối với tổ chức: Vi phạm điều kiện kinh doanh dịch vụ bất động sản khi chưa đáp ứng các yêu cầu về thành lập và đăng ký ngành nghề chuyên doanh (Điều 9). Việc quy định này nhằm đảm bảo mọi giao dịch môi giới đều được kiểm soát bởi một pháp nhân có trách nhiệm giải trình và có đầy đủ điều kiện hoạt động theo quy định của Bộ Xây dựng."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, việc xây dựng và cập nhật các \"Số liệu điều tra, thống kê về nhà ở\" và \"Số liệu cấp giấy chứng nhận\" vào Hệ thống thông tin về nhà ở và thị trường bất động sản quốc gia nhằm mục đích chính nào sau đây?", "options": {"A": "Phục vụ công tác hậu kiểm và thanh tra chuyên ngành về việc chấp hành quy chuẩn xây dựng, đồng thời làm căn cứ xếp hạng năng lực cạnh tranh cấp tỉnh (PCI) trong lĩnh vực đô thị.", "B": "Thiết lập danh mục kiểm kê tài sản chi tiết của từng hộ gia đình làm cơ sở trực tiếp cho việc triển khai các sắc thuế mới đối với cá nhân sở hữu nhiều nhà ở và đất ở từ năm 2026.", "C": "Cung cấp thông số kỹ thuật và chỉ tiêu dân số thực tế cho việc lập quy hoạch chi tiết 1/500 và xác định hạn mức giao đất ở cho các dự án nhà ở thương mại tại địa phương.", "D": "Cung cấp cơ sở dữ liệu định lượng về thực trạng nhà ở và diễn biến thị trường, làm căn cứ hoạch định chính sách phát triển kinh tế - xã hội và điều tiết thị trường bất động sản."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 72 và 75 Luật Kinh doanh bđs 2023. Các số liệu thống kê tổng hợp giúp Nhà nước nắm bắt thực trạng thị trường, hiệu quả quản lý và đưa ra các chính sách vĩ mô phù hợp.   Trong kinh tế học bất động sản, thị trường thường xuyên rơi vào tình trạng \"Thông tin bất đối xứng\" (Asymmetric Information). Hệ thống thông tin này được thiết lập nhằm mục đích: Xóa bỏ vùng tối thị trường: Số liệu về cấp Giấy chứng nhận và số liệu điều tra nhà ở giúp Nhà nước đo lường được Tỷ lệ hấp thụ (Absorption Rate) và Nguồn cung tồn kho (Inventory) thực tế. Công cụ điều tiết vĩ mô: Dựa trên các con số này, Chính phủ có thể quyết định nới lỏng hoặc thắt chặt tín dụng vào bất động sản, hoặc điều chỉnh Bảng giá đất hàng năm sát với diễn biến thực của thị trường (theo nguyên tắc của Luật Đất đai 2024). Hoạch định chính sách: Không thể có một chiến lược phát triển nhà ở xã hội hay nhà ở giá rẻ hiệu quả nếu không biết chính xác tổng quỹ nhà hiện hữu và nhu cầu thực tế của từng địa phương."}, {"level": "1", "content": "Thời hạn tối thiểu mà sàn giao dịch bất động sản phải đảm bảo về địa điểm hoạt động (ví dụ: hợp đồng thuê địa điểm) theo Nghị định 96/2024/NĐ-CP là bao lâu?", "options": {"A": "03 tháng", "B": "06 tháng", "C": "12 tháng", "D": "24 tháng"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nghị định 96/2024/NĐ-CP yêu cầu sàn phải có địa điểm hoạt động ổn định với thời hạn thuê hoặc quyền sử dụng địa điểm tối thiểu 01 năm."}, {"level": "1", "content": "Luật Kinh doanh bất động sản 2023 quy định các hành vi bị cấm liên quan đến việc thu và sử dụng tiền của khách hàng mua bất động sản hình thành trong tương lai nhằm giải quyết vấn đề gì tồn tại trước đây?", "options": {"A": "Tình trạng chủ đầu tư bán bất động sản với giá quá cao.", "B": "Tình trạng chủ đầu tư huy động vốn trái phép hoặc sử dụng vốn huy động không đúng mục đích, gây rủi ro cho khách hàng và dự án.", "C": "Rủi ro vi phạm nghĩa vụ thanh toán của bên mua khi thị trường biến động, dẫn đến việc chủ đầu tư thiếu hụt nguồn kinh phí để hoàn thiện hạ tầng kỹ thuật theo quy hoạch.", "D": "Sự thiếu hụt các sản phẩm bất động sản thứ cấp trên thị trường do các quy định về bảo lãnh ngân hàng làm kéo dài thời gian bàn giao nhà so với dự kiến ban đầu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các quy định cấm thu tiền không đúng quy định hoặc sử dụng tiền sai mục đích (Điều 8) nhằm ngăn chặn việc chủ đầu tư lạm dụng vốn của khách hàng, đảm bảo nguồn tiền được dùng đúng cho dự án."}, {"level": "1", "content": "Việc Luật Kinh doanh bất động sản 2023 cho phép kinh doanh bất động sản là \"phần diện tích sàn xây dựng trong công trình xây dựng có công năng phục vụ mục đích du lịch, lưu trú\" có tác động như thế nào đến thị trường condotel, officetel?", "options": {"A": "Xác lập cơ chế \"Nhà ở hóa\" các loại hình bất động sản đa công năng, cho phép người mua được đăng ký hộ khẩu thường trú và thụ hưởng các hạ tầng an sinh xã hội tương đương căn hộ chung cư.", "B": "Hạn chế quyền chuyển nhượng của nhà đầu tư thứ cấp thông qua quy định bắt buộc phải chuyển đổi mục đích sử dụng đất từ đất thương mại, dịch vụ sang đất ở trước khi thực hiện giao dịch.", "C": "Chỉ mang ý nghĩa định nghĩa kỹ thuật, không giải quyết được bản chất sự mập mờ giữa thời hạn sở hữu tài sản và thời hạn sử dụng đất của chủ đầu tư dự án đối với các công trình lưu trú.", "D": "Tạo lập hành lang pháp lý minh bạch cho việc định danh, cấp Giấy chứng nhận và thực hiện các giao dịch kinh doanh, giúp giải quyết các xung đột về quyền sở hữu trong các công trình hỗn hợp."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Việc luật hóa loại hình này giúp giải quyết các vướng mắc pháp lý tồn tại trước đây, tạo hành lang pháp lý cho thị trường condotel, officetel phát triển. Việc quy định \"phần diện tích sàn xây dựng\" là đối tượng kinh doanh (Điều 5) đã tạo cơ sở để cơ quan tài nguyên môi trường cấp Giấy chứng nhận quyền sở hữu cho từng đơn vị riêng lẻ trong công trình hỗn hợp.   Luật khẳng định đây là công trình có công năng \"du lịch, lưu trú\", không phải là \"nhà ở\". Điều này có nghĩa là quyền sở hữu gắn liền với thời hạn dự án (thường là 50-70 năm) và người mua không thể đăng ký thường trú. Việc hiểu đúng điều này giúp ngăn chặn các quảng cáo sai sự thật về việc \"Condotel có sổ đỏ vĩnh viễn\". Khi đã được luật hóa, các hợp đồng mua bán loại hình này phải tuân thủ mẫu hợp đồng quy định tại Nghị định 96/2024/NĐ-CP, bảo vệ người mua khỏi các điều khoản bất lợi trong các hợp đồng góp vốn lách luật trước đây (Chuẩn hóa quy trình giao dịch)."}, {"level": "1", "content": "Nếu Luật Đất đai, Luật Nhà ở có quy định khác với Luật kinh doanh bất động sản về cùng một vấn đề liên quan đến kinh doanh bất động sản, nguyên tắc áp dụng pháp luật là gì?", "options": {"A": "Áp dụng nguyên tắc Lex posterior derogat priori (Luật ban hành sau bãi bỏ luật ban hành trước), ưu tiên áp dụng văn bản quy phạm pháp luật có thời điểm có hiệu lực gần nhất để đảm bảo tính cập nhật của chính sách.", "B": "Ưu tiên áp dụng Luật Kinh doanh bất động sản trong mọi trường hợp phát sinh giao dịch có mục đích sinh lợi, do đây là luật khung quy định về hành vi kinh doanh chuyên biệt trên thị trường tài sản.", "C": "Tùy trường hợp cụ thể, ưu tiên áp dụng luật chuyên ngành trực tiếp điều chỉnh khía cạnh đó (như xác lập quyền sử dụng đất áp dụng Luật Đất đai; quản lý, sử dụng nhà ở áp dụng Luật Nhà ở; trình tự đầu tư áp dụng Luật Đầu tư).", "D": "Áp dụng quy tắc \"Lựa chọn luật có lợi nhất cho đối tượng yếu thế\" (thường là khách hàng cá nhân) nhằm đảm bảo tinh thần nhân văn của pháp luật dân sự hiện đại trong các giao dịch có sự bất đối xứng về thông tin."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Mặc dù Luật kinh doanh bất động sản là luật khung, nhưng các vấn đề chuyên sâu về đất đai, nhà ở sẽ ưu tiên áp dụng quy định của Luật Đất đai, Luật Nhà ở nếu có quy định khác và trực tiếp hơn.Mặc dù Luật Kinh doanh bất động sản (KDBĐS) quy định về hành vi kinh doanh, nhưng \"vật chất\" của giao dịch đó (đất đai, nhà ở) lại chịu sự quản lý của các luật chuyên ngành khác. Ví dụ: Luật KDBĐS quy định về điều kiện bán nhà ở hình thành trong tương lai, nhưng việc thế nào là một ngôi nhà và quản lý vận hành sau khi bán lại thuộc phạm vi của Luật Nhà ở. Tại Điều 1: Luật KDBĐS 2023 đã tự giới hạn phạm vi của mình để tránh xung đột: Nếu là trình tự, thủ tục đầu tư dự án: Phải theo Luật Đầu tư. Nếu là vấn đề quyền sử dụng đất: Phải theo Luật Đất đai. Nếu là vấn đề quản lý, sử dụng nhà ở: Phải theo Luật Nhà ở."}, {"level": "1", "content": "Việc Luật Kinh doanh bất động sản 2023 quy định hợp đồng mẫu và yêu cầu công khai hợp đồng mẫu trước khi áp dụng mang lại lợi ích gì cho người mua bất động sản?", "options": {"A": "Tối ưu hóa nguyên tắc \"Tự do hợp đồng\" trong Bộ luật Dân sự, cho phép các bên thỏa thuận loại bỏ các điều khoản bắt buộc của Nhà nước để phù hợp với đặc thù dòng tiền riêng biệt của từng dự án.", "B": "Thay thế hoàn toàn vai trò của công tác thẩm định pháp lý (due diligence) từ phía người mua, vì việc công khai hợp đồng mẫu được coi là văn bản xác nhận tính an toàn tuyệt đối về pháp lý của dự án.", "C": "Thống nhất hóa toàn bộ biểu giá bán và tiến độ thanh toán trên thị trường, đảm bảo mọi dự án bất động sản trong cùng phân khúc và khu vực phải áp dụng chung một khung điều kiện thương mại.", "D": "Giúp người mua nắm rõ các điều khoản cốt yếu, hạn chế rủi ro từ các hợp đồng theo mẫu mang tính áp đặt (adhesion contracts) và đảm bảo tính minh bạch về quyền, nghĩa vụ cơ bản của các bên."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 6. Công khai thông tin về bất động sản đưa vào kinh doanh. Hợp đồng mẫu và việc công khai giúp người mua nắm rõ nội dung trước khi ký, đảm bảo các điều khoản tuân thủ luật pháp và bảo vệ quyền lợi của họ.   Trong các giao dịch bất động sản sơ cấp, hợp đồng thường là Hợp đồng gia nhập (Adhesion Contract) — loại hợp đồng do một bên soạn thảo và bên kia chỉ có quyền chấp nhận hoặc từ chối, rất ít cơ hội đàm phán lại. Quy định của Luật 2023 nhằm: (1) Chống \"cài cắm\" điều khoản bất lợi: Trước đây, chủ đầu tư thường cài các điều khoản về miễn trừ trách nhiệm khi chậm bàn giao hoặc áp đặt mức phạt vi phạm không tương xứng giữa hai bên. Hợp đồng mẫu theo Nghị định 96/2024/NĐ-CP đã chuẩn hóa các nội dung về: mức phạt vi phạm, điều kiện chấm dứt hợp đồng, và trách nhiệm bảo hành. (2) Xóa bỏ sự bất đối xứng thông tin: Việc công khai mẫu hợp đồng tại trụ sở và trên website dự án (theo Điều 6) giúp khách hàng có thời gian nghiên cứu, tham vấn luật sư trước khi đặt bút ký, tránh tình trạng bị \"ép\" ký tại các buổi lễ mở bán dưới áp lực tâm lý. (3) Tăng hiệu lực quản lý nhà nước: Hợp đồng mẫu là căn cứ để các cơ quan quản lý (như Cục Cạnh tranh và Bảo vệ người tiêu dùng) thực hiện hậu kiểm. Nếu chủ đầu tư tự ý thay đổi các nội dung bắt buộc làm phương hại đến khách hàng, hợp đồng đó có thể bị tuyên vô hiệu một phần hoặc toàn bộ."}, {"level": "1", "content": "Theo sự phân định thẩm quyền tại Điều 41 Luật Kinh doanh bất động sản 2023, trình tự, thủ tục chuyển nhượng toàn bộ hoặc một phần dự án bất động sản được thực hiện theo quy định của pháp luật về Đầu tư trong trường hợp nào sau đây?", "options": {"A": "Đối với các dự án bất động sản thuộc diện được chấp thuận chủ trương đầu tư đồng thời với chấp thuận nhà đầu tư hoặc được cấp Giấy chứng nhận đăng ký đầu tư theo quy định của Luật Đầu tư.", "B": "Áp dụng đồng bộ cho mọi dự án đầu tư phát triển đô thị và nhà ở thương mại có tổng mức đầu tư thuộc thẩm quyền chấp thuận chủ trương của Thủ tướng Chính phủ và Quốc hội.", "C": "Chỉ áp dụng trong trường hợp giao dịch chuyển nhượng dự án có sự thay đổi về cấu trúc sở hữu của các nhà đầu tư nước ngoài chiếm tỷ lệ trên 51% vốn điều lệ của doanh nghiệp dự án.", "D": "Đối với các dự án đã hoàn thành công tác giải phóng mặt bằng, nộp đủ tiền sử dụng đất và đang trong giai đoạn triển khai xây dựng phần hạ tầng kỹ thuật thiết yếu theo quy hoạch.."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Điều 41 Luật Kinh doanh bất động sản 2023 phân định rõ, nếu dự án thuộc phạm vi điều chỉnh của Luật Đầu tư (được chấp thuận nhà đầu tư/cấp GCNĐKĐT) thì thẩm quyền, thủ tục chuyển nhượng thực hiện theo Luật Đầu tư. Luật Kinh doanh bất động sản 2023 đã thực hiện một cuộc \"phân vai\" rõ rệt để tránh tình trạng chồng chéo thủ tục hành chính giữa ngành Xây dựng và ngành Kế hoạch & Đầu tư: Nguyên tắc \"Luật Đầu tư dẫn dắt\": Nếu một dự án được hình thành và xác lập tư cách chủ đầu tư thông qua cơ chế của Luật Đầu tư (được Nhà nước chấp thuận nhà đầu tư cụ thể hoặc cấp Giấy chứng nhận đăng ký đầu tư), thì mọi thay đổi về chủ thể thực hiện dự án (chuyển nhượng) phải được xử lý như một hoạt động \"Điều chỉnh dự án đầu tư\". Khi đó, hồ sơ và thẩm quyền giải quyết sẽ thuộc về cơ quan Kế hoạch và Đầu tư (Khoản 1 Điều 41). Nguyên tắc \"Luật Kinh doanh BĐS bổ trợ\": Đối với các dự án khác không thuộc diện nêu trên (ví dụ: dự án được giao đất, cho thuê đất thông qua đấu giá, đấu thầu mà không phải thực hiện thủ tục cấp GCNĐKĐT theo Luật Đầu tư), thủ tục chuyển nhượng sẽ thực hiện theo quy định riêng của Luật Kinh doanh bất động sản (Khoản 2 Điều 41). Mục tiêu quản lý: Quy định này giúp đơn giản hóa thủ tục \"một cửa\". Nhà đầu tư không phải thực hiện song song hai thủ tục chuyển nhượng dự án ở hai cơ quan khác nhau cho cùng một giao dịch."}, {"level": "1", "content": "Theo quy định tại Điều 73 Luật Kinh doanh bất động sản 2023 và Nghị định 94/2024/NĐ-CP, thành phần nội dung của cơ sở dữ liệu về thị trường bất động sản địa phương KHÔNG bao gồm nhóm thông tin nào sau đây?", "options": {"A": "Số liệu thống kê chi tiết về các dự án bất động sản, tình hình giao dịch, lượng tồn kho và các chỉ số biến động giá bất động sản trên địa bàn cấp tỉnh.", "B": "Thông tin về số lượng, tình hình hoạt động và mức độ tuân thủ pháp luật của các sàn giao dịch bất động sản và các tổ chức kinh doanh dịch vụ bất động sản tại địa phương.", "C": "Hồ sơ chi tiết về thu nhập từ hoa hồng môi giới và lịch sử nộp thuế thu nhập cá nhân của từng môi giới bất động sản đăng ký hành nghề trên địa bàn.", "D": "Dữ liệu về việc tổ chức kỳ thi, cấp, cấp lại và thu hồi chứng chỉ hành nghề môi giới bất động sản thuộc thẩm quyền quản lý của Sở Xây dựng địa phương."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Cơ sở dữ liệu tập trung vào thông tin thị trường, dự án, chủ thể kinh doanh, không thu thập thông tin thu nhập cá nhân chi tiết của từng môi giới. Thu nhập cá nhân và chi tiết nộp thuế là những thông tin thuộc phạm vi bảo mật của Luật Quản lý thuế và Luật Bảo vệ dữ liệu cá nhân. Cơ sở dữ liệu bất động sản chỉ thu thập các thông tin liên quan đến tính pháp lý và tính thương mại của sản phẩm/dịch vụ, không lấn sân sang quản lý tài chính chi tiết của từng cá nhân hành nghề. Việc thu thập này (nếu có) sẽ thuộc về hệ thống dữ liệu riêng biệt của ngành Thuế."}, {"level": "1", "content": "Theo quy định tại Điều 10 Luật Kinh doanh bất động sản 2023, một người Việt Nam định cư ở nước ngoài nhưng vẫn giữ quốc tịch Việt Nam (Công dân Việt Nam) có được phép mua nhà ở có sẵn từ cá nhân trong nước để thực hiện hoạt động bán lại nhằm mục đích sinh lợi hay không?", "options": {"A": "Không, do quyền kinh doanh bất động sản đối với nhà ở có sẵn hiện nay chỉ ưu tiên cho cá nhân thường trú trong nước nhằm ngăn chặn tình trạng thao túng giá từ nguồn vốn ngoài lãnh thổ.", "B": "Không, vì theo quy định về quản lý ngoại hối, các cá nhân này chỉ được phép đầu tư vào các dự án hình thành trong tương lai trực tiếp từ chủ đầu tư để Nhà nước kiểm soát dòng vốn đầu tư.", "C": "Có, vì người Việt Nam định cư ở nước ngoài là công dân Việt Nam được phép kinh doanh bất động sản theo các hình thức như tổ chức, cá nhân trong nước.", "D": "Có, nhưng bắt buộc phải thành lập pháp nhân tại Việt Nam và chỉ được thực hiện giao dịch đối với các loại hình bất động sản đã hoàn thành việc nghiệm thu, đưa vào sử dụng chính thức."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 10, Khoản 2 Luật Kinh doanh bất động sản 2023 cho phép người Việt Nam định cư ở nước ngoài là công dân Việt Nam được kinh doanh bất động sản theo các hình thức như tổ chức, cá nhân trong nước, bao gồm cả việc mua bất động sản để bán lại. Sự thay đổi này được gọi là nguyên tắc \"Đãi ngộ quốc gia\" (National Treatment) hoàn toàn đối với công dân mang hộ chiếu Việt Nam, bất kể nơi cư trú:Sự bình đẳng về chủ thể: Trước đây, Việt kiều thường bị hạn chế trong việc \"kinh doanh\" (mua đi bán lại) mà chủ yếu chỉ được sở hữu để ở. Luật 2023 đã xóa bỏ rào cản này bằng cách khẳng định: Nếu anh là Công dân Việt Nam (còn quốc tịch), anh có đầy đủ quyền kinh doanh BĐS như một người đang sống tại TP.HCM hay Hà Nội. Mở rộng phạm vi giao dịch: Đáp án C đúng vì nó bao hàm quyền được thực hiện mọi hình thức kinh doanh quy định tại Khoản 1 Điều 10, bao gồm cả việc mua nhà ở có sẵn để bán, cho thuê, hoặc cho thuê mua. Cần lưu ý sự khác biệt giữa \"Công dân Việt Nam\" và \"Người gốc Việt Nam\" (không còn quốc tịch). Đối với người gốc Việt, quyền kinh doanh vẫn có những giới hạn nhất định so với công dân Việt Nam."}, {"level": "1", "content": "Theo quy định tại Điều 30 Luật Kinh doanh bất động sản 2023, trong giao dịch chuyển nhượng quyền sử dụng đất đã có hạ tầng kỹ thuật trong dự án bất động sản, nội dung nào sau đây KHÔNG thuộc nghĩa vụ pháp lý của bên nhận chuyển nhượng?", "options": {"A": "Thực hiện thanh toán tiền theo đúng thời hạn và phương thức thỏa thuận; chịu trách nhiệm phối hợp thực hiện các thủ tục đăng ký quyền sử dụng đất tại cơ quan nhà nước.", "B": "Tuân thủ nghiêm ngặt các quy định về quy hoạch chi tiết xây dựng, kiến trúc cảnh quan của dự án và thực hiện đầy đủ nghĩa vụ tài chính đối với Nhà nước theo quy định.", "C": "Bắt buộc phải hoàn tất việc đầu tư xây dựng nhà ở trên đất theo đúng thiết kế và quy hoạch đã phê duyệt trong thời hạn tối đa là 24 tháng kể từ ngày nhận bàn giao.", "D": "Sử dụng đất đúng mục đích, đúng ranh giới diện tích đất đã được nhận bàn giao và nhận bàn giao các loại giấy tờ pháp lý về quyền sử dụng đất theo đúng tiến độ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Trong thực tế, nhiều người thường nhầm lẫn với quy định tại Luật Đất đai về việc nếu đất được Nhà nước giao/cho thuê để thực hiện dự án mà không được sử dụng trong 12 tháng hoặc chậm tiến độ 24 tháng thì bị thu hồi. Tuy nhiên, tại Điều 30 Luật Kinh doanh bất động sản 2023, luật chỉ tập trung vào các nghĩa vụ phát sinh từ mối quan hệ hợp đồng. Thời hạn xây dựng nhà cụ thể thường do các bên thỏa thuận trong hợp đồng hoặc tuân theo tiến độ cụ thể của dự án được phê duyệt, chứ không phải là một con số \"cứng\" 24 tháng áp dụng chung cho mọi đối tượng nhận chuyển nhượng tại Điều này."}, {"level": "1", "content": "Theo quy định tại Điều 24 Luật Kinh doanh bất động sản 2023, mục đích cốt lõi của việc yêu cầu chủ đầu tư phải có văn bản thông báo và nhận được văn bản trả lời của cơ quan chuyên môn về xây dựng cấp tỉnh về việc nhà ở đủ điều kiện đưa vào kinh doanh trước khi ký hợp đồng là gì?", "options": {"A": "Thiết lập cơ chế phối hợp liên ngành nhằm quyết toán các khoản nghĩa vụ thuế thu nhập doanh nghiệp phát sinh từ hoạt động huy động vốn sớm của chủ đầu tư dự án.", "B": "Đăng ký thông tin dự án vào hệ thống xếp hạng tín nhiệm quốc gia để các ngân hàng thương mại tự động cấp hạn mức vay vốn cho khách hàng cá nhân mà không cần thẩm định lại dự án.", "C": "Chuyển giao toàn bộ trách nhiệm giám sát chất lượng công trình từ Nhà nước sang chủ đầu tư, làm căn cứ pháp lý để giải quyết các tranh chấp về diện tích thông thủy sau khi bàn giao.", "D": "Xác nhận chính thức từ cơ quan quản lý nhà nước về việc dự án đã đáp ứng đầy đủ các điều kiện pháp lý và kỹ thuật, nhằm bảo vệ quyền lợi người mua và đảm bảo tính minh bạch của thị trường."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Đây là một bước kiểm soát quan trọng của cơ quan quản lý, xác nhận tính hợp pháp và đủ điều kiện của sản phẩm trước khi đến tay người tiêu dùng, tăng cường bảo vệ người mua. Sở Xây dựng không chỉ kiểm tra hồ sơ giấy tờ mà còn kiểm tra thực tế tiến độ thi công (ví dụ: đã xong móng đối với chung cư, xong hạ tầng đối với nhà ở thấp tầng). Văn bản trả lời của Sở là bằng chứng thép cho thấy dự án đã \"hiện hữu\" về mặt pháp lý và kỹ thuật."}, {"level": "1", "content": "Việc Luật Kinh doanh bất động sản 2023 không còn quy định về vốn pháp định tối thiểu (như Luật kinh doanh bất động sản 2014 từng có) mà thay bằng tỷ lệ vốn chủ sở hữu/tổng mức đầu tư có ý nghĩa gì?", "options": {"A": "Thực hiện chiến lược \"nới lỏng tài khóa\" nhằm ưu tiên tính thanh khoản của doanh nghiệp thông qua việc bãi bỏ hoàn toàn các yêu cầu về duy trì số dư tiền mặt cố định trong suốt quá trình vận hành dự án.", "B": "Thiết lập ngưỡng an toàn hệ thống thông qua việc áp đặt mức vốn pháp định biến thiên theo chỉ số lạm phát hàng năm, đảm bảo vốn thực góp của chủ sở hữu luôn cao hơn tổng dư nợ vay tín dụng.", "C": "Chuyển dịch mô hình quản lý từ kiểm soát năng lực tài chính thực tế sang mô hình giám sát dựa trên sự bảo chứng của báo cáo kiểm toán độc lập và chỉ số xếp hạng tín nhiệm của doanh nghiệp.", "D": "Giúp yêu cầu về vốn trở nên linh hoạt, phù hợp hơn với quy mô và rủi ro của từng dự án cụ thể, thay vì một mức cố định có thể không phù hợp."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Cách tiếp cận theo tỷ lệ giúp yêu cầu vốn sát với thực tế hơn: dự án lớn cần vốn lớn, dự án nhỏ cần vốn ít hơn, thay vì một mức sàn cố định. Trước đây, một doanh nghiệp chỉ cần có 20 tỷ đồng (vốn pháp định) là có thể được duyệt làm chủ đầu tư dự án hàng nghìn tỷ đồng, dẫn đến rủi ro đình trệ khi không vay được vốn ngân hàng. Quy định mới buộc vốn chủ sở hữu phải \"đi đôi\" với quy mô dự án. Luật phân định rõ hai ngưỡng an toàn: 20% tổng mức đầu tư đối với dự án có quy mô dưới 20 ha. 15% tổng mức đầu tư đối với dự án có quy mô từ 20 ha trở lên. Điều này giúp Nhà nước kiểm soát được mức độ \"đòn bẩy tài chính\" của chủ đầu tư một cách khoa học hơn."}, {"level": "1", "content": "Nghĩa vụ chứng minh nhà ở, công trình xây dựng hình thành trong tương lai đủ điều kiện được bán, cho thuê mua thuộc về ai?", "options": {"A": "Người mua, thuê mua.", "B": "Ngân hàng bảo lãnh.", "C": "Chủ đầu tư dự án.", "D": "Cơ quan đăng ký đất đai."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Chủ đầu tư có nghĩa vụ hoàn thiện các điều kiện, chuẩn bị hồ sơ và thông báo cho Sở Xây dựng để được xác nhận đủ điều kiện bán."}, {"level": "1", "content": "Cơ quan nào có trách nhiệm chính trong việc xây dựng, quản lý, vận hành Hệ thống thông tin, cơ sở dữ liệu về nhà ở và thị trường bất động sản ở cấp Trung ương?", "options": {"A": "Văn phòng Chính phủ.", "B": "Bộ Nông nghiệp và Môi trường.", "C": "Bộ Xây dựng.", "D": "Bộ Thông tin và Truyền thông."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật kinh doanh bất động sản và Nghị định 94/2024 giao Bộ Xây dựng là cơ quan chủ trì ở cấp Trung ương."}, {"level": "1", "content": "Theo quy định tại Điều 9 Luật Kinh doanh bất động sản 2023, cá nhân thực hiện hoạt động bán, cho thuê mua bất động sản thuộc diện \"quy mô nhỏ\" theo quy định của Chính phủ có nghĩa vụ gì về mặt tài chính đối với Nhà nước?", "options": {"A": "Được miễn trừ hoàn toàn nghĩa vụ kê khai và nộp thuế thu nhập cá nhân do thuộc đối tượng được miễn thủ tục thành lập doanh nghiệp kinh doanh bất động sản chuyên nghiệp.", "B": "Chỉ thực hiện kê khai và nộp thuế nếu tổng doanh thu từ hoạt động kinh doanh bất động sản trong năm dương lịch vượt ngưỡng 100 triệu đồng theo quy định chung về thuế đối với hộ kinh doanh.", "C": "Có trách nhiệm kê khai và thực hiện đầy đủ nghĩa vụ nộp thuế theo quy định của pháp luật, mặc dù không bắt buộc phải thành lập doanh nghiệp kinh doanh bất động sản.", "D": "Được áp dụng cơ chế khoán thuế cố định theo quý và không phải kê khai từng lần phát sinh giao dịch nếu giá trị tài sản chuyển nhượng thấp hơn hạn mức 300 tỷ đồng quy định tại Nghị định 96/2024/NĐ-CP."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 Điều 9 Luật Kinh doanh bất động sản 2023 nêu rõ cá nhân kinh doanh bất động sản quy mô nhỏ không phải lập DN nhưng phải kê khai nộp thuế."}, {"level": "1", "content": "Theo quy định của Luật Kinh doanh bất động sản 2023, hệ quả pháp lý quan trọng nhất đối với một cá nhân thực hiện hoạt động môi giới bất động sản khi không có chứng chỉ hành nghề hoặc không hành nghề trong một doanh nghiệp kinh doanh dịch vụ bất động sản là gì?", "options": {"A": "Chỉ làm phát sinh trách nhiệm bồi thường dân sự nếu khách hàng chứng minh được có thiệt hại thực tế xảy ra, trong khi tư cách hành nghề không ảnh hưởng đến hiệu lực của hợp đồng thù lao đã ký.", "B": "Xác lập hành vi vi phạm điều cấm của luật, chịu chế tài xử phạt hành chính và làm phát sinh rủi ro vô hiệu đối với các thỏa thuận về thù lao, hoa hồng môi giới do vi phạm hình thức và điều kiện hành nghề.", "C": "Bị cưỡng chế thu hồi 100% doanh thu từ hoạt động môi giới trái phép để nộp vào ngân sách nhà nước và bị đình chỉ quyền đăng ký sát hạch cấp chứng chỉ hành nghề trong thời hạn 05 năm.", "D": "Làm phát sinh trách nhiệm liên đới của các tổ chức tín dụng và văn phòng công chứng trong việc kiểm soát tư cách của bên thứ ba, dẫn đến việc đình chỉ giao dịch chính giữa người mua và người bán.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ: Điều 8 và Điều 61 Luật Kinh doanh bđs 2023. Hoạt động môi giới không đủ điều kiện là vi phạm pháp luật, có thể dẫn đến xử phạt vi phạm hành chính và ảnh hưởng đến hiệu lực của các thỏa thuận liên quan. Theo Bộ luật Dân sự, giao dịch dân sự có mục đích, nội dung vi phạm điều cấm của luật thì bị vô hiệu (Điều 123 Bộ luật Dân sự 2015). Do đó, nếu môi giới không có chứng chỉ hoặc hành nghề tự do trái luật, khách hàng hoặc chủ đầu tư có quyền từ chối trả hoa hồng. Nếu đã trả, họ có quyền kiện đòi lại vì thỏa thuận môi giới này không có giá trị pháp lý từ thời điểm giao kết."}, {"level": "1", "content": "Theo quy định tại Luật Nhà ở 2023 và các văn bản hướng dẫn thi hành, diện tích sử dụng căn hộ chung cư (diện tích thông thủy) được ghi trong hợp đồng mua bán và Giấy chứng nhận phải được tính toán dựa trên nguyên tắc nào sau đây?", "options": {"A": "Bao gồm diện tích sàn có mái che, diện tích ban công, lô gia và diện tích phần tường bao quanh căn hộ, tường phân chia các căn hộ, diện tích sàn có cột, hộp kỹ thuật nằm bên trong căn hộ.", "B": "Tính theo kích thước thông thủy, bao gồm cả phần diện tích tường ngăn các phòng bên trong căn hộ và diện tích ban công, lô gia (nếu có); nhưng không tính diện tích tường bao quanh căn hộ, tường phân chia các căn hộ, diện tích sàn có cột, hộp kỹ thuật nằm bên trong căn hộ.", "C": "Được tính bằng cách đo từ tim của tường bao quanh và tường phân chia căn hộ, bao gồm toàn bộ diện tích sàn có cột và hộp kỹ thuật nhằm đảm bảo tính thống nhất với bản vẽ thiết kế kiến trúc của dự án.", "D": "Do chủ đầu tư và khách hàng tự thỏa thuận dựa trên tập quán thương mại, có thể lựa chọn một trong hai phương pháp tính (thông thủy hoặc tim tường) miễn là được ghi rõ trong hợp đồng mẫu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Khoản 2, Điều 101 Luật Nhà ở 2023: Quy định rõ cách tính diện tích sử dụng căn hộ. Thông tư của Bộ Xây dựng: Hướng dẫn chi tiết cách đo đạc và mẫu hợp đồng mua bán căn hộ chung cư. Đáp án B phản ánh chính xác cách tính diện tích thông thủy (Carpet Area). Điểm quan trọng nhất là phải trừ đi diện tích cột, hộp kỹ thuật và tường bao. Đối với ban công/lô gia, phải tính toàn bộ diện tích sàn; trường hợp ban công có phần diện tích chung thì tính từ mép trong của tường chung."}, {"level": "1", "content": "Sau khi hoàn tất việc chuyển nhượng quyền sử dụng đất đã có hạ tầng kỹ thuật cho cá nhân, trách nhiệm quản lý, vận hành và bảo trì các công trình hạ tầng kỹ thuật (đường giao thông, hệ thống cấp thoát nước, chiếu sáng...) trong dự án được quy định như thế nào theo Luật Kinh doanh bất động sản 2023?", "options": {"A": "Các công trình hạ tầng kỹ thuật này thuộc quyền sở hữu chung của cộng đồng người nhận chuyển nhượng; việc bảo trì và quản lý do Ban quản trị khu dân cư tự quyết định và chi trả kinh phí.", "B": "Chủ đầu tư có trách nhiệm quản lý, bảo trì và đảm bảo công năng của hạ tầng cho đến khi hoàn tất việc bàn giao cho cơ quan nhà nước hoặc tổ chức quản lý chuyên ngành theo nội dung dự án đã phê duyệt.", "C": "Quyền sở hữu hạ tầng kỹ thuật được phân bổ vào giá bán đất; do đó, chủ đầu tư được miễn trừ hoàn toàn trách nhiệm bảo trì ngay sau khi đã bàn giao Giấy chứng nhận quyền sử dụng đất cho khách hàng.", "D": "Cơ quan nhà nước cấp tỉnh có trách nhiệm tiếp nhận và thực hiện bảo trì hạ tầng ngay sau khi chủ đầu tư hoàn thành việc nghiệm thu, không phụ thuộc vào tiến độ kinh doanh hay cư trú của dự án."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một sai lầm phổ biến là cho rằng cứ \"xong việc bán\" hoặc \"xong việc nghiệm thu\" là chủ đầu tư hết trách nhiệm. Thực tế, hạ tầng kỹ thuật là mạch máu của dự án. Theo Điều 19 và Điều 31 Luật Kinh doanh bđs 2023, chủ đầu tư phải đảm bảo hạ tầng hoạt động đúng công năng. Cho đến khi các thủ tục bàn giao chính thức cho Nhà nước (Sở Xây dựng, Sở Giao thông, Công ty Cấp thoát nước...) hoàn tất, chủ đầu tư vẫn là thực thể duy nhất chịu trách nhiệm pháp lý nếu hạ tầng xuống cấp hoặc hư hỏng. Khác với nhà chung cư (có phần sở hữu chung rõ ràng), hạ tầng kỹ thuật (điện, nước, đường) trong các dự án đất nền hoặc nhà phố thường hướng tới việc bàn giao cho Nhà nước quản lý để trở thành hạ tầng công cộng. Khách hàng không \"sở hữu\" con đường hay cống thoát nước theo hình thức sở hữu chung của nhà chung cư"}, {"level": "1", "content": "Dựa trên quy định về tỷ lệ vốn chủ sở hữu tối thiểu tại Điều 9 Luật Kinh doanh bất động sản 2023, hệ số huy động vốn tối đa (được xác định bằng tỷ lệ giữa Tổng vốn huy động từ các nguồn khác trên Vốn chủ sở hữu) mà chủ đầu tư được phép thực hiện đối với dự án dưới 20 ha và dự án từ 20 ha trở lên lần lượt là bao nhiêu?", "options": {"A": "3,0 lần và 4,55 lần.", "B": "4,0 lần và 5,67 lần.", "C": "4,5 lần và 6,25 lần.", "D": "5,0 lần và 6,67 lần."}, "answer": "B", "explanation": " Căn cứ pháp lý: Điều 9. Điều kiện đối với tổ chức, cá nhân khi kinh doanh bất động sản (Luật Kinh doanh bất động sản 2023) Khoản 2, Điểm c: Có vốn chủ sở hữu không thấp hơn 20% tổng vốn đầu tư đối với dự án có quy mô sử dụng đất dưới 20 ha, không thấp hơn 15% tổng vốn đầu tư đối với dự án có quy mô sử dụng đất từ 20 ha trở lên. Nghị định 96/2024/NĐ-CP (Điều 3): Quy định chi tiết về cách xác định vốn chủ sở hữu để thực hiện dự án bất động sản dựa trên báo cáo tài chính kiểm toán, cụ thể như sau: Để tìm ra con số hệ số đòn bẩy, chúng ta thực hiện phép toán dựa trên tổng mức đầu tư (TMĐT) là 100%: Đối với dự án quy mô dưới 20 ha: o Luật quy định Vốn chủ sở hữu (VCSH) >= 20% TMĐT.=>Vốn huy động tối đa = 100% - 20% = 80% TMĐT. o Hệ số đòn bẩy tối đa = Vốn huy động/VCSH = 80%/20% = 4,0 lần. Đối với dự án quy mô từ 20 ha trở lên: o Luật quy định VCSH >= 15% TMĐT. =>Vốn huy động tối đa = 100% - 15% = 85% TMĐT. o Hệ số đòn bẩy tối đa = Vốn huy động / VCSH = 85%/15%= 5,67 lần."}, {"level": "1", "content": "Theo quy định tại Điều 48 Luật Kinh doanh bất động sản 2023, phương thức thanh toán trong giao dịch bất động sản được quy định như thế nào đối với các nhóm đối tượng khác nhau?", "options": {"A": "Mọi giao dịch bất động sản phát sinh từ năm 2026 đều bắt buộc phải thực hiện thanh toán qua tổ chức tín dụng để đảm bảo tính minh bạch và phục vụ công tác phòng, chống rửa tiền.", "B": "Tổ chức, cá nhân kinh doanh bất động sản phải nhận tiền thanh toán qua tổ chức tín dụng; trường hợp cá nhân với cá nhân không kinh doanh bất động sản thì được quyền tự thỏa thuận phương thức thanh toán.", "C": "Việc thanh toán qua ngân hàng chỉ bắt buộc đối với các giao dịch mua bán nhà ở hình thành trong tương lai; đối với nhà ở có sẵn, các bên có thể thanh toán bằng tiền mặt nếu có sự xác nhận của công chứng viên.", "D": "Hình thức thanh toán qua tổ chức tín dụng chỉ áp dụng đối với các giao dịch có giá trị từ 500 triệu đồng trở lên theo quy định của pháp luật về phòng, chống rửa tiền và quản lý ngoại hối."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật quy định các \"Tổ chức, cá nhân kinh doanh bất động sản\" (tức là các Chủ đầu tư, các công ty môi giới, hoặc cá nhân có đăng ký kinh doanh) bắt buộc phải nhận tiền qua ngân hàng. Điều này giúp Nhà nước kiểm soát được doanh thu thực, tránh việc \"hai giá\" để trốn thuế thu nhập doanh nghiệp và thuế VAT. Đối với các giao dịch giữa các cá nhân không phải là kinh doanh bất động sản chuyên nghiệp (ví dụ: anh Thành bán nhà cho người quen), pháp luật hiện hành vẫn tôn trọng quyền tự thỏa thuận. Các bên có thể chọn chuyển khoản hoặc tiền mặt."}, {"level": "1", "content": "Trong cơ chế bảo lãnh nhà ở hình thành trong tương lai theo Luật Kinh doanh bất động sản 2023, trách nhiệm chính của ngân hàng bảo lãnh được quy định như thế nào?", "options": {"A": "Giám sát trực tiếp chất lượng vật tư và nghiệm thu kỹ thuật từng giai đoạn thi công của dự án.", "B": "Tự động phong tỏa 100% dòng tiền của khách hàng cho đến khi dự án hoàn thiện hồ sơ hoàn công.", "C": "Thẩm định và chịu trách nhiệm thay chủ đầu tư về tính pháp lý của các loại giấy phép xây dựng dự án.", "D": "Phát hành chứng thư bảo lãnh cho từng khách hàng và bồi thường tài chính khi chủ đầu tư vi phạm bàn giao."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 26. Luật Kinh doanh bđs 2023.  Ngân hàng không bảo lãnh \"chung chung\" cho cả dự án mà phải phát hành chứng thư bảo lãnh cá biệt cho từng khách hàng sau khi hợp đồng được ký kết. Nếu chủ đầu tư không bàn giao nhà đúng hạn hoặc vi phạm cam kết, ngân hàng có nghĩa vụ trả lại tiền (bao gồm tiền gốc và các khoản khác theo thỏa thuận) cho người mua."}, {"level": "1", "content": "Theo quy định tại Điều 8 Luật Kinh doanh bất động sản 2023, hành vi nào sau đây KHÔNG thuộc danh mục các hành vi bị nghiêm cấm trong hoạt động kinh doanh bất động sản?", "options": {"A": "Chiếm dụng vốn hoặc sử dụng tiền thu từ khách hàng mua nhà ở tương lai trái mục đích.", "B": "Thỏa thuận và xác định giá mua bán, thuê mua bất động sản theo cơ chế thị trường.", "C": "Không thực hiện hoặc thực hiện không đầy đủ việc công khai thông tin dự án theo quy định.", "D": "Kinh doanh bất động sản khi chưa đáp ứng đủ các điều kiện theo quy định của pháp luật."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật Kinh doanh bất động sản và Bộ luật Dân sự đều tôn trọng nguyên tắc \"Tự do thỏa thuận\". Việc định giá bán là quyền của chủ đầu tư và sự chấp thuận của khách hàng dựa trên quy luật cung - cầu (trừ trường hợp nhà ở xã hội có quy định riêng về khung giá). Đây là quyền kinh doanh cốt lõi, không phải hành vi bị cấm."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023 và Luật Đất đai 2024, nguyên tắc nào sau đây được áp dụng để xác định giá trị giao dịch nhằm thực hiện nghĩa vụ tài chính với Nhà nước trong bối cảnh \"Bảng giá đất theo nguyên tắc thị trường\" từ năm 2026?", "options": {"A": "Giá trị tính thuế được mặc định bằng 100% giá trị ghi trên Hợp đồng công chứng, bất kể giá đó thấp hơn Bảng giá đất hiện hành của địa phương.", "B": "Giá trị tính thuế là giá ghi trên hợp đồng; trường hợp giá hợp đồng thấp hơn Bảng giá đất do UBND tỉnh quy định tại thời điểm giao dịch thì tính theo Bảng giá đất.", "C": "Các bên được quyền tự thỏa thuận một \"mức giá sàn\" thấp hơn thực tế để giảm chi phí giao dịch, miễn là được sự đồng thuận của văn phòng công chứng.", "D": "Thuế thu nhập cá nhân được tính dựa trên lợi nhuận thuần (Giá bán - Giá mua) thay vì tính trên tổng giá trị chuyển nhượng để đảm bảo tính công bằng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là quy định nhằm chống thất thu ngân sách. Theo Điều 159 Luật Đất đai 2024, Bảng giá đất được xây dựng hàng năm và sát với giá thị trường. Do đó, nếu các bên kê khai giá trên hợp đồng thấp hơn Bảng giá đất để trốn thuế, cơ quan Thuế sẽ tự động áp mức giá theo Bảng giá đất để tính thuế."}, {"level": "1", "content": "Theo quy định tại Điều 46 Luật Kinh doanh bất động sản 2023, bên thuê có quyền đơn phương chấm dứt thực hiện hợp đồng thuê nhà ở, công trình xây dựng trong trường hợp nào sau đây?", "options": {"A": "Khi phát sinh thay đổi trong chiến lược kinh doanh hoặc điều kiện tài chính của bên thuê.", "B": "Khi bên cho thuê không thực hiện nghĩa vụ bảo trì, sửa chữa công trình theo thỏa thuận hoặc cam kết.", "C": "Khi bên thuê đã thực hiện hợp đồng được ít nhất 1/2 thời hạn và thông báo trước 30 ngày.", "D": "Khi tài sản thuê thuộc diện kiểm tra định kỳ về an toàn phòng cháy chữa cháy của cơ quan chức năng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quyền đơn phương chấm dứt hợp đồng là một \"vũ khí pháp lý\" mạnh mẽ nhưng chỉ được kích hoạt khi có những căn cứ cụ thể để bảo vệ quyền lợi chính đáng của bên thuê: Vi phạm nghĩa vụ của bên cho thuê (Đáp án B): Theo quy định liên thông giữa Luật Kinh doanh bất động sản và Luật Nhà ở, bên cho thuê có nghĩa vụ đảm bảo tình trạng kỹ thuật và chất lượng tài sản như đã cam kết. Nếu tài sản xuống cấp hoặc hư hỏng mà bên cho thuê từ chối sửa chữa (sau khi đã thông báo), quyền đơn phương chấm dứt của bên thuê được xác lập nhằm bảo vệ mục đích sử dụng tài sản."}, {"level": "1", "content": "Theo quy định tại Điều 27 Luật Kinh doanh bất động sản 2023, hành vi nào sau đây là áp dụng SAI nguyên tắc bàn giao công trình xây dựng hoặc phần diện tích sàn xây dựng?", "options": {"A": "Chỉ bàn giao khi công trình đã được nghiệm thu hoàn thành và được cơ quan nhà nước có thẩm quyền kiểm tra công tác nghiệm thu theo quy định.", "B": "Bàn giao phần diện tích sàn cho khách hàng sau khi hoàn thành thi công nội khu, hạ tầng kỹ thuật kết nối của toàn dự án chưa được nghiệm thu.", "C": "Bàn giao kèm theo hồ sơ thiết kế bản vẽ thi công, quy trình bảo trì và các tài liệu hướng dẫn sử dụng trang thiết bị gắn liền với công trình.", "D": "Đảm bảo công trình xây dựng khi bàn giao tuân thủ các yêu cầu về an toàn, phòng cháy, chữa cháy và bảo vệ môi trường theo quy chuẩn kỹ thuật."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 27 Luật Kinh doanh bất động sản 2023. Lỗi tại phương án B vi phạm trực tiếp Điểm b Khoản 1 Điều 27. Đây là \"lỗ hổng\" mà nhiều chủ đầu tư thường lách để sớm thu nốt 25-30% tiền còn lại của khách hàng khi dự án vẫn còn là một công trường ngổn ngang hạ tầng."}, {"level": "1", "content": "Căn cứ Điều 44 Luật Kinh doanh bất động sản 2023 và Điều 12 Nghị định 96/2024/NĐ-CP, khi thực hiện các giao dịch trên thị trường, các bên phải tuân thủ hệ thống mẫu hợp đồng gồm bao nhiêu loại hợp đồng kinh doanh và hợp đồng kinh doanh dịch vụ bất động sản?", "options": {"A": "09 loại hợp đồng kinh doanh (tập trung vào nhà ở và đất nền) và 03 loại hợp đồng dịch vụ (môi giới, tư vấn, quản lý).", "B": "11 loại mẫu hợp đồng kinh doanh bất động sản và 05 loại mẫu hợp đồng kinh doanh dịch vụ bất động sản (bao gồm cả mẫu hợp đồng đặt cọc và hợp đồng đấu giá).", "C": "11 loại mẫu hợp đồng kinh doanh bất động sản và 04 loại mẫu hợp đồng kinh doanh dịch vụ bất động sản.", "D": "12 loại mẫu hợp đồng kinh doanh bất động sản (tính riêng biệt nhà ở có sẵn và tương lai) và 04 loại mẫu hợp đồng kinh doanh dịch vụ bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nhóm 11 loại hợp đồng kinh doanh bất động sản (Phụ lục II Nghị định 96/2024/NĐ-CP): Đây là sự kết hợp giữa các đối tượng (Nhà ở, Công trình xây dựng, Quyền sử dụng đất, Dự án) và các hình thức giao dịch: Về Nhà ở (03 loại): Mua bán; Thuê mua; Thuê.; Về Công trình xây dựng/Phần diện tích sàn (03 loại): Mua bán; Thuê mua; Thuê.; Về Quyền sử dụng đất (03 loại): Chuyển nhượng; Cho thuê; Cho thuê lại (kèm hạ tầng); Về Dự án (02 loại): Chuyển nhượng toàn bộ; Chuyển nhượng một phần. Nhóm 04 loại hợp đồng kinh doanh dịch vụ (Phụ lục III Nghị định 96/2024/NĐ-CP): Hợp đồng dịch vụ sàn giao dịch bất động sản, Hợp đồng dịch vụ môi giới bất động sản., Hợp đồng dịch vụ tư vấn bất động sản, Hợp đồng dịch vụ quản lý bất động sản."}, {"level": "1", "content": "Luật Nhà ở 2023 (Luật số 27/2023/QH15) định nghĩa \"Nhà ở\" như thế nào?", "options": {"A": "Mọi công trình xây dựng có kết cấu mái che và tường bao quanh.", "B": "Công trình xây dựng với mục đích để ở và phục vụ nhu cầu sinh hoạt.", "C": "Tập hợp các căn hộ thuộc dự án phát triển nhà ở thương mại.", "D": "Công trình được sử dụng cho cả mục đích ở và sản xuất công nghiệp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 2 Luật Nhà ở năm 2023 định nghĩa Nhà ở là công trình xây dựng với mục đích để ở và phục vụ nhu cầu sinh hoạt của gia đình, cá nhân. Nhà ở được sử dụng vào mục đích để ở và mục đích không phải để ở mà pháp luật không cấm là nhà ở có mục đích sử dụng hỗn hợp."}, {"level": "1", "content": "Theo quy định tại Điều 7 Luật Nhà ở 2023, hành vi nào sau đây bị nghiêm cấm đối với việc sử dụng căn hộ chung cư?", "options": {"A": "Cho thuê lại căn hộ chung cư thuộc sở hữu cá nhân để người khác ở.", "B": "Kinh doanh dịch vụ ăn uống tại phần diện tích thương mại của tòa nhà.", "C": "Thay đổi các trang thiết bị bên trong căn hộ nhưng không ảnh hưởng kết cấu.", "D": "Sử dụng căn hộ chung cư vào mục đích làm văn phòng công ty."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Luật Nhà ở 2023 công nhận và định nghĩa loại hình nhà ở kết hợp mục đích ở với các mục đích hợp pháp khác như kinh doanh, dịch vụ. Mặc dù luật công nhận nhà ở có mục đích sử dụng hỗn hợp, nhưng đối với Căn hộ chung cư (Apartment), Luật Nhà ở 2023 (Khoản 10 Điều 7) nghiêm cấm việc sử dụng vào mục đích không phải để ở. Nếu anh muốn làm văn phòng, anh phải thuê/mua phần diện tích thương mại (Shophouse/Officetel) được định danh rõ ràng trong dự án."}, {"level": "1", "content": "\"Nhà ở thương mại\" theo Điều 3 Luật Nhà ở 2023 được hiểu là:", "options": {"A": "Nhà ở do Nhà nước xây dựng và phân phối theo chính sách hỗ trợ nhà ở.", "B": "Nhà ở được đầu tư xây dựng để bán, cho thuê mua, cho thuê theo cơ chế thị trường", "C": "Nhà ở thuộc sở hữu của các tập đoàn thương mại lớn dùng để kinh doanh.", "D": "Nhà ở được xây trong các khu thương mại, dịch vụ vừa dùng để ở và dùng cho hoạt động thương mại."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là loại hình nhà ở được phát triển và giao dịch theo nguyên tắc thị trường, nhằm mục đích kinh doanh (bán hoặc cho thuê…) để kiếm lời theo cơ chế thị trường."}, {"level": "1", "content": "\"Nhà ở xã hội (nhà ở xã hội)\" theo Điều 3 Luật Nhà ở 2023 có đặc điểm gì?", "options": {"A": "Là nhà ở cho thuê ngắn hạn dành cho các đối tượng xã hội khác nhau", "B": "Là nhà ở đáp ứng tiêu chuẩn theo quy định có kèm các tiện ích xã hội và phục vụ cộng đồng.", "C": "Là nhà ở có sự hỗ trợ của Nhà nước dành cho các đối tượng hưởng chính sách hỗ trợ nhà ở.", "D": "Là nhà ở bắt buộc phải có trong mọi dự án bất động sản, chủ đầu tư phải dành 20% quỹ đất để phát triển loại nhà này phục vụ cho người nghèo."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nhà ở xã hội là nhà ở thuộc chương trình chính sách, có sự can thiệp và hỗ trợ từ Nhà nước cho các đối tượng cụ thể."}, {"level": "1", "content": "Theo quy định tại Điều 3 Luật Nhà ở 2023, loại hình nhà ở nào sau đây được bổ sung vào danh mục phân loại theo mục đích phát triển và sử dụng so với các luật trước đây?", "options": {"A": "Nhà ở thương mại.", "B": "Nhà ở công vụ.", "C": "Nhà ở xã hội.", "D": "Nhà ở của cá nhân."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Điều 3 Luật Nhà ở 2023 phân định rõ 05 loại hình nhà ở. Trong đó, \"Nhà ở của cá nhân\" (khoản 5) được đưa vào danh mục chính thức cùng với các loại hình dự án chuyên nghiệp. Điều này giúp xác lập hành lang pháp lý để quản lý các loại hình như \"Chung cư mini\" vốn trước đây thường bị nhầm lẫn giữa nhà ở riêng lẻ và dự án thương mại."}, {"level": "1", "content": "Trong Luật Nhà ở 2023, \"Nhà ở cho lực lượng vũ trang nhân dân\" được quy định là một phân mục thuộc nhóm loại hình nhà ở nào sau đây:", "options": {"A": "Nhà ở công vụ.", "B": "Nhà ở xã hội.", "C": "Nhà ở thương mại giá rẻ.", "D": "Nhà ở phục vụ tái định cư."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là điểm đổi mới quan trọng tại Chương VI (Mục 4). Luật Nhà ở 2023 tách riêng \"Nhà ở cho lực lượng vũ trang nhân dân\" như một hình thức nhà ở xã hội đặc thù với cơ chế ưu đãi và đối tượng thụ hưởng riêng biệt, thay vì gộp chung vào các quy định nhà ở xã hội thông thường như trước đây."}, {"level": "1", "content": "Theo Điều 57 Luật Nhà ở 2023, cá nhân xây dựng nhà ở có từ 02 tầng trở lên mà tại mỗi tầng có thiết kế căn hộ để BÁN thì phải thực hiện thủ tục nào?", "options": {"A": "Xin Giấy phép xây dựng nhà ở riêng lẻ thông thường.", "B": "Thực hiện thủ tục đầu tư dự án nhà ở.", "C": "Đăng ký kinh doanh theo hình thức hộ cá thể.", "D": "Cam kết bảo trì công trình theo định kỳ 05 năm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là quy định \"cứng\" nhằm chấn chỉnh tình trạng chung cư mini biến tướng. Khoản 1 Điều 57 quy định nếu cá nhân xây nhà có thiết kế căn hộ để bán hoặc cho thuê mua (không giới hạn số lượng) HOẶC có từ 20 căn hộ trở lên để cho thuê thì bắt buộc phải thực hiện thủ tục đầu tư dự án. Điều này đồng nghĩa với việc cá nhân phải đáp ứng điều kiện về doanh nghiệp và quy trình phê duyệt dự án nghiêm ngặt."}, {"level": "1", "content": "Căn cứ Điều 58 Luật Nhà ở 2023, quyền sở hữu nhà chung cư của chủ sở hữu sẽ chấm dứt vào thời điểm nào?", "options": {"A": "Sau 50 năm kể từ ngày bàn giao căn hộ.", "B": "Khi hết thời hạn sử dụng đất của dự án.", "C": "Khi nhà chung cư thuộc trường hợp phải phá dỡ.", "D": "Khi chủ sở hữu chuyển sang cư trú tại địa điểm khác."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Nhà ở 2023 đã bác bỏ phương án \"Sở hữu chung cư có thời hạn\" (ví dụ 50 năm). Thay vào đó, luật quy định quyền sở hữu gắn liền với Thời hạn sử dụng công trình. Quyền sở hữu chỉ chấm dứt khi tòa nhà bị hư hỏng nặng, có nguy cơ sụp đổ và có quyết định phá dỡ từ cơ quan nhà nước có thẩm quyền."}, {"level": "1", "content": "Theo quy định tại Điều 12 Luật Nhà ở 2023, trường hợp mua bán nhà ở mà các bên không có thỏa thuận khác, thời điểm xác lập quyền sở hữu nhà ở là khi nào?", "options": {"A": "Kể từ thời điểm các bên ký kết hợp đồng mua bán công chứng.", "B": "Kể từ thời điểm bên mua đã thanh toán đủ 100% giá trị hợp đồng.", "C": "Kể từ thời điểm bên mua đã thanh toán đủ tiền và nhận bàn giao nhà.", "D": "Kể từ thời điểm cơ quan nhà nước cấp Sổ hồng cho bên mua."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 12 quy định đối với giao dịch mua bán, thời điểm xác lập quyền sở hữu là khi bên mua đã thanh toán đủ tiền và nhận bàn giao nhà ở, trừ trường hợp có thỏa thuận khác. Đây là điểm quan trọng để xác định thời điểm chuyển giao rủi ro và quyền lợi giữa các bên."}, {"level": "1", "content": "Theo Điều 7 Luật Nhà ở 2023, hành vi nào sau đây bị nghiêm cấm trong việc quản lý và sử dụng nhà chung cư?", "options": {"A": "Sử dụng căn hộ chung cư vào mục đích không phải để ở.", "B": "Cho người khác mượn căn hộ chung cư để ở trong thời gian ngắn.", "C": "Thế chấp căn hộ chung cư tại các tổ chức tín dụng để vay vốn.", "D": "Thực hiện sửa chữa, cải tạo nội thất không ảnh hưởng đến kết cấu"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khoản 10 Điều 7 quy định nghiêm cấm việc sử dụng căn hộ chung cư vào mục đích không phải để ở (ví dụ: làm văn phòng, kho bãi). Đây là quy định nhằm bảo đảm an ninh, an toàn PCCC và môi trường sống yên tĩnh cho cư dân trong tòa nhà."}, {"level": "1", "content": "Theo Điều 10 Luật Nhà ở 2023, chủ sở hữu nhà ở là cá nhân có quyền nào sau đây đối với nhà ở thuộc sở hữu hợp pháp của mình?", "options": {"A": "Tự ý thay đổi mục đích sử dụng đất tại vị trí xây dựng nhà ở.", "B": "Chiếm dụng diện tích không gian chung để phục vụ nhu cầu riêng.", "C": "Bán, chuyển nhượng hợp đồng, tặng cho, để thừa kế nhà ở.", "D": "Ngừng đóng kinh phí bảo trì 2% phần sở hữu chung của tòa nhà sau khi có giấy chứng nhận quyền sở hữu nhà và Ban quản trị đã sử dụng hết quỹ bảo trì 2% vào công tác quản lý bảo trì tòa nhà."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điểm d Khoản 1 Điều 10 xác nhận các quyền định đoạt tài sản cơ bản của chủ sở hữu bao gồm: bán, chuyển nhượng hợp đồng mua bán, tặng cho, đổi, để thừa kế, thế chấp, góp vốn, cho thuê, cho thuê mua, cho mượn, cho ở nhờ, ủy quyền quản lý nhà ở. Các phương án còn lại đều vi phạm các điều cấm hoặc nghĩa vụ của chủ sở hữu."}, {"level": "1", "content": "Người Việt Nam định cư ở nước ngoài có quốc tịch Việt Nam có quyền sở hữu nhà ở tại Việt Nam như thế nào theo Luật Nhà ở 2023?", "options": {"A": "Chỉ được sở hữu 1 căn nhà duy nhất và có quyền để lại thừa kế cho người thuộc quan hệ huyết thống, hôn nhân hoặc nuôi dưỡng.", "B": "Có đầy đủ quyền sở hữu nhà ở như cá nhân trong nước.", "C": "Chỉ được sở hữu nhà ở thông qua thừa kế, được quyền bán lại cho người Việt Nam.", "D": "Phải có giấy chứng nhận đầu tư và có dự án đầu tư hoặc đầu tư kinh doanh tại Việt Nam."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 8 Luật Nhà ở 2023 quy định người Việt Nam định cư ở nước ngoài còn quốc tịch Việt Nam có quyền sở hữu nhà ở như công dân trong nước."}, {"level": "1", "content": "Theo Luật Nhà ở 2023 và Luật Đất đai 2024, người gốc Việt Nam định cư ở nước ngoài (không có quốc tịch Việt Nam) có quyền sở hữu nhà ở theo hình thức nào sau đây:", "options": {"A": "Phải thông qua sự bảo lãnh hoặc đứng tên hộ của thân nhân trong nước.", "B": "Chỉ được sở hữu nhà ở thương mại trong các dự án đầu tư xây dựng.", "C": "Có quyền sở hữu nhà ở gắn liền với quyền sử dụng đất ở như cá nhân trong nước.", "D": "Chỉ được quyền thuê nhà ở hoặc sở hữu nhà ở có thời hạn tối đa 50 năm."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Tại Khoản 3 và Khoản 6 Điều 4 Luật Đất đai 2024, Nhà nước đã gộp chung \"Người gốc Việt Nam định cư ở nước ngoài\" vào nhóm Cá nhân sử dụng đất. Điều này đồng nghĩa với việc họ có đầy đủ các quyền nhận chuyển nhượng, tặng cho, thừa kế đất ở và nhà ở như công dân sinh sống trong nước, không còn bị giới hạn trong phạm vi dự án. Trước đây (Luật 2013), Việt kiều mất quốc tịch chỉ được mua nhà trong dự án. Luật mới đã gỡ bỏ rào cản này, cho phép họ mua nhà lẻ của dân, nhận thừa kế từ gia đình một cách danh chính ngôn thuận."}, {"level": "1", "content": "Tổ chức, cá nhân nước ngoài được sở hữu nhà ở tại Việt Nam thông qua hình thức nào theo Điều 19 Luật Nhà ở 2023?", "options": {"A": "Mua hoặc nhận tặng cho nhà ở riêng lẻ trực tiếp từ cá nhân trong nước.", "B": "Tự đầu tư xây dựng nhà ở trên diện tích đất được Nhà nước cho thuê.", "C": "Mua, thuê mua, nhận tặng cho, nhận thừa kế nhà ở trong dự án thương mại.", "D": "Nhận chuyển nhượng quyền sử dụng đất nền để tự xây dựng nhà ở."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 19 giới hạn các hình thức sở hữu nhà ở của tổ chức, cá nhân nước ngoài trong phạm vi dự án nhà ở thương mại.Có 3 \"vùng cấm\" cần chú ý: Vùng cấm 1 (Phương án A): Người nước ngoài tuyệt đối không được mua nhà trực tiếp từ cá nhân (thị trường thứ cấp ngoài dự án). Đây là điểm khác biệt cốt lõi so với người gốc Việt. Vùng cấm 2 (Phương án B & D): Người nước ngoài không được nhận chuyển nhượng quyền sử dụng đất hoặc thuê đất để tự xây nhà ở riêng lẻ. Họ chỉ được sở hữu \"tài sản trên đất\" thông qua các sản phẩm đã hình thành trong dự án của chủ đầu tư. Đáp án C chuẩn khi liệt kê đầy đủ 4 hành vi pháp lý được phép: Mua, Thuê mua, Tặng cho, Thừa kế. Điều kiện bắt buộc đi kèm là tài sản đó phải nằm trong Dự án đầu tư xây dựng nhà ở thương mại (không thuộc khu vực cấm an ninh quốc phòng)."}, {"level": "1", "content": "Điều 20 Luật Nhà ở 2023 quy định tổ chức, cá nhân nước ngoài không được sở hữu nhà ở tại đâu?", "options": {"A": "Tại các thành phố trực thuộc trung ương, nội thành đô thị loại I, II, III và đặc biệt.", "B": "Tại các khu vực cần bảo đảm quốc phòng, an ninh.", "C": "Tại các khu vực nông thôn, miền núi, biển đảo, biên giới.", "D": "Tại các dự án nhà ở xã hội, nhà ở cho lực lượng vũ trang."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quy định này nhằm đảm bảo an ninh quốc gia. Các khu vực cụ thể được hướng dẫn chi tiết tại Nghị định 95/2024/NĐ-CP."}, {"level": "1", "content": "Số lượng căn hộ tối đa trong một tòa nhà chung cư mà các tổ chức, cá nhân nước ngoài được phép sở hữu là bao nhiêu phần trăm (%) tổng số căn hộ theo Điều 20 Luật Nhà ở 2023?", "options": {"A": "10%", "B": "20%", "C": "30%", "D": "49%"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 20 Luật Nhà ở 2023 và Nghị định 95/2024/NĐ-CP quy định rõ giới hạn 30%."}, {"level": "1", "content": "Theo Điều 21 Luật Nhà ở 2023, thời hạn sở hữu nhà ở tối đa của cá nhân nước ngoài tại Việt Nam là bao nhiêu năm (kể từ ngày cấp Giấy chứng nhận)?", "options": {"A": "30 năm, không được phép gia hạn, được quyền để lại thừa kế cho người thân.", "B": "50 năm, có thể gia hạn thêm một lần không quá 50 năm.", "C": "70 năm, có thể gia hạn thêm một lần không quá 50 năm.", "D": "Bằng thời hạn hoạt động của dự án đầu tư, ghi trong giấy chứng nhận đầu tư."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 21 quy định thời hạn sở hữu là 50 năm và khả năng gia hạn thêm 1 lần không quá 50 năm nữa."}, {"level": "1", "content": "Trường hợp nào cá nhân nước ngoài được sở hữu nhà ở ổn định, lâu dài như công dân Việt Nam theo Điều 21 Luật Nhà ở 2023?", "options": {"A": "Có đóng góp đặc biệt cho Việt Nam.", "B": "Được cơ quan nhà nước Việt Nam bảo lãnh.", "C": "Kết hôn với công dân Việt Nam đang sinh sống tại Việt Nam.", "D": "Là nhà đầu tư chiến lược theo Luật Đầu tư."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 21 Luật Nhà ở 2023 quy định trường hợp ngoại lệ này."}, {"level": "1", "content": "Theo quy định tại Điều 12 Luật Kinh doanh bất động sản 2023, điều kiện nào sau đây là bắt buộc đối với nhà ở có sẵn đưa vào kinh doanh?", "options": {"A": "Phải được xây dựng bằng vật liệu xanh và tiết kiệm năng lượng.", "B": "Có Giấy chứng nhận, không tranh chấp, không kê biên, bảo đảm chất lượng.", "C": "Phải nằm trong quy hoạch các khu đô thị đặc biệt hoặc đô thị loại I, II, III.", "D": "Có giá trị định giá trên thị trường tối thiểu từ 01 tỷ đồng trở lên hoặc nằm trên các tuyến đường ghi nhận trên bảng giá đất do UBND tỉnh ban hành hàng năm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật 2023 yêu cầu một bất động sản \"sạch\" phải hội đủ 4 yếu tố: Pháp lý quyền sở hữu (Giấy chứng nhận), Thực trạng quyền (Không tranh chấp), Nghĩa vụ thi hành án (Không bị kê biên) và Tiêu chuẩn kỹ thuật (Chất lượng công trình). Ngoài các yếu tố trên, Điều 12 còn nhấn mạnh việc phải phù hợp với giấy phép xây dựng. Điều này giúp ngăn chặn việc kinh doanh các công trình sai phép, vượt tầng vốn rất nhức nhối trước đây."}, {"level": "1", "content": "Theo Điều 24 Luật Kinh doanh bất động sản 2023, nhà ở hình thành trong tương lai muốn được bán, cho thuê mua cần đáp ứng điều kiện nào về tiến độ xây dựng?", "options": {"A": "Đã hoàn thành san lấp mặt bằng và xây dựng xong tường rào dự án.", "B": "Đã hoàn thành việc xây dựng phần móng.", "C": "Đã hoàn thành việc cất nóc và bắt đầu triển khai thi công phần thô.", "D": "Đã hoàn thiện mặt hạ tầng kỹ thuật và được nghiệm thu bởi cơ quan nhà nước có thẩm quyền."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Hoàn thành móng là một trong các điều kiện tiên quyết để nhà ở hình thành trong tương lai được đưa vào kinh doanh."}, {"level": "1", "content": "Theo Điều 26 Luật Kinh doanh bất động sản 2023, chủ đầu tư dự án trước khi bán, cho thuê mua nhà ở hình thành trong tương lai phải thực hiện nghĩa vụ bảo lãnh như thế nào?", "options": {"A": "Phải được Bộ Tài chính xác nhận năng lực tài chính và bảo lãnh nợ dự án.", "B": "Được ngân hàng thương mại bảo lãnh nghĩa vụ tài chính đối với khách hàng.", "C": "Phải mua bảo hiểm trách nhiệm dân sự cho toàn bộ quá trình thi công dự án.", "D": "Phải thực hiện ký quỹ tiền mặt tại Ngân hàng Nhà nước theo tiến độ xây dựng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mục đích bảo lãnh là ngân hàng bảo lãnh để đảm bảo rằng nếu chủ đầu tư không bàn giao nhà đúng cam kết, ngân hàng sẽ có trách nhiệm hoàn trả số tiền mà khách hàng đã đóng cùng với lãi suất theo thỏa thuận. Khác với Luật 2014, Luật 2023 (Khoản 1 Điều 26) cho phép bên mua/bên thuê mua được tự nguyện lựa chọn việc không có bảo lãnh cho chính hợp đồng của mình (trừ trường hợp thuê mua). Điều này thường giúp người mua giảm được một phần chi phí (phí bảo lãnh ngân hàng thường được tính vào giá bán). Hồ sơ bắt buộc: Chủ đầu tư phải gửi bản sao hợp đồng bảo lãnh cho khách hàng khi ký kết hợp đồng mua bán. Đây là căn cứ pháp lý quan trọng nhất để khách hàng tự bảo vệ mình.."}, {"level": "1", "content": "Việc thanh toán lần đầu trong hợp đồng mua bán nhà ở hình thành trong tương lai được giới hạn ở mức nào theo Điều 25 Luật Kinh doanh bất động sản 2023?", "options": {"A": "Không quá 5% giá trị hợp đồng.", "B": "Không quá 30% giá trị hợp đồng (bao gồm tiền đặt cọc).", "C": "Không quá 50% giá trị hợp đồng (không tính các loại thuế, phí).", "D": "Không quá 70% giá trị hợp đồng tính đến trước thời điểm bàn giao nhà."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 25 quy định rõ mức trần cho lần thanh toán đầu tiên là 30%. Theo Điều 23, tiền đặt cọc chỉ được thu tối đa 5% giá trị nhà ở/công trình xây dựng khi đã đủ điều kiện thiết kế cơ sở. Như vậy, sau khi đặt cọc, đợt thanh toán chính thức đầu tiên (thường là khi ký Hợp đồng mua bán khi đủ điều kiện giao dịch) chủ đầu tư chỉ được thu thêm tối đa 25% để tổng mức không quá 30%. Các đợt tiếp theo phải phù hợp với tiến độ xây dựng. Tổng số tiền thu trước khi bàn giao nhà không quá 70% (đối với chủ đầu tư trong nước) hoặc 50% (đối với doanh nghiệp FDI). Con số 95% là giới hạn tối đa trước khi người mua được cấp GCN (Sổ hồng)."}, {"level": "1", "content": "Theo Khoản 5 Điều 23 Luật Kinh doanh bất động sản 2023, chủ đầu tư dự án được thu tiền đặt cọc từ khách hàng tối đa bao nhiêu % giá bán, thuê mua khi nhà ở đã có thiết kế cơ sở được cơ quan nhà nước thẩm định?", "options": {"A": "Không quá 2% giá bán, thuê mua.", "B": "Không quá 5% giá bán, thuê mua.", "C": "Không quá 10% giá bán, thuê mua.", "D": "Không giới hạn nếu có thỏa thuận tự nguyện giữa hai bên."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ vào Khoản 5 Điều 23 Luật Kinh doanh bất động sản 2023: \"5. Chủ đầu tư dự án bất động sản chỉ được thu tiền đặt cọc từ khách hàng khi nhà ở, công trình xây dựng đã có thiết kế cơ sở được cơ quan nhà nước thẩm định và chủ đầu tư có một trong các giấy tờ về quyền sử dụng đất quy định tại khoản 2 Điều 24 của Luật này. Việc đặt cọc phải lập thành văn bản (sau đây gọi là thỏa thuận đặt cọc); ghi rõ giá bán, thuê mua nhà ở, công trình xây dựng; số tiền đặt cọc không quá 5% giá bán, thuê mua nhà ở, công trình xây dựng; thỏa thuận đặt cọc phải ghi rõ mục đích đặt cọc để bảo đảm giao kết hợp đồng mua bán, thuê mua nhà ở, công trình xây dựng.\""}, {"level": "1", "content": "Theo Điều 89 Luật Nhà ở 2023, bên mua hoặc bên thuê mua nhà ở xã hội không được phép bán lại nhà ở trong thời hạn tối thiểu là bao nhiêu năm?", "options": {"A": "05 năm kể từ thời điểm ký kết hợp đồng mua bán hoặc thuê mua.", "B": "05 năm kể từ thời điểm nhận bàn giao nhà ở thực tế từ chủ đầu tư.", "C": "05 năm kể từ ngày bên mua, bên thuê mua đã thanh toán đủ tiền mua, thuê mua.", "D": "10 năm kể từ ngày được cơ quan nhà nước cấp Giấy chứng nhận (Sổ hồng)."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 89 quy định thời hạn hạn chế chuyển nhượng là 5 năm. Điểm mấu chốt của Điều 89 là mốc \"thanh toán đủ tiền\". Quy định này nhằm đảm bảo người thụ hưởng đã thực hiện đầy đủ nghĩa vụ tài chính trước khi tính thời gian thử thách cư trú. Nếu tính từ ngày nhận nhà thì thường sẽ sớm hơn, còn tính từ ngày cấp Sổ hồng thì lại quá muộn (do thủ tục cấp sổ thường có độ trễ), vì vậy mốc thanh toán đủ tiền là công bằng nhất."}, {"level": "1", "content": "Trong thời hạn 05 năm kể từ ngày đã thanh toán đủ tiền, nếu bên mua hoặc bên thuê mua có nhu cầu bán lại nhà ở xã hội thì được bán cho đối tượng nào?", "options": {"A": "Bán cho bất kỳ cá nhân nào có nhu cầu thông qua sàn giao dịch bất động sản.", "B": "Bán lại cho chủ đầu tư dự án hoặc đối tượng thuộc diện được mua nhà ở xã hội.", "C": "Chỉ được bán lại cho Ủy ban nhân dân cấp tỉnh nơi có dự án nhà ở xã hội.", "D": "Không được phép bán dưới mọi hình thức, chỉ được trả lại cho Nhà nước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 89 quy định rõ về đối tượng và giá bán tối đa khi bán lại trong thời hạn 5 năm. Theo đó, để bảo toàn quỹ nhà, họ chỉ được bán lại cho: (1) Chủ đầu tư dự án NOXH đó hoặc (2) Đối tượng đủ điều kiện mua NOXH theo quy định. Giá bán không được vượt quá giá bán tối đa giá bán nhà ở xã hội này trong hợp đồng mua bán với chủ đầu tư dự án đầu tư xây dựng nhà ở xã hội. Việc nộp thuế thu nhập cá nhân thực hiện theo quy định của pháp luật về thuế."}, {"level": "1", "content": "Theo Luật Nhà ở 2023, các hình thức phát triển nhà ở xã hội được quy định bao gồm những nhóm chủ thể và nguồn vốn nào sau đây?", "options": {"A": "Nhà nước đầu tư xây dựng bằng vốn đầu tư công, vốn nhà nước ngoài đầu tư công hoặc theo hình thức hợp đồng đối tác công tư (PPP) để phục vụ mục đích cho thuê và cho thuê mua.", "B": "Nhà nước đầu tư bằng vốn ngân sách; Doanh nghiệp, Hợp tác xã đầu tư bằng vốn ngoài ngân sách; Tổng Liên đoàn Lao động Việt Nam đầu tư nhà lưu trú công nhân; Tổ chức kinh tế có vốn đầu tư nước ngoài tham gia phát triển.", "C": "Các tổ chức chính trị - xã hội, tổ chức xã hội - nghề nghiệp và các quỹ thiện nguyện thực hiện đầu tư xây dựng không vì mục đích lợi nhuận trên quỹ đất được Nhà nước giao không thu tiền sử dụng đất.", "D": "Các hộ gia đình, cá nhân có quyền sử dụng đất hợp pháp tự đầu tư xây dựng hoặc cải tạo nhà ở đạt tiêu chuẩn kỹ thuật để cho các đối tượng thụ hưởng chính sách thuê, thuê mua hoặc mua."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 80 Luật Nhà ở 2023 quy định đa dạng các hình thức phát triển nhà ở xã hội."}, {"level": "1", "content": "Theo Điều 85 Luật Nhà ở 2023, chủ đầu tư dự án nhà ở xã hội (không bằng vốn đầu tư công) được hưởng ưu đãi nào sau đây về đất đai?", "options": {"A": "Được phép tự do chuyển đổi 30% diện tích dự án sang mục đích thương mại cao cấp.", "B": "Được Nhà nước hỗ trợ 100% kinh phí giải phóng mặt bằng và bồi thường đất.", "C": "Được cấp Giấy chứng nhận quyền sử dụng đất (Sổ đỏ) vĩnh viễn cho pháp nhân công ty.", "D": "Miễn tiền sử dụng đất, tiền thuê đất và không phải thực hiện thủ tục xác định giá đất."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Điều 85 Luật Nhà ở 2023 liệt kê các ưu đãi, trong đó có miễn tiền sử dụng đất, tiền thuê đất. Miễn tiền sử dụng đất (Cơ chế tự động): Trước đây, để được miễn tiền sử dụng đất, chủ đầu tư vẫn phải chờ cơ quan nhà nước thực hiện các bước xác định giá đất, sau đó mới ra quyết định miễn. Việc này tốn từ 6-12 tháng. Cải cách hành chính (Điểm mới): Luật 2023 quy định chủ đầu tư được miễn tiền sử dụng đất, tiền thuê đất cho toàn bộ diện tích đất của dự án và không phải thực hiện thủ tục xác định giá đất, tính tiền sử dụng đất, tiền thuê đất được miễn. Đây là điểm chính giúp rút ngắn quy trình thực hiện dự án cực kỳ nhanh."}, {"level": "1", "content": "Theo Điều 76 Luật Nhà ở 2023, đối tượng nào được bổ sung vào danh sách hưởng chính sách hỗ trợ về nhà ở xã hội so với luật cũ?", "options": {"A": "Người cao tuổi neo đơn và người khuyết tật nặng tại khu vực nông thôn.", "B": "Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã trong khu công nghiệp.", "C": "Sinh viên tốt nghiệp loại xuất sắc làm việc tại các cơ quan nhà nước.", "D": "Cá nhân là người nước ngoài đang làm việc tại các tập đoàn đa quốc gia."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 12 Điều 76 là điểm mới, cho phép doanh nghiệp khu công nghiệp tham gia vào việc giải quyết nhà ở cho công nhân của mình. Trước đây, đối tượng hưởng chính sách NOXH chủ yếu là cá nhân (người lao động, công chức...). Luật Nhà ở 2023 đã cho phép các Pháp nhân (Doanh nghiệp, Hợp tác xã trong khu công nghiệp) được thuê nhà ở xã hội để bố trí cho công nhân của mình thuê lại. Điều này giúp doanh nghiệp ổn định nhân sự và giảm tải áp lực tìm nhà cho công nhân. Việc bổ sung này gắn liền với quy định về \"Nhà lưu trú công nhân trong khu công nghiệp\". Doanh nghiệp trong khu công nghiệp được phép đứng tên thuê hoặc mua (tùy trường hợp) để phục vụ mục đích phúc lợi lao động."}, {"level": "1", "content": "Theo quy định tại Điều 78 Luật Nhà ở 2023, đối tượng được hưởng chính sách hỗ trợ nhà ở xã hội phải đáp ứng điều kiện nào sau đây về nhà ở?", "options": {"A": "Phải đang cư trú tại nhà ở tạm bợ hoặc nhà ở do thuê, mượn, ở nhờ của cá nhân khác.", "B": "Phải cam kết không sở hữu bất kỳ bất động sản nào khác trên toàn lãnh thổ Việt Nam.", "C": "Đã có nhà ở nhưng đang nằm trong khu vực quy hoạch giải tỏa và đã nhận tiền bồi thường.", "D": "Chưa có nhà ở thuộc sở hữu tại tỉnh, thành phố nơi có dự án hoặc có nhà ở nhưng diện tích bình quân đầu người thấp hơn mức quy định."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Phạm vi địa giới (Điều 78 Luật Nhà ở 2023): Khác với tư duy cũ, luật mới nhấn mạnh việc chưa có nhà ở thuộc sở hữu tại tỉnh, thành phố trực thuộc trung ương nơi có dự án đó. Điều này giúp tạo điều kiện cho lao động di cư có thể sở hữu nhà tại nơi làm việc dù ở quê họ đã có nhà. Ngưỡng diện tích trong Nghị định 100/2024/NĐ-CP (Khoản 2 Điều 30) quy định mức diện tích nhà ở bình quân để được coi là \"khó khăn về nhà ở\" đã được nâng lên. Nếu trước đây là 10m²/người, thì nay quy định là dưới 15m² sàn/người. Việc xác nhận tình trạng nhà ở hiện nay đã được đơn giản hóa, căn cứ vào dữ liệu dân cư và đăng ký đất đai, giúp giảm bớt gánh nặng giấy tờ cho người dân.."}, {"level": "1", "content": "Theo quy định tại Điều 150 Luật Nhà ở 2023, loại hình nhà chung cư nào bắt buộc phải do đơn vị có chức năng, năng lực quản lý vận hành thực hiện?", "options": {"A": "Tất cả các nhà chung cư không phân biệt quy mô và số tầng.", "B": "Nhà chung cư có trang bị hệ thống thang máy.", "C": "Nhà chung cư có quy mô từ 20 căn hộ trở lên.", "D": "Nhà chung cư được đầu tư bằng nguồn ngân sách nhà nước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 150 Luật Nhà ở 2023 quy định: \"Nhà chung cư có thang máy phải do đơn vị có chức năng, năng lực quản lý vận hành nhà chung cư thực hiện\". Đối với nhà chung cư không có thang máy, Hội nghị nhà chung cư có thể tự quyết định việc tự quản lý vận hành hoặc thuê đơn vị chuyên nghiệp. Đây là quy định dựa trên tính chất phức tạp về kỹ thuật và an toàn của hệ thống thang máy."}, {"level": "1", "content": "Theo quy định tại Luật Nhà ở 2023, sau khi Ban quản trị nhà chung cư được thành lập và có văn bản yêu cầu bàn giao, trách nhiệm quản lý và sử dụng kinh phí bảo trì phần sở hữu chung được quy định như thế nào?", "options": {"A": "Chủ đầu tư tiếp tục quản lý và tự quyết định các khoản chi bảo trì lớn.", "B": "Đơn vị quản lý vận hành trực tiếp thu và quản lý tiền bảo trì để chủ động sửa chữa.", "C": "Ủy ban nhân dân cấp huyện nơi có nhà chung cư sẽ quản lý để đảm bảo tính khách quan.", "D": "Ban quản trị quản lý thông qua tài khoản mở tại tổ chức tín dụng và sử dụng theo kế hoạch đã được Hội nghị nhà chung cư thông qua."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ pháp lý: Điều 153. Quản lý, sử dụng kinh phí bảo trì phần sở hữu chung của nhà chung cư có nhiều chủ sở hữu (Luật Nhà ở 2023): \"Sau khi Ban quản trị nhà chung cư được thành lập... Ban quản trị nhà chung cư có trách nhiệm quản lý, sử dụng kinh phí bảo trì theo đúng mục đích, hạng mục được Hội nghị nhà chung cư thông qua...\". Điểm quan trọng liên quan đến vấn đề này là Tính tách biệt của tài khoản: Ban quản trị phải mở tài khoản tại tổ chức tín dụng đang hoạt động tại Việt Nam để quản lý kinh phí này. Điểm mới là tài khoản này có thể do một hoặc nhiều thành viên Ban quản trị đứng tên đồng chủ tài khoản để tăng tính giám sát (quy định tại quy chế quản lý sử dụng nhà chung cư)."}, {"level": "1", "content": "Theo quy định tại Luật Nhà ở 2023, trường hợp nào sau đây nhà chung cư thuộc diện phải phá dỡ để cải tạo, xây dựng lại?", "options": {"A": "Nhà chung cư bị xuống cấp về thẩm mỹ, cần sơn sửa và thay thế nội thất.", "B": "Nhà chung cư hết niên hạn sử dụng theo hồ sơ thiết kế và có kết luận kiểm định của cơ quan thẩm quyền là không còn an toàn.", "C": "Nhà chung cư có tỷ lệ căn hộ trống hoặc không có người ở trên 50%.", "D": "Tất cả các nhà chung cư được xây dựng trước thời điểm năm 1994, xuống cấp hư hỏng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> 3 kịch bản chính để phá dỡ cải tạp, xây dựng lại nhà chung cư quy định tại Điều 59 và Điều 60 của Luật Nhà ở 2023: (1) Sự cố bất khả kháng (Khoản 1 Điều 59): Nhà chung cư bị hư hỏng do thiên tai, cháy nổ mà không còn bảo đảm điều kiện an toàn để tiếp tục sử dụng. (2) Hết tuổi thọ thiết kế (Khoản 2 Điều 59): Đây là trường hợp phổ biến nhất (như phương án B). Khi công trình hết niên hạn, cơ quan quản lý nhà ở cấp tỉnh phải tổ chức kiểm định. Nếu kết luận là nguy hiểm (cấp D) hoặc không đảm bảo an toàn, bắt buộc phải phá dỡ. (3) Hư hỏng hệ thống hạ tầng (Khoản 3 Điều 59): Các hệ thống hạ tầng kỹ thuật (PCCC, cấp thoát điện, nước) bị hư hỏng nghiêm trọng, không đáp ứng quy chuẩn kỹ thuật hiện hành, có nguy cơ gây cháy nổ, mất an toàn cao.."}, {"level": "1", "content": "Theo quy định tại Điều 31 Luật Nhà ở 2023, tiêu chuẩn diện tích sàn đối với căn hộ chung cư thương mại được quy định như thế nào?", "options": {"A": "Phải đạt diện tích tối thiểu là 45 m2 và không vượt quá 150 m2.", "B": "Mặc định tối thiểu là 25 m2 đối với mọi loại hình dự án trên cả nước.", "C": "Do Ủy ban nhân dân cấp tỉnh quy định tùy theo điều kiện kinh tế - xã hội của địa phương.", "D": "Thiết kế khép kín, diện tích sàn không thấp hơn mức quy định của Quy chuẩn kỹ thuật quốc gia về nhà chung cư."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Theo khoản 2 Điều 31 Luật Nhà ở năm 2023 quy định:  Nhà ở được thiết kế, xây dựng theo quy định của Luật này và phải phù hợp với tiêu chuẩn, quy chuẩn xây dựng; đối với căn hộ chung cư thì phải thiết kế, xây dựng khép kín, có diện tích sàn căn hộ không thấp hơn diện tích theo quy chuẩn kỹ thuật quốc gia về nhà chung cư; đối với khu vực nông thôn, việc xây dựng nhà ở còn phải phù hợp với phong tục, tập quán, kiến trúc nhà ở nông thôn theo từng vùng, miền, phải bao gồm các công trình phụ trợ phục vụ nhu cầu sinh hoạt, sản xuất của gia đình, cá nhân. Hiện nay, Quy chuẩn kỹ thuật quốc gia về nhà chung cư (QCVN 04:2021/BXD) quy định diện tích sử dụng căn hộ chung cư không nhỏ hơn 25 m2. Tuy nhiên, Luật cũng khống chế tỷ lệ căn hộ nhỏ (dưới 45 m2) trong một dự án để đảm bảo hạ tầng xã hội.Yêu cầu \"Khép kín\" cũng là yêu cầu quan trọng trong Luật Nhà ở 2023. Một căn hộ được công nhận là nhà ở thương mại bắt buộc phải có đầy đủ các khu vực chức năng riêng biệt (bếp, vệ sinh, phòng ngủ/khách) trong cùng một không gian sàn. Khoản 2 Điều 31 của Luật Nhà ở 2023 còn mở rộng cho khu vực nông thôn, yêu cầu nhà ở phải phù hợp với phong tục, tập quán và kiến trúc vùng miền, đồng thời phải có công trình phụ trợ phục vụ sản xuất."}, {"level": "1", "content": "Theo Luật Nhà ở 2023, việc phân biệt giữa \"nhà ở có sẵn\" và \"nhà ở hình thành trong tương lai\" có ý nghĩa pháp lý quan trọng như thế nào đối với hoạt động Kinh doanh bất động sản?", "options": {"A": "Chỉ ảnh hưởng đến quy trình và thủ tục cấp Giấy chứng nhận quyền sở hữu lần đầu.", "B": "Chi phối toàn bộ hệ thống điều kiện giao dịch, nghĩa vụ bảo lãnh ngân hàng và lộ trình thanh toán theo quy định pháp luật.", "C": "Chỉ có ý nghĩa trong việc xác định thời điểm tính thuế thu nhập cá nhân khi chuyển nhượng.", "D": "Là căn cứ duy nhất để xác định thẩm quyền phê duyệt dự án của Ủy ban nhân dân các cấp.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự phân biệt này là nền tảng để áp dụng các quy định khác nhau, đặc biệt là các điều kiện chặt chẽ hơn đối với giao dịch nhà ở hình thành trong tương lai theo Luật Kinh doanh bất động sản 2023. Ví dụ Điều 12 & Điều 24 Luật Kinh doanh bất động sản 2023) quy định: (1) Nhà ở có sẵn: Phải có Giấy chứng nhận (Sổ hồng), không tranh chấp, không bị kê biên.  (2) Nhà ở hình thành trong tương lai: Đòi hỏi khắt khe hơn nhiều: Phải có giấy tờ đất, giấy phép xây dựng, nghiệm thu xong móng (với chung cư) và phải có thông báo đủ điều kiện bán từ Sở Xây dựng. Điều 25 quy định"}, {"level": "1", "content": "Ngoài việc có hộ chiếu còn giá trị và có dấu đóng đã nhập cảnh vào Việt Nam, cá nhân nước ngoài muốn sở hữu nhà ở tại Việt Nam phải đáp ứng điều kiện nào sau đây theo quy định tại Điều 3 Nghị định 95/2024/NĐ-CP?", "options": {"A": "Phải có thẻ tạm trú hoặc thẻ thường trú với thời hạn còn lại ít nhất 06 tháng.", "B": "Phải thực hiện ký quỹ bảo đảm tại Ngân hàng Việt Nam.", "C": "Phải có xác nhận của đơn vị sử dụng lao động về việc đang làm việc tại Việt Nam..", "D": "Phải có văn bản cam kết không thuộc diện được hưởng quyền ưu đãi, miễn trừ ngoại giao, lãnh sự."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Điều 3 Nghị định 95/2024/NĐ-CP yêu cầu cá nhân nước ngoài phải có cam kết không thuộc diện hưởng quyền ưu đãi, miễn trừ ngoại giao, lãnh sự.  Theo quy ước quốc tế và pháp luật Việt Nam, những người hưởng quyền ưu đãi, miễn trừ ngoại giao (nhân viên đại sứ quán, lãnh sự quán...) có những đặc quyền về miễn trừ xét xử và tài sản. Nếu để đối tượng này sở hữu nhà ở thương mại thông thường, khi xảy ra tranh chấp, thi hành án hoặc thu hồi đất, Nhà nước Việt Nam sẽ gặp khó khăn về mặt ngoại giao và pháp lý quốc tế. Do đó, Điều 3 Nghị định 95/2024/NĐ-CP yêu cầu họ phải không thuộc diện này để đảm bảo tài sản đó chịu sự điều chỉnh hoàn toàn bởi pháp luật Việt Nam. Một trong những điểm mới của Luật Nhà ở 2023 và Nghị định 95/2024/NĐ-CP là đã bãi bỏ yêu cầu về thời hạn lưu trú hay giấy phép lao động khi mua nhà. Cá nhân nước ngoài chỉ cần được phép nhập cảnh là đủ \"tư cách\" về mặt hành chính, giúp thu hút đầu tư và nguồn lực quốc tế. Khi thực hiện thủ tục cấp Giấy chứng nhận (Sổ hồng), cá nhân nước ngoài phải trình Hộ chiếu có dấu kiểm chứng nhập cảnh và bản cam kết này (thường được tích hợp trong đơn đề nghị cấp giấy hoặc hợp đồng mua bán)."}, {"level": "1", "content": "Theo quy định tại Điều 5 Nghị định 95/2024/NĐ-CP, giới hạn số lượng nhà ở riêng lẻ (biệt thự, nhà ở liền kề) mà tổ chức, cá nhân nước ngoài được sở hữu trong dự án đầu tư xây dựng nhà ở được xác định như thế nào?", "options": {"A": "Không quá 30% tổng số lượng nhà ở riêng lẻ của từng dự án.", "B": "Không quá 250 căn trên một địa bàn có số dân tương đương một đơn vị hành chính cấp phường.", "C": "Tối đa 250 căn đối với mỗi dự án bất kể quy mô dân số của khu vực đó.", "D": "Không giới hạn tỷ lệ trong dự án, chỉ khống chế tổng số 250 căn trên phạm vi một quận/huyện."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 5 Nghị định 95/2024/NĐ-CP quy định giới hạn số lượng cụ thể, phụ thuộc vào quy mô dự án và địa bàn hành chính. Con số 250 căn là con số tổng (tổng cộng dồn) áp dụng cho toàn bộ các dự án nằm trên cùng một đơn vị hành chính cấp phường (hoặc khu vực có dân số tương đương 10.000 người)"}, {"level": "1", "content": "Việc xác định một dự án nhà ở thương mại có nằm trong khu vực hạn chế sở hữu đối với người nước ngoài vì lý do quốc phòng, an ninh thường phụ thuộc vào yếu tố nào ngoài quy định chung tại Nghị định 95/2024/NĐ-CP?", "options": {"A": "Ý kiến đồng thuận của cộng đồng cư dân và Ban quản trị nhà chung cư tại khu vực dự án.", "B": "Cam kết của chủ đầu tư về việc không bán nhà cho người nước ngoài trong hồ sơ dự án.", "C": "Danh mục dự án cụ thể do Ủy ban nhân dân cấp tỉnh quyết định dựa trên ý kiến của Bộ Quốc phòng và Bộ Công an.", "D": "Mật độ dân cư thực tế và giá trị vốn hóa của dự án trên thị trường bất động sản địa phương."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Mặc dù Nghị định 95 (Điều 5) có định nghĩa chung, việc xác định chính xác vị trí hạn chế cần đối chiếu với quy hoạch và văn bản cụ thể của địa phương.   Chủ đầu tư hoặc cư dân không có quyền tự quyết định dự án có cho người nước ngoài mua hay không. Mọi giao dịch phải căn cứ vào danh mục đã được phê duyệt và công bố chính thức. Nếu chủ đầu tư bán nhà cho người nước ngoài tại dự án nằm trong danh sách hạn chế, hợp đồng đó sẽ bị vô hiệu và cơ quan chức năng sẽ không cấp Giấy chứng nhận (Sổ hồng) cho người mua."}, {"level": "1", "content": "Trong trường hợp trưng mua, trưng dụng nhà ở vì lý do quốc phòng, an ninh, lợi ích quốc gia, Nhà nước có nghĩa vụ gì đối với chủ sở hữu theo Luật Nhà ở 2023?", "options": {"A": "Chỉ thực hiện nghĩa vụ thông báo bằng văn bản trước ít nhất 30 ngày.", "B": "Bồi thường theo giá thị trường tự do tại thời điểm trưng mua.", "C": "Phải thực hiện b

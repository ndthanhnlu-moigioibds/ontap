 luật (CEO, Chủ tịch HĐQT...) có quyền ủy quyền cho cấp dưới (Phó giám đốc, Trưởng phòng) thực hiện việc ký kết. Hình thức văn bản ủy quyền: Đối với giao dịch bất động sản bắt buộc phải công chứng, thì văn bản ủy quyền cũng thường được yêu cầu phải công chứng/chứng thực để đảm bảo tính xác thực về ý chí của người ủy quyền. Phạm vi ủy quyền: Đây là điểm \"bẫy\" trong thực tế. Văn bản ủy quyền phải ghi rõ: (1) Được ký hợp đồng cụ thể nào? (2) Thời hạn ủy quyền là bao lâu? (3) Có được ủy quyền lại cho người thứ ba hay không? Lưu ý nghiệp vụ: \"Giấy giới thiệu\" (Phương án B) thường chỉ có giá trị trong các thủ tục hành chính, liên hệ công tác. Trong xác lập giao dịch làm phát sinh quyền và nghĩa vụ tài sản (như hợp đồng BĐS), Giấy giới thiệu không có giá trị thay thế Văn bản ủy quyền.."}, {"level": "1", "content": "Khi công chứng hợp đồng chuyển nhượng bất động sản có giá trị lớn (thường từ 35% tổng giá trị tài sản trở lên) của một công ty cổ phần, ngoài các giấy tờ pháp lý thông thường, Công chứng viên bắt buộc phải yêu cầu thêm văn bản nào sau đây?", "options": {"A": "Báo cáo kiểm toán và báo cáo thuế của năm tài chính gần nhất.", "B": "Nghị quyết của Hội đồng quản trị hoặc Đại hội đồng cổ đông phê duyệt giao dịch.", "C": "Danh sách cổ đông sáng lập và thành viên Ban kiểm soát doanh nghiệp.", "D": "Biên bản họp của Ban chấp hành Công đoàn cơ sở về việc bán tài sản."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Tùy thuộc vào Điều lệ công ty và giá trị giao dịch, các giao dịch lớn có thể cần sự phê duyệt của cấp có thẩm quyền trong doanh nghiệp (ĐHĐCĐ/HĐQT đối với công ty cổ phần). Theo Điều 153 và Điều 167 Luật Doanh nghiệp 2020, người đại diện theo pháp luật (như Giám đốc/Tổng giám đốc) không có quyền tự quyết đối với các tài sản có giá trị lớn hoặc giao dịch với người có liên quan. Ngưỡng phê duyệt: Hội đồng quản trị (HĐQT): Phê duyệt các giao dịch có giá trị dưới 35% tổng giá trị tài sản (hoặc tỷ lệ khác nhỏ hơn quy định tại Điều lệ). Đại hội đồng cổ đông (ĐHĐCĐ): Phê duyệt các giao dịch có giá trị từ 35% tổng giá trị tài sản trở lên (hoặc các giao dịch làm cho tổng giá trị giao dịch phát sinh trong vòng 12 tháng từ 35% trở lên). Trách nhiệm của Công chứng viên: Để đảm bảo văn bản công chứng không bị tuyên vô hiệu, Công chứng viên phải kiểm tra Điều lệ công ty để xác định giao dịch này thuộc thẩm quyền của cấp nào, từ đó yêu cầu cung cấp Nghị quyết tương ứng."}, {"level": "1", "content": "Hồ sơ pháp lý quan trọng nào chứng minh nhà ở hình thành trong tương lai đủ điều kiện bán mà chủ đầu tư cần cung cấp khi công chứng Hợp đồng mua bán?", "options": {"A": "Giấy chứng nhận đăng ký doanh nghiệp của chủ đầu tư.", "B": "Biên bản nghiệm thu đã hoàn thành xong phần móng của tòa nhà.", "C": "Hợp đồng hợp tác đầu tư với nhà thầu xây dựng.", "D": "Chứng thư thẩm định giá bất động sản."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là một trong những điều kiện bắt buộc theo Luật kinh doanh bất động sản để nhà chung cư hình thành trong tương lai được phép bán, cùng với các giấy tờ pháp lý dự án và văn bản thông báo đủ điều kiện bán của Sở Xây dựng. Điều kiện về kỹ thuật: Đối với loại hình nhà chung cư hoặc tòa nhà hỗn hợp có mục đích để ở hình thành trong tương lai, điều kiện \"cứng\" để được phép ký hợp đồng mua bán là phải có biên bản nghiệm thu hoàn thành phần móng. Đối với các loại nhà ở thấp tầng (liền kề, biệt thự), điều kiện là phải hoàn thành việc xây dựng hệ thống hạ tầng kỹ thuật tương ứng theo tiến độ dự án. Để đảm bảo an toàn tuyệt đối khi công chứng, hồ sơ cần có thêm: (1) Giấy tờ về quyền sử dụng đất (Quyết định giao đất, cho thuê đất...). (2) Giấy phép xây dựng và hồ sơ thiết kế bản vẽ thi công đã được duyệt. (3) Văn bản của Sở Xây dựng thông báo về việc nhà ở đủ điều kiện được bán, cho thuê mua. (4) Chứng thư bảo lãnh của ngân hàng thương mại về nghĩa vụ tài chính của chủ đầu tư."}, {"level": "1", "content": "Việc chuyển nhượng hợp đồng mua bán nhà ở hình thành trong tương lai giữa cá nhân (không phải Doanh nghiệp kinh doanh bất động sản) có bắt buộc phải công chứng hoặc chứng thực không?", "options": {"A": "Không bắt buộc phải công chứng, chứng thực, có công chứng chứng thực hay không là tùy yêu cầu các bên.", "B": "Luôn bắt buộc phải công chứng, chứng thực theo mọi thời kỳ.", "C": "Bắt buộc công chứng, chứng thực, nhưng được bãi bỏ kể từ ngày 01/01/2027.", "D": "Chỉ bắt buộc chứng thực tại UBND cấp xã, không được công chứng tại Văn phòng tư nhân.."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Quy định hiện hành (Điều 44 Luật KDBĐS 2023): Nguyên tắc \"Cá nhân - Cá nhân\": Khi các bên tham gia giao dịch đều là cá nhân (không phải tổ chức kinh doanh BĐS chuyên nghiệp), Luật bắt buộc văn bản chuyển nhượng phải được công chứng hoặc chứng thực. Lý do: Điều này nhằm bảo vệ bên yếu thế, ngăn chặn việc \"bán nhà trên giấy\" qua nhiều tầng mà không kiểm soát được dòng tiền và thuế thu nhập cá nhân. Sau khi công chứng, các bên mới nộp hồ sơ để chủ đầu tư xác nhận. Nhưng theo Luật sửa đổi, bổ sung một số điều của Luật Công chứng (sửa đổi, bổ sung cho Luật Công chứng số 46/2024/QH15), có ngày có hiệu lực thi hành: 01/01/2027, Theo Luật sửa đổi này, để đẩy mạnh chuyển đổi số và giảm chi phí giao dịch cho người dân, Quốc hội đã chính thức chốt bỏ bắt buộc công chứng đối với 6 loại giao dịch, trong đó giao dịch đầu tiên và quan trọng nhất đối với dân bất động sản chính là: \"Hợp đồng chuyển nhượng hợp đồng kinh doanh bất động sản\" (Bao gồm cả việc chuyển nhượng hợp đồng mua bán nhà ở hình thành trong tương lai giữa các cá nhân mà anh nêu ở Câu 917). Ngoài ra, 5 loại giao dịch khác cũng được cởi trói công chứng bắt buộc từ 2027 bao gồm: Văn bản thỏa thuận góp vốn bằng quyền sử dụng đất của các đồng sở hữu; Văn bản ủy quyền của người đã xuất cảnh cho người khác đứng tên mua nhà ở thuộc tài sản công; Văn bản ủy quyền giải quyết thi hành án liên quan đến tài sản khi người phải thi hành án đã xuất cảnh; Văn bản ủy quyền thực hiện quyền khiếu nại; Hợp đồng chuyển nhượng Văn phòng Thừa phát lại..."}, {"level": "1", "content": "Căn cứ theo quy định tại Khoản 2 Điều 164 Luật Nhà ở 2023, trường hợp thế chấp nhà ở hình thành trong tương lai cho tổ chức tín dụng để vay vốn thì hình thức hợp đồng được quy định như thế nào?", "options": {"A": "Bắt buộc phải thực hiện công chứng tại tổ chức hành nghề công chứng để đảm bảo tính pháp lý.", "B": "Bắt buộc phải thực hiện chứng thực tại Ủy ban nhân dân cấp xã nơi có dự án nhà ở.", "C": "Không bắt buộc phải công chứng, chứng thực; trừ trường hợp các bên có nhu cầu.", "D": "Chỉ không bắt buộc công chứng nếu bên thế chấp là tổ chức kinh doanh bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Nhà ở 2023 (có hiệu lực từ 01/08/2024) đã luật hóa một ngoại lệ rất quan trọng tại Khoản 2 Điều 164: Đối với các giao dịch về nhà ở mà một bên là tổ chức kinh doanh bất động sản hoặc thế chấp nhà ở cho tổ chức tín dụng, các bên không bắt buộc phải thực hiện công chứng, chứng thực hợp đồng. Việc thế chấp nhà ở hình thành trong tương lai (vốn là loại tài sản chưa có Giấy chứng nhận quyền sở hữu) cho Ngân hàng nằm trong nhóm này. Các bên chỉ cần lập hợp đồng bằng văn bản có chữ ký, đóng dấu hợp lệ.  Lưu ý: Tuy không bắt buộc công chứng hợp đồng, nhưng việc Đăng ký biện pháp bảo đảm (tại Trung tâm đăng ký giao dịch, tài sản) là quy trình bắt buộc để xác lập hiệu lực đối kháng với bên thứ ba. Nếu không thực hiện bước này, khi có tranh chấp hoặc khi khách hàng đem nhà đó bán cho người khác, Ngân hàng sẽ gặp rủi ro cực lớn vì không thể ưu tiên xử lý tài sản."}, {"level": "1", "content": "Theo quy định của Luật Công chứng 2024, việc công chứng hợp đồng chuyển nhượng, tặng cho, thế chấp quyền sử dụng đất, tài sản gắn liền với đất được thực hiện tại đâu?", "options": {"A": "Các bên có quyền lựa chọn bất kỳ tổ chức hành nghề công chứng nào trên phạm vi toàn quốc.", "B": "Tại tổ chức hành nghề công chứng có trụ sở trong phạm vi tỉnh, thành phố trực thuộc trung ương nơi có bất động sản.", "C": "Chỉ được thực hiện tại tổ chức hành nghề công chứng có trụ sở trong phạm vi quận, huyện nơi có bất động sản.", "D": "Tại tổ chức hành nghề công chứng nơi một trong hai bên có hộ khẩu thường trú hoặc nơi có bất động sản."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là nguyên tắc \"Công chứng theo địa hạt\" đối với bất động sản (Điều 42). Dù Luật 2024 có nhiều cải cách về công nghệ, nhưng để đảm bảo tính kiểm soát địa chính, giao dịch bất động sản vẫn phải được công chứng tại tỉnh/thành nơi có tài sản đó. Tuy nhiên, cần lưu ý trường hợp di chúc hoặc văn bản từ chối nhận di sản là bất động sản thì không bị hạn chế bởi quy tắc địa hạt này."}, {"level": "1", "content": "Đối với các hợp đồng mua bán, chuyển nhượng quyền sử dụng đất hoặc tài sản gắn liền với đất, phí công chứng được tổ chức hành nghề công chứng tính toán dựa trên cơ sở chủ yếu nào?", "options": {"A": "Tính theo định mức cố định áp dụng cho mọi giao dịch bất động sản.", "B": "Tính theo sự thỏa thuận giữa tổ chức hành nghề công chứng và người yêu cầu công chứng.", "C": "Tính theo đơn giá nhân với tổng diện tích mét vuông của bất động sản.", "D": "Tính theo biểu mức lũy tiến dựa trên giá trị tài sản hoặc giá trị ghi trong hợp đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lệ phí công chứng đối với các hợp đồng có giá trị tài sản (như mua bán, thế chấp bất động sản) được tính theo thang lũy tiến dựa trên giá trị đó, theo biểu mức thu do Bộ Tài chính ban hành (hiện là Thông tư 257/2016, và được sửa đổi, bổ sung bởi Thông tư 111/2017/TT-BTC của Bộ Tài chính (hiện được hệ thống hóa thành Văn bản hợp nhất số 61/VBHN-BTC)."}, {"level": "1", "content": "Căn cứ theo Điều 67 Luật Công chứng 2024, khoản thu nào sau đây được xác định là Thù lao công chứng?", "options": {"A": "Khoản lệ phí bắt buộc tính theo giá trị tài sản do Bộ Tài chính ban hành.", "B": "Thuế giá trị gia tăng phát sinh từ việc chuyển nhượng bất động sản.", "C": "Chi phí bảo hiểm trách nhiệm nghề nghiệp của Công chứng viên.", "D": "Khoản tiền thỏa thuận để soạn thảo hợp đồng hoặc ký ngoài trụ sở."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Thù lao công chứng (Điều 67): Bản chất là khoản tiền trả cho \"công sức\" và \"dịch vụ gia tăng\" của tổ chức hành nghề cho các công việc như: Soạn thảo hợp đồng, đánh máy, in ấn, photo tài liệu, xác minh tính xác thực của giấy tờ, giám định chữ ký hoặc thực hiện công chứng ngoài trụ sở (đến tận nhà, bệnh viện, trại giam...). Cơ chế thu: Dựa trên sự thỏa thuận giữa khách hàng và tổ chức hành nghề, nhưng không được vượt quá mức trần do UBND cấp tỉnh (Ví dụ: UBND TP.HCM) quy định. Phí công chứng (Điều 66): Bản chất là khoản thu nộp vào ngân sách (hoặc doanh thu tính thuế của văn phòng) dựa trên giá trị tài sản. Cơ chế thu: Áp dụng cứng theo Thông tư của Bộ Tài chính, không được thỏa thuận tăng hay giảm. ."}, {"level": "1", "content": "Rủi ro lớn nhất khi doanh nghiệp lựa chọn hình thức chứng thực hợp đồng tại UBND cấp xã thay vì công chứng tại tổ chức hành nghề công chứng là gì?", "options": {"A": "Thiếu sự thẩm định pháp lý về nội dung, dễ dẫn đến hợp đồng vô hiệu.", "B": "Chi phí thực hiện thủ tục thường cao hơn so với biểu phí công chứng.", "C": "Bị từ chối tiếp nhận hồ sơ khi thực hiện thủ tục sang tên sổ đỏ.", "D": "Cơ quan thuế không chấp nhận hợp đồng để khấu trừ chi phí hợp lệ."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Căn cứ khoản 4 Điều 2 Nghị định 23/2015/NĐ-CP, người thực hiện chứng thực (Chủ tịch/Phó Chủ tịch UBND cấp xã) chỉ chịu trách nhiệm về thời gian, địa điểm, năng lực hành vi dân sự và chữ ký của các bên. Họ không chịu trách nhiệm về nội dung của hợp đồng. Nếu hợp đồng chứa các điều khoản vi phạm điều cấm của luật, trái đạo đức xã hội, hoặc có các điều khoản cài cắm bất lợi cho một bên (đặc biệt trong các giao dịch BĐS phức tạp), cơ quan chứng thực sẽ không phát hiện và không có nghĩa vụ cảnh báo. Khi xảy ra tranh chấp, hợp đồng này rất dễ bị Tòa án tuyên vô hiệu."}, {"level": "1", "content": "Điểm mới mang tính thực tiễn và đột phá nhất của Luật Công chứng 2024 nhằm thúc đẩy chuyển đổi số là gì?", "options": {"A": "Bắt buộc mọi giao dịch dân sự phải thực hiện công chứng tại trụ sở.", "B": "Xây dựng hành lang pháp lý và chính thức hóa công chứng điện tử.", "C": "Bãi bỏ mô hình Văn phòng công chứng do các cá nhân hợp danh thành lập.", "D": "Quy định Công chứng viên bắt buộc phải có thâm niên làm Thẩm phán."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Chương IV của Luật Công chứng 2024 (từ Điều 62 đến Điều 65) đã thiết lập nền móng cho việc thực hiện công chứng trên môi trường mạng. Giá trị pháp lý (Điều 63): Văn bản công chứng điện tử có giá trị chứng cứ và giá trị thi hành như văn bản công chứng bằng giấy. Điều này cho phép các bên thực hiện giao dịch mà không nhất thiết phải có mặt trực tiếp tại một địa điểm vật lý, miễn là đáp ứng các yêu cầu về định danh điện tử và chữ ký số. Đây là tiền đề để triển khai quy trình đăng ký biến động đất đai trực tuyến hoàn toàn vào năm 2026-2027. Khi văn bản công chứng đã có bản điện tử liên thông với Cơ sở dữ liệu quốc gia về dân cư và đất đai, thời gian thực hiện thủ tục hành chính sẽ được rút ngắn từ đơn vị ngày xuống đơn vị giờ."}, {"level": "1", "content": "Theo quy định của Luật Công chứng 2024, thao tác thực hiện công chứng điện tử trực tuyến cho phép các bên trong giao dịch thực hiện điều gì?", "options": {"A": "Chỉ cần gửi bản chụp hồ sơ qua mạng để công chứng viên kiểm tra và tự đóng dấu.", "B": "Sử dụng các phần mềm trí tuệ nhân tạo để tự động soạn và xác thực hợp đồng.", "C": "Chỉ áp dụng việc ký trực tuyến cho các hợp đồng dân sự không có tài sản cầm cố.", "D": "Giao kết hợp đồng qua phương tiện điện tử dưới sự chứng kiến từ xa của công chứng viên."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ khoản 2 Điều 62 Luật Công chứng 2024, \"Công chứng điện tử trực tuyến là việc các bên yêu cầu công chứng không có mặt tại cùng một địa điểm nhưng thực hiện việc giao kết hợp đồng, giao dịch qua phương tiện điện tử dưới sự chứng kiến trực tiếp của công chứng viên\". Điều kiện cần và đủ: Hạ tầng kỹ thuật: Phải sử dụng nền tảng/phần mềm công chứng điện tử được Bộ Tư pháp cấp phép (Không phải cứ gọi Video Call qua Zalo hay Zoom là hợp lệ). Định danh: Các bên phải sử dụng tài khoản định danh điện tử mức độ cao (VNeID mức 2) kết hợp với công nghệ nhận diện sinh trắc học. Chữ ký: Bắt buộc sử dụng chữ ký số công cộng hoặc chữ ký số chuyên dùng. Giá trị ứng dụng: Giúp giải quyết nhanh chóng các giao dịch mua bán, ủy quyền mà các bên đang ở cách xa nhau (VD: Vợ ở TP.HCM bán nhà, chồng đang công tác ở Hà Nội không cần bay về)."}, {"level": "1", "content": "Điểm thay đổi căn bản trong hoạt động dịch thuật tại các tổ chức hành nghề công chứng theo Luật Công chứng 2024 là gì?", "options": {"A": "Cho phép Công chứng viên trực tiếp biên dịch và chịu trách nhiệm về nội dung bản dịch.", "B": "Chỉ thực hiện chứng thực chữ ký người dịch thay vì công chứng bản dịch như trước đây.", "C": "Bắt buộc bản dịch phải được cơ quan ngoại giao của nước đó xác nhận trước khi công chứng.", "D": "Chỉ thực hiện công chứng bản dịch đối với các loại giấy tờ thuộc sở hữu của Nhà nước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trước đây (Luật 2014): Hình thức là \"Công chứng bản dịch\". Công chứng viên phải ký vào bản dịch và đóng dấu của tổ chức hành nghề. Điều này vô hình trung buộc Công chứng viên phải chịu trách nhiệm về độ chính xác của nội dung dịch thuật – một việc quá sức nếu Công chứng viên không am hiểu sâu sắc ngôn ngữ đó. Từ năm 2025-2026 (Luật 2024): Chuyển sang \"Chứng thực chữ ký người dịch\". Trách nhiệm của Công chứng viên: Chỉ xác nhận người đứng trước mặt mình đúng là người dịch đã đăng ký chữ ký điểm chỉ, có bằng cấp phù hợp và họ tự nguyện ký vào bản dịch đó. Người dịch (cộng tác viên) phải chịu trách nhiệm hoàn toàn trước pháp luật về tính chính xác, trung thực của nội dung bản dịch. Lý do sửa đổi là để phù hợp với thực tiễn và thông lệ quốc tế. Công chứng viên là chuyên gia pháp luật, không phải chuyên gia ngôn ngữ. Việc tách bạch này giúp giảm rủi ro pháp lý cho các tổ chức hành nghề công chứng và chuyên nghiệp hóa đội ngũ cộng tác viên dịch thuật.."}, {"level": "1", "content": "Đối với các doanh nghiệp kinh doanh bất động sản, lợi ích cốt lõi nhất mà công chứng điện tử (theo Luật Công chứng 2024) mang lại là gì?", "options": {"A": "Miễn trừ hoàn toàn các nghĩa vụ nộp thuế phát sinh từ giao dịch bất động sản.", "B": "Giảm mức vốn điều lệ tối thiểu khi thực hiện đăng ký dự án đầu tư mới.", "C": "Tối ưu hóa quy trình vận hành, tiết kiệm thời gian và chi phí giao dịch.", "D": "Cho phép doanh nghiệp tự phê duyệt tính pháp lý thay cho Công chứng viên."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Công chứng điện tử giúp giảm thời gian và chi phí đi lại, làm quy trình nhanh chóng, linh hoạt hơn, đẩy nhanh việc hoàn tất giao dịch.   Tốc độ giao dịch (Speed to Market): Trong bất động sản, thời gian là tiền bạc. Việc thực hiện công chứng điện tử giúp rút ngắn quy trình từ vài ngày xuống còn vài giờ. Doanh nghiệp có thể hoàn tất hàng trăm hợp đồng mua bán căn hộ chỉ trong một ngày mà không cần khách hàng phải xếp hàng tại văn phòng, từ đó đẩy nhanh tiến độ thu tiền theo đợt. Tiết kiệm chi phí vận hành: Giảm thiểu chi phí in ấn, lưu trữ hồ sơ giấy và chi phí nhân sự đi lại. Đặc biệt, đối với các dự án có khách hàng ở xa hoặc ở nước ngoài, công chứng điện tử trực tuyến xóa bỏ hoàn toàn rào cản địa lý. An toàn dữ liệu: Hệ thống công chứng điện tử liên thông với Cơ sở dữ liệu quốc gia về dân cư và Hệ thống thông tin đất đai, giúp doanh nghiệp loại bỏ gần như tuyệt đối rủi ro về giả mạo giấy tờ tùy thân hoặc tình trạng một tài sản bán cho nhiều người."}, {"level": "1", "content": "Thách thức trọng yếu nhất về mặt nghiệp vụ và an toàn pháp lý khi triển khai công chứng điện tử trực tuyến hiện nay là gì?", "options": {"A": "Đảm bảo an ninh mạng và xác thực chính xác ý chí tự nguyện của các bên.", "B": "Chi phí đầu tư hạ tầng phần cứng và thiết bị lưu trữ tại các văn phòng.", "C": "Rào cản về tâm lý và trình độ sử dụng công nghệ cơ bản của người dân.", "D": "Sự thiếu hụt đội ngũ công chứng viên có chứng chỉ chuyên gia tin học."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Rủi ro về an ninh mạng, bảo mật thông tin và việc xác thực danh tính, ý chí tự nguyện của các bên khi giao dịch trực tuyến là những thách thức công nghệ và nghiệp vụ lớn nhất cần giải quyết: (1) Xác thực ý chí (Will Authentication): Đây là \"linh hồn\" của hoạt động công chứng. Trong môi trường trực tuyến, làm sao Công chứng viên chắc chắn rằng người đang ngồi trước màn hình không bị ép buộc (có người cầm dao đứng sau camera)? Hay họ có thực sự minh mẫn khi bấm ký số? (2) Mối đe dọa từ Deepfake và AI: Năm 2026, công nghệ giả dạng khuôn mặt và giọng nói (Deepfake) đã đạt mức độ tinh vi. Việc chỉ dựa vào hình ảnh qua màn hình để định danh là một rủi ro cực lớn. Vì vậy, hệ thống công chứng điện tử bắt buộc phải tích hợp định danh sinh trắc học trực tiếp (Live Bio-check) liên thông với dữ liệu dân cư mức độ 2 (VNeID). (3) An ninh dữ liệu: Văn bản công chứng điện tử là tài sản số có giá trị cực lớn. Nếu hệ thống bị xâm nhập và sửa đổi dữ liệu (Data Integrity), toàn bộ hệ thống quản lý bất động sản sẽ bị lung lay. Do đó, bảo mật đa lớp và công nghệ Blockchain trong lưu trữ đang là những giải pháp then chốt nhưng cũng là thách thức kỹ thuật lớn nhất."}, {"level": "1", "content": "Trong thực tế giao dịch bất động sản, thuật ngữ \"Công chứng treo\" thường được dùng để chỉ tình trạng nào sau đây?", "options": {"A": "Hồ sơ công chứng bị cơ quan đăng ký đất đai từ chối và trả lại để bổ sung.", "B": "Hợp đồng đã được ký, đóng dấu hoàn tất nhưng các bên chưa đi nộp thuế.", "C": "Các bên đã ký tên/điểm chỉ vào hợp đồng nhưng Công chứng viên chưa ký và đóng dấu.", "D": "Hợp đồng được thực hiện công chứng tại địa điểm nằm ngoài trụ sở tổ chức hành nghề."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> \"Công chứng treo\" là cách nói về tình trạng các bên đã ký nhưng văn bản chưa được công chứng viên ký, đóng dấu chính thức do còn chờ bổ sung giấy tờ hoặc thủ tục, tiềm ẩn nhiều rủi ro pháp lý. Về mặt nguyên tắc (Luật Công chứng 2024): Việc công chứng phải được thực hiện theo một quy trình liên tục. Công chứng viên phải chứng kiến các bên ký tên và sau đó ký tên, đóng dấu vào văn bản công chứng ngay trong ngày hoặc muộn nhất là ngày làm việc tiếp theo."}, {"level": "1", "content": "Rủi ro nghiêm trọng nhất mà người mua thường gặp phải khi ký hợp đồng đặt cọc, kể cả khi hợp đồng đó đã được công chứng, là gì?", "options": {"A": "Mức phí công chứng hợp đồng đặt cọc bị tổ chức hành nghề thu sai quy định lũy tiến.", "B": "Bên bán trì hoãn việc giao nhà/đất do biến động về giá vật liệu xây dựng trên thị trường.", "C": "Đặt cọc nhằm huy động vốn trái luật cho dự án chưa đủ điều kiện hoặc ký với chủ thể không có thẩm quyền.", "D": "Hợp đồng đặt cọc có quá nhiều điều khoản kỹ thuật gây khó khăn cho việc đọc hiểu của khách hàng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Các hình thức đặt cọc không đúng bản chất (huy động vốn sớm) hoặc đặt cọc không đúng chủ thể (qua môi giới) là những rủi ro phổ biến và nghiêm trọng, việc công chứng hợp đồng đặt cọc này không giải quyết được các rủi ro về tính pháp lý của dự án hay ràng buộc với chủ đầu tư.  Huy động vốn trá hình: Theo Luật Kinh doanh bất động sản 2023, chủ đầu tư chỉ được thu tiền đặt cọc không quá 5% giá bán nhà ở, công trình xây dựng hình thành trong tương lai khi dự án đã có đủ các điều kiện (có thiết kế bản vẽ thi công, có giấy phép xây dựng...). Rủi ro lớn nhất là khách hàng ký \"Hợp đồng đặt cọc\" hoặc \"Văn bản thỏa thuận\" với số tiền lớn (20-30%) dưới dạng huy động vốn khi dự án chưa có móng, chưa có văn bản của Sở Xây dựng. Chủ thể không phù hợp: Trước đây, nhiều dự án triển khai đặt cọc qua các đơn vị môi giới hoặc sàn giao dịch. Khách hàng đặt cọc cho Sàn nhưng Sàn lại không có văn bản ủy quyền hợp pháp từ Chủ đầu tư để thu tiền. Khi có tranh chấp, Chủ đầu tư từ chối trách nhiệm vì không trực tiếp ký kết hoặc nhận tiền. Luật Kinh doanh bất động sản 2023 bắt buộc đặt cọc hay thanh toán với Chủ đầu tư thông qua chuyển khoản vào tài khoản của Chủ đầu tư, không thông qua đơn vị phân phối hoặc các công ty con (sẽ bị phạt hành chính nếu vi phạm). Giới hạn của Công chứng: Công chứng viên xác nhận hai bên có ký tên vào văn bản, nhưng không có nghĩa vụ và cũng không đủ công cụ để kiểm tra xem dự án đó đã nợ thuế tiền sử dụng đất hay chưa, hoặc chủ đầu tư đã thế chấp dự án tại ngân hàng mà chưa giải chấp hay không. Do đó, văn bản công chứng không phải là \"thẻ bài miễn tử\" cho các dự án thiếu pháp lý."}, {"level": "1", "content": "Hình thức giải quyết tranh chấp nào yêu cầu phải có thỏa thuận trước của các bên?", "options": {"A": "Tòa án nhân dân.", "B": "Trọng tài thương mại.", "C": "Hòa giải tại UBND xã.", "D": "Khiếu nại lên Sở Tư pháp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Tòa án có thẩm quyền xét xử đương nhiên, trong khi Trọng tài thương mại chỉ có thẩm quyền giải quyết tranh chấp khi các bên đã có thỏa thuận trọng tài hợp lệ (trong hợp đồng hoặc thỏa thuận riêng). Căn cứ Điều 5 Luật Trọng tài thương mại 2010, hình thức thỏa thuận có thể là một điều khoản trọng tài trong hợp đồng (Arbitration Clause) hoặc là một thỏa thuận riêng được lập sau khi tranh chấp phát sinh (Submission Agreement). Nếu các bên đã có thỏa thuận trọng tài hợp lệ mà một bên khởi kiện tại Tòa án, thì Tòa án phải từ chối thụ lý (trừ trường hợp thỏa thuận trọng tài vô hiệu hoặc không thể thực hiện được). Cần chú ý: \"Tòa án thì chậm nhưng rẻ (án phí thấp, có nhiều cấp xét xử); Trọng tài thì nhanh và bảo mật nhưng đắt (phí trọng tài cao, phán quyết chung thẩm không được kháng cáo).\" Việc lựa chọn Trọng tài thường phù hợp với các doanh nghiệp bất động sản lớn, ưu tiên sự kín tiếng và thời gian giải quyết nhanh để không làm \"đóng băng\" dự án quá lâu."}, {"level": "1", "content": "So với phương thức giải quyết tại Tòa án, ưu điểm nổi bật nhất của Trọng tài thương mại trong việc xử lý các tranh chấp kinh doanh bất động sản là gì?", "options": {"A": "Chi phí giải quyết tranh chấp tại Trọng tài luôn thấp hơn so với án phí tại Tòa án.", "B": "Quy trình giải quyết bảo mật, linh hoạt và phán quyết mang tính chung thẩm.", "C": "Phán quyết của Trọng tài có thể được kháng cáo lên Tòa án nhân dân cấp cao hơn.", "D": "Trọng tài viên bắt buộc phải là người đang công tác trong bộ máy cơ quan Nhà nước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trọng tài thường nhanh hơn (1 cấp xét xử), linh hoạt hơn về thủ tục, xét xử không công khai giúp bảo mật, và các bên được chọn trọng tài viên là chuyên gia trong lĩnh vực tranh chấp. Tính chung thẩm (Finality): Điều 61 Luật Trọng tài thương mại 2010: \"Phán quyết trọng tài là chung thẩm và có hiệu lực kể từ ngày ban hành\". Căn cứ Điều 66, hết thời hạn tự nguyện thi hành, bên được thi hành có quyền làm đơn gửi thẳng đến Cơ quan Thi hành án dân sự (Cục/Chi cục Thi hành án dân sự) để yêu cầu cưỡng chế thi hành án (kê biên tài sản, phong tỏa tài khoản...). Cơ quan thi hành án sẽ đối xử với phán quyết của Trọng tài có giá trị y như một bản án đã có hiệu lực của Tòa án. Đây là điểm khác biệt lớn nhất, giúp doanh nghiệp tiết kiệm rất nhiều thời gian, tránh việc vụ kiện kéo dài qua nhiều năm và nhiều cấp xét xử. Tòa án chỉ can thiệp trong một trường hợp duy nhất: Có một bên làm đơn yêu cầu hủy phán quyết trọng tài (theo Điều 68). Tính bảo mật (Confidentiality): Các phiên họp giải quyết tranh chấp của Trọng tài được tiến hành không công khai (trừ khi các bên có thỏa thuận khác). Điều này cực kỳ quan trọng đối với các doanh nghiệp bất động sản để bảo vệ uy tín thương hiệu và thông tin dự án. Tính chuyên môn (Expertise): Các bên có quyền lựa chọn trọng tài viên là những chuyên gia đầu ngành trong lĩnh vực bất động sản, tài chính hoặc xây dựng. Họ có kiến thức chuyên sâu để hiểu các ngóc ngách của vụ việc hơn là các Thẩm phán vốn phải giải quyết đa dạng các loại án. Tính linh hoạt: Các bên có thể thỏa thuận về địa điểm, thời gian, ngôn ngữ và thậm chí là luật áp dụng cho việc giải quyết tranh chấp."}, {"level": "1", "content": "Trong quản trị rủi ro giao dịch bất động sản, việc lựa chọn giải quyết tranh chấp bằng Trọng tài thương mại có thể đối mặt với những nhược điểm nào sau đây?", "options": {"A": "Thời gian giải quyết tranh chấp thường kéo dài hơn so với quy trình hai cấp xét xử tại Tòa án.", "B": "Phán quyết của Trọng tài hoàn toàn không có giá trị cưỡng chế thi hành nếu một bên không tự nguyện.", "C": "Cần có thỏa thuận trọng tài hợp lệ; chi phí thường cao hơn án phí; phán quyết có rủi ro bị Tòa án hủy.", "D": "Trọng tài viên chỉ được phép giải quyết các tranh chấp có giá trị tài sản dưới 100 tỷ đồng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khác với Tòa án (có thẩm quyền đương nhiên), Trọng tài chỉ có quyền can thiệp khi các bên cùng đồng ý bằng văn bản. Nếu thỏa thuận trọng tài bị tuyên vô hiệu (do không rõ ràng, người ký không đủ thẩm quyền...), vụ việc sẽ bị đẩy ngược lại Tòa án, gây lãng phí thời gian và tiền bạc. Theo Điều 68 Luật Trọng tài thương mại 2010, Tòa án có quyền hủy phán quyết nếu vi phạm các lỗi về thủ tục hoặc \"trái với các nguyên tắc cơ bản của pháp luật Việt Nam\". Đây là một khái niệm khá rộng, đôi khi bị bên thua kiện lợi dụng để kéo dài vụ việc. Phí trọng tài (Arbitration Fee) bao gồm thù lao trọng tài viên và chi phí hành chính của trung tâm, thường tính theo tỷ lệ giá trị tranh chấp và thường cao hơn đáng kể so với án phí Tòa án (vốn được Nhà nước hỗ trợ một phần)."}, {"level": "1", "content": "Tại sao các doanh nghiệp kinh doanh bất động sản nên cân nhắc đưa điều khoản lựa chọn Trọng tài thương mại vào hợp đồng ngay từ khi ký kết?", "options": {"A": "Để chứng minh năng lực tài chính và quy mô hoạt động của doanh nghiệp với đối tác.", "B": "Để chủ động thiết lập cơ chế giải quyết tranh chấp nhanh chóng, bảo mật và có tính chuyên môn cao.", "C": "Vì theo Luật Kinh doanh bất động sản 2023, Tòa án không còn thẩm quyền giải quyết tranh chấp dự án.", "D": "Để được miễn trừ nghĩa vụ công chứng hoặc chứng thực đối với các loại hợp đồng kinh doanh bất động sản."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều khoản trọng tài là \"luật của các bên\". Khi tranh chấp xảy ra, doanh nghiệp không bị rơi vào thế thụ động phải theo đuổi các vụ kiện kéo dài tại Tòa án mà có thể kích hoạt ngay quy trình trọng tài đã được định sẵn. Trong ngành bất động sản, tin tức về một vụ kiện tại Tòa án (xét xử công khai) có thể khiến giá cổ phiếu sụt giảm hoặc khách hàng hoang mang ngừng đóng tiền. Trọng tài với cơ chế xét xử kín là \"cứu cánh\" để doanh nghiệp giải quyết xung đột mà vẫn giữ được uy tín dự án. Doanh nghiệp có thể chỉ định những người có kinh nghiệm thực tế về xây dựng, tài chính hoặc đất đai làm trọng tài viên. Điều này đảm bảo phán quyết sát với thực tiễn kinh doanh hơn là những phán quyết thuần túy dựa trên câu chữ pháp lý. Mặc dù phí trọng tài cao, nhưng việc dứt điểm tranh chấp trong vòng 6-9 tháng giúp giải phóng nguồn lực và tài sản đang bị tranh chấp, mang lại lợi ích kinh tế lớn hơn nhiều so với việc theo đuổi vụ kiện 3-5 năm tại Tòa án."}, {"level": "1", "content": "Khi một doanh nghiệp Việt Nam thực hiện giao dịch bất động sản với đối tác từ Hoa Kỳ (hệ thống Thông luật Common Law), nội dung nào sau đây cần được lưu ý đặc biệt?", "options": {"A": "Notary Public (Công chứng viên) tại Mỹ có trách nhiệm cao nhất trong việc thẩm định tính hợp pháp của nội dung hợp đồng.", "B": "Luật sư đại diện (Attorneys) của mỗi bên đóng vai trò then chốt trong việc thẩm định (Due Diligence) và đàm phán hợp đồng.", "C": "Giao dịch bất động sản tại Hoa Kỳ không bắt buộc phải lập thành văn bản nếu các bên đã thực hiện thanh toán xong.", "D": "Theo quy định quốc tế, mọi giao dịch bất động sản có yếu tố nước ngoài đều mặc định áp dụng luật của bên bán."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trong hệ thống Common Law, luật sư đóng vai trò trung tâm trong việc bảo vệ quyền lợi thân chủ, thẩm định và đàm phán hợp đồng, khác với vai trò của công chứng viên ở Việt Nam. Ở Việt Nam (Hệ thống Dân luật - Civil Law), Công chứng viên là người gác cổng pháp lý, chịu trách nhiệm về nội dung và tính hợp pháp của hợp đồng. Ngược lại, tại nhiều bang của Mỹ, Notary Public thường chỉ có vai trò xác nhận danh tính và chữ ký (Witness) chứ không thẩm định nội dung. Do đó, việc doanh nghiệp chỉ dựa vào dấu công chứng Mỹ là một sai lầm chết người. Vai trò của Luật sư (Attorney-driven) trong hệ thống Common Law rất quan trọng, được xem là người thiết kế cuộc chơi. Họ thực hiện quy trình Due Diligence cực kỳ khắt khe: kiểm tra nguồn gốc đất (Title Search), các tranh chấp tiềm ẩn, quyền ưu tiên mua, và các cam kết (Covenants). Hợp đồng thường rất dài (vài trăm trang) vì họ cố gắng dự liệu mọi tình huống có thể xảy ra, thay vì dựa vào các điều khoản khung của Bộ luật Dân sự như ở Việt Nam. Do đó, Học thuyết Caveat Emptor (Người mua hãy thận trọng) là nguyên tắc nền tảng của Common Law. Bên bán không có nghĩa vụ phải tiết lộ tất cả các khuyết tật của tài sản trừ khi bị hỏi. Vì vậy, nếu luật sư của bên mua (doanh nghiệp Việt Nam) không đủ sắc sảo để kiểm tra, doanh nghiệp sẽ phải tự chịu rủi ro sau khi hoàn tất giao dịch."}, {"level": "1", "content": "Căn cứ theo các điều khoản chuyển tiếp và thi hành của Luật Công chứng 2024, cơ quan nào có thẩm quyền ban hành quy định chi tiết về trình tự, thủ tục và các tiêu chuẩn kỹ thuật đối với công chứng điện tử?", "options": {"A": "Hội đồng Thẩm phán Tòa án nhân dân tối cao ban hành thông qua các Nghị quyết hướng dẫn.", "B": "Hiệp hội Công chứng viên Việt Nam ban hành thông qua các Quy tắc đạo đức và hành nghề.", "C": "Bộ Thông tin và Truyền thông chủ trì ban hành tiêu chuẩn về chữ ký số và hạ tầng mạng.", "D": "Chính phủ quy định chi tiết và Bộ Tư pháp chủ trì tham mưu, hướng dẫn thi hành."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Theo cấu trúc pháp luật Việt Nam, Quốc hội ban hành Luật (khung), còn Chính phủ sẽ ban hành các Nghị định để cụ thể hóa các điều khoản. Bộ Tư pháp là cơ quan giúp Chính phủ thực hiện quản lý nhà nước về công chứng. Bộ Tư pháp sẽ chủ trì phối hợp với các Bộ ngành liên quan để soạn thảo các thông tư hướng dẫn nghiệp vụ cụ thể (như mẫu lời chứng điện tử, cách thức lưu trữ hồ sơ số...)."}, {"level": "1", "content": "Theo quy định hiện hành, mục tiêu cốt lõi của việc xây dựng và vận hành Cơ sở dữ liệu công chứng quốc gia là gì?", "options": {"A": "Lưu trữ thông tin cá nhân của công dân để phục vụ mục đích quảng cáo dịch vụ pháp lý.", "B": "Tạo nguồn thu ngân sách thông qua việc thu phí tra cứu thông tin của người dân và doanh nghiệp.", "C": "Tra cứu lịch sử giao dịch, ngăn chặn tình trạng tài sản bị giao dịch nhiều lần và đảm bảo an toàn pháp lý.", "D": "Tự động hóa hoàn toàn quy trình xác thực ý chí của các bên mà không cần sự hiện diện của Công chứng viên."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Cơ sở dữ liệu giúp tra cứu lịch sử giao dịch của tài sản, tình trạng pháp lý, qua đó ngăn chặn các hành vi gian lận và tăng cường an toàn pháp lý cho các bên, bao gồm: (1) Ngăn chặn \"Bán một nhà cho nhiều người\" (Double Selling): Trước khi có cơ sở dữ liệu tập trung, thông tin giao dịch thường bị cô lập tại từng văn phòng. Cơ sở dữ liệu quốc gia cho phép Công chứng viên kiểm tra ngay lập tức xem tài sản này đã được ký hợp đồng đặt cọc hoặc mua bán ở bất kỳ đâu trên lãnh thổ Việt Nam hay chưa. (2) Cập nhật tình trạng ngăn chặn: Khi có quyết định của Tòa án, Cơ quan thi hành án hoặc cơ quan điều tra về việc \"phong tỏa\" hoặc \"ngăn chặn\" giao dịch đối với một tài sản, thông tin này sẽ được cập nhật lên hệ thống ngay lập tức. Điều này giúp loại bỏ rủi ro công chứng nhầm tài sản đang bị kê biên. (3) Liên thông dữ liệu (Data Integration): Trong bối cảnh năm 2026, cơ sở dữ liệu này đã được liên thông hoàn toàn với Hệ thống thông tin đất đai (LIS) nhằm kiểm tra tính biến động của sổ đỏ và Cơ sở dữ liệu quốc gia về dân cư nhằm xác thực tình trạng hôn nhân và năng lực hành vi dân sự của chủ tài sản."}, {"level": "1", "content": "Theo Luật kinh doanh bất động sản 2023, việc công chứng Hợp đồng chuyển nhượng quyền sử dụng đất giữa hai doanh nghiệp, trong đó chỉ có một doanh nghiệp có chức năng kinh doanh Bất động sản, được quy định như thế nào?", "options": {"A": "Bắt buộc phải công chứng.", "B": "Bắt buộc phải chứng thực.", "C": "Không bắt buộc, theo yêu cầu của các bên.", "D": "Chỉ bắt buộc nếu giá trị trên 100 tỷ đồng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Đất đai 2024 (Điều 27 Khoản 3 điểm B. quy định hợp đồng chuyển nhượng quyền sử dụng đất mà một bên hoặc các bên là tổ chức hoạt động kinh doanh bất động sản thì không bắt buộc công chứng/chứng thực."}, {"level": "1", "content": "Theo quy định của Luật Công chứng 2024, thời gian đào tạo nghề công chứng đối với đối tượng là Luật sư đã có thời gian hành nghề từ đủ 05 năm trở lên được quy định như thế nào?", "options": {"A": "Vẫn được miễn đào tạo hoàn toàn như quy định của Luật Công chứng 2014.", "B": "Chỉ cần tham gia khóa bồi dưỡng nghiệp vụ ngắn hạn 03 tháng.", "C": "Bắt buộc phải tham gia khóa đào tạo nghề công chứng với thời gian 06 tháng.", "D": "Phải tham gia khóa đào tạo nghề công chứng bắt buộc với thời gian 12 tháng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo Điều 11 Luật Công chứng 2024 quy định luật sư hành nghề từ đủ 5 năm trở lên phải tham gia khóa đào tạo nghề công chứng là 6 tháng, còn luật sư chưa đủ thời gian hành nghề 5 năm thì phải tham gia khóa đào tạo 12 tháng. Trước đây, các chức danh tư pháp như Thẩm phán, Kiểm sát viên, Luật sư đã hành nghề từ đủ 5 năm trở lên sẽ được miễn đào tạo nghề công chứng, chỉ cần tham gia khóa bồi dưỡng ngắn hạn (3 tháng). Điều này gây ra nhiều bất cập vì tư duy của Thẩm phán/Luật sư là \"giải quyết tranh chấp\", trong khi tư duy của Công chứng viên là \"phòng ngừa tranh chấp\". Nguyên tắc chung (Khoản 1 Điều 11): Khóa đào tạo nghề công chứng kéo dài 12 tháng. (Áp dụng cho người có bằng Cử nhân Luật, bao gồm cả Luật sư hành nghề dưới 5 năm). Sự ưu tiên rút ngắn (Khoản 2 Điều 11): Thẩm phán, Kiểm sát viên, Điều tra viên, Luật sư, v.v., có thời gian làm công tác pháp luật/hành nghề từ đủ 05 năm trở lên thì được giảm một nửa thời gian, tức là phải học 06 tháng."}, {"level": "1", "content": "Trong quy trình công chứng Hợp đồng chuyển nhượng toàn bộ hoặc một phần dự án bất động sản, văn bản cho phép chuyển nhượng của cơ quan nhà nước có thẩm quyền phải được cung cấp vào thời điểm nào?", "options": {"A": "Trong vòng 30 ngày kể từ ngày các bên hoàn tất việc ký kết hợp đồng tại Văn phòng công chứng.", "B": "Trước khi các bên thực hiện việc ký kết hợp đồng chuyển nhượng dưới sự chứng kiến của Công chứng viên.", "C": "Tại thời điểm các bên thực hiện thủ tục đăng ký biến động đất đai tại Văn phòng đăng ký đất đai.", "D": "Các bên có thể linh hoạt bổ sung sau khi đã bàn giao thực địa dự án và thanh toán tiền đợt 1."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Chuyển nhượng dự án là một giao dịch có điều kiện đặc biệt. Căn cứ Điều 39 Luật Kinh doanh bất động sản 2023, chủ đầu tư chuyển nhượng phải có quyết định giao đất/cho thuê đất và đã hoàn thành nghĩa vụ tài chính tương ứng. Đặc biệt, việc chuyển nhượng phải được cơ quan quyết định đầu tư (UBND cấp tỉnh hoặc Thủ tướng Chính phủ) chấp thuận bằng văn bản. Công chứng viên có trách nhiệm kiểm tra tính hợp pháp của các giấy tờ đầu vào. Văn bản chấp thuận chuyển nhượng dự án chính là \"giấy khai sinh pháp lý\" cho giao dịch này. Nếu không có văn bản này mà Công chứng viên vẫn thực hiện công chứng hợp đồng, thì hợp đồng đó bị coi là vi phạm trình tự, thủ tục luật định và sẽ bị tuyên vô hiệu nếu có tranh chấp.."}, {"level": "1", "content": "Giá trị pháp lý của văn bản công chứng điện tử theo Luật Công chứng 2024 so với văn bản công chứng giấy là như thế nào?", "options": {"A": "Có giá trị pháp lý thấp hơn và chỉ được dùng để tra cứu thông tin giao dịch.", "B": "Có giá trị pháp lý cao hơn do tính bảo mật tuyệt đối của công nghệ chữ ký số.", "C": "Có giá trị pháp lý tương đương và có giá trị chứng cứ, giá trị thi hành như bản giấy.", "D": "Chỉ phát sinh giá trị pháp lý sau khi được in ra giấy và đóng dấu nổi của văn phòng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 63 Luật Công chứng 2024 khẳng định văn bản công chứng điện tử có giá trị như bản giấy. Điều này có nghĩa là mọi cơ quan nhà nước (UBND, Văn phòng đăng ký đất đai, Cơ quan Thuế, Ngân hàng...) bắt buộc phải chấp nhận bản điện tử trong các thủ tục hành chính mà không được yêu cầu nộp thêm bản giấy đối chiếu. Văn bản công chứng điện tử có giá trị chứng cứ; những tình tiết, sự kiện trong văn bản công chứng điện tử không phải chứng minh, trừ trường hợp bị Tòa án tuyên bố là vô hiệu. Đối với các hợp đồng có nghĩa vụ thanh toán hoặc nghĩa vụ tài sản, văn bản công chứng điện tử có giá trị thi hành cưỡng chế tương đương bản giấy. Nếu một bên vi phạm, bên kia có quyền yêu cầu cơ quan thi hành án dân sự tổ chức thi hành dựa trên bản điện tử này. Khác với bản giấy có thể bị tẩy xóa hoặc làm giả chữ ký tay, bản điện tử được bảo vệ bằng chữ ký số và mã định danh duy nhất. Mọi thay đổi sau khi ký số đều sẽ bị hệ thống phát hiện và làm mất hiệu lực của văn bản."}, {"level": "1", "content": "Quy định của Luật Công chứng 2024 về việc Công chứng viên vẫn phải chịu trách nhiệm bồi thường thiệt hại ngay cả khi đã miễn nhiệm hoặc nghỉ hưu mang lại lợi ích trọng yếu nào cho doanh nghiệp?", "options": {"A": "Giúp doanh nghiệp giảm thiểu chi phí đóng bảo hiểm trách nhiệm nghề nghiệp hàng năm.", "B": "Đảm bảo quyền được bảo vệ và bồi thường thiệt hại không bị chấm dứt theo trạng thái hành nghề của Công chứng viên.", "C": "Cho phép doanh nghiệp có quyền yêu cầu Cơ quan thi hành án kê biên tài sản của Công chứng viên mà không cần qua xét xử.", "D": "Loại bỏ hoàn toàn trách nhiệm liên đới của tổ chức hành nghề công chứng đối với các sai sót trong quá khứ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Công chứng là hoạt động xác thực các sự kiện pháp lý. Sai sót của Công chứng viên thường không lộ ra ngay mà có thể nhiều năm sau mới phát sinh tranh chấp (khi có thanh tra, kiểm tra hoặc khi thực hiện giao dịch kế tiếp). Quy định này khẳng định: Thời điểm phát sinh sai phạm mới là căn cứ xác định trách nhiệm, chứ không phải thời điểm phát hiện sai phạm. Cơ chế bồi thường (Điều 38): Tổ chức hành nghề công chứng (Văn phòng/Phòng công chứng) có trách nhiệm bồi thường thiệt hại cho người bị thiệt hại do lỗi của Công chứng viên của tổ chức mình. Sau đó, Công chứng viên (kể cả khi đã nghỉ hưu/miễn nhiệm) có nghĩa vụ hoàn trả lại khoản tiền đó cho tổ chức hành nghề công chứng."}, {"level": "1", "content": "Trong tương lai, việc ứng dụng công nghệ Blockchain (chuỗi khối) vào Cơ sở dữ liệu công chứng quốc gia giúp giải quyết triệt để vấn đề nào sau đây trong giao dịch bất động sản?", "options": {"A": "Thay thế hoàn toàn vai trò của Công chứng viên trong việc tư vấn pháp luật cho các bên.", "B": "Giảm phí công chứng xuống mức tối thiểu do không cần con người kiểm tra hồ sơ.", "C": "Đảm bảo tính bất biến của lịch sử giao dịch, ngăn chặn tuyệt đối việc làm giả hoặc xóa sửa thông tin tài sản.", "D": "Cho phép người dân tự do chuyển nhượng bất động sản mà không cần sự quản lý của Nhà nước."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Blockchain hoạt động như một sổ cái phi tập trung. Khi một thông tin giao dịch đã được \"đóng khối\", không ai (kể cả quản trị viên hệ thống) có thể sửa đổi hay xóa bỏ. Điều này tạo ra một \"chuỗi niềm tin\" tuyệt đối về nguồn gốc và biến động của bất động sản qua hàng chục năm."}, {"level": "1", "content": "Khi áp dụng Hợp đồng thông minh (Smart Contract) trong kinh doanh bất động sản, vai trò mới của Công chứng viên được xác định như thế nào để đảm bảo an toàn pháp lý?", "options": {"A": "Công chứng viên là người trực tiếp lập trình (viết code) cho các hợp đồng thông minh.", "B": "Công chứng viên xác thực \"đầu vào\" (ý chí, năng lực hành vi và tính hợp pháp của tài sản) trước khi kích hoạt hợp đồng trên môi trường số.", "C": "Công chứng viên chỉ đóng vai trò là người chứng kiến việc chuyển tiền mã hóa giữa các bên.", "D": "Hợp đồng thông minh sẽ tự động thực hiện mà không cần bất kỳ sự can thiệp hay xác thực nào từ Công chứng viên."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Hợp đồng thông minh có thể tự thực thi (ví dụ: tự động sang tên khi nhận đủ tiền), nhưng nó không thể tự kiểm tra xem người ký có bị ép buộc hay có bị mất năng lực hành vi hay không. Công chứng viên đóng vai trò là \"mắt xích xác thực thực thể\" giữa thế giới thực và thế giới số."}, {"level": "1", "content": "Theo Luật Công chứng 2024, việc Quốc hội giao Chính phủ quy định chi tiết \"Danh mục các giao dịch bắt buộc phải công chứng\" mang lại tác động kép nào sau đây?", "options": {"A": "Đảm bảo tính vĩnh cửu của các loại giao dịch mà không cần sửa đổi trong tương lai.", "B": "Làm giảm hiệu lực pháp lý của các giao dịch bất động sản so với việc quy định trực tiếp trong Luật.", "C": "Tạo sự linh hoạt trong điều hành thực tế nhưng có thể gây khó khăn trong việc tra cứu, áp dụng thống nhất.", "D": "Loại bỏ hoàn toàn trách nhiệm của Công chứng viên đối với các giao dịch nằm ngoài danh mục."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Việc giao Chính phủ quy định chi tiết giúp linh hoạt điều chỉnh theo tình hình thực tế, nhưng cũng có thể khiến doanh nghiệp khó theo dõi và áp dụng nếu danh mục thay đổi hoặc quy định không đủ rõ ràng. Quy trình sửa một đạo luật (Luật) mất rất nhiều thời gian và thủ tục tại Quốc hội. Trong khi đó, việc sửa đổi một Nghị định (do Chính phủ ban hành) diễn ra nhanh chóng hơn nhiều. Khi thị trường phát hiện một loại giao dịch mới có rủi ro cao (ví dụ: chuyển nhượng quyền chọn mua nhà trong tương lai), Chính phủ có thể bổ sung ngay vào danh mục bắt buộc công chứng để bảo vệ người dân. Đối với doanh nghiệp và người dân, việc quy định ở văn bản dưới luật (Nghị định/Thông tư) đôi khi tạo ra \"rừng văn bản\". Nếu không theo dõi sát các văn bản hướng dẫn của Bộ Tư pháp hoặc Chính phủ, các bên dễ dẫn đến việc ký hợp đồng tay (viết giấy tay) cho những giao dịch mà lẽ ra tại thời điểm đó đã bị đưa vào danh mục bắt buộc phải công chứng, dẫn đến hợp đồng vô hiệu."}, {"level": "1", "content": "Trong các giao dịch bất động sản hình thành trong tương lai, hạn chế lớn nhất của việc công chứng hợp đồng trong việc bảo vệ quyền lợi toàn diện cho bên mua là gì?", "options": {"A": "Công chứng viên không có thẩm quyền kiểm tra tính đầy đủ của hồ sơ pháp lý dự án tại thời điểm ký kết.", "B": "Công chứng chỉ xác nhận tính hợp pháp của giao dịch trên hồ sơ, không đảm bảo chất lượng xây dựng và tiến độ thực tế.", "C": "Văn bản công chứng đối với loại hình bất động sản này thường không có giá trị thi hành cưỡng chế khi có tranh chấp.", "D": "Mức phí công chứng lũy tiến quá cao gây ảnh hưởng trực tiếp đến biên độ lợi nhuận của nhà đầu tư."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Vai trò của công chứng viên giới hạn ở việc đảm bảo tính pháp lý của giao dịch dựa trên hồ sơ được cung cấp tại thời điểm công chứng, không bao gồm việc giám sát chất lượng thi công hay việc thực hiện hợp đồng sau này của chủ đầu tư. Công chứng viên kiểm tra Giấy phép xây dựng, quy hoạch 1/500, văn bản đủ điều kiện bán nhà của Sở Xây dựng... nhưng họ không thể (và không có chức năng) xuống công trường để kiểm tra xem chủ đầu tư có dùng đúng loại mác bê tông hay thiết bị vệ sinh như cam kết trong hợp đồng hay không. Dấu công chứng xác nhận hợp đồng có hiệu lực pháp lý, nhưng không thể ngăn chặn việc chủ đầu tư bị đứt gãy dòng vốn dẫn đến dừng thi công. Đây là rủi ro thương mại mà bên mua phải tự thẩm định qua uy tín chủ đầu tư. Công chứng xác nhận \"trạng thái pháp lý\" tại thời điểm ký. Những biến động sau đó (ví dụ: chủ đầu tư đem dự án đi thế chấp ngân hàng sau khi đã công chứng hợp đồng cho khách hàng - một hành vi vi phạm pháp luật nhưng vẫn có thể xảy ra trong thực tế) là nằm ngoài tầm kiểm soát trực tiếp của Công chứng viên tại thời điểm đó."}, {"level": "1", "content": "Khi thực hiện công chứng hợp đồng mua bán bất động sản, căn cứ nào sau đây được sử dụng để xác định \"giá trị tài sản\" làm cơ sở tính phí công chứng theo quy định pháp luật hiện hành?", "options": {"A": "Mức giá trung bình do Công chứng viên tự khảo sát trên các sàn giao dịch bất động sản trực tuyến.", "B": "Giá thỏa thuận trong hợp đồng; nếu giá thỏa thuận thấp hơn giá Nhà nước quy định thì tính theo giá Nhà nước.", "C": "Giá trị tài sản được ghi nhận trên sổ sách kế toán của doanh nghiệp tại thời điểm gần nhất.", "D": "Giá trị do tổ chức thẩm định giá độc lập cung cấp theo yêu cầu riêng của Văn phòng công chứng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Thông tư 257/2016/TT-BTC (được cập nhật các quy định mới về quản lý thuế 2026), phí công chứng được tính trên giá trị hợp đồng hoặc giá trị tài sản. Bao gồm Bảng giá đất do UBND cấp tỉnh ban hành hàng năm (không còn khung giá đất cũ) và giá tính lệ phí trước bạ đối với nhà ở, công trình xây dựng. ếu các bên thỏa thuận giá bán là 5 tỷ đồng nhưng trong hợp đồng chỉ ghi 2 tỷ đồng (để trốn thuế), trong khi Bảng giá đất quy định vị trí đó có giá tương đương 3 tỷ đồng, thì Công chứng viên bắt buộc phải lấy con số 3 tỷ đồng để làm căn cứ tính phí công chứng. Quy định này giúp ngăn chặn việc thất thu phí công chứng và đồng bộ với cơ chế tính thuế thu nhập cá nhân/doanh nghiệp dựa trên giá thị trường của Luật Đất đai 2024."}, {"level": "1", "content": "Theo quy định của pháp luật dân sự hiện hành, hậu quả pháp lý đối với hợp đồng chuyển nhượng bất động sản thuộc diện bắt buộc phải công chứng nhưng các bên chỉ thực hiện ký tay (văn bản không công chứng) được xác định như thế nào?", "options": {"A": "Hợp đồng mặc nhiên có hiệu lực nếu các bên đã thực hiện việc bàn giao thực địa và thanh toán xong.", "B": "Hợp đồng có thể bị Tòa án tuyên bố vô hiệu do vi phạm quy định về hình thức theo yêu cầu của một hoặc các bên.", "C": "Hợp đồng vẫn có hiệu lực pháp lý nhưng bên vi phạm sẽ bị xử phạt vi phạm hành chính trong lĩnh vực đất đai.", "D": "Hợp đồng chỉ bị vô hiệu nếu các bên có tranh chấp về nội dung, nếu không tranh chấp thì vẫn được công nhận."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc không tuân thủ yêu cầu bắt buộc về hình thức (công chứng/chứng thực) là một căn cứ để Tòa án tuyên bố hợp đồng vô hiệu theo quy định của Bộ luật Dân sự. Nguyên tắc chung (Khoản 2 Điều 117 & Điều 119 BLDS): Hình thức của giao dịch dân sự là điều kiện có hiệu lực của giao dịch dân sự trong trường hợp luật có quy định. Với bất động sản, công chứng là hình thức bắt buộc. Vi phạm hình thức dẫn đến giao dịch vô hiệu. Ngoại lệ: \"Giao dịch dân sự đã được xác lập bằng văn bản nhưng vi phạm quy định bắt buộc về công chứng, chứng thực mà một bên hoặc các bên đã thực hiện ít nhất hai phần ba (2/3) nghĩa vụ trong giao dịch thì theo yêu cầu của một bên hoặc các bên, Tòa án ra quyết định công nhận hiệu lực của giao dịch đó.\""}, {"level": "1", "content": "Trong quy trình thực hiện công chứng điện tử trực tuyến, công cụ pháp lý và kỹ thuật cốt lõi nào được sử dụng để đảm bảo tính định danh cá nhân và tính toàn vẹn, chống sự can thiệp trái phép vào văn bản điện tử sau khi đã ký?", "options": {"A": "Mã hóa văn bản thành định dạng PDF và thiết lập mật khẩu chỉ đọc (Read-only) để chống chỉnh sửa.", "B": "Sử dụng chữ ký số công cộng kết hợp với giải pháp cấp dấu thời gian (Timestamping) được chứng nhận.", "C": "Xác nhận qua hệ thống tin nhắn SMS OTP và lưu trữ song song bản in giấy tại Văn phòng công chứng.", "D": "Áp dụng công nghệ lưu trữ phi tập trung thông qua nhiều máy chủ khác nhau trên internet."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Chữ ký số đảm bảo xác thực người ký và tính không thể phủ nhận. Dấu thời gian giúp xác định thời điểm văn bản được ký và đảm bảo văn bản không bị thay đổi kể từ thời điểm đó, đảm bảo tính toàn vẹn. Chữ ký số (Digital Signature): Đây không phải là việc \"vẽ\" chữ ký lên file PDF. Chữ ký số hoạt động dựa trên công nghệ mã hóa không đối xứng (Asymmetric Cryptography) với Khóa công khai (Public Key) và Khóa bí mật (Private Key). Nó đảm bảo 2 yếu tố: (1) Xác thực chính xác người ký (Authentication); (2) Tính chống chối bỏ (Non-repudiation) - người ký không thể cãi rằng \"tôi không ký\". Tính toàn vẹn (Integrity): Bất kỳ sự thay đổi dù nhỏ nhất nào (thêm một dấu phẩy) vào văn bản sau khi đã được ký số sẽ làm \"phá vỡ\" chữ ký số đó, và hệ thống sẽ lập tức cảnh báo văn bản đã bị can thiệp. Dấu thời gian (Timestamping): Một khuyết điểm của chữ ký số là chứng thư số có thể hết hạn hoặc bị thu hồi. Dịch vụ cấp dấu thời gian cung cấp một \"dấu vết độc lập\" từ bên thứ ba (nhà cung cấp dịch vụ chứng thực chữ ký số), chứng minh một cách không thể chối cãi về thời điểm chính xác (đến từng giây) mà văn bản được ký và đóng băng trạng thái của nó."}, {"level": "1", "content": "Biện pháp nào giúp giảm thiểu rủi ro cho khách hàng khi ký Hợp đồng đặt cọc mua bất động sản hình thành trong tương lai?", "options": {"A": "Yêu cầu Công chứng viên xác nhận việc bàn giao số tiền đặt cọc tương đương 30% giá trị hợp đồng.", "B": "Kiểm tra văn bản đủ điều kiện bán hàng của cơ quan nhà nước và chỉ đặt cọc không quá 5% giá bán.", "C": "Chuyển toàn bộ tiền đặt cọc vào tài khoản cá nhân của người môi giới để đảm bảo tính thanh khoản.", "D": "Chỉ thực hiện đặt cọc thông qua các thỏa thuận dân sự không cần văn bản để tránh các thủ tục thuế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Ký trực tiếp với chủ đầu tư và kiểm tra pháp lý dự án (đặc biệt là điều kiện được bán/huy động vốn) là cách tốt nhất để đảm bảo tính ràng buộc và giảm rủi ro khi đặt cọc mua bất động sản hình thành trong tương lai. Theo Khoản 5 Điều 23 Luật Kinh doanh Bất động sản 2023, chủ đầu tư dự án chỉ được thu tiền đặt cọc không quá 5% giá bán, cho thuê mua từ khách hàng khi nhà ở, công trình xây dựng đã có đủ các điều kiện đưa vào kinh doanh. Đây là \"chốt chặn\" quan trọng để ngăn chặn rủi ro tài chính cho khách hàng nếu dự án bị đình trệ. Luật cũng quy định rõ chỉ được thu cọc khi dự án đã có thiết kế cơ sở được cơ quan nhà nước thẩm định và có một trong các giấy tờ về quyền sử dụng đất. Văn bản đủ điều kiện bán hàng là bằng chứng pháp lý cao nhất cho thấy dự án đã hoàn thành nghĩa vụ thuế, có giấy phép xây dựng và đã hoàn thành phần móng (đối với chung cư). Nếu thiếu văn bản này của Sở Xây dựng, việc ký hợp đồng đặt cọc vẫn chứa đựng rủi ro pháp lý cực lớn."}, {"level": "1", "content": "Khi phát sinh sai sót của Công chứng viên gây thiệt hại thực tế cho doanh nghiệp trong quá trình công chứng hợp đồng bất động sản, chủ thể nào có trách nhiệm trực tiếp bồi thường thiệt hại cho doanh nghiệp theo quy định của pháp luật?", "options": {"A": "Cá nhân Công chứng viên đã thực hiện việc ký và đóng dấu vào văn bản công chứng đó.", "B": "Tổ chức hành nghề công chứng nơi Công chứng viên đó hành nghề (sau đó tổ chức này có quyền yêu cầu Công chứng viên hoàn trả).", "C": "Sở Tư pháp địa phương – cơ quan quản lý nhà nước trực tiếp đối với hoạt động công chứng trên địa bàn.", "D": "Hiệp hội Công chứng viên Việt Nam – tổ chức xã hội - nghề nghiệp của các công chứng viên.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trách nhiệm bồi thường của tổ chức (Điều 38): Luật khẳng định tổ chức hành nghề công chứng (Văn phòng công chứng hoặc Phòng công chứng) phải bồi thường thiệt hại cho người yêu cầu công chứng và cá nhân, tổ chức khác do lỗi mà Công chứng viên, nhân viên hoặc người phiên dịch của mình gây ra. Điều này giúp doanh nghiệp có một đầu mối chịu trách nhiệm pháp lý rõ ràng và có pháp nhân để khởi kiện. Sau khi đã bồi thường cho doanh nghiệp, tổ chức hành nghề công chứng có quyền yêu cầu Công chứng viên đã gây ra lỗi phải hoàn trả lại một khoản tiền tương ứng với mức độ lỗi của họ."}, {"level": "1", "content": "Trong quá trình tố tụng trọng tài thương mại, nếu các bên thỏa thuận được với nhau về việc giải quyết tranh chấp (hòa giải thành), văn bản ghi nhận kết quả này có giá trị pháp lý như thế nào?", "options": {"A": "Chỉ mang tính chất biên bản ghi nhớ, các bên có quyền thay đổi ý kiến trước khi thi hành án.", "B": "Có giá trị như một hợp đồng dân sự mới, nếu vi phạm phải khởi kiện bằng một vụ án khác.", "C": "Quyết định công nhận sự thỏa thuận của các bên là chung thẩm và có giá trị như phán quyết trọng tài.", "D": "Chỉ có hiệu lực thi hành sau khi được Tòa án nhân dân có thẩm quyền ra quyết định công nhận."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Luật Trọng tài thương mại 2010: Việc công nhận kết quả hòa giải thành trong trọng tài được quy định chặt chẽ nhằm đảm bảo tính dứt điểm và quyền lợi của các bên mà không cần qua các thủ tục hành chính phức tạp: (1) Cơ chế thực hiện (Điều 58): Khi các bên thỏa thuận được với nhau, Hội đồng trọng tài sẽ lập Biên bản hòa giải thành có chữ ký của các bên và các Trọng tài viên. Sau đó, Hội đồng trọng tài ban hành Quyết định công nhận sự thỏa thuận của các bên. (2) Tính chung thẩm: Quyết định này là chung thẩm, có hiệu lực kể từ ngày ban hành. Điều này có nghĩa là các bên không thể kháng cáo, kháng nghị và Hội đồng trọng tài cũng không được thay đổi nội dung này sau khi đã ký ban hành. (3) Giá trị thi hành: Quyết định công nhận hòa giải thành được cơ quan Thi hành án dân sự cưỡng chế thi hành tương tự như một bản án của Tòa án hoặc một phán quyết trọng tài thông thường."}, {"level": "1", "content": "Theo quy định của Luật Công chứng 2024, Chính phủ căn cứ vào tiêu chí chủ đạo nào sau đây để quy định và ban hành Danh mục các loại giao dịch bắt buộc phải công chứng?", "options": {"A": "Tổng giá trị tài sản hoặc giá trị giao dịch được ghi nhận trong hợp đồng.", "B": "Loại hình tài sản là bất động sản hoặc động sản phải đăng ký quyền sở hữu.", "C": "Tính chất quan trọng và yêu cầu cao về mức độ an toàn pháp lý của giao dịch.", "D": "Tổng số lượng các bên tham gia và mức độ phức tạp về mặt thủ tục hành chính.."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật 2024 nêu rõ tiêu chí để Chính phủ xác định các giao dịch bắt buộc công chứng là dựa trên tầm quan trọng và yêu cầu cao về an toàn pháp lý, nhằm bảo vệ quyền lợi các bên và ổn định xã hội. An toàn pháp lý (Legal Safety) không chỉ nằm ở giá trị tiền bạc. Một giao dịch tặng cho nhà đất giữa người thân có thể giá trị tiền mặt thấp, nhưng tính chất \"quan trọng\" cực cao vì nó ảnh hưởng đến quyền cư trú và trật tự gia đình. Do đó, yêu cầu về sự minh bạch và xác thực ý chí là ưu tiên hàng đầu. Nếu dựa vào giá trị (Tiêu chí A), khi thị trường lạm phát hoặc giá đất biến động, danh mục này sẽ phải thay đổi liên tục. Bằng cách dựa vào \"tính chất quan trọng\", Luật đảm bảo sự ổn định: hễ là chuyển nhượng quyền sử dụng đất hoặc nhà ở thì bắt buộc phải công chứng, bất kể giá trị là 100 triệu hay 100 tỷ đồng. Các giao dịch có tính chất quan trọng thường liên quan đến những tài sản là tư liệu sản xuất hoặc nơi ở duy nhất của người dân. Việc bắt buộc công chứng là cách Nhà nước sử dụng Công chứng viên như một \"người gác cổng\" để ngăn chặn sự lừa dối, ép buộc, bảo vệ những người có ít am hiểu về pháp luật."}, {"level": "1", "content": "Theo quy định của pháp luật đất đai và kinh doanh bất động sản hiện hành, Hợp đồng góp vốn bằng quyền sử dụng đất, tài sản gắn liền với đất giữa một doanh nghiệp và một cá nhân có bắt buộc phải công chứng hoặc chứng thực hay không?", "options": {"A": "Bắt buộc phải công chứng hoặc chứng thực trong mọi trường hợp.", "B": "Bắt buộc, ngoại trừ trường hợp doanh nghiệp đó là tổ chức có chức năng kinh doanh bất động sản thì công chứng theo yêu cầu.", "C": "Không bắt buộc trong mọi trường hợp do đây là hoạt động đầu tư thương mại.", "D": "Bắt buộc nếu cá nhân là người góp vốn, không bắt buộc nếu doanh nghiệp góp vốn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Khoản 3 Điều 27 Luật Đất đai 2024, các hợp đồng chuyển nhượng, tặng cho, thế chấp, góp vốn bằng quyền sử dụng đất, quyền sử dụng đất và tài sản gắn liền với đất phải được công chứng hoặc chứng thực. Đây là quy định nhằm bảo vệ an toàn pháp lý cho tài sản có giá trị lớn. Cùng tại Khoản 3 Điều 27 Luật Đất đai 2024 (và được đồng bộ với Luật Kinh doanh Bất động sản 2023), nếu một bên hoặc các bên tham gia giao dịch là tổ chức hoạt động kinh doanh bất động sản thì việc công chứng, chứng thực thực hiện theo yêu cầu của các bên (không bắt buộc). Pháp luật mặc định rằng, các tổ chức hoạt động kinh doanh bất động sản (chủ đầu tư, công ty bất động sản chuyên nghiệp) đã có đủ năng lực pháp lý, am hiểu pháp luật và phải chịu sự điều chỉnh khắt khe của Luật Kinh doanh Bất động sản, pháp luật về doanh nghiệp, kế toán, kiểm toán. Do đó, rủi ro lừa đảo hoặc vi phạm ý chí thấp hơn so với giao dịch giữa các cá nhân đơn thuần, nên không cần Nhà nước (thông qua Công chứng viên) bắt buộc phải \"gác cổng\".."}, {"level": "1", "content": "Theo quy định về phạm vi điều chỉnh và áp dụng pháp luật tại Điều 4 Luật Kinh doanh bất động sản 2023, trường hợp có sự khác biệt giữa Luật này và các luật khác liên quan về hình thức, trình tự, thủ tục kinh doanh bất động sản thì nguyên tắc ưu tiên được xác định như thế nào?", "options": {"A": "Ưu tiên áp dụng Luật Đất đai và Luật Nhà ở vì đây là các luật gốc quy định về chế độ sở hữu và sử dụng tài sản.", "B": "Ưu tiên áp dụng Luật Đầu tư nếu giao dịch phát sinh trong quá trình thực hiện dự án đầu tư xây dựng.", "C": "Ưu tiên áp dụng Luật Kinh doanh bất động sản, trừ trường hợp luật khác có quy định đặc thù về hình thức, trình tự, thủ tục kinh doanh BĐS.", "D": "Doanh nghiệp được quyền lựa chọn luật áp dụng tùy theo tính chất có lợi của quy định đối với hoạt động vận hành thực tế."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Khoản 2 Điều 4 Luật KDBĐS 2023, Luật này đóng vai trò là \"luật chuyên ngành ưu tiên\" đối với các hoạt động KDBĐS. Nếu một vấn đề liên quan đến trình tự, thủ tục KDBĐS mà Luật KDBĐS đã quy định, thì phải áp dụng luật này. Đáp án C phản ánh đúng tinh thần của luật khi thừa nhận có những trường hợp luật khác (như Luật Đất đai, Luật Nhà ở) có quy định đặc thù về trình tự thủ tục mà Luật KDBĐS không phủ quét hết hoặc có dẫn chiếu ngược.."}, {"level": "1", "content": "Khi trích dẫn căn cứ pháp lý trong các hồ sơ dự án hoặc giải quyết tranh chấp kinh doanh bất động sản, giá trị pháp lý của Văn bản hợp nhất (VBHN) được xác định như thế nào?", "options": {"A": "VBHN là văn bản quy phạm pháp luật mới, có giá trị thay thế hoàn toàn văn bản gốc và các văn bản sửa đổi, bổ sung liên quan.", "B": "VBHN được sử dụng chính thức trong việc áp dụng pháp luật, nhưng không có giá trị thay thế văn bản gốc nếu có sự sai khác về nội dung.", "C": "VBHN chỉ mang tính chất tài liệu tham khảo hỗ trợ tra cứu, không được phép viện dẫn trong các văn bản tố tụng hoặc hành chính.", "D": "VBHN có giá trị pháp lý tương đương văn bản quy phạm pháp luật và có hiệu lực cao hơn các văn bản được hợp nhất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 2 Pháp lệnh Hợp nhất văn bản quy phạm pháp luật 2012, việc hợp nhất văn bản là hoạt động kỹ thuật nhằm sắp xếp nội dung văn bản gốc và văn bản sửa đổi thành một cấu trúc thống nhất. VBHN không phải là văn bản quy phạm pháp luật (không nằm trong hệ thống tại Luật Ban hành VBQPPL). Căn cứ Điều 6 Pháp lệnh này, VBHN được sử dụng chính thức trong việc áp dụng và thi hành pháp luật. Điều này bác bỏ ý kiến cho rằng nó \"chỉ để tham khảo\" (Đáp án C sai). Nguyên tắc ưu tiên khi sai sót: Đây là điểm then chốt. Nếu có sự sai khác giữa nội dung của VBHN và nội dung của văn bản quy phạm pháp luật được hợp nhất (văn bản gốc/sửa đổi) do lỗi kỹ thuật khi hợp nhất, thì nội dung của văn bản quy phạm pháp luật gốc sẽ được áp dụng (Đáp án B đúng).."}, {"level": "1", "content": "Trong hệ thống pháp luật Việt Nam, đạo luật nào giữ vai trò là \"bộ lọc\" chuyên ngành để xác định một tài sản bất động sản có đủ tư cách trở thành hàng hóa lưu thông trên thị trường và quy định điều kiện năng lực thực chất đối với các chủ thể kinh doanh?", "options": {"A": "Luật Doanh nghiệp 2020.", "B": "Luật Đầu tư 2025.", "C": "Luật kinh doanh bất động sản 2023.", "D": "Luật Đất đai 2024."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật kinh doanh bất động sản 2023 là văn bản pháp luật trung tâm, quy định cụ thể về các loại bất động sản được kinh doanh, điều kiện của chủ thể kinh doanh, điều kiện bất động sản đưa vào kinh doanh, các loại hợp đồng, môi giới, sàn giao dịch.... Căn cứ Điều 1 Luật Kinh doanh bất động sản 2023, đạo luật này trực tiếp quy định về: (i) Các loại bất động sản đưa vào kinh doanh; (ii) Điều kiện đối với tổ chức, cá nhân kinh doanh bất động sản. Đây là \"cửa khẩu\" duy nhất định nghĩa một tài sản khi nào trở thành hàng hóa bất động sản hợp lệ."}, {"level": "1", "content": "Trong hệ thống pháp luật Việt Nam năm 2026, đạo luật nào đóng vai trò là nền tảng pháp lý cốt lõi quy định về trình tự thành lập, chế độ quản trị nội bộ và tư cách pháp nhân của các chủ thể kinh doanh bất động sản?", "options": {"A": "Luật Nhà ở 2023.", "B": "Luật Doanh nghiệp 2020 (sửa đổi, bổ sung 2025 bởi Luật số 76/2025/QH15)", "C": "Luật kinh doanh bất động sản 2023."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 1 Luật Doanh nghiệp 2020, luật này quy định về việc thành lập, tổ chức quản lý, tổ chức lại, giải thể và hoạt động có liên quan của doanh nghiệp. Một công ty BĐS trước khi muốn đáp ứng các điều kiện về vốn hay chứng chỉ hành nghề (theo Luật Kinh doanh BĐS), trước hết phải là một thực thể pháp lý được công nhận bởi Luật Doanh nghiệp.."}, {"level": "1", "content": "Căn cứ Luật Kinh doanh bất động sản 2023 và các văn bản hướng dẫn thi hành năm 2026, trừ trường hợp quy mô nhỏ, tổ chức hoặc cá nhân khi thực hiện các giao dịch mua bán, cho thuê mua bất động sản nhằm mục đích sinh lợi bắt buộc phải thỏa mãn điều kiện nào về mặt hình thức tổ chức?", "options": {"A": "Có thể hoạt động dưới hình thức Hộ kinh doanh cá thể nếu có vốn chủ sở hữu đáp ứng tỷ lệ của dự án.", "B": "Thành lập doanh nghiệp hoặc hợp tác xã/liên hiệp hợp tác xã và có đăng ký ngành, nghề kinh doanh bất động sản phù hợp.", "C": "Chỉ cần thực hiện đăng ký mã số thuế kinh doanh và có chứng chỉ hành nghề môi giới bất động sản do Sở Xây dựng cấp.", "D": "Thành lập Văn phòng đại diện hoặc Chi nhánh có chức năng thực hiện hoạt động kinh doanh sinh lợi trực tiếp.."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 9 Luật kinh doanh bất động sản 2023 yêu cầu tổ chức, cá nhân kinh doanh bất động sản (trừ trường hợp quy mô nhỏ) phải thành lập doanh nghiệp hoặc HTX/liên hiệp hợp tác xã và có đăng ký ngành, nghề kinh doanh bất động sản. Luật chỉ chấp nhận hai hình thức: Doanh nghiệp (theo Luật Doanh nghiệp) hoặc Hợp tác xã/Liên hiệp hợp tác xã (theo Luật Hợp tác xã). Điều này có nghĩa là Hộ kinh doanh không còn tư cách để thực hiện kinh doanh BĐS chuyên nghiệp (Đáp án A sai). Không chỉ thành lập pháp nhân là đủ, mà pháp nhân đó phải có đăng ký ngành, nghề kinh doanh bất động sản phải khớp với mã ngành 6810 hoặc 6821/6829 theo Quyết định 26/2025/QĐ-TTg."}, {"level": "1", "content": "Theo quy định của Luật Doanh nghiệp 2020 (sửa đổi, bổ sung 2025 bởi Luật số 76/2025/QH15), loại hình doanh nghiệp nào mà các thành viên/chủ sở hữu chỉ chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của doanh nghiệp trong phạm vi số vốn đã góp/cam kết góp, đồng thời không được phát hành cổ phần (trừ trường hợp chuyển đổi loại hình doanh nghiệp)?", "options": {"A": "Công ty Cổ phần.", "B": "Doanh nghiệp Tư nhân.", "C": "Công ty Hợp danh.", "D": "Công ty Trách nhiệm hữu hạn."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 46 (đối với Công ty TNHH hai thành viên trở lên) và Điều 74 (đối với Công ty TNHH một thành viên) Luật Doanh nghiệp 2020, chủ sở hữu và thành viên công ty chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của doanh nghiệp trong phạm vi số vốn đã góp hoặc cam kết góp vào doanh nghiệp. Đây là đặc điểm phân biệt cơ bản với Doanh nghiệp tư nhân (Điều 188) và Thành viên hợp danh của Công ty hợp danh (Điều 177) - những chủ thể phải chịu trách nhiệm bằng toàn bộ tài sản cá nhân (trách nhiệm vô hạn). Luật quy định rõ: Công ty TNHH không được phát hành cổ phần, trừ trường hợp để chuyển đổi thành công ty cổ phần. Thay vào đó, công ty TNHH huy động vốn thông qua việc tăng vốn góp của thành viên hoặc tiếp nhận vốn góp của thành viên mới, hoặc phát hành trái phiếu theo quy định của pháp luật và Điều lệ công ty.."}, {"level": "1", "content": "Đối với các dự án bất động sản có quy mô vốn đầu tư lớn, yêu cầu sự tham gia góp vốn từ đông đảo nhà đầu tư và có lộ trình niêm yết trên thị trường chứng khoán, loại hình doanh nghiệp nào sau đây là lựa chọn phù hợp nhất theo quy định pháp luật hiện hành?", "options": {"A": "Doanh nghiệp Tư nhân.", "B": "Công ty trách nhiệm hữu hạn một thành viên.", "C": "Công ty Cổ phần.", "D": "Công ty Hợp danh."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Công ty côt phần có khả năng huy động vốn linh hoạt qua phát hành cổ phiếu, trái phiếu, phù hợp với các dự án bất động sản quy mô lớn, cần vốn đầu tư khổng lồ. Căn cứ Điều 111 Luật Doanh nghiệp 2020, vốn điều lệ của CTCP được chia thành các phần bằng nhau gọi là cổ phần. Đặc tính này cho phép doanh nghiệp huy động vốn từ một số lượng cổ đông không hạn chế (tối thiểu là 03 cổ đông), phù hợp với tính chất thâm dụng vốn của ngành bất động sản. Theo Điều 121 Luật Doanh nghiệp 2020 (sửa đổi, bổ sung 2025) và Luật Chứng khoán 2019 (sửa đổi 2025), CTCP là mô hình duy nhất có quyền phát hành cổ phiếu ra công chúng để huy động vốn thặng dư từ xã hội. Đồng thời, doanh nghiệp có quyền phát hành đa dạng các loại trái phiếu (trái phiếu chuyển đổi, trái phiếu kèm chứng quyền) để tài trợ cho các dự án dài hạn. Cổ phần của CTCP được tự do chuyển nhượng (trừ trường hợp quy định tại khoản 3 Điều 119 và khoản 1 Điều 120 Luật Doanh nghiệp). Điều này tạo điều kiện thuận lợi cho các nhà đầu tư thoái vốn hoặc luân chuyển dòng vốn, một yếu tố then chốt thu hút các quỹ đầu tư bất động sản (REITs). Với cơ cấu gồm Đại hội đồng cổ đông, Hội đồng quản trị, Ban kiểm soát và Giám đốc/Tổng giám đốc, mô hình này đáp ứng các tiêu chuẩn khắt khe về kiểm soát xung đột lợi ích và công bố thông tin theo quy định của Luật Kinh doanh bất động sản 2023 và các quy định về quản trị công ty niêm yết năm 2026."}, {"level": "1", "content": "Loại hình doanh nghiệp nào có chủ sở hữu chịu trách nhiệm bằng toàn bộ tài sản của mình (trách nhiệm vô hạn) và không có tư cách pháp nhân?", "options": {"A": "Công ty Cổ phần.", "B": "Công ty trách nhiệm hữu hạn.", "C": "Doanh nghiệp Tư nhân.", "D": "Công ty Hợp danh (đối với thành viên góp vốn)."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Khoản 1 Điều 188 Luật Doanh nghiệp 2020, DNTN là doanh nghiệp do một cá nhân làm chủ và tự chịu trách nhiệm bằng toàn bộ tài sản của mình về mọi hoạt động của doanh nghiệp. Điều này có nghĩa là không có sự tách biệt giữa tài sản đưa vào kinh doanh và tài sản dân sự của cá nhân chủ sở hữu. Trong trường hợp doanh nghiệp phát sinh nợ, chủ sở hữu phải dùng cả tài sản không dùng trong kinh doanh (nhà ở, xe cá nhân...) để thanh toán. Để một tổ chức có tư cách pháp nhân, theo Điều 74 Bộ luật Dân sự 2015, tổ chức đó phải có tài sản độc lập với cá nhân, pháp nhân khác và tự chịu trách nhiệm bằng tài sản của mình. Do DNTN không có sự độc lập về tài sản với chủ sở hữu (vốn của chủ doanh nghiệp tư nhân không tách biệt với tài sản còn lại của chủ doanh nghiệp theo Điều 189), nên DNTN không thỏa mãn điều kiện để có tư cách pháp nhân."}, {"level": "1", "content": "Loại hình Công ty Hợp danh có đặc điểm gì về trách nhiệm của thành viên?", "options": {"A": "Tất cả các thành viên (bao gồm thành viên hợp danh và thành viên góp vốn) đều chịu trách nhiệm hữu hạn trong phạm vi phần vốn đã góp.", "B": "Tất cả các thành viên đều chịu trách nhiệm vô hạn bằng toàn bộ tài sản cá nhân đối với các nghĩa vụ của công ty.", "C": "Thành viên hợp danh chịu trách nhiệm vô hạn và liên đới; thành viên góp vốn chỉ chịu trách nhiệm hữu hạn trong phạm vi số vốn đã cam kết góp.", "D": "Thành viên hợp danh chịu trách nhiệm hữu hạn; thành viên góp vốn chịu trách nhiệm vô hạn đối với các khoản nợ của doanh nghiệp."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Mô hình Công ty Hợp danh (CTHD) mang tính chất đối nhân đặc trưng, dẫn đến sự phân tầng về trách nhiệm giữa hai nhóm thành viên theo Điều 177 Luật Doanh nghiệp 2020: (1) Thành viên hợp danh (General Partners): Phải chịu trách nhiệm bằng toàn bộ tài sản của mình về các nghĩa vụ của công ty. Điều này tương đương với chế độ trách nhiệm của chủ doanh nghiệp tư nhân. Các thành viên hợp danh cùng nhau chịu trách nhiệm về toàn bộ nghĩa vụ tài sản của công ty (Trách nhiệm liên đới). Chủ nợ có quyền yêu cầu bất kỳ thành viên hợp danh nào thanh toán toàn bộ khoản nợ mà không bắt buộc phải đòi theo tỷ lệ vốn góp. CTHD phải có ít nhất 02 thành viên hợp danh là cá nhân. (2) Thành viên góp vốn (Limited Partners): Chỉ chịu trách nhiệm về các khoản nợ của công ty trong phạm vi số vốn đã cam kết góp vào công ty (Trách nhiệm hữu hạn). Khác với thành viên hợp danh, thành viên góp vốn không được tham gia quản lý công ty và không được tiến hành công việc kinh doanh nhân danh công ty (Hạn chế quyền quản lý) (Điều 187).."}, {"level": "1", "content": "Theo quy định tại Khoản 1 Điều 9 Luật Kinh doanh bất động sản 2023, ngoài hình thức \"Doanh nghiệp\" được thành lập theo pháp luật về doanh nghiệp, chủ thể nào sau đây chính thức được phép thực hiện hoạt động kinh doanh bất động sản chuyên nghiệp?", "options": {"A": "Tổ chức chính trị - xã hội và các cơ quan hành chính sự nghiệp.", "B": "Hộ kinh doanh cá thể có đăng ký mã ngành kinh doanh bất động sản.", "C": "Hợp tác xã, liên hiệp hợp tác xã được thành lập theo pháp luật về hợp tác xã.", "D": "Các quỹ đầu tư phát triển không có tư cách pháp nhân độc lập."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 9 Luật Kinh doanh bất động sản 2023, tổ chức, cá nhân khi kinh doanh bất động sản (trừ trường hợp quy mô nhỏ, không thường xuyên) phải thành lập doanh nghiệp hoặc hợp tác xã, liên hiệp hợp tác xã. Quy định này đảm bảo tính thống nhất với Luật Hợp tác xã 2023, cho phép khu vực kinh tế tập thể tiếp cận và vận hành các dự án bất động sản tương đương với khu vực kinh tế tư nhân."}, {"level": "1", "content": "Căn cứ Luật Kinh doanh bất động sản 2023 và Nghị định 96/2024/NĐ-CP, điều kiện về năng lực tài chính đối với doanh nghiệp làm chủ đầu tư dự án bất động sản được quy định theo tiêu chuẩn nào sau đây để đảm bảo an toàn hệ thống và quyền lợi khách hàng?", "options": {"A": "Phải duy trì mức vốn pháp định tối thiểu là 20 tỷ đồng trong suốt quá trình hoạt động của doanh nghiệp.", "B": "Phải có lợi nhuận sau thuế dương trong ít nhất 03 năm tài chính liên tục trước khi nộp hồ sơ thực hiện dự án.", "C": "Vốn chủ sở hữu tối thiểu không thấp hơn 20% tổng vốn đầu tư (dự án < 20 ha) hoặc 15% (dự án ≥ 20 ha); đồng thời phải đảm bảo khả năng huy động vốn thực hiện dự án.", "D": "Cần có bảo lãnh thanh toán của ngân hàng thương mại tương đương 100% giá trị dự án mà không cần xét đến vốn chủ sở hữu.."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Kinh doanh bất động sản 2023 đã bãi bỏ hoàn toàn quy định về mức vốn pháp định 20 tỷ đồng (vốn danh nghĩa khi thành lập). Thay vào đó, luật tập trung vào năng lực tài chính tương ứng với từng dự án cụ thể. Căn cứ Khoản 2 Điều 9 Luật Kinh doanh bất động sản 2023, doanh nghiệp phải đảm bảo tỷ lệ vốn tự có trên tổng mức đầu tư dự án theo hai phân cấp: Không thấp hơn 20% đối với dự án có quy mô sử dụng đất dưới 20 ha. Không thấp hơn 15% đối với dự án có quy mô sử dụng đất từ 20 ha trở lên. Trường hợp chủ đầu tư đồng thời thực hiện nhiều dự án, vốn chủ sở hữu phải đảm bảo đủ tỷ lệ cho tổng vốn đầu tư của tất cả các dự án đang triển khai.."}, {"level": "1", "content": "Căn cứ quy định tại Luật Doanh nghiệp 2020 và các văn bản hướng dẫn thi hành, cơ quan nào sau đây có thẩm quyền trực tiếp thụ lý hồ sơ, xem xét và cấp Giấy chứng nhận đăng ký doanh nghiệp cho các doanh nghiệp kinh doanh bất động sản??", "options": {"A": "Phòng Đăng ký kinh doanh thuộc Sở Kế hoạch và Đầu tư.", "B": "Văn phòng Đăng ký đất đai thuộc Sở Nông nghiệp và Môi trường.", "C": "Phòng Đăng ký kinh doanh thuộc Sở Tài chính.", "D": "Trung tâm Hành chính công."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Hồ sơ đăng ký doanh nghiệp được nộp tại Phòng Đăng ký kinh doanh thuộc Sở Tài chính, và cơ quan này sẽ xem xét, cấp GCNĐKDN nếu hồ sơ hợp lệ."}, {"level": "1", "content": "Sau khi được cấp Giấy chứng nhận đăng ký doanh nghiệp, doanh nghiệp có nghĩa vụ gì tiếp theo liên quan đến công bố thông tin?", "options": {"A": "Lưu trữ hồ sơ tại trụ sở và bắt đầu triển khai các hoạt động bán hàng.", "B": "Thông báo việc thành lập trên các phương tiện truyền thông của địa phương.", "C": "Công bố nội dung đăng ký trên Cổng thông tin quốc gia về đăng ký doanh nghiệp.", "D": "Gửi văn bản xác nhận đăng ký đến Hiệp hội Bất động sản Việt Nam."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo quy định tại Điều 32 Luật Doanh nghiệp 2020 (được giữ nguyên tại bản sửa đổi 2025), sau khi được cấp Giấy chứng nhận đăng ký doanh nghiệp, doanh nghiệp phải thông báo công khai trên Cổng thông tin quốc gia về đăng ký doanh nghiệp và phải nộp phí theo quy định. Việc công bố phải được thực hiện trong thời hạn 30 ngày kể từ ngày nội dung đăng ký được công khai. Đây là mốc thời gian quan trọng để xác định hành vi vi phạm hành chính nếu doanh nghiệp chậm trễ. Nội dung công bố bao gồm các thông tin cơ bản về ngành, nghề kinh doanh và danh sách cổ đông sáng lập (đối với công ty cổ phần) hoặc thành viên góp vốn."}, {"level": "1", "content": "Hồ sơ đăng ký thành lập công ty cổ phần cần có những giấy tờ chính nào?", "options": {"A": "Giấy đề nghị đăng ký doanh nghiệp, Điều lệ công ty và văn bản xác nhận vốn ký quỹ tại tổ chức tín dụng.", "B": "Giấy đề nghị đăng ký doanh nghiệp, Điều lệ, Danh sách cổ đông sáng lập, Giấy tờ pháp lý cá nhân/tổ chức và Thông tin chủ sở hữu hưởng lợi.", "C": "Giấy đề nghị đăng ký doanh nghiệp, Danh sách cổ đông, Hợp đồng thuê trụ sở dự án và Phương án bảo vệ môi trường.", "D": "Điều lệ công ty, Giấy tờ pháp lý của người đại diện, Báo cáo tài chính kiểm toán và Biên bản họp Đại hội đồng cổ đông."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 22 Luật Doanh nghiệp 2020, hồ sơ cho Công ty Cổ phần bắt buộc phải có: (i) Giấy đề nghị; (ii) Điều lệ; (iii) Danh sách cổ đông sáng lập (và danh sách cổ đông là nhà đầu tư nước ngoài nếu có); (iv) Bản sao giấy tờ pháp lý của thành viên/cổ đông và người đại diện. Một trong những thay đổi trọng yếu của năm 2025 (Điểm mới từ Luật số 76/2025/QH15) là việc bổ sung nghĩa vụ kê khai Thông tin chủ sở hữu hưởng lợi (Beneficial Owner) ngay trong hồ sơ đăng ký thành lập. Đây là cơ chế nhằm minh bạch hóa dòng vốn và ngăn ngừa tình trạng sở hữu chéo hoặc rửa tiền trong lĩnh vực thâm dụng vốn như bất động sản."}, {"level": "1", "content": "Khi đăng ký ngành, nghề kinh doanh, doanh nghiệp phải tuân thủ hệ thống nào?", "options": {"A": "Hệ thống tiêu chuẩn ISO về phân loại lĩnh vực kinh doanh quốc tế.", "B": "Hệ thống ngành kinh tế Việt Nam (VSIC) theo Quyết định 27/2018/QĐ-TTg.", "C": "Hệ thống ngành kinh tế Việt Nam (VSIC) theo Quyết định 36/2025/QĐ-TTg.", "D": "Danh mục ngành kinh tế do cơ quan Đăng ký kinh doanh địa phương tự ban hành."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Căn cứ Điều 7 Nghị định 01/2021/NĐ-CP và các nội dung sửa đổi bổ sung năm 2025, hệ thống ngành kinh tế Việt Nam (VSIC) được cập nhật định kỳ để phản ánh chính xác sự xuất hiện của các loại hình kinh tế mới. Kể từ thời điểm Quyết định 36/2025/QĐ-TTg có hiệu lực, văn bản này chính thức thay thế Quyết định 27/2018/QĐ-TTg, trở thành khung chuẩn duy nhất để đối chiếu và mã hóa ngành nghề tại Việt Nam. Theo quy định, doanh nghiệp có trách nhiệm tự lựa chọn ngành nghề kinh doanh và thực hiện ghi đúng tên, mã ngành cấp bốn trong Hệ thống ngành kinh tế Việt Nam vào hồ sơ đăng ký. Đối với các ngành nghề kinh doanh có điều kiện (đặc biệt là nhóm ngành 68: Hoạt động kinh doanh bất động sản), việc ghi mã ngành cấp bốn chính xác là tiền đề để cơ quan quản lý (Sở Tài chính) và cơ quan thuế thực hiện chức năng giám sát chuyên ngành."}, {"level": "1", "content": "Theo quy định tại Luật Đầu tư 2025 và các văn bản hướng dẫn thi hành, thủ tục pháp lý tiên quyết nào sau đây bắt buộc phải thực hiện để cơ quan nhà nước có thẩm quyền xem xét, đánh giá về mục tiêu, quy mô, địa điểm và hiệu quả kinh tế - xã hội của một dự án bất động sản quy mô lớn?", "options": {"A": "Thực hiện cấp Giấy phép xây dựng cho các hạng mục công trình của dự án.", "B": "Thực hiện thủ tục Chấp thuận chủ trương đầu tư của cơ quan thẩm quyền.", "C": "Thực hiện đăng ký biến động đất đai tại cơ quan tài nguyên môi trường.", "D": "Thực hiện thẩm định giá đất và nộp tiền sử dụng đất vào ngân sách nhà nước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thủ tục Chấp thuận chủ trương đầu tư là \"bộ lọc\" pháp lý quan trọng nhất ở giai đoạn chuẩn bị dự án, được quy định chặt chẽ nhằm đảm bảo dự án phù hợp với quy hoạch và định hướng phát triển: Căn cứ pháp lý về thẩm quyền: Theo quy định tại Chương IV Luật Đầu tư 2025, tùy thuộc vào quy mô và tính chất dự án, thẩm quyền chấp thuận chủ trương đầu tư được phân cấp như sau: (1) Quốc hội: Đối với các dự án có tác động đặc biệt lớn đến môi trư

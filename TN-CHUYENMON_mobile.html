    <script>
        const allData = [{"level": "1", "content": "Bản chất của hoạt động môi giới BĐS là?", "options": {"A": "Là sự kết nối các bên để thiết lập 1 thương vụ.", "B": "Là một ngành nghề, kinh doanh dịch vụ, hoạt động nhằm thu lợi.", "C": "Là hoạt động không chịu sự quản lý của cơ quan nhà nước.", "D": "Là hoạt động không cần phần chứng chỉ hành nghề và giấy phép kinh doanh."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Môi giới bất động sản là một hoạt động kinh doanh dịch vụ, trong đó người môi giới đóng vai trò trung gian để kết nối người mua và người bán, nhằm mục đích thu về hoa hồng hoặc các khoản phí dịch vụ khác."}, {"level": "1", "content": "Môi giới bất động sản phân tích theo quy định của Luật Kinh doanh bất động sản hiện hành là?", "options": {"A": "Công việc chuyên môn của các cá nhân.", "B": "Việc làm trung gian giúp cho cho các bên trong mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản.", "C": "Hình thành theo sự phân công lao động xã hội.", "D": "Kết nối nhu cầu bên mua với nhu cầu bên bán bất động sản."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 11 điều 3 Luật kinh doanh bất động sản định nghĩa “Môi giới bất động sản là việc làm trung gian cho các bên trong mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản.”"}, {"level": "1", "content": "Nghề môi giới bất động sản nếu phân tích theo quan điểm kinh tế thị trường là gì?", "options": {"A": "Công việc chuyên môn của các cá nhân", "B": "Làm trung gian giúp cho việc mua, bán bất động sản được thực hiện", "C": "Hình thành theo sự phân công lao động xã hội", "D": "Kết nối nhu cầu bên mua với nhu cầu bên bán bất động sản."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> bản chất của hoạt động môi giới là kết nối cung và cầu (Đáp án D). Đây chính là mô tả chính xác nhất về chức năng và hành động của một nhà môi giới trong thực tế hàng ngày, và nó bao hàm cả vai trò trung gian (Đáp án B). Hơn nữa, cách diễn đạt \"kết nối nhu cầu\" cũng rộng hơn, bao quát được cả việc cho thuê, sang nhượng, không chỉ giới hạn ở mua và bán. Đáp án C trả lời cho câu hỏi \"Tại sao lại có nghề môi giới?\". Nó giải thích nguồn gốc, lý do tồn tại của nghề này trong một hệ thống kinh tế => Nguyên lý kinh tế học, mang tính học thuật."}, {"level": "1", "content": "Khi một bất động sản tạo ra dòng tiền thu nhập thụ động âm (ví dụ cho thuê không đủ bù các khoản chi và các khoản khấu hao đầu tư…). Nhằm làm cho nó trở thành một khoản đầu tư hấp dẫn đối với nhà đầu tư, ta nên chứng minh thế nào?", "options": {"A": "Sẽ có những giảm trừ thích hợp.", "B": "Sẽ có một chút trì hoãn nhỏ trong việc bảo hành sửa chữa bất động sản này.", "C": "Sẽ có một sự giảm giá đáng kể.", "D": "Sẽ có một sự gia tăng đáng kể trong giá trị tài sản."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Dòng tiền âm là một điểm yếu. Để bù lại, nhà môi giới cần chứng minh tiềm năng tăng giá vốn (capital gain) trong tương lai của BĐS đó. Sự gia tăng giá trị tài sản trong tương lai có thể bù đắp và vượt qua khoản lỗ từ dòng tiền hiện tại."}, {"level": "1", "content": "Một trong các nguyên nhân khiến giá BĐS không phản ánh đúng cung cầu là:", "options": {"A": "Thông tin không hoàn hảo", "B": "Tất cả giao dịch đều minh bạch", "C": "Nhà nước kiểm soát chặt", "D": "Giá đất cố định"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khi thông tin không hoàn hảo, người mua – người bán ra quyết định dựa trên tin đồn, kỳ vọng sai lệch, dẫn đến: Giá bị thổi phồng hoặc bóp méo; Hình thành sốt đất ảo, đầu cơ"}, {"level": "1", "content": "Một khách hàng nhờ bạn môi giới bán căn nhà. Khi kiểm tra hồ sơ, bạn phát hiện giấy tờ pháp lý chưa đầy đủ (thiếu bản vẽ hoàn công). Khách hàng yêu cầu bạn “cứ đăng bán trước, có khách thì bổ sung sau”. Nhà môi giới cần làm gì?", "options": {"A": "Đồng ý đăng vì thiếu một giấy tờ không ảnh hưởng nhiều", "B": "Đăng bán nhưng ghi chú “hồ sơ đang hoàn thiện”", "C": "Giải thích và yêu cầu khách hàng bổ sung hồ sơ pháp lý trước khi niêm yết", "D": "Vẫn đăng nhưng chỉ gửi cho khách thân quen"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024 có quy định: Quy tắc 9 - những hành vi nhà môi giới BĐS không được làm: không được gian lận, lừa dối khi thực hiện công việc Môi giới; Không công khai hoặc công khai không đầy đủ, trung thực thông tin về BĐS; Quy tắc 10 - Khách hàng Bên bán: Nhà Môi giới phải kiểm chứng, thẩm định BĐS và hồ sơ pháp lý, đảm bảo BĐS đủ điều kiện được tham gia thị trường thì mới tiến hành ký hợp đồng để thực hiện Môi giới hoặc làm đại diện;"}, {"level": "1", "content": "Trong một giao dịch, cả bên mua và bên bán cùng muốn thuê bạn làm đại diện. Bạn nên xử lý thế nào?", "options": {"A": "Nhận cả hai để tăng thu nhập", "B": "Nhận đại diện cả hai bên nhưng không nói cho họ biết", "C": "Chỉ được đại diện một bên và phải thông báo rõ ràng", "D": "Nhận đại diện bên trả hoa hồng cao hơn"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Quy tắc 9 trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024 có quy định Nhận làm đại diện cho cả 2 bên (bán và mua, thuê và cho thuê) là hành vi không được làm của nhà môi giới BĐS"}, {"level": "1", "content": "Bạn biết thông tin khu vực sắp có quy hoạch mở đường nhưng thông tin chưa được công bố chính thức. Khách hàng hỏi: “Có quy hoạch gì không?”. Bạn phải làm gì?", "options": {"A": "Nói không có gì để khách yên tâm mua", "B": "Đưa ra dự đoán cá nhân", "C": "Che giấu hoàn toàn", "D": "Chỉ cung cấp thông tin chính thống và cảnh báo khách về rủi ro khi thông tin chưa xác thực"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Quy tắc 7 trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024: Nhà Môi giới không được phóng đại, trình bày sai sự thật hoặc che giấu thông tin liên quan có yếu tố bất lợi đến BĐS hoặc giao dịch Quy tắc 11 trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024: Nhà Môi giới phải cung cấp thông tin chính xác và đầy đủ về tài sản, bao gồm tình trạng pháp lý, giá cả, và các yếu tố khác liên quan đến quyết định mua. Nhà Môi giới không được thổi phồng hoặc gây hiểu nhầm về BĐS"}, {"level": "1", "content": "Khách hàng yêu cầu bạn giảm hoa hồng xuống mức thấp hơn quy định của công ty. Bạn xử lý sao?", "options": {"A": "Đồng ý vì muốn chốt giao dịch", "B": "Giảm mà không báo công ty", "C": "Giải thích mức phí do công ty quy định và không được tự ý thay đổi", "D": "Thu thêm phí ngoài hợp đồng để bù lại"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Quy tắc 6  trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024: Nhà Môi giới tuyệt đối không được đòi hỏi, yêu cầu bổ sung về bất cứ khoản thù lao hay ưu đãi về lợi ích nào khác ngoài các khoản đã được thỏa thuận với khách hàng trong hợp đồng Quy tắc 9  trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024: không được Tự ý thay đổi mức phí các dịch vụ so với mức quy định của doanh nghiệp mình tham gia mà chưa có sự đồng ý hay quyết định của người có thẩm quyền"}, {"level": "1", "content": "Một đồng nghiệp cung cấp cho bạn thông tin sản phẩm họ đang niêm yết. Bạn dùng thông tin này để tiếp cận chủ nhà trực tiếp mà không thông qua đồng nghiệp. Hành vi này là:", "options": {"A": "Được phép nếu bạn chốt nhanh hơn", "B": "Đúng nếu đồng nghiệp không phản đối", "C": "Sai vì vi phạm đạo đức và cạnh tranh không lành mạnh", "D": "Chỉ sai khi bạn không báo lại kết quả"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Quy tắc 9  trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024: không được Sử dụng thông tin có được của nhà Môi giới khác (trên mạng hoặc trên phương tiện thông tin đại chúng,...) để Môi giới cho khách hàng của mình mà không thông qua nhà Môi giới là chủ sở hữu thông tin"}, {"level": "1", "content": "Một khách mua muốn bạn nâng giá BĐS lên 200 triệu để họ vay được nhiều hơn từ ngân hàng. Bạn nên làm gì?", "options": {"A": "Chấp nhận vì không thiệt hại cho ai", "B": "Làm theo để được hoa hồng", "C": "Từ chối vì hành vi gian lận và vi phạm pháp luật", "D": "Đề nghị nâng thêm nhiều hơn"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Quy tắc 9  trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024: không được Gian lận, lừa dối khi thực hiện công việc Môi giới"}, {"level": "1", "content": "Bạn đang môi giới cho người bán. Một khách khác là bạn thân đề nghị bạn “giữ kín thông tin có bất lợi” để dễ chốt. Bạn phải làm gì?", "options": {"A": "Đồng ý vì tạo lợi thế cho người mua", "B": "Từ chối và cung cấp đầy đủ thông tin theo đúng quy tắc nghề nghiệp", "C": "Chỉ nói một phần", "D": "Tùy xem giá trị giao dịch lớn hay nhỏ"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quy tắc 10  trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024: Nhà Môi giới không được thỏa hiệp để che giấu, làm sai lệch hoặc thổi phồng thông tin đối với BĐS niêm yết, chào bán; Nhà Môi giới cần cung cấp thông tin cập nhật và tư vấn chính xác cho khách hàng về thị trường, bao gồm giá cả, xu hướng và các yếu tố ảnh hưởng đến giá trị BĐS"}, {"level": "1", "content": "Bạn phát hiện người bán muốn cố tình giấu việc căn nhà đang trong diện tranh chấp. Bạn nên làm gì?", "options": {"A": "Tiếp tục môi giới vì tranh chấp có thể giải quyết sau", "B": "Giấu thông tin để giao dịch nhanh", "C": "Yêu cầu người bán giải quyết tranh chấp trước, hoặc từ chối nhận sản phẩm", "D": "Đưa ra mức giá rẻ hơn để dễ bán"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Quy tắc 11  trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024: Nhà Môi giới không được hợp tác với bất kỳ bên nào để nhằm thu lợi cá nhân, gây thiệt hại cho bên mua"}, {"level": "1", "content": "Điều kiện để xuất hiện hoạt động môi giới bất động sản", "options": {"A": "Xuất hiện quan hệ giữa các bên (bên cung và bên cầu về bất động sản hoặc chung cư).", "B": "Các bên không thể giải quyết được công việc của mình hay giải quyết không hiệu quả.", "C": "Tồn tại người thứ ba là nhà môi giới bất động sản có đủ năng lực, điều kiện để giải quyết", "D": "Cả ba ý trên đều đúng."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Hoạt động môi giới bất động sản ra đời khi hội tụ đủ ba điều kiện cốt lõi, tương ứng với ba phương án trên. (A): Điều kiện tiên quyết là phải tồn tại một thị trường, tức là có bên cung (người muốn bán/cho thuê) và bên cầu (người muốn mua/thuê) bất động sản. Nếu không có nhu cầu giao dịch, hoạt động môi giới sẽ không có lý do để tồn tại.Phải có \"vấn đề\" trong thị trường (B): Hoạt động môi giới chỉ thực sự cần thiết khi các bên trong thị trường gặp khó khăn hoặc không thể tự mình thực hiện giao dịch một cách hiệu quả. Những \"vấn đề\" này bao gồm:Thông tin không hoàn hảo: Người mua và người bán khó tìm thấy nhau.Thiếu kiến thức chuyên môn: Các bên không am hiểu về giá cả, pháp lý, quy trình giao dịch phức tạp.Tốn kém thời gian và chi phí: Việc tự thực hiện giao dịch có thể mất nhiều công sức và không hiệu quả.Phải có \"người giải quyết vấn đề\" (C): Khi đã có thị trường và các vấn đề trong đó, cần phải có một bên thứ ba – nhà môi giới. Người này phải có đủ năng lực, kiến thức chuyên môn, kỹ năng và điều kiện pháp lý để đứng ra giải quyết các vấn đề trên, kết nối cung và cầu, và giúp giao dịch diễn ra suôn sẻ, hiệu quả."}, {"level": "1", "content": "Phát biểu nào sau đây không đúng khi nói về tố chất cần có của một nhà môi giới bất động sản?", "options": {"A": "Nhà môi giới cần có khả năng giao tiếp tốt, tạo dựng niềm tin với khách hàng.", "B": "Nhà môi giới cần hiểu biết pháp luật, thị trường và sản phẩm bất động sản.", "C": "Nhà môi giới cần trung thực, khách quan, đặt lợi ích khách hàng lên hàng đầu.", "D": "Nhà môi giới cần thường xuyên che giấu thông tin để đạt được thỏa thuận nhanh chóng."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Nhà môi giới cần thường xuyên che giấu thông tin mô tả một hành vi phi đạo đức và bất hợp pháp. Việc che giấu thông tin không chỉ phá vỡ niềm tin của khách hàng mà còn có thể dẫn đến những hậu quả pháp lý nghiêm trọng, gây tổn hại cho cả khách hàng và chính nhà môi giới. Quy tắc 9 trong bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024 có quy định nhà môi giới không được KHÔNG công khai hoặc công khai không đầy đủ, trung thực thông tin về BĐS."}, {"level": "1", "content": "Đạo đức nghề nghiệp của Nhà môi giới Bất động sản?", "options": {"A": "Tuân thủ pháp luật.", "B": "Cung cấp thông tin trung thực về Bất động sản.", "C": "Đặt lợi ích của khách hàng lên trên hết.", "D": "Cả A, B, C đều đúng."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Đây là 3 trụ cột cơ bản của đạo đức nghề nghiệp: Tuân thủ pháp luật (A): Là yêu cầu bắt buộc, nền tảng của mọi hoạt động. Trung thực (B): Đảm bảo tính minh bạch, xây dựng niềm tin. Đặt lợi ích khách hàng lên trên hết (C): Thể hiện tinh thần phục vụ và tính chuyên nghiệp, là cốt lõi của mối quan hệ ủy thác (fiduciary duty)."}, {"level": "1", "content": "Nhà Môi giới Bất động sản được nhận thù lao?", "options": {"A": "Từ một bên trong hợp đồng.", "B": "Từ hai bên trở lên.", "C": "Không phụ thuộc vào việc giao dịch có thực hiện thành công hay không", "D": "Cả A, B,C đều đúng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Theo quy tắc 6 trong bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024 nhà môi giới là người đại diện và bảo vệ lợi ích cho một bên (bên bán hoặc bên mua) và được nhận thù lao từ bên đó mà có thể không cần phải giao dịch thành công. (Việc nhận thù lao từ cả hai bên sẽ dẫn đến xung đột lợi ích). Thù lao được quy định trong hợp đồng dịch vụ ký với khách hàng."}, {"level": "1", "content": "Đạo đức nghề nghiệp nào mà Nhà môi giới không được phép làm?", "options": {"A": "Nhận các khoản thù lao ngoài hợp đồng.", "B": "Giới thiệu về mình và đơn vị mình làm việc.", "C": "Làm việc với tinh thần tận tâm với khách hàng.", "D": "Lắng nghe ý kiến thắc mắc của khách hàng"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Theo quy tắc 6 trong bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024 Nhà Môi giới tuyệt đối không được đòi hỏi, yêu cầu bổ sung về bất cứ khoản thù lao hay ưu đãi về lợi ích nào khác ngoài các khoản đã được thỏa thuận với khách hàng trong hợp đồng"}, {"level": "1", "content": "Vì sao hai bên cung - cầu bất động sản cần có môi giới:", "options": {"A": "Vì hoạt động môi giới sẽ làm lành mạnh hóa, minh bạch hoạt động và giúp thị trường", "B": "Vì hoạt động môi giới sẽ tìm ra hướng giải quyết tối ưu cho khách hàng.", "C": "Vì bất động sản có quyền năng phức tạp và thị tường bất động sản là thị trường không", "D": "Vì môi giới là một trong ba pháp nhân tham gia vào thị trường bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Lý do sâu xa nhất cho sự tồn tại của nghề môi giới chính là đặc tính của thị trường BĐS. Đây là một thị trường không hoàn hảo, đặc trưng bởi thông tin bất cân xứng (bên bán biết nhiều hơn bên mua), tính không đồng nhất của sản phẩm, và tính pháp lý phức tạp. Người môi giới xuất hiện để khắc phục những khiếm khuyết này. Các lựa chọn A, B là kết quả, hệ quả của hoạt động môi giới, không phải là nguyên nhân gốc rễ. * Căn cứ học thuật: Lý thuyết về thị trường không hoàn hảo (Imperfect Market) và thông tin bất cân xứng (Asymmetric Information)."}, {"level": "1", "content": "Một nhà môi giới bất động sản có quyền hành nghề xây dựng không?", "options": {"A": "Nếu nhà môi giới này có chứng chỉ hành nghề xây dựng phù hợp theo luật quy định của Luật Xây dựng.", "B": "Nếu anh ta thích làm và có đủ điều kiện và kinh nghiệm cho phép, anh ta có thể làm được.", "C": "Không. Hai lĩnh vực này hoàn toàn khác nhau.", "D": "Có. Muốn môi giới được thì nhà môi giới phải am hiểu nhiều khía cạnh của lĩnh vực xây dựng, do đó anh ta thừa khả năng làm điều này."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Môi giới BĐS và hành nghề xây dựng là hai lĩnh vực khác nhau, được điều chỉnh bởi các luật khác nhau (Luật Kinh doanh BĐS và Luật Xây dựng) và yêu cầu các chứng chỉ hành nghề riêng biệt. Một người có thể hành nghề cả hai nếu đáp ứng đủ điều kiện của cả hai lĩnh vực."}, {"level": "1", "content": "Nội dung môi giới bất động sản bao gồm?", "options": {"A": "Tìm kiếm đối tác đáp ứng các điều kiện của khách hàng để tham gia đàm phán, ký kết hợp đồng.", "B": "Đại diện theo ủy quyền để thực hiện các công việc liên quan đến các thủ tục mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản.", "C": "Cung cấp thông tin, hỗ trợ cho các bên trong việc đàm phán, ký kết hợp đồng mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản.", "D": "Tất cả các mục trên."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> điều 62 Luật Kinh doanh bất động sản 2023"}, {"level": "1", "content": "Thù lao môi giới bất động sản được xác định như thế nào?", "options": {"A": "Do pháp luật quy định một mức cố định theo tỷ lệ phần trăm giá trị giao dịch.", "B": "Do các bên thỏa thuận trong hợp đồng dịch vụ môi giới bất động sản.", "C": "Do Hiệp hội Bất động sản quy định mức sàn thù lao.", "D": "Luôn được tính bằng 2% giá trị hợp đồng chuyển nhượng bất động sản."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 63, Luật Kinh doanh bất động sản 2023 quy định: \"Thù lao môi giới bất động sản do các bên thỏa thuận.\""}, {"level": "1", "content": "Khi thực hiện môi giới, nhà môi giới có được phép cùng lúc làm trung gian cho cả hai bên (bên bán và bên mua) trong cùng một giao dịch không?", "options": {"A": "Không được phép vì có thể dẫn đến xung đột lợi ích.", "B": "Tùy thuộc vào loại hình bất động sản và giá trị giao dịch.", "C": "Luôn được phép nếu có hợp đồng môi giới với cả hai bên.", "D": "Được phép nếu đã thông báo và được sự đồng ý của cả hai bên."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> (Quy tắc 9 trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024 có quy định Nhận làm đại diện cho cả 2 bên (bán và mua, thuê và cho thuê) là hành vi không được làm của nhà môi giới BĐS)"}, {"level": "1", "content": "Điều kiện kinh doanh dịch vụ môi giới bất động sản của tổ chức tại Việt Nam là gì?", "options": {"A": "Phải có vốn pháp định tối thiểu 20 tỷ đồng.", "B": "Phải đăng ký kinh doanh tại địa phương và có 01 người có chứng chỉ môi giới.", "C": "Phải thành lập doanh nghiệp, có tối thiểu 01 người có chứng chỉ môi giới bất động sản.", "D": "Phải đăng ký thành lập Hợp tác xã và có giấy phép của Bộ Xây dựng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 61, Luật Kinh doanh bất động sản 2023 quy định: Tổ chức kinh doanh dịch vụ môi giới phải thành lập doanh nghiệp, và phải có ít nhất 01 người có chứng chỉ hành nghề môi giới."}, {"level": "1", "content": "Yêu cầu đối với cá nhân hành nghề môi giới bất động sản:", "options": {"A": "Trình độ văn hóa tối thiểu từ tốt nghiệp PTTH trở lên.", "B": "Phải có chứng nhận đã hoàn thành khoá học về môi giới BĐS do tổ chức đào tạo theo chương trình khung của Bộ Xây dựng ban hành.", "C": "Có chứng chỉ môi giới bất động sản do cơ quan có thẩm quyền công nhận  và cấp.", "D": "Tất cả các yêu cầu trên"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 điều 61 Luật Kinh doanh bất động sản 2023, Điều 25 Nghị định số 96/2024/NĐ-CP ngày 24/7/2024 của Chính phủ."}, {"level": "1", "content": "Cá nhân kinh doanh BĐS quy mô nhỏ theo Luật KDBĐS 2023 có bắt buộc phải thành lập doanh nghiệp không?", "options": {"A": "Có, mọi hoạt động kinh doanh BĐS đều phải lập doanh nghiệp", "B": "Không, nhưng phải kê khai nộp thuế theo quy định", "C": "Chỉ cần đăng ký hộ kinh doanh cá thể", "D": "Được miễn nếu giao dịch dưới 100 triệu đồng"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 điều 9 Luật Kinh doanh bất động sản 2023"}, {"level": "1", "content": "Nguyên tắc đạo đức \"Trung thành\" của nhà môi giới bất động sản đối với khách hàng bị vi phạm trong trường hợp nào sau đây?", "options": {"A": "Môi giới tư vấn cho người bán nên sửa chữa lại nhà trước khi bán để được giá tốt hơn.", "B": "Môi giới đại diện người mua nhưng lại cố tình giới thiệu bất động sản giá cao hơn thị trường để nhận hoa hồng cao hơn từ người bán (nếu có thỏa thuận ngầm).", "C": "Môi giới từ chối tiết lộ thông tin tài chính cá nhân của người bán cho người mua.", "D": "Môi giới nỗ lực đàm phán để đạt được các điều khoản có lợi nhất cho khách hàng của mình."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Vi phạm quy tắc 11 về khách hàng bên mua trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024: Nhà Môi giới không được lợi dụng sự thiếu hiểu biết của bên mua để nâng giá tài sản; Nhà Môi giới không được hợp tác với bất kỳ bên nào để nhằm thu lợi cá nhân, gây thiệt hại cho bên mua)"}, {"level": "1", "content": "Việc pháp luật yêu cầu nhà môi giới bất động sản phải có Chứng chỉ hành nghề nhằm mục đích chính là gì?", "options": {"A": "Tăng nguồn thu từ lệ phí thi và cấp chứng chỉ.", "B": "Hạn chế số lượng người tham gia vào nghề môi giới bất động sản.", "C": "Đảm bảo nhà môi giới bất động sản có kiến thức chuyên môn, pháp luật và đạo đức cơ bản, góp phần nâng cao chất lượng dịch vụ và bảo vệ người tiêu dùng.", "D": "Giúp các trường đại học có thêm chương trình đào tạo."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Yêu cầu chứng chỉ là biện pháp quản lý nhà nước nhằm chuẩn hóa chất lượng đầu vào của nghề, đảm bảo người hành nghề có hiểu biết tối thiểu cần thiết."}, {"level": "1", "content": "Một cá nhân có Chứng chỉ hành nghề môi giới bất động sản nhưng không làm việc cho công ty nào, tự đứng ra nhận tiền của khách để tìm nhà giúp họ từ ngày 01/08/2024. Hành vi này có phù hợp với quy định mới không?<br>Hoàn toàn phù hợp vì đã có chứng chỉ.<br>Không phù hợp, cá nhân phải hành nghề thông qua một tổ chức kinh doanh dịch vụ bất động sản.<br>Chỉ phù hợp nếu giao dịch giá trị thấp.<br>Chỉ phù hợp nếu khách hàng đồng ý.", "options": {}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 61 Luật KDBĐS 2023 nêu rõ việc cá nhân không được hành nghề độc lập sau mốc thời gian quy định 1/8/2024, phải thuộc một tổ chức."}, {"level": "1", "content": "Điều kiện về \"cơ sở vật chất, kỹ thuật\" đối với doanh nghiệp kinh doanh dịch vụ môi giới bất động sản nhằm đảm bảo điều gì?", "options": {"A": "Văn phòng phải thật sang trọng, hoành tráng.", "B": "Doanh nghiệp có địa điểm hoạt động rõ ràng, có đủ trang thiết bị tối thiểu để phục vụ hoạt động nghiệp vụ và lưu trữ hồ sơ theo quy định.", "C": "Doanh nghiệp phải có website riêng.", "D": "Doanh nghiệp phải có ít nhất 10 máy tính."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Yêu cầu này nhằm đảm bảo doanh nghiệp có điều kiện hoạt động ổn định, chuyên nghiệp, có nơi giao dịch và lưu trữ hồ sơ rõ ràng, không phải là các yêu cầu quá cao về sự sang trọng hay công nghệ cụ thể. (Điều 18 Nghị định 96/2024/NĐ-CP)"}, {"level": "1", "content": "Tình huống: Công ty môi giới bất động sản M chỉ có một người duy nhất sở hữu Chứng chỉ hành nghề môi giới bất động sản. Nếu người này nghỉ việc, công ty M có còn đủ điều kiện kinh doanh dịch vụ môi giới bất động sản theo Luật kinh doanh bất động sản 2023 không?", "options": {"A": "Vẫn đủ điều kiện bình thường.", "B": "Không còn đủ điều kiện và phải bổ sung người có chứng chỉ khác hoặc tạm dừng hoạt động.", "C": "Chỉ cần giám đốc công ty có chứng chỉ là đủ.", "D": "Vẫn đủ điều kiện nếu công ty có doanh thu cao."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 61 Luật kinh doanh bất động sản 2023 nêu rõ điều kiện tổ chức kinh doanh phải có \"tối thiểu 01 cá nhân có chứng chỉ môi giới bất động sản\". Nếu người duy nhất có chứng chỉ nghỉ việc, công ty không còn đáp ứng điều kiện này."}, {"level": "1", "content": "Việc nhà môi giới bất động sản từ chối tham gia vào một giao dịch có dấu hiệu rửa tiền, mặc dù có thể mang lại hoa hồng rất lớn, thể hiện việc tuân thủ nguyên tắc nào?", "options": {"A": "Nguyên tắc lấy lợi ích khách hàng làm định hướng.", "B": "Nguyên tắc tuân thủ pháp luật và đạo đức nghề nghiệp.", "C": "Nguyên tắc công khai, minh bạch.", "D": "Nguyên tắc hoạt động dựa trên chuyên môn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Tham gia hoặc tiếp tay cho hoạt động rửa tiền là vi phạm pháp luật nghiêm trọng. Từ chối giao dịch này thể hiện sự tuân thủ pháp luật và giữ gìn đạo đức nghề nghiệp."}, {"level": "1", "content": "Tình huống: Nhà môi giới bất động sản A được người bán ủy thác bán nhà. Sau đó, chính môi giới A lại muốn mua căn nhà đó. Để đảm bảo đạo đức và tránh xung đột lợi ích, môi giới A cần làm gì?", "options": {"A": "Tự mình mua với giá thấp hơn thị trường vì đang là người môi giới.", "B": "Thông báo rõ ràng ý định muốn mua của mình cho người bán, từ bỏ vai trò môi giới đại diện cho người bán trong giao dịch này và tiến hành mua bán một cách công bằng như một người mua thông thường (có thể cần bên thứ ba hỗ trợ).", "C": "Nhờ người nhà đứng tên mua hộ để che giấu.", "D": "Vừa đóng vai trò môi giới vừa là người mua để tự thương lượng giá."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là tình huống xung đột lợi ích điển hình. Để đảm bảo đạo đức, môi giới phải công khai ý định, từ bỏ vai trò đại diện và hành động như một bên mua độc lập, minh bạch."}, {"level": "1", "content": "Yếu tố nào sau đây KHÔNG ảnh hưởng trực tiếp đến mức phí hoa hồng/(mức thù lao) môi giới bất động sản?", "options": {"A": "Không phụ thuộc vào giá của giao dịch được môi giới bất động sản.", "B": "Tỷ lệ hoa hồng thỏa thuận trong hợp đồng dịch vụ.", "C": "Tình trạng pháp lý của nhà môi giới bất động sản (có chứng chỉ hay không).", "D": "Mức độ phức tạp của giao dịch và công sức của nhà môi giới bất động sản."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 63 Luật KDBĐS 2023 quy định Mức thù lao môi giới bất động sản không phụ thuộc vào giá của giao dịch được môi giới bất động sản."}, {"level": "1", "content": "Việc một nhà môi giới bất động sản chủ động tư vấn cho khách hàng về các rủi ro tiềm ẩn của một bất động sản (thay vì chỉ nói về ưu điểm) thể hiện điều gì?", "options": {"A": "Sự thiếu tự tin vào khả năng bán hàng.", "B": "Tính chuyên nghiệp, trung thực và đặt lợi ích lâu dài của khách hàng lên trên việc chốt giao dịch bằng mọi giá.", "C": "Sự thiếu hiểu biết về marketing.", "D": "Mong muốn làm nản lòng khách hàng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Tư vấn cân bằng cả ưu điểm và rủi ro giúp khách hàng đưa ra quyết định sáng suốt, xây dựng lòng tin và uy tín lâu dài cho nhà môi giới bất động sản, thể hiện đúng vai trò tư vấn. Tuân thủ quy tắc 7 trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024: Nhà Môi giới không được phóng đại, trình bày sai sự thật hoặc che giấu thông tin liên quan có yếu tố bất lợi đến BĐS hoặc giao dịch"}, {"level": "1", "content": "Tình huống : Chủ đầu tư dự án Y đưa ra mức hoa hồng rất cao..., đồng thời \"gợi ý\" các môi giới nên bỏ qua một vài thông tin chưa thuận lợi về pháp lý... Nhà môi giới nên ứng xử thế nào cho đúng đạo đức?", "options": {"A": "Nhận lời ngay và làm theo gợi ý để đạt hoa hồng cao.", "B": "Từ chối bán sản phẩm của dự án này.", "C": "Vẫn tham gia bán hàng nhưng phải cung cấp thông tin một cách trung thực, đầy đủ về cả ưu điểm và các vấn đề pháp lý chưa thuận lợi cho khách hàng biết, đặt lợi ích và sự an toàn của khách hàng lên trên hoa hồng.", "D": "Chỉ tư vấn cho những khách hàng dễ tính, ít hỏi về pháp lý."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đạo đức nghề nghiệp đòi hỏi nhà môi giới phải trung thực và đặt lợi ích khách hàng lên hàng đầu. Lựa chọn C thể hiện sự cân bằng giữa cơ hội kinh doanh và trách nhiệm đạo đức, đảm bảo khách hàng được cung cấp đầy đủ thông tin để ra quyết định, ngay cả khi thông tin đó bất lợi. (tuân thủ quy tắc 11 trong Bộ quy tắc đạo đức và ứng xử nghề môi giới bất động sản Việt Nam VPEC – 2024: Nhà Môi giới phải cung cấp thông tin chính xác và đầy đủ về tài sản, bao gồm tình trạng pháp lý, giá cả, và các yếu tố khác liên quan đến quyết định mua. Nhà Môi giới không được thổi phồng hoặc gây hiểu nhầm về BĐS)"}, {"level": "1", "content": "Điều kiện về cơ sở vật chất, kỹ thuật đối với doanh nghiệp kinh doanh dịch vụ môi giới bất động sản", "options": {"A": "Tên doanh nghiệp phải có chứa cụm từ \"Môi giới bất động sản\".", "B": "Phải có hệ thống máy tính kết nối mạng toàn cầu.", "C": "Có địa chỉ giao dịch và trụ sở hoạt động ổn định trên 12 tháng.", "D": "Tất cả các trường hợp trên đều sai."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 18. Nghị định 96/2024/NĐ-CP"}, {"level": "1", "content": "Doanh nghiệp kinh doanh dịch vụ sàn giao dịch BĐS đang lựa chọn tên để đăng ký hoạt động. Vậy Doanh nghiệp này cần phải tuân thủ quy định như thế nào về cách đặt tên?", "options": {"A": "Tên phải bằng tiếng Anh để thu hút khách hàng nước ngoài.", "B": "Tên phải có cụm từ “sàn giao dịch bất động sản” và không được trùng hoặc gây nhầm lẫn với tên sàn khác đã đăng ký.", "C": "Tên phải bao gồm họ tên của người đại diện theo pháp luật.", "D": "Tên không được dài quá 10 từ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 54 Luật Kinh doanh BĐS 2023"}, {"level": "1", "content": "Quy trình tư vấn cho khách hàng về dự án bất động sản bao gồm?", "options": {"A": "Giới thiệu quy hoạch 1/500; thông báo giá, ký hợp đồng dịch vụ môi giới.", "B": "Giới thiệu hồ sơ dự án, đưa ra mức giá bán, ký hợp đồng dịch vụ môi giới.", "C": "Giới thiệu đầy đủ hồ sơ pháp lý của dự án, tư vấn cho khách hàng chi tiết đầy đủ. Các thông tin và dịch vụ kèm theo sản phẩm chào bán, giới thiệu chính xác các mức giá, các ưu đãi của dự án, hỗ trợ tài chính, ngân hàng (nếu có). Giải thích các điều khoản hợp đồng mua bán mẫu của dự án và đưa khách hàng xem mô hình dự án, căn hộ mẫu (nếu có).", "D": "Cả A, B và C đều đúng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> đáp án C mô tả một cách đầy đủ, chi tiết và chuyên nghiệp nhất quy trình tư vấn cho khách hàng, thể hiện đúng trách nhiệm và đạo đức của nhà môi giới là cung cấp thông tin minh bạch, chính xác và hỗ trợ khách hàng toàn diện."}, {"level": "1", "content": "Tiêu chí nào sau đây thuộc lập trường đàm phán theo kiểu nguyên tắc?", "options": {"A": "Đánh lạc hướng về giới hạn cuối cùng.", "B": "Lùi bước trước nguyên tắc chứ không lùi bước trước áp lực.", "C": "Đi tìm một câu trả lời mà đối tác chấp nhận.", "D": "Gây áp lực dựa trên nguyên tắc."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đàm phán theo nguyên tắc (Principled Negotiation) tập trung vào việc tìm kiếm lợi ích chung dựa trên các tiêu chuẩn khách quan, công bằng. Lùi bước trước nguyên tắc (ví dụ: nguyên tắc pháp lý, nguyên tắc thị trường) chứ không chịu khuất phục trước áp lực cá nhân."}, {"level": "1", "content": "Trong tình hình thị trường bất động sản bị đóng băng, khi một người dự định bán bất động sản của mình, anh ta nên quảng cáo ở đâu thì có lợi và tốn ít chi phí nhất?", "options": {"A": "Sử dụng tổng hợp các phương tiện.", "B": "Thông qua sàn giao dịch bất động sản hoặc các công ty môi giới.", "C": "Thông qua phương tiện truyền thông đại chúng.", "D": "Tự treo bảng trước nhà hoặc những nơi dễ nhìn thấy."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Khi thị trường đóng băng, giao dịch rất ít, việc chi nhiều tiền cho quảng cáo qua các kênh chuyên nghiệp có thể không hiệu quả. Tự treo biển là phương pháp trực tiếp, chi phí gần như bằng không, phù hợp với việc chờ đợi một người mua thực sự có nhu cầu trong khu vực."}, {"level": "1", "content": "Trong môi giới BĐS, vấn đề văn hóa phải được các môi giới viên chú trọng tìm hiểu và nắm rõ. Ví dụ, việc sai hẹn có khi chỉ vài phút cũng có thể làm đối tác (đặc biệt là người Mỹ) khó chịu; Người phương Tây thường đi ngay vào mục đích làm việc và có xu hướng nhanh chóng ra quyết định, trong khi người phương Đông thường không đi thẳng vào vấn đề, giải quyết công việc theo cách thoải mái hơn, và thường tránh nói không. Ví dụ này thuộc khí cạnh nào trong văn hóa?", "options": {"A": "Yếu tố vật chất (Material elements).", "B": "Cách cư xử và phong tục (Manner and customs).", "C": "Giá trị và thái độ (Values and Attitudes).", "D": "Giáo dục (Education)."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc đúng giờ, cách tiếp cận vấn đề (trực tiếp hay gián tiếp) là những biểu hiện của cách cư xử và phong tục tập quán trong kinh doanh, giao tiếp ở các nền văn hóa khác nhau."}, {"level": "1", "content": "Kỹ năng nào sau đây là cần thiết cho người môi giới hoặc người đại diện cho người mua nhà?", "options": {"A": "Tư vấn và đàm phán.", "B": "Quản lý thời gian và kỹ năng vi tính.", "C": "Căn bản vững chắc về khía cạnh tài chính.", "D": "Kỹ năng quản trị tệp khách hàng."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Kỹ năng cốt lõi và quan trọng nhất của nhà môi giới là tư vấn để khách hàng hiểu rõ sản phẩm và thị trường, và đàm phán để mang lại lợi ích tốt nhất cho khách hàng trong giao dịch. Các kỹ năng khác là bổ trợ."}, {"level": "1", "content": "Để tránh sự phản ứng, chống đối của khách hàng khi người môi giới tiếp xúc với khách hàng, với tư cách hành nghề môi giới chuyên nghiệp, mục tiêu cần ưu tiên số 1 mà người môi giới bất động sản cần thể hiện rõ để khách hàng nhận biết được lý do khiến họ quyết định trở thành người môi giới bất động sản là:", "options": {"A": "Vì hoa hồng môi giới", "B": "Vì khẳng định bản thân.", "C": "Vì thích nghề môi giới bất động sản.", "D": "Vì lợi ích của khách hàng và của mình."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Một nhà môi giới chuyên nghiệp và có đạo đức phải luôn đặt lợi ích của khách hàng lên hàng đầu, đồng thời đảm bảo lợi ích chính đáng của mình (hoa hồng). Đây là nguyên tắc \"win-win\", tạo dựng uy tín và sự bền vững trong nghề."}, {"level": "1", "content": "Để lập hồ sơ thương vụ môi giới BĐS, bên cung cần cung cấp", "options": {"A": "Thông tin chủ sở hữu, các loại giấy tờ, hồ sơ pháp lý của BĐS", "B": "Các giấy tờ liên quan đến thương vụ như giấy đặt cọc, phiếu thu chi …", "C": "Hợp đồng dịch vụ môi giới", "D": "Cả 3 câu trên đều đúng"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Một hồ sơ hoàn chỉnh bao gồm: (1) Hồ sơ pháp lý của Bất động sản và Chủ sở hữu (Đáp án A): Đây là yếu tố cốt lõi, là nền tảng của mọi giao dịch. Nó chứng minh tính hợp pháp của bất động sản và tư cách pháp lý của người bán. Các giấy tờ này bao gồm: 1. Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất (sổ hồng/sổ đỏ). 2. Căn cước công dân/CMND của chủ sở hữu. 3. Giấy xác nhận tình trạng hôn nhân. 4. Các giấy tờ khác liên quan (bản vẽ, giấy phép xây dựng...). (2) Hợp đồng dịch vụ môi giới (Đáp án C): Đây là văn bản pháp lý đầu tiên, xác lập mối quan hệ và các điều khoản thỏa thuận (phí môi giới, thời gian, trách nhiệm...) giữa bên cung cấp dịch vụ (nhà môi giới) và bên sử dụng dịch vụ (chủ nhà). (3) Các chứng từ liên quan đến thương vụ (Đáp án B): Đây là những giấy tờ phát sinh trong quá trình diễn ra giao dịch, ghi lại các dấu mốc quan trọng và chứng minh việc thực hiện nghĩa vụ của các bên. Ví dụ: 1. Hợp đồng đặt cọc. 2. Các phiếu thu, ủy nhiệm chi chứng minh việc thanh toán. 3. Hợp đồng mua bán/chuyển nhượng được công chứng."}, {"level": "1", "content": "Rủi ro nào thường gặp nhất đối với hợp đồng đặt cọc mua BĐS, kể cả khi có công chứng?", "options": {"A": "Công chứng viên thu phí đặt cọc quá cao.", "B": "Bên bán không giao BĐS đúng hạn.", "C": "Đặt cọc trá hình huy động vốn cho dự án chưa đủ điều kiện hoặc đặt cọc qua môi giới không ràng buộc được chủ đầu tư.", "D": "Hợp đồng đặt cọc quá dài."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đáp án C là rủi ro mang tính hệ thống và gây thiệt hại lớn nhất cho người mua. Nhiều đơn vị lợi dụng hình thức \"thỏa thuận đặt cọc\", \"hợp đồng góp vốn\" để huy động vốn trái phép khi dự án chưa đủ điều kiện pháp lý để mở bán. Khi dự án gặp vấn đề, người mua có nguy cơ mất trắng số tiền đã đóng. Các rủi ro khác thường nhỏ hơn hoặc có thể xử lý được."}, {"level": "1", "content": "Những đặc điểm có thể liệt kê trong “kỹ thuật cộng” khi đàm phán về giá cả BĐS", "options": {"A": "Thành phần cấu tạo, đặc tính sử dụng, vị trí địa lý BĐS", "B": "Thông tin quy hoạch, cơ sở hạ tầng, đặc điểm dân cư", "C": "Thời gian giao BĐS, thời hạn bảo hành", "D": "Câu A và C"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> \"Kỹ thuật cộng\" là một chiến lược đàm phán mà trong đó, thay vì chỉ đưa ra một mức giá tổng duy nhất, người bán sẽ chia nhỏ và liệt kê từng đặc điểm, lợi ích của bất động sản để chứng minh và xây dựng giá trị cho mức giá đưa ra. Mục tiêu là làm cho người mua cảm thấy họ đang nhận được rất nhiều giá trị tương xứng với số tiền họ bỏ ra."}, {"level": "1", "content": "Tâm lý chung của khách hàng mua căn hộ lần đầu tiên là", "options": {"A": "Sợ rằng rủi ro tài chính sẽ rất lớn", "B": "Tìm hiểu thông tin liên quan rất kỹ", "C": "Cả A và B đều đúng", "D": "Cả A và B đều sai"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khách mua lần đầu thường (1) Sợ rằng rủi ro tài chính sẽ rất lớn (đáp án A): Mua căn hộ là một trong những quyết định tài chính lớn nhất trong đời của một người. Người mua lần đầu thường phải đối mặt với áp lực từ khoản vay lớn, chi phí ban đầu, và những rủi ro tiềm ẩn về pháp lý, chất lượng công trình, hoặc biến động thị trường. Nỗi sợ này là một yếu tố tâm lý cốt lõi. (2) Tìm hiểu thông tin liên quan rất kỹ (đáp án B): Chính vì nỗi sợ rủi ro tài chính, người mua lần đầu có xu hướng hành động rất cẩn trọng. Họ sẽ dành nhiều thời gian và công sức để tìm hiểu kỹ lưỡng về dự án, chủ đầu tư, tính pháp lý, các điều khoản trong hợp đồng, chính sách vay ngân hàng, và so sánh nhiều lựa chọn khác nhau trước khi đưa ra quyết định cuối cùng."}, {"level": "1", "content": "Nhà môi giới cần phải quan tâm đến kỹ năng nào sau đây:", "options": {"A": "Kỹ năng giao tiếp", "B": "Kỹ năng thu thập thông tin", "C": "Kỹ năng đàm phán", "D": "Tất cả kỹ năng trên"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Tất cả các kỹ năng được liệt kê đều là những yếu tố cốt lõi và không thể thiếu để tạo nên một nhà môi giới bất động sản chuyên nghiệp và thành công. A. Kỹ năng giao tiếp: Đây là kỹ năng nền tảng, giúp nhà môi giới xây dựng mối quan hệ, lắng nghe và thấu hiểu nhu cầu của khách hàng, trình bày thông tin về sản phẩm một cách thuyết phục và duy trì liên lạc hiệu quả. B. Kỹ năng thu thập thông tin: Một nhà môi giới giỏi phải biết cách thu thập và phân tích thông tin đa chiều về thị trường, pháp lý, quy hoạch, và thông tin chi tiết về bất động sản. Thông tin chính xác là cơ sở cho việc tư vấn đúng đắn. C. Kỹ năng đàm phán: Đây là kỹ năng then chốt giúp mang lại lợi ích tốt nhất cho khách hàng, từ việc đàm phán về giá cả cho đến các điều khoản trong hợp đồng. Khả năng đàm phán quyết định trực tiếp đến sự thành công của một giao dịch."}, {"level": "1", "content": "Sử dụng kỹ năng trình bày FAB (Features, Advantages, Benefits) trong trường hợp nào?", "options": {"A": "Thắc mắc về giá cả", "B": "Thắc mắc về chất lượng", "C": "Thắc mắc về pháp lý", "D": "Tất cả các trường hợp trên"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Kỹ năng trình bày FAB (Features - Advantages - Benefits) là một công cụ giao tiếp và bán hàng vô cùng linh hoạt, được sử dụng để chuyển hóa các đặc tính của sản phẩm thành lợi ích thiết thực cho khách hàng. Do đó, nó có thể được áp dụng hiệu quả để giải quyết tất cả các loại thắc mắc. Features (Đặc điểm): Sản phẩm/dịch vụ có gì? Đây là những thông tin mang tính kỹ thuật, thực tế (ví dụ: \"Căn hộ có ban công hướng Đông Nam\").Advantages (Ưu điểm): Đặc điểm đó làm được gì? Đây là công năng của đặc điểm (ví dụ: \"Ban công hướng Đông Nam giúp nhà đón nắng sáng và gió mát tự nhiên\").Benefits (Lợi ích): Điều đó mang lại giá trị gì cho khách hàng? Đây là yếu tố quan trọng nhất, kết nối trực tiếp đến nhu cầu và cảm xúc của người mua (ví dụ: \"Nhờ đó, gia đình mình sẽ có một không gian sống luôn thoáng đãng, trong lành, tốt cho sức khỏe và tiết kiệm được chi phí điện cho điều hòa\"). A. Thắc mắc về giá cả: Khi khách hàng cho rằng giá cao, nhà môi giới có thể dùng FAB để chứng minh giá trị sản phẩm là hoàn toàn xứng đáng. B. Thắc mắc về chất lượng: FAB giúp chuyển những thông số kỹ thuật khô khan về vật liệu thành sự an tâm và giá trị lâu dài. C. Thắc mắc về pháp lý: FAB giúp diễn giải các văn bản pháp lý thành sự bảo đảm và an toàn cho khách hàng."}, {"level": "1", "content": "Một nhà môi giới và khách hàng của anh ta đang đàm phán thỏa thuận mua một bất động sản tại Hà Nội. Họ đã thực hiện xong công tác tiếp xúc, thăm dò đối tác, lập các phương án thỏa thuận mua bán, xác định chiến lược đàm phán với người bán bất động sản này. Họ thậm chí đã đàm phán thử với đối tác nhưng chưa mang lại kết quả. Bước nào họ nên thực hiện tiếp theo?", "options": {"A": "Rút kinh nghiệm và tiến hành các bước tiếp xúc, thăm dò đối tác lại.", "B": "Tiến hành đàm phán hợp nhất: Thảo luận về các mục tiêu chung và các mục tiêu xung", "C": "Đàm phán phân bổ: Trình bày quan điểm yêu cầu của mình và lắng nghe đối tác trình", "D": "Chuẩn bị các hợp đồng đã soạn thảo sẵn để đưa ra đàm phán lại."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trong tình huống này, nhà môi giới và khách hàng đã hoàn thành giai đoạn chuẩn bị và đã thực hiện một nỗ lực đàm phán ban đầu (đàm phán thử) nhưng không thành công, dẫn đến một sự bế tắc hoặc căng thẳng.Bước tiếp theo hợp lý nhất trong một quy trình đàm phán chuyên nghiệp là chuyển từ việc chỉ trình bày yêu cầu (đàm phán phân bổ) sang một phương pháp mang tính hợp tác hơn để tìm ra giải pháp. Đàm phán hợp nhất (Integrative Negotiation) chính là bước đó. Đây là giai đoạn các bên:Tìm kiếm lợi ích chung: Cùng nhau xác định những điểm có thể đồng thuận.Thảo luận về xung đột: Cởi mở nói về những điểm còn vướng mắc.Nhượng bộ có đi có lại: Đưa ra các phương án trao đổi, nhân nhượng để cả hai bên cùng cảm thấy hài lòng và đạt được mục tiêu quan trọng nhất của mình."}, {"level": "1", "content": "Trong hoạt động môi giới bất động sản, nhà môi giới thường phải khắc phục những bất đồng nào sau đây, ngoại trừ:", "options": {"A": "Bất đồng về thông tin giữa các bên.", "B": "Bất đồng về lợi ích giữa người mua và người bán.", "C": "Bất đồng về quan điểm, cảm xúc của các bên tham gia giao dịch.", "D": "Bất đồng về thời tiết trong ngày giao dịch"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Thời tiết là một yếu tố khách quan, nằm ngoài sự kiểm soát và không phải là một \"bất đồng\" giữa các bên mà nhà môi giới có trách nhiệm phải giải quyết"}, {"level": "1", "content": "Người đại diện cho người mua BĐS được thuê để làm gì?", "options": {"A": "Thể hiện ý kiến và mối quan tâm của người mua thông qua các giao dịch.", "B": "Trưng bày và giới thiệu tài sản.", "C": "Đàm phán trên cương vị của người mua.", "D": "Tất cả lựa chọn đều đúng."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Người đại diện cho người mua được thuê để thực hiện một loạt các nhiệm vụ nhằm bảo vệ và thúc đẩy lợi ích tốt nhất cho người mua. Cả ba lựa chọn A, B, và C đều là những phần quan trọng trong vai trò đó. A. Thể hiện ý kiến và mối quan tâm của người mua: Đây là vai trò cốt lõi. Người đại diện là tiếng nói của người mua trong suốt quá trình giao dịch, đảm bảo mọi thắc mắc, yêu cầu và lo ngại của khách hàng được truyền đạt và giải quyết một cách chuyên nghiệp. B. Trưng bày và giới thiệu tài sản: Mặc dù \"trưng bày\" thường là nhiệm vụ của bên bán, trong vai trò của người đại diện bên mua, họ có trách nhiệm tìm kiếm, sàng lọc và giới thiệu những bất động sản phù hợp nhất với tiêu chí của khách hàng. Đây là một bước không thể thiếu trong quá trình tìm nhà. C. Đàm phán trên cương vị của người mua: Đây là một trong những nhiệm vụ có giá trị nhất. Người đại diện sử dụng kiến thức chuyên môn và kỹ năng của mình để đàm phán về giá cả, điều khoản hợp đồng, và các điều kiện khác nhằm mang lại thỏa thuận có lợi nhất cho người mua."}, {"level": "1", "content": "Khi tư vấn và lập phương án tài chính cho quyết định mua bất động sản của khách hàng, bước đầu tiên mà môi giới cần thực hiện là gì?", "options": {"A": "Đánh giá các rủi ro có thể xảy ra và khả năng ứng phó từ góc độ dòng tiền", "B": "Kiểm tra số liệu để xác định mức độ chính xác và đáng tin cậy", "C": "Xem xét quy mô đầu tư so với khả năng huy động vốn của khách hàng", "D": "Đề xuất các phương án, giải pháp thay thế khác nhau"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khi lập một phương án tài chính, quy trình logic và an toàn nhất là đi từ tổng quan đến chi tiết. Bước đầu tiên luôn là xác định tính khả thi cơ bản của kế hoạch. Trước khi đi sâu vào phân tích rủi ro hay đề xuất giải pháp, nhà môi giới phải trả lời được câu hỏi cốt lõi: \"Về cơ bản, khách hàng có đủ khả năng tài chính cho bất động sản này không?\". Việc này bao gồm: - Xác định quy mô đầu tư: Tổng giá trị bất động sản và các chi phí liên quan. - Xác định khả năng huy động vốn: Tổng số vốn tự có của khách hàng cộng với khoản vốn có thể vay từ ngân hàng."}, {"level": "1", "content": "Tình huống: Một khách hàng mua căn nhà trị giá 7,5 tỷ đồng. Ngân hàng đồng ý cho vay tối đa 70% giá trị căn nhà. Hỏi khách hàng phải chuẩn bị số tiền trả trước là bao nhiêu?", "options": {"A": "2,25 tỷ đồng.", "B": "3,50 tỷ đồng.", "C": "5,25 tỷ đồng.", "D": "7,5 tỷ đồng"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Số tiền trả trước (hay vốn tự có) là phần giá trị căn nhà mà khách hàng phải tự chi trả, không bao gồm khoản vay từ ngân hàng. - Bước 1: Tính tỷ lệ trả trước Ngân hàng cho vay tối đa 70%, vậy khách hàng cần trả trước phần còn lại: 100% - 70% (tỷ lệ vay) = 30% - Bước 2: Tính số tiền trả trước: Lấy tổng giá trị căn nhà nhân với tỷ lệ trả trước: 7,5 tỷ đồng x 30% = 2,25 tỷ đồng. Vậy, khách hàng phải chuẩn bị số tiền trả trước là 2,25 tỷ đồng."}, {"level": "1", "content": "Những phương pháp nào sau đây Nhà môi giới sử dụng để thu thập thông tin về cầu Bất động sản?", "options": {"A": "Tìm kiếm qua phương tiện thông tin đại chúng.", "B": "Gọi điện trực tiếp cho khách hàng.", "C": "Gửi mail trực tiếp cho khách hàng.", "D": "Tất cả câu A, B, C là đúng."}, "answer": "D", "explanation": " Để tìm kiếm khách hàng (cầu), nhà môi giới cần sử dụng đa dạng các kênh tiếp cận, bao gồm cả kênh bị động (A - đăng tin quảng cáo trên các phương tiện để khách hàng tự tìm đến) và kênh chủ động (B, C - trực tiếp tiếp cận các khách hàng tiềm năng thông qua điện thoại, email). Căn cứ học thuật: Kỹ năng tìm kiếm khách hàng (Prospecting) trong bán hàng."}, {"level": "1", "content": "Thông tin về nguồn cung Bất động sản Nhà môi giới thu thập từ các kênh nào?", "options": {"A": "Từ các phương tiện thông tin đại chúng.", "B": "Từ các cơ quan Quản lý Sở Xây dựng, Sở Nông Nghiệp & Môi trường, Sở Quy hoạch - Kiến trúc.", "C": "Từ văn phòng Môi giới.", "D": "Tất cả câu A, B, C là đúng."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Để có được giỏ hàng phong phú, nhà môi giới phải tìm kiếm thông tin về nguồn cung (BĐS cần bán/cho thuê) từ nhiều kênh khác nhau: Phương tiện đại chúng (A): Các trang rao vặt, báo chí... Cơ quan quản lý (B): Nắm thông tin quy hoạch, các dự án sắp triển khai. Mạng lưới đồng nghiệp (C): Hợp tác, trao đổi nguồn hàng với các văn phòng, môi giới khác."}, {"level": "1", "content": "Để lập hồ sơ cho một thương vụ môi giới bất động sản, bên cung ứng bất động sản cần cung cấp những thông tin, giấy tờ nào?", "options": {"A": "Hồ sơ pháp lý về quyền sở hữu, quyền sử dụng bất động sản.", "B": "Bản dự báo thị trường bất động sản trong 5 năm tới.", "C": "Thông tin cá nhân của các môi giới khác trên thị trường.", "D": "Thông tin về xu hướng truyền thông trên mạng xã hội."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Thông tin cơ bản và bắt buộc nhất mà bên bán (bên cung ứng) phải cung cấp là hồ sơ pháp lý của bất động sản (Giấy chứng nhận, thông báo nộp lệ phí trước bạ, CMND/CCCD, sổ hộ khẩu, giấy đăng ký kết hôn...). Đây là cơ sở để nhà môi giới xác minh tình trạng tài sản và tư vấn cho khách hàng. Các thông tin B, C, D không phải là trách nhiệm của bên bán."}, {"level": "1", "content": "Khi nghiên cứu thị trường bất động sản, nguồn nào sau đây thường được sử dụng để thu thập thông tin về nguồn cầu bất động sản?", "options": {"A": "Khách hàng, nhà đầu tư có nhu cầu mua, thuê bất động sản.", "B": "Ngân hàng, tổ chức tín dụng..", "C": "Báo cáo thị trường của cơ quan quản lý nhà nước.", "D": "Tất cả các phương án trên"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Nguồn cầu không chỉ đến từ người có nhu cầu trực tiếp (A) mà còn bị ảnh hưởng bởi các yếu tố vĩ mô. Ngân hàng (B) cung cấp thông tin về dòng tiền, khả năng tài chính của thị trường. Báo cáo của cơ quan nhà nước (C) cung cấp các phân tích, số liệu tổng quan về xu hướng, nhân khẩu học..."}, {"level": "1", "content": "Khi thuyết trình giới thiệu bất động sản, vấn đề quan trọng nhất cần trình bày là gì?", "options": {"A": "Giá cả sản phẩm.", "B": "Đặc điểm nổi bật trong thiết kế.", "C": "Giá trị và lợi ích của sản phẩm mang lại cho khách hàng.", "D": "Tất cả đều sai."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khách hàng không mua \"đặc điểm\" (features), họ mua \"lợi ích\" (benefits). Một nhà môi giới hiệu quả phải biết cách chuyển hóa các đặc điểm (A, B) thành những giá trị, lợi ích thiết thực mà khách hàng sẽ nhận được (ví dụ: \"Thiết kế có ban công rộng\" -> \"Lợi ích là gia đình có không gian thư giãn, trồng cây xanh mỗi buổi chiều\"). Căn cứ học thuật: Kỹ thuật bán hàng tập trung vào lợi ích (Benefit- Oriented Selling)."}, {"level": "1", "content": "Phương pháp thu thập thông tin về cầu bất động sản chủ động không bao gồm hoạt động nào sau đây:", "options": {"A": "Gửi thư trực tiếp tới khách hàng tiềm năng.", "B": "Tiếp cận tận nơi: đón hoặc gọi điện.", "C": "Tìm kiếm qua các phương tiện thông tin đại chúng .", "D": "Đón tại văn phòng môi giới bất động sản."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Chủ động: Là khi nhà môi giới chủ động đi tìm kiếm, tiếp cận khách hàng (A, B, C). Bị động: Là khi nhà môi giới đăng thông tin và chờ khách hàng tự tìm đến mình. “Đón (chờ khách tự đến) tại văn phòng môi giới BĐS\" (D) là một hình thức marketing bị động. Căn cứ học thuật: Phân loại phương pháp bán hàng (Active vs. Passive Selling)."}, {"level": "1", "content": "Điểm khác biệt cơ bản giữa đàm phán kiểu cứng và đàm phán kiểu nguyên tắc là gì?", "options": {"A": "Kiểu cứng tập trung vào thắng - thua, kiểu nguyên tắc tập trung vào lợi ích chung.", "B": "Kiểu cứng nhấn mạnh quan hệ lâu dài, kiểu nguyên tắc tập trung vào lợi ích trước mắt..", "C": "Kiểu cứng thường linh hoạt, kiểu nguyên tắc thì cứng nhắc.", "D": "Kiểu cứng dựa vào tiêu chuẩn khách quan, kiểu nguyên tắc dựa vào sức ép"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Đây là sự khác biệt về triết lý nền tảng: Kiểu cứng (Hard Bargaining): Là một trò chơi có tổng bằng không (zero-sum game), mục tiêu là \"chiến thắng\" và buộc đối phương phải \"thua\". Kiểu nguyên tắc (Principled Negotiation): Là nỗ lực tạo ra một kết quả \"cùng thắng\" (win-win), tập trung vào việc thỏa mãn lợi ích của cả hai bên dựa trên các tiêu chí khách quan. Các phát biểu B, C, D đều mô tả sai bản chất của hai phong cách này."}, {"level": "1", "content": "Những điều cần tránh làm khi giới thiệu sản phẩm bất động sản là?", "options": {"A": "Giới thiệu bằng trực quan sống động.", "B": "Luôn sử dụng các từ và thuật ngữ chuyên môn.", "C": "Gợi ý những viễn cảnh tốt đẹp nếu khách hàng mua sản phẩm.", "D": "Cả đáp án B và C đúng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc lạm dụng thuật ngữ chuyên môn (B) sẽ khiến khách hàng khó hiểu, tạo ra khoảng cách và cảm giác bị \"qua mặt\". Giao tiếp hiệu quả là phải nói ngôn ngữ của khách hàng. A và C là những kỹ thuật tốt cần làm."}, {"level": "1", "content": "Tâm lý chung của khách hàng mua căn hộ lần thứ hai là", "options": {"A": "Sợ rằng rủi ro tài chính sẽ rất lớn.", "B": "Tìm hiểu thông tin liên quan rất kỹ.", "C": "Đáp án A và B đúng.", "D": "Đáp án A và B sai."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khách hàng mua lần thứ hai đã có kinh nghiệm từ lần mua đầu. Nỗi sợ rủi ro (A) thường đã giảm bớt. Thay vào đó, họ sẽ tập trung vào việc tìm hiểu thông tin một cách kỹ lưỡng hơn (B), rút kinh nghiệm từ những thiếu sót của lần mua trước để đưa ra quyết định tốt hơn, tối ưu hơn. Căn cứ học thuật: Tâm lý học hành vi người tiêu dùng."}, {"level": "1", "content": "Khách hàng quan tâm điều gì nhất trong loại hình BĐS là chung cư?", "options": {"A": "Hạ tầng kỹ thuật, giá cả, diện tích sử dụng.", "B": "Giá cả, diện tích sử dụng, vị trí giao thông.", "C": "Môi trường sống, chi phí sử dụng, diện tích khu vực.", "D": "Chất lượng, mẫu mã, diện tích sử dụng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Giá cả, diện tích sử dụng, vị trí giao thông.Đây là ba yếu tố cơ bản và có sức ảnh hưởng lớn nhất đến quyết định của hầu hết khách hàng khi lựa chọn một căn hộ chung cư. - Giá cả (Price): Đây gần như luôn là yếu tố quan trọng hàng đầu. Ngân sách của người mua quyết định phân khúc sản phẩm mà họ có thể tiếp cận. Giá cả không chỉ bao gồm giá bán căn hộ mà còn liên quan đến các chính sách thanh toán, hỗ trợ vay vốn từ ngân hàng. - Vị trí giao thông (Location): Vị trí quyết định sự thuận tiện trong cuộc sống hàng ngày. Khách hàng sẽ xem xét khoảng cách từ chung cư đến nơi làm việc, trường học của con cái, bệnh viện, chợ, và khả năng kết nối với các tuyến đường chính, phương tiện công cộng (như tuyến metro). Một vị trí đắc địa, giao thông thuận lợi sẽ luôn là điểm cộng lớn. - Diện tích sử dụng (Usable Area): Diện tích và cách bố trí công năng của căn hộ phải phù hợp với nhu cầu và số lượng thành viên trong gia đình. Người mua sẽ quan tâm căn hộ có bao nhiêu phòng ngủ, phòng vệ sinh, không gian sinh hoạt chung có đủ rộng rãi và thoải mái hay không."}, {"level": "1", "content": "Những biểu hiện nào sau đây cho phép xác định đối tượng khách hàng của bạn là “khách hàng thụ động”?", "options": {"A": "Dễ chịu, tươi cười, tế nhị, không thích bị ép.", "B": "Né tránh, sợ bị gạt, không dám quyết định một mình.", "C": "Có vẻ không đồng ý, hơi nghi ngờ, hay so sánh với sản phẩm khác của đối thủ.", "D": "Tươi cười, xởi lởi, tỏ vẻ quan tâm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khách hàng \"thụ động\" là những người thiếu tự tin, do dự và có xu hướng trì hoãn hoặc né tránh việc đưa ra quyết định cuối cùng. Các biểu hiện trong đáp án B mô tả chính xác nhất tâm lý và hành vi của nhóm khách hàng này: Né tránh: Họ thường không muốn đi thẳng vào vấn đề mua bán, hay lảng tránh các câu hỏi trực tiếp về việc ra quyết định. Họ cảm thấy áp lực khi phải cam kết. Sợ bị gạt: Nỗi sợ mắc sai lầm, sợ mua phải sản phẩm không tốt hoặc bị hớ giá là rào cản tâm lý lớn nhất. Điều này xuất phát từ việc thiếu thông tin hoặc thiếu tự tin vào khả năng phán đoán của bản thân. Không dám quyết định một mình: Đây là biểu hiện đặc trưng nhất. Họ thường cần có sự đồng thuận, tư vấn, hoặc thậm chí là sự quyết định thay từ người thân, bạn bè, hoặc chuyên gia mà họ tin tưởng. Họ tìm kiếm sự bảo chứng từ bên ngoài để giảm thiểu rủi ro cho quyết định của mình. A. Dễ chịu, tươi cười, tế nhị, không thích bị ép: Mô tả nhóm khách hàng thân thiện (Amiable). Họ coi trọng mối quan hệ và sự hòa hợp, nhưng không đồng nghĩa với việc họ không thể tự ra quyết định. C. Có vẻ không đồng ý, hơi nghi ngờ, hay so sánh với sản phẩm khác của đối thủ: Mô tả nhóm khách hàng phân tích (Analytical). Họ là những người cẩn trọng, logic, và cần nhiều dữ liệu để đưa ra quyết định. Họ chủ động tìm hiểu và so sánh, trái ngược với tính thụ động. D. Tươi cười, xởi lởi, tỏ vẻ quan tâm: Mô tả nhóm khách hàng nhiệt tình (Expressive). Họ cởi mở, giàu năng lượng và dễ bị thu hút bởi những ý tưởng mới, nhưng đây chỉ là biểu hiện bên ngoài, không phản ánh cốt lõi của sự thụ động trong việc ra quyết định."}, {"level": "1", "content": "Trong quy trình môi giới, người môi giới BĐS cần thực hiện các nhiệm vụ sau:", "options": {"A": "Chứng thực, sao lưu các loại giấy tờ, tìm kiếm khách hàng.", "B": "Khảo sát thực địa, hồ sơ pháp lý, thẩm định giá, quảng bá, giới thiệu BĐS.", "C": "Đàm phán điều khoản, lập hợp đồng, thu phí môi giới.", "D": "Cả 3 câu trên đều đúng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đáp án B mô tả đúng nhất chuỗi các công việc chuyên môn của một nhà môi giới khi tiếp nhận một sản phẩm. Họ phải kiểm tra pháp lý, khảo sát thực tế, định giá sơ bộ, sau đó mới tiến hành quảng bá và giới thiệu. A (chứng thực) và C (thu phí) là các bước thuộc về giai đoạn sau hoặc không thuộc thẩm quyền."}, {"level": "1", "content": "Kỹ năng vượt qua thắc mắc của khách hàng:", "options": {"A": "Ghi chép thông tin, phân loại ý kiến khách hàng, đồng cảm khi trả lời khách hàng, lôi", "B": "Lắng nghe cẩn thận, bình tĩnh, không ngắt lời.", "C": "Lặp lại câu phản đối dưới dạng câu hỏi, nói chuyện ôn hòa, đồng cảm khi trả lời khách", "D": "Đáp án B và C."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Một quy trình xử lý phản đối hiệu quả bao gồm cả hai phần: thái độ (B) và kỹ thuật (C). Đầu tiên phải có thái độ đúng: lắng nghe, bình tĩnh (B). Sau đó mới áp dụng các kỹ thuật như đặt lại câu hỏi để làm rõ vấn đề, đồng cảm và đưa ra giải pháp (C). Căn cứ học thuật: Kỹ năng xử lý từ chối/phản đối (Objection Handling) trong bán hàng."}, {"level": "1", "content": "Theo khảo sát về cầu bất động sản mục đích để ở, yếu tố nào thường được khách hàng ưu tiên hàng đầu khi đưa ra quyết định mua?", "options": {"A": "Thời gian, chất lượng, tiện lợi, giá cả.", "B": "Giá cả, chất lượng, tiện lợi, thời gian.", "C": "Giá cả, thời gian, chất lượng, tiện lợi.", "D": "Chất lượng, thời gian, tiện lợi, giá cả."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đối với phần lớn người mua nhà để ở, giá cả (phù hợp túi tiền) là yếu tố sàng lọc đầu tiên. Sau khi đã xác định được phân khúc giá phù hợp, họ sẽ bắt đầu xem xét đến chất lượng (xây dựng, thiết kế), tiện lợi (vị trí, tiện ích), và cuối cùng là thời gian (bàn giao, thủ tục)."}, {"level": "1", "content": "Khi tiếp xúc khách hàng, để tránh sự phản ứng hay chống đối, môi giới bất động sản chuyên nghiệp cần thể hiện rõ mục tiêu gì trong công việc?", "options": {"A": "Tìm kiếm thu nhập từ hoa hồng", "B": "Phát triển nghề nghiệp cá nhân", "C": "Vì yêu thích và phù hợp với nghề môi giới", "D": "Đặt lợi ích của khách hàng song song với lợi ích của mình"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Một nhà môi giới chuyên nghiệp và có đạo đức phải luôn đặt lợi ích của khách hàng lên hàng đầu, đồng thời đảm bảo lợi ích chính đáng của mình (hoa hồng). Đây là nguyên tắc \"win-win\", tạo dựng uy tín và sự bền vững trong nghề."}, {"level": "1", "content": "Đặc điểm nào sau đây không thuộc lập trường đàm phán theo kiểu cứng?", "options": {"A": "Cứng rắn với cả con người và vấn đề.", "B": "Không giấu giới hạn cuối cùng.", "C": "Đi tìm một câu trả lời mà mình chấp nhận.", "D": "Không tin đối tác."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đàm phán kiểu cứng (Hard Negotiation) có đặc điểm là luôn giữ vững lập trường và che giấu giới hạn cuối cùng (bottom line) của mình để tạo lợi thế. \"Không giấu giới hạn cuối cùng\" là đặc điểm của đàm phán kiểu mềm hoặc mở."}, {"level": "1", "content": "Đàm phán theo lập trường kiểu cứng thường có những đặc điểm nào", "options": {"A": "Giấu giới hạn cuối cùng, gây áp lực lên đối phương.", "B": "Ép đối phương phải nhượng bộ tối đa.", "C": "Bám chặt lập trường ban đầu, không linh hoạt.", "D": "Tất cả các đáp án trên"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Đàm phán theo lập trường kiểu cứng (Hard Positional Bargaining) là một phong cách đàm phán xem cuộc thương lượng như một cuộc chiến ý chí, trong đó mục tiêu cuối cùng là \"chiến thắng\" đối phương. Do đó, tất cả các đặc điểm nêu trên đều là biểu hiện của lối đàm phán này. Giấu giới hạn cuối cùng, gây áp lực lên đối phương (Đáp án A): Đây là chiến thuật phổ biến. Họ sẽ che giấu \"giới hạn cuối cùng\" (bottom line) của mình để làm đối phương tin rằng họ không còn khả năng nhượng bộ. Đồng thời, họ sử dụng các chiến thuật gây áp lực như đưa ra thời hạn gấp, đe dọa hủy bỏ thỏa thuận, hoặc công kích cá nhân để làm đối phương mất bình tĩnh và phải chấp nhận yêu sách. Ép đối phương phải nhượng bộ tối đa (Đáp án B): Đây chính là mục tiêu cuối cùng của họ. Mọi hành động, từ việc giữ vững lập trường đến gây áp lực, đều nhằm mục đích buộc phía bên kia phải từ bỏ nhiều nhất có thể. Họ tập trung vào việc tối đa hóa lợi ích cho mình, bất kể lợi ích của đối phương. Bám chặt lập trường ban đầu, không linh hoạt (Đáp án C): Họ xem việc nhượng bộ là một sự yếu đuối và thất bại."}, {"level": "1", "content": "Quy trình môi giới BĐS gồm các bước", "options": {"A": "Tìm khách hàng, ký kết hợp đồng, quảng bá BĐS, bán hàng", "B": "Tìm người bán, ký kết hợp đồng, quảng bá BĐS, bán hàng", "C": "Tìm người bán, khảo sát thẩm định giá, ký kết hợp đồng, quảng bá BĐS, bán hàng", "D": "Khảo sát thẩm định giá, ký kết hợp đồng, quảng bá BĐS, bán hàng"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đáp án C mô tả một cách đầy đủ và logic nhất quy trình làm việc chuẩn của một nhà môi giới bất động sản chuyên nghiệp: (1) Tìm người bán (Nguồn hàng): Đây là bước khởi đầu đầu tiên và quan trọng nhất. Nhà môi giới cần có sản phẩm (bất động sản) để cung cấp ra thị trường. Việc tìm kiếm và xây dựng mối quan hệ với chủ sở hữu có nhu cầu bán/cho thuê là nền tảng của hoạt động môi giới. (2) Khảo sát & Thẩm định giá: Sau khi có nguồn hàng, một nhà môi giới chuyên nghiệp không thể ngay lập tức rao bán. Họ cần phải thực hiện khảo sát thực tế bất động sản, kiểm tra pháp lý và thực hiện phân tích, so sánh để đưa ra một mức giá đề xuất hợp lý (thẩm định giá). Bước này quyết định đến khả năng thanh khoản của bất động sản. (3) Ký kết hợp đồng môi giới: Khi chủ nhà và môi giới đã thống nhất về mức giá, phí dịch vụ và các điều khoản, hai bên sẽ ký kết hợp đồng môi giới. Đây là cơ sở pháp lý để nhà môi giới chính thức đại diện cho chủ nhà thực hiện các công việc tiếp theo. (4) Quảng bá BĐS (Marketing): Dựa trên thông tin đã khảo sát, nhà môi giới xây dựng kế hoạch marketing, quảng bá sản phẩm trên các kênh khác nhau để tiếp cận khách hàng tiềm năng. (5) Bán hàng (Sales & Closing): Giai đoạn này bao gồm các công việc như dẫn khách xem nhà, đàm phán giá cả, hỗ trợ các bên trong việc ký kết hợp đồng đặt cọc, hợp đồng mua bán và hoàn tất giao dịch."}, {"level": "1", "content": "Để lập hồ sơ thương vụ môi giới BĐS, bên cung cần cung cấp", "options": {"A": "Thông tin chủ sở hữu, các loại giấy tờ, hồ sơ pháp lý của BĐS", "B": "Các giấy tờ liên quan đến thương vụ như giấy đặt cọc, phiếu thu chi …", "C": "Hợp đồng dịch vụ môi giới", "D": "Cả 3 câu trên đều đúng"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Một hồ sơ hoàn chỉnh bao gồm: (1) Hồ sơ pháp lý của Bất động sản và Chủ sở hữu (Đáp án A): Đây là yếu tố cốt lõi, là nền tảng của mọi giao dịch. Nó chứng minh tính hợp pháp của bất động sản và tư cách pháp lý của người bán. Các giấy tờ này bao gồm: - Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất (sổ hồng/sổ đỏ). - Căn cước công dân/CMND của chủ sở hữu. - Giấy xác nhận tình trạng hôn nhân. - Các giấy tờ khác liên quan (bản vẽ, giấy phép xây dựng...). (2) Hợp đồng dịch vụ môi giới (Đáp án C): Đây là văn bản pháp lý đầu tiên, xác lập mối quan hệ và các điều khoản thỏa thuận (phí môi giới, thời gian, trách nhiệm...) giữa bên cung cấp dịch vụ (nhà môi giới) và bên sử dụng dịch vụ (chủ nhà). (3) Các chứng từ liên quan đến thương vụ (Đáp án B): Đây là những giấy tờ phát sinh trong quá trình diễn ra giao dịch, ghi lại các dấu mốc quan trọng và chứng minh việc thực hiện nghĩa vụ của các bên. Ví dụ: - Hợp đồng đặt cọc. - Các phiếu thu, ủy nhiệm chi chứng minh việc thanh toán. - Hợp đồng mua bán/chuyển nhượng được công chứng."}, {"level": "1", "content": "Nguồn thông tin nào về cung bất động sản được coi là có độ tin cậy pháp lý cao nhất?", "options": {"A": "Thông tin từ các nhóm bán hàng của chủ đầu tư trên mạng xã hội.", "B": "Thông tin từ các nhà môi giới có thâm niên trong khu vực.", "C": "Các quảng cáo trên báo, đài hoặc các trang rao vặt lớn.", "D": "Thông tin trực tiếp từ giấy chứng nhận quyền sử dụng đất, hồ sơ pháp lý dự án, hoặc cơ quan nhà nước có thẩm quyền."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Nhà môi giới có nghĩa vụ cung cấp thông tin trung thực, chính xác (Khoản 2 Điều 62 Luật KDBĐS 2023), do đó cần dựa trên nguồn thông tin pháp lý chính thống."}, {"level": "1", "content": "Nhà môi giới bất động sản thường xuyên thực hiện các công việc nào sau đây?", "options": {"A": "Xác định lượng cung bất động sản nói chung trên thị trường.", "B": "Xác định tính cần thiết của việc đầu tư, nhu cầu mua nhà của người dân trên một thị", "C": "Xác định chi phí, lợi nhuận, thủ tục pháp lý, hỗ trợ khách hàng thực hiện các giao dịch", "D": "Xác định chu kỳ phát triển của bất động sản, đưa ra phương hướng đầu tư thích hợp."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Công việc hàng ngày, thường xuyên nhất của nhà môi giới gắn liền với từng giao dịch cụ thể. Đó là việc tư vấn cho khách hàng về chi phí, lợi nhuận tiềm năng của một BĐS, kiểm tra thủ tục pháp lý và hỗ trợ họ hoàn tất giao dịch. Các công việc ở A, B, D mang tính nghiên cứu thị trường vĩ mô, thường do các chuyên gia phân tích hoặc công ty nghiên cứu thực hiện, không phải công việc thường xuyên của từng môi giới viên."}, {"level": "1", "content": "Các thông tin về BĐS cần thu thập gồm:", "options": {"A": "Thông tin về kinh tế kỹ thuật.", "B": "Thông tin về tình trạng pháp lý.", "C": "Thông tin về môi trường xã hội, lịch sử phát triển.", "D": "Cả 3 câu trên đều đúng."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Để có một cái nhìn toàn diện về bất động sản, nhà môi giới cần thu thập thông tin từ cả ba nhóm: - Kinh tế - kỹ thuật (A): Chất lượng xây dựng, thiết kế, diện tích... - Pháp lý (B): Tình trạng sổ đỏ, quy hoạch, tranh chấp... - Môi trường - xã hội (C): Hàng xóm, an ninh, tiện ích, lịch sử khu đất..."}, {"level": "1", "content": "Nghĩa vụ của doanh nghiệp kinh doanh dịch vụ môi giới bất động sản?", "options": {"A": "Yêu cầu khách hàng cung cấp hồ sơ, thông tin về bất động sản.", "B": "Hưởng thù lao, hoa hồng môi giới theo thỏa thuận trong hợp đồng đã ký với khách hàng.", "C": "Thuê doanh nghiệp kinh doanh dịch vụ môi giới bất động sản, cá nhân kinh doanh dịch", "D": "Cung cấp hồ sơ, thông tin về bất động sản do mình môi giới và chịu trách nhiệm về hồ"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 điều 62 Luật Kinh doanh bất động sản 2023"}, {"level": "1", "content": "Trong các ý sau, ý nào chưa chính xác khi nói về nhóm các yếu tố tự nhiên liên hệ trực tiếp đến bất động sản:", "options": {"A": "Nhu cầu của bất động sản trên thị trường", "B": "Vị trí, kích thước, hình thể, diện tích thửa đất…", "C": "Địa hình tọa lạc và hình thức bên ngoài của bất động sản", "D": "Đặc điểm trên mặt đất- dưới lòng đất, và tình trạng môi trường, các tiện lợi và nguy cơ"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Các yếu tố tự nhiên là những yếu tố vốn có, gắn liền với bản thân bất động sản như vị trí, địa hình, môi trường... (B, C, D). \"Nhu cầu của bất động sản\" (A) là một yếu tố thuộc về thị trường, kinh tế - xã hội, không phải là yếu tố tự nhiên của BĐS đó."}, {"level": "1", "content": "Khi giao dịch mua bán bất động sản chưa đủ điều kiện giao dịch, bên mua và bên bán sử dụng “vi bằng” thay cho hợp đồng công chứng. Hậu quả pháp lý của việc sử dụng vi bằng là:", "options": {"A": "Vi bằng có giá trị pháp lý tương đương hợp đồng công chứng", "B": "Người mua không được bảo đảm quyền sở hữu tài sản, gây tranh chấp sau này", "C": "Vi bằng giúp tiết kiệm chi phí mà vẫn đảm bảo quyền lợi", "D": "Cơ quan công chứng sẽ tự động chuyển đổi vi bằng thành hợp đồng công chứng"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là một sự nhầm lẫn pháp lý rất nguy hiểm. Vi bằng do Thừa phát lại lập chỉ có giá trị ghi nhận một sự kiện, hành vi (ví dụ: ghi nhận việc bên A giao tiền cho bên B tại thời điểm X). Nó là một nguồn chứng cứ trước Tòa án nhưng hoàn toàn không có giá trị thay thế cho một hợp đồng mua bán bất động sản được công chứng, chứng thực. Giao dịch mua bán BĐS bằng vi bằng sẽ bị coi là vô hiệu do vi phạm về hình thức, và quyền lợi của người mua không được pháp luật bảo vệ. Căn cứ pháp lý: Nghị định 08/2020/NĐ-CP về tổ chức và hoạt động của Thừa phát lại. Điều 129 Bộ luật Dân sự 2015 về giao dịch dân sự vô hiệu do không tuân thủ quy định về hình thức."}, {"level": "1", "content": "Khi lập hồ sơ cho bất động sản hình thành trong tương lai, tài liệu pháp lý quan trọng nhất cần thu thập là gì?", "options": {"A": "Hợp đồng bảo hiểm cháy nổ của toàn bộ dự án.", "B": "Giấy chứng nhận về quyền sở hữu căn hộ mẫu của dự án.", "C": "Hợp đồng lao động của Giám đốc Chủ đầu tư.", "D": "Văn bản chấp thuận cho phép bán, cho thuê mua của cơ quan nhà nước có thẩm quyền."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Theo khoản 4 Điều 24 Luật KDBĐS 2023, bất động sản hình thành trong tương lai chỉ được đưa vào kinh doanh khi có văn bản thông báo đủ điều kiện."}, {"level": "1", "content": "Khi môi giới bất động sản đang bị thế chấp tại ngân hàng, nhà môi giới cần làm gì để đảm bảo giao dịch hợp pháp?", "options": {"A": "Chỉ cần thông báo bằng miệng cho bên mua về việc đang thế chấp.", "B": "Ký hợp đồng mua bán và cam kết sẽ giải chấp sau.", "C": "Yêu cầu bên bán phải tất toán khoản nợ trước khi ký hợp đồng đặt cọc.", "D": "Bắt buộc phải có văn bản đồng ý của bên nhận thế chấp (ngân hàng) về việc bán bất động sản đó."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 điều 183 Luật Nhà ở quy định Bất động sản đang thế chấp vẫn có thể được chuyển nhượng nhưng phải được sự đồng ý của bên nhận thế chấp (ngân hàng)."}, {"level": "1", "content": "Mục tiêu chính của Marketing bất động sản là gì?", "options": {"A": "Đảm bảo bất động sản được bán với giá cao hơn thị trường.", "B": "Đẩy mạnh quảng cáo để mọi người đều biết đến bất động sản đó.", "C": "Thu hút và xác định đúng khách hàng mục tiêu để tối ưu hóa hiệu quả giao dịch.", "D": "Giúp nhà môi giới nổi tiếng và có nhiều người theo dõi trên mạng xã hội."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Marketing hiệu quả là tập trung nguồn lực vào đối tượng có nhu cầu và khả năng mua, tối ưu hóa tỷ lệ chuyển đổi."}, {"level": "1", "content": "Nguyên tắc pháp lý nào cần tuân thủ khi thực hiện quảng cáo bất động sản?", "options": {"A": "Chỉ được quảng cáo trên các kênh truyền thông chính thống của nhà nước.", "B": "Đảm bảo nội dung quảng cáo trung thực, chính xác và không gây nhầm lẫn.", "C": "Bắt buộc phải có chữ ký của Chủ tịch UBND tỉnh.", "D": "Chỉ được sử dụng ảnh chụp bằng điện thoại cá nhân."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nguyên tắc trung thực, chính xác là nghĩa vụ của môi giới khi cung cấp thông tin (điểm a khoản 1 điều 65 Luật KDBĐS 2023)."}, {"level": "1", "content": "Khi người môi giới đại diện cho bên bán làm việc với bên mua, phần nào sau đây không thuộc nhiệm vụ thực hiện của người môi giới đối với bên mua?", "options": {"A": "Nhiệm vụ ủy thác", "B": "Tư vấn sửa chữa, thanh lý hợp đồng mua bán BĐS", "C": "Tư vấn cho khách hàng để có sự hiểu rõ toàn diện về BĐS.", "D": "Cả A, B, C đều đúng."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Nhiệm vụ ủy thác (Fiduciary Duty) là nghĩa vụ cao nhất của người đại diện đối với thân chủ của mình. Trong trường hợp này, người môi giới đại diện cho bên bán, vậy nên họ có nhiệm vụ ủy thác với bên bán (phải trung thành, bảo vệ lợi ích tối đa cho bên bán). Họ không có nhiệm vụ ủy thác với bên mua (bên kia của giao dịch). Đối với bên mua, người môi giới chỉ có nghĩa vụ cơ bản là phải trung thực và công bằng. - Căn cứ học thuật: Nguyên tắc đại diện và nghĩa vụ ủy thác trong môi giới."}, {"level": "1", "content": "Các bước trong tiếp cận khách hàng mua, thuê BĐS gồm:", "options": {"A": "Tìm khách hàng tiềm năng, liên lạc và thỏa thuận hợp đồng", "B": "Tiếp cận khách hàng, giới thiệu sản phẩm, xử lý thắc mắc và kết thúc chào bán", "C": "Tiếp cận khách hàng, giới thiệu sản phẩm", "D": "Liên lạc, tiếp cận khách hàng, giới thiệu sản phẩm và thỏa thuận hợp đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lựa chọn B mô tả một quy trình bán hàng hoàn chỉnh và logic: 1. Tiếp cận khách hàng: Tạo mối quan hệ ban đầu. 2. Giới thiệu sản phẩm: Trình bày thông tin. 3. Xử lý thắc mắc: Giải quyết các băn khoăn, phản đối. 4. Kết thúc chào bán: Kêu gọi hành động, chốt giao dịch. Các lựa chọn khác đều thiếu các bước quan trọng. Căn cứ học thuật: Quy trình bán hàng 7 bước (7-Step Selling Process)."}, {"level": "1", "content": "Giải đáp thắc mắc của khách hàng nhằm mục tiêu:", "options": {"A": "Giải thích khi khách hiểu sai, chứng minh khi khách nghi ngờ", "B": "Phân tích để khách hàng thấy được lợi ích lâu dài, tìm hiểu nguyên nhân để ứng xử khi", "C": "Trao đổi để có các điều khoản thuận lợi hơn", "D": "Đáp án A và B"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Việc giải đáp thắc mắc không chỉ là trả lời câu hỏi, mà còn là một bước quan trọng trong quá trình thuyết phục. Nó có hai mục tiêu chính: Làm rõ và chứng minh (A): Sửa những hiểu lầm, cung cấp bằng chứng để xóa tan nghi ngờ. Thấu hiểu và thuyết phục (B): Tìm ra mối quan tâm sâu xa đằng sau câu hỏi để đưa ra những lợi ích phù hợp, giải quyết gốc rễ vấn đề. Mục tiêu C không phù hợp, vì đây là giai đoạn xử lý thắc mắc, không phải đàm phán hợp đồng. Căn cứ học thuật: Kỹ năng xử lý từ chối/phản đối (Objection Handling)."}, {"level": "1", "content": "Động cơ của người mua bất động sản là?", "options": {"A": "Động cơ kinh tế", "B": "Động cơ chiếm hữu", "C": "Động cơ tình cảm", "D": "Đáp án A và B"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Động cơ mua BĐS thường là sự kết hợp của nhiều yếu tố: - Động cơ kinh tế (A): Mua để đầu tư, cho thuê sinh lời, chờ tăng giá.  Động cơ chiếm hữu/sử dụng: Mua để ở, để thỏa mãn nhu cầu an cư, khẳng định bản thân. Động cơ này có thể bao gồm cả các yếu tố tình cảm (C - mua nhà gần cha mẹ, mua nhà kỷ niệm...). Do đó, A và B là hai nhóm động cơ chính. Căn cứ học thuật: Tháp nhu cầu của Maslow và Tâm lý học hành vi người tiêu dùng."}, {"level": "1", "content": "Chức năng của quảng cáo gồm:", "options": {"A": "Chức năng gợi nhớ, chức năng thông tin, chức năng định giá", "B": "Chức năng gợi nhớ, chức năng thông tin, chức năng thuyết phục.", "C": "Chức năng thông tin, chức năng định giá, chức năng thuyết phục.", "D": "Cả A, B và C đều sai"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo lý thuyết marketing kinh điển, quảng cáo có 3 chức năng chính: 1. Thông tin (Inform): Giới thiệu sản phẩm mới, thông báo về giá, tính năng. 2. Thuyết phục (Persuade): Xây dựng thương hiệu, khuyến khích chuyển đổi, thay đổi nhận thức. 3. Gợi nhớ (Remind): Duy trì sự hiện diện trong tâm trí khách hàng, nhắc nhở về nhu cầu. \"Định giá\" không phải là chức năng của quảng cáo. Căn cứ học thuật: Lý thuyết về Truyền thông Marketing Tích hợp (IMC)."}, {"level": "1", "content": "Nêu các dạng nguồn cung bất động sản?", "options": {"A": "Bán.", "B": "Cho thuê, cho thuê lại.", "C": "Đầu tư liên doanh liên kết.", "D": "Cả A, B và C"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Nguồn cung trên thị trường bất động sản rất đa dạng, bao gồm: Bán (A): Chuyển nhượng quyền sở hữu/sử dụng. Cho thuê, cho thuê lại (B): Chuyển giao quyền sử dụng trong một thời gian. Đầu tư liên doanh liên kết (C): Góp vốn bằng giá trị BĐS để hình thành một pháp nhân mới. Tất cả đều là các hình thức đưa bất động sản ra thị trường."}, {"level": "1", "content": "Hệ thống marketing có những loại nhiệm vụ chủ yếu nào?", "options": {"A": "Truyền tải thông tin về hàng hóa mà doanh nghiệp có ý đinh cung cấp cho tị trường", "B": "Truyền tải thông tin và hình ảnh tốt của doanh nghiệp đến người tiêu dùng", "C": "Xây dựng và duy trì tốt mối quan hệ với khách hàng", "D": "Cả A, B và C"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Marketing hiện đại không chỉ là quảng cáo. Nó bao gồm một hệ thống các nhiệm vụ: Truyền tải thông tin về sản phẩm (A): Giúp khách hàng biết và hiểu sản phẩm. Xây dựng hình ảnh doanh nghiệp (B): Tạo dựng thương hiệu, uy tín. Quản lý quan hệ khách hàng (C): Duy trì và phát triển mối quan hệ lâu dài với khách hàng."}, {"level": "1", "content": "Phân tích lợi nhuận trên một giao dịch là nhằm:", "options": {"A": "Đo lường mức lợi nhuận của từng giai đoạn để có những điều chỉnh phù hợp", "B": "Đo lường quy mô của các giao dịch cho thấy hiệu quả của việc tìm kiếm các giao dịch có giá trị lớn", "C": "Đánh giá được năng suất lao động của các nhân viên", "D": "Tất cả đều sai"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc phân tích lợi nhuận trên từng giao dịch giúp nhà quản lý đánh giá được hiệu quả của hoạt động kinh doanh. Nó cho thấy những loại giao dịch nào (ví dụ: phân khúc cao cấp, giao dịch giá trị lớn) mang lại lợi nhuận cao nhất, từ đó có thể tập trung nguồn lực vào việc tìm kiếm

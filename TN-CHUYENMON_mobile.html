 các giao dịch tương tự."}, {"level": "1", "content": "Nguyên tắc nào dưới đây có thể dẫn đến đàm phán trong kinh doanh thành công:", "options": {"A": "Nhà đàm phán ngồi vào bàn đàm phán chỉ với 1 phương án duy nhất mà không có phương án thay thế.", "B": "Nhà đàm phán phải xác định rõ mục tiêu đàm phán và luôn bám sát nó trong suốt quá", "C": "Nhà đàm phán có những định kiến với đối tác", "D": "Nhà đàm phán luôn nói nhiều thay vì hỏi nhiều"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc xác định rõ mục tiêu và kiên trì bám sát mục tiêu đó là nguyên tắc vàng trong đàm phán. Nó giúp người đàm phán không bị lạc hướng bởi các chi tiết vụn vặt và luôn biết mình cần đạt được điều gì. Các lựa chọn A, C, D đều là những sai lầm kinh điển trong đàm phán."}, {"level": "1", "content": "Tại sao trong hoạt động quảng cáo, truyền thông và bán hàng, các doanh nghiệp kinh doanh BĐS cần tập trung vào giá trị cốt lõi, giá trị khác biệt của sản phẩm trong việc cung ứng cho khách hàng?", "options": {"A": "Là yếu tố khách hàng cần và mua, tạo hấp dẫn và lôi cuốn thị trường", "B": "Để khác với các đối thủ", "C": "Do yêu cầu của các bên cho thuê mướn phương tiện quảng cáo là ngắn gọn và súc tích", "D": "Cả A,B,C đều đúng"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khách hàng ra quyết định mua dựa trên giá trị và lợi ích mà họ nhận được, không phải vì doanh nghiệp muốn khác biệt với đối thủ. Việc tập trung vào giá trị cốt lõi và khác biệt chính là cách để trả lời câu hỏi của khách hàng: \"Tại sao tôi nên mua sản phẩm này?\". Đây là yếu tố tạo ra sức hấp dẫn và thuyết phục thị trường. Căn cứ học thuật: Lý thuyết Marketing dựa trên giá trị (Value-Based Marketing)."}, {"level": "1", "content": "Quá trình chia một thị trường toàn phần thành những thị trường nhỏ, những nhóm khách hàng vì mục đích marketing gọi là:", "options": {"A": "Thâm nhập thị trường", "B": "Phân khúc thị trường", "C": "Chọn thị trường mục tiêu", "D": "Phát triển thị trường"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là định nghĩa của Phân khúc thị trường (hay Phân đoạn thị trường). Đây là bước đầu tiên trong chiến lược marketing STP (Segmentation - Targeting - Positioning)."}, {"level": "1", "content": "Trong quá trình môi giới bất động sản, ngoài các thông tin pháp lý và thực tế, người môi giới cần đặc biệt quan tâm đến yếu tố nào sau đây để tư vấn chính xác cho khách hàng?", "options": {"A": "Nhu cầu sử dụng và khả năng tài chính của khách hàng.", "B": "Thói quen tiêu dùng của cộng đồng dân cư khu vực.", "C": "Ý kiến của hàng xóm xung quanh bất động sản.", "D": "Xu hướng truyền thông trên mạng xã hội."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Một nhà môi giới giỏi phải là một nhà tư vấn. Để tư vấn chính xác, họ phải hiểu sâu sắc hai yếu tố cốt lõi của khách hàng: họ cần gì (nhu cầu) và họ có thể chi trả bao nhiêu (khả năng tài chính). Việc tư vấn chỉ có thể thành công khi sản phẩm được giới thiệu đáp ứng được cả hai yếu tố này."}, {"level": "1", "content": "Nhu cầu gián tiếp về bất động sản được xác định là:", "options": {"A": "Nhu cầu để ở", "B": "Nhu cầu thuê mướn", "C": "Nhu cầu thế chấp", "D": "Cả B và C"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nhu cầu trực tiếp: Là nhu cầu sử dụng, khai thác công năng của BĐS (ở, kinh doanh, sản xuất, cho thuê). Đáp án A và B là nhu cầu trực tiếp. Nhu cầu gián tiếp: Là nhu cầu sử dụng BĐS như một công cụ tài chính, một tài sản đảm bảo. Thế chấp (đáp án C) là việc dùng giá trị của BĐS để vay vốn, phục vụ một mục đích khác, đây là nhu cầu gián tiếp."}, {"level": "1", "content": "Khi giới thiệu bất động sản cho khách hàng, nhà môi giới nên tập trung vào nội dung nào để tăng tính thuyết phục?", "options": {"A": "Các đặc điểm nổi bật và lợi ích thực tế của bất động sản.", "B": "Ý kiến của các nhà nghiên cứu về bất động sản.", "C": "Những thông tin chưa kiểm chứng từ người khác.", "D": "Những thông tin ngoài lề, không liên quan đến sản phẩm."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Lời nói có sức thuyết phục nhất là lời nói gắn liền với lợi ích của người nghe. Nhà môi giới cần tập trung vào việc trình bày các đặc điểm của BĐS và quan trọng hơn là diễn giải chúng thành những lợi ích cụ thể, thiết thực mà khách hàng sẽ nhận được."}, {"level": "1", "content": "Theo Luật Kinh doanh Bất động sản 2023, khi sàn giao dịch xác nhận một giao dịch thành công bằng văn bản, những chủ thể nào bắt buộc phải ký tên vào văn bản xác nhận này?", "options": {"A": "Chủ đầu tư, Đại diện sàn giao dịch, Cá nhân môi giới.", "B": "Người mua, Người bán, Cá nhân môi giới.", "C": "Đại diện sàn giao dịch, Cá nhân môi giới, Đại diện văn phòng công chứng.", "D": "Chủ đầu tư, Người mua, Đại diện sàn giao dịch."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> điều 56 Luật Kinh doanh bất động sản 2023 và điểm b khoản 2 điều 16 Nghị định 96/2024/NĐ-CP"}, {"level": "1", "content": "Trong giai đoạn \"Xử lý thông tin\" của thương vụ, môi giới nhận thấy giá chủ nhà đưa ra cao hơn 20% so với mặt bằng chung, nhưng căn nhà có vị trí độc bản. Hành động nào thể hiện kỹ năng định giá chuyên nghiệp?", "options": {"A": "Hoạch định, tổ chức, điều khiển, kiểm tra", "B": "Lập kế hoạch, phân công, phối hợp, giám sát", "C": "Thiết lập, vận hành, đôn đốc, đánh giá", "D": "Định hướng, nhân sự, chỉ huy, báo cáo"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Xác định được giá của chủ sở hữu muốn bán: phải tư vấn cho khách hàng xem giá có hợp lý không. Phải biết khu vực đó giá bất động sản bao nhiêu, loại bất động sản đó giá bao nhiêu. 101. Khi 'cầu' BĐS tăng sẽ ảnh hưởng như thế nào đến giá bán và tiền thuê BĐS trong ngắn hạn? Giá và tiền thuê sẽ giảm Giá sẽ giảm nhưng tiền thuê sẽ tăng Giá và tiền thuê sẽ tăng Giá sẽ tăng nhưng tiền thuê sẽ giảm<br><br><b>Giải thích học thuật:</b> Khi cầu tăng, cả giá bán và tiền thuê bất động sản sẽ tăng trong ngắn hạn do cạnh tranh giữa người mua/người thuê. 102. Công việc nào không thuộc giai đoạn thực hiện dự án? Thực hiện việc giao đất hoặc thuê đất Giám sát thi công, xây dựng Vận hành, chạy thử Bảo hành công trình xây dựng<br><br><b>Giải thích học thuật:</b> Bảo hành công trình xây dựng thuộc giai đoạn sau khi hoàn thành dự án, không phải giai đoạn thực hiện. 103. Nếu số lượng 'cung' nhà ở cố định và 'cầu' nhà ở giảm, giá nhà sẽ thay đổi như thế nào? Tăng Không đổi Giảm Giá nhà tăng rồi giảm<br><br><b>Giải thích học thuật:</b> Khi cầu giảm trong khi cung cố định, giá nhà sẽ giảm do ít người muốn mua hơn. 104. Mỗi bất động sản đều có: Thông tin người bán Thông tin pháp lý riêng Thông tin người mua Cả A, B, C đều đúng<br><br><b>Giải thích học thuật:</b> Mỗi bất động sản đều có thông tin pháp lý riêng như giấy chứng nhận quyền sử dụng đất, tình trạng pháp lý, v.v. 105. Nguyên tắc của người môi giới muốn phát triển dài hạn là: Hướng đến khách hàng Làm đến đâu hay đến đó Bằng mọi giá hướng đến thu nhập của bản thân Cả A, B và C đều đúng<br><br><b>Giải thích học thuật:</b> Nguyên tắc phát triển dài hạn của người môi giới là hướng đến khách hàng, đặt nhu cầu và lợi ích khách hàng lên hàng đầu. 106. Hoa hồng môi giới được hưởng bao nhiêu phần trăm trong hợp đồng. 5% 8% 10% Theo thỏa thuận trong hợp đồng<br><br><b>Giải thích học thuật:</b> Mức hoa hồng môi giới không cố định mà do các bên thỏa thuận trong hợp đồng môi giới. 107. Khi lập biên bản thỏa thuận trong giao dịch BĐS cần lưu ý: Xác định các bên liên quan Giá cả bất động sản Số tiền đặt cọc Cả A, B và C<br><br><b>Giải thích học thuật:</b> Khi lập biên bản thỏa thuận cần lưu ý đầy đủ: các bên liên quan, giá cả bất động sản, số tiền đặt cọc và các nội dung khác. 108. Để giới thiệu, chào bán BĐS thành công cần dựa trên các yếu tố: Liên lạc trước, giao tiếp lịch sự, nắm được nhu cầu khách hàng Giao tiếp lịch sự, am hiểu thị trường BĐS, nắm được nhu cầu khách hàng Giao tiếp lịch sự, am hiểu thị trường BĐS, tìm được sản phẩm đúng nhu cầu khách hàng Có người giới thiệu, tìm được khách hàng tiềm năng, giao tiếp lịch sự<br><br><b>Giải thích học thuật:</b> Để chào bán thành công, người môi giới cần giao tiếp lịch sự, am hiểu thị trường và tìm được sản phẩm phù hợp với nhu cầu khách hàng. 109. Căn nhà giao dịch với giá 3.000.000.000 VNĐ, ngân hàng định giá là 2.500.000.000 VNĐ và ngân hàng cho vay 70% giá trị của Bất động sản, vậy số tiền ngân hàng cho vay: 1.750.000.000 VNĐ 2.100.000.000 VNĐ 2.500.000.000 VNĐ 1.500.000.000 VNĐ<br><br><b>Giải thích học thuật:</b> Ngân hàng cho vay 70% giá trị định giá: 2.500.000.000 × 70% = 1.750.000.000 VNĐ. 110. Thứ tự của một bài tư vấn hợp lý khi môi giới bất động sản là dự án căn hộ nên là: Giới thiệu các tiện ích, tổng quan, vị trí và các thông tin về chính sách bán hàng Giới thiệu tổng quan, vị trí, tiện ích và các thông tin về chính sách bán hàng Giới thiệu vị trí, chính sách bán hàng, tiện ích và các thông tin tổng quan Giới thiệu chính sách bán hàng, tổng quan, vị trí và tiện ích<br><br><b>Giải thích học thuật:</b> Thứ tự tư vấn hợp lý: tổng quan dự án → vị trí → tiện ích → chính sách bán hàng. 111. Để tạo ấn tượng tốt với khách hàng, người môi giới nên: Gây áp lực để khách hàng quyết định Tạo thiện cảm và chuyên nghiệp trong giao tiếp Chỉ nói về sản phẩm mà không quan tâm khách hàng Hạn chế dẫn khách hàng tham quan sản phẩm vì sẽ khiến khách hàng khó ra quyết định<br><br><b>Giải thích học thuật:</b> Người môi giới nên tạo thiện cảm và chuyên nghiệp trong giao tiếp, không gây áp lực và luôn quan tâm đến nhu cầu khách hàng. 112. Là nhà môi giới bất động sản, công việc nào sau đây được thực hiện thường xuyên nhất: Xác định lượng cung bất động sản nói chung trên thị trường bất động sản Xác định chi phí, lợi nhuận, thủ tục pháp lý, hỗ trợ khách hàng thực hiện các giao dịch mua bán bất động sản Xác định chu kỳ phát triển của bất động sản Không phải các công việc trên<br><br><b>Giải thích học thuật:</b> Công việc thường xuyên nhất là xác định chi phí, lợi nhuận, thủ tục pháp lý và hỗ trợ khách hàng thực hiện giao dịch. 113. Trong quy trình môi giới bất động sản, nghiệp vụ tư vấn vay vốn mua nhà thường được tiến hành thường xuyên. Bước đầu tiên nhà môi giới cần thực hiện là: Xác định năng lực tài chính của khách hàng Tìm kiếm các nguồn vay phù hợp Tiếp xúc, tìm hiểu và hướng dẫn khách hàng làm thủ tục vay và những vấn đề liên quan Đề xuất phương án vay tốt nhất<br><br><b>Giải thích học thuật:</b> Bước đầu tiên là xác định năng lực tài chính của khách hàng để tư vấn phương án vay phù hợp. 114. Cơ sở dữ liệu cá nhân và kinh nghiệm kiến thức mà người môi giới cần có: Bản đồ quy hoạch đất đai, quy hoạch tổng thể phát triển kinh tế xã hội, bản đồ điện tử Các đề tài nghiên cứu, hội thảo về bất động sản Trao đổi kinh nghiệm giữa các nhà môi giới Cả A, B và C<br><br><b>Giải thích học thuật:</b> Người môi giới cần xây dựng cơ sở dữ liệu bao gồm bản đồ quy hoạch, nghiên cứu về BĐS và kinh nghiệm từ đồng nghiệp. 115. Trong môi giới BĐS dự án, tiếp nhận sản phẩm là bước đầu tiên để nhân viên kinh doanh có thể: Am hiểu về khách hàng và sản phẩm Am hiểu về khách hàng và đối thủ cạnh tranh Am hiểu về sản phẩm và chủ đầu tư Am hiểu về sản phẩm và đối thủ cạnh tranh<br><br><b>Giải thích học thuật:</b> Tiếp nhận sản phẩm giúp nhân viên kinh doanh am hiểu về sản phẩm và chủ đầu tư để tư vấn chính xác. 116. Nội dung dịch vụ môi giới bất động sản không bao gồm: Môi giới mua bán, chuyển nhượng, thuê, thuê mua bất động sản Hỗ trợ xác định giá bất động sản Thực hiện các thủ tục pháp lý liên quan đến bất động sản Môi giới thành lập tổ chức pháp nhân có liên quan<br><br><b>Giải thích học thuật:</b> Dịch vụ môi giới BĐS không bao gồm việc môi giới thành lập tổ chức pháp nhân, đó là dịch vụ pháp lý riêng. 117. Để tìm kiếm khách hàng hiệu quả nhất, người môi giới cần: Tiếp xúc với tất cả khách hàng trong danh sách của bạn Lựa chọn ngẫu nhiên một số khách hàng trong danh sách và tiếp xúc Sử dụng các công cụ để sàng lọc và chọn lọc những khách hàng trước khi tiếp xúc Ngồi tại văn phòng và chờ khách hàng quan tâm tìm tới<br><br><b>Giải thích học thuật:</b> Để hiệu quả, người môi giới cần sàng lọc và chọn lọc khách hàng tiềm năng trước khi tiếp xúc, tiết kiệm thời gian và nguồn lực. 118. Hoạt động môi giới phải được thực hiện dựa trên: Nền tảng của kiến thức chuyên môn Danh tiếng của công ty Ý thức trách nhiệm và nền tảng của kiến thức chuyên môn Cả A, B, C đều đúng<br><br><b>Giải thích học thuật:</b> Hoạt động môi giới phải dựa trên ý thức trách nhiệm và nền tảng kiến thức chuyên môn, đạo đức nghề nghiệp. 119. Nhân viên kinh doanh bất động sản nên: Thông tin, tư vấn cho khách hàng lựa chọn các loại sản phẩm Đặt những câu hỏi gây hoả mù, lúng túng cho khách hàng để họ mua sản phẩm của mình Tác phong chỉnh tề, lịch sự, hoà nhã Hạn chế dẫn khách hàng tham quan sản phẩm vì sẽ khiến khách hàng khó ra quyết định<br><br><b>Giải thích học thuật:</b> Nhân viên kinh doanh BĐS nên có tác phong chỉnh tề, lịch sự, hòa nhã để tạo thiện cảm với khách hàng. 120. Khi khách hàng từ chối mua ngay, nhà môi giới nên: Bỏ qua khách hàng đó Tiếp tục giữ liên lạc và tạo cơ hội gặp gỡ Từ chối chăm sóc khách hàng Ép khách hàng mua nhanh<br><br><b>Giải thích học thuật:</b> Khi khách hàng từ chối, nhà môi giới nên tiếp tục giữ liên lạc, tạo cơ hội gặp gỡ trong tương lai khi nhu cầu thay đổi. 121. Bản chất môi giới bất động sản là gì? Bán sản phẩm mang lại lợi nhuận cho công ty Đáp ứng nhu cầu khách hàng Cung cấp cho khách hàng giải pháp tối ưu nhất nhằm thỏa mãn nhu cầu của khách hàng trên cơ sở thông tin chọn lọc và dịch vụ tốt nhất Tìm kiếm căn nhà, lô đất cho khách hàng<br><br><b>Giải thích học thuật:</b> Bản chất môi giới BĐS là cung cấp giải pháp tối ưu cho khách hàng dựa trên thông tin chọn lọc và dịch vụ chất lượng. 122. Đàm phán giá là một phần trong bước nào? Kết thúc thương vụ Tiếp xúc và chào sản phẩm Thương lượng Chăm sóc khách hàng<br><br><b>Giải thích học thuật:</b> Đàm phán giá là một phần của bước thương lượng trong quy trình môi giới bất động sản. 123. Sau khi kết thúc tìm hiểu khách hàng liên quan đến khía cạnh tài chính, môi giới viên nên làm gì khi khách hàng mua nhà yêu cầu dịch vụ hỗ trợ vay vốn? Phân tích, đánh giá tình hình tài chính của khách hàng, bao gồm việc tính ra các tỷ lệ tài chính như tỷ lệ thanh khoản, tỷ lệ sinh lời, năng lực đi vay, tình hình công nợ Lập tờ trình sơ bộ về khách hàng gửi đến cơ quan tài chính đề nghị cho vay vốn Đề nghị khách hàng cung cấp hồ sơ hoặc tài liệu quan trọng liên quan đến phương án vay vốn Phân tích sơ bộ các khả năng có thể xảy ra đối với phương án đi vay của khách hàng<br><br><b>Giải thích học thuật:</b> Khi khách hàng yêu cầu hỗ trợ vay vốn, môi giới cần đề nghị khách hàng cung cấp hồ sơ, tài liệu cần thiết để tiếp cận các nguồn vay. 124. Hoạt động môi giới bất động sản cần: Tuân thủ theo pháp luật Theo quy định người mua Theo qui định người bán Theo thỏa thuận của các bên liên quan<br><br><b>Giải thích học thuật:</b> Hoạt động môi giới bất động sản phải tuân thủ nghiêm ngặt các quy định của pháp luật. 125. Trong kỹ năng thuyết phục, một câu nói hiệu quả nên: Chỉ tập trung vào đặc điểm sản phẩm Nêu rõ đặc tính, bằng chứng và lợi ích của sản phẩm Đưa ra nhiều thông tin không liên quan Chỉ dựa trên cảm nhận cá nhân<br><br><b>Giải thích học thuật:</b> Câu nói thuyết phục hiệu quả cần nêu rõ đặc tính sản phẩm, bằng chứng thực tế và lợi ích cụ thể cho khách hàng. 126. Thông tin nguồn cung bất động sản KHÔNG đến từ: Văn phòng môi giới, các cơ quan đấu giá đất và bất động sản, nguồn hàng phát mãi Từ khách hàng, người thân, bạn bè, người quen Các công ty đầu tư kinh doanh xây dựng, các dự án Gửi thư trực tiếp tới khách hàng<br><br><b>Giải thích học thuật:</b> Gửi thư trực tiếp tới khách hàng không phải là nguồn cung thông tin BĐS chính thống và thường xuyên. 127. Các loại thông tin về bất động sản mà người môi giới cần phải biết: Kinh tế kỹ thuật Pháp lý Xã hội lịch sử của bất động sản Pháp lý, kinh tế kỹ thuật, xã hội lịch sử của bất động sản<br><br><b>Giải thích học thuật:</b> Người môi giới cần nắm vững cả ba loại thông tin: pháp lý, kinh tế kỹ thuật và xã hội lịch sử của bất động sản. 128. Thù lao môi giới mà tổ chức, cá nhân kinh doanh bất động sản được hưởng vào thời điểm nào sau đây? Khi bắt đầu tìm kiếm khách hàng Khi hoàn thành công việc môi giới theo thỏa thuận trong hợp đồng môi giới Khi khách hàng ký hợp đồng mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản Không có thời điểm nào cụ thể<br><br><b>Giải thích học thuật:</b> Thù lao môi giới được hưởng khi hoàn thành công việc môi giới theo đúng thỏa thuận trong hợp đồng đã ký. 129. Mức thù lao môi giới phụ thuộc vào yếu tố nào sau đây? Phụ thuộc vào giá của giao dịch được môi giới Phụ thuộc vào kết quả giao dịch mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản giữa khách hàng và bên thứ ba Phụ thuộc vào hợp đồng thỏa thuận giữa các bên Không phụ thuộc vào yếu tố nào cả<br><br><b>Giải thích học thuật:</b> Mức thù lao môi giới phụ thuộc vào hợp đồng thỏa thuận giữa các bên, không nhất thiết phụ thuộc vào giá trị giao dịch. 130. Để tăng khả năng thành công khi môi giới, người môi giới cần hiểu khách hàng của mình là ai, theo đó, người môi giới cần: Không để khách hàng nói quá nhiều Nói thật nhiều về dự án cho khách hàng Lắng nghe khách hàng nói Cả A, B và C đều sai<br><br><b>Giải thích học thuật:</b> Để hiểu khách hàng, người môi giới cần chủ động lắng nghe khách hàng nói, đặt câu hỏi để khai thác nhu cầu. 131. Một trong các nguyên nhân chính khiến giao dịch thất bại sau khi thỏa thuận là: Thiếu sự chuẩn bị từ nhà môi giới Không nắm rõ thông tin khách hàng Không hiểu được lợi ích khách hàng mong muốn Tất cả các nguyên nhân trên<br><br><b>Giải thích học thuật:</b> Tất cả các nguyên nhân trên đều có thể dẫn đến thất bại: thiếu chuẩn bị, không nắm thông tin khách hàng, không hiểu lợi ích khách hàng. 132. Khi tiếp xúc, tư vấn khách hàng, người môi giới không nên: Chuẩn bị hồ sơ về sản phẩm Chăm sóc vẻ bề ngoài kỹ lưỡng Nói về một vài hạn chế của sản phẩm Phê phán đối thủ cạnh tranh<br><br><b>Giải thích học thuật:</b> Người môi giới không nên phê phán đối thủ cạnh tranh, điều này làm mất thiện cảm và thiếu chuyên nghiệp 133. Trường hợp chủ đầu tư đã thế chấp nhà ở hình thành trong tương lai tại ngân hàng, trước khi ký hợp đồng mua bán, thuê mua nhà ở đó với khách hàng, phải đáp ứng điều kiện nào sau đây? Phải giải chấp nhà ở trước khi ký hợp đồng huy động vốn, trừ trường hợp bên mua và ngân hàng đồng ý Có văn bản thông báo nhà ở đủ điều kiện được bán của Sở Xây Dựng Miễn là khách hàng đồng ý mua, không cần sự đồng ý của ngân hàng Miễn là ngân hàng chấp thuận cho bên mua nhà khoản tín dụng để mua căn nhà đó<br><br><b>Giải thích học thuật:</b> Phải giải chấp hoặc có sự đồng ý của ngân hàng và có văn bản xác nhận đủ điều kiện bán từ Sở Xây dựng. 134. Tính bất động của BĐS có thể hiểu là: BĐS dù được đem chuyển nhượng, bán nhưng chỉ được quyền sử dụng và khai thác BĐS dù được đem chuyển nhượng, bán nhưng chỉ được quyền sử dụng và khai thác, không thể chuyển BĐS đến nơi khác BĐS dù được đem chuyển nhượng, bán nhưng chỉ được quyền sử dụng và khai thác, không thể mua bán được Cả A, B, C đều sai<br><br><b>Giải thích học thuật:</b> Không thể di dời đến nơi khác. 135. Phạm vi kinh doanh dịch vụ BĐS của tổ chức, cá nhân trong nước; tổ chức, cá nhân nước ngoài: Có quyền kinh doanh các dịch vụ môi giới BĐS, sàn giao dịch BĐS, tư vấn BĐS, quản lý BĐS Chỉ có quyền kinh doanh BĐS và tư vấn BĐS Chỉ có quyền kinh doanh môi giới BĐS Chỉ có quyền kinh doanh tư vấn và quản lý BĐS<br><br><b>Giải thích học thuật:</b> Có quyền kinh doanh đầy đủ các dịch vụ: môi giới, sàn, tư vấn, quản lý. 136. Khi tư vấn đặc điểm BĐS, người môi giới phải cho khách hàng thấy được: Uy tín chủ đầu tư Khả năng tăng giá Lợi ích của sản phẩm Tiến độ thi công<br><br><b>Giải thích học thuật:</b> Phải nhấn mạnh lợi ích của sản phẩm đối với khách hàng. 137. Vai trò của người môi giới BĐS Cung cấp thông tin một cách công khai, trung thực cho các chủ thể tham gia giao dịch Làm cầu nối giữa người mua, người bán & hưởng phí môi giới Bán sản phẩm theo yêu cầu của chủ đầu tư Bán sản phẩm theo yêu cầu của khách hàng<br><br><b>Giải thích học thuật:</b> Cung cấp thông tin trung thực và làm cầu nối giữa các bên 138. Trong môi giới BĐS dự án, tiếp nhận sản phẩm là bước đầu tiên để nhân viên kinh doanh có thể Am hiểu về khách hàng Am hiểu về sản phẩm Am hiểu về chủ đầu tư Am hiểu về đối thủ cạnh tranh<br><br><b>Giải thích học thuật:</b> Tiếp nhận sản phẩm để am hiểu về sản phẩm và chủ đầu tư. 139. Phong cách đàm phán các bên cùng quan tâm đến lợi ích của nhau với tinh thần hợp tác và đều thu được lợi ích là phong cách đàm phán Thua-thua Thắng-thua Thua-thắng Thắng-thắng<br><br><b>Giải thích học thuật:</b> Theo phong cách trên tinh thần win-win 140. Khi chất lượng sản phẩm như nhau thì phải lấy yếu tố nào để cạnh tranh trên thị trường? Thông tin Dịch vụ khách hàng Sản phẩm Cả A, B và C đều sai<br><br><b>Giải thích học thuật:</b> Dịch vụ khách hàng là yếu tố cạnh tranh khi chất lượng sản phẩm tương đương. 141. Chiến lược “Đẩy” áp dụng trong kinh doanh BĐS được hiểu như thế nào? Tìm cách thu phục khách hàng mua sản phẩm Tìm cách đẩy sản phẩm đến các nhà phân phối và khách hàng bằng các chương trình khuyến mãi, quà tặng, chiết khấu hoa hồng. Tìm ra sự nhận biết về thương hiệu và sự hấp dẫn khách hàng bằng sản phẩm khác Cả A, B, C đều đúng<br><br><b>Giải thích học thuật:</b> Chiến lược đẩy là sử dụng khuyến mãi, chiết khấu để đưa sản phẩm đến khách hàng. 142. Một cá nhân có Chứng chỉ hành nghề môi giới bất động sản nhưng không làm việc cho công ty nào, tự đứng ra nhận tiền của khách để tìm nhà giúp họ từ ngày 10/08/2024. Hành vi này có phù hợp với quy định mới không?<br><br><b>Giải thích học thuật:</b> Từ ngày 01/08/2024, Luật Kinh doanh Bất động sản 2023 có hiệu lực, quy định tại Khoản 2, Điều 61 rằng cá nhân hành nghề môi giới bắt buộc phải hoạt động trong một doanh nghiệp kinh doanh dịch vụ BĐS. Hành vi hoạt động độc lập như trên là trái quy định. 143. Yếu tố nào sau đây có ảnh hưởng gián tiếp nhưng lại mang tính quyết định đến sự sôi động hay trầm lắng của nghề môi giới bất động sản trong dài hạn?<br><br><b>Giải thích học thuật:</b> Nghề môi giới BĐS phụ thuộc trực tiếp vào sức khỏe của thị trường BĐS. Mà thị trường BĐS lại chịu ảnh hưởng sâu sắc bởi các yếu tố kinh tế vĩ mô (tăng trưởng GDP, lạm phát, lãi suất...). Khi kinh tế tốt, thị trường sôi động, nghề môi giới phát triển và ngược lại. 144. Nguyên tắc \"Công bằng, minh bạch\" trong hoạt động môi giới đòi hỏi nhà môi giới KHÔNG được làm điều gì?<br><br><b>Giải thích học thuật:</b> Che giấu thông tin, đặc biệt là các thông tin về tài chính, là hành vi đi ngược lại hoàn toàn với nguyên tắc minh bạch. Các hành vi A, C, D đều là biểu hiện của sự công bằng, minh bạch. 145.  Tình huống : Công ty môi giới bất động sản M chỉ có một người duy nhất sở hữu có Chứng chỉ hành nghề môi giới bất động sản. Nếu người này nghỉ việc, công ty M có còn đủ điều kiện kinh doanh dịch vụ môi giới bất động sản theo Luật KD bất động sản 2023 không?<br><br><b>Giải thích học thuật:</b> Theo Điểm c, Khoản 1, Điều 61 Luật Kinh doanh Bất động sản 2023, điều kiện để doanh nghiệp kinh doanh dịch vụ môi giới là \" Có tối thiểu 01 cá nhân có chứng chỉ môi giới bất động sản\". Khi người duy nhất có chứng chỉ nghỉ việc, doanh nghiệp không còn đáp ứng điều kiện này và phải có biện pháp khắc phục. 146.  Tình huống : Chủ đầu tư dự án Y đưa ra mức hoa hồng rất cao..., đồng thời \"gợi ý\" các môi giới nên bỏ qua một vài thông tin chưa thuận lợi về pháp lý... Nhà môi giới nên ứng xử thế nào cho đúng đạo đức?<br><br><b>Giải thích học thuật:</b> Đạo đức nghề nghiệp đòi hỏi nhà môi giới phải trung thực và đặt lợi ích khách hàng lên hàng đầu. Lựa chọn C thể hiện sự cân bằng giữa cơ hội kinh doanh và trách nhiệm đạo đức, đảm bảo khách hàng được cung cấp đầy đủ thông tin để ra quyết định, ngay cả khi thông tin đó bất lợi. 147. Nguyên tắc đạo đức nào đòi hỏi nhà môi giới KHÔNG được phép sử dụng thông tin cá nhân của khách hàng... để phục vụ lợi ích của bản thân hoặc của khách hàng khác?<br><br><b>Giải thích học thuật:</b> Đây là nội dung cốt lõi của nguyên tắc bảo mật. Nhà môi giới có nghĩa vụ giữ bí mật các thông tin nhạy cảm của khách hàng và chỉ sử dụng chúng để phục vụ cho chính giao dịch của khách hàng đó. 148. Tình huống : Doanh nghiệp môi giới bất động sản A có 5 nhân viên, nhưng chỉ có Giám đốc là người duy nhất có Chứng chỉ hành nghề môi giới. Doanh nghiệp A có đáp ứng điều kiện tối thiểu về nhân sự theo Luật KDBĐS 2023 không?<br><br><b>Giải thích học thuật:</b> Theo Điểm c, Khoản 1, Điều 61 Luật Kinh doanh Bất động sản 2023, điều kiện là \" Có tối thiểu 01 cá nhân có chứng chỉ môi giới bất động sản\". Doanh nghiệp A có 1 người (là Giám đốc) sở hữu chứng chỉ, do đó đã đáp ứng điều kiện tối thiểu. 149.  Nguyên tắc hoạt động nào đòi hỏi nhà môi giới phải liên tục cập nhật biến động giá cả, thông tin quy hoạch mới, chính sách tín dụng... để tư vấn cho khách hàng?<br><br><b>Giải thích học thuật:</b> Để duy trì và nâng cao kiến thức chuyên môn, nhà môi giới bắt buộc phải liên tục học hỏi, cập nhật thông tin mới nhất về thị trường và chính sách. Đây là nền tảng để có thể đưa ra những tư vấn chính xác. 150.  Tình huống : Một nhà môi giới phát hiện đồng nghiệp B thường xuyên \"lấy cắp\" khách hàng tiềm năng từ hệ thống CRM chung của công ty để tư lợi cá nhân. Với vai trò đồng nghiệp, hành động nào là phù hợp nhất?<br><br><b>Giải thích học thuật:</b> Đây là cách xử lý chuyên nghiệp và có đạo đức nhất. Nó vừa thể hiện trách nhiệm với công ty, vừa tôn trọng quy trình xử lý nội bộ, tránh gây xung đột cá nhân không cần thiết hoặc làm rối loạn môi trường làm việc. 151. Trong các yếu tố ảnh hưởng gián tiếp đến sự phát triển nghề môi giới, yếu tố nào phản ánh khả năng chi trả và quyết định mua bất động sản của người dân rõ rệt nhất?<br><br><b>Giải thích học thuật:</b> Quyết định mua BĐS phụ thuộc lớn nhất vào \"túi tiền\" của người dân, bao gồm thu nhập họ kiếm được, số tiền họ có thể tiết kiệm (sức mua) và khả năng vay vốn từ ngân hàng. Khi các yếu tố này tích cực, nhu cầu mua nhà sẽ tăng. 152.  Yếu tố \"sự phát triển của thị trường tài chính\" ảnh hưởng đến nghề môi giới bất động sản như thế nào?<br><br><b>Giải thích học thuật:</b> Thị trường tài chính phát triển (đặc biệt là tín dụng bất động sản) giúp nhiều người có đủ khả năng mua nhà hơn, làm tăng tổng cầu và sự sôi động của thị trường. Điều này trực tiếp tạo thêm việc làm cho nhà môi giới. 153.  Yếu tố nào sau đây KHÔNG ảnh hưởng trực tiếp đến mức phí hoa hồng môi giới bất động sản?<br><br><b>Giải thích học thuật:</b> Mức phí hoa hồng là một thỏa thuận dân sự, được xác định bởi các yếu tố A, B, D. Việc nhà môi giới có chứng chỉ hay không là điều kiện để hành nghề hợp pháp, ảnh hưởng đến uy tín nhưng không phải là yếu tố trực tiếp để tính toán ra con số hoa hồng cuối cùng. 154. Tình huống: Nhà môi giới A đang làm việc với khách hàng B (người mua). Khách hàng B bày tỏ lo ngại về vấn đề tài chính và hỏi liệu có thể \"lách\" một số quy định để được vay vốn dễ dàng hơn không. Nhà môi giới A nên:<br><br><b>Giải thích học thuật:</b> Đây là cách xử lý chuyên nghiệp và có đạo đức nhất. Nó vừa thể hiện sự tuân thủ pháp luật, vừa giữ được khách hàng bằng cách cung cấp giải pháp tư vấn có giá trị và hợp pháp. 155.  “Chiến lược đẩy” (Push Strategy) trong marketing BĐS là:<br><br><b>Giải thích học thuật:</b> Trong Marketing, \"Chiến lược đẩy\" là việc doanh nghiệp tìm cách đưa sản phẩm của mình hướng về phía người tiêu dùng thông qua các đại lý, sàn liên kết hoặc đội ngũ môi giới. Để kích thích hệ thống này hoạt động mạnh mẽ, chủ đầu tư sử dụng các công cụ \"đẩy\" như chính sách thưởng, tăng tỷ lệ hoa hồng cao và các chương trình khuyến mãi lớn cho hệ thống phân phối. 156. Tình huống: Doanh nghiệp môi giới bất động sản B sử dụng Chứng chỉ hành nghề môi giới bất động sản của nhân viên C (đã nghỉ việc) để đăng ký hoạt động. Hành vi này có vi phạm pháp luật không?<br><br><b>Giải thích học thuật:</b> Đây là hành vi gian lận để đối phó với quy định của pháp luật (sử dụng chứng chỉ không đúng người, không còn người đủ điều kiện làm việc). Điều kiện kinh doanh yêu cầu phải có nhân viên thực tế làm việc tại công ty sở hữu chứng chỉ. Sử dụng chứng chỉ của người đã nghỉ việc là vi phạm nghiêm trọng. 157. Kỹ thuật phản hồi & tóm lược (Active Listening & Summarizing) trong giao tiếp giúp môi giới:<br><br><b>Giải thích học thuật:</b> Khi lắng nghe khách hàng chia sẻ, việc lặp lại và tóm lược lại các ý chính bằng câu hỏi xác nhận (Ví dụ: \"Có phải anh/chị đang tìm kiếm một căn hộ 2 phòng ngủ, hướng Đông để đón nắng sớm và tài chính dưới 3 tỷ đúng không ạ?\") giúp môi giới kiểm tra xem mình đã hiểu đúng nhu cầu chưa, đồng thời khiến khách hàng cảm thấy được tôn trọng, từ đó dễ dàng đạt được sự đồng thuận trong các bước tư vấn tiếp theo. 158.  Nhà môi giới có nên giữ bản gốc Giấy chứng nhận (GCN - Sổ hồng /Sổ đỏ) của khách hàng không?<br><br><b>Giải thích học thuật:</b> Giấy chứng nhận là giấy tờ pháp lý quan trọng nhất của bất động sản. Việc môi giới giữ bản gốc có thể gây ra nhiều rủi ro pháp lý cho cả khách hàng và môi giới (mất mát, lạm dụng). Nguyên tắc chuyên nghiệp là chỉ xem để đối chiếu, chụp lại và trả ngay cho chủ sở hữu. 159.  Để trở thành một nhà môi giới BĐS chuyên nghiệp, cá nhân phải:<br><br><b>Giải thích học thuật:</b> Theo Điều 61 và Điều 68 Luật Kinh doanh bất động sản 2023, cá nhân hành nghề môi giới BĐS phải có chứng chỉ hành nghề, phải qua đào tạo sát hạch. Về mặt chuyên môn, BĐS là tài sản có giá trị rất lớn, một môi giới chuyên nghiệp bắt buộc phải có kiến thức tổng hợp: nắm rõ Pháp lý để bảo vệ khách hàng, am hiểu Tài chính để tư vấn dòng tiền và sở hữu kỹ năng Giao tiếp tốt để kết nối và xây dựng niềm tin. 160. Khi người bán muốn giá 2 tỷ, người mua trả 1.9 tỷ, chiến thuật nào KHÔNG phù hợp để môi giới thu hẹp khoảng cách?<br><br><b>Giải thích học thuật:</b> Vai trò của môi giới là trung gian, dung hòa lợi ích. Việc \"ép\" một bên (ở đây là khách hàng của mình - người bán) bằng cách nhấn vào điểm yếu của sản phẩm là hành vi thiếu chuyên nghiệp, có thể phá vỡ lòng tin và đi ngược lại lợi ích của khách hàng mà mình đang đại diện. 161. Khi mua nhà ở hình thành trong tương lai, người mua cần đặc biệt chú ý kiểm tra giấy tờ pháp lý nào của dự án?<br><br><b>Giải thích học thuật:</b> Đây là bộ ba giấy tờ pháp lý quan trọng nhất chứng minh dự án hợp pháp và đủ điều kiện để mở bán theo Điều 24 Luật Kinh doanh BĐS 2023 và Điều 55 Luật Nhà ở 2023. Bảo lãnh ngân hàng đảm bảo quyền lợi cho người mua trong trường hợp chủ đầu tư không bàn giao nhà đúng hẹn. 162.  Theo các nghiên cứu về tâm lý học hành vi, khách hàng mua nhà thường quyết định dựa trên:<br><br><b>Giải thích học thuật:</b> BĐS không chỉ là một tài sản vật chất mà đối với nhiều người, đó là \"tổ ấm\", là nơi thể hiện đẳng cấp hay sự an tâm cho gia đình. Do đó, các nghiên cứu tâm lý hành vi chỉ ra rằng cảm xúc (sự yêu thích không gian sống, niềm tin vào môi giới, cảm giác an tâm, niềm tự hào khi sở hữu...) chiếm đến khoảng 70% trong trọng số quyết định mua, lý trí chỉ đóng vai trò hợp thức hóa cho lựa chọn bằng cảm xúc đó. 163. Mạng xã hội KHÔNG thể giúp nhà môi giới bất động sản trong hoạt động nào sau đây?<br><br><b>Giải thích học thuật:</b> Việc đăng ký quyền sở hữu (làm sổ hồng) là một thủ tục hành chính, phải được thực hiện trực tiếp tại cơ quan nhà nước có thẩm quyền (Văn phòng đăng ký đất đai), không thể thực hiện qua mạng xã hội. 164. Nhà môi giới nên làm gì khi khách hàng đưa ra một mức giá đề nghị (offer) thấp hơn đáng kể so với giá chào bán?<br><br><b>Giải thích học thuật:</b> Vai trò của môi giới là người truyền tin và trung gian đàm phán. Mọi đề nghị của khách hàng, dù cao hay thấp, đều cần được tiếp nhận và trình bày lại một cách trung thực cho bên còn lại. 165. Áp dụng \"Chiến thuật cộng trong đàm phán\" nhằm thuyết phục người mua tăng giá dựa trên việc nêu bật yếu tố nào?<br><br><b>Giải thích học thuật:</b> Chiến thuật \"cộng\" là việc liên tục bổ sung, nhấn mạnh các giá trị, ưu điểm, lợi ích của sản phẩm để làm cho mức giá chào bán có vẻ hợp lý và xứng đáng hơn trong mắt người mua. 166. Trong các loại tranh chấp bất động sản, loại nào thường phức tạp và khó giải quyết nhất liên quan đến yếu tố lịch sử và tình cảm?<br><br><b>Giải thích học thuật:</b> Tranh chấp thừa kế thường liên quan đến nhiều thế hệ, có yếu tố lịch sử phức tạp và bị chi phối nặng nề bởi tình cảm, quan hệ gia đình, khiến việc giải quyết trở nên khó khăn hơn nhiều so với các tranh chấp thuần túy về kỹ thuật hay tài chính. 167. Ông Nam chưa có nhà ở, đang chuẩn bị mua một căn nhà với một khoản vay trả góp từ ngân hàng, và đang yêu cầu thẩm định căn nhà định mua đó. Việc thẩm định này có ý nghĩa gì thiết thực nhất cho ông Nam?<br><br><b>Giải thích học thuật:</b> Đối với người vay vốn, kết quả thẩm định của ngân hàng có ý nghĩa quyết định. Nếu giá trị thẩm định thấp, ngân hàng sẽ cho vay ít đi, thậm chí từ chối cho vay nếu tài sản không đủ điều kiện làm tài sản bảo đảm. 168. Khi gặp một khách hàng có kiến thức sâu về bất động sản và thị trường, nhà môi giới nên thể hiện vai trò của mình như thế nào?<br><br><b>Giải thích học thuật:</b> Cách tiếp cận chuyên nghiệp là biến cuộc trao đổi thành một buổi thảo luận giữa hai chuyên gia. Nhà môi giới nên tập trung vào việc cung cấp các giá trị mà mình có lợi thế hơn, ví dụ: thông tin nội bộ, các mối quan hệ, kinh nghiệm xử lý thủ tục... 169. Đâu là giới hạn của việc sử dụng AI trong định giá bất động sản?<br><br><b>Giải thích học thuật:</b> AI rất mạnh trong việc phân tích dữ liệu có cấu trúc, nhưng giá trị BĐS còn phụ thuộc vào nhiều yếu tố phi cấu trúc, mang tính đặc thù hoặc tâm lý mà chỉ chuyên gia con người mới có thể đánh giá chính xác. 170. Tình huống : Nhà môi giới A đang dẫn khách xem một căn nhà. Khách hàng rất thích vị trí nhưng chê bai gay gắt về thiết kế nội thất đã lỗi thời và tuyên bố chỉ mua nếu chủ nhà giảm giá mạnh để họ sửa chữa. Nhà môi giới biết chủ nhà là người lớn tuổi, rất yêu quý căn nhà và không muốn giảm giá. Hướng xử lý nào thể hiện kỹ năng đàm phán và tâm lý tốt nhất?<br><br><b>Giải thích học thuật:</b> Đây là kỹ năng xử lý từ chối và đàm phán bậc cao. Bằng cách đồng cảm (không đồng tình), nhà môi giới giữ được thiện cảm của người mua, sau đó cân bằng lại bằng cách nêu các ưu điểm khác để bảo vệ giá trị của BĐS, từ đó tạo ra cơ sở cho một cuộc thương lượng công bằng. 171. Tình huống : Khách hàng B (người mua) rất muốn mua căn hộ X nhưng còn thiếu khoảng 10% tài chính, đang chờ người thân gửi tiền về trong 1 tháng tới. Người bán cần bán gấp trong 2 tuần. Nhà môi giới nên tư vấn cho khách hàng B giải pháp nào khả thi và ít rủi ro nhất?<br><br><b>Giải thích học thuật:</b> Vai trò của môi giới là tìm ra giải pháp cho cả hai bên. Việc trao đổi cởi mở và đề xuất một phương án thương lượng có các biện pháp đảm bảo (ví dụ: tăng tiền cọc, chịu phạt nếu trễ hạn...) là cách tốt nhất để cố gắng dung hòa nhu cầu của cả người mua và người bán. 172. Tình huống: Trong quá trình đàm phán, bên mua (khách hàng của môi giới F) bất ngờ thay đổi thái độ, tỏ ra không còn hứng thú và muốn rút lui dù trước đó rất nhiệt tình. Nhà môi giới F nên làm gì đầu tiên?<br><br><b>Giải thích học thuật:</b> Trước khi hành động, cần phải chẩn đoán đúng vấn đề. Việc tìm hiểu nguyên nhân gốc rễ sẽ giúp nhà môi giới biết được liệu vấn đề có thể được giải quyết hay không và nên hành động như thế nào tiếp theo. 173. Tiêu đề của một bài quảng cáo BĐS hiệu quả cần phải:<br><br><b>Giải thích học thuật:</b> Giữa hàng ngàn thông tin quảng cáo mỗi ngày, tiêu đề là yếu tố quyết định khách hàng có dừng lại để đọc tiếp hay không. Tiêu đề xuất sắc phải đánh trúng lợi ích cốt lõi mà khách hàng nhận được hoặc nêu bật được USP (Unique Selling Proposition) – điểm khác biệt độc nhất của sản phẩm so với đối thủ cạnh tranh. 174. Một nhà môi giới bất động sản có được sử dụng thông tin của doanh nghiệp mình đang làm việc cung cấp cho đối tác khác vì mục đích cá nhân không? 175. Nếu một tài sản bất động sản có một nhược điểm hoặc đặc điểm hiển nhiên ảnh hưởng đến quá trình sử dụng, nhà môi giới phải xử lý ra sao? 176. Sự phát triển của công nghệ số và các nền tảng trực tuyến ảnh hưởng như thế nào đến nghề môi giới bất động sản?<br><br><b>Giải thích học thuật:</b> Công nghệ giúp môi giới tiếp cận khách hàng nhanh hơn thông qua website, mạng xã hội, dữ liệu thị trường và nền tảng giao dịch trực tuyến. Đồng thời, việc công khai thông tin giúp nâng cao tính minh bạch và chuyên nghiệp của nghề môi giới. 177. Thị trường bất động sản minh bạch sẽ tác động như thế nào đến nghề môi giới bất động sản?<br><br><b>Giải thích học thuật:</b> Khi thị trường minh bạch, khách hàng sẽ tin tưởng hơn vào thông tin giao dịch và dịch vụ môi giới. Điều này tạo điều kiện cho các môi giới có năng lực và đạo đức nghề nghiệp phát triển lâu dài. 178. Yếu tố kinh tế vĩ mô nào dưới đây có thể ảnh hưởng mạnh đến hoạt động môi giới bất động sản?<br><br><b>Giải thích học thuật:</b> Lãi suất và chính sách tín dụng ảnh hưởng trực tiếp đến khả năng vay vốn của nhà đầu tư và người mua nhà. Khi lãi suất thấp, nhu cầu giao dịch tăng, kéo theo hoạt động môi giới phát triển mạnh hơn. 179. Điểm nổi bật trong quản lý hoạt động môi giới bất động sản tại Singapore là gì?<br><br><b>Giải thích học thuật:</b> Singapore quản lý rất chặt hoạt động môi giới thông qua cơ chế cấp phép, đào tạo và kiểm soát đạo đức nghề nghiệp. Môi giới phải đáp ứng điều kiện chuyên môn trước khi hành nghề. 180. Ở nhiều quốc gia phát triển, việc bắt buộc môi giới bất động sản tham gia đào tạo định kỳ nhằm mục đích gì?<br><br><b>Giải thích học thuật:</b> Nhiều quốc gia như Hoa Kỳ, Singapore, Úc yêu cầu môi giới tham gia các khóa đào tạo liên tục (Continuing Education) để cập nhật quy định pháp luật, kỹ năng nghề nghiệp và xu hướng thị trường nhằm bảo vệ quyền lợi khách hàng. 181. Tại các nước phát triển, yếu tố nào được xem là nền tảng giúp nghề môi giới bất động sản phát triển bền vững?<br><br><b>Giải thích học thuật:</b> Ở các quốc gia phát triển, nghề môi giới được xây dựng dựa trên nguyên tắc minh bạch thông tin, bảo vệ khách hàng và tuân thủ đạo đức nghề nghiệp. Điều này giúp tạo niềm tin cho thị trường và hạn chế tranh chấp. 182. Bài học kinh nghiệm quan trọng mà Việt Nam có thể học hỏi từ các nước phát triển về nghề môi giới bất động sản là gì?<br><br><b>Giải thích học thuật:</b> Kinh nghiệm từ Hoa Kỳ, Singapore, Úc cho thấy việc chuẩn hóa nghề môi giới thông qua đào tạo, thi sát hạch, cấp chứng chỉ và kiểm soát đạo đức nghề nghiệp giúp thị trường vận hành minh bạch, chuyên nghiệp và bền vững hơn. 183. Trong một thương vụ môi giới bất động sản, bước đầu tiên mà môi giới cần thực hiện là gì?<br><br><b>Giải thích học thuật:</b> Đây là bước nền tảng trong quy trình môi giới nhằm xác định nhu cầu thực tế của khách hàng và kiểm tra thông tin pháp lý, hiện trạng, giá cả của bất động sản trước khi tư vấn hoặc giao dịch. 184. Sau khi tiếp nhận thông tin bất động sản, môi giới cần ưu tiên thực hiện công việc nào dưới đây?<br><br><b>Giải thích học thuật:</b> Môi giới cần xác minh giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản, quy hoạch, tình trạng tranh chấp… để đảm bảo bất động sản đủ điều kiện giao dịch. 185. Trong thương vụ môi giới bất động sản, thời hạn thực hiện môi giới thường được xác định dựa trên yếu tố nào?<br><br><b>Giải thích học thuật:</b> Thời hạn môi giới là khoảng thời gian môi giới được quyền thực hiện hoạt động tìm kiếm khách hàng, hỗ trợ giao dịch và hưởng thù lao/hoa hồng theo thỏa thuận. 186. Bước nào dưới đây thường diễn ra sau khi môi giới tìm được khách hàng phù hợp?<br><br><b>Giải thích học thuật:</b> Vai trò quan trọng của môi giới là kết nối các bên, hỗ trợ trao đổi thông tin, thương lượng giá cả, điều kiện giao dịch và thúc đẩy ký kết hợp đồng. 187. Khi thương vụ môi giới hoàn thành thành công, môi giới thường được hưởng quyền lợi nào?<br><br><b>Giải thích học thuật:</b> Khi môi giới hoàn thành công việc theo hợp đồng và giao dịch thành công, môi giới có quyền nhận phí môi giới hoặc hoa hồng theo tỷ lệ/thỏa thuận đã ký. 188. Trong quá trình thực hiện thương vụ môi giới, hành vi nào dưới đây là không phù hợp với nguyên tắc hành nghề?<br><br><b>Giải thích học thuật:</b> Môi giới phải hoạt động trung thực, minh bạch và bảo vệ quyền lợi hợp pháp của khách hàng. Việc che giấu thông tin tranh chấp có thể gây thiệt hại cho khách hàng và phát sinh trách nhiệm pháp lý. 189. Anh An chuẩn bị ký hợp đồng đặt cọc mua nhà với chị Bé. Tuy nhiên, trong dự thảo hợp đồng chỉ ghi tên gọi thông thường của các bên mà không ghi đầy đủ số CCCD, địa chỉ thường trú và thông tin pháp lý liên quan. Theo kỹ năng soạn thảo hợp đồng, môi giới nên tư vấn như thế nào?<br><br><b>Giải thích học thuật:</b> Thông tin chủ thể là căn cứ xác định quyền và nghĩa vụ pháp lý của các bên. Thiếu thông tin có thể gây khó khăn khi giải quyết tranh chấp hoặc thực hiện thủ tục pháp lý sau này. 190. Một hợp đồng thuê nhà ghi điều khoản thanh toán như sau: “Bên thuê thanh toán tiền vào thời gian phù hợp”. Sau đó hai bên xảy ra tranh chấp vì hiểu khác nhau về thời hạn thanh toán. Nguyên nhân chính của tranh chấp là gì?<br><br><b>Giải thích học thuật:</b> Điều khoản mơ hồ sẽ dẫn đến nhiều cách hiểu khác nhau, làm phát sinh tranh chấp trong quá trình thực hiện hợp đồng. 191. Anh Minh ký hợp đồng mua căn hộ nhưng trong hợp đồng không ghi rõ thời hạn thanh toán từng đợt. Sau đó bên bán yêu cầu thanh toán sớm hơn dự kiến và phát sinh tranh chấp. Môi giới cần rút kinh nghiệm gì khi soạn hợp đồng?<br><br><b>Giải thích học thuật:</b> Điều khoản thanh toán là nội dung quan trọng để xác định nghĩa vụ tài chính của các bên và hạn chế tranh chấp. 192. Một nhân viên kinh doanh ký hợp đồng chuyển nhượng thay giám đốc công ty nhưng không có giấy ủy quyền hợp lệ. Sau đó công ty từ chối trách nhiệm với hợp đồng này. Nguyên nhân chính là gì?<br><br><b>Giải thích học thuật:</b> Người ký hợp đồng phải có thẩm quyền đại diện hoặc được ủy quyền hợp pháp, nếu không hợp đồng có thể bị vô hiệu hoặc không ràng buộc trách nhiệm pháp lý. 193. Anh Tí và chị Khờ ký giấy tay chuyển nhượng quyền sử dụng đất nhưng không thực hiện công chứng. Sau đó xảy ra tranh chấp về quyền sở hữu. Theo quy định pháp luật, vấn đề lớn nhất của hợp đồng này là gì?<br><br><b>Giải thích học thuật:</b> Đối với chuyển nhượng quyền sử dụng đất, công chứng/chứng thực là điều kiện quan trọng để đảm bảo hiệu lực pháp lý và thực hiện thủ tục sang tên. 194. Nội dung nào sau đây là yêu cầu bắt buộc khi môi giới thực hiện marketing, quảng cáo bất động sản theo Luật Kinh doanh Bất động sản 2023?<br><br><b>Giải thích học thuật:</b> Điều 6 Luật Kinh doanh BĐS 2023 quy định về sự trung thực trong thông tin. 195. Công ty A là chủ đầu tư dự án khu đô thị mới. Trước khi đưa các căn hộ chung cư vào kinh doanh, Công ty A có trách nhiệm phải công khai thông tin về dự án. Theo Luật Kinh doanh bất động sản hiện hành, Công ty A phải công khai thông tin này ở đâu là bắt buộc?<br><br><b>Giải thích học thuật:</b> Theo Điều 6 Luật Kinh doanh bất động sản 2023, trước khi đưa bất động sản vào kinh doanh, chủ đầu tư bắt buộc phải công khai đầy đủ các thông tin về dự án trên hệ thống thông tin về nhà ở và thị trường bất động sản của cơ quan nhà nước và trên trang thông tin điện tử (website) của chính doanh nghiệp. 196. Trong quá trình thực hiện dự án, Công ty B có sự thay đổi về số lượng căn hộ được phép bán do điều chỉnh quy hoạch chi tiết 1/500 từ cơ quan thẩm quyền. Công ty B phải xử lý thông tin đã công khai trước đó như thế nào?<br><br><b>Giải thích học thuật:</b> Khoản 3 Điều 6 Luật Kinh doanh bất động sản quy định rất rõ: Trường hợp thông tin đã công khai có sự thay đổi thì phải được cập nhật kịp thời, đầy đủ nội dung thay đổi trên hệ thống thông tin và trang điện tử của doanh nghiệp để đảm bảo tính trung thực và minh bạch cho khách hàng. 197.  Ông M muốn thành lập một Sàn giao dịch bất động sản quy mô nhỏ. Ông M cho rằng chỉ cần được cấp Giấy chứng nhận đăng ký doanh nghiệp có ngành nghề kinh doanh dịch vụ BĐS là sàn có thể chính thức đi vào hoạt động độc lập. Nhận định của ông M có chính xác không?<br><br><b>Giải thích học thuật:</b> Theo Điều 55 Điều kiện hoạt động của Sàn Giao Dịch BĐS trong Luật Kinh doanh bất động sản 2023 198. Theo quy định của Luật Kinh doanh bất động sản hiện hành, việc tổ chức kinh doanh bất động sản (như chủ đầu tư bán, cho thuê mua nhà ở hình thành trong tương lai) có bắt buộc phải thực hiện thông qua sàn giao dịch bất động sản hay không?<br><br><b>Giải thích học thuật:</b> Theo quy định của Luật Kinh doanh bất động sản 2023, việc chủ đầu tư bán, cho thuê mua nhà ở hoặc công trình xây dựng hình thành trong tương lai không bắt buộc phải thông qua sàn giao dịch bất động sản. Tổ chức, cá nhân kinh doanh bất động sản có thể lựa chọn 2 hình thức sau: Tự thực hiện: Trực tiếp bán, cho thuê, cho thuê mua bất động sản của mình. Thông qua sàn giao dịch: Ủy quyền cho Sàn giao dịch bất động sản để bán, cho thuê mua. Luật hiện hành chỉ mang tính chất khuyến khích các chủ đầu tư giao dịch qua sàn nhằm tăng tính minh bạch, chứ không áp đặt quy định bắt buộc như các giai đoạn trước đây. 199.  Sàn giao dịch bất động sản Y đứng ra làm đại lý phân phối sản phẩm cho một dự án căn hộ. Trong quy chế hoạt động niêm yết tại sàn, Sàn Y ghi rõ: \"Sàn giao dịch có quyền chủ động quyết định thay đổi giá bán công bố và các chính sách ưu đãi của chủ đầu tư tùy thuộc vào lượng khách hàng thực tế\". Quy định này của Sàn Y có hợp pháp không?<br><br><b>Giải thích học thuật:</b> Sàn giao dịch bất động sản đóng vai trò là đơn vị trung gian kết nối. Theo quy định về nguyên tắc hoạt động, sàn giao dịch phải công khai thông tin và thực hiện giao dịch đúng mức giá do chủ sở hữu, chủ đầu tư bất động sản đưa ra; sàn không được tự ý nâng giá, ép giá hoặc sửa đổi chính sách giá của chủ sở hữu nhằm lũng đoạn thị trường hoặc trục lợi bất chính. 200. Hoạt động quản lý sàn giao dịch bất động sản được thực hiện thông qua 4 chức năng cốt lõi nào dưới đây?<br><br><b>Giải thích học thuật:</b> Đây là 4 chức năng cơ bản của quy trình quản trị (Management Functions) được áp dụng phổ biến trong việc điều hành một tổ chức hoặc doanh nghiệp, bao gồm cả Sàn giao dịch bất động sản. Nhà quản lý sàn phải đi từ khâu Hoạch định (lập mục tiêu, chiến lược) -> Tổ chức (sắp xếp bộ máy, phân bổ nguồn lực) -> Điều khiển (lãnh đạo, thúc đẩy nhân sự hành động) -> Kiểm tra (đo lường kết quả và điều chỉnh sai lệch). các đáp án còn lại chỉ là cách gọi biến tấu hoặc là các khâu nhỏ nằm trong 4 chức năng chính này."}];
        let quizData = [];
        let currentIndex = 0;

        window.onload = function() {
            if(!allData || allData.length === 0) {
                document.getElementById("quiz-container").innerHTML = "<h3 style='color:red; text-align:center;'>Lỗi: Không có dữ liệu câu hỏi!</h3>";
                return;
            }
            quizData = getSampledQuestions(100);
            renderQuestion();
        };

        // Thuật toán lấy mẫu 100 câu theo Thang đo Bloom
        function getSampledQuestions(count) {
            const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
            const filterLvl = (l) => allData.filter(q => String(q.level) === String(l));
            
            let p1 = shuffle(filterLvl("1")); let p2 = shuffle(filterLvl("2"));
            let p3 = shuffle(filterLvl("3")); let p4 = shuffle(filterLvl("4")); let p5 = shuffle(filterLvl("5"));

            let n1 = Math.round(count * 0.25); let n2 = Math.round(count * 0.25);
            let n3 = Math.round(count * 0.20); let n4 = Math.round(count * 0.20);
            let n5 = count - (n1 + n2 + n3 + n4);

            let selected = [ ...p1.splice(0, n1), ...p2.splice(0, n2), ...p3.splice(0, n3), ...p4.splice(0, n4), ...p5.splice(0, n5) ];

            if(selected.length < count) {
                let remain = shuffle([...p1, ...p2, ...p3, ...p4, ...p5]);
                selected = [...selected, ...remain.splice(0, count - selected.length)];
            }
            return shuffle(selected);
        }

        // Render câu hỏi lên màn hình
        function renderQuestion() {
            const q = quizData[currentIndex];
            const isMulti = q.content.includes("[*]");
            document.getElementById("progress-text").innerText = `Câu ${currentIndex + 1} / ${quizData.length}`;
            
            let optHtml = "";
            let hasOptions = false;
            
            ['A','B','C','D'].forEach(lbl => {
                if(q.options && q.options[lbl]) {
                    hasOptions = true;
                    optHtml += `
                        <label class="option-item" id="label-${lbl}">
                            <input type="${isMulti ? 'checkbox' : 'radio'}" name="q_opt" value="${lbl}" onchange="updateSelection()">
                            <b>${lbl}.</b> ${q.options[lbl]}
                        </label>`;
                }
            });

            if(!hasOptions) {
                optHtml = "<div style='color:red; background:#ffebee; padding:10px; border-radius:5px;'><i>⚠️ Lỗi: Không trích xuất được đáp án. Trong Word, anh hãy tự gõ A., B., C., D. (tắt tính năng đánh số tự động).</i></div>";
            }

            document.getElementById("quiz-container").innerHTML = `
                <div class="card">
                    <div class="q-meta">MỨC ĐỘ THỬ THÁCH: ${q.level || '1'}</div>
                    <div class="q-text">${q.content.replace(/\[\*\]/g, "").replace(/\n/g, '<br>')}</div>
                    <div class="options">${optHtml}</div>
                    
                    <button id="btn-check" class="btn-check-inline" onclick="checkAnswer()">Kiểm tra đáp án</button>
                    
                    <div id="exp-box" class="exp-box"></div>
                </div>`;
            window.scrollTo(0,0);
        }

        // Cập nhật viền xanh khi chạm chọn đáp án
        function updateSelection() {
            document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
            document.querySelectorAll('input:checked').forEach(el => el.parentElement.classList.add('selected'));
        }

        // Xử lý logic Nút Kiểm Tra
        function checkAnswer() {
            const q = quizData[currentIndex];
            const box = document.getElementById("exp-box");
            const btn = document.getElementById("btn-check");
            
            // Gom các đáp án đã chọn
            const checkedInputs = document.querySelectorAll('input[name="q_opt"]:checked');
            const selectedVals = Array.from(checkedInputs).map(i => i.value).sort().join(",");
            
            if (!selectedVals) {
                alert("⚠️ Vui lòng chọn một phương án trước khi kiểm tra!");
                return;
            }

            // Ẩn nút kiểm tra, hiện Box giải thích
            btn.style.display = "none";
            box.style.display = "block";

            let resultTitle = "";
            // Kiểm tra đúng sai
            if (selectedVals === q.answer) {
                resultTitle = `<div class="result-title" style="color: var(--success);">✔ CHÍNH XÁC!</div>`;
                box.style.borderLeftColor = "var(--success)";
            } else {
                resultTitle = `<div class="result-title" style="color: var(--error);">✘ SAI RỒI! (Bạn chọn: ${selectedVals})</div>`;
                box.style.borderLeftColor = "var(--error)";
            }

            // Tô màu các lựa chọn A, B, C, D
            ['A','B','C','D'].forEach(lbl => {
                const el = document.getElementById(`label-${lbl}`);
                if(!el) return;
                
                // Tô xanh đáp án đúng của hệ thống
                if(q.answer.includes(lbl)) {
                    el.classList.add('correct-ans');
                } 
                // Tô đỏ đáp án sai mà người dùng chọn
                else if(selectedVals.includes(lbl)) {
                    el.classList.add('wrong-ans');
                }
                
                // Vô hiệu hóa input để không cho click đổi nữa
                const input = el.querySelector('input');
                if(input) input.disabled = true;
            });

            // Gắn nội dung vào Box
            box.innerHTML = `
                ${resultTitle}
                <div style="margin-bottom:12px; font-size:1.05em;"><b>Đáp án đúng:</b> <span style="color:var(--success); font-weight:bold">${q.answer}</span></div>
                <div>${q.explanation || "<i>Hệ thống chưa cập nhật giải thích cho câu này.</i>"}</div>
            `;

            // Tự động cuộn mượt mà xuống phần giải thích
            box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Điều hướng câu hỏi
        function nextQ() { if(currentIndex < quizData.length-1) { currentIndex++; renderQuestion(); } }
        function prevQ() { if(currentIndex > 0) { currentIndex--; renderQuestion(); } }
    </script>

": "1", "content": "Nhu cầu của con người có đặc điểm:", "options": {"A": "Đa dạng, phong phú và luôn biến đổi", "B": "Đa dạng và luôn cố định", "C": "Cụ thể và luôn biến đổi.", "D": "Tất cả đều sai."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Các trường hợp phát triển nhà ở bao gồm:", "options": {"A": "Nhà ở thương mại, nhà ở riêng lẻ, nhà ở công vụ", "B": "Nhà ở thương mại, nhà ở xã hộ, nhà ở công vụ", "C": "Nhà ở riêng lẻ, nhà ở xã hội, nhà ở công vụ", "D": "Nhà ở thương mại, nhà ở riêng lẻ, nhà ở xã hội và nhà ở công vụ"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nếu vi phạm quy định về địa điểm hoạt động của sàn giao dịch bất động sản hoặc thay đổi địa chỉ giao dịch mà không thông báo cho cơ quan nhà nước có thẩm quyền theo quy định thì bị phạt tiền?", "options": {"A": "Từ 20.000.000 đồng đến 30.000.000 đồng", "B": "Từ 30.000.000 đồng đến 50.000.000 đồng", "C": "Từ 80.000.000 đồng đến 100.000.000 đồng", "D": "Từ 120.000.000 đồng đến 160.000.000 đồng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Thị trường bất động sản phân theo cấp độ tham gia vào thị trường thì thị trường cấp 1 được hiểu là:", "options": {"A": "Thị trường sơ cấp", "B": "Thị trường giao dịch giữa cơ quan quản lý, người đầu tư xây dựng bất động sản với các tổ chức dịch vụ, hoặc người sử dụng bất động sản để bán, cho thuê hoặc sử dụng..", "C": "Cả A và B đều đúng", "D": "Cả A và B đều sai"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nếu thực hiện giao dịch mua bán, chuyển nhượng, cho thuê, cho thuê mua bất động sản qua sàn giao dịch bất động sản không đúng trình tự, thủ tục quy định hoặc khi bất động sản chưa đủ điều kiện giao dịch qua sàn giao dịch bất động sản theo quy định thì bị phạt tiền?", "options": {"A": "Từ 20.000.000 đồng đến 30.000.000 đồng", "B": "Từ 50.000.000 đồng đến 60.000.000 đồng", "C": "Từ 120.000.000 đồng đến 160.000.000 đồng", "D": "Từ 200.000.000 đồng đến 250.000.000 đồng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Đâu là sai lầm thường gặp khi gửi email cho khách hàng?", "options": {"A": "Sai chính tả", "B": "Xưng hô không phù hợp", "C": "Dùng từ sai", "D": "Tất cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Đối với hành vi không đủ số người có chứng chỉ môi giới bất động sản theo quy định thì bị phạt tiền?", "options": {"A": "Từ 20.000.000 đồng đến 40.000.000 đồng", "B": "Từ 50.000.000 đồng đến 80.000.000 đồng", "C": "Từ 90.000.000 đồng đến 110.000.000 đồng", "D": "Từ 120.000.000 đồng đến 160.000.000 đồng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nguyên tắc quan trọng khi viết thư chào bán bất động sản là gì?", "options": {"A": "Ca ngợi vai trò của khách hàng", "B": "Sử dụng thuật ngữ chuyên môn", "C": "Nhấn mạnh đặc điểm nổi trội của sản phẩm trên thị trường", "D": "Tất cả đều sai."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Người hành nghề môi giới cho người khác mượn hoặc thuê chứng chỉ hành nghề sẽ bị xử lý như thế nào?", "options": {"A": "Chỉ bị nhắc nhở phê bình.", "B": "Phạt tiền và tước quyền sử dụng chứng chỉ hành nghề từ 03 đến 06 tháng.", "C": "Bị thu hồi chứng chỉ vĩnh viễn ngay lập tức.", "D": "Không bị xử phạt nếu không gây hậu quả."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Hợp đồng đặt cọc theo quy định có bắt buộc phải công chứng không?", "options": {"A": "Có", "B": "Không", "C": "Tùy từng giao dịch", "D": "Chỉ có tài sản hình thành trong tương lai là bắt buộc."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Điều kiện có hiệu lực của giao dịch dân sự", "options": {"A": "Người tham gia giao dịch có năng lực hành vi dân sự; Người tham gia giao dịch hoàn toàn tự nguyện.", "B": "Mục đích và nội dung của giao dịch không vi phạm điều cấm của pháp luật, không trái đạo đức xã hội;", "C": "Hình thức giao dịch dân sự là điều kiện có hiệu lực của giao dịch trong trường hợp pháp luật có quy định.", "D": "Đáp án A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nếu sàn giao dịch bất động sản hoạt động không đúng quy chế hoạt động đã đăng ký với Sở Xây dựng thì bị phạt tiền?", "options": {"A": "Từ 40.000.000 đồng đến 60.000.000 đồng", "B": "Từ 80.000.000 đồng đến 90.000.000 đồng", "C": "Từ 100.000.000 đồng đến 110.000.000 đồng", "D": "Từ 120.000.000 đồng đến 160.000.000 đồng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Quy định công khai thông tin đối với bất động sản được giao dịch trên sàn giao dịch bất động sản áp dụng:", "options": {"A": "Chỉ với những bất động sản đóng phí công khai thông tin", "B": "Chỉ với những bất động sản phải thực hiện đấu giá.", "C": "Chỉ với những bất động sản hình thành trong tương lai.", "D": "Tất cả các bất động sản"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trước khi cho khách hàng xem nhà nhân viên môi giới cần thông báo", "options": {"A": "Người bán", "B": "Công ty", "C": "Người mua", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Người mua bất động sản đặt cọc 200 triệu đồng để mua căn nhà với trị giá 2,0 tỷ đồng. Chủ nhà đổi ý không bán. Theo pháp luật dân sự hiện hành, chủ nhà sẽ trả tiền đặt cọc và đền bù tiền thiệt hại cho người mua tổng cộng là:", "options": {"A": "200 triệu đông", "B": "400 triệu đồng", "C": "800 triệu đồng", "D": "Không trả tiền bồi thường thiệt hại"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Sàn giao dịch BĐS là gì?", "options": {"A": "Nơi diễn ra các giao dịch và cung cấp dịch vụ về BĐS", "B": "Nơi chứng thực các hồ sơ pháp lý về BĐS", "C": "Nơi cung cấp thông tin, tiếp thị, quảng bá các dự án, sản phẩm BĐS", "D": "Cả A và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Để thành lập một công ty kinh doanh dịch vụ môi giới bất động sản thì phải đủ điều kiện nào sau đây?", "options": {"A": "Phải có ít nhất 1 cá nhân có chứng chỉ hành nghề môi giới bất động sản", "B": "Phải có ít nhất 2 cá nhân có chứng chỉ hành nghề môi giới bất động sản", "C": "Phải có ít nhất 3 cá nhân có chứng chỉ hành nghề môi giới bất động sản", "D": "Không nhất thiết phải có chứng chỉ hành nghề môi giới bất động sản"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Môi giới bất động sản bao gồm những hoạt động nào dưới đây?", "options": {"A": "Tư vấn pháp lý liên quan đến hợp đồng bảo hiểm", "B": "Ký hợp đồng xây dựng nhà ở cho khách hàng.", "C": "Đại diện chủ đầu tư thực hiện quảng cáo dự án", "D": "Giới thiệu, tư vấn, hỗ trợ các bên trong việc mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Điều nào cần tránh khi làm việc với khách hàng:", "options": {"A": "Lắng nghe ý kiến khách hàng", "B": "Không ngừng nâng cao trình độ", "C": "Phân biệt đối xử khách hàng", "D": "Cả A, B và C"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Giá trị giao dịch liên quan đến BĐS cần phải thực hiện báo cáo trong quy định về phòng chống rửa tiền trong kinh doanh BĐS theo quy định là:", "options": {"A": "Giao dịch từ 300 triệu đồng trở lên", "B": "Giao dịch từ 400 triệu đồng trở lên", "C": "Giao dịch từ 800 triệu đồng trở lên", "D": "Giao dịch từ 1,0 tỷ đồng trở lên"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Mỗi lần các chuyên viên môi giới BĐS nên cho khách hàng xem BĐS từ:", "options": {"A": "Càng ít càng tốt", "B": "10 căn trở lên", "C": "1-3 căn nhà", "D": "Càng nhiều càng tốt"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Thế chấp tài sản là gì?", "options": {"A": "Thế chấp tài sản là một bên dùng tài sản để bảo đảm thực hiện nghĩa vụ của chính mình.", "B": "Thế chấp tài sản là việc một bên dùng tài sản để bảo đảm thực hiện nghĩa vụ của chính mình hoặc của người khác.", "C": "Thế chấp tài sản là việc một bên (bên thế chấp) dùng tài sản thuộc sở hữu của mình để bảo đàm thực hiện nghĩa vụ và không giao tài sản cho bên kia (bên nhận thế chấp)", "D": "Thế chấp tài sản là việc một bên (bên thế chấp) dùng tài sản thuộc sở hữu của mình dể bảo đảm thực hiện nghĩa vụ và giao tài sản cho bên kia (bên nhận thế chấp)."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nếu bạn là môi giới và một trong các khách hàng của bạn từ chối không ký hợp đồng vì thấy giá trị căn hộ quá cao so với mức ngân sách, bạn sẽ:", "options": {"A": "Nói rằng đây là cơ hội duy nhất và không có căn hộ nào tốt hơn.", "B": "Thuyết phục khách hàng tăng ngân sách để mua căn hộ.", "C": "Chấp nhận yêu cầu của khách và tìm căn hộ khác.", "D": "Khuyến khách hàng giữ nguyên giá rồi mua."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Trong trường hợp môi giới đại diện cho bên bán nhưng lại cố tình giới thiệu bất động sản giá cao hơn thị trường để nhận thêm tiền từ người bán mà không báo cho người mua, môi giới đã vi phạm nguyên tắc nào?", "options": {"A": "Nguyên tắc Chuyên môn.", "B": "Nguyên tắc Trung thành và Minh bạch.", "C": "Nguyên tắc Bảo mật.", "D": "Không vi phạm vì đó là kỹ năng đàm phán."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khách hàng có vẻ chưa thích thú với sản phẩm bất động sản bạn giới thiệu, bạn sẽ:", "options": {"A": "Đưa thêm nhiều sản phẩm khác", "B": "Tìm hiểu lý do họ không lựa chọn sản phẩm địa ốc này và lựa chọn sản phẩm phù hợp hơn để giới thiệu", "C": "Hạ giá bán sản phẩm.", "D": "Tất cả đều sai."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi bạn giới thiệu một bất động sản cho khách hàng, bạn có nghĩa vụ gì về tính minh bạch của thông tin?", "options": {"A": "Không cần phải báo cáo thông tin về các vấn đề pháp lý nếu khách hàng không yêu cầu.", "B": "Phải cung cấp thông tin đầy đủ, chính xác và không gây hiểu lầm cho khách hàng.", "C": "Chỉ cung cấp thông tin cơ bản, không cần giải thích chi tiết.", "D": "Chỉ cần giới thiệu các bất động sản mà bạn có hoa hồng cao."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi thuyết phục người mua tăng giá, nhà môi giới dựa vào các yếu tố:", "options": {"A": "Ưu điểm của bất động sản", "B": "Tín hiệu tốt trong tăng trưởng của nền kinh tế", "C": "Nói thật những khuyết điểm bất động sản", "D": "Tất cả đều sai"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Khi thuyết phục người bán giảm giá, nhà môi giới dựa vào các yếu tố:", "options": {"A": "Ưu điểm của bất động sản", "B": "Nền kinh tế tăng trưởng chậm", "C": "Khuyết điểm bất động sản", "D": "Đáp án B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Những tiện ích của BĐS so với thời gian có thể liệt kê trong \"kỹ thuật nhân\" khi đàm phán về giá cả BĐS:", "options": {"A": "Tỉ giá quy đổi ra vàng tại thời điểm mua", "B": "Các điểm đắc địa của BĐS, giá trị sử dụng tăng thêm do sử dụng vật tư cao cấp, giá trị tăng thêm của BĐS", "C": "Môi trường sinh sống sạch sẽ, khu vực an ninh, giao thông tiện lợi, gần bệnh viện trường học", "D": "Cả B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nội dung nào là hoạt động của sàn giao dịch bất động sản?", "options": {"A": "Kiểm tra tính pháp lý và điều kiện đưa vào kinh doanh đối với các bất động sản đưa vào giao dịch thông qua sàn giao dịch bất động sản", "B": "Thực hiện dịch vụ môi giới bất động sản, hỗ trợ các bên trong việc đàm phán, thương thảo giao dịch bất động sản", "C": "Thực hiện dịch vụ, hỗ trợ các bên lập và ký kết hợp đồng giao dịch bất động sản", "D": "Cả đáp án A, B và C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trong giao dịch bất động sản, việc xác định tình trạng hôn nhân theo quy định của pháp luật Việt Nam là như thế nào?", "options": {"A": "Bắt buộc", "B": "Không bắt buộc", "C": "Chỉ yêu cầu khi cần thiết", "D": "Chỉ cần kê khai"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Nếu bạn là môi giới và một trong các khách hàng của bạn từ chối ký hợp đồng vì thấy giá trị căn hộ quá cao so với mức ngân sách, bạn sẽ:", "options": {"A": "Thuyết phục khách hàng tăng ngân sách để mua căn hộ.", "B": "Khuyên khách hàng đợi giảm giá rồi mua.", "C": "Chấp nhận yêu cầu của khách và tìm căn hộ khác.", "D": "Nói rằng đây là cơ hội duy nhất và không có căn hộ nào tốt hơn."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Sàn giao dịch bất động sản phải đáp ứng điều kiện gì?", "options": {"A": "Phải có giấy phép hoạt động của sàn giao dịch bất động sản và đáp ứng các yêu cầu về cơ sở vật chất, kỹ thuật.", "B": "Phải có trụ sở tại các thành phố lớn.", "C": "Phải có chứng chỉ hành nghề cho tất cả nhân viên trong sàn.", "D": "Phải có ít nhất 3 nhân viên môi giới và 1 giám đốc sàn."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, mức hoa hồng môi giới bất động sản được xác định dựa trên cơ sở nào?", "options": {"A": "Do cơ quan quản lý nhà nước về kinh doanh bất động sản quy định.", "B": "Do hiệp hội bất động sản tại địa phương quy định theo từng quý.", "C": "Do các bên thỏa thuận và được ghi trong hợp đồng, không phụ thuộc vào giá của giao dịch.", "D": "Cố định ở mức 2% trên tổng giá trị giao dịch."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khách hàng yêu cầu bạn tìm một căn hộ giá rẻ ở trung tâm thành phố, nhưng ngân sách của họ không đủ để mua bất động sản đó. Bạn sẽ làm gì?", "options": {"A": "Giới thiệu căn hộ cao cấp hơn để khách hàng có thể vay nhiều tiền hơn.", "B": "Thuyết phục khách hàng chọn khu vực ngoại thành để phù hợp với ngân sách.", "C": "Từ chối yêu cầu của khách hàng vì ngân sách không đủ.", "D": "Tìm căn hộ ở trung tâm thành phố và yêu cầu khách hàng vay thêm tiền."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Chứng chỉ hành nghề môi giới bất động sản có thời hạn sử dụng là bao lâu theo quy định hiện hành?", "options": {"A": "02 năm.", "B": "03 năm.", "C": "05 năm.", "D": "Vô thời hạn."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Bất động sản được phân loại là bất động sản dịch vụ bao gồm:", "options": {"A": "Văn phòng, cửa hàng, siêu thị, kho, bãi.", "B": "Khách sạn, nhà nghỉ hay nhà trọ, nhà liền kề, nhà xưởng", "C": "Khách sạn, nhà nghỉ, văn phòng, cửa hàng, siêu thị", "D": "Văn phòng, cửa hàng, siêu thị, nhà liền kề hay nhà vườn"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Yếu tố ảnh hưởng đến cầu bất động sản là?", "options": {"A": "Tăng trưởng về dân số và các nhu cầu phát triển", "B": "Thu nhập của dân cư", "C": "Kế hoạch phát triển kinh tế xã hội của chính phủ", "D": "Cả đáp án A, B và C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trong môi giới bất động sản dự án, tiếp nhận sản phẩm là bước đầu tiên để nhân viên kinh doanh có thể?", "options": {"A": "Am hiểu về khách hàng", "B": "Am hiểu về sản phẩm và am hiểu về chủ đầu tư", "C": "Am hiểu về đối thủ cạnh tranh", "D": "Am hiểu về thị trường"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Thời điểm xác định bên môi giới được hưởng hoa hồng thường là khi nào (nếu không có thỏa thuận khác)?", "options": {"A": "Khi tìm được khách hàng tiềm năng.", "B": "Khi khách hàng ký hợp đồng đặt cọc.", "C": "Khi giao dịch giữa bên mua và bên bán thành công (ký hợp đồng mua bán/chuyển nhượng).", "D": "Ngay sau khi ký hợp đồng dịch vụ môi giới."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Hoạt động về môi giới bất động sản thuộc loại hình kinh doanh nào?", "options": {"A": "Đầu tư bất động sản", "B": "Kinh doanh bất động sản", "C": "Kinh doanh dịch vụ bất động sản", "D": "Quản lý bất động sản"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Chủ đầu tư khi bán BĐS nộp những loại thuế gì sau đây?", "options": {"A": "Thuế thu nhập doanh nghiệp.", "B": "Thuế chuyển nhượng BĐS.", "C": "Thuế VAT", "D": "Lệ phí trước bạ."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Là một nhà môi giới bất động sản chuyên nghiệp, trong cách giao tiếp và ứng xử với đồng nghiệp cần phải:", "options": {"A": "Phải có thái độ lịch sự, tôn trọng, trung thực, thân thiện, hợp tác và tạo môi trường cạnh tranh lành mạnh.", "B": "Nhà môi giới phải cộng tác với nhà môi giới khác cũng phải đảm bảo nguyên tắc vì quyền lợi tốt nhất cho khách hàng của mình. Sự hợp tác đó phải vô tư và không vì động cơ chia sẻ quyền lợi.", "C": "Tôn trọng quyền lựa chọn nhà môi giới của khách hàng, trong trường hợp khách hàng không muốn tiếp tục làm việc với mình và có nhu cầu chuyển sang làm việc với nhà môi giới khác thì không được có thái độ bài trừ, bất hợp tác hay những hành vi không tốt với nhà môi giới mà khách hàng lựa chọn, ngoại trừ việc yêu cầu khách hàng tuân thủ việc thanh lý Hợp đồng đã ký.", "D": "Đáp án A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Là một nhà môi giới bất động sản chuyên nghiệp, trong giao tiếp và ứng xử với đối thủ cạnh tranh cần phải:", "options": {"A": "Chào hàng theo kiểu phá giá.", "B": "Thực hiện các hành vi không lành mạnh để ngăn cản đối thủ ký kết hợp đồng dịch vụ.", "C": "Tung tin, nói xấu, vu cáo đối thủ cạnh tranh.", "D": "Tất cả đều sai."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trong quá trình giới thiệu bất động sản cho khách hàng, bạn phát hiện một số thông tin quan trọng có sai sót (như diện tích thực tế nhỏ hơn quảng cáo). Bạn sẽ làm gì?", "options": {"A": "Thông báo ngay cho khách hàng về sự khác biệt và giải thích rõ ràng.", "B": "Từ chối giao dịch để tránh gây rắc rối.", "C": "Chỉ thông báo cho khách hàng nếu họ hỏi.", "D": "Giấu thông tin để không làm khách hàng thất vọng."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Là một nhà môi giới bất động sản chuyên nghiệp, các anh chị có được phép:", "options": {"A": "Tiết lộ thông tin về khách hàng và bất động sản khi chưa được sự đồng ý của khách hàng và những thông tin nằm ngoài phạm vi công việc đã thỏa thuận với khách hàng trong hợp đồng.", "B": "Đưa những thông tin về khách hàng và bất động sản của nhà môi giới khác đang làm đại diện giao dịch mà chưa được sự đồng ý.", "C": "Cả A và B đều không được.", "D": "Cả A và B đều đúng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khách hàng của bạn liên hệ với bên bán sau khi được bạn giới thiệu và giao dịch trực tiếp để tránh trả phí môi giới. Bạn sẽ làm gì?", "options": {"A": "Bỏ qua vì không thể làm gì.", "B": "Cắt đứt quan hệ với cả hai bên.", "C": "Đăng thông tin khách hàng lên mạng để cảnh báo.", "D": "Yêu cầu bên mua/bên bán thanh toán phí môi giới như đã thỏa thuận."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Để đảm bảo thể hiện năng lực chuyên môn khi hành nghề, các nhà môi giới bất động sản phải:", "options": {"A": "Nhà môi giới phải thực hiện đúng quy trình nghiệp vụ khi làm việc.", "B": "Nhà môi giới phải đảm bảo nghiệp vụ và năng lực chuyên môn. Khi tiến hành giao dịch phải có sự cẩn trọng cao nhất và làm việc với tinh thần trung thực, tận tâm, trách nhiệm với khách hàng.", "C": "Nhà môi giới phải cập nhật những thay đổi về tình hình thị trường và các quy định của pháp luật có liên quan đến nghiệp vụ.", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Khoản tiền mà khách hàng trả cho môi giới bất kể kết quả giao dịch có thành công hay không được gọi là gì?", "options": {"A": "Hoa hồng môi giới.", "B": "Thù lao môi giới.", "C": "Phí quản lý.", "D": "Tiền thưởng thêm."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Là một nhà môi giới bất động sản chuyên nghiệp, trang phục và phong cách của anh chị cần phải:", "options": {"A": "Trang phục phải lịch sự, nên đeo thẻ (có đầy đủ thông tin cá nhân và văn phòng làm việc) khi làm việc và giao tiếp với khách hàng.", "B": "Khi giao tiếp nhà môi giới phải giới thiệu về mình và đơn vị mình làm việc; Ngôn ngữ giao tiếp phải rõ ràng, trong sáng, ngắn gọn, tập trung vào nội dung công việc; Không nói tục, không nói tiếng lóng, không mất lịch sự với khách hàng và đồng nghiệp.", "C": "Cả A và B đều đúng", "D": "Tất cả đều sai."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Một khách hàng yêu cầu bạn tìm bất động sản giá rẻ ở khu vực tiềm năng, nhưng bạn biết khu vực đó sẽ không phát triển trong vài năm tới. Bạn sẽ làm gì?", "options": {"A": "Từ chối yêu cầu của khách hàng vì khu vực đó không phát triển.", "B": "Chỉ bán bất động sản giá rẻ mà không quan tâm đến sự phát triển của khu vực.", "C": "Tư vấn cho khách hàng về khả năng phát triển khu vực và giúp họ chọn bất động sản phù hợp hơn.", "D": "Tìm bất động sản giá rẻ và không thông báo về tình hình khu vực."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Trước khi bàn giao nhả ở hình thành trong tương lai cho người mua, doanh nghiệp trong nước được huy động tối đa bao nhiêu phần trăm giá trị hợp đồng?", "options": {"A": "50%", "B": "70%", "C": "80%", "D": "95%"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Thị trường bất động sản là kênh đầu tư kém hấp dẫn đối với các nhà đầu tư nước ngoài khi:", "options": {"A": "Môi trường pháp lý để phát triển thị trường bất động sản chưa đầy đủ", "B": "Nền kinh tế chậm phát triển.", "C": "Tình hình chính trị không ổn định", "D": "Cả A, B, C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Các yếu tố làm tăng cầu mua nhà ở là:", "options": {"A": "Giá của các yếu tố đầu vào (giá đất, vật liệu, nhân công) tăng cao", "B": "Lãi suất cho vay mua nhà thấp", "C": "Sự thay đổi việc làm và tăng thu nhập", "D": "Cả B và C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nếu xảy ra tranh chấp hợp đồng đặt cọc giữa người mua và người bán người môi giới nên làm gì?", "options": {"A": "Ép bên vi phạm phải nhượng bộ và bồi thường", "B": "Giải quyết bằng hòa giải và hoàn lại tiền", "C": "Áp dụng theo những cam kết trong hợp đồng đặt cọc và bồi thường theo thỏa thuận hoặc đưa sự việc ra Pháp luật, đơn vị có thẩm quyền giải quyết nếu hai bên không tự giải quyết được", "D": "Tất cả các câu trên đều đúng"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Cung trong thị trường bất động sản thường thay đổi... so với cầu biến động bất động sản:", "options": {"A": "Nhanh hơn", "B": "Chậm hơn", "C": "Giống nhau", "D": "Rất lớn"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong các phương pháp định giá BĐS, Phương pháp nào được áp dụng phổ biến nhất:", "options": {"A": "Phương pháp thu nhập", "B": "Phương pháp so sánh", "C": "Phương pháp chi phí", "D": "Cả 3 phương pháp trên"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tổ chức cá nhân tham gia sàn giao dịch bất động sản có nghĩa vụ nào sau đây?", "options": {"A": "Bảo quản nhà, công trình xây dựng đã bán trong thời gian chưa bàn giao cho bên mua", "B": "Trả phí dịch vụ cho doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản", "C": "Thực hiện các thủ tục mua bán nhà, công trình xây dựng theo quy định của pháp luật", "D": "Yêu cầu bên mua nhận nhà, công trình xây dựng theo thời hạn đã thỏa thuận trong hợp đồng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Các thông tin cần tìm hiểu về bất động sản:", "options": {"A": "Quyền của người bán thông qua các giấy tờ hợp pháp; quy định phân vùng, quy hoạch sử dụng đất hiện tại và trong tương lai.", "B": "Quyền của người mua", "C": "Những hạn chế về việc chuyển nhượng quyền sử dụng đất và bất động sản.", "D": "Đáp án A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tổ chức kinh doanh dịch vụ môi giới bất động sản có nghĩa vụ gì đối với nhân viên môi giới của mình?", "options": {"A": "Không có nghĩa vụ gì ngoài việc trả lương.", "B": "Tổ chức đào tạo, bồi dưỡng nâng cao kiến thức hành nghề môi giới bất động sản cho nhân viên hằng năm.", "C": "Thu hồi chứng chỉ hành nghề của nhân viên khi họ nghỉ việc.", "D": "Ép buộc nhân viên phải ký doanh số tối thiểu."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nội dung, phạm vi tư vấn, quyền và nghĩa vụ của các bên, phí dịch vụ tư vấn bất động sản được quy định như thế nào?", "options": {"A": "Do các bên thỏa thuận trong hợp đồng", "B": "Do bên bán quy định", "C": "Do bên mua quy định", "D": "Do pháp luật quy định"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Nội dung môi giới bất động sản bao gồm những vấn đề gì?", "options": {"A": "Tìm kiếm đối tác đáp ứng các điều kiện của khách hàng để tham gia đàm phán, ký hợp đồng", "B": "Đại diện theo ủy quyền để thực hiện các công việc liên quan đến các thủ tục mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản", "C": "Cung cấp thông tin, hỗ trợ cho các bên trong việc đàm phán, ký hợp đồng mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản", "D": "Cả đáp án A, B và C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Ở nước ta, sàn giao dịch bất động sản chịu sự quản lý của cơ quan nhà nước nào?", "options": {"A": "Sở Tài nguyên Môi trường", "B": "Công ty kinh doanh bất động sản.", "C": "Sở Xây dựng", "D": "Bộ Xây dựng"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Theo Luật 2023, việc thanh toán trong giao dịch bất động sản giữa các doanh nghiệp kinh doanh bất động sản phải thực hiện qua hình thức nào?", "options": {"A": "Tiền mặt trực tiếp.", "B": "Qua tổ chức tín dụng (chuyển khoản).", "C": "Bằng tài sản khác có giá trị tương đương.", "D": "Tùy các bên thỏa thuận, không bắt buộc qua ngân hàng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Dưới đây đâu là đặc điểm của thị trường bất động sản?", "options": {"A": "Có sự khác biệt giữa hàng hóa và địa điểm giao dịch", "B": "Thị trường BĐS là thị trường mang tính khu vực, vùng, miền", "C": "Cung về BĐS chậm co dãn khi giá thay đổi", "D": "Đáp án A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Đâu là đặc điểm đặc thù quan trọng của thị trường bất động sản của Việt Nam?", "options": {"A": "Thị trường BĐS là thị trường mang tính quốc tế và khu vực", "B": "Không có sự khác biệt giữa hàng hóa và địa điểm giao dịch", "C": "Hoạt động của thị trường BĐS phụ thuộc vao sự kiểm soát của Nhà nước", "D": "Cung về BĐS thay đổi chậm hơn so với giá BĐS"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nội dung kinh doanh dịch vụ quản lý bất động sản gồm:", "options": {"A": "Cung cấp các dịch vụ bảo đảm duy trì hoạt động bình thường của bất động sản.", "B": "Thực hiện bảo trì, sửa chữa bất động sản", "C": "Quản lý, giám sát việc khai thác, sử dụng bất động sản của khách hàng theo đúng công năng, thiết kế và hợp đồng", "D": "Cả 3 đáp án trên đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Việc nhà môi giới từ chối thực hiện một giao dịch khi biết nguồn tiền của khách hàng có dấu hiệu từ hoạt động tội phạm thể hiện tuân thủ nguyên tắc gì?", "options": {"A": "Phòng chống rửa tiền và đạo đức nghề nghiệp.", "B": "Bảo mật thông tin khách hàng.", "C": "Tôn trọng quyền tự do kinh doanh.", "D": "Tiết kiệm chi phí cho công ty."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Bà B tự nhận là “cộng tác viên giới thiệu”... đăng thông tin trên mạng xã hội, công khai giá bán, trực tiếp dẫn khách đi xem và đàm phán giá. Khi giao dịch thành công, tiền hoa hồng chuyển qua tài khoản người thân để “tránh rắc rối pháp lý”. Nhận định đúng nhất là:", "options": {"A": "Hoạt động giới thiệu cá nhân hợp pháp", "B": "Quảng cáo sản phẩm bất động sản", "C": "Không xử lý được vì không nhận tiền trực tiếp", "D": "Hoạt động môi giới BĐS trá hình, xác định theo bản chất hành vi"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Bạn phát hiện một bất động sản bạn đang giới thiệu có giá trị thấp hơn so với mức thị trường, nhưng khách hàng vẫn quyết định mua. Bạn sẽ làm gì?", "options": {"A": "Không báo cho khách hàng, vì họ đã quyết định mua.", "B": "Khuyên khách hàng bỏ qua sự chênh lệch giá trị và tiến hành giao dịch.", "C": "Thông báo ngay cho khách hàng về sự khác biệt và giải thích rõ lý do.", "D": "Tiến hành giao dịch mà không thông báo về vấn đề này."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Một khách hàng yêu cầu bạn tìm một bất động sản phù hợp để đầu tư sinh lời, nhưng họ chỉ muốn các dự án có tiềm năng tăng giá nhanh trong 6 tháng tới. Bạn sẽ làm gì?", "options": {"A": "Giới thiệu những dự án đã được chứng minh là an toàn và ổn định.", "B": "Đưa ra một số dự án mà bạn biết sẽ không sinh lời trong thời gian ngắn để khách hàng có nhiều sự lựa chọn.", "C": "Tìm kiếm dự án ở các khu vực đang phát triển và có các yếu tố tiềm năng sinh lời trong thời gian ngắn.", "D": "Khuyên khách hàng mua bất động sản mà không quan tâm đến tiềm năng tăng giá trong ngắn hạn."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nội dung nào sau đây là bắt buộc phải có trong hợp đồng dịch vụ môi giới?", "options": {"A": "Đối tượng và nội dung dịch vụ; mức thù lao/hoa hồng; thời hạn thực hiện.", "B": "Cam kết chắc chắn sẽ bán được nhà trong 1 tháng.", "C": "Thông tin về tất cả các dự án khác của công ty.", "D": "Danh sách đối thủ cạnh tranh của khách hàng."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Đâu là nghĩa vụ của cá nhân kinh doanh dịch vụ môi giới?", "options": {"A": "Tham gia đào tạo, bồi dưỡng nâng cao kiến thức hành nghề môi giới bất động sản hàng năm", "B": "Thực hiện dịch vụ môi giới bất động sản.", "C": "Hưởng thù lao, hoa hồng môi giới theo thỏa thuận trong hợp đồng đã ký với khách hàng.", "D": "Tất cả đều sai"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Một nhà môi giới chuyên nghiệp cần làm gì để duy trì uy tín lâu dài?", "options": {"A": "Chỉ quan tâm đến hoa hồng cao nhất.", "B": "Luôn đặt lợi ích hợp pháp của khách hàng lên trên và cung cấp giá trị thực sự.", "C": "Thay đổi số điện thoại sau mỗi thương vụ lớn.", "D": "Chỉ làm việc với những khách hàng giàu có."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Bất động sản không đủ điều kiện để giao dịch, cá nhân hành nghề môi giới bất động sản có thể:", "options": {"A": "Từ chối môi giới và thông báo cho các bên về tình trạng bất động sản.", "B": "Đề xuất thay đổi các điều khoản trong hợp đồng.", "C": "Tiến hành giao dịch nếu khách hàng yêu cầu.", "D": "Đề nghị bên bán giảm giá bất động sản."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Nguyên tắc \"Trung thực\" đòi hỏi nhà môi giới phải làm gì khi biết bất động sản nằm trong khu vực quy hoạch sắp giải tỏa?", "options": {"A": "Giấu thông tin để dễ bán.", "B": "Chỉ nói khi khách hàng hỏi trực tiếp.", "C": "Thông báo đầy đủ và trung thực về tình trạng quy hoạch cho khách hàng.", "D": "Khuyên khách hàng mua nhanh trước khi quy hoạch công bố chính thức."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Một khách hàng yêu cầu bạn tìm bất động sản để bán lại nhanh, nhưng thị trường đang chững lại. Bạn sẽ làm gì?", "options": {"A": "Khuyên khách hàng đầu tư lâu dài thay vì ngắn hạn.", "B": "Giấu tình hình thị trường để khách hàng tự quyết định.", "C": "Tìm bất động sản phù hợp nhưng thông báo rõ ràng về tình hình thị trường.", "D": "Từ chối giao dịch vì khó khăn"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nội dung nào dưới đây là vi phạm pháp luật về thu, quản lý, sử dụng phí, lệ phí trong kinh doanh bất động sản?", "options": {"A": "Quản lý và sử dụng dịch vụ môi giới bất động sản theo thỏa thuận của các bên.", "B": "Thu phí dịch vụ bất động sản không có hóa đơn, chứng từ hợp lệ hoặc thu quá mức quy định của pháp luật.", "C": "Sử dụng phí đăng ký bất động sản đúng mục đích và công khai.", "D": "Thu phí dịch vụ bất động sản đúng mức được quy định của pháp luật và hợp đồng đã ký."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nhà môi giới có nên tư vấn cho khách hàng về các thủ tục thuế và phí khi sang tên bất động sản không?", "options": {"A": "Không, vì đó là việc của cơ quan thuế.", "B": "Có, đó là một phần của dịch vụ hỗ trợ khách hàng và thể hiện tính chuyên nghiệp.", "C": "Chỉ tư vấn nếu khách hàng trả thêm phí tư vấn pháp lý.", "D": "Chỉ tư vấn cách để lách thuế cho khách hàng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nguyên tắc của hoạt động môi giới bất động sản là:", "options": {"A": "Tuân thủ pháp luật và đạo đức nghề nghiệp", "B": "Minh bạch thông tin và hài hòa lợi ích giữa các bên", "C": "Nâng cao kiến thức chuyên môn và kinh nghiệm thực tế", "D": "Tất cả đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Chức năng của người môi giới là:", "options": {"A": "Người điều tiết giá mua bán cho thị trường.", "B": "Người trung gian và tư vấn cho người mua và người bán.", "C": "Cả A, B đều đúng.", "D": "Cả A, B đều sai."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nghĩa vụ nào sau đây là bắt buộc đối với tổ chức, cá nhân môi giới khi cung cấp thông tin bất động sản?", "options": {"A": "Chỉ cung cấp thông tin tốt để thúc đẩy bán hàng.", "B": "Cung cấp hồ sơ, thông tin về bất động sản và chịu trách nhiệm về hồ sơ, thông tin do mình cung cấp.", "C": "Không cần chịu trách nhiệm nếu thông tin do chủ đầu tư cung cấp sai.", "D": "Chỉ cung cấp thông tin khi khách hàng đã đặt cọc."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Bên môi giới được hưởng thù lao môi giới:", "options": {"A": "500.000 đồng cho mỗi hợp đồng", "B": "Khi có giao dịch thành công", "C": "Không phụ thuộc vào kết quả giao dịch", "D": "Không có thù lao môi giới vì chưa có qui định"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nhà môi giới cần phải:", "options": {"A": "Luôn đảm bảo tính pháp luật.", "B": "Xác lập quyền lợi của các bên môi giới", "C": "Không xác lập quyền lợi cá nhân khi chưa có sự thống nhất của các bên tham gia", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trường hợp dự án bất động sản, công trình xây dựng đã thế chấp vay tiền ngân hàng thương mại, người môi giới bất động sản có nên tư vấn cho khách hàng vấn đề này không?", "options": {"A": "Giữ bí mật, không cung cấp thông tin để bán được hàng.", "B": "Tư vấn đầy đủ thông tin để khách hàng nắm rõ trước khi ra quyết định giao dịch.", "C": "Tư vấn không cần đầy đủ để khách hàng tự tìm hiểu.", "D": "Không tư vấn vấn đề đó."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khách hàng yêu cầu bạn tìm bất động sản có giá trị thấp để tránh thuế, bạn sẽ:", "options": {"A": "Giới thiệu các bất động sản giá thấp theo yêu cầu.", "B": "Khuyên khách hàng tuân thủ pháp luật về nghĩa vụ thuế.", "C": "Hỗ trợ khách hàng tìm cách trốn thuế.", "D": "Giấu thông tin để khách hàng tự tìm hiểu."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong quy trình môi giới, người môi giới BĐS cần thực hiện các nhiệm vụ sau:", "options": {"A": "Chứng thực, sao lưu các loại giấy tờ, tìm kiếm khách hàng", "B": "Khảo sát thực địa, hồ sơ pháp lý, thẩm định giá, quảng bá, giới thiệu BĐS", "C": "Đàm phán điều khoản, lập hợp đồng, thu phí môi giới", "D": "Cả 3 câu trên đều đúng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Các bước trong tiếp cận khách hàng mua, thuê BĐS gồm:", "options": {"A": "Tìm khách hàng tiềm năng, liên lạc và thỏa thuận hợp đồng", "B": "Tiếp cận khách hàng, giới thiệu sản phẩm, xử lý thắc mắc và kết thúc chào bán", "C": "Tiếp cận khách hàng, giới thiệu sản phẩm", "D": "Tất cả các bước trên"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Để giới thiệu, chào bán BĐS thành công cần dựa trên các yếu tố:", "options": {"A": "Liên lạc trước, giao tiếp lịch sự, nắm được nhu cầu khách hàng", "B": "Giao tiếp lịch sự, am hiểu thị trường BĐS, nắm được nhu cầu khách hàng", "C": "Giao tiếp lịch sự, am hiểu thị trường BĐS, tìm được sản phẩm đúng nhu cầu khách hàng", "D": "Có người giới thiệu, tìm được khách hàng tiềm năng, giao tiếp lịch sự"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Công tác chuẩn bị tiếp xúc khách hàng đóng vai trò như thế nào trong quy trình môi giới", "options": {"A": "Tiền đề để tiếp xúc đạt hiệu quả", "B": "Dẫn dắt và chủ động trong giao tiếp đàm phán", "C": "Phòng ngừa các rủi ro trong giao dịch", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trong giao dịch mua bán bất động sản, phí môi giới do ai chi trả?", "options": {"A": "Bên mua chi trả", "B": "Bên bán chi trả.", "C": "Do các bên thỏa thuận trong hợp đồng", "D": "Tất cả các đáp án trên đều sai"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Những biểu hiện nào sau đây cho phép xác định đối tượng khách hàng của bạn là “khách hàng kỹ tính”:", "options": {"A": "Né tránh, sợ bị gạt, không dám quyết định một mình", "B": "Có vẻ không đồng ý, hơi nghi ngờ, hay so sánh với sản phẩm khác của đối thủ", "C": "Rất nhiều kinh nghiệm và thời gian, thường nghi ngờ bạn đang lợi dụng họ", "D": "Phân tích kỹ mọi thông tin, quan tâm tới từng chi tiết nhỏ"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Khi khách hàng thắc mắc về sản phẩm bất động sản, bạn sẽ:", "options": {"A": "Tranh luận lại với khách hàng", "B": "Nhận thấy khách hàng không quan tâm đến việc mua sản phẩm", "C": "Cả A và B đúng", "D": "Cả A và B sai"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trường hợp nào dưới đây người môi giới bất động sản được hưởng hoa hồng môi giới?", "options": {"A": "Khi giao dịch bất động sản thành công theo hợp đồng môi giới.", "B": "Khi giới thiệu thông tin bất động sản cho khách hàng, dù không có giao dịch.", "C": "Khi đưa ra ý kiến tư vấn ban đầu.", "D": "Khi có bất kỳ hoạt động nào liên quan đến bất động sản"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Lệ phí trước bạ khi chuyển nhượng bất động sản là bao nhiêu (trong trường hợp giá hợp đồng thấp hơn giá Nhà nước quy định)?", "options": {"A": "0,5% giá trị theo giá nhà nước quy định.", "B": "5% giá trị hợp đồng.", "C": "2,5% giá trị hợp đồng.", "D": "3% giá trị hợp đồng."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Giai đoạn tiếp xúc của quá trình đàm phán gồm:", "options": {"A": "Tạo không khí tiếp xúc", "B": "Tìm hiểu đối tác; tổ chức đội ngũ đàm phán; lập mục tiêu đàm phán", "C": "Tạo không khí tiếp xúc; tìm hiểu nhu cầu mục tiêu của đối tác; xác lập kế hoạch đàm phán", "D": "Cả A, B và C"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Phương pháp tiếp thị phải truyền tải được nội dung đến khách hàng là:", "options": {"A": "Tính độc đáo nổi trội của hàng hóa", "B": "Điểm khác biệt nổi bật so với hàng hóa cùng loại", "C": "Kích thích và lưu lại ký ức hàng hóa", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Giúp đẩy mạnh được việc tiêu thụ, tăng doanh số nhanh chóng, mạnh mẽ nhưng chỉ có tác dụng ngắn hạn, gọi là:", "options": {"A": "Tuyên truyền, tài trợ.", "B": "Khuyến mãi.", "C": "Chào hàng cá nhân.", "D": "Quảng cáo."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nội dung nào sau đây không phải là nội dung môi giới bất động sản:", "options": {"A": "Tìm kiếm đối tác đáp ứng các điều kiện của khách hàng để tham gia đàm phán, ký kết hợp đồng.", "B": "Đại diện theo ủy quyền để thực hiện các công việc đàm phán kí kết hợp đồng", "C": "Thu thập các tài liệu để tiến hành xác định giá bất động sản", "D": "Cung cấp thông tin hỗ trợ cho các bên trong việc mua bán bất động sản."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi tiếp nhận một sản phẩm dự án, việc đầu tiên môi giới bất động sản cần làm là gì?", "options": {"A": "Tìm khách hàng tiềm năng cho dự án", "B": "Tìm hiểu và phân tích sản phẩm", "C": "Quảng cáo bán hàng", "D": "Tất cả đều sai."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Phân loại thị trường BĐS theo trình tự tham gia thị trường có những phân đoạn nào dưới đây:", "options": {"A": "Thị trường chuyển nhượng quyền sử dụng đất, loại thị trường này còn gọi là th "A": "Tạo môi trường pháp lý cho thị trường bất động sản", "B": "Quy hoạch xây dựng, quy hoạch sử dụng đất, thực hiện đăng ký quền sở hữu tài sản (quyền sử dụng đất)", "C": "Thực hiện chính sách vĩ mô nhằm thúc đẩy sự hình thành và phát triển của thị trường bất động sản", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Phân tích tài chính dự án đầu tư xây dựng BĐS dựa vào các chỉ tiêu sau:", "options": {"A": "Ước tính toàn bộ chi phí dự án; Dự kiến phương án hợp tác kinh doanh;", "B": "Ước tính nguồn vốn vay; Thiết lập mô hình phân tích dựa trên những giả định cơ bản về dự án;", "C": "Phân tích dòng tiền cho toàn bộ dòng đời của dự án bao gồm chi phí đầu tư, nguồn vốn đầu tư, doanh thu, chi phí hoạt động, vốn vay, lợi nhuận, các chỉ số tài chính, phân tích độ nhạy với các biến thiên về suất đầu tư và giá thuê dự kiến;", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Các loại hợp đồng trong kinh doanh bất động sản bao gồm:", "options": {"A": "Hợp đồng mua bán, thuê mua căn hộ chung cư;", "B": "Hợp đồng mua bán, thuê mua căn hộ du lịch, căn hộ văn phòng kết hợp lưu trú quy định", "C": "Hợp đồng mua bán, thuê mua nhà ở riêng lẻ;", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Dự án đầu tư xây dựng khu đô thị hỗn hợp là dự án bao gồm:", "options": {"A": "Công trình xây dựng mới;", "B": "Công trình cải tạo chỉnh trang;", "C": "Công trình tái thiết, bảo tồn và tôn tạo;", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Chỉ tiêu nào không dùng để phân tích tài chính dự án đầu tư:", "options": {"A": "Đơn vị trúng thầu thi công dự án", "B": "Ước tính toàn bộ chi phí dự án", "C": "Ước tính nguồn vốn vay", "D": "Phân tích độ nhạy với các biến thiên về suất đầu tư và giá thuê dự kiến"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Tiến trình ra quyết định mua một bất động sản của khách hàng, bắt đầu bằng:", "options": {"A": "Thu nhập.", "B": "Nhận thức được nhu cầu.", "C": "Tìm kiếm thông tin.", "D": "Lựa chọn các giải pháp"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Giai đoạn đầu tiên của quá trình hoạch định chiến lược marketing là:", "options": {"A": "Xác định thị phần mong muốn.", "B": "Tìm nhóm khách hàng tiềm năng mà nhu cầu của họ chưa được thỏa mãn.", "C": "Bắt tay vào phối hợp marketing-mix.", "D": "Xác định xem công ty có hội đủ các điều kiện để đáp ứng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nội dung quyền của người sử dụng đất được xác định là:", "options": {"A": "Được cấp giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất", "B": "Hưởng thành quả lao động, kết quả đầu tư trên đất", "C": "Được bồi thường khi Nhà nước thu hồi đất theo quy định của pháp luật", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Điều kiện thực hiện các quyền chuyển đổi, chuyển nhượng, cho thuê, cho thuê lại, góp vốn bằng quyền sử dụng đất khi có các điều kiện nào sau đây?", "options": {"A": "Có giấy chứng nhận", "B": "Đất không có tranh chấp, quyền sử dụng đất không bị kê biên để đảm bảo thi hành án", "C": "Trong thời hạn sử dụng đất", "D": "Cả A, B và C"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tổ chức kinh tế, cá nhân, người Việt Nam định cư ở nước ngoài, doanh nghiệp có vốn đầu tư nước ngoài được bán tài sản gắn liền với đất thuê của Nhà nước khi có những điều kiện nào?", "options": {"A": "Tài sản gắn liền với đất được tạo lập hợp pháp theo quy định của pháp luật", "B": "Đã hoàn thành việc xây dựng theo đúng quy hoạch xây dựng chi tiết và dự án đầu tư đã được phê duyệt, chấp thuận", "C": "Cả A và B đều đúng", "D": "Cả A và B đều sai"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Người mua tài sản gắn liền với đất thuê phải bảo đảm các điều kiện nào?", "options": {"A": "Có năng lực tài chính để thực hiện dự án đầu tư", "B": "Có ngành nghề kinh doanh phù hợp với dự án đầu tư", "C": "Không vi phạm quy định pháp luật về đất đai đối với trường hợp đã được Nhà nước giao đất, cho thuê đất để thực hiện dự án trước đó", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Thủ tục hành chính về đất đai được hiểu là:", "options": {"A": "Thủ tục xử phạt hành chính trong lĩnh vực đất đai", "B": "Thủ tục đăng ký đất đai, tài sản gắn liền với đất, cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hửu nhà ở và tài sản khác gắn liền với đất", "C": "Thủ tục thu hồi đất, giao đất, cho thuê đất, chuyển mục đích sử dụng đất", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Đâu không phải là quyền của tổ chức cá nhân tham gia sàn giao dịch bất động sản?", "options": {"A": "Ký hợp đồng với doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản để mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản.", "B": "Thực hiện quy chế hoạt động của sàn giao dịch bất động sản", "C": "Yêu cầu doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản cung cấp hồ sơ, thông tin về bất động sản.", "D": "Yêu cầu doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản bồi thường thiệt hại do lỗi của sàn giao dịch bất động sản gây ra."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nội dung thanh tra chuyên ngành về đất đai bao gồm những nội dung nào?", "options": {"A": "Thanh tra việc chấp hành pháp luật về đất đai của Ủy ban nhân dân các cấp", "B": "Thanh tra việc chấp hành pháp luật về đất đai của người sử dụng đất và tổ chức cá nhân khác có liên quan", "C": "Thanh tra việc chấp hành các quy định về chuyên môn, nghiệp vụ trong lĩnh vực đất đai", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tranh chấp đất đai (mà các đương sự có Giấy chứng nhận) đã được hòa giải tại Ủy ban nhân dân xã nhưng không thành thì do cơ quan nào giải quyết?", "options": {"A": "Uỷ ban nhân dân cấp tỉnh", "B": "Ủy ban nhân dân cấp xã", "C": "Sở Nông Nghiệp và Môi trường", "D": "Tòa án nhân dân"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Giấy chứng nhận quyền sử dụng đất, Giấy chứng nhận quyền sở hữu nhà ở và quyền sử dụng đất ở, Giấy chứng nhận quyền sở hữu nhà ở, giấy chứng nhận quyền sở hữu công trình xây dựng đã được cấp theo quy định của pháp luật đất đai, pháp luật về nhà ở pháp luật về xây dựng trước ngày 01 tháng 08 năm 2024:", "options": {"A": "Không có giá trị pháp lý", "B": "Vẫn có giá trị pháp lý và không phải đổi sang Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất", "C": "Có giá trị pháp lý nhưng bắt buộc phải đổi sang Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất theo quy định của Luật đất đai 2024", "D": "Cả A, B và C đều sai"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nhà nước trao quyền sử dụng đất cho người sử dụng đất cho người sử dụng đất thông qua hình thức nào sau đây:", "options": {"A": "Quyết định giao đất không thu tiền sử dụng đất, giao đất có thu tiền sử dụng đất", "B": "Quyết định cho thu tiền thuê đất hàng năm, cho thuê đất thu tiền thuê đất một lần cho cả thời gian thuê", "C": "Công nhận quyền sử dụng đất", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Đâu là hành vi bị cấm trong lĩnh vực đất đai?", "options": {"A": "Không đưa đất vào sử dụng, sử dụng đất không đúng mục đích", "B": "Cung cấp thông tin về đất đai theo quy định của pháp luật", "C": "Thực hiện các nghĩa vụ tài chính đối với Nhà nước", "D": "Thực hiện giao dịch về quyền sử dụng đất có đăng ký với cơ quan nhà nước có thẩm quyền"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Dấu hiệu giao dịch đáng ngờ trong hoạt động kinh doanh bất động sản là:", "options": {"A": "Các giao dịch bất động sản là giao dịch ủy quyền nhưng không có cơ sở pháp lý.", "B": "Khách hàng không quan tâm đến giá bất động sản, phí giao dịch phải trả. Giá giao dịch giữa các bên không phù hợp giá thị trường", "C": "Khách hàng không cung cấp được các thông tin liên quan đến bất động sản hoặc không muốn cung cấp bổ sung thông tin về nhân thân", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nghị định 16/2022/NĐ-CP được áp dụng cho phạm vi nào dưới đây", "options": {"A": "Chỉ áp dụng đối với lĩnh vực kinh doanh dịch vụ BĐS", "B": "Chỉ áp dụng đối với lĩnh vực kinh doanh BĐS", "C": "Áp dụng chung cả trong lĩnh vực đất đai, xây dựng và bất động sản", "D": "Tất cả các câu trên đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Căn cứ tính tiền thuê đất theo quy định pháp luật hiện hành gồm những căn cứ nào?", "options": {"A": "Diện tích đất cho thuê", "B": "Mục đích sử dụng đất", "C": "Diện tích đất cho thuê, thời hạn cho thuê đất, đơn giá cho thuê đất; hình thức nhà nước cho thuê đất thu tiền thuê đất hàng năm hoặc cho thuê đất thu tiền thuê đất một lần cho cả thời gian thuê", "D": "Diện tích đất cho thuê, thời hạn cho thuê đất, đơn giá cho thuê đất"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Mức xử phạt từ 60-80 triệu đồng trong Nghị định 16/2022/NĐ-CP được áp dụng cho lĩnh vực đào tạo và quản lý thông tin dữ liệu thị trường BĐS:", "options": {"A": "Sử dụng tài liệu giảng dạy không phù hợp với quy định khung chương trình đào tạo", "B": "Không đảm bảo về thời lượng chương trình đào tạo theo quy định nhưng vẫn cấp giấy chứng nhận", "C": "Cả câu A và B đều đúng", "D": "Câu A đúng câu B sai"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Mức xử phạt từ 80-100 triệu đồng trong Nghị định 16/2022/NĐ-CP được áp dụng cho lĩnh vực đào tạo và thi cấp chứng chỉ:", "options": {"A": "Được chủ động sử dụng kinh phí dự thi theo nhu cầu thực tế", "B": "Không quản lý tốt đề thi để làm lộ đề thi", "C": "Cả câu A và B đều đúng", "D": "Câu B đúng câu A sai"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nghị định hướng dẫn về thu tiền sử dụng đất, tiền thuê đất do cơ quan nào ban hành?", "options": {"A": "Quốc hội", "B": "Chính phủ", "C": "Bộ Tài Chính", "D": "Bộ Nông Nghiệp và Môi trường"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Các tổ chức báo cáo phải xây dựng và ban hành quy chế nội bộ về phòng, chống rửa tiền theo qui định. Các tổ chức báo cáo đó là:", "options": {"A": "Cục Phòng, chống rửa tiền thuộc cơ quan Thanh tra, Cục Quản lý nhà và thị trường bất động sản thuộc Bộ Xây dựng", "B": "Sở Xây dựng các tỉnh, thành trực thuộc Trung ương", "C": "Tổ chức, cá nhân kinh doanh dịch vụ môi giới, quản lý bất động sản, sàn giao dịch bất động sản", "D": "Ngân hàng nhà nước"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Doanh nghiệp có vốn đầu tư nước ngoài không được kinh doanh bất động sản dưới các hình thức nào?", "options": {"A": "Thuê quyền sử dụng đất của hộ gia đình để đầu tư xây dựng hạ tầng kỹ thuật sau đó chuyển nhượng đất đã có hạ tầng kỹ thuật", "B": "Được Nhà nước cho thuê đất sau đó đầu tư xây dựng nhà ở để cho thuê", "C": "Được Nhà nước giao đất sau đó đầu tư xây dựng nhà ở để bán, cho thuê, cho thuê mua", "D": "Nhận chuyển nhượng toàn bộ hoặc một phần dự án bất động sản của chủ đầu tư để xây dựng nhà, công trình xây dựng để bán, cho thuê, cho thuê mua"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Miễn tiền thuê đất trong thời gian xây dựng cơ bản theo dự án được cấp có thẩm quyền phê duyệt nhưng tối đa không quá mấy năm kể từ ngày có quyết định cho thuê đất:", "options": {"A": "01 năm", "B": "02 năm", "C": "03 năm", "D": "Tất cả sai"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nhà nước có chế độ miễn, giảm tiền sử dụng đất cho các trường hợp:", "options": {"A": "Người có công với cách mạng, hộ nghèo, hộ đồng bào dân tộc thiểu số", "B": "Nhà ở xã hội, nhà ở cho người phải di dời do thiên tai", "C": "Cả A và B", "D": "Tất cả sai"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Trong Nghị định 16/2022/NĐ-CP, mức xử phạt từ 800 triệu - 1tỷ đồng được áp dụng cho hành vi vi phạm kinh doanh BĐS nào dưới đây:", "options": {"A": "Kinh doanh ngoài phạm vi cho phép của tổ chức", "B": "Huy động vốn sai quy định", "C": "Xây công trình chậm tiến độ", "D": "Tất cả các câu trên đều đúng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi tiếp xúc tư vấn khách hàng, người môi giới không nên làm gì?", "options": {"A": "Nghe điện thoại, trao đổi công việc với nhân viên khác.", "B": "Ghi chép thông tin.", "C": "Lắng nghe khách hàng.", "D": "Quan tâm đến khách hàng."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Sau thời hạn tối đa ghi nợ tiền thuế chuyển quyền sử dụng đất mà chưa trả hết nợ thì người sử dụng đất phải:", "options": {"A": "Chịu lãi suất quá hạn 0,05% một ngày", "B": "Chịu lãi suất quá hạn 0,05% một ngày nhưng không quá 18%/năm", "C": "Chịu phạt chậm nộp theo quy định của luật thuế", "D": "Nộp tiền sử dụng đất còn lại theo giá đất tại thời điểm trả nợ"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tỷ lệ phần trăm lệ phí trước bạ áp dụng cho nhà, đất là:", "options": {"A": "0,3%", "B": "0,5%", "C": "0,7%", "D": "2,0%"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Giá tính lệ phí trước bạ là:", "options": {"A": "Giá đất trên hợp đồng chuyển nhượng", "B": "Giá đất do Ủy ban nhân dân tỉnh, thành phố trực thuộc Trung ương ban hành làm căn cứ tính lệ phí trước bạ", "C": "Giá đất do Bộ Tài chính quy định tại thời điểm xác định nghĩa vụ tiền sử dụng đất bạ", "D": "Cả A, B và C"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Đâu là các khoản thu tài chính từ đất đai:", "options": {"A": "Thuế sử dụng đất", "B": "Thuế thu nhập từ chuyển quyền sử dụng đất", "C": "Phí và lệ phí trong quản lý, sử dụng đất đai", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Giao dịch về nhà ở nào dưới đây không bắt buộc phải có Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất:", "options": {"A": "Hình thức tặng cho nhà ở, góp vốn bằng nhà ở", "B": "Mua bán thế chấp nhà ở hình thành trong tương lai", "C": "Tổ chức thực hiện tặng cho nhà tình nghĩa, nhà tình thương", "D": "Cả B và C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Chủ đầu tư dự án xây dựng nhà ở có được thế chấp dự án hoặc nhà ở xây dựng trong dự án tại tổ chức tín dụng đang hoạt động tại Việt Nam để vay vốn cho việc đầu tư dự án hoặc xây dựng nhà ở đó không?", "options": {"A": "Không được thế chấp", "B": "Được thế chấp", "C": "Pháp luật không cho phép thế chấp nhà ở hình thành trong tương lai", "D": "Cả A, B và C đều sai"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Công ty môi giới, sàn giao dịch bất động sản có quyền áp dụng biện pháp tạm thời là:", "options": {"A": "Ngăn chặn hành vi rửa tiền", "B": "Ngăn chặn hành động phạm tội", "C": "Không thực hiện giao dịch bất động sản và báo cáo cho cơ quan nhà nước có thẩm quyền", "D": "Có lý do để tin rằng giao dịch được yêu cầu thực hiện có liên quan tới hoạt động phạm tội"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Mức xử phạt từ 400-600 triệu đồng trong Nghị định 16/2022/NĐ-CP được áp dụng cho lĩnh vực Kinh doanh Bất động sản trong những trường hợp nào dưới đây:", "options": {"A": "Kinh doanh không đúng phạm vi được phép theo quy định", "B": "Triển khai xây dựng dự án kinh doanh bất động sản, dự án đầu tư xây dựng nhà ở chậm tiến độ", "C": "Câu A đúng câu B sai", "D": "Cả câu A và B đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Kinh doanh dịch vụ bất động sản mà không thành lập doanh nghiệp theo quy định, không đủ số người có chứng chỉ hành nghề môi giới bất động sản theo quy định hoặc chứng hành nghề đã hết thời hạn sử dụng theo quy định bị phạt tiền?", "options": {"A": "Từ 100.000.000 đồng đến 140.000.000 đồng", "B": "Từ 120.000.000 đồng đến 160.000.000 đồng", "C": "Từ 140.000.000 đồng đến 180.000.000 đồng", "D": "Từ 160.000.000 đồng đến 200.000.000 đồng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Cá nhân hành nghề môi giới bất động sản mà không có chứng chỉ hành nghề theo quy định hoặc chứng chỉ hành nghề hết thời hạn sử dụng theo quy định thì bị phạt tiền?", "options": {"A": "Từ 20.000.000 đồng đến 40.000.000 đồng", "B": "Từ 30.000.000 đồng đến 50.000.000 đồng", "C": "Từ 40.000.000 đồng đến 60.000.000 đồng", "D": "Từ 50.000.000 đồng đến 70.000.000 đồng"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tẩy xóa, sữa chữa, cho mượn, cho thuê hoặc thuê, mượn chứng chỉ hành nghề môi giới bất động sản để thực hiện các hoạt động liên quan đến môi giới bất động sản thì bị phạt tiền?", "options": {"A": "Từ 20.000.000 đồng đến 40.000.000 đồng", "B": "Từ 30.000.000 đồng đến 50.000.000 đồng", "C": "Từ 40.000.000 đồng đến 60.000.000 đồng", "D": "Từ 50.000.000 đồng đến 70.000.000 đồng"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Không lập hợp đồng hoặc hợp đồng kinh doanh dịch vụ bất động sản không đầy đủ các nội dung chính theo quy định thì bị phạt tiền? (căn cứ Điều 59 Nghị định 16/2022/NĐ-CP)", "options": {"A": "Từ 100.000.000 đồng đến 140.000.000 đồng", "B": "Từ 120.000.000 đồng đến 160.000.000 đồng", "C": "Từ 140.000.000 đồng đến 180.000.000 đồng", "D": "Từ 160.000.000 đồng đến 200.000.000 đồng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Sàn giao dịch bất động sản không có quy chế hoạt động, tên, địa chỉ theo quy định hoặc hoạt động sai quy chế được cơ quan có thẩm quyền chấp thuận thì bị phạt tiền?", "options": {"A": "Từ 100.000.000 đồng đến 140.000.000 đồng", "B": "Từ 120.000.000 đồng đến 160.000.000 đồng", "C": "Từ 140.000.000 đồng đến 180.000.000 đồng", "D": "Từ 160.000.000 đồng đến 200.000.000 đồng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Hành vi không cung cấp, cung cấp không đầy đủ hoặc cung cấp không chính xác hồ sơ, thông tin về bất động sản mà mình môi giới thì bị phạt tiền?", "options": {"A": "Từ 50.000.000 đồng đến 100.000.000 đồng", "B": "Từ 100.000.000 đồng đến 150.000.000 đồng", "C": "Từ 150.000.000 đồng đến 200.000.000 đồng", "D": "Từ 200.000.000 đồng đến 250.000.000 đồng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Sàn giao dịch bất động sản có quyền từ chối đưa lên sàn các bất động sản nào?", "options": {"A": "Bất động sản có giá quá cao.", "B": "Bất động sản không đủ điều kiện đưa vào kinh doanh theo quy định của pháp luật.", "C": "Bất động sản của chủ đầu tư không phải là đối tác chiến lược.", "D": "Bất động sản đã qua sử dụng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong quá trình marketing sản phẩm BĐS, công ty kinh doanh BĐS có một số chương trình khuyến mãi. Mục tiêu chủ yếu của khuyến mãi là gì?", "options": {"A": "Tăng danh tiếng của công ty và đẩy mạnh tiêu thụ hàng hoá", "B": "Bán và thanh lý hàng tồn kho", "C": "Tạo sự khác biệt so với đối thủ, chiếm lĩnh thị phần của đối thủ cạnh tranh", "D": "Tạo sự nhận biết thương hiệu và cảm tình từ khách hàng mục tiêu"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Vì sao doanh nghiệp kinh doanh BĐS phải chọn thị trường mục tiêu?", "options": {"A": "Vì phải theo phân khúc thị trường có lợi hơn", "B": "Vì để tạo lợi thế cạnh tranh", "C": "Để phục vụ khách hàng tốt nhất", "D": "Là yếu tố khách hàng cần và mua, tạo hấp dẫn và lôi cuốn khách hàng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tại sao trong các hoạt động quảng cáo truyền thông và bán hàng, các doanh nghiệp kinh doanh BĐS cần tập trung vào giá trị cốt lõi, giá trị khác biệt của sản phẩm trong việc cung ứng cho khách hàng:", "options": {"A": "Vì phải theo phân khúc thị trường có lợi hơn", "B": "Vì để tạo lợi thế cạnh tranh", "C": "Để phục vụ khách hàng tốt nhất", "D": "Là yếu tố khách hàng cần và mua, tạo hấp dẫn và lôi cuốn khách hàng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tranh thủ sự tín nhiệm của bạn bè thân, đề nghị họ giới thiệu hoặc cung cấp danh sách khách hàng và được lặp lại nhiều lần là đặc điểm của cách tiếp cận khách hàng theo kiểu:", "options": {"A": "Tiêu thụ lặp lại", "B": "Giới thiệu dây chuyền", "C": "Tận dụng người tốt trong xã hội", "D": "Tiêu thụ trực tiếp"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Giá trị BĐS buộc phải bán (bán trong điều kiện không bình thường) không phản ánh giá trị thị trường vì:", "options": {"A": "Thời gian tiếp thị BĐS không phù hợp cho việc mua bán BĐS đó", "B": "Người bán phải bán BĐS một cách gượng ép", "C": "Người bán người mua tự quyết định giá bán", "D": "Giá tính theo giá thanh lý hoặc đền bù giải tỏa"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi kết thúc thương vụ, người môi giới BĐS cần phải chú ý gì?", "options": {"A": "Theo dõi, hỗ trợ các bên trong việc hoàn chỉnh hồ sơ; xem tính hợp pháp của người nhận cọc và người đặt cọc; các khoản phí phát sinh nếu có", "B": "Tham gia ký hợp đồng thoả thuận, thời gian giao nhận tiền và ký hợp đồng mua bán, giao nhận BĐS, các điều khoản về vi phạm hợp đồng, các loại giấy tờ còn đang thiếu, tham gia vào quá trình thanh toán, nhận tiền hoa hồng", "C": "Lấy tiền hoa hồng ngay, tránh bị \"luồn cò”", "D": "Hoàn thành nghĩa vụ, tìm kiếm khách hàng mới"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Ông E dẫn khách mua đất và cung cấp thông tin rằng thửa đất “đã có quy hoạch đất ở”, “chỉ chờ lên thổ cư”, trong khi trên thực tế đất chưa được phép chuyển mục đích sử dụng. Nhận định đúng nhất là:", "options": {"A": "Tư vấn định hướng đầu tư", "B": "Giới thiệu tiềm năng quy hoạch", "C": "Cung cấp thông tin sai lệch trong hoạt động kinh doanh BĐS", "D": "Không thuộc phạm vi điều chỉnh của luật"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Đâu là hình thức quảng cáo trực tuyến (Online)?", "options": {"A": "Quảng cáo trực quan hiển thị trên các nền tảng.", "B": "Quảng cáo tìm kiếm theo từ khóa đấu thầu trên các nền tảng Google search (tìm kiếm).", "C": "Email Marketing.", "D": "Đáp án A, B và C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trong các ý sau, ý nào chưa chính xác khi nói về nhóm các yếu tố tự nhiên liên hệ trực tiếp đến bất động sản:", "options": {"A": "Nhu cầu của bất động sản trên thị trường", "B": "Vị trí, kích thước, hình thể, diện tích thửa đất...", "C": "Địa hình tọa lạc và hình thức bên ngoài của bất động sản", "D": "Đặc điểm trên mặt đất- dưới lòng đất, và tình trạng môi trường, các tiện lợi và nguy cơ rủi ro của tự nhiên"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Hoạt động \"Phân tích thị trường\" của môi giới giúp ích gì cho khách hàng?", "options": {"A": "Giúp khách hàng chọn thời điểm mua/bán và giá cả hợp lý.", "B": "Chỉ để nhà môi giới thể hiện trình độ.", "C": "Làm cho khách hàng hoang mang hơn về thị trường.", "D": "Không có tác dụng thực tế trong giao dịch lẻ."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Khi sàn giao dịch bất động sản cung cấp thông tin sai sự thật gây thiệt hại cho khách hàng, trách nhiệm thuộc về ai?", "options": {"A": "Chỉ nhân viên tư vấn trực tiếp.", "B": "Sàn giao dịch và người đại diện theo pháp luật của sàn.", "C": "Khách hàng vì không kiểm tra lại thông tin.", "D": "Cơ quan cấp phép hoạt động cho sàn."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Một trong các hành vi nào dưới đây là vi phạm pháp luật về thu, quản lý, sử dụng phí, lệ phí trong kinh doanh bất động sản?", "options": {"A": "Quản lý và sử dụng phí dịch vụ môi giới bất động sản theo thỏa thuận của các bên", "B": "Thu phí dịch vụ bất động sản không có hóa đơn, chứng từ hợp lệ hoặc thu quá mức quy định của pháp luật", "C": "Thu phí dịch vụ môi giới bất động sản đúng mức quy định của pháp luật và hợp đồng đã ký", "D": "Sử dụng lệ phí đăng ký bất động sản đúng mục đích và công khai"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Để hành nghề môi giới bất động sản một cá nhân phải:", "options": {"A": "Có chứng chỉ hành nghề môi giới bất động sản và hành nghề độc lập", "B": "Chỉ cần có chứng chỉ hành nghề môi giới và không cần làm việc trong doanh nghiệp", "C": "Có hợp đồng cộng tác với tổ chức/cá nhân/công ty bất động sản", "D": "Có chứng chỉ hành nghề môi giới bất động sản và làm việc trong một doanh nghiệp kinh doanh dịch vụ sàn hoặc doanh nghiệp kinh doanh dịch vụ môi giới."}, "answer": "D", "explanation": ""}];
        let quizData = [];
        let currentIndex = 0;

        window.onload = function() {
            if(!allData || allData.length === 0) {
                document.getElementById("quiz-container").innerHTML = "<h3 style='color:red; text-align:center;'>Lỗi: Không có dữ liệu câu hỏi!</h3>";
                return;
            }
            quizData = getSampledQuestions(100);
            renderQuestion();
        };

        // Thuật toán lấy mẫu 100 câu theo Thang đo Bloom
        function getSampledQuestions(count) {
            const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
            const filterLvl = (l) => allData.filter(q => String(q.level) === String(l));
            
            let p1 = shuffle(filterLvl("1")); let p2 = shuffle(filterLvl("2"));
            let p3 = shuffle(filterLvl("3")); let p4 = shuffle(filterLvl("4")); let p5 = shuffle(filterLvl("5"));

            let n1 = Math.round(count * 0.25); let n2 = Math.round(count * 0.25);
            let n3 = Math.round(count * 0.20); let n4 = Math.round(count * 0.20);
            let n5 = count - (n1 + n2 + n3 + n4);

            let selected = [ ...p1.splice(0, n1), ...p2.splice(0, n2), ...p3.splice(0, n3), ...p4.splice(0, n4), ...p5.splice(0, n5) ];

            if(selected.length < count) {
                let remain = shuffle([...p1, ...p2, ...p3, ...p4, ...p5]);
                selected = [...selected, ...remain.splice(0, count - selected.length)];
            }
            return shuffle(selected);
        }

        // Render câu hỏi lên màn hình
        function renderQuestion() {
            const q = quizData[currentIndex];
            const isMulti = q.content.includes("[*]");
            document.getElementById("progress-text").innerText = `Câu ${currentIndex + 1} / ${quizData.length}`;
            
            let optHtml = "";
            let hasOptions = false;
            
            ['A','B','C','D'].forEach(lbl => {
                if(q.options && q.options[lbl]) {
                    hasOptions = true;
                    optHtml += `
                        <label class="option-item" id="label-${lbl}">
                            <input type="${isMulti ? 'checkbox' : 'radio'}" name="q_opt" value="${lbl}" onchange="updateSelection()">
                            <b>${lbl}.</b> ${q.options[lbl]}
                        </label>`;
                }
            });

            if(!hasOptions) {
                optHtml = "<div style='color:red; background:#ffebee; padding:10px; border-radius:5px;'><i>⚠️ Lỗi: Không trích xuất được đáp án. Trong Word, anh hãy tự gõ A., B., C., D. (tắt tính năng đánh số tự động).</i></div>";
            }

            document.getElementById("quiz-container").innerHTML = `
                <div class="card">
                    <div class="q-meta">MỨC ĐỘ THỬ THÁCH: ${q.level || '1'}</div>
                    <div class="q-text">${q.content.replace(/\[\*\]/g, "").replace(/\n/g, '<br>')}</div>
                    <div class="options">${optHtml}</div>
                    
                    <button id="btn-check" class="btn-check-inline" onclick="checkAnswer()">Kiểm tra đáp án</button>
                    
                    <div id="exp-box" class="exp-box"></div>
                </div>`;
            window.scrollTo(0,0);
        }

        // Cập nhật viền xanh khi chạm chọn đáp án
        function updateSelection() {
            document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
            document.querySelectorAll('input:checked').forEach(el => el.parentElement.classList.add('selected'));
        }

        // Xử lý logic Nút Kiểm Tra
        function checkAnswer() {
            const q = quizData[currentIndex];
            const box = document.getElementById("exp-box");
            const btn = document.getElementById("btn-check");
            
            // Gom các đáp án đã chọn
            const checkedInputs = document.querySelectorAll('input[name="q_opt"]:checked');
            const selectedVals = Array.from(checkedInputs).map(i => i.value).sort().join(",");
            
            if (!selectedVals) {
                alert("⚠️ Vui lòng chọn một phương án trước khi kiểm tra!");
                return;
            }

            // Ẩn nút kiểm tra, hiện Box giải thích
            btn.style.display = "none";
            box.style.display = "block";

            let resultTitle = "";
            // Kiểm tra đúng sai
            if (selectedVals === q.answer) {
                resultTitle = `<div class="result-title" style="color: var(--success);">✔ CHÍNH XÁC!</div>`;
                box.style.borderLeftColor = "var(--success)";
            } else {
                resultTitle = `<div class="result-title" style="color: var(--error);">✘ SAI RỒI! (Bạn chọn: ${selectedVals})</div>`;
                box.style.borderLeftColor = "var(--error)";
            }

            // Tô màu các lựa chọn A, B, C, D
            ['A','B','C','D'].forEach(lbl => {
                const el = document.getElementById(`label-${lbl}`);
                if(!el) return;
                
                // Tô xanh đáp án đúng của hệ thống
                if(q.answer.includes(lbl)) {
                    el.classList.add('correct-ans');
                } 
                // Tô đỏ đáp án sai mà người dùng chọn
                else if(selectedVals.includes(lbl)) {
                    el.classList.add('wrong-ans');
                }
                
                // Vô hiệu hóa input để không cho click đổi nữa
                const input = el.querySelector('input');
                if(input) input.disabled = true;
            });

            // Gắn nội dung vào Box
            box.innerHTML = `
                ${resultTitle}
                <div style="margin-bottom:12px; font-size:1.05em;"><b>Đáp án đúng:</b> <span style="color:var(--success); font-weight:bold">${q.answer}</span></div>
                <div>${q.explanation || "<i>Hệ thống chưa cập nhật giải thích cho câu này.</i>"}</div>
            `;

            // Tự động cuộn mượt mà xuống phần giải thích
            box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Điều hướng câu hỏi
        function nextQ() { if(currentIndex < quizData.length-1) { currentIndex++; renderQuestion(); } }
        function prevQ() { if(currentIndex > 0) { currentIndex--; renderQuestion(); } }
    </script>

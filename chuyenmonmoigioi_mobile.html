    <script>
        const allData = [{"level": "1", "content": "Theo Luật kinh doanh bất động sản 2023 (hiệu lực 01/08/2024), điều kiện tiên quyết để một cá nhân được hành nghề môi giới bất động sản là gì?", "options": {"A": "Có ít nhất 5 năm kinh nghiệm.", "B": "Phải là thành viên của Hiệp hội bất động sản Việt Nam.", "C": "Có Chứng chỉ hành nghề môi giới bất động sản và phải làm việc trong một tổ chức kinh doanh dịch vụ bất động sản.", "D": "Phải có bằng đại học chuyên ngành Luật hoặc Kinh tế."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Yếu tố \"Hội nhập quốc tế\" ảnh hưởng đến nghề môi giới bất động sản Việt Nam chủ yếu ở khía cạnh nào?", "options": {"A": "Làm giảm số lượng nhà môi giới bất động sản trong nước.", "B": "Đòi hỏi nâng cao tính chuyên nghiệp, kỹ năng (ngoại ngữ, đàm phán quốc tế), hiểu biết luật pháp và thông lệ quốc tế để phục vụ khách hàng/đối tác nước ngoài.", "C": "Khiến mức phí hoa hồng giảm xuống.", "D": "Hạn chế vai trò của các sàn giao dịch bất động sản."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nguyên tắc đạo đức \"Trung thành\" (Loyalty) của nhà môi giới bất động sản đối với khách hàng bị vi phạm trong trường hợp nào sau đây?", "options": {"A": "Môi giới tư vấn cho người bán nên sửa chữa lại nhà trước khi bán để được giá tốt hơn.", "B": "Môi giới đại diện người mua nhưng lại cố tình giới thiệu bất động sản giá cao hơn thị trường để nhận hoa hồng cao hơn từ người bán (nếu có thỏa thuận ngầm).", "C": "Môi giới từ chối tiết lộ thông tin tài chính cá nhân của người bán cho người mua.", "D": "Môi giới nỗ lực đàm phán để đạt được các điều khoản có lợi nhất cho khách hàng của mình."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc pháp luật yêu cầu nhà môi giới bất động sản phải có Chứng chỉ hành nghề nhằm mục đích chính là gì?", "options": {"A": "Tăng nguồn thu từ lệ phí thi và cấp chứng chỉ.", "B": "Hạn chế số lượng người tham gia vào nghề môi giới bất động sản.", "C": "Đảm bảo nhà môi giới bất động sản có kiến thức chuyên môn, pháp luật và đạo đức cơ bản, góp phần nâng cao chất lượng dịch vụ và bảo vệ người tiêu dùng.", "D": "Giúp các trường đại học có thêm chương trình đào tạo."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Một cá nhân có Chứng chỉ hành nghề môi giới bất động sản nhưng không làm việc cho công ty nào, tự đứng ra nhận tiền của khách để tìm nhà giúp họ từ ngày 01/08/2024. Hành vi này có phù hợp với quy định mới không?", "options": {"A": "Hoàn toàn phù hợp vì đã có chứng chỉ.", "B": "Không phù hợp, cá nhân phải hành nghề thông qua một tổ chức kinh doanh dịch vụ bất động sản.", "C": "Chỉ phù hợp nếu giao dịch giá trị thấp.", "D": "Chỉ phù hợp nếu khách hàng đồng ý."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Điều kiện về \"cơ sở vật chất, kỹ thuật\" đối với doanh nghiệp kinh doanh dịch vụ môi giới bất động sản nhằm đảm bảo điều gì?", "options": {"A": "Văn phòng phải thật sang trọng, hoành tráng.", "B": "Doanh nghiệp có địa điểm hoạt động rõ ràng, có đủ trang thiết bị tối thiểu để phục vụ hoạt động nghiệp vụ và lưu trữ hồ sơ theo quy định.", "C": "Doanh nghiệp phải có website riêng.", "D": "Doanh nghiệp phải có ít nhất 10 máy tính."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Yếu tố nào sau đây có ảnh hưởng GIÁN TIẾP nhưng lại mang tính quyết định đến sự sôi động hay trầm lắng của nghề môi giới bất động sản trong dài hạn?", "options": {"A": "Quy định về mẫu hợp đồng môi giới.", "B": "Số lượng các khóa đào tạo môi giới được mở.", "C": "Tình hình kinh tế vĩ mô và chu kỳ của thị trường bất động sản.", "D": "Mức lệ phí cấp chứng chỉ hành nghề."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nguyên tắc \"Công bằng, minh bạch\" trong hoạt động môi giới đòi hỏi nhà môi giới bất động sản KHÔNG được làm điều gì?", "options": {"A": "Cung cấp thông tin về quy hoạch cho người mua.", "B": "Che giấu thông tin về một khoản phí mà khách hàng phải trả không được báo trước.", "C": "Giải thích rõ các điều khoản trong hợp đồng.", "D": "Nỗ lực tìm kiếm Bất động sản phù hợp nhất với nhu cầu khách hàng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc Luật kinh doanh bất động sản Việt Nam công nhận và quy định về nghề môi giới bất đống sản có ý nghĩa gì đối với sự phát triển của nghề?", "options": {"A": "Hạn chế sự phát triển của nghề.", "B": "Tạo cơ sở pháp lý chính thức, khẳng định vai trò xã hội, thúc đẩy sự chuyên nghiệp hóa và tạo điều kiện cho nghề phát triển một cách bài bản, có quản lý.", "C": "Khiến việc hành nghề trở nên khó khăn hơn không cần thiết.", "D": "Không có ý nghĩa gì đáng kể."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tại sao nhà môi giới bất động sản cần có kiến thức về các yếu tố ảnh hưởng đến cung, cầu BĐS (kinh tế vĩ mô, tài chính, xã hội...)?", "options": {"A": "Chỉ để phục vụ việc thi lấy chứng chỉ.", "B": "Để có thể phân tích, dự báo (ở mức độ nhất định) xu hướng thị trường, từ đó tư vấn chiến lược phù hợp cho khách hàng (thời điểm mua/bán, mức giá hợp lý, tiềm năng đầu tư...).", "C": "Để có thể tự đầu tư Bất động sản hiệu quả hơn.", "D": "Để có chuyện nói với khách hàng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Công ty môi giới bất động sản M chỉ có một người duy nhất sở hữu Chứng chỉ hành nghề môi giới bất động sản BĐS. Nếu người này nghỉ việc, công ty M có còn đủ điều kiện kinh doanh dịch vụ môi giới bất động sản theo Luật KDBĐS 2023 không?", "options": {"A": "Vẫn đủ điều kiện bình thường.", "B": "Không còn đủ điều kiện và phải bổ sung người có chứng chỉ khác hoặc tạm dừng hoạt động.", "C": "Chỉ cần giám đốc công ty có chứng chỉ là đủ.", "D": "Vẫn đủ điều kiện nếu công ty có doanh thu cao."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc nhà môi giới bất động sản từ chối tham gia vào một giao dịch có dấu hiệu rửa tiền, mặc dù có thể mang lại hoa hồng rất lớn, thể hiện việc tuân thủ nguyên tắc nào?", "options": {"A": "Nguyên tắc lấy lợi ích khách hàng làm định hướng.", "B": "Nguyên tắc tuân thủ pháp luật và đạo đức nghề nghiệp.", "C": "Nguyên tắc công khai, minh bạch.", "D": "Nguyên tắc hoạt động dựa trên chuyên môn."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Sự phát triển của các nền tảng công nghệ bất động sản (Proptech) tại Việt Nam ảnh hưởng đến vai trò của nhà môi giới bất động sản truyền thống như thế nào?", "options": {"A": "Hoàn toàn thay thế vai trò của nhà môi giới bất động sản.", "B": "Không ảnh hưởng gì đáng kể.", "C": "Tạo ra cả thách thức (yêu cầu môi giới phải nâng cao kỹ năng công nghệ, đối mặt cạnh tranh từ nền tảng) và cơ hội (công cụ tìm kiếm khách hàng, quản lý công việc, marketing hiệu quả hơn).", "D": "Chỉ làm tăng chi phí hoạt động cho nhà môi giới bất động sản."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nguyên tắc \"Hoạt động dựa trên nền tảng kiến thức chuyên môn và kinh nghiệm\" đòi hỏi nhà môi giới bất động sản phải làm gì liên tục?", "options": {"A": "Chỉ dựa vào kinh nghiệm cá nhân đã có.", "B": "Luôn học hỏi, cập nhật kiến thức mới về thị trường, pháp luật, công nghệ và trau dồi kỹ năng nghiệp vụ.", "C": "Chỉ cần có chứng chỉ hành nghề là đủ.", "D": "Thường xuyên thay đổi lĩnh vực hoạt động."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc thành lập Sàn giao dịch Bất động sản ở Việt Nam có yêu cầu gì khác biệt cơ bản so với thành lập một doanh nghiệp môi giới thông thường?", "options": {"A": "Không cần người có chứng chỉ môi giới.", "B": "Phải đăng ký hoạt động với Sở Xây dựng, đáp ứng điều kiện khắt khe hơn về cơ sở vật chất và người quản lý/điều hành phải có chứng nhận đào tạo quản lý sàn, được cấp giấy phép thành lập sàn.", "C": "Chỉ được phép giao dịch BĐS hình thành trong tương lai.", "D": "Không được phép thu hoa hồng môi giới."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tại sao nguyên tắc đạo đức \"Không phân biệt đối xử\" lại quan trọng trong hoạt động môi giới bất động sản?", "options": {"A": "Giúp nhà môi giới bất động sản có nhiều khách hàng hơn.", "B": "Đảm bảo sự công bằng trong việc cung cấp dịch vụ, tuân thủ pháp luật về chống phân biệt đối xử và xây dựng hình ảnh nhân văn, chuyên nghiệp cho nghề.", "C": "Giúp nhà môi giới bất động sản dễ dàng định giá bất động sản hơn.", "D": "Chỉ áp dụng khi làm việc với khách hàng nước ngoài."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Yếu tố \"Lợi nhuận hấp dẫn\" ảnh hưởng đến sự phát triển nghề môi giới bất động sản như thế nào?", "options": {"A": "Chỉ có tác động tiêu cực, làm nhiều người thiếu năng lực tham gia.", "B": "Là động lực thu hút nhân lực tham gia vào nghề, nhưng cũng đòi hỏi phải có cơ chế quản lý, đào tạo và đạo đức để đảm bảo sự phát triển bền vững, chuyên nghiệp.", "C": "Không ảnh hưởng gì đến sự phát triển của nghề.", "D": "Chỉ ảnh hưởng đến các nhà môi giới bất động sản làm việc độc lập."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nếu nhà môi giới bất động sản không có Chứng chỉ hành nghề mà vẫn thực hiện hoạt động môi giới và thu phí, họ có thể đối mặt với hậu quả pháp lý nào?", "options": {"A": "Chỉ bị khách hàng nhắc nhở.", "B": "Bị xử phạt vi phạm hành chính theo quy định của pháp luật về kinh doanh Bất động sản và có thể không được pháp luật bảo vệ quyền lợi về hoa hồng.", "C": "Được phép tiếp tục hành nghề nếu nộp phạt.", "D": "Không có hậu quả gì nếu khách hàng không khiếu nại."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc nhà môi giới bất động sản chủ động tham gia các khóa đào tạo liên tục mang lại lợi ích kép là gì?", "options": {"A": "Chỉ để đáp ứng yêu cầu gia hạn giấy phép/chứng chỉ.", "B": "Vừa đáp ứng yêu cầu pháp lý/nghề nghiệp để duy trì quyền hành nghề, vừa giúp cập nhật kiến thức, nâng cao kỹ năng và năng lực cạnh tranh.", "C": "Chỉ giúp mở rộng mối quan hệ.", "D": "Chỉ tốn kém chi phí và thời gian."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Một sàn giao dịch bất động sản không công khai thông tin về chủ đầu tư và tình trạng pháp lý của dự án đang bán trên website của mình. Hành vi này vi phạm nguyên tắc nào?", "options": {"A": "Nguyên tắc Tuân thủ pháp luật (có thể vi phạm quy định về công khai thông tin).", "B": "Nguyên tắc Công khai, minh bạch.", "C": "Không vi phạm nguyên tắc nào.", "D": "Cả A và B."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trong các yếu tố ảnh hưởng gián tiếp đến sự phát triển nghề môi giới bất động sản, yếu tố nào phản ánh khả năng chi trả và quyết định mua bất động sản của người dân rõ rệt nhất?", "options": {"A": "Chi phí xây dựng.", "B": "Chính sách quy hoạch đô thị.", "C": "Sức mua, thu nhập bình quân và khả năng tiếp cận tín dụng.", "D": "Số lượng dự án bất động sản mới được cấp phép."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Vai trò \"Khai thác nguồn thu cho ngân sách nhà nước\" của hoạt động môi giới thể hiện như thế nào?", "options": {"A": "Nhà môi giới bất động sản trực tiếp thu thuế thay nhà nước.", "B": "Hoạt động môi giới thúc đẩy các giao dịch bất động sản diễn ra thành công và hợp pháp, từ đó tạo cơ sở cho việc thu các loại thuế, phí liên quan đến giao dịch đó.", "C": "Nhà môi giới bất động sản phải đóng góp một phần hoa hồng cho nhà", "D": "Nhà môi giới bất động sản tư vấn cho khách hàng cách tránh thuế."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Nhà môi giới bất động sản A được người bán ủy thác bán nhà. Sau đó, chính môi giới A lại muốn mua căn nhà đó. Để đảm bảo đạo đức và tránh xung đột lợi ích, môi giới A cần làm gì?", "options": {"A": "Tự mình mua với giá thấp hơn thị trường vì đang là người môi giới.", "B": "Thông báo rõ ràng ý định muốn mua của mình cho người bán, từ bỏ vai trò môi giới đại diện cho người bán trong giao dịch này và tiến hành mua bán một cách công bằng như một người mua thông thường (có thể cần bên thứ ba hỗ trợ).", "C": "Nhờ người nhà đứng tên mua hộ để che giấu.", "D": "Vừa đóng vai trò môi giới vừa là người mua để tự thương lượng giá."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Yếu tố \"Sự chuyển đổi cơ cấu kinh tế - xã hội\" (ví dụ: từ nông nghiệp sang công nghiệp, dịch vụ) ảnh hưởng đến nhu cầu loại hình bất động sản nào nhiều nhất?", "options": {"A": "Chỉ ảnh hưởng đến nhu cầu đất nông nghiệp.", "B": "Gần như không ảnh hưởng đến thị trường bất động sản.", "C": "Tạo ra và thay đổi mạnh mẽ nhu cầu đối với các loại hình bất động sản khác nhau (nhà ở đô thị, bất động sản công nghiệp, văn phòng, thương mại, dịch vụ...).", "D": "Chỉ ảnh hưởng đến bất động sản ở khu vực nông thôn."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tình huống: Doanh nghiệp môi giới bất động sản B sử dụng Chứng chỉ hành nghề môi giới bất động sản của nhân viên C (đã nghỉ việc) để đăng ký hoạt động. Hành vi này có vi phạm pháp luật không?", "options": {"A": "Không vi phạm nếu nhân viên C đồng ý.", "B": "Vi phạm nghiêm trọng quy định về điều kiện kinh doanh dịch vụ môi giới (sử dụng chứng chỉ không đúng người, không còn người đủ điều kiện làm việc).", "C": "Chỉ vi phạm nếu bị cơ quan chức năng phát hiện.", "D": "Không vi phạm nếu doanh nghiệp vẫn hoạt động tốt."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Yếu tố nào sau đây KHÔNG phải là vai trò trực tiếp của nhà môi giới bất động sản chuyên nghiệp?", "options": {"A": "Cung cấp thông tin thị trường.", "B": "Thúc đẩy giao dịch thành công", "C": "Quyết định phê duyệt quy hoạch đô thị.", "D": "Tư vấn về quy trình, thủ tục pháp lý cơ bản."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tình huống: Một sàn giao dịch BĐS bị khách hàng khiếu nại về việc nhân viên tư vấn sai thông tin pháp lý dẫn đến thiệt hại. Ai sẽ là người chịu trách nhiệm chính trước khách hàng và pháp luật?", "options": {"A": "Chỉ cá nhân nhân viên tư vấn đó.", "B": "Sàn giao dịch BĐS (pháp nhân kinh doanh) và người đại diện theo pháp luật/người quản lý sàn phải chịu trách nhiệm về hoạt động của nhân viên thuộc quyền quản lý của mình.", "C": "Khách hàng phải tự chịu trách nhiệm vì đã tin lời tư vấn.", "D": "Hiệp hội Bất động sản."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Yếu tố \"sự phát triển của thị trường tài chính\" ảnh hưởng đến nghề môi giới bất động sản như thế nào?", "options": {"A": "Làm giảm nhu cầu về dịch vụ môi giới.", "B": "Tạo điều kiện cho người mua dễ dàng tiếp cận vốn vay hơn, thúc đẩy cầu bất động sản; đồng thời cũng tạo ra các sản phẩm đầu tư bất động sản phức tạp hơn đòi hỏi sự tư vấn chuyên sâu từ môi giới.", "C": "Chỉ ảnh hưởng đến các nhà đầu tư lớn.", "D": "Khiến việc định giá bất động sản trở nên dễ dàng hơn."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nguyên tắc đạo đức nào bị vi phạm khi nhà môi giới bất động sản tiết lộ cho đối thủ cạnh tranh biết về chiến lược marketing hoặc danh sách khách hàng tiềm năng của công ty mình?", "options": {"A": "Nguyên tắc Công bằng, minh bạch.", "B": "Nguyên tắc Trung thành (với công ty/người sử dụng lao động) và Bảo mật thông tin kinh doanh.", "C": "Nguyên tắc Tuân thủ pháp luật.", "D": "Nguyên tắc Chuyên môn và Trách nhiệm."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc quy định doanh nghiệp môi giới phải có \"quy chế hoạt động dịch vụ\" nhằm mục đích gì?", "options": {"A": "Chỉ để làm thủ tục đăng ký kinh doanh.", "B": "Thiết lập các quy tắc, quy trình làm việc nội bộ rõ ràng, đảm bảo hoạt động chuyên nghiệp, tuân thủ pháp luật và quản lý rủi ro hiệu quả.", "C": "Hạn chế quyền tự do kinh doanh của doanh nghiệp.", "D": "Quy định mức lương tối thiểu cho nhân viên."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Yếu tố nào sau đây KHÔNG ảnh hưởng trực tiếp đến mức phí hoa hồng môi giới bất động sản?", "options": {"A": "Giá trị của bất động sản giao dịch.", "B": "Tỷ lệ hoa hồng thỏa thuận trong hợp đồng dịch vụ.", "C": "Tình trạng pháp lý của nhà môi giới bất động sản (có chứng chỉ hay không).", "D": "Mức độ phức tạp của giao dịch và công sức của nhà môi giới bất động sản."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Yếu tố nào là quan trọng nhất đảm bảo sự thành công lâu dài của một Sàn giao dịch bất động sản tại Việt Nam?", "options": {"A": "Vị trí văn phòng thật đẹp.", "B": "Xây dựng được uy tín, nguồn hàng phong phú, đa dạng, đội ngũ môi giới chuyên nghiệp và quy trình hoạt động minh bạch, hiệu quả.", "C": "Mức phí thu từ các nhà môi giới bất động sản thành viên thật cao.", "D": "Chỉ niêm yết các bất động sản giá rẻ."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc nhà môi giới bất động sản phải \"hành động trong khuôn khổ được ủy quyền trong hợp đồng môi giới\" có nghĩa là gì?", "options": {"A": "Được phép làm mọi thứ để bán được nhà.", "B": "Chỉ được thực hiện những công việc, hành động đã được khách hàng đồng ý và ghi rõ trong phạm vi thỏa thuận của hợp đồng dịch vụ.", "C": "Phải luôn xin ý kiến khách hàng cho từng hành động nhỏ.", "D": "Có thể tự quyết định thay đổi giá bán mà không cần hỏi khách hàng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Doanh nghiệp môi giới bất động sản C thường xuyên tổ chức các buổi đào tạo nội bộ về kỹ năng mềm (giao tiếp, đàm phán) cho nhân viên. Việc này mang lại lợi ích gì trực tiếp nhất?", "options": {"A": "Tăng chi phí đào tạo cho công ty.", "B": "Nâng cao khả năng tương tác, thuyết phục khách hàng và xử lý tình huống của nhân viên, từ đó cải thiện tỷ lệ chốt giao dịch và sự hài lòng của khách hàng.", "C": "Giảm thời gian nhân viên đi gặp khách hàng.", "D": "Giúp nhân viên có thêm bằng cấp."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tại sao nói hoạt động môi giới bất động sản góp phần \"thúc đẩy đổi mới chính sách quản lý bất động sản\"?", "options": {"A": "Vì nhà môi giới bất động sản trực tiếp tham gia soạn thảo luật.", "B": "Vì các vướng mắc, bất cập phát sinh trong thực tế hoạt động môi giới là nguồn thông tin phản hồi quan trọng để cơ quan quản lý xem xét, điều chỉnh chính sách cho phù hợp hơn.", "C": "Vì nhà môi giới bất động sản luôn yêu cầu thay đổi chính sách.", "D": "Vì hoạt động môi giới làm giảm vai trò của cơ quan quản lý."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc một nhà môi giới bất động sản chủ động tư vấn cho khách hàng về các rủi ro tiềm ẩn của một bất động sản (thay vì chỉ nói về ưu điểm) thể hiện điều gì?", "options": {"A": "Sự thiếu tự tin vào khả năng bán hàng.", "B": "Tính chuyên nghiệp, trung thực và đặt lợi ích lâu dài của khách hàng lên trên việc chốt giao dịch bằng mọi giá.", "C": "Sự thiếu hiểu biết về marketing.", "D": "Mong muốn làm nản lòng khách hàng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Sự khác biệt cơ bản giữa \"Sàn giao dịch bất động sản\" và \"Văn phòng môi giới\" thông thường tại Việt Nam là gì?", "options": {"A": "Văn phòng môi giới không được phép thu hoa hồng.", "B": "Sàn giao dịch thường có quy mô lớn hơn, phải đáp ứng điều kiện chặt chẽ hơn về cơ sở vật chất, nhân sự quản lý và phải đăng ký và được cấp phép hoạt động bởi Sở Xây dựng.", "C": "Chỉ Sàn giao dịch mới được môi giới bất động sản hình thành trong tương lai.", "D": "Văn phòng môi giới không cần người có chứng chỉ hành nghề, không cần lập công ty kinh doanh dịch vụ bất động sản."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Đâu KHÔNG phải là nguồn cung cấp thông tin trực tiếp về bất động sản đang chào bán?", "options": {"A": "Chủ đầu tư dự án.", "B": "Người dân treo biển \"Bán nhà\".", "C": "Báo cáo phân tích thị trường của công ty tư vấn.", "D": "Sàn giao dịch bất động sản nhận ký gửi."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Yếu tố nào sau đây ảnh hưởng trực tiếp đến nguồn cung bất động sản?", "options": {"A": "Lãi suất cho vay mua nhà của ngân hàng.", "B": "Thu nhập bình quân của người dân.", "C": "Chính sách về quy hoạch sử dụng đất.", "D": "Tỷ lệ đô thị hóa."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi thu thập thông tin về một bất động sản, yếu tố \"Hướng nhà\" thuộc nhóm thông tin nào?", "options": {"A": "Pháp lý", "B": "Lịch sử - Xã hội", "C": "Kinh tế - Kỹ thuật", "D": "Tài chính"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Vì sao nhà môi giới cần tìm hiểu lý do bán/cho thuê của chủ sở hữu?", "options": {"A": "Để xác định giá trị thực của bất động sản.", "B": "Để đánh giá mức độ thiện chí và khả năng thương lượng của chủ sở hữu.", "C": "Để kiểm tra tình trạng pháp lý của bất động sản.", "D": "Để tính phí hoa hồng môi giới."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tìm kiếm khách hàng thông qua việc gọi điện thoại trực tiếp đến các khách hàng tiềm năng thuộc phương pháp thu thập thông tin về cầu bất động sản nào?", "options": {"A": "Chủ động", "B": "Thụ động", "C": "Ngẫu nhiên", "D": "Gián tiếp"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Khi phân loại khách hàng mua bất động sản, nhóm \"Mua để đầu tư\" thường có đặc điểm gì?", "options": {"A": "Quan tâm chính đến tiện ích sống và không gian cho gia đình.", "B": "Tìm kiếm bất động sản có tiềm năng tăng giá hoặc tạo dòng tiền cho thuê.", "C": "Mục tiêu chính là bảo toàn vốn khỏi lạm phát.", "D": "Ưu tiên các yếu tố về phong thủy và lịch sử nhà."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Mục đích chính của việc lập Hồ sơ thương vụ môi giới là gì?", "options": {"A": "Để quảng cáo bất động sản hiệu quả hơn.", "B": "Để lưu trữ thông tin, theo dõi tiến độ và làm bằng chứng pháp lý.", "C": "Để tính toán chi phí hoạt động của nhà môi giới.", "D": "Để xác định giá trị bất động sản."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nhà môi giới có nên giữ bản gốc Giấy chứng nhận (GCN - Sổ hồng /Sổ đỏ) của khách hàng không?", "options": {"A": "Nên giữ để đảm bảo khách hàng không bán cho người khác.", "B": "Chỉ nên giữ khi khách hàng yêu cầu.", "C": "Tuyệt đối không nên giữ, chỉ xem, sao chụp và hoàn trả ngay.", "D": "Nên giữ và giao cho ngân hàng nếu khách hàng vay vốn."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Hợp đồng Dịch vụ Môi giới Bất động sản là thỏa thuận giữa ai với ai?", "options": {"A": "Giữa người mua và người bán.", "B": "Giữa nhà môi giới và cơ quan quản lý nhà nước.", "C": "Giữa nhà môi giới/công ty môi giới và khách hàng (bên bán/cho thuê hoặc bên mua/thuê).", "D": "Giữa nhà môi giới và ngân hàng cho vay."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Việc đăng ký thế chấp quyền sử dụng đất tại cơ quan nhà nước có thẩm quyền nhằm mục đích gì?", "options": {"A": "Để tính thuế sử dụng đất.", "B": "Để xác định giá trị bất động sản.", "C": "Để làm thủ tục cấp Sổ hồng (GCN) mới.", "D": "Để công khai hóa việc tài sản đang được dùng làm bảo đảm và có giá trị pháp lý với người thứ ba."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Bước đầu tiên trong quy trình thực hiện thương vụ môi giới bất động sản là gì?", "options": {"A": "Đàm phán giá cả.", "B": "Ký hợp đồng đặt cọc.", "C": "Tìm kiếm, tiếp nhận và chuẩn bị thông tin.", "D": "Bàn giao Bất động sản."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Kỹ năng nào là nền tảng quan trọng nhất để thấu hiểu nhu cầu khách hàng?", "options": {"A": "Kỹ năng trình bày.", "B": "Kỹ năng đàm phán.", "C": "Kỹ năng lắng nghe chủ động.", "D": "Kỹ năng quản lý thời gian."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Câu hỏi: \"Anh/chị dự định ngân sách tối đa cho việc mua nhà là bao nhiêu ạ?\" thuộc loại câu hỏi gì?", "options": {"A": "Câu hỏi mở.", "B": "Câu hỏi đóng.", "C": "Câu hỏi dẫn dắt.", "D": "Câu hỏi tu từ."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tại sao cần tập trung trình bày \"lợi ích\" thay vì chỉ \"đặc tính\" của bất động sản?", "options": {"A": "Vì lợi ích dễ nhớ hơn đặc tính.", "B": "Vì khách hàng mua bất động sản vì những giá trị, giải pháp mà bất động sản mang lại cho họ (lợi ích), chứ không chỉ vì bản thân đặc tính đó.", "C": "Vì trình bày lợi ích giúp tăng giá bán bất động sản.", "D": "Vì đặc tính bất động sản thường khó mô tả."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nguyên tắc cơ bản nhất khi xử lý phản đối của khách hàng là gì?", "options": {"A": "Phớt lờ lời phản đối và tiếp tục trình bày.", "B": "Tranh luận để chứng minh khách hàng sai.", "C": "Lắng nghe, đồng cảm, làm rõ vấn đề và giải đáp bằng thông tin khách quan.", "D": "Giảm giá ngay lập tức để khách hàng hài lòng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Kênh giao tiếp nào phù hợp nhất để thảo luận các vấn đề phức tạp, nhạy cảm trong giao dịch bất động sản?", "options": {"A": "Tin nhắn Zalo/SMS.", "B": "Email.", "C": "Gặp mặt trực tiếp.", "D": "Bình luận trên mạng xã hội."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nguyên tắc quan trọng nhất trong quản lý thông tin khách hàng là gì?", "options": {"A": "Chia sẻ thông tin rộng rãi để nhiều người biết.", "B": "Bảo mật thông tin cá nhân và giao dịch của khách hàng.", "C": "Chỉ lưu trữ thông tin khách hàng trong thời gian ngắn.", "D": "Sử dụng thông tin khách hàng để quảng cáo cho sản phẩm khác."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Mục tiêu lý tưởng nhất trong đàm phán bất động sản là mô hình kết quả nào?", "options": {"A": "Win - Lose (Thắng - Thua)", "B": "Lose - Win (Thua - Thắng)", "C": "Lose - Lose (Cùng thua)", "D": "Win - Win (Cùng thắng)"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Khi người bán muốn giá 2 tỷ, người mua trả 1.9 tỷ, chiến thuật nào KHÔNG phù hợp để môi giới thu hẹp khoảng cách?", "options": {"A": "Đề xuất chia đôi khoảng chênh lệch (mỗi bên nhích 50 triệu).", "B": "Tìm kiếm các yếu tố phi giá cả để thương lượng (nội thất, thời gian bàn giao...).", "C": "Nhấn mạnh vào điểm yếu của bất động sản để ép người bán giảm giá sâu hơn nữa.", "D": "Phân tích chi phí cơ hội nếu không đạt được thỏa thuận cho cả hai bên."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Trong đàm phán, việc tập trung vào \"lợi ích\" thay vì \"lập trường\" có nghĩa là gì?", "options": {"A": "Chỉ quan tâm đến lợi ích của mình.", "B": "Tìm hiểu lý do sâu xa đằng sau yêu cầu của mỗi bên để tìm giải pháp đáp ứng nhu cầu thực sự.", "C": "Luôn giữ vững quan điểm ban đầu của mình.", "D": "Ưu tiên các yếu tố tài chính hơn các yếu tố khác."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Mô hình SOFTEN (các kỹ thuật giao tiếp phi ngôn ngữ) được áp dụng trong giai đoạn nào của hoạt động môi giới?", "options": {"A": "Chỉ khi đàm phán giá.", "B": "Chỉ khi ký hợp đồng.", "C": "Trong suốt quá trình giao tiếp trực tiếp với khách hàng.", "D": "Chỉ khi xử lý khiếu nại."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Việc nhà môi giới nhấn mạnh \"Khu vực này sắp có trung tâm thương mại lớn và tuyến metro đi qua\" là đang tập trung vào yếu tố nào để nâng cao giá trị cảm nhận bất động sản?", "options": {"A": "Chất lượng xây dựng.", "B": "Tiềm năng tăng giá và tiện ích tương lai.", "C": "Giá bán so với quá khứ.", "D": "Thiết kế nội thất."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi xây dựng chiến lược kinh doanh cho văn phòng môi giới, việc phân tích đối thủ cạnh tranh KHÔNG nhằm mục đích gì?", "options": {"A": "Hiểu điểm mạnh, điểm yếu của đối thủ.", "B": "Sao chép hoàn toàn mô hình kinh doanh của đối thủ.", "C": "Xác định lợi thế cạnh tranh của văn phòng mình.", "D": "Xây dựng chiến lược giá và dịch vụ phù hợp."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Yếu tố nào thường được xem là quan trọng nhất khi lựa chọn nhân sự cho văn phòng môi giới?", "options": {"A": "Chỉ cần bằng cấp cao.", "B": "Chỉ cần ngoại hình ưa nhìn.", "C": "Năng lực chuyên môn, kỹ năng, thái độ và đạo đức nghề nghiệp.", "D": "Chỉ cần mối quan hệ rộng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Mục tiêu chính của việc lập kế hoạch ngân sách hoạt động cho văn phòng môi giới là gì?", "options": {"A": "Để báo cáo cho cơ quan thuế.", "B": "Để dự trù và kiểm soát các khoản thu chi, đảm bảo hoạt động hiệu quả.", "C": "Để tính lương cho nhân viên.", "D": "Để xác định giá bán bất động sản."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Chỉ số \"Lợi nhuận / Giao dịch\" giúp nhà quản lý đánh giá điều gì?", "options": {"A": "Năng suất lao động của nhân viên.", "B": "Quy mô và chất lượng trung bình của các thương vụ thành công.", "C": "Tỷ suất lợi nhuận trên tổng doanh thu.", "D": "Chi phí hoạt động của văn phòng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Điều khoản nào bắt buộc phải có trong Hợp đồng Dịch vụ Môi giới bất động sản?", "options": {"A": "Mô tả chi tiết nội thất bất động sản.", "B": "Mức phí, thù lao môi giới và điều kiện thanh toán.", "C": "Lịch trình thanh toán tiền mua bất động sản.", "D": "Chữ ký của công chứng viên."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nguyên tắc \"Điều gì không có trong hợp đồng thì nó không tồn tại\" nhấn mạnh điều gì khi soạn thảo/rà soát hợp đồng giao dịch?", "options": {"A": "Hợp đồng càng ngắn càng tốt.", "B": "Mọi thỏa thuận quan trọng phải được ghi nhận rõ ràng, đầy đủ bằng văn bản trong hợp đồng.", "C": "Chỉ cần thỏa thuận miệng là đủ.", "D": "Hợp đồng chỉ cần chữ ký, không cần nội dung chi tiết."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi mua nhà ở hình thành trong tương lai, người mua cần đặc biệt chú ý kiểm tra giấy tờ pháp lý nào của dự án?", "options": {"A": "Sổ hồng (GCN) của các căn đã bán trước đó.", "B": "Giấy phép xây dựng, Văn bản đủ điều kiện bán nhà ở hình thành trong tương lai, Bảo lãnh ngân hàng (nếu có).", "C": "Hợp đồng lao động của công nhân xây dựng.", "D": "Báo cáo tài chính của chủ đầu tư."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Để phòng ngừa rủi ro bất động sản bị giả mạo giấy tờ (sổ giả), biện pháp nào hiệu quả nhất?", "options": {"A": "Chỉ tin vào lời nói của người bán.", "B": "Yêu cầu người bán cung cấp bản photo sổ.", "C": "Đối chiếu thông tin sổ với cơ sở dữ liệu của văn phòng đăng ký đấtg đai hoặc yêu cầu công chứng viên kiểm tra kỹ.", "D": "So sánh sổ với sổ của hàng xóm."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Rủi ro quy hoạch trong giao dịch bất động sản là gì?", "options": {"A": "Bất động sản bị tranh chấp về quyền sở hữu.", "B": "Bất động sản nằm trong khu vực dự kiến bị thu hồi đất hoặc thay đổi chức năng sử dụng theo quy hoạch của nhà nước.", "C": "Bên bán không bàn giao nhà đúng hẹn.", "D": "Diện tích thực tế của bất động sản nhỏ hơn trên giấy tờ."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Biện pháp nào giúp phòng ngừa rủi ro tranh chấp quyền sở hữu bất động sản?", "options": {"A": "Thanh toán toàn bộ tiền mua ngay khi xem nhà.", "B": "Kiểm tra thông tin ngăn chặn giao dịch tại VPĐKĐĐ/Phòng công chứng và yêu cầu văn bản đồng ý của đồng sở hữu (nếu có).", "C": "Chỉ làm việc với người bán lớn tuổi.", "D": "Yêu cầu người bán giảm giá sâu."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc bên mua không thanh toán đúng hạn theo thỏa thuận trong hợp đồng thuộc loại rủi ro nào?", "options": {"A": "Rủi ro quy hoạch.", "B": "Rủi ro bàn giao.", "C": "Rủi ro thanh toán.", "D": "Rủi ro pháp lý dự án."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Mạng xã hội KHÔNG thể giúp nhà môi giới bất động sản trong hoạt động nào sau đây?", "options": {"A": "Xây dựng thương hiệu cá nhân.", "B": "Đăng ký quyền sở hữu bất động sản cho khách hàng.", "C": "Tìm kiếm khách hàng tiềm năng và quảng cáo bất động sản.", "D": "Tương tác, chăm sóc khách hàng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc phân tích dữ liệu lớn (Big Data) trong Bất động sản có thể giúp nhà môi giới làm gì?", "options": {"A": "Sửa chữa các lỗi kỹ thuật của bất động sản.", "B": "Ký hợp đồng mua bán trực tuyến.", "C": "Nhận diện xu hướng thị trường, hành vi khách hàng để tối ưu chiến lược kinh doanh.", "D": "Thiết kế nội thất cho bất động sản."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nhà môi giới nên làm gì khi khách hàng đưa ra một mức giá đề nghị (offer) thấp hơn đáng kể so với giá chào bán?", "options": {"A": "Từ chối ngay lập tức và không làm việc với khách hàng đó nữa.", "B": "Chấp nhận ngay để nhanh chóng chốt giao dịch.", "C": "Tiếp nhận đề nghị một cách chuyên nghiệp, trình bày lại cho bên bán và hỗ trợ quá trình thương lượng.", "D": "Tự ý nâng giá đề nghị của khách hàng lên khi báo cho bên bán."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Kỹ thuật đặt câu hỏi phễu (Funneling) được áp dụng như thế nào?", "options": {"A": "Chỉ đặt các câu hỏi đóng.", "B": "Chỉ đặt các câu hỏi mở.", "C": "Bắt đầu bằng câu hỏi tổng quát, sau đó đi sâu vào chi tiết bằng các câu hỏi cụ thể hơn.", "D": "Đặt các câu hỏi không liên quan để đánh lạc hướng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nếu một bất động sản đang được thế chấp tại ngân hàng, người bán có được quyền bán bất động sản đó không?", "options": {"A": "Không được phép bán trong mọi trường hợp.", "B": "Được phép bán nếu có sự đồng ý của ngân hàng nhận thế chấp và thực hiện thủ tục giải chấp hoặc chuyển nợ theo quy định.", "C": "Chỉ được bán nếu người mua đồng ý trả nợ thay.", "D": "Chỉ được bán sau khi đã trả hết nợ ngân hàng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Bộ tài liệu bán hàng\" (Sales Kit) thường bao gồm những gì?", "options": {"A": "Chỉ có hợp đồng mẫu.", "B": "Chỉ có hình ảnh BĐS.", "C": "Tập hợp các tài liệu giới thiệu về BĐS một cách chuyên nghiệp (thông tin chi tiết, mặt bằng, hình ảnh, bảng giá, chính sách bán hàng...)", "D": "Chỉ có danh thiếp của nhà môi giới."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi làm việc với khách hàng mua là nhà đầu tư \"lướt sóng\", nhà môi giới cần tập trung tư vấn vào yếu tố nào?", "options": {"A": "Thiết kế nội thất đẹp và sang trọng.", "B": "Tính thanh khoản cao và khả năng tăng giá trong ngắn hạn.", "C": "Sự yên tĩnh và không gian xanh của khu vực.", "D": "Lịch sử lâu đời và yếu tố tâm linh của BĐS."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Đâu KHÔNG phải là rủi ro pháp lý thường gặp khi mua nhà đất dự án?", "options": {"A": "Chủ đầu tư chưa hoàn thiện pháp lý đã bán hàng.", "B": "Tiến độ xây dựng bị chậm trễ so với cam kết.", "C": "Chất lượng xây dựng không đảm bảo như quảng cáo.", "D": "Người mua được cấp Sổ hồng (GCN) ngay khi ký hợp đồng mua bán."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "\"Chiến thuật cộng trong đàm phán\" dựa trên việc nêu bật yếu tố nào?", "options": {"A": "Những khiếm khuyết, lỗi của bất động sản.", "B": "Tình hình thị trường đang đi xuống.", "C": "Những ưu điểm, giá trị độc đáo của bất động sản, tiềm năng tăng giá.", "D": "Khả năng tài chính hạn chế của người mua."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Vai trò của nhà môi giới KHÔNG bao gồm việc nào sau đây?", "options": {"A": "Cung cấp thông tin thị trường cho khách hàng.", "B": "Đưa ra quyết định cuối cùng thay cho khách hàng.", "C": "Hỗ trợ khách hàng trong quá trình đàm phán.", "D": "Tư vấn về quy trình, thủ tục giao dịch."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc kiểm tra \"lịch sử tâm linh \" của bất động sản thuộc nhóm thông tin nào cần thu thập?", "options": {"A": "Kinh tế - Kỹ thuật.", "B": "Pháp lý.", "C": "Lịch sử - Xã hội.", "D": "Tài chính."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "\"Chiến thuật trừ trong đàm phán\" hiệu quả nhất khi nào?", "options": {"A": "Khi bất động sản hoàn hảo không có điểm yếu.", "B": "Khi thị trường đang rất sôi động, giá tăng mạnh.", "C": "Khi có thể chỉ ra những điểm yếu khách quan của bất động sản hoặc dẫn chứng được giá giao dịch tương đồng thấp hơn.", "D": "Khi người bán không cần bán gấp."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi dẫn khách xem nhà, nếu khách hàng im lặng, ít đưa ra nhận xét, nhà môi giới nên làm gì?", "options": {"A": "Cũng im lặng và chờ đợi.", "B": "Giả định rằng khách hàng không thích và nhanh chóng chuyển sang bất động sản khác.", "C": "Chủ động đặt câu hỏi gợi mở, khơi gợi câu chuyện về sở thích, mối quan tâm của họ để phá vỡ sự im lặng và tìm hiểu nhu cầu.", "D": "Nói liên tục về các đặc điểm của bất động sản."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Đâu là dấu hiệu cho thấy một cuộc đàm phán đang có nguy cơ đi vào bế tắc (deadlock)?", "options": {"A": "Cả hai bên đều đưa ra nhiều phương án thay thế.", "B": "Các bên không còn đưa ra nhượng bộ nào và giữ vững lập trường đối lập.", "C": "Các bên đồng ý tạm dừng để suy nghĩ thêm.", "D": "Các bên tập trung thảo luận về các chi tiết nhỏ."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Yếu tố nào sau đây KHÔNG phải là mục tiêu chính của hoạt động marketing BĐS?", "options": {"A": "Thu hút khách hàng tiềm năng.", "B": "Tăng nhận diện thương hiệu cho môi giới/sàn.", "C": "Hoàn thiện thủ tục pháp lý cho giao dịch.", "D": "Thúc đẩy giao dịch thành công."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Trong hợp đồng dịch vụ môi giới, điều khoản về \"thời hạn hợp đồng\" quy định điều gì?", "options": {"A": "Thời gian khách hàng phải thanh toán phí.", "B": "Thời gian nhà môi giới được phép cung cấp dịch vụ và hưởng hoa hồng theo thỏa thuận", "C": "Thời gian tối đa để bán được bất động sản.", "D": "Thời gian khách hàng được phép xem bất động sản."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Rủi ro về \"chất lượng công trình\" thường khó phát hiện ngay và có thể thuộc loại nào?", "options": {"A": "Rủi ro quy hoạch.", "B": "Rủi ro pháp lý.", "C": "Rủi ro bàn giao.", "D": "Rủi ro tiềm ẩn."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Khi khách hàng có nhiều lựa chọn bất động sản và tỏ ra phân vân, nhà môi giới nên làm gì?", "options": {"A": "Thúc ép khách hàng chọn đại một căn.", "B": "Đưa thêm thật nhiều lựa chọn khác nữa.", "C": "Giúp khách hàng hệ thống hóa lại các ưu nhược điểm của từng lựa chọn dựa trên nhu cầu của họ, tập trung vào các yếu tố quan trọng nhất để hỗ trợ ra quyết định.", "D": "Bỏ mặc khách hàng tự quyết định."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Việc kiểm tra tình trạng \"ngăn chặn giao dịch\" của bất động sản tại văn phòng đăng ký đất đai giúp phòng ngừa rủi ro nào?", "options": {"A": "Rủi ro về quy hoạch.", "B": "Rủi ro bất động sản đang bị tranh chấp, kê biên hoặc đang thế chấp mà chưa được phép giao dịch.", "C": "Rủi ro về diện tích.", "D": "Rủi ro về chất lượng công trình."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Kỹ năng nào giúp nhà môi giới trình bày thông tin phức tạp (ví dụ: quy trình pháp lý) một cách dễ hiểu cho khách hàng?", "options": {"A": "Kỹ năng đàm phán.", "B": "Kỹ năng sử dụng ngôn ngữ đơn giản, ví dụ minh họa và chia nhỏ thông tin.", "C": "Kỹ năng quản lý thời gian.", "D": "Kỹ năng định giá bất động sản."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi nhận được thông tin phản hồi tiêu cực từ khách hàng sau khi xem nhà, nhà môi giới nên làm gì?", "options": {"A": "Bỏ qua và không quan tâm.", "B": "Tranh cãi với khách hàng để bảo vệ BĐS.", "C": "Lắng nghe cẩn thận, tìm hiểu rõ lý do không hài lòng, cảm ơn phản hồi và sử dụng thông tin đó để tìm BĐS phù hợp hơn hoặc tư vấn lại cho bên bán.", "D": "Đổ lỗi cho khách hàng khó tính."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Việc nhà môi giới chủ động đề xuất các giải pháp tài chính (ví dụ: giới thiệu ngân hàng cho vay) cho khách hàng mua thể hiện kỹ năng gì?", "options": {"A": "Kỹ năng định giá.", "B": "Kỹ năng đàm phán.", "C": "Kỹ năng cung cấp dịch vụ hỗ trợ và gia tăng giá trị.", "D": "Kỹ năng quản lý rủi ro."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Trong hợp đồng mua bán bất động sản, tại sao cần mô tả chi tiết bất động sản (địa chỉ, diện tích, số thửa...)?", "options": {"A": "Để làm tăng giá trị hợp đồng.", "B": "Để xác định chính xác đối tượng của hợp đồng, tránh nhầm lẫn và tranh chấp.", "C": "Để cơ quan thuế dễ tính thuế.", "D": "Chỉ là thủ tục hình thức."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Rủi ro nào có thể phát sinh nếu mua bất động sản thông qua hợp đồng ủy quyền không hợp lệ?", "options": {"A": "Giao dịch có thể bị tuyên vô hiệu, người mua mất tiền và không có quyền sở hữu.", "B": "Người mua phải trả thêm thuế.", "C": "Bất động sản bị giảm giá trị.", "D": "Không có rủi ro nào đáng kể."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Khi soạn thảo điều khoản về phí hoa hồng trong Hợp đồng Dịch vụ Môi giới, cần lưu ý điều gì nhất?", "options": {"A": "Ghi mức phí càng cao càng tốt.", "B": "Ghi mức phí một cách rõ ràng (tỷ lệ % hoặc số tiền cố định) và quy định cụ thể thời điểm, điều kiện thanh toán phí.", "C": "Chỉ cần ghi chung chung \"theo thỏa thuận\".", "D": "Để trống phần phí hoa hồng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Đâu là biểu hiện của việc nhà môi giới \"tách biệt con người và vấn đề\" trong đàm phán?", "options": {"A": "Chỉ trích cá nhân người đối diện khi họ không đồng ý.", "B": "Tập trung vào việc giải quyết các bất đồng về điều khoản, giá cả một cách khách quan, giữ thái độ tôn trọng đối tác.", "C": "Luôn đồng ý với mọi yêu cầu của đối tác để tránh xung đột.", "D": "Từ chối đàm phán nếu không thích người đối diện."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc phân tích chỉ số \"Lợi nhuận / Số lao động\" giúp nhà quản lý văn phòng môi giới điều gì?", "options": {"A": "Xác định quy mô giao dịch trung bình.", "B": "Đánh giá năng suất, hiệu quả làm việc của đội ngũ nhân viên.", "C": "Biết được tổng chi phí hoạt động.", "D": "Đo lường tỷ suất lợi nhuận trên doanh thu."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi phân tích nguồn cung bất động sản, yếu tố \"tốc độ tăng trưởng và suy thoái của từng loại BĐS\" phản ánh điều gì rõ nhất?", "options": {"A": "Chi phí xây dựng hiện tại.", "B": "Chu kỳ của thị trường bất động sản và tâm lý đầu tư.", "C": "Chính sách tín dụng của ngân hàng.", "D": "Mật độ dân số khu vực."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Thông tin nào sau đây về bất động sản thuộc nhóm Pháp lý nhưng thường KHÓ kiểm tra nhất chỉ qua giấy tờ và cần khảo sát thực địa/hỏi thăm?", "options": {"A": "Tên chủ sở hữu trên Sổ hồng (GCN).", "B": "Diện tích đất được công nhận.", "C": "Tình trạng tranh chấp lối đi chung hoặc ranh giới với hàng xóm.", "D": "Thông tin quy hoạch 1/500 tại cơ quan nhà nước."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Một khách hàng Việt Kiều muốn mua nhà tại Việt Nam. Yếu tố pháp lý nào nhà môi giới cần tư vấn ĐẦU TIÊN và quan trọng nhất cho khách hàng này?", "options": {"A": "Thủ tục xin cấp Sổ hồng (GCN).", "B": "Các loại thuế, phí phải nộp khi mua bán.", "C": "Điều kiện và đối tượng người Việt Nam định cư ở nước ngoài được phép sở hữu nhà ở tại Việt Nam theo Luật Nhà ở.", "D": "Cách thức vay vốn ngân hàng tại Việt Nam."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi thẩm định pháp lý một căn nhà riêng lẻ đã qua sử dụng, ngoài Sổ hồng (GCN), giấy tờ nào cũng rất quan trọng để đánh giá tính hợp pháp của công trình xây dựng?", "options": {"A": "Hợp đồng mua bán lần đầu với chủ đầu tư (nếu có).", "B": "Giấy phép xây dựng (đối với nhà xây sau khi có quy định về cấp phép).", "C": "Hóa đơn tiền điện, nước.", "D": "Thông báo nộp thuế đất hàng năm."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc bất động sản bị đưa vào danh sách \"ngăn chặn giao dịch\" tại Văn phòng Đăng ký đất đai có thể do nguyên nhân nào sau đây?", "options": {"A": "Chủ nhà chưa nộp thuế sử dụng đất phi nông nghiệp năm nay.", "B": "Có quyết định kê biên tài sản của tòa án hoặc cơ quan thi hành án.", "C": "Chủ nhà đi công tác nước ngoài dài hạn.", "D": "Bất động sản nằm trong khu vực quy hoạch công viên cây xanh."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong các loại tranh chấp bất động sản, loại nào thường phức tạp và khó giải quyết nhất liên quan đến yếu tố lịch sử và tình cảm?", "options": {"A": "Tranh chấp do sai lệch diện tích đo đạc.", "B": "Tranh chấp về việc nộp thuế, phí.", "C": "Tranh chấp thừa kế quyền sử dụng đất giữa các thành viên trong gia đình.", "D": "Tranh chấp về chất lượng công trình xây dựng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Biện pháp nào là hữu hiệu nhất để phòng ngừa rủi ro mua phải bất động sản đã được bán cho nhiều người trước đó?", "options": {"A": "Yêu cầu người bán cam kết bằng lời nói.", "B": "Kiểm tra kỹ lịch sử giao dịch (nếu có thể), yêu cầu xem bản gốc giấy tờ pháp lý và thực hiện công chứng hợp đồng mua bán ngay khi có thể.", "C": "Chỉ mua bất động sản của người quen.", "D": "Đặt cọc một số tiền thật lớn."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "\"Chiến thuật Nhượng bộ Hợp lý\" trong đàm phán KHÔNG bao gồm hành động nào sau đây?", "options": {"A": "Chuẩn bị trước các điểm có thể nhượng bộ.", "B": "Nhượng bộ một cách vô điều kiện ngay khi đối tác yêu cầu.", "C": "Yêu cầu đối tác có sự nhượng bộ tương ứng khi mình nhượng bộ.", "D": "Giải thích lý do cho sự nhượng bộ (nếu có thể)."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi soạn thảo Hợp đồng Dịch vụ Môi giới độc quyền, điều khoản nào cần được định nghĩa rõ ràng nhất để tránh tranh chấp về sau?", "options": {"A": "Màu sơn yêu thích của khách hàng.", "B": "Phạm vi độc quyền (thời gian, loại hình giao dịch, BĐS cụ thể) và các trường hợp môi giới vẫn được hưởng phí ngay cả khi không trực tiếp tìm được khách.", "C": "Số lần tối đa khách hàng được phép từ chối xem nhà.", "D": "Tên các đối thủ cạnh tranh của nhà môi giới."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nguyên tắc \"Điều gì không có trong hợp đồng thì nó không tồn tại\" đặc biệt quan trọng khi thỏa thuận về vấn đề gì?", "options": {"A": "Tình cảm cá nhân giữa các bên.", "B": "Các trang thiết bị, nội thất người bán để lại cho người mua.", "C": "Dự báo về giá bất động sản trong tương lai.", "D": "Thời tiết vào ngày ký hợp đồng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nhà môi giới có nên đưa ra lời khuyên pháp lý chuyên sâu (ví dụ: giải thích chi tiết về luật thừa kế) cho khách hàng không?", "options": {"A": "Nên làm để thể hiện sự hiểu biết rộng.", "B": "Không nên, vì đó không phải chuyên môn chính và có thể gây rủi ro. Nên giới thiệu khách hàng tìm đến luật sư.", "C": "Chỉ nên làm nếu khách hàng yêu cầu.", "D": "Nên làm và thu thêm phí tư vấn pháp lý."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong hợp đồng mua bán nhà ở hình thành trong tương lai, điều khoản nào bảo vệ người mua tốt nhất nếu chủ đầu tư chậm bàn giao nhà?", "options": {"A": "Điều khoản về thiết kế chi tiết căn hộ.", "B": "Điều khoản quy định rõ mức phạt vi phạm hợp đồng (lãi phạt chậm bàn giao) cho chủ đầu tư.", "C": "Điều khoản về phí quản lý vận hành tòa nhà.", "D": "Điều khoản về việc chủ đầu tư được phép thay đổi vật liệu xây dựng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tại sao việc xác định đúng \"người ra quyết định kinh tế\" trong một nhóm khách xem nhà lại quan trọng đối với chiến lược chào bán?", "options": {"A": "Để chỉ tập trung nói chuyện với người đó, phớt lờ những người khác.", "B": "Để điều chỉnh nội dung và trọng tâm thuyết trình, tập trung vào các yếu tố mà người đó quan tâm nhất (ví dụ: giá cả, tiềm năng đầu tư, chi phí...).", "C": "Để yêu cầu người đó ký hợp đồng ngay lập tức.", "D": "Để biết nên tặng quà cho ai."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi trình bày về bất động sản, việc sử dụng câu chuyện (storytelling) có tác dụng gì?", "options": {"A": "Làm mất thời gian của khách hàng.", "B": "Giúp thông tin trở nên khô khan, khó nhớ.", "C": "Tạo sự kết nối cảm xúc, làm bất động sản trở nên sinh động, đáng nhớ và dễ hình dung hơn về cuộc sống tương lai tại đó.", "D": "Thay thế hoàn toàn cho việc cung cấp thông số kỹ thuật."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Đâu là ví dụ về việc áp dụng kỹ năng \"nâng cao giá trị cảm nhận\" cho một căn hộ cũ cần sửa chữa?", "options": {"A": "Che giấu các khuyết điểm cần sửa chữa.", "B": "Nhấn mạnh vào giá bán rất rẻ so với thị trường.", "C": "Phân tích tiềm năng cải tạo (\"chỉ cần sơn sửa lại là đẹp lung linh\"), vị trí tốt, giá trị đất tăng theo thời gian và so sánh với giá căn hộ mới cùng khu vực.", "D": "Từ chối dẫn khách xem vì nhà quá cũ."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nếu chỉ số \"Lợi nhuận / Tổng doanh thu\" của văn phòng môi giới giảm sút, nhà quản lý cần xem xét yếu tố nào đầu tiên?", "options": {"A": "Tăng số lượng nhân viên.", "B": "Mở rộng thêm văn phòng mới.", "C": "Phân tích cơ cấu chi phí (marketing, vận hành, lương...) và hiệu quả của các nguồn doanh thu.", "D": "Giảm giờ làm việc của nhân viên."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Việc áp dụng nguyên tắc \"Tách biệt con người và vấn đề\" đặc biệt hữu ích trong tình huống nào?", "options": {"A": "Khi đàm phán với người thân hoặc bạn bè.", "B": "Khi trình bày về ưu điểm của BĐS.", "C": "Khi xây dựng kế hoạch marketing.", "D": "Khi tính toán lợi nhuận của văn phòng."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Việc tham gia các hội thảo, khóa học về BĐS giúp nhà môi giới nâng cao điều gì nhất?", "options": {"A": "Khả năng định giá chính xác mọi loại BĐS.", "B": "Cập nhật kiến thức mới về thị trường, pháp luật, công nghệ và mở rộng mạng lưới quan hệ.", "C": "Kỹ năng đàm phán với mọi đối tượng khách hàng.", "D": "Thu nhập hàng tháng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nhà môi giới đang đại diện cho người bán. Một người mua tiềm năng đề nghị một mức giá hợp lý nhưng kèm điều kiện \"thanh toán 95% giá trị khi ký hợp đồng công chứng, 5% còn lại sau khi nhận Sổ hồng (GCN) đã sang tên\". Nhà môi giới nên tư vấn cho người bán như thế nào?", "options": {"A": "Đồng ý ngay vì giá hợp lý.", "B": "Từ chối vì điều kiện thanh toán rủi ro cho người bán", "C": "Phân tích rủi ro cho người bán (việc giữ lại 5% có thể kéo dài, phức tạp nếu có trục trặc sang tên) và đề xuất phương án an toàn hơn (ví dụ: thanh toán đủ tại phòng công chứng, hoặc giữ lại một khoản nhỏ hơn và có thỏa thuận ràng buộc rõ ràng).", "D": "Yêu cầu người mua phải đặt cọc thêm 5%."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Đâu là điểm khác biệt cơ bản giữa \"Marketing\" và \"Bán hàng\" trong lĩnh vực BĐS?", "options": {"A": "Marketing chỉ làm online, bán hàng chỉ làm offline.", "B": "Marketing tập trung vào việc tạo ra nhu cầu, thu hút khách hàng tiềm năng và xây dựng thương hiệu; Bán hàng tập trung vào việc chuyển đổi khách hàng tiềm năng thành giao dịch thực tế.", "C": "Marketing do chủ đầu tư làm, bán hàng do môi giới làm.", "D": "Marketing tốn nhiều chi phí hơn bán hàng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Khi thành lập công ty môi giới bất động sản, việc đăng ký ngành nghề kinh doanh cần tuân thủ theo quy định của luật nào là chính yếu?0 điểm", "options": {"A": "Bộ luật Dân sự.", "B": "Luật Nhà ở.", "C": "Luật Đất đai.", "D": "Luật Doanh nghiệp và Luật Kinh doanh Bất động sản."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Việc nhà quản lý giao phó công việc cụ thể kèm theo quyền hạn và trách nhiệm rõ ràng cho nhân viên môi giới thể hiện kỹ năng quản lý nào?", "options": {"A": "Kỹ năng lập kế hoạch.", "B": "Kỹ năng tổ chức và phân công công việc.", "C": "Kỹ năng kiểm tra, giám sát.", "D": "Kỹ năng động viên, khích lệ."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nếu một Hợp đồng Dịch vụ Môi giới không quy định rõ \"thời điểm phát sinh quyền hưởng hoa hồng\" của nhà môi giới, điều gì có thể xảy ra?", "options": {"A": "Nhà môi giới có quyền đòi hoa hồng ngay khi ký hợp đồng dịch vụ.", "B": "Khách hàng có quyền từ chối trả hoa hồng.", "C": "Dễ phát sinh tranh chấp về việc khi nào nhà môi giới được coi là đã hoàn thành công việc và được hưởng hoa hồng (ví dụ: khi tìm được khách đồng ý mua, khi ký HĐ đặt cọc, hay khi ký HĐ công chứng?).", "D": "Hợp đồng dịch vụ đó bị vô hiệu."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Một bất động sản có vị trí đẹp nhưng thiết kế bên trong lỗi thời, khó bán. Nhà môi giới nên tư vấn cho người bán chiến lược nào hiệu quả nhất?", "options": {"A": "Giữ nguyên hiện trạng và chỉ tập trung giảm giá sâu.", "B": "Đầu tư cải tạo, sửa chữa lớn toàn bộ căn nhà trước khi bán.", "C": "Tập trung marketing vào tiềm năng cải tạo, cung cấp ý tưởng/bản vẽ thiết kế gợi ý và định giá hợp lý phản ánh cả hiện trạng lẫn tiềm năng.", "D": "Chỉ quảng cáo các bất động sản khác đẹp hơn."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi đàm phán, việc nhà môi giới sử dụng kỹ thuật \"im lặng chiến lược\" (strategic silence) sau khi đưa ra một đề nghị hoặc nghe một yêu cầu có tác dụng gì?", "options": {"A": "Thể hiện sự không đồng ý.", "B": "Tạo áp lực tâm lý nhẹ nhàng, khuyến khích đối tác lên tiếng trước hoặc xem xét lại đề nghị.", "C": "Cho thấy sự thiếu chuẩn bị.", "D": "Làm mất thời gian đàm phán."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nếu phát hiện BĐS có dấu hiệu bị \"ô nhiễm tâm linh\" (theo niềm tin dân gian), nhà môi giới nên ứng xử thế nào với thông tin này?", "options": {"A": "Hoàn toàn phớt lờ vì cho là mê tín.", "B": "Chủ động thông báo cho mọi khách hàng tiềm năng.", "C": "Tùy thuộc vào khách hàng và mức độ ảnh hưởng tiềm tàng đến giá trị/quyết định mua; có thể cần trao đổi tế nhị với người bán và cân nhắc thông báo cho người mua nếu đó là yếu tố quan trọng đối với họ.", "D": "Sử dụng thông tin này để ép giá người bán."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi tư vấn cho khách hàng về việc vay ngân hàng mua bất động sản, nhà môi giới KHÔNG nên làm điều gì?", "options": {"A": "Giới thiệu một số ngân hàng có chính sách tốt.", "B": "Giải thích quy trình cơ bản của việc vay vốn.", "C": "Đưa ra cam kết chắc chắn về việc khách hàng sẽ được duyệt vay với lãi suất cụ thể.", "D": "Hỗ trợ khách hàng chuẩn bị một số giấy tờ cơ bản (nếu được yêu cầu)."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Đâu là thách thức chính khi áp dụng công nghệ Blockchain vào quản lý giao dịch BĐS tại Việt Nam hiện nay?", "options": {"A": "Công nghệ Blockchain quá đơn giản.", "B": "Chi phí lưu trữ dữ liệu quá thấp.", "C": "Hành lang pháp lý chưa hoàn thiện, sự chấp nhận và tích hợp với hệ thống quản lý đất đai hiện hành còn hạn chế.", "D": "Thiếu chuyên gia công nghệ thông tin."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "\"Chiến thuật đóng khung\" (Framing) trong đàm phán có thể được áp dụng như thế nào?", "options": {"A": "Đóng khung ảnh BĐS thật đẹp để trình bày.", "B": "Trình bày một vấn đề hoặc một đề xuất theo cách nhấn mạnh vào lợi ích hoặc tránh né mất mát để tác động đến cách nhìn nhận của đối tác.", "C": "Yêu cầu đối tác phải trả lời trong một khung thời gian nhất định.", "D": "Sử dụng khung pháp lý để ép đối tác."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "\"Đại diện kép\" trong môi giới bất động sản tiềm ẩn rủi ro lớn nhất là gì?", "options": {"A": "Môi giới không nhận được hoa hồng.", "B": "Xung đột lợi ích, khó có thể bảo vệ tốt nhất quyền lợi của cả bên mua và bên bán cùng một lúc.", "C": "Thủ tục pháp lý phức tạp hơn.", "D": "Khách hàng không tin tưởng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong hợp đồng, một điều khoản được viết quá mơ hồ, có thể hiểu theo nhiều nghĩa khác nhau, sẽ dẫn đến hậu quả gì?", "options": {"A": "Hợp đồng có giá trị pháp lý cao hơn.", "B": "Dễ dàng thực hiện hơn.", "C": "Có nguy cơ cao dẫn đến tranh chấp", "D": "Giúp các bên linh hoạt hơn."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nếu người mua phát hiện một lỗi tiềm ẩn nghiêm trọng của BĐS sau khi đã nhận nhà (ví dụ: thấm dột nặng vào mùa mưa), họ có quyền yêu cầu người bán chịu trách nhiệm không (theo Bộ luật Dân sự)?", "options": {"A": "Không, vì đã nhận nhà nghĩa là chấp nhận mọi rủi ro.", "B": "Có, nếu chứng minh được lỗi đó đã tồn tại trước thời điểm bàn giao và người bán đã cố tình che giấu hoặc không thông báo (trừ khi hợp đồng có thỏa thuận miễn trừ rõ ràng).", "C": "Chỉ có quyền yêu cầu nhà môi giới chịu trách nhiệm.", "D": "Chỉ có quyền tự bỏ tiền ra sửa chữa."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi tư vấn cho khách hàng lựa chọn giữa việc mua căn hộ chung cư và nhà đất thổ cư, nhà môi giới cần tập trung phân tích dựa trên yếu tố nào là chính?", "options": {"A": "Chỉ dựa vào sở thích cá nhân của nhà môi giới.", "B": "Phân tích ưu nhược điểm của từng loại hình dựa trên nhu cầu cụ thể, khả năng tài chính, lối sống và mục tiêu dài hạn của khách hàng.", "C": "Chỉ dựa vào giá bán của hai loại hình.", "D": "Chỉ tư vấn loại hình mà môi giới có nguồn hàng nhiều hơn."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc sử dụng \"ngôn ngữ tích cực\" trong giao tiếp với khách hàng có tác dụng gì?", "options": {"A": "Làm cho vấn đề trở nên nghiêm trọng hơn.", "B": "Tạo cảm giác lạc quan, xây dựng, khuyến khích sự hợp tác và giảm thiểu xung đột.", "C": "Che giấu sự thật về những điểm yếu của BĐS.", "D": "Khiến nhà môi giới trông thiếu chuyên nghiệp."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Đâu là một ví dụ về việc áp dụng kỹ năng \"quản lý thời gian\" hiệu quả của nhà môi giới?", "options": {"A": "Dành cả ngày để lướt mạng xã hội.", "B": "Lập kế hoạch làm việc hàng ngày/tuần.", "C": "Luôn nhận lời mọi cuộc hẹn ngay cả khi trùng lịch.", "D": "Chỉ làm việc khi có khách hàng gọi đến."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong hợp đồng mua bán nhà ở hình thành trong tương lai, điều khoản về \"bảo lãnh ngân hàng\" có ý nghĩa gì đối với người mua?", "options": {"A": "Đảm bảo người mua chắc chắn được vay vốn.", "B": "Ngân hàng sẽ thay chủ đầu tư hoàn thiện căn hộ nếu cần.", "C": "Ngân hàng sẽ hoàn lại tiền cho người mua nếu chủ đầu tư không bàn giao nhà đúng cam kết theo các điều kiện trong thư bảo lãnh.", "D": "Đảm bảo giá bán căn hộ sẽ không tăng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Yếu tố nào thể hiện tầm nhìn chiến lược của một nhà quản lý văn phòng môi giới bất động sản?", "options": {"A": "Khả năng dự báo xu hướng thị trường, xác định cơ hội phát triển dài hạn,", "B": "Xây dựng đội ngũ kế cận", "C": "Đầu tư vào công nghệ, thương hiệu một cách bền vững.", "D": "Cả A, B, C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tình huống: Nhà môi giới A đang dẫn khách xem một căn nhà. Khách hàng rất thích vị trí nhưng chê bai gay gắt về thiết kế nội thất đã lỗi thời và tuyên bố chỉ mua nếu chủ nhà giảm giá mạnh để họ sửa chữa. Nhà môi giới biết chủ nhà là người lớn tuổi, rất yêu quý căn nhà và không muốn giảm giá. Hướng xử lý nào thể hiện kỹ năng đàm phán và tâm lý tốt nhất?", "options": {"A": "Đồng ý ngay với khách hàng và hứa sẽ ép chủ nhà giảm giá mạnh.", "B": "Bảo vệ quan điểm của chủ nhà, nói rằng thiết kế đó rất đẹp và khách hàng không có mắt thẩm mỹ.", "C": "Ghi nhận ý kiến khách hàng, đồng cảm về nhu cầu sửa chữa, sau đó khéo léo chuyển hướng sang các ưu điểm khác (vị trí, kết cấu, tiềm năng) và đề xuất thương lượng một mức giá hợp lý hơn phản ánh cả ưu điểm lẫn nhược điểm.", "D": "Từ chối làm việc tiếp với khách hàng vì cho rằng họ đòi hỏi quá đáng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tình huống: Khách hàng B (người mua) rất muốn mua căn hộ X nhưng còn thiếu khoảng 10% tài chính, đang chờ người thân gửi tiền về trong 1 tháng tới. Người bán cần bán gấp trong 2 tuần. Nhà môi giới nên tư vấn cho khách hàng B giải pháp nào khả thi và ít rủi ro nhất?", "options": {"A": "Khuyên khách hàng B vay nóng lãi suất cao để đủ tiền ngay.", "B": "Đề nghị khách hàng B đặt cọc cao và cam kết thanh toán đủ trong 2 tuần, bất chấp rủi ro không nhận được tiền kịp.", "C": "Trao đổi thẳng thắn với người bán về tình hình của người mua, đề xuất phương án thương lượng (ví dụ: đặt cọc trước một phần, ký hợp đồng mua bán nhưng thỏa thuận thời gian thanh toán kéo dài hơn 2 tuần và có biện pháp bảo đảm cho người bán).", "D": "Tìm một căn hộ khác rẻ hơn cho khách hàng B."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tình huống: Nhà môi giới C phát hiện Sổ hồng (GCN) của BĐS đang giới thiệu có ghi chú \"Thửa đất nằm trong quy hoạch mở rộng đường giao thông\" nhưng người bán lại khẳng định quy hoạch đó đã bị hủy bỏ và đưa ra một văn bản photocopy không rõ nguồn gốc. Hành động nào thể hiện sự cẩn trọng và đúng đắn nhất?", "options": {"A": "Tin lời người bán và thông tin trên văn bản photocopy.", "B": "Thông báo cho người mua về ghi chú trên sổ và thông tin người bán cung cấp, để người mua tự quyết định.", "C": "Yêu cầu người bán cung cấp văn bản gốc có dấu đỏ của cơ quan chức năng xác nhận hủy bỏ quy hoạch, hoặc tự mình/hướng dẫn người mua đến Phòng Quản lý Đô thị để kiểm tra thông tin quy hoạch mới nhất, chính xác nhất.", "D": "Tư vấn người mua nên mua nhanh vì có thể quy hoạch bị hủy thật."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tình huống: Hợp đồng đặt cọc đã ký, bên mua đã giao tiền cọc. Tuy nhiên, đến ngày ký hợp đồng công chứng, bên bán đột ngột đổi ý không bán nữa vì có người khác trả giá cao hơn. Nhà môi giới nên tư vấn cho bên mua (khách hàng của mình) như thế nào?", "options": {"A": "Khuyên bên mua chấp nhận mất cơ hội và tìm bất động sản khác.", "B": "Tư vấn bên mua về quyền lợi của mình theo hợp đồng đặt cọc (thường là yêu cầu bên bán trả lại tiền cọc và bồi thường một khoản tương đương tiền cọc), hỗ trợ họ thực hiện các bước pháp lý cần thiết (nếu cần).", "C": "Khuyên bên mua trả thêm tiền để cạnh tranh với người trả giá cao hơn.", "D": "Đổ lỗi cho bên bán và không làm gì thêm."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Hợp đồng mua bán đã công chứng, bên mua đã thanh toán 95%. Khi chuẩn bị bàn giao nhà, phát hiện có một vụ cháy nhỏ xảy ra làm hư hỏng một phần nội thất. Trách nhiệm xử lý thuộc về ai nếu hợp đồng không quy định rõ về rủi ro này?", "options": {"A": "Bên mua phải chịu vì sắp nhận nhà.", "B": "Bên bán vẫn phải chịu trách nhiệm sửa chữa hoặc bồi thường", "C": "Nhà môi giới phải chịu trách nhiệm.", "D": "Công ty bảo hiểm phải chịu (nếu có)."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Hợp đồng dịch vụ môi giới quy định hoa hồng là 2% trên giá bán. Giao dịch thành công ở mức 5 tỷ đồng. Tuy nhiên, để \"giúp\" người mua giảm lệ phí trước bạ, người bán và người mua thỏa thuận chỉ ghi giá trên hợp đồng công chứng là 3 tỷ đồng. Nhà môi giới nên tính hoa hồng dựa trên giá trị nào?", "options": {"A": "3 tỷ đồng (theo hợp đồng công chứng).", "B": "5 tỷ đồng (giá trị giao dịch thực tế).", "C": "Trung bình cộng của hai giá (4 tỷ đồng).", "D": "Tùy theo sự hào phóng của khách hàng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Trong hợp đồng đặt cọc, có điều khoản \"nếu bên mua không được ngân hàng duyệt cho vay đủ 70% giá trị BĐS thì hợp đồng này tự động hủy và bên bán hoàn trả lại toàn bộ tiền cọc\". Đây là loại điều khoản gì?", "options": {"A": "Điều khoản phạt vi phạm.", "B": "Điều khoản về bất khả kháng.", "C": "Điều khoản về điều kiện có hiệu lực hoặc hủy bỏ hợp đồng", "D": "Điều khoản về bảo mật thông tin."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tình huống: Là người quản lý, bạn muốn xây dựng một cơ chế đánh giá hiệu quả làm việc (KPIs) công bằng cho đội ngũ môi giới. Chỉ số nào sau đây KHÔNG nên là chỉ số duy nhất hoặc quan trọng nhất?", "options": {"A": "Doanh số bán hàng cá nhân.", "B": "Số lượng khách hàng mới mang về.", "C": "Mức độ hài lòng của khách hàng (thông qua khảo sát).", "D": "Số giờ làm việc tại văn phòng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tình huống: Khách hàng G (người bán) rất bận rộn và đề nghị nhà môi giới H thay mặt toàn bộ trong việc đàm phán giá cả và ký kết hợp đồng đặt cọc. Nhà môi giới H nên:", "options": {"A": "Đồng ý ngay vì được khách hàng tin tưởng.", "B": "Yêu cầu khách hàng lập Hợp đồng ủy quyền bằng văn bản, công chứng theo quy định pháp luật, trong đó ghi rõ phạm vi ủy quyền (được phép đàm phán giá trong khoảng nào, được ký hợp đồng đặt cọc...).", "C": "Chỉ nhận ủy quyền bằng lời nói.", "D": "Từ chối vì sợ trách nhiệm."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Nhà môi giới L đang làm việc với cả người mua và người bán (đại diện kép) cho cùng một BĐS. Để đảm bảo tính minh bạch và giảm thiểu xung đột lợi ích, việc nào là quan trọng nhất?", "options": {"A": "Chỉ tiết lộ thông tin có lợi cho người trả hoa hồng cao hơn.", "B": "Giữ bí mật hoàn toàn thông tin của mỗi bên đối với bên kia.", "C": "Thông báo rõ ràng cho cả hai bên về vai trò đại diện kép của mình, có được sự đồng ý bằng văn bản và cam kết hành động công bằng, trung thực, cung cấp thông tin khách quan như nhau cho cả hai bên.", "D": "Đứng về phía người mua để giúp họ mua được giá rẻ."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nguyên tắc kinh doanh bất động sản là:", "options": {"A": "Công khai, minh bạch;", "B": "Tự do thỏa thuận trên cơ sở tôn trọng quyền và lợi ích hợp pháp của các bên thông qua hợp đồng,", "C": "Không vi phạm điều cấm của luật", "D": "Cả A, B, C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Người được cấp chứng chỉ hành nghề môi giới bất động sản cho người khác mượn, thuê chứng chỉ hành nghề môi giới Bất động sản để hành nghề thì sẽ:", "options": {"A": "Phạt tiền từ 40.000.000 đồng đến 60.000.000 đồng", "B": "Tước quyền sử dụng chứng chỉ hành nghề từ 03 tháng đến 06 tháng", "C": "Cả A và B đều sai", "D": "Bao gồm cả A và B đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tổ chức, cá nhân kinh doanh dịch vụ môi giới bất động sản đồng thời vừa là nhà môi giới vừa là một bên thực hiện hợp đồng trong một giao dịch kinh doanh bất động sản thì bị xử phạt bao nhiêu:", "options": {"A": "20.000.000 đồng đến 30 triệu đồng", "B": "40.000.000 đồng đến 60.000.000 đồng", "C": "80.000.000 đồng đến 120.000.000 đ", "D": "Không bị phạt tiền."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khoản hoa hồng nào sau đây là phạm luật?", "options": {"A": "Tiền giờ công", "B": "Phần trăm trên giá mua", "C": "Khoản phí mà khách hàng phải trả khi ký hợp đồng nhờ môi giới bán nhà", "D": "Không có khoản nào kể trên được xem là \"hoa hồng\" trong môi giới bất động sản."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Doanh nghiệp kinh doanh dịch vụ môi giới bất động sản có các quyền nào: Cùng câu hỏi với câu 456, 520", "options": {"A": "Yêu cầu các tổ chức, cá nhân có liên quan cung cấp hồ sơ, thông tin bất động sản thực hiện giao dịch;", "B": "Thu phí dịch vụ của khách hàng theo thỏa thuận của các bên;", "C": "Từ chối môi giới bất động sản không đủ điều kiện đưa vào kinh doanh;", "D": "Cả A, B, C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Cá nhân hành nghề môi giới bất động sản có các quyền hưởng thù lao, hoa hồng môi giới bất động sản từ đâu:", "options": {"A": "Doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản hoặc doanh nghiệp kinh doanh dịch vụ môi giới bất động sản", "B": "Khách hàng", "C": "Cả A và B"}, "answer": "A", "explanation": " CHUYÊN ĐỀ: QUY TRÌNH VÀ KỸ NĂNG MÔI GIỚI, CÁC TÌNH HUỐNG THỰC TẾ KHÁC"}, {"level": "1", "content": "\"Cung Bất động sản\" được định nghĩa là gì?", "options": {"A": "Tổng số lượng bất động sản đã được xây dựng trong một khu vực.", "B": "Lượng bất động sản sẵn sàng bán/cho thuê tại một thời điểm và mức giá nhất định.", "C": "Nhu cầu mua bất động sản của người dân tại một thời điểm.", "D": "Số lượng dự án bất động sản đang được triển khai."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Để kiểm tra thông tin quy hoạch chi tiết của một thửa đất, nhà môi giới nên đến cơ quan nào?", "options": {"A": "Cơ quan Thuế.", "B": "Văn phòng Đăng ký đất đai.", "C": "UBND phường/xã.", "D": "Công an phường/xã."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Thuế Thu nhập cá nhân (TNCN) khi chuyển nhượng bất động sản thường do ai chịu trách nhiệm nộp theo thông lệ (trừ khi có thỏa thuận khác)?", "options": {"A": "Người mua.", "B": "Người bán.", "C": "Nhà môi giới.", "D": "Cơ quan công chứng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "\"Năng lực hành vi dân sự đầy đủ\" của cá nhân được xác định khi nào?", "options": {"A": "Từ khi sinh ra.", "B": "Khi đủ 15 tuổi.", "C": "Khi đủ 18 tuổi và không bị Tòa án tuyên mất hoặc hạn chế năng lực hành vi.", "D": "Khi có tài sản riêng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Yếu tố nào sau đây ảnh hưởng trực tiếp đến NGUỒN CẦU bất động sản?", "options": {"A": "Chi phí xây dựng tăng cao.", "B": "Khả năng vay vốn và lãi suất tín dụng bất động sản.", "C": "Thủ tục cấp phép dự án kéo dài.", "D": "Lượng hàng tồn kho bất động sản lớn."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi phân loại khách hàng mua bất động sản, nhóm \"Mua để ở\" thường có đặc điểm gì?", "options": {"A": "Quan tâm chính đến tiện ích sống và không gian cho gia đình.", "B": "Tìm kiếm bất động sản có tiềm năng tăng giá.", "C": "Mục tiêu chính là bảo toàn vốn khỏi lạm phát.", "D": "Tìm kiếm các bất động sản tạo dòng tiền cho thuê."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "\"Thế chấp\" bất động sản là gì?", "options": {"A": "Bán bất động sản trả góp.", "B": "Cho thuê bất động sản dài hạn.", "C": "Dùng bất động sản làm tài sản bảo đảm cho khoản vay mà không giao bất động sản.", "D": "Chuyển nhượng quyền sử dụng bất động sản có thời hạn."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Hợp đồng đặt cọc trong giao dịch bất động sản có ý nghĩa gì?", "options": {"A": "Là hợp đồng mua bán chính thức.", "B": "Là thỏa thuận ban đầu, ghi nhận việc bên mua giao tiền cọc để đảm bảo giao kết hợp đồng chính thức.", "C": "Là hợp đồng thuê bất động sản ngắn hạn.", "D": "Là hợp đồng dịch vụ môi giới."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Hoạt động nào KHÔNG thuộc Bước 4: Kết thúc thương vụ và Chăm sóc sau bán hàng?", "options": {"A": "Phối hợp bàn giao bất động sản.", "B": "Nhận phí hoa hồng môi giới.", "C": "Soạn thảo và đăng tin quảng cáo bất động sản.", "D": "Hỗ trợ thủ tục sang tên sổ đỏ (nếu có thỏa thuận)."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Trong mô hình SOFTEN, chữ \"F\" (Forward Lean) thể hiện điều gì?", "options": {"A": "Nụ cười thân thiện.", "B": "Tư thế cởi mở.", "C": "Hơi nghiêng người về phía trước để thể hiện sự quan tâm.", "D": "Giọng điệu tích cực."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nghĩa vụ của sàn giao dịch bất động sản, sàn giao dịch có nghĩa vụ gì đối với nhân viên môi giới?", "options": {"A": "Tổ chức đào tạo, bồi dưỡng nâng cao kiến thức hành nghề môi giới bất động sản cho nhân viên môi giới hằng năm", "B": "Tổ chức đào tạo nhân viên môi giới bất động sản mỗi khi có thay đổi luật", "C": "Tổ chức đào tạo, bồi dưỡng cho nhân viên môi giới bất động sản hàng tháng", "D": "Tổ chức đào tạo nhân viên môi giới bất động sản miễn phí."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Đâu là nguyên tắc có thể dẫn đến đàm phán trong kinh doanh thành công:", "options": {"A": "Nhà đàm phán ngồi vào bàn đàm phán chỉ với 1 phương án duy nhất mà không có phương án thay thế", "B": "Nhà đàm phán phải xác định rõ mục tiêu đàm phán và luôn bám sát nó trong suốt quá trình đàm phán", "C": "Nhà đàm phán có những định kiến với đối tác", "D": "Nhà đàm phán luôn nói nhiều thay vì hỏi nhiều."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khách hàng yêu cầu bạn tìm một bất động sản giá rẻ tại khu vực ngoại ô, tuy nhiên bạn biết rằng khu vực đó chưa phát triển nhiều và khó có thể sinh lời trong tương lai gần. Bạn sẽ làm gì?", "options": {"A": "Khuyến khích khách hàng mua bất động sản trong khu vực đó mặc dù tiềm năng không cao.", "B": "Tìm kiếm bất động sản giá rẻ ở khu vực khác có tiềm năng tăng giá cao hơn trong tương lai.", "C": "Giới thiệu các bất động sản trong khu vực đó và giải thích về khả năng phát triển trong tương lai.", "D": "Từ chối yêu cầu của khách hàng vì khu vực đó không có tiềm năng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nhà môi giới phát hiện thông tin trên Sổ hồng (diện tích) có sai khác nhỏ so với đo đạc thực tế. Hành động nào thể hiện sự chuyên nghiệp và quản lý rủi ro tốt nhất?", "options": {"A": "Phớt lờ sự khác biệt vì cho rằng không đáng kể.", "B": "Chỉ thông báo cho bên có lợi từ sự khác biệt đó.", "C": "Minh bạch thông báo cho cả bên mua và bên bán về sự khác biệt, giải thích về sai số cho phép (nếu có) và tư vấn các bên kiểm tra kỹ lưỡng hoặc đo đạc lại nếu cần.", "D": "Tự ý sửa lại thông tin trên hồ sơ giới thiệu cho khớp với Sổ hồng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "\"Năng lực pháp luật dân sự\" và \"Năng lực hành vi dân sự\" khác nhau cơ bản ở điểm nào?", "options": {"A": "Năng lực pháp luật liên quan đến quyền, còn năng lực hành vi liên quan đến khả năng thực hiện quyền đó bằng hành vi của mình.", "B": "Năng lực pháp luật chỉ có ở người trưởng thành, năng lực hành vi có từ khi sinh ra.", "C": "Năng lực pháp luật do Tòa án quyết định, năng lực hành vi do cá nhân tự quyết định.", "D": "Không có sự khác biệt đáng kể giữa hai khái niệm này."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Rủi ro lớn nhất khi mua bán BĐS thông qua hợp đồng ủy quyền là gì?", "options": {"A": "Phí ủy quyền cao.", "B": "Thời gian làm thủ tục lâu hơn.", "C": "Hợp đồng ủy quyền có thể không hợp lệ (hết hạn, người ủy quyền mất năng lực hành vi, nội dung không đúng...) dẫn đến giao dịch bị vô hiệu.", "D": "Khó vay vốn ngân hàng hơn."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Ngoài các giấy tờ pháp lý, kỹ thuật, việc lưu trữ \"ghi chú các buổi làm việc/khảo sát, thư chào giá, biên bản thương lượng\" trong hồ sơ thương vụ có ý nghĩa gì?", "options": {"A": "Chỉ làm hồ sơ dày thêm, không cần thiết.", "B": "Làm bằng chứng về quá trình làm việc, các thỏa thuận từng bước và cơ sở cho việc giải quyết tranh chấp (nếu có) về sau.", "C": "Để tính toán thời gian làm việc của môi giới.", "D": "Để gửi báo cáo cho hiệp hội bất động sản."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong Bước 3 (Giao dịch với khách hàng) của quy trình môi giới, sau khi các bên đã thống nhất các điều khoản cơ bản, bước tiếp theo quan trọng nhất là gì?*", "options": {"A": "Bàn giao ngay BĐS.", "B": "Ký Hợp đồng Đặt cọc để ràng buộc trách nhiệm ban đầu.", "C": "Chuyển toàn bộ tiền mua bán.", "D": "Đi đăng ký sang tên Sổ hồng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tại sao nhà môi giới cần giúp khách hàng (đặc biệt là người mua lần đầu) hiểu rõ các điều khoản trong Hợp đồng Đặt cọc/Mua bán?", "options": {"A": "Để thể hiện mình là người soạn thảo hợp đồng giỏi.", "B": "Vì khách hàng thường chủ quan, không đọc kỹ hoặc không hiểu hết các thuật ngữ pháp lý, có thể dẫn đến rủi ro hoặc tranh chấp không đáng có.", "C": "Để kéo dài thời gian ký kết hợp đồng.", "D": "Để tính thêm phí tư vấn hợp đồng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi đàm phán, việc hiểu rõ BATNA (Giải pháp thay thế tốt nhất nếu không đạt được thỏa thuận) của khách hàng mình đại diện giúp nhà môi giới làm gì?", "options": {"A": "Bỏ qua mọi đề nghị của đối tác.", "B": "Xác định được \"lằn ranh đỏ\" và đưa ra chiến lược đàm phán phù hợp.", "C": "Tự tin đưa ra yêu cầu cao hơn nhiều so với thị trường.", "D": "Nhanh chóng chấp nhận đề nghị đầu tiên của đối tác."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong tình huống đàm phán căng thẳng, một bên đưa ra lời chỉ trích cá nhân đối với bên kia.  Nhà môi giới nên phản ứng thế nào là tốt nhất?", "options": {"A": "Hùa theo lời chỉ trích để làm hài lòng một bên.", "B": "Ngắt lời và yêu cầu hai bên dừng đàm phán ngay lập tức.", "C": "Giữ bình tĩnh, khéo léo lái cuộc thảo luận quay trở lại vấn đề chính, nhắc nhở về mục tiêu chung và giữ thái độ tôn trọng đối với cả hai bên.", "D": "Rời khỏi cuộc đàm phán vì cho rằng không thể tiếp tục."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Trong quản trị nhân sự, chính sách \"lương cứng + lương mềm (hoa hồng)\" nhằm mục đích gì?", "options": {"A": "Chỉ để giảm chi phí lương cho công ty", "B": "Đảm bảo thu nhập cơ bản cho nhân viên, đồng thời tạo động lực mạnh mẽ để họ nỗ lực đạt kết quả kinh doanh tốt hơn thông qua hoa hồng.", "C": "Gây khó khăn cho việc tính lương.", "D": "Chỉ áp dụng cho nhân viên mới."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi thuyết phục khách hàng sử dụng dịch vụ môi giới của mình, yếu tố nào thường có sức nặng nhất", "options": {"A": "Sự am hiểu thị trường.", "B": "Mạng lưới khách hàng và cam kết mang lại giá trị thực sự cho khách hàng.", "C": "Năng lực chuyên môn,", "D": "Cả A, B, C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nhà môi giới có nên từ chối làm việc với một khách hàng có yêu cầu phi thực tế hoặc không rõ ràng sau khi đã cố gắng tư vấn không?", "options": {"A": "Không bao giờ, phải cố gắng đáp ứng mọi yêu cầu.", "B": "Nên từ chối một cách lịch sự và chu

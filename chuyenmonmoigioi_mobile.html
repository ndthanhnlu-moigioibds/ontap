 nhịp câu đúng lúc.", "C": "Sử dụng câu có cấu trúc ngắn gọn, các khái niệm và thuật ngữ đơn giản, rõ ràng.", "D": "Khi trình bày hướng về phía người ra quyết định"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Để tạo một thông điệp hiệu quả, nhà môi giới nên:", "options": {"A": "Sử dụng biệt ngữ và từ địa phương.", "B": "Lựa chọn từ phù hợp, dễ hiểu", "C": "Dùng thuật ngữ chuyên môn.", "D": "Cả A, B, C đều sai."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi nào giao tiếp bằng văn bản phù hợp hơn giao tiếp trực tiếp?", "options": {"A": "Khi bạn muốn trình bày một ý tưởng phức tạp, đòi hỏi thời gian nghiên cứu", "B": "Khi bạn muốn nhanh chóng nhận được ý kiến trả lời về một vấn đề.", "C": "Khi bạn muốn đưa ra nhiều câu hỏi.", "D": "Cả A, B, C đều sai."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Nhiệm vụ nào không phải nhiệm vụ chính của người môi giới bán hàng trực tiếp?", "options": {"A": "Tìm kiếm khách hàng mới", "B": "Truyền đạt thông tin về sản phẩm", "C": "Thiết kế sản phẩm phù hợp với yêu cầu của khách hàng", "D": "Cung cấp dịch vụ trước và sau khi bán hàng"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Đâu là phát biểu đúng nhất?", "options": {"A": "Định vị dịch vụ là khắc họa vào tâm trí khách hàng những hình ảnh, những khác biệt so với dịch vụ của đối thủ cạnh tranh.", "B": "Định vị dịch vụ là xác định dịch vụ theo đoạn thị trường cụ thể mà doanh nghiệp phải thỏa mãn cho khách hàng mục tiêu của mình.", "C": "Định vị dịch vụ là việc tạo ra một dịch vụ khác biệt trên thị trường.", "D": "Định vị dịch vụ là việc xác định một dịch vụ nhằm thỏa mãn tối đa nhu cầu của khách hàng."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Để truyền tải một thông điệp hiệu quả khi giao tiếp trực tiếp, đâu là yếu tố chiếm vai trò quan trọng nhất:", "options": {"A": "Giọng nói.", "B": "Hình ảnh và cử chỉ.", "C": "Nội dung thông điệp.", "D": "Không phải các yếu tố trên."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong Quy trình môi giới bất động sản, yếu tố nào đặc biệt quan trọng cho sự thành công chốt giao dịch của một môi giới viên?", "options": {"A": "Khai thác khách hàng tiềm năng, tiếp nhận yêu cầu của khách hàng", "B": "Tư vấn, tiếp thị, thương lượng", "C": "Thực hiện giao dịch", "D": "Kết thúc giao dịch, duy trì và chăm sóc khách hàng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trước khi đưa bất động sản, dự án bất động sản vào kinh doanh, doanh nghiệp phải làm gì?", "options": {"A": "Công khai đầy đủ, trung thực và chính xác thông tin về bất động sản, dự án trên hệ thống thông tin và trang thông tin điện tử của doanh nghiệp", "B": "Tiến hành quảng cáo sản phẩm bất động sản trên các phương tiện truyền thông đại chúng", "C": "Chỉ cần đăng ký dự án với cơ quan nhà nước có thẩm quyền", "D": "Đảm bảo chất lượng công trình và hoàn thành nghĩa vụ tài chính"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Thuế suất nào được áp dụng để tính thuế thu nhập cá nhân khi cha vợ chuyển nhượng bất động sản cho con rễ (trong trường hợp giá hợp đồng cao hơn giá Nhà nước quy định)?", "options": {"A": "2% Giá trị hợp đồng", "B": "5% Giá trị hợp đồng", "C": "0.5% giá giao dịch", "D": "Miễn thuế"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Môi giới bất động sản có vai trò gì trong thị trường bất động sản?", "options": {"A": "Cung cấp thông tin tăng cường tính công khai, minh bạch cho thị trường bất động sản phát triển ổn định, bền vững.", "B": "Tư vấn, hỗ trợ cho các bên có liên quan đảm bảo kết nối bên cung và bên cầu trong thị trường bất động sản.", "C": "Thúc đẩy lượng giao dịch tăng hiệu quả hoạt động của thị trường bất động sản.", "D": "Tất cả đáp án A, B, C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Môi giới bất động sản phân tích theo quy định của Luật Kinh doanh bất động sản hiện hành là?", "options": {"A": "Công việc chuyên môn của các cá nhân.", "B": "Việc làm trung gian giúp cho cho các bên trong mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản.", "C": "Hình thành theo sự phân công lao động xã hội.", "D": "Kết nối nhu cầu bên mua với nhu cầu bên bán bất động sản."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Doanh nghiệp, cá nhân kinh doanh dịch vụ môi giới bất động sản được hưởng hoa hồng môi giới khi nào?", "options": {"A": "Khi khách hàng ký hợp đồng mua bán, chuyển nhượng bất động sản.", "B": "Khi khách hàng ký hợp đồng cho thuê, cho thuê lại bất động sản.", "C": "Khi khách hàng ký hợp đồng cho thuê mua bất động sản.", "D": "Tất cả đáp án A, B, C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Có mấy loại hợp đồng kinh doanh dịch vụ bất động sản theo Luật kinh doanh bất động sản hiện hành?", "options": {"A": "04 loại.", "B": "10 loại.", "C": "11 loại.", "D": "12 loại."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Khi \"cầu\" BĐS tăng sẽ ảnh hưởng như thế nào đến giá bán và tiền thuê BĐS trong ngắn hạn?", "options": {"A": "Giá và tiền thuê sẽ giảm.", "B": "Giá sẽ giảm nhưng tiền thuê sẽ tăng.", "C": "Giá và tiền thuê sẽ tăng.", "D": "Giá sẽ tăng nhưng tiền thuê sẽ giảm."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Thời điểm có hiệu lực của hợp đồng kinh doanh Bất động sản được xác định:", "options": {"A": "Thời điểm bên sau cùng ký vào hợp đồng", "B": "Thời điểm bằng hình cthức chấp nhận khác được thể hiện trên hợp đồng", "C": "Thời điểm mà hợp đồng được công chứng, chứng thực", "D": "Cả phương án A, B, C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Hoạt động đầu tư trực tiếp bất động sản là?", "options": {"A": "Việc bỏ tiền để góp vốn mua nhà hình thành trong tương lai", "B": "Mua cổ phiếu của các chủ đầu tư kinh doanh bất động sản mà không thực hiện quản lý hoạt động đầu tư.", "C": "Việc bỏ vốn đầu tư và tham gia quản lý hoạt động đầu tư bất động sản.", "D": "Cả A, B, C đều đúng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Dự án Bất động sản, công trình xây dựng đủ điều kiện được giao dịch trên thị trường bất động sản khi:", "options": {"A": "Có quy hoạch 1/500 được duyệt.", "B": "Có chứng nhận đầu tư của cơ quan có thẩm quyền.", "C": "Có quyết định cho phép thực hiện dự án của cấp có thẩm quyền, có giấy phép xây dựng công trình.", "D": "Cả 3 phương án trên đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Quy trình tư vấn cho khách hàng về dự án bất động sản bao gồm?", "options": {"A": "Giới thiệu quy hoạch 1/500; thông báo giá, ký hợp đồng dịch vụ môi giới.", "B": "Giới thiệu hồ sơ dự án, đưa ra mức giá bán, ký hợp đồng dịch vụ môi giới.", "C": "Giới thiệu đầy đủ hồ sơ pháp lý của dự án, tư vấn cho khách hàng chi tiết đầy đủ. Các thông tin và dịch vụ kèm theo sản phẩm chào bán, giới thiệu chính xác các mức giá, các ưu đãi của dự án, hỗ trợ tài chính, ngân hàng (nếu có). Giải thích các điều khoản hợp đồng mua bán mẫu của dự án và đưa khách hàng xem mô hình dự án, căn hộ mẫu (nếu có).", "D": "Cả A, B và C đều đúng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Đơn giá bán căn hộ chung cư trên m2 được hiểu là?", "options": {"A": "Giá theo tổng m2 phủ bì căn hộ.", "B": "Giá theo tổng m2 phủ bì căn hộ, nhưng trừ diện tích các cột và hộp kỹ thuật.", "C": "Giá theo tổng m2 thông thủy của căn hộ.", "D": "Giá theo tổng m2 tim tường của căn hộ."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi sử dụng dịch vụ môi giới bất động sản, người đầu tư mong chờ người môi giới cung cấp và cho biết thông tin:", "options": {"A": "BĐS nào nên mua/bán.", "B": "Giá cả hợp lý nên mua/bán.", "C": "Cập nhật và mới nhất về thị trường BĐS.", "D": "BĐS nào nên mua/bán với mức giá cả và các dịch vụ kèm theo nhu cầu nào."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Yêu cầu đối với dự án đầu tư bất động sản để kinh doanh là gì?", "options": {"A": "Dự án đầu tư BĐS để kinh doanh phải phù hợp với quy hoạch, kế hoạch sử dụng đất, quy hoạch đô thị, quy hoạch xây dựng nông thôn và phải theo kế hoạch thực hiện được cơ quan nhà nước có thẩm quyền phê duyệt.", "B": "Trình tự, thủ tục đầu tư dự án BĐS để kinh doanh thực hiện theo quy định của pháp luật về đầu tư, đất đai, xây dựng, đô thị, nhà ở và quy định khác của pháp luật có liên quan.", "C": "Dự án đầu tư bất động sản phải được thi công đúng tiến độ, bảo đảm chất lượng theo quy định của pháp luật về xây dựng.", "D": "Tất cả các phương án trên."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tiêu chí nào sau đây thuộc lập trường đàm phán theo kiểu nguyên tắc?", "options": {"A": "Đánh lạc hướng về giới hạn cuối cùng.", "B": "Lùi bước trước nguyên tắc chứ không lùi bước trước áp lực.", "C": "Đi tìm một câu trả lời mà đối tác chấp nhận.", "D": "Gây áp lực dựa trên nguyên tắc."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi một bất động sản tạo ra dòng tiền thu nhập thụ động âm (ví dụ cho thuê không đủ bù các khoản chi và các khoản khấu hao đầu tư...). Nhằm làm cho nó trở thành một khoản đầu tư hấp dẫn đối với nhà đầu tư, ta nên chứng minh thế nào?", "options": {"A": "Sẽ có những giảm trừ thích hợp.", "B": "Sẽ có một chút trì hoãn nhỏ trong việc bảo hành sửa chữa bất động sản này.", "C": "Sẽ có một sự giảm giá đáng kể.", "D": "Sẽ có một sự gia tăng đáng kể trong giá trị tài sản."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Những khoản cộng thêm nhân tạo vào giá trị của BĐS được coi là:", "options": {"A": "Mảnh, khảnh, lô đất.", "B": "Vật cố định được đem bán.", "C": "Sự cải tạo.", "D": "Động sản."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản 2023, điều kiện tiên quyết để một cá nhân được hành nghề môi giới bất động sản là gì?", "options": {"A": "Có ít nhất 5 năm kinh nghiệm.", "B": "Phải là thành viên của Hiệp hội bất động sản Việt Nam.", "C": "Có Chứng chỉ hành nghề môi giới bất động sản và phải làm việc trong một tổ chức kinh doanh dịch vụ bất động sản.", "D": "Phải có bằng đại học chuyên ngành Luật hoặc Kinh tế."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Để có quyền hợp pháp mua và bán, một hợp đồng phải bao gồm điều khoản kết thúc hợp đồng nào sau:", "options": {"A": "Thông báo hủy/kết thúc hợp đồng.", "B": "Ít nhất bảy ngày để hoàn tất hợp đồng.", "C": "Quyền bãi bỏ một hợp đồng.", "D": "Những xem xét về tiền tệ."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trong môi giới BĐS, vấn đề văn hóa phải được các môi giới viên chú trọng tìm hiểu và nắm rõ. Ví dụ, việc sai hẹn có khi chỉ vài phút cũng có thể làm đối tác (đặc biệt là người Mỹ) khó chịu; Người phương Tây thường đi ngay vào mục đích làm việc và có xu hướng nhanh chóng ra quyết định, trong khi người phương Đông thường không đi thẳng vào vấn đề, giải quyết công việc theo cách thoải mái hơn, và thường tránh nói không. Ví dụ này thuộc khí cạnh nào trong văn hóa?", "options": {"A": "Yếu tố vật chất (Material elements).", "B": "Cách cư xử và phong tục (Manner and customs).", "C": "Giá trị và thái độ (Values and Attitudes).", "D": "Giáo dục (Education)."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Kỹ năng nào sau đây là cần thiết cho người môi giới hoặc người đại diện cho người mua nhà?", "options": {"A": "Tư vấn và đàm phán.", "B": "Quản lý thời gian và kỹ năng vi tính.", "C": "Căn bản vững chắc về khía cạnh tài chính.", "D": "Kỹ năng quản trị tệp khách hàng."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Khi một môi giới cùng một thẩm định viên thẩm định giá trị một căn nhà ở Block A, Khu đô thị X, họ nên chọn cách tiếp nào dưới đây để đưa ra mô hình thẩm định giá BĐS phù hợp. Biết rằng, khách hàng dự định mua căn nhà này để cùng gia đình sinh sống lâu dài?", "options": {"A": "Cách tiếp cận thu nhập.", "B": "Cách tiếp cận so sánh.", "C": "Cách tiếp cận chi phí.", "D": "Tất cả các cách trên."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Một tư nhân dự định xây dựng một khu du lịch sinh thái. Sau khi dự án đã được phê duyệt, nhà đầu tư này đã tiến hành xin giao đất, xin phép xây dựng và khai thác tài nguyên. Bước kế tiếp ông ta nên làm gì?", "options": {"A": "Thẩm định, phê duyệt thiết kế và tổng dự toán, dự toán công trình.", "B": "Đền bù giải phóng mặt bằng, thực hiện kế hoạch tái định cư và phục hồi, chuẩn bị mặt bằng xây dựng.", "C": "Mua sắm thiết bị và công nghệ.", "D": "Thực hiện việc khảo sát -- thiết kế xây dựng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Báo cáo về việc tạm ngừng hoạt động của sàn giao dịch bất động sản bao gồm nội dung nào sau đây?", "options": {"A": "Chỉ ghi rõ lý do tạm ngừng và tên người đại diện pháp luật", "B": "Chỉ ghi rõ thời gian tạm ngừng và tên sàn giao dịch", "C": "Tên sàn giao dịch, Giấy phép hoạt động, địa chỉ, thời gian tạm ngừng, lý do, báo cáo thanh toán nợ và hợp đồng liên quan", "D": "Thông tin về khách hàng và tài khoản ngân hàng"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Người hành nghề môi giới bất động sản cần có phẩm chất đạo đức nào?", "options": {"A": "Trung thực, khách quan, tuân thủ pháp luật.", "B": "Khôn khéo, giỏi che giấu thông tin.", "C": "Chỉ cần kỹ năng bán hàng tốt.", "D": "Đặt lợi ích cá nhân lên hàng đầu."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Trong trường hợp hợp đồng dịch vụ môi giới đã ký nhưng giao dịch giữa người mua và người bán không thành công do lỗi của người bán, người môi giới có được hưởng thù lao không?", "options": {"A": "Có được hưởng thù lao nếu trong hợp đồng dịch vụ môi giới có thỏa thuận về việc chi trả thù lao bất kể kết quả giao dịch.", "B": "Không bao giờ được hưởng vì chỉ khi giao dịch thành công mới có tiền.", "C": "Được hưởng toàn bộ hoa hồng như khi giao dịch thành công.", "D": "Phải bồi thường cho người mua thay cho người bán."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Một nhà môi giới bất động sản có quyền hành nghề xây dựng không?", "options": {"A": "Nếu nhà môi giới này có chứng chỉ hành nghề xây dựng phù hợp theo luật quy định của Luật Xây dựng.", "B": "Nếu anh ta thích làm và có đủ điều kiện và kinh nghiệm cho phép, anh ta có thể làm được.", "C": "Không. Hai lĩnh vực này hoàn toàn khác nhau.", "D": "Có. Muốn môi giới được thì nhà môi giới phải am hiểu nhiều khía cạnh của lĩnh vực xây dựng, do đó anh ta thừa khả năng làm điều này."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Cung cấp thông tin các sản phẩm bất động sản giúp khách hàng thực hiện giao dịch theo yêu cầu của khách hàng và vì lợi ích của khách hàng là chức năng của?", "options": {"A": "Định giá bất động sản", "B": "Môi giới bất động sản", "C": "Đầu tư bất động sản", "D": "Quản lý nhà nước về bất động sản"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Trang sống ở vùng ngoại thành gần khu công nghiệp có rất nhiều nhà cho thuê. Trang quyết định thành lập văn phòng môi giới và tư vấn cho thuê nhằm giúp bạn bè tìm được ngôi nhà thuê ưng ý mà bản thân có thu nhập do được hưởng tiền môi giới. Việc làm của Trang là:", "options": {"A": "Có thể chấp nhận được bởi vì nó có mục tiêu khá nhỏ.", "B": "Không thể chấp nhận được trừ khi Trang làm việc tình nguyện không lấy phí.", "C": "Có thể chấp nhận được bởi nó chỉ bao gồm các bạn của Trang.", "D": "Không thể chấp nhận được nếu Trang không thuê nhân viên có chứng chỉ hành nghề."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Bên môi giới được hưởng hoa hồng môi giới khi:", "options": {"A": "Khách hàng ký hợp đồng môi giới", "B": "Khách hàng đến xem nhà và đồng ý mua", "C": "Giao dịch thành công", "D": "Không phụ thuộc vào kết quả giao dịch"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tranh chấp về đất đai giữa các bên, trước khi khởi kiện, các bên cần:", "options": {"A": "Hòa giải tại UBND cấp xã nơi có đất.", "B": "Hòa giải tại UBND cấp tỉnh nơi có đất.", "C": "Không bắt buộc phải hòa giải.", "D": "Do các bên thỏa thuận về việc hòa giải."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Những giao dịch nào sau đây không phải là giao dịch về nhà ở?", "options": {"A": "Mua bán nhà ở.", "B": "Tặng cho nhà ở.", "C": "Sửa chữa, cải tạo nhà ở.", "D": "Cho thuê nhà ở."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Bạn phát hiện một đồng nghiệp môi giới gian lận, đưa thông tin sai để hưởng lợi. Bạn sẽ làm gì?", "options": {"A": "Bỏ qua vì không liên quan đến mình.", "B": "Thông báo cho khách hàng để họ tự xử lý.", "C": "Báo cáo với cơ quan quản lý hoặc tổ chức có thẩm quyền.", "D": "Hợp tác với đồng nghiệp để cùng hưởng lợi."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Cơ quan nào có thẩm quyền chủ trì, phối hợp nghiên cứu và đề xuất các biện pháp điều tiết thị trường bất động sản?", "options": {"A": "Bộ Xây dựng", "B": "Chính phủ", "C": "Ủy ban nhân dân cấp tỉnh", "D": "Bộ Tài chính"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Phí bảo trì phần sở hữu chung trong chung cư mà khách hàng phải trả được quy định:", "options": {"A": "2% giá bán căn hộ.", "B": "2% giá trị căn hộ có giá bán cao nhất.", "C": "2% giá trị căn hộ hoặc diện tích khác được bán cho khách hàng.", "D": "2% giá trị phần sở hữu chung."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Quyền sở hữu nhà ở theo quy định của pháp luật nước ta thể hiện qua các quyền chủ đạo nào?", "options": {"A": "Cho tặng, thừa kế, cho thuê, phá dỡ, thuế chấp, để không sử dụng,...", "B": "Chiếm hữu, sử dụng và định đoạt.", "C": "Sử dụng và định đoạt.", "D": "Khai thác, mua bán, cho tặng, thừa kế, góp vốn và cho mượn,..."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Từ 01/08/2024, thời hạn doanh nghiệp có vốn đầu tư nước ngoài được sở hữu nhà ở tại Việt Nam tính từ ngày cấp là?", "options": {"A": "50 năm.", "B": "70 năm.", "C": "99 năm.", "D": "Theo thời hạn ghi trong giấy chứng nhận đầu tư."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Người Việt Nam định cư ở nước ngoài được quyền sở hữu nhà ở tại Việt Nam khi:", "options": {"A": "Được phép nhập cảnh vào Việt Nam.", "B": "Được phép vào Việt Nam với thời gian ít nhất 3 tháng.", "C": "Được phép vào Việt Nam với thời gian ít nhất 6 tháng.", "D": "Được phép vào Việt Nam với thời gian ít nhất 12 tháng."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Trường hợp cá nhân người nước ngoài kết hôn với công dân Việt Nam mà đang sinh sống tại Việt Nam", "options": {"A": "Được sở hữu nhà ở tối đa 50 năm.", "B": "Được sở hữu nhà ở tối đa 50 năm và gia hạn một lần.", "C": "Chỉ được thuê nhà ở mà không được quyền sở hữu nhà ở.", "D": "Được sở hữu nhà ở ổn định lâu dài."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Thời điểm hoàn thành chuyển quyền sử dụng đất khi các cá nhân thực hiện giao dịch là:", "options": {"A": "Các bên ký tên tại Phòng Công chứng hoặc UBND cấp xã.", "B": "Giao dịch được đăng ký tại Chi nhánh Văn phòng Đăng ký đất đai.", "C": "Khi bàn giao đất.", "D": "Theo thỏa thuận của các bên."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Vai trò quản lý của Nhà nước có tác động... hoạt động kinh doanh trên thị trường BĐS?", "options": {"A": "Quyết định đến sự thúc đẩy phát triển.", "B": "Kìm hãm sự phát triển.", "C": "Không hiệu quả đến sự phát triển.", "D": "Ít đến sự phát triển."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Phần nào sau đây thuộc sở hữu riêng của người mua căn hộ?", "options": {"A": "Phần diện tích bên trong căn hộ không bao gồm diện tích xây dựng vách ngăn phòng.", "B": "Phần diện tích bên trong căn hộ và diện tích hành lang tiếp cận trực tiếp với căn hộ.", "C": "Phần diện tích bên trong căn hộ bao gồm cả diện tích ban công, lô gia (nếu có) gắn liền với căn hộ đó.", "D": "Phần diện tích đậu xe phục vụ cho chủ sở hữu căn hộ."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tính bất động của bất động sản có thể hiểu là?", "options": {"A": "BĐS dù được đem chuyển nhượng, bán nhưng chỉ được quyền sử dụng và khai thác.", "B": "BĐS dù được đem chuyển nhượng, bán nhưng chỉ được quyền sử dụng và khai thác, không thể chuyển BĐS đến nơi khác.", "C": "BĐS dù được đem chuyển nhượng, bán nhưng chỉ được quyền sử dụng và khai thác, không thể mua bán được.", "D": "BĐS dù được đem chuyển nhượng, bán nhưng chỉ được quyền sử dụng và khai thác, không có quyền định đoạt."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nhà ở nếu đủ điều kiện theo quy định, chủ sở hữu có thể thế chấp cho tổ chức nào sau đây?", "options": {"A": "Ngân hàng nhà nước.", "B": "Doanh nghiệp kinh doanh dịch vụ cầm đồ.", "C": "Công ty bảo hiểm.", "D": "Tổ chức tín dụng được phép hoạt động tại Việt Nam."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tổ chức được Nhà nước giao đất không thu tiền sử dụng đất có quyền gì?", "options": {"A": "Chuyển đổi, chuyển nhượng, cho thuê quyền sử dụng đất.", "B": "Được quyền thực hiện tất cả các giao dịch về quyền sử dụng đất.", "C": "Được quyền định đoạt tài sản trên đất mà tài sản đó không có nguồn gốc từ ngân sách Nhà nước.", "D": "Chỉ được quyền cho thuê quyền sử dụng đất."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nhận xét nào sau đây là SAI?", "options": {"A": "Sàn giao dịch BĐS phải là pháp nhân.", "B": "Sàn giao dịch BĐS phải có tên, địa chỉ, bảng hiệu và phải thông tin về việc thành lập trên thông tin đại chúng.", "C": "Trường hợp doanh nghiệp kinh doanh BĐS thành lập sàn giao dịch BĐS thì sàn giao dịch đó phải có tư cách pháp nhân hoặc sử dụng tư cách pháp nhân của doanh nghiệp.", "D": "Sàn giao dịch BĐS là do cá nhân có chứng chỉ hành nghề môi giới hoạt động độc lập thành lập và điều hành."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Bất động sản là nhà ở riêng lẻ của hộ gia đình, cá nhân khi giao dịch?", "options": {"A": "Phải giao dịch qua sàn.", "B": "Có thể chọn giao dịch qua sàn hoặc chủ sở hữu tự giao dịch.", "C": "Phải giao dịch qua sàn hoặc công ty, trung tâm môi giới", "D": "Không bắt buộc qua sàn nhưng phải qua công ty môi giới."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Giai đoạn nào dưới đây không thuộc giai đoạn thực hiện dự án BĐS?", "options": {"A": "Thực hiện việc giao đất hoặc thuê đất.", "B": "Giám sát thi công và thực hiện.", "C": "Vận hành, chạy thử.", "D": "Bảo hành công trình xây dựng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Phạm vi kinh doanh dịch vụ bất động sản của tổ chức, cá nhân trong nước; tổ chức, cá nhân nước ngoài?", "options": {"A": "Có quyền kinh doanh các dịch vụ môi giới BĐS, sàn giao dịch BĐS, tư vấn BĐS, quản lý BĐS.", "B": "Chỉ có quyền kinh doanh BĐS và tư vấn BĐS.", "C": "Chỉ có quyền kinh doanh môi giới BĐS.", "D": "Chỉ có quyền kinh doanh tư vấn và quản lý BĐS."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Trước khi bàn giao nhà (BĐS hình thành trong tương lai) cho người mua, doanh nghiệp phát triển BĐS trong nước được thu tối đa... giá trị hợp đồng:", "options": {"A": "50%.", "B": "70%.", "C": "80%.", "D": "95%."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trước khi bàn giao nhà (BĐS hình thành trong tương lai) cho người mua, doanh nghiệp phát triển BĐS có vốn đầu tư nước ngoài được thu tối đa... giá trị hợp đồng:", "options": {"A": "50%.", "B": "70%.", "C": "80%.", "D": "95%."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Việc thanh toán trong mua bán, thuê mua bất động sản hình thành trong tương lai được thực hiện nhiều lần, chủ đầu tư thực hiện thu tiền lần đầu không quá .... giá trị hợp đồng", "options": {"A": "20%.", "B": "30% giá trị hợp đồng (bao gốm cả tiền đặt cọc)", "C": "50%.", "D": "70%."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Bạn phát hiện một căn nhà có giấy tờ pháp lý không đầy đủ, nhưng khách hàng vẫn muốn giao dịch. Bạn sẽ:", "options": {"A": "Thực hiện giao dịch và giải thích với khách hàng rằng giấy tờ có thể làm sau.", "B": "Cố gắng làm thủ tục pháp lý cho khách hàng ngay lập tức.", "C": "Tiến hành giao dịch mà không cần lo lắng về pháp lý.", "D": "Đề nghị khách hàng tham khảo ý kiến của một luật sư để làm rõ tình hình pháp lý trước khi giao dịch."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tình huống: Căn nhà giao dịch với giá 500 triệu đồng. Ngân hàng định giá 420 triệu đồng và Ngân hàng cho vay 70% giá trị của BĐS, vậy số tiền Ngân hàng cho vay là:", "options": {"A": "216 triệu đồng.", "B": "294 triệu đồng", "C": "324 triệu đồng.", "D": "350 triệu đồng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi một khách hàng yêu cầu bạn tìm bất động sản tại khu vực có mức giá rất thấp so với thị trường, bạn sẽ làm gì?", "options": {"A": "Giới thiệu các bất động sản có giá rẻ, nhưng giải thích cho khách hàng về các yếu tố ảnh hưởng đến giá trị bất động sản.", "B": "Cố gắng tìm kiếm, dù mức giá có không hợp lý với thị trường.", "C": "Từ chối làm việc với khách hàng vì yêu cầu không thực tế.", "D": "Để khách hàng tự tìm kiếm bất động sản với giá thấp."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Nội dung nào sau đây không quy định trong nội dung hợp đồng mua bán, cho thuê, cho thuê mua nhà, công trình xây dựng:", "options": {"A": "Giá bán BĐS.", "B": "Thông tin về BĐS.", "C": "Địa chỉ các bên.", "D": "Hoa hồng môi giới."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Khoản nào sau đây được xem là nguồn vốn do ngân hàng quản lý đối với doanh nghiệp phát triển BĐS?", "options": {"A": "Vốn huy động từ khách hàng.", "B": "Vốn vay đã được giải ngân.", "C": "Vốn điều lệ của doanh nghiệp.", "D": "Vốn huy động từ trái phiếu doanh nghiệp."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nếu khách hàng yêu cầu bạn tìm bất động sản có lợi nhuận cao nhưng tiềm ẩn rủi ro pháp lý, bạn sẽ:", "options": {"A": "Vẫn giới thiệu để khách hàng tự cân nhắc.", "B": "Khuyến nghị khách hàng cân nhắc kỹ và ưu tiên bất động sản có pháp lý rõ ràng.", "C": "Giấu rủi ro pháp lý để dễ chốt giao dịch.", "D": "Đề nghị khách hàng trả thêm phí môi giới."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khách hàng yêu cầu bạn tìm một bất động sản giá rẻ tại khu vực ngoại ô, tuy nhiên bạn biết rằng khu vực đó chưa phát triển nhiều và khó có thể sinh lời trong tương lai gần. Bạn sẽ làm gì?", "options": {"A": "Khuyến khích khách hàng mua bất động sản trong khu vực đó mặc dù tiềm năng không cao.", "B": "Tìm kiếm bất động sản giá rẻ ở khu vực khác có tiềm năng tăng giá cao hơn trong tương lai.", "C": "Giới thiệu các bất động sản trong khu vực đó và giải thích về khả năng phát triển trong tương lai.", "D": "Từ chối yêu cầu của khách hàng vì khu vực đó không có tiềm năng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Điều kiện để tổ chức, cá nhân kinh doanh dịch vụ tư vấn bất động sản?", "options": {"A": "Phải thông báo với Sở Nông Nghiệp và Môi trường", "B": "Phải có đội ngũ nhân viên", "C": "Phải thành lập doanh nghiệp", "D": "Phải có phương tiện đi lại"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nhà môi giới chuyên nghiệp cần phải quan tâm đến kỹ năng thu thập thông tin không?", "options": {"A": "Có rất cần thiết", "B": "Không, vì tôi đã có kinh nghiệm", "C": "Chỉ cần nhân viên của họ thu thập", "D": "Kỹ năng thu thập thông tin chỉ dùng trong lĩnh vực khác."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Nhà môi giới bất động sản không được chào bán bất động sản khi nào?", "options": {"A": "Dự án, công trình xây dựng chưa được cấp phép xây dựng.", "B": "Dự án đã hoàn thành hệ thống hạ tầng kỹ thuật đối với dự án nhà riêng lẻ.", "C": "Công trình xây dựng đã hoàn thành phần móng đối với nhà chung cư.", "D": "Dự án bất động sản đã được cơ quan nhà nước có thẩm quyền phê duyệt quy hoạch chi tiết 1/500."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Tình huống: Nếu một ngân hàng đồng ý cung cấp khoản cho vay 70% để mua nhà mới, và ngôi nhà được định giá là 7,5 tỷ đồng. Hỏi người mua nhà sẽ trả trước với số tiền là bao nhiêu?", "options": {"A": "2,25 tỷ đồng.", "B": "3,50 tỷ đồng.", "C": "5,25 tỷ đồng.", "D": "7,5 tỷ đồng"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Thanh toán trong mua bán, thuê mua bất động sản hình thành trong tương lai có những yêu cầu gì?", "options": {"A": "Thực hiện nhiều lần, lần đầu không quá 25% giá trị hợp đồng.", "B": "Thực hiện nhiều lần, lần đầu không quá 30% giá trị hợp đồng (bao gồm cả tiền đặt cọc)", "C": "Thực hiện nhiều lần, lần đầu không quá 40% giá trị hợp đồng.", "D": "Thực hiện nhiều lần, lần đầu không quá 50% giá trị hợp đồng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Đối với dự án có quy mô sử dụng đất dưới 20ha thẩm quyền chấp thuận đầu tư thuộc:", "options": {"A": "Sở Xây dựng tỉnh.", "B": "Ủy ban nhân dân cấp xã.", "C": "Ủy ban nhân dân cấp tỉnh.", "D": "Bộ Xây dựng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tổ chức, cá nhân nước ngoài được thực hiện những hình thức kinh doanh dịch vụ bất động sản nào trong các hình thức sau:", "options": {"A": "Kinh doanh dịch vụ môi giới bất động sản; Sàn giao dịch bất động sản.", "B": "Kinh doanh dịch vụ tư vấn bất động sản.", "C": "Kinh doanh dịch vụ quản lý bất động sản.", "D": "Đáp án A, B, C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trong các dấu hiệu sau, trường hợp nào được coi là dấu hiệu đáng ngờ trong kinh doanh bất động sản?", "options": {"A": "Khách hàng là người có tiền án.", "B": "Khách hàng là doanh nghiệp có chức năng kinh doanh bất động sản.", "C": "Khách hàng không có hộ khẩu thường trú tại nơi có bất động sản được giao dịch.", "D": "Khách hàng không cung cấp được các thông tin liên quan tới bất động sản hoặc không muốn cung cấp bổ sung thông tin về nhân thân."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trong các trường hợp sau, trường hợp nào hợp đồng không bắt buộc phải công chứng, chứng thực?", "options": {"A": "Hợp đồng mua bán căn hộ chung cư giữa công ty M là doanh nghiệp kinh doanh bất động sản (bên bán) và ông N (bên mua).", "B": "Hợp đồng thế chấp quyền sử dụng đất giữa ông E và ngân hàng F.", "C": "Hợp đồng mua bán nhà giữa ông C và ông D (C bán cho D một căn nhà tại Q1, TP HCM).", "D": "Hợp đồng chuyển nhượng quyền sử dụng đất ở riêng lẻ giữa ông A và ông B (ông A là bên chủ sở hữu, ông B là bên nhận chuyển nhượng)."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Trong thời hạn bao nhiêu ngày kể từ ngày bàn giao nhà, công trình xây dựng cho người mua, thì chủ đầu tư phải làm thủ tục để cơ quan Nhà nước có thẩm quyền cấp giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và các tài sản khác gắn liền với đất cho bên mua?", "options": {"A": "20 ngày.", "B": "30 ngày.", "C": "50 ngày.", "D": "90 ngày."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Trong quá trình giới thiệu bất động sản cho khách hàng, bạn phát hiện một số thông tin quan trọng về căn hộ (như diện tích thực tế nhỏ hơn quảng cáo). Bạn sẽ làm gì?", "options": {"A": "Từ chối giao dịch vì không muốn gây rắc rối.", "B": "Thông báo ngay cho khách hàng về sự khác biệt và giải thích rõ ràng.", "C": "Chỉ thông báo cho khách hàng nếu họ hỏi.", "D": "Giữ im lặng để không làm khách hàng thất vọng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nhà môi giới Bất động sản có nghĩa vụ hỗ trợ các bên thực hiện các việc gì trong mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua Bất động sản?", "options": {"A": "Đàm phán, thương thảo.", "B": "Soạn thảo hợp đồng.", "C": "Ký kết hợp đồng.", "D": "Cả A, B và C."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Theo quy định hiện hành thì cơ quan quản lý Nhà nước nào có thẩm quyền cấp chứng chỉ hành nghề Môi giới Bất động sản?", "options": {"A": "UBND các tỉnh, thành phố.", "B": "Bộ Xây dựng.", "C": "Sở Xây dựng.", "D": "Sở Nông Nghiệp & Môi trường."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Yếu tố nào ảnh hưởng đến sự phát triển nghề môi giới?", "options": {"A": "Tài chính ngân hàng phát triển, tạo điều kiện cho vay để đầu tư Bất động sản.", "B": "Thị trường xây dựng phát triển.", "C": "Sự tăng trưởng về dân số.", "D": "Cả A, B, C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nhà Môi giới Bất động sản khi tư vấn cho khách hàng không được phép làm các điều nào?", "options": {"A": "Không công khai thông tin về Bất động sản.", "B": "Công khai không đầy đủ thông tin về Bất động sản.", "C": "Không trung thực thông tin về Bất động sản.", "D": "Tất cả các đáp án A, B, C."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Những phương pháp nào sau đây Nhà môi giới sử dụng để thu thập thông tin về cầu Bất động sản?", "options": {"A": "Tìm kiếm qua phương tiện thông tin đại chúng.", "B": "Gọi điện trực tiếp cho khách hàng.", "C": "Gửi mail trực tiếp cho khách hàng.", "D": "Tất cả câu A, B, C là đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Đạo đức nghề nghiệp của Nhà môi giới Bất động sản? Cùng câu hỏi với câu 419", "options": {"A": "Tuân thủ pháp luật.", "B": "Cung cấp thông tin trung thực về Bất động sản.", "C": "Đặt lợi ích của khách hàng lên trên hết.", "D": "Cả A, B, C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Thông tin về nguồn cung Bất động sản Nhà môi giới thu thập từ các kênh nào? Cùng câu hỏi với câu 420", "options": {"A": "Từ các phương tiện thông tin đại chúng.", "B": "Từ các cơ quan Quản lý Sở Xây dựng, Sở Nông Nghiệp & Môi trường, Sở Quy hoạch - Kiến trúc.", "C": "Từ văn phòng Môi giới.", "D": "Tất cả câu A, B, C là đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nhà Môi giới Bất động sản được nhận thù lao?", "options": {"A": "Từ một bên trong hợp đồng.", "B": "Từ hai bên trở lên.", "C": "Không phụ thuộc vào việc giao dịch có thực hiện thành công hay không", "D": "Cả A, B, C đều đúng."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Đạo đức nghề nghiệp nào mà Nhà môi giới không được phép làm?", "options": {"A": "Nhận các khoản thù lao ngoài hợp đồng.", "B": "Giới thiệu về mình và đơn vị mình làm việc.", "C": "Làm việc với tinh thần tận tâm với khách hàng.", "D": "Lắng nghe ý kiến thắc mắc của khách hàng"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Khi tư vấn cho khách hàng về một dự án nhà ở hình thành trong tương lai, nhà môi giới có trách nhiệm gì về tính pháp lý?", "options": {"A": "Không có trách nhiệm, chỉ cần giới thiệu theo tài liệu chủ đầu tư đưa.", "B": "Kiểm tra và cung cấp chính xác thông tin về văn bản của cơ quan nhà nước có thẩm quyền về việc nhà ở đủ điều kiện được bán/cho thuê mua.", "C": "Hứa hẹn với khách hàng về thời gian cấp sổ đỏ chắc chắn để chốt khách.", "D": "Chỉ cung cấp thông tin pháp lý khi khách hàng đã đóng tiền đợt 1."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Quy trình chuyên nghiệp khi nhà môi giới tiếp nhận một bất động sản ký gửi là gì?", "options": {"A": "Đăng tin quảng cáo ngay lập tức để tìm khách.", "B": "Kiểm tra hồ sơ pháp lý, khảo sát thực tế tình trạng bất động sản và ký hợp đồng dịch vụ môi giới.", "C": "Yêu cầu chủ nhà đưa bản gốc sổ đỏ cho môi giới giữ.", "D": "Báo giá cao hơn giá chủ nhà mong muốn để hưởng phần chênh lệch (kê giá)."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Các chỉ tiêu cơ bản nào cần đạt được trong quản lý kênh phân phối bán hàng BĐS:", "options": {"A": "Thoả mãn khách hàng – doanh thu – lợi nhuận", "B": "Doanh số - Lợi nhuận – KPI", "C": "Phân bổ sản phẩm - Doanh số đột biến - Lợi nhuận cao", "D": "KPI - Doanh thu - Chi phí bán hàng - Lợi nhuận"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Khi thuyết trình giới thiệu bất động sản, vấn đề quan trọng nhất cần trình bày là gì?", "options": {"A": "Giá cả sản phẩm.", "B": "Đặc điểm nổi bật trong thiết kế.", "C": "Giá trị và lợi ích của sản phẩm mang lại cho khách hàng.", "D": "Tất cả đều sai."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Chức năng quảng cáo trong kinh doanh BĐS gồm:", "options": {"A": "Chức năng gợi nhớ, chức năng thông tin, thuyết phục", "B": "Chức năng dẫn dắt", "C": "Chức năng thúc đẩy nhu cầu", "D": "Tất cả đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tình huống: Người mua bất động sản đặt cọc 150 triệu đồng để mua căn nhà với trị giá 1,5 tỷ đồng. Chủ nhà đổi ý không bán. Theo Luật Dân sự hiện hành, chủ nhà sẽ trả tiền đặt cọc và đền bù tiền thiệt hại cho người mua tổng cộng là:", "options": {"A": "150 triệu đồng.", "B": "300 triệu đồng.", "C": "200 triệu đồng.", "D": "Không bồi thường."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nội dung nào dưới đây là KHÔNG ĐÚNG đối với Sàn giao dịch BĐS:", "options": {"A": "Nơi diễn ra các giao dịch về mua bán, chuyển nhượng BĐS", "B": "Nơi cung cấp các dịch vụ về BĐS.", "C": "Nơi chứng thực các hồ sơ pháp lý về BĐS.", "D": "Nơi cung cấp thông tin, tiếp thị, quảng bá các dự án, sản phẩm BĐS."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Đâu là nội dung môi giới bất động sản?", "options": {"A": "Thực hiện việc giao dịch mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản.", "B": "Tìm kiếm đối tác đáp ứng các điều kiện của khách hàng để tham gia đàm phán, ký hợp đồng.", "C": "Tư vấn về đầu tư tạo lập, kinh doanh bất động sản.", "D": "Bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản theo ủy quyền của chủ sở hữu nhà, công trình xây dựng, người có quyền sử dụng đất."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Cá nhân khi bán nhà ở của mình phải nộp những loại thuế gì sau đây?", "options": {"A": "Thuế trước bạ.", "B": "Thuế thu nhập cá nhân từ chuyển nhượng bất động sản.", "C": "Thuế VAT.", "D": "Thuế môi trường."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Để hiệu quả việc mua bán hàng, nhà môi giới bất động sản cần phải làm gì?", "options": {"A": "Chuẩn bị đầy đủ tài liệu, hồ sơ và hợp đồng mẫu của dự án.", "B": "Kiểm tra rà soát đầy đủ các dữ liệu, thông tin về dự án để tư vấn cho khách hàng.", "C": "Lập phương án truyền thông, markerting tìm kiếm thu hút khách hàng", "D": "Cả đáp án A, B và C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Công ty C là doanh nghiệp môi giới, đã ký hợp đồng môi giới với chủ đầu tư dự án Y (chưa hoàn thành thủ tục nghiệm thu hạ tầng). Công ty C thu tiền “giữ chỗ” của khách hàng... Đánh giá pháp lý đúng nhất là:", "options": {"A": "Không vi phạm vì chỉ là tiền giữ chỗ", "B": "Trách nhiệm thuộc hoàn toàn về chủ đầu tư", "C": "Vi phạm vì môi giới thu tiền khi BĐS chưa đủ điều kiện kinh doanh", "D": "Hợp pháp nếu có thỏa thuận hoàn tiền"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Trong trường hợp khách hàng muốn mua bất động sản nhưng không đủ tiền, bạn nên:", "options": {"A": "Khuyên khách hàng vay thêm để hoàn tất giao dịch.", "B": "Giới thiệu bất động sản khác phù hợp với ngân sách.", "C": "Gợi ý khách hàng nhờ người thân đứng tên.", "D": "Vẫn tiến hành giao dịch vì khách hàng đã quyết tâm"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Đặc điểm nào sau đây không thuộc lập trường đàm phán theo kiểu cứng: Cùng câu hỏi với câu 365", "options": {"A": "Ép đối phương phải nhượng bộ.", "B": "Bám chặt lấy lập trường.", "C": "Coi đối tác như bạn bè.", "D": "Cả A, B, C đều sai."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khách hàng muốn bạn tìm một căn hộ với yêu cầu rất cụ thể (diện tích, giá cả, vị trí) nhưng bạn không thể tìm thấy căn hộ nào đáp ứng đầy đủ. Bạn sẽ làm gì?", "options": {"A": "Đề nghị khách hàng thay đổi yêu cầu để dễ dàng tìm được bất động sản.", "B": "Để khách hàng tự tìm kiếm bất động sản.", "C": "Tìm bất động sản phù hợp với một số yêu cầu nhưng không hoàn toàn đáp ứng hết.", "D": "Cố gắng tìm bất động sản dù không phù hợp với yêu cầu ban đầu của khách hàng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tâm lý chung của khách hàng mua căn hộ lần thứ hai là", "options": {"A": "Sợ rằng rủi ro tài chính sẽ rất lớn.", "B": "Tìm hiểu thông tin liên quan rất kỹ.", "C": "Đáp án A và B đúng.", "D": "Đáp án A và B sai."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khách hàng yêu cầu bạn tìm bất động sản có giá trị cao để đầu tư, nhưng ngân sách của họ lại khá hạn chế. Bạn sẽ làm gì?", "options": {"A": "Khuyên khách hàng không nên đầu tư vì ngân sách quá thấp.", "B": "Tư vấn cho khách hàng về các bất động sản có tiềm năng tăng giá nhưng vẫn nằm trong ngân sách của họ.", "C": "Đưa ra các lựa chọn bất động sản cao cấp dù ngân sách của khách hàng không đủ.", "D": "Tìm bất động sản giá rẻ mà không quan tâm đến tiềm năng tăng giá."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Một khách hàng yêu cầu bạn chỉ giới thiệu những bất động sản chưa qua tay trung gian. Bạn phát hiện một số bất động sản qua trung gian nhưng có giá tốt. Bạn sẽ làm gì?", "options": {"A": "Đưa ra lựa chọn mà không thông báo với khách hàng về việc có qua trung gian hay không.", "B": "Chỉ giới thiệu những bất động sản chưa qua tay trung gian, dù giá không tốt bằng.", "C": "Giới thiệu những bất động sản qua trung gian và giải thích lý do tại sao chúng lại có giá tốt.", "D": "Bỏ qua yêu cầu của khách hàng và giới thiệu tất cả các bất động sản có giá tốt"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Cá nhân được cấp chứng chỉ hành nghề môi giới bất động sản khi có đủ các điều kiện nào sau đây?", "options": {"A": "Đã qua sát hạch về kiến thức môi giới bất động sản", "B": "Có năng lực hành vi dân sự đầy đủ.", "C": "Không đang bị truy cứu trách nhiệm hình sự, đang bị tạm giam, đang chấp hành án phạt tù, đang bị áp dụng biện pháp xử lý hành chính đưa vào cơ sở cai nghiện bắt buộc, cơ sở giáo dục bắt buộc hoặc đang bị Tòa án cấm đảm nhiệm chức vụ, cấm hành nghề hoặc làm công việc nhất định", "D": "Cả đáp án A, B và C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Kỹ năng vượt qua thắc mắc của khách hàng:", "options": {"A": "Ghi chép thông tin, phân loại ý kiến khách hàng, đồng cảm khi trả lời khách hàng, lôi kéo sự đồng ý của khách hàng.", "B": "Lắng nghe cẩn thận, bình tĩnh, không ngắt lời.", "C": "Lặp lại câu phản đối dưới dạng câu hỏi, nói chuyện ôn hòa, đồng cảm khi trả lời khách hàng, lôi kéo sự đồng ý của khách hàng.", "D": "Đáp án B và C."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Khách hàng yêu cầu bạn tìm một căn hộ chung cư giá thấp, nhưng chất lượng không được đảm bảo. Bạn sẽ làm gì?", "options": {"A": "Tư vấn cho khách hàng về chất lượng của căn hộ và đưa ra các lựa chọn hợp lý hơn.", "B": "Tìm đúng yêu cầu của khách hàng để hoàn thành giao dịch.", "C": "Từ chối tìm kiếm bất động sản cho khách hàng.", "D": "Chấp nhận mọi yêu cầu của khách mà không cần tư vấn thêm."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Đâu là nội dung hoạt động của sàn giao dịch bất động sản?", "options": {"A": "Thực hiện dịch vụ môi giới bất động sản, hỗ trợ các bên đàm phán, thương thảo giao dịch bất động sản", "B": "Từ chối đưa lên sàn giao dịch bất động sản các bất động sản không đủ điều kiện đưa vào kinh doanh", "C": "Được thu phí dịch vụ của khách hàng có bất động sản được đưa lên sàn giao dịch bất động sản.", "D": "Yêu cầu khách hàng bồi thường thiệt hại do lỗi của khách hàng gây ra."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Các thông tin về BĐS cần thu thập gồm:", "options": {"A": "Thông tin về kinh tế kỹ thuật.", "B": "Thông tin về tình trạng pháp lý.", "C": "Thông tin về môi trường xã hội, lịch sử phát triển.", "D": "Cả 3 câu trên đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nghĩa vụ của sàn giao dịch bất động sản, sàn giao dịch có nghĩa vụ gì đối với nhân viên môi giới?", "options": {"A": "Tổ chức đào tạo nhân viên môi giới bất động sản mỗi khi có thay đổi luật.", "B": "Tổ chức đào tạo nhân viên môi giới bất động sản miễn phí.", "C": "Tổ chức đào tạo, bồi dưỡng cho nhân viên môi giới bất động sản hàng tháng", "D": "Tổ chức đào tạo, bồi dưỡng nâng cao kiến thức hành nghề môi giới bất động sản cho nhân viên môi giới làm việc tại sàn hàng năm."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Toàn bộ quá trình thiết kế, thu thập, xử lý, phân tích các thông tin và báo cáo được gọi là:", "options": {"A": "Marketing.", "B": "Nghiên cứu.", "C": "Phân phối.", "D": "Quản trị"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nghĩa vụ của doanh nghiệp kinh doanh dịch vụ môi giới bất động sản?", "options": {"A": "Yêu cầu khách hàng cung cấp hồ sơ, thông tin về bất động sản.", "B": "Hưởng thù lao, hoa hồng môi giới theo thỏa thuận trong hợp đồng đã ký với khách hàng.", "C": "Thuê doanh nghiệp kinh doanh dịch vụ môi giới bất động sản, cá nhân kinh doanh dịch vụ môi giới bất động sản độc lập khác thực hiện công việc môi giới bất động sản trong phạm vi hợp đồng dịch vụ môi giới bất động sản đã ký với khách hàng, nhưng phải chịu trách nhiệm trước khách hàng về kết quả môi giới.", "D": "Cung cấp hồ sơ, thông tin về bất động sản do mình môi giới và chịu trách nhiệm về hồ sơ, thông tin do mình cung cấp."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nguyên nhân nào dẫn đến hiện tượng sốt nóng ảo trên thị trường bất động sản?", "options": {"A": "Do giới đầu cơ thao túng làm biến động mạnh về cầu bất động sản.", "B": "Do kém minh bạch về thông tin; Các nhà đầu cơ lợi dụng thông tin quy hoạch, điều chỉnh chính sách để thổi phồng giá trị bất động sản.", "C": "Do giới đầu cơ tạo ra \"cầu ảo\" nhằm làm tăng giá, thu hút đám đông tham gia.", "D": "Đáp án A, B và C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Số lượng \"cung\" nhà ở cố định và \"cầu\" nhà ở giảm, giá nhà sẽ thay đổi thế nào?", "options": {"A": "Tăng", "B": "Không đổi", "C": "Giảm", "D": "Giá nhà tăng rồi giảm"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khách hàng quan tâm điều gì nhất khi tìm hiểu để mua chung cư?", "options": {"A": "Hạ tầng kỹ thuật, giá cả, diện tích sử dụng", "B": "Giá cả, diện tích sử dụng, vị trí giao thông", "C": "Môi trường sống, chi phí sử dụng, diện tích khu vực", "D": "Cả đáp án A, B và C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trong trường hợp nào cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh có quyền thu hồi Giấy phép hoạt động của sàn giao dịch bất động sản?", "options": {"A": "Khi sàn giao dịch bất động sản không cung cấp đủ thông tin cho khách hàng.", "B": "Khi sàn giao dịch bất động sản vi phạm quy định tại Điều 8 Luật Kinh doanh bất động sản và pháp luật có liên quan.", "C": "Khi sàn giao dịch bất động sản thay đổi địa điểm hoạt động mà không thông báo.", "D": "Khi sàn giao dịch bất động sản không hoàn thành nghĩa vụ thuế."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi người môi giới đại diện cho bên bán làm việc với bên mua, phần nào sau đây không thuộc nhiệm vụ thực hiện của người môi giới đối với bên mua?", "options": {"A": "Nhiệm vụ ủy thác", "B": "Tư vấn sửa chữa, thanh lý hợp đồng mua bán BĐS", "C": "Tư vấn cho khách hàng để có sự hiểu rõ toàn diện về BĐS.", "D": "Cả A, B, C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Để lập hồ sơ thương vụ môi giới BĐS, bên cung cần cung cấp:", "options": {"A": "Thông tin chủ sở hữu, các loại giấy tờ, hồ sơ pháp lý của BĐS", "B": "Các giấy tờ liên quan đến thương vụ như giấy đặt cọc, phiếu thu chi ...", "C": "Hợp đồng dịch vụ môi giới", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Khi bạn giới thiệu một bất động sản cho khách hàng, bạn có nghĩa vụ gì về tính minh bạch của thông tin?", "options": {"A": "Không cần phải báo cho khách hàng về các vấn đề pháp lý nếu khách hàng không yêu cầu", "B": "Chỉ cung cấp thông tin cơ bản, không cần giải thích chi tiết.", "C": "Phải cung cấp thông tin đầy đủ, chính xác và không gây hiểu lầm cho khách hàng.", "D": "Chỉ giới thiệu các bất động sản mà bạn có hoa hồng cao"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Giải đáp thắc mắc của khách hàng nhằm mục tiêu:", "options": {"A": "Giải thích khi khách hiểu sai, chứng minh khi khách nghi ngờ", "B": "Phân tích để khách hàng thấy được lợi ích lâu dài, tìm hiểu nguyên nhân để ứng xử khi khách than phiền", "C": "Trao đổi để có các điều khoản thuận lợi hơn", "D": "Đáp án A và B"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nếu bạn che giấu hoặc làm sai lệch thông tin về bất động sản sẽ dẫn đến hậu quả gì trong kinh doanh bất động sản?", "options": {"A": "Có thể làm ảnh hưởng đến lợi ích, gây thiệt hại cho phía khách hàng.", "B": "Chỉ bị cảnh cáo nếu không gây thiệt hại cho khách hàng.", "C": "Không bị xử lý vì đây là hành vi chấp nhận được trong kinh doanh bất động sản.", "D": "Không có trách nhiệm pháp lý nếu khách hàng không phát hiện ra"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Các thông tin nào sau đây là cần thiết đối với nhà môi giới bất động sản khi thu thập thông tin về bất động sản:", "options": {"A": "Thông tin kinh tế, kỹ thuật về bất động sản", "B": "Thông tin pháp lý về bất động sản", "C": "Thông tin về lịch sử, xã hội của bất động sản", "D": "Đáp án A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Chức năng của quảng cáo gồm:", "options": {"A": "Chức năng gợi nhớ, chức năng thông tin, chức năng định giá", "B": "Chức năng gợi nhớ, chức năng thông tin, chức năng thuyết phục.", "C": "Chức năng thông tin, chức năng định giá, chức năng thuyết phục.", "D": "Cả A, B và C đều sai"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong nghiệp vụ khảo sát thực tế BĐS cần phải:", "options": {"A": "Thu nhận hồ sơ pháp lý, tiến hành ký kết hợp đồng môi giới, thu phí môi giới.", "B": "Thể hiện thông tin trung thực, theo dõi tiến trình môi giới, thu nhận hồ sơ pháp lý.", "C": "Thu nhận hồ sơ pháp lý, khảo sát thực tế, thể hiện thông tin trung thực.", "D": "Xác định nhu cầu khách hàng, theo dõi tiến trình môi giới, xử lý thông tin khách hàng"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Đâu là quyền của doanh nghiệp kinh doanh dịch vụ môi giới bất động sản?", "options": {"A": "Được thu phí dịch vụ của khách hàng theo thoả thuận", "B": "Được quyết định điều kiện giao dịch bất động sản mà không cần sự đồng thuận của các bên.", "C": "Được yêu cầu khách hàng trả thêm phí không có trong hợp đồng", "D": "Được phép tự quyết định giá bán bất động sản mà không cần thỏa thuận với khách hàng."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Vai trò của môi giới bất động sản trong thị trường bất động sản?", "options": {"A": "Cung cấp thông tin cho các chủ thể tham gia vào hoạt động giao dịch hàng hóa bất động sản và thúc đẩy thị trường bất động sản phát triển;", "B": "Khai thác nguồn thu cho ngân sách nhà nước;", "C": "Góp phần ổn định trật tự, an ninh xã hội và thúc đẩy đổi mới chính sách quản lý bất động sản;", "D": "Đáp án A, B và C."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Mức thù lao của dịch vụ môi giới bất động sản được xác định:", "options": {"A": "Không quá 3% giá trị bất động sản được tư vấn", "B": "Theo thỏa thuận trong hợp đồng", "C": "Không ít hơn 500.000 đồng cho mỗi lần tư vấn", "D": "Đáp án A, B và C đều đúng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản có quyền:", "options": {"A": "Tự ý bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua tất cả các bất động sản được đưa lên sàn giao dịch bất động sản.", "B": "Quản lý, giám sát việc khai thác, sử dụng bất động sản của khách hàng", "C": "Được thu phí dịch vụ của khách hàng có bất động sản được đưa lên sàn giao dịch bất động sản.", "D": "Yêu cầu khách hàng bồi thường tất cả các thiệt hại khi xảy ra"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Để thực hiện tốt vai trò của mình, nhà môi giới được đòi hỏi phải:", "options": {"A": "Có chứng chỉ hành nghề môi giới bất động sản", "B": "Đầu tư nhiều thời gian cho nghể nghiệp và rèn luyện các kỹ năng", "C": "Kiên nhẫn và đạo đức", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nêu các dạng nguồn cung bất động sản?", "options": {"A": "Bán.", "B": "Cho thuê, cho thuê lại.", "C": "Đầu tư liên doanh liên kết.", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tổ chức, cá nhân tham gia sàn giao dịch bất động sản có các quyền nào sau đây?", "options": {"A": "Yêu cầu doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản cung cấp hồ sơ, thông tin về bất động sản", "B": "Ký hợp đồng với doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản để mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản.", "C": "Yêu cầu doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản bồi thường thiệt hại do lỗi của sàn giao dịch bất động sản gây ra.", "D": "Cả A, B và C."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nghĩa vụ của doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản bao gồm những nghĩa vụ nào?", "options": {"A": "Bảo đảm bất động sản được đưa lên sàn giao dịch phải có đủ điều kiện được giao dịch.", "B": "Cung cấp đầy đủ, trung thực hồ sơ, thông tin về bất động sản và chịu trách nhiệm về hồ sơ, thông tin do mình cung cấp.", "C": "Bảo đảm cơ sở vật chất, kỹ thuật và điều kiện hoạt động của sàn giao dịch bất động sản.", "D": "Cả A, B và C."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tư vấn bất động sản là:", "options": {"A": "Nơi diễn ra các giao dịch về mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản.", "B": "Hoạt động trợ giúp về các vấn đề liên quan đến kinh doanh bất động sản theo yêu cầu của các bên.", "C": "Nhà, công trình xây dựng đã hoàn thành việc xây dựng và đưa vào sử dụng.", "D": "Nhà, công trình xây dựng đang trong quá trình xây dựng và chưa được nghiệm thu đưa vào sử dụng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Chính sách của Nhà nước đối với đầu tư kinh doanh bất động sản là:", "options": {"A": "Nhà nước đầu tư và khuyến khích tổ chức, cá nhân đầu tư dự án dịch vụ công ích đô thị, công trình hạ tầng xã hội trong phạm vi dự án đầu tư kinh doanh bất động sản.", "B": "Nhà nước có cơ chế, chính sách bình ổn thị trường bất động sản khi có biến động, bảo đảm lợi ích cho nhà đầu tư và khách hàng.", "C": "Nhà nước khuyến khích và có chính sách miễn, giảm thuế, tiền sử dụng đất, tiền thuê đất, tín dụng ưu đãi cho tổ chức, cá nhân đầu tư xây dựng nhà ở xã hội và dự án được ưu đãi đầu tư.", "D": "Cả A, B và C."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Phân đoạn thị trường là gì?", "options": {"A": "Là quá trình phân chia thị trường thành những đoạn nhỏ hơn mang tính không đồng nhất", "B": "Là quá trình phân chia thị trường thành những đoạn nhỏ hơn mang tính đồng nhất cao theo các tiêu thức.", "C": "Là quá trình phân chia thị trường thành những đoạn khác biệt mang tính không đồng nhất.", "D": "Cả A, B và C."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nội dung của Nghị định 16/2022/NĐ-CP ngày 28/01/2022 KHÔNG có quy định xử phạt vi phạm hành chính trong hoạt động nào dưới đây:", "options": {"A": "Xây dựng, quản lý công trình hạ tầng kỹ thuật", "B": "Phòng cháy chữa cháy", "C": "Kinh doanh bất động sản", "D": "Quản lý, phát triển nhà"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Hệ thống marketing có những loại nhiệm vụ chủ yếu nào?", "options": {"A": "Truyền tải thông tin về hàng hóa mà doanh nghiệp có ý đinh cung cấp cho tị trường", "B": "Truyền tải thông tin và hình ảnh tốt của doanh nghiệp đến người tiêu dùng", "C": "Xây dựng và duy trì tốt mối quan hệ với khách hàng", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Doanh nghiệp kinh doanh dịch vụ môi giới bất động sản phải có ít nhất bao nhiêu cá nhân có chứng chỉ hành nghề môi giới?", "options": {"A": "Ít nhất 01 cá nhân.", "B": "Ít nhất 02 cá nhân.", "C": "Ít nhất 03 cá nhân.", "D": "Tùy thuộc vào quy mô doanh nghiệp."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Quyền của doanh nghiệp kinh doanh dịch vụ môi giới bất động sản?", "options": {"A": "Hỗ trợ các bên trong việc đàm phán, ký kết hợp đồng mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản.", "B": "Thực hiện chế độ báo cáo theo quy định của pháp luật và chịu sự kiểm tra, thanh tra của cơ quan nhà nước có thẩm quyền.", "C": "Bồi thường thiệt hại do lỗi của mình gây ra.", "D": "Yêu cầu khách hàng cung cấp hồ sơ, thông tin về bất động sản"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Hành động nào sau đây bị nhà nước thu hồi chứng chỉ hành nghề môi giới bất động sản:", "options": {"A": "Cho người khác mượn, thuê chứng chỉ để hành nghề.", "B": "Người được cấp chứng chỉ kê khai trong hồ sơ xin cấp chứng chỉ không trung thực.", "C": "Chứng chỉ bị tẩy, xoá, sửa chữa", "D": "Cả A, B và C."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Theo Nghị định 16/2022/NĐ-CP, cá nhân hành nghề môi giới bất động sản nhưng không có chứng chỉ hành nghề theo quy định thì bị phạt tiền?", "options": {"A": "Từ 20 triệu đồng đến 40 triệu đồng", "B": "Từ 40 triệu đồng đến 60 triệu đồng", "C": "Từ 60 triệu đồng đến 80 triệu đồng", "D": "Từ 80 triệu đồng đến 100 triệu đồng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Đâu là nội dung kinh doanh dịch vụ tư vấn bất động sản?", "options": {"A": "Tư vấn về hợp đồng mua bán, chuyển nhượng, thuê, thuê mua bất động sản", "B": "Bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản theo ủy quyền của chủ sở hữu nhà, công trình xây dựng, người có quyền sử dụng đất", "C": "Xây dựng và công bố các chỉ số đánh giá thị trường bất động sản", "D": "Tổ chức thực hiện việc bảo trì, sửa chữa bất động sản."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Tổ chức tham gia sàn giao dịch bất động sản không có nghĩa vụ:", "options": {"A": "Thực hiện quy chế hoạt động của sàn giao dịch bất động sản.", "B": "Trả phí dịch vụ cho doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản.", "C": "Bồi thường thiệt hại do lỗi của mình gây ra. Các nghĩa vụ khác trong hợp đồng.", "D": "Bảo đảm cơ sở vật chất, kỹ thuật và điều kiện hoạt động của sàn giao dịch bất động sản."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nội dung nào dưới đây không phải là nghĩa vụ của doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản?", "options": {"A": "Bảo đảm bất động sản được đưa lên sàn giao dịch phải có đủ điều kiện được giao dịch.", "B": "Cung cấp đầy đủ, trung thực hồ sơ, thông tin về bất động sản và chịu trách nhiệm về hồ sơ, thông tin do mình cung cấp.", "C": "Thu phí dịch vụ của khách hàng có bất động sản được đưa lên sàn giao dịch bất động sản.", "D": "Thực hiện nghĩa vụ về thuế với Nhà nước theo quy định của pháp luật."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Một chủ sở hữu bất động sản được ký kết hợp đồng môi giới với:", "options": {"A": "Duy nhất một đơn vị môi giới hoặc sàn bất động sản", "B": "Được ký kết với các nhà môi giới bất động sản độc lập", "C": "Được ký kết với bất kỳ các cá nhân, doanh nghiệp kinh doanh môi giới bất động sản, sàn giao dịch bất động sản.", "D": "Tất cả đều sai."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Để phát triển bền vững trong nghề môi giới bất động sản, các nhà môi giới bất động sản cần:", "options": {"A": "Đầu tư xây dựng thương hiệu cá nhân.", "B": "Hướng đến việc mang lại nhiều nhất giá trị cho khách hàng.", "C": "Tập trung phát triển năng lực chuyên môn và tuân thủ đạo đức nghề nghiệp.", "D": "Cả A, B và C"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nguyên tắc nào dưới đây có thể dẫn đến đàm phán trong kinh doanh thành công:", "options": {"A": "Nhà đàm phán ngồi vào bàn đàm phán chỉ với 1 phương án duy nhất mà không có phương án thay thế.", "B": "Nhà đàm phán phải xác định rõ mục tiêu đàm phán và luôn bám sát nó trong suốt quá trình đàm phán", "C": "Nhà đàm phán có những định kiến với đối tác", "D": "Nhà đàm phán luôn nói nhiều thay vì hỏi nhiều"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi khách hàng yêu cầu môi giới giữ bản chính Giấy chứng nhận quyền sử dụng đất để làm tin, nhà môi giới nên xử lý thế nào là đúng đạo đức nghề nghiệp?", "options": {"A": "Đồng ý giữ để tạo lòng tin tuyệt đối.", "B": "Chỉ giữ nếu khách hàng trả thêm phí lưu giữ.", "C": "Tuyệt đối không nên giữ, chỉ xem, sao chụp và hoàn trả ngay để tránh rủi ro pháp lý cho các bên.", "D": "Giao cho giám đốc công ty giữ."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tại sao trong hoạt động quảng cáo, truyền thông và bán hàng, các doanh nghiệp kinh doanh BĐS cần tập trung vào giá trị cốt lõi, giá trị khác biệt của sản phẩm trong việc cung ứng cho khách hàng?", "options": {"A": "Là yếu tố khách hàng cần và mua, tạo hấp dẫn và lôi cuốn thị trường", "B": "Để khác với các đối thủ", "C": "Do yêu cầu của các bên cho thuê mướn phương tiện quảng cáo là ngắn gọn và súc tích", "D": "Cả A, B, C đều sai"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Mục tiêu của chính sách điều tiết thị trường bất động sản của Nhà nước là gì?", "options": {"A": "Hạn chế hoạt động mua bán bất động sản tự do", "B": "Ưu tiên phát triển thị trường bất động sản ở các đô thị lớn", "C": "Tăng giá bất động sản để thu hút đầu tư nước ngoài", "D": "Đảm bảo thị trường bất động sản phát tr

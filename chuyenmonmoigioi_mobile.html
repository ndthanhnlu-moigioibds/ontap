yên nghiệp.", "C": "Nên tiếp tục làm việc nhưng không cần nỗ lực nhiều.", "D": "Nên báo cáo khách hàng này với hiệp hội BĐS."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Yếu tố nào thể hiện rõ nhất đạo đức nghề nghiệp của nhà môi giới trong giao dịch?", "options": {"A": "Luôn đạt được mức hoa hồng cao nhất.", "B": "Luôn đặt lợi ích hợp pháp của khách hàng lên hàng đầu, trung thực, minh bạch và bảo mật thông tin.", "C": "Luôn nói tốt về mọi bất động sản mình giới thiệu.", "D": "Chỉ làm việc với những khách hàng giàu có."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong trường hợp nào thì việc sử dụng \"Hợp đồng Ủy quyền\" để mua bán bất động sản là hợp lệ và ít rủi ro nhất?", "options": {"A": "Người ủy quyền đang ở nước ngoài không thể về ký bán.", "B": "Người ủy quyền và người được ủy quyền là vợ chồng/cha mẹ con cái ruột, nội dung ủy quyền rõ ràng, hợp pháp và còn hiệu lực.", "C": "Người mua muốn nhờ người khác đứng tên hộ.", "D": "Hợp đồng ủy quyền được lập bằng giấy viết tay."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Đâu là hạn chế chính của việc chỉ dựa vào các mối quan hệ cá nhân để tìm kiếm khách hàng trong môi giới bất động sản?", "options": {"A": "Khách hàng từ mối quan hệ thường khó tính hơn.", "B": "Nguồn khách hàng bị giới hạn trong phạm vi mạng lưới quen biết, khó mở rộng quy mô kinh doanh.", "C": "Phí hoa hồng thường thấp hơn.", "D": "Khó xây dựng lòng tin với khách hàng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Hợp đồng mua bán bất động sản được công chứng có giá trị pháp lý như thế nào so với hợp đồng không công chứng (viết tay)?", "options": {"A": "Giá trị pháp lý như nhau.", "B": "Hợp đồng công chứng có giá trị chứng cứ cao hơn.", "C": "Hợp đồng viết tay có giá trị hơn vì thể hiện đúng ý chí các bên.", "D": "Chỉ hợp đồng công chứng mới phải nộp thuế."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc sử dụng các công cụ phân tích dữ liệu website (ví dụ: Google Analytics) giúp nhà môi giới bất động sản làm gì?", "options": {"A": "Tự động đăng tin BĐS.", "B": "Hiểu rõ hành vi của người truy cập website (họ xem tin nào nhiều, đến từ đâu, ở lại bao lâu...), từ đó tối ưu nội dung và chiến lược marketing online.", "C": "Thiết kế lại giao diện website", "D": "Tăng tốc độ tải trang web."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Thái độ nào là KHÔNG phù hợp khi nhà môi giới nhận được một lời phàn nàn gay gắt từ khách hàng?", "options": {"A": "Lắng nghe chăm chú để hiểu rõ vấn đề.", "B": "Đổ lỗi ngược lại cho khách hàng hoặc bên thứ ba.", "C": "Xin lỗi về trải nghiệm không tốt của khách hàng (ngay cả khi lỗi không hoàn toàn do mình).", "D": "Đề xuất hướng giải quyết hoặc khắc phục (nếu có thể)."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Điều gì tạo nên sự khác biệt cốt lõi giữa một nhà môi giới bất động sản đơn thuần và một nhà tư vấn bất động sản chuyên nghiệp?", "options": {"A": "Số lượng giao dịch thành công.", "B": "Mức phí hoa hồng cao hơn.", "C": "Khả năng cung cấp giải pháp toàn diện, dựa trên sự thấu hiểu sâu sắc nhu cầu khách hàng, kiến thức thị trường và phân tích chuyên môn, thay vì chỉ kết nối mua bán.", "D": "Thời gian hoạt động trong nghề lâu hơn."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi thị trường bất động sản có dấu hiệu trầm lắng, người bán không muốn giảm giá, nhà môi giới nên tập trung vào chiến lược nào?", "options": {"A": "Tạm dừng mọi hoạt động marketing.", "B": "Chuyển sang chỉ làm việc với người mua.", "C": "Tăng cường marketing sáng tạo, nhấn mạnh các giá trị độc đáo của bất động sản", "D": "Yêu cầu người bán phải giảm giá bằng mọi cách."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Đâu là rủi ro khi nhà môi giới quá tập trung vào việc \"chốt sale\" nhanh chóng mà bỏ qua bước thẩm định thông tin kỹ lưỡng?", "options": {"A": "Nhận được hoa hồng nhanh hơn.", "B": "Có thể dẫn đến giao dịch thất bại giữa chừng, tranh chấp pháp lý, mất uy tín và gây thiệt hại cho khách hàng.", "C": "Được khách hàng đánh giá cao vì sự nhanh nhẹn.", "D": "Tiết kiệm được chi phí hoạt động."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong hợp đồng mua bán, điều khoản Bất khả kháng thường đề cập đến vấn đề gì?", "options": {"A": "Quyền đơn phương chấm dứt hợp đồng của người mua.", "B": "Các sự kiện khách quan, không lường trước được (thiên tai, dịch bệnh, chiến tranh...) làm ảnh hưởng đến việc thực hiện hợp đồng và miễn trừ trách nhiệm cho các bên.", "C": "Nghĩa vụ nộp thuế của các bên.", "D": "Mức phạt vi phạm hợp đồng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc sử dụng \"bằng chứng xã hội\" trong marketing BĐS có thể là hình thức nào?", "options": {"A": "Đưa ra mức giá cao nhất thị trường.", "B": "Sử dụng lời chứng thực của khách hàng cũ hài lòng, hiển thị các giải thưởng, chứng nhận uy tín.", "C": "Che giấu thông tin về các giao dịch thất bại.", "D": "Quảng cáo sai sự thật về tiện ích dự án."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong trường hợp thị trường bất động sản biến động mạnh (tăng hoặc giảm giá nhanh), kỹ năng nào của nhà môi giới trở nên đặc biệt quan trọng?", "options": {"A": "Kỹ năng thiết kế nội thất.", "B": "Kỹ năng phân tích thị trường, dự báo (ở mức độ nhất định) và tư vấn chiến lược kịp thời, linh hoạt cho khách hàng.", "C": "Kỹ năng chụp ảnh BĐS.", "D": "Kỹ năng soạn thảo văn bản hành chính."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc từ chối cung cấp thông tin sai lệch theo yêu cầu của khách hàng (ví dụ: yêu cầu nói dối về tình trạng BĐS) thể hiện điều gì ở nhà môi giới?", "options": {"A": "Sự thiếu linh hoạt.", "B": "Sự cứng nhắc, không biết chiều khách.", "C": "Tính chính trực và tuân thủ đạo đức nghề nghiệp.", "D": "Sự thiếu tự tin vào khả năng bán hàng."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi quản lý một đội ngũ nhân viên môi giới, việc xây dựng cơ chế chia sẻ thông tin và hợp tác (co-broke) nội bộ hiệu quả mang lại lợi ích gì?", "options": {"A": "Tăng sự cạnh tranh gay gắt giữa các nhân viên.", "B": "Giảm tổng doanh thu của công ty.", "C": "Tăng khả năng chốt giao dịch nhờ tận dụng được nguồn hàng và nguồn khách của nhau, tạo môi trường làm việc hợp tác.", "D": "Làm lộ thông tin khách hàng ra ngoài."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Đâu là hạn chế của việc thẩm định giá bất động sản chỉ dựa vào phương pháp so sánh thị trường?", "options": {"A": "Phương pháp này quá phức tạp.", "B": "Có thể không chính xác nếu thị trường có ít giao dịch tương đồng hoặc bất động sản có tính độc đáo cao.", "C": "Chỉ áp dụng được cho bất động sản thương mại.", "D": "Luôn cho ra kết quả thấp hơn giá trị thực."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Kỹ năng \"quản lý kỳ vọng\" của khách hàng có nghĩa là gì?", "options": {"A": "Luôn hứa hẹn những điều vượt quá khả năng để làm khách hàng hài lòng ban đầu.", "B": "Đặt ra những kỳ vọng thực tế, rõ ràng cho khách hàng về quy trình, thời gian, kết quả có thể đạt được ngay từ đầu, tránh gây thất vọng về sau.", "C": "Yêu cầu khách hàng không nên có kỳ vọng gì.", "D": "Bỏ qua những kỳ vọng của khách hàng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Việc nhà môi giới chủ động tìm hiểu và tuân thủ các quy định về quảng cáo BĐS (ví dụ: không quảng cáo sai sự thật, phải ghi rõ thông tin liên hệ...) nhằm mục đích gì?", "options": {"A": "Tránh bị xử phạt vi phạm hành chính", "B": "Xây dựng hình ảnh chuyên nghiệp, tuân thủ pháp luật.", "C": "Cả A và B đúng", "D": "Cả A và B sai"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Công nghệ nào cho phép nhà môi giới phân tích hành vi người dùng trên website để cá nhân hóa trải nghiệm và đề xuất bất động sản phù hợp?", "options": {"A": "IoT.", "B": "Blockchain.", "C": "Big Data và AI.", "D": "GPS."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi gặp một khách hàng có kiến thức sâu về bất động sản và thị trường, nhà môi giới nên thể hiện vai trò của mình như thế nào?", "options": {"A": "Tranh luận để chứng tỏ mình giỏi hơn.", "B": "Thể hiện sự tôn trọng kiến thức của khách hàng, tập trung vào việc cung cấp giá trị gia tăng khác", "C": "Lảng tránh các câu hỏi chuyên sâu", "D": "Chỉ đóng vai trò người dẫn đi xem nhà."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Đâu là giới hạn của việc sử dụng công nghệ AI trong định giá BĐS?", "options": {"A": "Công nghệ AI không thể xử lý được số lượng lớn dữ liệu.", "B": "Kết quả định giá của công nghệ AI có thể không phản ánh được các yếu tố đặc thù, độc đáo hoặc các yếu tố cảm tính, tâm lý thị trường mà con người có thể cảm nhận.", "C": "Công nghệ AI luôn đưa ra mức giá thấp hơn thực tế.", "D": "Chi phí sử dụng AI quá cao cho việc định giá."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Khi kết thúc một thương vụ thành công, hành động nào thể hiện sự chuyên nghiệp và giúp duy trì mối quan hệ tốt đẹp với khách hàng?", "options": {"A": "Ngắt mọi liên lạc với khách hàng.", "B": "Gửi lời cảm ơn chân thành, hỏi thăm về trải nghiệm và đề nghị hỗ trợ nếu có vấn đề phát sinh (trong phạm vi hợp lý).", "C": "Yêu cầu khách hàng viết đánh giá tốt ngay lập tức.", "D": "Chỉ gửi hóa đơn thu phí hoa hồng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong đàm phán, nếu đối tác liên tục sử dụng chiến thuật gây áp lực thời gian (\"Tôi cần quyết định ngay trong hôm nay\"), nhà môi giới nên phản ứng thế nào?", "options": {"A": "Đồng ý ngay lập tức với mọi điều kiện.", "B": "Cũng tạo áp lực ngược lại.", "C": "Giữ bình tĩnh, không bị cuốn theo áp lực, đề nghị có thêm thời gian hợp lý để xem xét nếu cần, hoặc yêu cầu đối tác giải thích lý do của sự gấp rút đó.", "D": "Từ chối đàm phán tiếp."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Đâu là lợi ích của việc đa dạng hóa các kênh marketing (cả online và offline) cho văn phòng môi giới?", "options": {"A": "Tốn kém chi phí hơn.", "B": "Tiếp cận được nhiều đối tượng khách hàng khác nhau và giảm sự phụ thuộc vào một kênh duy nhất.", "C": "Khó quản lý và đo lường hiệu quả hơn.", "D": "Chỉ phù hợp với thị trường bất động sản cao cấp."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Hợp đồng mua bán có điều khoản \"Giá bán không bao gồm thuế, phí liên quan đến việc chuyển nhượng\". Vậy, lệ phí trước bạ sẽ do ai chịu trách nhiệm nộp?", "options": {"A": "Người bán.", "B": "Người mua.", "C": "Nhà môi giới.", "D": "Cơ quan công chứng."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Nhà môi giới M muốn sử dụng hình ảnh khách hàng đã giao dịch thành công để làm tư liệu marketing (testimonial). Nhà môi giới M cần làm gì trước tiên?", "options": {"A": "Tự ý lấy ảnh trên Facebook của khách hàng và đăng tải.", "B": "Xin phép khách hàng một cách rõ ràng bằng văn bản (hoặc hình thức có giá trị tương đương) về việc sử dụng hình ảnh và ý kiến của họ cho mục đích marketing.", "C": "Chỉ sử dụng hình ảnh che mặt của khách hàng.", "D": "Yêu cầu khách hàng bắt buộc phải cung cấp testimonial."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Một bất động sản được đồng sở hữu bởi 3 anh em. Một người trong số đó liên hệ nhà môi giới N để bán. Nhà môi giới N cần yêu cầu giấy tờ gì để đảm bảo giao dịch hợp lệ?", "options": {"A": "Chỉ cần CMND/CCCD của người liên hệ.", "B": "Giấy chứng nhận quyền sử dụng đất và văn bản đồng ý/ủy quyền bán có chữ ký hợp lệ của cả 3 anh em (nên được công chứng/chứng thực).", "C": "Giấy khai sinh của cả 3 anh em.", "D": "Hợp đồng lao động của người liên hệ."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Trong hợp đồng thuê nhà, điều khoản \"Tiền thuê nhà sẽ được điều chỉnh hàng năm theo chỉ số giá tiêu dùng (CPI) do Tổng cục Thống kê công bố\" có lợi và bất lợi gì?", "options": {"A": "Chỉ có lợi cho chủ nhà vì tiền thuê luôn tăng.", "B": "Có lợi cho cả hai bên vì tạo ra cơ chế điều chỉnh giá khách quan, tránh tranh cãi; nhưng cũng có thể bất lợi nếu CPI tăng quá cao hoặc giảm sâu.", "C": "Chỉ có lợi cho người thuê vì CPI thường tăng chậm.", "D": "Chỉ làm hợp đồng thêm phức tạp."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Hợp đồng mua bán bất động sản có điều khoản \"Bên bán cam kết bất động sản không có bất kỳ tranh chấp nào\". Sau khi mua, bên mua phát hiện có tranh chấp ranh giới từ trước đó. Bên mua có quyền gì?", "options": {"A": "Không có quyền gì vì đã ký hợp đồng.", "B": "Có quyền yêu cầu bên bán giải quyết dứt điểm tranh chấp hoặc yêu cầu hủy hợp đồng và bồi thường thiệt hại do bên bán đã vi phạm cam kết.", "C": "Chỉ có quyền yêu cầu giảm giá bán.", "D": "Phải tự mình giải quyết tranh chấp với hàng xóm."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Hợp đồng mua bán bất động sản quy định thời hạn bên bán phải bàn giao nhà là 30 ngày sau khi ký công chứng. Đến ngày thứ 30, bên bán vẫn chưa dọn đi và xin thêm 1 tuần. Bên mua nên:", "options": {"A": "Đồng ý ngay lập tức mà không cần điều kiện gì.", "B": "Yêu cầu bên bán bồi thường thiệt hại do chậm bàn giao.", "C": "Xem xét lý do chậm trễ, nếu hợp lý có thể đồng ý gia hạn nhưng nên lập thành văn bản (phụ lục hợp đồng) ghi rõ thời hạn mới và có thể kèm theo điều kiện (ví dụ: bên bán chịu chi phí thuê nhà phát sinh cho bên mua trong 1 tuần đó).", "D": "Thuê người đến chuyển đồ của bên bán đi."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tình huống: Trong quá trình đàm phán, nhà môi giới O nhận thấy cả bên mua và bên bán đều có thiện chí nhưng gặp khó khăn trong việc tìm tiếng nói chung về một vài điều khoản nhỏ. Nhà môi giới O nên đóng vai trò gì?", "options": {"A": "Đứng về phía bên trả hoa hồng cao hơn.", "B": "Đề xuất các giải pháp trung gian, các phương án thỏa hiệp công bằng cho các điều khoản nhỏ đó để giúp hai bên vượt qua điểm nghẽn và đi đến thỏa thuận cuối cùng.", "C": "Để hai bên tự giải quyết các vấn đề nhỏ đó.", "D": "Tuyên bố đàm phán thất bại."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Hợp đồng đặt cọc không ghi rõ về việc ai sẽ chịu chi phí công chứng hợp đồng mua bán. Theo thông lệ tại nhiều địa phương ở Việt Nam, chi phí này thường do ai chịu?", "options": {"A": "Người bán chịu hoàn toàn.", "B": "Người mua chịu hoàn toàn.", "C": "Nhà môi giới chịu.", "D": "Thường do người mua chịu, hoặc hai bên thỏa thuận chia đôi."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Hợp đồng nào sau đây không phải là hợp đồng kinh doanh bất động sản?", "options": {"A": "Hợp đồng mua bán nhà, công trình xây dựng", "B": "Hợp đồng thuê mua nhà, công trình xây dựng", "C": "Hợp đồng quản lý bất động sản", "D": "Hợp đồng chuyển nhượng, cho thuê, cho thuê lại quyền sử dụng đất."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Mục nào sau đây không phải là một chiến lược đàm phán hay?", "options": {"A": "Bày tỏ thiện ý sớm để chứng tỏ rằng bạn đang thương thảo với mục đích tích cực", "B": "Xác định tâm ý và những điều kiện mà khách hàng có thể chấp nhận được", "C": "Đưa ra những điều kiện ưu đãi như thanh toán nhanh hoặc mong muốn đạt được sự giao dịch sớm", "D": "Áp dụng kỹ năng đàm phán win-win trong đó mỗi bên đầu cảm thấy thỏa mãn."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Trong quá trình đổi mới và phát triển kinh tế trong hơn 20 năm qua, nhu cầu về bất động sản tại Việt Nam đã tăng lên rất cao, theo anh chị nguyên nhân là do:", "options": {"A": "Quy mô dân số tăng nhanh đã thúc đẩy nhu cầu về nhà ở tăng theo", "B": "Việc bùng nổ quá trình đô thị hóa ở Việt Nam", "C": "Việc phát triển kinh thế theo hướng công nghiệp hóa – hiện đại hóa", "D": "Cả A, B, C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tương sinh đúng trong Ngũ hành theo quan niệm phong thủy", "options": {"A": "Thủy sinh mộc, mộc sinh hỏa, hỏa sinh thổ, thổ sinh kim, kim sinh thủy", "B": "Thủy sinh kim, kim sinh thổ, thổ sinh mộc, mộc sinh thủy, thủy sinh hỏa", "C": "Thổ sinh hỏa, hỏa sinh kim, kim sinh thủy, thủy sinh mộc, mộc sinh thổ", "D": "Cả 3 câu trên đều đúng."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Mục đích của việc khám phá nhu cầu khách hàng trong mua bán bất động sản là", "options": {"A": "Xác định nhu cầu mua bán", "B": "Khả năng thanh toán", "C": "Động lực của khách hàng", "D": "Tất cả đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Phương pháp đánh giá bất động sản dựa trên dữ liệu thị trường có thể yêu cầu một vài điều chỉnh dựa trên việc so sánh những khoản sau, ngoại trừ:", "options": {"A": "Ngày, thời điểm mua bán", "B": "Diện tích kích thước nền nhà và vị trí khu vực", "C": "Phương thức thanh toán tài chính của người mua", "D": "Chi phí thay thế sửa chữa kiến trúc"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Vai trò của người môi giới BĐS", "options": {"A": "Cung cấp thông tin một cách công khai, trung thực cho các chủ thể tham gia giao dịch, làm cầu nối giữa người mua, người bán & hưởng phí môi giới", "B": "Bán sản phẩm theo yêu cầu của chủ đầu tư", "C": "Bán sản phẩm theo yêu cầu của khách hàng", "D": "Có thể \"kê giá\" khi giới thiệu bán sản phẩm."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Là nhà môi giới bất động sản, công việc nào sau đây được thực hiện thường xuyên nhất?", "options": {"A": "Xác định lượng cung bất động sản nói chung trên thị trường bất động sản.", "B": "Xác định chi phí, lợi nhuận, thủ tục pháp lý, hỗ trợ khách hàng thực hiện các giao dịch mua bán bất động sản", "C": "Xác định chu kỳ phát triển của bất động sản", "D": "Không phải các công việc trên"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Cho các nội dung sau: “Vị trí”, “Giá bán”, “Diện tích”, “Phong thuỷ”, “Chủ đầu tư”, “Mặt bằng”, “Ngân hàng”, “Thời gian bàn giao”, “Luật kinh doanh BĐS”. Nội dung nào cần cung cấp khi marketing BĐS?", "options": {"A": "Vị trí - Giá bán - Diện tích", "B": "Phong thuỷ - Chủ đầu tư - Mặt bằng", "C": "Ngân hàng - Thời gian bàn giao - Luật kinh doanh BĐS", "D": "Tất cả nội dung trên"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Việc xây dựng và phát triển thương hiệu đảm bảo hiệu quả đối với một công ty kinh doanh BĐS có quy mô vừa và nhỏ, kinh phí hạn hẹp:", "options": {"A": "Đầu tư vào các sản phẩm khác biệt và chăm sóc khách hàng", "B": "Đầu tư vào chất lượng sản phẩm", "C": "Đầu tư vào giá, khuyến mãi, cạnh tranh giảm giá", "D": "Tất cả các ý trên"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Các công ty BĐS thực hiện chiến lược tạo ra lợi thế cạnh tranh bằng sản phẩm vượt trội, khác biệt như thế nào:", "options": {"A": "Tiếp cận thị trường theo chiến lược hớt ván dầu", "B": "Sản phẩm chất lượng phù hợp, giá cả phải chăng", "C": "Tạo ra sự khách biệt về đẳng cấp, theo đuổi sự tuyệt hảo về chất lượng sản phẩm", "D": "Tìm ra “khe hở” thị trường, đầu tư chuyên biệt hoá tạo ra khoảng cách so với các đối thủ cạnh tranh"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Các công ty BĐS thực hiện chiến lược tạo ra lợi thế cạnh tranh với chi phí thấp:", "options": {"A": "Giảm giá hàng bán để tăng lợi thế cạnh tranh", "B": "Tìm mua các nguồn lực đầu vào, quản trị hoạt động với chi phí thấp", "C": "Đem lại cho khách hàng chi phí thấp trong mua và tiêu dùng BĐS", "D": "Lựa chọn B & C đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Một công ty BĐS có chương trình khuyến mại tặng TV khi mua nhà, nhưng khách hàng dự định mua nhà đề nghị được nhận tiền mặt thay cho nhận TV, nếu là người môi giới trong trường hợp này, bạn sẽ:", "options": {"A": "Hứa với khách hàng và đề xuất ý kiến lên công ty", "B": "Khẳng định công ty không có chính sách này, từ chối lời đề nghị", "C": "Giải thích theo chính sách khuyến mại của công ty", "D": "Tất cả những ý trên"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Căn hộ thuộc dự án A chưa có khách hàng đăng ký mua, khách hàng yêu cầu không thực hiện các bước đặt chỗ, đặt cọc, ký kết với các biên bản đặt chỗ, đặt cọc và thực hiện ký kết hợp đồng mua bán với chủ đầu tư:", "options": {"A": "Môi giới khẳng định với khách hàng là buộc phải làm theo các bước này", "B": "Môi giới hứa sẽ giải quyết theo yêu cầu của khách", "C": "Người môi giới hướng dẫn khách hàng thực hiện việc ký kết hợp đồng mua bán", "D": "Tất cả những ý trên"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Căn hộ A612 thuộc dự án X có rất nhiều khách hàng đăng ký mua, khách hàng B yêu cầu thực hiện bước đặt chỗ mua căn hộ với chủ đầu tư nhưng đến thời điểm thực hiện đặt cọc, khách hàng B vẫn chưa thực hiện việc đặt cọc, trong khi khách hàng C có nhu cầu đặt chỗ và đặt cọc căn hộ đó:", "options": {"A": "Người môi giới liên lạc với khách hàng B xác nhận lần cuối việc huỷ thoả thuận đặt chỗ, sau đó tiến hành việc đặt cọc căn hộ cho khách hàng C", "B": "Người môi giới tiến hành việc đặt cọc căn hộ cho khách hàng C", "C": "Người môi giới vẫn giữ chỗ cho khách hàng B, đề xuất căn hộ khác cho khách hàng C mua", "D": "Phản ánh tình huống khó giải quyết lên công ty để tìm kiếm giải pháp hỗ trợ"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Khách hàng C đã tiến hành việc đặt chỗ và đến thời điểm đặt cọc, khách hàng C đã đưa tiền đặt cọc bằng tiền mặt cho người môi giới, hành vi nào sau đây là đúng:", "options": {"A": "Người môi giới thực hiện nộp tiền theo thông tin của khách hàng C cho căn hộ có mã số theo yêu cầu (VD A216)", "B": "Người môi giới dẫn khách C đi thực hiện thủ tục nộp tiền", "C": "Người môi giới từ chối nhận tiền và hướng dẫn khách hàng C đi nộp tiền cho công ty", "D": "Người môi giới giữ luôn tiền, \"đi nhậu\""}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Quá trình chia một thị trường toàn phần hoặc một khu vực thị trường thành những thị trường nhỏ, những nhóm khách hàng vì mục đích marketing, gọi là:", "options": {"A": "Thâm nhập thị trường.", "B": "Phân khúc thị trường.", "C": "Chọn thị trường mục tiêu.", "D": "Phát triển thị trường."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nguyên tắc quan trọng nhất cần nắm để viết thư bán hàng bất động sản", "options": {"A": "Làm nổi bật vai trò của khách hàng", "B": "Nhấn mạnh một đặc điểm của sản phẩm", "C": "Sử dụng ngôn ngữ chuyên môn", "D": "Sử dụng các danh từ cụ thể và các động từ chủ động"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Điều nào thể hiện lập trường của đàm phán kiểu mềm?", "options": {"A": "Ôn hòa, trao đổi, lắng nghe các đề xuất, dung hòa lập trường của các bên.", "B": "Cứng rắn, không nhượng bộ, cố gắng bảo vệ lập trường đến cùng.", "C": "Không cứng rắn, không nhượng bộ, dung hòa lập trường các bên", "D": "Lắng nghe các đề xuất nhưng không nhượng bộ, cố gắng bảo vệ lập trường của mình"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Quy trình môi giới sản phẩm bất động sản bao gồm các bước sau, ngoại trừ:", "options": {"A": "Đánh giá tiềm năng của sản phẩm và nhu cầu của khách hàng;", "B": "Thu thập và cập nhật thông tin về thị trường, sản phẩm và pháp lý", "C": "Tìm kiếm khách hàng và chuẩn bị tư vấn cho khách hàng, lập hồ sơ thương vụ môi giới; thương lượng, đàm phán và thuyết phục khách hàng, soạn thảo hợp đồng, chăm sóc khách hàng.", "D": "Thu thập thông tin thực hiện thủ tục thẩm định giá cho khách hàng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Nhà môi giới bất động sản có được phép nhận đặt cọc để mua căn hộ từ khách hàng không?", "options": {"A": "Được phép khi có văn bản ủy quyền của chủ đầu tư và/hoặc chủ bất động sản", "B": "Không được phép thực hiện theo đúng nội dung ủy quyền", "C": "Hoàn toàn không được phép", "D": "Cả A, B, C đều sai"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Điều nào không phải là đặc điểm của phương pháp đàm phán nguyên tắc?", "options": {"A": "Ôn hòa với người, cứng rắn với công việc", "B": "Sự tín nhiệm không liên quan đến đàm phán", "C": "Tìm ra phương án đối tác có thể chấp thuận", "D": "Cả 2 bên cùng có lợi"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Một đàm phán được coi là thành công phải đảm bảo nguyên tắc?", "options": {"A": "Một trong hai bên đạt được mục đích", "B": "Hòa bình, hữu nghị", "C": "Đôi bên cùng có lợi", "D": "Không xảy ra xung đột"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi kinh doanh dịch vụ tư vấn đầu tư kinh doanh Bất động sản, cần lưu ý vấn đề nào:", "options": {"A": "Tỉ suất lợi nhuận trên vốn đầu tư", "B": "Tính thanh khoản của vốn đầu tư", "C": "Lợi ích trên chi phí", "D": "Tất cả đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trong giai đoạn chuẩn bị đàm phán xúc tiến ký kết hợp đồng, cần xác định nhu cầu, mong muốn của khách hàng và sơ bộ định dạng đối tác. Theo đó, có thể tạm chia khách hàng \"sẵn sàng đánh đổi chi phí để lấy chất lượng mà họ đã biết rõ, họ ngại rủi ro có thể xảy ra nếu với những đối tác mới\" vào loại:", "options": {"A": "Khách hàng trọng giá cả", "B": "Khách hàng trọng giá trị", "C": "Khách hàng trung thành", "D": "Khách hàng trọng tiện lợi"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi đàm phán về giá, chủ bán khư khư không giảm giá bán, dù chỉ 1 xu, môi giới nên áp dụng chiến lược đàm phán nào?", "options": {"A": "Thua-thua", "B": "Thắng-thua", "C": "Thua-thắng", "D": "Thắng-thắng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Bước đầu tiên trong quy trình mua nhà đất mà nhân viên kinh doanh bất động sản cần xác định với khách hàng là gì?", "options": {"A": "Hỏi về tài chính của họ", "B": "Hỏi về sở thích của họ", "C": "Hỏi về kinh nghiệm sở hữu bất động sản trước đây của họ", "D": "Hỏi về gia đình họ"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Marketing bất động sản mang nội dung nào?", "options": {"A": "Phương thức tiếp thị, trưng bày bất động sản", "B": "Các chiến lược quảng cáo bất động sản", "C": "Xúc tiến bán hàng", "D": "Cả A, B, C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Chủ sở hữu chung cư thường có quyền gì đối với đất đai dùng để tạo lập nên tòa nhà chung cư đó?", "options": {"A": "Quyền sở hữu đất", "B": "Quyền sử dụng riêng", "C": "Quyền sử dụng chung", "D": "Không có quyền gì"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi gọi khai thác khách hàng bán qua điện thoại, khi mới bắt đầu câu chuyện với khách hàng, người môi giới nên:", "options": {"A": "Hỏi chi tiết về thông tin bất động sản", "B": "Hỏi mục đích bán của khách hàng", "C": "Giới thiệu mình bên công ty bất động sản", "D": "Hỏi giá bán và tiến hành trả giá"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Trường hợp chủ đầu tư đã thế chấp nhà ở hình thành trong tương lai tại ngân hàng, trước khi ký hợp đồng mua bán, thuê mua nhà ở đó với khách hàng, phải đáp ứng điều kiện nào sau đây", "options": {"A": "Phải giải chấp nhà ở trước khi ký hợp đồng huy động vốn, trừ trường hợp bên mua và ngân hàng đồng ý", "B": "Có văn bản thông báo nhà ở đủ điều kiện được bán của Sở Xây Dựng", "C": "Miễn là khách hàng đồng ý mua, không cần sự đồng ý của ngân hàng", "D": "Cả A và B đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Các thông tin cần nắm khi học dự án mới trước khi triển khai bán cho chủ đầu tư là gì?", "options": {"A": "Thông tin về chủ đầu tư.", "B": "Thông tin về pháp lý dự án.", "C": "Thông tin về chính sách bảo hành, nội thất và tiến độ thi công.", "D": "Cả A, B, C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Bên đơn phương chấm dứt thực hiện hợp đồng thuê nhà, công trình xây dựng thì phải báo cho bên kia biết trước bao lâu nếu không có sự thỏa thuận?", "options": {"A": "1 tháng", "B": "2 tháng", "C": "15 ngày", "D": "90 ngày"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Chức năng môi giới bất động sản bao gồm:", "options": {"A": "Cung cấp thông tin và tư vấn cho khách hàng về diễn biến tổng thể của thị trường bất động sản", "B": "Cung cấp thông tin các sản phẩm bđs giúp khách hàng thực hiện giao dịch theo yêu cầu của khách hàng và vì lợi ích của khách hàng", "C": "Cung cấp các dịch vụ tư vấn pháp lý, tài chính, giá bđs", "D": "Tất cả các mục trên"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Một bất động sản có chi phí cao hơn thu nhập được mô tả là có", "options": {"A": "Dòng tiền dương.", "B": "Dòng tiền âm.", "C": "Khấu hao âm.", "D": "Khấu hao quá mức."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Để tránh sự phản ứng, chống đối của khách hàng khi người môi giới tiếp xúc với khách hàng, với tư cách hành nghề môi giới chuyên nghiệp, môi giới viên cần tiếp cận khách hàng với mục tiêu:", "options": {"A": "Vì tiền", "B": "Vì thách thức", "C": "Vì thích nghề môi giới bất động sản/vì phấn khích", "D": "Giúp khách hàng đạt mục tiêu tài chính của mình, thông qua đó đạt được các mục tiêu cá nhân"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Mục nào sau đây không thuộc phạm vi của Thương lượng?", "options": {"A": "Quá trình tìm kiếm và thỏa thuận về các điều khoản, điều kiện, hoặc giá cả của một giao dịch", "B": "Tìm kiếm giải pháp chung và thỏa thuận mà cả hai bên đều hài lòng", "C": "Tập trung vào tìm giải pháp chung và tạo điều kiện để đạt được sự hài lòng từ cả hai bên", "D": "Có thể coi đối tác là đối thủ trong quá trình"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Hành vi nào sau đây không bị cấm trong hoạt động kinh doanh bất động sản?", "options": {"A": "Huy động vốn của người mua bất động sản khi hội đủ điều kiện", "B": "Không thực hiện đúng nghĩa vụ tài chính đối với Nhà nước", "C": "Không đăng ký kinh doanh theo quy định pháp luật", "D": "Cả A, B, C đều sai"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Các chỉ tiêu nào cần đạt được trong quản lý kênh phân phối bán hàng?", "options": {"A": "Thỏa mãn nhu cầu của khách hàng", "B": "Doanh thu", "C": "Lợi nhuận", "D": "Cả A, B, C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Chiến lược “kéo” áp dụng trong kinh doanh bất động sản được hiểu như thế nào:", "options": {"A": "Tạo ra sự đồng thuận về cảm nhận sản phẩm", "B": "Tạo ra sự nhận biết về thương hiệu và sự hấp dẫn khách hàng bằng các sản phẩm khác biệt", "C": "Truyền tải thông tin do chủ đầu tư thực hiện nhằm gây ảnh hưởng tới thái độ, hành vi và nhận thức của người mua", "D": "Tìm cách đẩy sản phẩm đến các nhà phân phối và khách hàng bằng các chương trình khuyến mãi, tặng quà, chiết khấu hoa hồng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Người môi giới cần nắm rõ quy hoạch đầu tư xây dựng của một vùng thị trường để có phương án môi giới cụ thể. Quy hoạch đầu tư xây dựng được thể hiện thông qua:", "options": {"A": "Việc tổ chức không gian đô thị và điểm dân cư, hệ thống công trình hạ tầng kỹ thuật, hạ tầng xã hội", "B": "Đồ án quy hoạch xây dựng (sơ đồ, bản vẽ, mô hình, thuyết minh)", "C": "Các cơ sở để các hoạt động lập dự án đầu tư, xin giao đất, thuê đất... được thực hiện", "D": "Tổ chức sắp xếp không gian lãnh thổ trên cơ sở khai thác và sử dụng tài nguyên thiên nhiên"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Phân tích lợi nhuận trên tổng doanh thu là nhằm:", "options": {"A": "Xem xét mức độ lợi nhuận so với khách hàng từng giai đoạn để từ đó đưa ra những biện pháp phù hợp", "B": "Đo lường quy mô của các giao dịch cho thấy hiệu quả của việc tìm kiếm các giao dịch có giá trị lớn", "C": "Đánh giá được năng suất lao động của các nhân viên giữa các thời kỳ khác nhau trong một năm hay cùng kỳ năm trước", "D": "Tất cả sai"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Khi đàm phán về giá, khách mua và chủ bán nhất quyết không tăng hay giảm giá mua-bán, dù chênh lệch giá mua bán chỉ khoảng 20tr đồng. Vụ giao dịch này có nguy cơ thất bại. Là môi giới trong trường hợp này, bạn nên áp dụng chiến thuật đàm phán nào?", "options": {"A": "Thua-thua. (Xem xét \"cắt máu\" giảm bớt tiền hoa hồng.)", "B": "Thắng-thua", "C": "Thua-thắng", "D": "Thắng-thắng"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Phong cách đàm phán cạnh tranh được áp dụng trong trường hợp nào?", "options": {"A": "Khi phát sinh tình huống đột xuất, không nằm trong dự kiến đàm phán của các bên.", "B": "Khi các bên hướng đến mục tiêu chung, lợi ích chung.", "C": "Khi chủ thể đàm phán không đạt được mục tiêu, lợi ích riêng", "D": "Khi không có quyền hạn quyết định, thiếu thông tin về các nội dung đàm phán"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Chứng chỉ môi giới bất động sản đã được cấp trước ngày 01/08/2024:", "options": {"A": "Có giá trị pháp lý trong thời hạn 05 năm kể từ ngày 01/08/2024", "B": "Có giá trị pháp lý trong thời hạn 05 năm kể từ ngày cấp", "C": "Không có giá trị pháp lý do đã có luật mới, người môi giới phải học lại và thi sát hạch", "D": "Cả A, B, C đều sai"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Sàn giao dịch bất động sản phải có:", "options": {"A": "Vốn pháp định", "B": "Quy chế hoạt động của sàn giao dịch", "C": "Cả A, B đều đúng", "D": "Cả A, B đều sai"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Giá trị nhà được tính theo quy định của Bộ Xây Dựng dựa trên:", "options": {"A": "Phân loại nhà", "B": "Định mức xây dựng", "C": "Giá trị thực tế còn lại của căn nhà", "D": "Tất cả đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Truyền thông marketing là gì?", "options": {"A": "Là một quá trình truyền tải thông tin do người mua thực hiền nhằm gây ảnh hưởng tới thái độ, hành vi và nhận thức của người bán", "B": "Là một quá trình truyền tải thông tin do nhà sản xuất thực hiện nhằm gây ảnh hưởng tới thái độ, hành vi và nhận thức của người mua", "C": "Là một quá trình truyền tải thông tin do người bán thực hiện nhằm gây ảnh hưởng tới thái độ, hành vi và nhận thức của người mua", "D": "Câu B, C đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Người quản lý, điều hành sàn giao dịch bất động sản phải có các điều kiện nào:", "options": {"A": "Có giấy chứng nhận đã hoàn thành khóa đào tạo, bồi dưỡng kiến thức về quản lý, điều hành sàn giao dịch bất động sản", "B": "Có chứng chỉ hành nghề môi giới bất động sản. Có năng lực hành vi dân sự đầy đủ, không đang trong tình trạng bị truy cứu trách nhiệm hình sự hoặc chấp hành án phạt tù. Không bị cấm hành nghề theo quyết định của cơ quan có thẩm quyền", "C": "Chưa có văn bản luật hướng dẫn điều này", "D": "Bao gồm cả A và B"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Hạn chế của đàm phán kiểu cứng là:", "options": {"A": "Lợi ích các bên giảm xuống, không đạt được những mục tiêu riêng của các bên.", "B": "Hy sinh nhiều lợi ích, tốn kém chi phí và thời gian cho việc thực hiện cam kết sau đàm phán", "C": "Gây tình trạng căng thẳng, đàm phán dễ tan vỡ hoặc khó thực hiện sau này.", "D": "Mất lòng tin từ các đối tác dẫn đến mất quan hệ hợp tác quốc tế."}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Bên môi giới không được đồng thời là?", "options": {"A": "Bên bán trong cùng giao dịch môi giới", "B": "Bên mua trong cùng giao dịch môi giới", "C": "Cả A và B đều được phép", "D": "Cả A và B đều không được phép"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Việc đầu tiên cần làm trong tiếp nhận than phiền từ khách hàng là", "options": {"A": "Đưa ra giải pháp xử lý vấn đề", "B": "Khuyến khích khách hàng kể lại câu chuyện", "C": "Xác nhận vấn đề/sự kiện", "D": "Xác nhận lỗi của bên mua hay bên bán"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trở ngại tâm lý của khách hàng khi tiếp xúc với người môi giới bất động sản là:", "options": {"A": "Không an toàn khi tiếp xúc người lạ", "B": "Sợ tốn kém thời gian", "C": "Sợ bị quấy rầy liên tục", "D": "Cả A và C đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Phương pháp thu thập thông tin về cầu bất động sản chủ động không bao gồm hoạt động nào sau đây:", "options": {"A": "Đón tại văn phòng môi giới bất động sản", "B": "Tiếp cận tận nơi: đón hoặc gọi điện", "C": "Tìm kiếm qua các phương tiện thông tin đại chúng", "D": "Gửi thư trực tiếp tới khách hàng tiềm năng"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Có thể sử dụng yếu tố nào để thuyết phục trong trường hợp khách hàng cho rằng BĐS là cao?", "options": {"A": "Yếu tố BĐS có giá trị gia tăng nhanh theo thời gian", "B": "Yếu tố BĐS đảm bảo an toàn về mặt quy hoạch, pháp lý", "C": "Yếu tố uy tín, chất lượng dịch vụ của công ty môi giới", "D": "Cả 3 câu trả lời trên đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Khi chất lượng sản phẩm như nhau thì phải lấy yếu tố nào để cạnh tranh trên thị trường?", "options": {"A": "Thông tin", "B": "Dịch vụ khách hàng", "C": "Sản phẩm", "D": "Cả A, B và C đều sai"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Tình huống: Người mua đặt cọc 100 triệu đồng để mua căn nhà với giá 1.6 tỷ đồng. Người bán đổi ý không bán. Giả sử trong hợp đồng đặt cọc không có điều khoản phạt vi phạm, thì người bán phải trả tiền đặt cọc và đền bù tiền thiệt hại cho người mua theo luật, tổng cộng số tiền trả lại cộng với phạt vi phạm:", "options": {"A": "200 triệu đồng", "B": "100 triệu đồng", "C": "400 triệu đồng", "D": "Không phạt vi phạm"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Để tăng khả năng thành công khi môi giới, người môi giới cần hiểu khách hàng của mình là ai, theo đó, người môi giới cần:", "options": {"A": "Không để khách hàng nói quá nhiều", "B": "Nói thật nhiều về dự án cho khách hàng", "C": "Lắng nghe khách hàng nói", "D": "Cả A, B và C đều sai"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Tình huống: Trong hợp đồng mua bán nhà ở có quy định về đặc điểm chính của nhà ở mua bán như sau: Diện tích sử dụng căn hộ F là: 55,04 m2 (được tính theo kích thước thông thủy theo quy định của pháp luật về nhà ở). Diện tích này là tạm tính và có thể tăng lên hoặc giảm đi theo thực tế đo đạc tại thời điểm bàn giao căn hộ. Bên Mua có trách nhiệm thanh toán số tiền mua căn hộ cho bên Bán theo diện tích thực tế khi bàn giao căn hộ; Trong trường hợp diện tích thực tế bằng hoặc chênh lệch thấp hơn 3% so với diện tích ghi trong hợp đồng này thì hai bên không phải điều chỉnh lại gía bán căn hộ. Nếu diện tích thực tế chênh lệch vượt quá 3% so với diện tích ghi trong hợp đồng này thì giá bán của căn hộ sẽ được điều chỉnh lại theo diện tích đo đạc thực tế khi bàn giao căn hộ. Khi bàn giao cho khách hàng căn hộ F có diện tích là 57,7 m2, khách hàng được quyền:", "options": {"A": "Nhận căn hộ và thanh toán theo diện tích thực tế", "B": "Từ chối nhận căn hộ và không bị coi là vi phạm các điều kiện bàn giao căn hộ", "C": "Nhận căn hộ và thanh toán theo giá bán căn hộ như hợp đồng đã ký", "D": "Cả A, B và C đều đúng"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Chiến lược “Đẩy” áp dụng trong kinh doanh BĐS được hiểu như thế nào?", "options": {"A": "Tìm cách thu phục khách hàng mua sản phẩm", "B": "Tìm cách đưa sản phẩm đến các nhà phân phối và khách hàng bằng các chương trình khuyến mãi, quà tặng, chiết khấu hoa hồng.", "C": "Tìm ra sự nhận biết về thương hiệu và sự hấp dẫn khách hàng bằng sản phẩm khác", "D": "Cả A, B, C đều đúng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Điểm nào đặc biệt quan trọng đối với việc hoạch địch chiến lược Marketing trong kinh doanh BĐS", "options": {"A": "Chính sách nhà nước", "B": "Nhu cầu khách hàng", "C": "Lợi thế cạnh tranh", "D": "Nguồn vốn"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nguyên tắc của người môi giới muốn phát triển dài hạn là:", "options": {"A": "Hướng đến khách hàng", "B": "Làm đến đâu hay đến đó", "C": "Bằng mọi giá hướng đến thu nhập của bản thân", "D": "Cả A, B và C đều sai"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Tiếp nhận sản phẩm từ Ban Giám đốc Công ty, việc đầu tiên người môi giới cần thực hiện", "options": {"A": "Phân tích và đánh giá sản phẩm", "B": "Lên kế hoạch tìm kiếm nguồn khách", "C": "Lên kế hoạch marketing sản phẩm", "D": "Phân tích khách hàng"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Khách hàng mua sản phẩm cho người môi giới là do", "options": {"A": "Nhân viên tư vấn rõ ràng, phục vụ nhiệt tình, chu đáo", "B": "Sản phẩm phù hợp nhu cầu", "C": "Được người khác giới thiệu cho người môi giới", "D": "Cả A và B đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Căn nhà giao dịch với giá 3,5 tỷ đồng. Ngân hàng định giá 2,7 tỷ đồng và ngân hàng cho vay 70% giá trị của BĐS, vậy số tiền ngân hàng cho vay là:", "options": {"A": "2,45 tỷ đồng", "B": "1,89 tỷ đồng", "C": "1,75 tỷ đồng", "D": "1,32 tỷ đồng"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Các loại hợp đồng kinh doanh dịch vụ bất động sản bao gồm những hợp đồng nào dưới đây?", "options": {"A": "Hợp đồng dịch vụ sàn giao dịch bất động sản, hợp đồng dịch vụ môi giới bất động sản, hợp đồng dịch vụ tư vấn bất động sản và hợp đồng dịch vụ quản lý bất động sản", "B": "Hợp đồng dịch vụ sửa chữa bất động sản và hợp đồng dịch vụ cho vay bất động sản", "C": "Hợp đồng dịch vụ tư vấn bất động sản và hợp đồng dịch vụ bảo vệ bất động sản", "D": "Hợp đồng dịch vụ cho thuê bất động sản và hợp đồng dịch vụ quảng cáo bất động sản"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Phong cách đàm phán cùng có lợi, hai bên cùng nhất trí với nhau về mục tiêu chung, không giấu diếm thông tin về nhau, không làm phương hại lợi ích của hai bên... đó là cách đàm phán.", "options": {"A": "Một bên chiến thắng một bên thất bại (Win/Lose)", "B": "Thỏa hiệp (Compromising)", "C": "Hai bên cùng thắng (Win/Win)", "D": "Thua - Thua (Lose - Lose)"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Thuật ngữ dùng để miêu tả số phần trăm của giá trị đã được định giá của một tài sản mà tổ chức tài chính sẽ cho vay gọi là:", "options": {"A": "Tỷ lệ tài sản bị giữ lại (của người bán bất động sản)", "B": "Tỷ lệ khoản vay trên giá trị tài sản", "C": "Chứng nhận giá trị tài sản hợp lý", "D": "Khoản đầu tư vốn"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Trong quá trình tư vấn khía cạnh vay - thuê tài chính cho khách hàng mua/thuê bđs, nhà môi giới thường giúp xác định các phương án sản xuất kinh doanh hay dự án đầu tư của khách hàng có khả thi không. Nội dung nào sau đây không thuộc phạm vi công việc này?", "options": {"A": "Đánh giá khả năng trả nợ vay của khách hàng", "B": "Đề xuất phương án cho vay", "C": "Phân tích, đánh giá tình hình tài chính của khách hàng", "D": "Xác minh tính chất hợp pháp và đánh giá tài sản thế chấp, cầm cố"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Xác định và đánh giá trước người mua:", "options": {"A": "Giúp người đại diện biết mình nên giới thiệu căn nhà nào cho khách mua.", "B": "Xác định động cơ thúc đẩy của người mua", "C": "Thực hiện việc kết thúc giao dịch", "D": "Tất cả A, B, C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Theo Luật Kinh doanh Bất động sản năm 2023, nội dung dịch vụ môi giới bất động sản bao gồm những lĩnh vực sau đây, ngoại trừ:", "options": {"A": "Tìm kiếm đối tác đáp ứng các điều kiện của khách hàng để tham gia đàm phán, ký hợp đồng", "B": "Đại diện theo ủy quyền để thực hiện các công việc liên quan đến các thủ tục mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua BĐS.", "C": "Cung cấp thông tin, hỗ trợ cho các bên trong việc đàm phán, ký hợp đồng mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua BĐS.", "D": "Môi giới thành lập tổ chức pháp nhân có liên quan"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trong tư vấn bán hàng, yếu tố quyết định thành công của người môi giới chuyên nghiệp là:", "options": {"A": "Thái độ đối với khách hàng và đối với công việc", "B": "Năng lực truyền đạt ý tưởng và kiến thức một cách hiệu quả", "C": "Liên tục phát triển Tri thức nhà nghề, kỹ năng cá nhân và nghiệp vụ", "D": "Các ý A, B, C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Một hợp đồng môi giới nói chung có thể bị hủy giữa hai bên nếu:", "options": {"A": "Sự gian lận bị phát hiện", "B": "Một bên thay đổi quyết định", "C": "Người bán đi vắng vào ngày kết thúc hợp đồng", "D": "Có yêu cầu môi giới khác quan trọng hơn"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Người đại diện cho người mua địa ốc được thuê để làm gì?", "options": {"A": "Thể hiện ý kiến và mối quan tâm của người mua thông qua các giao dịch", "B": "Trưng bày và giới thiệu tài sản", "C": "Đàm phán trên cương vị của người mua", "D": "Tất cả lựa chọn đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Người mua nhà tìm đến bà B và Bà G dẫn khách mua nhà ở xã hội, hứa “lo được suất” nếu khách chi thêm tiền... Hành vi của bà G được xác định là:", "options": {"A": "Vi phạm hành vi bị nghiêm cấm", "B": "Vi phạm hành chính thông thường", "C": "Tư vấn ngoài luồng để có thêm thông tin", "D": "Môi giới hợp pháp do thỏa thuận"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Một nhà môi giới đang giúp khách hàng của mình mua một căn biệt thự sang trọng. Chủ nhà muốn bán với giá cao trong khi ngôi biệt thự này có một khuyết điểm về hướng nhận ánh sáng theo quan điểm phong thủy. Nhà môi giới đề nghị khách hàng tập trung đàm phán ở điểm này nhằm bớt giá mua, yêu cầu chủ nhà xây thêm hàng rào chắn, bổ sung vào việc tặng không các nội thất trong nhà. Đổi lại, phương thức thanh toán sẽ linh hoạt và nhanh hơn. Theo anh chị, phương thức đàm phán mà họ sử dụng nghiêng về kiểu đàm phán nào?", "options": {"A": "Kiểu dàn xếp (Accommodating)", "B": "Kiểu thỏa hiệp (Compromising)", "C": "Kiểu điều khiển (Controlling)", "D": "Kiểu hợp tác (Collaborating)"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Ông C dẫn khách ký “thỏa thuận giữ chỗ” mua căn hộ tại dự án, thu tiền qua tài khoản cá nhân... dự án chưa được Sở Xây dựng xác nhận đủ điều kiện bán. Hành vi của ông C được xác định là:", "options": {"A": "Không vi phạm vì chưa ký hợp đồng mua bán", "B": "Tham gia giao dịch BĐS chưa đủ điều kiện kinh doanh", "C": "Giao dịch dân sự có hoàn tiền", "D": "Giới thiệu thiện chí"}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Để môi giới thành công, môi giới viên cần khắc phục 3 bất đồng, đó là các yếu tố sau, ngoại trừ:", "options": {"A": "Bất đồng về sự tin tưởng (trust) - thiếu am hiểu về những động cơ thúc đẩy người mua/bán", "B": "Bất đồng về sự đối kháng (resistance) - không tỏ ý muốn nhượng bộ người khác", "C": "Bất đồng trong giao tiếp (communication) - hiểu sai những thông điệp ẩn ý bên trong lời nói", "D": "Bất đồng trong mục tiêu của công việc (target) - hiểu sai mục đích mua bán bđs của nhau"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trong tình hình thị trường bất động sản bị đóng băng, khi một người dự định bán bất động sản của mình, anh ta nên quảng cáo ở đâu thì có lợi và tốn ít chi phí nhất?", "options": {"A": "Sử dụng tổng hợp các phương tiện", "B": "Thông qua sàn giao dịch bất động sản hoặc các công ty môi giới", "C": "Thông qua phương tiện truyền thông đại chúng", "D": "Tự treo bảng trước nhà hoặc những nơi dễ nhìn thấy"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Một khoản cho vay mua nhà trong vòng 7 năm được xem là có thời hạn vay", "options": {"A": "Vay trung hạn", "B": "Vay ngắn hạn", "C": "Vay dài hạn", "D": "Không kỳ hạn"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Một nhà môi giới địa ốc hai đầu (hoặc hai mang) làm việc:", "options": {"A": "Như là một đại lý hoặc cộng tác viên cho công ty môi giới địa ốc", "B": "Cơ bản cho người mua", "C": "Làm việc cho cả người bán và người mua", "D": "Làm việc cơ bản cho người bán"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Ông A không có chứng chỉ hành nghề môi giới bất động sản, không đăng ký hoạt động... ký hợp đồng môi giới với bà B... bà B khiếu nại yêu cầu hoàn trả hoa hồng. Cách xử lý đúng nhất theo Luật KDBĐS 2023 là:", "options": {"A": "Hợp đồng vẫn có hiệu lực vì giao dịch đã hoàn tất", "B": "Chỉ xử phạt hành chính, không xem xét hợp đồng", "C": "Hợp đồng vô hiệu, ông A phải hoàn trả toàn bộ hoa hồng", "D": "Ông A vi phạm điều kiện hành nghề, bị xử lý theo luật; quyền yêu cầu hoàn trả hoa hồng được giải quyết theo pháp luật dân sự"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Điều gì là quan trọng nhất của một quảng cáo bất động sản?", "options": {"A": "Tiêu đề", "B": "Sắp xếp, thiết kế", "C": "Hình ảnh", "D": "Giá cả"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi nhận dịch vụ do người môi giới bất động sản cung cấp, người đầu tư mong chờ người môi giới giúp ra các quyết định:", "options": {"A": "Cho biết bất động sản nào nên mua/bán", "B": "Cho biết giá cả hợp lý nên mua/bán", "C": "Cho biết thông tin mới nhất về những gì đang diễn ra trên thị trường", "D": "Cho biết bất động sản nào nên mua/bán với giá cả và các dịch vụ kèm theo theo như thế nào"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Ông Tân chưa có nhà ở, đang chuẩn bị mua một căn nhà với một khoản vay trả góp từ ngân hàng, và đang yêu cầu thẩm định căn nhà định mua đó. Việc thẩm định này có ý nghĩa gì thiết thực nhất cho ông Tân?", "options": {"A": "Xác định liệu chủ nhà đã bán đúng giá thị trường hay không", "B": "Xác định tình trạng thực tế của căn nhà có đáp ứng yêu cầu của ông Tân hay không", "C": "Xác định liệu giá trị của căn nhà có thể làm tài sản thế chấp có thỏa mãn điều kiện cho vay của ngân hàng hay không", "D": "Xác định xem ông Tân đã thực hiện một cuộc đầu tư tốt và sinh lợi"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Khi môi giới, nhà môi giới sẽ gặp nhiều điều kiện thuận lợi hơn khi nắm bắt được định hướng lâu dài về truyền thống và giá trị tư tưởng trong xã hội của khách hàng. Đặc điểm nào sau đây không thuộc phạm trù xã hội theo định hướng lâu dài?", "options": {"A": "Nêu cao đạo đức trong công việc", "B": "Quan tâm đến những lợi ích lâu dài", "C": "Chú trọng áp dụng những tiến bộ kỹ thuật của khoa học công nghệ", "D": "Đặt ra những chính sách dài hạn"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Câu phát biểu nào sau đây sai liên quan đến tố chất của nhà môi giới?", "options": {"A": "Ngôn ngữ rõ ràng, kỹ năng giao tiếp tốt", "B": "Biết đặt câu hỏi tập trung, giải quyết thẳng vấn đề.", "C": "Lắng nghe tích cực", "D": "Nhà môi giới là người hiểu biết, thông minh nhưng ở mức độ cao hơn do tích lũy nhiều kiến thức (vì nghiên cứu, kinh nghiệm và học tập nhiều) và biết sử dụng chúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Một hợp đồng ký gửi nên xác định nghĩa vụ của tổ chức môi giới (văn phòng môi giới/sàn) và ______________ của khách hàng.", "options": {"A": "Quan điểm đàm phán về giá và phương thức mua bán", "B": "Ngày kết thúc hợp đồng mong đợi", "C": "Đại diện quyền bán bất động sản cho người bán", "D": "Hướng dẫn của khách hàng"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Nghề môi giới bất động sản nếu phân tích theo quan điểm kinh tế thị trường là:", "options": {"A": "Công việc chuyên môn của các cá nhân", "B": "Làm trung gian giúp cho việc mua, bán bất động sản được thực hiện", "C": "Hình thành theo sự phân công lao động xã hội", "D": "Kết nối nhu cầu của bên mua với nhu cầu của bên bán bất động sản"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Bán hàng tư vấn trong môi giới là phương pháp bán hàng được triển khai theo chiều rộng một cách logic trên các cơ sở sau, ngoại trừ:", "options": {"A": "Phương pháp bán hàng truyền thống", "B": "Người môi giới cố gắng tìm hiểu những hàng hóa, sản phẩm khách hàng cần", "C": "Người môi giới cố gắng đáp ứng nhu cầu của khách hàng một cách tốt nhất bằng các sản phẩm hay dịch vụ của mình", "D": "Người môi giới phải cố gắng đáp ứng nhu cầu của khách hàng bằng các sản phẩm thích hợp"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Khi thị trường bất động sản có diễn biến phức tạp ảnh hưởng đến ổn định kinh tế - xã hội, Nhà nước điều tiết thị trường bất động sản nhưng phải đảm bảo nguyên tắc nào sau đây?", "options": {"A": "Trì hoãn điều tiết để theo dõi thị trường trong thời gian dài", "B": "Điều tiết mạnh tay bất kể tác động đến quyền lợi của các tổ chức, cá nhân", "C": "Bảo đảm tính thống nhất của nền kinh tế, tôn trọng quy luật thị trường và bảo vệ lợi ích hợp pháp của các bên liên quan", "D": "Chỉ tập trung vào bảo vệ lợi ích Nhà nước, không cần quan tâm đến quy luật thị trường"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Hoa hồng môi giới được hưởng bao nhiêu phần trăm trong hợp đồng", "options": {"A": "2%", "B": "5%", "C": "10%", "D": "Thỏa thuận (ghi trong hợp đồng môi giới)"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Người sở hữu BĐS là căn hộ du lịch trong toà nhà hỗn hợp được phép?", "options": {"A": "Đăng ký hộ khẩu thường trú", "B": "Đăng ký tạm trú dài hạn", "C": "Đăng ký lưu trú", "D": "Cả A, B và C"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "BĐS nào dưới đây không phải là nhà ở?", "options": {"A": "Khách sạn", "B": "Biệt thự du lịch", "C": "Căn hộ du lịch", "D": "Cả A, B và C đều không phải là bất động sản nhà ở"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Đối với khách hàng, một dịch vụ môi giới bất động sản có chất lượng là:", "options": {"A": "Dịch vụ có chi phí thấp", "B": "Dịch vụ khác biệt so với đối thủ cạnh tranh", "C": "Dịch vụ khách hàng quan tâm và khác biệt với đối thủ cạnh tranh", "D": "Dịch vụ đáp ứng và vượt qua sự kỳ vọng của khách hàng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Trước khi hoạt động, doanh nghiệp kinh doanh dịch vụ môi giới bất động sản có nghĩa vụ gì về mặt thông tin?", "options": {"A": "Chỉ cần thông báo cho Hiệp hội bất động sản.", "B": "Gửi thông tin về doanh nghiệp đến cơ quan quản lý nhà nước về kinh doanh bất động sản cấp tỉnh nơi thành lập để đăng tải trên hệ thống thông tin về nhà ở và thị trường bất động sản.", "C": "Không cần thông báo nếu đã có giấy phép đăng ký kinh doanh.", "D": "Chỉ cần công khai trên website cá nhân của giám đốc."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Đâu là tiến trình cơ bản của cuộc đàm phán:", "options": {"A": "Giai đoạn chuẩn bị, Giai đoạn đàm phán, Giai đoạn kết thúc, Giai đoạn xúc tiến", "B": "Giai đoạn chuẩn bị, Giai đoạn đàm phán, Giai đoạn xúc tiến, Giai đoạn kết thúc", "C": "Giai đoạn chuẩn bị, Giai đoạn xúc tiến, Giai đoạn đàm phán, Giai đoạn kết thúc", "D": "Cả A, B, C đều sai"}, "answer": "C", "explanation": ""}, {"level": "1", "content": "Một khách hàng yêu cầu bạn tìm một căn hộ có diện tích từ  trở lên, giá từ 2 tỷ đến 2,5 tỷ đồng tại khu vực trung tâm. Bạn sẽ làm gì?", "options": {"A": "Giới thiệu mọi căn hộ có giá trên 2 tỷ đồng.", "B": "Tìm kiếm và giới thiệu các bất động sản phù hợp với yêu cầu của khách hàng.", "C": "Khuyên khách hàng thay đổi yêu cầu để dễ tìm được căn hộ.", "D": "Đợi khách hàng cung cấp thêm thông tin trước khi tìm kiếm."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Yếu tố nào sau đây gây ảnh hưởng rất ít đến quá trình giao tiếp trực tiếp với khách hàng của nhà môi giới?", "options": {"A": "Cách lựa chọn từ ngữ", "B": "Điệu bộ, tư thế", "C": "Giọng nói", "D": "Cú pháp"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Thư chào bán bất động sản nên:", "options": {"A": "Thu hút được sự chú ý của khách hàng.", "B": "Giới thiệu rõ về sản phẩm.", "C": "Thúc đẩy khách hàng hành động.", "D": "Cả A, B, C đều đú : "Vì pháp luật xét xử rất nặng hành vi lừa dối", "B": "Vì khách hàng tẩy chay khiến công việc khó khan", "C": "Vì bất động sản là tài sản lớn đối với cả bên mua và bán.", "D": "Tất cả đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Một nhà bất động sản giúp các khách hàng chọn lựa những phương án khác nhau (bao gồm mua, thuê, hoặc đầu tư bất động sản). Công việc nhà bất động sản đang làm là gì?", "options": {"A": "Định giá bất động sản.", "B": "Tư vấn bất động sản.", "C": "Đào tạo bất động sản.", "D": "Cả A, B, C đều sai."}, "answer": "B", "explanation": ""}, {"level": "1", "content": "Nhà môi giới bất động sản nên:", "options": {"A": "Giới thiệu bất động sản bằng trực quan sinh động.", "B": "Thúc đẩy khách mua bằng cách cho rằng giá trị của bất động sản là hợp lý.", "C": "Tâng bốc quá sự thật về bất động sản giao dịch.", "D": "Cả A, B, C đều sai."}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Hợp đồng nào sau đây không thuộc hợp đồng kinh doanh dịch vụ bất động sản?", "options": {"A": "Hợp đồng môi giới bất động sản.", "B": "Hợp đồng tư vấn bất động sản.", "C": "Hợp đồng thuê bất động sản.", "D": "Hợp đồng quản lý bất động sản."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Các vấn đề về bất động sản mà nhà môi giới cần quan tâm:", "options": {"A": "Thông tin về pháp lý chủ quyền, quy hoạch kiến trúc.", "B": "Hạ tầng kỹ thuật, hạ tầng xã hội.", "C": "Tiềm năng phát triển, khả năng sinh lợi.", "D": "Cả A, B, C đều đúng."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tìm hiểu đối tượng bên cung bất động sản nhằm:", "options": {"A": "Xác định nguyện vọng.", "B": "Nắm bắt các thông tin về bất động sản.", "C": "Xác lập các tiêu chí thỏa thuận.", "D": "Cả A, B, C đều đúng"}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Tìm hiểu đối tượng bên cầu bất động sản nhằm:", "options": {"A": "Xác định khả năng tài chính, đánh giá mức độ quan tâm, kiểm tra nhằm hỗ trợ tính pháp lý.",

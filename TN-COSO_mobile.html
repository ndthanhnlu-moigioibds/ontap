à yếu tố khách quan.", "C": "Không, thỏa thuận đặt cọc theo Luật KD BĐS 2023 yêu cầu ghi rõ giá bán/cho thuê mua. Việc tăng giá sau đó mà không có thỏa thuận trước là vi phạm thỏa thuận đặt cọc, khách hàng có quyền từ chối ký HĐMB và yêu cầu trả lại cọc, thậm chí phạt cọc.", "D": "Chỉ bắt buộc chấp nhận nếu mức tăng dưới 10%."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Việc Luật KD BĐS 2023 yêu cầu ghi rõ giá trong thỏa thuận đặt cọc nhằm ràng buộc các bên về giá. Nếu không có điều khoản cho phép điều chỉnh giá trong thỏa thuận đặt cọc, việc chủ đầu tư đơn phương tăng giá là vi phạm, khách hàng có quyền từ chối và đòi lại quyền lợi của mình theo hợp đồng đặt cọc."}, {"level": "1", "content": "Mức thù lao của dịch vụ môi giới bất động sản được xác định:", "options": {"A": "Không quá 3% giá trị bất động sản được tư vấn", "B": "Theo thỏa thuận trong hợp đồng", "C": "Không ít hơn 500.000 đồng cho mỗi lần tư vấn", "D": "Đáp án A, B và C đều đúng"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 63 Luật kinh doanh bất động sản năm 2023 quy định Mức thù lao, hoa hồng môi giới bất động sản do cá nhân môi giới bất động sản và doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản hoặc doanh nghiệp kinh doanh dịch vụ môi giới bất động sản thỏa thuận. Mức thù lao môi giới bất động sản không phụ thuộc vào giá của giao dịch được môi giới bất động sản"}, {"level": "1", "content": "Doanh nghiệp kinh doanh dịch vụ sàn giao dịch bất động sản có quyền:", "options": {"A": "Tự ý bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua tất cả các bất động sản", "B": "Quản lý, giám sát việc khai thác, sử dụng bất động sản của khách hàng", "C": "Được thu phí dịch vụ của khách hàng có bất động sản được đưa lên sàn giao dịch bất", "D": "Yêu cầu khách hàng bồi thường tất cả các thiệt hại khi xảy ra"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điểm c khoản 1 điều 64 Luật kinh doanh bất động sản năm 2023 quy định doanh nghiệp kinh doanh dịch vụ môi giới bất động sản, cá nhân hành nghề môi giới bất động sản được quyền thu phí dịch vụ của khách hàng theo thỏa thuận của các bên"}, {"level": "1", "content": "Dự án Bất động sản, công trình xây dựng đủ điều kiện được giao dịch trên thị trường bất động sản khi:", "options": {"A": "Có quy hoạch 1/500 được duyệt.", "B": "Có chứng nhận đầu tư của cơ quan có thẩm quyền.", "C": "Có quyết định cho phép thực hiện dự án của cấp có thẩm quyền, có giấy phép xây dựng công trình.", "D": "Cả 3 phương án trên đều đúng."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Đây là những điều kiện cơ bản và tiên quyết để một dự án được coi là hợp pháp và có thể triển khai xây dựng. Các điều kiện để BĐS được đưa vào kinh doanh còn chi tiết hơn (ví dụ: có giấy tờ về quyền sử dụng đất, hoàn thành phần móng...)"}, {"level": "1", "content": "Mức vốn pháp định tối thiểu đối với ngành nghề kinh doanh bất động sản:", "options": {"A": "20 tỷ đồng.", "B": "50 tỷ đồng.", "C": "10 tỷ đồng.", "D": "Pháp luật không quy định."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Hiện tại, pháp luật Việt Nam không quy định mức vốn pháp định tối thiểu cụ thể cho ngành nghề kinh doanh bất động sản"}, {"level": "1", "content": "Tổng số tiền thanh toán trước khi bên mua được cấp Giấy chứng nhận không được vượt quá bao nhiêu % giá trị hợp đồng?", "options": {"A": "70%", "B": "80%", "C": "95%", "D": "100%"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 25 Luật kinh doanh bất động sản quy định bên mua, thuê mua chưa được cấp giấy chứng nhận về quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất theo quy định của pháp luật về đất đai thì bên bán, cho thuê mua không được thu quá 95% giá trị hợp đồng"}, {"level": "1", "content": "Thỏa thuận đặt cọc để mua nhà ở hình thành trong tương lai theo Luật KD BĐS 2023 phải bao gồm nội dung gì về giá?", "options": {"A": "Không cần ghi giá, chỉ cần ghi số tiền cọc.", "B": "Chỉ cần ghi khoảng giá tham khảo.", "C": "Phải ghi rõ giá bán hoặc giá cho thuê mua dự kiến tại thời điểm ký thỏa thuận đặt cọc.", "D": "Giá sẽ được xác định khi ký hợp đồng mua bán chính thức."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 5 Điều 23 Luật KD BĐS 2023 yêu cầu thỏa thuận đặt cọc phải ghi rõ giá bán/cho thuê mua, nhằm đảm bảo tính minh bạch và ràng buộc về giá ngay từ giai đoạn đặt cọc."}, {"level": "1", "content": "Khi áp dụng phương pháp định giá đất \"thặng dư\" theo Luật Đất đai 2024, yếu tố nào là cơ sở chính để xác định giá trị đất?", "options": {"A": "Giá chuyển nhượng của các thửa đất tương tự đã giao dịch.", "B": "Thu nhập ròng hàng năm dự kiến từ việc sử dụng đất.", "C": "Lấy tổng doanh thu phát triển giả định của bất động sản trừ đi tổng chi phí phát triển ước tính.", "D": "Hệ số điều chỉnh giá đất do UBND tỉnh ban hành."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Phương pháp thặng dư dựa trên nguyên tắc ước tính giá trị tiềm năng của bất động sản sau khi phát triển và trừ đi chi phí để tạo ra giá trị đó, phần còn lại (thặng dư) được coi là giá trị của đất đai."}, {"level": "1", "content": "Tình huống: Anh L muốn đặt cọc 10% giá trị căn hộ hình thành trong tương lai của chủ đầu tư M vào tháng 6/2025 để giữ chỗ. Dự án đã có giấy phép xây dựng và đang thi công phần móng. Chủ đầu tư M có được nhận tiền đặt cọc 10% từ anh L không?", "options": {"A": "Được, vì dự án đã có giấy phép và đang thi công.", "B": "Được, nếu anh L tự nguyện đồng ý.", "C": "Không được, vì mức đặt cọc tối đa chỉ là 5% giá bán/cho thuê mua.", "D": "Không được, vì phải xây xong móng mới được nhận đặt cọc."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 5 điều 23 Luật KD BĐS 2023 quy định chủ đầu tư dự án bất động sản chỉ được thu tiền đặt cọc không quá 5% giá bán. Mức 10% là vượt quá quy định, ngay cả khi dự án đủ điều kiện nhận cọc."}, {"level": "1", "content": "Ngoài trang thông tin điện tử của doanh nghiệp, thông tin BĐS, dự án BĐS phải được công khai ở đâu theo Luật KDBĐS 2023", "options": {"A": "Chỉ cần tại trụ sở Ban Quản lý dự án.", "B": "Trên báo giấy địa phương.", "C": "Trên Hệ thống thông tin về nhà ở và thị trường BĐS của cơ quan quản lý nhà nước.", "D": "Trên mạng xã hội của doanh nghiệp."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 điều 6 Luật KD BĐS 2023"}, {"level": "1", "content": "Tiêu chí định lượng để xác định \"cá nhân kinh doanh BĐS quy mô nhỏ\" theo Nghị định 96/2024/NĐ-CP là gì?", "options": {"A": "Dưới 5 giao dịch/năm và dưới 100 tỷ/hợp đồng.", "B": "Dưới 10 giao dịch/năm và dưới 500 tỷ/hợp đồng.", "C": "Không quá 10 giao dịch/năm và không quá 300 tỷ đồng/hợp đồng.", "D": "Chỉ cần không thuộc diện phải lập dự án đầu tư."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 điều 7 Nghị định 96/2024/NĐ-CP"}, {"level": "1", "content": "Trường hợp nào chủ đầu tư dự án BĐS KHÔNG được thu tiền đặt cọc theo Luật KDBĐS 2023?", "options": {"A": "Khi nhà ở, công trình xây dựng chưa đủ điều kiện đưa vào kinh doanh.", "B": "Khi đã nhận đủ tiền đặt cọc từ 10 khách hàng đầu tiên.", "C": "Khi dự án chưa hoàn thành giải phóng mặt bằng.", "D": "Khi giá trị đặt cọc dưới 1% giá bán."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khoản 5 điều 23 Luật KD BĐS 2023"}, {"level": "1", "content": "Tình huống: Ông An mua một căn hộ hình thành trong tương lai từ chủ đầu tư Phú Mỹ. Hợp đồng có điều khoản yêu cầu bảo lãnh ngân hàng. Sau khi ký hợp đồng 15 ngày, ông An vẫn chưa nhận được bản sao hợp đồng bảo lãnh từ chủ đầu tư. Ông An có quyền gì trong trường hợp này?", "options": {"A": "Yêu cầu chủ đầu tư hủy hợp đồng và bồi thường.", "B": "Yêu cầu chủ đầu tư cung cấp bản sao hợp đồng bảo lãnh và có thể yêu cầu phạt vi phạm (nếu hợp đồng có quy định).", "C": "Tự liên hệ ngân hàng để yêu cầu cung cấp.", "D": "Mặc nhiên coi như không có bảo lãnh và chấp nhận rủi ro."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khoản 6 điều 26 Luật KD BĐS 2023 quy định Chủ đầu tư cung cấp thư bảo lãnh cho bên mua, thuê mua trong thời hạn 10 ngày làm việc kể từ ngày ký hợp đồng mua bán, thuê mua nhà ở hình thành trong tương lai hoặc thời hạn khác do các bên thỏa thuận trong hợp đồng mua bán, thuê mua nhà ở hình thành trong tương lai."}, {"level": "1", "content": "Tình huống: Doanh nghiệp KDBĐS Đại Phát nhận tiền thanh toán mua căn hộ từ khách hàng bằng tiền mặt với lý do khách hàng không có tài khoản ngân hàng. Giao dịch này có phù hợp với Luật KDBĐS 2023 không?", "options": {"A": "Phù hợp, nếu khách hàng yêu cầu.", "B": "Phù hợp, nếu giá trị giao dịch dưới 100 triệu đồng.", "C": "Không phù hợp, vì Luật bắt buộc thanh toán qua tài khoản ngân hàng đối với giao dịch giữa doanh nghiệp KDBĐS và khách hàng (trừ quy mô nhỏ).", "D": "Chỉ phù hợp nếu doanh nghiệp Đại Phát là doanh nghiệp nhỏ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 điều 48 Luật KD BĐS 2023 quy định Chủ đầu tư dự án, doanh nghiệp kinh doanh bất động sản, doanh nghiệp kinh doanh dịch vụ bất động sản nhận tiền thanh toán theo hợp đồng kinh doanh bất động sản, hợp đồng kinh doanh dịch vụ bất động sản từ khách hàng thông qua tài khoản mở tại tổ chức tín dụng trong nước hoặc chi nhánh ngân hàng nước ngoài đang hoạt động hợp pháp tại Việt Nam."}, {"level": "1", "content": "Theo Luật Kinh doanh bất động sản, tổ chức, cá nhân muốn kinh doanh BĐS phải có điều kiện gì?", "options": {"A": "Thành lập doanh nghiệp/HTX, trừ trường hợp cá nhân kinh doanh quy mô nhỏ.", "B": "Có vốn pháp định tối thiểu 50 tỷ đồng.", "C": "Đăng ký hộ kinh doanh cá thể.", "D": "Được Sở Xây dựng cấp phép hành nghề."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Căn cứ: Khoản 1 Điều 9 Luật KDBĐS 2023."}, {"level": "1", "content": "Hành vi nào sau đây BỊ NGHIÊM CẤM trong kinh doanh bất động sản theo Luật Kinh doanh BĐS 2023?", "options": {"A": "Thực hiện giao dịch mua bán thông qua sàn giao dịch BĐS.", "B": "Giả mạo tài liệu, cố ý làm sai lệch thông tin về bất động sản, dự án bất động sản đưa vào kinh doanh.", "C": "Tổ chức, cá nhân thực hiện thanh toán không dùng tiền mặt trong giao dịch BĐS.", "D": "Thu, quản lý phí dịch vụ theo quy định của pháp luật."}, "answer": "B", "explanation": " Căn cứ: Điều 8, Khoản 2: quy định hành vi bị nghiêm cấm là: \"Giả mạo tài liệu, cố ý làm sai lệch thông tin về bất động sản, dự án bất động sản đưa vào kinh doanh.\""}, {"level": "1", "content": "Bà Ly bán 03 căn hộ và cho thuê 05 phòng trọ do mình xây dựng. Bà có cần thành lập doanh nghiệp không?", "options": {"A": "Bắt buộc phải thành lập doanh nghiệp vì có mục đích sinh lời.", "B": "Phải thành lập doanh nghiệp vì số lượng căn hộ vượt quá quy mô nhỏ.", "C": "Không cần thành lập doanh nghiệp vì đây là hoạt động kinh doanh BĐS quy mô nhỏ, không thường xuyên.", "D": "Không cần thành lập nếu tổng giá trị giao dịch không vượt mức quy định của Bộ Tài chính."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 Điều 9 Luật Kinh doanh bất động sản 2023."}, {"level": "1", "content": "Luật Nhà ở 2023 (Luật số 27/2023/QH15) định nghĩa \"Nhà ở\" như thế nào?", "options": {"A": "Mọi công trình xây dựng có mái che và tường bao.", "B": "Công trình xây dựng với mục đích để ở và phục vụ nhu cầu sinh hoạt của gia đình, cá nhân.", "C": "Chỉ bao gồm các căn hộ trong dự án nhà ở thương mại.", "D": "Công trình được sử dụng cho cả mục đích ở và sản xuất công nghiệp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 3 Luật Nhà ở 2023 định nghĩa Nhà ở là công trình xây dựng với mục đích để ở và phục vụ nhu cầu sinh hoạt của gia đình, cá nhân. Nhà ở được sử dụng vào mục đích để ở và mục đích không phải để ở mà pháp luật không cấm là nhà ở có mục đích sử dụng hỗn hợp."}, {"level": "1", "content": "Tình huống: Gia đình chị Hoa (gồm 2 vợ chồng) có tổng thu nhập hàng tháng sau khi trừ các khoản đóng góp bắt buộc là 35 triệu đồng. Gia đình chị chưa có nhà ở và có hộ khẩu tại tỉnh X. Gia đình chị có đủ điều kiện về thu nhập để mua NOXH tại tỉnh X không (theo NĐ 100/2024)?", "options": {"A": "Đủ điều kiện vì chưa có nhà ở.", "B": "Không đủ điều kiện vì tổng thu nhập hộ gia đình vượt quá 30 triệu đồng/tháng.", "C": "Đủ điều kiện nếu chứng minh được chi phí sinh hoạt cao.", "D": "Chỉ đủ điều kiện nếu có con nhỏ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 30 Nghị định 100/2024/NĐ-CP quy định trường hợp người đứng đơn đã kết hôn theo quy định của pháp luật thì người đứng đơn và vợ (chồng) của người đó có tổng thu nhập hàng tháng thực nhận không quá 30 triệu đồng tính theo Bảng tiền công, tiền lương do cơ quan, đơn vị, doanh nghiệp nơi đối tượng làm việc xác nhận"}, {"level": "1", "content": "Tình huống: Ông An (công dân Việt Nam) mua một căn hộ chung cư thương mại từ chủ đầu tư B. Ông An đã thanh toán 95% giá trị hợp đồng và nhận bàn giao nhà. Tuy nhiên, Giấy chứng nhận chưa được cấp. Theo Điều 12 Luật Nhà ở 2023, quyền sở hữu của ông An đối với căn hộ này được xác lập khi nào?", "options": {"A": "Khi ông An ký hợp đồng mua bán.", "B": "Khi ông An thanh toán đủ 100% giá trị hợp đồng.", "C": "Khi ông An thanh toán đủ tiền (theo thỏa thuận hoặc 95% trong trường hợp này) và nhận bàn giao nhà ở (trừ khi có thỏa thuận khác).", "D": "Khi Giấy chứng nhận được cấp cho ông An."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 12 Luật Nhà ở 2023 quy định thời điểm xác lập quyền sở hữu đối với mua bán nhà ở giữa CĐT và người mua là khi bên mua thanh toán đủ tiền và nhận bàn giao nhà, trừ thỏa thuận khác. Việc cấp giấy chứng nhận chỉ là thủ tục công nhận quyền sở hữu đã được xác lập."}, {"level": "1", "content": "Tình huống: Ông Tuấn mua một căn hộ tại dự án A. Khi ký hợp đồng, chủ đầu tư yêu cầu ông đóng 2% phí bảo trì tính trên giá bán đã bao gồm VAT. Yêu cầu này có đúng quy định không?", "options": {"A": "Đúng, phí bảo trì 2% tính trên tổng giá trị hợp đồng.", "B": "Không đúng, phí bảo trì 2% phải được tính trên giá bán căn hộ trước thuế VAT.", "C": "Đúng, nếu được ghi rõ trong hợp đồng.", "D": "Không đúng, phí bảo trì chỉ 1.5%."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1, Điều 152 của Luật Nhà ở 2023 quy định:\"Kinh phí bảo trì phần sở hữu chung... được tính bằng 2% giá trị phần diện tích bán, cho thuê mua. Khoản tiền này được tính trước thuế giá trị gia tăng và được quy định rõ trong hợp đồng mua bán, hợp đồng thuê mua.\""}, {"level": "1", "content": "Định nghĩa \"Nhà chung cư\" theo Điều 2 Luật Nhà ở 2023 bao gồm đặc điểm nào?", "options": {"A": "Phải có ít nhất 5 tầng và 100 căn hộ.", "B": "Có từ 02 tầng trở lên, nhiều căn hộ, có lối đi, cầu thang chung, phần sở hữu riêng, phần sở hữu chung.", "C": "Chỉ bao gồm các tòa nhà văn phòng cho thuê.", "D": "Luôn thuộc sở hữu toàn dân do Nhà nước quản lý."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 điều 2 Luật Nhà ở 2023 định nghĩa Nhà chung cư là nhà ở có từ 02 tầng trở lên, có nhiều căn hộ, có lối đi, cầu thang chung, có phần sở hữu riêng, phần sở hữu chung."}, {"level": "1", "content": "Theo Điều 12 Luật Nhà ở 2023, thời điểm xác lập quyền sở hữu nhà ở đối với trường hợp mua bán nhà ở (không phải từ chủ đầu tư dự án) là khi nào, nếu không có thỏa thuận khác?", "options": {"A": "Khi hai bên ký hợp đồng đặt cọc.", "B": "Khi bên mua thanh toán đủ tiền và nhận bàn giao nhà ở.", "C": "Khi hoàn tất thủ tục sang tên Giấy chứng nhận.", "D": "Sau 30 ngày kể từ ngày ký hợp đồng công chứng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 điều 12 Luật Nhà ở 2023 quy định trường hợp mua bán, thuê mua nhà ở mà không thuộc trường hợp mua bán, thuê mua nhà ở giữa chủ đầu tư dự án đầu tư xây dựng nhà ở với người mua, người thuê mua thì thời điểm xác lập quyền sở hữu nhà ở là thời điểm bên mua, bên thuê mua đã thanh toán đủ tiền mua, tiền thuê mua và đã nhận bàn giao nhà ở."}, {"level": "1", "content": "Cá nhân nước ngoài được sở hữu tối đa bao nhiêu căn nhà ở riêng lẻ trong một dự án?", "options": {"A": "Không quá 10% tổng số lượng nhà ở riêng lẻ trong dự án.", "B": "Không quá 30% tổng số lượng nhà ở riêng lẻ trong dự án.", "C": "Không quá 250 căn nhà ở riêng lẻ.", "D": "Không giới hạn số lượng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 19 Luật Nhà ở 2023."}, {"level": "1", "content": "Tình huống: Anh Dũng mua một căn NOXH, sau 3 năm anh được công ty cử đi công tác nước ngoài dài hạn. Anh muốn bán lại căn hộ NOXH này. Việc cho thuê này có được phép không?", "options": {"A": "Được phép tự do cho thuê theo giá thị trường.", "B": "Không được phép, trong thời hạn 5 năm Bên mua nhà ở xã hội không được bán lại nhà ở.", "C": "Chỉ được phép cho đối tượng đủ điều kiện thuê NOXH thuê lại.", "D": "Chỉ được phép nếu có sự đồng ý của chủ đầu tư."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điểm d và đ khoản 1 điều 89 Luật Nhà ở 2023 quy định Bên mua nhà ở xã hội không được bán lại nhà ở trong thời hạn tối thiểu là 05 năm, kể từ ngày thanh toán đủ tiền mua nhà ở. chỉ được bán lại cho chủ đầu tư dự án đầu tư xây dựng nhà ở xã hội hoặc bán lại cho đối tượng thuộc trường hợp được mua nhà ở xã hội"}, {"level": "1", "content": "Tình huống: Một cá nhân nước ngoài được cấp Giấy chứng nhận sở hữu căn hộ vào ngày 01/01/2025 với thời hạn 50 năm. Năm 2070 (sau 45 năm), người này muốn xin gia hạn thời hạn sở hữu. Theo Luật Nhà ở 2023, việc gia hạn được thực hiện như thế nào?", "options": {"A": "Tự động gia hạn thêm 50 năm.", "B": "Phải làm thủ tục đề nghị gia hạn trước khi hết hạn và có thể được gia hạn thêm một lần không quá 50 năm.", "C": "Không được gia hạn, phải bán lại trước khi hết hạn.", "D": "Chỉ được gia hạn nếu có lý do đặc biệt được Thủ tướng chấp thuận."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điểm c khoản 2 điều 20 Luật Nhà ở 2023 quy định Đối với cá nhân nước ngoài thì được sở hữu nhà ở theo thỏa thuận trong giao dịch mua bán, thuê mua, tặng cho, nhận thừa kế nhà ở nhưng không quá 50 năm, kể từ ngày được cấp Giấy chứng nhận và được gia hạn một lần với thời hạn không quá 50 năm nếu có nhu cầu."}, {"level": "1", "content": "Tình huống: Ông Tâm thuộc đối tượng người có công với cách mạng, đang ở nhà tạm và chưa được hưởng chính sách hỗ trợ nhà ở nào. Ông muốn mua NOXH. Ông có cần chứng minh điều kiện về thu nhập không?", "options": {"A": "Có, mọi đối tượng mua NOXH đều phải chứng minh thu nhập.", "B": "Không, đối tượng người có công với cách mạng thuộc diện được miễn điều kiện về thu nhập.", "C": "Chỉ cần chứng minh nếu ông còn trong độ tuổi lao động.", "D": "Chỉ cần chứng minh nếu giá trị căn hộ NOXH trên 1 tỷ đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 điều 78 Luật Nhà ở 2023"}, {"level": "1", "content": "Điều kiện đối với nhà ở có sẵn đưa vào kinh doanh theo Luật Kinh doanh Bất động sản 2023 là gì?", "options": {"A": "Phải được xây dựng bằng vật liệu cao cấp.", "B": "Phải có Giấy chứng nhận; không tranh chấp; không bị kê biên; tuân thủ giấy phép xây dựng và đảm bảo chất lượng.", "C": "Phải nằm trong khu đô thị loại I.", "D": "Phải có giá trị tối thiểu 1 tỷ đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 14 Luật Kinh doanh BĐS 2023"}, {"level": "1", "content": "Việc công nhận quyền sở hữu nhà ở được Nhà nước thực hiện thông qua hình thức nào theo Luật Nhà ở 2023?", "options": {"A": "Thông qua hợp đồng mua bán có công chứng.", "B": "Thông qua việc cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất (trừ nhà ở thuộc tài sản công).", "C": "Thông qua biên bản bàn giao nhà giữa các bên.", "D": "Thông qua việc đăng ký tạm trú, thường trú."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 9 Luật Nhà ở 2023."}, {"level": "1", "content": "Sau 05 năm, khi bán lại NƠXH dạng nhà chung cư, người bán phải thực hiện nghĩa vụ gì đối với Nhà nước?", "options": {"A": "Nộp 50% tiền sử dụng đất được phân bổ.", "B": "Nộp 100% tiền sử dụng đất theo bảng giá đất hiện hành.", "C": "Không phải nộp lại tiền sử dụng đất cho Nhà nước.", "D": "Nộp 100% tiền sử dụng đất cho chủ đầu tư."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điểm e Khoản 1 Điều 89 Luật Nhà ở 2023."}, {"level": "1", "content": "Tình huống: Gia đình chị Hoa (gồm 2 vợ chồng) có tổng thu nhập hàng tháng sau khi trừ các khoản đóng góp bắt buộc là 35 triệu đồng. Gia đình chị chưa có nhà ở và có hộ khẩu tại tỉnh X. Gia đình chị có đủ điều kiện về thu nhập để mua NOXH tại tỉnh X không (theo NĐ 261/2025/2024)?", "options": {"A": "Đủ điều kiện vì chưa có nhà ở.", "B": "Đủ điều kiện vì tổng thu nhập hộ gia đình của người đó có tổng thu nhập bình quân hàng tháng thực nhận không quá 40 triệu đồng.", "C": "Đủ điều kiện nếu chứng minh được chi phí sinh hoạt cao.", "D": "Chỉ đủ điều kiện nếu có con nhỏ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nghị định số 261/2025/NĐ-CP ngày 10 tháng 10 năm 2025 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 100/2024/NĐ-CP quy định trường hợp người đứng đơn đã kết hôn theo quy định của pháp luật thì người đứng đơn và vợ (chồng) của người đó có tổng thu nhập hàng tháng thực nhận không quá 40 triệu đồng tính theo Bảng tiền công, tiền lương do cơ quan, đơn vị, doanh nghiệp nơi đối tượng làm việc xác nhận."}, {"level": "1", "content": "Theo Luật Nhà ở 2023, nhà chung cư nào bắt buộc phải có đơn vị quản lý vận hành?", "options": {"A": "Nhà chung cư từ 10 tầng trở lên.", "B": "Nhà chung cư có thang máy.", "C": "Tất cả các nhà chung cư, kể cả nhà chỉ có 2 tầng.", "D": "Chỉ nhà chung cư thuộc sở hữu nhà nước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điều 149 Luật Nhà ở 2023"}, {"level": "1", "content": "Ông Tuấn mua một căn hộ tại dự án A. Khi ký hợp đồng, chủ đầu tư yêu cầu ông đóng 2% phí bảo trì tính trên giá bán đã bao gồm VAT. Yêu cầu này có đúng quy định không?", "options": {"A": "Đúng, phí bảo trì 2% tính trên tổng giá trị hợp đồng.", "B": "Không đúng, phí bảo trì 2% phải được tính trên giá bán căn hộ trước thuế VAT.", "C": "Đúng, nếu được ghi rõ trong hợp đồng.", "D": "Không đúng, phí bảo trì chỉ 1.5%."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1, Điều 152 của Luật Nhà ở 2023 quy định:\"Kinh phí bảo trì phần sở hữu chung... được tính bằng 2% giá trị phần diện tích bán, cho thuê mua. Khoản tiền này được tính trước thuế giá trị gia tăng và được quy định rõ trong hợp đồng mua bán, hợp đồng thuê mua.\""}, {"level": "1", "content": "Đối tượng nào sau đây KHÔNG thuộc trường hợp được miễn điều kiện về cư trú khi xét duyệt hưởng chính sách NOXH theo Điều 77 Luật Nhà ở 2023 và Nghị định 100/2024?", "options": {"A": "Học sinh, sinh viên các cơ sở đào tạo.", "B": "Người có công với cách mạng.", "C": "Người khuyết tật đặc biệt nặng, nặng.", "D": "Người cao tuổi không còn khả năng lao động (có xác nhận của UBND cấp xã nơi tạm trú)."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> điều 78 Luật Nhà ở 2023 quy định về Điều kiện được hưởng chính sách hỗ trợ về nhà ở xã hội."}, {"level": "1", "content": "Tình huống: Anh Nam là sinh viên đại học năm thứ 2, tạm trú tại ký túc xá của trường ở TP.HCM. Anh muốn đăng ký thuê một căn hộ NOXH cho thuê tại TP.HCM. Anh Nam có cần đáp ứng điều kiện về nhà ở và thu nhập không?", "options": {"A": "Phải đáp ứng cả hai điều kiện.", "B": "Chỉ cần đáp ứng điều kiện thu nhập.", "C": "Không cần đáp ứng cả điều kiện cư trú và thu nhập.", "D": "Chỉ cần đáp ứng điều kiện cư trú."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 điều 78 Luật Nhà ở 2023"}, {"level": "1", "content": "Người mua NƠXH được cho thuê lại nhà ở không?", "options": {"A": "Không được phép cho thuê lại trong mọi trường hợp.", "B": "Được phép cho thuê lại nhưng phải bảo đảm quy định của Luật Nhà ở.", "C": "Được phép cho thuê lại nếu đã thanh toán xong 50% tiền mua nhà.", "D": "Chỉ được cho thuê lại khi đã đủ 08 năm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 Điều 89 Luật Nhà ở 2023."}, {"level": "1", "content": "Việc công nhận quyền sở hữu nhà ở được Nhà nước thực hiện thông qua hình thức nào theo Luật Nhà ở 2023?", "options": {"A": "Thông qua hợp đồng mua bán có công chứng.", "B": "Thông qua việc cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất (trừ nhà ở thuộc tài sản công).", "C": "Thông qua biên bản bàn giao nhà giữa các bên.", "D": "Thông qua việc đăng ký tạm trú, thường trú."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 9 Luật Nhà ở 2023."}, {"level": "1", "content": "Tình huống: Công ty A được Nhà nước cho thuê 5ha đất trong Khu Công nghiệp X để xây dựng nhà xưởng, trả tiền thuê đất hằng năm. Sau 5 năm hoạt động, Công ty A muốn chuyển nhượng toàn bộ dự án và quyền sử dụng đất này cho Công ty B. Theo Luật Đất đai 2024, Công ty A có thể thực hiện giao dịch này không?", "options": {"A": "Có, được phép chuyển nhượng QSDĐ như đất trả tiền một lần.", "B": "Không, vì đất thuê trả tiền hằng năm không được chuyển nhượng QSDĐ.", "C": "Có, nhưng chỉ được chuyển nhượng \"quyền thuê trong hợp đồng thuê đất\" và tài sản gắn liền với đất, không phải chuyển nhượng QSDĐ.", "D": "Chỉ được chuyển nhượng nếu Công ty B cũng là doanh nghiệp nhà nước."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 46 Luật đất đai quy định được bán tài sản gắn liền với đất và quyền thuê trong hợp đồng thuê."}, {"level": "1", "content": "Hợp đồng nào sau đây bắt buộc phải được công chứng hoặc chứng thực theo Luật Đất đai 2024?", "options": {"A": "Hợp đồng cho thuê quyền sử dụng đất.", "B": "Hợp đồng chuyển đổi quyền sử dụng đất nông nghiệp.", "C": "Hợp đồng thế chấp quyền sử dụng đất.", "D": "Hợp đồng cho thuê lại quyền sử dụng đất mà một bên là tổ chức kinh doanh bất động sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 điều 27 Luật đất đai 2024 quy định hợp đồng thế chấp phải được công chứng"}, {"level": "1", "content": "Tình huống: Năm 2026, bà Mai được Nhà nước công nhận quyền sử dụng 100m2 đất ở do khai hoang từ năm 1990 (trước 15/10/1993), không có giấy tờ, phù hợp quy hoạch. Bà Mai có phải nộp tiền sử dụng đất không?", "options": {"A": "Có, phải nộp 100% theo giá đất cụ thể.", "B": "Có, phải nộp 50% theo giá đất trong Bảng giá đất.", "C": "Không, trường hợp sử dụng đất ổn định trước 15/10/1993, phù hợp quy hoạch thường không phải nộp tiền sử dụng đất đối với diện tích trong hạn mức công nhận đất ở.", "D": "Chỉ phải nộp lệ phí trước bạ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 Điều 138 Luật đất đai trường hợp sử dụng ổn định trước 15/10/1993 trong hạn mức công nhận đất ở thì không phải đóng tiền sử dụng đất ."}, {"level": "1", "content": "Tình huống: Cá nhân G có thửa đất ở đã được Giấy chứng nhận quyền sử dụng đất (LURC). Nay G muốn dùng QSDĐ này để góp vốn cùng bạn thành lập Công ty TNHH kinh doanh dịch vụ ăn uống. Việc góp vốn này có cần làm thủ tục gì về đất đai?", "options": {"A": "Không cần, chỉ cần thỏa thuận trong nội bộ công ty.", "B": "Phải làm thủ tục đăng ký biến động đất đai (chuyển quyền do góp vốn) và hợp đồng góp vốn phải được công chứng hoặc chứng thực.", "C": "Chỉ cần thông báo cho cơ quan thuế.", "D": "Phải xin phép UBND cấp tỉnh."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 điều 31 Luật đất đai năm 2024 quy định Thực hiện kê khai đăng ký đất đai; thực hiện đầy đủ thủ tục khi chuyển đổi, chuyển nhượng, cho thuê, cho thuê lại, thừa kế, tặng cho quyền sử dụng đất, thế chấp, góp vốn bằng quyền sử dụng đất theo quy định của pháp luật."}, {"level": "1", "content": "Hình thức bắt buộc đối với hợp đồng mua bán bất động sản theo quy định chung của BLDS 2015 là gì?", "options": {"A": "Bằng lời nói.", "B": "Phải lập thành văn bản, có công chứng hoặc chứng thực (trừ trường hợp luật có quy định khác).", "C": "Chỉ cần lập thành văn bản.", "D": "Bằng thông điệp dữ liệu điện tử."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 điều 27 Luật đất đai năm 2024 quy định Hợp đồng chuyển nhượng, tặng cho, thế chấp, góp vốn bằng quyền sử dụng đất, quyền sử dụng đất và tài sản gắn liền với đất phải được công chứng hoặc chứng thực"}, {"level": "1", "content": "Tình huống: Ông Thành và bà Vân ly hôn, có thỏa thuận phân chia tài sản chung là QSDĐ tại Bình Dương. Họ muốn công chứng thỏa thuận này.<br>Thỏa thuận phân chia tài sản chung của vợ chồng sau ly hôn liên quan đến QSDĐ có bắt buộc công chứng/chứng thực không?", "options": {"A": "Không bắt buộc.", "B": "Bắt buộc phải công chứng hoặc chứng thực.", "C": "Chỉ bắt buộc nếu giá trị đất trên 1 tỷ đồng.", "D": "Chỉ cần có xác nhận của Tòa án đã giải quyết ly hôn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 điều 27 Luật đất đai năm 2024 quy định Hợp đồng chuyển nhượng, tặng cho, thế chấp, góp vốn bằng quyền sử dụng đất, quyền sử dụng đất và tài sản gắn liền với đất phải được công chứng hoặc chứng thực"}, {"level": "1", "content": "Trường hợp nào sau đây KHÔNG bắt buộc phải công chứng, chứng thực theo Luật Đất đai 2024?", "options": {"A": "Hợp đồng chuyển nhượng quyền sử dụng đất giữa các cá nhân.", "B": "Hợp đồng thế chấp quyền sử dụng đất giữa cá nhân và ngân hàng.", "C": "Hợp đồng tặng cho quyền sử dụng đất giữa cha mẹ và con cái.", "D": "Hợp đồng chuyển nhượng quyền sử dụng đất mà một bên là tổ chức kinh doanh bất động sản."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Khoản 3điều 27 Luật đất đai năm 2024 quy định không bắt buộc công chứng đối với hợp đồng chuyển đổi quyền sử dụng đất nông nghiệp; hợp đồng chuyển nhượng, góp vốn bằng quyền sử dụng đất, quyền sử dụng đất và tài sản gắn liền với đất, tài sản gắn liền với đất mà một bên hoặc các bên tham gia giao dịch là tổ chức hoạt động kinh doanh bất động sản."}, {"level": "1", "content": "Nghĩa vụ nào sau đây là nghĩa vụ chung của mọi người sử dụng đất?", "options": {"A": "Sử dụng đất đúng mục đích, ranh giới.", "B": "Kê khai đăng ký đất đai.", "C": "Thực hiện nghĩa vụ tài chính về đất đai.", "D": "Cả a, b, c đều đúng."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> theo Điều 31 Luật Đất đai 2024"}, {"level": "1", "content": "Quyền sử dụng đất (QSDĐ) tại Việt Nam có đặc điểm gì?", "options": {"A": "Là quyền sở hữu tuyệt đối về đất đai.", "B": "Không được coi là tài sản và không có giá trị bằng tiền.", "C": "Là quyền khai thác, sử dụng đất theo mục đích, thời hạn do pháp luật quy định và được công nhận là một loại tài sản đặc biệt.", "D": "Chỉ được Nhà nước giao cho cá nhân trong nước."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> điều 12, điều 27 Luật đất đai 2024"}, {"level": "1", "content": "Tổ chức được Nhà nước giao đất có thu tiền hoặc thuê đất trả tiền một lần có được bồi thường về đất khi bị thu hồi không?", "options": {"A": "Được bồi thường giá trị quyền sử dụng đất.", "B": "Được bồi thường về đất", "C": "Được bồi thường 50% giá trị đất theo bảng giá.", "D": "Được bồi thường theo giá thị trường."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điểm e Khoản 1 Điều 95 Luật Đất đai 2024."}, {"level": "1", "content": "Nguyên tắc bồi thường về đất khi Nhà nước thu hồi đất là gì?", "options": {"A": "Luôn bồi thường bằng tiền mặt.", "B": "Bồi thường bằng việc giao đất cùng mục đích sử dụng; nếu không có đất thì bồi thường bằng tiền theo giá đất cụ thể tại thời điểm phê duyệt phương án.", "C": "Chỉ bồi thường cho đất ở, không bồi thường cho đất nông nghiệp.", "D": "Bồi thường theo giá đất trong Bảng giá đất hàng năm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật nêu rõ nguyên tắc ưu tiên bồi thường bằng đất cùng mục đích, sau đó mới đến bồi thường bằng tiền theo giá đất cụ thể.  Điều 91 Luật Đất đai 2024"}, {"level": "1", "content": "Một doanh nghiệp thuê đất trả tiền hàng năm muốn vay vốn ngân hàng, doanh nghiệp có quyền thế chấp gì?", "options": {"A": "Thế chấp quyền sử dụng đất tại ngân hàng.", "B": "Thế chấp tài sản thuộc sở hữu gắn liền với đất tại tổ chức tín dụng.", "C": "Thế chấp quyền thuê đất tại tổ chức tín dụng.", "D": "Không có quyền thế chấp bất kỳ tài sản nào."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điểm b Khoản 1 Điều 34 Luật Đất đai 2024."}, {"level": "1", "content": "Thời hạn thông thường để đăng ký biến động đất đai (trừ trường hợp thừa kế) là bao nhiêu ngày kể từ ngày có biến động?", "options": {"A": "10 ngày", "B": "15 ngày", "C": "30 ngày", "D": "60 ngày"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 điều 133 Luật Đất đai 2024"}, {"level": "1", "content": "Trường hợp nào sau đây thuộc diện \"Giao đất không thu tiền sử dụng đất\" theo Điều 118?", "options": {"A": "Tổ chức kinh tế làm dự án nhà ở thương mại.", "B": "Cá nhân được giao đất ở trong hạn mức.", "C": "Đất xây dựng trụ sở cơ quan nhà nước, đơn vị vũ trang.", "D": "Đất làm dự án khu công nghiệp."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 điều 118 Luật Đất đai 2024"}, {"level": "1", "content": "Khi hết thời hạn thuê đất hàng năm, chủ đầu tư dự án nhà ở xã hội được xử lý thế nào theo Luật Đất đai 2024?", "options": {"A": "Phải làm thủ tục xin gia hạn tối thiểu 06 tháng trước khi hết hạn.", "B": "Khi hết thời hạn, chủ đầu tư dự án nhà ở xã hội nếu có nhu cầu tiếp tục sử dụng thì được Nhà nước xem xét gia hạn sử dụng đất", "C": "Nhà nước sẽ thu hồi đất để đấu giá lại.", "D": "Được gia hạn tự động không quá 20 năm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 Điều 172 Luật Đất đai 2024."}, {"level": "1", "content": "Một hộ gia đình sử dụng đất ổn định từ trước 01/7/2014 không có giấy tờ thì có được cấp Giấy chứng nhận không?", "options": {"A": "Có, nếu sử dụng ổn định và không tranh chấp.", "B": "Không, vì đã quá thời hạn đăng ký.", "C": "Chỉ được cấp nếu sử dụng đất trước năm 1993.", "D": "Có, nhưng phải nộp hồ sơ trước ngày 01/01/2025."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 Điều 138 Luật Đất đai 2024."}, {"level": "1", "content": "Thời gian giải quyết tối đa cho thủ tục Giấy chứng nhận quyền sử dụng đất lần đầu theo Nghị định 101/2024/NĐ-CP (không kể thời gian thực hiện nghĩa vụ tài chính, trưng cầu giám định...) là bao nhiêu ngày làm việc?", "options": {"A": "15 ngày làm việc.", "D": "30 ngày làm việc."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 điều 22 Nghị định 101/2024. (20 ngày đăng ký + 3 ngày cấp giấy)"}, {"level": "1", "content": "Căn cứ nào KHÔNG được sử dụng để xác định giá đất cụ thể?", "options": {"A": "Mục đích sử dụng đất được phép theo quy hoạch.", "B": "Thời hạn sử dụng đất còn lại.", "C": "Giá đất trong Bảng giá đất được ban hành cùng năm.", "D": "Thông tin về giá giao dịch thực tế trên thị trường, giá trúng đấu giá QSDĐ tương tự."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 điều 158 Luật Đất đai 2024"}, {"level": "1", "content": "Tình huống: Ông An có thửa đất trồng cây hàng năm, nay muốn chuyển sang xây dựng nhà ở. Ông An cần làm thủ tục gì?", "options": {"A": "Chỉ cần thông báo cho UBND xã.", "B": "Phải xin phép cơ quan nhà nước có thẩm quyền và thực hiện nghĩa vụ tài chính.", "C": "Chỉ cần nộp tiền sử dụng đất mà không cần xin phép.", "D": "Không được phép chuyển đổi vì khác nhóm đất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1, khoản 2 điều 121 Luật Đất đai 2024. (nộp tiền sử dụng đất)"}, {"level": "1", "content": "Bà Lan là người gốc Việt Nam, định cư và có quốc tịch Mỹ. Bà muốn mua một căn nhà ở (gắn liền với QSDĐ ở) tại Việt Nam từ một cá nhân trong nước. Theo Luật Đất đai 2024, bà Lan có được thực hiện giao dịch này không?", "options": {"A": "Không, vì bà không còn quốc tịch Việt Nam.", "B": "Có, người gốc Việt Nam định cư ở nước ngoài được phép mua nhà ở gắn liền với QSDĐ ở tại Việt Nam theo quy định của Luật Nhà ở và Luật Đất đai.", "C": "Chỉ được mua nhà ở xã hội.", "D": "Chỉ được mua thông qua doanh nghiệp do bà thành lập tại Việt Nam."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điểm h, khoản 1 điều 28 Luật Đất đai 2024"}, {"level": "1", "content": "Một tư nhân dự định xây dựng một khu du lịch sinh thái. Sau khi dự án đã được phê duyệt, nhà đầu tư này đã tiến hành xin giao đất, xin phép xây dựng và khai thác tài nguyên. Bước kế tiếp ông ta nên làm gì?", "options": {"A": "Thẩm định, phê duyệt thiết kế và tổng dự toán, dự toán công trình.", "B": "Đền bù giải phóng mặt bằng, thực hiện kế hoạch tái định cư và phục hồi, chuẩn bị mặt bằng xây dựng.", "C": "Mua sắm thiết bị và công nghệ.", "D": "Thực hiện việc khảo sát – thiết kế xây dựng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo quy trình đầu tư xây dựng, sau khi dự án được phê duyệt và có các giấy phép ban đầu, bước quan trọng tiếp theo là giải phóng mặt bằng để có \"đất sạch\" cho việc thi công."}, {"level": "1", "content": "Thủ tục nào theo Luật Đầu tư 2020 thường áp dụng cho các dự án BĐS quy mô lớn?", "options": {"A": "Chỉ cần xin Giấy phép xây dựng.", "B": "Chấp thuận chủ trương đầu tư.", "C": "Chỉ cần đăng ký kinh doanh.", "D": "Chỉ cần thẩm định giá đất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 30, 31, 32 Luật Đầu tư yêu cầu phải thực hiện thủ tục chấp thuận chủ trương đầu tư bởi cơ quan có thẩm quyền (Quốc hội, Thủ tướng, UBND tỉnh) đối với các dự án BĐS quy mô lớn."}, {"level": "1", "content": "Theo Luật Đầu tư 2020, thẩm quyền chấp thuận chủ trương đầu tư dự án nhà ở/khu đô thị có quy mô sử dụng đất trên 300 ha thuộc về ai?", "options": {"A": "Ủy ban nhân dân cấp tỉnh.", "B": "Bộ Xây dựng.", "C": "Quốc hội.", "D": "Thủ tướng Chính phủ."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Điều 31 Luật Đầu tư 2020 quy định dự án đầu tư xây dựng nhà ở (để bán, cho thuê, cho thuê mua), khu đô thị trong các trường hợp: dự án đầu tư có quy mô sử dụng đất từ 50 ha trở lên hoặc có quy mô dưới 50 ha nhưng quy mô dân số từ 15.000 người trở lên thuộc thẩm quyền chấp thuận chủ trương đầu tư của Thủ tướng Chính phủ"}, {"level": "1", "content": "Trường hợp nào áp dụng chấp thuận nhà đầu tư (không đấu giá, không đấu thầu)?", "options": {"A": "Có nhiều nhà đầu tư", "B": "Đất đã giải phóng mặt bằng", "C": "Chỉ có 1 nhà đầu tư đáp ứng điều kiện", "D": "Dự án nhỏ"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 điều 29 Luật đầu tư 2020"}, {"level": "1", "content": "Hành vi nào sau đây bị cấm đầu tư kinh doanh?", "options": {"A": "Kinh doanh dịch vụ bảo vệ", "B": "Kinh doanh pháo nổ", "C": "Kinh doanh bất động sản", "D": "Kinh doanh giáo dục"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điểm g Khoản 1 Điều 6 Luật đầu tư 2020"}, {"level": "1", "content": "Dự án bất động sản dưới 50 ha tại khu vực đô thị và dân số dưới 15.000 người thuộc thẩm quyền nào?", "options": {"A": "Quốc hội", "B": "Thủ tướng", "C": "UBND cấp tỉnh", "D": "Bộ Tài chính"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> điểm b Khoản 1 Điều 32 Luật đầu tư 2020"}, {"level": "1", "content": "Dự án bất động sản có yêu cầu chuyển mục đích sử dụng đất phải đáp ứng gì?", "options": {"A": "Chỉ cần vốn", "B": "Phù hợp quy hoạch", "C": "Có giấy phép xây dựng", "D": "Có người mua"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điểm a Khoản 3 Điều 33 Luật đầu tư 2020"}, {"level": "1", "content": "Công ty nước ngoài X muốn mua 60% cổ phần của công ty BĐS Việt Nam. Trường hợp này phải thực hiện thủ tục gì?", "options": {"A": "Không cần thủ tục", "B": "Chỉ cần ký hợp đồng", "C": "Đăng ký với cơ quan đăng ký đầu tư trước khi thực hiện", "D": "Xin phép Bộ Xây dựng"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điểm b Khoản 2 Điều 26"}, {"level": "1", "content": "Ai KHÔNG thuộc diện người thừa kế không phụ thuộc vào nội dung di chúc theo Điều 644 BLDS 2015?", "options": {"A": "Con chưa thành niên của người để lại di sản.", "B": "Vợ hoặc chồng của người để lại di sản.", "C": "Cha, mẹ của người để lại di sản.", "D": "Anh, chị, em ruột của người để lại di sản."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Điều 644 BLDS 2015"}, {"level": "1", "content": "Doanh nghiệp BĐS X bán căn hộ cho khách hàng Y và thu tiền đợt đầu là 30%. Sau đó, dự án bị chậm tiến độ nghiêm trọng so với cam kết trong hợp đồng. Khách hàng Y có quyền gì trong trường hợp này?", "options": {"A": "Chỉ có thể chờ đợi chủ đầu tư tiếp tục xây dựng.", "B": "Có quyền tạm dừng thanh toán các đợt tiếp theo và yêu cầu bồi thường thiệt hại (nếu có) hoặc thỏa thuận lại tiến độ.", "C": "Phải tiếp tục thanh toán theo đúng lịch trong hợp đồng.", "D": "Có quyền yêu cầu ngân hàng bảo lãnh trả lại tiền ngay lập tức."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Hợp đồng là sự thỏa thuận giữa các bên. Nếu một bên vi phạm nghĩa vụ cơ bản (chậm tiến độ nghiêm trọng), bên kia có quyền áp dụng các chế tài như tạm dừng thực hiện nghĩa vụ của mình, yêu cầu bồi thường thiệt hại, hoặc các biện pháp khác theo thỏa thuận hoặc quy định pháp luật (Điều 419, 423 BLDS 2015)."}, {"level": "1", "content": "Hợp đồng tặng cho bất động sản có hiệu lực kể từ thời điểm nào nếu bất động sản đó phải đăng ký quyền sở hữu?", "options": {"A": "Kể từ thời điểm các bên ký hợp đồng.", "B": "Kể từ thời điểm hợp đồng được công chứng/chứng thực.", "C": "Kể từ thời điểm đăng ký quyền sở hữu.", "D": "Kể từ thời điểm bên được tặng cho nhận tài sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 điều 459 Bộ luật dân sự năm 2015 quy định Hợp đồng tặng cho bất động sản có hiệu lực kể từ thời điểm đăng ký"}, {"level": "1", "content": "Ông N muốn bán căn nhà đứng tên mình. Ông N đã ly hôn bà T cách đây 5 năm và căn nhà này được tạo lập trong thời kỳ hôn nhân nhưng Tòa án chưa phân chia khi ly hôn. Ông N có thể tự mình bán căn nhà này không?", "options": {"A": "Có, vì đã ly hôn và nhà đứng tên ông N.", "B": "Có, nhưng phải trích một nửa tiền bán nhà cho bà T.", "C": "Chỉ cần thông báo cho bà T biết về việc bán nhà.", "D": "Không, vì đây vẫn được xem là tài sản chung chưa chia sau ly hôn, việc bán cần có sự đồng ý của bà T hoặc quyết định của Tòa án về phân chia tài sản."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> điều 33, điều 59 Luật hôn nhân và gia đình quy định Tài sản chung hình thành trong thời kỳ hôn nhân mà chưa được phân chia khi ly hôn vẫn là sở hữu chung hợp nhất. Việc định đoạt tài sản này vẫn cần sự đồng ý của cả hai người hoặc phải thông qua thủ tục phân chia tài sản sau ly hôn tại Tòa án."}, {"level": "1", "content": "Bên thuê bất động sản có được phép cho thuê lại không?", "options": {"A": "Không được phép trong mọi trường hợp.", "B": "Được phép nếu có sự đồng ý bằng văn bản của bên cho thuê.", "C": "Chỉ được phép khi thời hạn thuê còn trên 1 năm.", "D": "Được phép tự do mà không cần sự đồng ý."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 475 BLDS 2015 quy định bên thuê chỉ được cho thuê lại tài sản nếu có sự đồng ý của bên cho thuê."}, {"level": "1", "content": "Hợp đồng được giao kết hợp pháp có hiệu lực từ thời điểm nào?", "options": {"A": "Từ thời điểm các bên ký kết văn bản hợp đồng.", "B": "Từ thời điểm hợp đồng được công chứng, chứng thực theo quy định của pháp luật.", "C": "Từ thời điểm các bên hoàn thành nghĩa vụ chính.", "D": "Từ thời điểm giao kết, trừ trường hợp có thỏa thuận khác hoặc luật liên quan có quy định khác."}, "answer": "D", "explanation": " Căn cứ Điều 401, Khoản 1, Bộ Luật Dân sự 2015"}, {"level": "1", "content": "Theo Bộ luật Dân sự (BLDS) 2015, loại tài sản nào sau đây được xem là bất động sản?", "options": {"A": "Chỉ có đất đai.", "B": "Đất đai; Nhà, công trình xây dựng gắn liền với đất đai; Tài sản khác gắn liền với đất đai, nhà, công trình xây dựng; Tài sản khác do pháp luật quy định.", "C": "Chỉ có nhà ở và công trình xây dựng.", "D": "Chỉ có quyền sử dụng đất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 107 BLDS 2015 định nghĩa rõ ràng các loại tài sản được coi là bất động sản, bao gồm đất đai và các tài sản gắn liền với đất đai, nhà cửa, công trình xây dựng."}, {"level": "1", "content": "Trường hợp nào sau đây áp dụng thừa kế theo pháp luật?", "options": {"A": "Chỉ khi người chết không để lại di chúc.", "B": "Khi không có di chúc, di chúc không hợp pháp, người thừa kế theo di chúc chết trước/cùng thời điểm, từ chối/không có quyền hưởng, hoặc di chúc chỉ định đoạt một phần di sản.", "C": "Chỉ khi di chúc bị Tòa án tuyên vô hiệu.", "D": "Chỉ khi người thừa kế duy nhất theo di chúc từ chối nhận di sản."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 điều 650 Bộ luật dân sự năm 2015"}, {"level": "1", "content": "Ai thuộc hàng thừa kế thứ nhất theo pháp luật?", "options": {"A": "Ông bà nội, ông bà ngoại, anh chị em ruột.", "B": "Vợ, chồng, cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, con đẻ, con nuôi.", "C": "Cụ nội, cụ ngoại, bác chú cậu cô dì ruột.", "D": "Cháu ruột, chắt ruột."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điểm a khoản 1 điều 651 Bộ luật dân sự năm 2015"}, {"level": "1", "content": "Thời hiệu yêu cầu chia di sản thừa kế đối với bất động sản là bao nhiêu năm?", "options": {"A": "10 năm kể từ thời điểm mở thừa kế.", "B": "20 năm kể từ thời điểm mở thừa kế.", "C": "30 năm kể từ thời điểm mở thừa kế.", "D": "Không giới hạn thời hiệu."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 1 điều 623 Bộ luật dân sự năm 2015"}, {"level": "1", "content": "Bộ luật nào được coi là \"luật chung\" điều chỉnh các quan hệ dân sự, bao gồm cả các quan hệ liên quan đến bất động sản?", "options": {"A": "Luật Kinh doanh bất động sản.", "B": "Luật Đất đai.", "C": "Luật Nhà ở.", "D": "Bộ luật Dân sự."}, "answer": "D", "explanation": ""}, {"level": "1", "content": "Hậu quả pháp lý trực tiếp của việc một giao dịch dân sự về bất động sản có mục đích hoặc nội dung vi phạm điều cấm của luật hoặc trái đạo đức xã hội là gì?", "options": {"A": "Giao dịch chỉ bị hạn chế hiệu lực.", "B": "Giao dịch bị coi là vô hiệu.", "C": "Các bên phải thỏa thuận lại nội dung.", "D": "Chỉ bên vi phạm phải chịu trách nhiệm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điều 123 Bộ luật dân sự năm 2015"}, {"level": "1", "content": "Bà Q là chủ sở hữu một căn hộ chung cư mini được cấp GCN riêng theo Luật Nhà ở 2023. Bà muốn bán căn hộ này cho anh R. Hợp đồng mua bán căn hộ chung cư mini này giữa bà Q và anh R có cần công chứng hoặc chứng thực không?", "options": {"A": "Không cần, vì là chung cư mini.", "B": "Có, vì đây là giao dịch mua bán nhà ở giữa các cá nhân với nhau.", "C": "Chỉ cần nếu giá trị căn hộ trên 1 tỷ đồng.", "D": "Theo yêu cầu của anh R."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điều 119 Bộ luật dân sự năm 2015 và khoản 1 điều 164 Luật Nhà ở 2023"}, {"level": "1", "content": "Bà A lập di chúc để lại căn nhà cho tổ chức từ thiện X. Tuy nhiên, bà A còn mẹ già (90 tuổi, không có khả năng lao động và không có tài sản riêng) đang sống cùng bà. Tổ chức từ thiện X có được hưởng toàn bộ căn nhà theo di chúc không?", "options": {"A": "Có, vì di chúc là ý chí của bà A.", "B": "Không, mẹ già của bà A sẽ được hưởng một phần căn nhà bằng 2/3 suất thừa kế theo pháp luật.", "C": "Không, toàn bộ di chúc sẽ vô hiệu vì không để lại tài sản cho mẹ già.", "D": "Có, nhưng tổ chức X phải có nghĩa vụ chăm sóc mẹ già bà A."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điều 644 Bộ luật dân sự năm 2015"}, {"level": "1", "content": "Anh P và chị Q ly hôn. Tài sản chung là căn nhà đứng tên cả hai. Tòa án quyết định giao căn nhà cho chị Q nuôi con và buộc chị Q thanh toán cho anh P một nửa giá trị căn nhà. Quyết định này của Tòa án có phù hợp với nguyên tắc phân chia tài sản khi ly hôn không?", "options": {"A": "Không, phải chia đôi hiện vật hoặc bán nhà chia tiền.", "B": "Có, Tòa án có quyền quyết định giao tài sản cho một bên và buộc bên đó thanh toán giá trị cho bên kia, có xem xét các yếu tố như lợi ích của con.", "C": "Không, vì ưu tiên chia cho người chồng.", "D": "Có, nhưng chỉ khi anh P đồng ý nhận tiền."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điều 59 Luật hôn nhân và gia đình 2014"}, {"level": "1", "content": "Anh U và chị V là vợ chồng, cùng mua một lô đất năm 2022 (sau kết hôn). GCN chỉ ghi tên anh U. Năm 2025, anh U tự ý ký hợp đồng chuyển nhượng lô đất này cho anh X mà chị V không biết. Chị V phát hiện ra sự việc. Chị có quyền yêu cầu Tòa án tuyên hợp đồng chuyển nhượng giữa anh U và anh X vô hiệu không?", "options": {"A": "Không, vì GCN chỉ đứng tên anh U.", "B": "Không, vì anh X là người thứ ba ngay tình.", "C": "Có, vì đây là tài sản chung và việc chuyển nhượng BĐS chung phải có sự đồng ý bằng văn bản của cả hai vợ chồng.", "D": "Chỉ có quyền yêu cầu anh U chia tiền bán đất."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> điều 33 và diều 35 Luật hôn nhân và gia đình 2014"}, {"level": "1", "content": "Đâu KHÔNG phải là quyền khác đối với bất động sản được quy định trong BLDS 2015?", "options": {"A": "Quyền đối với bất động sản liền kề.", "B": "Quyền hưởng dụng.", "C": "Quyền bề mặt.", "D": "Quyền cho thuê."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> điều 159 Bộ luật dân sự 2015"}, {"level": "1", "content": "Văn bản công chứng có giá trị pháp lý như thế nào?", "options": {"A": "Chỉ có giá trị tham khảo.", "B": "Có hiệu lực thi hành đối với các bên và có giá trị chứng cứ cao.", "C": "Cần phải được Tòa án phê duyệt mới có hiệu lực.", "D": "Có giá trị tương đương văn bản chứng thực."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều 6 Luật công chứng năm 2024 Văn bản công chứng có hiệu lực thi hành đối với các bên liên quan; Văn bản công chứng có giá trị chứng cứ; những tình tiết, sự kiện trong văn bản công chứng không phải chứng minh, trừ trường hợp bị Tòa án tuyên bố là vô hiệu."}, {"level": "1", "content": "Trường hợp nào sau đây vẫn bắt buộc phải công chứng hoặc chứng thực theo quy định của Luật Đất đai 2024?", "options": {"A": "Hợp đồng cho thuê QSDĐ giữa hai doanh nghiệp.", "B": "Hợp đồng chuyển nhượng QSDĐ mà một bên là DN KDBĐS.", "C": "Văn bản về thừa kế QSDĐ giữa các cá nhân.", "D": "Hợp đồng chuyển đổi QSDĐ nông nghiệp."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> điểm c khoản 3 điều 27 Luật đất đai 2024"}, {"level": "1", "content": "Doanh nghiệp kinh doanh BĐS có thể lựa chọn công chứng tại tổ chức hành nghề công chứng nào?", "options": {"A": "Chỉ tại Phòng Công chứng nơi doanh nghiệp đặt trụ sở chính.", "B": "Chỉ tại Văn phòng công chứng nơi có BĐS.", "C": "Tại bất kỳ Phòng Công chứng hoặc Văn phòng công chứng nào trên toàn quốc.", "D": "Tại Phòng Công chứng hoặc Văn phòng công chứng trong phạm vi tỉnh/thành phố nơi có BĐS."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> điều 44 Luật Công chứng năm 2024"}, {"level": "1", "content": "Trường hợp tiếp tục thế chấp một bất động sản đã được công chứng trước đó thì phải công chứng ở đâu?", "options": {"A": "Bất kỳ tổ chức công chứng nào", "B": "UBND cấp xã", "C": "Tổ chức đã công chứng lần đầu", "D": "Sở Tư pháp"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 2 điều 56 Luật Công chứng năm 2024"}, {"level": "1", "content": "Giá trị chứng cứ của văn bản công chứng được hiểu là:", "options": {"A": "Luôn phải chứng minh lại tại Tòa", "B": "Không có giá trị nếu không đăng ký", "C": "Không phải chứng minh trừ khi bị Tòa tuyên vô hiệu", "D": "Chỉ có giá trị tham khảo"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khoản 3 điều 6 Luật Công chứng năm 2024"}, {"level": "1", "content": "Trong hồ sơ công chứng giao dịch bất động sản, giấy tờ nào là bắt buộc?", "options": {"A": "Giấy xác nhận độc thân", "B": "Giấy chứng nhận quyền sử dụng đất", "C": "Hợp đồng lao động", "D": "Sổ hộ khẩu"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> điểm c khoản 1 Điều 42 Luật Công chứng năm 2024"}, {"level": "1", "content": "Bà Lan (Việt kiều Pháp) về Việt Nam và muốn lập di chúc để lại căn nhà tại Hà Nội cho cháu gái. Bà tự viết tay toàn bộ nội dung di chúc. Di chúc viết tay của bà Lan có bắt buộc phải công chứng hoặc chứng thực không?", "options": {"A": "Bắt buộc phải công chứng.", "B": "Bắt buộc phải chứng thực.", "C": "Không bắt buộc, nhưng nên công chứng/chứng thực để tăng độ tin cậy và thuận tiện khi thực hiện.", "D": "Chỉ hợp pháp nếu có người làm chứng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Luật Công chứng 2024 Không quy định bắt buộc mọi di chúc phải công chứng Chỉ quy định thủ tục nếu lựa chọn công chứng (Điều 58). Đồng thời giá trị văn bản công chứng: Có giá trị chứng cứ, không phải chứng minh lại trừ khi bị tuyên vô hiệu (điều 6)."}, {"level": "1", "content": "Doanh nghiệp FDI Alpha muốn mua lại toàn bộ dự án khu công nghiệp tại Bình Phước từ Công ty Phát triển Hạ tầng Beta (DN KDBĐS Việt Nam). Hợp đồng chuyển nhượng dự án này giữa Alpha và Beta có bắt buộc công chứng/chứng thực theo Luật KDBĐS 2023 không?", "options": {"A": "Bắt buộc phải công chứng.", "B": "Không bắt buộc, theo yêu cầu của các bên.", "C": "Bắt buộc phải chứng thực.", "D": "Chỉ bắt buộc nếu Alpha là doanh nghiệp Việt Nam."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khoản 4 điều 44 Luật kinh doanh bất động sản 2023"}, {"level": "1", "content": "Luật Công chứng 2024 có hiệu lực từ 01/07/2025, cho phép công chứng điện tử trực tuyến. Doanh nghiệp X ở Hà Nội muốn ký hợp đồng thế chấp BĐS tại Đà Nẵng với Ngân hàng Y có chi nhánh ở TP.HCM. Với quy định mới, đại diện Doanh nghiệp X và Ngân hàng Y có thể thực hiện công chứng hợp đồng thế chấp này như thế nào?", "options": {"A": "Vẫn phải cùng đến một VPCC tại Đà Nẵng để ký giấy.", "B": "Có thể ngồi tại văn phòng của mình ở Hà Nội và TP.HCM, tham gia phiên công chứng trực tuyến do một công chứng viên tại Đà Nẵng thực hiện.", "C": "Chỉ cần gửi hồ sơ điện tử cho VPCC Đà Nẵng tự động công chứng.", "D": "Phải bay vào Đà Nẵng để thực hiện công chứng điện tử trực tiếp tại VPCC."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điểm b khoản 1 điều 65 Luật công chứng 2024"}, {"level": "1", "content": "Văn phòng công chứng M thực hiện công chứng Hợp đồng mua bán đất nhưng sau đó phát hiện thửa đất này nằm trong diện quy hoạch bị thu hồi. Hợp đồng mua bán đất đã công chứng trong trường hợp này có thể bị ảnh hưởng như thế nào?", "options": {"A": "Gian lận trong kê khai giá hàng hóa, dịch vụ", "B": "Thông đồng về giá, thẩm định giá", "C": "Định giá sai do thiếu thông tin thị trường", "D": "Cạnh tranh không lành mạnh trong hoạt động kinh doanh"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> điều 6 Luật công chứng 2024; điều 117, điều 123 Bộ luật dân sự 2015 101. Theo Luật Doanh nghiệp 2020, có bao nhiêu loại hình doanh nghiệp được quy định?<br><br><b>Giải thích học thuật:</b> Theo Luật Doanh nghiệp 2020 (Doanh nghiệp tư nhân; Công ty hợp danh; Công ty TNHH Hai thành viên trở lên; Công ty TNHH MTV; Công ty cổ phần). 102. Doanh nghiệp tư nhân có tư cách pháp nhân không?<br><br><b>Giải thích học thuật:</b> Theo Điều 188 Luật doanh nghiệp 2020 thì Doanh nghiệp tư nhân là doanh nghiệp do một cá nhân làm chủ và tự chịu trách nhiệm bằng toàn bộ tài sản của mình về mọi hoạt động của doanh nghiệp. 103. Công ty TNHH một thành viên có thể có bao nhiêu chủ sở hữu?<br><br><b>Giải thích học thuật:</b> Điều 74 Luật Doanh nghiệp 2020. 104. Công ty TNHH hai thành viên trở lên có số lượng thành viên tối đa là bao nhiêu?<br><br><b>Giải thích học thuật:</b> Điều 46 Luật Doanh nghiệp 2020 (từ 2 đến 50 thành viên). 105. Công ty cổ phần phải có tối thiểu bao nhiêu cổ đông?<br><br><b>Giải thích học thuật:</b> Điều 111 Luật Doanh nghiệp 2020. 106. Công ty cổ phần có tư cách pháp nhân kể từ khi nào?<br><br><b>Giải thích học thuật:</b> Khoản 2 - Điều 111 Luật Doanh nghiệp 2020. 107. Chủ Doanh Nghiệp Tư Nhân có quyền bán toàn bộ doanh nghiệp của mình không?<br><br><b>Giải thích học thuật:</b> Điều 192 Luật Doanh nghiệp 2020. 108. Doanh nghiệp nào sau đây được phát hành chứng khoán?<br><br><b>Giải thích học thuật:</b> Chỉ công ty cổ phần được phát hành chứng khoán (Điều 111 Luật Doanh nghiệp 2020). 109. Điều kiện đối với tổ chức, cá nhân khi kinh doanh bất động sản là gì?<br><br><b>Giải thích học thuật:</b> Khoản 1 Điều 9 Luật kinh doanh bất động sản 2023 110. Khi cá nhân kinh doanh bất động sản với quy mô nhỏ thì:<br><br><b>Giải thích học thuật:</b> <br><br><b>Giải thích học thuật:</b> Khoản 3 Điều 9 Luật kinh doanh bất động sản 2023 111. Doanh nghiệp kinh doanh dịch vụ môi giới bất động sản phải:<br><br><b>Giải thích học thuật:</b> Điểm c Khoản 1 Điều 61 Luật kinh doanh bất động sản 2023 112. Điều kiện về chủ thể thành lập doanh nghiệp<br><br><b>Giải thích học thuật:</b> Điều 17 Luật Doanh nghiệp 2020 113. Hoạt động chuyển nhượng bất động sản chịu thuế suất GTGT bao nhiêu?\nA.\t0%\nB.\t5%\nC.\t8% \nD.\t10%\nĐáp án: D<br><br><b>Giải thích học thuật:</b> Khoản 3 Điều 9 Luật Thuế giá trị gia tăng 2024 quy định: “Mức thuế suất 10% áp dụng đối với hàng hóa, dịch vụ không quy định tại khoản 1 và khoản 2 Điều này.” Hoạt động chuyển nhượng bất động sản không thuộc đối tượng áp dụng thuế suất 0% hoặc 5%, nên áp dụng mức thuế suất GTGT thông thường là 10% (trừ trường hợp được giảm còn 8% theo chính sách hỗ trợ thuế từng thời kỳ của Chính phủ). 114. Khi doanh nghiệp bán nhà hoặc công trình xây dựng gắn liền với quyền sử dụng đất, phần giá đất được xử lý thuế GTGT như thế nào theo Luật Thuế GTGT 2024?<br><br><b>Giải thích học thuật:</b> Khoản 7 Điều 5 Luật Thuế GTGT 2024 quy định “chuyển quyền sử dụng đất” thuộc đối tượng không chịu thuế GTGT 115. Theo Luật Thuế thu nhập doanh nghiệp 2025, doanh thu từ hoạt động chuyển nhượng bất động sản được xác định như thế nào?<br><br><b>Giải thích học thuật:</b> Điều 8 và điểm b khoản 2 Điều 3 Luật Thuế TNDN số 67/2025/QH15. 116. Theo Luật Thuế thu nhập doanh nghiệp số 67/2025/QH15, thu nhập tính thuế từ hoạt động chuyển nhượng bất động sản được xác định như thế nào?<br><br><b>Giải thích học thuật:</b> Khoản 1 Điều 7 Luật Thuế thu nhập doanh nghiệp số 67/2025/QH15 quy định: Thu nhập tính thuế = Thu nhập chịu thuế - Thu nhập được miễn thuế + Các khoản lỗ được kết chuyển theo quy định. Khoản 2 Điều 7 quy định: Thu nhập chịu thuế = Doanh thu - Các khoản chi được trừ + Các khoản thu nhập khác. Khoản 3 Điều 7 quy định nguyên tắc bù trừ lỗ đối với hoạt động chuyển nhượng bất động sản. 117. Theo quy định của pháp luật thuế thu nhập doanh nghiệp hiện hành, thu nhập từ chuyển nhượng bất động sản của doanh nghiệp phải được thực hiện như thế nào?<br><br><b>Giải thích học thuật:</b> Thu nhập từ chuyển nhượng BĐS phải được hạch toán riêng để kê khai nộp thuế TNDN. Điều 7 và Điều 8 của Luật Thuế thu nhập doanh nghiệp và hướng dẫn tại các văn bản thi hành hiện hành: Thu nhập từ chuyển nhượng bất động sản là khoản thu nhập phải xác định riêng để kê khai và nộp thuế TNDN, không được gộp chung tùy ý với hoạt động sản xuất kinh doanh thông thường. 118. Theo quy định hiện hành về thuế thu nhập doanh nghiệp, thời điểm xác định doanh thu từ hoạt động chuyển nhượng bất động sản là thời điểm nào?<br><br><b>Giải thích học thuật:</b> Điểm b khoản 1 Điều 17 Nghị định 320/2025/NĐ-CP hướng dẫn Luật Thuế thu nhập doanh nghiệp 2025 quy định: “Thời điểm xác định doanh thu tính thuế TNDN từ hoạt động chuyển nhượng bất động sản là thời điểm bên bán bàn giao bất động sản cho bên mua, không phụ thuộc việc bên mua đã đăng ký quyền sở hữu, quyền sử dụng đất” 119. Cá nhân chuyển nhượng bất động sản phải nộp thuế TNCN với mức thuế suất nào theo quy định hiện hành?<br><br><b>Giải thích học thuật:</b> Khoản 1 Điều 14 Luật Thuế TNCN số 109/2025/QH15. 120. Trường hợp nào dưới đây được miễn thuế TNCN khi chuyển nhượng bất động sản theo quy định hiện hành?<br><br><b>Giải thích học thuật:</b> Khoản 1 và khoản 2 Điều 4 của Luật Thuế TNCN số 109/2025/QH15. 121. Theo Luật Thuế TNCN số 109/2025/QH15, thời điểm xác định thu nhập tính thuế từ chuyển nhượng bất động sản là thời điểm nào?<br><br><b>Giải thích học thuật:</b> Khoản 2 Điều 14 Luật Thuế thu nhập cá nhân số 109/2025/QH15 122. Theo quy định hiện hành, trường hợp chuyển nhượng nhà ở hình thành trong tương lai thì thời điểm xác định thu nhập tính thuế là thời điểm nào?<br><br><b>Giải thích học thuật:</b> Khoản 2 Điều 14 Luật Luật Thuế thu nhập cá nhân số 109/2025/QH15 123. Theo Luật Thuế TNCN số 109/2025/QH15, điều kiện để được miễn thuế đối với chuyển nhượng nhà ở, quyền sử dụng đất ở duy nhất của cá nhân là gì?<br><br><b>Giải thích học thuật:</b> Khoản 2 Điều 4 Luật Luật Thuế thu nhập cá nhân số 109/2025/QH15 124. Miễn lệ phí trước bạ khi nhận thừa kế nhà, đất được áp dụng đối với trường hợp nào dưới đây theo quy định hiện hành?<br><br><b>Giải thích học thuật:</b> Khoản 10, Điều 10, Nghị định 10/2022/NĐ-CP được sửa đổi, bổ sung bởi Nghị định 175/2025/NĐ-CP quy định miễn lệ phí trước bạ đối với nhà, đất nhận thừa kế hoặc quà tặng giữa các đối tượng có quan hệ hôn nhân, huyết thống và nuôi dưỡng trực tiếp như: vợ chồng, cha mẹ với con, ông bà với cháu, anh chị em ruột với nhau. Các trường hợp như chú, bác, dì, dượng với cháu; anh em họ; cha dượng, mẹ kế với con riêng hiện không thuộc diện được miễn lệ phí trước bạ theo quy định mới nhất. 125. Mức thu lệ phí trước bạ khi đăng ký quyền sử dụng đất theo quy định hiện hành là bao nhiêu?<br><br><b>Giải thích học thuật:</b> Khoản 1 Điều 8 Nghị định 10/2022/NĐ-CP. 126. Lệ phí trước bạ khi đăng ký quyền sở hữu nhà ở theo quy định hiện hành được xác định theo căn cứ nào?<br><br><b>Giải thích học thuật:</b> Điểm a khoản 2 Điều 1 Nghị định 175/2025/NĐ-CP sửa đổi điểm d khoản 1 Điều 7 Nghị định 10/2022/NĐ-CP quy định: “Trường hợp giá nhà, đất tại hợp đồng mua bán nhà, đất (đất gắn liền với nhà, tài sản trên đất không tách riêng giá trị đất) cao hơn giá do Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương ban hành thì giá tính lệ phí trước bạ đối với nhà, đất là giá tại hợp đồng mua bán nhà, đất”. Theo quy định mới, không còn chỉ áp dụng duy nhất bảng giá của UBND như trước đây, mà phải so sánh với giá ghi trên hợp đồng nếu giá hợp đồng cao hơn. 127. Theo quy định hiện hành, trường hợp nhận thừa kế hoặc tặng cho bất động sản giữa cha mẹ và con được áp dụng như thế nào về thuế và lệ phí?<br><br><b>Giải thích học thuật:</b> Khoản 4 Điều 4 Luật Thuế thu nhập cá nhân số 109/2025/QH15 quy định miễn thuế TNCN đối với thu nhập từ nhận thừa kế, quà tặng là bất động sản giữa cha mẹ và con. Khoản 10 Điều 10 Nghị định 10/2022/NĐ-CP được sửa đổi, bổ sung bởi Nghị định 175/2025/NĐ-CP quy định miễn lệ phí trước bạ đối với nhà, đất nhận thừa kế hoặc tặng cho giữa cha mẹ và con. 128. Theo quy định của pháp luật, công tác phòng, chống rửa tiền được thực hiện dựa trên những nguyên tắc nào?<br><br><b>Giải thích học thuật:</b> Điều 5 Luật PCRT 2022. 129. Đối tượng báo cáo là tổ chức, cá nhân kinh doanh ngành, nghề phi tài chính có liên quan theo quy định của pháp luật thực hiện một hoặc một số hoạt động sau đây:\nA. Kinh doanh bất động sản,<br><br><b>Giải thích học thuật:</b> Điểm b, khoản 2, Điều 4 Luật PCRT 2022. 130. Khi nhận biết khách hàng, đối với khách hàng cá nhân có một quốc tịch là người Việt Nam, thì cần nhận biết:<br><br><b>Giải thích học thuật:</b> Điểm a, khoản 1, Điều 10 Luật PCRT 2022. 131. Trường hợp khách hàng là tổ chức nước ngoài tham gia giao dịch bất động sản, doanh nghiệp phải:<br><br><b>Giải thích học thuật:</b> Điểm e, khoản 1, Điều 10 Luật PCRT 2022. 132. Ngưỡng giá trị giao dịch tiền mặt phải báo cáo trong kinh doanh bất động sản là:\nA. 100 triệu đồng<br><br><b>Giải thích học thuật:</b> Điều 25 Luật PCRT 2022 và Điều 3 Quyết định số số 11/2023/QĐ-TTG, ngày 27/03/2023 133. Một đối tượng sử dụng tiền có nguồn gốc bất hợp pháp để nhờ người khác đứng tên mua bất động sản nhằm che giấu chủ sở hữu thực sự. Hành vi này thuộc thủ đoạn nào trong rửa tiền?<br><br><b>Giải thích học thuật:</b> Khoản 1 Điều 3 Luật Phòng, chống rửa tiền 2022 quy định hành vi rửa tiền bao gồm việc hợp pháp hóa nguồn gốc tài sản do phạm tội mà có. 134. Khi phát sinh hoặc phát hiện giao dịch có dấu hiệu đáng ngờ trong hoạt động phòng, chống rửa tiền, đối tượng báo cáo phải thực hiện báo cáo trong thời hạn nào?<br><br><b>Giải thích học thuật:</b> Khoản 2 Điều 37 Luật Phòng, chống rửa tiền 2022 135. Cơ quan nào có trách nhiệm chủ trì, phối hợp với các Bộ, ngành liên quan để thực hiện đánh giá rủi ro quốc gia về rửa tiền định kỳ và trình Chính phủ phê duyệt kết quả đánh giá?<br><br><b>Giải thích học thuật:</b> Khoản 1 Điều 7 Luật Phòng, chống rửa tiền 2022. 136. Theo quy định về đánh giá rủi ro quốc gia về rửa tiền, Ngân hàng Nhà nước Việt Nam có trách nhiệm chủ trì, phối hợp với các Bộ, ngành liên quan thực hiện đánh giá theo định kỳ bao lâu?<br><br><b>Giải thích học thuật:</b> Khoản 1 Điều 7 Luật Phòng, chống rửa tiền 2022. 137. Trường hợp phát hiện dấu hiệu đáng ngờ khách hàng rửa tiền thì đối tượng báo cáo, các bộ ngành có liên quan:<br><br><b>Giải thích học thuật:</b> Khoản 2, Điều 26 Luật PCRT 2022. 138. Trong quy định nội bộ về phòng, chống rửa tiền, tổ chức báo cáo phải xây dựng nội dung nào liên quan đến giao dịch đáng ngờ?<br><br><b>Giải thích học thuật:</b> Điểm đ khoản 1 Điều 24 Luật PCRT 2022. 139. Theo quy định về phòng, chống rửa tiền, đối tượng báo cáo phải thực hiện đánh giá quy định nội bộ với tần suất như thế nào để xem xét sửa đổi, bổ sung cho phù hợp?<br><br><b>Giải thích học thuật:</b> Khoản 4 Điều 24 Luật Phòng, chống rửa tiền 2022. 140. Trong lĩnh vực trung gian thanh toán, dấu hiệu nào sau đây được xem là giao dịch đáng ngờ liên quan đến ví điện tử?<br><br><b>Giải thích học thuật:</b> Khoản 8 Điều 29 Luật PCRT 2022 141. Theo quy định về báo cáo giao dịch có giá trị lớn phải báo cáo, cơ quan nào có thẩm quyền quy định chế độ báo cáo đối với các giao dịch này?<br><br><b>Giải thích học thuật:</b> Khoản 3 Điều 25 Luật PCRT 2022. 142. Một khách hàng đến văn phòng môi giới để mua căn hộ cao cấp trị giá hàng chục tỷ đồng nhưng liên tục từ chối cung cấp thêm thông tin cá nhân, đồng thời chỉ yêu cầu hoàn tất giao dịch thật nhanh. Trong trường hợp này, dấu hiệu nào có thể được xem là đáng ngờ trong hoạt động kinh doanh bất động sản?<br><br><b>Giải thích học thuật:</b> Khoản 3 Điều 33 Luật PCRT 2022. 143. Một cá nhân đồng ý mua bất động sản với mức giá cao hơn rất nhiều so với giá thị trường nhưng không hề thương lượng hay quan tâm đến chi phí giao dịch. Đây có thể là dấu hiệu nào?<br><br><b>Giải thích học thuật:</b> Khoản 2 và khoản 4 Điều 33 Luật PCRT 2022. 144. Một khách hàng thực hiện giao dịch chuyển nhượng bất động sản theo hình thức được “ủy quyền” nhưng không xuất trình được giấy tờ chứng minh cơ sở pháp lý của việc ủy quyền. Nhân viên môi giới cần nhận định đây là:<br><br><b>Giải thích học thuật:</b> Khoản 1 Điều 33 Luật PCRT 2022. 145. Một tổ chức tài chính phát hiện giao dịch của khách hàng có dấu hiệu liên quan đến hoạt động phạm tội nên đã thực hiện biện pháp trì hoãn giao dịch theo đúng quy định pháp luật. Sau đó, khách hàng khiếu nại vì giao dịch bị chậm trễ và cho rằng tổ chức này phải bồi thường thiệt hại phát sinh. Trong trường hợp này, tổ chức tài chính sẽ được xử lý như thế nào theo quy định về phòng, chống rửa tiền?<br><br><b>Giải thích học thuật:</b> Khoản 4 Điều 44 Luật PCRT 2022 146. Theo quy định về phòng, chống rửa tiền, khi có quyết định của cơ quan nhà nước có thẩm quyền về việc phong tỏa tài khoản, niêm phong, phong tỏa hoặc tạm giữ tài sản, đối tượng báo cáo có trách nhiệm nào sau đây? sản theo quy định pháp luật<br><br><b>Giải thích học thuật:</b> Điều 45 Luật PCRT 2022. 147. Theo quy định pháp luật hiện hành về xử phạt vi phạm hành chính trong các lĩnh vực xây dựng, đất đai và kinh doanh bất động sản, mức phạt tiền tối đa đối với cá nhân vi phạm trong các lĩnh vực này là bao nhiêu?<br><br><b>Giải thích học thuật:</b> điểm i khoản 1 Điều 24 Luật XP VPHC 2012 148. Đối với tổ chức vi phạm hành chính trong lĩnh vực kinh doanh bất động sản, mức phạt tiền tối đa được xác định như thế nào?<br><br><b>Giải thích học thuật:</b> Khoản 2 Điều 24 Luật Xử lý vi phạm hành chính 149. Theo Nghị định 16/2022/NĐ-CP, hành vi vi phạm nào sau đây thuộc nhóm vi phạm trong kinh doanh bất động sản?<br><br><b>Giải thích học thuật:</b> Điểm b khoản 1 Điều 58 Nghị định 16/2022/NĐ-CP 150. Hành vi kinh doanh BĐS mà Hợp đồng kinh doanh bất động sản không được lập thành văn bản hoặc lập hợp đồng kinh doanh bất động sản không đầy đủ các nội dung chính theo quy định hoặc trái quy định của pháp luật<br><br><b>Giải thích học thuật:</b> Điểm c, khoản 1 Điều 58 Nghị định 16/2022/NĐ-CP. 151. Kinh doanh bất động sản mà bất động sản đó không đảm bảo đầy đủ các điều kiện theo quy định hoặc không được phép đưa vào kinh doanh theo quy định bị xử phạt:\nA. 200 - 300  triệu đồng<br><br><b>Giải thích học thuật:</b> Điểm a Khoản 3, Điều 58 Nghị định 16/2022/NĐ-CP. 152. Kinh doanh dịch vụ bất động sản mà không thành lập doanh nghiệp theo quy định hoặc không đủ số người có chứng chỉ hành nghề môi giới bất động sản theo quy định hoặc chứng chỉ hành nghề hết thời hạn sử dụng theo quy định bị xử phạt:<br><br><b>Giải thích học thuật:</b> Điểm a khoản 2 Điều 59 Nghị định 16/2022/NĐ-CP. 153. Kinh doanh dịch vụ môi giới bất động sản độc lập mà không có chứng chỉ hành nghề hoặc chứng chỉ hành nghề hết thời hạn sử dụng theo quy định bị phạt:\nA. 40 – 60 triệu đồng<br><br><b>Giải thích học thuật:</b> Điều a khoản 1 Điều 59 Nghị định 16/2022/NĐ-CP. 154. Không cung cấp, cung cấp không chính xác, không đầy đủ hoặc không đúng thời hạn kê khai thông tin, dữ liệu về thị trường bất động sản cho cơ quan quản lý hệ thống thông tin về nhà ở và thị trường bất động sản theo quy định:<br><br><b>Giải thích học thuật:</b> Điểm a ,Khoản 1, Điều 60 Nghị định 16/2022/NĐ-CP. 155. Xử phạt đối với hành vi không thực hiện thủ tục để điều chỉnh, gia hạn giấy phép xây dựng đối với xây dựng nhà ở riêng lẻ trong khu bảo tồn, khu di tích lịch sử - văn hóa hoặc công trình xây dựng khác:<br><br><b>Giải thích học thuật:</b> Điểm b khoản 3 Điều 16 Nghị định 16/2022/NĐ-CP. 156. Xử phạt hành vi tổ chức thi công xây dựng công trình không che chắn hoặc có che chắn nhưng để rơi vãi vật liệu xây dựng xuống các khu vực xung quanh hoặc để vật liệu xây dựng không đúng nơi quy định đối với xây dựng nhà ở riêng lẻ hoặc công trình xây dựng khác:<br><br><b>Giải thích học thuật:</b> Điểm a Khoản 1 Điều 16 Nghị định 16/2022/NĐ-CP. 157. Xử phạt đối với hành vi tổ chức thi công xây dựng công trình không có giấy phép xây dựng mà theo quy định phải có giấy phép xây dựng đối với xây dựng nhà ở riêng lẻ trong khu bảo tồn, khu di tích lịch sử - văn hóa hoặc công trình xây dựng khác;\nA. 60 – 80 triệu đồng<br><br><b>Giải thích học thuật:</b> điểm b Khoản 7, Điều 16 Nghị định 16/2022/NĐ-CP. 158. Vi phạm quy định về kinh doanh bất động sản, với mức phạt tiền từ 120.000.000 đồng đến 160.000.000 đồng đối với chủ đầu tư hoặc chủ sở hữu nhà, công trình xây dựng có một trong các hành vi nào sau đây: Đáp án: C Giải thích: Khoản 2 Điều 58 Nghị định 16/2022/NĐ-CP. 159. Thời hiệu xử phạt vi phạm hành chính trong lĩnh vực đất đai là:<br><br><b>Giải thích học thuật:</b> Khoản 1 Điều 3 Nghị định số 123/2024/NĐ-CP ngày 4/10/2024 của Chính phủ quy định về xử phạt vi phạm hành chính trong lĩnh vực đất đai 160. Theo Luật Xử lý vi phạm hành chính, cá nhân có quyền gì trong quá trình xử lý vi phạm hành chính?<br><br><b>Giải thích học thuật:</b> Khoản 2 Điều 15 Luật Xử lý vi phạm hành chính năm 2012 161. Xu hướng phát triển nào của thị trường bất động sản được coi là tất yếu trong bối cảnh toàn cầu hóa và công nghiệp 4.0?<br><br><b>Giải thích học thuật:</b> Trong bối cảnh toàn cầu hóa và công nghiệp 4.0, bất động sản phát triển theo hướng ứng dụng công nghệ (Proptech), chuyển đổi số và phát triển xanh – thông minh. Đây là xu hướng chung và tất yếu của thị trường hiện đại. 162. Thị trường bất động sản thường được phân loại theo cấp độ nào?<br><br><b>Giải thích học thuật:</b> Thị trường bất động sản thường được chia thành thị trường sơ cấp (giao dịch lần đầu) và thị trường thứ cấp (giao dịch lại), đây là cách phân loại cơ bản theo cấp độ hình thành giao dịch. 163. Yếu tố kinh tế nào sau đây có tác động lớn nhất đến tổng cầu và khả năng chi trả của người mua trên thị trường bất động sản?<br><br><b>Giải thích học thuật:</b> Các yếu tố như GDP, lạm phát và thu nhập bình quân đầu người phản ánh trực tiếp sức mua và khả năng chi trả của người dân, từ đó tác động mạnh nhất đến tổng cầu bất động sản. 164. Vai trò của Chính phủ (Nhà nước) đối với thị trường bất động sản được thể hiện rõ nhất qua hoạt động nào sau đây?<br><br><b>Giải thích học thuật:</b> Vai trò của Nhà nước đối với thị trường bất động sản thể hiện rõ nhất ở việc quản lý vĩ mô, gồm: Quy hoạch, kế hoạch sử dụng đất; Điều tiết cung – cầu thị trường; Sử dụng công cụ pháp luật, thuế, tài chính để định hướng thị trường. Đây là cách Nhà nước điều tiết và định hướng thị trường, không tham gia trực tiếp kinh doanh. 165. Thị trường thứ cấp trong thị trường bất động sản là gì?<br><br><b>Giải thích học thuật:</b> Thị trường thứ cấp là nơi diễn ra các giao dịch mua bán lại bất động sản đã từng được giao dịch ở thị trường sơ cấp, tức là giữa các cá nhân, tổ chức với nhau. Đây là đặc trưng cốt lõi của thị trường thứ cấp. 166. Tính chất nào của bất động sản khiến thị trường này mang tính cục bộ (local market)?<br><br><b>Giải thích học thuật:</b> Bất động sản mang tính cố định về vị trí, không thể di chuyển, nên giá trị và giao dịch phụ thuộc rất lớn vào từng khu vực cụ thể → tạo ra tính cục bộ (local market) của thị trường. 167. Trước khi đưa bất động sản, dự án bất động sản vào kinh doanh, doanh nghiệp kinh doanh bất động sản phải công khai đầy đủ, trung thực và chính xác thông tin ở những kênh nào?<br><br><b>Giải thích học thuật:</b> Theo quy định pháp luật về kinh doanh bất động sản, doanh nghiệp phải công khai thông tin minh bạch trên hệ thống thông tin nhà ở và thị trường BĐS của Nhà nước và đồng thời trên website của doanh nghiệp trước khi đưa bất động sản/dự án vào kinh doanh.  Đây là yêu cầu bắt buộc nhằm đảm bảo tính công khai, minh bạch của thị trường. 168.  Đơn vị nào được giao nhiệm vụ tổ chức điều tra, xây dựng và quản lý hệ thống thông tin, cơ sở dữ liệu về nhà ở và thị trường bất động sản?<br><br><b>Giải thích học thuật:</b> Theo quy định pháp luật về nhà ở và kinh doanh bất động sản, Bộ Xây dựng là cơ quan được giao chủ trì việc tổ chức điều tra, xây dựng và quản lý hệ thống thông tin, cơ sở dữ liệu về nhà ở và thị trường bất động sản trên phạm vi cả nước. Các bộ ngành khác chỉ phối hợp hoặc quản lý lĩnh vực liên quan (đất đai, thống kê, tiền tệ), không trực tiếp quản lý hệ thống dữ liệu thị trường BĐS. 169. Nội dung thông tin về nhà ở và thị trường bất động sản bao gồm thông tin về loại nào sau đây?<br><br><b>Giải thích học thuật:</b> Theo quy định về hệ thống thông tin nhà ở và thị trường bất động sản, nội dung thông tin bắt buộc bao gồm quy hoạch, kế hoạch sử dụng đất và quy hoạch xây dựng vì đây là yếu tố nền tảng ảnh hưởng trực tiếp đến phát triển và thị trường bất động sản. 170. Theo quy định của pháp luật dân sự Việt Nam, tài sản nào sau đây KHÔNG phải là bất động sản?<br><br><b>Giải thích học thuật:</b> Khoản 1 Điều 107 Bộ luật Dân sự 2015. 171.  Đặc điểm nào sau đây thể hiện tính chất đặc thù về mặt vật chất của bất động sản, khiến nó khác biệt hoàn toàn với động sản?<br><br><b>Giải thích học thuật:</b> Thuộc tính tự nhiên cố định không thể di dời của đất đai và các tài sản gắn liền với đất. 172.  Thị trường bất động sản có mối quan hệ trực tiếp và tác động mạnh mẽ nhất đến thị trường nào sau đây trong hệ thống kinh tế vĩ mô?<br><br><b>Giải thích học thuật:</b> Luật Các tổ chức tín dụng 2024 quy định về hoạt động cấp tín dụng và bảo đảm bằng tài sản (bất động sản chiếm tỷ trọng lớn trong tài sản thế chấp). 173.  Theo Luật Kinh doanh bất động sản 2023, hoạt động nào sau đây thuộc phạm vi kinh doanh bất động sản?<br><br><b>Giải thích học thuật:</b> Khoản 1 Điều 3 Luật Kinh doanh bất động sản 2023. 174.  Một trong những tính chất đặc trưng mang tính cục bộ của thị trường bất động sản là:<br><br><b>Giải thích học thuật:</b> Đặc tính cố định của đất đai quy định tính địa phương của thị trường, hàng hóa không thể dịch chuyển từ nơi này sang nơi khác. 175.  Điều kiện đối với nhà ở, công trình xây dựng có sẵn đưa vào kinh doanh theo Luật mới nhất quy định yếu tố nào sau đây?<br><br><b>Giải thích học thuật:</b> Điểm c, điểm đ khoản 1 Điều 14 Luật Kinh doanh BĐS 2023. 176. Thị trường bất động sản phi chính thức được hiểu là thị trường diễn ra các hoạt động nào? hiện đầy đủ thủ tục đăng ký biến động theo pháp luật.<br><br><b>Giải thích học thuật:</b> Điều 11 Luật Đất đai 2024 quy định về các hành vi bị nghiêm cấm (không đăng ký quyền sử dụng đất). 177. Việc phân loại phân khúc bất động sản theo tiêu chuẩn kỹ thuật (Hạng A, Hạng B, Hạng C) thường được áp dụng phổ biến và có quy định hướng dẫn cụ thể nhất ở loại hình nào?<br><br><b>Giải thích học thuật:</b> Quy định phân hạng nhà chung cư của Bộ Xây dựng theo Điều 143 Luật Nhà ở. 178. Trong thị trường bất động sản, vì sao nguồn cung bất động sản thường có độ trễ lớn so với nhu cầu của thị trường?<br><br><b>Giải thích học thuật:</b> Điều 14 Luật Kinh doanh bất động sản 2023 – quy định về điều kiện của bất động sản đưa vào kinh doanh, theo đó bất động sản chỉ được đưa vào kinh doanh khi đáp ứng đầy đủ điều kiện pháp lý, dẫn đến thời gian hình thành và đưa ra thị trường kéo dài. 179.  Yếu tố nào sau đây quyết định tính ‘Cầu có khả năng thanh toán’ (Effective Demand) trên thị trường bất động sản nhà ở? tín dụng ngân hàng.<br><br><b>Giải thích học thuật:</b> Nguyên lý Kinh tế học vĩ mô về cấu thành lực lượng Cầu trên thị trường. 180. Chủ thể nào sau đây tham gia thị trường bất động sản với tư cách là bên trung gian giao dịch theo quy định của pháp luật hiện hành?<br><br><b>Giải thích học thuật:</b> Khoản 2 Điều 3 Luật KD BĐS 2023 181. Trong thị trường quyền sử dụng đất, việc chuyển quyền sử dụng đất được hiểu như thế nào theo quy định pháp luật hiện hành?<br><br><b>Giải thích học thuật:</b> Khoản 3 Điều 12 Luật Đất đai 2024. 182.  Xu hướng dịch chuyển dòng vốn đầu tư và dòng dân cư từ các khu vực lõi đô thị trung tâm (như TP.HCM, Hà Nội) ra các địa phương phụ cận được gọi là gì?<br><br><b>Giải thích học thuật:</b> Quy hoạch tổng thể quốc gia thời kỳ 2021 - 2030, tầm nhìn đến năm 2050 nhằm giảm tải áp lực hạ tầng đô thị lớn. 183. Trong thị trường bất động sản, khi Nhà nước thực hiện biện pháp điều tiết trong trường hợp thị trường có diễn biến phức tạp ảnh hưởng đến ổn định kinh tế – xã hội, việc điều tiết phải bảo đảm nguyên tắc nào sau đây?<br><br><b>Giải thích học thuật:</b> Khoản 2 Điều 77 Luật Kinh doanh bất động sản 2023. 184. Trong quản lý nhà nước về kinh doanh bất động sản, cơ quan nào giữ vai trò đầu mối giúp Chính phủ thống nhất thực hiện quản lý lĩnh vực này trên phạm vi cả nước?<br><br><b>Giải thích học thuật:</b> Khoản 2 Điều 81 Luật Kinh doanh bất động sản 2023. 185. Trong hoạt động thẩm định giá, nhóm đối tượng nào sau đây không được phép hành nghề thẩm định giá theo quy định pháp luật hiện hành?<br><br><b>Giải thích học thuật:</b> Khoản 2 Điều 45 Luật Giá 2023. 186. Các phương pháp định giá đất bao gồm:<br><br><b>Giải thích học thuật:</b> Khoản 5 Điều 158 Luật Đất đai 2024 187. Trong thị trường bất động sản, việc xây dựng bảng giá đất được thực hiện theo nguyên tắc nào sau đây theo quy định pháp luật hiện hành?<br><br><b>Giải thích học thuật:</b> Khoản 2 Điều 159 Luật Đất đai 2024. 188. Một doanh nghiệp thẩm định giá có thể bị thu hồi Giấy chứng nhận đủ điều kiện kinh doanh nếu không phát hành chứng thư thẩm định giá, báo cáo thẩm định giá trong:<br><br><b>Giải thích học thuật:</b> Điểm b Khoản 2 Điều 54 Luật Giá 2023 quy định một trong các trường hợp bị thu hồi giấy chứng nhận là \" Không phát hành chứng thư thẩm định giá, báo cáo thẩm định giá trong 12 tháng liên tục \". 189. Cơ quan nhà nước có thẩm quyền định giá thực hiện định giá theo các hình thức nào sau đây:<br><br><b>Giải thích học thuật:</b> Khoản 2 Điều 21 Luật Giá

ậy.", "B": "Có thể có khoảng cách giữa các tuyên bố chính sách, các chỉ số báo cáo mang tính hình thức và tác động thực tế đến cộng đồng, đặc biệt là các nhóm dễ bị tổn thương như phụ nữ dân tộc thiểu số, nếu việc đánh giá tác động và tham vấn không được thực hiện kỹ lưỡng. [102, 106, 2029, 2030]", "C": "Phụ nữ và trẻ em không phải là đối tượng cần quan tâm trong báo cáo ESG.", "D": "Trách nhiệm giới chỉ liên quan đến việc tuyển dụng lao động nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thực hành kinh doanh có trách nhiệm giới và báo cáo ESG thực chất đòi hỏi phải xem xét toàn diện các tác động (cả tích cực và tiêu cực) của hoạt động doanh nghiệp lên các nhóm giới khác nhau, đảm bảo sự tham gia và cơ chế giải quyết khiếu nại, chứ không chỉ dừng lại ở các chỉ số bề ngoài. [102, 106, 2029, 2030]"}, {"level": "1", "content": "Tình huống: Một công ty khai khoáng lớn hoạt động tại một địa phương có đông đồng bào dân tộc thiểu số. Công ty cam kết thực hiện các \"thực hành kinh doanh có trách nhiệm giới\" và báo cáo ESG hàng năm. Tuy nhiên, phân tích thực tế cho thấy, mặc dù công ty có tuyển dụng một số lao động nữ địa phương vào các công việc phổ thông, nhưng các tác động tiêu cực từ hoạt động khai khoáng (ô nhiễm nguồn nước, bụi, mất đất canh tác) lại ảnh hưởng nặng nề đến sức khỏe và sinh kế của phụ nữ và trẻ em trong cộng đồng, và họ ít được tham gia vào các cơ chế giám sát hay chia sẻ lợi ích. Nếu một tổ chức xã hội dân sự muốn \"giám sát độc lập\" [90] việc thực hiện cam kết trách nhiệm giới của công ty này, họ KHÔNG nên chỉ dựa vào nguồn thông tin nào?", "options": {"A": "Báo cáo ESG và các thông tin công khai của công ty.", "B": "Phỏng vấn trực tiếp phụ nữ và các thành viên cộng đồng bị ảnh hưởng.", "C": "Phân tích dữ liệu về sức khỏe và môi trường từ các cơ quan độc lập.", "D": "Chỉ dựa vào cam kết và báo cáo do chính công ty cung cấp mà không có sự kiểm chứng từ các nguồn khác. [90, 91]"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Giám sát độc lập đòi hỏi phải thu thập và đối chiếu thông tin từ nhiều nguồn, đặc biệt là từ những người trực tiếp bị ảnh hưởng và các nguồn dữ liệu khách quan, chứ không chỉ dựa vào thông tin một chiều từ phía doanh nghiệp. [90, 91]"}, {"level": "1", "content": "Tình huống: Một công ty khai khoáng lớn hoạt động tại một địa phương có đông đồng bào dân tộc thiểu số. Công ty cam kết thực hiện các \"thực hành kinh doanh có trách nhiệm giới\" và báo cáo ESG hàng năm. Tuy nhiên, phân tích thực tế cho thấy, mặc dù công ty có tuyển dụng một số lao động nữ địa phương vào các công việc phổ thông, nhưng các tác động tiêu cực từ hoạt động khai khoáng (ô nhiễm nguồn nước, bụi, mất đất canh tác) lại ảnh hưởng nặng nề đến sức khỏe và sinh kế của phụ nữ và trẻ em trong cộng đồng, và họ ít được tham gia vào các cơ chế giám sát hay chia sẻ lợi ích. Theo quan điểm \"trao quyền chính trị cho phụ nữ\" [20, 21], để giải quyết tình trạng phụ nữ ít được tham gia vào cơ chế giám sát và chia sẻ lợi ích, cần phải làm gì bên cạnh việc công ty cải thiện chính sách?", "options": {"A": "Chỉ cần tăng số tiền bồi thường cho những người bị ảnh hưởng.", "B": "Nhà nước và các tổ chức cần tạo cơ chế và hỗ trợ để phụ nữ trong cộng đồng có thể tham gia một cách thực chất vào việc giám sát hoạt động của công ty, đàm phán về chia sẻ lợi ích, và có tiếng nói trong các quyết định ảnh hưởng đến họ. [20, 21, 77]", "C": "Yêu cầu công ty ngừng hoạt động khai khoáng.", "D": "Chỉ tập trung vào việc nâng cao nhận thức cho lãnh đạo công ty."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trao quyền chính trị bao gồm việc đảm bảo sự tham gia có ý nghĩa của phụ nữ vào các quy trình ra quyết định và giám sát ở cấp độ cộng đồng và địa phương, để họ có thể bảo vệ quyền lợi của mình. [20, 21, 77]"}, {"level": "1", "content": "Tình huống: Một trường đại học có ngành Quản lý Tài nguyên và Môi trường. Nhận thấy tầm quan trọng của bình đẳng giới, khoa quyết định lồng ghép nội dung giới vào chương trình giảng dạy. Tuy nhiên, việc lồng ghép chủ yếu dừng lại ở việc thêm một vài bài giảng lý thuyết về \"Giới và Phát triển\" trong một môn học đại cương, ít có các hoạt động nghiên cứu thực tế hoặc các dự án ứng dụng liên quan đến giới cho sinh viên. Cách tiếp cận lồng ghép giới này của khoa có thể gặp hạn chế gì trong việc \"đào tạo nguồn nhân lực có kiến thức về giới\"?", "options": {"A": "Sinh viên sẽ trở nên quá chuyên sâu về các vấn đề giới mà quên kiến thức chuyên ngành.", "B": "Việc chỉ cung cấp lý thuyết cơ bản mà thiếu các ví dụ thực tế, nghiên cứu ứng dụng và cơ hội thực hành có thể khiến kiến thức về giới của sinh viên không sâu sắc, khó vận dụng vào giải quyết các vấn đề phức tạp của ngành TN&MT sau khi ra trường. [120]", "C": "Sinh viên sẽ không hứng thú với các bài giảng lý thuyết về giới.", "D": "Không có hạn chế gì, đây là cách lồng ghép hiệu quả nhất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Để sinh viên thực sự hiểu và có khả năng áp dụng kiến thức về giới, việc lồng ghép cần sâu rộng hơn, bao gồm cả nghiên cứu, thực hành và phân tích các tình huống thực tế, chứ không chỉ dừng lại ở lý thuyết. [120]"}, {"level": "1", "content": "Tình huống: Một trường đại học có ngành Quản lý Tài nguyên và Môi trường. Nhận thấy tầm quan trọng của bình đẳng giới, khoa quyết định lồng ghép nội dung giới vào chương trình giảng dạy. Tuy nhiên, việc lồng ghép chủ yếu dừng lại ở việc thêm một vài bài giảng lý thuyết về \"Giới và Phát triển\" trong một môn học đại cương, ít có các hoạt động nghiên cứu thực tế hoặc các dự án ứng dụng liên quan đến giới cho sinh viên. Một \"ý tưởng nghiên cứu khoa học tiềm năng\" mà sinh viên ngành này có thể thực hiện để làm sâu sắc thêm hiểu biết về giới trong lĩnh vực của mình là gì?", "options": {"A": "Nghiên cứu về các loại đất hiếm ở Việt Nam.", "B": "Đánh giá tác động giới của một chính sách cụ thể về quản lý chất thải rắn sinh hoạt tại một phường/xã, phân tích vai trò, gánh nặng và khả năng hưởng lợi của nam và nữ. [, 226]", "C": "Phân tích thành phần hóa học của nước thải công nghiệp.", "D": "Nghiên cứu lịch sử hình thành các vườn quốc gia."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đề tài này trực tiếp liên quan đến việc áp dụng lăng kính giới vào một vấn đề cụ thể của ngành TN&MT, đòi hỏi phân tích vai trò, tác động khác biệt và có thể đưa ra các khuyến nghị chính sách. [, 226]"}, {"level": "1", "content": "Tình huống: Một trường đại học có ngành Quản lý Tài nguyên và Môi trường. Nhận thấy tầm quan trọng của bình đẳng giới, khoa quyết định lồng ghép nội dung giới vào chương trình giảng dạy. Tuy nhiên, việc lồng ghép chủ yếu dừng lại ở việc thêm một vài bài giảng lý thuyết về \"Giới và Phát triển\" trong một môn học đại cương, ít có các hoạt động nghiên cứu thực tế hoặc các dự án ứng dụng liên quan đến giới cho sinh viên. Để việc lồng ghép giới vào đào tạo sinh viên ngành TN&MT thực sự hiệu quả và \"truyền cảm hứng\", khoa nên xem xét biện pháp nào sau đây bên cạnh các bài giảng lý thuyết?", "options": {"A": "Giảm bớt các môn học chuyên ngành để có thêm thời gian cho các môn về giới.", "B": "Khuyến khích và tạo điều kiện cho sinh viên tham gia các dự án nghiên cứu ứng dụng về giới và TN&MT, tổ chức các buổi nói chuyện với các nhà hoạt động, nữ lãnh đạo trong lĩnh vực này, và tích hợp các nghiên cứu tình huống thực tế vào bài giảng.", "C": "Yêu cầu tất cả các bài tập lớn đều phải có ít nhất 50% nội dung về giới.", "D": "Chỉ tập trung vào việc dạy các kỹ năng kỹ thuật thuần túy."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc kết hợp lý thuyết với thực hành, nghiên cứu ứng dụng và tiếp xúc với các hình mẫu thực tế sẽ giúp sinh viên hiểu sâu hơn, có cảm hứng và thấy được sự liên quan của các vấn đề giới đến chuyên ngành của mình."}, {"level": "1", "content": "Tình huống: Một dự án phát triển nông nghiệp hữu cơ quy mô lớn được triển khai, nhằm mục tiêu xuất khẩu. Dự án yêu cầu nông dân tuân thủ các quy trình kỹ thuật nghiêm ngặt và thường xuyên có các đợt thanh tra, giám sát của đơn vị chứng nhận. Phân tích ban đầu cho thấy phụ nữ là người thực hiện phần lớn các công việc tỉ mỉ, đòi hỏi sự kiên nhẫn trong canh tác hữu cơ, nhưng các buổi làm việc với đơn vị chứng nhận và các quyết định liên quan đến hợp đồng lại thường do nam giới (chủ hộ) đảm nhiệm. Tình huống này tiềm ẩn nguy cơ gì đối với tính bền vững và công bằng của dự án nông nghiệp hữu cơ?", "options": {"A": "Chất lượng sản phẩm hữu cơ sẽ không được đảm bảo.", "B": "Kiến thức và kinh nghiệm của phụ nữ (người trực tiếp canh tác) có thể không được phản ánh đầy đủ trong quá trình tuân thủ và cải tiến quy trình; họ có thể không nắm rõ các yêu cầu của hợp đồng hoặc không được hưởng lợi tương xứng từ giá trị gia tăng của sản phẩm hữu cơ. [2330, 2331, 2370, 2460]", "C": "Dự án sẽ không thể xuất khẩu được sản phẩm.", "D": "Nam giới sẽ không muốn tham gia vào dự án."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nếu những người trực tiếp thực hiện các công việc quan trọng không được tham gia vào quá trình ra quyết định và không hiểu rõ các yêu cầu, cam kết, thì tính bền vững của quy trình sản xuất và sự công bằng trong chia sẻ lợi ích sẽ bị ảnh hưởng. [2330, 2331, 2370, 2460]"}, {"level": "1", "content": "Tình huống: Một dự án phát triển nông nghiệp hữu cơ quy mô lớn được triển khai, nhằm mục tiêu xuất khẩu. Dự án yêu cầu nông dân tuân thủ các quy trình kỹ thuật nghiêm ngặt và thường xuyên có các đợt thanh tra, giám sát của đơn vị chứng nhận. Phân tích ban đầu cho thấy phụ nữ là người thực hiện phần lớn các công việc tỉ mỉ, đòi hỏi sự kiên nhẫn trong canh tác hữu cơ, nhưng các buổi làm việc với đơn vị chứng nhận và các quyết định liên quan đến hợp đồng lại thường do nam giới (chủ hộ) đảm nhiệm. Nếu áp dụng Khung Ba vai trò của Moser, việc phụ nữ thực hiện phần lớn công việc canh tác hữu cơ tỉ mỉ (vai trò sản xuất) nhưng ít tham gia vào các quyết định hợp đồng (liên quan đến vai trò quản lý/cộng đồng ở một mức độ nào đó) có thể dẫn đến điều gì?", "options": {"A": "Họ sẽ có nhiều thời gian hơn cho vai trò tái sản xuất.", "B": "Có sự mất cân bằng trong việc thực hiện các vai trò và hưởng lợi từ các vai trò đó; họ có thể làm nhiều nhưng lại ít có quyền quyết định về thành quả lao động của mình. [931, 932, 935, 941]", "C": "Họ sẽ trở thành những chuyên gia kỹ thuật hàng đầu.", "D": "Vai trò sản xuất của họ sẽ được đánh giá cao hơn vai trò của nam giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khung Moser sẽ làm nổi bật sự mất cân đối này, nơi phụ nữ đóng góp lớn vào sản xuất nhưng lại bị hạn chế trong việc kiểm soát và hưởng lợi từ các quyết định chiến lược liên quan đến sản phẩm đó. [931, 932, 935, 941]"}, {"level": "1", "content": "Tình huống: Một dự án phát triển nông nghiệp hữu cơ quy mô lớn được triển khai, nhằm mục tiêu xuất khẩu. Dự án yêu cầu nông dân tuân thủ các quy trình kỹ thuật nghiêm ngặt và thường xuyên có các đợt thanh tra, giám sát của đơn vị chứng nhận. Phân tích ban đầu cho thấy phụ nữ là người thực hiện phần lớn các công việc tỉ mỉ, đòi hỏi sự kiên nhẫn trong canh tác hữu cơ, nhưng các buổi làm việc với đơn vị chứng nhận và các quyết định liên quan đến hợp đồng lại thường do nam giới (chủ hộ) đảm nhiệm. Để tăng cường sự tham gia có ý nghĩa của phụ nữ và đảm bảo tính công bằng trong dự án này, đơn vị chứng nhận và ban quản lý dự án nên:", "options": {"A": "Chỉ làm việc với các chủ hộ là nam giới để tiết kiệm thời gian.", "B": "Tổ chức các buổi tập huấn và phổ biến thông tin về quy trình chứng nhận, nội dung hợp đồng bằng ngôn ngữ dễ hiểu, có sự tham gia của cả nam và nữ; đồng thời khuyến khích thành lập các nhóm nữ nông dân để tăng cường tiếng nói và khả năng đàm phán của họ. [2003, 2004, 2168, 2290]", "C": "Yêu cầu phụ nữ phải tự học hỏi tất cả các quy trình kỹ thuật phức tạp.", "D": "Giảm bớt các yêu cầu về chất lượng sản phẩm hữu cơ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các biện pháp này nhằm đảm bảo phụ nữ được thông tin đầy đủ, có năng lực để tham gia và có tiếng nói trong các quyết định quan trọng, từ đó đảm bảo sự công bằng và hiệu quả của dự án. [2003, 2004, 2168, 2290]"}, {"level": "1", "content": "Tình huống: Một tổ chức xã hội dân sự thực hiện \"Đánh giá người hưởng lợi có nhạy cảm giới\" cho một dự án cung cấp bếp đun cải tiến tiết kiệm nhiên liệu cho các hộ gia đình ở miền núi. Kết quả cho thấy, mặc dù phụ nữ rất phấn khởi vì bếp mới giúp giảm khói và tiết kiệm củi, nhưng nhiều người chồng lại tỏ ra không mấy quan tâm hoặc thậm chí không cho phép vợ sử dụng thường xuyên vì cho rằng \"bếp truyền thống nấu ăn ngon hơn\" hoặc \"việc bếp núc là của đàn bà, không cần tốn kém thay đổi\". Thái độ của những người chồng trong tình huống này phản ánh điều gì là chủ yếu?", "options": {"A": "Họ có khẩu vị ẩm thực tinh tế hơn.", "B": "Các định kiến giới về vai trò nội trợ của phụ nữ, sự bảo thủ trước cái mới, và có thể là sự thiếu hiểu biết về lợi ích của bếp cải tiến (giảm khói, tiết kiệm nhiên liệu, bảo vệ sức khỏe). [59, 60, 210]", "C": "Bếp cải tiến thực sự không hiệu quả bằng bếp truyền thống.", "D": "Phụ nữ không biết cách sử dụng bếp mới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thái độ này thường bắt nguồn từ các khuôn mẫu giới đã ăn sâu (việc bếp núc là của phụ nữ, nam giới ít can thiệp hoặc không thấy đó là vấn đề của mình) và sự e ngại thay đổi thói quen, cũng như thiếu thông tin về lợi ích. [59, 60, 210]"}, {"level": "1", "content": "Tình huống: Một tổ chức xã hội dân sự thực hiện \"Đánh giá người hưởng lợi có nhạy cảm giới\" cho một dự án cung cấp bếp đun cải tiến tiết kiệm nhiên liệu cho các hộ gia đình ở miền núi. Kết quả cho thấy, mặc dù phụ nữ rất phấn khởi vì bếp mới giúp giảm khói và tiết kiệm củi, nhưng nhiều người chồng lại tỏ ra không mấy quan tâm hoặc thậm chí không cho phép vợ sử dụng thường xuyên vì cho rằng \"bếp truyền thống nấu ăn ngon hơn\" hoặc \"việc bếp núc là của đàn bà, không cần tốn kém thay đổi\". Nếu dự án chỉ tập trung vào việc cung cấp bếp cho phụ nữ mà không có các hoạt động tác động đến nam giới, nguy cơ nào có thể xảy ra?", "options": {"A": "Tất cả các bếp mới sẽ được sử dụng hiệu quả và bền vững.", "B": "Bếp mới có thể không được sử dụng thường xuyên hoặc không được bảo quản tốt do thiếu sự đồng thuận và ủng hộ từ nam giới trong gia đình, làm giảm hiệu quả và tính bền vững của dự án. [2183]", "C": "Nam giới sẽ tự động học cách sử dụng bếp mới.", "D": "Mâu thuẫn gia đình sẽ hoàn toàn biến mất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự chấp nhận và sử dụng bền vững một công nghệ mới trong gia đình thường đòi hỏi sự đồng thuận và thay đổi hành vi của tất cả các thành viên có ảnh hưởng, đặc biệt là nam giới nếu họ có vai trò ra quyết định hoặc có thái độ bảo thủ. [2183]"}, {"level": "1", "content": "Tình huống: Một tổ chức xã hội dân sự thực hiện \"Đánh giá người hưởng lợi có nhạy cảm giới\" cho một dự án cung cấp bếp đun cải tiến tiết kiệm nhiên liệu cho các hộ gia đình ở miền núi. Kết quả cho thấy, mặc dù phụ nữ rất phấn khởi vì bếp mới giúp giảm khói và tiết kiệm củi, nhưng nhiều người chồng lại tỏ ra không mấy quan tâm hoặc thậm chí không cho phép vợ sử dụng thường xuyên vì cho rằng \"bếp truyền thống nấu ăn ngon hơn\" hoặc \"việc bếp núc là của đàn bà, không cần tốn kém thay đổi\". Để dự án bếp cải tiến này thành công hơn và thực sự mang lại lợi ích cho phụ nữ, một chiến lược quan trọng trong giai đoạn triển khai nên bao gồm:", "options": {"A": "Chỉ phát bếp cho những gia đình có người chồng đồng ý ngay từ đầu.", "B": "Tổ chức các buổi truyền thông, trình diễn nấu ăn và chia sẻ kinh nghiệm có sự tham gia của cả nam và nữ, nhấn mạnh lợi ích về sức khỏe, tiết kiệm thời gian và nhiên liệu cho cả gia đình, đồng thời vận động nam giới ủng hộ và chia sẻ trách nhiệm bếp núc. [68, 236]", "C": "Yêu cầu phụ nữ phải tự thuyết phục chồng mình.", "D": "Chỉ cung cấp loại bếp đắt tiền nhất để đảm bảo chất lượng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc tác động đến nhận thức và hành vi của cả nam giới, thu hút họ tham gia và thấy được lợi ích chung sẽ làm tăng khả năng chấp nhận và sử dụng bền vững công nghệ mới, đồng thời thúc đẩy sự chia sẻ công bằng hơn trong gia đình. [68, 236]"}, {"level": "1", "content": "Tình huống: Trong một hội thảo về \"Lồng ghép giới vào chính sách biến đổi khí hậu (BĐKH)\", một cán bộ hoạch định chính sách cho rằng: \"Chính sách BĐKH của chúng tôi là trung tính về giới, vì các biện pháp kỹ thuật như xây đê kè, trồng rừng ngập mặn đều mang lại lợi ích bảo vệ chung cho cả cộng đồng, không phân biệt nam nữ.\" Quan điểm này thể hiện một sự hiểu biết chưa đầy đủ về lồng ghép giới vì:", "options": {"A": "Nó hoàn toàn chính xác, các biện pháp kỹ thuật luôn trung tính về giới.", "B": "Mặc dù lợi ích bảo vệ chung có thể có, nhưng các biện pháp này có thể có tác động khác nhau đến sinh kế, gánh nặng công việc, khả năng tiếp cận nguồn lực và sự an toàn của nam và nữ; đồng thời, quá trình ra quyết định và hưởng lợi từ các biện pháp này cũng có thể không bình đẳng. [41, 42, 43, 2790, 2799]", "C": "Chỉ có các chính sách xã hội mới cần lồng ghép giới, chính sách kỹ thuật thì không.", "D": "Lồng ghép giới chỉ có nghĩa là đảm bảo số lượng nam nữ tham gia như nhau."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Ngay cả các biện pháp kỹ thuật tưởng chừng \"trung tính\" cũng có thể có những tác động giới khác biệt do các vai trò, vị thế và điểm yếu khác nhau của nam và nữ trong xã hội. Lồng ghép giới đòi hỏi phải phân tích những tác động này. [41, 42, 43, 2790, 2799]"}, {"level": "1", "content": "Tình huống: Trong một hội thảo về \"Lồng ghép giới vào chính sách biến đổi khí hậu (BĐKH)\", một cán bộ hoạch định chính sách cho rằng: \"Chính sách BĐKH của chúng tôi là trung tính về giới, vì các biện pháp kỹ thuật như xây đê kè, trồng rừng ngập mặn đều mang lại lợi ích bảo vệ chung cho cả cộng đồng, không phân biệt nam nữ.\" Để phản biện lại quan điểm trên, một nhà phân tích giới có thể đưa ra ví dụ nào sau đây?", "options": {"A": "Việc xây đê kè luôn giúp tất cả ngư dân ven biển yên tâm ra khơi.", "B": "Việc trồng rừng ngập mặn có thể làm mất đi các bãi triều nơi phụ nữ thường khai thác hải sản nhỏ lẻ để kiếm sống, nếu không có các biện pháp hỗ trợ sinh kế thay thế cho họ. [4, 208, 2317]", "C": "Tất cả người dân đều được hưởng lợi như nhau từ không khí trong lành do rừng ngập mặn mang lại.", "D": "Chi phí xây dựng đê kè luôn được phân bổ công bằng cho mọi người."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Ví dụ này cho thấy một biện pháp có mục tiêu môi trường tốt (trồng rừng ngập mặn) nhưng có thể gây tác động tiêu cực đến sinh kế của một nhóm giới cụ thể (phụ nữ khai thác hải sản ven bờ) nếu không được xem xét kỹ lưỡng từ góc độ giới. [4, 208, 2317]"}, {"level": "1", "content": "Tình huống: Trong một hội thảo về \"Lồng ghép giới vào chính sách biến đổi khí hậu (BĐKH)\", một cán bộ hoạch định chính sách cho rằng: \"Chính sách BĐKH của chúng tôi là trung tính về giới, vì các biện pháp kỹ thuật như xây đê kè, trồng rừng ngập mặn đều mang lại lợi ích bảo vệ chung cho cả cộng đồng, không phân biệt nam nữ.\" \"Thông tư số 06/2023/TT-BTNMT hướng dẫn lồng ghép nội dung ứng phó với BĐKH vào chiến lược, quy hoạch có yêu cầu 'thúc đẩy bình đẳng giới' như một nguyên tắc\" [23]. Điều này có ý nghĩa gì đối với quan điểm \"trung tính về giới\" của vị cán bộ trên?", "options": {"A": "Nó khẳng định rằng quan điểm của vị cán bộ là hoàn toàn đúng đắn.", "B": "Nó cho thấy rằng ở cấp độ chính sách cao hơn, Nhà nước đã thừa nhận sự cần thiết phải xem xét và thúc đẩy bình đẳng giới trong các hành động ứng phó với BĐKH, đòi hỏi các chính sách và biện pháp cụ thể phải vượt ra ngoài quan điểm \"trung tính\" để thực sự nhạy cảm và đáp ứng giới. [23, 37, 38]", "C": "Nó chỉ áp dụng cho các dự án do quốc tế tài trợ.", "D": "Nó không liên quan gì đến các biện pháp kỹ thuật như xây đê kè."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc một văn bản quy phạm pháp luật chính thức yêu cầu \"thúc đẩy bình đẳng giới\" trong lồng ghép BĐKH cho thấy một sự chuyển dịch từ quan điểm \"trung tính\" sang một cách tiếp cận chủ động hơn, đòi hỏi phải phân tích và giải quyết các tác động giới. [23, 37, 38]"}, {"level": "1", "content": "Tình huống: Một doanh nghiệp sản xuất hàng may mặc xuất khẩu áp dụng các tiêu chuẩn ESG (Môi trường, Xã hội, Quản trị) và tự hào về việc có tỷ lệ lao động nữ cao. Tuy nhiên, kiểm tra thực tế cho thấy phụ nữ chủ yếu làm ở các công đoạn sản xuất trực tiếp, lương thấp, ít cơ hội đào tạo nâng cao và hầu như không có đại diện trong ban lãnh đạo hay công đoàn. Các vấn đề về quấy rối tình dục tại nơi làm việc cũng chưa được giải quyết triệt để. Việc doanh nghiệp chỉ tập trung vào chỉ số \"tỷ lệ lao động nữ cao\" mà bỏ qua các khía cạnh khác cho thấy điều gì về việc thực hiện ESG của họ?", "options": {"A": "Họ đã thực hiện ESG một cách rất toàn diện và hiệu quả.", "B": "Có thể họ đang thực hiện ESG một cách hình thức, chỉ chú trọng đến các chỉ số dễ đo lường bề ngoài mà chưa giải quyết các vấn đề bất bình đẳng giới mang tính cấu trúc và chất lượng công việc thực tế của lao động nữ. [99, 100, 102, 106]", "C": "Tỷ lệ lao động nữ cao là đủ để chứng minh bình đẳng giới.", "D": "Các vấn đề về lương, thăng tiến và quấy rối không thuộc phạm vi của ESG."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> ESG thực chất đòi hỏi phải xem xét các yếu tố chất lượng như điều kiện làm việc, cơ hội phát triển, sự đại diện và an toàn cho tất cả người lao động, chứ không chỉ là các con số thống kê về tỷ lệ. [99, 100, 102, 106]"}, {"level": "1", "content": "Tình huống: Một doanh nghiệp sản xuất hàng may mặc xuất khẩu áp dụng các tiêu chuẩn ESG (Môi trường, Xã hội, Quản trị) và tự hào về việc có tỷ lệ lao động nữ cao. Tuy nhiên, kiểm tra thực tế cho thấy phụ nữ chủ yếu làm ở các công đoạn sản xuất trực tiếp, lương thấp, ít cơ hội đào tạo nâng cao và hầu như không có đại diện trong ban lãnh đạo hay công đoàn. Các vấn đề về quấy rối tình dục tại nơi làm việc cũng chưa được giải quyết triệt để. Nếu áp dụng Khung Longwe để đánh giá mức độ trao quyền cho lao động nữ trong doanh nghiệp này, việc họ có việc làm (Phúc lợi, Tiếp cận) nhưng ít cơ hội thăng tiến, ít đại diện lãnh đạo và đối mặt với nguy cơ quấy rối cho thấy họ còn hạn chế ở những mức độ nào?", "options": {"A": "Chỉ hạn chế ở mức độ Nhận thức hóa.", "B": "Hạn chế ở các mức độ Tham gia (vào quyết định, công đoàn), Kiểm soát (đối với điều kiện làm việc, sự nghiệp) và có thể cả Nhận thức hóa (về quyền của mình). [970, 1044, 1048, 1049]", "C": "Không hạn chế ở mức độ nào cả vì họ đã có việc làm.", "D": "Chỉ hạn chế ở việc tiếp cận các khóa đào tạo kỹ năng may."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Có việc làm chỉ là bước đầu. Việc thiếu cơ hội thăng tiến, thiếu tiếng nói trong quản lý và công đoàn, cùng với môi trường làm việc chưa an toàn cho thấy sự thiếu vắng các cấp độ trao quyền cao hơn như tham gia thực chất và kiểm soát. [970, 1044, 1048, 1049]"}, {"level": "1", "content": "Tình huống: Một doanh nghiệp sản xuất hàng may mặc xuất khẩu áp dụng các tiêu chuẩn ESG (Môi trường, Xã hội, Quản trị) và tự hào về việc có tỷ lệ lao động nữ cao. Tuy nhiên, kiểm tra thực tế cho thấy phụ nữ chủ yếu làm ở các công đoạn sản xuất trực tiếp, lương thấp, ít cơ hội đào tạo nâng cao và hầu như không có đại diện trong ban lãnh đạo hay công đoàn. Các vấn đề về quấy rối tình dục tại nơi làm việc cũng chưa được giải quyết triệt để. Để việc thực hiện ESG của doanh nghiệp này thực sự \"có trách nhiệm giới\", họ cần phải làm gì bên cạnh việc duy trì tỷ lệ lao động nữ cao?", "options": {"A": "Giảm lương của lao động nam để tạo sự cân bằng.", "B": "Xây dựng và thực thi các chính sách rõ ràng về tiền lương công bằng, cơ hội đào tạo và thăng tiến bình đẳng, cơ chế phòng chống và xử lý quấy rối tình dục hiệu quả, đồng thời thúc đẩy sự tham gia của phụ nữ vào các vị trí lãnh đạo và đại diện người lao động. [97, 98, 99, 100]", "C": "Chỉ tập trung vào việc cải thiện điều kiện môi trường làm việc.", "D": "Yêu cầu tất cả lao động nữ phải làm thêm giờ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trách nhiệm giới đòi hỏi các hành động cụ thể để giải quyết các bất bình đẳng về cơ hội, thu nhập, an toàn và sự đại diện, chứ không chỉ dừng lại ở số lượng. [97, 98, 99, 100]"}, {"level": "1", "content": "Tình huống: Một dự án quản lý rừng cộng đồng giao quyền quản lý và hưởng lợi từ một khu rừng cho một thôn bản. Theo tập quán địa phương, các cuộc họp quan trọng của thôn và việc ra quyết định thường do nam giới lớn tuổi đảm nhiệm. Mặc dù phụ nữ có tham gia một số buổi họp dự án, ý kiến của họ ít được lắng nghe và các quyết định về chia sẻ lợi ích từ rừng (ví dụ, từ việc bán tín chỉ carbon hoặc khai thác gỗ có kiểm soát) chủ yếu do nam giới quyết định. Tình huống này minh họa cho thách thức nào trong việc \"trao quyền chính trị cho phụ nữ\" [20] ở cấp cộng đồng?", "options": {"A": "Phụ nữ không có khả năng đưa ra ý kiến.", "B": "Ngay cả khi có mặt, tiếng nói của phụ nữ có thể không được coi trọng hoặc không có ảnh hưởng thực sự đến các quyết định do các cấu trúc quyền lực và chuẩn mực giới truyền thống vẫn chi phối. [20, 21, 38, 207]", "C": "Các dự án quản lý rừng không mang lại lợi ích gì.", "D": "Nam giới luôn đưa ra các quyết định tốt nhất cho cả cộng đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự tham gia hình thức không đồng nghĩa với trao quyền chính trị. Nếu tiếng nói của phụ nữ không được lắng nghe và không ảnh hưởng đến quyết định, họ vẫn bị loại trừ khỏi các quy trình quản trị thực chất. [20, 21, 38, 207]"}, {"level": "1", "content": "Tình huống: Một dự án quản lý rừng cộng đồng giao quyền quản lý và hưởng lợi từ một khu rừng cho một thôn bản. Theo tập quán địa phương, các cuộc họp quan trọng của thôn và việc ra quyết định thường do nam giới lớn tuổi đảm nhiệm. Mặc dù phụ nữ có tham gia một số buổi họp dự án, ý kiến của họ ít được lắng nghe và các quyết định về chia sẻ lợi ích từ rừng (ví dụ, từ việc bán tín chỉ carbon hoặc khai thác gỗ có kiểm soát) chủ yếu do nam giới quyết định. Nếu sử dụng công cụ \"Phân tích các yếu tố ảnh hưởng\" (Khung Harvard), yếu tố nào đang cản trở mạnh mẽ nhất sự tham gia có ý nghĩa của phụ nữ vào việc ra quyết định của dự án?", "options": {"A": "Điều kiện địa lý của khu rừng.", "B": "\"Cấu trúc và quy phạm xã hội\" (ví dụ, tập quán nam giới quyết định việc làng, vai trò giới hạn của phụ nữ trong không gian công cộng) và có thể cả \"Thái độ của cộng đồng đối với phát triển\" (nếu họ chưa coi trọng vai trò của phụ nữ). [878, 882]", "C": "Các sự kiện chính trị ở cấp quốc gia.", "D": "Trình độ học vấn chung của cả thôn bản."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các chuẩn mực văn hóa và quy phạm xã hội về vai trò của nam giới và phụ nữ trong việc ra quyết định cộng đồng là những rào cản chính, bên cạnh đó thái độ của cộng đồng cũng ảnh hưởng. [878, 882]"}, {"level": "1", "content": "Tình huống: Một dự án quản lý rừng cộng đồng giao quyền quản lý và hưởng lợi từ một khu rừng cho một thôn bản. Theo tập quán địa phương, các cuộc họp quan trọng của thôn và việc ra quyết định thường do nam giới lớn tuổi đảm nhiệm. Mặc dù phụ nữ có tham gia một số buổi họp dự án, ý kiến của họ ít được lắng nghe và các quyết định về chia sẻ lợi ích từ rừng (ví dụ, từ việc bán tín chỉ carbon hoặc khai thác gỗ có kiểm soát) chủ yếu do nam giới quyết định. Một \"hành động khẳng định\" [47] có thể được xem xét để thúc đẩy sự tham gia của phụ nữ trong ban quản lý rừng của thôn là gì, bên cạnh việc nâng cao nhận thức?", "options": {"A": "Chỉ cho phép phụ nữ tham gia các cuộc họp.", "B": "Đặt ra một tỷ lệ nữ tối thiểu cần có trong ban quản lý rừng và trong các ủy ban ra quyết định liên quan đến chia sẻ lợi ích, đồng thời cung cấp các chương trình đào tạo và hỗ trợ để phụ nữ có thể đảm nhận hiệu quả các vai trò này. [47, 48, 49]", "C": "Yêu cầu tất cả các quyết định phải do phụ nữ đưa ra.", "D": "Giảm số lượng thành viên nam trong ban quản lý."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Hành động khẳng định có thể bao gồm việc đặt ra các mục tiêu cụ thể về sự đại diện của phụ nữ, kết hợp với các biện pháp hỗ trợ nâng cao năng lực, nhằm tạo ra sự thay đổi nhanh hơn trong các cấu trúc truyền thống. [47, 48, 49]"}, {"level": "1", "content": "Tình huống: Trong một chương trình đào tạo về nông nghiệp thích ứng với BĐKH, giảng viên chỉ sử dụng các ví dụ và hình ảnh minh họa về nam nông dân đang áp dụng các kỹ thuật mới, và thường xuyên dùng các đại từ nhân xưng nam giới khi nói về \"người nông dân\". Cách truyền đạt thông tin này, dù có thể không cố ý, có thể tạo ra tác động gì đối với các nữ nông dân tham gia khóa học?", "options": {"A": "Giúp họ cảm thấy được đại diện và tôn trọng.", "B": "Có thể khiến họ cảm thấy mình bị \"vô hình\" hoặc các kỹ thuật này không dành cho họ, làm giảm sự tự tin và động lực áp dụng. [59, 60, 2203, 2204]", "C": "Khuyến khích họ noi gương các nam nông dân thành công.", "D": "Không có tác động gì đáng kể vì nội dung kỹ thuật mới là quan trọng nhất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Ngôn ngữ và hình ảnh sử dụng trong truyền thông và đào tạo có ảnh hưởng lớn đến nhận thức và cảm giác được bao hàm của người nghe/học. Việc liên tục sử dụng hình ảnh và đại từ nam giới có thể vô tình củng cố quan niệm rằng nông nghiệp là lĩnh vực của nam giới và làm nản lòng phụ nữ. [59, 60, 2203, 2204]"}, {"level": "1", "content": "Tình huống: Trong một chương trình đào tạo về nông nghiệp thích ứng với BĐKH, giảng viên chỉ sử dụng các ví dụ và hình ảnh minh họa về nam nông dân đang áp dụng các kỹ thuật mới, và thường xuyên dùng các đại từ nhân xưng nam giới khi nói về \"người nông dân\". Việc này vi phạm nguyên tắc nào trong việc \"thay đổi nhận thức, thái độ và hành vi về giới\"?", "options": {"A": "Chỉ vi phạm nguyên tắc về phân bổ ngân sách công bằng.", "B": "Vi phạm nguyên tắc về việc truyền thông, giáo dục cần phải phá bỏ các định kiến và khuôn mẫu giới, thay vì củng cố chúng. [59, 60, 62]", "C": "Không vi phạm nguyên tắc nào cả.", "D": "Chỉ vi phạm nguyên tắc về trao quyền kinh tế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thay đổi nhận thức đòi hỏi các hoạt động truyền thông và giáo dục phải chủ động thách thức các khuôn mẫu giới cũ và xây dựng những hình ảnh tích cực, đa dạng về vai trò của cả nam và nữ. [59, 60, 62]"}, {"level": "1", "content": "Tình huống: Trong một chương trình đào tạo về nông nghiệp thích ứng với BĐKH, giảng viên chỉ sử dụng các ví dụ và hình ảnh minh họa về nam nông dân đang áp dụng các kỹ thuật mới, và thường xuyên dùng các đại từ nhân xưng nam giới khi nói về \"người nông dân\". Để khắc phục tình trạng này, giảng viên và người thiết kế tài liệu tập huấn nên:", "options": {"A": "Chỉ sử dụng hình ảnh và ví dụ về nữ nông dân.", "B": "Sử dụng ngôn ngữ trung tính về giới, đa dạng hóa hình ảnh và ví dụ minh họa để phản ánh sự tham gia và đóng góp của cả nam và nữ nông dân, đồng thời mời các nữ nông dân thành công chia sẻ kinh nghiệm.", "C": "Không cần thay đổi gì vì đây là vấn đề nhỏ.", "D": "Yêu cầu tất cả các học viên phải là nam giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một cách tiếp cận nhạy cảm giới sẽ đảm bảo rằng cả nam và nữ đều cảm thấy được nhìn nhận, tôn trọng và có thể liên hệ bản thân với nội dung được truyền đạt, từ đó tăng hiệu quả học tập và áp dụng."}, {"level": "1", "content": "Tình huống: Một dự án du lịch sinh thái dựa vào cộng đồng tại một làng chài ven biển. Phụ nữ trong làng có kỹ năng làm các sản phẩm thủ công từ vỏ sò, vỏ ốc rất độc đáo. Dự án hỗ trợ họ cải tiến mẫu mã và tìm thị trường. Tuy nhiên, các quyết định về giá bán sản phẩm, cách thức quảng bá và việc chia sẻ lợi nhuận từ việc bán hàng chung của nhóm lại do một vài nam giới có vai vế trong làng (không trực tiếp làm sản phẩm) quyết định, với lý do \"phụ nữ không rành về kinh doanh và tính toán\". Tình huống này cho thấy một thách thức nào trong việc \"trao quyền kinh tế cho phụ nữ\" [13] thông qua các mô hình sinh kế mới?", "options": {"A": "Phụ nữ không có kỹ năng làm sản phẩm thủ công.", "B": "Ngay cả khi phụ nữ có kỹ năng sản xuất và tạo ra sản phẩm, họ vẫn có thể bị hạn chế quyền kiểm soát đối với các khâu tạo giá trị gia tăng cao hơn (marketing, bán hàng, quản lý tài chính) và hưởng lợi không tương xứng do các định kiến giới và cấu trúc quyền lực hiện hữu. [13, 16, 17, 26, 27, 28]", "C": "Các sản phẩm thủ công từ vỏ sò không có giá trị thị trường.", "D": "Nam giới luôn có kỹ năng kinh doanh tốt hơn phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trao quyền kinh tế không chỉ là tạo ra sản phẩm mà còn là có quyền kiểm soát quá trình sản xuất, kinh doanh và hưởng lợi công bằng từ thành quả lao động của mình. Các định kiến giới có thể ngăn cản điều này. [13, 16, 17, 26, 27, 28]"}, {"level": "1", "content": "Tình huống: Một dự án du lịch sinh thái dựa vào cộng đồng tại một làng chài ven biển. Phụ nữ trong làng có kỹ năng làm các sản phẩm thủ công từ vỏ sò, vỏ ốc rất độc đáo. Dự án hỗ trợ họ cải tiến mẫu mã và tìm thị trường. Tuy nhiên, các quyết định về giá bán sản phẩm, cách thức quảng bá và việc chia sẻ lợi nhuận từ việc bán hàng chung của nhóm lại do một vài nam giới có vai vế trong làng (không trực tiếp làm sản phẩm) quyết định, với lý do \"phụ nữ không rành về kinh doanh và tính toán\". Nếu áp dụng công cụ \"Tiếp cận và Kiểm soát\" (Khung Harvard), phụ nữ trong tình huống này có thể có \"tiếp cận\" với việc sản xuất và bán sản phẩm, nhưng họ thiếu \"kiểm soát\" ở khía cạnh nào là chủ yếu?", "options": {"A": "Thiếu kiểm soát đối với nguyên liệu đầu vào (vỏ sò, vỏ ốc).", "B": "Thiếu kiểm soát đối với quy trình ra quyết định về giá cả, chiến lược kinh doanh, và việc quản lý, phân chia lợi nhuận từ hoạt động kinh doanh chung. [870, 871, 8874]", "C": "Thiếu kiểm soát đối với chất lượng sản phẩm họ làm ra.", "D": "Thiếu kiểm soát đối với thời gian họ dành cho việc làm thủ công."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> \"Kiểm soát\" ở đây liên quan đến quyền lực trong việc đưa ra các quyết định chiến lược và quản lý các nguồn lợi tài chính phát sinh từ hoạt động kinh doanh, những khía cạnh mà phụ nữ đang bị hạn chế. [870, 871, 8874]"}, {"level": "1", "content": "Tình huống: Một dự án du lịch sinh thái dựa vào cộng đồng tại một làng chài ven biển. Phụ nữ trong làng có kỹ năng làm các sản phẩm thủ công từ vỏ sò, vỏ ốc rất độc đáo. Dự án hỗ trợ họ cải tiến mẫu mã và tìm thị trường. Tuy nhiên, các quyết định về giá bán sản phẩm, cách thức quảng bá và việc chia sẻ lợi nhuận từ việc bán hàng chung của nhóm lại do một vài nam giới có vai vế trong làng (không trực tiếp làm sản phẩm) quyết định, với lý do \"phụ nữ không rành về kinh doanh và tính toán\". Một sáng kiến hành động thiết thực mà sinh viên ngành TN&MT (có kiến thức về giới và phát triển cộng đồng) có thể đề xuất để hỗ trợ nhóm phụ nữ này là gì?", "options": {"A": "Khuyên họ nên ngừng làm các sản phẩm thủ công.", "B": "Tổ chức các buổi tập huấn nâng cao năng lực cho phụ nữ về kỹ năng kinh doanh cơ bản, tính giá thành sản phẩm, marketing đơn giản; đồng thời hỗ trợ họ xây dựng quy chế hoạt động nhóm minh bạch, có sự tham gia của tất cả thành viên trong việc ra quyết định và chia sẻ lợi ích. [224, 230, 239]", "C": "Vận động chính quyền cấm nam giới tham gia vào việc quản lý nhóm.", "D": "Tìm một công ty lớn đến thu mua toàn bộ sản phẩm với giá thấp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sáng kiến này vừa nâng cao năng lực cho phụ nữ, vừa hướng đến việc cải thiện cơ chế hoạt động của nhóm theo hướng minh bạch và có sự tham gia, giải quyết cả vấn đề kỹ năng và quyền lực. [224, 230, 239]"}, {"level": "1", "content": "Tình huống 41 (Câu 371-373): Một chương trình \"Ngân sách có trách nhiệm giới\" (GRB) được triển khai thí điểm tại một tỉnh. Báo cáo cuối kỳ cho thấy tổng ngân sách chi cho các hoạt động \"vì sự tiến bộ của phụ nữ\" (ví dụ, các lớp tập huấn kỹ năng riêng cho nữ, hỗ trợ các câu lạc bộ nữ) có tăng. Tuy nhiên, khi phân tích sâu các ngành chi tiêu lớn như giao thông, thủy lợi, nông nghiệp, thì việc lồng ghép các mục tiêu bình đẳng giới và phân tích tác động giới của các khoản chi này vẫn còn rất mờ nhạt. Tình trạng này cho thấy một sự hiểu lầm hoặc hạn chế nào trong việc triển khai GRB?", "options": {"A": "GRB chỉ nên tập trung vào các hoạt động riêng cho phụ nữ.", "B": "Việc chỉ tăng chi cho các hoạt động \"vì sự tiến bộ của phụ nữ\" mà không lồng ghép giới vào các dòng ngân sách chính, lớn hơn, cho thấy GRB chưa được hiểu và thực hiện một cách toàn diện, hệ thống. [212183, 2184, 2185]", "C": "Các ngành như giao thông, thủy lợi không thể lồng ghép giới.", "D": "GRB không cần quan tâm đến các khoản chi lớn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Bản chất của GRB là lồng ghép giới vào TOÀN BỘ chu trình và các dòng ngân sách chính, chứ không chỉ tạo ra một \"ngân sách phụ nữ\" riêng biệt hay chỉ tập trung vào các dự án nhỏ lẻ \"vì phụ nữ\". Nếu các ngành chi lớn không thay đổi, tác động tổng thể của GRB sẽ hạn chế. [212183, 2184, 2185]"}, {"level": "1", "content": "Tình huống 41 (Câu 371-373): Một chương trình \"Ngân sách có trách nhiệm giới\" (GRB) được triển khai thí điểm tại một tỉnh. Báo cáo cuối kỳ cho thấy tổng ngân sách chi cho các hoạt động \"vì sự tiến bộ của phụ nữ\" (ví dụ, các lớp tập huấn kỹ năng riêng cho nữ, hỗ trợ các câu lạc bộ nữ) có tăng. Tuy nhiên, khi phân tích sâu các ngành chi tiêu lớn như giao thông, thủy lợi, nông nghiệp, thì việc lồng ghép các mục tiêu bình đẳng giới và phân tích tác động giới của các khoản chi này vẫn còn rất mờ nhạt. Theo định nghĩa và bản chất của GRB được trình bày trong Chương 6 [2179, 2183], cách tiếp cận của tỉnh này có thể được coi là:", "options": {"A": "Hoàn toàn phù hợp với nguyên tắc GRB.", "B": "Mới chỉ dừng lại ở mức độ \"ngân sách cho phụ nữ\" (women's budget) hoặc các dự án nhắm mục tiêu đến phụ nữ, chưa thực sự là \"ngân sách có trách nhiệm giới\" theo nghĩa rộng. [2179, 2183, 2184, 2186]", "C": "Vượt xa các yêu cầu của GRB.", "D": "Không liên quan gì đến GRB."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GRB thực sự vượt ra ngoài việc chỉ tạo ngân sách riêng cho phụ nữ. Nó đòi hỏi việc phân tích và tái cấu trúc toàn bộ các dòng thu chi chính của nhà nước để đảm bảo chúng thúc đẩy bình đẳng giới. [2179, 2183, 2184, 2186]"}, {"level": "1", "content": "Tình huống 41 (Câu 371-373): Một chương trình \"Ngân sách có trách nhiệm giới\" (GRB) được triển khai thí điểm tại một tỉnh. Báo cáo cuối kỳ cho thấy tổng ngân sách chi cho các hoạt động \"vì sự tiến bộ của phụ nữ\" (ví dụ, các lớp tập huấn kỹ năng riêng cho nữ, hỗ trợ các câu lạc bộ nữ) có tăng. Tuy nhiên, khi phân tích sâu các ngành chi tiêu lớn như giao thông, thủy lợi, nông nghiệp, thì việc lồng ghép các mục tiêu bình đẳng giới và phân tích tác động giới của các khoản chi này vẫn còn rất mờ nhạt. Để cải thiện tình hình, nhóm thực hiện GRB của tỉnh cần ưu tiên hành động nào sau đây, dựa trên các bước cơ bản trong quy trình GRB (Chương 6)?", "options": {"A": "Tiếp tục tăng chi cho các hoạt động \"vì sự tiến bộ của phụ nữ\".", "B": "Thực hiện \"Phân tích chính sách từ góc độ giới\" và \"Phân tích ngân sách từ góc độ giới\" cho các ngành chi tiêu lớn (giao thông, thủy lợi, nông nghiệp) để xác định các tác động và cơ hội lồng ghép giới. [2, 2226]", "C": "Ngừng tất cả các hoạt động GRB vì cho rằng không hiệu quả.", "D": "Chỉ tập trung vào việc giám sát các hoạt động đã triển khai."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các bước này (Phân tích chính sách và Phân tích ngân sách từ góc độ giới) sẽ giúp xác định các điểm cần can thiệp trong các dòng ngân sách chính, từ đó mới có thể \"Tái cấu trúc ngân sách để đạt được các kết quả bình đẳng giới\" một cách toàn diện hơn. [2, 2226, 2228]"}, {"level": "1", "content": "Tình huống: Một dự án \"Nông nghiệp thông minh thích ứng với biến đổi khí hậu\" (CSA) giới thiệu một ứng dụng điện thoại di động cung cấp thông tin về dự báo thời tiết, giá cả thị trường và kỹ thuật canh tác mới. Tuy nhiên, Đánh giá giới ban đầu cho thấy tỷ lệ phụ nữ nông thôn sở hữu điện thoại thông minh và kỹ năng sử dụng ứng dụng thấp hơn nhiều so với nam giới. Nếu dự án chỉ tập trung vào việc phát triển ứng dụng mà không giải quyết rào cản tiếp cận công nghệ của phụ nữ, điều gì có khả năng xảy ra?", "options": {"A": "Phụ nữ sẽ tự động học cách sử dụng ứng dụng.", "B": "Khoảng cách giới trong việc tiếp cận thông tin và công nghệ nông nghiệp có thể sẽ gia tăng, làm phụ nữ bị bỏ lại phía sau trong việc áp dụng các thực hành CSA. [2349, 2364, 2378]", "C": "Nam giới sẽ chia sẻ tất cả thông tin từ ứng dụng cho phụ nữ.", "D": "Ứng dụng sẽ không có giá trị gì đối với nông nghiệp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc giới thiệu một công nghệ mới mà không tính đến khả năng tiếp cận và sử dụng của các nhóm khác nhau (đặc biệt là phụ nữ, những người thường gặp nhiều rào cản hơn) có thể làm gia tăng thay vì thu hẹp khoảng cách số và khoảng cách giới. [2349, 2364, 2378]"}, {"level": "1", "content": "Tình huống: Một dự án \"Nông nghiệp thông minh thích ứng với biến đổi khí hậu\" (CSA) giới thiệu một ứng dụng điện thoại di động cung cấp thông tin về dự báo thời tiết, giá cả thị trường và kỹ thuật canh tác mới. Tuy nhiên, Đánh giá giới ban đầu cho thấy tỷ lệ phụ nữ nông thôn sở hữu điện thoại thông minh và kỹ năng sử dụng ứng dụng thấp hơn nhiều so với nam giới.Để đảm bảo tính bao trùm và hiệu quả của ứng dụng này, một \"hành động khẳng định\" [47] mà dự án có thể xem xét là gì?", "options": {"A": "Chỉ cung cấp ứng dụng cho nam giới vì họ sử dụng công nghệ tốt hơn.", "B": "Tổ chức các lớp tập huấn về sử dụng điện thoại thông minh và ứng dụng nông nghiệp có mục tiêu ưu tiên cho phụ nữ, đồng thời có thể xem xét việc hỗ trợ một phần chi phí mua điện thoại thông minh cho các nữ nông dân có hoàn cảnh khó khăn. [47, 48, 49]", "C": "Yêu cầu tất cả phụ nữ phải tự mua điện thoại thông minh.", "D": "Phát triển một phiên bản ứng dụng phức tạp hơn nữa."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Hành động khẳng định ở đây là các biện pháp chủ động nhằm giúp phụ nữ vượt qua rào cản cụ thể (thiếu thiết bị, thiếu kỹ năng) để họ có thể tiếp cận và hưởng lợi từ công nghệ mới một cách công bằng. [47, 48, 49]"}, {"level": "1", "content": "Tình huống: Một dự án \"Nông nghiệp thông minh thích ứng với biến đổi khí hậu\" (CSA) giới thiệu một ứng dụng điện thoại di động cung cấp thông tin về dự báo thời tiết, giá cả thị trường và kỹ thuật canh tác mới. Tuy nhiên, Đánh giá giới ban đầu cho thấy tỷ lệ phụ nữ nông thôn sở hữu điện thoại thông minh và kỹ năng sử dụng ứng dụng thấp hơn nhiều so với nam giới. Việc phụ nữ ít sở hữu điện thoại thông minh và kỹ năng số có thể liên quan đến yếu tố nào trong \"Các yếu tố góp phần vào giới hóa đói nghèo\" (Chương 3)?", "options": {"A": "Chỉ liên quan đến phân biệt đối xử trên thị trường lao động.", "B": "Có thể liên quan đến \"Hạn chế trong tiếp cận giáo dục, y tế, tín dụng, tài sản, quyền ra quyết định\" - ví dụ, thu nhập thấp hơn khiến họ khó mua điện thoại, ít được ưu tiên đầu tư giáo dục công nghệ, hoặc không có quyền quyết định chi tiêu cho thiết bị này. [2753, 2754, 2756]", "C": "Chỉ liên quan đến gánh nặng công việc chăm sóc không lương.", "D": "Không liên quan đến bất kỳ yếu tố nào."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khả năng tiếp cận công nghệ thường bị ảnh hưởng bởi nhiều yếu tố bất lợi mà phụ nữ phải đối mặt, bao gồm hạn chế về kinh tế, giáo dục và quyền tự quyết. [2753, 2754, 2756]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu về vai trò của phụ nữ trong quản lý tài nguyên nước tại một cộng đồng dân tộc thiểu số cho thấy, mặc dù phụ nữ là người trực tiếp lấy nước, sử dụng và quản lý nước cho gia đình, nhưng trong các cuộc họp thôn bản để bàn về việc xây dựng và bảo trì hệ thống nước sạch, họ rất ít khi phát biểu ý kiến, ngay cả khi được mời. Lý do được đưa ra là họ \"ngại\", \"không biết nói gì\" hoặc cho rằng \"đó là việc của đàn ông\". Hiện tượng này phản ánh điều gì sâu sắc hơn việc phụ nữ chỉ \"ngại\" phát biểu?", "options": {"A": "Phụ nữ thực sự không có ý kiến gì về vấn đề nước.", "B": "Sự tác động của các \"thể chế phi chính thức\" như chuẩn mực văn hóa, định kiến giới về vai trò của phụ nữ trong không gian công cộng và trong việc ra quyết định, cũng như sự thiếu tự tin do ít có cơ hội thực hành và được khuyến khích. [10, 14, 17, 142, 152]", "C": "Hệ thống nước sạch hiện tại đã rất tốt và không cần cải thiện.", "D": "Nam giới trong cộng đồng luôn lắng nghe và đại diện cho ý kiến của phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự im lặng của phụ nữ trong các cuộc họp công cộng thường không phải do họ thiếu ý kiến, mà là kết quả của các chuẩn mực xã hội đã ăn sâu, nơi tiếng nói của phụ nữ trong các vấn đề \"cộng đồng\" có thể không được coi trọng, hoặc họ thiếu tự tin do ít được trao cơ hội. [10, 14, 17, 142, 152]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu về vai trò của phụ nữ trong quản lý tài nguyên nước tại một cộng đồng dân tộc thiểu số cho thấy, mặc dù phụ nữ là người trực tiếp lấy nước, sử dụng và quản lý nước cho gia đình, nhưng trong các cuộc họp thôn bản để bàn về việc xây dựng và bảo trì hệ thống nước sạch, họ rất ít khi phát biểu ý kiến, ngay cả khi được mời. Lý do được đưa ra là họ \"ngại\", \"không biết nói gì\" hoặc cho rằng \"đó là việc của đàn ông\". Nếu áp dụng Khung Longwe, việc phụ nữ có mặt trong các cuộc họp (có thể là mức \"Tiếp cận\" hoặc \"Tham gia\" hình thức) nhưng không phát biểu và ý kiến không ảnh hưởng đến quyết định cho thấy họ chưa đạt được các mức độ trao quyền nào?", "options": {"A": "Họ đã đạt được tất cả các mức độ trao quyền.", "B": "Họ chưa đạt được mức độ \"Nhận thức hóa\" (về quyền được phát biểu và giá trị ý kiến của mình), \"Tham gia\" (có ý nghĩa) và đặc biệt là \"Kiểm soát\" (ảnh hưởng đến quyết định cuối cùng). [1044, 1048, 1049]", "C": "Họ chỉ chưa đạt được mức độ \"Phúc lợi\".", "D": "Chỉ có nam giới mới có thể đạt được các mức độ trao quyền này."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự tham gia có ý nghĩa đòi hỏi phụ nữ không chỉ có mặt mà còn phải có tiếng nói, được lắng nghe và ý kiến của họ có trọng lượng trong việc ra quyết định. Việc họ không phát biểu hoặc ý kiến không được coi trọng cho thấy sự thiếu vắng các mức độ trao quyền cao hơn. [1044, 1048, 1049]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu về vai trò của phụ nữ trong quản lý tài nguyên nước tại một cộng đồng dân tộc thiểu số cho thấy, mặc dù phụ nữ là người trực tiếp lấy nước, sử dụng và quản lý nước cho gia đình, nhưng trong các cuộc họp thôn bản để bàn về việc xây dựng và bảo trì hệ thống nước sạch, họ rất ít khi phát biểu ý kiến, ngay cả khi được mời. Lý do được đưa ra là họ \"ngại\", \"không biết nói gì\" hoặc cho rằng \"đó là việc của đàn ông\". Một \"sáng kiến hành động thiết thực\" [236] mà một tổ chức xã hội có thể thực hiện để cải thiện tình hình này là gì, bên cạnh việc chỉ khuyến khích phụ nữ phát biểu nhiều hơn?", "options": {"A": "Yêu cầu tất cả các quyết định về nước phải do phụ nữ đưa ra.", "B": "Tổ chức các buổi họp nhóm nhỏ, riêng biệt cho phụ nữ để tạo không gian an toàn cho họ thảo luận và hình thành ý kiến; tập huấn kỹ năng phát biểu, tự tin cho họ; đồng thời làm việc với các nhà lãnh đạo cộng đồng (cả nam và nữ) để thay đổi nhận thức về giá trị đóng góp của phụ nữ.", "C": "Cung cấp tài liệu đọc về quản lý tài nguyên nước cho tất cả các hộ gia đình.", "D": "Phê bình những phụ nữ không phát biểu trong các cuộc họp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một giải pháp toàn diện cần vừa nâng cao năng lực và sự tự tin cho phụ nữ, vừa tạo ra một môi trường thuận lợi và khuyến khích sự tham gia của họ, đồng thời tác động đến nhận thức của những người có ảnh hưởng trong cộng đồng."}, {"level": "1", "content": "Tình huống: Một chương trình GRB cấp tỉnh phân bổ một khoản ngân sách đáng kể cho \"các hoạt động nâng cao năng lực cho cán bộ nữ\". Tuy nhiên, khi xem xét chi tiết, các hoạt động này chủ yếu là các khóa tập huấn về kỹ năng mềm (giao tiếp, thuyết trình) hoặc các chuyến tham quan học tập kinh nghiệm chung chung, ít có các nội dung chuyên sâu về phân tích giới, lồng ghép giới vào các ngành cụ thể, hay các kỹ năng vận động chính sách. Việc tập trung vào các kỹ năng mềm chung chung mà thiếu các nội dung chuyên sâu về giới cho thấy điều gì về cách hiểu và tiếp cận \"nâng cao năng lực\" trong khuôn khổ GRB của chương trình này?", "options": {"A": "Đây là cách tiếp cận nâng cao năng lực hiệu quả nhất cho cán bộ nữ.", "B": "Có thể chương trình chưa thực sự hiểu rõ các năng lực cốt lõi cần thiết để thực hiện GRB hiệu quả (như kỹ năng phân tích giới, hoạch định ngân sách nhạy cảm giới), hoặc đang tiếp cận vấn đề một cách bề nổi, chưa đi vào chiều sâu của việc thay đổi tư duy và quy trình làm việc. [46, 2092]", "C": "Cán bộ nữ chỉ cần các kỹ năng mềm là đủ.", "D": "Các nội dung chuyên sâu về giới không phù hợp với cán bộ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nâng cao năng lực cho GRB đòi hỏi phải trang bị những kiến thức và kỹ năng chuyên biệt về giới, chứ không chỉ là các kỹ năng mềm chung. Nếu chỉ dừng lại ở kỹ năng mềm, khả năng thực hiện GRB một cách thực chất sẽ bị hạn chế. [46, 2092]"}, {"level": "1", "content": "Tình huống: Một chương trình GRB cấp tỉnh phân bổ một khoản ngân sách đáng kể cho \"các hoạt động nâng cao năng lực cho cán bộ nữ\". Tuy nhiên, khi xem xét chi tiết, các hoạt động này chủ yếu là các khóa tập huấn về kỹ năng mềm (giao tiếp, thuyết trình) hoặc các chuyến tham quan học tập kinh nghiệm chung chung, ít có các nội dung chuyên sâu về phân tích giới, lồng ghép giới vào các ngành cụ thể, hay các kỹ năng vận động chính sách. Theo \"Vai trò và trách nhiệm của Nhà nước\" trong việc thúc đẩy bình đẳng giới [71, 72], việc phân bổ ngân sách cho nâng cao năng lực là đúng đắn, nhưng nội dung nâng cao năng lực cần phải đảm bảo điều gì để phục vụ mục tiêu GRB?", "options": {"A": "Chỉ cần đảm bảo có nhiều cán bộ nữ tham gia là đủ.", "B": "Nội dung đào tạo cần phải trang bị cho cán bộ (cả nam và nữ) những kiến thức và kỹ năng cụ thể để có thể phân tích, lồng ghép các vấn đề giới vào quá trình xây dựng, thực thi và giám sát chính sách, ngân sách trong lĩnh vực chuyên môn của họ. []", "C": "Nội dung chỉ nên tập trung vào các quy định pháp luật về bình đẳng giới.", "D": "Các khóa tập huấn nên được tổ chức ở nước ngoài để tăng uy tín."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nâng cao năng lực hiệu quả cho GRB phải tập trung vào việc trang bị các công cụ và kỹ năng thực hành cụ thể, giúp cán bộ áp dụng được kiến thức về giới vào công việc hàng ngày của họ. []"}, {"level": "1", "content": "Tình huống: Một chương trình GRB cấp tỉnh phân bổ một khoản ngân sách đáng kể cho \"các hoạt động nâng cao năng lực cho cán bộ nữ\". Tuy nhiên, khi xem xét chi tiết, các hoạt động này chủ yếu là các khóa tập huấn về kỹ năng mềm (giao tiếp, thuyết trình) hoặc các chuyến tham quan học tập kinh nghiệm chung chung, ít có các nội dung chuyên sâu về phân tích giới, lồng ghép giới vào các ngành cụ thể, hay các kỹ năng vận động chính sách. Một \"ý tưởng nghiên cứu khoa học\" [] mà một sinh viên quan tâm đến GRB có thể thực hiện dựa trên tình huống này là gì?", "options": {"A": "Nghiên cứu về lịch sử hình thành các chương trình nâng cao năng lực ở tỉnh.", "B": "Đánh giá hiệu quả thực tế của các chương trình nâng cao năng lực về giới hiện tại cho cán bộ hoạch định chính sách ở tỉnh X: Phân tích nội dung, phương pháp, mức độ thay đổi nhận thức và kỹ năng áp dụng GRB của học viên sau đào tạo.", "C": "So sánh mức lương của cán bộ nam và nữ trong tỉnh.", "D": "Nghiên cứu về các loại cây trồng chủ lực của tỉnh."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đề tài này trực tiếp đi sâu vào việc đánh giá tính hiệu quả và thực chất của một hoạt động cụ thể nhằm thúc đẩy GRB, tìm ra những điểm mạnh, điểm yếu và đề xuất cải thiện."}, {"level": "1", "content": "Tình huống: Trong một dự án phát triển chuỗi giá trị cho một loại nông sản đặc sản của địa phương, các hoạt động hỗ trợ kỹ thuật canh tác và sơ chế chủ yếu hướng đến các nhóm nông dân (bao gồm cả nam và nữ). Tuy nhiên, các hoạt động kết nối thị trường, đàm phán hợp đồng với doanh nghiệp và xây dựng thương hiệu sản phẩm lại chủ yếu do một số nam giới có kinh nghiệm và các cán bộ dự án nam đảm nhiệm, với lý do \"cần sự nhanh nhạy và quyết đoán\". Sự phân công vai trò này trong dự án có thể dẫn đến hệ quả gì đối với các nữ nông dân, ngay cả khi họ tham gia tích cực vào sản xuất và sơ chế?", "options": {"A": "Họ sẽ được hưởng lợi tối đa từ giá trị gia tăng của sản phẩm.", "B": "Họ có thể bị hạn chế trong việc nắm bắt thông tin thị trường, tham gia vào các quyết định về giá cả và chiến lược tiêu thụ, và có nguy cơ nhận được phần lợi ích thấp hơn so với đóng góp của mình trong chuỗi giá trị. [2279, 2281, 2282, 2522]", "C": "Họ sẽ có nhiều thời gian hơn để tập trung vào sản xuất.", "D": "Chất lượng sản phẩm đặc sản sẽ tự động được nâng cao."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc bị loại trừ khỏi các khâu quan trọng như kết nối thị trường và đàm phán giá có thể khiến phụ nữ (dù là người sản xuất chính) không kiểm soát được giá trị sản phẩm của mình và hưởng lợi không tương xứng. [2279, 2281, 2282, 2522]"}, {"level": "1", "content": "Tình huống: Trong một dự án phát triển chuỗi giá trị cho một loại nông sản đặc sản của địa phương, các hoạt động hỗ trợ kỹ thuật canh tác và sơ chế chủ yếu hướng đến các nhóm nông dân (bao gồm cả nam và nữ). Tuy nhiên, các hoạt động kết nối thị trường, đàm phán hợp đồng với doanh nghiệp và xây dựng thương hiệu sản phẩm lại chủ yếu do một số nam giới có kinh nghiệm và các cán bộ dự án nam đảm nhiệm, với lý do \"cần sự nhanh nhạy và quyết đoán\". \"Định kiến giới\" nào đang tiềm ẩn trong lý do \"cần sự nhanh nhạy và quyết đoán\" để giải thích cho việc ưu tiên nam giới trong các khâu kết nối thị trường và đàm phán?", "options": {"A": "Định kiến rằng phụ nữ không có khả năng làm nông nghiệp.", "B": "Định kiến rằng phụ nữ thiếu các phẩm chất cần thiết cho kinh doanh và đàm phán (như sự quyết đoán, khả năng thương thuyết), hoặc vai trò của họ nên giới hạn ở sản xuất. [59, 60, 210, 2245]", "C": "Định kiến rằng nam giới không giỏi trong việc sơ chế sản phẩm.", "D": "Định kiến rằng thị trường chỉ chấp nhận các sản phẩm do nam giới bán."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lý do đưa ra phản ánh một khuôn mẫu giới phổ biến, cho rằng các hoạt động kinh doanh, đàm phán đòi hỏi những phẩm chất \"nam tính\" và không phù hợp hoặc phụ nữ không có khả năng thực hiện tốt. [59, 60, 210, 2245]"}, {"level": "1", "content": "Tình huống: Trong một dự án phát triển chuỗi giá trị cho một loại nông sản đặc sản của địa phương, các hoạt động hỗ trợ kỹ thuật canh tác và sơ chế chủ yếu hướng đến các nhóm nông dân (bao gồm cả nam và nữ). Tuy nhiên, các hoạt động kết nối thị trường, đàm phán hợp đồng với doanh nghiệp và xây dựng thương hiệu sản phẩm lại chủ yếu do một số nam giới có kinh nghiệm và các cán bộ dự án nam đảm nhiệm, với lý do \"cần sự nhanh nhạy và quyết đoán\". Để dự án này thực sự \"trao quyền kinh tế cho phụ nữ\" [13] một cách toàn diện, cần phải làm gì bên cạnh việc hỗ trợ kỹ thuật sản xuất?", "options": {"A": "Chỉ cần đảm bảo phụ nữ được trả công cao hơn cho việc sơ chế.", "B": "Xây dựng năng lực cho phụ nữ về kỹ năng thị trường, đàm phán, quản lý kinh doanh; tạo cơ hội và khuyến khích họ tham gia vào các hoạt động kết nối với doanh nghiệp và xây dựng thương hiệu; đồng thời thúc đẩy sự thay đổi trong nhận thức về vai trò của phụ nữ trong kinh doanh. [13, 15, 17, 22, 23, 24]", "C": "Để nam giới quản lý toàn bộ khâu thị trường và chia lại lợi nhuận cho phụ nữ.", "D": "Tập trung vào việc xuất khẩu sản phẩm sang các thị trường dễ tính."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trao quyền kinh tế thực sự đòi hỏi phụ nữ không chỉ tham gia sản xuất mà còn có khả năng kiểm soát và hưởng lợi từ toàn bộ chuỗi giá trị, bao gồm cả các khâu mang lại giá trị gia tăng cao và đòi hỏi kỹ năng quản lý, kinh doanh. [13, 15, 17, 22, 23, 24]"}, {"level": "1", "content": "Tình huống: Một báo cáo đánh giá giữa kỳ của một chương trình quốc gia về bình đẳng giới cho thấy 13/21 chỉ tiêu không đạt kế hoạch [28]. Một trong những nguyên nhân được chỉ ra là sự phối hợp liên ngành còn hạn chế và thiếu cơ chế giám sát, đánh giá hiệu quả. Việc nhiều chỉ tiêu không đạt kế hoạch, mặc dù có Chiến lược quốc gia về bình đẳng giới, cho thấy điều gì về mối quan hệ giữa \"ý định chính sách\" và \"thực tiễn triển khai\"?", "options": {"A": "Ý định chính sách luôn được thực hiện một cách hoàn hảo.", "B": "Có thể tồn tại một khoảng cách đáng kể giữa việc ban hành chính sách, chiến lược (ý định) và việc triển khai, thực thi hiệu quả trên thực tế (thực tiễn), do nhiều yếu tố cản trở. [28, 43, 78, 79]", "C": "Các chỉ tiêu đặt ra là không thực tế.", "D": "Bình đẳng giới là một mục tiêu không thể đạt được."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc ban hành chính sách chỉ là bước đầu. Để chính sách đi vào cuộc sống và đạt được mục tiêu, cần có sự triển khai hiệu quả, nguồn lực đầy đủ, cơ chế phối hợp và giám sát chặt chẽ. Khoảng cách giữa chính sách và thực thi là một vấn đề phổ biến. [28, 43, 78, 79]"}, {"level": "1", "content": "Tình huống: Một báo cáo đánh giá giữa kỳ của một chương trình quốc gia về bình đẳng giới cho thấy 13/21 chỉ tiêu không đạt kế hoạch [28]. Một trong những nguyên nhân được chỉ ra là sự phối hợp liên ngành còn hạn chế và thiếu cơ chế giám sát, đánh giá hiệu quả. \"Sự phối hợp liên ngành còn hạn chế\" ảnh hưởng đến việc thực hiện các mục tiêu bình đẳng giới như thế nào, đặc biệt trong lĩnh vực TN&MT vốn mang tính đa ngành?", "options": {"A": "Không ảnh hưởng gì vì mỗi ngành tự thực hiện phần việc của mình.", "B": "Các vấn đề giới thường mang tính liên ngành (ví dụ, quyền đất đai của phụ nữ liên quan đến cả ngành TN&MT, nông nghiệp, tư pháp, LĐTBXH). Sự thiếu phối hợp có thể dẫn đến việc các chính sách không đồng bộ, chồng chéo, hoặc bỏ sót các khía cạnh quan trọng, làm giảm hiệu quả tổng thể. [41, 95, 2050]", "C": "Giúp các ngành tập trung hơn vào chuyên môn của mình.", "D": "Chỉ ảnh hưởng đến việc báo cáo số liệu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các vấn đề giới, và đặc biệt là các vấn đề trong lĩnh vực TN&MT, thường cắt ngang qua nhiều ngành. Sự phối hợp yếu kém sẽ cản trở việc giải quyết một cách toàn diện và hiệu quả. [41, 95, 2050]"}, {"level": "1", "content": "Tình huống: Một báo cáo đánh giá giữa kỳ của một chương trình quốc gia về bình đẳng giới cho thấy 13/21 chỉ tiêu không đạt kế hoạch [28]. Một trong những nguyên nhân được chỉ ra là sự phối hợp liên ngành còn hạn chế và thiếu cơ chế giám sát, đánh giá hiệu quả. Để cải thiện việc đạt được các chỉ tiêu bình đẳng giới trong giai đoạn tiếp theo, một giải pháp quan trọng liên quan đến \"vai trò và trách nhiệm của Nhà nước\" [71] là gì?", "options": {"A": "Giảm bớt số lượng chỉ tiêu để dễ đạt hơn.", "B": "Tăng cường cơ chế giám sát, đánh giá việc thực hiện Chiến lược; nâng cao trách nhiệm giải trình của các Bộ, ngành, địa phương; và đảm bảo sự phối hợp liên ngành hiệu quả hơn, có thể thông qua một cơ quan điều phối đủ mạnh. [71, 75, 79]", "C": "Giao toàn bộ trách nhiệm thực hiện cho Hội Liên hiệp Phụ nữ.", "D": "Chỉ tập trung vào việc tuyên truyền, nâng cao nhận thức."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nhà nước có vai trò then chốt trong việc thiết lập cơ chế giám sát, đánh giá, đảm bảo trách nhiệm giải trình và điều phối hiệu quả để các mục tiêu chính sách được thực hiện. [71, 75, 79]"}, {"level": "1", "content": "Tình huống: Một dự án du lịch sinh thái cộng đồng tại một vùng có nhiều thác nước đẹp và rừng nguyên sinh. Ban đầu, dự án thu hút rất đông khách du lịch, mang lại thu nhập đáng kể cho cộng đồng. Tuy nhiên, sau một thời gian, do khai thác quá mức, thiếu quy hoạch và quản lý bền vững, các thác nước bắt đầu cạn kiệt vào mùa khô, rác thải gia tăng, và một số nét văn hóa đặc sắc của cộng đồng bị \"thương mại hóa\" quá mức, làm giảm sức hấp dẫn của điểm đến. Phụ nữ, người ban đầu được hưởng lợi từ việc bán hàng lưu niệm và dịch vụ ăn uống, cũng bắt đầu cảm thấy gánh nặng từ việc thiếu nước và môi trường ô nhiễm. Tình huống này minh họa cho sự thiếu vắng yếu tố nào trong quá trình phát triển du lịch, dẫn đến hậu quả tiêu cực?", "options": {"A": "Thiếu quảng bá và marketing hiệu quả.", "B": "Thiếu sự quản lý bền vững, bao gồm việc đánh giá sức chịu tải của môi trường, quy hoạch có sự tham gia của cộng đồng, cơ chế chia sẻ lợi ích công bằng và bảo tồn các giá trị văn hóa, môi trường lâu dài. [168, 1178]", "C": "Thiếu sự đầu tư từ các doanh nghiệp lớn.", "D": "Cộng đồng không có kỹ năng làm du lịch."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phát triển du lịch, đặc biệt là du lịch sinh thái, đòi hỏi một cách tiếp cận bền vững, cân bằng giữa lợi ích kinh tế trước mắt và việc bảo tồn tài nguyên, văn hóa cho tương lai. Sự thiếu quản lý bền vững thường dẫn đến những hậu quả tiêu cực. [168, 1178]"}, {"level": "1", "content": "Tình huống: Một dự án du lịch sinh thái cộng đồng tại một vùng có nhiều thác nước đẹp và rừng nguyên sinh. Ban đầu, dự án thu hút rất đông khách du lịch, mang lại thu nhập đáng kể cho cộng đồng. Tuy nhiên, sau một thời gian, do khai thác quá mức, thiếu quy hoạch và quản lý bền vững, các thác nước bắt đầu cạn kiệt vào mùa khô, rác thải gia tăng, và một số nét văn hóa đặc sắc của cộng đồng bị \"thương mại hóa\" quá mức, làm giảm sức hấp dẫn của điểm đến. Phụ nữ, người ban đầu được hưởng lợi từ việc bán hàng lưu niệm và dịch vụ ăn uống, cũng bắt đầu cảm thấy gánh nặng từ việc thiếu nước và môi trường ô nhiễm. Nếu áp dụng lăng kính \"Giới và Phát triển Môi trường bền vững\" (Chương 8, tiêu đề cuối chương) [287], tác động tiêu cực đến phụ nữ (thiếu nước, ô nhiễm) trong tình huống này nhấn mạnh điều gì?", "options": {"A": "Phụ nữ không có khả năng thích ứng với những thay đổi.", "B": "Sự liên kết chặt chẽ giữa suy thoái môi trường và những điểm yếu đặc thù của phụ nữ, những người thường chịu trách nhiệm chính về nước sinh hoạt và sức khỏe gia đình; đồng thời cho thấy việc phát triển kinh tế (du lịch) nếu không bền vững về môi trường sẽ ảnh hưởng tiêu cực trở lại đến phúc lợi xã hội, đặc biệt là phụ nữ. [3, 4, 208, 2781]", "C": "Du lịch sinh thái không phải là một mô hình phù hợp cho phụ nữ.", "D": "Nam giới không bị ảnh hưởng bởi tình trạng thiếu nước và ô nhiễm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Tình huống này cho thấy rõ mối liên hệ mật thiết giữa môi trường, giới và phát triển. Khi môi trường suy thoái do các hoạt động kinh tế không bền vững, phụ nữ thường là người chịu tác động nặng nề và trực tiếp nhất do vai trò và trách nhiệm giới của họ. [3, 4, 208, 2781]"}, {"level": "1", "content": "Tình huống: Một dự án du lịch sinh thái cộng đồng tại một vùng có nhiều thác nước đẹp và rừng nguyên sinh. Ban đầu, dự án thu hút rất đông khách du lịch, mang lại thu nhập đáng kể cho cộng đồng. Tuy nhiên, sau một thời gian, do khai thác quá mức, thiếu quy hoạch và quản lý bền vững, các thác nước bắt đầu cạn kiệt vào mùa khô, rác thải gia tăng, và một số nét văn hóa đặc sắc của cộng đồng bị \"thương mại hóa\" quá mức, làm giảm sức hấp dẫn của điểm đến. Phụ nữ, người ban đầu được hưởng lợi từ việc bán hàng lưu niệm và dịch vụ ăn uống, cũng bắt đầu cảm thấy gánh nặng từ việc thiếu nước và môi trường ô nhiễm. Để phục hồi và phát triển bền vững điểm du lịch này, một trong những \"vấn đề ưu tiên và định hướng hành động\" [223] cho cộng đồng và các nhà quản lý địa phương KHÔNG nên là:", "options": {"A": "Đánh giá lại sức chịu tải của môi trường và tài nguyên, xây dựng quy hoạch du lịch có sự tham gia thực chất của cả nam và nữ trong cộng đồng.", "B": "Phát triển các sản phẩm du lịch mới dựa trên việc khai thác tối đa các tài nguyên còn lại mà không cần quan tâm đến bảo tồn. [223, , 226, 227, 228]", "C": "Xây dựng cơ chế quản lý rác thải hiệu quả, bảo vệ nguồn nước và các hệ sinh thái nhạy cảm.", "D": "Đa dạng hóa các hoạt động du lịch, tập trung vào trải nghiệm văn hóa đích thực và giáo dục môi trường, đồng thời đảm bảo chia sẻ lợi ích công bằng và trao quyền cho cộng đồng (bao gồm cả phụ nữ) trong quản lý."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khai thác tối đa tài nguyên mà không bảo tồn sẽ đi ngược lại nguyên tắc phát triển bền vững và làm trầm trọng thêm các vấn đề hiện tại. Các lựa chọn còn lại đều là những định hướng hành động phù hợp để phục hồi và phát triển bền vững. [223, , 226, 227, 228]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu của Viện Hàn lâm Khoa học Xã hội Việt Nam [83] phân tích các vấn đề giới trong lĩnh vực ứng phó với BĐKH, thiên tai và thảm họa môi trường. Nghiên cứu này có thể đóng góp vào việc \"cung cấp luận cứ khoa học cho hoạch định chính sách và vận động xã hội\" [113] như thế nào? Vai trò chính của nghiên cứu này trong việc hoạch định chính sách là gì?", "options": {"A": "Chỉ để đáp ứng yêu cầu của các nhà tài trợ quốc tế.", "B": "Cung cấp các bằng chứng thực tiễn, phân tích sâu sắc về những điểm yếu, khả năng ứng phó và nhu cầu khác biệt của nam và nữ trước các tác động của BĐKH và thiên tai, từ đó giúp các nhà hoạch định chính sách xây dựng các chiến lược, kế hoạch và biện pháp can thiệp hiệu quả, công bằng và nhạy cảm giới hơn. [83, 109, 113, 115]", "C": "Thay thế hoàn toàn vai trò của các cơ quan quản lý nhà nước trong việc ra chính sách.", "D": "Chỉ có giá trị tham khảo cho các nhà khoa học khác."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nghiên cứu khoa học cung cấp dữ liệu và phân tích dựa trên bằng chứng, làm cơ sở quan trọng để các nhà hoạch định chính sách hiểu rõ hơn về vấn đề và đưa ra các quyết định sáng suốt, phù hợp với thực tế. [83, 109, 113, 115]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu của Viện Hàn lâm Khoa học Xã hội Việt Nam [83] phân tích các vấn đề giới trong lĩnh vực ứng phó với BĐKH, thiên tai và thảm họa môi trường. Nghiên cứu này có thể đóng góp vào việc \"cung cấp luận cứ khoa học cho hoạch định chính sách và vận động xã hội\" [113] như thế nào? Đối với các tổ chức xã hội dân sự, kết quả của nghiên cứu này có thể được sử dụng để làm gì trong các hoạt động vận động xã hội?", "options": {"A": "Chỉ để tổ chức các hội thảo khoa học trong phạm vi hẹp.", "B": "Làm cơ sở để xây dựng các thông điệp truyền thông mạnh mẽ, các chiến dịch nâng cao nhận thức cộng đồng về tác động giới của BĐKH và thiên tai, và vận động các cơ quan nhà nước ban hành hoặc điều chỉnh các chính sách theo hướng bảo vệ tốt hơn quyền lợi của phụ nữ và các nhóm dễ bị tổn thương. [82, 90, 91, 113]", "C": "Chỉ trích các chính sách hiện tại của chính phủ mà không đưa ra giải pháp.", "D": "Yêu cầu tất cả người dân phải thay đổi hành vi ngay lập tức."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các tổ chức xã hội dân sự có thể sử dụng bằng chứng từ nghiên cứu để tăng cường tính thuyết phục của các hoạt động vận động chính sách và nâng cao nhận thức cộng đồng, thúc đẩy những thay đổi tích cực. [82, 90, 91, 113]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu của Viện Hàn lâm Khoa học Xã hội Việt Nam [83] phân tích các vấn đề giới trong lĩnh vực ứng phó với BĐKH, thiên tai và thảm họa môi trường. Nghiên cứu này có thể đóng góp vào việc \"cung cấp luận cứ khoa học cho hoạch định chính sách và vận động xã hội\" [113] như thế nào? Để nghiên cứu này thực sự có tác động đến chính sách, một yếu tố KHÔNG thể thiếu là gì, bên cạnh chất lượng khoa học của nghiên cứu?", "options": {"A": "Nghiên cứu phải được viết bằng tiếng Anh để có uy tín quốc tế.", "B": "Phải có cơ chế hiệu quả để kết quả nghiên cứu được truyền tải, thảo luận và xem xét một cách nghiêm túc bởi các nhà hoạch định chính sách và các cơ quan có thẩm quyền, cũng như sự phối hợp giữa giới học thuật và các cơ quan nhà nước. [113, 117]", "C": "Nghiên cứu phải được giữ bí mật tuyệt đối.", "D": "Chỉ những nhà nghiên cứu nam giới mới được trình bày kết quả."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Chất lượng nghiên cứu là cần thiết nhưng chưa đủ. Để nghiên cứu có tác động, cần có các kênh và cơ chế hiệu quả để kết quả nghiên cứu đến được với những người ra quyết định và được họ xem xét, sử dụng trong quá trình hoạch định chính sách. [113, 117]"}, {"level": "1", "content": "Tình huống: Một doanh nghiệp khởi nghiệp xanh do một nhóm nữ sinh viên ngành TN&MT sáng lập, sản xuất các sản phẩm tẩy rửa sinh học từ rác thải hữu cơ. Họ gặp khó khăn trong việc tiếp cận nguồn vốn ban đầu, cạnh tranh với các sản phẩm công nghiệp giá rẻ và thuyết phục người tiêu dùng thay đổi thói quen. Khó khăn của nhóm nữ sinh viên này phản ánh một \"thách thức về giới nổi bật\" nào đối với phụ nữ khởi nghiệp xanh (Chương 8)?", "options": {"A": "Phụ nữ không có ý tưởng kinh doanh sáng tạo.", "B": "Việc tiếp cận vốn, thị trường và vượt qua các rào cản cạnh tranh, đặc biệt trong các lĩnh vực mới và đòi hỏi thay đổi hành vi người tiêu dùng, thường khó khăn hơn đối với các doanh nghiệp khởi nghiệp, và có thể còn khó khăn hơn nữa đối với các nữ doanh nhân trẻ do hạn chế về kinh nghiệm và mạng lưới. [184, 185, 189, 190, 191, 229]", "C": "Sản phẩm tẩy rửa sinh học không có tiềm năng thị trường.", "D": "Chỉ có nam giới mới nên khởi nghiệp trong lĩnh vực xanh."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ khởi nghiệp, đặc biệt trong các lĩnh vực mới và bền vững, thường đối mặt với nhiều thách thức về vốn, thị trường, công nghệ và cả các định kiến giới tiềm ẩn. [184, 185, 189, 190, 191, 229]"}, {"level": "1", "content": "Tình huống: Một doanh nghiệp khởi nghiệp xanh do một nhóm nữ sinh viên ngành TN&MT sáng lập, sản xuất các sản phẩm tẩy rửa sinh học từ rác thải hữu cơ. Họ gặp khó khăn trong việc tiếp cận nguồn vốn ban đầu, cạnh tranh với các sản phẩm công nghiệp giá rẻ và thuyết phục người tiêu dùng thay đổi thói quen. Nếu một tổ chức hỗ trợ muốn giúp nhóm nữ sinh viên này vượt qua khó khăn, một \"sáng kiến hành động thiết thực\" [236] KHÔNG nên là:", "options": {"A": "Cung cấp các chương trình đào tạo về quản trị kinh doanh, marketing, và kỹ năng xây dựng thương hiệu cho các sản phẩm xanh.", "B": "Kết nối họ với các nhà đầu tư tiềm năng, các quỹ đầu tư mạo hiểm quan tâm đến các dự án bền vững và do phụ nữ lãnh đạo.", "C": "Khuyên họ nên từ bỏ ý tưởng vì quá nhiều rủi ro và chuyển sang tìm việc làm ổn định. [239, 240, 241]", "D": "Hỗ trợ họ tham gia các hội chợ, triển lãm về sản phẩm xanh để quảng bá và tìm kiếm đối tác."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Một tổ chức hỗ trợ nên tìm cách tháo gỡ khó khăn và tạo điều kiện cho sự phát triển, chứ không phải làm nản lòng và khuyên từ bỏ các ý tưởng khởi nghiệp có tiềm năng. Các lựa chọn A, B, D đều là các hình thức hỗ trợ phù hợp. [239, 240, 241]"}, {"level": "1", "content": "Tình huống: Một doanh nghiệp khởi nghiệp xanh do một nhóm nữ sinh viên ngành TN&MT sáng lập, sản xuất các sản phẩm tẩy rửa sinh học từ rác thải hữu cơ. Họ gặp khó khăn trong việc tiếp cận nguồn vốn ban đầu, cạnh tranh với các sản phẩm công nghiệp giá rẻ và thuyết phục người tiêu dùng thay đổi thói quen. Sự thành công của các \"doanh nghiệp xanh do phụ nữ lãnh đạo\" [183] có ý nghĩa gì đối với việc \"thay đổi nhận thức, thái độ và hành vi về giới\" [59]?", "options": {"A": "Không có ý nghĩa gì đáng kể.", "B": "Nó cung cấp những hình mẫu thành công, phá bỏ các định kiến về khả năng lãnh đạo và kinh doanh của phụ nữ, đặc biệt trong các lĩnh vực mới và đòi hỏi sự đổi mới, từ đó truyền cảm hứng cho các phụ nữ khác và thay đổi nhận thức của cộng đồng. [59, 183, 186, 187, 188]", "C": "Nó chứng tỏ rằng chỉ có phụ nữ mới quan tâm đến các vấn đề môi trường.", "D": "Nó làm gia tăng sự cạnh tranh không lành mạnh giữa các doanh nghiệp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Những câu chuyện thành công của các nữ doanh nhân, đặc biệt trong các lĩnh vực được coi là \"nam tính\" hoặc mới mẻ, có tác động mạnh mẽ đến việc thay đổi nhận thức xã hội và phá vỡ các khuôn mẫu giới. [59, 183, 186, 187, 188]"}, {"level": "1", "content": "Tình huống: Một dự án \"Quản lý tổng hợp vùng bờ\" [2289] nhằm giải quyết các vấn đề xói lở, ô nhiễm và suy giảm nguồn lợi thủy sản. Đánh giá giới ban đầu cho thấy phụ nữ trong các cộng đồng ven bờ chủ yếu làm các nghề khai thác thủy sản gần bờ, buôn bán nhỏ và nội trợ, trong khi nam giới tham gia đánh bắt xa bờ và các hoạt động xây dựng. Việc \"lồng ghép giới vào các dự án đầu tư công liên quan đến biến đổi khí hậu và phòng chống thiên tai\" [2013] trong bối cảnh này có nghĩa là gì?", "options": {"A": "Chỉ tập trung vào việc bảo vệ tài sản của nam giới (tàu thuyền lớn).", "B": "Phân tích các tác động khác biệt của xói lở, ô nhiễm và suy giảm nguồn lợi đến sinh kế và sức khỏe của nam và nữ; đảm bảo các biện pháp can thiệp (ví dụ, xây kè, phục hồi rừng ngập mặn, hỗ trợ chuyển đổi sinh kế) có tính đến nhu cầu, vai trò và khả năng tham gia của cả hai giới. [2013, 2014, 2289, 2324]", "C": "Chỉ tuyển dụng lao động nữ cho các công việc xây dựng.", "D": "Ưu tiên di dời tất cả các cộng đồng ven bờ vào sâu trong đất liền."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lồng ghép giới đòi hỏi phải hiểu rõ các tác động và nhu cầu khác biệt, từ đó thiết kế các can thiệp phù hợp và đảm bảo sự tham gia, hưởng lợi công bằng của cả nam và nữ trong bối cảnh BĐKH và PCTT. [2013, 2014, 2289, 2324]"}, {"level": "1", "content": "Tình huống: Một dự án \"Quản lý tổng hợp vùng bờ\" [2289] nhằm giải quyết các vấn đề xói lở, ô nhiễm và suy giảm nguồn lợi thủy sản. Đánh giá giới ban đầu cho thấy phụ nữ trong các cộng đồng ven bờ chủ yếu làm các nghề khai thác thủy sản gần bờ, buôn bán nhỏ và nội trợ, trong khi nam giới tham gia đánh bắt xa bờ và các hoạt động xây dựng. Nếu dự án chỉ tập trung vào các giải pháp kỹ thuật \"cứng\" (xây kè, trồng rừng) mà không có các hợp phần hỗ trợ sinh kế \"mềm\" cho phụ nữ (những người có thể bị mất nguồn lợi từ khai thác gần bờ), điều này có thể dẫn đến:", "options": {"A": "Sự phục hồi nhanh chóng của toàn bộ hệ sinh thái ven bờ.", "B": "Phụ nữ có thể đối mặt với nguy cơ mất an ninh lương thực và thu nhập, tăng điểm yếu kinh tế, trong khi các giải pháp kỹ thuật có thể không giải quyết được tận gốc các vấn đề sinh kế của họ. [5, 6, 2391, 2399]", "C": "Tất cả phụ nữ sẽ chuyển sang làm các công việc phi nông nghiệp.", "D": "Không có tác động gì đến phụ nữ vì họ không tham gia đánh bắt xa bờ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các giải pháp kỹ thuật cần đi đôi với các biện pháp hỗ trợ sinh kế, đặc biệt cho những nhóm có sinh kế phụ thuộc trực tiếp vào các tài nguyên bị ảnh hưởng, để đảm bảo tính công bằng và bền vững xã hội của dự án. [5, 6, 2391, 2399]"}, {"level": "1", "content": "Tình huống: Một dự án \"Quản lý tổng hợp vùng bờ\" nhằm giải quyết các vấn đề xói lở, ô nhiễm và suy giảm nguồn lợi thủy sản. Đánh giá giới ban đầu cho thấy phụ nữ trong các cộng đồng ven bờ chủ yếu làm các nghề khai thác thủy sản gần bờ, buôn bán nhỏ và nội trợ, trong khi nam giới tham gia đánh bắt xa bờ và các hoạt động xây dựng. \"Cẩm nang Ngân sách Khí hậu có Trách nhiệm Giới\" của UNDP [2090] có thể cung cấp những hướng dẫn gì cho việc lập ngân sách của dự án này?", "options": {"A": "Chỉ cách tính toán chi phí xây dựng các công trình.", "B": "Các phương pháp để phân tích ngân sách dự án từ góc độ giới, đảm bảo các nguồn lực được phân bổ để giải quyết các nhu cầu và điểm yếu khác biệt của nam và nữ liên quan đến tác động khí hậu ở vùng bờ, cũng như các chỉ số để theo dõi chi tiêu và kết quả về giới. [2037, 2038, 2039, 2090]", "C": "Danh sách các nhà thầu uy tín để thực hiện các công trình.", "D": "Cách huy động thêm vốn từ các nhà tài trợ quốc tế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Cẩm nang này sẽ cung cấp các công cụ và phương pháp luận để tích hợp các cân nhắc về giới vào quá trình lập kế hoạch, phân bổ và giám sát ngân sách cho các hành động ứng phó với BĐKH. [2037, 2038, 2039, 2090] Chắc chắn rồi, đây là 30 câu hỏi trắc nghiệm (không phải tình huống) ở mức độ khó cao hơn, tập trung vào việc phân tích sâu hơn, so sánh và đánh giá các khái niệm."}, {"level": "1", "content": "Sự khác biệt cơ bản giữa \"vai trò giới\" (gender roles) và \"bản sắc giới\" (gender identity) là gì?", "options": {"A": "Vai trò giới là do xã hội quy định, bản sắc giới là nhận thức nội tại của cá nhân về giới của mình.", "B": "Vai trò giới chỉ áp dụng cho phụ nữ, bản sắc giới chỉ áp dụng cho nam giới.", "C": "Vai trò giới là cố định, bản sắc giới có thể thay đổi hàng ngày.", "D": "Hai khái niệm này hoàn toàn đồng nghĩa."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> \"Vai trò giới\" là những kỳ vọng và hành vi xã hội gán cho nam và nữ. \"Bản sắc giới\" là cảm nhận sâu sắc và mang tính cá nhân của một người về việc mình là nam, nữ, cả hai, không phải cả hai, hoặc một giới khác. (Tham khảo: Các giáo trình Xã hội học về Giới, các tài liệu của UNHCR về bản sắc giới)."}, {"level": "1", "content": "Việc một số lý thuyết phát triển ban đầu (ví dụ, một số khía cạnh của lý thuyết hiện đại hóa) cho rằng các nước đang phát triển sẽ \"bắt kịp\" các nước phát triển bằng cách áp dụng mô hình kinh tế của phương Tây, thường bỏ qua yếu tố giới như thế nào?", "options": {"A": "Cho rằng phụ nữ ở các nước đang phát triển không có vai trò kinh tế.", "B": "Ngầm giả định rằng mô hình phát triển \"trung tính về giới\" của phương Tây (vốn cũng có những bất bình đẳng giới tiềm ẩn) sẽ tự động mang lại lợi ích cho cả nam và nữ ở các nước đang phát triển, bỏ qua các cấu trúc giới và văn hóa đặc thù tại địa phương.", "C": "Chỉ tập trung vào vai trò của phụ nữ mà bỏ qua nam giới.", "D": "Cho rằng các vấn đề giới sẽ tự động được giải quyết khi kinh tế tăng trưởng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các lý thuyết hiện đại hóa ban đầu thường không phân tích kỹ lưỡng các tác động giới của quá trình \"hiện đại hóa\", và có thể áp đặt một mô hình phát triển mà không tính đến sự đa dạng về vai trò và vị thế giới ở các bối cảnh văn hóa khác nhau. (Tham khảo: Phê bình nữ quyền đối với các lý thuyết phát triển)."}, {"level": "1", "content": "\"Lồng ghép giới có tính chuyển đổi\" (transformative gender mainstreaming) khác với \"lồng ghép giới mang tính tích hợp\" (integrative gender mainstreaming) ở điểm nào là cốt yếu?", "options": {"A": "Lồng ghép chuyển đổi chỉ tập trung vào phụ nữ, lồng ghép tích hợp tập trung vào cả nam và nữ.", "B": "Lồng ghép chuyển đổi nhằm mục đích thách thức và thay đổi các cấu trúc quyền lực, chuẩn mực và thể chế bất bình đẳng giới gốc rễ, trong khi lồng ghép tích hợp có thể chỉ dừng lại ở việc đưa các nhu cầu của phụ nữ vào các hệ thống hiện có mà không nhất thiết thay đổi các hệ thống đó.", "C": "Lồng ghép chuyển đổi tốn kém hơn nhiều so với lồng ghép tích hợp.", "D": "Không có sự khác biệt đáng kể, đây chỉ là cách gọi khác nhau."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lồng ghép giới có tính chuyển đổi hướng đến những thay đổi mang tính căn bản, cấu trúc để đạt được bình đẳng giới thực chất, trong khi cách tiếp cận tích hợp có thể chỉ là việc \"thêm phụ nữ vào\" mà không làm thay đổi các động lực quyền lực cơ bản. (Tham khảo: Các tài liệu nâng cao về chiến lược lồng ghép giới của các tổJC quốc tế)."}, {"level": "1", "content": "Tại sao việc sử dụng Chỉ số Bất bình đẳng giới (GII) lại được coi là một cải tiến so với Thước đo Năng lực của Phụ nữ (GEM) trước đây?", "options": {"A": "Vì GII dễ tính toán hơn GEM rất nhiều.", "B": "Vì GII bao gồm các khía cạnh quan trọng như sức khỏe sinh sản

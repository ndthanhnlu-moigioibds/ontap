", "content": "Nhận thức về sự \"công bằng\" của nguồn gốc tạo ra bất bình đẳng (ví dụ, do nỗ lực chính đáng hay do tham nhũng) ảnh hưởng đến sự ổn định xã hội như thế nào?", "options": {"A": "Không có ảnh hưởng gì, miễn là mức độ bất bình đẳng không quá cao.", "B": "Bất bình đẳng bị coi là do các phương tiện không công bằng (tham nhũng, thân hữu) sẽ gây tổn hại nghiêm trọng hơn đến lòng tin và sự gắn kết xã hội so với bất bình đẳng được cho là kết quả của nỗ lực cá nhân.", "C": "Mọi hình thức bất bình đẳng đều được xã hội chấp nhận như nhau.", "D": "Chỉ có bất bình đẳng do nỗ lực cá nhân mới gây bất ổn xã hội."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự chấp nhận của xã hội đối với bất bình đẳng phụ thuộc nhiều vào việc nó có được coi là \"công bằng\" hay không. Bất bình đẳng do các yếu tố tiêu cực như tham nhũng sẽ làm xói mòn lòng tin và gây bất ổn xã hội mạnh mẽ hơn. [2715, 2716, 2722, 2724]"}, {"level": "1", "content": "Tình trạng góa bụa, đặc biệt ở phụ nữ trẻ hoặc phụ nữ lớn tuổi ở nông thôn, làm tăng nguy cơ đói nghèo của họ không chỉ vì mất đi người lao động chính mà còn vì:", "options": {"A": "Họ thường không có kỹ năng làm việc.", "B": "Họ có thể mất quyền kiểm soát đối với tài sản (đặc biệt là đất đai thừa kế từ nhà chồng), bị hạn chế cơ hội tái hôn hoặc nhận hỗ trợ xã hội, và phải gánh vác trách nhiệm chăm sóc con cái một mình.", "C": "Họ không muốn làm việc nữa sau khi chồng mất.", "D": "Các chương trình hỗ trợ của nhà nước chỉ dành cho nam giới góa vợ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Góa bụa đặt phụ nữ vào tình thế dễ bị tổn thương đặc biệt do các yếu tố liên quan đến quyền tài sản, chuẩn mực xã hội và gánh nặng chăm sóc, bên cạnh việc mất đi thu nhập từ người chồng. [2737, 2738, 2744, 2747]"}, {"level": "1", "content": "Tại sao việc đo lường đói nghèo ở cấp độ hộ gia đình có thể che giấu mức độ nghèo thực sự của phụ nữ và trẻ em gái trong gia đình?", "options": {"A": "Vì phụ nữ và trẻ em gái thường khai báo sai về tình trạng kinh tế của mình.", "B": "Vì giả định rằng các nguồn lực được chia sẻ công bằng trong hộ gia đình thường không đúng; phụ nữ và trẻ em gái có thể có ít quyền tiếp cận và kiểm soát nguồn lực hơn, dẫn đến tình trạng thiếu thốn cá nhân không được phản ánh.", "C": "Vì các cuộc khảo sát hộ gia đình thường không phỏng vấn phụ nữ.", "D": "Vì chỉ có nam giới mới thực sự hiểu rõ tình hình kinh tế của gia đình."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các phương pháp đo lường truyền thống ở cấp hộ gia đình thường bỏ qua sự phân bổ không đồng đều nguồn lực và quyền lực trong nội bộ gia đình, do đó có thể đánh giá thấp mức độ nghèo của các thành viên yếu thế hơn như phụ nữ và trẻ em gái. [2741, 2742, 2743]"}, {"level": "1", "content": "\"Nữ hóa ngành nông nghiệp\" ở một số vùng của Việt Nam (tỷ lệ lao động nữ trong nông nghiệp cao hơn) trong bối cảnh nam giới có thể di cư tìm việc làm phi nông nghiệp, có thể dẫn đến hệ lụy gì cho phụ nữ nếu không có chính sách hỗ trợ phù hợp?", "options": {"A": "Phụ nữ sẽ có nhiều quyền lực hơn trong gia đình và cộng đồng.", "B": "Gánh nặng công việc nông nghiệp và gia đình sẽ tăng lên cho phụ nữ, trong khi họ vẫn có thể thiếu quyền kiểm soát đất đai và tiếp cận các nguồn lực hỗ trợ.", "C": "Năng suất nông nghiệp sẽ tự động tăng lên.", "D": "Phụ nữ sẽ có nhiều thời gian hơn để tham gia các hoạt động xã hội."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khi nam giới di cư, phụ nữ thường phải gánh vác thêm trách nhiệm trong nông nghiệp bên cạnh công việc nhà, nhưng nếu không có sự thay đổi về quyền kiểm soát tài nguyên và tiếp cận hỗ trợ, gánh nặng của họ sẽ tăng lên mà lợi ích có thể không tương xứng. [272796]"}, {"level": "1", "content": "Trong bối cảnh suy thoái môi trường và biến đổi khí hậu, kiến thức bản địa của phụ nữ về các giống cây trồng chịu hạn, kỹ thuật canh tác bền vững có vai trò gì?", "options": {"A": "Không còn phù hợp vì khoa học công nghệ đã có các giải pháp tốt hơn.", "B": "Là một nguồn tài nguyên quý giá, có thể đóng góp vào việc xây dựng các chiến lược thích ứng hiệu quả, phù hợp với điều kiện địa phương và tăng cường khả năng chống chịu của cộng đồng.", "C": "Chỉ có giá trị về mặt văn hóa, không có giá trị thực tiễn.", "D": "Chỉ nên được áp dụng ở quy mô rất nhỏ trong gia đình."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Tri thức bản địa, đặc biệt là của phụ nữ những người trực tiếp canh tác và quản lý tài nguyên, thường chứa đựng những giải pháp đã được thử thách qua thời gian và phù hợp với hệ sinh thái địa phương, rất quan trọng cho việc thích ứng với BĐKH. [2797, 2806, 2812]"}, {"level": "1", "content": "Việc các dự án phát triển liên quan đến tài nguyên và môi trường thường yêu cầu có giấy chứng nhận quyền sử dụng đất để được tham gia hoặc hưởng lợi có thể loại trừ phụ nữ vì:", "options": {"A": "Phụ nữ không quan tâm đến các dự án này.", "B": "Ở nhiều nơi, phụ nữ không đứng tên hoặc đồng đứng tên trên GCNQSDĐ, mặc dù họ là người canh tác chính.", "C": "Các dự án này chỉ được thiết kế cho nam giới.", "D": "Phụ nữ không có khả năng hiểu các yêu cầu của dự án."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Yêu cầu về GCNQSDĐ có thể trở thành rào cản đối với phụ nữ nếu họ không có quyền sở hữu đất đai chính thức, dù họ là người trực tiếp lao động và phụ thuộc vào đất. [2757, 2822, 2823]"}, {"level": "1", "content": "Tình trạng \"trọng nam khinh nữ\" và các định kiến giới ăn sâu trong xã hội ảnh hưởng đến việc tiếp cận giáo dục và đào tạo nghề của phụ nữ như thế nào?", "options": {"A": "Khuyến khích phụ nữ học các ngành kỹ thuật cao.", "B": "Có thể dẫn đến việc gia đình ưu tiên đầu tư giáo dục cho con trai hơn con gái, hoặc phụ nữ bị định hướng vào các ngành nghề \"truyền thống\", ít có cơ hội phát triển.", "C": "Không có ảnh hưởng gì vì giáo dục là bắt buộc cho tất cả mọi người.", "D": "Giúp phụ nữ có nhiều lựa chọn nghề nghiệp hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các định kiến giới và tư tưởng trọng nam khinh nữ có thể hạn chế cơ hội giáo dục và lựa chọn nghề nghiệp của phụ nữ, hướng họ vào những lĩnh vực được coi là \"phù hợp\" với vai trò giới truyền thống, thường có thu nhập thấp hơn. [322, 2750, 2754]"}, {"level": "1", "content": "Mối liên hệ giữa việc thiếu quyền kiểm soát tài sản (đặc biệt là đất đai) của phụ nữ và khả năng của họ trong việc đối phó với các cú sốc kinh tế hoặc môi trường là gì?", "options": {"A": "Không có mối liên hệ nào.", "B": "Việc thiếu tài sản làm giảm khả năng của họ trong việc huy động nguồn lực (ví dụ, vay vốn, bán tài sản) để vượt qua khó khăn, khiến họ dễ bị tổn thương hơn.", "C": "Giúp họ trở nên linh hoạt hơn vì không có gì để mất.", "D": "Chỉ ảnh hưởng đến khả năng đầu tư dài hạn, không ảnh hưởng đến việc đối phó cú sốc."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Tài sản đóng vai trò như một \"tấm đệm\" an toàn khi gặp khó khăn. Việc thiếu quyền kiểm soát tài sản khiến phụ nữ có ít lựa chọn hơn và khả năng phục hồi kém hơn khi đối mặt với các cú sốc. [2768, 2771]"}, {"level": "1", "content": "Tại sao các chính sách nông nghiệp nhằm tăng năng suất và hiện đại hóa sản xuất cần phải đi kèm với các biện pháp đảm bảo bình đẳng giới trong tiếp cận công nghệ và thị trường?", "options": {"A": "Vì phụ nữ không có khả năng học hỏi công nghệ mới.", "B": "Để tránh tình trạng nam giới hưởng lợi chính từ quá trình hiện đại hóa, trong khi phụ nữ có thể bị gạt ra ngoài lề hoặc mất việc làm truyền thống mà không có cơ hội chuyển đổi.", "C": "Vì các nhà tài trợ quốc tế yêu cầu như vậy.", "D": "Vì công nghệ cao không phù hợp với nông nghiệp quy mô nhỏ do phụ nữ quản lý."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nếu không có sự hỗ trợ và các biện pháp đảm bảo bình đẳng, quá trình hiện đại hóa nông nghiệp có thể làm gia tăng khoảng cách giới, khi nam giới có nhiều lợi thế hơn trong việc tiếp cận và hưởng lợi từ công nghệ và thị trường mới. [2332, 2333, 2334, 2378]"}, {"level": "1", "content": "Khi một quốc gia áp dụng định nghĩa GRB của OECD (tập trung vào quy trình và công cụ phân tích) so với định nghĩa của UN Women (chú trọng quyền phụ nữ và thu hẹp khoảng cách giới), sự khác biệt trong ưu tiên thực hiện có thể là gì?", "options": {"A": "Không có sự khác biệt nào đáng kể.", "B": "Theo OECD, có thể ưu tiên phát triển kỹ thuật phân tích ngân sách; theo UN Women, có thể ưu tiên các chương trình giải quyết trực tiếp bất bình đẳng giới.", "C": "Theo OECD, sẽ chỉ có các chuyên gia kinh tế tham gia; theo UN Women, chỉ có các nhà hoạt động nữ quyền tham gia.", "D": "Theo OECD, sẽ không cần thu thập dữ liệu giới; theo UN Women, dữ liệu giới là quan trọng nhất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các định nghĩa khác nhau có thể dẫn đến những điểm nhấn và ưu tiên khác nhau trong quá trình triển khai GRB. OECD có thể chú trọng hơn đến khía cạnh kỹ thuật, trong khi UN Women có thể tập trung hơn vào kết quả trực tiếp đối với phụ nữ. [1901, 1902, 1903, 1904, 1905, 1906]"}, {"level": "1", "content": "\"Phân tích chi tiêu công và phân bổ lợi ích theo giới\" thường kết hợp dữ liệu chi tiêu của chính phủ với dữ liệu từ đâu để đánh giá tác động?", "options": {"A": "Chỉ báo cáo của các bộ ngành.", "B": "Các cuộc điều tra hộ gia đình.", "C": "Ý kiến của các chuyên gia kinh tế.", "D": "Dữ liệu từ thị trường chứng khoán."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Công cụ này cần dữ liệu từ các cuộc điều tra hộ gia đình (ví dụ: về việc sử dụng dịch vụ công, mức sống) để có thể phân tích xem ai thực sự hưởng lợi từ các khoản chi tiêu của chính phủ. [1954]"}, {"level": "1", "content": "Tại sao việc tích hợp thống kê sử dụng thời gian vào quy trình GRB, đặc biệt khi phân tích tác động của các khoản chi tiêu công cho cơ sở hạ tầng, lại quan trọng mặc dù còn hạn chế?", "options": {"A": "Vì nó giúp chứng minh rằng phụ nữ làm việc ít hơn nam giới.", "B": "Vì đầu tư vào cơ sở hạ tầng (ví dụ, đường xá, điện, nước) có thể giải phóng đáng kể thời gian làm việc không lương của phụ nữ, tạo ra lợi ích kinh tế và xã hội gián tiếp mà nếu không đo lường sẽ bị bỏ sót.", "C": "Vì nó giúp các dự án cơ sở hạ tầng trở nên đắt đỏ hơn.", "D": "Vì đây là cách duy nhất để đo lường hiệu quả của GRB."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Cơ sở hạ tầng có thể giảm đáng kể thời gian phụ nữ dành cho các công việc như lấy nước, kiếm củi. Nếu không dùng khảo sát sử dụng thời gian để đo lường sự thay đổi này, một phần lợi ích quan trọng của dự án sẽ không được ghi nhận. [1970, 1974, 1975, 191977]"}, {"level": "1", "content": "Việc thiếu dữ liệu phân tách theo giới một cách có hệ thống trong lĩnh vực TN&MT cản trở việc thực hiện GRB hiệu quả như thế nào?", "options": {"A": "Làm cho các báo cáo GRB trở nên quá ngắn gọn.", "B": "Gây khó khăn trong việc xác định chính xác nhu cầu, vai trò và tác động khác biệt của chính sách đối với các nhóm giới, từ đó không thể điều chỉnh ngân sách một cách phù hợp và công bằng.", "C": "Không ảnh hưởng nhiều vì có thể dựa vào kinh nghiệm của cán bộ.", "D": "Chỉ ảnh hưởng đến việc so sánh với các quốc gia khác."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Dữ liệu phân tách theo giới là nền tảng để phân tích và đưa ra các quyết định dựa trên bằng chứng trong GRB. Thiếu dữ liệu này sẽ làm giảm tính chính xác và hiệu quả của quá trình. [1992, 2092, 2093, 2094]"}, {"level": "1", "content": "\"Biện pháp đặc biệt tạm thời\" (Temporary Special Measures - TSMs) trong GRB có thể được áp dụng khi nào và nhằm mục đích gì?", "options": {"A": "Áp dụng vĩnh viễn để luôn ưu tiên một giới.", "B": "Áp dụng khi cần giải quyết những bất bình đẳng giới mang tính lịch sử hoặc cấu trúc, ví dụ như đặt chỉ tiêu ưu tiên cho phụ nữ trong tiếp cận nguồn lực hoặc vị trí lãnh đạo, nhằm tạo ra sự thay đổi nhanh hơn.", "C": "Chỉ áp dụng cho các dự án nhỏ, không quan trọng.", "D": "Chỉ khi có yêu cầu từ các tổ chức quốc tế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> TSMs là các biện pháp nhằm đẩy nhanh việc đạt được bình đẳng giới thực chất bằng cách bù đắp cho những bất lợi mà một giới (thường là phụ nữ) đã phải đối mặt trong quá khứ hoặc đang đối mặt do các yếu tố cấu trúc. Chúng thường mang tính tạm thời cho đến khi đạt được sự cân bằng. [2006]"}, {"level": "1", "content": "Trong Đánh giá giới (GA), việc phân tích \"các mối quan hệ quyền lực giới\" (ai ra quyết định, ai kiểm soát tài nguyên) quan trọng vì:", "options": {"A": "Nó giúp xác định ai là người giàu nhất và nghèo nhất trong cộng đồng.", "B": "Nó giúp hiểu được các động lực ngầm định hình sự tiếp cận và hưởng lợi từ tài nguyên và các can thiệp, ngay cả khi bề ngoài có vẻ công bằng.", "C": "Nó chỉ cần thiết khi phân tích các dự án liên quan đến chính trị.", "D": "Nó làm cho quá trình đánh giá trở nên nhạy cảm và khó thực hiện."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các mối quan hệ quyền lực giới là yếu tố then chốt quyết định việc ai thực sự có tiếng nói, ai kiểm soát và ai hưởng lợi. Bỏ qua yếu tố này sẽ dẫn đến một phân tích nông cạn và các giải pháp không hiệu quả. [2120, 2150]"}, {"level": "1", "content": "Một trong những thách thức khi áp dụng Khung Harvard trong thực tế là nó có thể \"đơn giản hóa 2 công cụ tiếp cận và kiểm soát, khuyến khích cách trả lời rằng phụ nữ có quyền tiếp cận và kiểm soát hay không\". Điều này có nghĩa là:", "options": {"A": "Khung Harvard quá phức tạp để sử dụng.", "B": "Thực tế về tiếp cận và kiểm soát thường phức tạp hơn là chỉ \"có\" hoặc \"không\"; có thể có các mức độ khác nhau, hoặc phụ nữ có thể tiếp cận nhưng không kiểm soát hoàn toàn, hoặc kiểm soát một số khía cạnh nhưng không kiểm soát các khía cạnh khác.", "C": "Phụ nữ luôn nói dối khi được hỏi về quyền tiếp cận và kiểm soát.", "D": "Công cụ này không hữu ích trong việc phân tích giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quyền tiếp cận và kiểm soát không phải lúc nào cũng là một phạm trù nhị phân (có/không). Thực tế thường có nhiều sắc thái và mức độ khác nhau, và việc chỉ hỏi \"có/không\" có thể bỏ qua những sự phức tạp này. [912, 913]"}, {"level": "1", "content": "Tại sao Khung Moser lại phân biệt giữa \"nhu cầu giới thực tế\" (PGN) và \"nhu cầu giới chiến lược\" (SGN) khi hoạch định giới?", "options": {"A": "Để đảm bảo rằng các dự án chỉ tập trung giải quyết các PGN vì chúng dễ thực hiện hơn.", "B": "Để nhận ra rằng việc chỉ đáp ứng PGN (ví dụ, cung cấp nước sạch) có thể cải thiện điều kiện sống trước mắt nhưng không nhất thiết làm thay đổi vị thế phụ thuộc của phụ nữ; cần phải giải quyết SGN (ví dụ, tăng quyền ra quyết định) để đạt được bình đẳng giới thực chất.", "C": "Vì SGN luôn quan trọng hơn PGN.", "D": "Vì nam giới chỉ có PGN, còn phụ nữ chỉ có SGN."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự phân biệt này giúp các nhà hoạch định nhận thức được sự khác biệt giữa việc cải thiện điều kiện sống hiện tại và việc tạo ra những thay đổi mang tính cấu trúc về quyền lực và vị thế giới, từ đó thiết kế các can thiệp toàn diện hơn. [936, 937, 998, 999, 1015, 1018]"}, {"level": "1", "content": "Một dự án trồng rừng cộng đồng. Công cụ \"Hồ sơ hoạt động\" của Khung Harvard sẽ giúp làm rõ điều gì nếu được áp dụng?", "options": {"A": "Các loại cây nào nên được trồng để mang lại hiệu quả kinh tế cao nhất.", "B": "Ai (nam, nữ, người già, trẻ em) thực hiện những công việc cụ thể nào trong quá trình trồng, chăm sóc và bảo vệ rừng (ví dụ: làm đất, trồng cây, tưới nước, tuần tra...).", "C": "Các chính sách quốc gia về lâm nghiệp có ưu tiên cho cộng đồng này hay không.", "D": "Mức độ đa dạng sinh học của khu rừng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Hồ sơ hoạt động tập trung vào việc xác định \"ai làm gì\" trong các hoạt động của dự án hoặc trong một lĩnh vực cụ thể, giúp làm rõ sự phân công lao động theo giới và các yếu tố khác. [8863, 865]"}, {"level": "1", "content": "Khung Longwe cho rằng nếu một hoạt động can thiệp phát triển tập trung vào các \"mức độ bình đẳng\" cao hơn (ví dụ, từ \"Tiếp cận\" lên \"Tham gia\" rồi \"Kiểm soát\"), thì mức độ trao quyền cho phụ nữ sẽ:", "options": {"A": "Giảm đi.", "B": "Không thay đổi.", "C": "Tăng lên.", "D": "Chỉ tăng lên nếu có sự tham gia của nam giới."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khung Longwe xây dựng các mức độ bình đẳng theo một hệ thống phân cấp, với giả định rằng việc đạt được các mức độ cao hơn (như Tham gia vào ra quyết định, Kiểm soát nguồn lực) sẽ tương ứng với mức độ trao quyền lớn hơn cho phụ nữ. [971, 991033, 1034, 1035]"}, {"level": "1", "content": "Trong phân tích giới, việc sử dụng \"phương pháp cùng tham gia\" (participatory methods) như thảo luận nhóm, lập bản đồ cộng đồng có ưu điểm gì so với việc chỉ dựa vào khảo sát bảng hỏi định lượng?", "options": {"A": "Luôn cho kết quả chính xác hơn về mặt thống kê.", "B": "Giúp thu hút sự tham gia của các nhóm đối tượng (đặc biệt là những người yếu thế), lắng nghe tiếng nói và quan điểm đa chiều của họ, đồng thời tăng tính sở hữu của cộng đồng đối với kết quả phân tích và giải pháp.", "C": "Tốn ít thời gian và chi phí hơn nhiều.", "D": "Chỉ phù hợp với các cộng đồng có trình độ dân trí cao."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các phương pháp cùng tham gia tạo không gian cho đối thoại, chia sẻ kinh nghiệm và quan điểm từ nhiều góc độ khác nhau, đặc biệt là từ những người thường ít có tiếng nói, làm cho phân tích trở nên sâu sắc và các giải pháp phù hợp hơn. [671, 740, 844]"}, {"level": "1", "content": "\"Đánh giá tác động giới\" (GIA) khác với \"Phân tích tình hình giới\" (Gender Situation Analysis - một phần của bước đầu trong GRB) ở điểm nào?", "options": {"A": "GIA chỉ xem xét tác động tiêu cực, Phân tích tình hình xem xét cả tích cực và tiêu cực.", "B": "Phân tích tình hình giới mô tả thực trạng hiện tại của các giới, trong khi GIA dự báo hoặc đánh giá tác động tiềm tàng (hoặc thực tế) của một chính sách/chương trình cụ thể đối với tình hình đó.", "C": "GIA chỉ được thực hiện bởi các chuyên gia quốc tế.", "D": "Hai khái niệm này hoàn toàn giống nhau."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phân tích tình hình giới là bước mô tả \"hiện trạng\" (ví dụ, vai trò, nhu cầu, bất bình đẳng hiện có). GIA là bước đánh giá xem một \"can thiệp\" cụ thể (chính sách, dự án) sẽ tác động như thế nào đến hiện trạng đó, liệu nó có làm giảm hay tăng bất bình đẳng. [817, 821, 1936, 1938]"}, {"level": "1", "content": "Khi một dự án TN&MT áp dụng công cụ \"Phân tích các bên liên quan theo giới\" (Gendered Stakeholder Analysis), mục tiêu KHÔNG chỉ là xác định ai bị ảnh hưởng mà còn là:", "options": {"A": "Tìm ra ai là người gây ra các vấn đề môi trường.", "B": "Phân tích lợi ích, vai trò, quyền lực và mối quan tâm của các nhóm giới khác nhau liên quan đến dự án, từ đó xác định các đồng minh, đối thủ tiềm năng và xây dựng chiến lược thu hút sự tham gia hiệu quả.", "C": "Xếp hạng mức độ quan trọng của từng bên liên quan.", "D": "Giảm số lượng các bên liên quan cần phải làm việc."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phân tích này giúp hiểu rõ hơn về động lực quyền lực giới giữa các bên liên quan, mối quan tâm và khả năng ảnh hưởng của họ đối với dự án, từ đó có chiến lược làm việc phù hợp. [2163] (Tham khảo từ Bảng 6.4)"}, {"level": "1", "content": "Tại sao việc \"xác định các chỉ tiêu cần đạt được của các giải pháp\" và \"giám sát, đánh giá việc thực hiện\" lại quan trọng trong bước \"Đề xuất giải pháp\" của quy trình phân tích giới?", "options": {"A": "Để đảm bảo rằng tất cả các giải pháp đều tốn kém như nhau.", "B": "Để có thể điều chỉnh giải pháp nếu chúng không mang lại kết quả như mong đợi, rút kinh nghiệm và nhân rộng các mô hình thành công, đồng thời đảm bảo tính trách nhiệm giải trình.", "C": "Vì đây là yêu cầu bắt buộc của người quản lý dự án.", "D": "Để làm cho quá trình đề xuất giải pháp trở nên phức tạp hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc có chỉ tiêu rõ ràng và cơ chế giám sát, đánh giá giúp theo dõi tiến độ, đo lường hiệu quả của các giải pháp, từ đó có những điều chỉnh kịp thời và học hỏi kinh nghiệm. [843]"}, {"level": "1", "content": "Sự khác biệt chính trong mục tiêu giữa Khung Harvard và Khung Longwe là gì?", "options": {"A": "Khung Harvard tập trung vào hiệu quả kinh tế, Khung Longwe tập trung vào phúc lợi xã hội.", "B": "Khung Harvard nhằm mục đích phân bổ hợp lý nguồn lực giữa nam và nữ để tăng hiệu quả dự án, trong khi Khung Longwe trực tiếp nhắm đến việc đánh giá và thúc đẩy các mức độ bình đẳng và trao quyền cho phụ nữ.", "C": "Khung Harvard chỉ áp dụng cho nông nghiệp, Khung Longwe áp dụng cho mọi lĩnh vực.", "D": "Không có sự khác biệt đáng kể về mục tiêu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khung Harvard có cách tiếp cận \"hiệu quả\", xem xét việc phân bổ nguồn lực. Khung Longwe có cách tiếp cận \"trao quyền\", tập trung vào việc phụ nữ đạt được các mức độ bình đẳng khác nhau như thế nào. [852, 960, 961]"}, {"level": "1", "content": "Việc các chính sách đất đai ở Việt Nam hướng tới tích tụ, tập trung đất đai có thể tạo ra \"tác động kép\" đối với phụ nữ nông dân như thế nào nếu không được quản lý cẩn trọng từ góc độ giới?", "options": {"A": "Họ vừa được hưởng lợi từ việc đất đai có giá trị cao hơn, vừa có thêm nhiều việc làm phi nông nghiệp.", "B": "Họ có thể vừa mất quyền sử dụng đất (do không đứng tên hoặc bị gạt ra trong các giao dịch), vừa mất đi các sinh kế truyền thống phụ thuộc vào đất mà không có sự chuẩn bị hoặc hỗ trợ chuyển đổi phù hợp.", "C": "Họ sẽ hoàn toàn kiểm soát được quá trình tích tụ đất đai.", "D": "Chính sách này không có tác động gì đặc biệt đối với phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> \"Tác động kép\" ở đây là nguy cơ phụ nữ vừa mất đi tư liệu sản xuất chính (đất đai), vừa mất đi nguồn sinh kế gắn liền với đất, nếu các chính sách không tính đến vị thế yếu hơn của họ và không có các biện pháp hỗ trợ chuyển đổi nghề nghiệp nhạy cảm giới. [2318, 2319, 2320, 2321]"}, {"level": "1", "content": "Tại sao việc phụ nữ nông thôn thường là người chịu trách nhiệm chính trong việc thực hiện các nghĩa vụ liên quan đến các khoản vay (dù ai là người đứng tên vay) lại vừa khẳng định vai trò của họ, vừa tiềm ẩn rủi ro?", "options": {"A": "Nó cho thấy họ hoàn toàn kiểm soát tài chính gia đình và không có rủi ro gì.", "B": "Nó khẳng định vai trò năng động của họ trong kinh tế gia đình, nhưng cũng đặt lên vai họ gánh nặng trả nợ và áp lực tài chính nếu việc làm ăn không thuận lợi, trong khi quyền quyết định về khoản vay lớn có thể không hoàn toàn thuộc về họ.", "C": "Nó chứng tỏ rằng chỉ phụ nữ mới có khả năng quản lý nợ.", "D": "Nó làm giảm bớt gánh nặng cho nam giới và không ảnh hưởng đến phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc phụ nữ đứng ra lo liệu các khoản vay thể hiện sự năng động, nhưng nếu họ không có thực quyền trong việc quyết định sử dụng vốn hoặc phải chịu trách nhiệm chính khi có rủi ro, điều đó lại tạo thêm áp lực và bất bình đẳng. [2323, 2324]"}, {"level": "1", "content": "Mặc dù có nhiều chương trình hỗ trợ phụ nữ khởi nghiệp trong nông nghiệp, một rào cản \"vô hình\" cản trở sự thành công của họ có thể là:", "options": {"A": "Thiếu các ý tưởng kinh doanh sáng tạo.", "B": "Sự thiếu tự tin, các định kiến xã hội về vai trò của phụ nữ trong kinh doanh, và hạn chế trong việc tiếp cận các mạng lưới quan hệ, thị trường lớn.", "C": "Chính phủ không có chính sách nào hỗ trợ.", "D": "Phụ nữ không muốn làm chủ doanh nghiệp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Ngoài các yếu tố hữu hình như vốn, kỹ thuật, các rào cản tâm lý, xã hội (định kiến, thiếu tự tin) và hạn chế về mạng lưới cũng ảnh hưởng lớn đến khả năng thành công của các nữ doanh nhân. [2288, 2289, 0]"}, {"level": "1", "content": "Trong bối cảnh biến đổi khí hậu, tại sao việc chỉ tập trung vào các giải pháp công nghệ hiện đại mà bỏ qua hoặc xem nhẹ tri thức bản địa (đặc biệt là của phụ nữ) lại có thể không hiệu quả?", "options": {"A": "Vì công nghệ hiện đại luôn tốt hơn tri thức bản địa.", "B": "Vì tri thức bản địa thường chứa đựng những kinh nghiệm thích ứng phù hợp với điều kiện sinh thái và văn hóa cụ thể của địa phương, có thể bổ sung hoặc làm tăng tính hiệu quả, bền vững của các giải pháp công nghệ nếu được kết hợp một cách hài hòa.", "C": "Vì phụ nữ không có khả năng tiếp thu công nghệ hiện đại.", "D": "Vì tri thức bản địa không thể giải quyết được các vấn đề quy mô lớn của BĐKH."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Tri thức bản địa là một nguồn lực quan trọng, thường bị bỏ qua. Việc kết hợp nó với khoa học hiện đại có thể tạo ra các giải pháp thích ứng BĐKH hiệu quả, phù hợp và được cộng đồng chấp nhận hơn. [232811, 2812]"}, {"level": "1", "content": "Việc lồng ghép giới vào Chương trình Mục tiêu quốc gia xây dựng Nông thôn mới đòi hỏi không chỉ có các chỉ tiêu riêng về phụ nữ mà còn phải:", "options": {"A": "Đảm bảo tất cả các vị trí lãnh đạo trong chương trình đều do phụ nữ đảm nhiệm.", "B": "Phân tích và giải quyết các tác động giới trong tất cả các hợp phần và tiêu chí của chương trình (ví dụ, quy hoạch, hạ tầng, sản xuất, văn hóa...), đảm bảo sự tham gia và hưởng lợi công bằng của cả nam và nữ.", "C": "Giảm ngân sách cho các hoạt động không trực tiếp liên quan đến phụ nữ.", "D": "Chỉ tập trung vào việc xây dựng các mô hình \"gia đình văn hóa\"."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lồng ghép giới thực chất đòi hỏi một cách tiếp cận xuyên suốt, tích hợp các cân nhắc về giới vào mọi khía cạnh của chương trình, chứ không chỉ giới hạn ở một vài chỉ tiêu hay hoạt động riêng lẻ. [2405, 2414, 2416, 2417]"}, {"level": "1", "content": "Hệ thống tài chính vi mô do Hội LHPN Việt Nam và các tổ chức tương tự triển khai, mặc dù rất quan trọng, nhưng việc quá phụ thuộc vào các kênh \"đặc thù\" này có thể phản ánh điều gì về hệ thống tài chính phổ thông?", "options": {"A": "Hệ thống tài chính phổ thông đã rất hoàn thiện và không cần thay đổi.", "B": "Các kênh \"đặc thù\" này hiệu quả hơn và nên thay thế hoàn toàn hệ thống phổ thông.", "C": "Hệ thống tài chính phổ thông có thể vẫn còn những rào cản, chưa đủ linh hoạt hoặc chưa có sản phẩm phù hợp để đáp ứng hiệu quả nhu cầu của phụ nữ nông thôn và các nhóm yếu thế.", "D": "Phụ nữ nông thôn chỉ nên sử dụng các dịch vụ tài chính \"đặc thù\"."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Sự tồn tại của các kênh tài chính vi mô nhắm vào phụ nữ cho thấy các ngân hàng và tổ chức tài chính lớn hơn có thể chưa đáp ứng đầy đủ nhu cầu của nhóm đối tượng này, đòi hỏi phải có những cải cách để hệ thống tài chính trở nên bao trùm hơn. [2515, 2516, 2518, 2520]"}, {"level": "1", "content": "Tại sao việc \"đo lường tác động của các chương trình trao quyền kinh tế cho phụ nữ một cách chính xác và đảm bảo sự trao quyền đó là thực chất\" lại là một thách thức?", "options": {"A": "Vì không có phương pháp nào để đo lường thu nhập của phụ nữ.", "B": "Vì trao quyền không chỉ là tăng thu nhập mà còn liên quan đến các yếu tố khó đo lường hơn như quyền ra quyết định, sự thay đổi trong chuẩn mực giới, và giảm gánh nặng công việc không lương; các chỉ số cần phải phản ánh được sự phức tạp này.", "C": "Vì các chương trình này thường không có tác động gì đáng kể.", "D": "Vì phụ nữ không muốn chia sẻ thông tin về tình hình kinh tế của họ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trao quyền là một khái niệm đa chiều. Việc đo lường nó đòi hỏi phải vượt ra ngoài các chỉ số kinh tế đơn thuần để nắm bắt được những thay đổi về quyền lực, vai trò và chuẩn mực giới. [2547, 2548, 2549, 2550]"}, {"level": "1", "content": "Trong bối cảnh GRB, \"tính minh bạch\" của quy trình ngân sách có ý nghĩa gì đối với việc thúc đẩy bình đẳng giới?", "options": {"A": "Làm cho ngân sách trở nên khó hiểu hơn đối với công chúng.", "B": "Cho phép các tổ chức xã hội, các nhà nghiên cứu và công chúng tiếp cận thông tin về cách ngân sách được phân bổ và chi tiêu, từ đó có thể giám sát và đánh giá liệu các cam kết về giới có được thực hiện hay không.", "C": "Chỉ quan trọng đối với các cơ quan kiểm toán nhà nước.", "D": "Giúp chính phủ che giấu các khoản chi không hiệu quả."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Tính minh bạch tạo điều kiện cho sự giám sát từ bên ngoài, tăng cường trách nhiệm giải trình của chính phủ trong việc thực hiện các mục tiêu bình đẳng giới thông qua ngân sách. [1912, 1916]"}, {"level": "1", "content": "Việc thiếu các \"chế tài xử lý cụ thể đối với hành vi vi phạm\" quy định cấm phân biệt đối xử về giới trong Luật Đất đai 2024 có thể ảnh hưởng đến hiệu quả thực thi như thế nào?", "options": {"A": "Không ảnh hưởng gì vì người dân sẽ tự giác tuân thủ.", "B": "Có thể làm giảm tính răn đe và hiệu quả của quy định, khiến các hành vi phân biệt đối xử vẫn có thể tiếp diễn mà không bị xử lý nghiêm.", "C": "Giúp cho việc thực thi trở nên linh hoạt hơn.", "D": "Chỉ các tổ chức quốc tế mới có quyền xử lý các vi phạm này."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một quy định pháp luật, dù tốt đẹp, nhưng nếu thiếu cơ chế thực thi và chế tài xử lý rõ ràng, cụ thể thì hiệu lực của nó trên thực tế có thể bị hạn chế đáng kể. [87]"}, {"level": "1", "content": "Tại sao việc áp dụng GRB trong tiểu ngành khai thác khoáng sản lại đặc biệt quan trọng và phức tạp?", "options": {"A": "Vì ngành khoáng sản không có tác động gì đến phụ nữ.", "B": "Vì ngành này thường có tác động môi trường và xã hội lớn, có thể ảnh hưởng tiêu cực đến sinh kế và sức khỏe của phụ nữ và cộng đồng địa phương; đồng thời, việc chia sẻ lợi ích từ nguồn thu lớn của ngành này một cách công bằng cũng là một thách thức.", "C": "Vì phụ nữ không muốn làm việc trong ngành khoáng sản.", "D": "Vì GRB chỉ phù hợp với các ngành dịch vụ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Ngành khai khoáng thường gây ra những tác động đa chiều và sâu rộng. GRB giúp đảm bảo rằng các tác động tiêu cực đến phụ nữ được giảm thiểu và họ được hưởng lợi một cách công bằng từ tài nguyên quốc gia. [2029, 2030, 2031, 2032]"}, {"level": "1", "content": "Trong Đánh giá giới, việc sử dụng kỹ thuật \"Lập bản đồ tài nguyên có sự tham gia\" (Participatory Resource Mapping) giúp làm rõ điều gì mà các phương pháp khác có thể khó thể hiện?", "options": {"A": "Thu nhập bình quân đầu người của cộng đồng.", "B": "Một cách trực quan về cách các nhóm giới khác nhau (nam, nữ, già, trẻ) sử dụng, tiếp cận, kiểm soát và nhìn nhận các loại tài nguyên khác nhau trong không gian cụ thể của họ.", "C": "Lịch sử hình thành của cộng đồng.", "D": "Số lượng các loài động thực vật trong khu vực."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Công cụ này tạo ra một sản phẩm trực quan (bản đồ) do chính cộng đồng xây dựng, giúp thể hiện rõ ràng mối quan hệ không gian của các nhóm giới khác nhau với tài nguyên, cũng như các vấn đề về quyền và sự kiểm soát. [2147, 2163] (Tham khảo Bảng 6.4)"}, {"level": "1", "content": "Một trong những lý do khiến Khung Harvard bị cho là \"tập trung nhiều vào các hoạt động và các nguồn lực hơn là các mối quan hệ giữa người với người\" là:", "options": {"A": "Nó không thu thập bất kỳ thông tin nào về con người.", "B": "Các công cụ chính của nó (Hồ sơ hoạt động, Hồ sơ Tiếp cận & Kiểm soát) chủ yếu liệt kê và phân loại các hoạt động, tài sản mà ít đi sâu phân tích động lực quyền lực, tương tác xã hội và các yếu tố văn hóa định hình mối quan hệ giới.", "C": "Nó chỉ quan tâm đến các yếu tố kinh tế vĩ mô.", "D": "Nó quá phức tạp để phân tích các mối quan hệ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mặc dù hữu ích trong việc thu thập dữ liệu cơ bản, Khung Harvard có xu hướng tĩnh tại và ít tập trung vào việc phân tích các quy trình xã hội, động lực quyền lực và sự tương tác phức tạp giữa các cá nhân và nhóm giới. [909]"}, {"level": "1", "content": "\"Nhu cầu giới chiến lược\" (SGN) của nam giới, một khía cạnh mà Khung Moser được cho là \"chưa chỉ ra được\", có thể bao gồm những gì?", "options": {"A": "Nhu cầu có thêm thời gian giải trí và xem thể thao.", "B": "Nhu cầu được giải phóng khỏi các khuôn mẫu nam tính cứng nhắc (ví dụ: phải luôn mạnh mẽ, không được thể hiện cảm xúc, phải là trụ cột kinh tế duy nhất), và có cơ hội tham gia nhiều hơn vào việc chăm sóc gia đình.", "C": "Nhu cầu có công việc với mức lương cao hơn phụ nữ.", "D": "Nhu cầu được ưu tiên trong mọi quyết định của gia đình."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Cũng giống như phụ nữ, nam giới cũng bị ảnh hưởng bởi các khuôn mẫu và kỳ vọng giới. Nhu cầu chiến lược của họ có thể liên quan đến việc thách thức những khuôn mẫu này để có một cuộc sống cân bằng và ít áp lực hơn, cũng như xây dựng mối quan hệ bình đẳng hơn. [957, 1019]"}, {"level": "1", "content": "Tại sao việc \"lồng ghép giới vào quy trình Kế hoạch Thích ứng Quốc gia (NAP)\" lại quan trọng hơn việc chỉ có các dự án thích ứng BĐKH riêng lẻ cho phụ nữ?", "options": {"A": "Vì NAP có quy mô lớn hơn và nhiều ngân sách hơn.", "B": "Vì việc lồng ghép vào NAP đảm bảo rằng các cân nhắc về giới trở thành một phần cốt lõi của chiến lược quốc gia về thích ứng BĐKH, ảnh hưởng đến tất cả các ngành và các cấp, thay vì chỉ là các can thiệp rời rạc.", "C": "Vì các dự án riêng lẻ cho phụ nữ không bao giờ hiệu quả.", "D": "Vì NAP chỉ do các chuyên gia quốc tế xây dựng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lồng ghép giới vào các kế hoạch chiến lược quốc gia như NAP có tác động sâu rộng và bền vững hơn, đảm bảo tính hệ thống và sự phối hợp giữa các nỗ lực thích ứng từ góc độ giới. [2037, 202087, 2799]"}, {"level": "1", "content": "Khi nói rằng \"công việc của phụ nữ ít được ghi nhận\" trong mô hình phân công lao động theo giới, điều này không chỉ đề cập đến công việc không lương mà còn có thể bao gồm:", "options": {"A": "Việc họ không làm bất kỳ công việc nào có giá trị.", "B": "Ngay cả trong các công việc được trả lương, giá trị và kỹ năng của họ có thể bị đánh giá thấp hơn, dẫn đến mức lương thấp hơn hoặc ít cơ hội thăng tiến hơn so với nam giới làm công việc tương tự.", "C": "Phụ nữ không muốn công việc của mình được ghi nhận.", "D": "Chỉ có công việc của nam giới mới thực sự tạo ra giá trị kinh tế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự \"ít được ghi nhận\" có thể biểu hiện ở nhiều hình thức, từ việc hoàn toàn bỏ qua công việc không lương đến việc đánh giá thấp giá trị của các công việc (cả có lương và không lương) mà phụ nữ thường đảm nhận. [1102, 1103, 1104, 1139]"}, {"level": "1", "content": "Trong phân tích GRB, việc đánh giá \"tác động giới của chính sách thuế\" cần xem xét yếu tố nào sau đây một cách cẩn trọng?", "options": {"A": "Liệu việc giảm thuế có làm tăng chi tiêu của chính phủ hay không.", "B": "Các loại thuế gián thu (như VAT đánh vào hàng tiêu dùng) có thể ảnh hưởng đến phụ nữ nhiều hơn nếu họ là người quản lý chi tiêu chính của gia đình và các mặt hàng thiết yếu (thường do phụ nữ mua) chiếm tỷ trọng lớn trong rổ hàng hóa chịu thuế.", "C": "Chính sách thuế có đơn giản và dễ hiểu đối với tất cả mọi người không.", "D": "Tổng số thuế thu được có đủ để chi cho các chương trình xã hội không."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thuế gián thu, dù có vẻ trung lập, nhưng có thể có tác động giới khác biệt do mô hình tiêu dùng và vai trò quản lý chi tiêu trong gia đình. Phụ nữ có thể chịu gánh nặng thuế này một cách không cân xứng. [1958, 1961]"}, {"level": "1", "content": "\"Quyền tự chủ\" (autonomy) của phụ nữ, một khía cạnh mà Khung Moser bị cho là chưa nhấn mạnh đủ, vượt ra ngoài việc \"cân bằng ba vai trò\" ở điểm nào?", "options": {"A": "Quyền tự chủ chỉ có nghĩa là phụ nữ có nhiều thời gian rảnh hơn.", "B": "Quyền tự chủ không chỉ là việc quản lý các vai trò hiện có mà còn là khả năng đưa ra các lựa chọn mang tính chiến lược về cuộc đời mình, quyền kiểm soát cơ thể, và quyền tự quyết trong mọi lĩnh vực, không bị giới hạn bởi các vai trò được gán.", "C": "Quyền tự chủ chỉ áp dụng cho phụ nữ ở các nước phát triển.", "D": "Cân bằng ba vai trò đã đảm bảo hoàn toàn quyền tự chủ cho phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quyền tự chủ là một khái niệm rộng hơn, bao hàm khả năng kiểm soát cuộc sống và đưa ra các quyết định độc lập, vượt ra ngoài việc chỉ sắp xếp và cân bằng các vai trò đã được xã hội định sẵn. [958, 1020]"}, {"level": "1", "content": "Một dự án phát triển cơ sở hạ tầng (ví dụ, xây dựng đường giao thông) nếu không thực hiện Đánh giá giới (GA) kỹ lưỡng, có thể vô tình gây ra tác động tiêu cực nào đối với phụ nữ mà không lường trước được?", "options": {"A": "Đường mới sẽ giúp phụ nữ đi lại nhanh hơn và an toàn hơn trong mọi trường hợp.", "B": "Đường mới có thể làm thay đổi luồng giao thương, khiến các chợ truyền thống nơi phụ nữ buôn bán nhỏ lẻ bị mất khách; hoặc việc giải tỏa mặt bằng không đền bù thỏa đáng cho đất đai/tài sản mà phụ nữ phụ thuộc.", "C": "Chi phí xây dựng đường sẽ luôn được sử dụng hiệu quả nhất.", "D": "Tất cả mọi người trong cộng đồng đều được hưởng lợi như nhau từ con đường mới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các dự án hạ tầng lớn có thể có những tác động phức tạp và không lường trước đến các nhóm dân cư khác nhau. Nếu không có GA, những tác động tiêu cực tiềm ẩn đối với sinh kế hoặc an toàn của phụ nữ có thể bị bỏ qua. [2133, 2134] (Hàm ý từ việc GA giúp tránh hậu quả không mong muốn)"}, {"level": "1", "content": "Sự khác biệt cơ bản giữa cách tiếp cận \"hiệu quả\" (efficiency approach) của Khung Harvard và cách tiếp cận \"trao quyền\" (empowerment approach) của Khung Longwe là gì?", "options": {"A": "\"Hiệu quả\" tập trung vào việc phụ nữ làm việc nhiều hơn, \"trao quyền\" tập trung vào việc phụ nữ nghỉ ngơi nhiều hơn.", "B": "\"Hiệu quả\" xem xét việc tích hợp phụ nữ vào phát triển để tăng năng suất và hiệu quả kinh tế chung, trong khi \"trao quyền\" tập trung vào việc thay đổi vị thế của phụ nữ, tăng cường quyền lực và khả năng tự quyết của họ.", "C": "Cả hai cách tiếp cận đều có mục tiêu và phương pháp giống hệt nhau.", "D": "\"Hiệu quả\" chỉ áp dụng cho các dự án kinh tế, \"trao quyền\" chỉ áp dụng cho các dự án xã hội."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Cách tiếp cận hiệu quả (thường gắn với WID và Khung Harvard) coi phụ nữ như một nguồn lực cần được khai thác tốt hơn để đạt mục tiêu phát triển chung. Cách tiếp cận trao quyền (thường gắn với GAD và Khung Longwe) coi việc thay đổi vị thế và tăng cường quyền lực cho phụ nữ là một mục tiêu tự thân và là điều kiện cho phát triển bền vững. [851, 852, 960, 91023, 1069]"}, {"level": "1", "content": "Tại sao việc chỉ dựa vào \"ý chí chính trị\" mà thiếu \"năng lực kỹ thuật\" (ví dụ, kỹ năng phân tích dữ liệu giới, xây dựng ngân sách nhạy cảm giới) lại không đủ để thực hiện GRB thành công?", "options": {"A": "Vì ý chí chính trị không quan trọng bằng năng lực kỹ thuật.", "B": "Vì GRB là một quá trình thuần túy kỹ thuật, không cần ý chí chính trị.", "C": "Vì ý chí chính trị tạo ra cam kết và định hướng, nhưng năng lực kỹ thuật là cần thiết để chuyển các cam kết đó thành các phân tích, kế hoạch và hành động cụ thể, có thể đo lường và mang lại hiệu quả thực tế.", "D": "Vì các chuyên gia kỹ thuật có thể tự quyết định mọi việc mà không cần sự đồng ý của lãnh đạo chính trị."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> GRB đòi hỏi cả cam kết chính trị mạnh mẽ (ý chí) và năng lực chuyên môn (kỹ thuật) để có thể triển khai hiệu quả. Thiếu một trong hai yếu tố này đều có thể dẫn đến thất bại hoặc kết quả hạn chế. [1900, 1906, 1947, 2092, 2098, 2111] Tình huống 1 (Câu 251-253): Một dự án lâm nghiệp cộng đồng được triển khai tại một xã miền núi, nơi phụ nữ dân tộc thiểu số có truyền thống thu hái lâm sản phụ (măng, nấm, dược liệu) để phục vụ sinh hoạt và có thêm thu nhập. Tuy nhiên, ban quản lý dự án chủ yếu gồm nam giới và các quy định bảo vệ rừng mới được đưa ra rất chặt chẽ, hạn chế việc vào rừng tự do."}, {"level": "1", "content": "Việc các quy định bảo vệ rừng mới hạn chế việc vào rừng có thể ảnh hưởng tiêu cực đến phụ nữ dân tộc thiểu số trong tình huống này như thế nào, nếu không có các biện pháp hỗ trợ đi kèm?", "options": {"A": "Giúp họ có nhiều thời gian nghỉ ngơi hơn.", "B": "Có thể làm mất đi nguồn sinh kế và lương thực phụ trợ quan trọng của họ, tăng gánh nặng kinh tế gia đình.", "C": "Khuyến khích họ chuyển sang các công việc có thu nhập cao hơn.", "D": "Không ảnh hưởng gì vì họ có thể dễ dàng tìm nguồn thay thế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ dân tộc thiểu số thường phụ thuộc vào lâm sản phụ. Việc hạn chế tiếp cận rừng mà không có giải pháp thay thế có thể ảnh hưởng nghiêm trọng đến sinh kế và an ninh lương thực của họ. [2026, 2776]"}, {"level": "1", "content": "Nếu áp dụng Khung Harvard để phân tích tình huống này, việc phụ nữ bị hạn chế thu hái lâm sản phụ sẽ được ghi nhận ở công cụ nào?", "options": {"A": "Chỉ ở Hồ sơ hoạt động (Activity Profile) là họ không còn hoạt động đó.", "B": "Chủ yếu ở Hồ sơ Tiếp cận và Kiểm soát (Access and Control Profile), cho thấy họ mất quyền tiếp cận nguồn lực (rừng, lâm sản phụ) và lợi ích (thu nhập, thực phẩm).", "C": "Chỉ ở Phân tích các yếu tố ảnh hưởng (Influencing Factors Analysis) như một yếu tố pháp lý mới.", "D": "Chỉ ở Danh mục kiểm tra trong chu trình dự án (Project Cycle Analysis Checklist) khi đánh giá tác động."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc bị hạn chế vào rừng trực tiếp ảnh hưởng đến quyền \"tiếp cận\" các nguồn lực (lâm sản) và các \"lợi ích\" (thu nhập, thực phẩm) mà họ từng có. Hồ sơ hoạt động cũng thay đổi, nhưng cốt lõi vấn đề nằm ở sự thay đổi trong tiếp cận và kiểm soát. [870, 871, 901]"}, {"level": "1", "content": "Để dự án này trở nên \"nhạy cảm giới\" và \"đáp ứng giới\" hơn, một giải pháp quan trọng cần thực hiện là gì?", "options": {"A": "Cấm hoàn toàn việc phụ nữ vào rừng để bảo vệ rừng tuyệt đối.", "B": "Tổ chức các cuộc họp tham vấn riêng với phụ nữ để hiểu rõ nhu cầu, tác động và tìm kiếm các giải pháp sinh kế thay thế phù hợp hoặc cơ chế chia sẻ lợi ích công bằng từ việc bảo vệ rừng.", "C": "Chỉ bồi thường một lần cho tất cả các hộ gia đình bị ảnh hưởng.", "D": "Tăng cường lực lượng kiểm lâm nam giới để giám sát chặt chẽ hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một giải pháp đáp ứng giới cần phải hiểu rõ nhu cầu và tác động cụ thể đến phụ nữ, đồng thời thu hút sự tham gia của họ vào việc tìm kiếm giải pháp, đảm bảo họ không bị thiệt thòi và có thể có sinh kế thay thế. [191966, 2000, 2001] ________________________________________ Tình huống 2 (Câu 254-256): Một chương trình tín dụng vi mô được triển khai ở một xã nông thôn, ưu tiên cho phụ nữ vay vốn để phát triển kinh tế hộ gia đình. Tuy nhiên, sau một thời gian, tỷ lệ nợ xấu của các khoản vay do phụ nữ đứng tên có xu hướng gia tăng. Phân tích sâu hơn cho thấy nhiều phụ nữ vay tiền nhưng việc sử dụng vốn và quản lý sản xuất kinh doanh lại do chồng hoặc các thành viên nam khác trong gia đình quyết định."}, {"level": "1", "content": "Tình huống này phản ánh vấn đề gì trong việc trao quyền kinh tế cho phụ nữ?", "options": {"A": "Phụ nữ không có khả năng quản lý tài chính và kinh doanh.", "B": "Việc chỉ đứng tên vay vốn (tiếp cận tín dụng) không đồng nghĩa với việc phụ nữ có quyền kiểm soát thực sự đối với việc sử dụng vốn và ra quyết định kinh doanh.", "C": "Các chương trình tín dụng vi mô không phù hợp với phụ nữ nông thôn.", "D": "Lãi suất cho vay quá cao khiến phụ nữ không thể trả nợ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là một ví dụ điển hình cho thấy sự khác biệt giữa \"tiếp cận\" và \"kiểm soát\". Phụ nữ có thể tiếp cận được nguồn vốn nhưng nếu không có quyền quyết định và kiểm soát việc sử dụng, hiệu quả của khoản vay và việc trao quyền kinh tế sẽ bị hạn chế. [3, 4, 2756]"}, {"level": "1", "content": "Để giải quyết tình trạng nợ xấu và tăng cường trao quyền thực chất cho phụ nữ trong chương trình này, một biện pháp can thiệp phù hợp nên tập trung vào:", "options": {"A": "Ngừng cho phụ nữ vay vốn và chuyển sang cho nam giới vay.", "B": "Kết hợp việc cho vay vốn với các chương trình tập huấn về quản lý tài chính, kỹ năng kinh doanh, và quan trọng hơn là các buổi làm việc với cả vợ và chồng để thúc đẩy sự chia sẻ quyền ra quyết định trong gia đình.", "C": "Tăng cường các biện pháp thu hồi nợ cứng rắn đối với phụ nữ.", "D": "Giảm số tiền cho vay xuống mức thấp hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một giải pháp toàn diện cần nâng cao năng lực cho phụ nữ và đồng thời tác động đến các mối quan hệ giới trong gia đình để đảm bảo phụ nữ có thực quyền. [2335, 2489, 2519]"}, {"level": "1", "content": "Nếu áp dụng Khung Longwe để đánh giá chương trình tín dụng này, việc phụ nữ chỉ đứng tên vay vốn nhưng không có quyền quyết định sử dụng vốn cho thấy họ mới chỉ đạt được mức độ bình đẳng nào?", "options": {"A": "Phúc lợi (Welfare) và Tiếp cận (Access).", "B": "Nhận thức hóa (Conscientisation).", "C": "Tham gia (Participation).", "D": "Kiểm soát (Control)."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ có thể có được lợi ích vật chất (phúc lợi) từ khoản vay và có khả năng tiếp cận nguồn vốn. Tuy nhiên, nếu họ không có quyền quyết định (tham gia) hoặc quyền kiểm soát việc sử dụng vốn, họ chưa đạt được các mức độ trao quyền cao hơn. [970, 1032, 1038] ________________________________________ Tình huống 3 (Câu 257-259): Một dự án cải tạo hệ thống kênh mương thủy lợi ở một vùng nông nghiệp. Quá trình tham vấn cộng đồng chỉ mời đại diện các hộ trưởng (đa số là nam giới). Sau khi dự án hoàn thành, nhiều phụ nữ làm nông nghiệp phàn nàn rằng lịch điều tiết nước mới không phù hợp với thời gian canh tác các loại rau màu mà họ chủ yếu đảm nhận, gây khó khăn cho sản xuất."}, {"level": "1", "content": "Việc dự án chỉ tham vấn hộ trưởng nam giới đã bỏ qua khía cạnh quan trọng nào trong phân tích giới?", "options": {"A": "Vai trò và kiến thức khác biệt của phụ nữ trong các hoạt động sản xuất nông nghiệp cụ thể (ví dụ, trồng rau màu).", "B": "Năng lực tài chính của các hộ gia đình.", "C": "Tác động của dự án đến môi trường tự nhiên.", "D": "Các chính sách đất đai của địa phương."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ và nam giới thường đảm nhận các loại cây trồng và công việc khác nhau trong nông nghiệp. Việc bỏ qua ý kiến của phụ nữ có thể dẫn đến các quyết định kỹ thuật không phù hợp với thực tế canh tác của họ. [1923, 22238]"}, {"level": "1", "content": "Nỗi phàn nàn của phụ nữ về lịch điều tiết nước không phù hợp cho thấy dự án đã không đáp ứng được loại nhu cầu giới nào của họ một cách hiệu quả?", "options": {"A": "Nhu cầu giới chiến lược liên quan đến quyền sở hữu đất đai.", "B": "Nhu cầu giới thực tế liên quan đến việc thực hiện vai trò sản xuất của họ (canh tác rau màu).", "C": "Nhu cầu được tham gia vào các hoạt động chính trị ở địa phương.", "D": "Nhu cầu về giải trí và nghỉ ngơi."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lịch điều tiết nước trực tiếp ảnh hưởng đến khả năng thực hiện công việc sản xuất hàng ngày của phụ nữ. Đây là một nhu cầu giới thực tế liên quan đến vai trò sản xuất của họ. [1242, 1244]"}, {"level": "1", "content": "Để tránh tình trạng tương tự trong các dự án tương lai, bước \"Đánh giá tác động giới\" (GIA) trước dự án cần đặc biệt chú trọng điều gì?", "options": {"A": "Chỉ phân tích tác động kinh tế chung của dự án.", "B": "Xác định và phân tích sự khác biệt trong vai trò sản xuất, nhu cầu sử dụng nước và lịch trình thời gian của nam và nữ nông dân, đồng thời đảm bảo sự tham gia của cả hai giới trong quá trình tham vấn.", "C": "Chỉ tập trung vào việc nâng cao năng suất của các loại cây trồng chính do nam giới quản lý.", "D": "Giảm thiểu chi phí tham vấn cộng đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một GIA hiệu quả cần phải đi sâu vào việc tìm hiểu sự khác biệt giới trong các hoạt động sản xuất và nhu cầu liên quan đến dự án, đồng thời đảm bảo rằng các quy trình tham vấn thực sự bao trùm và lắng nghe được tiếng nói của tất cả các nhóm bị ảnh hưởng. [821, 825, 831]"}, {"level": "1", "content": "Tình huống: Một công ty chế biến nông sản xuất khẩu quyết định đầu tư dây chuyền công nghệ mới, tự động hóa cao để tăng năng suất. Phần lớn lao động ở các công đoạn thủ công trước đây là phụ nữ. Công ty tổ chức các buổi giới thiệu về công nghệ mới nhưng không có kế hoạch đào tạo lại cụ thể cho lực lượng lao động nữ hiện có. Quyết định đầu tư công nghệ mới của công ty, nếu không đi kèm với các biện pháp hỗ trợ lao động nữ, có thể dẫn đến hậu quả gì về mặt giới?", "options": {"A": "Tất cả lao động nữ sẽ tự động được chuyển sang vận hành công nghệ mới.", "B": "Nguy cơ lao động nữ mất việc làm do không có kỹ năng phù hợp với công nghệ mới, trong khi các vị trí vận hành máy móc có thể ưu tiên nam giới.", "C": "Năng suất lao động của phụ nữ sẽ tăng lên đáng kể.", "D": "Công ty sẽ phải tuyển thêm nhiều lao động nữ hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc tự động hóa có thể làm giảm nhu cầu lao động thủ công (nơi phụ nữ thường tập trung). Nếu không có đào tạo lại và các chính sách hỗ trợ, phụ nữ có nguy cơ mất việc làm hoặc bị gạt ra ngoài lề các vị trí mới đòi hỏi kỹ năng khác. [2330, 2331, 2334]"}, {"level": "1", "content": "Tình huống: Một công ty chế biến nông sản xuất khẩu quyết định đầu tư dây chuyền công nghệ mới, tự động hóa cao để tăng năng suất. Phần lớn lao động ở các công đoạn thủ công trước đây là phụ nữ. Công ty tổ chức các buổi giới thiệu về công nghệ mới nhưng không có kế hoạch đào tạo lại cụ thể cho lực lượng lao động nữ hiện có. Theo cách tiếp cận GAD (Giới và Phát triển), vấn đề cốt lõi trong tình huống này không chỉ là việc phụ nữ mất việc làm, mà còn là:", "options": {"A": "Công ty không tối đa hóa được lợi nhuận.", "B": "Sự thiếu vắng các chính sách và cam kết của công ty trong việc đảm bảo cơ hội phát triển công bằng và kỹ năng thích ứng cho lao động nữ, phản ánh sự bất bình đẳng trong quan hệ quyền lực và phân bổ cơ hội.", "C": "Công nghệ mới không đủ hiện đại.", "D": "Nam giới sẽ phải làm việc nhiều hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GAD sẽ nhìn vào các cấu trúc và quan hệ quyền lực. Việc công ty không có kế hoạch hỗ trợ lao động nữ cho thấy sự thiếu quan tâm đến việc đảm bảo cơ hội công bằng và có thể phản ánh sự đánh giá thấp khả năng của họ, hoặc một cấu trúc ưu tiên nam giới trong các vị trí kỹ thuật. [411, 412, 413]"}, {"level": "1", "content": "Tình huống: Một công ty chế biến nông sản xuất khẩu quyết định đầu tư dây chuyền công nghệ mới, tự động hóa cao để tăng năng suất. Phần lớn lao động ở các công đoạn thủ công trước đây là phụ nữ. Công ty tổ chức các buổi giới thiệu về công nghệ mới nhưng không có kế hoạch đào tạo lại cụ thể cho lực lượng lao động nữ hiện có. Một giải pháp mang tính \"nhạy cảm giới\" và \"đáp ứng giới\" mà công ty có thể thực hiện là gì?", "options": {"A": "Chỉ tuyển dụng nam giới để vận hành dây chuyền mới.", "B": "Thực hiện đánh giá nhu cầu đào tạo của lao động nữ, xây dựng chương trình đào tạo lại phù hợp để họ có thể đảm nhận các vị trí mới, hoặc hỗ trợ họ chuyển đổi sang các công việc khác trong công ty/bên ngoài một cách công bằng.", "C": "Sa thải tất cả lao động nữ và tuyển lao động mới có kỹ năng sẵn.", "D": "Giữ nguyên các công đoạn thủ công do phụ nữ làm song song với dây chuyền mới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một giải pháp đáp ứng giới sẽ chủ động tìm cách giảm thiểu tác động tiêu cực và tạo cơ hội mới cho lao động nữ thông qua đào tạo, hỗ trợ chuyển đổi, đảm bảo họ không bị bỏ lại phía sau trong quá trình hiện đại hóa. [838] (Hàm ý từ định nghĩa)"}, {"level": "1", "content": "Tình huống: Một báo cáo về tình hình kinh tế - xã hội của một tỉnh miền núi cho thấy, mặc dù tỷ lệ nghèo đói chung đã giảm, nhưng tỷ lệ hộ nghèo do phụ nữ dân tộc thiểu số làm chủ hộ vẫn còn rất cao và ít thay đổi. Các chương trình giảm nghèo của tỉnh chủ yếu tập trung vào hỗ trợ vốn sản xuất chung cho các hộ nghèo. Tình trạng này minh họa rõ nhất cho khái niệm nào?", "options": {"A": "Đường cong Kuznets đang ở giai đoạn đi lên.", "B": "Sự thành công của các chương trình giảm nghèo đa chiều.", "C": "Hiện tượng \"giới hóa đói nghèo\" và sự giao thoa giữa các yếu tố bất lợi (giới, dân tộc, tình trạng chủ hộ).", "D": "Tất cả các hộ nghèo đều nhận được sự hỗ trợ như nhau."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Việc tỷ lệ nghèo vẫn cao và ít thay đổi ở nhóm phụ nữ dân tộc thiểu số làm chủ hộ cho thấy đói nghèo không tác động đồng đều và có sự tập trung ở các nhóm cụ thể do sự kết hợp của nhiều yếu tố bất lợi. [2733, 2738, 2778]"}, {"level": "1", "content": "Tình huống: Một báo cáo về tình hình kinh tế - xã hội của một tỉnh miền núi cho thấy, mặc dù tỷ lệ nghèo đói chung đã giảm, nhưng tỷ lệ hộ nghèo do phụ nữ dân tộc thiểu số làm chủ hộ vẫn còn rất cao và ít thay đổi. Các chương trình giảm nghèo của tỉnh chủ yếu tập trung vào hỗ trợ vốn sản xuất chung cho các hộ nghèo. Việc các chương trình giảm nghèo của tỉnh chủ yếu tập trung vào hỗ trợ vốn sản xuất chung cho các hộ nghèo có thể chưa hiệu quả đối với các hộ do phụ nữ dân tộc thiểu số làm chủ vì:", "options": {"A": "Họ không biết cách sử dụng vốn sản xuất.", "B": "Phụ nữ dân tộc thiểu số có thể gặp nhiều rào cản hơn trong việc tiếp cận thông tin về chương trình, tiếng nói của họ trong việc quyết định sử dụng vốn trong gia đình có thể hạn chế, hoặc các loại hình sản xuất được hỗ trợ không phù hợp với điều kiện và kỹ năng của họ.", "C": "Họ không muốn thoát nghèo.", "D": "Nguồn vốn hỗ trợ quá lớn khiến họ không quản lý được."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một chương trình hỗ trợ chung có thể không giải quyết được những rào cản đặc thù mà phụ nữ dân tộc thiểu số phải đối mặt, từ việc tiếp cận thông tin, quyền quyết định trong gia đình, đến sự phù hợp của các hoạt động sản xuất được hỗ trợ. [2821, 2822, 2823, 2824]"}, {"level": "1", "content": "Tình huống: Một báo cáo về tình hình kinh tế - xã hội của một tỉnh miền núi cho thấy, mặc dù tỷ lệ nghèo đói chung đã giảm, nhưng tỷ lệ hộ nghèo do phụ nữ dân tộc thiểu số làm chủ hộ vẫn còn rất cao và ít thay đổi. Các chương trình giảm nghèo của tỉnh chủ yếu tập trung vào hỗ trợ vốn sản xuất chung cho các hộ nghèo. Để các chương trình giảm nghèo thực sự hiệu quả và công bằng hơn đối với nhóm phụ nữ dân tộc thiểu số làm chủ hộ, cần áp dụng nguyên tắc phân tích giới nào khi thiết kế và triển khai?", "options": {"A": "Chỉ cần tăng số tiền hỗ trợ vốn cho họ.", "B": "Phân tích các nhóm nữ giới và nam giới khác nhau (theo dân tộc, tình trạng chủ hộ), xác định các yếu tố chi phối (văn hóa, tập quán), và quan tâm đến nhu cầu giới cụ thể (cả thực tế và chiến lược) của họ.", "C": "Chỉ tập trung vào việc dạy chữ cho họ.", "D": "Yêu cầu họ phải di chuyển đến các vùng kinh tế phát triển hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Cần một phân tích giới sâu sắc, xem xét sự đa dạng trong nhóm phụ nữ, các rào cản văn hóa xã hội, và các nhu cầu cụ thể của họ để thiết kế các can thiệp phù hợp và hiệu quả. [755, 757, 780] (Tổng hợp các nguyên tắc 2, 3, 7 từ Chương 7)"}, {"level": "1", "content": "Tình huống 6: Một dự án bảo tồn đa dạng sinh học tại một vườn quốc gia, nơi có nhiều cộng đồng dân tộc thiểu số sinh sống phụ thuộc vào việc khai thác một số tài nguyên từ vùng đệm. Dự án tập trung vào việc tuần tra, bảo vệ nghiêm ngặt và cấm các hoạt động khai thác truyền thống. Đánh giá sau một năm cho thấy tình trạng phá rừng có giảm, nhưng đời sống của nhiều hộ gia đình, đặc biệt là các hộ do phụ nữ quản lý việc thu hái lâm sản phụ, trở nên khó khăn hơn. Việc dự án chỉ tập trung vào biện pháp \"cấm và bảo vệ\" mà ít chú trọng đến sinh kế của người dân địa phương, đặc biệt là phụ nữ, cho thấy sự thiếu sót trong bước nào của quy trình phân tích giới (hoặc Đánh giá giới)?", "options": {"A": "Chỉ thiếu sót ở bước Đề xuất giải pháp.", "B": "Thiếu sót ngay từ bước Sàng lọc (không nhận diện đầy đủ các khía cạnh giới và kinh tế xã hội liên quan) và bước Đánh giá tác động giới (không lường trước tác động tiêu cực đến sinh kế phụ nữ).", "C": "Chỉ thiếu sót ở bước Thu thập dữ liệu.", "D": "Không có thiếu sót gì vì mục tiêu bảo tồn là quan trọng nhất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một phân tích giới đầy đủ ngay từ đầu (sàng lọc, đánh giá tác động) sẽ phải xem xét đến sự phụ thuộc của cộng đồng vào tài nguyên và tác động của việc hạn chế tiếp cận, đặc biệt đối với các nhóm như phụ nữ thu hái lâm sản phụ. [788, 817, 2125, 2126]"}, {"level": "1", "content": "Tình huống 6: Một dự án bảo tồn đa dạng sinh học tại một vườn quốc gia, nơi có nhiều cộng đồng dân tộc thiểu số sinh sống phụ thuộc vào việc khai thác một số tài nguyên từ vùng đệm. Dự án tập trung vào việc tuần tra, bảo vệ nghiêm ngặt và cấm các hoạt động khai thác truyền thống. Đánh giá sau một năm cho thấy tình trạng phá rừng có giảm, nhưng đời sống của nhiều hộ gia đình, đặc biệt là các hộ do phụ nữ quản lý việc thu hái lâm sản phụ, trở nên khó khăn hơn. Khó khăn mà các hộ gia đình do phụ nữ quản lý việc thu hái lâm sản phụ gặp phải là một ví dụ về xung đột giữa mục tiêu nào?", "options": {"A": "Mục tiêu bảo tồn đa dạng sinh học và mục tiêu đảm bảo an ninh lương thực, sinh kế bền vững cho cộng đồng địa phương (đặc biệt là các nhóm dễ bị tổn thương).", "B": "Mục tiêu phát triển du lịch và mục tiêu bảo vệ văn hóa truyền thống.", "C": "Mục tiêu tăng trưởng kinh tế và mục tiêu giảm bất bình đẳng thu nhập.", "D": "Mục tiêu giáo dục và mục tiêu y tế."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Tình huống này cho thấy sự đánh đổi tiềm ẩn giữa việc bảo vệ môi trường nghiêm ngặt và việc đảm bảo sinh kế cho những người dân phụ thuộc trực tiếp vào tài nguyên đó. Một giải pháp bền vững cần cân bằng cả hai mục tiêu. [2718, 2719, 2720]"}, {"level": "1", "content": "Tình huống 6: Một dự án bảo tồn đa dạng sinh học tại một vườn quốc gia, nơi có nhiều cộng đồng dân tộc thiểu số sinh sống phụ thuộc vào việc khai thác một số tài nguyên từ vùng đệm. Dự án tập trung vào việc tuần tra, bảo vệ nghiêm ngặt và cấm các hoạt động khai thác truyền thống. Đánh giá sau một năm cho thấy tình trạng phá rừng có giảm, nhưng đời sống của nhiều hộ gia đình, đặc biệt là các hộ do phụ nữ quản lý việc thu hái lâm sản phụ, trở nên khó khăn hơn. Nếu áp dụng công cụ \"Xác định nhu cầu giới\" cho phụ nữ trong tình huống này, nhu cầu giới thực tế trước mắt của họ có thể là gì, và nhu cầu giới chiến lược lâu dài có thể là gì?", "options": {"A": "PGN: Có thêm nhiều khu rừng để khai thác; SGN: Được tham gia vào đội tuần tra rừng.", "B": "PGN: Có nguồn thu nhập/lương thực thay thế khi bị hạn chế vào rừng; SGN: Được tham gia vào quá trình ra quyết định về quản lý tài nguyên, được đào tạo các kỹ năng sinh kế mới bền vững và có quyền kiểm soát các nguồn lực đó.", "C": "PGN: Được cung cấp gạo hàng tháng; SGN: Được chuyển đi nơi khác sống.", "D": "PGN: Không cần gì cả; SGN: Trở thành kiểm lâm viên."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nhu cầu thực tế là giải quyết khó khăn trước mắt do mất nguồn sinh kế. Nhu cầu chiến lược hướng đến việc thay đổi vị thế của họ, tăng cường sự tham gia, quyền quyết định và khả năng tiếp cận các cơ hội mới một cách bền vững. [1242, 1245, 1248, 1272]"}, {"level": "1", "content": "Tình huống: Một chương trình phát triển nông thôn mới tập trung vào việc bê tông hóa đường làng, ngõ xóm. Việc này giúp đi lại thuận tiện hơn. Tuy nhiên, một số phụ nữ lớn tuổi phàn nàn rằng sân nhà (trước đây là sân đất, nơi họ thường phơi nông sản, làm các công việc thủ công) nay bị thu hẹp hoặc bê tông hóa hoàn toàn, ảnh hưởng đến các hoạt động tạo thu nhập phụ của họ. Sự phàn nàn của phụ nữ lớn tuổi cho thấy chương trình đã không xem xét kỹ lưỡng đến khía cạnh nào khi quy hoạch và thi công?", "options": {"A": "Chi phí bê tông hóa quá cao.", "B": "Việc sử dụng không gian đa năng (sân nhà) cho các hoạt động sinh kế của các nhóm giới và lứa tuổi khác nhau.", "C": "Chất lượng của vật liệu bê tông.", "D": "Nhu cầu về đường giao thông của nam giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Không gian công cộng và không gian quanh nhà thường được các nhóm giới và lứa tuổi khác nhau sử dụng cho các mục đích khác nhau. Việc quy hoạch hạ tầng cần tính đến các nhu cầu sử dụng đa dạng này, đặc biệt là các hoạt động tạo thu nhập tại nhà của phụ nữ. [790, 1321, 1322] (Hàm ý từ việc phân tích không gian và thời gian)"}, {"level": "1", "content": "Tình huống: Một chương trình phát triển nông thôn mới tập trung vào việc bê tông hóa đường làng, ngõ xóm. Việc này giúp đi lại thuận tiện hơn. Tuy nhiên, một số phụ nữ lớn tuổi phàn nàn rằng sân nhà (trước đây là sân đất, nơi họ thường phơi nông sản, làm các công việc thủ công) nay bị thu hẹp hoặc bê tông hóa hoàn toàn, ảnh hưởng đến các hoạt động tạo thu nhập phụ của họ. Tình huống này là một ví dụ về việc một can thiệp phát triển có mục tiêu tốt (cải thiện hạ tầng) nhưng có thể gây ra \"tác động không lường trước\" (unintended impact) tiêu cực đến một nhóm cụ thể nếu:", "options": {"A": "Không có sự tham gia của các chuyên gia xây dựng.", "B": "Không thực hiện Đánh giá giới để hiểu rõ các hoạt động kinh tế và sử dụng không gian của các nhóm dân cư khác nhau, đặc biệt là phụ nữ.", "C": "Người dân không đóng góp đủ kinh phí.", "D": "Dự án được thực hiện quá nhanh."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đánh giá giới giúp lường trước các tác động tiềm ẩn, cả tích cực và tiêu cực, đến các nhóm khác nhau. Bỏ qua bước này có thể dẫn đến những hậu quả không mong muốn đối với một bộ phận dân cư. [1351, 1357, 1358]"}, {"level": "1", "content": "Tình huống: Một chương trình phát triển nông thôn mới tập trung vào việc bê tông hóa đường làng, ngõ xóm. Việc này giúp đi lại thuận tiện hơn. Tuy nhiên, một số phụ nữ lớn tuổi phàn nàn rằng sân nhà (trước đây là sân đất, nơi họ thường phơi nông sản, làm các công việc thủ công) nay bị thu hẹp hoặc bê tông hóa hoàn toàn, ảnh hưởng đến các hoạt động tạo thu nhập phụ của họ. Để giải quyết vấn đề này một cách đáp ứng giới, trong các dự án tương lai, ban quản lý dự án nên:", "options": {"A": "Ngừng hoàn toàn việc bê tông hóa đường và sân.", "B": "Chỉ bê tông hóa đường chính, và khi quy hoạch sân ngõ, cần tham vấn ý kiến của cả phụ nữ và nam giới về nhu cầu sử dụng không gian, đồng thời tìm cách thiết kế linh hoạt hoặc hỗ trợ không gian thay thế cho các hoạt động sinh kế.", "C": "Yêu cầu phụ nữ phải tìm nơi khác để làm các công việc thủ công.", "D": "Bồi thường một khoản tiền nhỏ cho những người bị ảnh hưởng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một giải pháp đáp ứng giới cần kết hợp giữa việc cải thiện hạ tầng chung và việc đảm bảo không gian/cơ hội cho các hoạt động kinh tế đặc thù của các nhóm khác nhau, thông qua tham vấn và thiết kế linh hoạt. [838, 840, 841]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu sử dụng Khung Moser để phân tích vai trò của phụ nữ trong một làng nghề truyền thống. Kết quả cho thấy phụ nữ tham gia rất nhiều vào các công đoạn sản xuất (vai trò sản xuất), gần như đảm nhận toàn bộ việc nhà và chăm sóc con cái (vai trò tái sản xuất), nhưng lại rất ít tham gia vào các cuộc họp của làng để bàn về việc phát triển làng nghề hay các vấn đề chung (vai trò cộng đồng/chính trị hạn chế). Dựa trên phân tích của Khung Moser, tình trạng này cho thấy điều gì về phụ nữ trong làng nghề?", "options": {"A": "Họ không có khả năng tham gia vào các hoạt động cộng đồng.", "B": "Họ đang phải gánh vác \"ba vai trò\" nhưng có sự mất cân đối nghiêm trọng, với vai trò cộng đồng/chính trị bị hạn chế do gánh nặng từ hai vai trò kia hoặc các rào cản khác.", "C": "Họ không quan tâm đến việc phát triển làng nghề.", "D": "Vai trò sản xuất của họ không quan trọng bằng vai trò tái sản xuất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khung Moser nhấn mạnh đến \"ba vai trò\". Tình huống này cho thấy sự quá tải ở vai trò sản xuất và tái sản xuất có thể hạn chế khả năng của phụ nữ trong việc thực hiện vai trò cộng đồng/chính trị một cách hiệu quả, hoặc có những rào cản khác ngăn cản sự tham gia của họ. [931, 932, 935, 942]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu sử dụng Khung Moser để phân tích vai trò của phụ nữ trong một làng nghề truyền thống. Kết quả cho thấy phụ nữ tham gia rất nhiều vào các công đoạn sản xuất (vai trò sản xuất), gần như đảm nhận toàn bộ việc nhà và chăm sóc con cái (vai trò tái sản xuất), nhưng lại rất ít tham gia vào các cuộc họp của làng để bàn về việc phát triển làng nghề hay các vấn đề chung (vai trò cộng đồng/chính trị hạn chế). Để tăng cường vai trò cộng đồng/chính trị của phụ nữ trong làng nghề này, một can thiệp hướng đến \"nhu cầu giới chiến lược\" có thể là:", "options": {"A": "Cung cấp thêm nguyên liệu để họ sản xuất nhiều hơn.", "B": "Tổ chức các lớp tập huấn về kỹ năng lãnh đạo, kỹ năng phát biểu trước đám đông, và nâng cao nhận thức về quyền tham gia của họ; đồng thời vận động nam giới chia sẻ việc nhà.", "C": "Xây dựng một nhà trẻ trong làng.", "D": "Khen thưởng những phụ nữ làm việc nhà tốt nhất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các biện pháp này trực tiếp nhắm vào việc nâng cao năng lực, sự tự tin và thay đổi các rào cản mang tính cấu trúc (quan niệm về vai trò, gánh nặng việc nhà) để phụ nữ có thể tham gia hiệu quả hơn vào các quyết định cộng đồng. Xây nhà trẻ là PGN có thể hỗ trợ SGN. [1245, 1248, 1272]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu sử dụng Khung Moser để phân tích vai trò của phụ nữ trong một làng nghề truyền thống. Kết quả cho thấy phụ nữ tham gia rất nhiều vào các công đoạn sản xuất (vai trò sản xuất), gần như đảm nhận toàn bộ việc nhà và chăm sóc con cái (vai trò tái sản xuất), nhưng lại rất ít tham gia vào các cuộc họp của làng để bàn về việc phát triển làng nghề hay các vấn đề chung (vai trò cộng đồng/chính trị hạn chế). Việc phụ nữ ít tham gia vào các quyết định phát triển làng nghề có thể dẫn đến hệ quả gì cho bản thân làng nghề?", "options": {"A": "Làng nghề sẽ phát triển nhanh hơn vì các quyết định được đưa ra nhanh chóng.", "B": "Các quyết định có thể không phản ánh đầy đủ nhu cầu, kinh nghiệm và sáng kiến của một bộ phận lớn lao động trong làng nghề, có thể bỏ lỡ các cơ hội hoặc đưa ra các định hướng không phù hợp.", "C": "Chất lượng sản phẩm của làng nghề sẽ luôn được đảm bảo.", "D": "Không có hệ quả gì đáng kể."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự thiếu vắng tiếng nói của phụ nữ (những người trực tiếp tham gia sản xuất) trong quá trình ra quyết định có thể dẫn đến các kế hoạch phát triển không tối ưu, bỏ lỡ những hiểu biết và giải pháp từ chính họ. [150, 151]"}, {"level": "1", "content": "Tình huống: Một tổ chức thực hiện \"Phân tích các yếu tố ảnh hưởng\" (Công cụ 3 - Khung Harvard) cho một dự án tăng cường tiếp cận thị trường cho nông sản của phụ nữ ở một vùng sâu. Họ phát hiện ra rằng \"các cấu trúc và quy phạm xã hội\" (ví dụ: phụ nữ không được khuyến khích đi xa nhà một mình, hoặc vai trò chính là nội trợ) và \"điều kiện kinh tế\" (ví dụ: thiếu vốn ban đầu, đường sá đi lại khó khăn) là những trở ngại lớn. Mục đích chính của việc xác định các \"yếu tố ảnh hưởng\" này là gì?", "options": {"A": "Chỉ để liệt kê các khó khăn mà dự án phải đối mặt.", "B": "Để hiểu rõ các rào cản (trở ngại) và các điều kiện thuận lợi (cơ hội) hiện có, từ đó thiết kế các hoạt động can thiệp của dự án sao cho phù hợp và có khả năng vượt qua hoặc tận dụng được các yếu tố đó.", "C": "Để chứng minh rằng dự án không thể thành công.", "D": "Để yêu cầu chính phủ phải thay đổi tất cả các quy phạm xã hội ngay lập tức."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Công cụ này giúp nhận diện các yếu tố bối cảnh có thể tác động đến sự thành công của dự án, từ đó điều chỉnh thiết kế dự án cho phù hợp, xác định các hoạt động hỗ trợ cần thiết hoặc các rủi ro cần giảm thiểu. [875, 8883, 884, 885]"}, {"level": "1", "content": "Tình huống: Một tổ chức thực hiện \"Phân tích các yếu tố ảnh hưởng\" (Công cụ 3 - Khung Harvard) cho một dự án tăng cường tiếp cận thị trường cho nông sản của phụ nữ ở một vùng sâu. Họ phát hiện ra rằng \"các cấu trúc và quy phạm xã hội\" (ví dụ: phụ nữ không được khuyến khích đi xa nhà một mình, hoặc vai trò chính là nội trợ) và \"điều kiện kinh tế\" (ví dụ: thiếu vốn ban đầu, đường sá đi lại khó khăn) là những trở ngại lớn. Dựa trên các \"trở ngại\" đã xác định, một hoạt động can thiệp của dự án KHÔNG nên là gì nếu muốn hiệu quả?", "options": {"A": "Tổ chức các buổi tập huấn về kỹ năng tiếp thị và đàm phán ngay tại xã, với thời gian linh hoạt.", "B": "Hỗ trợ hình thành các nhóm phụ nữ cùng sản xuất và tiêu thụ sản phẩm để tăng cường sự tự tin và chia sẻ nguồn lực.", "C": "Chỉ tập trung vào việc cung cấp các tài liệu hướng dẫn kỹ thuật bằng văn bản.", "D": "Vận động gia đình và cộng đồng ủng hộ việc phụ nữ tham gia các hoạt động kinh tế, đồng thời tìm cách cải thiện cơ sở hạ tầng giao thông cơ bản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nếu phụ nữ gặp rào cản về việc đi lại, quy phạm xã hội và có thể cả trình độ học vấn, việc chỉ cung cấp tài liệu viết có thể không hiệu quả. Cần các biện pháp tiếp cận trực tiếp, hỗ trợ tại chỗ và giải quyết các rào cản xã hội. Các lựa chọn A, B, D đều là các can thiệp phù hợp. [877, 878, 879, 880]"}, {"level": "1", "content": "Tình huống: Một tổ chức thực hiện \"Phân tích các yếu tố ảnh hưởng\" (Công cụ 3 - Khung Harvard) cho một dự án tăng cường tiếp cận thị trường cho nông sản của phụ nữ ở một vùng sâu. Họ phát hiện ra rằng \"các cấu trúc và quy phạm xã hội\" (ví dụ: phụ nữ không được khuyến khích đi xa nhà một mình, hoặc vai trò chính là nội trợ) và \"điều kiện kinh tế\" (ví dụ: thiếu vốn ban đầu, đường sá đi lại khó khăn) là những trở ngại lớn. Nếu trong quá trình phân tích, tổ chức cũng phát hiện ra một \"cơ hội\" là địa phương vừa có một nữ chủ tịch xã mới rất năng động và ủng hộ các hoạt động của phụ nữ, dự án nên làm gì?", "options": {"A": "Bỏ qua yếu tố này vì nó không liên quan trực tiếp đến kinh tế.", "B": "Chủ động tìm cách hợp tác, vận động sự ủng hộ và phối hợp từ vị nữ chủ tịch xã này để tạo điều kiện thuận lợi hơn cho các hoạt động của dự án và giải quyết các rào cản chính sách ở địa phương.", "C": "Coi đây là một yếu tố không đáng tin cậy.", "D": "Yêu cầu nữ chủ tịch xã phải tài trợ toàn bộ cho dự án."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc xác định các \"cơ hội\" (trong trường hợp này là một nhà lãnh đạo ủng hộ) là rất quan trọng để dự án có thể tận dụng, xây dựng quan hệ đối tác và tăng cường hiệu quả cũng như tính bền vững. [8884]"}, {"level": "1", "content": "Tình huống: Một chương trình GRB quốc gia đặt mục tiêu tăng tỷ lệ chi ngân sách cho y tế dự phòng tại các xã đặc biệt khó khăn, nơi phụ nữ và trẻ em có tỷ lệ mắc bệnh cao. Sau một năm, báo cáo cho thấy tổng chi cho y tế dự phòng ở các xã này có tăng, nhưng phân tích sâu hơn (sử dụng công cụ Phân tích chi tiêu công và phân bổ lợi ích theo giới) chỉ ra rằng phần lớn nguồn lực tăng thêm lại được dùng để mua sắm trang thiết bị đắt tiền ít sử dụng, trong khi các hoạt động truyền thông sức khỏe, khám sàng lọc lưu động cho phụ nữ và trẻ em lại không được tăng cường đáng kể. Tình huống này cho thấy điều gì về việc thực hiện GRB?", "options": {"A": "Chỉ cần tăng tổng chi ngân sách cho một lĩnh vực là đã đạt được mục tiêu GRB.", "B": "Việc chỉ xem xét tổng mức phân bổ ngân sách là chưa đủ; cần phải phân tích chi tiết cách thức nguồn lực đó được sử dụng và ai thực sự hưởng lợi từ các khoản chi cụ thể.", "C": "Phụ nữ và trẻ em ở các xã khó khăn không có nhu cầu về y tế dự phòng.", "D": "Mua sắm trang thiết bị y tế hiện đại luôn là ưu tiên hàng đầu của GRB."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GRB không chỉ là việc tăng ngân sách mà còn là đảm bảo rằng ngân sách đó được chi tiêu một cách hiệu quả để giải quyết các nhu cầu giới cụ thể và mang lại lợi ích công bằng. Việc phân bổ lợi ích thực tế là rất quan trọng. [1908, 1921, 1940, 1955]"}, {"level": "1", "content": "Tình huống: Một chương trình GRB quốc gia đặt mục tiêu tăng tỷ lệ chi ngân sách cho y tế dự phòng tại các xã đặc biệt khó khăn, nơi phụ nữ và trẻ em có tỷ lệ mắc bệnh cao. Sau một năm, báo cáo cho thấy tổng chi cho y tế dự phòng ở các xã này có tăng, nhưng phân tích sâu hơn (sử dụng công cụ Phân tích chi tiêu công và phân bổ lợi ích theo giới) chỉ ra rằng phần lớn nguồn lực tăng thêm lại được dùng để mua sắm trang thiết bị đắt tiền ít sử dụng, trong khi các hoạt động truyền thông sức khỏe, khám sàng lọc lưu động cho phụ nữ và trẻ em lại không được tăng cường đáng kể. Để GRB trong lĩnh vực y tế dự phòng này hiệu quả hơn, bước \"Theo dõi và đánh giá chi tiêu có trách nhiệm giới\" cần tập trung vào chỉ số nào sau đây, bên cạnh tổng chi ngân sách?", "options": {"A": "Số lượng trang thiết bị y tế mới được mua.", "B": "Tỷ lệ phụ nữ và trẻ em ở các xã khó khăn được tiếp cận và hưởng lợi trực tiếp từ các dịch vụ y tế dự phòng cụ thể (khám sàng lọc, truyền thông, tiêm chủng...).", "C": "Số lượng cán bộ y tế được tăng lương.", "D": "Mức độ hài lòng của lãnh đạo xã đối với chương trình."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các chỉ số theo dõi và đánh giá cần tập trung vào kết quả và tác động thực tế đối với các nhóm mục tiêu (phụ nữ, trẻ em), chứ không chỉ là các yếu tố đầu vào (ngân sách, thiết bị). [1942, 1943, 1944, 2005, 2006]"}, {"level": "1", "content": "Tình huống: Một chương trình GRB quốc gia đặt mục tiêu tăng tỷ lệ chi ngân sách cho y tế dự phòng tại các xã đặc biệt khó khăn, nơi phụ nữ và trẻ em có tỷ lệ mắc bệnh cao. Sau một năm, báo cáo cho thấy tổng chi cho y tế dự phòng ở các xã này có tăng, nhưng phân tích sâu hơn (sử dụng công cụ Phân tích chi tiêu công và phân bổ lợi ích theo giới) chỉ ra rằng phần lớn nguồn lực tăng thêm lại được dùng để mua sắm trang thiết bị đắt tiền ít sử dụng, trong khi các hoạt động truyền thông sức khỏe, khám sàng lọc lưu động cho phụ nữ và trẻ em lại không được tăng cường đáng kể. Nếu bạn là người thực hiện \"Đánh giá người hưởng lợi có nhạy cảm giới\" cho chương trình y tế này, bạn sẽ ưu tiên làm gì?", "options": {"A": "Chỉ phỏng vấn các bác sĩ và cán bộ quản lý y tế.", "B": "Tổ chức các buổi thảo luận nhóm riêng với phụ nữ (bao gồm cả phụ nữ mang thai, bà mẹ có con nhỏ, phụ nữ lớn tuổi) và nam giới ở các xã khó khăn để tìm hiểu về nhu cầu sức khỏe, rào cản tiếp cận dịch vụ và mức độ phù hợp của các hoạt động y tế dự phòng hiện tại.", "C": "Chỉ phân tích số liệu thống kê về tỷ lệ mắc bệnh.", "D": "Chỉ gửi bảng câu hỏi khảo sát qua đường bưu điện."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đánh giá người hưởng lợi có nhạy cảm giới đòi hỏi phải lắng nghe trực tiếp tiếng nói và trải nghiệm của các nhóm hưởng lợi khác nhau, đặc biệt là phụ nữ, để hiểu rõ nhu cầu và đánh giá tính phù hợp của chương trình từ góc độ của họ. [191966, 1967]"}, {"level": "1", "content": "Tình huống: Một cộng đồng ven biển có truyền thống nam giới đi biển đánh bắt xa bờ, còn phụ nữ chủ yếu tham gia vào việc nuôi trồng thủy sản ven bờ (tôm, cua), sơ chế hải sản và buôn bán nhỏ tại các chợ địa phương. Một dự án phát triển kinh tế địa phương quyết định đầu tư lớn vào việc hiện đại hóa đội tàu đánh bắt xa bờ và xây dựng một cảng cá lớn, ít chú trọng đến việc hỗ trợ các hoạt động nuôi trồng và buôn bán nhỏ lẻ của phụ nữ. Việc dự án chỉ tập trung vào hiện đại hóa đánh bắt xa bờ có thể tạo ra \"tác động giới không lường trước\" như thế nào đối với phụ nữ trong cộng đồng?", "options": {"A": "Thu nhập của các hộ gia đình sẽ tăng đều cho cả nam và nữ.", "B": "Phụ nữ có thể bị gạt ra ngoài lề các cơ hội kinh tế mới, sinh kế truyền thống của họ (nuôi trồng ven bờ, buôn bán nhỏ) có thể bị ảnh hưởng tiêu cực do thay đổi môi trường hoặc cạnh tranh, trong khi họ ít có kỹ năng để tham gia vào ngành đánh bắt xa bờ hiện đại.", "C": "Phụ nữ sẽ tự động chuyển sang làm việc tại cảng cá mới.", "D": "Dự án sẽ giúp giảm bớt gánh nặng công việc cho phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc tập trung đầu tư vào một lĩnh vực do nam giới thống trị mà bỏ qua các hoạt động kinh tế quan trọng của phụ nữ có thể làm gia tăng bất bình đẳng giới, khiến phụ nữ mất đi nguồn sinh kế hoặc gặp khó khăn hơn trong việc cạnh tranh. [222279, 2281, 2330]"}, {"level": "1", "content": "Tình huống: Một cộng đồng ven biển có truyền thống nam giới đi biển đánh bắt xa bờ, còn phụ nữ chủ yếu tham gia vào việc nuôi trồng thủy sản ven bờ (tôm, cua), sơ chế hải sản và buôn bán nhỏ tại các chợ địa phương. Một dự án phát triển kinh tế địa phương quyết định đầu tư lớn vào việc hiện đại hóa đội tàu đánh bắt xa bờ và xây dựng một cảng cá lớn, ít chú trọng đến việc hỗ trợ các hoạt động nuôi trồng và buôn bán nhỏ lẻ của phụ nữ. Nếu áp dụng công cụ \"Phân công lao động theo giới\" (Khung Harvard hoặc Moser) để phân tích trước khi triển khai dự án, ban quản lý dự án sẽ nhận thấy điều gì quan trọng?", "options": {"A": "Chỉ có nam giới mới tham gia vào các hoạt động kinh tế thủy sản.", "B": "Sự phân chia vai trò kinh tế rõ rệt giữa nam (đánh bắt xa bờ) và nữ (nuôi trồng ven bờ, chế biến, buôn bán), và sự phụ thuộc kinh tế của phụ nữ vào các hoạt động quy mô nhỏ, dễ bị tổn thương.", "C": "Phụ nữ không có nhu cầu cải thiện sinh kế.", "D": "Cộng đồng không có tiềm năng phát triển kinh tế biển."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phân tích phân công lao động theo giới sẽ làm rõ các vai trò kinh tế khác biệt của nam và nữ. Điều này giúp nhận diện những tác động tiềm ẩn của dự án đến từng nhóm và sự cần thiết phải có các biện pháp hỗ trợ đa dạng. [8930, 931, 1088]"}, {"level": "1", "content": "Tình huống: Một cộng đồng ven biển có truyền thống nam giới đi biển đánh bắt xa bờ, còn phụ nữ chủ yếu tham gia vào việc nuôi trồng thủy sản ven bờ (tôm, cua), sơ chế hải sản và buôn bán nhỏ tại các chợ địa phương. Một dự án phát triển kinh tế địa phương quyết định đầu tư lớn vào việc hiện đại hóa đội tàu đánh bắt xa bờ và xây dựng một cảng cá lớn, ít chú trọng đến việc hỗ trợ các hoạt động nuôi trồng và buôn bán nhỏ lẻ của phụ nữ. Để dự án này mang lại lợi ích công bằng hơn, một can thiệp \"đáp ứng giới\" nên bao gồm:", "options": {"A": "Chỉ tập trung đào tạo kỹ năng đi biển hiện đại cho nam giới.", "B": "Bên cạnh việc hiện đại hóa đội tàu, cần có các hợp phần hỗ trợ kỹ thuật, vốn, và thị trường cho các hoạt động nuôi trồng thủy sản ven bờ, sơ chế và kinh doanh của phụ nữ, đồng thời đảm bảo tiếng nói của họ trong quy hoạch phát triển chung.", "C": "Khuyến khích phụ nữ từ bỏ các hoạt động truyền thống và tìm việc làm ở các thành phố lớn.", "D": "Xây dựng một khu chợ mới chỉ dành riêng cho phụ nữ buôn bán."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một cách tiếp cận đáp ứng giới sẽ không chỉ tập trung vào một nhóm mà còn xem xét và hỗ trợ các hoạt động kinh tế của tất cả các nhóm bị ảnh hưởng, đặc biệt là phụ nữ, để đảm bảo họ không bị bỏ lại phía sau và có cơ hội phát triển. [838, 2002, 2166]"}, {"level": "1", "content": "Tình huống: Chính phủ một quốc gia ban hành chính sách khuyến khích các hộ nông dân chuyển đổi sang trồng các loại cây công nghiệp có giá trị xuất khẩu cao, yêu cầu đầu tư ban đầu lớn về giống, phân bón và hệ thống tưới tiêu. Chương trình hỗ trợ kỹ thuật và tập huấn chủ yếu được tổ chức tại các trung tâm huyện, với lịch trình cố định vào ban ngày. Chính sách này, dù có mục tiêu kinh tế tốt, có thể vô tình tạo ra rào cản cho nữ nông dân vì sao?", "options": {"A": "Phụ nữ không có hứng thú với các loại cây công nghiệp.", "B": "Phụ nữ thường có ít vốn tích lũy hơn, khó tiếp cận các khoản va

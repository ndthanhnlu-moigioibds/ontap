y lớn, và gánh nặng công việc gia đình khiến họ khó tham gia các buổi tập huấn ở xa hoặc vào ban ngày.", "C": "Cây công nghiệp đòi hỏi kỹ thuật quá cao mà chỉ nam giới mới làm được.", "D": "Chính sách này chỉ mang lại lợi ích cho các công ty xuất khẩu lớn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các yêu cầu về vốn đầu tư lớn và hình thức tổ chức tập huấn không linh hoạt có thể loại trừ những nữ nông dân có ít nguồn lực tài chính và bị ràng buộc bởi trách nhiệm gia đình. [2323, 2347, 2349, 2378]"}, {"level": "1", "content": "Tình huống: Chính phủ một quốc gia ban hành chính sách khuyến khích các hộ nông dân chuyển đổi sang trồng các loại cây công nghiệp có giá trị xuất khẩu cao, yêu cầu đầu tư ban đầu lớn về giống, phân bón và hệ thống tưới tiêu. Chương trình hỗ trợ kỹ thuật và tập huấn chủ yếu được tổ chức tại các trung tâm huyện, với lịch trình cố định vào ban ngày. Nếu áp dụng \"Đánh giá tác động giới\" (GIA) cho chính sách này, một câu hỏi quan trọng cần đặt ra là:", "options": {"A": "Liệu chính sách có làm tăng tổng kim ngạch xuất khẩu nông sản của quốc gia không?", "B": "Liệu các rào cản về vốn, thời gian và tiếp cận thông tin có khiến phụ nữ ít có khả năng tham gia và hưởng lợi từ việc chuyển đổi cây trồng hơn nam giới không, và điều này tác động đến thu nhập và vị thế của họ như thế nào?", "C": "Các loại cây công nghiệp nào sẽ mang lại lợi nhuận cao nhất?", "D": "Chính sách này có được tất cả các tỉnh thành ủng hộ không?"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GIA cần tập trung vào việc liệu chính sách có tạo ra hoặc làm trầm trọng thêm bất bình đẳng giới hay không, bằng cách phân tích các tác động khác biệt đến khả năng tham gia và hưởng lợi của nam và nữ. [821, 827, 831]"}, {"level": "1", "content": "Tình huống: Chính phủ một quốc gia ban hành chính sách khuyến khích các hộ nông dân chuyển đổi sang trồng các loại cây công nghiệp có giá trị xuất khẩu cao, yêu cầu đầu tư ban đầu lớn về giống, phân bón và hệ thống tưới tiêu. Chương trình hỗ trợ kỹ thuật và tập huấn chủ yếu được tổ chức tại các trung tâm huyện, với lịch trình cố định vào ban ngày. Để chính sách chuyển đổi cây trồng này trở nên bao trùm hơn, một biện pháp hỗ trợ có thể là:", "options": {"A": "Chỉ cung cấp giống và phân bón miễn phí cho các hộ do nam giới làm chủ.", "B": "Thiết kế các gói tín dụng ưu đãi đặc thù cho nữ nông dân, tổ chức các lớp tập huấn kỹ thuật linh hoạt về thời gian và địa điểm ngay tại cộng đồng, và đảm bảo phụ nữ được tiếp cận thông tin thị trường.", "C": "Yêu cầu tất cả các hộ nông dân phải chuyển đổi sang cây công nghiệp.", "D": "Tăng giá thu mua các sản phẩm nông nghiệp truyền thống."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các biện pháp hỗ trợ cần trực tiếp giải quyết những rào cản cụ thể mà nữ nông dân gặp phải, từ vốn, kiến thức đến thời gian, để tạo điều kiện cho họ tham gia và hưởng lợi một cách công bằng. [2322, 2326, 2348, 2349]"}, {"level": "1", "content": "Tình huống: Một dự án năng lượng tái tạo lắp đặt các hệ thống pin mặt trời áp mái cho các hộ gia đình ở một vùng nông thôn. Mục tiêu là giảm sự phụ thuộc vào điện lưới và nhiên liệu truyền thống. Đại diện dự án chủ yếu làm việc với nam giới trong các hộ gia đình để lắp đặt và hướng dẫn sử dụng. Việc dự án chủ yếu làm việc với nam giới có thể bỏ qua vai trò quan trọng nào của phụ nữ liên quan đến năng lượng trong gia đình?", "options": {"A": "Phụ nữ không sử dụng điện trong gia đình.", "B": "Phụ nữ thường là người quản lý việc sử dụng năng lượng hàng ngày (nấu ăn, chiếu sáng, các thiết bị gia dụng) và hiểu rõ nhất nhu cầu năng lượng thực tế của gia đình.", "C": "Nam giới luôn có kiến thức về kỹ thuật điện tốt hơn.", "D": "Phụ nữ không quan tâm đến việc tiết kiệm năng lượng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trong nhiều gia đình, phụ nữ là người quản lý chính việc sử dụng năng lượng cho các hoạt động sinh hoạt hàng ngày. Bỏ qua họ trong quá trình lắp đặt và hướng dẫn có thể làm giảm hiệu quả sử dụng và lợi ích của hệ thống. [2371, 2777] (Hàm ý từ vai trò quản lý tài nguyên gia đình)"}, {"level": "1", "content": "Tình huống: Một dự án năng lượng tái tạo lắp đặt các hệ thống pin mặt trời áp mái cho các hộ gia đình ở một vùng nông thôn. Mục tiêu là giảm sự phụ thuộc vào điện lưới và nhiên liệu truyền thống. Đại diện dự án chủ yếu làm việc với nam giới trong các hộ gia đình để lắp đặt và hướng dẫn sử dụng. Nếu không có sự tham gia và hiểu biết của phụ nữ, việc sử dụng hệ thống pin mặt trời có thể không tối ưu vì:", "options": {"A": "Phụ nữ sẽ cố tình làm hỏng hệ thống.", "B": "Họ có thể không biết cách sử dụng hiệu quả các thiết bị điện tiết kiệm năng lượng, không điều chỉnh được thói quen sử dụng cho phù hợp với nguồn năng lượng mới, hoặc không biết cách bảo trì cơ bản.", "C": "Hệ thống pin mặt trời quá phức tạp đối với phụ nữ.", "D": "Chỉ có nam giới mới được phép chạm vào các thiết bị điện."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự hiểu biết và tham gia của người sử dụng chính (thường là phụ nữ đối với các thiết bị gia dụng) là rất quan trọng để tối đa hóa lợi ích của các giải pháp năng lượng mới và đảm bảo tính bền vững của chúng. [2168] (Hàm ý từ việc thiết kế cần phản ánh nhu cầu)"}, {"level": "1", "content": "Tình huống: Một dự án năng lượng tái tạo lắp đặt các hệ thống pin mặt trời áp mái cho các hộ gia đình ở một vùng nông thôn. Mục tiêu là giảm sự phụ thuộc vào điện lưới và nhiên liệu truyền thống. Đại diện dự án chủ yếu làm việc với nam giới trong các hộ gia đình để lắp đặt và hướng dẫn sử dụng. Để dự án pin mặt trời này thực sự mang lại lợi ích cho cả gia đình và có tính bền vững cao, khi triển khai dự án nên:", "options": {"A": "Chỉ cần lắp đặt hệ thống và để các gia đình tự tìm hiểu cách sử dụng.", "B": "Tổ chức các buổi hướng dẫn sử dụng và bảo trì hệ thống có sự tham gia của cả nam và nữ trong gia đình, đồng thời cung cấp thông tin về cách sử dụng năng lượng tiết kiệm và hiệu quả.", "C": "Chỉ làm việc với các hộ gia đình có nam giới biết về kỹ thuật điện.", "D": "Giảm giá thành lắp đặt cho các hộ có phụ nữ tham gia."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc đảm bảo cả nam và nữ đều được thông tin, hướng dẫn và tham gia sẽ giúp hệ thống được sử dụng hiệu quả, bền vững và mang lại lợi ích tối đa cho cả gia đình. [2003, 2168]"}, {"level": "1", "content": "Tình huống: Một chương trình bảo vệ môi trường ở một khu vực đô thị tập trung vào việc phân loại rác tại nguồn và giảm thiểu rác thải nhựa. Các hoạt động truyền thông chủ yếu được thực hiện qua các kênh báo chí chính thống và các cuộc họp tổ dân phố vào buổi tối. Tại sao cách tiếp cận truyền thông này có thể chưa tiếp cận hiệu quả đến đối tượng phụ nữ, những người thường đóng vai trò chính trong việc quản lý rác thải sinh hoạt gia đình?", "options": {"A": "Phụ nữ không quan tâm đến việc bảo vệ môi trường.", "B": "Phụ nữ có thể ít có thời gian đọc báo hoặc tham gia các cuộc họp tổ dân phố vào buổi tối do bận rộn với công việc gia đình và chăm sóc con cái.", "C": "Chỉ có nam giới mới có trách nhiệm phân loại rác.", "D": "Thông tin về phân loại rác quá phức tạp đối với phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ, dù là người quản lý chính rác thải gia đình, có thể bị hạn chế về thời gian và khả năng tiếp cận các kênh truyền thông truyền thống hoặc các cuộc họp cộng đồng do gánh nặng công việc không lương. [144, 2371]"}, {"level": "1", "content": "Tình huống: Một chương trình bảo vệ môi trường ở một khu vực đô thị tập trung vào việc phân loại rác tại nguồn và giảm thiểu rác thải nhựa. Các hoạt động truyền thông chủ yếu được thực hiện qua các kênh báo chí chính thống và các cuộc họp tổ dân phố vào buổi tối. Nếu áp dụng công cụ \"Phân tích các yếu tố ảnh hưởng\" (Khung Harvard) để xem xét các rào cản đối với sự tham gia của phụ nữ vào chương trình này, yếu tố \"Cấu trúc và quy phạm xã hội\" có thể bao gồm:", "options": {"A": "Việc thiếu các thùng rác phân loại công cộng.", "B": "Quan niệm rằng việc nhà và quản lý rác thải là \"việc của đàn bà\", không phải là vấn đề cần nam giới quan tâm nhiều.", "C": "Chi phí mua các túi đựng rác phân loại.", "D": "Khoảng cách từ nhà đến điểm tập kết rác."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các quy phạm xã hội về vai trò giới trong gia đình (ví dụ, ai chịu trách nhiệm chính về việc nhà và rác thải) là một yếu tố văn hóa, xã hội quan trọng ảnh hưởng đến hành vi và sự tham gia. [878]"}, {"level": "1", "content": "Tình huống: Một chương trình bảo vệ môi trường ở một khu vực đô thị tập trung vào việc phân loại rác tại nguồn và giảm thiểu rác thải nhựa. Các hoạt động truyền thông chủ yếu được thực hiện qua các kênh báo chí chính thống và các cuộc họp tổ dân phố vào buổi tối. Để chương trình phân loại rác này hiệu quả hơn và thu hút sự tham gia của phụ nữ, một chiến lược truyền thông và vận động nên:", "options": {"A": "Chỉ phạt tiền những hộ gia đình không phân loại rác.", "B": "Sử dụng các kênh truyền thông đa dạng, dễ tiếp cận với phụ nữ (ví dụ: mạng xã hội, các buổi nói chuyện tại chợ, trường học, các nhóm phụ nữ), với thông điệp nhấn mạnh lợi ích thiết thực và vai trò quan trọng của họ, đồng thời khuyến khích sự chia sẻ trách nhiệm trong gia đình.", "C": "Chỉ yêu cầu nam giới trong gia đình phải chịu trách nhiệm.", "D": "Tổ chức các cuộc thi phân loại rác với giải thưởng lớn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một chiến lược hiệu quả cần sử dụng các kênh và thông điệp phù hợp để tiếp cận đối tượng phụ nữ, đồng thời giải quyết các rào cản về nhận thức và chia sẻ trách nhiệm. [2036, 2168]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu về \"giới hóa đói nghèo\" tại một vùng nông thôn chỉ ra rằng các hộ gia đình do góa phụ làm chủ có tỷ lệ nghèo đa chiều cao hơn đáng kể. Phân tích sâu hơn cho thấy họ thường thiếu lao động nam, ít đất canh tác (do tập quán thừa kế ưu tiên con trai), và gặp khó khăn trong việc tiếp cận các chương trình hỗ trợ của nhà nước do thiếu thông tin và các mối quan hệ. Tình trạng này KHÔNG chỉ phản ánh sự thiếu hụt về thu nhập mà còn cho thấy các hộ góa phụ phải đối mặt với:", "options": {"A": "Sự lười biếng và không muốn làm việc.", "B": "Những bất lợi mang tính cấu trúc liên quan đến giới, quyền tài sản, và khả năng tiếp cận các mạng lưới xã hội cũng như các dịch vụ hỗ trợ.", "C": "Việc họ không có con cái để phụ giúp.", "D": "Sự ưu ái đặc biệt từ các chương trình hỗ trợ của nhà nước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nghèo đói của các hộ góa phụ thường bắt nguồn từ các yếu tố cấu trúc như bất bình đẳng về quyền thừa kế, thiếu lao động, và hạn chế trong việc tiếp cận các nguồn lực và hỗ trợ xã hội. [2738, 2739, 2744]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu về \"giới hóa đói nghèo\" tại một vùng nông thôn chỉ ra rằng các hộ gia đình do góa phụ làm chủ có tỷ lệ nghèo đa chiều cao hơn đáng kể. Phân tích sâu hơn cho thấy họ thường thiếu lao động nam, ít đất canh tác (do tập quán thừa kế ưu tiên con trai), và gặp khó khăn trong việc tiếp cận các chương trình hỗ trợ của nhà nước do thiếu thông tin và các mối quan hệ. Nếu áp dụng Khung Moser để phân tích, nhu cầu giới chiến lược của các góa phụ này có thể bao gồm:", "options": {"A": "Được cung cấp lương thực cứu đói hàng tháng.", "B": "Được hỗ trợ sửa chữa nhà cửa.", "C": "Được đảm bảo quyền sở hữu/sử dụng đất đai một cách công bằng, được tiếp cận các chương trình đào tạo nghề và tín dụng phù hợp, và được tăng cường sự tham gia vào các quyết định của cộng đồng.", "D": "Được miễn tất cả các khoản đóng góp cho cộng đồng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Các biện pháp này nhằm thay đổi vị thế kinh tế và xã hội của họ một cách bền vững, tăng cường quyền tự quyết và khả năng tiếp cận cơ hội, đây là đặc điểm của nhu cầu giới chiến lược. [1245, 1248, 1272]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu về \"giới hóa đói nghèo\" tại một vùng nông thôn chỉ ra rằng các hộ gia đình do góa phụ làm chủ có tỷ lệ nghèo đa chiều cao hơn đáng kể. Phân tích sâu hơn cho thấy họ thường thiếu lao động nam, ít đất canh tác (do tập quán thừa kế ưu tiên con trai), và gặp khó khăn trong việc tiếp cận các chương trình hỗ trợ của nhà nước do thiếu thông tin và các mối quan hệ. Một chính sách giảm nghèo \"đáp ứng giới\" cho nhóm đối tượng này cần phải:", "options": {"A": "Coi tất cả các hộ nghèo đều giống nhau và áp dụng một biện pháp hỗ trợ duy nhất.", "B": "Thiết kế các gói hỗ trợ đặc thù, xem xét đến những rào cản và nhu cầu riêng của các hộ do góa phụ làm chủ, ví dụ như hỗ trợ pháp lý về quyền đất đai, các mô hình sinh kế phù hợp với điều kiện thiếu lao động nam, và các kênh cung cấp thông tin dễ tiếp cận.", "C": "Chỉ tập trung vào việc hỗ trợ con cái của họ đi học.", "D": "Yêu cầu họ phải tái hôn để thoát nghèo."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Chính sách đáp ứng giới cần phải nhận diện và giải quyết những điểm yếu và nhu cầu đặc thù của từng nhóm, thay vì áp dụng một cách tiếp cận chung chung. [838, 2002, 2166]"}, {"level": "1", "content": "Tình huống: Một dự án du lịch cộng đồng được xây dựng quanh việc khai thác các giá trị văn hóa truyền thống và cảnh quan thiên nhiên của một bản làng dân tộc thiểu số. Phụ nữ trong bản có vai trò quan trọng trong việc dệt thổ cẩm, chế biến ẩm thực truyền thống và các điệu múa dân gian. Tuy nhiên, việc quản lý dòng tiền thu từ du lịch và các quyết định lớn về phát triển du lịch lại chủ yếu do một ban quản lý gồm các nam giới lớn tuổi trong bản đảm nhiệm. Tình huống này cho thấy một nguy cơ tiềm ẩn trong phát triển du lịch cộng đồng, đó là:", "options": {"A": "Các giá trị văn hóa truyền thống sẽ bị mai một.", "B": "Phụ nữ có thể đóng góp công sức và kỹ năng chính vào các sản phẩm du lịch nhưng lại ít có quyền kiểm soát và hưởng lợi tương xứng từ nguồn thu nhập do du lịch mang lại.", "C": "Du khách sẽ không hài lòng với các sản phẩm du lịch.", "D": "Nam giới không có vai trò gì trong du lịch cộng đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nếu phụ nữ là người tạo ra các sản phẩm và dịch vụ du lịch chính nhưng lại không có quyền kiểm soát nguồn thu và tham gia vào các quyết định quản lý, họ có thể chỉ nhận được một phần nhỏ lợi ích, trong khi gánh nặng công việc lại tăng lên. [2450, 2453, 2461]"}, {"level": "1", "content": "Tình huống: Một dự án du lịch cộng đồng được xây dựng quanh việc khai thác các giá trị văn hóa truyền thống và cảnh quan thiên nhiên của một bản làng dân tộc thiểu số. Phụ nữ trong bản có vai trò quan trọng trong việc dệt thổ cẩm, chế biến ẩm thực truyền thống và các điệu múa dân gian. Tuy nhiên, việc quản lý dòng tiền thu từ du lịch và các quyết định lớn về phát triển du lịch lại chủ yếu do một ban quản lý gồm các nam giới lớn tuổi trong bản đảm nhiệm. Nếu áp dụng công cụ \"Tiếp cận và Kiểm soát\" (Khung Harvard) cho phụ nữ trong tình huống này, kết quả có khả năng cho thấy:", "options": {"A": "Họ có quyền kiểm soát cao đối với tất cả các nguồn lực và lợi ích từ du lịch.", "B": "Họ có thể \"tiếp cận\" được một số lợi ích (ví dụ, có thêm việc làm, bán được sản phẩm) nhưng \"kiểm soát\" đối với nguồn thu chung và các quyết định chiến lược về du lịch lại hạn chế.", "C": "Họ hoàn toàn không có quyền tiếp cận bất kỳ lợi ích nào.", "D": "Nam giới không được hưởng lợi gì từ du lịch."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ có thể tham gia và có được một số lợi ích, nhưng quyền quyết định cuối cùng về tài chính và định hướng phát triển có thể vẫn nằm trong tay nam giới, cho thấy sự chênh lệch giữa tiếp cận và kiểm soát. [870, 871, 82]"}, {"level": "1", "content": "Tình huống: Một dự án du lịch cộng đồng được xây dựng quanh việc khai thác các giá trị văn hóa truyền thống và cảnh quan thiên nhiên của một bản làng dân tộc thiểu số. Phụ nữ trong bản có vai trò quan trọng trong việc dệt thổ cẩm, chế biến ẩm thực truyền thống và các điệu múa dân gian. Tuy nhiên, việc quản lý dòng tiền thu từ du lịch và các quyết định lớn về phát triển du lịch lại chủ yếu do một ban quản lý gồm các nam giới lớn tuổi trong bản đảm nhiệm. Để hoạt động du lịch cộng đồng này thực sự trao quyền cho phụ nữ, một biện pháp can thiệp quan trọng nên là:", "options": {"A": "Chỉ để phụ nữ quản lý toàn bộ hoạt động du lịch.", "B": "Tăng cường năng lực quản lý, tài chính và kỹ năng đàm phán cho phụ nữ; đồng thời xây dựng cơ chế quản lý minh bạch, có sự tham gia bình đẳng của cả nam và nữ trong việc ra quyết định và chia sẻ lợi ích.", "C": "Khuyến khích phụ nữ chỉ tập trung vào việc sản xuất sản phẩm thủ công.", "D": "Thu hút thêm nhiều khách du lịch nam giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trao quyền đòi hỏi phải nâng cao năng lực cho phụ nữ và đồng thời thay đổi các cấu trúc quản lý để đảm bảo họ có tiếng nói, quyền quyết định và được hưởng lợi công bằng. [2442, 2463, 2551]"}, {"level": "1", "content": "Tình huống: Một chính sách nông nghiệp mới khuyến khích nông dân áp dụng các giống cây trồng biến đổi gen (GMO) có khả năng kháng sâu bệnh và năng suất cao. Chính sách này đi kèm với các gói hỗ trợ kỹ thuật từ các công ty cung cấp giống. Tuy nhiên, hạt giống GMO thường không thể tự nhân giống cho vụ sau và nông dân phải mua lại hạt giống hàng năm từ công ty. Chính sách này, nếu không xem xét kỹ lưỡng các tác động xã hội và giới, có thể gây ra những lo ngại gì cho các hộ nông dân nhỏ, đặc biệt là các hộ do phụ nữ quản lý vốn có ít nguồn lực?", "options": {"A": "Giúp họ hoàn toàn tự chủ về nguồn giống cho các vụ sau.", "B": "Có thể làm tăng sự phụ thuộc của nông dân vào các công ty cung cấp giống, tăng chi phí sản xuất hàng năm, và gây rủi ro cho các nữ nông dân có ít vốn và khả năng tiếp cận thị trường hạn chế.", "C": "Đảm bảo an ninh lương thực tuyệt đối cho tất cả các hộ gia đình.", "D": "Khuyến khích việc bảo tồn các giống cây trồng địa phương."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc phải mua lại hạt giống hàng năm có thể tạo ra gánh nặng chi phí và sự phụ thuộc, đặc biệt đối với các nông hộ nhỏ và những người có ít nguồn lực, trong đó có nhiều phụ nữ. [2296, 2347, 2376] (Hàm ý từ việc phụ nữ khó tiếp cận vốn)"}, {"level": "1", "content": "Tình huống: Một chính sách nông nghiệp mới khuyến khích nông dân áp dụng các giống cây trồng biến đổi gen (GMO) có khả năng kháng sâu bệnh và năng suất cao. Chính sách này đi kèm với các gói hỗ trợ kỹ thuật từ các công ty cung cấp giống. Tuy nhiên, hạt giống GMO thường không thể tự nhân giống cho vụ sau và nông dân phải mua lại hạt giống hàng năm từ công ty. Nếu áp dụng Đánh giá tác động giới (GIA) cho chính sách này, một khía cạnh quan trọng cần được phân tích là:", "options": {"A": "Liệu các giống GMO có thực sự cho năng suất cao hơn các giống truyền thống hay không.", "B": "Khả năng tiếp cận và chi trả chi phí hạt giống GMO hàng năm của các nhóm nông dân nam và nữ khác nhau, tác động đến quyền tự chủ về giống và an ninh lương thực của họ, cũng như ai là người đưa ra quyết định về việc áp dụng giống mới trong hộ gia đình.", "C": "Các công ty cung cấp giống có thu được lợi nhuận cao hay không.", "D": "Chính sách này có phù hợp với các cam kết thương mại quốc tế hay không."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GIA cần xem xét các tác động khác biệt của chính sách đến khả năng kinh tế, quyền tự chủ và an ninh lương thực của các nhóm giới khác nhau, đặc biệt là những người dễ bị tổn thương. [827, 831, 834]"}, {"level": "1", "content": "Tình huống: Một chính sách nông nghiệp mới khuyến khích nông dân áp dụng các giống cây trồng biến đổi gen (GMO) có khả năng kháng sâu bệnh và năng suất cao. Chính sách này đi kèm với các gói hỗ trợ kỹ thuật từ các công ty cung cấp giống. Tuy nhiên, hạt giống GMO thường không thể tự nhân giống cho vụ sau và nông dân phải mua lại hạt giống hàng năm từ công ty. Một giải pháp để giảm thiểu các tác động tiêu cực tiềm ẩn và tăng tính bền vững của chính sách này từ góc độ giới có thể là:", "options": {"A": "Cấm hoàn toàn việc sử dụng giống GMO.", "B": "Song song với việc giới thiệu giống GMO, cần có các chương trình hỗ trợ vốn cho các hộ nông dân khó khăn (đặc biệt là nữ), đảm bảo họ được tiếp cận thông tin đầy đủ và khách quan, đồng thời khuyến khích việc duy trì và bảo tồn các giống cây trồng địa phương để đảm bảo đa dạng sinh học và quyền tự chủ về giống.", "C": "Chỉ cho phép các công ty lớn trồng giống GMO.", "D": "Yêu cầu các công ty cung cấp giống phải giảm giá bán cho tất cả mọi người."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một giải pháp cân bằng cần vừa tận dụng lợi ích của công nghệ mới, vừa giảm thiểu rủi ro cho các nhóm dễ bị tổn thương thông qua các biện pháp hỗ trợ cụ thể và duy trì sự đa dạng, quyền tự chủ. [2335, 8, 2391]"}, {"level": "1", "content": "Tình huống: Một dự án cải thiện vệ sinh môi trường ở một khu dân cư nghèo tập trung vào việc xây dựng các nhà vệ sinh công cộng dùng chung. Trong quá trình thiết kế, không có sự tham vấn ý kiến của phụ nữ và trẻ em gái trong cộng đồng. Sau khi hoàn thành, nhiều phụ nữ và trẻ em gái cảm thấy không an toàn và bất tiện khi sử dụng các nhà vệ sinh này do vị trí đặt không phù hợp, thiếu ánh sáng và không đảm bảo sự riêng tư. Vấn đề chính trong tình huống này là gì từ góc độ phân tích giới?", "options": {"A": "Chi phí xây dựng nhà vệ sinh quá cao.", "B": "Việc thiết kế các công trình công cộng đã bỏ qua các nhu cầu và mối quan tâm đặc thù về an toàn, riêng tư và tiện lợi của phụ nữ và trẻ em gái.", "C": "Người dân không có ý thức giữ gìn vệ sinh chung.", "D": "Số lượng nhà vệ sinh không đủ đáp ứng nhu cầu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ và trẻ em gái có những nhu cầu riêng biệt liên quan đến an toàn và riêng tư khi sử dụng các công trình vệ sinh. Bỏ qua những nhu cầu này khi thiết kế sẽ làm giảm tính hiệu quả và khả năng sử dụng của công trình. [2022, 2025, 2056, 2059]"}, {"level": "1", "content": "Tình huống: Một dự án cải thiện vệ sinh môi trường ở một khu dân cư nghèo tập trung vào việc xây dựng các nhà vệ sinh công cộng dùng chung. Trong quá trình thiết kế, không có sự tham vấn ý kiến của phụ nữ và trẻ em gái trong cộng đồng. Sau khi hoàn thành, nhiều phụ nữ và trẻ em gái cảm thấy không an toàn và bất tiện khi sử dụng các nhà vệ sinh này do vị trí đặt không phù hợp, thiếu ánh sáng và không đảm bảo sự riêng tư. Nếu áp dụng Khung Phân tích Giới của Jhpiego (bao gồm các lĩnh vực: tiếp cận tài sản/nguồn lực; niềm tin/nhận thức văn hóa xã hội; thực hành/sự tham gia; thể chế/luật pháp/chính sách, với quyền lực là chủ đề xuyên suốt), sự e ngại của phụ nữ khi sử dụng nhà vệ sinh công cộng có thể liên quan đến lĩnh vực nào?", "options": {"A": "Chỉ liên quan đến lĩnh vực \"tiếp cận nguồn lực\" (nhà vệ sinh).", "B": "Có thể liên quan đến \"niềm tin và nhận thức văn hóa xã hội\" (ví dụ, quan niệm về sự an toàn và đúng đắn cho phụ nữ ở nơi công cộng), \"thực hành và sự tham gia\" (họ có thể tránh sử dụng), và cả yếu tố \"quyền lực\" (tiếng nói của họ không được lắng nghe trong thiết kế).", "C": "Chỉ liên quan đến lĩnh vực \"thể chế, luật pháp và chính sách\".", "D": "Không liên quan đến bất kỳ lĩnh vực nào trong khung này."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự e ngại của phụ nữ không chỉ đơn thuần là vấn đề vật chất (có nhà vệ sinh hay không) mà còn liên quan sâu sắc đến các chuẩn mực văn hóa về an toàn, vai trò giới, và việc họ có được tham gia vào quá trình ra quyết định hay không (quyền lực). [2140]"}, {"level": "1", "content": "Tình huống: Một dự án cải thiện vệ sinh môi trường ở một khu dân cư nghèo tập trung vào việc xây dựng các nhà vệ sinh công cộng dùng chung. Trong quá trình thiết kế, không có sự tham vấn ý kiến của phụ nữ và trẻ em gái trong cộng đồng. Sau khi hoàn thành, nhiều phụ nữ và trẻ em gái cảm thấy không an toàn và bất tiện khi sử dụng các nhà vệ sinh này do vị trí đặt không phù hợp, thiếu ánh sáng và không đảm bảo sự riêng tư. Để đảm bảo các dự án vệ sinh công cộng trong tương lai thực sự đáp ứng nhu cầu của tất cả mọi người, bước \"Đánh giá giới\" (GA) cần đặc biệt ưu tiên phương pháp thu thập dữ liệu nào?", "options": {"A": "Chỉ phân tích bản vẽ thiết kế kỹ thuật của nhà vệ sinh.", "B": "Tổ chức các buổi thảo luận nhóm tập trung riêng biệt với phụ nữ, trẻ em gái, nam giới và các nhóm yếu thế khác để tìm hiểu về nhu cầu, mối quan tâm về an toàn, riêng tư, vị trí và thiết kế phù hợp.", "C": "Chỉ phỏng vấn các nhà thầu xây dựng.", "D": "Chỉ dựa vào số liệu thống kê về mật độ dân số."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phương pháp tham vấn trực tiếp, đặc biệt là thảo luận nhóm tập trung với các nhóm đối tượng cụ thể, sẽ giúp thu thập được những thông tin sâu sắc và đa dạng về nhu cầu và mối quan tâm mà các phương pháp khác khó có thể nắm bắt. [2145, 2163] (Từ Bảng 6.4)"}, {"level": "1", "content": "Tình huống: Một chính sách hỗ trợ ngư dân ven biển chuyển đổi sang các mô hình nuôi trồng thủy sản bền vững hơn do nguồn lợi hải sản tự nhiên suy giảm. Chính sách này cung cấp các khoản vay ưu đãi và tập huấn kỹ thuật. Tuy nhiên, các điều kiện để nhận được khoản vay (ví dụ: phải có tàu thuyền đăng ký chính chủ, có diện tích mặt nước đủ lớn) và hình thức tổ chức tập huấn (thường ở trung tâm huyện, vào giờ hành chính) lại gây khó khăn cho nhiều phụ nữ làm nghề buôn bán hải sản nhỏ lẻ hoặc tham gia các hoạt động nuôi trồng quy mô nhỏ, không chính thức. Chính sách này có nguy cơ tạo ra \"phân biệt đối xử gián tiếp\" đối với phụ nữ vì:", "options": {"A": "Nó được thiết kế để chỉ hỗ trợ nam giới.", "B": "Mặc dù các điều kiện có vẻ trung lập, nhưng do phụ nữ thường ít sở hữu tài sản lớn (tàu thuyền, diện tích mặt nước) và bị hạn chế về thời gian, khả năng di chuyển, nên họ khó đáp ứng được các tiêu chí và ít có khả năng tham gia.", "C": "Phụ nữ không có khả năng học các kỹ thuật nuôi trồng mới.", "D": "Nuôi trồng thủy sản bền vững không mang lại lợi ích kinh tế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các điều kiện và hình thức triển khai chính sách, dù không cố ý phân biệt đối xử, nhưng khi đặt trong bối cảnh bất bình đẳng giới hiện có về sở hữu tài sản và phân công lao động, lại có thể vô tình loại trừ phụ nữ. [702, 703, 1816, 1817]"}, {"level": "1", "content": "Tình huống: Một chính sách hỗ trợ ngư dân ven biển chuyển đổi sang các mô hình nuôi trồng thủy sản bền vững hơn do nguồn lợi hải sản tự nhiên suy giảm. Chính sách này cung cấp các khoản vay ưu đãi và tập huấn kỹ thuật. Tuy nhiên, các điều kiện để nhận được khoản vay (ví dụ: phải có tàu thuyền đăng ký chính chủ, có diện tích mặt nước đủ lớn) và hình thức tổ chức tập huấn (thường ở trung tâm huyện, vào giờ hành chính) lại gây khó khăn cho nhiều phụ nữ làm nghề buôn bán hải sản nhỏ lẻ hoặc tham gia các hoạt động nuôi trồng quy mô nhỏ, không chính thức. Nếu áp dụng Khung Moser để phân tích nhu cầu của phụ nữ trong tình huống này, việc họ cần các khoản vay nhỏ, linh hoạt và các lớp tập huấn kỹ thuật tại chỗ, phù hợp với lịch trình của họ sẽ được xếp vào loại nhu cầu nào?", "options": {"A": "Chỉ là nhu cầu giới chiến lược.", "B": "Chủ yếu là nhu cầu giới thực tế (giúp họ thực hiện tốt hơn công việc hiện tại hoặc chuyển đổi sinh kế), nhưng nếu được đáp ứng tốt có thể góp phần vào việc đạt được các nhu cầu giới chiến lược (ví dụ, tăng thu nhập, tự chủ kinh tế).", "C": "Không phải là nhu cầu giới.", "D": "Chỉ là nhu cầu của một số ít phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Những nhu cầu này trực tiếp giúp phụ nữ cải thiện điều kiện làm việc và thu nhập trước mắt (PGN). Tuy nhiên, việc được tiếp cận vốn và kiến thức cũng có thể là bước đệm quan trọng để họ nâng cao vị thế và sự độc lập kinh tế (SGN). [936, 937, 1242, 1245, 1253]"}, {"level": "1", "content": "Tình huống: Một chính sách hỗ trợ ngư dân ven biển chuyển đổi sang các mô hình nuôi trồng thủy sản bền vững hơn do nguồn lợi hải sản tự nhiên suy giảm. Chính sách này cung cấp các khoản vay ưu đãi và tập huấn kỹ thuật. Tuy nhiên, các điều kiện để nhận được khoản vay (ví dụ: phải có tàu thuyền đăng ký chính chủ, có diện tích mặt nước đủ lớn) và hình thức tổ chức tập huấn (thường ở trung tâm huyện, vào giờ hành chính) lại gây khó khăn cho nhiều phụ nữ làm nghề buôn bán hải sản nhỏ lẻ hoặc tham gia các hoạt động nuôi trồng quy mô nhỏ, không chính thức. Để chính sách chuyển đổi sinh kế này hiệu quả và công bằng hơn, một đề xuất trong bước \"Lấp đầy khoảng trống\" (Filling the Gaps - Bước 4 của quy trình phân tích giới 4 bước) có thể là:", "options": {"A": "Yêu cầu tất cả phụ nữ phải thành lập doanh nghiệp lớn để đủ điều kiện vay vốn.", "B": "Thiết kế các gói hỗ trợ tài chính và kỹ thuật linh hoạt, phù hợp với quy mô hoạt động và điều kiện của phụ nữ; xem xét các hình thức bảo lãnh tín chấp dựa trên nhóm thay vì tài sản; và tổ chức đào tạo tại cộng đồng.", "C": "Ngừng hoàn toàn việc hỗ trợ chuyển đổi sinh kế.", "D": "Chỉ hỗ trợ cho những phụ nữ đã có kinh nghiệm nuôi trồng thủy sản thành công."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Bước \"Lấp đầy khoảng trống\" nhằm đưa ra các giải pháp để chính sách trở nên đáp ứng giới hơn, bằng cách giải quyết các rào cản và nhu cầu đã được xác định trong các bước phân tích trước đó. [838, 839, 840, 841]"}, {"level": "1", "content": "Tình huống: Một báo cáo về Ngân sách có trách nhiệm giới (GRB) trong lĩnh vực giáo dục của một quốc gia cho thấy, mặc dù ngân sách chi cho việc xây dựng trường học ở các vùng sâu vùng xa đã tăng lên, nhưng tỷ lệ trẻ em gái dân tộc thiểu số bỏ học sau cấp tiểu học vẫn còn cao. Phân tích định tính cho thấy nguyên nhân bao gồm gánh nặng việc nhà, tảo hôn, và nhận thức của gia đình về giá trị của việc học cho con gái còn hạn chế. Tình huống này cho thấy hạn chế nào của việc chỉ tập trung vào \"chi tiêu công\" mà không đi kèm với \"phân tích phân bổ lợi ích theo giới\" và các yếu tố xã hội trong GRB?", "options": {"A": "Việc tăng chi ngân sách không tự động đảm bảo kết quả bình đẳng giới nếu các rào cản về văn hóa, xã hội và các nhu cầu đặc thù không được giải quyết đồng thời.", "B": "Xây dựng trường học ở vùng sâu vùng xa là không cần thiết.", "C": "Trẻ em gái dân tộc thiểu số không muốn đi học.", "D": "Ngân sách cho giáo dục luôn được phân bổ công bằng."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> GRB không chỉ là việc phân bổ ngân sách mà còn phải xem xét liệu ngân sách đó có thực sự mang lại lợi ích và giải quyết được các rào cản đối với các nhóm giới khác nhau hay không. Các yếu tố văn hóa, xã hội có thể vô hiệu hóa tác động của việc tăng chi tiêu. [1921, 1954, 1955, 2092, 2093]"}, {"level": "1", "content": "Tình huống: Một báo cáo về Ngân sách có trách nhiệm giới (GRB) trong lĩnh vực giáo dục của một quốc gia cho thấy, mặc dù ngân sách chi cho việc xây dựng trường học ở các vùng sâu vùng xa đã tăng lên, nhưng tỷ lệ trẻ em gái dân tộc thiểu số bỏ học sau cấp tiểu học vẫn còn cao. Phân tích định tính cho thấy nguyên nhân bao gồm gánh nặng việc nhà, tảo hôn, và nhận thức của gia đình về giá trị của việc học cho con gái còn hạn chế. Để giải quyết vấn đề bỏ học của trẻ em gái dân tộc thiểu số một cách hiệu quả hơn thông qua GRB, bên cạnh việc xây trường, ngân sách cần ưu tiên cho những hoạt động nào sau đây?", "options": {"A": "Chỉ tăng lương cho giáo viên nam.", "B": "Các chương trình vận động cộng đồng về tầm quan trọng của giáo dục cho trẻ em gái, hỗ trợ tài chính có điều kiện cho các gia đình có con gái đi học, và các biện pháp can thiệp để giảm thiểu tảo hôn và gánh nặng việc nhà cho trẻ em gái.", "C": "Chỉ cung cấp sách giáo khoa miễn phí.", "D": "Xây dựng thêm nhiều trường nội trú chỉ dành cho nam sinh."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các giải pháp cần phải giải quyết cả các rào cản về kinh tế, văn hóa và xã hội đang ngăn cản trẻ em gái đến trường, chứ không chỉ dừng lại ở việc cung cấp cơ sở vật chất. [2002, 2003, 2754, 2755]"}, {"level": "1", "content": "Tình huống: Một báo cáo về Ngân sách có trách nhiệm giới (GRB) trong lĩnh vực giáo dục của một quốc gia cho thấy, mặc dù ngân sách chi cho việc xây dựng trường học ở các vùng sâu vùng xa đã tăng lên, nhưng tỷ lệ trẻ em gái dân tộc thiểu số bỏ học sau cấp tiểu học vẫn còn cao. Phân tích định tính cho thấy nguyên nhân bao gồm gánh nặng việc nhà, tảo hôn, và nhận thức của gia đình về giá trị của việc học cho con gái còn hạn chế. Nếu áp dụng Khung Phân tích Giới của Jhpiego, việc gia đình có nhận thức hạn chế về giá trị học vấn của con gái và gánh nặng việc nhà thuộc lĩnh vực phân tích nào?", "options": {"A": "Chỉ thuộc lĩnh vực \"Thể chế, luật pháp và chính sách\".", "B": "Chủ yếu thuộc lĩnh vực \"Niềm tin và nhận thức văn hóa xã hội\" và \"Các thực hành và sự tham gia\" (liên quan đến phân công lao động trong gia đình).", "C": "Chỉ thuộc lĩnh vực \"Khả năng tiếp cận các tài sản và nguồn lực\".", "D": "Không thuộc lĩnh vực nào cả."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nhận thức của gia đình về giá trị giáo dục cho con gái là một chuẩn mực văn hóa xã hội. Gánh nặng việc nhà là một thực hành liên quan đến phân công lao động theo giới. Cả hai đều là những yếu tố quan trọng cần phân tích. [2140]"}, {"level": "1", "content": "Tình huống: Một chính sách quốc gia về phát triển bền vững đặt ra mục tiêu giảm phát thải khí nhà kính thông qua việc chuyển đổi sang năng lượng tái tạo. Tuy nhiên, việc xây dựng các nhà máy điện gió quy mô lớn đòi hỏi thu hồi một diện tích đáng kể đất nông nghiệp và đất rừng cộng đồng, nơi sinh kế của nhiều hộ gia đình, đặc biệt là phụ nữ dân tộc thiểu số, phụ thuộc vào đó. Tình huống này minh họa sự phức tạp nào trong việc theo đuổi các mục tiêu phát triển bền vững?", "options": {"A": "Phát triển năng lượng tái tạo luôn mang lại lợi ích cho tất cả mọi người.", "B": "Có thể xảy ra sự đánh đổi (trade-off) giữa các trụ cột của phát triển bền vững (ví dụ, giữa bền vững môi trường và bền vững kinh tế/xã hội của một nhóm cụ thể) nếu không có các biện pháp giảm thiểu và lồng ghép giới/xã hội phù hợp.", "C": "Phụ nữ dân tộc thiểu số thường phản đối các dự án năng lượng tái tạo.", "D": "Việc thu hồi đất luôn diễn ra một cách công bằng và minh bạch."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phát triển bền vững đòi hỏi sự cân bằng giữa các trụ cột kinh tế, xã hội và môi trường. Việc theo đuổi một mục tiêu (năng lượng tái tạo) có thể vô tình gây tổn hại đến các mục tiêu khác (sinh kế, công bằng xã hội) nếu không được thiết kế và thực hiện một cách cẩn trọng, có sự tham gia và tính đến tác động đa chiều. [313, 2718, 2719, 2720]"}, {"level": "1", "content": "Tình huống: Một chính sách quốc gia về phát triển bền vững đặt ra mục tiêu giảm phát thải khí nhà kính thông qua việc chuyển đổi sang năng lượng tái tạo. Tuy nhiên, việc xây dựng các nhà máy điện gió quy mô lớn đòi hỏi thu hồi một diện tích đáng kể đất nông nghiệp và đất rừng cộng đồng, nơi sinh kế của nhiều hộ gia đình, đặc biệt là phụ nữ dân tộc thiểu số, phụ thuộc vào đó. Nếu áp dụng Khung Phân tích Giới của Jhpiego (bao gồm lĩnh vực \"Thể chế, luật pháp và chính sách\"), việc các quy định về đền bù và hỗ trợ tái định cư khi thu hồi đất không tính đến quyền sử dụng đất không chính thức hoặc vai trò kinh tế đặc thù của phụ nữ từ đất rừng cộng đồng, sẽ được xem xét ở khía cạnh nào?", "options": {"A": "Chỉ là vấn đề về \"Khả năng tiếp cận các tài sản và nguồn lực\".", "B": "Là một thiếu sót trong \"Thể chế, luật pháp và chính sách\" không đảm bảo quyền lợi công bằng cho các nhóm giới và cộng đồng dễ bị tổn thương, đồng thời phản ánh sự bất bình đẳng về \"quyền lực\" trong việc định hình các chính sách này.", "C": "Chỉ là vấn đề về \"Niềm tin và nhận thức văn hóa xã hội\".", "D": "Không liên quan đến khung phân tích này."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các chính sách đền bù và tái định cư là một phần của thể chế pháp lý. Nếu chúng không công nhận và giải quyết các quyền lợi và vai trò đặc thù của phụ nữ (ví dụ, quyền tiếp cận tài nguyên chung, sinh kế từ đất không chính thức), chúng sẽ tạo ra hoặc làm trầm trọng thêm bất bình đẳng, phản ánh sự thiếu vắng tiếng nói và quyền lực của họ trong quá trình xây dựng chính sách. [2140]"}, {"level": "1", "content": "Tình huống: Một chính sách quốc gia về phát triển bền vững đặt ra mục tiêu giảm phát thải khí nhà kính thông qua việc chuyển đổi sang năng lượng tái tạo. Tuy nhiên, việc xây dựng các nhà máy điện gió quy mô lớn đòi hỏi thu hồi một diện tích đáng kể đất nông nghiệp và đất rừng cộng đồng, nơi sinh kế của nhiều hộ gia đình, đặc biệt là phụ nữ dân tộc thiểu số, phụ thuộc vào đó. Một giải pháp GRB cho chính sách năng lượng tái tạo này, nhằm đảm bảo \"không để ai bị bỏ lại phía sau\", KHÔNG nhất thiết phải bao gồm:", "options": {"A": "Thực hiện Đánh giá tác động giới và xã hội toàn diện trước khi phê duyệt dự án, xác định các nhóm bị ảnh hưởng và các điểm yếu cụ thể.", "B": "Xây dựng các cơ chế chia sẻ lợi ích công bằng từ dự án năng lượng tái tạo cho cộng đồng bị ảnh hưởng, đặc biệt ưu tiên các hộ do phụ nữ làm chủ hoặc phụ thuộc nhiều vào đất bị thu hồi.", "C": "Cung cấp các chương trình hỗ trợ chuyển đổi sinh kế bền vững, đào tạo kỹ năng mới phù hợp với nhu cầu và năng lực của phụ nữ.", "D": "Yêu cầu tất cả các công nhân xây dựng nhà máy điện gió phải là phụ nữ."}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> GRB hướng đến sự công bằng và trao quyền, không nhất thiết phải là các biện pháp cực đoan hoặc không thực tế như yêu cầu toàn bộ lao động phải là một giới. Các lựa chọn A, B, C đều là những can thiệp GRB phù hợp và cần thiết. [1892, 1920, 2000, 2001, 2002]"}, {"level": "1", "content": "Tình huống: Một chương trình khuyến nông quốc gia giới thiệu một giống lúa mới lai tạo, có khả năng chịu hạn tốt và cho năng suất cao hơn giống địa phương. Chương trình cung cấp hạt giống và phân bón trong vụ đầu tiên. Tuy nhiên, giống lúa này đòi hỏi kỹ thuật canh tác thâm canh cao hơn, sử dụng nhiều nước hơn trong giai đoạn đầu và hạt giống không thể tự để lại cho vụ sau mà phải mua mới hàng năm từ các đại lý được chỉ định. Việc giới thiệu giống lúa mới này có thể tiềm ẩn nguy cơ gì đối với các nữ nông dân nghèo, ít vốn và có ít kinh nghiệm với kỹ thuật thâm canh?", "options": {"A": "Họ sẽ ngay lập tức tăng gấp đôi thu nhập.", "B": "Họ có thể gặp khó khăn trong việc đáp ứng yêu cầu kỹ thuật thâm canh, chi phí mua hạt giống hàng năm và nhu cầu nước tăng cao, dẫn đến rủi ro mất mùa hoặc nợ nần nếu không có sự hỗ trợ kỹ thuật và tài chính phù hợp, kéo dài.", "C": "Họ sẽ hoàn toàn từ bỏ việc trồng lúa.", "D": "Giống lúa mới sẽ giúp họ giảm đáng kể công lao động."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các giống mới năng suất cao thường đi kèm với yêu cầu kỹ thuật và đầu tư cao hơn. Nếu không có sự hỗ trợ đầy đủ và bền vững, những nông dân có ít nguồn lực (thường là phụ nữ nghèo) có thể gặp rủi ro lớn hơn thay vì hưởng lợi. [2296, 2323, 2347, 2376]"}, {"level": "1", "content": "Tình huống: Một chương trình khuyến nông quốc gia giới thiệu một giống lúa mới lai tạo, có khả năng chịu hạn tốt và cho năng suất cao hơn giống địa phương. Chương trình cung cấp hạt giống và phân bón trong vụ đầu tiên. Tuy nhiên, giống lúa này đòi hỏi kỹ thuật canh tác thâm canh cao hơn, sử dụng nhiều nước hơn trong giai đoạn đầu và hạt giống không thể tự để lại cho vụ sau mà phải mua mới hàng năm từ các đại lý được chỉ định. Nếu áp dụng công cụ \"Tiếp cận và Kiểm soát\" (Khung Harvard), việc nông dân phải mua lại hạt giống hàng năm từ đại lý cho thấy sự thay đổi nào về quyền của họ?", "options": {"A": "Tăng quyền kiểm soát của họ đối với nguồn giống.", "B": "Giảm quyền kiểm soát và tự chủ của nông dân đối với một yếu tố đầu vào sản xuất quan trọng (hạt giống), tăng sự phụ thuộc vào thị trường bên ngoài.", "C": "Không có sự thay đổi nào đáng kể.", "D": "Giúp họ tiếp cận được nhiều loại giống hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc không thể tự nhân giống và phải mua lại hạt giống hàng năm làm giảm quyền tự chủ của nông dân trong việc lựa chọn và duy trì nguồn giống, tăng sự phụ thuộc vào các nhà cung cấp. [870, 871, 874]"}, {"level": "1", "content": "Tình huống: Một chương trình khuyến nông quốc gia giới thiệu một giống lúa mới lai tạo, có khả năng chịu hạn tốt và cho năng suất cao hơn giống địa phương. Chương trình cung cấp hạt giống và phân bón trong vụ đầu tiên. Tuy nhiên, giống lúa này đòi hỏi kỹ thuật canh tác thâm canh cao hơn, sử dụng nhiều nước hơn trong giai đoạn đầu và hạt giống không thể tự để lại cho vụ sau mà phải mua mới hàng năm từ các đại lý được chỉ định. Một nhà phân tích giới xem xét chương trình này có thể đặt câu hỏi nào sau đây để làm rõ hơn các tác động tiềm ẩn?", "options": {"A": "Liệu giống lúa mới có ngon hơn giống địa phương không?", "B": "Phụ nữ hay nam giới trong hộ gia đình thường là người quyết định việc áp dụng giống mới và quản lý chi phí liên quan? Kiến thức và kinh nghiệm của ai (về giống địa phương, về kỹ thuật mới) được coi trọng hơn? Ai sẽ gánh vác phần lao động tăng thêm (nếu có) do yêu cầu thâm canh?", "C": "Chương trình này có được quảng bá trên truyền hình quốc gia không?", "D": "Năng suất tối đa của giống lúa mới là bao nhiêu tấn/ha?"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các câu hỏi này đi sâu vào việc phân tích động lực giới trong hộ gia đình liên quan đến việc áp dụng công nghệ mới, quản lý nguồn lực và phân công lao động, giúp làm rõ ai có thể hưởng lợi và ai có thể gặp rủi ro. [827, 831, 1113, 1114, 1217]"}, {"level": "1", "content": "Tình huống: Một chính sách bảo vệ nguồn nước yêu cầu các làng ven sông phải di dời các hoạt động chăn nuôi (lợn, gia cầm) ra xa bờ sông để tránh ô nhiễm. Chính quyền địa phương hỗ trợ kinh phí xây dựng khu chăn nuôi tập trung mới, nhưng không có các biện pháp hỗ trợ chi tiết cho việc vận chuyển thức ăn, nước uống cho vật nuôi đến khu mới, cũng như việc xử lý chất thải tại khu tập trung. Công việc chăn nuôi quy mô nhỏ trong gia đình trước đây chủ yếu do phụ nữ đảm nhiệm. Chính sách này, dù có mục tiêu bảo vệ môi trường tốt, có thể tạo ra \"gánh nặng không cân xứng\" cho phụ nữ vì:", "options": {"A": "Phụ nữ không quan tâm đến việc bảo vệ nguồn nước.", "B": "Họ có thể phải tốn thêm nhiều thời gian và công sức hơn để di chuyển đến khu chăn nuôi mới, vận chuyển thức ăn, nước uống, và xử lý chất thải, trong khi vai trò của họ trong việc ra quyết định về vị trí và thiết kế khu chăn nuôi tập trung có thể hạn chế.", "C": "Nam giới sẽ hoàn toàn đảm nhận công việc chăn nuôi ở khu tập trung.", "D": "Khu chăn nuôi tập trung sẽ giúp giảm bớt công việc cho tất cả mọi người."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nếu các yếu tố về khoảng cách, hạ tầng hỗ trợ và phân công lao động không được tính đến, việc di dời hoạt động chăn nuôi có thể làm tăng đáng kể gánh nặng công việc cho phụ nữ, những người thường chịu trách nhiệm chính. [834, 1977, 1978, 2371, 2380]"}, {"level": "1", "content": "Tình huống: Một chính sách bảo vệ nguồn nước yêu cầu các làng ven sông phải di dời các hoạt động chăn nuôi (lợn, gia cầm) ra xa bờ sông để tránh ô nhiễm. Chính quyền địa phương hỗ trợ kinh phí xây dựng khu chăn nuôi tập trung mới, nhưng không có các biện pháp hỗ trợ chi tiết cho việc vận chuyển thức ăn, nước uống cho vật nuôi đến khu mới, cũng như việc xử lý chất thải tại khu tập trung. Công việc chăn nuôi quy mô nhỏ trong gia đình trước đây chủ yếu do phụ nữ đảm nhiệm. Nếu áp dụng Khung Moser để phân tích, việc phụ nữ phải tốn thêm thời gian cho việc đi lại và vận chuyển đến khu chăn nuôi mới sẽ ảnh hưởng trực tiếp đến khả năng của họ trong việc thực hiện các vai trò nào khác?", "options": {"A": "Chỉ ảnh hưởng đến vai trò sản xuất của họ.", "B": "Có thể ảnh hưởng tiêu cực đến thời gian họ dành cho vai trò tái sản xuất (chăm sóc gia đình, nội trợ) và vai trò cộng đồng (tham gia các hoạt động xã hội), cũng như thời gian nghỉ ngơi.", "C": "Không ảnh hưởng đến các vai trò khác vì họ có thể làm nhiều việc cùng lúc.", "D": "Chỉ ảnh hưởng đến vai trò cộng đồng của họ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khung Moser nhấn mạnh sự liên kết và cân bằng giữa ba vai trò. Khi một vai trò (ở đây là các hoạt động liên quan đến chăn nuôi, thuộc vai trò sản xuất) đòi hỏi nhiều thời gian và công sức hơn, nó sẽ chiếm dụng thời gian và năng lượng dành cho các vai trò khác. [941, 942, 951, 1003, 1004]"}, {"level": "1", "content": "Tình huống: Một chính sách bảo vệ nguồn nước yêu cầu các làng ven sông phải di dời các hoạt động chăn nuôi (lợn, gia cầm) ra xa bờ sông để tránh ô nhiễm. Chính quyền địa phương hỗ trợ kinh phí xây dựng khu chăn nuôi tập trung mới, nhưng không có các biện pháp hỗ trợ chi tiết cho việc vận chuyển thức ăn, nước uống cho vật nuôi đến khu mới, cũng như việc xử lý chất thải tại khu tập trung. Công việc chăn nuôi quy mô nhỏ trong gia đình trước đây chủ yếu do phụ nữ đảm nhiệm. Để giảm thiểu tác động tiêu cực và đảm bảo tính công bằng của chính sách, khi quy hoạch khu chăn nuôi tập trung, cần phải làm gì từ góc độ phân tích giới?", "options": {"A": "Chỉ cần xây dựng khu chăn nuôi ở vị trí xa nhất có thể để đảm bảo không ô nhiễm.", "B": "Tham vấn ý kiến của cả phụ nữ và nam giới về vị trí, thiết kế khu chăn nuôi; xem xét các giải pháp hỗ trợ vận chuyển, cung cấp nước và xử lý chất thải tại chỗ; đồng thời phân tích và hỗ trợ việc tái phân công lao động trong gia đình nếu cần.", "C": "Yêu cầu tất cả các hộ phải tự chịu trách nhiệm hoàn toàn cho việc di dời và vận hành.", "D": "Chỉ hỗ trợ kinh phí xây dựng cho các hộ do nam giới làm chủ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một giải pháp đáp ứng giới cần phải xem xét toàn diện các tác động đến thời gian, công sức của phụ nữ, thu hút sự tham gia của họ vào quy hoạch, và cung cấp các hỗ trợ cần thiết để giảm thiểu gánh nặng. [840, 841, 191966, 2168]"}, {"level": "1", "content": "Tình huống: Một tổ chức quốc tế hỗ trợ một dự án tăng cường khả năng chống chịu với biến đổi khí hậu cho cộng đồng nông nghiệp. Dự án tập trung vào việc giới thiệu các mô hình nông nghiệp thông minh với khí hậu (CSA) và cung cấp các khóa tập huấn kỹ thuật. Tuy nhiên, tài liệu tập huấn chủ yếu bằng ngôn ngữ kỹ thuật khó hiểu và các buổi tập huấn thường do các chuyên gia nam giới từ bên ngoài đến giảng dạy, ít tương tác với kinh nghiệm thực tế của nông dân địa phương, đặc biệt là phụ nữ. Cách tiếp cận tập huấn này có thể không hiệu quả trong việc chuyển giao kiến thức và kỹ năng CSA cho nông dân địa phương, đặc biệt là phụ nữ, vì:", "options": {"A": "Nông dân địa phương không có khả năng học hỏi các kỹ thuật mới.", "B": "Rào cản về ngôn ngữ kỹ thuật, phương pháp giảng dạy một chiều, và sự thiếu kết nối với kiến thức bản địa cũng như bối cảnh văn hóa có thể làm giảm khả năng tiếp thu và áp dụng của nông dân, đặc biệt là phụ nữ những người có thể ít được tiếp xúc với giáo dục chính quy hoặc các thuật ngữ kỹ thuật.", "C": "Chỉ có chuyên gia nam giới mới có kiến thức về CSA.", "D": "Các mô hình CSA không phù hợp với điều kiện địa phương."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Hiệu quả của việc chuyển giao kiến thức phụ thuộc rất nhiều vào phương pháp, ngôn ngữ và sự phù hợp với đối tượng. Nếu không tính đến các yếu tố này, đặc biệt là đối với phụ nữ những người có thể gặp nhiều rào cản hơn về giáo dục và tự tin, việc tập huấn sẽ kém hiệu quả. [2349, 2378, 2812]"}, {"level": "1", "content": "Tình huống: Một tổ chức quốc tế hỗ trợ một dự án tăng cường khả năng chống chịu với biến đổi khí hậu cho cộng đồng nông nghiệp. Dự án tập trung vào việc giới thiệu các mô hình nông nghiệp thông minh với khí hậu (CSA) và cung cấp các khóa tập huấn kỹ thuật. Tuy nhiên, tài liệu tập huấn chủ yếu bằng ngôn ngữ kỹ thuật khó hiểu và các buổi tập huấn thường do các chuyên gia nam giới từ bên ngoài đến giảng dạy, ít tương tác với kinh nghiệm thực tế của nông dân địa phương, đặc biệt là phụ nữ. Nếu sử dụng Khung Phân tích Giới của Jhpiego, việc các tài liệu tập huấn sử dụng ngôn ngữ kỹ thuật khó hiểu và phương pháp giảng dạy ít tương tác có thể được xem xét ở lĩnh vực nào?", "options": {"A": "Chỉ ở lĩnh vực \"Thể chế, luật pháp và chính sách\".", "B": "Chủ yếu ở lĩnh vực \"Khả năng tiếp cận các tài sản và nguồn lực\" (ở đây là kiến thức, thông tin dễ hiểu) và có thể cả \"Các thực hành và sự tham gia\" (nếu nó cản trở sự tham gia tích cực vào học tập).", "C": "Chỉ ở lĩnh vực \"Niềm tin và nhận thức văn hóa xã hội\".", "D": "Không liên quan đến khung phân tích này."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Kiến thức và thông tin được trình bày một cách dễ hiểu, dễ tiếp cận là một dạng \"nguồn lực\". Nếu ngôn ngữ và phương pháp không phù hợp, nó sẽ hạn chế khả năng tiếp cận nguồn lực này và cản trở sự tham gia hiệu quả vào quá trình học tập. [2140]"}, {"level": "1", "content": "Tình huống: Một tổ chức quốc tế hỗ trợ một dự án tăng cường khả năng chống chịu với biến đổi khí hậu cho cộng đồng nông nghiệp. Dự án tập trung vào việc giới thiệu các mô hình nông nghiệp thông minh với khí hậu (CSA) và cung cấp các khóa tập huấn kỹ thuật. Tuy nhiên, tài liệu tập huấn chủ yếu bằng ngôn ngữ kỹ thuật khó hiểu và các buổi tập huấn thường do các chuyên gia nam giới từ bên ngoài đến giảng dạy, ít tương tác với kinh nghiệm thực tế của nông dân địa phương, đặc biệt là phụ nữ. Để cải thiện hiệu quả của các khóa tập huấn CSA này từ góc độ giới, ban tổ chức nên:", "options": {"A": "Chỉ mời các nữ nông dân giỏi nhất đến chia sẻ kinh nghiệm.", "B": "Đơn giản hóa ngôn ngữ kỹ thuật, sử dụng các phương pháp học tập có sự tham gia, kết hợp kiến thức khoa học với tri thức bản địa, và nếu có thể, huy động các giảng viên/tập huấn viên là người địa phương hoặc có sự nhạy cảm văn hóa và giới.", "C": "Yêu cầu tất cả nông dân phải vượt qua một bài kiểm tra đầu vào về kiến thức kỹ thuật.", "D": "Tăng thời lượng các buổi giảng lý thuyết."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các biện pháp này nhằm làm cho nội dung và phương pháp tập huấn trở nên dễ tiếp cận, phù hợp và hấp dẫn hơn đối với tất cả nông dân, đặc biệt là phụ nữ và những người có trình độ học vấn hạn chế, đồng thời tôn trọng và tích hợp kiến thức địa phương. [2048, 2049, 2050, 2168]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu về tác động của việc xây dựng một khu công nghiệp lớn đến đời sống của cộng đồng nông nghiệp xung quanh. Kết quả cho thấy nhiều nam giới tìm được việc làm trong khu công nghiệp với thu nhập cao hơn làm nông. Phụ nữ, do ít có kỹ năng phù hợp và gánh nặng việc nhà, chủ yếu vẫn làm nông nghiệp hoặc chuyển sang các công việc dịch vụ thu nhập thấp gần nhà. Điều này dẫn đến sự thay đổi trong cơ cấu thu nhập và quyền lực trong nhiều gia đình. Sự thay đổi này có thể dẫn đến hệ lụy nào về giới trong các hộ gia đình?", "options": {"A": "Phụ nữ sẽ có nhiều thời gian nghỉ ngơi hơn vì nam giới kiếm được nhiều tiền hơn.", "B": "Có thể làm gia tăng sự phụ thuộc kinh tế của phụ nữ vào nam giới, giảm vị thế và quyền thương lượng của họ trong gia đình, ngay cả khi tổng thu nhập gia đình tăng lên.", "C": "Nam giới sẽ chủ động chia sẻ việc nhà nhiều hơn vì họ đã có việc làm tốt.", "D": "Bình đẳng giới trong gia đình sẽ tự động được cải thiện."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mặc dù tổng thu nhập hộ gia đình có thể tăng, nếu thu nhập đó chủ yếu do nam giới kiểm soát và phụ nữ mất đi nguồn thu nhập độc lập hoặc vị thế kinh tế của họ suy giảm, điều này có thể làm thay đổi cán cân quyền lực trong gia đình theo hướng bất lợi cho phụ nữ. [2750, 2751, 2762]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu về tác động của việc xây dựng một khu công nghiệp lớn đến đời sống của cộng đồng nông nghiệp xung quanh. Kết quả cho thấy nhiều nam giới tìm được việc làm trong khu công nghiệp với thu nhập cao hơn làm nông. Phụ nữ, do ít có kỹ năng phù hợp và gánh nặng việc nhà, chủ yếu vẫn làm nông nghiệp hoặc chuyển sang các công việc dịch vụ thu nhập thấp gần nhà. Điều này dẫn đến sự thay đổi trong cơ cấu thu nhập và quyền lực trong nhiều gia đình. Nếu áp dụng công cụ \"Ra quyết định\" (Chương 7) để phân tích tình hình mới trong các gia đình này, chúng ta có thể quan sát thấy điều gì?", "options": {"A": "Phụ nữ sẽ là người quyết định tất cả các khoản chi tiêu trong gia đình.", "B": "Có khả năng nam giới (do có thu nhập cao hơn và được coi là \"trụ cột\") sẽ có tiếng nói quyết định hơn trong các vấn đề lớn của gia đình, trong khi vai trò ra quyết định của phụ nữ có thể bị thu hẹp.", "C": "Mọi quyết định sẽ được đưa ra một cách hoàn toàn dân chủ và bình đẳng.", "D": "Chỉ có con cái mới có quyền ra quyết định."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quyền lực kinh tế thường gắn liền với quyền ra quyết định. Khi có sự thay đổi lớn về cơ cấu thu nhập theo giới, động lực ra quyết định trong gia đình cũng có thể thay đổi theo, thường là theo hướng người có đóng góp kinh tế lớn hơn sẽ có tiếng nói mạnh hơn. [1210, 1211, 1222, 1234]"}, {"level": "1", "content": "Tình huống: Một nghiên cứu về tác động của việc xây dựng một khu công nghiệp lớn đến đời sống của cộng đồng nông nghiệp xung quanh. Kết quả cho thấy nhiều nam giới tìm được việc làm trong khu công nghiệp với thu nhập cao hơn làm nông. Phụ nữ, do ít có kỹ năng phù hợp và gánh nặng việc nhà, chủ yếu vẫn làm nông nghiệp hoặc chuyển sang các công việc dịch vụ thu nhập thấp gần nhà. Điều này dẫn đến sự thay đổi trong cơ cấu thu nhập và quyền lực trong nhiều gia đình. Để giảm thiểu các tác động tiêu cực tiềm ẩn về giới từ việc phát triển khu công nghiệp, chính quyền địa phương và doanh nghiệp nên xem xét biện pháp nào sau đây?", "options": {"A": "Cấm phụ nữ làm việc trong khu công nghiệp.", "B": "Triển khai các chương trình đào tạo nghề có mục tiêu cho phụ nữ địa phương để họ có thể tiếp cận các công việc có kỹ năng và thu nhập tốt hơn trong khu công nghiệp hoặc các ngành dịch vụ liên quan; đồng thời hỗ trợ phát triển các dịch vụ chăm sóc trẻ để giảm gánh nặng cho phụ nữ.", "C": "Chỉ tập trung vào việc thu hút thêm nhiều nhà đầu tư vào khu công nghiệp.", "D": "Yêu cầu tất cả các gia đình phải duy trì việc làm nông nghiệp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các biện pháp can thiệp cần hướng đến việc nâng cao năng lực và tạo cơ hội việc làm công bằng cho phụ nữ, đồng thời giải quyết các rào cản liên quan đến trách nhiệm chăm sóc, để họ không bị bỏ lại phía sau trong quá trình phát triển kinh tế. [2003, 2067, 2168, 2519]"}, {"level": "1", "content": "Tình huống: Báo cáo Khoảng cách Giới Toàn cầu (GGGR) của Diễn đàn Kinh tế Thế giới xếp hạng các quốc gia dựa trên bốn lĩnh vực chính. Một quốc gia có thể đạt điểm cao về \"Sức khỏe và Sống còn\" và \"Trình độ học vấn\" cho phụ nữ, nhưng lại có điểm rất thấp về \"Cơ hội và Tham gia kinh tế\" và \"Trao quyền Chính trị\". Tình trạng này cho thấy điều gì về bình đẳng giới ở quốc gia đó?", "options": {"A": "Bình đẳng giới đã đạt được một cách toàn diện trên mọi lĩnh vực.", "B": "Mặc dù có những tiến bộ đáng kể trong việc đảm bảo các quyền cơ bản về sức khỏe và giáo dục cho phụ nữ, nhưng vẫn còn những rào cản lớn ngăn cản họ tham gia đầy đủ và bình đẳng vào đời sống kinh tế và chính trị.", "C": "Phụ nữ ở quốc gia đó không quan tâm đến kinh tế và chính trị.", "D": "Số liệu của GGGR là không đáng tin cậy."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Bình đẳng giới là một khái niệm đa chiều. Tiến bộ ở một số lĩnh vực (thường là các quyền cơ bản) không tự động chuyển thành bình đẳng ở các lĩnh vực khác, đặc biệt là những lĩnh vực liên quan đến quyền lực và cơ hội kinh tế, chính trị. [812, 221, 507, 508, 509]"}, {"level": "1", "content": "Tình huống: Báo cáo Khoảng cách Giới Toàn cầu (GGGR) của Diễn đàn Kinh tế Thế giới xếp hạng các quốc gia dựa trên bốn lĩnh vực chính. Một quốc gia có thể đạt điểm cao về \"Sức khỏe và Sống còn\" và \"Trình độ học vấn\" cho phụ nữ, nhưng lại có điểm rất thấp về \"Cơ hội và Tham gia kinh tế\" và \"Trao quyền Chính trị\". Điểm số thấp về \"Cơ hội và Tham gia kinh tế\" có thể phản ánh những vấn đề nào sau đây?", "options": {"A": "Tỷ lệ phụ nữ tham gia lực lượng lao động thấp, chênh lệch lương lớn theo giới, và ít phụ nữ giữ các vị trí lãnh đạo, quản lý trong doanh nghiệp.", "B": "Phụ nữ có trình độ học vấn cao hơn nam giới.", "C": "Tất cả các doanh nghiệp đều do phụ nữ làm chủ.", "D": "Tuổi thọ trung bình của phụ nữ rất cao."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Lĩnh vực này của GGGR đánh giá sự tham gia của phụ nữ vào thị trường lao động, khoảng cách về thu nhập, và sự hiện diện của họ ở các vị trí có quyền ra quyết định kinh tế. [812, 507, 508]"}, {"level": "1", "content": "Tình huống: Báo cáo Khoảng cách Giới Toàn cầu (GGGR) của Diễn đàn Kinh tế Thế giới xếp hạng các quốc gia dựa trên bốn lĩnh vực chính. Một quốc gia có thể đạt điểm cao về \"Sức khỏe và Sống còn\" và \"Trình độ học vấn\" cho phụ nữ, nhưng lại có điểm rất thấp về \"Cơ hội và Tham gia kinh tế\" và \"Trao quyền Chính trị\". Để cải thiện điểm số về \"Trao quyền Chính trị\", quốc gia này cần tập trung vào các biện pháp nào, bên cạnh việc khuyến khích phụ nữ đi bỏ phiếu?", "options": {"A": "Chỉ cần tăng số lượng các tổ chức phi chính phủ hoạt động vì phụ nữ.", "B": "Xây dựng và thực thi các chính sách nhằm tăng tỷ lệ phụ nữ trong quốc hội, các vị trí bộ trưởng và các cấp lãnh đạo chính quyền khác; đồng thời giải quyết các rào cản văn hóa và cấu trúc cản trở sự tham gia chính trị của phụ nữ.", "C": "Hạn chế quyền phát biểu của nam giới trong các diễn đàn chính trị.", "D": "Tổ chức thêm nhiều cuộc bầu cử hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trao quyền chính trị không chỉ là quyền bầu cử mà còn là sự hiện diện và tiếng nói thực chất của phụ nữ ở mọi cấp độ ra quyết định chính trị. Điều này đòi hỏi các biện pháp chủ động để tăng cường sự đại diện và giải quyết các rào cản. [509, 510, 812]"}, {"level": "1", "content": "Tình huống: Một dự án REDD+ (Giảm phát thải từ mất rừng và suy thoái rừng) được triển khai tại một khu vực có nhiều cộng đồng bản địa sinh sống. Dự án tập trung vào việc chi trả cho các dịch vụ môi trường rừng (PES) cho các hộ gia đình cam kết bảo vệ rừng. Tuy nhiên, các cuộc họp phổ biến về dự án và việc ký kết các hợp đồng PES chủ yếu được thực hiện với nam giới, người thường được coi là chủ hộ. Việc chỉ làm việc với nam giới trong dự án REDD+/PES này có thể dẫn đến nguy cơ gì đối với phụ nữ bản địa?", "options": {"A": "Phụ nữ sẽ được hưởng lợi nhiều hơn vì nam giới sẽ chia sẻ công bằng mọi khoản chi trả.", "B": "Kiến thức, vai trò và mối quan tâm của phụ nữ trong quản lý và sử dụng tài nguyên rừng có thể bị bỏ qua; họ có thể không được tiếp cận thông tin đầy đủ về dự án, không có tiếng nói trong việc đưa ra cam kết, và không được kiểm soát hoặc hưởng lợi công bằng từ các khoản chi trả PES.", "C": "Dự án sẽ hiệu quả hơn vì nam giới quản lý tài chính tốt hơn.", "D": "Không có nguy cơ gì vì bảo vệ rừng là lợi ích chung."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nếu phụ nữ bị loại trừ khỏi quá trình tham vấn, ra quyết định và hưởng lợi, dự án có thể không giải quyết được các nhu cầu và vai trò của họ, thậm chí có thể làm gia tăng bất bình đẳng và giảm tính bền vững của các nỗ lực bảo tồn. [2777, 2781, 2782, 2821, 2822]"}, {"level": "1", "content": "Tình huống: Một dự án REDD+ (Giảm phát thải từ mất rừng và suy thoái rừng) được triển khai tại một khu vực có nhiều cộng đồng bản địa sinh sống. Dự án tập trung vào việc chi trả cho các dịch vụ môi trường rừng (PES) cho các hộ gia đình cam kết bảo vệ rừng. Tuy nhiên, các cuộc họp phổ biến về dự án và việc ký kết các hợp đồng PES chủ yếu được thực hiện với nam giới, người thường được coi là chủ hộ. Theo Khung Quan hệ Xã hội (Social Relations Framework - SRF), một trong những khung phân tích giới, việc nam giới được coi là người đại diện gia đình và có quyền quyết định đối với các hợp đồng PES phản ánh điều gì?", "options": {"A": "Sự phân công lao động hiệu quả trong gia đình.", "B": "Các mối quan hệ quyền lực giới và các quy tắc xã hội (thể chế) đang chi phối việc ai có quyền đại diện và kiểm soát các nguồn lực và lợi ích trong cộng đồng và hộ gia đình.", "C": "Phụ nữ không quan tâm đến các vấn đề tài chính.", "D": "Đây là một quy trình hoàn toàn công bằng và minh bạch."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> SRF tập trung vào việc phân tích các mối quan hệ xã hội và các thể chế (bao gồm cả các quy tắc về giới, giai cấp, dân tộc) định hình sự phân bổ quyền lực và nguồn lực. Tình huống này cho thấy các quy tắc xã hội về vai trò chủ hộ của nam giới đang ảnh hưởng đến việc thực thi dự án. [847] (Hàm ý từ việc SRF tập trung vào quan hệ xã hội và thể chế)"}, {"level": "1", "content": "Tình huống: Một dự án REDD+ (Giảm phát thải từ mất rừng và suy thoái rừng) được triển khai tại một khu vực có nhiều cộng đồng bản địa sinh sống. Dự án tập trung vào việc chi trả cho các dịch vụ môi trường rừng (PES) cho các hộ gia đình cam kết bảo vệ rừng. Tuy nhiên, các cuộc họp phổ biến về dự án và việc ký kết các hợp đồng PES chủ yếu được thực hiện với nam giới, người thường được coi là chủ hộ. Để đảm bảo dự án REDD+/PES này mang lại lợi ích công bằng và có sự tham gia thực chất của phụ nữ, một yêu cầu quan trọng trong giai đoạn thiết kế và thực hiện là:", "options": {"A": "Chỉ làm việc với các tổ chức phụ nữ ở cấp tỉnh.", "B": "Áp dụng các phương pháp tiếp cận có sự tham gia, nhạy cảm giới và văn hóa để đảm bảo phụ nữ (đặc biệt là phụ nữ bản địa) được thông tin đầy đủ, có cơ hội bày tỏ ý kiến, tham gia vào việc xây dựng các quy chế bảo vệ rừng và cơ chế chia sẻ lợi ích, cũng như được hưởng lợi một cách công bằng và minh bạch.", "C": "Giao toàn bộ trách nhiệm quản lý các khoản PES cho nam giới.", "D": "Chỉ tập trung vào việc tăng số tiền chi trả cho mỗi ha rừng được bảo vệ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một cách tiếp cận toàn diện cần đảm bảo sự tham gia thực chất của phụ nữ ở mọi giai đoạn, từ thiết kế đến hưởng lợi, đồng thời tôn trọng các yếu tố văn hóa và giải quyết các rào cản cụ thể mà họ gặp phải. [2003, 2004, 2171]"}, {"level": "1", "content": "Tình huống: Một chính sách xã hội hóa ngành nước được ban hành, khuyến khích sự tham gia của cộng đồng và các thành phần tư nhân vào việc quản lý, bảo vệ và phát triển tài nguyên nước. Luật Tài nguyên nước 2023 có đề cập đến việc \"tạo điều kiện tiếp cận nước sinh hoạt cho người nghèo, phụ nữ, trẻ em, người khuyết tật và các đối tượng dễ bị tổn thương khác\". Việc Luật đề cập cụ thể đến \"phụ nữ\" và các nhóm dễ bị tổn thương khác cho thấy điều gì về quan điểm của nhà làm luật?", "options": {"A": "Cho thấy rằng các nhóm này không có khả năng tự tiếp cận nước.", "B": "Thừa nhận rằng các nhóm này có thể đối mặt với những rào cản hoặc điểm yếu đặc thù trong việc tiếp cận nước sinh hoạt, và cần có những chính sách, biện pháp chủ động để đảm bảo quyền của họ.", "C": "Ngụ ý rằng chỉ những nhóm này mới cần nước sinh hoạt.", "D": "Đây chỉ là một quy định mang tính hình thức, không có ý nghĩa thực tế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc nêu tên cụ thể các nhóm dễ bị tổn thương cho thấy sự nhìn nhận về những thách thức riêng mà họ có thể gặp phải và sự cần thiết phải có các biện pháp ưu tiên hoặc hỗ trợ đặc thù để đảm bảo họ được tiếp cận một nguồn tài nguyên thiết yếu. [95, 96, 1922]"}, {"level": "1", "content": "Tình huống: Một chính sách xã hội hóa ngành nước được ban hành, khuyến khích sự tham gia của cộng đồng và các thành phần tư nhân vào việc quản lý, bảo vệ và phát triển tài nguyên nước. Luật Tài nguyên nước 2023 có đề cập đến việc \"tạo điều kiện tiếp cận nước sinh hoạt cho người nghèo, phụ nữ, trẻ em, người khuyết tật và các đối tượng dễ bị tổn thương khác\". Mặc dù có quy định trên, việc xã hội hóa ngành nước (khuyến khích sự tham gia của tư nhân) có thể tiềm ẩn nguy cơ gì đối với khả năng tiếp cận nước của người nghèo và phụ nữ nếu không có cơ chế quản lý và giám sát chặt chẽ?", "options": {"A": "Chất lượng nước sẽ luôn được cải thiện đáng kể.", "B": "Các đơn vị tư nhân, nếu chỉ tập trung vào lợi nhuận, có thể ưu tiên cung cấp dịch vụ cho các khu vực có khả năng chi trả cao hơn, hoặc áp đặt mức giá mà người nghèo và các hộ do phụ nữ làm chủ (thường có thu nhập thấp hơn) không thể đáp ứng, dẫn đến việc họ bị hạn chế tiếp cận.", "C": "Tất cả mọi người sẽ được sử dụng nước miễn phí.", "D": "Sự tham gia của tư nhân sẽ tự động giải quyết mọi vấn đề về thiếu nước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Xã hội hóa có thể mang lại hiệu quả, nhưng nếu không có sự điều tiết và giám sát của nhà nước để đảm bảo tính công bằng và khả năng chi trả cho các nhóm yếu thế, nó có thể dẫn đến việc một bộ phận dân cư bị loại trừ khỏi các dịch vụ thiết yếu. [32, 1908, 1910] (Hàm ý từ mục tiêu GRB là phân bổ công bằng)"}, {"level": "1", "content": "Tình huống: Một chính sách xã hội hóa ngành nước được ban hành, khuyến khích sự tham gia của cộng đồng và các thành phần tư nhân vào việc quản lý, bảo vệ và phát triển tài nguyên nước. Luật Tài nguyên nước 2023 có đề cập đến việc \"tạo điều kiện tiếp cận nước sinh hoạt cho người nghèo, phụ nữ, trẻ em, người khuyết tật và các đối tượng dễ bị tổn thương khác\". Để đảm bảo rằng chính sách xã hội hóa ngành nước thực sự \"tạo điều kiện tiếp cận nước sinh hoạt cho phụ nữ\", các cơ quan quản lý nhà nước cần làm gì bên cạnh việc ban hành luật?", "options": {"A": "Giao toàn bộ việc quản lý ngành nước cho các tổ chức phụ nữ.", "B": "Xây dựng các quy định cụ thể về tiêu chuẩn dịch vụ, cơ chế giá nước phù hợp với khả năng chi trả của các nhóm khác nhau, cơ chế giám sát sự tham gia của phụ nữ trong các ban quản lý nước ở cộng đồng, và các chương trình hỗ trợ trực tiếp cho các hộ nghèo, hộ do phụ nữ làm chủ.", "C": "Yêu cầu tất cả các công ty cấp nước phải có ít nhất 50% nhân viên là nữ.", "D": "Chỉ tập trung vào việc kêu gọi các nhà tài trợ quốc tế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Luật pháp chỉ là khung khổ. Việc thực thi hiệu quả đòi hỏi phải có các quy định chi tiết, cơ chế giám sát, và các chương trình hỗ trợ cụ thể để đảm bảo các mục tiêu về bình đẳng giới và tiếp cận công bằng được thực hiện trên thực tế. [126, 127, 128, 1940, 1942, 1943]"}, {"level": "1", "content": "Tình huống: Một chương trình hỗ trợ phát triển kinh tế cho các hợp tác xã (HTX) nông nghiệp. Phân tích ban đầu cho thấy phụ nữ chiếm tỷ lệ lớn thành viên trong các HTX (khoảng 80%) nhưng chỉ có một số ít phụ nữ giữ các vị trí chủ chốt trong ban quản trị HTX. Các quyết định quan trọng về định hướng sản xuất, liên kết thị trường, và phân chia lợi nhuận thường do các thành viên nam trong ban quản trị đưa ra. Tình trạng này phản ánh một thách thức phổ biến nào trong việc trao quyền cho phụ nữ trong các tổ chức kinh tế tập thể?", "options": {"A": "Phụ nữ không có khả năng làm việc trong HTX.", "B": "Mặc dù có sự tham gia đông đảo về số lượng thành viên, phụ nữ vẫn gặp rào cản trong việc tiếp cận các vị trí lãnh đạo, quản lý và có tiếng nói thực sự trong việc ra quyết định chiến lược của tổ chức.", "C": "Nam giới không muốn thành lập HTX.", "D": "Các HTX nông nghiệp không mang lại lợi ích kinh tế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự tham gia về số lượng không đồng nghĩa với sự tham gia có ý nghĩa và quyền lực trong ra quyết định. Phụ nữ có thể là thành viên đa số nhưng vẫn bị hạn chế ở các vai trò lãnh đạo và chiến lược. [2239, 2244, 2245, 2247]"}, {"level": "1", "content": "Tình huống: Một chương trình hỗ trợ phát triển kinh tế cho các hợp tác xã (HTX) nông nghiệp. Phân tích ban đầu cho thấy phụ nữ chiếm tỷ lệ lớn thành viên trong các HTX (khoảng 80%) nhưng chỉ có một số ít phụ nữ giữ các vị trí chủ chốt trong ban quản trị HTX. Các quyết định quan trọng về định hướng sản xuất, liên kết thị trường, và phân chia lợi nhuận thường do các thành viên nam trong ban quản trị đưa ra. Nếu áp dụng Khung Longwe để đánh giá mức độ trao quyền cho phụ nữ trong các HTX này, việc họ chiếm số đông thành viên nhưng ít giữ vị trí lãnh đạo cho thấy họ có thể đã đạt được mức độ \"Tiếp cận\" (tham gia HTX) và có thể cả \"Phúc lợi\" (hưởng một phần lợi ích), nhưng còn hạn chế ở các mức độ nào?", "options": {"A": "Chỉ hạn chế ở mức độ Nhận thức hóa.", "B": "Chủ yếu hạn chế ở các mức độ \"Tham gia\" (vào quá trình ra quyết định thực chất) và \"Kiểm soát\" (đối với các quyết định chiến lược và phân bổ nguồn lực của HTX).", "C": "Không hạn chế ở mức độ nào cả.", "D": "Chỉ hạn chế ở việc tiếp cận thông tin."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc có mặt trong HTX và nhận được một số lợi ích là các mức độ ban đầu. Tuy nhiên, nếu họ không có vai trò quan trọng trong việc ra quyết định và kiểm soát các hoạt động của HTX, họ chưa đạt được các mức độ trao quyền cao hơn là \"Tham gia\" và \"Kiểm soát\". [970, 1032, 1044, 1048]"}, {"level": "1", "content": "Tình huống: Một chương trình hỗ trợ phát triển kinh tế cho các hợp tác xã (HTX) nông nghiệp. Phân tích ban đầu cho thấy phụ nữ chiếm tỷ lệ lớn thành viên trong các HTX (khoảng 80%) nhưng chỉ có một số ít phụ nữ giữ các vị trí chủ chốt trong ban quản trị HTX. Các quyết định quan trọng về định hướng sản xuất, liên kết thị trường, và phân chia lợi nhuận thường do các thành viên nam trong ban quản trị đưa ra. Một can thiệp nhằm tăng cường trao quyền thực chất cho phụ nữ trong các HTX này KHÔNG nên chỉ dừng lại ở việc:", "options": {"A": "Việc chỉ tập huấn kỹ năng sản xuất (thường là nhu cầu thực tế) mà không giải quyết các rào cản về lãnh đạo và ra quyết định (nhu cầu chiến lược) sẽ không đủ để trao quyền thực chất.", "B": "Xây dựng các chương trình đào tạo kỹ năng lãnh đạo, quản lý HTX, và kỹ năng đàm phán có mục tiêu cho phụ nữ; đồng thời vận động thay đổi quy chế HTX để đảm bảo tỷ lệ nữ trong ban quản trị và các cơ chế ra quyết định có sự tham gia của phụ nữ.", "C": "Thành lập các HTX chỉ dành riêng cho nữ giới.", "D": "Tăng số lượng thành viên nữ lên 90% cũng không tự động giải quyết vấn đề quyền lực và ra quyết định nếu cấu trúc và cơ chế vẫn không thay đổi. Lựa chọn B là một can thiệp toàn diện hơn. Lựa chọn C có thể là một giải pháp trong một số trường hợp nhưng không phải là giải pháp duy nhất hoặc luôn tối ưu cho việc trao quyền trong các HTX hỗn hợp. Do đó, A phản ánh rõ nhất việc \"không nên chỉ dừng lại\" ở một biện pháp cơ bản. [1245, 1248, 2003, 2004, 2288, 2290]"}, "answer": "A", "explanation": ""}, {"level": "1", "content": "Tình huống: Trong quá trình xây dựng Kế hoạch hành động giới (GAP) cho một dự án giảm nghèo đa chiều, nhóm chuyên gia đề xuất một loạt các hoạt động. Một số hoạt động nhằm cung cấp hỗ trợ lương thực trực tiếp và cải thiện điều kiện vệ sinh cho các hộ gia đình nghèo nhất. Một số hoạt động khác tập trung vào việc tổ chức các lớp đào tạo nghề cho phụ nữ thất nghiệp và hỗ trợ họ tiếp cận các nguồn vốn vay nhỏ để khởi sự kinh doanh, đồng thời tổ chức các buổi đối thoại cộng đồng về chia sẻ công việc gia đình. Các hoạt động cung cấp hỗ trợ lương thực và cải thiện vệ sinh chủ yếu đáp ứng loại nhu cầu giới nào?", "options": {"A": "Chủ yếu đáp ứng nhu cầu giới chiến lược (SGN) vì nó làm thay đổi vị thế của người nghèo.", "B": "Chủ yếu đáp ứng nhu cầu giới thực tế (PGN) vì nó giải quyết các vấn đề thiếu thốn cơ bản, trước mắt để duy trì cuộc sống.", "C": "Không phải là nhu cầu giới.", "D": "Chỉ đáp ứng nhu cầu của nam giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Những hoạt động này trực tiếp cải thiện điều kiện sống vật chất hàng ngày, giúp người dân (cả nam và nữ) thực hiện tốt hơn các vai trò hiện tại của mình, đây là đặc điểm của PGN. [1242, 1244, 1248]"}, {"level": "1", "content": "Tình huống: Trong quá trình xây dựng Kế hoạch hành động giới (GAP) cho một dự án giảm nghèo đa chiều, nhóm chuyên gia đề xuất một loạt các hoạt động. Một số hoạt động nhằm cung cấp hỗ trợ lương thực trực tiếp và cải thiện điều kiện vệ sinh cho các hộ gia đình nghèo nhất. Một số hoạt động khác tập trung vào việc tổ chức các lớp đào tạo nghề cho phụ nữ thất nghiệp và hỗ trợ họ tiếp cận các nguồn vốn vay nhỏ để khởi sự kinh doanh, đồng thời tổ chức các buổi đối thoại cộng đồng về chia sẻ công việc gia đình. Các hoạt động đào tạo nghề cho phụ nữ, hỗ trợ vốn vay và tổ chức đối thoại về chia sẻ việc nhà có tiềm năng đáp ứng (hoặc góp phần đáp ứng) loại nhu cầu giới nào?", "options": {"A": "Chỉ đáp ứng nhu cầu giới thực tế.", "B": "Có tiềm năng đáp ứng cả nhu cầu giới thực tế (tăng thu nhập, giảm gánh nặng) và nhu cầu giới chiến lược (tăng cường độc lập kinh tế, thách thức phân công lao động truyền thống, thay đổi vị thế).", "C": "Chỉ đáp ứng nhu cầu của các tổ chức phi chính phủ.", "D": "Chỉ mang tính hình thức, không có tác động thực tế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đào tạo nghề và vốn vay giúp cải thiện thu nhập (PGN và có thể là bước đầu của SGN về độc lập kinh tế). Đối thoại về chia sẻ việc nhà trực tiếp thách thức phân công lao động theo giới truyền thống, hướng tới SGN. [1245, 1248, 1249, 1250, 1253]"}, {"level": "1", "content": "Tình huống: Trong quá trình xây dựng Kế hoạch hành động giới (GAP) cho một dự án giảm nghèo đa chiều, nhóm chuyên gia đề xuất một loạt các hoạt động. Một số hoạt động nhằm cung cấp hỗ trợ lương thực trực tiếp và cải thiện điều kiện vệ sinh cho các hộ gia đình nghèo nhất. Một số hoạt động khác tập trung vào việc tổ chức các lớp đào tạo nghề cho phụ nữ thất nghiệp và hỗ trợ họ tiếp cận các nguồn vốn vay nhỏ để khởi sự kinh doanh, đồng thời tổ chức các buổi đối thoại cộng đồng về chia sẻ công việc gia đình. Tại sao việc kết hợp cả hai loại hoạt động (đáp ứng PGN và SGN) trong một Kế hoạch hành động giới lại thường được coi là một chiến lược hiệu quả và bền vững?", "options": {"A": "Vì làm như vậy sẽ tốn nhiều ngân sách hơn.", "B": "Vì việc đáp ứng các nhu cầu thực tế trước mắt có thể tạo điều kiện thuận lợi (về thời gian, sức khỏe, tinh thần) để phụ nữ có thể tham gia và hưởng lợi từ các can thiệp mang tính chiến lược hơn, hướng tới sự thay đổi lâu dài và trao quyền thực chất.", "C": "Vì chỉ cần đáp ứng một trong hai loại nhu cầu là đủ.", "D": "Vì các nhà tài trợ luôn yêu cầu phải có cả hai."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một chiến lược toàn diện thường kết hợp việc giải quyết các nhu cầu cấp bách hàng ngày (PGN) với các can thiệp nhằm thay đổi các cấu trúc bất bình đẳng và nâng cao vị thế (SGN). Việc đáp ứng PGN có thể là tiền đề để phụ nữ có thể tham gia vào các hoạt động hướng tới SGN. [1252, 1253, 1254]"}, {"level": "1", "content": "Tình huống 31 (Câu 341-343): Một địa phương triển khai chương trình \"Làng nông thôn mới kiểu mẫu\" với mục tiêu hiện đại hóa cơ sở hạ tầng và nâng cao thu nhập cho người dân. Tuy nhiên, quá trình quy hoạch chủ yếu do các cán bộ nam giới cấp xã và huyện thực hiện, ít tham khảo ý kiến của Hội Phụ nữ và các nhóm phụ nữ trong cộng đồng. Kết quả là nhiều hạng mục công trình (ví dụ, nhà văn hóa, khu vui chơi trẻ em) được xây dựng không phù hợp với nhuah cầu sử dụng thực tế của phụ nữ và trẻ em, hoặc các mô hình kinh tế được ưu tiên lại không tính đến các ngành nghề mà phụ nữ có thế mạnh. Việc thiếu sự tham gia của Hội Phụ nữ và các nhóm phụ nữ trong quá trình quy hoạch chương trình \"Làng nông thôn mới kiểu mẫu\" có thể dẫn đến hệ quả trực tiếp nào sau đây, xét từ góc độ hiệu quả của chương trình?", "options": {"A": "Chương trình sẽ được triển khai nhanh hơn và tiết kiệm chi phí hơn.", "B": "Các công trình và mô hình kinh tế được xây dựng có thể không đáp ứng đúng nhu vực, không phát huy được vai trò của phụ nữ, dẫn đến lãng phí nguồn lực và hiệu quả chương trình thấp. [3, 76]", "C": "Chương trình sẽ nhận được sự ủng hộ tuyệt đối từ tất cả người dân.", "D": "Chất lượng các công trình xây dựng sẽ luôn được đảm bảo ở mức cao nhất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khi các đối tượng hưởng lợi chính, đặc biệt là phụ nữ (những người có nhu cầu và vai trò sử dụng không gian công cộng, dịch vụ và tham gia kinh tế khác biệt), không được tham gia vào quy hoạch, các can thiệp có nguy cơ cao là không phù hợp, không hiệu quả và không bền vững. [3, 76]"}, {"level": "1", "content": "Tình huống 31 (Câu 341-343): Một địa phương triển khai chương trình \"Làng nông thôn mới kiểu mẫu\" với mục tiêu hiện đại hóa cơ sở hạ tầng và nâng cao thu nhập cho người dân. Tuy nhiên, quá trình quy hoạch chủ yếu do các cán bộ nam giới cấp xã và huyện thực hiện, ít tham khảo ý kiến của Hội Phụ nữ và các nhóm phụ nữ trong cộng đồng. Kết quả là nhiều hạng mục công trình (ví dụ, nhà văn hóa, khu vui chơi trẻ em) được xây dựng không phù hợp với nhuah cầu sử dụng thực tế của phụ nữ và trẻ em, hoặc các mô hình kinh tế được ưu tiên lại không tính đến các ngành nghề mà phụ nữ có thế mạnh. Nếu áp dụng nguyên tắc \"Lồng ghép giới (Gender Mainstreaming) vào tất cả các giai đoạn của chu trình chính sách, chương trình, dự án\" [34, 35], thì trong tình huống này, Hội Phụ nữ và các đại diện nữ của cộng đồng cần được tham gia vào giai đoạn nào là quan trọng nhất để tránh các bất cập đã xảy ra?", "options": {"A": "Chỉ cần tham gia vào giai đoạn khánh thành và báo cáo kết quả.", "B": "Quan trọng nhất là giai đoạn xác định nhu cầu, lập kế hoạch, thiết kế chương trình và các hạng mục cụ thể. [34, 35, 2126, 2166]", "C": "Chỉ cần tham gia vào giai đoạn giám sát thi công.", "D": "Chỉ khi chương trình đã đi vào hoạt động và phát sinh vấn đề."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lồng ghép giới hiệu quả nhất khi được thực hiện ngay từ các giai đoạn đầu của chu trình chính sách/dự án (xác định vấn đề, thiết kế, lập kế hoạch) để đảm bảo các nhu cầu và quan điểm giới được tích hợp, thay vì chỉ sửa chữa khi vấn đề đã nảy sinh. [34, 35, 2126, 2166]"}, {"level": "1", "content": "Tình huống 31 (Câu 341-343): Một địa phương triển khai chương trình \"Làng nông thôn mới kiểu mẫu\" với mục tiêu hiện đại hóa cơ sở hạ tầng và nâng cao thu nhập cho người dân. Tuy nhiên, quá trình quy hoạch chủ yếu do các cán bộ nam giới cấp xã và huyện thực hiện, ít tham khảo ý kiến của Hội Phụ nữ và các nhóm phụ nữ trong cộng đồng. Kết quả là nhiều hạng mục công trình (ví dụ, nhà văn hóa, khu vui chơi trẻ em) được xây dựng không phù hợp với nhuah cầu sử dụng thực tế của phụ nữ và trẻ em, hoặc các mô hình kinh tế được ưu tiên lại không tính đến các ngành nghề mà phụ nữ có thế mạnh. Việc các cán bộ nam giới chủ yếu thực hiện quy hoạch có thể phản ánh một \"thách thức về giới nổi bật trong lĩnh vực tài nguyên môi trường tại Việt Nam\" nào đã được đề cập (Chương 8)?", "options": {"A": "Cam kết chính trị mạnh mẽ và khung pháp lý ngày càng hoàn thiện.", "B": "Hạn chế trong tham gia vào quá trình ra quyết định của phụ nữ. [207]", "C": "Kiến thức, kinh nghiệm và vai trò tiềm ẩn của phụ nữ đã được phát huy tối đa.", "D": "Thiếu hụt các dự án phát triển nông thôn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Tình huống này minh họa cho thách thức về sự tham gia hạn chế của phụ nữ trong các quy trình ra quyết định quan trọng, ngay cả khi họ là đối tượng hưởng lợi chính hoặc có vai trò quan trọng trong việc thực hiện. [207]"}, {"level": "1", "content": "Tình huống: Một công ty khai khoáng lớn hoạt động tại một địa phương có đông đồng bào dân tộc thiểu số. Công ty cam kết thực hiện các \"thực hành kinh doanh có trách nhiệm giới\" và báo cáo ESG hàng năm. Tuy nhiên, phân tích thực tế cho thấy, mặc dù công ty có tuyển dụng một số lao động nữ địa phương vào các công việc phổ thông, nhưng các tác động tiêu cực từ hoạt động khai khoáng (ô nhiễm nguồn nước, bụi, mất đất canh tác) lại ảnh hưởng nặng nề đến sức khỏe và sinh kế của phụ nữ và trẻ em trong cộng đồng, và họ ít được tham gia vào các cơ chế giám sát hay chia sẻ lợi ích. Sự mâu thuẫn giữa cam kết \"trách nhiệm giới\" và thực tế tác động tiêu cực cho thấy điều gì về việc thực hiện ESG của công ty?", "options": {"A": "Báo cáo ESG của công ty hoàn toàn chính xác và đáng tin c

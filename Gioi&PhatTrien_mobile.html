}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Minh bạch và trách nhiệm giải trình tạo điều kiện cho sự giám sát của công chúng, đảm bảo các cam kết về bình đẳng giới được thực hiện và nguồn lực được sử dụng hiệu quả, công bằng. [1912, 1916]"}, {"level": "1", "content": "Một chính sách khuyến khích sử dụng công nghệ cao trong nông nghiệp có thể vô tình làm gia tăng bất bình đẳng giới nếu:", "options": {"A": "Công nghệ đó giúp tăng năng suất cho tất cả mọi người.", "B": "Phụ nữ không được tiếp cận đào tạo về công nghệ, không có vốn để đầu tư, hoặc công nghệ không phù hợp với các công việc họ thường làm.", "C": "Chính sách này chỉ áp dụng cho các vùng khó khăn.", "D": "Nam giới không thích sử dụng công nghệ mới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nếu không có các biện pháp hỗ trợ nhắm mục tiêu, việc giới thiệu công nghệ mới có thể làm gia tăng khoảng cách giới do phụ nữ thường gặp nhiều rào cản hơn trong việc tiếp cận kiến thức, kỹ năng và vốn cần thiết để áp dụng công nghệ. [2348, 2349, 2378]"}, {"level": "1", "content": "Việc sử dụng nhiều đường nghèo khác nhau (ví dụ: $2.15, $3.$6.85 theo PPP) của Ngân hàng Thế giới nhằm mục đích gì?", "options": {"A": "Gây nhầm lẫn cho các nhà hoạch định chính sách.", "B": "Phản ánh các mức độ thiếu thốn và tiêu chuẩn sống khác nhau ở các quốc gia có mức thu nhập khác nhau, giúp việc so sánh và theo dõi nghèo đói toàn cầu trở nên phù hợp hơn.", "C": "Chứng minh rằng nghèo đói là một khái niệm không thể đo lường được.", "D": "Để các quốc gia tự chọn một đường nghèo phù hợp nhất với mình."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các đường nghèo khác nhau giúp nắm bắt các khía cạnh khác nhau của đói nghèo và dễ bị tổn thương ở các bối cảnh kinh tế khác nhau, từ nghèo cùng cực đến nghèo ở các nước thu nhập trung bình. [2608]"}, {"level": "1", "content": "Tại sao Chỉ số Nghèo Đa chiều (MPI) được coi là một thước đo nghèo đói toàn diện hơn so với chỉ dựa vào thu nhập?", "options": {"A": "Vì MPI dễ tính toán hơn và cần ít dữ liệu hơn.", "B": "Vì MPI đo lường các thiếu hụt đồng thời trên nhiều phương diện của cuộc sống (y tế, giáo dục, mức sống), không chỉ giới hạn ở thu nhập.", "C": "Vì MPI chỉ tập trung vào các nước nghèo nhất thế giới.", "D": "Vì MPI loại bỏ hoàn toàn yếu tố thu nhập ra khỏi phân tích."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> MPI cung cấp một bức tranh đầy đủ hơn về nghèo đói bằng cách xem xét sự thiếu thốn trên nhiều khía cạnh thiết yếu của cuộc sống, thừa nhận rằng nghèo không chỉ là vấn đề tiền bạc. [2620, 2621]"}, {"level": "1", "content": "Mối quan hệ giữa bất bình đẳng cơ hội (về giáo dục, y tế) và bất bình đẳng kết quả (về thu nhập, tài sản) là gì?", "options": {"A": "Hai loại bất bình đẳng này hoàn toàn độc lập với nhau.", "B": "Bất bình đẳng kết quả là nguyên nhân chính gây ra bất bình đẳng cơ hội.", "C": "Bất bình đẳng cơ hội (đặc biệt từ thời thơ ấu) thường dẫn đến và củng cố bất bình đẳng kết quả qua các thế hệ.", "D": "Chỉ cần giải quyết bất bình đẳng kết quả thì bất bình đẳng cơ hội sẽ tự động biến mất."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Việc không được tiếp cận bình đẳng với các cơ hội nền tảng như giáo dục và y tế chất lượng sẽ hạn chế tiềm năng phát triển của cá nhân, dẫn đến những kết quả bất lợi về thu nhập và tài sản trong tương lai, tạo ra vòng luẩn quẩn đói nghèo liên thế hệ. [2684, 2685, 2686]"}, {"level": "1", "content": "Tại sao các lý thuyết như của Piketty (r > g) lại thách thức tính phổ quát của đường cong Kuznets?", "options": {"A": "Vì chúng cho thấy bất bình đẳng luôn giảm theo thời gian.", "B": "Vì chúng chỉ ra rằng các yếu tố cấu trúc (như mối quan hệ giữa lợi nhuận tư bản và tăng trưởng kinh tế) có thể dẫn đến sự gia tăng bất bình đẳng kéo dài, bất kể giai đoạn phát triển.", "C": "Vì chúng phủ nhận hoàn toàn vai trò của tăng trưởng kinh tế.", "D": "Vì chúng chỉ áp dụng cho các nền kinh tế kế hoạch hóa tập trung."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các lý thuyết như của Piketty cho rằng có những động lực nội tại trong chủ nghĩa tư bản có thể dẫn đến sự tập trung của cải và gia tăng bất bình đẳng, điều này mâu thuẫn với dự đoán về sự suy giảm bất bình đẳng ở giai đoạn sau của đường cong Kuznets. [2696, 2697, 2704]"}, {"level": "1", "content": "Tình trạng \"giới hóa đói nghèo\" trở nên đặc biệt rõ nét khi phân tích dữ liệu nghèo ở cấp độ nào, thay vì chỉ dựa vào cấp độ hộ gia đình?", "options": {"A": "Cấp độ quốc gia.", "B": "Cấp độ cá nhân (đặc biệt là nghèo đa chiều) và các hộ gia đình do phụ nữ làm chủ (đặc biệt là góa phụ).", "C": "Cấp độ vùng, miền.", "D": "Chỉ khi so sánh giữa các quốc gia."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đo lường đói nghèo ở cấp hộ gia đình có thể che giấu bất bình đẳng nội bộ. Phân tích ở cấp độ cá nhân hoặc xem xét các nhóm hộ đặc thù (như hộ do phụ nữ làm chủ, hộ góa phụ) thường làm lộ rõ hơn những脆弱性 mang tính giới. [2738, 2741, 2742]"}, {"level": "1", "content": "Trong bối cảnh tài nguyên môi trường, việc phụ nữ ít có quyền kiểm soát đất đai ảnh hưởng đến nguy cơ đói nghèo của họ như thế nào?", "options": {"A": "Không ảnh hưởng vì họ có thể dễ dàng tìm các công việc phi nông nghiệp.", "B": "Làm giảm khả năng đầu tư vào sản xuất nông nghiệp bền vững, hạn chế tiếp cận tín dụng (do thiếu tài sản thế chấp), và giảm khả năng chống chịu với các cú sốc môi trường.", "C": "Giúp họ có nhiều thời gian hơn để chăm sóc gia đình.", "D": "Chỉ ảnh hưởng đến nam giới vì họ là người quyết định chính."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đất đai là tư liệu sản xuất và tài sản thế chấp quan trọng. Việc thiếu quyền kiểm soát đất đai hạn chế nghiêm trọng khả năng kinh tế và khả năng ứng phó của phụ nữ, đặc biệt trong các cộng đồng nông nghiệp. [2757, 2768, 2771]"}, {"level": "1", "content": "Sự \"phân đoạn theo giới\" trong chuỗi giá trị nông sản (phụ nữ tập trung ở khâu ít giá trị gia tăng) chủ yếu là do:", "options": {"A": "Phụ nữ có kỹ năng làm các công việc đó tốt hơn nam giới.", "B": "Đây là sự lựa chọn tự nguyện của phụ nữ.", "C": "Hạn chế trong tiếp cận vốn, công nghệ, thông tin thị trường và kỹ năng quản lý của phụ nữ.", "D": "Nam giới không muốn tham gia vào các khâu sản xuất đầu vào."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Sự phân đoạn này thường phản ánh những bất bình đẳng về cơ hội và nguồn lực, khiến phụ nữ bị giới hạn trong các công đoạn có giá trị gia tăng thấp hơn. [2279, 2281, 2282]"}, {"level": "1", "content": "Tại sao việc bảo tồn và phát huy tri thức bản địa của phụ nữ về quản lý tài nguyên lại quan trọng đối với phát triển bền vững?", "options": {"A": "Vì tri thức bản địa luôn vượt trội hơn khoa học hiện đại.", "B": "Vì phụ nữ thường nắm giữ những kiến thức chuyên biệt, phù hợp với điều kiện địa phương, có thể đóng góp vào các giải pháp bảo tồn và sử dụng tài nguyên hiệu quả.", "C": "Vì chỉ có phụ nữ mới có tri thức bản địa.", "D": "Vì nó giúp thu hút khách du lịch."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ, thông qua vai trò của mình, thường tích lũy được nhiều kiến thức bản địa quý giá về tài nguyên. Việc công nhận và tích hợp những kiến thức này vào các kế hoạch phát triển sẽ làm tăng tính hiệu quả và bền vững. [2292, 2301, 2302]"}, {"level": "1", "content": "Chính sách \"dồn điền đổi thửa\" nhằm khắc phục tình trạng đất đai manh mún có thể gây tác động tiêu cực đến phụ nữ nông dân nếu:", "options": {"A": "Họ được nhận những thửa đất lớn hơn và màu mỡ hơn.", "B": "Quá trình này không đi kèm với việc đảm bảo quyền sử dụng đất công bằng cho họ và các biện pháp hỗ trợ chuyển đổi sinh kế phù hợp khi họ mất đất sản xuất.", "C": "Họ được tham gia đầy đủ vào quá trình quy hoạch và thực hiện.", "D": "Chính sách này giúp tăng năng suất nông nghiệp nói chung."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nếu không có các biện pháp bảo vệ và hỗ trợ nhạy cảm giới, quá trình dồn điền đổi thửa có thể khiến phụ nữ (những người thường có quyền sử dụng đất yếu hơn) bị mất đất hoặc gặp khó khăn trong việc tìm kiếm sinh kế mới. [2317, 2319, 2321]"}, {"level": "1", "content": "Việc phụ nữ nông thôn phải dựa vào các kênh tín dụng phi chính thức do khó tiếp cận tín dụng chính thức cho thấy điều gì về hệ thống tài chính?", "options": {"A": "Hệ thống tín dụng phi chính thức hoạt động hiệu quả và an toàn hơn.", "B": "Các kênh tài chính chính thức hiện tại có thể chưa đủ linh hoạt, chưa có sản phẩm phù hợp hoặc còn những rào cản (thủ tục, tài sản thế chấp) đối với phụ nữ.", "C": "Phụ nữ không tin tưởng vào các ngân hàng.", "D": "Nhu cầu vay vốn của phụ nữ nông thôn không lớn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự tồn tại và phổ biến của tín dụng phi chính thức thường phản ánh những hạn chế của hệ thống tài chính chính thức trong việc đáp ứng nhu cầu của một bộ phận dân cư, đặc biệt là các nhóm yếu thế như phụ nữ nông thôn. [2322, 2323, 2515, 2516]"}, {"level": "1", "content": "Tại sao việc GRB không chỉ là \"ngân sách riêng cho phụ nữ\" mà là một sự thay đổi mang tính hệ thống lại quan trọng để tránh hiểu lầm?", "options": {"A": "Vì nếu là ngân sách riêng thì sẽ không đủ nguồn lực.", "B": "Vì nó nhấn mạnh rằng GRB hướng đến việc thay đổi toàn bộ quy trình và cơ cấu ngân sách để tất cả các khoản chi đều nhạy cảm giới, chứ không chỉ giới hạn ở các dự án nhỏ lẻ.", "C": "Vì các vấn đề của nam giới không cần được quan tâm trong ngân sách.", "D": "Vì \"ngân sách riêng cho phụ nữ\" nghe có vẻ phân biệt đối xử."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Hiểu đúng bản chất của GRB là lồng ghép giới vào toàn bộ hệ thống ngân sách giúp tránh sự phản kháng và đảm bảo cách tiếp cận mang tính chiến lược, bền vững hơn là chỉ tạo ra các quỹ nhỏ \"cho phụ nữ\". [1896, 1897, 1898, 1899]"}, {"level": "1", "content": "Công cụ \"Phân tích chi tiêu công và phân bổ lợi ích theo giới\" của GRB giúp trả lời câu hỏi nào một cách định lượng?", "options": {"A": "Mức độ hài lòng của người dân đối với các dịch vụ công là bao nhiêu?", "B": "Các lợi ích từ các khoản chi tiêu công cụ thể (ví dụ: giáo dục, y tế) được phân phối như thế nào giữa nam và nữ, trẻ em trai và trẻ em gái?", "C": "Các chính sách thuế có công bằng hay không?", "D": "Người dân sử dụng thời gian của họ như thế nào?"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Công cụ này so sánh chi tiêu của chính phủ với dữ liệu điều tra hộ gia đình để xem ai (theo giới, độ tuổi, v.v.) thực sự hưởng lợi từ các dịch vụ công. [1954, 1955]"}, {"level": "1", "content": "Một chính sách thuế có vẻ \"trung tính về giới\" (ví dụ: áp thuế VAT đồng nhất cho mọi hàng hóa) vẫn có thể tạo ra \"thành kiến giới ngầm ẩn\" vì:", "options": {"A": "Phụ nữ luôn phải trả nhiều thuế hơn nam giới.", "B": "Nó có thể tương tác với các khác biệt sẵn có về mô hình tiêu dùng hoặc thu nhập giữa nam và nữ, dẫn đến gánh nặng thuế không tương xứng.", "C": "Chính sách thuế này chỉ áp dụng cho các sản phẩm do nam giới sản xuất.", "D": "Thuế VAT không phải là một loại thuế quan trọng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Ngay cả khi thuế suất là như nhau, nếu nam và nữ có mô hình chi tiêu khác nhau cho các mặt hàng chịu thuế (ví dụ, các sản phẩm thiết yếu cho phụ nữ và trẻ em), hoặc nếu gánh nặng thuế chiếm tỷ lệ lớn hơn trong thu nhập thấp hơn của phụ nữ, thì chính sách đó vẫn có thể có tác động giới tiêu cực. [191962]"}, {"level": "1", "content": "Tại sao việc chỉ tham vấn các tổ chức địa phương (ví dụ: trưởng thôn, chủ tịch hội) có thể chưa đủ để đảm bảo \"Đánh giá người hưởng lợi có nhạy cảm giới\"?", "options": {"A": "Vì các tổ chức này thường không hiểu về dự án.", "B": "Vì tiếng nói của các nhóm phụ nữ cụ thể, đặc biệt là những người yếu thế, có thể không được các tổ chức này đại diện đầy đủ nếu không có các nỗ lực tham vấn trực tiếp và có chủ đích.", "C": "Vì chỉ nên tham vấn các chuyên gia quốc tế.", "D": "Vì việc tham vấn quá nhiều người sẽ tốn kém."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Để có được bức tranh đầy đủ và đảm bảo tính bao trùm, việc tham vấn cần phải tiếp cận trực tiếp các nhóm hưởng lợi đa dạng, đặc biệt là phụ nữ và các nhóm yếu thế, chứ không chỉ dựa vào đại diện của các tổ chức mà họ có thể không có tiếng nói mạnh mẽ. [191967, 1968]"}, {"level": "1", "content": "Trong bối cảnh quản lý tài nguyên rừng, việc áp dụng GRB có thể đặt câu hỏi nào sau đây?", "options": {"A": "Làm thế nào để tăng sản lượng gỗ khai thác hàng năm?", "B": "Các chương trình giao rừng, chia sẻ lợi ích có đảm bảo quyền tiếp cận và hưởng lợi công bằng cho phụ nữ dân tộc thiểu số sống phụ thuộc vào rừng không?", "C": "Nên sử dụng loại thuốc trừ sâu nào để bảo vệ cây rừng?", "D": "Làm thế nào để thu hút thêm vốn đầu tư nước ngoài vào ngành lâm nghiệp?"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Câu hỏi này trực tiếp xem xét tác động giới của chính sách quản lý rừng, đặc biệt là đối với các nhóm phụ nữ dễ bị tổn thương và có sự phụ thuộc cao vào tài nguyên rừng. [2026, 2027]"}, {"level": "1", "content": "Đánh giá giới (Gender Assessment) được coi là \"bước đầu tiên và cần thiết để đạt được mục tiêu lồng ghép giới một cách hiệu quả\" vì:", "options": {"A": "Nó giúp dự án có thêm nhiều hoạt động và tăng ngân sách.", "B": "Nó cung cấp hiểu biết sâu sắc về bối cảnh giới, các vấn đề và cơ hội, làm nền tảng cho việc thiết kế các can thiệp phù hợp và có mục tiêu.", "C": "Nó là một yêu cầu bắt buộc của tất cả các nhà tài trợ.", "D": "Nó giúp xác định ai là người quản lý dự án tốt nhất."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nếu không hiểu rõ bối cảnh giới thông qua GA, các nỗ lực lồng ghép giới có thể trở nên hình thức, không hiệu quả hoặc thậm chí gây tác động tiêu cực. [2123, 2126, 2127]"}, {"level": "1", "content": "Khi Khung Phân tích Giới của Jhpiego đề cập đến \"quyền lực là một chủ đề xuyên suốt cả bốn lĩnh vực\" (tiếp cận tài sản; niềm tin văn hóa; thực hành và tham gia; thể chế và chính sách), điều này có nghĩa là:", "options": {"A": "Chỉ có những người có quyền lực mới được phân tích giới.", "B": "Phân tích giới cần xem xét cách các mối quan hệ quyền lực giới ảnh hưởng và định hình tất cả các khía cạnh của đời sống xã hội, kinh tế và thể chế.", "C": "Mục tiêu của phân tích giới là tước bỏ quyền lực của nam giới.", "D": "Quyền lực không phải là một yếu tố quan trọng trong phân tích giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quyền lực giới là một yếu tố cơ bản, định hình cách các nguồn lực được phân bổ, các chuẩn mực được thiết lập, các hành vi được thực hiện và các thể chế vận hành. Phân tích giới phải làm rõ các động lực quyền lực này. [2140]"}, {"level": "1", "content": "Việc sử dụng kết hợp các phương pháp thu thập dữ liệu (cả định tính và định lượng) trong Đánh giá giới thường mang lại hiệu quả cao hơn vì:", "options": {"A": "Nó làm cho báo cáo đánh giá trông ấn tượng hơn.", "B": "Dữ liệu định lượng cung cấp bức tranh tổng thể và khả năng khái quát, trong khi dữ liệu định tính giúp khám phá chiều sâu, bối cảnh và ý nghĩa của các con số đó.", "C": "Chỉ cần một trong hai loại dữ liệu là đủ.", "D": "Các nhà tài trợ luôn yêu cầu phải có cả hai."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự kết hợp giữa định lượng (cho biết \"cái gì\", \"bao nhiêu\") và định tính (cho biết \"tại sao\", \"như thế nào\") giúp tạo ra một hiểu biết đầy đủ, đa chiều và sâu sắc hơn về các vấn đề giới. [2156, 2157, 2158]"}, {"level": "1", "content": "Lồng ghép kết quả đánh giá giới vào giai đoạn giám sát dự án TN&MT KHÔNG bao gồm việc nào sau đây?", "options": {"A": "Theo dõi các chỉ số đã được phân tách theo giới.", "B": "Thu thập phản hồi thường xuyên từ cả nam và nữ tham gia dự án.", "C": "Chỉ tập trung vào các chỉ số kỹ thuật và kinh tế của dự án.", "D": "Đánh giá tiến độ đạt được các mục tiêu về bình đẳng giới mà dự án đã đề ra."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Giám sát có lồng ghép giới đòi hỏi phải theo dõi cả các chỉ số liên quan đến giới, chứ không chỉ giới hạn ở các mục tiêu kỹ thuật hay kinh tế thuần túy. [21212174]"}, {"level": "1", "content": "Nguyên tắc nào sau đây KHÔNG phải là nguyên tắc cơ bản trong phân tích giới theo tài liệu chương 7?", "options": {"A": "Cần thu thập số liệu tách biệt theo giới ở các cấp độ khác nhau.", "B": "Chỉ cần phân tích nhóm phụ nữ nói chung, không cần phân tách theo các đặc điểm khác.", "C": "Cần xác định được các yếu tố chi phối (văn hóa, kinh tế, xã hội...) đến quan hệ giới.", "D": "Phân tích giới phải được tiến hành ở tất cả các bước của chu trình chính sách, chương trình, dự án."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nguyên tắc 2 (trong tài liệu chương 7) nhấn mạnh việc phân tích các nhóm nữ giới và nam giới khác nhau (theo tuổi, dân tộc, vùng miền...) để có bức tranh tổng thể và đề xuất chính sách phù hợp. [755]"}, {"level": "1", "content": "Khung Harvard bị phê bình là \"thiếu tính tham gia, mang tính áp đặt từ trên xuống\" vì:", "options": {"A": "Nó yêu cầu sự tham gia quá nhiều của cộng đồng.", "B": "Nó được thiết kế bởi các chuyên gia bên ngoài và tập trung vào việc thu thập dữ liệu theo các hạng mục định sẵn, ít có không gian cho sự tham gia định hình của cộng đồng.", "C": "Nó quá phức tạp để cộng đồng có thể hiểu và tham gia.", "D": "Nó chỉ sử dụng các phương pháp định tính."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một trong những điểm yếu của Khung Harvard là nó thường được triển khai theo hướng thu thập thông tin để điền vào các ma trận đã có, ít tạo điều kiện cho sự tham gia chủ động của cộng đồng trong việc xác định vấn đề và giải pháp. [911]"}, {"level": "1", "content": "Mục đích của công cụ \"Phân tích các yếu tố ảnh hưởng\" trong Khung Harvard là để:", "options": {"A": "Xác định ai làm công việc gì.", "B": "Xem xét các yếu tố (văn hóa, kinh tế, thể chế...) có thể tạo ra cơ hội hoặc thách thức cho việc thực hiện các hoạt động và tiếp cận nguồn lực của nam và nữ.", "C": "Đánh giá mức độ tiếp cận và kiểm soát nguồn lực.", "D": "Liệt kê các mục tiêu của dự án."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Công cụ này giúp xác định các yếu tố bối cảnh có thể ảnh hưởng đến sự phân công lao động và quyền tiếp cận/kiểm soát nguồn lực, từ đó nhận diện các cơ hội và thách thức. [875, 8884]"}, {"level": "1", "content": "\"Ma trận chính sách WID/GAD\" trong Khung Moser KHÔNG nhằm mục đích nào sau đây?", "options": {"A": "Đánh giá các biện pháp/cách tiếp cận chính sách đã sử dụng trong các chương trình, dự án.", "B": "Xác định giải pháp/cách tiếp cận phù hợp nhất cho chương trình, dự án phát triển trong tương lai.", "C": "Phân tích chi tiết phân công lao động 24 giờ của phụ nữ và nam giới.", "D": "Xác định điểm mạnh, điểm yếu, trở ngại của các giải pháp chính sách hiện tại."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Ma trận chính sách WID/GAD là công cụ để đánh giá các cách tiếp cận chính sách đã và sẽ được áp dụng, chứ không trực tiếp phân tích việc sử dụng thời gian. Phân tích 24 giờ thuộc công cụ khác. [943, 944, 945, 1005]"}, {"level": "1", "content": "Mức độ \"Kiểm soát\" (Control) trong Khung Longwe đại diện cho điều gì?", "options": {"A": "Phụ nữ chỉ có khả năng tiếp cận các nguồn lực cơ bản.", "B": "Phụ nữ tham gia vào các cuộc họp nhưng không có tiếng nói quyết định.", "C": "Phụ nữ có sự cân bằng quyền lực với nam giới trong việc ra quyết định và kiểm soát các yếu tố sản xuất cũng như phân bổ lợi ích.", "D": "Phụ nữ nhận thức được sự bất bình đẳng giới."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> \"Kiểm soát\" là mức độ trao quyền cao nhất trong Khung Longwe, thể hiện sự bình đẳng thực sự về quyền lực trong việc đưa ra quyết định và kiểm soát các nguồn lực cũng như lợi ích. [970, 1048, 1049]"}, {"level": "1", "content": "Một trong những điểm mạnh của Khung Longwe so với Khung Moser là gì?", "options": {"A": "Khung Longwe đơn giản hơn và dễ áp dụng hơn trong mọi tình huống.", "B": "Khung Longwe tập trung chi tiết hơn vào phân công lao động hàng ngày.", "C": "Khung Longwe vượt ra ngoài khái niệm nhu cầu giới thực tế/chiến lược để tập trung trực tiếp vào các mức độ trao quyền và bình đẳng.", "D": "Khung Longwe hoàn toàn bỏ qua vai trò của nam giới."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khung Longwe cung cấp một cách tiếp cận khác để phân tích và đo lường sự tiến bộ hướng tới bình đẳng giới bằng cách tập trung vào các cấp độ trao quyền cụ thể, thay vì chỉ phân loại nhu cầu. [101066, 1067, 1068]"}, {"level": "1", "content": "Khi áp dụng công cụ \"Phân công lao động theo giới\", tại sao việc xem xét \"ai làm gì\" là chưa đủ mà cần phải xem xét cả \"chức năng, nhiệm vụ, khả năng tiếp cận nguồn lực, lợi ích và mối quan hệ quyền lực\"?", "options": {"A": "Vì như vậy sẽ làm cho phân tích trở nên phức tạp hơn một cách không cần thiết.", "B": "Vì chỉ có thời gian lao động mới phản ánh đúng bản chất của phân công lao động.", "C": "Vì sự phân công công việc thường gắn liền với sự khác biệt về giá trị công việc, quyền kiểm soát nguồn lực và quyền ra quyết định, phản ánh bất bình đẳng giới sâu sắc hơn.", "D": "Vì các yếu tố khác ngoài \"ai làm gì\" là không thể đo lường được."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Phân công lao động không chỉ là việc chia sẻ công việc mà còn liên quan đến việc công việc nào được coi trọng hơn, ai có quyền kiểm soát nguồn lực tạo ra từ công việc đó, và ai có quyền ra quyết định. Đây là những khía cạnh quan trọng của quyền lực giới. [1113, 1114]"}, {"level": "1", "content": "Trong công cụ \"Tiếp cận và Kiểm soát\", sự khác biệt giữa việc phụ nữ \"tiếp cận\" vốn và \"kiểm soát\" vốn cho thấy điều gì?", "options": {"A": "Phụ nữ có thể vay được tiền, nhưng người khác (thường là chồng) lại quyết định cách sử dụng số tiền đó.", "B": "Phụ nữ không thể vay được tiền từ bất kỳ nguồn nào.", "C": "Chỉ có nam giới mới có quyền kiểm soát vốn.", "D": "Tiếp cận và kiểm soát vốn là hoàn toàn giống nhau."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> \"Tiếp cận\" chỉ là khả năng có được nguồn lực, trong khi \"kiểm soát\" bao hàm quyền quyết định về việc sử dụng và phân bổ nguồn lực đó. Phụ nữ có thể tiếp cận vốn nhưng không có quyền kiểm soát thực sự. [3, 1189]"}, {"level": "1", "content": "Việc phân tích mô hình \"Ra quyết định\" ở các cấp độ khác nhau (gia đình, tổ chức, nhà nước) nhằm mục đích chính là:", "options": {"A": "Xác định ai là người thông minh nhất ở mỗi cấp độ.", "B": "Xác định và làm rõ bất bình đẳng giới trong phân chia quyền lực và trách nhiệm, nơi nam giới thường có quyền lực và quyền kiểm soát nhiều hơn.", "C": "Chứng minh rằng phụ nữ không có khả năng ra quyết định.", "D": "Đơn giản hóa quy trình ra quyết định."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phân tích này giúp làm lộ rõ ai thực sự có quyền đưa ra các quyết định quan trọng ở các cấp độ khác nhau, từ đó cho thấy sự bất bình đẳng giới trong việc thực thi quyền lực. [1234]"}, {"level": "1", "content": "Tại sao việc đáp ứng \"Nhu cầu giới chiến lược\" (SGN) thường khó khăn và đòi hỏi thời gian dài hơn so với đáp ứng \"Nhu cầu giới thực tế\" (PGN)?", "options": {"A": "Vì SGN không thực sự quan trọng bằng PGN.", "B": "Vì SGN thường đòi hỏi sự thay đổi trong các mối quan hệ quyền lực, cấu trúc xã hội và các chuẩn mực văn hóa đã ăn sâu, trong khi PGN giải quyết các nhu cầu trước mắt.", "C": "Vì không có đủ nguồn lực để đáp ứng SGN.", "D": "Vì chỉ có phụ nữ mới quan tâm đến SGN."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> SGN nhắm đến những thay đổi mang tính căn bản về vị thế và quyền lực của phụ nữ, điều này thường vấp phải sự kháng cự từ các cấu trúc hiện hữu và đòi hỏi những nỗ lực bền bỉ để thay đổi nhận thức và hành vi xã hội. [1248, 1249, 1257]"}, {"level": "1", "content": "Khi thiết kế một dự án phát triển nông thôn, việc bỏ qua bước \"Đánh giá tác động giới\" (GIA) có thể dẫn đến hậu quả gì?", "options": {"A": "Dự án sẽ luôn thành công vì tập trung vào các mục tiêu kỹ thuật.", "B": "Dự án có thể vô tình làm trầm trọng thêm bất bình đẳng giới, không đáp ứng nhu cầu của phụ nữ hoặc thậm chí gây hại cho họ.", "C": "Dự án sẽ tiết kiệm được chi phí và thời gian.", "D": "Mọi người sẽ tự động được hưởng lợi như nhau từ dự án."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GIA giúp lường trước các tác động khác biệt của dự án đối với các giới. Bỏ qua bước này có thể dẫn đến việc dự án không hiệu quả, không công bằng hoặc gây ra những hậu quả tiêu cực không mong muốn. [821, 822, 2132]"}, {"level": "1", "content": "Bộ câu hỏi gợi ý phân tích giới cho dự án doanh nghiệp (trong Chương 7) được thiết kế dựa trên năm khía cạnh. Khía cạnh nào sau đây KHÔNG phải là một trong năm khía cạnh đó?", "options": {"A": "Mức độ tiếp cận (vốn, thông tin...).", "B": "Kiến thức, niềm tin và nhận thức (định kiến giới...).", "C": "Đặc điểm nhân khẩu học của chủ doanh nghiệp (tuổi, tình trạng hôn nhân...).", "D": "Quyền lực và ra quyết định (kiểm soát lợi ích, tham gia lãnh đạo...)."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Năm khía cạnh được đề cập là: Mức độ tiếp cận; Kiến thức, niềm tin và nhận thức; Thực tiễn và sự tham gia; Thời gian và không gian; Quyền lực và ra quyết định (cũng có khía cạnh Quyền và vị thế pháp lý). Đặc điểm nhân khẩu học có thể được thu thập nhưng không phải là một \"khía cạnh phân tích\" chính trong bộ câu hỏi này. [1294, 1295, 1296, 1332]"}, {"level": "1", "content": "Trong bối cảnh GRB, tại sao việc theo dõi và đánh giá chi tiêu có trách nhiệm giới và các kết quả đạt được lại quan trọng?", "options": {"A": "Để chứng minh rằng tất cả ngân sách đã được chi cho phụ nữ.", "B": "Để đảm bảo các nguồn lực được phân bổ thực sự mang lại kết quả mong muốn về bình đẳng giới và rút kinh nghiệm cho các chu trình sau.", "C": "Đây là bước không cần thiết nếu việc phân bổ ngân sách ban đầu đã tốt.", "D": "Chỉ để làm hài lòng các cơ quan giám sát."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Theo dõi và đánh giá giúp kiểm tra xem các mục tiêu GRB có đạt được trên thực tế không, xác định những điểm cần cải thiện và đảm bảo tính trách nhiệm giải trình. [1942, 1943, 1944]"}, {"level": "1", "content": "Một dự án cung cấp nước sạch ở gần nhà cho các hộ gia đình. Để đánh giá tác động giới của dự án này, việc sử dụng \"Khảo sát sử dụng thời gian\" sẽ giúp làm rõ điều gì?", "options": {"A": "Chất lượng nguồn nước có đảm bảo hay không.", "B": "Liệu thời gian phụ nữ (và trẻ em gái) phải bỏ ra để lấy nước có giảm đi không, và thời gian đó được sử dụng cho các hoạt động khác như thế nào.", "C": "Chi phí xây dựng hệ thống nước là bao nhiêu.", "D": "Ai là người quản lý hệ thống nước ở cộng đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khảo sát sử dụng thời gian sẽ cho thấy sự thay đổi trong phân bổ thời gian của phụ nữ khi gánh nặng lấy nước giảm đi, ví dụ họ có thêm thời gian cho việc học, làm kinh tế hoặc nghỉ ngơi. [1974, 1975]"}, {"level": "1", "content": "Sự khác biệt giữa \"chính sách nhạy cảm giới\" (gender-sensitive) và \"chính sách đáp ứng giới\" (gender-responsive) là gì?", "options": {"A": "Chính sách nhạy cảm giới chỉ thừa nhận sự khác biệt, chính sách đáp ứng giới chủ động giải quyết và thay đổi bất bình đẳng.", "B": "Chính sách đáp ứng giới chỉ dành cho phụ nữ, chính sách nhạy cảm giới dành cho cả nam và nữ.", "C": "Hai thuật ngữ này hoàn toàn giống nhau.", "D": "Chính sách nhạy cảm giới tốn kém hơn chính sách đáp ứng giới."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> \"Nhạy cảm giới\" là nhận biết được sự khác biệt và nhu cầu của các giới. \"Đáp ứng giới\" đi một bước xa hơn, chủ động đưa ra các hành động, biện pháp để giải quyết các bất bình đẳng và thúc đẩy bình đẳng giới. [838] (Hàm ý từ việc \"lấp đầy khoảng trống\" giữa chính sách đáp ứng giới và nhạy cảm giới/mù giới)."}, {"level": "1", "content": "Tại sao việc chỉ tăng cường sự tham gia của phụ nữ vào các hoạt động dự án là chưa đủ để đảm bảo \"trao quyền\" thực sự cho họ?", "options": {"A": "Vì phụ nữ không muốn được trao quyền.", "B": "Vì trao quyền thực sự đòi hỏi sự thay đổi trong quan hệ quyền lực, quyền ra quyết định và kiểm soát nguồn lực, chứ không chỉ là sự có mặt.", "C": "Vì nam giới sẽ phản đối nếu phụ nữ được trao quyền.", "D": "Vì các dự án không có đủ ngân sách để trao quyền."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự tham gia có thể chỉ mang tính hình thức. Trao quyền thực sự liên quan đến việc phụ nữ có tiếng nói, có ảnh hưởng đến quyết định và có quyền kiểm soát đối với cuộc sống và các nguồn lực của mình. [2830, 2833]"}, {"level": "1", "content": "Trong bối cảnh biến đổi khí hậu, việc các chính sách thích ứng \"mù giới\" có thể dẫn đến hậu quả gì?", "options": {"A": "Giúp tất cả mọi người thích ứng hiệu quả như nhau.", "B": "Bỏ qua năng lực thích ứng đặc thù của phụ nữ.", "C": "Chỉ gây khó khăn cho nam giới.", "D": "Không có tác động gì đáng kể."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các chính sách \"mù giới\" không tính đến việc BĐKH tác động khác nhau lên nam và nữ, cũng như khả năng thích ứng khác nhau của họ, do đó có thể làm trầm trọng thêm tình trạng bất lợi của phụ nữ. [2799, 2807]"}, {"level": "1", "content": "Một trong những lý do chính khiến các công cụ phân tích GRB như \"Phân tích chi tiêu công và phân bổ lợi ích theo giới\" đòi hỏi dữ liệu phân tách theo giới chi tiết là gì?", "options": {"A": "Để làm cho quá trình phân tích trở nên khó khăn hơn.", "B": "Để có thể so sánh một cách chính xác ai thực sự nhận được lợi ích từ các khoản chi tiêu công.", "C": "Vì đây là yêu cầu duy nhất của các nhà tài trợ.", "D": "Để chứng minh rằng nam giới luôn hưởng lợi nhiều hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nếu không có dữ liệu phân tách theo giới, sẽ không thể biết được liệu các dịch vụ và lợi ích từ chi tiêu công có được phân phối một cách công bằng đến các nhóm giới khác nhau hay không. [1955, 1956]"}, {"level": "1", "content": "Sự cần thiết phải có \"Kế hoạch hành động giới\" (GAP) sau khi thực hiện Đánh giá giới (GA) là vì:", "options": {"A": "GAP chỉ là một tài liệu hình thức để hoàn thiện báo cáo GA.", "B": "GAP cụ thể hóa các phát hiện và khuyến nghị của GA thành các mục tiêu, hoạt động, chỉ số và nguồn lực rõ ràng để lồng ghép vào dự án.", "C": "GAP chỉ cần thiết cho các dự án do phụ nữ quản lý.", "D": "GAP giúp giảm bớt số lượng hoạt động của dự án."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GAP là công cụ để chuyển những phân tích và khuyến nghị từ GA thành những hành động cụ thể, có thể theo dõi và đánh giá được trong khuôn khổ dự án. [2127, 2152, 2154]"}, {"level": "1", "content": "Việc các thể chế phi chính thức (như tập quán dòng họ ưu tiên con trai thờ cúng) có thể \"vô hiệu hóa\" hoặc làm suy yếu hiệu lực của thể chế chính thức (như luật thừa kế bình đẳng) cho thấy điều gì về mối quan hệ giữa hai loại thể chế này?", "options": {"A": "Thể chế chính thức luôn có sức mạnh áp đảo.", "B": "Thể chế phi chính thức không còn tồn tại trong xã hội hiện đại.", "C": "Có sự tương tác phức tạp và đôi khi thể chế phi chính thức có sức mạnh chi phối rất lớn đối với hành vi thực tế, bất chấp luật pháp.", "D": "Chỉ có thể chế phi chính thức mới thực sự có ý nghĩa."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đây là một minh chứng rõ ràng về sức mạnh của các chuẩn mực xã hội bất thành văn, chúng có thể cản trở hoặc làm sai lệch việc thực thi pháp luật chính thức nếu không có những can thiệp phù hợp để thay đổi nhận thức và hành vi. [71, 73]"}, {"level": "1", "content": "Tại sao việc chỉ tập trung vào các \"dự án dành riêng cho phụ nữ\" không được coi là cách tiếp cận GAD (Giới và Phát triển) hiệu quả nhất?", "options": {"A": "Vì các dự án này thường quá tốn kém.", "B": "Vì GAD hướng đến việc lồng ghép giới vào tất cả các chính sách và chương trình, nhằm thay đổi các cấu trúc và mối quan hệ giới bất bình đẳng một cách toàn diện, chứ không chỉ giải quyết vấn đề của phụ nữ một cách riêng lẻ.", "C": "Vì phụ nữ không muốn tham gia các dự án riêng.", "D": "Vì nam giới sẽ cảm thấy bị phân biệt đối xử."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GAD nhấn mạnh đến việc thay đổi hệ thống và các mối quan hệ quyền lực. Các dự án riêng lẻ cho phụ nữ, dù có thể cần thiết trong một số trường hợp, nhưng nếu không đi kèm với những thay đổi cấu trúc lớn hơn thì khó có thể tạo ra bình đẳng giới bền vững. [411, 412, 413, 415]"}, {"level": "1", "content": "Việc một số văn bản pháp luật chính thức của Việt Nam đã bắt đầu đưa vào các nguyên tắc về bình đẳng giới và cấm phân biệt đối xử về giới (ví dụ Luật Đất đai 2024) cho thấy điều gì về sự phát triển của hệ thống thể chế?", "options": {"A": "Thể chế phi chính thức đã hoàn toàn bị loại bỏ.", "B": "Có sự thừa nhận và nỗ lực từ phía nhà nước để chính thức hóa các mục tiêu bình đẳng giới, tuy nhiên hiệu quả thực thi vẫn phụ thuộc vào nhiều yếu tố khác.", "C": "Bình đẳng giới đã được thực hiện đầy đủ và không còn rào cản nào.", "D": "Các vấn đề giới chỉ mới được quan tâm ở cấp độ quốc tế, chưa ảnh hưởng đến luật pháp quốc gia."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc đưa các nguyên tắc bình đẳng giới vào luật pháp là một bước tiến quan trọng của thể chế chính thức. Tuy nhiên, việc chuyển hóa thành thực tiễn và thay đổi các thể chế phi chính thức còn cố hữu là một quá trình phức tạp, đòi hỏi nhiều nỗ lực hơn nữa. [86, 126, 127]"}, {"level": "1", "content": "\"Gánh nặng kép\" (double burden) mà phụ nữ thường phải đối mặt là sự kết hợp của:", "options": {"A": "Công việc được trả lương và các hoạt động giải trí.", "B": "Công việc được trả lương và trách nhiệm chăm sóc gia đình, nội trợ không được trả lương.", "C": "Trách nhiệm học tập và trách nhiệm tham gia các hoạt động cộng đồng.", "D": "Công việc trong khu vực chính thức và công việc trong khu vực phi chính thức."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> \"Gánh nặng kép\" là thuật ngữ phổ biến để chỉ việc phụ nữ vừa phải tham gia vào thị trường lao động để có thu nhập, vừa phải đảm nhận phần lớn công việc chăm sóc gia đình và nội trợ không được trả công. Điều này hạn chế thời gian và cơ hội phát triển của họ. [40, 275, 350]"}, {"level": "1", "content": "Sự thiếu vắng phụ nữ trong các vị trí ra quyết định cấp cao trong lĩnh vực tài nguyên và môi trường có thể dẫn đến việc các chính sách:", "options": {"A": "Luôn mang lại lợi ích tốt nhất cho môi trường.", "B": "Không phản ánh đầy đủ nhu cầu và kiến thức của một nửa dân số, có thể kém hiệu quả và thiếu tính bền vững.", "C": "Chỉ tập trung vào các giải pháp công nghệ cao.", "D": "Được thực thi nhanh chóng và dễ dàng hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khi một nhóm lớn trong xã hội (phụ nữ) không được tham gia đầy đủ vào quá trình hoạch định chính sách, kiến thức, kinh nghiệm và nhu cầu của họ có thể bị bỏ qua, dẫn đến các chính sách không tối ưu hoặc không giải quyết được các vấn đề một cách toàn diện. [149, 150, 151]"}, {"level": "1", "content": "Mặc dù Luật Hôn nhân và Gia đình Việt Nam công nhận nguyên tắc bình đẳng giữa vợ và chồng, việc chuyển hóa điều này thành thực tế trong mỗi gia đình vẫn là một quá trình lâu dài. Nguyên nhân chính là:", "options": {"A": "Phụ nữ không muốn có quyền bình đẳng trong gia đình.", "B": "Ảnh hưởng của các chuẩn mực văn hóa, định kiến giới và sự phân công lao động truyền thống vẫn còn mạnh mẽ.", "C": "Nam giới không có khả năng chia sẻ việc nhà.", "D": "Luật pháp không có cơ chế nào để bảo vệ quyền của phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các yếu tố văn hóa - xã hội và các định kiến giới đã ăn sâu thường là rào cản lớn trong việc thực thi bình đẳng giới thực chất trong gia đình, ngay cả khi pháp luật đã quy định. [41, 42, 123]"}, {"level": "1", "content": "\"Thể chế chính trị dung hợp\" (inclusive political institutions) được coi là lý tưởng vì nó:", "options": {"A": "Tập trung toàn bộ quyền lực vào tay một nhóm nhỏ để đảm bảo sự ổn định.", "B": "Khuyến khích sự tham gia rộng rãi của người dân vào các quá trình quyết định và có cơ chế kiểm soát quyền lực hiệu quả.", "C": "Ưu tiên các giá trị truyền thống hơn là pháp luật.", "D": "Chỉ cho phép một đảng phái chính trị duy nhất hoạt động."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thể chế chính trị dung hợp thúc đẩy đa nguyên, sự tham gia của công chúng và kiểm soát quyền lực, tạo nền tảng cho một xã hội công bằng và phát triển hơn. [4]"}, {"level": "1", "content": "Tại sao việc đo lường nghèo đói chỉ dựa trên thu nhập (ví dụ, ngưỡng $2.15/ngày) lại bị coi là chưa đầy đủ?", "options": {"A": "Vì nó không tính đến giá trị của các tài sản mà người nghèo sở hữu.", "B": "Vì nó bỏ qua các khía cạnh phi thu nhập của nghèo đói như thiếu hụt về giáo dục, y tế, điều kiện sống, và cơ hội.", "C": "Vì ngưỡng thu nhập này quá cao so với thực tế ở nhiều quốc gia.", "D": "Vì nó không phân biệt được giữa người nghèo và người rất nghèo."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nghèo đói là một hiện tượng đa chiều. Việc chỉ dựa vào thu nhập bỏ qua nhiều khía cạnh thiếu hụt khác ảnh hưởng đến chất lượng cuộc sống và khả năng thoát nghèo của con người. [2620]"}, {"level": "1", "content": "Sự gia tăng khoảng cách thu nhập giữa nhóm 20% giàu nhất và nhóm 20% nghèo nhất ở Việt Nam, ngay cả khi thu nhập chung tăng, cho thấy điều gì?", "options": {"A": "Tăng trưởng kinh tế không mang lại lợi ích cho nhóm nghèo.", "B": "Lợi ích của tăng trưởng kinh tế đang được phân bổ không đồng đều, với nhóm giàu hưởng lợi nhiều hơn và nhanh hơn.", "C": "Hệ số GINI của Việt Nam chắc chắn đang giảm.", "D": "Tất cả mọi người đều trở nên giàu có hơn với tốc độ như nhau."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự gia tăng khoảng cách giàu nghèo cho thấy mặc dù có tăng trưởng, lợi ích của nó không được chia sẻ một cách công bằng, dẫn đến bất bình đẳng thu nhập gia tăng. [2673]"}, {"level": "1", "content": "Việc phụ nữ dân tộc thiểu số ở Việt Nam thường có tỷ lệ nghèo đói cao hơn và sự phụ thuộc lớn hơn vào tài nguyên thiên nhiên đang suy giảm phản ánh điều gì?", "options": {"A": "Họ không có khả năng làm việc hiệu quả như các nhóm khác.", "B": "Sự giao thoa của nhiều yếu tố bất lợi (dân tộc, giới tính, vị trí địa lý) khiến họ trở thành nhóm dễ bị tổn thương kép hoặc đa tầng.", "C": "Các chính sách của nhà nước hoàn toàn không quan tâm đến họ.", "D": "Tài nguyên thiên nhiên ở vùng họ sống không có giá trị."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là ví dụ về bất bình đẳng giao thoa, nơi các yếu tố như dân tộc, giới tính và địa điểm cư trú kết hợp lại tạo ra những bất lợi chồng chất cho một nhóm dân cư cụ thể. [2778, 2779, 2780]"}, {"level": "1", "content": "Tại sao các chính sách và chương trình thích ứng với biến đổi khí hậu cần phải đặc biệt nhạy cảm với giới?", "options": {"A": "Vì biến đổi khí hậu chỉ tác động đến phụ nữ.", "B": "Vì phụ nữ thường có những điểm yếu riêng, vai trò và kiến thức khác biệt trong ứng phó, và nếu không tính đến các yếu tố này, chính sách có thể không hiệu quả hoặc làm gia tăng bất bình đẳng.", "C": "Vì nam giới không quan tâm đến việc thích ứng với biến đổi khí hậu.", "D": "Vì các nhà tài trợ quốc tế chỉ tài trợ cho các dự án có yếu tố giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Biến đổi khí hậu tác động khác nhau đến nam và nữ. Phụ nữ thường dễ bị tổn thương hơn nhưng cũng có những đóng góp quan trọng. Chính sách nhạy cảm giới sẽ hiệu quả và công bằng hơn. [2790, 2791, 2792, 2799]"}, {"level": "1", "content": "Việc phụ nữ ít được tham gia vào các quyết định quản lý tài nguyên thiên nhiên (ví dụ, rừng, nước) ở cấp cộng đồng, mặc dù họ là người sử dụng chính, có thể dẫn đến:", "options": {"A": "Các quyết định quản lý luôn tối ưu và bền vững.", "B": "Kiến thức và nhu cầu của phụ nữ không được phản ánh, dẫn đến các kế hoạch quản lý kém hiệu quả hoặc không công bằng.", "C": "Tài nguyên được bảo vệ tốt hơn vì nam giới quản lý chặt chẽ hơn.", "D": "Phụ nữ sẽ tự tìm cách quản lý tài nguyên theo cách riêng của họ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc loại trừ tiếng nói của những người sử dụng tài nguyên chính (thường là phụ nữ ở cấp hộ gia đình) khỏi quá trình ra quyết định sẽ làm giảm tính hiệu quả, công bằng và bền vững của các nỗ lực quản lý tài nguyên. [2777, 2781, 2782]"}, {"level": "1", "content": "Sự \"nữ hóa\" của một số ngành nghề nông nghiệp (ví dụ, một số công đoạn trong sản xuất hữu cơ hoặc du lịch cộng đồng) có thể tiềm ẩn nguy cơ gì nếu không đi kèm với trao quyền thực chất?", "options": {"A": "Các ngành nghề đó sẽ trở nên kém năng suất hơn.", "B": "Phụ nữ sẽ có thu nhập rất cao và quyền lực lớn.", "C": "Công việc đó có thể bị coi là \"việc của phụ nữ\" với mức lương thấp, điều kiện làm việc không đảm bảo, và phụ nữ không có quyền quyết định.", "D": "Nam giới sẽ hoàn toàn rút khỏi các ngành nghề đó."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nếu các ngành nghề có nhiều phụ nữ tham gia không đi kèm với sự công nhận giá trị lao động, trả công xứng đáng và cơ hội tham gia quản lý, nó có thể củng cố các khuôn mẫu giới và duy trì sự bất bình đẳng. [2458, 2459, 2460, 2461]"}, {"level": "1", "content": "Tại sao việc chỉ tăng thu nhập cho phụ nữ nông thôn là chưa đủ để đảm bảo \"trao quyền kinh tế\" thực sự cho họ?", "options": {"A": "Vì phụ nữ nông thôn không biết cách quản lý tiền bạc.", "B": "Vì trao quyền kinh tế thực sự còn bao gồm quyền quyết định cách sử dụng thu nhập, quyền kiểm soát tài sản, giảm gánh nặng công việc không lương và thay đổi các chuẩn mực giới.", "C": "Vì thu nhập của họ sẽ không bao giờ bằng nam giới.", "D": "Vì họ nên tập trung vào việc nhà hơn là kiếm tiền."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trao quyền kinh tế không chỉ là có thêm thu nhập, mà còn là có quyền tự quyết, quyền kiểm soát và sự thay đổi trong các mối quan hệ quyền lực giới. [2547, 2548, 2549]"}, {"level": "1", "content": "Tác động của việc thanh niên rời bỏ nông thôn tìm việc ở thành thị đối với việc bảo tồn tri thức bản địa về nông nghiệp là gì?", "options": {"A": "Giúp tri thức bản địa được quảng bá rộng rãi hơn ở thành thị.", "B": "Có thể dẫn đến sự gián đoạn trong quá trình truyền dạy tri thức bản địa (vốn chủ yếu qua thực hành và truyền miệng), gây nguy cơ mai một.", "C": "Không có tác động gì vì tri thức bản địa đã được ghi chép đầy đủ.", "D": "Giúp thế hệ trẻ ở nông thôn có nhiều thời gian hơn để học hỏi tri thức bản địa."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khi thế hệ trẻ rời đi, những người nắm giữ tri thức bản địa (thường là người lớn tuổi) sẽ có ít cơ hội truyền dạy hơn, dẫn đến nguy cơ mất mát những kiến thức quý báu này. [2306, 2307, 2310]"}, {"level": "1", "content": "Một chính sách tín dụng nông nghiệp yêu cầu người vay phải có GCNQSDĐ đứng tên mình. Trong bối cảnh GCNQSDĐ ở Việt Nam thường chỉ đứng tên chồng, chính sách này có thể:", "options": {"A": "Khuyến khích tất cả nông dân vay vốn như nhau.", "B": "Gián tiếp gây khó khăn cho phần lớn phụ nữ nông dân trong việc tiếp cận tín dụng chính thức, làm trầm trọng thêm bất bình đẳng.", "C": "Giúp giảm nợ xấu trong nông nghiệp.", "D": "Buộc các gia đình phải chuyển GCNQSDĐ sang tên vợ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Yêu cầu này, dù có vẻ trung lập, nhưng khi đặt trong bối cảnh thực tế về quyền sở hữu đất đai, nó trở thành một rào cản lớn đối với phụ nữ, một hình thức phân biệt đối xử gián tiếp. [2324, 2347, 2516]"}, {"level": "1", "content": "Việc các chương trình khuyến nông ở Việt Nam có tỷ lệ tham gia của phụ nữ còn rất thấp (khoảng 10%) cho thấy điều gì?", "options": {"A": "Phụ nữ không quan tâm đến việc nâng cao kiến thức nông nghiệp.", "B": "Có thể có những rào cản về thời gian, địa điểm, nội dung, phương pháp tiếp cận hoặc các yếu tố văn hóa khiến phụ nữ khó tham gia hoặc không được khuyến khích tham gia.", "C": "Các chương trình khuyến nông không mang lại lợi ích gì.", "D": "Nam giới học hỏi nhanh hơn phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Tỷ lệ tham gia thấp thường phản ánh các rào cản mang tính hệ thống hoặc thiết kế chương trình chưa phù hợp với nhu cầu và điều kiện của phụ nữ, chứ không phải do sự thiếu quan tâm của họ. [2328, 0, 1]"}, {"level": "1", "content": "Mục tiêu của \"Đánh giá tác động giới của chính sách thuế và thu ngân sách\" trong GRB là gì?", "options": {"A": "Chỉ để xác định tổng số thuế thu được hàng năm.", "B": "Để xem xét hệ thống thuế (cả trực thu và gián thu) ảnh hưởng như thế nào đến gánh nặng tài chính và hành vi kinh tế của các nhóm giới khác nhau, từ đó đánh giá tính công bằng của nó.", "C": "Để tìm cách tăng các loại thuế đánh vào phụ nữ.", "D": "Để đơn giản hóa hệ thống thuế cho dễ quản lý."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Công cụ này phân tích xem ai (theo giới) đang chịu gánh nặng thuế như thế nào và liệu hệ thống thuế có đang củng cố hay làm thay đổi các vai trò giới và bất bình đẳng kinh tế hay không. [1958, 1959, 1960, 1961]"}, {"level": "1", "content": "Tại sao việc tích hợp dữ liệu từ \"Khảo sát sử dụng thời gian\" vào quy trình GRB trong lĩnh vực TN&MT lại đặc biệt quan trọng, mặc dù còn hạn chế?", "options": {"A": "Vì nó giúp tăng ngân sách cho các dự án TN&MT.", "B": "Vì nhiều hoạt động của phụ nữ trong quản lý tài nguyên (lấy nước, củi, sản xuất tự cung tự cấp) là công việc không lương, và việc đo lường tác động của dự án lên thời gian này giúp đánh giá lợi ích đầy đủ hơn.", "C": "Vì nó là yêu cầu bắt buộc của tất cả các dự án TN&MT.", "D": "Vì nó giúp xác định các loài động thực vật quý hiếm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các dự án TN&MT có thể tác động lớn đến quỹ thời gian của phụ nữ cho các công việc không lương. Nếu không đo lường sự thay đổi này, các lợi ích (ví dụ, giải phóng thời gian cho phụ nữ) sẽ không được ghi nhận đầy đủ, dẫn đến phân bổ ngân sách có thể chưa tối ưu. [1977, 1978, 1979, 191981]"}, {"level": "1", "content": "Việc thiếu các hướng dẫn cụ thể và chi tiết về GRB cho các cơ quan chính phủ ở Việt Nam có thể dẫn đến hậu quả gì trong thực tiễn triển khai?", "options": {"A": "GRB sẽ được thực hiện một cách rất sáng tạo và linh hoạt ở mỗi địa phương.", "B": "Việc lồng ghép giới vào ngân sách có thể mang tính hình thức, không đồng bộ, hoặc không đạt được hiệu quả mong muốn do thiếu định hướng và phương pháp thống nhất.", "C": "Các cơ quan sẽ tự động ưu tiên ngân sách cho các vấn đề giới.", "D": "GRB sẽ được thực hiện nhanh chóng và dễ dàng hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thiếu hướng dẫn cụ thể sẽ gây khó khăn cho các cơ quan trong việc hiểu và áp dụng GRB một cách nhất quán và hiệu quả, có thể dẫn đến việc triển khai mang tính chiếu lệ. [2090, 2091, 2092, 2111]"}, {"level": "1", "content": "Một chiến lược nhằm đảm bảo đầu tư công trong lĩnh vực TN&MT mang lại lợi ích công bằng là \"Thực hiện Đánh giá giới (GA) toàn diện\". GA toàn diện ở đây KHÔNG chỉ bao gồm:", "options": {"A": "Xác định vai trò, nhu cầu, rào cản của các giới liên quan đến tài nguyên.", "B": "Đảm bảo tất cả các dự án TN&MT đều do phụ nữ quản lý.", "C": "Cung cấp thông tin đầu vào cho việc thiết kế dự án nhạy cảm và đáp ứng giới.", "D": "Tạo cơ sở cho việc giám sát và đánh giá tác động giới của can thiệp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GA toàn diện nhằm mục đích hiểu rõ bối cảnh giới và thông báo cho việc thiết kế dự án công bằng, chứ không nhất thiết phải yêu cầu mọi dự án đều do phụ nữ quản lý. Mục tiêu là sự tham gia và hưởng lợi công bằng. [2000, 2001, 2123, 2124]"}, {"level": "1", "content": "\"Ma trận Áp dụng GRB trong các Tiểu ngành TN&MT\" (Bảng 6.2) có vai trò gì trong việc thúc đẩy GRB?", "options": {"A": "Cung cấp một danh sách các dự án TN&MT cần được tài trợ.", "B": "Giúp chuyển từ các khái niệm GRB chung chung sang các vấn đề giới cụ thể, các can thiệp khả thi và các chỉ số đo lường lợi ích công bằng trong từng tiểu ngành TN&MT.", "C": "Là một công cụ để tính toán chính xác ngân sách cần thiết cho mỗi tiểu ngành.", "D": "Thay thế hoàn toàn nhu cầu thực hiện Đánh giá giới chi tiết."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Bảng ma trận này giúp cụ thể hóa việc áp dụng GRB bằng cách liên kết các vấn đề giới đặc thù của từng tiểu ngành với các ví dụ can thiệp và chỉ số theo dõi, làm cho GRB trở nên dễ hình dung và thực hiện hơn. [2041, 2042]"}, {"level": "1", "content": "Trong Khung Harvard, \"Danh mục kiểm tra trong chu trình dự án\" (Công cụ 4) được sử dụng để:", "options": {"A": "Phân tích chi tiết các hoạt động sản xuất và tái sản xuất.", "B": "Xác định các yếu tố văn hóa ảnh hưởng đến dự án.", "C": "Xem xét các đề xuất dự án hoặc hoạt động can thiệp theo quan điểm giới ở các giai đoạn khác nhau của dự án, nhằm đảm bảo tính nhạy cảm giới.", "D": "Liệt kê tất cả các nguồn lực mà cộng đồng đang có."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đây là một công cụ giúp các nhà hoạch định dự án tự đặt câu hỏi và rà soát các khía cạnh giới trong suốt chu trình dự án, từ xác định vấn đề, thiết kế, đến thực hiện và đánh giá. [888, 889, 890]"}, {"level": "1", "content": "Khung Moser cho rằng hoạch định giới \"luôn có xung đột\" và là quá trình \"tranh luận\". Điều này ngụ ý rằng:", "options": {"A": "Việc hoạch định giới luôn dẫn đến cãi vã và bất đồng không thể giải quyết.", "B": "Quá trình thay đổi các mối quan hệ giới và phân bổ lại nguồn lực thường liên quan đến việc đàm phán, thương lượng và đối mặt với các lợi ích khác nhau, đôi khi là mâu thuẫn, của các nhóm khác nhau.", "C": "Chỉ có các chuyên gia mới có thể tham gia vào hoạch định giới.", "D": "Hoạch định giới là một quá trình đơn giản và dễ dàng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Moser nhấn mạnh rằng hoạch định giới không chỉ là vấn đề kỹ thuật mà còn là vấn đề chính trị, liên quan đến việc thay đổi các cấu trúc quyền lực và lợi ích, do đó không thể tránh khỏi các xung đột và quá trình \"tranh luận\" để đạt được sự đồng thuận hoặc các giải pháp chấp nhận được. [924, 926, 986, 988]"}, {"level": "1", "content": "Sự phân biệt giữa \"nhu cầu giới thực tế\" và \"nhu cầu giới chiến lược\" trong Khung Moser quan trọng vì nó giúp:", "options": {"A": "Xác định xem ai là người nghèo nhất trong cộng đồng.", "B": "Đảm bảo rằng các dự án chỉ tập trung vào các nhu cầu trước mắt.", "C": "Nhận diện được các can thiệp nào chỉ duy trì hiện trạng và can thiệp nào có tiềm năng thay đổi các mối quan hệ giới bất bình đẳng, hướng tới trao quyền.", "D": "Tăng ngân sách cho các hoạt động của phụ nữ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Sự phân biệt này giúp các nhà hoạch định nhận thức được rằng việc chỉ đáp ứng các nhu cầu thực tế có thể không đủ để tạo ra thay đổi bền vững về bình đẳng giới. Cần phải xác định và giải quyết cả các nhu cầu chiến lược để thách thức các cấu trúc bất bình đẳng. [936, 937, 998, 999]"}, {"level": "1", "content": "Một dự án cung cấp các buổi tập huấn kỹ thuật nông nghiệp cho cả nam và nữ. Nếu phụ nữ tham gia rất ít do thời gian tập huấn trùng với giờ họ phải nấu cơm và chăm sóc con, dự án này đã bỏ qua công cụ phân tích giới nào của Khung Moser?", "options": {"A": "Công cụ 3: Sự kiểm soát nguồn lực và ra quyết định trong hộ gia đình.", "B": "Công cụ 4: Hoạch định giúp cân bằng ba vai trò (xem xét gánh nặng công việc và sự phù hợp của thời gian).", "C": "Công cụ 5: Ma trận chính sách WID/GAD.", "D": "Công cụ 6: Đưa các bên liên quan vào quá trình hoạch định."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Công cụ 4 của Moser nhấn mạnh việc xem xét các can thiệp có làm tăng gánh nặng cho phụ nữ ở một vai trò nào đó, ảnh hưởng đến các vai trò khác hay không. Thời gian tổ chức không phù hợp là một ví dụ rõ ràng. [941, 942, 1003, 1004]"}, {"level": "1", "content": "Khung Longwe cho rằng mức độ trao quyền cho phụ nữ tăng lên khi các hoạt động can thiệp phát triển tập trung vào các \"mức độ bình đẳng\" cao hơn. Mức độ \"Tham gia\" (Participation) đề cập đến:", "options": {"A": "Phụ nữ chỉ được nhận các phúc lợi vật chất từ dự án.", "B": "Phụ nữ có cơ hội tiếp cận các nguồn lực như nam giới.", "C": "Phụ nữ tham gia bình đẳng vào quá trình ra quyết định, xây dựng và quản lý chính sách/dự án.", "D": "Phụ nữ nhận thức được sự bất bình đẳng giới."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Mức độ \"Tham gia\" trong Khung Longwe nhấn mạnh đến sự tham gia có ý nghĩa của phụ nữ vào các quá trình ra quyết định, chứ không chỉ đơn thuần là sự hiện diện hay tiếp cận nguồn lực. [970, 1044, 1045, 1046, 1047]"}, {"level": "1", "content": "Tại sao việc chỉ thu thập số liệu tách biệt theo giới là bước đầu tiên nhưng chưa đủ trong phân tích giới?", "options": {"A": "Vì số liệu này thường không đáng tin cậy bằng các phương pháp định tính.", "B": "Vì nó chỉ cho thấy sự khác biệt (\"cái gì\") mà không giải thích được nguyên nhân (\"tại sao\") của sự khác biệt đó, cũng như không đề xuất được giải pháp.", "C": "Vì không phải vấn đề nào cũng có thể thu thập số liệu tách biệt theo giới.", "D": "Vì phân tích giới thực sự không cần đến số liệu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Số liệu tách biệt theo giới chỉ là điểm khởi đầu. Phân tích giới thực sự đòi hỏi phải đi sâu tìm hiểu các yếu tố văn hóa, xã hội, kinh tế, thể chế... đứng sau những con số đó để hiểu rõ bản chất của bất bình đẳng và đưa ra can thiệp phù hợp. [649, 655, 719]"}, {"level": "1", "content": "Một yêu cầu quan trọng khi thực hiện phân tích giới là người thực hiện phải \"có nhạy cảm giới, vì mục tiêu bình đẳng giới\". Điều này có nghĩa là:", "options": {"A": "Người phân tích phải là phụ nữ.", "B": "Người phân tích phải có khả năng nhận biết, thấu hiểu các vấn đề bất bình đẳng giới và cam kết với việc thúc đẩy bình đẳng, tránh đưa ra các kết luận mang tính định kiến.", "C": "Người phân tích phải luôn đứng về phía phụ nữ trong mọi tình huống.", "D": "Người phân tích phải có bằng cấp chuyên môn về nghiên cứu giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nhạy cảm giới đòi hỏi sự hiểu biết về các động lực giới và cam kết với mục tiêu bình đẳng, giúp người phân tích tránh được những thành kiến cá nhân và đảm bảo tính khách quan, công bằng trong quá trình làm việc. [6735]"}, {"level": "1", "content": "Trong quy trình phân tích giới 4 bước (Sàng lọc, Thu thập dữ liệu, Đánh giá tác động giới, Đề xuất giải pháp), bước nào được coi là \"hoạt động trọng tâm\"?", "options": {"A": "Sàng lọc.", "B": "Thu thập dữ liệu.", "C": "Đánh giá tác động giới (GIA).", "D": "Đề xuất giải pháp."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đánh giá tác động giới (GIA) là bước cốt lõi, nơi các phân tích được thực hiện để xác định liệu một chính sách, chương trình có tác động khác nhau đến các giới và có khả năng gây ra hay làm trầm trọng thêm bất bình đẳng giới hay không. [817, 820, 821]"}, {"level": "1", "content": "Tại sao việc \"lắng nghe tiếng nói của những người yếu thế, dễ bị tổn thương\" lại đặc biệt quan trọng trong quá trình thu thập thông tin cho phân tích giới?", "options": {"A": "Vì họ thường có nhiều thời gian rảnh để tham gia phỏng vấn.", "B": "Vì các nhóm này thường phải đối mặt với nhiều tầng lớp bất bình đẳng và có những nhu cầu, trải nghiệm đặc thù mà các nhóm khác có thể không có; bỏ qua tiếng nói của họ sẽ dẫn đến phân tích thiếu sót.", "C": "Vì các nhà tài trợ thường yêu cầu như vậy.", "D": "Vì thông tin từ họ dễ thu thập hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các nhóm yếu thế thường có nguy cơ bị bỏ lại phía sau cao nhất. Lắng nghe tiếng nói của họ giúp đảm bảo rằng các phân tích và giải pháp mang tính bao trùm và giải quyết được những bất bình đẳng sâu sắc nhất. [6741, 845]"}, {"level": "1", "content": "Khi áp dụng công cụ \"Ra quyết định\" trong phân tích giới, việc xác định \"Ai chịu tác động của quyết định?\" và \"Mức độ tác động tới mỗi giới ra sao?\" giúp làm gì?", "options": {"A": "Chỉ để tăng thêm số lượng câu hỏi cần trả lời.", "B": "Để hiểu rõ hơn về hậu quả tiềm ẩn của một quyết định đối với các nhóm nam và nữ khác nhau, từ đó cân nhắc tính công bằng và hiệu quả của quyết định đó.", "C": "Để tìm ra người có lỗi khi quyết định sai.", "D": "Để so sánh với các quyết định tương tự ở các quốc gia khác."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc phân tích ai chịu tác động và mức độ tác động giúp lường trước các hệ lụy về giới của một quyết định, đảm bảo rằng quyết định đó không vô tình gây hại hoặc làm gia tăng bất bình đẳng. [1214, 1216]"}, {"level": "1", "content": "Sự phụ thuộc của phụ nữ vào các nguồn tài nguyên thiên nhiên đang bị suy thoái (ví dụ, rừng để kiếm củi, nguồn nước bị ô nhiễm) có thể tạo ra một \"vòng luẩn quẩn đói nghèo mang tính giới\" như thế nào?", "options": {"A": "Phụ nữ sẽ có nhiều thời gian hơn để tìm kiếm các cơ hội kinh tế khác.", "B": "Suy thoái tài nguyên làm tăng gánh nặng công việc cho phụ nữ, giảm khả năng tạo thu nhập, ảnh hưởng sức khỏe, từ đó hạn chế cơ hội thoát nghèo của họ và con cái họ.", "C": "Nam giới sẽ chủ động chia sẻ gánh nặng này với phụ nữ.", "D": "Chính phủ sẽ tự động cung cấp các giải pháp thay thế hiệu quả."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khi tài nguyên khan hiếm, phụ nữ (người thường chịu trách nhiệm chính) phải tốn nhiều thời gian, công sức hơn, ảnh hưởng đến sức khỏe và khả năng tham gia các hoạt động kinh tế khác, duy trì vòng luẩn quẩn đói nghèo. [2785, 2786, 2787]"}, {"level": "1", "content": "Việc các chương trình thích ứng với biến đổi khí hậu ở Việt Nam có xu hướng tập trung nhiều vào đầu tư cơ sở hạ tầng mà ít hơn cho xây dựng năng lực, nghiên cứu khoa học công nghệ có thể ảnh hưởng đến phụ nữ như thế nào?", "options": {"A": "Giúp phụ nữ hưởng lợi tối đa vì cơ sở hạ tầng là quan trọng nhất.", "B": "Có thể hạn chế khả năng tiếp cận và hưởng lợi của phụ nữ, vì họ thường cần nhiều hơn các hỗ trợ về kiến thức, kỹ năng, thông tin và công nghệ phù hợp để thích ứng hiệu quả.", "C": "Không ảnh hưởng gì đến phụ nữ vì họ không tham gia vào các hoạt động này.", "D": "Sẽ làm tăng vai trò của phụ nữ trong việc xây dựng cơ sở hạ tầng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ thường cần các hỗ trợ \"mềm\" (kiến thức, kỹ năng, công nghệ phù hợp) để có thể tận dụng cơ sở hạ tầng và thích ứng hiệu quả. Việc chỉ tập trung vào hạ tầng \"cứng\" có thể bỏ qua những nhu cầu này. [2068, 2069]"}, {"level": "1", "content": "Trong bối cảnh GRB, việc một số chương trình mục tiêu quốc gia ở Việt Nam (như Chương trình 135) đã có \"Hướng dẫn thúc đẩy và thực hiện Ngân sách có trách nhiệm giới\" cho thấy điều gì?", "options": {"A": "GRB đã được áp dụng một cách hoàn hảo và không còn thách thức nào.", "B": "Đây là một nỗ lực tiên phong và cung cấp kinh nghiệm thực tiễn quý báu, nhưng việc nhân rộng và đảm bảo thực chất vẫn cần nhiều nỗ lực.", "C": "Các chương trình này không liên quan gì đến vấn đề giới.", "D": "Hướng dẫn này chỉ mang tính hình thức và không được áp dụng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là những sáng kiến quan trọng, cho thấy sự thừa nhận và nỗ lực ban đầu. Tuy nhiên, việc triển khai hiệu quả và nhân rộng ra các chương trình, lĩnh vực khác vẫn là một quá trình liên tục. [2100, 2101, 2102]"}, {"level": "1", "content": "\"Tài chính khí hậu có trách nhiệm giới\" (Gender-Responsive Climate Finance) nhằm mục đích gì?", "options": {"A": "Chỉ tài trợ cho các dự án khí hậu do phụ nữ lãnh đạo.", "B": "Đảm bảo rằng các nguồn vốn đầu tư cho thích ứng và giảm thiểu biến đổi khí hậu được phân bổ và sử dụng theo cách giải quyết được những thách thức và nhu cầu riêng biệt của phụ nữ, trẻ em gái và các cộng đồng bị thiệt thòi.", "C": "Tăng tổng số tiền tài trợ cho biến đổi khí hậu trên toàn cầu.", "D": "Chỉ tập trung vào việc trồng cây xanh."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mục tiêu là để các nguồn tài chính khí hậu không chỉ hiệu quả về mặt môi trường mà còn công bằng về mặt xã hội, giải quyết được các bất bình đẳng giới liên quan đến biến đổi khí hậu. [2037, 2038]"}, {"level": "1", "content": "Tại sao việc lồng ghép kiến thức bản địa của phụ nữ vào các giải pháp thích ứng với biến đổi khí hậu lại quan trọng?", "options": {"A": "Vì kiến thức bản địa luôn lỗi thời và cần được thay thế.", "B": "Vì phụ nữ thường có những hiểu biết sâu sắc, đã được thử thách qua thời gian về môi trường địa phương và các biện pháp ứng phó phù hợp, có thể bổ sung và làm phong phú cho các giải pháp khoa học.", "C": "Vì chỉ có phụ nữ mới quan tâm đến việc bảo vệ môi trường.", "D": "Vì điều này sẽ giúp các dự án tốn ít chi phí hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Kiến thức bản địa của phụ nữ là một nguồn tài nguyên quý giá, có thể cung cấp những giải pháp thích ứng hiệu quả, phù hợp với bối cảnh địa phương và tăng tính bền vững của các can thiệp. [2037, 2039, 2064, 2065]"}, {"level": "1", "content": "Một trong những hạn chế của việc sử dụng Chỉ số Phát triển Con người (HDI) để đánh giá bình đẳng giới là gì?", "options": {"A": "HDI không bao gồm các yếu tố về giáo dục và y tế.", "B": "HDI là một chỉ số trung bình quốc gia, có thể che giấu những bất bình đẳng giới và các bất bình đẳng khác trong nội bộ một quốc gia.", "C": "HDI chỉ đo lường sự phát triển kinh tế thuần túy.", "D": "HDI chỉ áp dụng cho các nước phát triển."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mặc dù HDI bao gồm các khía cạnh quan trọng của phát triển con người, việc nó là một chỉ số trung bình có thể không phản ánh được sự chênh lệch về thành tựu giữa nam và nữ, hoặc giữa các nhóm dân cư khác nhau trong một quốc gia. [4468, 471, 472]"}, {"level": "1", "content": "Sự khác biệt trong cách tiếp cận của Khung Harvard và Khung Moser đối với việc phân tích vai trò giới là gì?", "options": {"A": "Khung Harvard không xem xét vai trò giới, trong khi Khung Moser thì có.", "B": "Khung Harvard tập trung vào \"Hồ sơ hoạt động\" (ai làm gì), trong khi Khung Moser phân loại cụ thể thành ba vai trò (sản xuất, tái sản xuất, cộng đồng) và phân tích mối quan hệ giữa chúng.", "C": "Khung Moser đơn giản hơn Khung Harvard.", "D": "Cả hai khung đều có cách tiếp cận giống hệt nhau."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khung Harvard xác định các hoạt động, trong khi Khung Moser đi sâu hơn vào việc phân loại các hoạt động đó theo ba vai trò chính của phụ nữ và xem xét sự cân bằng hay xung đột giữa các vai trò này. [8930, 931]"}, {"level": "1", "content": "Tại sao các chính sách được coi là \"trung tính về giới\" trên giấy tờ vẫn có thể tạo ra hoặc củng cố bất bình đẳng giới trong thực tế?", "options": {"A": "Vì các chính sách này luôn có những điều khoản bí mật nhằm gây bất lợi cho một giới.", "B": "Vì chúng không tính đến những khác biệt hiện có về vị thế, quyền lực, vai trò và trách nhiệm giữa nam và nữ trong xã hội, khiến cho việc áp dụng \"như nhau\" lại tạo ra kết quả không như nhau.", "C": "Vì phụ nữ không hiểu đúng các chính sách này.", "D": "Vì nam giới luôn tìm cách lợi dụng các chính sách đó."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các chính sách \"trung tính về giới\" thường bỏ qua bối cảnh xã hội và các bất bình đẳng giới đã tồn tại. Khi áp dụng một cách đồng nhất cho các nhóm có xuất phát điểm và điều kiện khác nhau, chúng có thể vô tình làm gia tăng sự chênh lệch. [2010, 2330, 2331]"}, {"level": "1", "content": "Việc một dự án TN&MT chỉ tập trung vào các giải pháp kỹ thuật mà bỏ qua việc phân tích và giải quyết các rào cản về văn hóa, xã hội đối với sự tham gia của phụ nữ có thể dẫn đến:", "options": {"A": "Dự án sẽ đạt hiệu quả kỹ thuật cao nhất.", "B": "Các giải pháp kỹ thuật có thể không được cộng đồng (đặc biệt là phụ nữ) chấp nhận, áp dụng hoặc duy trì, làm giảm tính bền vững của dự án.", "C": "Phụ nữ sẽ tự tìm cách vượt qua các rào cản đó.", "D": "Các vấn đề văn hóa, xã hội không liên quan đến hiệu quả của dự án kỹ thuật."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các yếu tố văn hóa, xã hội có ảnh hưởng lớn đến hành vi và sự chấp nhận công nghệ. Bỏ qua chúng có thể khiến các giải pháp kỹ thuật, dù tốt, cũng không được áp dụng hoặc không phát huy hiệu quả. [2133, 2134]"}, {"level": "1", "content": "Trong phân tích GRB, tại sao việc xem xét cả \"thu ngân sách\" (chính sách thuế) chứ không chỉ \"chi ngân sách\" lại quan trọng?", "options": {"A": "Vì thu ngân sách luôn lớn hơn chi ngân sách.", "B": "Vì các chính sách thuế có thể có tác động phân phối lại thu nhập và gánh nặng khác nhau đối với nam và nữ, ảnh hưởng đến bình đẳng giới.", "C": "Vì việc tính toán chi ngân sách quá phức tạp.", "D": "Vì chỉ có chi ngân sách mới liên quan đến các chương trình xã hội."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Chính sách thuế (cách thức nhà nước thu tiền) cũng có những tác động giới quan trọng, ví dụ như gánh nặng thuế đối với các hộ gia đình có thu nhập khác nhau, hoặc các loại thuế ảnh hưởng đến các ngành nghề mà phụ nữ hay nam giới chiếm đa số. [1958, 1959, 1960]"}, {"level": "1", "content": "Khái niệm \"tính dễ bị tổn thương mang tính cấu trúc\" (structural vulnerability) của phụ nữ trước biến đổi khí hậu đề cập đến:", "options": {"A": "Phụ nữ có sức khỏe thể chất yếu hơn nam giới.", "B": "Các yếu tố mang tính hệ thống trong xã hội (như bất bình đẳng về quyền lực, tiếp cận nguồn lực, vai trò giới) khiến phụ nữ có ít khả năng đối phó và phục hồi hơn trước tác động của BĐKH.", "C": "Phụ nữ sống ở những vùng thường xuyên có thiên tai.", "D": "Phụ nữ không có khả năng học hỏi các biện pháp thích ứng mới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Tính dễ bị tổn thương này không chỉ do các yếu tố tự nhiên mà còn do các cấu trúc xã hội, kinh tế, chính trị đã đặt phụ nữ vào vị thế bất lợi hơn trong việc ứng phó với các cú sốc. [2008, 2010, 2808, 2809]"}, {"level": "1", "content": "Mục tiêu của việc \"lồng ghép giới một cách có hệ thống vào tất cả các quy trình ngân sách\" (theo OECD) trong GRB là gì?", "options": {"A": "Để tạo thêm nhiều quy trình hành chính phức tạp.", "B": "Để đảm bảo rằng các cân nhắc về giới không chỉ là một hoạt động riêng lẻ hay mang tính thời điểm, mà trở thành một phần không thể thiếu, một thông lệ chuẩn trong toàn bộ cách thức lập và quản lý ngân sách.", "C": "Để tất cả cán bộ làm ngân sách đều phải là chuyên gia về giới.", "D": "Để tăng chi tiêu cho các vấn đề của phụ nữ lên 50% tổng ngân sách."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lồng ghép có hệ thống nhằm mục đích tạo ra sự thay đổi bền vững trong văn hóa và quy trình làm việc, để các cân nhắc về giới được tự động tích hợp vào mọi quyết định ngân sách. [1945, 1946, 1947]"}, {"level": "1", "content": "Tại sao việc \"phân tích các nhóm nữ giới và nam giới khác nhau\" (ví dụ theo dân tộc, tuổi, vùng miền) lại quan trọng hơn là chỉ xem xét \"phụ nữ\" và \"nam giới\" như hai khối đồng nhất?", "options": {"A": "Vì nó giúp báo cáo phân tích giới trở nên chi tiết hơn một cách không cần thiết.", "B": "Vì trải nghiệm về bất bình đẳng giới và nhu cầu của phụ nữ (hoặc nam giới) không đồng nhất; các yếu tố khác như dân tộc, tuổi tác, địa vị kinh tế... tạo ra sự khác biệt lớn trong nhóm.", "C": "Vì làm như vậy sẽ tìm ra nhóm phụ nữ (hoặc nam giới) \"điển hình\" nhất.", "D": "Vì chỉ có một số nhóm phụ nữ (hoặc nam giới) nhất định mới cần được quan tâm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Cách tiếp cận giao thoa (intersectionality) thừa nhận rằng các hình thức bất bình đẳng khác nhau (giới, dân tộc, giai cấp...) có thể chồng chéo và tương tác, tạo ra những trải nghiệm và nhu cầu rất đa dạng ngay cả trong cùng một giới. [687, 755, 262681]"}, {"level": "1", "content": "Một dự án hỗ trợ nông dân áp dụng kỹ thuật canh tác mới. Đánh giá giới ban đầu cho thấy phụ nữ ít có thời gian tham gia tập huấn do bận việc nhà. Một giải pháp \"đáp ứng giới\" (gender-responsive) hiệu quả có thể là:", "options": {"A": "Chỉ tổ chức tập huấn cho nam giới vì họ có nhiều thời gian hơn.", "B": "Tổ chức các lớp tập huấn vào thời gian phù hợp với phụ nữ, ở địa điểm thuận tiện, và có thể cân nhắc hỗ trợ trông giữ trẻ.", "C": "Yêu cầu phụ nữ phải tự sắp xếp thời gian để tham gia như nam giới.", "D": "Giảm thời lượng các buổi tập huấn xuống còn một nửa."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Giải pháp đáp ứng giới sẽ chủ động tìm cách tháo gỡ các rào cản cụ thể mà phụ nữ gặp phải (trong trường hợp này là thời gian và trách nhiệm chăm sóc) để tạo điều kiện cho họ tham gia bình đẳng. [2168]"}, {"level": "1", "content": "Sự khác biệt giữa \"vai trò giới\" (gender roles) và \"khuôn mẫu giới\" (gender stereotypes) là gì?", "options": {"A": "Vai trò giới là những gì nam nữ thực sự làm, khuôn mẫu giới là những gì xã hội nghĩ họ nên làm.", "B": "Khuôn mẫu giới luôn tiêu cực, vai trò giới luôn tích cực.", "C": "Vai trò giới là bẩm sinh, khuôn mẫu giới là do học tập.", "D": "Hai khái niệm này hoàn toàn giống nhau."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> \"Vai trò giới\" mô tả các hành vi, công việc mà xã hội kỳ vọng hoặc coi là phù hợp với từng giới. \"Khuôn mẫu giới\" là những niềm tin hoặc giả định được chấp nhận rộng rãi (thường đơn giản hóa và khái quát hóa) về đặc điểm, phẩm chất của nam và nữ, định hướng cho các vai trò đó. [254, 257]"}, {"level": "1", "content": "Việc các nhà hoạch định chính sách chỉ dựa vào các chỉ số kinh tế vĩ mô truyền thống (GDP, GNI) mà bỏ qua các chỉ số như GII hay Khảo sát sử dụng thời gian có thể dẫn đến:", "options": {"A": "Các chính sách kinh tế luôn công bằng và hiệu quả.", "B": "Một bức tranh không đầy đủ và có thể sai lệch về thực trạng phát triển, đặc biệt là các khía cạnh bất bình đẳng giới và đóng góp của công việc không lương.", "C": "Sự phát triển nhanh chóng và bền vững của quốc gia.", "D": "Sự hài lòng của tất cả các nhóm dân cư."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Chỉ dựa vào GDP/GNI sẽ bỏ qua nhiều khía cạnh quan trọng của phúc lợi xã hội và bình đẳng giới. Các chỉ số bổ sung như GII và dữ liệu sử dụng thời gian cung cấp cái nhìn toàn diện hơn, giúp hoạch định chính sách tốt hơn. [435, 436, 438, 1970]"}, {"level": "1", "content": "Trong Khung Phân tích Giới của Jhpiego, yếu tố \"quyền lực\" được coi là chủ đề xuyên suốt bốn lĩnh vực phân tích. Điều này có ý nghĩa gì đối với việc thực hiện phân tích giới?", "options": {"A": "Chỉ cần tập trung phân tích những người có quyền lực trong xã hội.", "B": "Cần nhận diện và phân tích cách thức các mối quan hệ quyền lực giới (ví dụ, ai có quyền ra quyết định, ai kiểm soát nguồn lực) biểu hiện và tác động trong từng lĩnh vực (tiếp cận tài sản, chuẩn mực văn hóa, thể chế...).", "C": "Mục tiêu cuối cùng của phân tích giới là làm thay đổi hoàn toàn cấu trúc quyền lực hiện tại.", "D": "Các vấn đề về quyền lực không nên được đề cập trực tiếp trong phân tích giới vì quá nhạy cảm."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quyền lực giới là một yếu tố nền tảng, ảnh hưởng đến mọi khía cạnh được phân tích. Hiểu được động lực quyền lực giúp giải thích tại sao các bất bình đẳng lại tồn tại và làm thế nào để can thiệp hiệu quả. [2140]"}, {"level": "1", "content": "Một trong những thách thức lớn nhất của việc lồng ghép giới vào các chương trình phát triển nông thôn mới ở Việt Nam là:", "options": {"A": "Phụ nữ nông thôn không muốn tham gia.", "B": "Thiếu nguồn lực tài chính cho các hoạt động nông thôn mới.", "C": "Việc chuyển từ nhận thức và các quy định mang tính hình thức sang các hành động thực chất, có hệ thống và đo lường được tác động cụ thể về giới.", "D": "Nam giới phản đối mạnh mẽ việc lồng ghép giới."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Mặc dù có thể có các văn bản và mục tiêu đề ra, việc thực sự thay đổi cách làm, cách phân bổ nguồn lực và theo dõi kết quả về giới một cách thực chất là một thách thức lớn, đòi hỏi sự cam kết và năng lực cao hơn. [2404, 2405, 2416, 2417]"}, {"level": "1", "content": "Trong lĩnh vực tài nguyên khoáng sản, một can thiệp GRB có thể tập trung vào việc:", "options": {"A": "Tăng cường khai thác khoáng sản để tối đa hóa lợi nhuận.", "B": "Đảm bảo các quỹ phát triển cộng đồng từ nguồn thu khai khoáng có cơ chế phân bổ công bằng, có sự tham gia của phụ nữ và giải quyết các tác động tiêu cực đến họ.", "C": "Chỉ cho phép các công ty đa quốc gia lớn tham gia khai thác.", "D": "Hạn chế tối đa sự tham gia của cộng đồng địa phương để tránh xung đột."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GRB trong ngành khoáng sản sẽ xem xét cách thức chia sẻ lợi ích một cách công bằng, giảm thiểu tác động tiêu cực đến các nhóm dễ bị tổn thương (thường là phụ nữ và cộng đồng địa phương), và đảm bảo sự tham gia của họ. [2031, 2032, 2033]"}, {"level": "1", "content": "Để phá vỡ \"vòng luẩn quẩn của sự vô hình\" đối với đóng góp kinh tế của phụ nữ (do công việc không lương không được tính vào GDP, dẫn đến ít được hỗ trợ), cần có giải pháp nào mang tính cấu trúc?", "options": {"A": "Khuyến khích phụ nữ làm thêm nhiều giờ hơn trong các công việc được trả lương.", "B": "Công nhận, đo lường giá trị của công việc không lương và thúc đẩy sự chia sẻ công bằng trách nhiệm này, đồng thời đầu tư vào các dịch vụ hỗ trợ (chăm sóc trẻ, người già).", "C": "Tăng thuế đối với các hộ gia đình có phụ nữ không đi làm.", "D": "Chỉ tập trung vào việc nâng cao kỹ năng cho phụ nữ để họ có thể làm các công việc có thu nhập cao."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Giải pháp mang tính cấu trúc đòi hỏi phải thay đổi cách xã hội nhìn nhận và định giá công việc chăm sóc không lương, đồng thời tạo điều kiện (thông qua chính sách và dịch vụ) để giảm bớt gánh nặng này cho phụ nữ và khuyến khích sự chia sẻ. [348, 349, 350, 351, 352] CHƯƠNG 1 & 2: TỔNG QUAN VÀ THỂ CHẾ (NÂNG CAO - PHẦN 3)"}, {"level": "1", "content": "Việc các lý thuyết phát triển kinh tế ban đầu (cổ điển, tân cổ điển) ít đề cập đến giới có thể được giải thích một phần bởi \"thiên kiến nam\" (male bias) trong nghiên cứu. \"Thiên kiến nam\" ở đây có nghĩa là:", "options": {"A": "Các nhà kinh tế nam giới cố tình loại bỏ phụ nữ khỏi phân tích.", "B": "Các mô hình và giả định lý thuyết thường ngầm dựa trên kinh nghiệm, vai trò và hành vi của nam giới trong khu vực kinh tế thị trường, coi đó là chuẩn mực.", "C": "Chỉ có nam giới mới có khả năng hiểu được các lý thuyết kinh tế phức tạp.", "D": "Các lý thuyết này chỉ tập trung vào các quốc gia do nam giới lãnh đạo."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> \"Thiên kiến nam\" trong các lý thuyết truyền thống không nhất thiết là sự cố tình loại trừ, mà thường là việc các nhà nghiên cứu (chủ yếu là nam giới trong giai đoạn đó) xây dựng các mô hình dựa trên kinh nghiệm và chuẩn mực của nam giới trong xã hội, vô tình bỏ qua hoặc xem nhẹ vai trò và kinh nghiệm của phụ nữ. [374, 379, 383]"}, {"level": "1", "content": "Tại sao cách tiếp cận GAD (Giới và Phát triển) lại nhấn mạnh tầm quan trọng của việc thu hút nam giới tham gia vào các nỗ lực thúc đẩy bình đẳng giới?", "options": {"A": "Vì nam giới cần được \"giáo dục lại\" về vai trò của họ.", "B": "Vì việc thay đổi các mối quan hệ giới bất bình đẳng đòi hỏi sự thay đổi trong nhận thức, thái độ và hành vi của cả nam và nữ, cũng như sự ủng hộ của nam giới đối với các mục tiêu bình đẳng.", "C": "Vì các dự án có sự tham gia của nam giới sẽ dễ được tài trợ hơn.", "D": "Vì GAD cho rằng nam giới mới là người có khả năng giải quyết các vấn đề bất bình đẳng giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GAD nhận thấy rằng bình đẳng giới không chỉ là \"vấn đề của phụ nữ\". Việc thay đổi các cấu trúc và chuẩn mực giới bất bình đẳng đòi hỏi sự tham gia và cam kết của cả nam giới, vì họ cũng là một phần của các mối quan hệ giới đó và có thể là những đồng minh quan trọng. [415]"}, {"level": "1", "content": "Hạn chế chính của Chỉ số Phát triển theo Giới (GDI) khi được tính bằng tỷ lệ giữa HDI của nữ và HDI của nam là gì?", "options": {"A": "Nó không cho biết mức độ phát triển con người chung của quốc gia.", "B": "Nó có thể che giấu những bất bình đẳng lớn trong từng thành phần của HDI (ví dụ, phụ nữ có thể có tuổi thọ cao hơn nhưng thu nhập lại thấp hơn nhiều).", "C": "Nó quá phức tạp để tính toán và so sánh giữa các quốc gia.", "D": "Nó không tính đến các yếu tố như sức khỏe sinh sản hay bạo lực giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mặc dù GDI cho thấy khoảng cách tổng thể về HDI giữa nam và nữ, nó không phản ánh được sự khác biệt và bất bình đẳng có thể rất lớn trong từng thành phần cụ thể (sức khỏe, giáo dục, thu nhập) cấu thành nên HDI của mỗi giới. [4483]"}, {"level": "1", "content": "Việc pháp luật Việt Nam (ví dụ, Luật Bình đẳng giới 2006) định nghĩa rõ ràng \"Giới\" là các đặc điểm, vị trí, vai trò xã hội có thể thay đổi, mang ý nghĩa pháp lý như thế nào đối với các can thiệp chính sách?", "options": {"A": "Nó hạn chế khả năng của nhà nước trong việc can thiệp vào các vấn đề giới vì đây là vấn đề văn hóa.", "B": "Nó tạo cơ sở pháp lý cho việc xây dựng và thực thi các chính sách nhằm thay đổi các chuẩn mực và cấu trúc xã hội bất bình đẳng, vì những yếu tố này không phải là \"định mệnh\" sinh học.", "C": "Nó yêu cầu tất cả nam và nữ phải có vai trò giống hệt nhau trong xã hội.", "D": "Nó không có nhiều ý nghĩa vì luật pháp thường không ảnh hưởng đến các chuẩn mực xã hội."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khi luật pháp thừa nhận \"Giới\" là một cấu trúc xã hội có thể thay đổi, nó mở đường và hợp pháp hóa các nỗ lực chính sách nhằm tác động và biến đổi các cấu trúc và chuẩn mực đó theo hướng công bằng hơn, thay vì chấp nhận chúng là bất biến. [244, 245]"}, {"level": "1", "content": "Một trong những thách thức của việc áp dụng nguyên tắc \"công khai, minh bạch, trách nhiệm giải trình\" trong quản lý tài nguyên môi trường theo hướng nhạy cảm giới là gì?", "options": {"A": "Việc công khai thông tin sẽ khiến các công ty khai thác tài nguyên gặp khó khăn.", "B": "Cần có các cơ chế cụ thể để đảm bảo sự tham gia của phụ nữ và các nhóm yếu thế không chỉ mang tính hình thức, và việc giải trình phải bao gồm cả tác động giới của chính sách.", "C": "Các nguyên tắc này không phù hợp với bối cảnh văn hóa của nhiều địa phương.", "D": "Sẽ làm tăng đáng kể chi phí quản lý nhà nước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Để quản trị tốt thực sự nhạy cảm giới, không chỉ cần áp dụng các nguyên tắc một cách hình thức. Cần có các quy trình đảm bảo tiếng nói của phụ nữ được lắng nghe và các cơ quan phải giải trình về cách họ đã xem xét và giải quyết các tác động giới. [160, 13]"}, {"level": "1", "content": "Tại sao việc \"bình đẳng hóa cơ hội\" (đặc biệt về giáo dục và y tế cho các nhóm yếu thế) lại được coi là nền tảng hơn việc chỉ dựa vào các biện pháp tái phân phối thu nhập để giảm bất bình đẳng dài hạn?", "options": {"A": "Vì các biện pháp tái phân phối thu nhập không có tác dụng gì.", "B": "Vì bất bình đẳng cơ hội là gốc rễ của bất bình đẳng kết quả; việc đầu tư vào vốn nhân lực cho các nhóm yếu thế ngay từ đầu sẽ phá vỡ chu kỳ đói nghèo liên thế hệ và tạo ra sự thay đổi bền vững hơn.", "C": "Vì các chương trình giáo dục và y tế luôn rẻ hơn các chương trình tái phân phối.", "D": "Vì người nghèo không biết cách sử dụng tiền nếu được tái phân phối."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Bất bình đẳng về cơ hội (tiếp cận giáo dục, y tế chất lượng) thường dẫn đến bất bình đẳng về kết quả (thu nhập, tài sản) trong tương lai. Giải quyết tận gốc rào cản cơ hội có tác động lâu dài và bền vững hơn là chỉ can thiệp vào kết quả. [2684, 2685, 2686, 2687]"}, {"level": "1

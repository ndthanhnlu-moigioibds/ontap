 (thường bị bỏ qua và ảnh hưởng lớn đến phụ nữ) và ít bị \"thiên kiến giới tinh hoa\" hơn GEM (vốn tập trung nhiều vào sự tham gia ở các vị trí cấp cao). [484, 491, 492]", "C": "Vì GII chỉ đo lường sự bất bình đẳng trong kinh tế.", "D": "Vì GEM không còn được bất kỳ tổ chức nào sử dụng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GII được thiết kế để khắc phục một số hạn chế của GEM, bằng cách đưa vào các chỉ số về sức khỏe sinh sản (tử vong mẹ, sinh ở vị thành niên) và sử dụng các thước đo trao quyền và tham gia thị trường lao động ít bị giới hạn bởi sự tham gia của giới tinh hoa. [484, 491, 492]"}, {"level": "1", "content": "Khái niệm \"thể chế bao trùm\" (inclusive institutions) và \"thể chế khai thác\" (extractive institutions) của Acemoglu và Robinson có liên hệ như thế nào đến vấn đề bình đẳng giới và phát triển?", "options": {"A": "Thể chế bao trùm luôn đảm bảo bình đẳng giới tuyệt đối.", "B": "Thể chế khai thác, do tập trung quyền lực và lợi ích vào tay một nhóm nhỏ, thường đi kèm với việc loại trừ và gây bất lợi cho các nhóm yếu thế, bao gồm cả phụ nữ; trong khi thể chế bao trùm, với sự phân tán quyền lực và cơ hội rộng rãi hơn, có nhiều khả năng tạo điều kiện cho bình đẳng giới và phát triển bền vững hơn.", "C": "Chỉ có thể chế khai thác mới có thể thúc đẩy tăng trưởng kinh tế nhanh chóng.", "D": "Bình đẳng giới không liên quan đến loại hình thể chế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lý thuyết của Acemoglu và Robinson cho rằng thể chế bao trùm (khuyến khích sự tham gia rộng rãi, bảo vệ quyền sở hữu, tạo sân chơi bình đẳng) là nền tảng cho sự thịnh vượng dài hạn. Các thể chế như vậy cũng có nhiều khả năng thúc đẩy bình đẳng giới hơn so với các thể chế khai thác, nơi quyền lực và cơ hội bị giới hạn. (Tham khảo: \"Tại sao các quốc gia thất bại\" của Acemoglu và Robinson, và các phân tích về mối liên hệ giữa thể chế và giới)."}, {"level": "1", "content": "Sự giao thoa giữa các thể chế chính thức (ví dụ, luật pháp quy định quyền tiếp cận tín dụng bình đẳng) và các thể chế phi chính thức (ví dụ, các mạng lưới xã hội dựa trên giới tính hoặc các chuẩn mực văn hóa về việc ai nên quản lý tài chính) có thể ảnh hưởng đến khả năng tiếp cận tín dụng thực tế của phụ nữ như thế nào?", "options": {"A": "Luật pháp chính thức sẽ luôn đảm bảo phụ nữ tiếp cận tín dụng dễ dàng.", "B": "Ngay cả khi có luật pháp bình đẳng, các chuẩn mực văn hóa (ví dụ, phụ nữ không nên vay nợ, hoặc không được tin tưởng quản lý các khoản vay lớn) hoặc việc phụ nữ bị loại trừ khỏi các mạng lưới thông tin, quan hệ phi chính thức (nơi thông tin về cơ hội tín dụng có thể được chia sẻ) vẫn có thể tạo ra rào cản đáng kể. [13, 17, 2323, 2324, 2516, 2756]", "C": "Các thể chế phi chính thức không có vai trò gì trong việc tiếp cận tín dụng.", "D": "Phụ nữ sẽ chỉ dựa vào các kênh tín dụng chính thức."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc tiếp cận tín dụng không chỉ phụ thuộc vào các quy định pháp lý mà còn bị ảnh hưởng mạnh mẽ bởi các yếu tố văn hóa, xã hội và mạng lưới quan hệ. Các thể chế phi chính thức có thể củng cố hoặc làm suy yếu hiệu lực của thể chế chính thức. [13, 17, 2323, 2324, 2516, 2756]"}, {"level": "1", "content": "\"Nghịch lý giới trong giáo dục\" (gender paradox in education) ở một số quốc gia, nơi phụ nữ có trình độ học vấn ngang bằng hoặc thậm chí cao hơn nam giới nhưng vẫn đối mặt với bất bình đẳng lớn trên thị trường lao động (lương thấp hơn, ít cơ hội thăng tiến hơn), cho thấy điều gì?", "options": {"A": "Giáo dục không quan trọng đối với việc cải thiện vị thế của phụ nữ.", "B": "Thành tựu về bình đẳng giới trong giáo dục không tự động chuyển thành bình đẳng giới trên thị trường lao động; các yếu tố khác như phân biệt đối xử, định kiến giới, gánh nặng việc nhà và cấu trúc thị trường lao động vẫn đóng vai trò quan trọng.", "C": "Phụ nữ có trình độ học vấn cao thường không muốn làm các công việc có thu nhập cao.", "D": "Nam giới luôn được ưu tiên hơn trong giáo dục."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nghịch lý này cho thấy việc thu hẹp khoảng cách giới trong giáo dục là cần thiết nhưng chưa đủ. Cần phải giải quyết cả những rào cản và bất bình đẳng tồn tại trực tiếp trên thị trường lao động và trong xã hội. (Tham khảo: Các nghiên cứu của ILO, Ngân hàng Thế giới về giới và thị trường lao động)."}, {"level": "1", "content": "Tại sao việc phân tích \"chuỗi giá trị nông sản từ góc độ giới\" lại quan trọng hơn việc chỉ xem xét vai trò của phụ nữ trong khâu sản xuất?", "options": {"A": "Vì các khâu khác trong chuỗi giá trị không có sự tham gia của phụ nữ.", "B": "Vì nó giúp làm rõ sự phân công lao động theo giới, quyền lực, và sự phân bổ lợi ích ở từng mắt xích khác nhau (từ cung ứng đầu vào, sản xuất, chế biến, đến tiếp thị và tiêu thụ), từ đó xác định các điểm nghẽn và cơ hội để nâng cao giá trị và trao quyền cho phụ nữ trong toàn chuỗi. [222279, 2281]", "C": "Vì khâu sản xuất không mang lại giá trị kinh tế nào.", "D": "Vì chỉ có nam giới mới tham gia vào các khâu chế biến và tiếp thị."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phân tích chuỗi giá trị từ góc độ giới giúp nhìn nhận một cách toàn diện hơn về sự tham gia và hưởng lợi của phụ nữ, không chỉ giới hạn ở vai trò sản xuất mà còn ở các khâu khác có thể mang lại giá trị gia tăng cao hơn hoặc nơi họ đang gặp bất lợi. [222279, 2281]"}, {"level": "1", "content": "Trong bối cảnh quản lý tài nguyên dựa vào cộng đồng, việc các quy ước, luật tục của cộng đồng (thể chế phi chính thức) đôi khi được ưu tiên hơn hoặc thậm chí mâu thuẫn với luật pháp nhà nước (thể chế chính thức) về quyền của phụ nữ, đặt ra thách thức gì cho các can thiệp nhằm thúc đẩy bình đẳng giới?", "options": {"A": "Không có thách thức gì vì luật pháp nhà nước luôn được tuân thủ.", "B": "Các can thiệp không chỉ cần dựa vào việc thay đổi luật pháp mà còn phải tác động đến việc thay đổi các chuẩn mực văn hóa, tập quán xã hội thông qua đối thoại, nâng cao nhận thức và xây dựng sự đồng thuận trong cộng đồng, một quá trình thường phức tạp và lâu dài. [13, 17, 57, 58, 70, 71]", "C": "Chỉ cần bãi bỏ tất cả các luật tục của cộng đồng.", "D": "Chỉ nên làm việc với các nhà lãnh đạo cộng đồng là nam giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc thay đổi các thể chế phi chính thức đã ăn sâu đòi hỏi một cách tiếp cận kiên trì, nhạy cảm văn hóa và có sự tham gia của cộng đồng, chứ không chỉ đơn thuần là áp đặt các quy định pháp lý từ bên ngoài. [13, 17, 57, 58, 70, 71]"}, {"level": "1", "content": "Khái niệm \"đồng lợi ích\" (co-benefits) trong các dự án ứng phó với biến đổi khí hậu có thể được liên kết với lồng ghép giới như thế nào?", "options": {"A": "Các dự án BĐKH chỉ nên tập trung vào lợi ích môi trường, không nên có các mục tiêu xã hội.", "B": "Việc lồng ghép giới hiệu quả vào các dự án BĐKH (ví dụ, trao quyền cho phụ nữ tham gia quản lý tài nguyên, hỗ trợ sinh kế bền vững cho họ) không chỉ giúp tăng cường khả năng thích ứng và giảm thiểu BĐKH (lợi ích chính) mà còn mang lại các lợi ích phụ về bình đẳng giới, cải thiện phúc lợi xã hội và kinh tế (đồng lợi ích).", "C": "Lồng ghép giới sẽ làm giảm các lợi ích về môi trường của dự án.", "D": "Chỉ có phụ nữ mới được hưởng \"đồng lợi ích\"."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nhiều can thiệp BĐKH khi được thiết kế nhạy cảm giới có thể đồng thời đạt được cả mục tiêu về khí hậu và mục tiêu về bình đẳng giới, tạo ra những tác động tích cực kép. (Tham khảo: Các tài liệu của UNFCCC, GEF về đồng lợi ích và giới)."}, {"level": "1", "content": "Việc một số ngành kinh tế xanh (ví dụ, nông nghiệp hữu cơ, du lịch sinh thái) có tỷ lệ tham gia cao của phụ nữ nhưng mức lương và vị thế của họ trong các ngành này vẫn thấp hơn nam giới, cho thấy điều gì về mối quan hệ giữa \"kinh tế xanh\" và \"bình đẳng giới\"?", "options": {"A": "Kinh tế xanh tự động dẫn đến bình đẳng giới.", "B": "Sự tham gia của phụ nữ vào kinh tế xanh là quan trọng, nhưng nếu không đi kèm với việc giải quyết các bất bình đẳng về tiền lương, cơ hội thăng tiến, quyền ra quyết định và phân công lao động theo giới, thì kinh tế xanh vẫn có thể tái tạo các mô hình bất bình đẳng hiện có. [26, 27, 28, 186, 187, 188, 189, 190]", "C": "Phụ nữ không phù hợp với các ngành kinh tế xanh.", "D": "Chỉ có nam giới mới có thể lãnh đạo các doanh nghiệp xanh."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Kinh tế xanh mang lại cơ hội, nhưng không tự động đảm bảo bình đẳng giới. Cần có những nỗ lực chủ động để đảm bảo phụ nữ được hưởng lợi công bằng và có vị thế tương xứng trong các ngành này. [26, 27, 28, 186, 187, 188, 189, 190]"}, {"level": "1", "content": "\"Quyền lực mềm\" (soft power) và \"quyền lực cứng\" (hard power) trong bối cảnh phân tích giới và ra quyết định có thể được hiểu như thế nào?", "options": {"A": "Quyền lực mềm là của phụ nữ, quyền lực cứng là của nam giới.", "B": "Quyền lực cứng liên quan đến khả năng áp đặt, kiểm soát trực tiếp (ví dụ, thông qua vị trí chính thức, quyền sở hữu tài sản), trong khi quyền lực mềm liên quan đến khả năng gây ảnh hưởng, thuyết phục, định hình chuẩn mực và nhận thức (ví dụ, thông qua mạng lưới, kiến thức, uy tín cá nhân). Phụ nữ có thể có ít quyền lực cứng hơn nhưng vẫn có thể sử dụng quyền lực mềm, mặc dù cả hai đều quan trọng.", "C": "Quyền lực mềm không có tác dụng gì trong việc ra quyết định.", "D": "Chỉ có quyền lực cứng mới thực sự là quyền lực."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Cả hai dạng quyền lực đều có vai trò trong việc định hình các quyết định và mối quan hệ giới. Việc phân tích cần xem xét cả hai khía cạnh này và cách chúng tương tác. (Tham khảo: Các khái niệm về quyền lực trong khoa học chính trị và xã hội học, áp dụng vào phân tích giới)."}, {"level": "1", "content": "Tại sao việc chỉ tập trung vào \"số lượng\" phụ nữ tham gia các ban quản lý tài nguyên cộng đồng là chưa đủ để đánh giá mức độ lồng ghép giới hiệu quả?", "options": {"A": "Vì số lượng không quan trọng bằng chất lượng nam giới tham gia.", "B": "Vì \"chất lượng\" của sự tham gia (ví dụ, liệu họ có thực sự được lắng nghe, có ảnh hưởng đến quyết định, có được hỗ trợ để phát huy vai trò hay không) quan trọng hơn là chỉ có mặt hình thức. [20, 21, 38, 141, 142, 2281]", "C": "Vì các ban quản lý này không có thực quyền.", "D": "Vì phụ nữ thường không muốn tham gia vào các vị trí quản lý."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự tham gia có ý nghĩa đòi hỏi không chỉ sự hiện diện về số lượng mà còn cả tiếng nói, ảnh hưởng và khả năng thực thi vai trò một cách hiệu quả. [20, 21, 38, 141, 142, 2281]"}, {"level": "1", "content": "Khung Ba vai trò của Moser (sản xuất, tái sản xuất, cộng đồng) khi áp dụng để phân tích gánh nặng công việc của phụ nữ trong bối cảnh biến đổi khí hậu, có thể cho thấy điều gì nếu không có các biện pháp thích ứng nhạy cảm giới?", "options": {"A": "Vai trò sản xuất của phụ nữ sẽ giảm đi đáng kể.", "B": "Gánh nặng trong cả ba vai trò của phụ nữ đều có thể tăng lên: vai trò sản xuất bị ảnh hưởng do mất mùa, năng suất giảm; vai trò tái sản xuất tăng do phải chăm sóc người ốm nhiều hơn, đi lấy nước/củi xa hơn; vai trò cộng đồng cũng có thể tăng do tham gia các hoạt động ứng phó khẩn cấp. [931, 932, 935, 941, 942, 208, 2777]", "C": "Chỉ có vai trò cộng đồng của phụ nữ tăng lên.", "D": "Biến đổi khí hậu không ảnh hưởng đến sự phân công vai trò giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> BĐKH có thể làm trầm trọng thêm gánh nặng công việc của phụ nữ trên tất cả các vai trò do sự suy giảm tài nguyên, ảnh hưởng sức khỏe và gia tăng các công việc chăm sóc, ứng phó. [931, 932, 935, 941, 942, 208, 2777]"}, {"level": "1", "content": "\"Chi phí cơ hội\" của việc phụ nữ dành quá nhiều thời gian cho công việc chăm sóc không lương là gì, xét từ góc độ phát triển kinh tế quốc gia?", "options": {"A": "Không có chi phí cơ hội nào vì đây là việc làm tự nguyện.", "B": "Là sự mất mát tiềm năng về năng suất lao động, sự tham gia vào thị trường lao động được trả lương, khả năng đổi mới sáng tạo và đóng góp vào GDP của một bộ phận lớn dân số, cũng như tác động đến việc tích lũy vốn nhân lực cho thế hệ tương lai. [40, 348, 349, 350]", "C": "Chỉ là chi phí mua sắm các vật dụng gia đình.", "D": "Chỉ ảnh hưởng đến thu nhập cá nhân của phụ nữ, không ảnh hưởng đến kinh tế quốc gia."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thời gian dành cho công việc không lương là thời gian không thể dành cho các hoạt động kinh tế tạo ra thu nhập hoặc nâng cao kỹ năng. Điều này có nghĩa là một phần lớn tiềm năng kinh tế của phụ nữ không được khai thác, gây tổn thất cho cả cá nhân họ và nền kinh tế nói chung. [40, 348, 349, 350]"}, {"level": "1", "content": "Trong Đánh giá giới (GA), việc phân tích \"các yếu tố cản trở và thuận lợi\" (Bước 7 trong quy trình của Jhpiego) [2151] có mục đích gì đối với việc xây dựng Kế hoạch hành động giới (GAP)?", "options": {"A": "Chỉ để liệt kê tất cả các khó khăn có thể gặp phải.", "B": "Để xác định những yếu tố nào trong bối cảnh (văn hóa, xã hội, kinh tế, thể chế) có thể hỗ trợ hoặc cản trở việc đạt được các mục tiêu bình đẳng giới, từ đó GAP có thể xây dựng các chiến lược để tận dụng yếu tố thuận lợi và giảm thiểu/vượt qua yếu tố cản trở. [2151]", "C": "Để chứng minh rằng không thể thực hiện được GAP.", "D": "Chỉ để làm cho báo cáo GA dài hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Bước này giúp GAP trở nên thực tế và có chiến lược hơn, bằng cách lường trước những thách thức và tận dụng những cơ hội có sẵn trong bối cảnh cụ thể. [2151]"}, {"level": "1", "content": "Sự khác biệt giữa việc một chính sách \"trung tính về giới\" (gender-neutral) và một chính sách \"mù giới\" (gender-blind) là gì, mặc dù cả hai đều có thể không giải quyết được bất bình đẳng giới?", "options": {"A": "Chính sách trung tính về giới cố tình gây hại cho phụ nữ, chính sách mù giới thì không.", "B": "Chính sách \"trung tính về giới\" có thể được thiết kế với giả định rằng nó sẽ tác động như nhau đến các giới (dù thực tế có thể không phải vậy), trong khi chính sách \"mù giới\" hoàn toàn không xem xét đến yếu tố giới hoặc sự khác biệt giữa các giới trong quá trình xây dựng.", "C": "Không có sự khác biệt nào, chúng là một.", "D": "Chính sách mù giới luôn tốt hơn chính sách trung tính về giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> \"Mù giới\" thể hiện sự thiếu nhận thức hoàn toàn về các khía cạnh giới. \"Trung tính về giới\" có thể nhận thức được sự tồn tại của các giới nhưng lại giả định sai lầm rằng một chính sách áp dụng chung sẽ có tác động như nhau, bỏ qua những bất bình đẳng nền tảng. Cả hai đều có thể dẫn đến kết quả bất lợi cho bình đẳng giới. (Tham khảo: Các thuật ngữ trong phân tích chính sách giới)."}, {"level": "1", "content": "Khi Khung Moser đề cập đến \"Hoạch định giúp cân bằng ba vai trò\" (Công cụ 4) [941, 1003], điều này ngụ ý rằng các can thiệp phát triển cần phải:", "options": {"A": "Giúp phụ nữ thực hiện tốt hơn cả ba vai trò cùng một lúc.", "B": "Xem xét liệu việc tăng cường một vai trò (ví dụ, vai trò sản xuất thông qua một dự án tạo thu nhập) có làm tăng thêm gánh nặng không tương xứng cho các vai trò khác (tái sản xuất, cộng đồng) hay không, và tìm cách giảm thiểu sự mất cân bằng đó. [941, 942, 1003, 1004]", "C": "Khuyến khích phụ nữ từ bỏ vai trò tái sản xuất để tập trung vào sản xuất.", "D": "Chỉ tập trung vào vai trò cộng đồng của phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mục tiêu là đảm bảo rằng các can thiệp không vô tình làm tăng gánh nặng tổng thể cho phụ nữ bằng cách chỉ tập trung vào một vai trò mà bỏ qua các vai trò khác, mà cần tìm cách hỗ trợ sự cân bằng và giảm tải. [941, 942, 1003, 1004]"}, {"level": "1", "content": "Việc \"minh bạch hóa\" các dòng ngân sách (ví dụ, công khai các khoản chi cho các chương trình TN&MT) có thể hỗ trợ việc thực hiện GRB như thế nào, ngay cả khi chưa có phân tích giới chi tiết?", "options": {"A": "Không hỗ trợ gì vì minh bạch không liên quan đến giới.", "B": "Nó tạo điều kiện cho các tổ chức xã hội, nhà nghiên cứu và công chúng có thể tự thực hiện các phân tích ban đầu về việc liệu các khoản chi có tiềm năng tác động đến giới hay không, từ đó đặt câu hỏi và yêu cầu trách nhiệm giải trình cao hơn từ các cơ quan nhà nước. [1912, 1916, 2227]", "C": "Sẽ tự động làm cho ngân sách trở nên có trách nhiệm giới.", "D": "Chỉ có lợi cho các nhà thầu muốn tìm kiếm cơ hội."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Minh bạch là bước đầu tiên quan trọng. Khi thông tin ngân sách được công khai, nó mở ra cơ hội cho các bên liên quan có thể soi chiếu, phân tích và đặt câu hỏi về các khía cạnh giới, ngay cả khi các cơ quan nhà nước chưa chủ động thực hiện GRB một cách đầy đủ. [1912, 1916, 2227]"}, {"level": "1", "content": "Trong bối cảnh \"thay đổi nhận thức, thái độ và hành vi về giới\" [59], tại sao việc chỉ tập trung vào việc thay đổi nhận thức của phụ nữ là chưa đủ?", "options": {"A": "Vì phụ nữ không có khả năng thay đổi nhận thức.", "B": "Vì các định kiến và khuôn mẫu giới được duy trì và tái tạo bởi cả nam giới, các thể chế xã hội và các chuẩn mực văn hóa chung; do đó, cần phải có sự thay đổi nhận thức và hành vi ở tất cả các đối tượng, đặc biệt là nam giới và những người có vị thế ảnh hưởng. [59, 66, 67]", "C": "Vì nam giới không có định kiến giới nào.", "D": "Vì nhận thức không liên quan đến hành vi."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Bình đẳng giới đòi hỏi sự thay đổi từ cả hai phía và từ toàn xã hội. Việc chỉ tập trung vào phụ nữ mà bỏ qua vai trò và trách nhiệm của nam giới cũng như các yếu tố cấu trúc sẽ không mang lại sự thay đổi bền vững. [59, 66, 67]"}];
        let quizData = [];
        let currentIndex = 0;

        window.onload = function() {
            if(!allData || allData.length === 0) {
                document.getElementById("quiz-container").innerHTML = "<h3 style='color:red; text-align:center;'>Lỗi: Không có dữ liệu câu hỏi!</h3>";
                return;
            }
            quizData = getSampledQuestions(100);
            renderQuestion();
        };

        // Thuật toán lấy mẫu 100 câu theo Thang đo Bloom
        function getSampledQuestions(count) {
            const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
            const filterLvl = (l) => allData.filter(q => String(q.level) === String(l));
            
            let p1 = shuffle(filterLvl("1")); let p2 = shuffle(filterLvl("2"));
            let p3 = shuffle(filterLvl("3")); let p4 = shuffle(filterLvl("4")); let p5 = shuffle(filterLvl("5"));

            let n1 = Math.round(count * 0.25); let n2 = Math.round(count * 0.25);
            let n3 = Math.round(count * 0.20); let n4 = Math.round(count * 0.20);
            let n5 = count - (n1 + n2 + n3 + n4);

            let selected = [ ...p1.splice(0, n1), ...p2.splice(0, n2), ...p3.splice(0, n3), ...p4.splice(0, n4), ...p5.splice(0, n5) ];

            if(selected.length < count) {
                let remain = shuffle([...p1, ...p2, ...p3, ...p4, ...p5]);
                selected = [...selected, ...remain.splice(0, count - selected.length)];
            }
            return shuffle(selected);
        }

        // Render câu hỏi lên màn hình
        function renderQuestion() {
            const q = quizData[currentIndex];
            const isMulti = q.content.includes("[*]");
            document.getElementById("progress-text").innerText = `Câu ${currentIndex + 1} / ${quizData.length}`;
            
            let optHtml = "";
            let hasOptions = false;
            
            ['A','B','C','D'].forEach(lbl => {
                if(q.options && q.options[lbl]) {
                    hasOptions = true;
                    optHtml += `
                        <label class="option-item" id="label-${lbl}">
                            <input type="${isMulti ? 'checkbox' : 'radio'}" name="q_opt" value="${lbl}" onchange="updateSelection()">
                            <b>${lbl}.</b> ${q.options[lbl]}
                        </label>`;
                }
            });

            if(!hasOptions) {
                optHtml = "<div style='color:red; background:#ffebee; padding:10px; border-radius:5px;'><i>⚠️ Lỗi: Không trích xuất được đáp án. Trong Word, anh hãy tự gõ A., B., C., D. (tắt tính năng đánh số tự động).</i></div>";
            }

            document.getElementById("quiz-container").innerHTML = `
                <div class="card">
                    <div class="q-meta">MỨC ĐỘ THỬ THÁCH: ${q.level || '1'}</div>
                    <div class="q-text">${q.content.replace(/\[\*\]/g, "").replace(/\n/g, '<br>')}</div>
                    <div class="options">${optHtml}</div>
                    
                    <button id="btn-check" class="btn-check-inline" onclick="checkAnswer()">Kiểm tra đáp án</button>
                    
                    <div id="exp-box" class="exp-box"></div>
                </div>`;
            window.scrollTo(0,0);
        }

        // Cập nhật viền xanh khi chạm chọn đáp án
        function updateSelection() {
            document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
            document.querySelectorAll('input:checked').forEach(el => el.parentElement.classList.add('selected'));
        }

        // Xử lý logic Nút Kiểm Tra
        function checkAnswer() {
            const q = quizData[currentIndex];
            const box = document.getElementById("exp-box");
            const btn = document.getElementById("btn-check");
            
            // Gom các đáp án đã chọn
            const checkedInputs = document.querySelectorAll('input[name="q_opt"]:checked');
            const selectedVals = Array.from(checkedInputs).map(i => i.value).sort().join(",");
            
            if (!selectedVals) {
                alert("⚠️ Vui lòng chọn một phương án trước khi kiểm tra!");
                return;
            }

            // Ẩn nút kiểm tra, hiện Box giải thích
            btn.style.display = "none";
            box.style.display = "block";

            let resultTitle = "";
            // Kiểm tra đúng sai
            if (selectedVals === q.answer) {
                resultTitle = `<div class="result-title" style="color: var(--success);">✔ CHÍNH XÁC!</div>`;
                box.style.borderLeftColor = "var(--success)";
            } else {
                resultTitle = `<div class="result-title" style="color: var(--error);">✘ SAI RỒI! (Bạn chọn: ${selectedVals})</div>`;
                box.style.borderLeftColor = "var(--error)";
            }

            // Tô màu các lựa chọn A, B, C, D
            ['A','B','C','D'].forEach(lbl => {
                const el = document.getElementById(`label-${lbl}`);
                if(!el) return;
                
                // Tô xanh đáp án đúng của hệ thống
                if(q.answer.includes(lbl)) {
                    el.classList.add('correct-ans');
                } 
                // Tô đỏ đáp án sai mà người dùng chọn
                else if(selectedVals.includes(lbl)) {
                    el.classList.add('wrong-ans');
                }
                
                // Vô hiệu hóa input để không cho click đổi nữa
                const input = el.querySelector('input');
                if(input) input.disabled = true;
            });

            // Gắn nội dung vào Box
            box.innerHTML = `
                ${resultTitle}
                <div style="margin-bottom:12px; font-size:1.05em;"><b>Đáp án đúng:</b> <span style="color:var(--success); font-weight:bold">${q.answer}</span></div>
                <div>${q.explanation || "<i>Hệ thống chưa cập nhật giải thích cho câu này.</i>"}</div>
            `;

            // Tự động cuộn mượt mà xuống phần giải thích
            box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Điều hướng câu hỏi
        function nextQ() { if(currentIndex < quizData.length-1) { currentIndex++; renderQuestion(); } }
        function prevQ() { if(currentIndex > 0) { currentIndex--; renderQuestion(); } }
    </script>
</body>

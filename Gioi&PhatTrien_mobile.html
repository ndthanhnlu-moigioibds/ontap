    <script>
        const allData = [{"level": "1", "content": "Khái niệm nào sau đây chỉ các đặc điểm sinh học của nam và nữ?", "options": {"A": "Giới (Gender)", "B": "Giới tính (Sex)", "C": "Vai trò giới", "D": "Định kiến giới"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> \"Giới tính\" (Sex) đề cập đến các đặc điểm sinh học bẩm sinh phân biệt nam và nữ, trong khi \"Giới\" (Gender) là các vai trò, hành vi, và kỳ vọng do xã hội kiến tạo. (Tham khảo: Các giáo trình Xã hội học đại cương, hoặc các tài liệu về Giới và Phát triển của UN Women). [1]"}, {"level": "1", "content": "\"Đàn ông xây nhà, đàn bà xây tổ ấm\" là một ví dụ về:", "options": {"A": "Phân công lao động theo giới", "B": "Khuôn mẫu giới", "C": "Định kiến giới", "D": "Cả A, B và C"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> Câu nói này vừa phản ánh sự phân công lao động (nam giới làm việc lớn, nữ giới lo việc nhà), vừa là một khuôn mẫu (kỳ vọng xã hội về vai trò của mỗi giới), và cũng có thể trở thành định kiến nếu nó hạn chế cơ hội của các cá nhân không tuân theo khuôn mẫu đó. (Tham khảo: Các nghiên cứu về Giới và Văn hóa, Xã hội học Gia đình). [258]"}, {"level": "1", "content": "Mục tiêu nào KHÔNG phải là mục tiêu chính của phát triển kinh tế theo quan niệm hiện đại?", "options": {"A": "Tăng trưởng GDP/GNI bằng mọi giá", "B": "Xóa đói giảm nghèo", "C": "Phát triển con người (nâng cao sức khỏe, giáo dục, mức sống)", "D": "Phát triển bền vững (hài hòa kinh tế, xã hội, môi trường)"}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Phát triển kinh tế hiện đại không chỉ tập trung vào tăng trưởng GDP/GNI mà còn hướng đến các mục tiêu bao trùm hơn như phát triển con người và bền vững, đảm bảo chất lượng cuộc sống và công bằng xã hội. (Tham khảo: Các công trình của Amartya Sen về phát triển như tự do, các báo cáo Phát triển Con người của UNDP). [307, 308, 314]"}, {"level": "1", "content": "Chỉ số nào sau đây đo lường sự phát triển con người dựa trên tuổi thọ, giáo dục và thu nhập?", "options": {"A": "GDP (Tổng sản phẩm quốc nội)", "B": "GNI (Tổng thu nhập quốc dân)", "C": "HDI (Chỉ số Phát triển Con người)", "D": "GII (Chỉ số Bất bình đẳng giới)"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> HDI (Human Development Index) là một thước đo tổng hợp do UNDP phát triển, phản ánh thành tựu trung bình của một quốc gia về sức khỏe (tuổi thọ), giáo dục (số năm đi học) và mức sống (GNI bình quân đầu người). (Tham khảo: Các Báo cáo Phát triển Con người của UNDP). [217, 456]"}, {"level": "1", "content": "Sự \"vô hình\" của phụ nữ trong các lý thuyết phát triển kinh tế truyền thống chủ yếu là do:", "options": {"A": "Phụ nữ không tham gia vào các hoạt động kinh tế.", "B": "Các lý thuyết này không tính đến công việc không được trả lương và vai trò nội trợ của phụ nữ.", "C": "Phụ nữ không muốn được công nhận đóng góp của mình.", "D": "Các nhà kinh tế không thể thu thập dữ liệu về phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các lý thuyết phát triển truyền thống thường bỏ qua hoặc đánh giá thấp công việc chăm sóc không lương và các hoạt động kinh tế phi chính thức mà phụ nữ đảm nhận phần lớn, dẫn đến sự \"vô hình\" của họ. (Tham khảo: Các tác phẩm phê bình nữ quyền về kinh tế học, ví dụ của Marilyn Waring). [3377]"}, {"level": "1", "content": "Cách tiếp cận phát triển nào sau đây tập trung vào việc thay đổi các mối quan hệ giới bất bình đẳng và trao quyền cho phụ nữ như những tác nhân chủ động?", "options": {"A": "WID (Phụ nữ trong Phát triển)", "B": "WAD (Phụ nữ và Phát triển)", "C": "GAD (Giới và Phát triển)", "D": "Tất cả các cách tiếp cận trên đều có mục tiêu giống hệt nhau."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> GAD (Gender and Development) chuyển trọng tâm từ \"phụ nữ\" sang \"giới\", phân tích các mối quan hệ quyền lực và cấu trúc xã hội, hướng đến việc trao quyền và thay đổi các mối quan hệ giới bất bình đẳng. (Tham khảo: Các tài liệu về lịch sử các cách tiếp cận giới trong phát triển, ví dụ của Caroline Moser, Naila Kabeer). [411, 412, 413, 414]"}, {"level": "1", "content": "Chỉ số nào đo lường sự mất mát trong thành tựu phát triển con người do bất bình đẳng giới, dựa trên sức khỏe sinh sản, trao quyền và thị trường lao động?", "options": {"A": "GDI (Chỉ số Phát triển theo giới)", "B": "GII (Chỉ số Bất bình đẳng giới)", "C": "GEM (Thước đo Năng lực của phụ nữ)", "D": "HDI (Chỉ số Phát triển Con người)"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GII (Gender Inequality Index) được UNDP giới thiệu để đo lường những bất lợi của phụ nữ trên ba chiều kích: sức khỏe sinh sản, trao quyền và sự tham gia thị trường lao động. (Tham khảo: Các Báo cáo Phát triển Con người của UNDP từ năm 2010). [219, 483]"}, {"level": "1", "content": "Việc phân biệt giữa \"Giới\" (Gender) và \"Giới tính\" (Sex) quan trọng vì:", "options": {"A": "\"Giới\" là yếu tố sinh học không thể thay đổi, còn \"Giới tính\" có thể thay đổi.", "B": "Nó giúp nhận ra rằng nhiều khác biệt và bất bình đẳng giữa nam và nữ là do xã hội kiến tạo và có thể thay đổi được.", "C": "Nó khẳng định rằng mọi khác biệt giữa nam và nữ đều là do tự nhiên.", "D": "Nó không có nhiều ý nghĩa trong việc hoạch định chính sách."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phân biệt Giới (vai trò xã hội, có thể thay đổi) và Giới tính (đặc điểm sinh học) là nền tảng để hiểu rằng bất bình đẳng giới không phải là định mệnh và có thể được thay đổi thông qua các can thiệp xã hội và chính sách. (Tham khảo: Luật Bình đẳng giới Việt Nam, các tài liệu cơ bản về giới). [245, 246]"}, {"level": "1", "content": "\"Nhu cầu giới thực tế\" (Practical Gender Needs - PGN) KHÔNG bao gồm đặc điểm nào sau đây?", "options": {"A": "Phát sinh từ cuộc sống hàng ngày.", "B": "Khi được đáp ứng giúp thực hiện tốt vai trò giới hiện tại.", "C": "Thường thách thức và làm thay đổi sự phân công lao động theo giới truyền thống.", "D": "Ví dụ: nhu cầu về nước sạch, dinh dưỡng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nhu cầu giới thực tế (PGN) đáp ứng các nhu cầu trước mắt, giúp thực hiện vai trò giới hiện tại và thường không thách thức các cấu trúc giới. Việc thách thức và thay đổi phân công lao động thuộc về \"Nhu cầu giới chiến lược\" (SGN). (Tham khảo: Khung phân tích giới của Moser). [1242, 1243, 1244, 1248]"}, {"level": "1", "content": "\"Trao quyền cho phụ nữ\" (Women's Empowerment) KHÔNG nhất thiết bao gồm yếu tố nào?", "options": {"A": "Nâng cao ý thức về giá trị bản thân của phụ nữ.", "B": "Đảm bảo phụ nữ có thu nhập cao hơn nam giới.", "C": "Tăng cường khả năng tiếp cận các cơ hội và nguồn lực.", "D": "Nâng cao khả năng của phụ nữ trong việc ảnh hưởng đến các chiều hướng thay đổi xã hội."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trao quyền cho phụ nữ là một quá trình đa chiều nhằm tăng cường quyền lực và quyền kiểm soát của phụ nữ đối với cuộc sống của họ, không nhất thiết phải có thu nhập cao hơn nam giới mà là cơ hội và quyền lực bình đẳng. (Tham khảo: Định nghĩa của UN Women về trao quyền cho phụ nữ). [296, 297, 301]"}, {"level": "1", "content": "\"Thể chế\" theo nghĩa cốt lõi được hiểu là:", "options": {"A": "Các tòa nhà và cơ sở vật chất của chính phủ.", "B": "\"Luật chơi của xã hội\" bao gồm các quy tắc, luật lệ và chuẩn mực.", "C": "Các tổ chức và cơ quan nhà nước.", "D": "Các công nghệ và kỹ thuật được sử dụng trong quản lý."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Thể chế là hệ thống các quy tắc, luật lệ, và chuẩn mực (cả chính thức và phi chính thức) định hướng hành vi và tương tác trong xã hội. (Tham khảo: Các công trình của Douglass North về thể chế). [2]"}, {"level": "1", "content": "Ví dụ nào sau đây thuộc về \"thể chế phi chính thức\" ở Việt Nam?", "options": {"A": "Luật Đất đai.", "B": "Nghị định của Chính phủ.", "C": "Hương ước, quy ước của làng xã.", "D": "Hiến pháp."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Thể chế phi chính thức bao gồm các chuẩn mực, giá trị, phong tục, tập quán không được ghi thành văn bản pháp lý nhưng được cộng đồng chấp nhận và tuân theo, ví dụ như hương ước làng xã. (Tham khảo: Các nghiên cứu về văn hóa và thể chế ở Việt Nam). [11]"}, {"level": "1", "content": "Tình trạng pháp luật quy định quyền thừa kế bình đẳng cho cả nam và nữ, nhưng tập quán truyền thống vẫn ưu tiên con trai, cho thấy điều gì?", "options": {"A": "Thể chế chính thức luôn mạnh hơn thể chế phi chính thức.", "B": "Có sự mâu thuẫn hoặc thiếu ăn khớp giữa thể chế chính thức và phi chính thức.", "C": "Thể chế phi chính thức không có vai trò gì trong xã hội hiện đại.", "D": "Pháp luật luôn được người dân tuân thủ một cách tuyệt đối."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là ví dụ điển hình về sự tương tác, và đôi khi là xung đột, giữa \"pháp trị\" (luật pháp chính thức) và \"đức trị\" (chuẩn mực, tập quán phi chính thức). Thực tế này cho thấy luật pháp không phải lúc nào cũng thay đổi được ngay các tập quán đã ăn sâu. (Tham khảo: Các nghiên cứu về thực thi pháp luật và văn hóa pháp lý). [12, 16]"}, {"level": "1", "content": "Quan niệm \"đàn ông xây nhà, đàn bà xây tổ ấm\" có thể ảnh hưởng đến quyền của phụ nữ trong lĩnh vực đất đai như thế nào?", "options": {"A": "Giúp phụ nữ có nhiều quyền quyết định hơn về nhà cửa.", "B": "Có thể dẫn đến việc ưu tiên nam giới trong việc đứng tên và thừa kế đất đai, nhà ở.", "C": "Không có ảnh hưởng gì đến quyền đất đai.", "D": "Khuyến khích phụ nữ tham gia vào ngành xây dựng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Quan niệm này thuộc về khuôn mẫu giới, gắn vai trò trụ cột kinh tế và sở hữu tài sản lớn (như nhà, đất) cho nam giới, có thể dẫn đến sự bất lợi cho phụ nữ trong việc đảm bảo quyền đất đai. (Tham khảo: Các nghiên cứu về giới và quyền tài sản). [35]"}, {"level": "1", "content": "Trong quản lý rừng cộng đồng, nam giới thường chiếm ưu thế trong các hoạt động ra quyết định, trong khi phụ nữ (dù có kiến thức về lâm sản ngoài gỗ) lại ít có cơ hội tham gia. Điều này phản ánh:", "options": {"A": "Phụ nữ không quan tâm đến việc quản lý rừng.", "B": "Các định kiến giới và sự phân công vai trò truyền thống trong cộng đồng.", "C": "Nam giới luôn có kiến thức về rừng tốt hơn phụ nữ.", "D": "Pháp luật cấm phụ nữ tham gia quản lý rừng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự tham gia không đồng đều này thường bắt nguồn từ các định kiến giới (\"việc làng việc nước\" là của đàn ông) và gánh nặng công việc gia đình của phụ nữ, hạn chế cơ hội của họ. (Tham khảo: Các nghiên cứu về giới và quản lý tài nguyên dựa vào cộng đồng). [50, 51]"}, {"level": "1", "content": "Luật Đất đai 2024 của Việt Nam có điểm mới quan trọng nào liên quan đến bình đẳng giới?", "options": {"A": "Chỉ cho phép phụ nữ đứng tên trên Giấy chứng nhận quyền sử dụng đất.", "B": "Quy định \"hộ gia đình\" là đối tượng sử dụng đất duy nhất.", "C": "Lần đầu tiên nghiêm cấm hành vi \"phân biệt đối xử về giới trong quản lý, sử dụng đất đai\".", "D": "Giảm hạn mức nhận chuyển quyền sử dụng đất nông nghiệp của phụ nữ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Điều 11 Luật Đất đai 2024 đã bổ sung quy định cấm phân biệt đối xử về giới trong quản lý, sử dụng đất đai, đây là một bước tiến quan trọng về mặt pháp lý. (Tham khảo: Luật Đất đai 2024). [86]"}, {"level": "1", "content": "Việc \"lồng ghép giới\" vào các chiến lược, quy hoạch ngành tài nguyên môi trường nhằm mục đích gì?", "options": {"A": "Chỉ tập trung vào các dự án dành riêng cho phụ nữ.", "B": "Đảm bảo các chính sách công bằng, đáp ứng nhu cầu của cả nam và nữ, và hiệu quả.", "C": "Tăng ngân sách cho các hoạt động của Hội Phụ nữ.", "D": "Giảm vai trò của nam giới trong quản lý tài nguyên."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lồng ghép giới là một chiến lược nhằm tích hợp các quan điểm và nhu cầu của cả nam và nữ vào tất cả các giai đoạn của chính sách, chương trình để đảm bảo tính công bằng và hiệu quả. (Tham khảo: Các hướng dẫn về lồng ghép giới của UNDP, UN Women). [102]"}, {"level": "1", "content": "Quyền sử dụng đất không đảm bảo hoặc không chắc chắn có thể ảnh hưởng đến phụ nữ nông dân như thế nào?", "options": {"A": "Khuyến khích họ đầu tư dài hạn vào đất đai.", "B": "Hạn chế khả năng và động lực đầu tư, áp dụng canh tác bền vững, tiếp cận tín dụng.", "C": "Giúp họ dễ dàng chuyển đổi sang các ngành nghề phi nông nghiệp.", "D": "Tăng cường an ninh lương thực cho gia đình họ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khi quyền sử dụng đất không chắc chắn, phụ nữ (và cả nam giới) sẽ ngần ngại đầu tư dài hạn, cải tạo đất hoặc sử dụng đất làm tài sản thế chấp vay vốn, ảnh hưởng đến năng suất và sinh kế. (Tham khảo: Các nghiên cứu của FAO về đất đai và giới). [120, 121]"}, {"level": "1", "content": "Một trong những rào cản chính đối với sự tham gia của phụ nữ vào các vị trí lãnh đạo, quản lý trong lĩnh vực tài nguyên môi trường là:", "options": {"A": "Phụ nữ không có đủ trình độ học vấn.", "B": "Các quy định pháp luật cấm phụ nữ làm lãnh đạo.", "C": "Các định kiến giới và gánh nặng công việc gia đình không được chia sẻ.", "D": "Phụ nữ không quan tâm đến các vấn đề tài nguyên môi trường."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Định kiến về năng lực lãnh đạo của phụ nữ và gánh nặng \"công việc kép\" (việc làm và việc nhà) là những rào cản lớn hạn chế cơ hội thăng tiến và tham gia chính trị của phụ nữ. (Tham khảo: Các nghiên cứu về phụ nữ trong lãnh đạo và quản lý). [143, 144]"}, {"level": "1", "content": "Vai trò của các tổ chức xã hội như Hội LHPN Việt Nam trong việc thúc đẩy công bằng giới trong lĩnh vực tài nguyên môi trường là gì?", "options": {"A": "Chỉ tổ chức các hoạt động văn hóa, văn nghệ cho phụ nữ.", "B": "Vận động chính sách, nâng cao nhận thức, hỗ trợ phụ nữ ở cơ sở.", "C": "Thay thế vai trò của các cơ quan quản lý nhà nước.", "D": "Chỉ tập trung vào các vấn đề trong gia đình."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các tổ chức xã hội dân sự, đặc biệt là Hội LHPNVN, đóng vai trò quan trọng trong việc vận động chính sách, nâng cao nhận thức cộng đồng, và hỗ trợ phụ nữ thực hiện các quyền của mình. (Tham khảo: Các báo cáo hoạt động của Hội LHPN Việt Nam). [153, 154]"}, {"level": "1", "content": "Ngưỡng nghèo cùng cực quốc tế hiện nay do Ngân hàng Thế giới xác định là bao nhiêu (theo PPP 2017)?", "options": {"A": "$1.00/người/ngày", "B": "$2.15/người/ngày", "C": "$5.50/người/ngày", "D": "$10.00/người/ngày"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Ngân hàng Thế giới (WB) sử dụng ngưỡng $2.15/người/ngày (tính theo Sức mua tương đương - PPP năm 2017) để đo lường nghèo cùng cực trên toàn cầu. (Tham khảo: Các báo cáo về nghèo đói của Ngân hàng Thế giới). [2608]"}, {"level": "1", "content": "Chuẩn nghèo đa chiều của Việt Nam giai đoạn 2022-2025 KHÔNG bao gồm tiêu chí nào sau đây?", "options": {"A": "Tiêu chí thu nhập.", "B": "Tiêu chí mức độ thiếu hụt dịch vụ xã hội cơ bản (y tế, giáo dục, nhà ở...).", "C": "Tiêu chí sở hữu các thiết bị điện tử đắt tiền.", "D": "Tiêu chí mức độ thiếu hụt về việc làm, thông tin."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Chuẩn nghèo đa chiều của Việt Nam tập trung vào thu nhập và các thiếu hụt về dịch vụ xã hội cơ bản thiết yếu như việc làm, y tế, giáo dục, nhà ở, nước sạch & vệ sinh, và thông tin, chứ không dựa trên sở hữu hàng hóa xa xỉ. (Tham khảo: Quyết định của Thủ tướng Chính phủ về chuẩn nghèo đa chiều giai đoạn 2022-2025). [2622, 2624]"}, {"level": "1", "content": "\"Giới hóa đói nghèo\" (Feminization of Poverty) là hiện tượng:", "options": {"A": "Nam giới có tỷ lệ nghèo cao hơn phụ nữ.", "B": "Phụ nữ có xu hướng nghèo hơn, nghèo sâu hơn và tỷ lệ nghèo trong nhóm phụ nữ tăng lên.", "C": "Đói nghèo chỉ ảnh hưởng đến phụ nữ ở các nước đang phát triển.", "D": "Tất cả người nghèo đều là phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> \"Giới hóa đói nghèo\" mô tả thực tế là phụ nữ và các hộ gia đình do phụ nữ làm chủ thường có nguy cơ nghèo đói cao hơn và tình trạng nghèo của họ nghiêm trọng hơn so-với nam giới. (Tham khảo: Các nghiên cứu của UN Women, UNDP về giới và đói nghèo). [2735]"}, {"level": "1", "content": "Yếu tố nào sau đây KHÔNG phải là nguyên nhân chính góp phần vào tình trạng \"giới hóa đói nghèo\"?", "options": {"A": "Phân biệt đối xử trên thị trường lao động, chênh lệch lương.", "B": "Gánh nặng công việc chăm sóc không được trả lương.", "C": "Phụ nữ có khả năng quản lý tài chính tốt hơn nam giới.", "D": "Hạn chế trong tiếp cận giáo dục, y tế, tín dụng, tài sản."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Các yếu tố như phân biệt đối xử trên thị trường lao động, gánh nặng việc nhà không lương, và hạn chế tiếp cận nguồn lực là những nguyên nhân chính dẫn đến \"giới hóa đói nghèo\". Khả năng quản lý tài chính không phải là yếu tố gây ra đói nghèo theo giới. (Tham khảo: Các báo cáo của ILO, World Bank về phụ nữ và việc làm). [2750, 2753, 2754, 2756]"}, {"level": "1", "content": "Suy thoái môi trường và biến đổi khí hậu thường tác động đến phụ nữ nặng nề hơn nam giới VÌ:", "options": {"A": "Phụ nữ ít quan tâm đến các vấn đề môi trường hơn.", "B": "Phụ nữ thường phụ thuộc nhiều hơn vào tài nguyên thiên nhiên và có ít nguồn lực để ứng phó.", "C": "Nam giới luôn có các biện pháp thích ứng tốt hơn.", "D": "Các chương trình hỗ trợ luôn ưu tiên nam giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Do vai trò giới truyền thống, sự phụ thuộc lớn hơn vào tài nguyên thiên nhiên cho sinh kế gia đình, và khả năng tiếp cận nguồn lực (thông tin, tài chính, công nghệ) hạn chế hơn, phụ nữ thường dễ bị tổn thương hơn trước các tác động của suy thoái môi trường và BĐKH. (Tham khảo: Các báo cáo của IUCN, UN Environment về giới và môi trường). [272790]"}, {"level": "1", "content": "Trong sản xuất nông nghiệp ở Việt Nam, phụ nữ thường:", "options": {"A": "Chỉ tham gia vào các công việc nhẹ nhàng, không quan trọng.", "B": "Đóng góp một phần rất lớn vào lực lượng lao động, nhưng vai trò thường bị xem nhẹ.", "C": "Nắm giữ quyền quyết định chính trong hầu hết các khâu sản xuất.", "D": "Có thu nhập bình quân cao hơn nam giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ chiếm tỷ lệ lớn trong lao động nông nghiệp, đảm nhận nhiều công việc quan trọng, nhưng đóng góp của họ thường chưa được ghi nhận đầy đủ và họ ít có quyền quyết định hơn. (Tham khảo: Các nghiên cứu của FAO, Bộ NN&PTNT Việt Nam về vai trò của phụ nữ trong nông nghiệp). [2238, 2239, 2244]"}, {"level": "1", "content": "Việc giấy chứng nhận quyền sử dụng đất nông nghiệp thường chỉ đứng tên người chồng có thể gây ra hậu quả gì cho phụ nữ?", "options": {"A": "Giúp phụ nữ giảm bớt trách nhiệm liên quan đến đất đai.", "B": "Hạn chế quyền kiểm soát của họ đối với tư liệu sản xuất và khả năng tiếp cận tín dụng.", "C": "Khuyến khích họ tham gia nhiều hơn vào các quyết định sử dụng đất.", "D": "Không ảnh hưởng gì đến quyền lợi của phụ nữ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc không đứng tên trên GCNQSDĐ làm hạn chế quyền tự chủ, khả năng thế chấp vay vốn và ra quyết định của phụ nữ đối với đất đai, một tư liệu sản xuất quan trọng. (Tham khảo: Các nghiên cứu về giới và quyền đất đai). [0, 2346]"}, {"level": "1", "content": "Trong chuỗi giá trị nông sản, phụ nữ thường có xu hướng tập trung ở những khâu nào?", "options": {"A": "Các khâu đòi hỏi công nghệ cao và quản lý phức tạp.", "B": "Các khâu mang lại giá trị gia tăng cao nhất như xuất khẩu.", "C": "Các khâu sản xuất đầu vào và chế biến sơ, ít kỹ năng chuyên môn hoặc giá trị gia tăng thấp hơn.", "D": "Các khâu tiếp thị và quảng bá sản phẩm ra thị trường quốc tế."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Do hạn chế về tiếp cận vốn, công nghệ và kỹ năng quản lý, phụ nữ thường tập trung ở các công đoạn sản xuất và chế biến đơn giản, ít giá trị gia tăng hơn trong chuỗi giá trị nông sản. (Tham khảo: Các phân tích chuỗi giá trị nông sản từ góc độ giới). [222279]"}, {"level": "1", "content": "Kiến thức bản địa của phụ nữ về giống cây trồng, vật nuôi, kỹ thuật canh tác thường:", "options": {"A": "Ít có giá trị và không nên được áp dụng.", "B": "Được công nhận và phát huy đầy đủ trong các chương trình khuyến nông.", "C": "Rất quý báu, nhưng thường ít được công nhận chính thức và có nguy cơ mai một.", "D": "Chỉ phù hợp với các mô hình sản xuất quy mô nhỏ, lạc hậu."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ, đặc biệt là phụ nữ dân tộc thiểu số, nắm giữ nhiều tri thức bản địa quan trọng về nông nghiệp và bảo tồn tài nguyên, nhưng những kiến thức này thường chưa được coi trọng và có nguy cơ bị mất đi. (Tham khảo: Các nghiên cứu về tri thức bản địa và giới). [2292, 2296, 2302, 2307]"}, {"level": "1", "content": "Chính sách tích tụ, tập trung đất đai nông nghiệp, nếu không có biện pháp lồng ghép giới phù hợp, có thể tác động tiêu cực đến phụ nữ vì:", "options": {"A": "Phụ nữ không muốn tham gia sản xuất nông nghiệp quy mô lớn.", "B": "Quyền sử dụng đất của họ thường không vững chắc, dễ bị thiệt thòi trong các giao dịch.", "C": "Phụ nữ sẽ được hưởng lợi nhiều nhất từ các chính sách này.", "D": "Chính sách này chỉ áp dụng cho nam giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nếu quyền sử dụng đất của phụ nữ không được đảm bảo (ví dụ, không có tên trên GCNQSDĐ), họ có nguy cơ bị gạt ra ngoài lề hoặc mất đất trong quá trình tích tụ, tập trung đất đai. (Tham khảo: Các phân tích chính sách đất đai từ góc độ giới). [2319, 2320]"}, {"level": "1", "content": "Một trong những lý do chính khiến phụ nữ nông thôn khó tiếp cận tín dụng chính thức là:", "options": {"A": "Họ không có nhu cầu vay vốn.", "B": "Lãi suất tín dụng chính thức quá cao so với khả năng của họ.", "C": "Thiếu tài sản thế chấp (do hạn chế về quyền sở hữu đất đai, tài sản) và thủ tục phức tạp.", "D": "Các ngân hàng không muốn cho phụ nữ vay."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Việc thiếu tài sản thế chấp (thường là đất đai mà họ không đứng tên) và các rào cản về thủ tục là những khó khăn chính ngăn cản phụ nữ nông thôn tiếp cận vốn vay chính thức. (Tham khảo: Các nghiên cứu về tài chính vi mô và tiếp cận tín dụng của phụ nữ). [2324, 2347]"}, {"level": "1", "content": "Tác động của biến đổi khí hậu đến phụ nữ nông dân thường nặng nề hơn vì:", "options": {"A": "Họ ít có khả năng nhận biết các dấu hiệu của biến đổi khí hậu.", "B": "Họ thường chịu trách nhiệm chính về đảm bảo lương thực, nước uống cho gia đình và có ít nguồn lực thích ứng.", "C": "Họ không tham gia vào các hoạt động nông nghiệp.", "D": "Biến đổi khí hậu chỉ ảnh hưởng đến các cây trồng do nam giới canh tác."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Do vai trò truyền thống trong gia đình và hạn chế về nguồn lực, phụ nữ thường chịu ảnh hưởng nặng nề hơn từ BĐKH và gặp nhiều khó khăn hơn trong việc thích ứng. (Tham khảo: Các báo cáo của IPCC, UN Women về biến đổi khí hậu và giới). [2369, 2370, 2372]"}, {"level": "1", "content": "Việc lồng ghép giới vào Chương trình Mục tiêu quốc gia xây dựng Nông thôn mới ở Việt Nam giai đoạn 2010-2020 được đánh giá là:", "options": {"A": "Rất hiệu quả và toàn diện.", "B": "Còn nhiều hạn chế, chưa thực sự đầy đủ và thường mang tính hình thức.", "C": "Chỉ tập trung vào việc hỗ trợ nam giới.", "D": "Không cần thiết vì nông thôn mới đã tự nó đảm bảo bình đẳng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Các đánh giá cho thấy việc lồng ghép giới trong giai đoạn đầu của Chương trình NTM còn nhiều hạn chế, chưa được coi là yếu tố xuyên suốt và thường chỉ dừng lại ở các hoạt động mang tính chuyên đề hẹp. (Tham khảo: Các báo cáo đánh giá của UN Women về Chương trình NTM). [2404, 2405]"}, {"level": "1", "content": "Hệ thống đảm bảo chất lượng có sự tham gia (PGS) trong nông nghiệp hữu cơ có đặc điểm gì nổi bật?", "options": {"A": "Chỉ do các cơ quan nhà nước thực hiện kiểm tra.", "B": "Dựa trên sự tham gia tích cực của nhiều bên liên quan (người sản xuất, người tiêu dùng) trong thanh tra, giám sát.", "C": "Yêu cầu chi phí chứng nhận rất cao, không phù hợp với nông dân nhỏ.", "D": "Chỉ áp dụng cho các sản phẩm xuất khẩu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> PGS là một cơ chế chứng nhận chất lượng dựa trên sự tin cậy và tham gia của cộng đồng, phù hợp với điều kiện của các nông hộ nhỏ. (Tham khảo: Các tài liệu của IFOAM về PGS). [2448]"}, {"level": "1", "content": "Trao quyền kinh tế cho phụ nữ nông thôn có tầm quan trọng vì nó góp phần:", "options": {"A": "Chỉ làm tăng thu nhập cá nhân cho phụ nữ.", "B": "Cải thiện phúc lợi gia đình, dinh dưỡng trẻ em và quản lý tài nguyên bền vững.", "C": "Giảm vai trò kinh tế của nam giới trong gia đình.", "D": "Khiến phụ nữ từ bỏ các công việc nông nghiệp truyền thống."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khi phụ nữ được trao quyền kinh tế, họ có xu hướng đầu tư nhiều hơn vào gia đình (sức khỏe, giáo dục con cái) và cộng đồng, đồng thời có thể tham gia tích cực hơn vào quản lý tài nguyên bền vững. (Tham khảo: Các nghiên cứu của Ngân hàng Thế giới, FAO về tác động của việc trao quyền kinh tế cho phụ nữ). [2533, 2535, 2537]"}, {"level": "1", "content": "Ngân sách có trách nhiệm giới (GRB) KHÔNG nhằm mục đích nào sau đây?", "options": {"A": "Tạo ra một ngân sách riêng biệt chỉ dành cho phụ nữ.", "B": "Phân tích và xây dựng ngân sách nhà nước đảm bảo phân bổ công bằng cho cả nam và nữ.", "C": "Lồng ghép quan điểm giới vào toàn bộ chu trình chính sách ngân sách.", "D": "Thúc đẩy bình đẳng giới và thực hiện đầy đủ quyền của phụ nữ."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> GRB không phải là tạo ngân sách riêng cho phụ nữ mà là một cách tiếp cận để đảm bảo toàn bộ ngân sách nhà nước (cả thu và chi) đều nhạy cảm giới và thúc đẩy bình đẳng giới. (Tham khảo: Các định nghĩa về GRB của UN Women, OECD). [1896, 1897]"}, {"level": "1", "content": "Một trong những bước cơ bản đầu tiên trong quy trình GRB là gì?", "options": {"A": "Xây dựng ngay các chương trình chi tiêu riêng cho phụ nữ.", "B": "Phân tích tình hình giới (vai trò, nhu cầu, thách thức của các giới).", "C": "Chỉ tập trung vào việc tăng thu ngân sách từ phụ nữ.", "D": "Giám sát việc thực hiện ngân sách của năm trước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phân tích tình hình giới là bước nền tảng để hiểu rõ bối cảnh, từ đó mới có thể xây dựng các chính sách và phân bổ ngân sách có trách nhiệm giới. (Tham khảo: Các hướng dẫn về quy trình GRB của các tổ chức quốc tế). [1936, 1937]"}, {"level": "1", "content": "Công cụ phân tích GRB nào giúp làm rõ và định lượng thời gian phụ nữ (và nam giới) dành cho công việc không được trả lương?", "options": {"A": "Phân tích chi tiêu công và phân bổ lợi ích theo giới.", "B": "Đánh giá tác động giới của chính sách thuế.", "C": "Khảo sát sử dụng thời gian (Time-use surveys).", "D": "Đánh giá người hưởng lợi có nhạy cảm giới."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khảo sát sử dụng thời gian là công cụ quan trọng để đo lường và làm rõ gánh nặng công việc chăm sóc không lương, vốn thường do phụ nữ đảm nhận phần lớn. (Tham khảo: Các tài liệu về phương pháp luận GRB). [1970, 1971, 1972]"}, {"level": "1", "content": "Việc áp dụng GRB trong quản lý tài nguyên nước có thể dẫn đến điều gì?", "options": {"A": "Chỉ tập trung xây dựng các đập thủy điện lớn.", "B": "Xem xét kỹ lưỡng hơn về vị trí điểm lấy nước, thiết kế công trình vệ sinh phù hợp với phụ nữ.", "C": "Tăng giá nước sinh hoạt cho các hộ gia đình do phụ nữ làm chủ.", "D": "Giảm sự tham gia của cộng đồng vào quản lý nước."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GRB trong quản lý nước sẽ xem xét các tác động và nhu cầu khác biệt của phụ nữ, ví dụ như giảm gánh nặng lấy nước, đảm bảo an toàn và vệ sinh. (Tham khảo: Các nghiên cứu về giới và tài nguyên nước). [1925, 2023, 2025]"}, {"level": "1", "content": "Một trong những thách thức chính khi áp dụng GRB trong lĩnh vực TN&MT tại Việt Nam là:", "options": {"A": "Luật Ngân sách Nhà nước hoàn toàn không đề cập đến bình đẳng giới.", "B": "Năng lực của cán bộ về GRB đã rất cao.", "C": "Thiếu dữ liệu phân tách theo giới và các phân tích giới sâu sắc.", "D": "Các tổ chức quốc tế không hỗ trợ Việt Nam trong lĩnh vực này."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Việc thiếu dữ liệu phân tách theo giới và năng lực phân tích giới hạn chế là những rào cản lớn cho việc triển khai GRB hiệu quả ở Việt Nam và nhiều quốc gia khác. (Tham khảo: Các báo cáo đánh giá về GRB tại Việt Nam). [1992, 2092, 2094]"}, {"level": "1", "content": "Đánh giá giới (Gender Assessment - GA) trong một dự án TN&MT nên được thực hiện vào giai đoạn nào?", "options": {"A": "Chỉ sau khi dự án đã kết thúc.", "B": "Chỉ khi dự án gặp vấn đề liên quan đến giới.", "C": "Chủ yếu trước dự án (giai đoạn chuẩn bị), và cần cập nhật trong suốt vòng đời dự án.", "D": "Chỉ trong giai đoạn thực hiện dự án."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đánh giá giới ban đầu là rất quan trọng để thiết kế dự án nhạy cảm giới, và cần được theo dõi, cập nhật trong quá trình thực hiện và đánh giá cuối kỳ để đảm bảo hiệu quả và rút kinh nghiệm. (Tham khảo: Các hướng dẫn về Đánh giá giới của các tổ chức phát triển). [2125, 2126, 2127, 2128]"}, {"level": "1", "content": "Phương pháp nào sau đây KHÔNG phải là một kỹ thuật phổ biến để thu thập dữ liệu sơ cấp trong Đánh giá giới?", "options": {"A": "Thảo luận nhóm tập trung (FGD).", "B": "Phỏng vấn sâu (IDI).", "C": "Chỉ dựa vào các báo cáo thống kê có sẵn của chính phủ.", "D": "Lập bản đồ cộng đồng/tài nguyên có sự tham gia."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Dựa vào báo cáo thống kê có sẵn là thu thập dữ liệu thứ cấp. FGD, IDI, lập bản đồ có sự tham gia là các kỹ thuật thu thập dữ liệu sơ cấp phổ biến trong nghiên cứu xã hội và đánh giá giới. (Tham khảo: Các tài liệu về phương pháp nghiên cứu xã hội học). [2145, 2147]"}, {"level": "1", "content": "Kế hoạch hành động giới (Gender Action Plan - GAP) thường là kết quả đầu ra quan trọng của:", "options": {"A": "Phân tích chi tiêu công.", "B": "Đánh giá giới (Gender Assessment).", "C": "Khảo sát sử dụng thời gian.", "D": "Phân tích chính sách thuế."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Kế hoạch hành động giới (GAP) được xây dựng dựa trên các phát hiện và khuyến nghị của Đánh giá giới, nhằm cụ thể hóa các hoạt động lồng ghép giới vào dự án. (Tham khảo: Các hướng dẫn về lập kế hoạch dự án có lồng ghép giới). [2152, 2154]"}, {"level": "1", "content": "Mục tiêu của việc lồng ghép kết quả đánh giá giới vào thiết kế dự án TN&MT là gì?", "options": {"A": "Làm tăng chi phí và độ phức tạp của dự án.", "B": "Đảm bảo dự án giải quyết bất bình đẳng giới và đáp ứng nhu cầu của cả nam và nữ.", "C": "Chỉ tập trung vào việc bảo vệ các loài động thực vật quý hiếm.", "D": "Hạn chế sự tham gia của cộng đồng địa phương."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Lồng ghép kết quả đánh giá giới nhằm đảm bảo dự án được thiết kế công bằng, hiệu quả, đáp ứng nhu cầu các bên và thúc đẩy bình đẳng giới. (Tham khảo: Nguyên tắc lồng ghép giới trong quản lý dự án). [2166, 2167]"}, {"level": "1", "content": "Việc ghi tên cả vợ và chồng trên giấy chứng nhận quyền sử dụng đất là một ví dụ về:", "options": {"A": "Một chính sách không liên quan đến giới.", "B": "Một biện pháp lồng ghép giới nhằm đảm bảo quyền tài sản cho phụ nữ.", "C": "Một quy định gây thêm rắc rối cho thủ tục hành chính.", "D": "Một yêu cầu chỉ áp dụng ở các nước phát triển."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là một biện pháp cụ thể nhằm tăng cường quyền sử dụng đất và tài sản cho phụ nữ, một khía cạnh quan trọng của bình đẳng giới. (Tham khảo: Các nghiên cứu và khuyến nghị về giới và quyền đất đai). [2177]"}, {"level": "1", "content": "Mục tiêu cơ bản nhất của phân tích giới là gì?", "options": {"A": "Thu thập càng nhiều số liệu về nam và nữ càng tốt.", "B": "Mô tả sự khác biệt sinh học giữa các giới.", "C": "Xác định nguyên nhân sâu xa của bất bình đẳng giới và đề xuất giải pháp can thiệp.", "D": "Chứng minh rằng phụ nữ luôn là nạn nhân."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Phân tích giới không chỉ mô tả khác biệt mà còn tìm hiểu nguyên nhân của bất bình đẳng và đưa ra các giải pháp để thúc đẩy bình đẳng giới. (Tham khảo: Định nghĩa và mục đích của phân tích giới trong các tài liệu đào tạo về giới). [636]"}, {"level": "1", "content": "Số liệu tách biệt theo giới (Sex-disaggregated data) cho chúng ta biết điều gì, nhưng KHÔNG cho biết điều gì?", "options": {"A": "Cho biết sự khác biệt giữa nam và nữ; không cho biết nguyên nhân của sự khác biệt đó.", "B": "Cho biết nguyên nhân của sự khác biệt; không cho biết mức độ khác biệt.", "C": "Cho biết cả sự khác biệt và nguyên nhân.", "D": "Không cho biết gì cả."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Số liệu tách biệt theo giới chỉ ra sự khác biệt (ví dụ: tỷ lệ nam/nữ tham gia hoạt động A), nhưng không tự nó giải thích tại sao lại có sự khác biệt đó. Cần phân tích giới để tìm hiểu nguyên nhân. (Tham khảo: Các hướng dẫn về thu thập và sử dụng dữ liệu giới). [640, 649]"}, {"level": "1", "content": "Khung phân tích giới nào sau đây được xây dựng dựa trên ba vai trò của phụ nữ (sản xuất, tái sản xuất, cộng đồng) và phân biệt giữa nhu cầu giới thực tế và nhu cầu giới chiến lược?", "options": {"A": "Khung Harvard (Khung Vai trò giới)", "B": "Khung Moser (Khung Ba vai trò)", "C": "Khung Longwe (Khung Bình đẳng và Trao quyền cho phụ nữ)", "D": "Ma trận Phân tích giới (GAM)"}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khung Moser (hay Khung Ba vai trò) nổi tiếng với việc phân tích ba vai trò của phụ nữ và sự phân biệt giữa nhu cầu giới thực tế (PGN) và nhu cầu giới chiến lược (SGN). (Tham khảo: Công trình của Caroline Moser về hoạch định giới). [915, 927, 928, 929]"}, {"level": "1", "content": "Công cụ \"Hồ sơ Tiếp cận và Kiểm soát\" (Access and Control Profile) trong Khung Harvard giúp xác định điều gì?", "options": {"A": "Ai làm công việc gì trong gia đình và cộng đồng.", "B": "Các yếu tố văn hóa, xã hội ảnh hưởng đến vai trò giới.", "C": "Ai có khả năng sử dụng (tiếp cận) và ai có quyền quyết định (kiểm soát) đối với các nguồn lực và lợi ích.", "D": "Các nhu cầu giới chiến lược cần được đáp ứng."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Công cụ này giúp phân biệt rõ ràng giữa việc chỉ có thể sử dụng một nguồn lực (tiếp cận) và việc có quyền ra quyết định cuối cùng về việc sử dụng hay phân bổ nguồn lực đó (kiểm soát). (Tham khảo: Các tài liệu hướng dẫn về Khung Harvard). [870, 871, 872]"}, {"level": "1", "content": "Nhu cầu giới chiến lược (SGN) nhằm mục đích:", "options": {"A": "Duy trì và củng cố sự phân công lao động theo giới truyền thống.", "B": "Chỉ đáp ứng các nhu cầu vật chất trước mắt của phụ nữ.", "C": "Thách thức và thay đổi các mối quan hệ quyền lực bất bình đẳng và sự phân công lao động theo giới, hướng tới bình đẳng thực chất.", "D": "Chỉ tập trung vào việc tăng thu nhập cho phụ nữ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nhu cầu giới chiến lược (SGN) hướng đến những thay đổi mang tính cấu trúc, nhằm thay đổi vị thế phụ thuộc của phụ nữ và thúc đẩy bình đẳng giới thực chất, ví dụ như quyền ra quyết định, độc lập kinh tế. (Tham khảo: Khái niệm về SGN trong Khung Moser). [1245, 1248, 1249]"}, {"level": "1", "content": "Khái niệm nào KHÔNG phải là một trong ba cách tiếp cận phát triển có nhạy cảm giới chính được đề cập?", "options": {"A": "WID (Phụ nữ trong Phát triển)", "B": "GAD (Giới và Phát triển)", "C": "WED (Phụ nữ, Môi trường và Phát triển)", "D": "WAD (Phụ nữ và Phát triển)"}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Ba cách tiếp cận chính thường được thảo luận trong lịch sử nghiên cứu giới và phát triển là WID, WAD và GAD. WED (Women, Environment and Development) là một lĩnh vực quan trọng nhưng không phải là một trong ba \"trường phái\" kinh điển ban đầu về cách tiếp cận giới trong phát triển. [215, 398]"}, {"level": "1", "content": "Việc một quốc gia có HDI cao nhưng GII cũng cao cho thấy điều gì?", "options": {"A": "Quốc gia đó có mức phát triển con người cao và bình đẳng giới cũng rất cao.", "B": "Quốc gia đó có mức phát triển con người cao, nhưng vẫn còn nhiều bất bình đẳng giới.", "C": "Quốc gia đó có mức phát triển con người thấp nhưng bình đẳng giới lại cao.", "D": "HDI và GII không có mối liên hệ với nhau."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> HDI đo lường thành tựu phát triển con người nói chung, trong khi GII đo lường sự bất bình đẳng giới. Một quốc gia có thể đạt được các chỉ số trung bình cao về y tế, giáo dục, thu nhập (HDI cao) nhưng vẫn tồn tại sự chênh lệch lớn giữa nam và nữ trong các lĩnh vực đó và các khía cạnh trao quyền (GII cao). [217, 219, 456, 484]"}, {"level": "1", "content": "Tác động của thể chế phi chính thức (luật tục, tập quán) đến quyền tài sản của phụ nữ thường là:", "options": {"A": "Luôn tích cực và bảo vệ quyền lợi của phụ nữ tốt hơn luật pháp.", "B": "Thường củng cố các khuôn mẫu phụ hệ, gây bất lợi cho phụ nữ trong việc thừa kế và kiểm soát tài sản, đặc biệt là đất đai.", "C": "Không có tác động đáng kể vì luật pháp chính thức mới là yếu tố quyết định.", "D": "Chỉ ảnh hưởng đến phụ nữ ở thành thị, không ảnh hưởng đến phụ nữ nông thôn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nhiều luật tục và tập quán truyền thống, đặc biệt ở các xã hội phụ hệ, có xu hướng ưu tiên nam giới trong việc thừa kế và kiểm soát tài sản, tạo ra rào cản lớn cho phụ nữ mặc dù pháp luật có thể quy định bình đẳng. [57, 58, 70]"}, {"level": "1", "content": "\"Pháp trị\" và \"Đức trị\" trong hệ thống thể chế Việt Nam có thể hiểu là:", "options": {"A": "\"Pháp trị\" là cai trị bằng luật pháp, \"Đức trị\" là cai trị bằng đạo đức cá nhân của người lãnh đạo.", "B": "\"Pháp trị\" là các quy định pháp luật chính thức, \"Đức trị\" là các chuẩn mực văn hóa, đạo đức, tập quán xã hội phi chính thức.", "C": "\"Pháp trị\" là thể chế ở trung ương, \"Đức trị\" là thể chế ở địa phương.", "D": "Hai khái niệm này hoàn toàn đồng nghĩa với nhau."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> \"Pháp trị\" thường được liên kết với hệ thống luật pháp, quy định chính thức của nhà nước, trong khi \"Đức trị\" liên quan đến các chuẩn mực đạo đức, văn hóa, tập quán xã hội (thể chế phi chính thức) có vai trò điều chỉnh hành vi. [8, 10, 12]"}, {"level": "1", "content": "Khi các quy định pháp luật chính thức không phù hợp hoặc đi ngược lại các chuẩn mực văn hóa, tập quán xã hội đã ăn sâu, điều gì có khả năng xảy ra?", "options": {"A": "Pháp luật sẽ ngay lập tức thay đổi được các tập quán đó.", "B": "Người dân sẽ chỉ tuân theo pháp luật chính thức.", "C": "Việc thực thi pháp luật sẽ gặp nhiều khó khăn, và hành vi của người dân có thể vẫn bị chi phối bởi thể chế phi chính thức.", "D": "Thể chế phi chính thức sẽ tự động bị loại bỏ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Sự thiếu ăn khớp giữa thể chế chính thức và phi chính thức thường dẫn đến những thách thức trong thực thi pháp luật, và các chuẩn mực bất thành văn vẫn có thể có ảnh hưởng mạnh mẽ đến hành vi. [13, 14, 15]"}, {"level": "1", "content": "Việc Luật Đất đai quy định cả vợ và chồng cùng đứng tên trên Giấy chứng nhận quyền sử dụng đất nhưng thực tế nhiều nơi vẫn chỉ ghi tên chồng cho thấy:", "options": {"A": "Phụ nữ không muốn đứng tên trên giấy tờ đất đai.", "B": "Có khoảng cách giữa quy định pháp luật và thực tiễn áp dụng, có thể do ảnh hưởng của tập quán hoặc thiếu thông tin.", "C": "Luật pháp không có quy định này.", "D": "Nam giới luôn là người sử dụng đất chính."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mặc dù pháp luật đã có những quy định tiến bộ, việc thực thi trên thực tế còn gặp nhiều hạn chế do ảnh hưởng của các yếu tố văn hóa, xã hội và nhận thức. [91, 92]"}, {"level": "1", "content": "Quản trị tốt, với các yếu tố như công khai, minh bạch, trách nhiệm giải trình, có mối liên hệ như thế nào với thúc đẩy bình đẳng giới?", "options": {"A": "Không có mối liên hệ nào đáng kể.", "B": "Tạo không gian và cơ hội để tiếng nói, nhu cầu của phụ nữ được lắng nghe và xem xét công bằng trong hoạch định chính sách.", "C": "Chỉ làm tăng thêm thủ tục hành chính, gây khó khăn cho phụ nữ.", "D": "Chỉ có lợi cho nam giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Một hệ thống quản trị tốt, minh bạch và có trách nhiệm giải trình sẽ tạo điều kiện thuận lợi hơn cho sự tham gia của phụ nữ và việc các nhu cầu của họ được phản ánh trong chính sách. [132, 135, 136]"}, {"level": "1", "content": "Rào cản nào sau đây KHÔNG phải là rào cản chính đối với sự tham gia của phụ nữ vào các vị trí lãnh đạo, quản lý?", "options": {"A": "Quy định về tuổi nghỉ hưu (nữ nghỉ hưu sớm hơn nam).", "B": "Năng lực làm việc của phụ nữ luôn thấp hơn nam giới.", "C": "Các định kiến giới về khả năng lãnh đạo của phụ nữ.", "D": "Gánh nặng công việc gia đình không được chia sẻ."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Năng lực làm việc không phụ thuộc vào giới tính. Các yếu tố như quy định tuổi nghỉ hưu, định kiến giới và gánh nặng việc nhà mới là những rào cản thực sự. [141, 143, 144]"}, {"level": "1", "content": "Sự \"vô hình\" của lao động nữ trong ngành năng lượng (tập trung vào việc ít chuyên môn, lương thấp) phản ánh điều gì?", "options": {"A": "Phụ nữ không có khả năng làm các công việc kỹ thuật cao.", "B": "Sự phân công lao động theo giới và hạn chế cơ hội thăng tiến cho phụ nữ trong các ngành kỹ thuật.", "C": "Ngành năng lượng không có nhu cầu tuyển dụng lao động nữ.", "D": "Phụ nữ tự nguyện chọn những công việc lương thấp."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc phụ nữ tập trung ở các vị trí thấp hơn trong các ngành kỹ thuật như năng lượng thường là kết quả của các rào cản về định kiến giới, cơ hội đào tạo và thăng tiến hạn chế. [145]"}, {"level": "1", "content": "Nếu các chính sách quản lý tài nguyên không xem xét đầy đủ kiến thức, kinh nghiệm và nhu cầu của phụ nữ, hậu quả có thể là:", "options": {"A": "Chính sách sẽ luôn hiệu quả hơn vì tập trung vào một nhóm đối tượng.", "B": "Chính sách có thể kém hiệu quả, thiếu bền vững và bỏ lỡ các giải pháp sáng tạo từ phụ nữ.", "C": "Phụ nữ sẽ tự động tìm cách thích nghi mà không cần sự hỗ trợ.", "D": "Tài nguyên sẽ được bảo vệ tốt hơn vì nam giới quản lý hiệu quả hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc bỏ qua một nửa dân số trong hoạch định chính sách sẽ dẫn đến các quyết sách không phản ánh đúng thực tế, kém hiệu quả và bỏ lỡ tiềm năng đóng góp của phụ nữ. [150, 151]"}, {"level": "1", "content": "Sự khác biệt chính giữa nghèo đói tuyệt đối và nghèo đói tương đối là gì?", "options": {"A": "Nghèo tuyệt đối đo bằng tiền, nghèo tương đối đo bằng hiện vật.", "B": "Nghèo tuyệt đối dựa trên một chuẩn cố định về nhu cầu tối thiểu, nghèo tương đối so sánh với mức sống chung của xã hội tại một thời điểm.", "C": "Nghèo tuyệt đối chỉ có ở các nước đang phát triển, nghèo tương đối chỉ có ở các nước phát triển.", "D": "Nghèo tuyệt đối dễ đo lường hơn nghèo tương đối."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Nghèo tuyệt đối xác định dựa trên một ngưỡng nhu cầu cơ bản bất biến (ví dụ, $2.15/ngày), trong khi nghèo tương đối xác định dựa trên sự so sánh với mức sống phổ biến trong một xã hội cụ thể và có thể thay đổi theo thời gian. [2606, 2609]"}, {"level": "1", "content": "Chỉ số Nghèo Đa chiều (MPI) Toàn cầu KHÔNG bao gồm chiều cạnh nào sau đây?", "options": {"A": "Y tế (dinh dưỡng, tử vong trẻ em)", "B": "Giáo dục (số năm đi học, tình trạng đi học)", "C": "Mức sống (điện, vệ sinh, nước uống, nhà ở, nhiên liệu, tài sản)", "D": "Mức độ hạnh phúc và sự hài lòng với cuộc sống"}, "answer": "D", "explanation": "<b>Giải thích học thuật:</b> MPI toàn cầu tập trung vào các thiếu hụt cụ thể, có thể đo lường được trong các lĩnh vực y tế, giáo dục và điều kiện sống cơ bản. Mức độ hạnh phúc là một khái niệm phức tạp hơn và không trực tiếp nằm trong các chỉ số cấu thành MPI. [2621]"}, {"level": "1", "content": "Việc giảm MPI của Việt Nam chủ yếu do giảm tỷ lệ nghèo (H) chứ không phải cường độ nghèo (A) cho thấy điều gì?", "options": {"A": "Những người thoát nghèo đa chiều đã hoàn toàn không còn thiếu hụt nào.", "B": "Những người còn lại trong nhóm nghèo vẫn đối mặt với số lượng thiếu hụt tương tự, một số thiếu hụt có tính \"bám dai\".", "C": "Các chính sách giảm nghèo của Việt Nam không hiệu quả.", "D": "Cường độ nghèo không phải là một yếu tố quan trọng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Điều này ngụ ý rằng mặc dù số người nghèo đa chiều giảm, nhưng những người vẫn còn nghèo tiếp tục trải qua nhiều thiếu hụt. Một số loại thiếu hụt có thể khó giải quyết hơn các loại khác. [2631, 2632]"}, {"level": "1", "content": "Đường cong Kuznets giả thuyết rằng mối quan hệ giữa bất bình đẳng thu nhập và thu nhập bình quân đầu người có dạng:", "options": {"A": "Chữ U xuôi (ban đầu giảm, sau đó tăng).", "B": "Đường thẳng đi lên (luôn tăng).", "C": "Chữ U ngược (ban đầu tăng, sau đó giảm).", "D": "Đường thẳng đi xuống (luôn giảm)."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Giả thuyết Đường cong Kuznets cho rằng bất bình đẳng thu nhập sẽ tăng trong giai đoạn đầu của phát triển kinh tế và sau đó giảm khi quốc gia trở nên giàu có hơn. [2690, 2691]"}, {"level": "1", "content": "Lý thuyết của Thomas Piketty (r > g) cho rằng bất bình đẳng có xu hướng gia tăng khi:", "options": {"A": "Tốc độ tăng trưởng kinh tế (g) lớn hơn tỷ suất lợi nhuận trên tư bản (r).", "B": "Tỷ suất lợi nhuận trên tư bản (r) lớn hơn tốc độ tăng trưởng kinh tế (g).", "C": "(r) và (g) luôn bằng nhau.", "D": "(r) và (g) không liên quan đến bất bình đẳng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Piketty lập luận rằng khi lợi nhuận từ tư bản (r) tăng nhanh hơn tốc độ tăng trưởng của toàn nền kinh tế (g), của cải sẽ có xu hướng tập trung vào tay một số ít, dẫn đến gia tăng bất bình đẳng. [2696]"}, {"level": "1", "content": "Hiện tượng nào sau đây KHÔNG phải là bằng chứng của \"giới hóa đói nghèo\" tại Việt Nam theo các tài liệu tham khảo?", "options": {"A": "Phụ nữ lớn tuổi, góa bụa ở nông thôn chiếm tỷ lệ cao người nghèo.", "B": "Các hộ gia đình do góa phụ làm chủ có xác suất nghèo cao hơn.", "C": "Chênh lệch lương theo giới là không đáng kể.", "D": "Doanh nghiệp nhỏ do phụ nữ làm chủ thường có lợi nhuận thấp hơn."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Các tài liệu cho thấy có sự chênh lệch lương đáng kể theo giới tại Việt Nam, đây là một yếu tố góp phần vào giới hóa đói nghèo. Các yếu tố còn lại đều là bằng chứng được nêu. [2738, 2739, 2740]"}, {"level": "1", "content": "Gánh nặng công việc chăm sóc không lương mà phụ nữ phải đảm nhận ảnh hưởng đến nguy cơ đói nghèo của họ như thế nào?", "options": {"A": "Giúp họ có thêm thời gian nghỉ ngơi và nâng cao sức khỏe.", "B": "Hạn chế thời gian và năng lượng cho công việc được trả lương, giáo dục, phát triển kỹ năng.", "C": "Không có ảnh hưởng gì đến tình trạng kinh tế của họ.", "D": "Giúp họ tăng thêm thu nhập từ các hoạt động cộng đồng."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> \"Gánh nặng kép\" này chiếm dụng thời gian của phụ nữ, hạn chế cơ hội của họ trong việc tham gia thị trường lao động và các hoạt động nâng cao năng lực, từ đó ảnh hưởng đến thu nhập và nguy cơ nghèo. [2753, 2762]"}, {"level": "1", "content": "Trong các cộng đồng sống phụ thuộc vào tài nguyên thiên nhiên, phụ nữ thường:", "options": {"A": "Có quyền kiểm soát tài nguyên lớn hơn nam giới.", "B": "Ít tham gia vào các hoạt động nông nghiệp và thu hái.", "C": "Phụ thuộc nhiều hơn vào tài nguyên để đảm bảo sinh kế nhưng lại có ít quyền tiếp cận và kiểm soát hơn.", "D": "Không có kiến thức gì về quản lý tài nguyên."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ thường là người sử dụng tài nguyên chính cho nhu cầu gia đình nhưng lại gặp nhiều rào cản trong việc tiếp cận, sở hữu và ra quyết định liên quan đến các tài nguyên đó. [272777]"}, {"level": "1", "content": "Khi tài nguyên thiên nhiên (nước, củi) trở nên khan hiếm do suy thoái môi trường, gánh nặng công việc của phụ nữ thường:", "options": {"A": "Giảm đi vì họ có nhiều thời gian rảnh hơn.", "B": "Tăng lên do họ phải đi xa hơn và tốn nhiều công sức hơn để tìm kiếm.", "C": "Không thay đổi vì nam giới sẽ đảm nhận các công việc này.", "D": "Được chia sẻ công bằng hơn trong gia đình."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Sự khan hiếm tài nguyên trực tiếp làm tăng gánh nặng công việc không lương cho phụ nữ, những người thường chịu trách nhiệm chính trong việc thu thập các tài nguyên này cho gia đình. [2790]"}, {"level": "1", "content": "Một trong những rào cản chính khiến phụ nữ khó tiếp cận và hưởng lợi từ các chương trình giảm nghèo và dự án phát triển liên quan đến tài nguyên môi trường là:", "options": {"A": "Họ không có nhu cầu tham gia.", "B": "Các chương trình này luôn được thiết kế để chỉ nam giới hưởng lợi.", "C": "Thiếu thông tin, ít được tham gia vào quá trình ra quyết định, và các chuẩn mực văn hóa hạn chế.", "D": "Họ đã quá giàu có và không cần sự hỗ trợ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Các yếu tố như hạn chế về thông tin, loại trừ khỏi các quy trình ra quyết định và các rào cản văn hóa thường ngăn cản phụ nữ tham gia và hưởng lợi một cách công bằng từ các dự án phát triển. [2821, 2822, 2823]"}, {"level": "1", "content": "Trong nông nghiệp Việt Nam, mặc dù phụ nữ đóng góp phần lớn sức lao động, họ thường bị coi là lực lượng \"bên lề\" và có thu nhập thấp hơn nam giới. Điều này phản ánh:", "options": {"A": "Sự đánh giá thấp mang tính hệ thống đối với giá trị lao động của phụ nữ.", "B": "Phụ nữ làm việc ít hiệu quả hơn nam giới.", "C": "Nam giới không muốn phụ nữ tham gia nông nghiệp.", "D": "Phụ nữ thích làm các công việc có thu nhập thấp."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> Sự mâu thuẫn giữa đóng góp lao động lớn và vị thế thấp hơn của phụ nữ cho thấy một sự đánh giá chưa đúng mức về giá trị công việc của họ, thường bắt nguồn từ các định kiến giới. [6, 7]"}, {"level": "1", "content": "FAO đánh giá cao vai trò ngày càng tăng của phụ nữ Việt Nam trong các mắt xích nào của hệ thống lương thực và thực phẩm nông nghiệp?", "options": {"A": "Chỉ trong khâu sản xuất tại đồng ruộng.", "B": "Chỉ trong các vị trí lãnh đạo cấp cao.", "C": "Trong cả sản xuất, chế biến, tiêu thụ và cả các vị trí quản lý, lãnh đạo.", "D": "Chỉ trong các hoạt động nội trợ liên quan đến thực phẩm."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> FAO ghi nhận vai trò ngày càng mở rộng của phụ nữ Việt Nam trong nhiều khâu của chuỗi giá trị nông sản, không chỉ giới hạn ở sản xuất. [2274]"}, {"level": "1", "content": "Hệ thống đảm bảo chất lượng có sự tham gia (PGS) trong nông nghiệp hữu cơ KHÔNG có đặc điểm nào sau đây?", "options": {"A": "Phù hợp với điều kiện của nông dân sản xuất quy mô nhỏ.", "B": "Dựa trên sự tham gia tích cực của nhiều bên liên quan.", "C": "Hoàn toàn do các công ty chứng nhận quốc tế lớn vận hành và kiểm soát.", "D": "Là một cơ chế chứng nhận nhằm đảm bảo chất lượng và tính minh bạch."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> PGS là một hệ thống chứng nhận dựa vào cộng đồng và các bên liên quan tại địa phương, khác với các hệ thống chứng nhận của bên thứ ba do các tổ chức lớn thực hiện. [2448]"}, {"level": "1", "content": "Khi phát triển du lịch cộng đồng, cần đặc biệt lưu ý yếu tố giới để đảm bảo điều gì KHÔNG xảy ra?", "options": {"A": "Phụ nữ được tham gia vào nhiều hoạt động đa dạng.", "B": "Phụ nữ có thêm nguồn thu nhập.", "C": "Phụ nữ bị gia tăng gánh nặng công việc mà không có quyền kiểm soát thu nhập hay tham gia quản lý.", "D": "Bảo tồn và phát huy các giá trị văn hóa địa phương."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Một nguy cơ tiềm ẩn của du lịch cộng đồng là phụ nữ có thể bị \"nữ hóa\" các công việc phục vụ, tăng gánh nặng lao động mà không được chia sẻ lợi ích và quyền quyết định một cách công bằng. [2459, 2460, 2461]"}, {"level": "1", "content": "Vai trò của Hội LHPN Việt Nam trong việc giúp phụ nữ nông thôn tiếp cận vốn vay ưu đãi là:", "options": {"A": "Không đáng kể, vì các ngân hàng tự tìm đến phụ nữ.", "B": "Rất quan trọng, là cầu nối hiệu quả với Ngân hàng Chính sách Xã hội và các ngân hàng khác.", "C": "Chỉ giới hạn ở việc tuyên truyền, không có hoạt động cụ thể.", "D": "Chỉ hỗ trợ cho phụ nữ ở thành thị."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Hội LHPN các cấp đóng vai trò then chốt trong việc ủy thác, tín chấp, giúp hàng triệu phụ nữ nông thôn, đặc biệt là phụ nữ nghèo, tiếp cận được các nguồn vốn vay ưu đãi. [2508, 2509]"}, {"level": "1", "content": "Công cụ \"Phân tích các yếu tố ảnh hưởng\" (Influencing Factors Analysis) trong Khung Harvard nhằm mục đích:", "options": {"A": "Liệt kê tất cả các hoạt động của nam và nữ.", "B": "Xác định các nhân tố (văn hóa, kinh tế, thể chế...) ảnh hưởng đến phân công lao động và tiếp cận/kiểm soát nguồn lực.", "C": "Đánh giá nhu cầu giới thực tế và chiến lược.", "D": "Kiểm tra các mục tiêu của dự án đã nhạy cảm giới chưa."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Công cụ này giúp xác định các yếu tố bên ngoài và bên trong có thể tác động đến vai trò giới, sự phân công lao động, cũng như khả năng tiếp cận và kiểm soát nguồn lực của các giới. [875, 8877]"}, {"level": "1", "content": "Khung Longwe sử dụng 5 \"mức độ bình đẳng\" để đánh giá điều gì?", "options": {"A": "Mức độ giàu có của một quốc gia.", "B": "Mức độ trao quyền cho phụ nữ và mức độ bình đẳng của họ so với nam giới trong các hoạt động can thiệp phát triển.", "C": "Số lượng phụ nữ tham gia vào lực lượng lao động.", "D": "Chất lượng cơ sở hạ tầng ở nông thôn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Khung Longwe sử dụng các mức độ bình đẳng (Phúc lợi, Tiếp cận, Nhận thức hóa, Tham gia, Kiểm soát) để đánh giá mức độ một can thiệp phát triển có thực sự trao quyền cho phụ nữ và thúc đẩy bình đẳng giới hay không. [9966, 969]"}, {"level": "1", "content": "Theo Khung Moser, việc nam giới thường chỉ thực hiện vai trò sản xuất và vai trò chính trị cộng đồng, trong khi phụ nữ thực hiện cả ba vai trò (sản xuất, tái sản xuất, cộng đồng) cho thấy:", "options": {"A": "Nam giới làm việc hiệu quả hơn phụ nữ.", "B": "Phụ nữ có nhiều thời gian rảnh rỗi hơn nam giới.", "C": "Sự phân công lao động theo giới không đồng đều và gánh nặng đa vai trò của phụ nữ.", "D": "Vai trò tái sản xuất không quan trọng bằng vai trò sản xuất."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Việc phụ nữ phải đảm đương nhiều vai trò hơn (\"gánh nặng ba vai trò\") là một đặc điểm của sự phân công lao động theo giới không công bằng, ảnh hưởng đến thời gian và cơ hội của họ. [931, 932, 935]"}, {"level": "1", "content": "Trong phân tích giới, mô hình \"đồng hồ 24 giờ\" được sử dụng để:", "options": {"A": "Lập kế hoạch chi tiêu hàng ngày cho gia đình.", "B": "Xác định thời gian nam và nữ dành cho các loại công việc khác nhau trong một ngày, làm rõ gánh nặng lao động.", "C": "Đo lường năng suất lao động của từng cá nhân.", "D": "So sánh múi giờ giữa các quốc gia."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mô hình \"đồng hồ 24 giờ\" là một công cụ trực quan để phân tích sự phân công lao động theo giới dựa trên việc sử dụng thời gian hàng ngày, giúp làm rõ ai làm gì và trong bao lâu. [1118, 1123, 1124]"}, {"level": "1", "content": "Bước \"Sàng lọc\" (Screening) trong quy trình phân tích giới 4 bước nhằm mục đích chính là:", "options": {"A": "Đề xuất ngay các giải pháp cụ thể.", "B": "Xem xét kỹ lưỡng chương trình/chính sách có liên quan đến yếu tố giới và cần được phân tích sâu hơn không.", "C": "Thu thập tất cả dữ liệu định lượng cần thiết.", "D": "Đánh giá tác động cuối cùng của chương trình/chính sách."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Bước Sàng lọc là bước đầu tiên để xác định xem một chương trình, chính sách có các khía cạnh giới tiềm ẩn cần được phân tích kỹ lưỡng hơn hay không. [788, 789]"}, {"level": "1", "content": "Tại sao việc phân tích các nhóm nữ giới và nam giới khác nhau (theo tuổi, dân tộc, vùng miền...) lại quan trọng trong phân tích giới?", "options": {"A": "Để làm cho báo cáo phân tích dài hơn và phức tạp hơn.", "B": "Để chỉ ra rằng tất cả phụ nữ (hoặc nam giới) đều giống hệt nhau.", "C": "Để hiểu rõ sự đa dạng và khác biệt trong trải nghiệm, nhu cầu của các nhóm nhỏ, từ đó đưa ra chính sách phù hợp hơn.", "D": "Vì đây là yêu cầu bắt buộc của mọi nhà tài trợ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ và nam giới không phải là các nhóm đồng nhất. Các yếu tố như tuổi tác, dân tộc, địa vị kinh tế, vùng miền... tạo ra những trải nghiệm và nhu cầu khác nhau, cần được xem xét để có phân tích toàn diện. [687, 688]"}, {"level": "1", "content": "\"Phân biệt đối xử gián tiếp\" về giới xảy ra khi:", "options": {"A": "Một quy định pháp luật rõ ràng chỉ cho phép một giới thực hiện một quyền nào đó.", "B": "Một chính sách hoặc thực hành có vẻ trung lập về giới nhưng trên thực tế lại gây bất lợi đáng kể cho một giới do các điều kiện xã hội sẵn có.", "C": "Một cá nhân có thái độ tiêu cực đối với một giới cụ thể.", "D": "Các phương tiện truyền thông xây dựng hình ảnh tiêu cực về một giới."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Phân biệt đối xử gián tiếp xảy ra khi các quy định, chính sách tưởng chừng trung lập lại tạo ra kết quả bất lợi cho một giới do tương tác với các bất bình đẳng hoặc đặc điểm xã hội hiện có. [702, 703]"}, {"level": "1", "content": "Khi một dự án phát triển cộng đồng chỉ tham vấn ý kiến của trưởng thôn và các hộ trưởng (chủ yếu là nam giới), dự án này đã bỏ qua nguyên tắc quan trọng nào của phân tích giới?", "options": {"A": "Thu thập số liệu tách biệt theo giới.", "B": "Đảm bảo sự tham gia của cả phụ nữ và các nhóm yếu thế khác trong quá trình ra quyết định.", "C": "Phân tích các yếu tố ảnh hưởng cấp vĩ mô.", "D": "Chỉ tập trung vào nhu cầu giới chiến lược."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc chỉ tham vấn một nhóm đối tượng (thường là nam giới có vị thế) sẽ bỏ qua tiếng nói, nhu cầu và kinh nghiệm của phụ nữ và các nhóm khác, dẫn đến các quyết định không phù hợp hoặc thiếu công bằng. [664, 666, 1742]"}, {"level": "1", "content": "Một chương trình tín dụng nông nghiệp yêu cầu tài sản thế chấp là đất đai có GCNQSDĐ. Nếu ở địa phương đó, GCNQSDĐ chủ yếu đứng tên nam giới, chương trình này có thể vô tình gây ra:", "options": {"A": "Sự gia tăng tài sản cho các hộ gia đình.", "B": "Phân biệt đối xử gián tiếp, gây khó khăn cho phụ nữ trong việc tiếp cận vốn.", "C": "Sự tham gia đồng đều của cả nam và nữ nông dân.", "D": "Việc giảm lãi suất cho vay."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Mặc dù yêu cầu tài sản thế chấp có vẻ trung lập, nhưng do thực tế quyền sở hữu đất đai không bình đẳng, quy định này có thể gián tiếp loại trừ nhiều phụ nữ khỏi việc tiếp cận tín dụng. Đây là một ví dụ về phân biệt đối xử gián tiếp. [2324, 2347, 703]"}, {"level": "1", "content": "Trong Đánh giá tác động giới (GIA), câu hỏi \"Chương trình, chính sách có tác động khác nhau đến việc sử dụng thời gian của phụ nữ và nam giới không?\" nhằm tìm hiểu về:", "options": {"A": "Mức độ hài lòng của họ đối với chương trình.", "B": "Sự thay đổi trong phân công lao động và gánh nặng công việc (bao gồm cả công việc không lương).", "C": "Số tiền họ tiết kiệm được nhờ chương trình.", "D": "Mức độ tham gia của họ vào các hoạt động giải trí."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Câu hỏi này trực tiếp nhắm vào việc phân tích xem một can thiệp có làm thay đổi cách phụ nữ và nam giới sử dụng thời gian cho các vai trò khác nhau hay không, đặc biệt là gánh nặng công việc không lương. [834]"}, {"level": "1", "content": "Khung Harvard tập trung nhiều vào việc thu thập dữ liệu ở cấp độ nào?", "options": {"A": "Cấp độ vĩ mô (chính sách quốc gia).", "B": "Cấp độ trung mô (ngành, tổ chức).", "C": "Cấp độ vi mô (hộ gia đình, cộng đồng).", "D": "Cấp độ toàn cầu."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khung Harvard được thiết kế chủ yếu để thu thập và phân tích dữ liệu ở cấp độ vi mô, chẳng hạn như các hoạt động và nguồn lực trong hộ gia đình và cộng đồng. [856, 907]"}, {"level": "1", "content": "Một điểm yếu của Khung Moser là gì?", "options": {"A": "Quá đơn giản và dễ áp dụng.", "B": "Không phân biệt được nhu cầu giới thực tế và chiến lược.", "C": "Chưa xem xét đầy đủ các yếu tố tác động khác như giai cấp, dân tộc và chưa chỉ ra nhu cầu chiến lược của nam giới.", "D": "Không nhấn mạnh vai trò của hoạch định chính sách."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Mặc dù có nhiều điểm mạnh, Khung Moser bị phê bình là chưa tính đến sự giao thoa của giới với các yếu tố bất bình đẳng khác và tập trung nhiều hơn vào nhu cầu chiến lược của phụ nữ. [954, 957]"}, {"level": "1", "content": "Mục tiêu của việc xác định \"mức độ nhận diện vấn đề phụ nữ\" trong Khung Longwe là gì?", "options": {"A": "Đếm số lượng phụ nữ tham gia dự án.", "B": "Đánh giá xem các mục tiêu của dự án có thực sự quan tâm và hướng đến cải thiện vị thế của phụ nữ hay không.", "C": "Xác định các vấn đề sức khỏe riêng của phụ nữ.", "D": "So sánh phụ nữ ở các quốc gia khác nhau."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Công cụ này giúp đánh giá mức độ một dự án có thực sự giải quyết các vấn đề liên quan đến bình đẳng và trao quyền cho phụ nữ, hay chỉ đề cập một cách hình thức hoặc bỏ qua. [1050, 1051]"}, {"level": "1", "content": "Vai trò \"Cộng đồng\" trong công cụ Phân công lao động theo giới (Khung Moser) bao gồm những hoạt động nào?", "options": {"A": "Chỉ các hoạt động sản xuất kinh doanh.", "B": "Chỉ các hoạt động chăm sóc gia đình và nội trợ.", "C": "Các hoạt động chung của cộng đồng, thường phục vụ lợi ích tập thể, bao gồm cả hoạt động chính trị, xã hội, văn hóa.", "D": "Chỉ các hoạt động giải trí và thể thao."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Vai trò cộng đồng liên quan đến sự tham gia của các cá nhân vào các hoạt động và việc quản lý chung của cộng đồng, vượt ra ngoài phạm vi hộ gia đình. [931, 1098, 1099]"}, {"level": "1", "content": "Khi sử dụng công cụ \"Tiếp cận và Kiểm soát\", việc một phụ nữ có thể sử dụng máy cày của gia đình (tiếp cận) nhưng không có quyền bán hoặc cho thuê máy cày đó (thiếu kiểm soát) cho thấy:", "options": {"A": "Cô ấy hoàn toàn không có quyền gì đối với máy cày.", "B": "Có sự khác biệt giữa khả năng sử dụng và quyền quyết định cuối cùng đối với nguồn lực.", "C": "Cô ấy không biết cách sử dụng máy cày hiệu quả.", "D": "Gia đình đó không coi trọng việc sử dụng máy móc."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đây là một ví dụ điển hình minh họa sự khác biệt giữa \"tiếp cận\" (khả năng sử dụng) và \"kiểm soát\" (quyền ra quyết định). [8113]"}, {"level": "1", "content": "Khi phân tích việc ra quyết định, câu hỏi \"Phụ nữ/nam giới có được hỏi ý kiến không? Họ có được ra quyết định cuối cùng không?\" nhằm mục đích:", "options": {"A": "Xác định ai là người nói nhiều nhất trong các cuộc họp.", "B": "Đánh giá mức độ dân chủ và sự tham gia thực chất của các giới trong quá trình ra quyết định.", "C": "Tìm hiểu xem ai là người có trình độ học vấn cao nhất.", "D": "So sánh số lượng nam và nữ tham gia bỏ phiếu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Câu hỏi này đi sâu vào việc liệu sự tham gia có thực chất hay chỉ mang tính hình thức, và ai là người có quyền lực cuối cùng trong việc đưa ra quyết định. [1219]"}, {"level": "1", "content": "Một ví dụ về giải pháp đáp ứng \"Nhu cầu giới chiến lược\" cho phụ nữ trong một dự án nông nghiệp có thể là:", "options": {"A": "Cung cấp giống cây trồng miễn phí cho tất cả nông dân.", "B": "Tổ chức các lớp tập huấn về kỹ năng lãnh đạo và quản lý kinh doanh cho nữ nông dân.", "C": "Xây dựng một nhà kho chung để bảo quản nông sản.", "D": "Sửa chữa đường giao thông nông thôn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc cung cấp kỹ năng lãnh đạo và quản lý kinh doanh giúp thay đổi vị thế và năng lực của phụ nữ, hướng tới sự độc lập và quyền tự quyết cao hơn, đây là đặc điểm của SGN. Các lựa chọn khác thường thuộc về PGN hoặc lợi ích chung. [1248, 1272]"}, {"level": "1", "content": "Mục đích chính của việc thực hiện Đánh giá giới (Gender Assessment) TRƯỚC khi bắt đầu một dự án TN&MT là:", "options": {"A": "Để kéo dài thời gian chuẩn bị dự án.", "B": "Để hiểu rõ bối cảnh giới, xác định vấn đề cần giải quyết, từ đó thiết kế dự án nhạy cảm và đáp ứng giới.", "C": "Để đảm bảo tất cả nhân viên dự án đều là nữ.", "D": "Để dự án có thêm nhiều hoạt động không cần thiết."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Đánh giá giới ban đầu cung cấp thông tin nền tảng quan trọng để thiết kế dự án sao cho phù hợp với bối cảnh giới, giải quyết các bất bình đẳng và đáp ứng nhu cầu của các bên. [2123, 2125, 2126]"}, {"level": "1", "content": "Trong lĩnh vực quản lý đất đai, một can thiệp GRB cụ thể có thể là:", "options": {"A": "Tăng thuế sử dụng đất cho tất cả các hộ gia đình.", "B": "Chỉ cho phép nam giới tham gia vào các hội đồng tư vấn đất đai.", "C": "Xây dựng chương trình cấp GCNQSDĐ ưu tiên và tạo điều kiện cho phụ nữ, bao gồm cả việc đồng sở hữu.", "D": "Hạn chế quyền chuyển nhượng đất của phụ nữ."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Đây là một biện pháp cụ thể nhằm giải quyết bất bình đẳng giới trong quyền đất đai, đảm bảo phụ nữ có quyền sở hữu và kiểm soát đất đai một cách chắc chắn hơn. [2017, 2044]"}, {"level": "1", "content": "Khảo sát sử dụng thời gian (Time-Use Survey) là một công cụ GRB quan trọng vì nó giúp:", "options": {"A": "Xác định các loại thuế mà người dân phải đóng.", "B": "Đánh giá mức độ hài lòng của người dân với các dịch vụ công.", "C": "Định lượng hóa gánh nặng công việc không được trả lương (thường của phụ nữ) và tác động của chính sách đến việc sử dụng thời gian.", "D": "Phân tích tình hình việc làm trong khu vực kinh tế chính thức."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Khảo sát sử dụng thời gian giúp làm \"hiện hình\" và đo lường khối lượng công việc không lương, một yếu tố quan trọng thường bị bỏ qua nhưng lại ảnh hưởng lớn đến cơ hội và phúc lợi của phụ nữ. [1970, 191985]"}, {"level": "1", "content": "Việc thiếu dữ liệu phân tách theo giới trong lĩnh vực TN&MT ở Việt Nam gây khó khăn gì cho việc áp dụng GRB?", "options": {"A": "Không gây khó khăn gì vì GRB không cần dữ liệu.", "B": "Khó xác định chính xác nhu cầu, vai trò và tác động khác biệt của chính sách đối với các giới, làm giảm hiệu quả của GRB.", "C": "Chỉ gây khó khăn cho các chuyên gia quốc tế, không ảnh hưởng đến cán bộ trong nước.", "D": "Làm cho các dự án TN&MT trở nên rẻ hơn."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Dữ liệu phân tách theo giới là nền tảng để phân tích tình hình, xác định vấn đề và thiết kế các can thiệp GRB phù hợp. Thiếu dữ liệu này là một rào cản lớn. [1992, 2092]"}, {"level": "1", "content": "\"Làng nông nghiệp thông minh với khí hậu\" (Climate-Smart Villages - CSV) là mô hình nhằm:", "options": {"A": "Chỉ tập trung vào việc tăng năng suất cây trồng bằng mọi giá.", "B": "Thúc đẩy các mô hình nông nghiệp thân thiện với thiên nhiên, thích ứng BĐKH và bền vững.", "C": "Chỉ áp dụng các công nghệ nông nghiệp hiện đại nhất từ nước ngoài.", "D": "Chỉ dành cho các nông dân nam giới có trình độ cao."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> CSV hướng đến việc tích hợp các thực hành nông nghiệp giúp tăng khả năng chống chịu với BĐKH, giảm phát thải khí nhà kính và đảm bảo an ninh lương thực một cách bền vững. [2377]"}, {"level": "1", "content": "Khi phụ nữ được trao quyền kinh tế và có quyền kiểm soát tài sản, họ có xu hướng đầu tư nhiều hơn vào:", "options": {"A": "Mua sắm cá nhân và giải trí.", "B": "Các hoạt động chính trị cấp cao.", "C": "Giáo dục, y tế và dinh dưỡng cho con cái và gia đình.", "D": "Các dự án kinh doanh rủi ro cao."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Nhiều nghiên cứu cho thấy khi phụ nữ có quyền kiểm soát tài chính, họ ưu tiên đầu tư vào các lĩnh vực mang lại phúc lợi lâu dài cho gia đình, đặc biệt là con cái. [2533, 2534, 2535]"}, {"level": "1", "content": "Trong bối cảnh BĐKH, việc phụ nữ dựa vào kiến thức truyền thống và mạng lưới xã hội để ứng phó cho thấy:", "options": {"A": "Họ hoàn toàn không cần sự hỗ trợ từ bên ngoài.", "B": "Kiến thức truyền thống là đủ để giải quyết mọi vấn đề BĐKH.", "C": "Họ có những năng lực và chiến lược ứng phó riêng, nhưng cũng cần được hỗ trợ để tăng cường khả năng chống chịu.", "D": "Mạng lưới xã hội không có vai trò gì trong thích ứng BĐKH."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Phụ nữ sở hữu những kiến thức và mạng lưới quan trọng, nhưng quy mô và tính phức tạp của BĐKH đòi hỏi phải có sự kết hợp với các hỗ trợ từ bên ngoài để nâng cao hiệu quả thích ứng. [2797]"}, {"level": "1", "content": "Để việc lồng ghép giới trong các dự án TN&MT thực sự hiệu quả, KHÔNG nên làm gì?", "options": {"A": "Thực hiện Đánh giá giới toàn diện trước, trong và sau dự án.", "B": "Xây dựng Kế hoạch hành động giới (GAP) cụ thể.", "C": "Coi lồng ghép giới chỉ là trách nhiệm của một vài chuyên gia giới trong nhóm dự án.", "D": "Đảm bảo sự tham gia có ý nghĩa của phụ nữ trong tất cả các giai đoạn của dự án."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Lồng ghép giới phải là trách nhiệm của toàn bộ đội ngũ dự án và được tích hợp vào tất cả các hoạt động, chứ không phải là công việc riêng của một vài cá nhân. [2170, 2181]"}, {"level": "1", "content": "Sự khác biệt giữa \"công bằng giới\" (gender equity) và \"bình đẳng giới\" (gender equality) thể hiện rõ nhất ở điểm nào?", "options": {"A": "Bình đẳng giới là mục tiêu, công bằng giới có thể là phương tiện để đạt được mục tiêu đó, đôi khi đòi hỏi đối xử khác biệt để bù đắp bất lợi.", "B": "Công bằng giới là đảm bảo nam nữ giống hệt nhau, bình đẳng giới là đảm bảo cơ hội như nhau.", "C": "Hai khái niệm này hoàn toàn đồng nghĩa và có thể thay thế cho nhau.", "D": "Công bằng giới chỉ áp dụng trong lĩnh vực kinh tế, bình đẳng giới áp dụng trong mọi lĩnh vực."}, "answer": "A", "explanation": "<b>Giải thích học thuật:</b> \"Bình đẳng giới\" là mục tiêu cuối cùng về vị thế và cơ hội ngang nhau. \"Công bằng giới\" là quá trình đối xử công bằng, có thể bao gồm các biện pháp đối xử khác biệt (ví dụ, các biện pháp đặc biệt tạm thời) để giải quyết những bất lợi lịch sử hoặc hệ thống, nhằm tạo ra một \"sân chơi bình đẳng\" để đạt được bình đẳng về kết quả. (Tham khảo: Các tài liệu của UN Women, EIGE về các khái niệm giới). [286, 287, 288]"}, {"level": "1", "content": "Việc Luật Đất đai 2024 bỏ quy định \"hộ gia đình\" là đối tượng sử dụng đất mới có thể tiềm ẩn tác động giới như thế nào nếu không có các phân tích và biện pháp hỗ trợ đi kèm?", "options": {"A": "Chắc chắn sẽ làm tăng quyền lực của phụ nữ trong các quyết định về đất đai.", "B": "Có thể làm phức tạp hóa việc xác lập quyền sử dụng đất của phụ nữ trong các hộ gia đình truyền thống, nơi vai trò chủ hộ của nam giới còn nặng nề, nếu quyền cá nhân không được làm rõ.", "C": "Không có tác động gì đến phụ nữ vì đất đai thuộc sở hữu toàn dân.", "D": "Sẽ tự động giải quyết mọi bất bình đẳng giới liên quan đến đất đai."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Việc loại bỏ \"hộ gia đình\" là một đối tượng sử dụng đất có thể có những tác động đa chiều. Nếu không làm rõ quyền của các thành viên cá nhân (đặc biệt là phụ nữ) trong các hộ gia đình, nơi nam giới thường là chủ hộ và có quyền quyết định lớn hơn, sự thay đổi này có thể dẫn đến những phức tạp mới trong việc bảo vệ quyền đất đai của phụ nữ. [87, 88, 89]"}, {"level": "1", "content": "Tại sao việc chỉ dựa vào sự gia tăng GDP/GNI bình quân đầu người không đủ để đánh giá tiến bộ về bình đẳng giới trong phát triển kinh tế?", "options": {"A": "Vì GDP/GNI không tính đến đóng góp của nam giới.", "B": "Vì các chỉ số này không phản ánh sự phân phối thu nhập, công việc không lương, và các rào cản phi kinh tế mà phụ nữ phải đối mặt.", "C": "Vì bình đẳng giới không liên quan đến phát triển kinh tế.", "D": "Vì GDP/GNI chỉ đo lường các hoạt động kinh tế phi chính thức."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GDP/GNI là các chỉ số trung bình, không cho biết thu nhập được phân phối như thế nào giữa các giới, không tính đến giá trị của công việc chăm sóc không lương (chủ yếu do phụ nữ đảm nhận), và bỏ qua nhiều rào cản xã hội, văn hóa cản trở sự tham gia kinh tế đầy đủ của phụ nữ. [435, 436, 438]"}, {"level": "1", "content": "Sự tương tác giữa thể chế chính thức (ví dụ, luật cấm phân biệt đối xử giới trong tuyển dụng) và thể chế phi chính thức (ví dụ, định kiến rằng một số nghề \"không hợp với phụ nữ\") có thể dẫn đến kịch bản nào sau đây?", "options": {"A": "Luật pháp sẽ ngay lập tức xóa bỏ mọi định kiến giới.", "B": "Các nhà tuyển dụng sẽ chỉ tuân theo luật pháp mà bỏ qua định kiến.", "C": "Mặc dù có luật, định kiến giới vẫn có thể ảnh hưởng ngầm đến quyết định tuyển dụng, tạo ra \"rào cản vô hình\" cho phụ nữ.", "D": "Các công ty sẽ công khai từ chối tuyển phụ nữ dựa trên định kiến."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Ngay cả khi có luật pháp tiến bộ, các định kiến giới ăn sâu trong văn hóa và nhận thức xã hội (thể chế phi chính thức) vẫn có thể tiếp tục ảnh hưởng đến các quyết định và hành vi một cách tinh vi, tạo ra những rào cản thực tế cho phụ nữ. [13, 17]"}, {"level": "1", "content": "Một chính sách \"mù giới\" (gender-blind) trong quản lý tài nguyên, ví dụ như giao đất dựa trên tiêu chí \"chủ hộ\", có thể vô tình gây bất lợi cho phụ nữ vì:", "options": {"A": "Chính sách này được thiết kế đặc biệt để loại trừ phụ nữ.", "B": "Ở nhiều cộng đồng, nam giới thường được mặc định là chủ hộ, nên phụ nữ có thể bị loại khỏi việc tiếp cận đất đai dù họ là người sử dụng chính.", "C": "Phụ nữ không có khả năng quản lý đất đai.", "D": "Chính sách này quá phức tạp để phụ nữ hiểu."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Chính sách \"mù giới\" không xem xét đến các vai trò và vị thế khác biệt của nam và nữ trong xã hội. Việc dựa vào khái niệm \"chủ hộ\" mà không phân tích ai thực sự là chủ hộ theo tập quán có thể dẫn đến việc phụ nữ bị bỏ qua, dù họ đóng vai trò quan trọng trong sản xuất. [2320]"}, {"level": "1", "content": "Lý do chính khiến các lý thuyết phát triển kinh tế truyền thống (cổ điển, tân cổ điển) ít đề cập đến vai trò kinh tế của phụ nữ là gì?", "options": {"A": "Phụ nữ trong các thời kỳ đó hoàn toàn không tham gia sản xuất.", "B": "Các nhà kinh tế cố tình muốn hạ thấp vai trò của phụ nữ.", "C": "Trọng tâm phân tích của các lý thuyết này là thị trường, sản xuất hàng hóa và các hoạt động \"chính thức\", bỏ qua kinh tế hộ gia đình và công việc không lương nơi phụ nữ đóng góp lớn.", "D": "Không có đủ dữ liệu thống kê về phụ nữ vào thời điểm đó."}, "answer": "C", "explanation": "<b>Giải thích học thuật:</b> Các mô hình kinh tế truyền thống thường tập trung vào các hoạt động kinh tế có thể đo lường bằng tiền tệ và diễn ra trong khu vực \"công\" hoặc \"thị trường\", do đó bỏ qua phần lớn đóng góp kinh tế của phụ nữ trong phạm vi gia đình và các hoạt động phi chính thức. [374, 3377]"}, {"level": "1", "content": "Cách tiếp cận GAD (Giới và Phát triển) khác biệt căn bản với WID (Phụ nữ trong Phát triển) ở chỗ:", "options": {"A": "GAD chỉ tập trung vào nam giới, WID chỉ tập trung vào phụ nữ.", "B": "GAD phân tích mối quan hệ quyền lực giữa các giới và hướng đến thay đổi cấu trúc, trong khi WID chủ yếu tìm cách \"tích hợp\" phụ nữ vào các hệ thống hiện có.", "C": "GAD cho rằng phụ nữ không cần được trao quyền, WID thì ngược lại.", "D": "GAD là một lý thuyết cũ hơn WID."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> GAD có một lăng kính phân tích sâu hơn, tập trung vào các mối quan hệ giới, cấu trúc quyền lực và sự cần thiết phải trao quyền cũng như thay đổi các cấu trúc đó, thay vì chỉ đơn thuần \"thêm\" phụ nữ vào các chương trình phát triển như WID. [399, 400, 411, 412, 413]"}, {"level": "1", "content": "Việc một quốc gia có tỷ lệ nữ đại biểu quốc hội cao nhưng phụ nữ vẫn gặp nhiều rào cản trong việc tiếp cận các vị trí lãnh đạo doanh nghiệp chủ chốt cho thấy điều gì?", "options": {"A": "Sự tham gia chính trị không liên quan đến trao quyền kinh tế.", "B": "Có thể có sự tiến bộ trong một số khía cạnh trao quyền (chính trị) nhưng vẫn tồn tại những rào cản lớn ở các khía cạnh khác (kinh tế).", "C": "Phụ nữ chỉ nên tập trung vào chính trị, không nên làm kinh doanh.", "D": "Số liệu về nữ đại biểu quốc hội là không chính xác."}, "answer": "B", "explanation": "<b>Giải thích học thuật:</b> Trao quyền là một quá trình đa chiều. Tiến bộ ở một lĩnh vực (ví dụ, đại diện chính trị) không tự động đồng nghĩa với tiến bộ ở tất cả các lĩnh vực khác. Các rào cản về định kiến, cơ hội, và cấu trúc vẫn có thể tồn tại mạnh mẽ trong lĩnh vực kinh tế. [221, 509, 510]"}, {"level": "1", "content": "Tại sao việc nâng cao trách nhiệm giải trình và tính minh bạch trong quản lý tài chính công lại quan trọng đối với việc thúc đẩy GRB?", "options": {"A": "Vì nó làm cho quy trình ngân sách trở nên phức tạp hơn.", "B": "Vì nó cho phép công chúng và các tổ chức xã hội giám sát việc phân bổ và sử dụng ngân sách có thực sự đáp ứng nhu cầu giới và thúc đẩy bình đẳng giới hay không.", "C": "Vì nó chỉ có lợi cho các nhà tài trợ quốc tế.", "D": "Vì nó giúp giảm tổng chi tiêu ngân sách nhà nước."
